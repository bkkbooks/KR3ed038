body:
  text: 卷之三十七五疸門五疸之病諸書所載甚繁其證不過有五一曰黃汗二曰黃疸三曰谷疸四曰酒疸五曰女勞疸黃汗為病身體俱腫汗出不渴其汗能染衣黃如柏汁此由脾胃有熱汗出或風所閉熱結其汗黃也黃疸食已即飢遍身俱黃臥時身體帶青帶赤增寒壯熱此飲酒食過度臟腑熱水穀並積於脾胃風濕相搏熱氣熏蒸發於陰部其人必嘔發於陽部其人必振寒而後熱谷疸之證食畢即頭眩心中怫鬱不安遍身發黃此脾胃有熱因大飢過食所傷胃氣所致也酒疸之病身目發黃心中懊痛足脛滿小便黃面發赤斑此由飢中飲酒大醉當風入水所致女勞疸者身目俱黃發熱惡寒小腹滿急小便不利此由過於勞傷極於房室之後入水所致多渴腹脹者難治丹溪論云不必分其五等皆濕熱而成此證譬猶醬曲濕與熱搏氣不得透鬱而生黃五疸之分皆是前人之所注且如張長沙謂陽明病無汗小便不利心中懊憹身必發黃脈來浮滑緊數乃熱蓄陽明胃經可作陽明實發黃朱肱云病人寒濕在裡不散熱蓄於脾胃而腠理不開瘀熱與宿谷相搏鬱蒸而發黃也且如傷寒當汗不汗當利小便不利亦生黃夫脾屬土而受水濕發黃者有之脈來沉細而無力身冷而黃為寒熱搏於太陰脾經當作陰證治之又有蓄血一證小便自利大便黑色其人發狂乃為瘀血蓄在下焦而發黃也若嗜酒之人多致發黃蓋酒性大熱熱與濕搏於胃中而黃髮於外其證外無熱內則小便不利胸中如啖蒜薤狀當心足下皆熱久遠則成黑疸脈若浮滑腹滿欲嘔吐者必先吐之脈若沉滑腹滿大便祕者必先下之又有卒然發黃心滿而喘命在須臾者為之卒黃但心戰發熱是也大概疸病渴者難治不渴者易治疸毒入腹喘滿者危脈洪大大便利而渴者死脈微小小便利不渴者生寸口無脈鼻氣冷者亦不治又有口淡怔忡耳鳴腳弱或微寒熱小便赤白濁又當作虛證治之不可妄用涼藥愈傷血氣治法分利濕熱最為切當臨病之際在乎脈證辨之人命醫之所繫可不謹乎五疸通治方加減五苓散治飲食伏暑郁發為疸煩渴引飲小便不利茵陳豬苓去皮白朮赤茯苓去皮澤瀉各二錢上作一服水二盅煎至一盅不拘時服一方有桂心葛根湯治酒疸乾葛三錢梔子仁枳實去穰麩炒豆豉以上各二錢甘草一錢炙上作一服水二盅煎至一盅不拘時服當歸白朮湯治酒疸發黃心胸堅滿不進飲食小便黃赤其脈弦澀當歸黃芩茵陳甘草炙以上各一錢白朮二錢半夏湯泡杏仁去皮尖麩炒枳實麩炒前胡以上各一錢半茯苓二錢上作一服水二盅生薑三片煎至一盅食後服白朮湯治酒疸因下後變為黑疸目青面黑心中如啖蒜韭狀大便黑皮膚不仁其脈微而數白朮桂心各二錢豆豉枳實麩炒乾葛杏仁甘草炙各一錢上作一服水二盅煎至一盅食前服秦艽飲子治五疸口淡咽乾發熱微寒秦艽去蘆當歸去蘆酒浸芍藥白朮官桂去皮茯苓去皮陳皮熟地黃酒蒸小草川芎半夏湯泡甘草炙各一錢上作一服水二盅生薑五片煎至一盅不拘時服山茵陳散治疸證發熱大小便祕澀山茵陳梔子各二錢赤茯苓枳實各一錢半葶藶甘草各一錢上作一服水二盅生薑三片煎至一盅食前服加味四君子湯治色疸人參白朮白茯苓白芍藥黃耆炙白扁豆炒各二錢甘草炙一錢上作一服水二盅生薑五片紅棗二枚煎一盅不拘時服一清飲治疸證發熱諸熱通用柴胡三錢赤茯苓去皮二錢桑白皮炒川芎各一錢半甘草炙一錢上作一服水二盅生薑三片紅棗一枚煎一盅食前服茵陳湯治時行瘀熱在裡鬱蒸不散通身發黃茵陳一兩三錢大黃四錢梔子仁二錢上作一服水二盅煎至一盅不拘時服金黃丸治酒積食積諸積面黃疸積硬塊荊三稜牽牛各二錢半巴豆四十九粒出油黍米粉香附子各半兩澤瀉一錢半上為細末用梔子煎湯和丸如緑豆大每服三丸至五丸食遠用白湯送下谷疸丸專治谷疸苦參三兩龍膽草一兩牛膽一個取汁上為細末用牛膽汁入少煉蜜和丸如梧桐子大每服五十丸空心熱水或生薑甘草煎湯送下滑石散治女勞疸滑石一兩半白礬一兩枯上為細末每服二錢用大麥粥清食前調服以小便出黃水為度黃連散治黃疸大小便祕澀臟腑壅熱黃連川大黃各二兩用好醋拌炒黃芩甘草炙各一兩上為極細末每服二錢食後用溫水調服日三必效散治黃疸通用葶藶隔紙炒龍膽草山梔子茵陳黃芩各二錢上作一服水二盅煎至一盅不拘時服嗅藥瓜蒂散治黃疸遍身如金色纍效瓜蒂二錢母丁香一錢黍米四十九粒赤小豆半錢上為細末每夜吹兩鼻孔內嗅入便睡明日取下黃水次服黃連散桂枝加黃耆湯治黃汗身腫汗出出已輒輕久久必身潤胸中痛腰以下無汗其腰馳痛如有物在皮中劇者不能飲食煩躁小便不利桂枝二錢芍藥三錢甘草一錢炙黃耆三錢上作一服水二盅生薑五片紅棗三枚煎至一盅食遠服仍飲熱粥以助藥力梔子丸治時行病急黃及瘴瘧疫癘梔子仁茵陳芒硝大黃蒸以上各一兩杏仁去皮尖炒七錢豆豉湯浸軟另碾鱉甲醋炙常山以上各半兩巴豆去皮膜油二錢上為細末餳飴為丸如梧桐子大每服三丸食遠用米飲送下吐利是效未效加一丸茵陳散治黃疸食已即飢身體面目爪甲牙齒及小便悉黃寒熱或身體多赤多青皆由酒食過度為風濕所搏熱氣鬱蒸而成茵陳木通大黃炒梔子仁以上各一兩石膏二兩栝蔞一個甘草炙半兩上㕮咀每服四錢水一盞半生薑五片蔥白一莖同煎至八分去滓不拘時溫服大小便祕加枳實赤茯苓葶藶又有傷寒瘀血不解郁發於表發為黃疸其脈浮緊當以汗解獨煎好麻黃湯飲之黃耆湯治黃汗身體腫發熱不渴汗出染衣黃色黃耆去蘆蜜炙赤芍藥茵陳蒿各二兩石膏四兩麥門冬去心淡豉各一兩甘草半兩炙上㕮咀每服四錢用水一盞生薑五片煎七分去滓食前服一方入竹葉十四片不用薑一方無甘草黃耆苦酒湯治黃汗身體腫發熱汗出而不渴狀如風水汗出沾衣色黃如柏汁脈自沉此由汗出入水中浴水入汗孔中從外而得之黃耆銼五兩芍藥官桂去粗皮各三兩上銼如麻豆大每服五錢匕用苦酒一盞半同煎取七分去滓不拘時溫服服之當心煩苦酒助故也一方用苦酒三合水一盞半同煎服犀角散治急黃心膈煩躁目赤痛犀角屑黃芩升麻梔子仁以上各一兩茵陳朴硝各二兩上㕮咀每服四錢水一盞竹葉三七片煎至六分去滓不拘時服治陰黃汗染衣涕唾黃上用蔓菁子搗末平旦以井花水服一匙日再加至兩匙以知為度每夜小便中浸少許帛子各書記日色漸退白則瘥不過服五升而愈秦艽湯一名秦艽散治陰黃不欲聞人言小便不利秦艽去苗土一兩旋覆花赤茯苓去皮甘草銼炙各半兩上㕮咀每服四錢匕以牛乳汁一盞煎至六分去滓不拘時溫服瞿麥散治黃疸小便赤澀心神煩悶瞿麥麥門冬去心茵陳黃芩以上各一兩梔子二兩大黃一兩半上㕮咀每服四錢用水一盞煎至六分去滓不拘時服以小便利為度
