body:
  text: 卷之二十八脅痛門附論素問藏氣法時論曰肝病兩脅痛引少腹善怒何謂夫肝厥陰脈自足而上環陰器底少腹又上貫肝膈布脅肋故兩脅下痛引少腹刺熱篇云肝熱亦令脅痛手足躁不得安臥咳論云肝咳之狀咳則兩脅下痛甚則不可以轉轉則兩胠下滿脾咳亦能右胠下痛陰陰引肩背胠亦脅也舉痛論寒氣客於厥陰之脈故脅引少腹而痛以歲運論之歲木太過金反勝之則脅痛歲火太過水反勝之胸中痛脅支滿痛歲金太過病兩脅下小腹痛木勝金復則胸脅暴痛下引少腹六元正紀曰木鬱之發病胃脘當心而痛上支兩脅膈咽不通飲食不下至真大要曰陽明在泉心脅痛不能反側繆刺篇云邪客於足少陽之絡令人脅痛不得息咳而汗出邪客足太陽之絡令人拘攣背急引脅而痛標本論曰心病先心痛一日咳傳肺三日肺傳肝脅支痛而滿肝病頭目眩脅支滿痛也且夫左右脅者陰陽之道路也故肝生於左肺藏於右以左屬肝而藏血肝陽也血陰也乃為外陽而內陰也右屬肺而主氣肺陰也氣陽也乃為外陰而內陽也或謂肝血蓄於左脅作塊而痛者為肝積名肥氣丸肺氣鬱於右脅痞硬而痛咳喘為肺積名息賁也而脾所繫於右其經濕勝故痰飲濕能化之隨經流入於右左脅痛者多因留血而作右脅痛者悉是痰氣兩脅痛者豈可一概而言哉論病之由當分外之六淫內之五邪若暴怒傷觸悲哀氣結飲食過度冷熱失調攧僕傷形者或因痰積流注於右與血相搏皆能為痛張仲景論傷寒少陽耳聾脅痛甚者此是肝膽之氣鬱而作痛且脅痛之病諸經論之詳矣其脈弦澀者順洪大者逆治法當推其歲氣分其左右辨其氣血痰積量其形證虛實有藥施治無不取效收十金之功矣脅痛通治方芎葛湯治脅下痛不可忍者川芎乾薑桂枝枳殼麩炒細辛芍藥麻黃人參去蘆防風以上各一錢甘草上作一服水二盅生薑三片煎至一盅食前服分氣紫蘇飲治腹脅疼痛氣促喘急紫蘇葉桑白皮炙五味子去梗桔梗去蘆草果仁大腹皮白茯苓陳皮甘草炙各一錢半上作一服水二盅生薑三片入鹽少許煎至一盅空心服枳殼煮散枳殼麩炒細辛川芎乾葛防風甘草桔梗各一錢上作一服水二盅生薑三片煎至一盅食前服推氣散治右脅疼痛脹滿不食片薑黃枳殼麩炒桂心不見火各五錢甘草炙二錢上為細末每服二錢薑棗湯調下食遠服枳芎散治左脅刺痛不可忍者枳實川芎各半兩粉草炙二錢上為細末每服二錢薑棗湯調下酒調亦可食遠服枳殼散治脅間痛如有物刺是氣疾也枳殼麩炒二兩半甘草炙七錢半上為細末每服二錢濃煎蔥白湯調下不拘時服香橘湯治七情所傷中脘不快腹脅脹滿香附子炒橘紅半夏薑製各三錢甘草炙一錢上作一服水二盅生薑五片紅棗二枚煎至一盅食遠服枳實散治兩脅疼痛枳實麩炒一兩白芍藥川芎人參各半兩上為細末每服二錢薑棗湯調空心服異香散治腹脅脹滿痞悶噎塞一切氣痞腰脅刺痛方見氣門流氣飲子治五臟不和三焦氣壅心胸痞悶噎塞不通腹脅脹痛嘔吐不食方見氣門加味小柴胡湯治傷寒脅疼柴胡黃芩各二錢人參半夏各一錢半牡蠣粉枳殼麩炒甘草各一錢上作一服水二盅生薑三片紅棗二枚煎一盅食遠服氣針丸治久積風壅心胸築痛兩脅心胸似有針刺疼痛叫聲徹日六脈沉伏按之手不可近此藥屢試神驗常服疏通滯氣止刺痛極效木香檳榔青皮陳皮大黃以上各四兩牽牛取頭末半斤半生半炒上為細末煉蜜和丸如梧桐子大每服三十丸用生薑湯送下食前服量虛實加減治脅痛如打芫華菊花躑躅花各等分上用布囊貯蒸熱以尉痛上冷復易之木通散治男子婦人脅肋苦痛木通去節青皮去白蘿蔔子炒茴香炒川楝子取肉用巴豆半兩同炒黃色去巴豆以上各一兩滑石另研莪朮木香以上各半兩上為細末每服三錢不拘時用蔥白湯調服即愈甚者不過三服芍藥散治婦人脅痛白芍藥玄胡索炒肉桂以上各一兩香附子二兩醋一升鹽半兩同煮乾上為細末每服二錢不拘時白湯調服白朮丸治息積病脅下滿逆妨悶喘息不便呼吸引痛不可針灸宜導引服藥白朮枳實官桂以上各一兩半人參二兩陳皮桔梗醋炒甘草炙以上各一兩上為細末煉蜜和丸如梧桐子大每服一十丸不拘時溫酒送下日三服芎歸芍藥湯治肝積氣滯左脅下遇發作手足頭面昏痛川芎當歸芍藥桂枝防風枳實羌活甘草以上各一錢六分乾葛四分麻黃側子二分上㕮咀分作二帖每帖用水二盅生薑五片煎至七分去滓不拘時服有汗避風
