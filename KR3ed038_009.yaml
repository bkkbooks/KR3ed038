body:
  text: 卷之九傷寒門附論傷寒之為病經曰冬傷於寒春變為溫病夏變為熱病皆系六淫之邪併為四氣四氣者風寒暑濕是也其氣互交最能傷人風寒之性暴傳六經暑濕之性偏著五臟壯者氣行則已怯者則著成病若風寒傷人先入皮毛肺之外候肺主氣上通於鼻下連膀胱皮毛客邪肺先受害肺虛與邪相拒則病生焉肺實邪無所容其邪勿能為害病若中者始傳膀胱屬足太陽之經邪入其經相連於肺故右寸脈浮弦而洪令人毫毛畢直皮膚閉而為熱身疼頭痛氣逆喘嗽風傷者自汗惡風寒傷者無汗惡寒且太陽為州都之官不能自衛治之以藥藥不勝邪雖汗不解邪氣留連必奪穀味豈不虧於脾胃邪氣乘虛入胃屬足陽明之經主肌肉俠鼻絡於目故身熱目痛鼻乾不眠病自太陽而傳陽明或尤有惡寒者知邪尚在太陽傳過未盡尤宜汗解若不惡寒反欲嘔吐煩躁脈數急者其邪盡在陽明津液先竭胃實幹燥大便難宜以盪滌其邪邪去脈靜知不傳經而安矣設若盪滌未盡邪留於胃胃者倉廩之官倉廩既虛榮衛失養經絡已衰不能勝邪傳入於膽屬足少陽之經循耳絡於脅令人脅痛耳聾口苦咽乾往來寒熱而嘔邪毒在裡而不在外也依法治之如或不解膽者中正之官而無果決任邪留移於脾屬足太陽之經絡於咽喉令人咽乾腹滿時痛手足微冷或自利不渴脾虛受邪則為內寒溫助脾元實倉廩使正勝邪庶獲安矣或治不當而邪勝正又傳入腎屬足少陰之經其絡膀胱系舌本貫肝入肺其性惡燥故渴引飲邪自三陽而傳少陰已經汗下津液枯竭令人口燥舌乾而渴虛者宜溫甚者攻之腎者作強之官不能自持而傳於肝屬足厥陰之經絡舌本循陰器榮於筋謂之厥陰厥者盡也三陰三陽至此盡矣肝者將軍之官不能與邪相抗致使六經傳盡邪毒入深榮衛失調經絡已虧以致手足厥冷則筋急囊縮六經傳遍戰汗而解者或不戰不汗出而解者或六七日不解者又復再傳其病已危又有兩感傷寒者蓋緣表裡雙傳臟腑俱病為難治也一日太陽與少陰俱病則頭痛舌乾煩滿而渴二日陽明與太陰俱病則腹滿身熱不食言語三日少陽與厥陰俱病則耳聾囊縮水漿不入不知人者六日而危殆矣謂其三日六經俱病榮衛不行內外臟腑不相通於上下至於六日之氣皆絕故不治而死矣論曰人生天地之間借氣血以全真原故天無一歲不寒暑人無一日不憂苦故有天行瘟疫之病且傷寒冬令為殺厲之氣善調攝者嚴寒之時行住坐臥護身周密不犯寒毒或房勞之人辛苦之徒當陽閉藏而反擾動致使斯病而作治傷寒之法始自漢張仲景分六經之相傳定汗吐下之三法在表宜汗在裡宜下在上吐之半表半裡和解之當汗反下當下反汗變證百端不可盡述又云桂枝下咽陽盛則斃承氣入胃陰盛乃亡毫釐之差失之千里正所謂實實虛虛損不足益有餘如此死者醫殺之耳全在乎識經絡明表裡別虛實用藥則庶幾不差矣此則言其大略所有六經傳變之藥當以傷寒書中求之傷寒通治方桂枝湯傷寒中風病頭痛發熱汗出惡風者桂枝芍藥各二錢半甘草炙三錢上作一服水二盅生薑五片紅棗二枚煎一盅不拘時服麻黃湯傷寒病頭痛發熱身疼惡風無汗而喘者麻黃三錢桂枝二錢杏仁去皮尖甘草炙各一錢上作一服水二盅生薑三片煎至一盅不拘時服麻黃桂枝各半湯麻黃去根節桂枝芍藥各二錢半甘草炙二錢杏仁去皮尖十個上作一服水二盅生薑五片大棗二枚煎一盅不拘時服柴胡桂枝湯治傷寒六七日發熱微有惡寒表證未解者柴胡三錢芍藥二錢半桂枝去皮甘草炙黃芩各一錢半半夏一錢三分人參一錢上作一服水二盅生薑五片大棗二枚煎至一盅食遠服升麻葛根湯治大人小兒時氣瘟疫頭痛發熱及瘡疹已發未發皆可服升麻芍藥甘草各二錢半乾葛三錢上作一服水二盅生薑三片煎至一盅不拘時服柴胡升麻湯治時行瘟疫壯熱惡風頭痛體疼鼻塞咽乾咳嗽涕唾稠黏柴胡去苗乾葛荊芥去梗赤芍藥石膏各一錢半前胡去苗升麻桑白皮黃芩各一錢上作一服水二盅生薑三片豆豉二十粒煎至一盅不拘時服葛根解肌湯治傷寒頭疼發熱惡寒肢體拘急胸膈煩悶葛根三錢麻黃一錢肉桂甘草炙黃芩芍藥各一錢上作一服水二盅生薑三片紅棗一枚煎一盅不拘時服葛根蔥白湯治感風熱頭疼不止葛根芍藥知母各二錢川芎三錢上作一服水二盅生薑七片蔥白五根煎一盅不拘時服小柴胡湯治傷寒寒熱如瘧胸膈滿痛小便不利大便澀柴胡三錢人參黃芩各二錢半夏一錢半甘草一錢上作一服水二盅生薑三片紅棗二枚煎一盅不拘時服大柴胡湯治傷寒十餘日不解邪熱結在裡身熱煩躁語言譫妄大便不通繞臍刺痛柴胡二錢半大黃三錢枳實一錢赤芍藥黃芩半夏各二錢上作一服水二盅生薑五片紅棗一枚煎至一盅食遠服柴胡飲子柴胡去蘆人參去蘆黃芩當歸芍藥甘草各一錢半大黃二錢上作一服水二盅生薑三片煎至一盅不拘時服黃連解毒湯治傷寒雜病熱毒煩悶乾嘔口燥呻吟喘滿陽厥極深蓄熱於內傳為陰毒並皆治之黃連黃柏黃芩山梔各二錢半上作一服水一盅煎至一盅如腹滿嘔吐或欲作利者加半夏三枚生用厚朴二錢茯苓二錢生薑三片煎熱服名曰半夏黃連瀉心湯小青龍湯治傷寒表證不解心下有水氣乾嘔發熱咳嗽微喘又治肺經受寒咳嗽喘急半夏湯洗七錢乾薑炮細辛去葉麻黃去根節肉桂去皮芍藥各一錢半甘草炙一錢五味子五分上作一服水二盅煎至一盅不拘時服大青龍湯治傷寒頭痛發熱惡寒無汗躁煩六脈浮緊麻黃去節石膏各三錢杏仁去皮尖甘草炙桂皮各一錢大棗五個生薑一錢半上作一服水二盅煎至一盅不拘時服小承氣湯治傷寒潮熱譫語大便六七日不通有燥糞結滯此藥主之大黃五錢厚朴三錢枳實二錢上作一服水二盅煎至一盅食前服大承氣湯治陽明裡熱大便五六日不通日晡潮熱譫語煩躁發渴大黃厚朴薑製各三錢枳實芒硝各二錢上作一服水二盅生薑三片煎至一盅食前服三乙承氣湯治傷寒雜病內外所傷日數遠近腹滿咽乾煩渴譫妄心下按之硬痛小便赤澀大便結滯或濕熱內甚而為滑泄熱甚喘咳悶亂驚悸狂癲目疾口瘡舌腫喉痹癰瘍陽明胃熱發斑脈沉可下大黃厚朴枳實芒硝各二錢半甘草二錢上作一服水二盅生薑三片煎至一盅不拘時服調胃承氣湯治傷寒不惡寒但熱十餘日過經譫語當和胃氣大黃五錢甘草三錢芒硝一錢半上作一服水二盅煎至一盅食前服桃仁承氣湯治傷寒蓄血熱結膀胱其人如狂但小腹結血下者愈桃仁甘草各一錢芒硝二錢大黃四錢上作一服水二盅煎至一盅食前服甘草瀉心湯治傷寒醫反下之並自利心下痞硬乾嘔心煩不安甘草三錢炙乾薑三錢炮黃芩黃連人參半夏各一錢半上作一服水二盅生薑三片紅棗三個煎一盅不拘時服大黃黃連瀉心湯治傷寒大下後復發汗心下痞按之濡其脈關上浮者不可下宜此藥攻其痞大黃五錢黃連三錢黃芩二錢上作一服水二盅煎至一盅食遠服半夏瀉心湯治心下痞滿而不痛乾嘔者半夏湯洗七次二錢人參去蘆甘草炙乾薑炮黃芩各一錢半黃連一錢上作一服水二盅生薑五片紅棗二個煎一盅不拘時服附子瀉心湯治心下痞而後惡寒汗出者大黃黃連黃芩各二錢附子炮去皮臍切作四塊止用一塊上作一服水二盅煎至一盅不拘時服生薑瀉心湯治傷寒汗出後胃中不和心下痞硬噫氣臭脅下有水氣腹中雷鳴不利者生薑黃芩人參去蘆乾薑炮各二錢半夏黃連大棗三枚上作一服水二盅煎至一盅不拘時服白虎湯治傷寒脈浮滑者表裡有熱若汗下吐後七八日不解熱結在裡大渴舌上乾燥欲飲水者知母三錢石膏五錢甘草一錢粳米半合上作一服水二盅煎至一盅食遠服白虎加人參湯又名化斑湯治傷寒發斑口燥煩渴知母三錢石膏五錢人參二錢甘草一錢半上作一服水二盅粳米一百粒煎至一盅不拘時服五苓散治發汗後胃中干煩躁不得眠渴欲飲水脈浮小便不利者澤瀉三錢豬苓茯苓白朮各二錢官桂去皮一錢上作一服水二盅煎至一盅不拘時服豬苓湯治陽明病脈浮發熱渴欲飲水小便不利或下利咳而嘔心煩不眠者豬苓茯苓阿膠澤瀉滑石各二錢半上作一服水二盅煎至一盅食遠服四逆湯治傷寒大下汗後自利清穀身疼痛不渴四肢拘急手足厥冷乾嘔腹滿脈沉者甘草炙三錢乾薑三錢炮附子生用半個上作一服水二盅煎至一盅食遠服四逆散少陰病四逆其人或咳或悸小便不利腹中痛或泄利下重者甘草炙柴胡枳實芍藥各三錢上作一服水二盅煎至一盅食遠服咳者加五味子乾薑各一錢半下利悸者加官桂一錢半小便不利者加茯苓一錢半腹中痛者加炮附子一錢半泄利下重用韭白二十根同煎服通脈四逆湯治少陰病下利清穀裡寒外熱手足厥逆脈微欲絕身反不惡寒面赤或腹痛或乾嘔或咽痛或下利脈不出者甘草二錢乾薑三錢半附子一角生用上作一服水二盅煎至一盅食遠服面赤者加連須蔥白三根腹痛者去蔥加芍藥二錢嘔者加生薑二錢半咽痛者加桔梗二錢下利脈不出者去桔梗加人參二錢半當歸四逆湯治手足厥寒脈細欲絕者當歸桂枝芍藥細辛各二錢半通草甘草各一錢半上作一服水二盅紅棗一枚煎至一盅不拘時服真武湯治傷寒數日已後發熱腹痛頭目昏沉大便自利小便或利或澀或嘔或咳或已經汗不解仍復發熱心下忪悸頭目眩暈皆由渴後飲水停留中脘所致並皆治之白芍藥三錢半下利者去之加乾薑二錢半茯苓去皮二錢半小便利者去之附子炮一個切四分止用一分嘔者去之加生薑二錢半生薑三錢半白朮二錢半上作一服水二盅煎至一盅不拘時服咳者加五味子三錢半細辛乾薑各一錢二分半羌活附子散治吐利後咳逆胃寒羌活一錢半附子炮去皮臍二錢茴香炒乾薑炮各一錢半木香半錢上作一服水二盅鹽少許煎至一盅不拘時服咳逆灸法治男子婦人傷寒咳逆其法婦人屈乳頭向下盡處骨間是穴男子乳小以一指為率男左女右直間陷中動脈是穴艾炷如小豆大灸三壯陽毒升麻湯治陽毒赤斑狂言咽痛升麻犀角射干各二錢半黃芩二錢人參甘草炙各一錢上作一服水二盅煎至一盅不拘時服梔子豆豉湯治發汗吐下後虛煩不得眠及發顛倒心中懊惱此藥主之肥梔子四個香豉半兩上作一服水二盅先將梔子煎至八分入豉同煎至七分不拘時服梔子仁湯治發斑煩躁面赤咽痛潮熱梔子仁赤芍藥大青知母升麻杏仁各一錢黃芩一錢半石膏二錢半柴胡二錢甘草半錢上作一服水二盅生薑五片豆豉五十粒煎至一盅不拘時服枳實梔子湯治大病瘥後勞復者枳實三錢梔子一錢半豆豉上作一服清漿水二盅煎至一盅不拘時服如有宿食者加大黃三錢煎服梔子烏梅湯治傷寒瘥後不得眠梔子黃芩各二錢柴胡三錢甘草一錢烏梅三個去核上作一服水二盅生薑三片竹葉十四片豆豉三十粒煎至一盅不拘時服竹葉石膏湯傷寒解後虛羸少氣氣逆欲嘔而渴淡竹葉三十片石膏三錢麥門冬三錢半夏一錢人參甘草各一錢半上作一服水二盅生薑三片粳米一撮煎一盅不拘時服人參石膏湯治傷寒咳嗽不已心煩及風熱頭疼精神不利昏憒宜服人參去蘆半錢石膏一兩半夏湯泡梔子仁黃芩各一錢川芎白朮茯苓去皮知母各一錢半甘草炙二錢上作一服水二盅生薑三片煎至一盅不拘時服旋覆代赭湯治傷寒發汗吐下解後