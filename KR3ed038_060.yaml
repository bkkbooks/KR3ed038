body:
  text: 卷之六十口舌門附論夫口者足太陰之經脾之所主五味之所入也舌乃心之竅舌和則知五味矣蓋五味入口藏於脾胃為之運化津液以養五氣五氣者五臟之氣也節宣微爽五臟之氣偏勝由是諸疾生焉且咸則為寒酸則停滯澀則因燥淡則由虛熱而從苦從甘也口臭者乃腑臟臊腐之不同蘊積於胸膈之間而生熱沖發於口也口瘡者脾氣凝滯風熱加之而然醫療之法各隨其所因以治之口舌通治方杏仁散治心胃中客熱唇口乾燥或生瘡杏仁湯浸去皮尖及雙仁麩炒黃黃連去須麥門冬去心赤茯苓地骨皮黃芩山梔子仁薔薇根大黃銼炒各一兩犀角屑三分甘草炙赤半兩上㕮咀每服三錢水一中盞入淡竹葉十四片煎至六分去滓食後溫服牛黃丸治心脾壅熱口舌乾燥及煩渴牛黃三分細研黃連去須大黃銼炒各二兩麥門冬一兩半去心焙硃砂半兩細研水飛麝香少許山梔仁馬牙硝細研川芎黃芩甘草炙各一兩上為細末研勻煉蜜和丸如彈子大每服一丸食後竹葉煎湯化下栝蔞根散治風熱口中乾燥舌裂生瘡栝蔞根胡黃連黃芩各三分白殭蠶炒白蘚皮大黃銼炒各半兩牛黃研滑石研各一分上為細末研勻每服二錢不拘時竹葉湯調服甘露丸解壅毒退風熱治口舌乾燥寒水石二斤燒令赤攤於地上一宿出火毒馬牙硝三兩細研鉛霜細研龍腦細研甘草炙赤各三分上為細末研勻以糯米飯和丸如彈子大每服半丸食後用新汲水磨化服含化丸治上焦煩熱口舌乾燥心神不清頭目不利石膏半斤細研水飛過寒水石半斤研細白蜜半斤上以水四大盞煎取一大盞半綿濾過入蜜同煎令稠丸如雞頭實大常含一丸咽津含香丸治口臭去熱毒氣調和臟腑雞舌香川芎各一兩藿香甘松當歸桂花桂心白芷各半兩零陵香木香各三分肉豆蔻白檳榔各五枚丁香麝香研各一分上為細末研勻煉蜜和丸如芡實大常含化一丸咽津五香丸治口及身臭令香丁香白豆蔻零陵香青木香一作木香藿香白芷桂心各一兩香附子檳榔各二兩甘松當歸各半兩上為細末煉蜜和丸如大豆許每服一丸常含咽津日三夜一亦可常含咽之豆蔻丸治口臭肉豆蔻紅豆去皮白豆蔻去皮草豆蔻去皮赤茯苓去皮丁香人參甘草炙各半兩細辛去葉一分官桂去皮一兩上為細末煉蜜和丸如雞頭大每服一丸含化咽津治口臭方川芎白芷陳皮桂心各四兩棗肉八兩上為細末次納棗肉干則加煉蜜和丸如大豆許旦服一丸食前食後常含之或吞之七日大香丁香丸治口臭穢丁香三錢川芎二錢白芷半錢各不見火甘草一錢炙上為細末煉蜜和丸如彈子大綿裹一丸噙化咽津治心氣不足口臭益智去皮甘草少許上為細末時時干舐咽之更以沸湯調服立效生香膏治口氣熱臭上用干甜瓜子去殼研細蜜少許調成膏食後含化或傅齒上尤妙一方空心洗漱訖含化一丸如棗核大地骨皮丸治肺熱口臭口中如膠瓦干發渴小便多地骨皮黃耆桑白皮山梔子馬兜鈴各等分上為細末甘草膏和丸如芡實大每服一丸食後噙化升麻黃連丸治多食肉口臭不欲聞其穢惡升麻青皮各半兩黃連黃芩酒洗各二兩生薑檀香甘草生用各二錢上為細末水浸蒸餅為丸如彈子大每服一二丸不拘時細嚼白湯送下治口氣臭方上以雞舌香含之抱朴子云應劭漢官侍中年老口臭旁賜雞舌香含之日華子云雞舌香治口氣所以三省故事郎官日含雞舌香欲其奏事對答其氣芬芳也生地黃煎治脾熱唇焦枯無潤澤生地黃汁生天門冬汁各半升生麥門冬去心葳蕤各二兩黃耆升麻各一兩半細辛川芎白朮甘草生用各一兩上細銼綿裹酒浸一宿以豬脂二斤煎至藥令色焦綿濾去滓內鍋中後下地黃天門冬汁熬令稠瓷器盛每服半匙不拘時含嚥下治冬月唇乾拆血出方上用桃仁搗爛以豬脂調塗唇上效治緊唇面泡上以馬齒莧水煮洗之走馬散治口內疳瘡梔子去仁留殼填入下藥明礬柳葉火燒成灰各等分上為細末不拘多少吹入口中治口瘡詩曰口瘡有熱腫連喉百法醫來病不瘳搜取自然蘿蔔汁吐涎頻漱病難留龍膽湯治熱口苦名曰膽癉龍膽草黃連各四分人參天門冬知母黃芩各七分柴胡一錢山梔子麥門冬五味子甘草各五分上銼細每服五錢水一盞半煎七分不拘時服蘆薈散治口舌生瘡蘆薈青蒿研蟾酥羊蹄花各半兩白礬煅研麝香研牛黃研各半分干蝸牛研三枚瓜蒂二十枚丁香細辛去苗丹砂研各一分馬牙硝研三分龍膽研一錢上為細末研勻先以頭髮裹指於溫水內蘸揩之軟帛挹卻膿水取少許藥末摻瘡上或輕可即去蟾酥蘆薈看病輕重以意加減用之玄參散治口舌生瘡連齒齦爛痛玄參升麻獨活麥門冬去心黃芩黃柏大黃炒梔子仁前胡犀角屑甘草炙各三分上為末每服五錢水一盞煎五分不拘時溫服麝香丸治口舌生瘡赤爛麝香細研一分升麻黃芩杏仁去皮尖雙仁炒浮萍草零陵香寒水石黃連甘草生用各三分上為細末煉蜜和丸如彈子大每服一丸綿裹含化咽津硼砂丸治口臭口乾口舌瘡硼砂二兩片腦麝香各一錢馬牙硝風化四兩寒水石煅十兩上為細末用甘草膏和丸如麻子大不拘時含一丸咽津綠雲散治舌上生瘡銅綠鉛白霜各等分上同研極細每用少許摻舌上升麻煎治膀胱熱不已口舌生瘡咽喉腫升麻玄參射干各四兩大青黃柏各三兩薔薇根白皮四兩蜜七合上㕮咀水七升煮取一升五合去滓下蜜更煎一二沸細細含咽之黃柏丸治口舌生瘡腫痛黃柏研末一兩蟾酥黃丹各一分上為細末端午日午時用蒸餅和丸如綠豆大綿裹一丸夜後含有涎即吐之治口舌生瘡爛痛方上取蟾酥線惹日曝乾剪半寸含之有涎即吐出如牙疼即咬之立瘥治口舌生瘡方上取蝸牛去殼細研塗瘡上有涎即吐之三二次即可定齋濯足法治下虛上壅口舌生瘡上以白礬末湯化洗足即愈治飛絲入口令人口舌間生泡此最可畏上以紫蘇葉細嚼白湯嚥下即愈貼臍散治元臟氣虛浮陽上攻口舌生瘡吳茱萸醋炒乾薑炮各半兩木鱉子五枚去殼上為細末每用半錢用冷水調以紙靨貼臍甘露飲治口舌生瘡牙宣心熱枇杷葉石斛黃芩麥門冬去心生地黃甘草炙各等分上㕮咀每服五錢水二盞煎八分去滓不拘時溫服加味龍石散治口舌生瘡時時血出咽嗌腫塞疼痛妨悶寒水石煅四兩硃砂飛研二錢馬牙硝風化一錢龍腦二錢半鉛白霜硼砂各半錢甘草研末二錢上研為細少許摻患處吐津誤咽不妨吹喉散治三焦大熱口舌生瘡咽喉腫塞神思昏悶蒲黃一兩盆硝八兩青黛一兩半薄荷汁一升上入瓷罐內以慢火熬令乾研細每用一字或半錢摻於口內良久出涎吐之或喉中腫病以葦筒吹入藥半錢無不效一方無蒲黃升麻飲治口內生瘡齒齦肉爛升麻玄參黃連羚羊角鎊黃芩葛根大黃麥門冬去心羌活防風甘菊花各半兩人參知母甘草炙各一分上㕮咀每服三錢水一盞煎至七分去滓食後溫服一方無人參有牛蒡子蓬砂散治口瘡硼砂青黛龍腦石膏煅各等分上研極細每用少許臨臥敷口中紫金霜治大小兒積熱口內生瘡黃柏二指大一片以蜜塗慢火炙令紫色為度訶子一枚火燒過盒兒內蓋少時膩粉麝香各少許上為細末研勻每用少許摻舌上黃連散治口瘡絕妙黃連朴硝白礬各半兩薄荷一兩上為粗末用臘月黃牛膽將藥入膽內風頭掛兩月取下如有口瘡旋將藥研細入於口瘡上去其熱涎即愈蟾酥綿治口瘡蟾酥五皂角子大硼砂龍腦麝香各一皂子大上研極細以溫湯半盞化令勻入緋綿秤半錢蘸藥汁曬乾候藥汁盡將綿寸截每用一片貼於患處有涎即吐一日三五次易之取瘥冰柏丸治口瘡龍腦少許黃柏日乾硼砂研薄荷葉各等分上為細末研勻生蜜和丸如龍眼大每服一丸津液化下瘡甚者加腦子研治口瘡方上以沙糖細細含化綠雲散治口瘡臭氣瘀爛久而不瘥黃柏半兩青黛甘草各二錢上為細末研勻臨臥以一字安舌下咽津不妨天明瘥治口瘡方上以生半夏為細末醋調貼腳心中神效紅芍藥方心病口瘡紫桔紅蒼三錢四兩五服安康上件紫菀桔梗紅芍藥蒼朮各三錢為細末以羊肝四兩批開摻藥末在肝內麻纏定火內燒令熟空心食之白湯送下大效蜜柏法治口瘡久不愈者黃柏不以多少用生蜜塗其上炙黃色上為極細末乾摻口瘡上臨臥時忌醬醋鹽治舌上腫硬方百草霜鹽等分上研細以井花水調敷治舌上腫硬出血海螵蛸蒲黃各等分上研細以井花水調敷治口爛方上用巴豆一二粒帶皮搗與麵糊為膏貼在顱門上一夜便取之瘡瘥黃柏散治口糜黃柏蜜塗炙乾去火毒白殭蠶直者置新瓦上下以火爆斷絲去火毒上研極細少許摻瘡上及舌上吐涎玄參升麻湯治心脾壅熱舌上生瘡木舌舌腫或連頰兩項腫痛玄參升麻犀角赤芍藥桔梗管仲黃芩甘草各等分上㕮咀每服四錢水一盞半煎七分去滓不拘時服亂髮灰散治口吻生瘡及口旁惡瘡亂髮灰故絮灰黃連各一兩乾薑炮半兩上為細末研勻少許敷瘡上日三五次以瘥為度檳粉散治口吻邊生瘡浸淫不愈檳榔燒存性輕粉少許上為細末少許敷口瘡上立愈一方飯甑上汗調敷之烏金散治口吻瘡上取蜣螂三枚燒灰研細敷之治口吻瘡上用新炊飯了甑及熱以唇口向甑唇熨之二七下三兩上瘥止硫黃散治唇瘡及緊唇瘡久不瘥硫黃研白礬枯研丹砂研黃柏研末麝香研水銀各一分上同研至水銀無星以臘豬脂和如泥先拭唇令淨後以膏塗之日三五上瘥黃柏散治蠒唇黃柏一兩五倍子二錢甘草各少許上除黃柏外余藥同為細末水調勻敷於黃柏上火炙三五次將黃柏切成薄片臨睡貼之天明即愈治口唇常瘡爛黑腫疼痛不可忍上以鯉魚血磨墨相和塗之一方用膽汁磨黑塗之黃連散治唇吻惡瘡黃連一分乾薑半分炮上為細末每用少許敷瘡上不過三次愈一方有膩粉五福化毒丹治唇舌腫破生瘡煩渴玄參洗焙桔梗各二兩人參半兩茯苓一兩半馬牙硝風化青黛各一兩麝香一字甘草七錢半焙上為細末研勻煉蜜為丸如皂角子大以金銀箔各四十片為衣每服一二丸薄荷湯化下如口臭以生地黃汁化下食後服白燈散治緊唇上纏白布作大燈柱如指安斧燃熱令汗出拭取傅唇上日三二度橄欖散治緊唇燥裂生瘡上用橄欖不拘多少燒灰為細末以豬脂和塗患處一方用核中仁細研傅之治緊唇方上以皂莢末少許以水調塗之升麻飲治脾胃有熱風冷相乘唇腫生核疼痛升麻前胡犀角鎊薏苡仁甘草炙各半兩葛根龍膽草青竹皮各一分上㕮咀每服五錢水一盞半煎至八分去滓食後服獨活散治唇上生惡核腫由脾胃熱壅滯獨活升麻桑寄生犀角屑沉香連翹漢防己大黃炒各三分甘草半兩炙上銼碎每服三錢水一中盞煎至六分去滓不拘時溫服治唇生腫核方松脂半兩大黃白蘞赤小豆胡粉各一分上為細末以雞子清調塗唇上薏苡仁湯治風腫在脾唇口瞤動或結核或浮腫薏苡仁炒防己赤小豆炒甘草炙各等分上㕮咀每服四錢水一盞半生薑三片煎至八分去滓不拘時溫服牛黃散治重舌牛黃研人參大黃炒麝香研甘草炙各半兩丹砂研當歸切焙各一分白茯苓去皮三分上為細末每服半錢食後沸湯調下甚者加至一錢黃柏湯治舌腫及重舌黃柏甘草炙各一兩上㕮咀每服三錢水一盞煎至七分去滓食後溫服治重舌方皂角刺煅朴硝少許研上研勻先以手蘸水擦口內並舌上下將藥摻舌上下涎出自消治重舌喉痹方五靈脂一兩去沙石研末上用米醋一大碗煎逐旋噙漱口即安治重舌喉痹方皂角不蛀者四五挺去皮弦炙令乾荊芥穗少許上研細末以米醋調塗腫處又方以蛇蛻燒灰研極細少許傅之一方治小兒重舌燒蛇蛻為末唾津和塗舌上瘥薄荷蜜煎治舌上生白胎乾澀語言不真薄荷取自然汁白蜜各等分上以生薑片先蘸水揩洗竟用硃砂雄黃硼砂腦麝為末傅之良久未效更加玄明粉一方先以生薑蘸水揩洗用薄荷自然汁白蜜作煎服之馬牙硝丸治木舌熱腫漸大滿口宜含馬牙硝細研三分鉛白霜寒水石太陰玄精石麝香細研大黃炒各半兩白礬枯半分甘草一分炙上為細末研勻煉蜜和丸如小彈子大含一丸咽津治木舌方上以半夏醋煎灌漱吐出即瘥牛黃散治舌腫強牛黃研漢防己各三分犀角屑一分羚羊角屑人參桂心牛蒡子炒生地黃甘草炙各半兩上為細末研勻每服三錢水一中盞煎至六分不拘時連滓溫服玄參散治心脾壅熱木舌腫脹玄參升麻大黃犀角各七錢半甘草半兩上㕮咀每服五錢水一盞煎至五分去滓不拘時溫服飛礬散治木舌漸腫大滿口若不急治即塞殺人白礬飛百草霜各等分上研細末捻糟茄自然汁調若口噤挑灌之妙䗪蟲散治舌腫滿口言語不得䗪蟲五枚炙上研細末以水二盞煎十沸去滓熱含吐去以瘥為度治舌腫強方蛇蛻燒存性全蠍各等分上為細末每用少許摻敷之百草霜散治舌腫起如豬胞方忽然硬腫逡巡塞悶殺人上用釜下墨末以醋調厚敷舌上下脫去更敷須臾即消若先決去血汁更敷之尤佳凡此患人皆不識或錯治益困殺人甚急但看其舌下自有噤蟲形狀如螻蛄或如臥蠶子細看之有頭尾其頭少白燒鐵釘烙頭上使熱即自消一方釜下墨和鹽等分瀝清水塗腫處令遍表裡良久即愈一方用醋調尤妙一方用井花水調釜下墨鹽成膏敷舌上立愈縮舌膏治舌腫懸下尺許及傷寒熱毒攻心舌出數寸上用片腦成片頓於舌上三四次合就無事又方用蓖麻仁三四十粒乳缽研細取油塗紙上二幅炭火上燒紙一幅熏舌上未退又燒一幅取令病退未愈再合用之令愈為度如治牛舌出亦可一法染黃紙卷捶碎蓖麻子燒煙燻之其舌竟入巴豆方治傷寒後不能轉攝舌出不收者上用巴豆一枚去油取霜用紙捻卷之內入鼻中舌自收戎鹽丸治舌上患有數孔大如箸出血如湧泉此心臟病戎鹽黃芩一作葵子黃柏大黃各五兩人參桂心甘草各二兩上為細末煉蜜和丸如梧桐子大每服十丸以米飲送下日三服亦燒鐵烙之香參丸治心臟熱盛舌上出血人參生蒲黃麥門冬去心當歸切焙各半兩生地黃一兩焙甘草一分炙上為細末煉蜜和丸如小彈子大每服一丸溫水化下日三四服升麻湯治心臟有熱舌上出血如湧泉升麻小薊根茜根各一兩半艾葉去梗一握寒水石三兩研上㕮咀每服三錢匕水一盞煎至七分去滓入生地黃汁一合更煎一二沸溫服寸金散治心經煩熱血妄行舌上血出不止新蒲黃三錢匕新白麵三錢匕牛黃研龍腦研各半錢匕上研勻每服一錢食後生藕汁調服熟艾湯治心經蘊熱舌上血出及諸失血熟艾以糯米半合同炒松黃柏葉炙各半兩上㕮咀每服三錢匕水一盞煎七分去滓不拘時溫服紫霜丸治舌上出血竅如針孔紫金沙即露蜂房頂上實處是研一兩蘆薈研三錢貝母去心四錢上為細末煉蜜和丸如櫻桃大每服一丸水一小盞化開煎至五分溫服吐血衄血用溫酒化開服治舌上出血如簪孔方黃連半兩黃柏三兩梔子二十枚上銼碎以酒二升漬一宿煮三沸去滓頓服聖金散治舌上出血不止黃藥子一兩青黛一分上為細末每服一錢匕食後新汲水調下日二服黃柏散治心經熱極舌上血出黃柏二兩塗蜜以慢火炙焦研為末上每服二錢匕溫米飲調下槐花散治舌出血不止名曰舌衄槐花不以多少上曬乾研末傅舌上或火炒出火毒為末傅如舌腫以真蒲黃末乾摻之
