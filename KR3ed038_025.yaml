body:
  text: 卷之二十五眩暈門附論丹溪論曰眩暈分之為二皆由痰火為病以此分為二者眩雖屬痰火未嘗不由腎虛兼風邪所得蓋痰者本流動之物又因火動而助其愈盛火性炎上得風則愈熾風火兩動痰之愈作經云諸風掉眩皆屬肝木原病式云風火皆屬乎陽多為兼化陽主乎動而兩動相搏則為旋轉也若人患此頭旋目眩卒然噁心欲吐眼花視物不的如屋旋轉起則暈倒其病所苦何經所受而致此曰靜順清謐水之化也動亂撓擾火之用也腦者地氣之所生故藏陰於目為瞳子系腎水至陰所主二者喜靜謐而惡動擾靜謐則清明內持動擾則掉搖散亂故腦轉目眩此之謂也靈樞經云五臟六腑之精氣皆上注於目為睛也筋骨氣血之精與脈並繫於目上屬於腦出於項中故邪之中項者乘其身形之虛深則隨目系以入於腦入於腦則腦轉腦轉則目系急目系急則目眩也乃必腎不交風火兼化而致然也夫風者有內外之分風從外入者則兼化也由內之散者乃火之生風也醫者察審內傷外感之由脈浮自汗項強不仁為傷風脈緊無汗筋攣掣痛為感寒脈虛煩悶者為暑脈沉滯吐逆者為濕寸脈俱沉此為異耳至於七情內傷者使藏氣不平鬱而生涎結而為飲隨氣上攻令人頭暈眉稜骨痛目不可開其證婦人得之蓋婦人性多偏怒經曰天之氣曰風人之氣曰怒怒則致傷肝木木動生風令人頭目旋暈皆由此哉婦人本陰血王之因産難崩漏虧損過極使陽氣無依為眩暈也男子患此或因金瘡吐衄便利之損或酒醉行房勞傷精血腎氣不能歸元而諸氣逆上是為頭目眩暈也學者於此當分標本別其盛衰用藥施治如鼓應桴無不效矣眩暈通治方半夏白朮天麻湯治頭旋噁心煩悶氣喘短促心神顛倒兀兀欲吐目不敢開如在風雲中苦頭痛眩暈身重如山不得安臥並皆治之半夏一錢半白朮二錢天麻茯苓去皮橘皮蒼朮人參神麯炒麥蘖炒黃耆澤瀉以上各一錢乾薑草果各半錢上作一服水二盅生薑三片煎至一盅食遠服仙術芎散治風熱壅塞頭目昏眩消痰飲明耳目清神川芎連翹黃芩防風大黃藿香葉當歸芍藥桔梗以上各七分石膏滑石各一錢半蒼朮甘草各一錢薄荷葉縮砂仁荊芥以上各四分上作一服水二盅煎至一盅食後服芎術湯治冒雨中濕眩暈嘔逆頭重不食方見頭痛門羚羊角散治風邪乘於陽經上注頭目遂入於腦或痰水停聚胸膈上衝頭目一切眩暈並皆治之羚羊角鎊茯神去皮木各二錢枳殼麩炒甘草炙川芎以上各一錢半夏湯泡防己白芷以上各一錢半附子炮去皮臍半錢上作一服水二盅生薑三片煎至一盅不拘時服三五七散治陽虛風寒入腦頭痛目眩運轉如在舟車之上耳內蟬鳴風寒濕痹腳氣緩弱等疾並皆治之天雄炮去皮細辛洗去土各三兩山茱萸去核乾薑炮各五兩防風去蘆山藥炒各七兩上為細末每服二錢食前用溫酒調服小芎辛湯治風寒在腦頭痛眩暈欲倒嘔吐不定方見頭痛門川芎散治風眩頭暈川芎甘菊花人參茯神去皮木山藥以上各半兩山茱萸去核一兩上為細末每服二錢用溫酒調下不拘時服日三服人參前胡湯治風痰頭暈目眩人參去蘆一錢前胡南星湯泡半夏曲木香枳殼麩炒橘紅赤茯苓紫蘇葉甘草炙以上各一錢半上作一服水二盅生薑五片煎至一盅食後服川芎散治眩暈惡風自汗或身體不仁氣上衝腦戰搖如在舟車之上川芎白朮各三錢北細辛白茯苓粉草以上各一錢桂枝半錢上作一服水二盅生薑三片煎至一盅不拘時服有痰兼以青州白丸子服之加味二陳湯治痰暈或因冷食所傷嘔吐不止陳皮白茯苓半夏以上各三錢胡椒丁香各一錢甘草炙一錢半上作一服水二盅生薑三片烏梅一個煎一盅不拘時服芎術除眩湯治感濕感寒頭重眩暈方見濕門香橘飲治氣虛眩暈木香橘皮去白白朮半夏曲白茯苓縮砂以上各二錢丁香甘草炙各五分上作一服水二盅生薑五片煎至一盅食遠服川芎石膏湯治風熱上攻頭目眩痛咽乾煩渴方見風門蔓荊子散治風頭旋運悶起則欲倒蔓荊子甘菊花半夏湯泡羚羊角屑枳殼麩炒茯神去木川芎黃芩防風以上各三分麥門冬去心焙石膏各一兩地骨皮赤箭細辛甘草炙以上各半兩上㕮咀每服三錢水一中盞生薑半分煎至六分去滓不拘時溫服忌熱面飴糖羊肉漢防己散治上焦風痰攻注頭目旋運心神煩亂漢防己麥門冬去心焙前胡以上各一兩半夏湯泡旋覆花防風細辛甘草炙以上各半兩赤茯苓人參川芎羚羊角屑枳實麩炒荊芥以上各三分上㕮咀每服三錢水一中盞生薑半分煎至六分去滓不拘時溫服忌飴糖羊肉芎菊散治諸陽受風頭目旋運目視昏暗肝氣不清川芎甘菊花各一兩白殭蠶炒細辛去葉防風去叉羌活以上各三分旋覆花草決明蟬蛻洗以上各一錢天麻蜜蒙花荊芥穗甘草炙以上各半兩上為細末每服二錢水一盞煎七分食後溫服湯點亦可菊花丸治風頭旋目暈欲倒胸中痰逆兼治筋骨疼痛甘菊花天麻酒浸羌活赤茯苓去皮枸杞子防風去叉獨活天竺黃另研藁本去土川芎木香各等分上為細末煉蜜和搗三五百杵丸如梧桐子大每服五七十丸不拘時用荊芥湯送下療風邪氣未除發則心腹滿急頭旋眼運欲倒羚羊角屑黃芩各一兩杏仁去皮尖炒枳實炒川芎獨活防風白朮以上各二兩茯苓去木三兩生薑四兩上㕮咀以水九升煮取三升去滓分作三服日三次服之忌桃李雀肉並蒜大酢面等羚犀湯治暗風頭旋眼黑昏眩倦怠痰涎壅盛骨節疼痛羚羊角屑旋覆花紫菀去苗土石膏甘草炙以上各一兩細辛去葉半兩前胡三分犀角屑一分上㕮咀每服三錢水一盞生薑三片棗一枚煎至七分去滓食後溫服人參丸治風頭旋目眩痰逆噁心胸膈痞滯咳嗽痰涎喘滿嘔逆不欲飲食人參白朮旋覆花炒甘草炙以上各一兩麥門冬去心焙枳殼麩炒前胡以上各二兩木香半兩上為細末湯浸蒸餅和丸如梧桐子大每服五十丸食後溫生薑湯送下川芎散治風頭旋眼目昏痛眩暈倦怠心忪川芎前胡白殭蠶炒人參以上各一兩蔓荊子天麻酒浸焙防風去叉以上各半兩上為細末每服二錢食後溫酒調下白朮飲治風邪在胃頭旋不止復加嘔逆白朮厚朴去皮薑炙甘菊花各半兩防風去叉白芷人參以上各一兩上㕮咀每服五錢水一盞半生薑五片煎一盞食前溫服防風飲子療風痰氣發即頭旋嘔吐不食防風人參橘皮以上各二兩白朮茯神各三兩生薑四兩上銼碎以水六升煮取三升去滓分溫四服一日令盡忌醋桃李雀肉蒜面等物祛痰丸治風頭旋痰逆噁心胸膈不利南星生半夏生赤茯苓去皮陳皮去白乾薑炮各等分上為細末麵糊和丸如梧桐子大每服五十丸不拘時用溫米飲送下松花浸酒方治風頭旋腦皮腫痹上以松花並臺春三月取五六寸如鼠尾者不拘多少蒸細切一升用生絹囊貯以酒三升浸五日每日空心暖飲五合晚食前再服增損黑錫丹治陰陽不升降上熱下冷頭目眩暈病至危篤或暖上僭愈甚者黑錫丹頭二兩肉豆蔻附子炮去皮臍破故紙炒葫蘆巴官桂去皮茴香以上各一兩青皮炮川楝子陽起石木香沉香以上各半兩烏藥磁石火煅醋淬七次細研水飛各一分上為細末酒煮糊和丸如梧桐子大每服五七十丸濃煎人參茯苓生薑棗湯送下空心服一方無磁石羌活湯治風頭眩筋脈拘急痰涎壅滯肢節煩疼羌活前胡去苗石膏研碎白茯苓去皮川芎枳殼麩炒黃芩去黑心甘菊花防風細辛去葉甘草炙銼蔓荊子麻黃去根節煮掠去沫焙以上各一兩上㕮咀每服三錢水一盞生薑三片雞蘇三葉同煎至七分去滓不拘時服沉香磁石丸治上盛下虛頭目眩暈耳鳴耳聾沉香別碎蔓荊子青鹽別研甘菊花以上各半兩巴戟去心葫蘆巴山藥炒磁石火煅醋淬細研水飛川椒去目炒山茱萸去核陽起石火煅研附子炮去皮臍各一兩上為細末用酒煮米糊和丸如梧桐子大每服五十丸加至七十丸空心用鹽湯送下菊花散治一切風頭目昏眩面浮腫菊花旋覆花牛蒡子羌活獨活甘草炙各等分上㕮咀每服五錢水二盅生薑三片煎至一盅食遠服人參湯治風頭眩但覺地屋俱轉目閉不開人參白朮當歸酒洗麥門冬去心防風以上各一兩獨活去苗官桂去皮黃耆切焙芍藥以上各一兩半上㕮咀每服五錢水一盞半煎至一盞去滓食前溫服守中丸治風頭眩腦轉目系急忽然倒僕人參白朮甘菊花枸杞子山芋以上各二兩白茯苓去皮十兩麥門冬去心三兩生地黃二十斤絞取汁上為細末先用生地黃汁於銀器內入酥三兩白蜜三兩同煎逐旋掠取汁上金花令盡得五升許於銀器內拌炒前七味藥漸漸令盡候乾入蜜同搗數千杵丸如梧桐子大每服五十丸空心溫酒送下服百日後五臟充滿肌膚滑潤此藥須擇四季旺相日或甲子日修合亦名五芝地仙金髓丸瓜蒂神妙散治頭目昏眩偏正頭痛等疾瓜蒂焰硝雄黃道人頭即蒼耳川芎薄荷藜蘆以上各一分天竺黃一錢半如無以鬱金代之上為細末口含水鼻中搐一字神驗小三五七散治頭風目眩耳聾天雄三兩一方用附子山茱萸去核五兩薯蕷七兩上為細末每服五分不拘時溫酒調下如不見效稍加一分或煎薑棗湯調服亦可芎歸湯治去血過多頭重目昏眩暈不省舉頭欲倒惟脈獨弱預見崩疾大川芎大當歸去尾各三兩上㕮咀每服三錢水一盞半煎至八分去滓不拘時溫服治風頭眩心肺浮熱手足無力筋骨煩疼言語似澀一身動搖上以烏驢頭一枚掃洗如法蒸令極熟細切更於豉汁內煮著五味調點少酥食之效天南星丸治風虛痰頭目旋運肢節拘急天南星炮附子炮去皮臍白附子炮華陰細辛旋覆花半夏湯泡川芎以上各半兩天麻一兩上為細末麵糊和丸如梧桐子大每服三十丸加至五十丸不拘時用荊芥薄荷煎湯送下麝香天麻丸治風痰氣厥頭痛目眩旋運四腳倦怠精神不爽睡臥不寧麝香二錢研天麻酒浸防風川芎以上各一兩甘菊花三分南星一枚重一兩者先用白礬湯浸七次然後用水煮令軟切片焙乾上為細末煉蜜和丸如雞頭實大每服一丸不拘時細嚼荊芥湯送下大芎辛湯治氣虛痰飲腎虛諸厥頭痛及眩暈舉頭似屋宇旋轉如在舟中此乃風痰虛三證宜服此藥方見頭痛門鬱金散治頭痛眩暈鬱金滑石川芎各等分上為細末每服一二錢空心用虀汁調服此木鬱達之良法也若胸中有宿痰宜瓜蒂散吐之神芎散治風熱上攻頭目眩痛上壅鼻塞並牙關悶痛川芎鬱金荊芥薄荷紅豆各等分上為細末入盆硝研勻鼻內搐之力慢加藥愈風餅子治風眩運或先服吐藥次服此藥川芎白芷防風甘菊花細辛羌活天麻荊芥穗薄荷甘草炙以上各一兩川烏炮去皮臍半兩上為細末湯浸蒸餅和捏作餅子每服三餅食後細嚼用茶清或白湯送下玉液湯治七情所傷氣鬱生涎隨氣上逆頭目眩運心嘈驚悸眉稜骨痛半夏肥大者六錢湯泡七次切作片上作一服水一盅半生薑十片煎至八分去滓入沉香末少許不拘時溫服川芎散治風頭眩發則心腹滿急眼運欲倒川芎赤茯苓去皮枳殼麩炒各三分羚羊角屑獨活防風白朮黃芩杏仁湯浸去皮尖雙仁炒黃以上各半兩上㕮咀每服三錢水一中盞入生薑半分煎至六分去滓不拘時溫服天麻羌活丸治頭目風眩邪氣鼓作時或旋運天麻羌活白芷藁本去苗土川芎芍藥細辛麻黃以上各二兩牛黃別研麝香別研各一分上為細末煉蜜和丸如皂角子大每服一二丸不拘時研碎薄荷酒下
