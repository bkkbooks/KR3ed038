body:
  text: 卷之四十三宿食內傷門附論夫脾胃者水穀之海也水穀入口而胃以納之脾以克之脾胃氣旺則穀肉果菜俱能消化為糟粕矣經云飲食入胃遊溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸膀胱水精四布五經並行合於四時五臟陰陽揆度以為常也蓋脾土宜暖而不宜生冷若人之原稟脾胃怯弱氣血虛憊兼以不善調攝或恣其飲食或寒溫不適飢飽失宜愈傷脾氣凡百飲食入於胃中不能克消以致停蓄遂成宿滯變生諸疾東垣因以內傷論為證名也至若又謂榮氣穀氣元氣清氣運氣衛氣之六者斯皆胃氣之別名其實為一也且人身五臟皆稟於胃胃和則穀氣上升而穀氣者乃足少陽膽手少陽三焦元氣始發生長萬化之用者也胃傷則中氣不足中氣不足則不能滋養元氣元氣不充則臟腑真氣皆為不足而心火獨盛矣心火者陰火也起由下焦其繫於心心不自主相火代之相火者下焦心胞之火乃為元氣之賊也然火與元氣不兩立必一盛則一負矣而脾胃氣衰則下流於腎肝陰火得以乘其上位於是元氣受病繫於上焦心肺之氣蓋心主榮血肺主衛氣榮衛失守則諸病生焉夫人之真氣衰旺豈不由乎飲食之致然哉凡諸飲食所傷當各以消導之藥以克其所傷之物俾脾氣愈旺而五穀之精華上騰應乎天而為清氣也彼神氣強盛七神衛護生氣不乏增益大旺氣血周漩百病不能侵矣雖有大風苛毒豈能為害耶是以易水張先生當謂停滯不可恣用利藥下咽少頃其藥味施化標皮之力始開便覺寬快及致所傷之物已去稍過三兩時辰其藥品盡化性味大作而其停滯雖大不知脾胃反傷矣脾胃一傷則真元之氣敗壞致生諸虛百疾而夭人壽此醫之過歟而東垣論其內傷皆由喜怒勞役飲食飢飽致傷脾胃而然也劉河間又謂天真者為造化之元氣在人身得以執天機而行六氣分地紀而運五行是故人身也天地也一而二二而一者也若人調理適宜邪勿能傷而血脈壯盛精氣增益周身生化則一疾無矣或於憂愁思慮飢飽勞役大驚卒恐致真氣耗散血氣分離其五行六氣遂有愆膈則百病作矣故經曰飲食勞倦則傷脾形寒飲冷則傷肺也原夫宿食為病由臟氣虛弱寒在脾胃之間致穀食不能消化停積於中也且舊谷未消新谷又入脾氣已弱不復能克而新舊相積故經宿不消則令人腹脹氣急噫氣醋心食臭噁心時復憎寒壯熱或頭痛似瘧也且噫氣醋心者由上焦有停痰積飲胃中有宿冷食積脾氣不能磨克其食故腹脹而氣逆所以好噫氣吞酸氣息食臭也噁心者緣心下有停水積飲之故也而心主火脾主土土性剋水今脾虛不能克消水飲米飲不散上乘於心復遇冷氣所加致令火氣不宣則心中淡淡然欲吐也其脈右寸浮而大按之反澀尺脈亦微而澀假若脾胃有伏熱亦因食積不消者身則發熱狀似傷寒惟身不痛為異也大抵宿食所傷則皆惡寒然當分上中下三脘治之積物之停於中下脘者重則依仲景法大小承氣湯備急丹類用之輕則以東垣枳朮等丸治之在上脘而食物其氣反壅塞於上其脈氣口緊盛於人迎兩三倍者必以吐之經云上部有脈下部無脈其人當吐不吐者死宜以瓜蒂散吐去其物若去不盡以消導藥磨之若物已去而脾胃元氣或被傷者以東垣內傷所論補益法中益氣等湯是有如先食熱物而不傷繼用寒物因後寒食致前食亦不消化而傷者當詢問其寒食熱食孰多孰少斟酌以藥如其寒物一分熱物二分則當以寒藥二分熱藥一分相合投之或先飲酒而後食寒冷及傷熱物冰水等物者當詢其次序多寡所傷量其寒熱之劑分散可也職於醫者宜臨證察脈看人虛實老幼以施治療庶不苟且切不可便用辛燥峻利等藥服之求愈而反為害也則當慎之宿食內傷通治方香蘇散治宿食留飲積聚中脘噫臭腐氣心腹疼痛或臟腑飧泄並皆治之香附子炒去毛三錢紫蘇去根蒼朮米泔水浸切炒陳皮以上各二錢甘草二錢半上作一服水二盅生薑五片蔥白三根煎至一盅不拘時服如頭痛加川芎香白芷縮砂香附湯治噫宿腐氣心膨䐜滿或時冷疼香附炒去毛十兩烏藥五兩縮砂去殼粉草炒各二兩上為細末每服二錢用紫蘇三葉鹽少許煎湯調下不拘時服大便祕用橘皮湯調下穀神丸消食健脾益氣進美飲食人參縮砂神麯炒香附子炒去毛青皮陳皮麥蘖炒枳殼去穰麩炒三稜煨莪朮煨各等分上為細末粳米糊為丸如梧桐子大每服五十丸空心用米飲送下鹽湯下亦可三稜煎丸治膨滿消食積氣塊及傷食夾臍痛甚方見積聚門紅丸子磨化宿食止腹痛京三稜煨莪朮煨青皮去白陳皮去白以上各五兩胡椒乾薑炮各三兩上為細末米醋煮米粉糊為丸如梧桐子大礬紅為衣每服五十丸淡生薑湯送下或二陳湯下不拘時服黑丸子治中脘有宿食吞酸噁心口吐清水噫宿腐氣或心腹疼痛及中虛積聚飧泄赤白痢下並皆治之烏梅肉七個百草霜三錢巴豆去殼並油二枚杏仁去皮尖另研三七枚半夏湯泡七次九枚縮砂三七枚上件為細末和勻薄糊為丸如黍米大每服十五丸加至二十丸熟水送下薑湯亦得更看虛實增減丸數或因食生冷魚膾腥腐用治中湯送下亦可如意丸治虛中積冷氣弱有傷不能傳化心下堅痞兩脅脹滿心腹疼痛噫宿腐氣及治霍亂吐瀉米穀不化久痢赤白膿血相雜久病黃色羸瘦及腹中一切食症之疾枳殼去穰麩炒檳榔橘紅京三稜半夏湯泡乾薑炮黃連去須莪朮以上各二兩巴豆三七枚連殼上件除巴豆外銼如豆大用好醋煮乾去巴豆余藥焙乾為末薄糊為丸如緑豆大每服十丸加至十五丸用茶清薑湯任下食後臨臥服孕婦不可服阿魏丸治脾胃怯弱食肉食麵或食生果停滯中焦不能克化致令脹滿肚腹疼痛嘔吐不食或利或祕阿魏酒浸化旋入官桂不見火莪朮炮蘿蔔子炒麥蘖炒神麯炒青皮去白乾薑炮白朮以上各半兩百草霜三錢巴豆去殼油三七粒上件為細末和勻薄糊為丸如緑豆大每服二十丸用薑湯送下面傷用麵湯送下傷生果用麝香湯送下丁香脾積丸治食積心腹膨脹不得克化丁香木香不見火巴豆去殼高良薑米醋煮各半兩蓬莪朮三兩京三稜二兩青皮一兩皂角三大匙燒存性上入百草霜三匙同碾為末麵糊為丸如麻子大每服十丸至二十丸止脾積氣陳皮湯下口吐酸水淡薑湯下嘔吐藿香甘草湯下小腸氣炒茴香酒下婦人血氣劇痛淡醋湯送下感應丸治男子婦人小兒停積宿食冷物不能克化有傷脾胃或泄瀉臭如抱壞雞子或下痢膿血並皆治之杏仁湯泡去皮尖肥者二百四十枚百草霜用鄉村人家鍋底上者佳另研細二兩乾薑炮一兩巴豆七十粒去皮心膜油研細如粉肉豆蔻二十個煨木香二兩半丁香一兩半上除巴豆百草霜杏仁三味外餘四味杵為細末同研勻用蠟匱先將蠟六兩熔化作汁以重綿濾滓更以好酒一升於銀石器內煮蠟熔滾數沸傾出候酒冷其蠟自浮於上取蠟稱用凡春夏修合清油一兩秋冬用清油一兩半於冷銚內熬令香熟次下酒煮蠟四兩同化作汁就鍋內乘熱拌和前項藥未成劑分作小錠子以油單紙裹衣旋丸服餌每服三十丸空心生薑湯送下五百丸治宿食留飲積聚中脘噎臭吞酸心腹刺痛丁香砂仁胡椒烏梅取肉巴豆去皮心膜另研上件各一百個研為細末和勻蒸餅糊為丸如緑豆大每服五七丸食前用白湯送下丁香爛飯丸治食傷太陰及治卒心胃痛丁香廣朮炮京三稜炮木香以上各一錢甘松去土益智仁砂仁以上各三錢香附子半兩丁香皮甘草炙各二錢上為細末湯浸蒸餅為丸如緑豆大每服三十丸不拘時用白湯送下或細嚼下亦可木香枳朮丸治強飲食所傷心腹滿悶不快木香枳實麩炒各一兩白朮二兩上為細末荷葉煨飯為丸如梧桐子大每服五十丸食遠白湯送下麴櫱枳朮丸治強飲食心腹滿悶不快神麯炒麥蘖炒枳實以上各一兩白朮二兩上為細末荷葉煨飯為丸如梧桐子大每服五十丸食遠白湯送下三黃枳朮丸治傷肉食濕面辛辣味厚之物填塞悶亂不快黃芩二兩黃連酒洗大黃煨神麯炒白朮橘皮以上各一兩枳實麩炒半兩上為細末湯浸蒸餅為丸如梧桐子大每服五十丸食遠白湯送下葛花解酲湯治飲酒太過嘔吐痰逆心神悶亂胸膈痞塞手足戰搖飲食減少小便不利葛花白豆蔻砂仁以上各五錢乾生薑青皮白朮以上各三錢澤瀉神麯炒各二錢人參白茯苓豬苓橘紅以上各一錢半木香半錢上為細末每服三錢食遠白湯調下得微汗酒病自去矣大枳殼丸治一切酒食傷胸膈痞悶疼痛飲食不消兩脅刺痛嘔逆噁心並皆治之方見嘔吐門集香丸治傷生冷宿食不消丁皮茴香益智京三稜青皮莪朮陳皮川楝子以上各一兩巴豆半兩和皮米炒作黑色去米不用上為細末醋糊為丸如緑豆大每服五七十丸食前用生薑湯送下紫沉消積丸治久積伏滯胸膈膨脹心腹刺痛飲食不化及治婦人血氣疼痛沉香阿魏醋化研巴豆取霜各一兩硇砂四兩研細以上四味同研用蜜一升酒二盞共熬成膏以瓷盒貯之和藥丹砂研二兩硫黃研青皮去白良薑檳榔官桂去皮人參木香胡椒以上各四兩丁香乾薑炮各二兩上將前四味蜜酒熬成膏余藥搗為細末以膏和搗千百杵丸如緑豆大每服五七丸不拘時溫橘皮湯送下如心痛溫酒下婦人血氣當歸湯下一方有沒藥一兩法制生薑散治飲酒過多或生冷停滯嘔逆噁心不欲飲食生薑十兩切作片子用青鹽摻過再白麵拌淨焙乾用之官桂去皮青皮去白陳皮半夏薑製白朮以上各一兩蓽澄茄丁香木香以上各二兩半白豆蔻白茯苓砂仁以上各一兩半葛根甘草炙各半兩上為細末每服二錢不拘時溫酒調下仙方內消丸治酒食過傷脾胃等疾方見積聚門木香丸治積聚氣脾胃虛冷宿食不消心腹氣滯脹滿疼痛木香桂心白朮赤茯苓人參以上各三分乾薑炮桔梗去蘆吳茱萸湯泡焙當歸以上各半兩大黃炒神麯炒訶黎勒煨去核陳皮去白麥蘖炒檳榔以上各一兩上為細末煉蜜和搗三五百杵為丸如梧桐子大每服三十丸食前溫酒送下小分氣丸治久積氣塊宿食不消胸膈痞悶痰逆噁心不思飲食臍腹刺痛醋心噎塞木香雄黃研各一兩青皮去白炒陳皮去白乾薑炮楝實炒檳榔以上各半兩巴豆去皮心膜研出油莪朮醋浸半夏湯泡大黃煨各一分上為細末醋煮麵糊和丸如緑豆大每服五丸加至七丸食後生薑湯送下益智散治脾胃虛冷積聚沉結宿食不消益智去皮炒青皮去白陳皮去白京三稜煨白茯苓去皮莪朮煨以上各一兩厚朴去皮生薑汁塗炙一兩一分木香一兩人參甘草炙各半兩上為細末每服一錢入鹽少許用沸湯不拘時點服快活丸治宿食不消致傷脾胃大黃生用檳榔陳皮以上各二兩青皮二兩半三稜醋煮蘿蔔子炒香附炒去毛莪朮以上各四兩黑牽牛半斤麥蘖半斤用巴豆三錢同炒黃色去巴豆上為細末滴水為丸如梧桐子大每服七丸食前用淡生薑湯送下破積導飲丸治宿食不消心腹痞悶及治積塊堅硬牽牛頭末六錢木香檳榔青皮去白陳皮去白枳殼炒枳實炒京三稜煨莪煨術半夏湯洗茯苓去皮乾生薑神麯炒麥蘖炒澤瀉甘草炙以上各半兩上為細末生薑汁煮糊和丸如梧桐子大每服三十丸食前用溫生薑湯送下
