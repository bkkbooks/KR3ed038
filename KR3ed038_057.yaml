用雄黑豆四十九粒米泔一碗銀石器內同煮黑豆爛泔干為度取肝細嚼溫酒下又將豆食盡空心日午夜臥服服椒方治肝腎虛風上攻眼目生黑花頭目不利能通神延年用川椒一斤揀淨去目及合口者於銚內炒令透於地上鋪淨紙二重用新盆合定周回用黃土培之半日去毒出汗然後取之曝乾為度只取椒於瓷合子內收每日空心新汲水下十粒川芎散治目暈昏澀視物不明川芎地骨皮荊芥穗何首烏去黑皮菊花旋覆花草決明石決明刷淨甘草炙各一兩青葙子蟬蛻去土木賊各半兩白芷一分上為細末每服一錢匕食後米泔水調下羊肝夾子退眼暈並翳膜遮睛小兒疳眼雀目並治之蟬蛻黃連各半兩蛇蛻一條燒赤菊花甘草各一分上為細末每用羊肝一具竹刀子批開摻藥拌勻用白麵裹作夾子每日食後吞一服光明散治眼睛上生暈不問久新上用鯉魚一頭長一尺二寸者取膽用刺破滴汁在銅箸上陰乾用竹刀子刮下為細末每用少許點眼妙決明子丸治風熱上衝眼目或因外受風邪疼痛視物不明決明子炒細辛去苗青葙子蒺藜炒去角茺蔚子川芎獨活羚羊角鎊升麻防風去叉各半兩玄參枸杞子黃連去須各三兩菊花一兩上為細末煉蜜和丸如梧桐子大每服二十丸加至三十丸淡竹葉煎湯送下還睛丸治風熱上攻眼目赤腫怕日羞明多淚隱澀瘀肉侵睛或痛漸生翳膜白朮生用防風去蘆菟絲子酒浸另研白蒺藜炒去尖羌活去蘆蟬蛻去頭足翅青葙子去土密蒙花木賊各等分上為細末煉蜜為丸如彈子大每服一丸空心細嚼白湯送下日三服七寶散治風眼除瘀熱當歸芍藥黃連銅緑各二錢細研杏仁七個去皮白礬甘草各一錢上㕮咀以水同放瓷盞內於鍋中頓煎至八分去滓澄清臨臥洗之蟬花散治肝經蘊熱風毒之氣內傳上攻眼目翳膜遮睛赤腫疼痛昏暗視物不明隱澀難開多生眵淚內外障眼蟬蛻洗淨去土菊花去梗穀精草洗去土白蒺藜炒防風不見火羌活密蒙花去枝草決明炒黃芩去土川芎不見火蔓荊子去白皮山梔子去皮荊芥穗木賊草甘草炙各等分上為細末每服二錢用茶清調服或荊芥湯入茶少許調服亦可食後臨臥皆可服開明散治風毒氣眼朦澀障膜甘菊花去萼二兩防風羌活蒺藜炒去刺川芎天麻茯苓蒼朮童便浸一宿焙蟬蛻以上各半兩荊芥茺蔚子華陰細辛甘草炙各一分上為細末每服二錢食後鹽湯調服金絲膏治風熱上攻目赤腫痛黃連去須二兩大黃黃柏去粗皮龍膽草山梔仁當歸以上各一兩青竹葉一百片切大棗二十個去核燈心切硼砂明者乳香研各一分上用水五升不拘冬夏浸一時辰取出於銀石器內慢火熬不令大沸候泣盡汁下火放冷用絹絞取汁於無風土處澄一時辰去滓於銀器內用慢火熬令減半入白蜜半斤同攪候有蜜者以手挑起有絲即止放冷再以夾絹袋子濾過以瓷盒盛之每取一茶腳許研龍腦一字極細入膏同研一二千遍令勻取少許點之琥珀煎治風毒沖目腫赤癢痛乳香別研二錢蕤仁別研半兩滑石別研鉛丹別研各二兩黃連別研青皮各一兩黃芩去黑心銼白蜜各四兩大鱉子十枚去殼槐枝柳枝並用新青者各一十枝每枝長一寸半上將槐柳枝以黃芩滑石以水三碗同煎至兩碗去滓下乳香蕤仁鉛丹木鱉子與蜜同熬如琥珀色卻下黃連末再煎至一碗半用熟絹濾去滓入瓷器內密封系垂在井底一宿出火毒每用銅箸點以目澀為度熬點皆不得犯鐵器羌活散治風氣攻眼昏澀多淚羌活川芎天麻旋覆花藁本防風蟬蛻洗甘菊花細辛杏仁去皮各一兩甘草炙半兩上為細末每服二錢新水一盞半煎食後服草龍膽散治上焦風熱氣毒攻衝眼目暴赤磣痛羞明多眵迎風有淚翳膜攀睛胬肉隱痛並皆治之龍膽草去蘆木賊去節菊花去梗草決明微炒甘草炙各二兩香附子炒去毛川芎不見火各四兩上為細末每服二錢用麥門冬熟水入砂糖少許同煎食後調服或米泔調服亦可地黃散治混睛或白睛先赤而後癢痛迎風有淚隱澀難開生地黃一兩芍藥半兩土當歸甘草各半錢上銼碎每服三錢水一盞半煎至七分食後溫服撥雲散治男子婦人風毒上攻眼目昏暗翳膜遮障羞明熱淚隱澀難開眶癢赤痛瞼眥紅爛瘀肉侵睛羌活防風柴胡甘草炒各一兩上為細末每服二錢水一盞半煎至七分食後薄荷茶清調服菊花苗湯調下亦可忌醃藏魚鮓鹽醬濕面炙爆發風等毒物滌風散治風毒攻眼赤腫癢痛黃連去須蔓荊子各半兩五倍子三錢上銼細分三次新水煎濾清汁以手沃洗效截惡眼立效方明礬好者如黑豆大者一塊山梔子仁一個剝去皮上咬碎用無糨絹帛包定以井水小半盞浸之候水浸透水黃洗眼二三十次一宿次早無事立效攻毒散治風毒上攻兩眼暴赤隱澀難開上用乾薑不以多少洗淨㕮咀每用二錢以薄綿緊裹沸湯泡乘熱洗如冷再溫更洗春冰散治風眼除瘀熱白礬飛過青鹽各三錢黃丹水飛二錢雄黃少許片腦半錢盆硝鍋內燒取白一兩上研極細點眼通頂散治風毒攻眼並夾腦風細辛去葉土香白芷藿香葉去土川芎以上各七錢躑躅花穀精草各半兩上為細末每用先含新汲水一口然後挑少許搐在鼻內以手揉兩太陽穴青葙子丸治眼風赤昏暗淚出青葙子決明子黃連去須人參去蘆苦參銼地骨皮白蘚皮川大黃銼炒升麻車前子梔子仁枳殼去穰麩炒秦艽去苗玄參茯神黃芩以上各一兩防風去蘆三兩龍膽草去蘆三分上為細末煉蜜和搗二三百杵丸如梧桐子大每服二十丸食後溫漿水送下垂柳枝煎治風赤眼垂柳枝桃枝枸杞枝桑枝各長二寸各七莖馬牙硝一分細研竹葉四十九片黃連去須決明子各半兩龍腦細研半錢上除硝龍腦外以漿水二大盞於銅器中煎至一半去滓重以綿濾令淨入硝及龍腦攪令勻更煎令稠每以銅箸頭取如小豆許點日三五度又方治一切風赤眼眼皮上瘙癢赤爛久治不效此藥之功不可盡述輕粉十字白蜜白蠟各三銖臘月豬脂半兩上先熔豬脂成油漸入白蜜次下白蠟候三味總化成油入輕粉攪令勻非時搽眼赤皮上銅青湯治風眩赤眼銅青黑豆大一塊防風一寸許杏仁二個去尖不去皮上各細切於盞中新汲水浸湯瓶上頓令極熱乘熱洗之如痛者加當歸數片治風赤澀痛上取訶黎勒核入白蜜研注目中神良一方以鷹嘴者一枚滴蜜於石磨點枸杞方治風熱生膚赤白眼及去眼中風癢痛上搗枸杞子汁點眼立驗亦治暴赤眼風熱赤膜一方用葉搗汁含一滿口待稍溫就咽之拜堂散治風赤眼上以五倍子研為細末貼破赤處熏洗方治風眼爛弦臨洗加輕粉少許凡時氣赤眼自外而入非臟腑病者不必服藥熏洗足矣黃連去毛川芎去蘆荊芥穗各一錢半蔓荊子一錢去蒂膜五倍子三錢剪碎去垢銚內火炒待赤色鋪紙地上用蓋片時出火氣上銼碎作三服每服用生絹一小方洗淨入藥絹內以線扎定水煎仍以紙糊瓶口勿令氣出卻於無風處就瓶口紙上破以一小孔熏之候氣稍平揭去瓶紙於瓶口熏之氣溫傾出用淨絹蘸洗如此三次為驗仍避風毒嗅鼻藥治目風熱腫赤難開雄黃水透辰砂各二錢半細辛半兩片腦麝香各少許上為細末口含水少許嗅鼻中蟬殼散治眼目風腫及生翳膜等疾蟬殼地骨皮黃連宣州者去須牡丹皮去心白朮蒼朮米泔浸切焙菊花各一兩龍膽草半兩甜瓜子半升上為細末每服一錢半荊芥煎湯調下食後臨臥各一服大治時疾後餘毒上攻眼目甚效忌熱麵炒豆醋醬等吹鼻散治風眼腫枸杞白皮雞子白皮上等分研令極細每日三次吹鼻內涼膽丸治眼狀青色大小眥頭澀痛頻頻下淚口苦少飲食黃連洗不見火黃芩荊芥龍膽草各半兩蘆薈防風各一兩黃柏去粗皮地膚子各一分上為細末煉蜜和丸如梧桐子大每服二十丸食後薄荷湯送下羌活散治目風冷淚久不瘥羌活去蘆二兩木香官桂去粗皮胡黃連山芋升麻芍藥焙各一兩牛膝酒浸炙焙山茱萸白附子炮各三分上銼碎每服三錢水一盞煎至八分去滓食後溫服日三菊花散治目風淚出蒼朮四兩肥者用銀石器入河水同皂莢一寸煮一日去皂莢取術以銅刀去黑皮曝乾取三兩菊花木賊新者草決明洗曝乾荊芥穗旋覆花甘草炙各一兩蟬蛻洗焙三分蛇蛻洗炙一分上為細末用不津器盛每服一錢臘茶半錢同點空心臨臥時服蟬蛻餅子治目風冷淚去翳暈蟬蛻洗焙木賊新者甘菊花各一兩荊芥穗川芎各二兩蒼朮米泔浸焙三兩甘草炙半兩上為細末煉蜜和丸捏作餅如錢大每服一餅食後細嚼臘茶送下日三川芎丸治頭風冷淚川芎細辛白朮甘菊花白芷各一分上為細末蠟丸如黍米大夜臥內一丸目中一時辰換一丸荀牧仲嘗謂豫曰有人視一物作兩翳者作肝氣有餘故見一為二教服補肝氣藥皆不驗此何疾也豫曰孫真人云目之繫上屬於腦後出於項中邪中於頸因逢身之虛其入沉則隨目系入於腦轉則目系急急則目眩以轉邪中其睛所中者不相比則睛散睛散則歧故見一物為兩物也後令服驅風入腦藥則愈羌活散治心肝臟風熱攻眼淚出羌活去蘆黃耆炙各一兩川芎銼半兩白蒺藜三兩去角甘草一兩半生半炙上為細末每服二錢荊芥湯調服真珠散治肝虛目風淚出真珠研丹砂研各三分乾薑研一分貝齒五枚以灰火煅為末上研極細令勻以熱絹帛羅二遍每仰臥點少許傅眼中閣眼少時乳汁煎治風淚澀癢人乳一升黃連去須研末三分蕤仁研爛一兩乾薑炮研末一分上除乳外再同研極細以乳漬一宿明旦內銅器中微火煎取三合綿濾去滓每以黍米大點眥中勿當風點洗眼方治冷淚久而眼昏開元銅錢一百文背上有月者更妙甘草去皮揀三錢青鹽一兩半上於白瓷器內用無根水一大碗浸七日每著一盞洗無力換洗到十日約添甘草青鹽每日洗三次忌食五辛驢馬雞魚葷酒薑液膏治眼風癢冷淚爛弦有蟲上用生薑母一塊用銀箸插入即拔出點眼眥頭效食鹽方治目中淚出不得開刺痛及治一切眼疾上以食鹽如小豆大內目中習習去鹽以冷水數洗日瘥一方用鹽水洗眼亦良一方研為末以銅箸取如麻子大內眥頭日三度連翹飲子治目中溜火惡日與火隱澀小角緊久視昏花迎風有淚連翹當歸紅葵花蔓荊子人參甘草生用各三分柴胡二分升麻一錢黃芩酒製黃耆防風羌活各半錢生地黃三分上銼碎每服五錢水二盞煎至一盞去滓食後稍熱服吹雲膏治視物睛困無力隱澀難開睡覺多眵目中淚出及迎風寒泣羞明怕日常欲閉目喜在暗室塞其戶牖翳膜遮睛此藥多點神效黃連三錢蕤仁升麻各三分荊芥穗一錢浸泡濃汁青皮連翹防風各四分生地黃一錢半細辛一分柴胡五分當歸身生甘草各六分上銼如麻豆大除連翹外用淨水二碗先熬余藥去半碗入連翹同熬至一大盞去滓入銀盞內以文武火熬至水滴成珠不散入熱蜜少許熬勻點之滴金膏治眼迎風冷淚不止上用烏雞膽汁臨臥點眼中治目中熱淚上用烏賊魚骨為極細末點目中摩風骨治風牽眼目歪偏外障木香當歸白芷黑附子防風細辛藁本骨碎補以上各一兩烏頭芍藥肉桂以上各一兩半豬脂半斤牛酥鵝脂各四兩上為細末以麻油半斤浸一日一夜以文武火煎如膏為度塗摩之槐子丸治肝虛風邪所攻致目偏視槐子仁二兩酸棗仁微炒覆盆子柏子仁車前子蔓荊子茺蔚子牛蒡子微炒蒺藜子微炒一兩上為細末煉蜜和丸如梧桐子大每服三十丸空心溫白湯送下晚食前再服之羚羊角湯治風牽眼偏斜外障羚羊角鎊防風去叉五味子赤茯苓去黑皮人參以上各一兩黃耆銼茺蔚子知母焙各一兩半上㕮咀每服三錢水一盞煎至六分去滓食後臨臥服抵聖散治目偏風牽疼痛荊芥穗二兩川芎羌活去蘆楮實麩炒木賊各一兩甘草炙半兩上為細末每服二錢食後茶清調服前胡犀角湯治傷寒兩目昏暗或生浮翳前胡去蘆犀牛屑蔓荊子青葙子防風去叉梔子仁麥門冬去心生地黃焙菊花羌活去蘆決明子微炒車前子微炒細辛甘草炙各一兩黃耆一兩半上銼碎每服五錢水一盞半煎至八分去滓食後溫服茺蔚子丸治時氣後眼暗及有翳膜茺蔚子澤瀉各一兩半枸杞子青葙子枳殼去穰麩炒生地黃焙各一兩石決明麥門冬去心焙細辛去苗葉車前子各二兩黃連去須三兩上為細末煉蜜和丸如梧桐子大每服三十丸食後用漿水送下瀉肝散治天行後赤眼外障知母黃芩桔梗各一兩半茺蔚子大黃玄參羌活細辛各一兩上銼碎每服五錢水一盞煎至五分去滓食後溫服大黃丸治白睛腫脹痛不可忍大黃銼炒蔓荊子去皮甘菊花土瓜根防風去叉陳橘皮去白炒青皮去粗皮黃連去須前胡去蘆丹參吳藍葳蕤各一兩決明子微炒冬瓜子青葙子地膚子車前子各半兩上為細末煉蜜和丸如梧桐子大每服三十丸食前用溫酒送下日再服桑白皮散治肺氣壅塞毒熱上攻眼目白睛腫脹日夜疼痛心胸煩悶桑白皮玄參川升麻旋覆花去枝梗赤芍藥杏仁甘菊花去枝梗甜葶藶炒防風去蘆黃芩枳殼去穰麩炒甘草炙各一兩上㕮咀每服四錢水一盞半生薑三片煎至八分去滓食後溫服洗眼青皮湯治眼白睛腫起赤磣痛癢青皮去粗皮桑根白皮葳蕤各一兩川大黃玄參梔子仁青鹽湯澄下各半兩竹葉一握上㕮咀以水二大盞煎至一盞半入鹽濾去滓微熱淋洗冷即再暖洗之玄參丸治肺臟積熱白睛腫脹遮蓋瞳仁開張不得赤澀疼玄參川升麻漢防己羚羊角屑沙參車前子梔子仁桑根白皮杏仁湯浸去皮尖雙仁麩炒黃各一兩火麻仁川大黃微炒各一兩半上為細末煉蜜和丸如梧桐子大每服二十丸食後以溫水送下臨臥時再服瀉肺湯治暴風客熱外障白睛腫脹羌活黃芩玄參各一兩半地骨皮桔梗大黃芒硝各一兩上銼碎每服五錢水一盞煎至五分去滓食後溫服硃砂煎治眼白睛腫起赤澀疼痛硃砂細研杏仁湯浸去皮尖青鹽各等分馬牙硝細研黃連研末各半兩上研勻綿裹以雪水三合浸一宿濾入瓷盒中每用以銅箸點之治睛疼難忍者白芷細辛防風赤芍藥各等分上為末每服三錢水一盞入砂糖二錢同煎至七分去滓不拘時溫服補肝散治眼痛如針刺外障人參茯苓川芎五味子藁本各一兩細辛茺蔚子各一兩半上為細末每服一錢空心米飲調服拈痛散治兩額角痛目睛痛時見黑花及目赤腫痛脈弦欲作內障也得之於飢飽勞役柴胡一兩半栝蔞根二兩黃芩四兩一半銼炒火色一半酒濕過日乾生地黃當歸各一兩甘草炙七錢半上㕮咀每服三錢水一盞半生薑三片棗一枚煎臨臥熱服小便不利加茯苓澤瀉各半兩一捻金治眼睛痛乳香沒藥黃連雄黃盆硝各等分上為細末鼻內嗅之救苦散治眼睛痛不堪忍川芎當歸防風防己各半兩上為細末每服三錢熱酒調服點眼金華水治肝臟有熱血脈壅滯津液不榮目中澀磣痛黃連末一分硇砂豌豆大一塊研乳香黑豆大一塊研杏仁七枚去皮尖雙仁研銅緑一字煅過膩粉一錢匕研龍腦研滑石研艾灰研各半錢匕青古老錢三文與諸藥同浸上九味研令勻與古老錢在綿子內以井華水浸三七日後點目眥頭黃牛膽煎治眼澀痛黃牛膽汁鯉魚膽汁豬膽汁羊膽汁各半合熊膽一分胡黃連研末一分黃連研末一分青皮研末一分白蜜三兩上將諸藥末與蜜並膽汁和勻入瓷瓶子內以油紙封頭牢系坐飯甑中蒸待飯熟為度用新綿濾過每以銅箸取如麻子大點目眥日二三度治眼澀痛方治眼澀痛不能視物及看日光並見燈火光不得者上用熟羊頭眼中白珠子二枚於細石上和棗汁研之取如小豆大安眼睛上仰臥日二夜二不過三四度瘥黃連散治目癢急赤腫及目中百病上用黃連去須銼碎半兩以人乳浸點目眥中又方治一切風眼皮上瘙癢生瘡赤色上下皮瞼鮮爛發作無時經年纍歲不效上先用蜜少許以磁瓶盛之於慢火上暖令熱下輕粉攪令勻非時點瘙癢處點眼蕤仁膏治風熱眼飛血赤脈癢痛無定蕤仁去皮細研半兩好酥一粟子大上將蕤仁與酥相和研勻攤碗內後取艾一小團燒令煙出即將碗覆煙上熏待艾煙盡即止重研令勻每以麻子大點兩眥頭日二度魚膽傅眼膏治飛血赤脈作痛及暴赤眼澀鯉魚膽五枚黃連去須研末半兩上取膽汁調黃連末內磁盒盛於飯上蒸一次取出如干入蜜少許調似膏塗傅目眥日五七度車前散治肝經積熱上攻眼目逆順生翳血灌瞳仁羞明多淚宜服之車前子炒密蒙花去枝草決明白蒺藜炒去刺菊花去枝黃芩羌活龍膽草洗淨粉草各等分上為細末每服二錢食後米湯調服治血灌瞳仁生障膜方上取生地黃汁溫服一小錢頻服以瘥為度麥門冬湯治血灌瞳仁昏澀疼痛及轆轤轉關外障麥門冬去心焙大黃炒黃芩去黑心桔梗銼炒玄參各一兩細辛去苗芒硝研各半兩上銼碎每服五錢匕水一盞半煎至七分去滓下芒硝末少許食後溫服真珠散治眼血灌瞳仁生障膜真珠水晶琥珀馬牙硝各半兩硃砂一兩龍腦一分上同研如粉以銅箸取如半小豆大點之
