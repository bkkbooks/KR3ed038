後入鵝不食草淨洗川附子炮各等分躑躅花減半上為細末入麝香少許和勻含水搐鼻內去盡濁涕眼淚為度煮肝散治內外障翳眼上用豬肝二兩批開以夜明沙末二錢匕摻在肝內麻繩縛定用水一盞煮令肝轉色白取出爛嚼用煮肝湯送下食後服治內外障眼嗅藥麻黃根一兩當歸身一錢上同為粗末炒黑色入麝香乳香少許乃為細末口含水鼻內嗅之祕傳去翳聖金膏爐甘石五兩用童便煅三十次卻研極細用黃連龍膽草各一兩當歸三錢煎水兩碗飛過訖重湯熬干再研約一日要令如面極細爐甘石須揀白色者佳只好合粉烏賊魚骨半兩研細入煎黃連五兩用水洗淨曬乾卻將一兩切碎煎水四兩碾為細末重羅過再研極細用水飛過卻於砂銚內煮此藥最難冬月用雪水和藥曬乾再研方細乳香三錢要通明滴乳用黃連等水研飛過蜜密僧半兩火煅醋淬研細水飛過用輕粉一錢研細入藥南硼砂二錢研細入藥沒藥三錢用黃連等水飛過白丁香一錢水飛過重湯內煮乾再研入藥煎黃丹一兩用鐵銚火煅過研細末水飛重湯煮乾再研一時頃入煎龍膽草一兩截碎水煎硇砂半錢水洗去泥以水入鐵銚內煮捲簾散治久新病眼昏澀難開翳膜遮睛或成弩肉連瞼赤爛常多冷淚或暴發赤眼腫痛爐甘石四兩碎朴硝半兩細研黃連七錢捶碎水一碗煮數沸濾去滓上先將爐甘石末入甘鍋內開口煅令外有霞色為度次將黃連朴硝水中浸飛過候乾又入黃連半錢水飛過再候乾次入道人開障散治諸障翳蛇蛻洗焙煎細蟬蛻洗焙黃連去須各半兩緑豆一兩甘草二錢生用上銼細每服二錢食後臨臥新水煎服照水丸治目生翳障龍腦滑石丹砂通明者烏賊魚骨去甲上各一錢研細再同研勻先用黃蠟皂子大於新白瓷盞內慢火熔以紗帛子濾在淨盞內再熔了將前藥末同共拌和捏作餅子如半破豌豆大用薄絹或紗袋子盛了以硇砂半兩放在淨碗內上交橫安竹片放藥在上面鋪著借硇砂氣熏用大碟子一片合碗上勿令透氣撅一地坑放藥碗在坑內用竹箅子一片蓋了然後以黃土蓋之七日出淨瓷瓶中收其硇砂不用如患浮翳膜侵瞳仁及一切目疾但臨臥將一餅扎在眼眥頭即睡至曉用水一碗向東覷水碗其藥自落在水中淨浴卻用絹帛子裹起安潔淨處臨臥依前再使每餅可用半月候藥力慢時方易一餅如兩目有疾即用兩餅通光散治攀睛翳膜昏澀風毒腫痛洗眼方上用栝蔞一枚割下頂蓋取穰並子同豬胰子搗勻卻入在栝蔞內用元蓋蓋之坐淨土上取桑條子十兩約長四五寸簇栝蔞上用炭火燒扇之煙盡將成灰即住扇冷和灰通研極細每用二錢沸湯浸澄清去腳洗之去翳障生血止痛方上用蠐螬汁滴目中及飴炙食之陳氏經驗方云晉書盛彥母氏失明躬自侍養母食必自哺之母既病久至於喚使數見捶撻婢忿恨伺彥暫行取蠐螬炙飴之母食以為美然疑是異物密藏以示彥彥見之抱母慟哭絶而復蘇母目豁然從此遂愈孟子曰陳仲子豈不誠廉土哉居於陵三日不食耳無聞目無見也井上有李螬食實者過半矣匍匐將往食之三咽然後耳有聞目有見本草云蠐螬汁滴目中去翳障余在曲江有將官以瞽離軍因閲晉書見此參以孟子之言證以本草之説呼其子俾羞事而供勿令父知旬日後目明趨庭伸謝因録以濟衆指甲散治眼翳及諸物入眼上以左手中指甲洗淨候乾以刀刮其屑用燈草蘸點眼中翳處一二次即去或用懷孕婦人爪甲屑置目中去翳撥雲散能散風毒退翳障及赤爛弦者羌活防風川芎白蒺藜荊芥蟬蛻甘菊花各二兩上為細末每服二錢食後桑白皮煎湯調服珊瑚散治眼赤痛生翳障遠視不明癢澀珊瑚三分硃砂二分龍腦半錢上各研細令勻每以銅箸取一米許日三四度點之神效神妙散點翳膜障眼辰砂乳香膽礬南硼砂硇砂以上各半錢麝香片腦各三字玄明粉一字朴硝二兩安豆腐淋過將建盞煅上為細末以銅箸點之研須極細五蛻散治眼中障翳蟬蛻蛇蛻蠶蛻豬蛻蹄鯪鯉甲防風菊花草決明石決明甘草各等分上為細末每服二錢食後薄荷煎湯調服治赤障白膜風淚上以青羊膽點之出本草日精月華光明膏能開一切內障善治翳膜遮睛及攀睛弩肉不日掃除無問年久日深或一目兩目俱患但能見人影者悉皆治之如雲開見日黃連四兩研末當歸一兩碾訶子一對去核碾石決明二兩碾細石膏一兩半碾用臘八水或雪水浸三日大鵝梨二十個捶碎用布扭去滓豬胰二具用草夾細去筋膜爐甘石四兩火燒童子小便淬燒五次黃丹四兩炒研細馬牙硝炮二錢半銅緑研真膽礬研硼砂另研各一錢半沒藥四錢另研乳香三錢另研防風一錢天花粉半錢輕粉一錢另研麝香半錢另研片腦半錢另研上先將黃連等五味浸三日卻用大砂鍋一口內藥水再添滿七分熬重綿濾過至四五碗卻入鵝梨豬胰再熬至三碗再濾過再下鍋入爐甘石黃丹再熬至二碗又濾過卻下馬牙硝等八味以槐柳枝不住手攪勻候成膏仍濾淨入瓶內卻入腦麝粉三味攪勻以油紙密封勿令水入放冷水內浸三日取出每用以銅箸點眼良退翳散治目內翳障或瘡疹後餘毒不散真蛤粉另研穀精草生研為末各一兩上研勻每服二錢用豬肝三指大一片批開摻藥在上卷定再用麻線扎之濃米泔一碗煮肝熟為度取出放冷食後臨睡細嚼卻用元煮米泔送下忌一切毒物如齋素只用白柿同煎前藥令乾去藥食白柿孫盈仲云凡患瘡不可食雞鴨子必生翳膜錢季華之女年數歲瘡疹後兩眼皆生翳只服此藥各退白膜三重瞳子方瞭然也磁石丸治眼因患後起早元氣虛弱目無翳膜視物昏暗欲成內障磁石二兩燒醋淬七次杵碎細研水飛過肉蓯蓉一兩酒浸一宿刮去嫩皮炙令乾菟絲子酒浸五日曝乾別研為末三兩補骨脂微炒巴戟去心石斛去根甘草炙赤各半兩遠志去心一兩木神仙碧霞丹治內障當歸沒藥各二錢血竭白丁香硼砂片腦麝香以上各一錢為牙硝乳香各半錢黃連三錢銅緑二兩半為衣上為細末熬黃連膏和丸如雞頭實大每用新汲水半盞於瓷盒內浸常用每一丸可洗四十日大病不過一月小病半月冷淚三日見效七寶膏治混睛外障真珠水晶貝齒以上各一兩石決明琥珀各三分空青瑪瑙龍腦各半兩上為細末研勻水五升石器內煎至一升去滓再煎至一盞入蜜半兩煎和為膏每至夜臨時點之早晨不得點墜翳丸治偃目翳內障青羊膽青魚膽鯉魚膽各七個熊膽一分牛膽半兩石決明一兩麝香少許上為細末麵糊為丸如梧桐子大每服十丸空心茶清下羅漢應夢丸治內障及因病赤眼食鹹物而得者夜明沙淨當歸蟬蛻洗木賊去節各等分上為細末用羯羊子肝四兩用水煮爛搗如泥入前藥末搗和丸如梧桐子大每服五十丸食後熟水下百日眼如故昔日徐道亨奉母至孝患眼食蟹遂內障暗誦般若經與市得錢米既侍母忽一夕夢羅漢授此方服眼復明益氣聰明湯治飲食不節勞役形體脾胃不足得內障耳鳴或多年目暗視物不能此藥能令目廣大久服無內外障耳鳴耳聾之患又能令人精神過倍元氣自益身輕體健耳目聰明升麻葛根各三錢黃柏酒製炒芍藥各一錢蔓荊子一錢半人參黃耆甘草各半兩上㕮咀每服三錢水二盞煎至一盞去滓臨臥熱服近五更再煎服之得腫更妙如煩悶或有熱漸加黃柏春夏加之盛暑夏月倍之若此一味多則不效如脾胃虛去之有熱者少用之如舊有熱麻木或熱上壅頭目三兩服之後其熱皆除治老人腰以下沉重疼痛如神此藥久服令人上重乃有精神兩足輕浮不知高下若如此空心服之或少加黃柏輕浮自減若治倒睫去黃柏芍藥忌煙火酸物羌活退翳丸一名地黃丸治內障右眼小眥青白翳大眥微顯白翳腦痛瞳子散大上熱惡熱大便澀或時難小便如常遇天熱暖處頭痛睛脹能食日沒後天陰則昏暗此證亦可服滋陰地黃丸熟地黃八錢生地黃酒製黃柏酒製當歸身酒製茺蔚子丹參以上各半兩黑附子炮寒水石生用各一錢芍藥一兩三錢防己酒製二錢知母酒製牡丹皮羌活川芎以上各三錢柴胡半兩或三錢上為細末煉蜜為丸如小豆大每服五七十丸空心用白湯送下如消食未盡候飢時服之忌語言隨後以食壓之東垣蘭室祕藏方云翳在大眥加葛根升麻翳在小眥加柴胡羌活是也補腎丸治黑翳如珠外障人參茯苓細辛五味子肉桂桔梗各一兩乾山藥柏子仁各二兩半乾地黃一兩半上為細末煉蜜和丸如梧桐子大每服十丸空心茶下退熱飲子治膜入水輪外障防風黃芩桔梗茺蔚子各二兩大黃玄參細辛五味子各一兩上銼碎每服一錢水一盞煎五分去滓食後溫服搜風湯治旋螺尖起外障防風大黃天門冬五味子桔梗以上各一兩細辛芍藥各一兩半茺蔚子二兩上銼碎每服五錢水一盞煎五分去滓食後溫服通脾瀉胃湯治眼黃膜上衝外障防風大黃玄參知母以上各一兩天門冬黃芩各一兩半麥門冬茺蔚子各二兩上銼碎每服五錢水一盞煎五分去滓食後溫服炙肝散治外障赤肉翳膜遮睛不明石決明洗穀精草洗各四兩皂角炙去皮子一分黃芩去黑心木賊各五兩蒼朮米泔水浸七日切片焙半斤甘草炙銼二兩上為細末每用獖豬肝一葉去筋膜切數縫摻藥末五錢於縫內仍摻鹽一錢合定用旋著濕柳枝三四條閣起慢火炙香熟早晨空心冷吃盡續吃冷飯一盞壓之仍於三里穴灸二三七壯三日後有淚下為驗七日翳膜必退每旦用新水漱口青金丸治風毒攻眼成外障翳膜銅青真者蕤仁去皮尖與銅青同浸二宿去水研石決明淨水磨瀝乾生犀角淨水磨紙上飛過各一錢龍腦研白丁香水研飛去滓海螵蛸水飛過各半錢上將銅青與蕤仁先研如糊次入白丁香研次入四味研極細用好墨研濃汁於淨器中和熟為丸如緑豆大每用人乳汁化開點眼未用者常以龍腦養於瓷器中豬膽方治外障眼上以豬膽一枚用銀銚或瓦銚煎成膏入冰腦如黍米大點入眼中微覺翳輕又將豬膽白膜皮陰乾合作小繩如叉股大小只用一頭燒灰待冷點翳數日後翳退雙目如舊此治翳如重者尤良不過三五度瘥羚羊角飲子治黑翳如珠外障羚羊角五味子細辛大黃知母芒硝各一兩防風二兩上銼碎每服五錢水一盞煎五分去滓食後溫服排風散治兩瞼黏睛外障天麻桔梗防風各二兩五味子烏蛇細辛芍藥乾蠍各一兩上為細末每服一錢食後米飲調下地風湯治雞冠蜆肉外障防風二兩桔梗大黃細辛各一兩黃芩玄參芒硝車前子各一兩半上銼碎每服五錢水一盞煎五分去滓食遠溫服摩風膏治鶻眼凝睛外障黃耆細辛當歸杏仁各一兩防風松脂黃蠟各二兩白芷二兩半小麻油四兩上為末煎成膏塗之瀉膽散治瞳仁幹缺外障玄參黃芩地骨皮麥門冬知母以上各一兩黃耆茺蔚子各一兩半上銼碎每服五錢水一盞煎五分去滓食後溫服天門冬飲子治轆轤轉關外障天門冬茺蔚子知母各二兩五味子防風各一兩人參茯苓羌活各一兩半上銼碎每服五錢水一盞煎五分去滓食後溫服補肝丸治眼昏暗將成內障茺蔚子青葙子枸杞子五味子決明子杏仁茯苓去皮各一兩乾地黃三兩菟絲子二兩山芋車前子地骨皮焙柏子仁大黃黃芩去黑心黃連去須人參細辛防風去叉甘草炙各一兩半上為細末煉蜜為丸如梧桐子大每服二十丸加至三十丸食後米飲送下石決明丸治眼昏暗漸成內障石決明槐子肉蓯蓉酒浸一宿刮去皺皮炙乾熟地黃菟絲子酒浸三日曝乾別研炒末陽起石酒煮七日細研水飛各一兩桂心半兩磁石一兩半火煅醋淬七次細研水飛過上