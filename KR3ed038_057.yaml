body:
  text: 卷之五十七眼目門附論夫眼者乃五臟六腑之精華如日月麗天昭明而不可掩者也其首尾赤眥屬心其滿眼白睛屬肺其烏睛圓大屬肝其上下肉胞屬脾而中間黑瞳一點如漆者腎實主之是隨五臟各有證應然論其所主則瞳子之關係重焉何以言之目者肝之外候也肝取木腎取水水能生木子肝母腎焉有子母而能相離者哉故肝腎之氣充則精彩光明肝腎之氣乏則昏蒙眩暈烏輪赤暈刺痛浮漿此肝熱也膽生清淚枯黃繞睛此肝虛也瞳仁開大淡白褊斜此腎虛也瞳仁焦小或帶微黃此腎熱也一切目疾以此驗之然人知肝腎之氣相依而行孰知心者神之明也所以為肝腎之副焉所謂一而二二而一者也何則心主血肝藏血血能生熱凡熱沖發於眼皆當清心涼肝又不可固執水生木之説特眼者輕膜裹水照徹四方溯源反本非天一之水又果孰為之主宰乎析而論之則拘急牽颼瞳青胞白癢而清淚不赤不疼是之謂風眼烏輪突起胞硬腫紅眵淚濕漿裡熱刺痛是之謂熱眼眼渾而淚胞腫而軟上壅朦朧酸澀微赤是之謂氣眼其或風與熱並則癢而浮赤風與氣搏則癢澀昏沉血熱交聚故生淫膚粟肉紅縷偷針之類氣血不至故有眇視胞垂雀眼盲障之形淡紫而隱紅者為虛熱鮮紅而妒赤者為實熱兩眥呈露生弩肉者此心熱血旺白睛紅膜如紙傘者此氣滯血凝熱證瞳仁內湧白睛滯濕色浮而赤也冷痛瞳仁青緑白睛枯稿氣沉而濁也眼熱經久復為風冷所乘則赤爛眼中不赤但為痰飲所注則作疼肝氣不順而挾熱所以羞明熱氣蓄聚而傷胞所以胞合籲此外證之大概然而五臟不可闕一脾與肺獨無預何耶曰白睛帶赤或紅筋者其熱在肺上胞下胞或目唇間如疥點者其熱在脾脾主味也五味之秀養諸中則精華髮於外肺主氣也水火升降榮衛流轉非氣孰能使之前所謂五臟各有證應者於此又可推矣雖然眼之為患多生於熱其間用藥大抵以清心涼肝調血順氣為先有如脾家惡燥設遇虛證亦不過以當歸地黃輩潤養之輕用溫藥不可也況夫肺能發燥肝亦好潤古方率用杏仁乾柿飴糖砂蜜為佐果非潤益之意乎至於退翳一節尤關利害凡翳起於肺家受熱輕則朦朧重則生翳真蛛翳狀如碎米者易散梅花翳狀如梅花者難消雖翳自熱生然治法先退翳而後退熱者謂熱極生翳若先去赤熱則血為之水而翳不能去其有赤眼與之涼藥過多又且滌之以水不反掌而冰凝眼特一團水耳水性清澄尤不可規規於點洗喜怒失節嗜欲無度窮役眼力泣涕過傷凌寒衝風當暑冒日不避煙火飲啖熱多此皆患生於腑臟者也專事點洗可乎哉有能靜坐澄神愛護目力放懷息慮心逸日休調和飲食以養之斟酌藥餌以平之明察秋淵斷可必笑眼目通用方還睛補肝丸治肝虛兩目昏暗衝風淚下白朮細辛去苗川芎決明子微炒人參羌活去服當歸切焙白茯苓去皮苦參防風去叉官桂去粗皮地骨皮玄參黃芩去黑心五味子車前子微炒菊花青葙子甘草炙各等分上為細末煉蜜為丸如梧桐子大每服三十丸加至四十丸不拘時米飲送下鎮肝丸治肝經不足內受風熱上攻眼目昏暗癢痛隱澀難開多眵灑淚怕日羞明時發腫赤或生翳障並皆治之遠志去心地膚子茺蔚子白茯苓去皮防風去蘆決明子蔓荊子人參各一兩山藥青葙子柴胡去苗地骨皮玄參車前子甘菊花柏子仁炒甘草炙各半兩細辛去苗一分上為細末蜜水煮糊丸如梧桐子大每服三十丸食後用米湯送下日三服遠志丸清心明目益肝退翳羌活散鎮肝明目暴赤眼一切內外障翳羌活川芎防風旋覆花以上各半兩楮葉楮實蟬蛻蒼朮米泔浸去皮不見火木賊甘菊桑葉八月採陰乾甘草以上各一兩上為細末每服二錢茶清調下早晚食後臨臥各一服合時不得犯鐵器及不得見火忌濕面及酒諸熱毒物青葙子丸治肝虛積熱外障青葙子二兩車前子菟絲子熟地黃茺蔚子五味子細辛防風人參澤瀉茯苓各一兩上為細末煉蜜為丸如梧桐子大每服三十丸空心用茶清送下羊肝丸鎮肝明目羌活甘菊花細辛柏子仁官桂五味子白朮以上各半兩黃連三分羯羊肝一具新瓦盆爆干更焙之肝若大只用一半上為細末煉蜜為丸如梧桐子大每服三四十丸食前用溫水送下一方有地黃無柏子仁地黃丸一名菊花丸治用力勞心肝虛風熱攻眼赤腫羞明漸生翳障乘肝腎風毒熱氣上衝目痛久視傷血血主肝故動勞則傷肝而目昏肝傷則目生風而熱氣上湊目昏亦盛不宜專服補藥當益血鎮肝而目自明矣熟地黃一兩半甘菊花防風光明硃砂羌活桂心沒藥以上各半兩決明子黃連各一兩上為細末煉蜜和丸如梧桐子大每服三十丸食後熟水下日三晉範寧嘗苦目痛就張湛求方湛戲之曰古方宋陽子少得其術以授魯東門伯次授左丘明遂世世相傳以及漢杜子夏晉左大沖凡此諸賢並有目疾得此方云省讀書一減思慮二專內視三簡外觀四旦起晚五夜早眠六凡六物熬以神火下以氣篩蘊於胸中七日然後納諸方寸修之一時近能數其目睫遠視尺捶之餘長服不已非但明目及亦延年審如是而行非可謂之嘲戲亦奇方也補肝湯治肝虛兩脅滿痛筋脈拘急不得喘息眼目昏暗而多青色防風去叉細辛去苗柏子仁白茯苓去皮官桂去粗皮山茱萸蔓荊子去浮皮桃仁湯浸去皮尖雙仁炒甘草微炒各等分上㕮咀每服五錢水一盞半入大棗二枚擘破同煎至八分去滓不拘時溫服日再服石決明丸治肝虛血弱日久昏暗石決明五味子菟絲子酒浸一宿別搗為末各一兩山芋知母焙細辛去苗熟地黃焙各一兩半上為細末煉蜜為丸如梧桐子大每服三十丸空心用米飲送下菊花散治肝受風毒眼目昏朦漸生翳膜甘菊四兩蟬蛻去足白蒺藜炒焦去刺木賊童便內浸一宿曬羌活以上各三兩荊芥穗甘草各二兩上為細末每服二錢食後茶清調下湯泡散治肝虛風熱攻眼赤腫羞明漸生翳膜杏仁防風黃連去須赤芍藥當歸尾各半兩銅青二錢薄荷葉三錢上銼碎每用二錢極沸湯泡乘熱先熏後洗冷則再暖用日兩三次一方入白鹽少許閉目沃洗鹽亦散血雷岩丸治男子婦人肝經不足風邪內乘以攻眼睛淚出羞明怕日多見黑花翳膜遮睛瞼生風粟或癢或痛隱澀難開兼久患偏正頭風牽引兩目漸覺細小視物不明皆因腎水不能既濟肝木此藥久服大補腎臟添目力枸杞子菊花各二兩肉蓯蓉巴戟酒浸一宿去皮心牛膝各一兩川椒三兩去目黑附子青鹽二錢以泔水三升同煮水盡去皮臍上為細末浸藥酒煮麵糊和丸如梧桐子大每服十丸空心酒送下世人服藥多不知根源往往不效春雪膏治肝經不足內受風熱上攻眼目昏暗癢痛隱澀難開及多眵赤腫怕日羞明不能遠視迎風有淚多見黑花片腦二錢半蕤仁去皮殼細研去油稱二兩上用生蜜二錢重將片腦蕤仁同搜和用銅箸子或以金銀叉股時復點放眥頭連眶赤爛以油紙塗膏貼之又方治肝虛或當風眼淚鎮肝明目上用臘月牯牛膽盛黑豆不計多少浸候百日開取食後夜間吞三七粒神效枸杞酒治肝虛當風眼淚上用枸杞子最肥者二升搗破內絹袋置罐中以酒一斗浸訖密封勿泄氣三七日每日飲之勿醉二妙散養肝氣治目昏視物不明淚下方當歸熟地黃各等分上為細末每服二錢匕不拘時無灰酒調下養肝丸治肝血不足眼目昏花或生翳眵久視不明當歸去蘆酒浸防風去蘆蕤仁別研車前子酒蒸焙白芍藥熟地黃各等分上為細末煉蜜為丸如梧桐子大每服五六十丸不拘時白湯送下萬壽地芝丸治目能近視不能遠視天門冬去心生薑焙各四兩甘菊花二兩枳殼去穰炒三兩上為細末煉蜜為丸如梧桐子大每服一百丸食後用茶清或溫酒送下此藥能治風熱洗肝湯治肝實眼人參黃芩去黑心赤茯苓去黑皮山梔子仁川芎柴胡去苗地骨皮甘菊花桔梗炒各一兩黃連去須甘草炙各半兩上㕮咀每服三錢水一盞入苦竹葉七片煎至七分去滓食後服羚羊角散治肝臟實熱眼目昏暗時多熱淚羚羊角鎊羌活去蘆玄參車前子黃芩去黑心山梔仁栝蔞各半兩胡黃連菊花各三分細辛去苗一分上為細末每服二錢食後竹葉煎湯調服竹葉湯治肝臟實熱眼赤疼痛淡竹葉黃芩去黑心犀角屑木通炒各一兩車前子黃連去須玄參各一兩一分芒硝二兩梔子仁大黃微炒各一兩半上㕮咀每服五錢水一盞半煎至八分去滓食後溫服龍膽飲治肝臟實熱目赤腫痛龍膽草梔子仁各二錢防風山茵陳川芎玄參荊芥甘菊花楮實甘草各一錢上為細末每用一錢半食後茶清調下決明子湯治肝臟實熱目眥生赤肉澀痛決明子炒柴胡去苗黃連去須苦竹葉防風去叉升麻各三分細辛去苗一分菊花甘草炙各半兩上㕮咀每服五錢水一盞半煎八分去滓食後溫服麥門冬湯治肝實熱毒氣上熏於目赤腫痛癢麥門冬去心秦皮去粗皮赤茯苓去黑皮葳蕤各一兩半升麻大黃生用各一兩上銼如麻豆大每服五錢水一盞半入竹葉十片煎至八分去滓入朴硝末一錢更煎令沸空心溫服瀉肝散治肝熱赤眼腫痛梔子仁荊芥大黃甘草上等分銼碎每服二錢水煎食後服羊肝丸治肝經有熱目赤睛痛視物昏澀及治障翳青盲羯羊肝一具生用黃連去須別研為末上先將羊肝去筋膜於砂盆內擂入黃連末杵和為丸如梧桐子大每服五十丸不拘時熟水送下或暖漿水下忌豬肉及冷水連作五劑瘥昔崔承元內障喪明夜坐聞有聲問誰答曰昔蒙出活今特來謝遂授此方依方修合服眼復明朗田螺方治肝熱目腫痛上取田中螺大者七枚淨洗新汲水養去穢泥重換水浸洗仍旋取於干器中著少鹽花於口上承取自出汁用點目逐個如此用了卻放之助陽活血湯治眼發之後上熱壅甚白睛紅多眵淚無疼痛而隱澀難開此因服苦寒藥過多真氣不能通九竅也故眼昏花不明宜動陽活血補氣柴胡白芷各五分升麻當歸各五錢黃耆三錢防風七分蔓荊子甘草炙各一錢上㕮咀作一服水一盞半煎至一盞去滓臨臥熱服避風寒忌食冷物甘菊花散治肝氣壅塞翳膜遮睛隱澀難開甘菊花一兩木賊防風去叉白蒺藜甘草炙各半兩木香一分上為細末每服一錢匕不拘時沸湯點服決明子方治肝經熱止淚明目治風赤眼上以決明子朝朝取一匙挼令淨空心水吞下百日見夜光一方取決明作菜食之羚羊羌活湯治肝腎俱虛眼見黑花或作蠅翅羚羊角屑羌活去蘆黃芩去黑心附子炮去皮臍人參澤瀉秦艽去苗山茱萸車前子青葙子決明子微炒柴胡去苗各一兩半黃耆二兩甘草微炙一兩上銼碎每服五錢水一盞半煎至八分去滓不拘時溫服日再服空青丸治肝腎久虛目暗漸生翳膜空青研細水飛真珠研各一分犀角屑羚羊角屑防風去叉防己升麻銼各半兩麥門冬去心焙人參茺蔚子陽起石細研前胡去蘆各一兩虎睛一對上為細末煉蜜為丸如梧桐子大每服五丸加至十丸用麥門冬煎湯送下溫椒湯下亦可益陰腎氣丸此壯水之主以鎮陽光上為細末煉蜜為丸如梧桐子大以硃砂為衣每服五七十丸空心淡鹽湯送下剪霞膏治腎水枯乏肝氣不足上攻眼目昏澀眵淚羞明及風毒眼瞼赤生粟隱澀疼痛心經受熱暴赤腫痛婦人血風注眼久患爛沿翳膜遮睛拳毛倒睫雄黃研白丁香研當歸研海螵蛸研麝香研乳香研各一錢輕粉一合黃丹二錢炒黃色爐甘石火煅用童子小便淬十數次以酥為度研如粉黃連去蘆研各一兩上先用蜜四兩熬三四沸下爐甘石再熬不住手攪令勻候冷下黃丹再熬下黃連雄黃白丁香再攪下當歸海螵蛸再熬三五沸