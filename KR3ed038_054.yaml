body:
  text: 卷之五十四瘡瘍門附論夫醫之用藥如將之用兵諺云千軍易得一將難求決勝者良將也決效者良醫也知兵之勝出於良將之機謀知人之病出於良醫之診視有軍無將則軍不能自勝有方無醫則藥不能自效蓋醫者人之司命也脈者人之大要也蓋醫家苟不明脈則如冥行索途動致顛覆矣人生其間雖病萬有不齊究其所以莫非運氣之所為也故醫之運氣猶儒之論理工之規矩監之光衡之權舍之將何以焉蓋其道博其旨玄其法精其機妙知其要則一言而終不知其要則流散無窮且如醫之十三科其中大方脈婦人科小兒科風科必先診脈後對證處藥獨瘡科之流多有不診其脈候專攻治外或有證候疑難別召方脈診視於瘡科之輩甘當淺漏之名噫其小哉夫瘡腫之生皆有陰陽不和血氣壅滯若不診視何以知陰陽勇怯氣血聚散耶由是觀之治療瘡腫診候之道不可闕也是以素問難經靈樞甲乙及扁鵲仲景華他叔和千金外臺聖惠總録古今名醫諸家方論中診候瘡科之詳至矣盡矣今遵前人之書略其瘡科之脈開列於後浮脈之診浮於指下按之不足舉之有餘冉冉尋之狀如太過瞥瞥然見於皮膚之間其主表證或為風或為虛浮而大散者心也浮而短澀者肺也浮而數者熱也浮數之脈應發熱其不發熱而反惡寒者瘡疽之謂也洪脈之診似浮而大按舉之則泛泛然滿三部其狀如水之洪流波之湧起其主血實積熱瘡腫論曰脈洪大者瘡疽之病進也如瘡疽結膿未成者宜下之膿潰之後脈見洪大則難治若自利者不可救治也滑脈之診實大相兼往來流利如珠按之則纍纍然滑也其主或為熱或為虛此陽脈也瘡疽之病膿未潰者宜內消也膿潰之後宜托裡也數脈之診按之則呼吸之間及六至其狀似滑而數也若浮而數則表熱也沉而數則裡熱也又曰諸數為熱仲景曰數脈不時見則生惡瘡也又曰肺脈俱數則生瘡也診諸瘡洪數者里欲有膿結也散脈之診似浮而散按之即散而欲去舉之則大而無力其主氣實而血虛有表無里瘡腫膿潰之後而煩痛尚未痊退者診其脈洪滑粗弱難治也以其正氣虛而邪氣實也又曰肢體沉肺脈大即斃謂散者也芤脈之診似浮而軟按之中央空兩邊實其主血虛或為失血瘡腫之病診得芤脈潰膿後易治以其脈病相應也長脈之診按之則洪大而長出於本位其主陽氣有餘也傷寒得之欲汗出自解也長而緩者胃脈也百病皆愈謂之長則氣治也牢脈之診按之則實而弦且沉且浮而有牢堅之意若瘰癧結腫診得牢脈者不可內消也實脈之診按舉有力而類結曰實經曰邪氣勝則實久病則虛人得此最忌瘡疽之人得此宜急下之以其邪氣與臟腑俱實故也弦脈之診按之則緊而弦其似緊者為弦如按弦而不移緊如繩而轉動以此為異春脈浮弦而平不時見則為飲為痛主寒主虛瘡疽論曰弦洪相搏外緊內熱欲發瘡疽也緊脈之診似弦而緊按之如切繩而轉動其至切痛積癖也瘡腫得之氣血沉澀也亦主痛也澀脈之診按之散而復來舉之則細而不足脈澀則氣澀也亦主血虛瘡腫潰後得之無妨也短脈之診按舉則不及本位內經曰短則氣病以其無胃氣也諸病脈短皆難治也瘡腫脈短真氣短也細脈之診按之則縈縈如蜘蛛之絲而欲絶舉之如無而似有細而微主亡陽衰也瘡腫之脈來細而沉時直者裡虛而欲變證也微脈之診按之則軟小而極微其主虛也真氣復者生邪氣勝者危瘡腫之病潰後脈微而勻舉自瘥也遲脈之診按舉來遲呼吸定息得三至其狀似緩而稍遲痼疾得之則善新疾得之則正氣虛憊瘡腫得之潰後自痊緩脈之診按舉似遲而稍快於遲仲景曰陽脈浮大而濡陰脈浮大而澀陰陽同等謂之緩脈見長緩百疾自瘳凡諸瘡腫潰後其脈澀遲緩者皆易愈以其脈候相應是有胃氣者也若芤則瀉血澀堅大實按之不減而有力者中焦有結伏在胃也微浮者積熱不消蛔動心悸也尺主下焦腰腎膝脛足中事也尺脈浮者風熱小便難也沉者腰背痛而腎氣不足數者臍下熱痛小便赤色而惡寒也遲者下焦寒而陰虛也緊者臍下小腹急痛也緩者腳弱下腫而痿痹也弱者下冷而腎氣衰也軟者腳不收而風痹小便難也伏者小腹痛而疝瘕穀不化也細者溏泄而下冷也芤者小便澀血而下虛也牢而小者足膝寒痹腳下隱隱而痛也細者急者筋攣不能行也來而斷絶者男子小腹有滯氣也婦人月水不利也瘡瘍當分臟腑內經曰諸痛癢瘡皆屬心火又云營氣不從逆於肉理乃生腫又云膏粱之變足生大疔又云熱勝血則為癰膿又云地之濕氣感則害人皮肉筋脈東垣謂濕氣外傷則營氣不行榮衛者皆營氣之所經營也營氣者胃氣也運氣也營氣為本本逆不行為濕氣所壞而為瘡瘍也但瘡瘍論中多言二熱相搏熱化為膿有言熱化為膿者有言濕氣生瘡寒化為熱而為膿者此皆瘡疽之源也當看是何部分所發所用之藥引經為先兼見次之以脈別之是陰是陽用藥在乎主治宜以先瀉其榮治瘡之本若不次序本逆而助火濕熱相合敗壞肌肉而為膿血者當分而治之且如一歲之中火熱無過四五月之間是時諸物皆不壞爛者六七月之間濕令大行之際近取諸身濕熱在身豈不敗壞肌肉此理明矣大抵瘡瘍之疾經云六腑不和流結為癰要分臟腑之屬經絡之異六陰六陽之經有多氣少血者有多血少氣者有多氣多血者不可一概論之經言癰者榮衛稽留於經脈之中則澀而不行則衛從之而不通壅遏而不得行故熱大熱不止熱勝則肉腐肉腐則為膿然此不能陷骨髓不為焦枯五臟不為傷故曰癰疽者熱氣純盛下陷肌膚筋骨髓枯肉運五臟血氣竭其毒下陷筋骨及良肉故云疽疽者皮堅上如牛領之皮癰者皮薄上以澤之是知癰者壅也六腑不和之所生淺而大也疽者沮也五臟不調之所致深而惡也六腑主表其氣淺故癰皮薄而腫高五臟主裡其氣深故疽皮厚而腫堅皆根著臟腑見於肌肉營氣不從氣血壅沮而生也其所出之道有異者耶毒從虛而出也假令太陽經虛從背出少陽經虛從鬢出陽明經虛從髭出督脈經虛從腦出余者從經所出取焉今富貴之人不知其節以飲食炙爆高粱厚味醇酒辛辣之物日久太過其氣味俱厚乃陽中之陽不能走空竅先行陽道反行陰陽逆於肉理則濕氣大勝則令子母實火乃大旺相火一盛必克腎水腎既受邪積久水乏水乏則從濕熱之化而上行其瘡多出背出腦此為大疔之最重者也若毒氣見於肺部之分或脾胃之分次也或見於他經又其次也或患濕毒流注止處無不潰爛故經曰高粱之變足生大疔受如持虛如持虛器以受物物無不受治大疔之法必當瀉其營氣以標本言之先受病為本非苦寒之劑為多則不能除其苦楚疼痛也諸瘡瘍往往多以乳香沒藥加以熱劑治之此理未為穩當若使經絡流通去其臟腑之壅滯佐以寒涼之劑其瘡自愈是以河間論瘡瘍者火之屬須分內外以治其本若其脈沉實當先疏其內以截其源也其脈浮大當先托裡恐邪氣入內也有內外之中者邪氣至盛遏截經絡故發癰腫此因失於托裹及失疏通又失和其榮衛治瘡之要須以疏利為先次以托裡和其榮衛此三法乃內外之攻也若脈沉實發熱煩躁外無尳赤疼痛其邪在內氣以深矣作疏其臟腑以絶其源又謂嘔啘心煩脈沉而實腫硬木悶而皮肉不變根深而病大邪亦在內若臟腑祕澀急當疏利宜以黃連內疏湯加大黃服後以次序調理若脈浮數尳腫在外形證外顯恐邪氣極而內行故先托裡宜以復煎散此為治法一瘰癘馬刀經同證異丹溪云夫瘰癘初發必起於少陽經不守禁戒延及陽明經大抵食味之厚鬱氣之積曰毒曰風曰熱皆此三端招引變換治之須分虛實若實者依法調治遠厚味發氣之物亦有愈者虛者誠為可慮以其屬膽經主決斷有相火而且氣多血少婦人若患此疾月經不調便作寒熱稍久變為潮熱其證漸危自非斷欲息氣遠滋味神仙不能治本草言夏枯草大治瘰癧散結氣有補養厥陰血脈之功能退寒熱佐之以行散之藥加之以艾灸取其隨經之穴自然取效若河間之論瘰癧者經謂結核者是也或在耳前後連及頤頷下連缺盆皆為瘰癧或在胸及胸之側下連兩脅皆為馬刀手足少陽主之此經多氣少血故多堅而少軟膿白而稀如米泔狀世俗治馬刀求其水清者可治殊不知此經多氣少血之故在乎診其虛實以調治之是以東垣治瘰癧馬刀以救苦化堅湯或散腫潰堅湯主之外以臨泣穴灸二七壯此證並屬手足少陽經也惟瘰癧延及陽明之經故用藥有出入加減不同耳詳載於試效方中瘰癧馬刀皆形質發於部分而命名也巢氏病源載之三十六種千金聖惠所論瘰癧九漏總論説有風熱氣之三毒之異瘰癧結核寒熱之殊其本皆由恚怒氣逆憂思過甚風熱邪氣內搏於肝肝主筋故令筋蓄結而腫或見於是何部分先以五香連翹湯或牡蠣大黃湯疏下兩三行後服前藥調治外用十香膏烏犀膏貼之如或將痊求瘥其將護忌慎治療之法無造次焉一肺癰肺痿內經云肺之癰喘而兩胠滿金匱要略又以肺癰肺痿並論辨之所謂熱在上焦者因咳為肺痿肺痿之病何從得之或從汗出或從嘔吐或從消渴小便利數或從便難又被疏利之藥重亡津液故得之若寸口脈數其人咳口中反有濁唾涎沫者為肺痿之病若口中辟辟燥咳又胸中隱隱痛脈反滑數此為肺癰咳唾膿血脈數虛者為肺痿數實者為肺癰夫肺者五臟之華蓋也處於胸中主於氣候於皮毛勞傷血氣腠理虛而風邪乘之內感於肺也則汗出惡風咳嗽短氣鼻塞項強胸脅脹滿久久不瘥遂成前證輕則痿甚則癰聖惠曰中府隱隱而微痛者肺疽也上肉微起肺瘡也中府者穴也在雲門下一寸六分乳肋間動脈應手陷中也是以候始萌則可救膿成則多死若欲知有膿者但診其脈若微緊而數者未有膿也緊甚而數者已有膿也內經又曰血熱則肉敗榮衛不行必將為膿大凡肺瘡當咳嗽短氣胸滿時唾膿血久久如粳米粥者難治若嘔膿而不止者亦不可治也其嘔膿而自止者自愈其脈短而澀者自痊浮大者難治面色當白而反赤者此火之剋金皆逆為不治治法此證不得臥者葶藶大棗瀉肺湯千金方黃耆湯並皆主之全在脈理分之若毫釐之差千里之遠慎之慎之一腸癰胃脘癰孫真人云率得腸癰而不曉其病候愚醫治之錯則殺人腸癰之為病小腹腫而強抑之則痛小便澀似淋時時汗出復惡寒其身皮甲聳然腹皮急大如腫狀其脈數者小有膿也其脈遲緊者未有膿也甚者腹脹大轉側聞水聲或繞臍生瘡或膿從臍中出或大便如膿血故治之以大黃牡丹皮之類選而用之或外以灸法此腸癰之形證蓋可知矣胃脘癰者何以別之內經云人病胃脘癰者診當何如當胃脈沉細沉細者氣逆逆者人迎反盛則熱聚於胃口而不行故胃脘為癰也諸書少論此病惟孫真人言此後學以此論乃胃熱為邪治之初以疏利為先次以消毒托裡退胃熱此為良法不識病者誤人不淺可不慎之一乳核失治必成癰疽丹溪云乳房所屬陽明乳頭厥陰所屬乳子之母或忿怒或厚味以致氣不流行竅不得通汁不得出則結為腫為痛陽明之經血熱則化為膿又有兒之口氣吹而焮熱次結成核初起時便須忍痛揉散令軟血脈通和自然消散失此不治則成癰癤精要以神效栝蔞散治乳癰奶勞固是妙捷村落之處藥恐未易得用蒲公草此草在處田野路側有之三月開花黃似菊味甘解食毒散滯氣入陽明太陰二經洗淨細碾以忍冬藤濃煎入少酒佐之服之即效若疏厥陰之滯氣以青皮清陽明之熱以石膏行瀉火以生甘草消腫毒以栝蔞子或加青橘皮皂角刺金銀花當歸頭或湯或隨宜加減佐以少酒仍加艾火兩三壯於腫處甚效切勿妄用針刀引惹拙病又有婦人積憂結成隱核有如鱉棋子大不痛不癢或一年二年三五年者為瘡破陷名曰奶癌以其凹似癌穴也不可治矣若初起之時便須消釋病根更宜清心遠慮薄滋味全要息怒調理自有可安之理若婦人經行得此輕若六十歲左右味厚鬱結而形實七情所幹性急不調結核前證自覺神思不佳不知食味便可用人參湯調青皮甘草末等分少入生薑汁細細呷之一日夜五七次其核自消若不早治隱至經年以後如發不痛不癢必於乳下潰一穴出膿或經三五年雖飲食如舊洞見五內乃死惟無夫婦人生者多若有夫婦人生者蓋積氣之所流滯也故婦人夫乃婦之天得夫則陰陽和此證雖有而治自愈無夫婦人得其癌者以其穴之嵌深其可畏哉患此者必須早治必經歲月九死一生有一初嫁之婦患此只以青皮甘草煎湯常服立安又一婦人十八歲得此證者性急脈實所難者姑且與青皮一味煎湯與之間以加減四物湯服之不月而安學者前人用青皮乃厥陰之藥四物湯行血分之功信有理哉又有五發及諸瘡十三疔痔漏陰瘡時毒等證精義備載其詳今略癰疽治療之法條列於後瘡科通治方內托羌活湯治尻臀生癰堅硬腫痛大作羌活黃柏酒製各二錢防風當歸尾藁本連翹蒼朮陳皮甘草炙各一錢肉桂三分黃耆一錢半上作一服水一盅酒半盅煎至八分食前服白芷升麻湯治臂上生癰白芷一錢半升麻桔梗各一錢生黃芩三錢酒黃芩四錢紅花甘草炙各半錢上作一服水二盅酒半盅煎至八分食後服當歸拈痛湯治一切風濕熱毒浸淫瘡瘍下注濕毒腳膝生瘡赤腫裡外臁瘡膿水不絶或癢或痛方見腳氣門內托升麻湯治婦人兩乳間出黑頭瘡頂陷下作黑眼並乳癰初起亦治升麻葛根連翹當歸身黃柏各二錢黃耆二錢肉桂五分牛蒡子甘草炙各一錢上作一服水一盅酒半盅煎至一盅食後服柴胡通經湯治小兒項側有瘡堅而不潰名曰馬刀柴胡當歸尾生甘草連翹黃芩牛蒡子京三稜桔梗各一錢半黃連一錢紅花少許上作一服水二盅煎至一盅食後服亦治瘰癧此是攻裡內消之劑郭氏升麻牛蒡子散治時毒瘡疹發於頭面胸膈之際升麻牛蒡子桔硬麻黃甘草各一錢半連翹二錢上作一服水二盅生薑三片煎至一盅食遠服中和湯治時毒瘡腫羌活川芎菖蒲牛蒡子防風荊芥漏蘆麥門冬前胡甘草各一錢半上作一服水二盅煎至一盅食遠服升麻和氣飲治瘡腫癤疥癢痛升麻桔梗蒼朮乾葛甘草大黃煨各一錢陳皮一錢當歸半夏茯苓白芷乾薑枳殼各五分芍藥一錢半上作一服水二盅煎至一盅食遠服當歸飲子治瘡疥風癬濕毒燥癢當歸川芎白芍藥生地黃防風白蒺藜荊芥各一錢半何首烏黃耆甘草各一錢上作一服水二盅煎至一盅食遠服或為末亦可托裡十補散治瘡腫托裡人參當歸黃耆各二錢厚朴川芎桔梗防風桂心白芷甘草各一錢上作一服水二盅煎至一盅食遠服十六味流氣飲治無名惡瘡癰疽等證川芎當歸芍藥防風人參木香黃耆官桂桔梗白芷檳榔厚朴烏藥紫蘇枳殼甘草各一錢上作一服水二盅煎至一盅食遠服神效烏金散治癰疽疔腫時毒附骨疽及諸惡瘡若瘡黑陷如石堅煩渴危篤者服此發汗瘡起火麻頭火日採木賊去節蛤蟆草頭小草烏頭樺皮節酥炙麻黃去根節蒼耳頭五月五日午時收上曬乾各等分同入銀器內鹽泥固濟炭火內從早煅至申分如黑煤色為度碾為末每服二錢病重者三錢用熱酒調下如修合此藥必擇天晴好日於靜室中勿令雞犬陰人見又名首功玄黑散奪命丹治諸般腫毒疔癖惡瘡蟾酥輕粉各半錢白礬枯寒水石銅緑乳香沒藥麝香各一錢硃砂三錢蝸牛二十個另研上為細末將蝸牛別碾爛入藥末同搗勻為丸如緑豆大如丸不就入酒糊些小每服一丸生蔥白三五寸病者自嚼爛吐於手心男左女右包丸藥在內用熱酒和蔥送下如重車行五七里汗出為效重者再服一二丸蟾酥丸治疔腫一切惡瘡蟾酥輕粉乳香沒藥各一錢蓮花蕊川烏硃砂各二錢半麝香半錢上為細末麵糊為丸如碗豆大每服一丸病重者服二丸依前法服之取汗托裡榮衛湯治癰疽疔腫及無名腫毒桂枝七分人參黃耆紅花蒼朮柴胡連翹當歸身羌活黃芩防風甘草炙各一錢上作一服水一盅酒一盅煎至一盅食前服托裡溫中湯治瘡為寒變而內陷者膿出清解皮膚涼心下痞滿腸鳴切痛大便微溏食則嘔氣短吃逆不絶不得安臥時發昏憒附子炮去皮二錢乾薑炮羌活各一錢半益智丁香沉香水香茴香陳皮甘草炙各一錢上作一服水二盅生薑五片煎至一盅食遠服內疏黃連湯治瘡皮色腫硬發熱而嘔大便閉脈洪實者黃連當歸芍藥檳榔木香黃芩梔子薄荷桔梗甘草各一錢連翹大黃各二錢上作一服水二盅生薑三片煎至一盅食遠服托裡散治一切惡瘡發背疔疽便毒始發脈洪弦實數腫甚欲作膿者大黃三錢當歸二錢栝蔞根皂角刺牡蠣朴硝連翹各一錢半金銀花赤芍藥黃芩各一錢上作一服水酒各一盅煎至一盅食遠服破棺丹治諸熱腫一切風熱瘡證發熱多汗大渴便閉譫語結陽之證大黃一兩半生半熟芒硝甘草各一兩上為細末煉蜜和丸如彈子大每服半丸病重者一丸至二丸食後童便入酒化服或白湯入酒化服亦可瀉心湯治瘡毒癰腫發燥煩渴脈實洪數者大黃四錢黃連山梔漏蘆澤蘭連翹黃芩蘇木各一錢半犀角一錢上作一服水二盅煎至一盅食遠服五香連翹湯治諸瘡腫初覺一二日便厥逆喉咽塞發寒熱乳香木通大黃各一錢半連翹沉香木香獨活桑寄生丁香射干升麻麝香甘草炙各一錢上作一服水二盅生薑三