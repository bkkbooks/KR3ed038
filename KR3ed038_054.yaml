吹之有狐臭人並月經見行婦人貓犬並不許入病人房洗瘡切勿以手觸著洗疽之方所傳甚多唯此方極效其用露蜂房有兒者以毒驅毒也去水膏治癰疽破穴後誤入皂角水及諸毒水以致疼痛糯米粉砂糖各三兩甘草生末一分上為膏攤在絹上貼毒水而出驢馬及尿糞一切毒水並皆治之麥門冬湯治癰疽潰後膿水不絶麥門冬去心黃耆銼五味子炒白茯苓去黑皮人參去蘆官桂去粗皮當歸切焙遠志去心川芎各一兩甘草炙三分上㕮咀每服五錢水一盞半入生薑半分擘碎大棗二枚擘破同煎至一盞去滓空心溫服清水膏治癰疽及一切毒腫堅硬腫痛攻衝四畔焮腫抽熱毒散腫氣羊桃根川大黃黃芩緑豆粉黃柏各一兩赤小豆上為細末用蕓薹菜取自然汁入蜜少許相和調藥令稀稠得所即看四畔腫赤處大小剪生絹上勻攤可厚一錢貼之干即易水調膏治癰疽毒熱赤焮疼痛川大黃生用研末杏仁去皮尖研鹽花各三分上為細末研勻以新汲水和令稀稠得所旋即塗腫上干即易之乳香丸治發背及一切疽瘡潰爛痛不可忍乳香別研沒藥別研羌活五靈脂獨活各三錢川芎當歸真緑豆粉交址桂川白芷白膠香各半兩上為細末煉蜜和丸如彈子大每服一丸細嚼薄荷湯送下手足損痛不能起者加草烏用木瓜鹽湯細嚼下漏蘆湯治疽作後二日服此退毒下膿可與五香連翹湯相間連日服之漏蘆有白茸者連翹大黃微炒黃耆去蘆生用沉香各一兩甘草生用半兩上為細末每服二錢水一盞半生薑三片棗一枚煎湯食前調服四虎散治發疽腫硬厚如牛皮按之痛天南星草烏頭半夏生用狼毒各等分上為細末醋蜜調敷留頭出氣沉香湯治石疽腫毒結硬口乾煩熱四肢拘急不得臥沉香防風去叉木香各三分麥門冬去心當歸切焙枳殼麩炒獨活去蘆羚羊角屑升麻玄參地骨皮赤芍藥甘草生銼各一兩大黃銼炒二兩上銼碎每服四錢水一盞半煎至七分去滓不拘時溫服漏蘆湯治附骨疽漏蘆去蘆升麻連翹麻黃去根節各一兩防己木香白蘞沉香各二分大黃銼炒一兩半上銼碎每服五錢水一盞半入竹葉七片煎至七分入芒硝一錢攪勻去滓空心溫服取利三兩行未利再服應痛丸治走注疼痛疑是附骨疽者蒼朮去皮當歸黑牽牛草烏頭炮各一兩上為細末醋糊為丸如小豆大每服三十丸空心醋湯下丹砂膏治瘭疽丹砂細研射干大黃銼炒犀角屑前胡去蘆升麻川芎黃芩去黑心沉香木香各一兩生地黃二兩麝香半分研豬脂二斤半上除丹砂麝香豬脂外銼碎以醋半升和勻浸一宿先熬脂令沸次下諸藥煎候地黃赤黑色以綿絞去滓入丹砂麝香末以柳篦攪勻瓷盒盛敷患處日三五上又取棗大以溫酒調空心日午服一方溫水調下半匙枳實湯治瘭疽枳實升麻射干熟地黃黃芩甘草各二兩前胡三分大黃一錢犀角六分麝香二分上㕮咀每服以水九升煮取三升下大黃一沸去滓內麝香分三服射干散治瘭疽皮肉中忽生點子如麻豆大或如桃李腫痛不可忍射干川升麻枳實麩炒川大黃銼微炒甘草生用各一兩麝香一分細研前胡去蘆一兩半羚羊角屑三分上銼碎入麝香令勻每服四錢水一中盞煎至六分去滓不拘時溫服防風湯治風毒中人留血脈不散與榮衛相搏結成風疽身體煩熱昏冒腫痛防風去叉柴胡去苗白芷麻黃去根節煎掠去沫焙木通銼當歸切焙羌活去蘆附子炮去皮臍桔梗炒甘草炙各一兩上銼如麻豆大每服五錢水一盞半煎至八分去滓食後臨臥各一服如欲出汗空心並兩服後以熱薑稀粥投蓋覆取汗慎外風海桐皮散浸酒方治熱毒風結成疽腫痛不得安海桐皮銼五加皮銼獨活去蘆薏苡仁炒防風去叉乾蠍炒杜仲去粗皮牛膝去苗酒浸各一兩生地黃焙三兩上㕮咀生絹囊貯以好酒一斗五升浸於瓷瓶中密封秋夏三日春冬七日取食前溫酒三合或四五合不拘時甚者常氣相續松脂膏治頭瘡經年月不瘥松脂黃連去須各三分黃芩苦參各一兩蛇床子一分大黃白礬枯各半兩水銀一兩半胡粉半兩合水銀入少水同研令無星為度上為細末研勻用臘豬脂調敷瘡上大效貝母膏治頭禿瘡貝母半夏生南星五倍子白芷黃柏苦參各二錢半虢丹煅一錢半雄黃一錢上為細末先以蜂房白芷苦參大腹皮荊芥煎湯熏洗拭乾即用蜜水調敷兩三次後乾摻藥加味平胃散治一切惡瘡頭上瘡上平胃散入膩粉清油調敷之甚妙螵蛸散治頭上生瘡俗曰黏瘡絶妙方海螵蛸二錢白膠香輕粉各半錢上為細末研勻先用清油潤瘡後摻藥只一上可治頭極癢不痛生瘡方鵓鴿糞五合上以好醋和膏煮三兩沸日二三次塗之氈礬散治腳爛瘡竹蛀屑氈燒灰紅棗燒存性黃丹白礬枯韶粉上等分為細末摻之龍骨散治腳疽並久遠惡瘡他藥不效者白龍骨二錢半研輕粉二錢半研檳榔一錢研獖豬糞不以多少新瓦上焙乾入火中燒令紅取出存性研為細末五錢上研和勻先以口含齏水或溫鹽湯洗令瘡淨見肉卻以真麻油調藥隨瘡大小敷之未愈再敷三五日可百草膏治腳面惡瘡如桐油浸淫延漫及治一切惡瘡不問乾溼痛癢日近年深百藥不瘥者上用羊糞二三十粒留瓦上四畔炭火燒煙住火箸鉗於地上以盞覆存性羅成白灰研細以紗片篩去沙土麻油調敷癢入輕粉痛入麝香少許即效神應散治足大指角急為甲所入肉便刺作瘡不可著履靴腳指濕爛婦人有此上用礬石一物燒汁盡取末著瘡中食惡肉生好肉細細割去甲角旬日即瘥一方加黃連少許同研摻之治腳指縫爛瘡上用鵝掌皮燒灰存性為末敷之治男子兩足瘙癢生瘡連年纍月俗為腎風瘡宜服此藥黃耆牛膝各半兩羌活獨活川芎防風木香白附子各一分白蒺藜一兩去刺上為細末煉蜜和丸如梧桐子大每服三十丸空心鹽湯送下仍以後方藥敷之檳榔木香防風白芷各二錢白芨一錢龍骨五分煅另研麝香一字另研蛇蛻一條燒灰膩粉十五個上為細末研勻先以鱔魚一條捶碎百部一兩切碎南椒三銖油一兩煎令得所去藥只以油搽瘡口卻敷末藥以上油紙裹之三日一換每上藥時先用柳枝甘草煎湯洗瘡淨拭乾敷藥雉腦膏治諸凍瘡久不瘥年年發歇先癢後痛然後腫破出黃水及血出不止雄雉腦一枚搗爛黃蠟各等分清油減半上同於慢火上熬成膏去滓瓷器盛每用塗瘡上柏葉膏治凍瘡手足指欲墮及耳欲落柏葉炙乾為末四兩杏仁去皮研四十粒頭髮一拳大食鹽半兩研乳香一分研黃蠟一兩油一升上先煎油沸次下前五味藥待發盡再下黃蠟攪勻瓷盒收先以熱小便洗瘡以綿挹干後以藥塗即以軟帛裹勿令寒氣侵入每日一換如瘡漸瘥三四日一換橄攬散治腳凍瘡上用橄欖核燒灰存性為末入輕粉油調塗拔毒散治毒瘡生於手指赤腫堅硬俗呼為髮指徹骨疼痛不可忍者乳香少許研泥蜂窠壁間採之研上為末用釅醋調塗干則以醋潤之痛立止治惡指諺雲天蛇頭蜈蚣一條火上燒上以煙燻病指一二次即安松脂膏治肉刺松脂白膠香各一兩黃蠟半兩上於火上熔成膏冷貼用物系定無食膏治肉刺無食子三枚肥皂莢一挺上燒令煙盡細研以釅醋於砂盆內別磨皂莢如糊和末敷之立效薰硫散治肉刺蟾酥五片湯浸濕膩粉一錢上將蟾酥於盆子中以膩粉同和令勻先用針撥破頭邊然後塗藥密裹之蛤蟆散治甲疽皮厚腫痛蛤蟆灰半兩黃連研末膩粉各半分蚺蛇膽麝香研雄黃研白礬枯研各五分鹿角七寸燒食熟細研杏仁十枚炒黑研如泥上研勻用臘豬脂調先以甘草蛇床槐白皮煎湯洗瘡拭乾敷藥以油紙外裹更以綿帛裹之三日其剩肉剩甲皆當自落三日一換白礬散治男子婦人血風毒氣攻手足指生甲疽瘡久不瘥者胬肉裹指甲疼痛出血不定用此縮肉乾瘡白礬石膽各半兩麝香騏麟竭硃紅各一分上將白礬石膽於鐵器內以炭火煅過入後三味同研令細每用少許乾摻瘡上以帛子纏定日兩三度換之蛇黃散治甲疽腫爛腳指甲邊胬肉出時瘥時發又治嵌甲生入肉常出血疼痛雄黃生用半兩蛇蛻皮燒灰存性一分上同研細先以溫泔洗瘡上軟以尖刀割去甲角拭乾敷藥以軟帛裹半日許藥濕即易一日即除痛便止一方用漿水洗淨以橘刺撥破患處淋洗貼藥雄蟬散治嵌甲雄黃通明者蟬蛻三個酥炙各為細末上研勻濕者乾摻乾者用津入輕粉少許調塗黃蠟膏治冬月手足坼裂上用清油半兩盞內慢火煎沸入黃蠟一塊同煎熔入光粉五倍子末少許熬令稠紫色為度先以熱湯洗火上烘乾即用藥敷以紙貼之其痛立止入水亦不落若合藥入粉多則硬而成塊旋以火炙勤挑敷不妨一方無五倍子治腳跟皸裂痛不可忍上用五倍子為末同牛骨髓調瓷器盛埋地中七日取出填縫中即安遇仙無比丸專治瘰癧白朮檳榔防風黑牽牛半生半炒密陀僧郁李仁湯泡去皮斑蝥去翅足用糯米同炒去米不用甘草以上各五錢上為細末麵糊為丸如梧桐子大每服二十丸早晚煎甘草檳榔湯送下服至一月覺腹中微疼於小便中取下癧子毒物有如魚目狀已破者自合未破者自消連翹湯治馬刀瘡連翹瞿麥各一斤大黃三兩甘草二兩上銼碎每服五錢煎服十餘日可於臨泣穴灸二七壯服五六十日效一方如大黃木通貝母各五兩雄黃七錢檳榔五錢不用甘草上為細末每服二錢食遠調服蝙蝠散治瘰癧多年不瘥蝙蝠一個貓頭一個上同燒作灰撒上黑豆煅其灰骨化碎為細末濕即乾摻干則油調敷內服五香連翹湯效白花蛇散治九漏瘰癧發於項腋之間或痛或不痛白花蛇酒浸去皮骨焙二兩生犀角二錢牽牛半炒半生一兩青皮五錢上為細末每服一錢入膩粉半錢研勻五更糯米飲調服巳時下惡物乃瘰癧之根也更候十日再服一服忌發風熱毒物已成瘡者一日可效四聖散治瘰癧服白花蛇散轉利後服此調之永去其根海藻洗石決明煅羌活瞿麥穗各等分上為細末每服二錢米湯調下清水盡為度螺灰散大田螺連殼燒存性上為細末破者干貼未破者香油調敷散腫潰堅湯治馬刀瘡結硬如石或在耳下至缺盆中或至肩上或於脅下皆手足少陽經中及瘰癧遍於頦或至頰車堅而不潰在足陽明經中所出或二瘡已破乃流膿水並皆治之臥時服藥斟酌病人飲食多少大便硬以意料之則可知母酒浸洗黃柏酒炒栝蔞根酒洗昆布桔梗以上各半兩廣朮洗炒京三稜酒洗炒連翹以上各三錢升麻六分黃連白芍藥葛根以上各二錢當歸梢柴胡甘草以上各半錢草龍膽四兩酒洗炒黃芩梢一錢半一半酒洗一半生上㕮咀每服六錢水二盞先浸多半日煎至一盞去滓熱服於臥處伸足在高處頭微低每噙一口作十次咽至服畢依常安臥取藥在胸中停畜也另攢半料作細末煉蜜為丸如緑豆大每服一百丸或百五十丸此藥湯留一口送下更加海藻半兩妙荔枝膏治瘰癧荔枝肉一兩輕粉麝香白豆蔻川芎砂仁各半錢硃砂龍骨血竭乳香各一錢全蠍五個上將荔枝肉擂爛軟米飯和為膏看瘡大小攤貼如有三五個者止去點為頭者妙治瘰癧上先於瘡上灸三壯然後用藥潰作瘡口用新活鱔魚截長一指大批開就掩在瘡口上少時覺瘡內癢急揭起魚覷魚上有細蟲如馬尾一節蟲出如卷三五次取盡蟲子後用斂瘡口藥龍腦乳香各一字麝香粉霜雄黃輕粉各半錢上為細末水糊為丸如小麥大每用一丸二丸紝在瘡口內覺腫痛是效瞿麥飲子治瘰癧馬刀並治瞿麥穗半斤連翹一斤上為粗末水煎臨臥服此藥經效多不能速驗宜待歲月之久除也治鼠癧貓兒頭一個燒灰麝香一錢上為細末清油調敷海菜丸治癧生於頭項上交接名蛇盤癧宜早治之海藻菜蕎麥炒白殭蠶微炒去絲嘴上等分為細末海藻菜旋炒研篩湯泡白梅取肉減半用所泡湯為丸每服六七十丸食後臨臥米飲送下其毒自大便內泄去若與淡菜連服為妙蓋淡菜生於海藻上亦治此病忌豆腐雞羊酒面日五六服治瘰癧不問有頭無頭者上用大蜘蛛五個曬乾細研酥調如面脂日二度敷之蜘蛛用屋簷頭結網者其他不可用又方用黃顙魚破開入篦麻子二三十粒在肚內以綿纏定於廁坑內放冬三月春秋二月夏一月取出洗淨用黃泥固濟文武火煨帶性爛研為末香油調敷及治臁瘡治瘰癧結核黃耆七分玄參八分苦參牛蒡子各九分枳實炒大黃羚羊角屑麥門冬去心各五分連翹人參青木香蒼耳子升麻茯苓甘草炙桂心朴硝各四兩上為細末煉蜜和丸如梧桐子大以酒下十丸日夜三四漸加至二三十丸以知為度忌生冷豬肉海藻菘菜生蔥酢蒜陳臭等物琥珀膏治頭項瘰癧初發如梅子腫結硬強漸若連珠或穿穴膿潰肌汗不絶經久難瘥漸成瘻疾並皆治之琥珀一兩細研丁香木香各三分桂心半兩硃砂細研白芷當歸木鱉子去殼防風去蘆木通各半兩黃丹七兩垂柳枝三兩松脂二兩麻油一斤二兩上除琥珀丁香桂心硃砂木香為細末余藥細銼以油浸一宿入鐺中以慢火煎候白芷焦黃漉出次下松脂末濾去滓再澄清油卻入鐺中慢火熬下黃丹以柳木萆不住手攪令黑色滴水中成珠不散看軟硬得所入琥珀等末攪勻瓷器盛用時看大小用火熁紙上勻攤貼蜂房膏治熱毒氣毒結成瘰癧露蜂房炙蛇蛻炙玄參蛇床子黃耆銼各三分杏仁一兩半亂髮雞子許鉛丹蠟各二兩上先將前五味銼細綿裹用酒少許浸一宿勿令酒多用油半斤內杏仁亂髮煎十五沸待發消盡即綿濾更下鐺中然後下丹蠟又煎五七沸即瀉出於瓷盆中盛取貼瘡上一日一換雞鳴散治氣癧疼痛及熱毒結核或多煩悶熱而不寒者牽牛一兩胡粉一錢大黃蒸二錢朴硝煉成粉者三錢上為細末每服三錢雞鳴時井花水調服以利為度如未利再服祛風丸一名何首烏丸治風毒瘰癧何首烏蒸干薄荷葉玄參各四兩為末精羊肉半斤皂角三十挺用十挺火燒欲過十挺塗酥炙去皮十挺水挼取汁去滓上以皂角水煮肉使爛細研和藥為丸如梧桐子大每服二十丸空心溫酒或薄荷湯送下一方煉蜜丸無羊肉食後溫水下檳榔散治氣毒瘰癧心膈壅悶不下飲食檳榔前胡去蘆赤茯苓牛蒡子炒各一兩人參去蘆枳殼去白炒沉香防風去蘆各半兩甘草銼炙一分上銼碎每服四錢以水一盞入生薑半分煎至六分去滓空心及晚食前溫服水紅花飲治瘰癧腫核結硬不消及膿汁旁穿不瘥上用水紅花不以多少一半炒一半生用粗搗篩每服二錢水一盞煎七分去滓溫服食後臨臥日三好酒調亦可又方治瘰癧已破末破或膿血淋漓其效如神牡蠣不以多少用灰深蓋上以三斤火煅候炭盡取半斤為細末甘草取末一兩上研勻每服二錢食前以和茗別點日二服忌魚酒鮓醬油鹽海味等物射干連翹湯治瘰癧寒熱射干連翹玄參赤芍藥木香升麻前胡山梔仁當歸甘草炙各一兩大黃炒二兩上㕮咀每服三錢水一盞煎七分去滓入芒硝少許食後溫服日再服栝蔞子散治瘰癧初腫疼痛寒熱四肢不寧栝蔞子微炒連翹何首烏皂莢子仁微炒牛蒡子微炒大黃微炒白螺殼梔子仁漏蘆牽牛微炒甘草生各一兩上為細末每服二錢匕食後溫酒調下黑靈散治漏瘡牡蠣粉虢丹硫黃研各一分露蜂房銼二分上同炒令煙盡為細末入發灰一分麝香少許和勻敷之馬齒莧膏治一切瘻馬齒莧陰乾臘月燭燼各等分一作臘月鼠灰上為細末以臘豬脂和先以溫泔清洗淨拭乾然後以藥敷之日三治漏瘡上以五倍子末和血竭末塞之治脅下生漏瘡如牛眼之狀膿水不止上以鹽少許安白牛耳內然後取耳中垢以敷瘡上即瘥如不用鹽即牛耳不癢難取垢海藻丸治癭瘤通用海藻洗曬川芎當歸官桂白芷細辛藿香白蘞昆布洗曬明礬煅各一兩海蛤煅松蘿各七錢半上為細末煉蜜和丸如彈子大每服一丸食後含咽下守癭丸治癭瘤結硬通草一兩杏仁去皮尖研牛蒡子各一合昆布洗射干訶黎勒海藻洗各四兩上為細末煉蜜和丸如彈子大每服一丸食後噙化日三海藻酒方治頸下卒結核漸大欲成癭瘤上用海藻洗去鹼一斤酒二升漬一宿取一二合飲之酒盡將海藻曝乾搗末酒調一錢匕日三即瘥如浸用絹袋盛了漬春夏二日秋冬三日木通散治頸下卒生結囊欲成癭木通松蘿桂心蛤蚧酥炙白蘞琥珀海藻洗昆布洗各一兩上為細末每服二錢不拘時溫酒調下治忽生癭疾及一二年者上用萬州黃藥子三斤須緊重者為上如輕虛即是他州者力慢須加一倍以無灰酒一斗投藥在內固濟瓶口以粳火燒一伏時停待酒冷即令患者時時飲一盞勿令絶酒氣經三五日常把鏡自照覺消則停飲不爾令人項細也用火時不可多惟燒酒氣香出瓶頭有津即止火不待經宿也已驗如神忌毒食五癭丸菖蒲二兩海蛤白蘞續斷海藻松蘿桂心倒挂草蜀椒半夏各一兩神麯三兩羊靨百枚上為細末以牛羊脂髓為丸如芡實大每服一丸食後及臨臥噙化服白頭翁丸治氣癭氣瘤白頭翁半兩昆布十分洗通草海藻洗各七分連翹玄參各八分桂心三分白蘞六分上為細末煉蜜和丸如梧桐子大每服五丸用酒送下忌蒜面生蔥豬魚針砂方治氣癭上用針砂浸於水缸中平日飲食皆用此水十日一換針砂服之半年自然消散昆布散治癭氣結腫胸膈不利宜服昆布洗海藻松蘿半夏湯泡細辛海蛤細研白蘞甘草炙各一兩龍膽草土瓜根檳榔各二兩上為細末每服二錢食後溫酒調下治癭氣胸膈壅塞頸項漸粗宜服此方商陸昆布洗各二兩射干羚羊角鎊木通海藻洗杏仁湯浸去皮尖麩炒黃各一兩牛蒡子一兩半微炒上㕮咀每服三錢水一中盞入生薑半分煎至六分去滓不拘時溫服治癭氣神驗方琥珀桔梗各半兩烏賊魚骨昆布洗各一兩赤小豆酒煮熟焙小麥酒煮各三分上為細末煉蜜和丸如小彈大綿裹一丸常噙咽津冰黃散圍腫毒犀角屑大黃白芨草烏皮尖白蘞麝香朴硝各等分上為細末蜜醋調薄攤油紙上貼之稍干揭下再添潤濕貼之即消外用潰毒藥治諸腫毒堅硬不消升麻葛根黍黏子地骨皮金銀花黃花地丁甘草各等分上為粗末每用五七錢水一升煎十沸於腫處四畔熱用冷則再暖加味消毒飲子治搭腮腫防風荊芥連翹牛蒡子羌活甘草各等分上為粗末水煎三兩服散毒然後用藥塗腮腫處切不可便用藥塗毒氣入喉中不救圍腫方草烏白芨白蘞黃柏朴硝各等分上為末用蜜醋調圍腫外即便收起內托散治諸腫毒惡瘡一服立愈大黃牡蠣各半兩栝蔞二個山梔子亦可甘草三錢上銼碎每服三錢水一大碗煎七分去滓溫服治無名腫毒或背疽治法腫圍定名藏井欄芙蓉葉重陽前收蒼耳端午前收燒灰存性上為末以蜜水調敷之神效方治痄腮及癰疽發背瘡疥等證並皆治之上以赤小豆為細末以新汲水調敷瘡上及四邊赤腫處干則再敷之犀角升麻湯治陽明經絡受風熱口唇頰車髮鬢腫痛及鼻額間連頭痛不可開口雖言語飲食亦相妨犀角七錢半川升麻半兩防風黃芩各三錢半香白芷白附子川芎各二錢半羌活三錢一字生甘草一錢半上㕮咀都作一服水五盞煎至三盞半去滓分作三服一日一服訖其證必減如臟腑有些溏不妨足陽明胃經也經云腸胃為市又云陽明多血多氣胃之中腥膻五味無所不納如市塵無所不有也六經之中血氣俱多腐熟飲食之毒聚於胃故此方以犀角為主飲食之毒陽明經絡環唇挾口起於鼻交額中循頰車上耳前過客主人循髮際至額顱昔王公患此一經亦以升麻佐之余藥皆滌除風熱升麻黃芩專入胃經故用有效如冰散治風邪熱毒壅滯肌肉榮衛不宣蘊積成腫血澀膚腠如丹之狀風隨氣行遊無定處邪毒攻衝焮赤熱痛朴硝五兩另研寒水石蛤粉各三兩白芷一兩片腦一錢另研上為細末研勻每用新汲水調稀稠得所以雞翎塗掃不令藥干治一切赤腫但癰毒結末成者並可消上用黃蜀葵花子不拘多少研細滴水令稀稠得所將絹帕子裹定旋挹所餘汁撲腫所四畔數撲之犀角飲治諸風腫犀角一錢玄參連翹柴胡去苗各半兩升麻木通銼各三分芒硝生用麥門冬去心各一兩沉香檀香射干甘草炙各一分上銼碎每服一錢匕水一盞半煎至八分去滓食後溫服及夜食後各一服利多即減一名犀角湯無檀香尉風散治諸瘡因風致腫羌活防風白芷吳茱萸細辛當歸芍藥芫花官桂各等分上為粗末作一劑赤皮蔥連須細切半斤同釅醋拌勻炒令極熱帛裹於瘡上尉之稍冷即換藥尉之上下痛止蠶砂尉方治風腫晚蠶砂鹽各不拘多少上相和炒熱布裹尉之冷即再炒或入醋少許尤佳拔毒散治熱毒丹腫遊走不定石膏生用四兩寒水石生用四兩黃柏甘草各一兩上為細末以新水調掃之或紙花子小貼尤妙涼水潤之水澄膏治熱腫痛大效大黃黃柏鬱金天南星白芨朴硝黃蜀葵花各一兩上為細末每用新水一盞半藥末二錢攪調勻候澄底者去浮水以紙花子攤於腫焮處貼之如急燥津唾潤之此藥除熱毒赤腫神效如皮膚白色者勿用之十二件單方治丹毒或得一物瘥水苔生地黃生松葉蒴蓼葉慎火草浮萍草豆豉水和大黃水和梔子水和黃芩水和硝石豆葉上一十二味但得一味搗以貼之即瘥赤小豆末和雞子塗之無雞子水和用之療灶丹從兩腳亦如火燒上用五加葉燒作灰五兩取煅鐵家槽中水和塗之治丹毒瘤蜈蚣一條乾者白礬如皂子大雷丸一個百部二錢上為細末醋調塗之除濕散大治一切風毒疥癬癩癢狀如風癩苦參何首烏荊芥穗蔓荊子薄荷各一兩白芷天麻川芎防風並生用烏蛇酒浸一宿焙乾各半兩上為細末每服三錢茶酒調下無時日進三服六日一浴令汗出血氣宣通一月膚澤如故苦參丸治遍身瘙癢癬疥瘡瘍苦參四兩玄參黃連去須大黃銼碎炒香獨活去蘆枳殼去穰炒防風去叉各二兩黃芩去黑心梔子菊花各一兩上為細末煉蜜為丸搗千餘下丸如梧桐子大每服三十丸食後漿水下日進三服茶酒任下亦得八仙散治遊風腫癢疥癬瘡或因洗頭遊風瘙癢生瘡細辛荊芥白芷川芎黃芩防風地骨皮甘草各等分上為粗末每用藥二兩水二碗煎十沸去滓熱溻患處一掃散治疥癬防風荊芥苦參地骨皮薄荷甘草各等分上為細末煉蜜為丸如梧桐子大每服五七十丸空心用茶清送下或為散涼蜜水調下不過三五服即痊可大人用每服三錢治遍身瘙癢明目爽神威靈甘草石菖蒲苦參胡麻何首烏藥末二錢酒一碗渾身瘙癢一時無四生散治腎臟風疥癬等瘡及眼目昏花視物不明白附子下注生瘡用黑附子黃耆沙苑蒺藜羌活各二兩上為細末每服二錢空心鹽酒調下若於豬腰子切開夾藥在內合定拴住紙裹煨熟尤妙又有患赤眼睛痛不可忍臨睡一服目及大痛至二鼓時乃得睡更三四服大愈再有頑癬經年服藥貼藥俱不效後得此藥三四服盡除此方治人腎臟風及眼疾頑癬無不效疥藥神效散治乾溼膿窠諸種疥癬等證有效檳榔蛇床子各一兩全蠍半兩明硫黃一兩半上化開硫黃入荊芥末三錢滾數沸候冷加輕粉二錢冷再碾末加三奈半兩妙上為細末先將小油滾過候冷調上藥擦瘡上仍以兩手搓藥聞藥氣神效一上散治諸般疥癬必效雄黃通明手可碎熟硫黃黑狗脊蛇床子炒各半兩寒水石六錢斑蝥三個去翅足研碎上另研雄黃硫黃寒水石如粉次入斑蝥和勻蛇床黑狗脊另為細末同研勻洗疥癬令湯透去痂油調手中擦熱鼻中嗅三兩次擦上可一上即愈如痛甚腫滿高起者加寒水石一倍如不苦癢只加狗脊如微癢只加蛇床子如瘡孔中有蟲加雄黃如喜火炙湯燙者加硫黃只嗅不止亦可愈治一切男子女人渾身疥癬一家染易經年瘙癢不效者百部半兩碎切亂髮木香碎切檳榔捶碎苦參碎切各一分川椒三銖鯽魚一個不要見水切成片上以油五兩煎前藥得所去藥卻用麝香一分膩粉一錢硫黃雄黃各半兩同研令勻入在油內更煎攪五七沸瀉出瓷器盛之非時使也五龍膏治疥癬硫黃白礬白芷吳茱萸川椒各等分上為細末煎油調塗之赤小豆散治乾溼疥赤小豆三合炒乾內醋中如此七次升麻薏苡仁黃耆銼各三分人參白蘞瞿麥穗當歸切銼黃芩去黑心豬苓去黑皮防風去叉甘草炙各半兩上為細末每服三錢匕空心粥飲調下日二夜一當歸飲子治心血凝滯內蘊風熱發見皮膚遍身瘡疥或癢或痛或膿水浸淫或發赤疹㾦癗當歸川芎白芍藥生地黃防風白蒺藜荊芥穗各一兩何首烏黃耆甘草各五錢上為細末每服四錢水一盞半生薑五片煎八分去滓不拘時溫服若於浴堂內服此藥就用胡桃七個去皮細嚼下飲酒一盞出汗神驗一笑散治渾身疥癩瘙癢生惡瘡檳榔藁本硫黃蛇床子枯礬五倍子白膠香各等分上為細末濕者干敷乾者香油調敷如頭上瘡便搽上不用剃甚者不過三五次平復如故神捷散治諸疥瘡吳茱萸白蒺藜各一兩白蕪荑仁輕粉各半兩赤小豆四十九粒石硫黃少許研上為細末研勻每用半錢匕生油調於手心內摩熱後遍揩周身有疥處便睡睡覺其疥自愈殺疥藥羊蹄根生切一兩草烏頭一個硫黃一錢白礬半錢生薑一分上以米泔淹一宿研極細入釅醋和勻入浴時抓破瘡敷之遲頃以溫湯洗去絶妙治疥神效狼毒細辛水銀各一錢輕粉半錢上為細末油蠟和劑作兩丸綿裹兩手將於周身疥多處擦之備急葛氏療疥瘡方上取楝根削去上皮切皂角去皮子等分熟搗下篩脂膏和搔疥去痂以塗之護風勿使女人小兒雞犬見熏疥方明信雄黃各半錢椒末一錢上研細用紙以方尺熟艾攤平摻勻捲成長錠瓦兩口合紙卷子火點慢慢煙燻被下緊擁衾被油塗眼耳目鼻小兒只空衣蓋被臥亦效宜淨室溫床緊擁衾被無令透煙以熏至其人口鼻為效丁香散治一切癬丁香研蛤蟆灰各一兩麝香一分研白礬熬令汁枯研五倍子研膩粉研各半兩上研勻干敷癬上以瘥為度胡粉散治一切癬瘡瘙癢甚者胡粉另研雄黃另研硫黃另研各一分大草烏一個生用斑蝥一枚砒半分蠍梢七枚麝香少許上為細末先用羊蹄根蘸醋擦動次用藥少許擦患處銀粉散治一切頑癬輕粉黃丹瀝青白膠香各等分上為細末麻油調拭淨或抓破竹篦挑搽二次便乾數次剝去殼也治牛皮癬如神水銀膏治一切癬水銀一分蕪荑仁研末薑黃研末各半兩酥二兩上先將酥和水銀以柳椎研攪候水銀散即下蕪荑薑黃末攪勻瓷盒盛旋取塗癬上日三兩次三神丸治一切癬蒺藜炒海桐皮銼草烏頭鹽炒取去鹽不用各一兩上為細末麵糊和丸如緑豆大每服十丸至十五丸溫酒鹽湯任下治癬神效方藜蘆根半兩輕粉二錢半上為細末涼水調搽癬上治癬積年不瘥者上用斑蝥一個去頭翅足以針劄燈焰上燒米醋內淬如此三兩次就燒成存性黑灰研為細末用紅棗一枚湯泡剝去皮核與斑蝥一處同研爛先以手抓或生布擦動癬然後搽藥不可侵好肉恐有毒半夏散治一切癬上以半夏三兩搗為末以陳醬汁調和如糊摩塗癬上日兩三度即瘥治頸項及面上白駁浸淫漸長有似癬但無瘡可治上以鰻鱺魚脂敷之先拭剝上刮使燥痛後以魚脂敷之一度便愈甚者不過三度東坡先生家藏方決明子不以多少為細末上用水銀輕粉少許與藥末同研為膏散以物擦破癬上用藥敷之立瘥一抹散治乾癬不瘥天南星草烏頭各一枚生用上為細末用牛蹄根搗絞取汁調塗不過三上瘥治乾癬積年生痂搔之黃水出每逢陰雨即癢方巴豆十枚肥者上於炭上燒之令油出盡即於乳鉢內以少許酥和研如膏薄塗之不過一二度愈治濕癬方黃連明礬煅各半兩胡粉黃丹水銀各二錢上為細末用豬脂油一兩夾研令水銀星盡敗瓷盒收用螺殼散治濕癬癢不可忍螺殼一兩亂髮灰龍腦胡粉研各半兩上為細末研勻以油澱和塗之荊芥散治多年濕癬荊芥穗不拘多少以瓦罐子盛鹽泥固濟只留一竅用炭火燒候出清煙便撥去火用濕紙塞了竅子放冷取出研為細末半兩麝香一錢膩粉五錢上研勻先以口含鹽漿水抓洗瘡令破帛子搵幹了以生油調藥敷之八寶散治風癩松皮頑癬久不瘥者神效豫一鄉人患此疾數年不愈後忽有舊親傳此方試用有效藿香破故紙檳榔大腹皮雄黃輕粉硫黃白礬枯各一兩上為細末小油調擦日上三五次癢則擦之定粉膏治乾溼癬風癬不拘年月定粉水銀蕪荑胭脂各一分上同研勻用陳豬脂一兩同研成膏先用湯洗後以膏子臨臥塗之一上便瘥本法豬脂須用三年以上者今若無但陳者亦可仍用後方淋洗橡實半升如無實以根皮代之楝葉及嫩枝細銼凌霄花及藤銼細各一升枳殼去穰蛇床子地榆丹參皂莢苦參並細銼各三兩上同煎濃汁熱洗患處五倍子散治癬久不瘥五倍子一兩火燒令煙盡黃柏銼當歸銼炒膩粉漏蘆白礬煅各一分上為細末先用鹽漿水洗拭乾敷之黃連膏治一切久癬積年不瘥四畔潛侵復變成瘡瘡疱赤黑癢不可忍搔之出血黃連去須黃柏去粗皮豉細研蔓荊子杏仁湯浸去皮尖雙仁細研各半兩水銀一錢上先以水銀於掌中唾研如泥次入乳鉢內下生油一合和勻次入藥末同研成膏瓷盒盛日三五度塗瘡上浴毒湯治小腸風陰瘡癢痛木通藁本枳殼貫衆白芷荊芥甘松薄荷上銼碎用藥二兩水五升入芒硝半兩煎至三升去滓熱洗浴瘡陰瘡膏治男女陰瘡米粉一酒杯許芍藥黃芩牡蠣附子白芷各十八銖上㕮咀以不入水豬膏一斤微火上煎三上三下候白芷黃膏成絞滓去內白粉和敷瘡上七寶檳榔散治下元玉莖上或陰頭上有疳瘡漸至食透久不愈者檳榔雄黃輕粉密陀僧黃連黃柏朴硝上為細末和勻先以蔥白漿水洗淨軟帛掩干如瘡濕乾摻如干小油調塗玉粉散治下陰瘡疼不止滑石密陀僧寒水石煅各半兩膩粉麝香各少許上為細末油調敷或干貼患處全蠍散治腎臟風發瘡癢全蠍三枚焙明硫黃二錢研生虢丹一錢輕粉半錢雞心檳榔一大個破開以好黃丹一錢合在內濕紙裹煨麝香少許上為細末研勻瓷盒收每用少許麻油調抹兩掌先以鼻嗅男以兩掌掩外腎女以兩掌掩兩乳各睡至醒次日依前再用藥屢效牡蠣散治陰囊兩旁生瘡或陰濕水出其癢甚苦夜則抓之無足後必自痛或兩腋汗腳板心汗濕無可奈何此藥生之豫親得此證受苦數十年得此方隨用二三日如法擦之二十年餘不發實為善效牡蠣黃丹炒各二兩枯白礬四兩上為細末遇夜睡時用手捏藥於陰癢處痛搽之不一時又搽之三四次後頓減次夜再搽雖大減又搽後自然平復如腋汗亦有頓搽方可肢汗先搽後裝藥靴或鞋底上腳板上塗藥纏腳裹之亦可蚯蚓散治陰莖瘡蚯蚓二分豆粉一分上用水研塗上干又敷之一方用豉一分石灰膏治腎漏陰囊先腫後穿破出黃水瘡如魚口能致命上用五倍子同石灰炒黃色去灰攤地出火毒砂盆內研細末不犯銅鐵乾摻瘡上五七次可丹胞散治玉莖上生瘡臭爛者上以豬肚一個連尿去一半留一半用新磚兩口炭火煅新磚將豬胞連尿於磚上焙乾不住手一向移放於兩口磚上輪流不歇莫與火煅過胞以尿干為度研為末入黃丹一錢先用蔥湯以鵝毛抹洗以舊綿帛滲干此藥摻三五次立見效地連散治玉莖上生瘡上用地骨皮煎湯洗以訶子連核燒存性為不幹摻川連散治下部注瘡上以宣連為細末漿水調成餅攤於碗麵上內用艾及穿山甲三片燒煙覆碗熏成黑色再取下如是者五次以黃連餅黑色為度地上出煙毒再研細濕則干塗干則清油調塗三四次先用黃柏藿香茵陳煎湯溫洗神妙方治莖頭三五孔小漏瘡出血微膿上用油發燒作灰存性研細敷之干則津唾調敷仍以米湯調發灰食前服治穀道中瘡上以水中荇葉細搗綿裹內下部日三小浴方治虛勞陰濕癢生瘡川椒苦參蛇床子各一兩半香附子白礬白芷狗脊細辛各一兩桂心三分上㕮咀每用藥一兩以水三升煎至二升去滓傾入盆子內但乘熱氣坐盆子上熏之良久通身便洗患處甚者不過三兩度沐浴長春散治男子下元陰濕久冷陰囊左右夜癢抓之則喜住之則痛成瘡流水為害甚苦此藥見效及治婦人下部陰濕胎元久冷牡蠣蛇床子破故紙紫稍花官桂乾荷葉各等分上㕮咀每用一兩半水一小鍋入蔥白數莖煎至八分去滓先熏後洗卻用後藥枯礬一兩黃丹蛤粉各半兩上研細末熏洗後以後捏藥末搽濕癢處銅緑散治男子婦人陰部濕淹瘡銅緑少許白礬一錢乳香半錢輕粉一字五倍子細研半兩上為細末洗淨摻之青黛散治下部生濕瘡熱癢而痛寒熱大小便澀食亦減身面微腫因多食魚蝦發風熱物得之上用馬齒莧四兩研爛入青黛一兩再研勻塗上立有神效仍服八正散日三服麝香散治妒精瘡癢而濕者麝香黃礬青礬各等分上為細末小便後用些少敷之治陰濕生瘡黃水流注白礬不以多少上研為末先以冷水洗瘡淨然後敷之津調散治妒精瘡膿汁淋漓臭爛黃連款花各等分麝香少許一方不用上為細末先以地骨皮蛇床子煎湯洗軟帛拭乾津調敷之忌生湯洗洗毒湯治陰蝕瘡苦參防風露蜂房甘草炙各等分上㕮咀水煎濃汁洗瘡胭脂散治陰瘡坯子胭脂真緑豆粉各等分上同研勻敷之蛤蟆散治陰濕欲盡瘡痛甚者蛤蟆一枚燒灰兔糞一兩上同研細每用少許敷瘡上日三四度截疳散治年深疳瘻瘡大效白芨白蘞黃丹密陀僧各一兩黃連半兩輕粉一錢片腦麝香各半錢上為細末和勻每用或摻或紝瘡中以膏藥貼之甘石散治下部疳瘡爐甘石密陀僧各一錢半輕粉一分橡斗子燒灰存性二錢龍骨半錢麝香少許上為細末先用荊芥杜仲川椒煎湯放溫浴洗罷然後用藥一捻干貼金銀花散治下疳瘡金銀花荊芥朴硝蛇床子甘松白芷檳榔各一兩上㕮咀每用五錢水五碗加蔥白二根同煎數沸盆盛水先熏後洗卻上藥梔子散治下疳瘡上用梔子一個去穰裝入明礬末麵糊合口火燒存性為末洗淨乾摻上隨效銀粉散治下疳陰頭生瘡上用牆上白螺螄不以多少火內煅酥為末於水內飛過去土石粗者次用輕粉隨分兩入在藥內每用少許干貼在瘡上治下疳瘡上以孩兒茶研為細末先洗淨干則小油調敷濕則乾摻之神效消毒膏治五發惡瘡消腫散毒黃耆當歸川芎杏仁白芷白蘞零陵香槐白皮柳枝嫩者木鱉子仁甘松各半兩乳香沒藥各三錢麝香硃紅硃砂各半錢黃丹炒紫色黃蠟各半斤芝麻油一斤輕粉一錢上將藥銼碎油浸七日木炭火上煎杏仁焦色濾去滓下黃蠟候熔開出火下丹急攪百十轉下乳沒麝等六味不住手攪至凝瓷器內收貯白光絹攤貼之烏龍德生膏治一切惡瘡腫毒及治小兒脾癖堅硬等疾黃耆青木香連翹木鱉子去殼油玄參生地黃桃仁去皮尖金銀花防風川芎白芷羌活白芨白蘞各二兩亂髮一握燒灰萆麻子三百枚去殼桂花頭半兩五香連翹散人參敗毒散復元通氣散十奇內補排膿散各半兩一貼上將前藥㕮咀用小油三斤半入鐵鍋內先浸五日卻用慢火煎至藥黃黑色以槐柳條一握不住手攪再用重絹濾去滓稱淨油三斤先將黃丹一斤半炒黑色下小油一處於慢火上再熬得所滴入水中不散成珠下後藥雄黃血竭乳香密陀僧沒藥輕粉龍骨楓香各半兩麝香一錢加蘇合油半兩甚妙上研為細末入前膏內化開攪千餘遍令勻又試水中得所成膏藥可攤為度如堅少加小油如軟加黃丹須要攪勻成膏切忌雞犬婦人孝子見須誠心靜意修合如小兒諸癖脾疳等證量病堅硬大小用紙或緋絹攤貼候藥力盡自脫下再換小兒疳瀉痢證貼在肚上咳嗽貼脊梁中心其病自愈摩風膏摩風止癢消腫定疼治頭面唇鼻諸瘡肌肉裂破當歸去蘆白芷杏仁去皮尖桃仁去皮尖藿香去土檀香零陵香川芎各三錢沉香木香白附子天麻獨活白芨白蘞各一錢半黃耆去粗皮一兩一錢防風茅香白芍藥甘草各二錢半木通二錢栝蔞穰銼一兩龍腦四錢研黃蠟夏十二兩半冬九兩半上銼藥用清油二斤二兩浸七日淨石器銀器中慢火煎候白芷微黃綿濾去滓於淨瓷罐內密封澄一宿再濾過於瓷碗中慢火再輕溫熬動次下黃蠟攪勻放溫次下研細龍腦摻面於瓷盒內盛每用少許摩擦患處太乙靈應膏治諸般惡毒惡瘡並可外貼內服一丸如櫻桃大蛤粉為衣各隨幾項飲子服之亦治杖瘡玄參大黃官桂生地黃白芷赤芍藥血竭乳香以上各半兩紅花黃柏地榆防風沒藥以上各三錢槐花黃芩各二錢豬牙皂角三挺羌活四錢白膠香劉寄奴各四兩杏仁二十一枚去皮尖當歸尾一兩上銼碎以香油一斤浸春五夏三秋七冬十日浸畢用文武火熬藥枯焦如炭然後退火令其自冷將粗布一幅濾去滓將油再入鍋內熬先以黃丹十兩新瓦上炒丹紫色研細每熬油一沸入丹二兩熬至五沸入丹畢前後俱用柳條攪之待滴水中凝而不散方成膏待藥溫用瓷器盛貯下用水浸三兩日去火毒然後攤貼患處內服藥引子見神仙太乙膏下神仙太乙膏治八發癰疽及一切惡瘡軟膝不開年月深淺已未成膿並宜治之蛇虎傷蠍螫犬咬傷湯火刀斧所傷皆可內服外貼如發背先以溫水洗瘡淨軟帛拭乾卻用緋帛攤膏藥貼瘡即用冷水下血氣不通溫酒送下赤白帶下當歸酒下咳嗽及喉閉纏喉風並用新綿裹膏藥置口中含化一切風赤眼用膏捏作小餅貼太陽穴後服以山梔子湯送下打撲傷損外貼內服橘皮湯下腰膝痛者患處貼之內服鹽湯送下唾血者桑白皮湯下諸漏先以鹽湯洗淨諸瘡並量大小以紙攤貼每服一丸如櫻桃大蛤粉為衣其膏可收十年不壞愈久愈烈一方久遠瘰癧同上瘻瘡鹽湯洗貼酒下一丸婦人血脈不通甘草湯下一切瘡癤並腫痛瘡及疥勞別煉油少許和膏塗之玄參白芷當歸赤芍藥肉桂去粗皮大黃生地黃各一兩上銼碎用麻油二斤浸春五夏三秋七冬十日火熬黑色濾去滓入黃丹一斤青柳枝不住手攪候滴水中成珠不黏手為度傾入瓷器中以磚蓋口掘窖子埋陰樹下以土覆三日出火毒欲服丸如雞頭大透骨金絲萬應膏木鱉子牛膝研各一兩自然銅紫花地丁切白龍骨研當歸各半兩川烏三粒切破萆麻子二兩切碎金剛骨九錢切以上藥用小油一斤浸一宿慢火煎後入桃柳槐枝同熬藥焦綿濾去滓入黃丹六兩熬二沸次入白膠香半兩乳香一兩雄黃白丁香密陀僧沒藥各一錢上研細同熬勻再以綿濾過看硬軟取之收貯用時隨瘡大小紙上攤貼青龍五生膏治癰疽痔瘻惡瘡膿血出者生桑白皮生青竹茹生柏白皮生梧桐白皮生龍膽草以上銼碎各五兩蜂房蝟皮蛇蛻皮雄黃雌黃以上各一兩附子川芎蜀椒各五分上㕮咀以三年苦酒二斗浸一宿於炭火上炙乾搗篩以豬脂二升半微火煎攪令相得如飴著冷水中新白瓷器盛稍稍隨病深淺敷之並以清酒服棗核大日一服白龍膏治五發惡瘡及湯潑火燒凍破潰爛止痛生肌清血脈消毒散腫通氣脈如神可無瘢痕白薇白蘞白芷桑白皮黃耆商陸根柳白皮各一兩乳香二兩研輕粉半兩研定粉半斤研黃蠟半斤研杏子油一斤如無麻油代之上藥銼油內揉浸三日於木炭火上煎白芷黃色濾去滓於油內下黃蠟乳香候熔開出火再濾候微冷下輕粉急攪至冷瓷器收每用緋絹攤貼膏藥方治諸瘡腫毒一丹二油巴三五輕粉麝香加沒乳琥珀硃砂石器碎七味將來同少許文武火上用心熬苦杖攪來如狼虎不問諸瘡並腫毒貼上如同神鬼取膏藥方桃柳冬青淡竹黃枸杞松槐更及桑當歸柴胡香白芷二十四氣為正量黃丹二兩油加倍湯火之中要相當乳香沒藥加些子切莫輕信亂傳方神異膏治發背癰疽諸般惡毒瘡癤其效如神治疽疾先以麥飯石膏塗付俟其瘡根腳漸收止於徑寸大卻用神異膏貼之收口此藥隨其人病深淺取效合時不可與婦人雞犬貓厭穢物見之玄參半兩綿黃耆三分杏仁去皮尖切一兩全蛇蛻鹽水洗焙半兩男子亂髮洗淨焙乾半兩露蜂房淨銼一兩用有蜂兒者為妙黃丹飛羅細五兩真麻油一斤上將麻油同發入銀銚中文武火熬候發焦熔盡以杏仁投入候變黑色用好綿濾去滓再將所熬清油入銚內然後入玄參黃耆慢火熬一二時取出銚子安冷爐上半時久火力稍息旋入露蜂房蛇蛻二味將柳枝急攪卻移銚於火上不住手攪慢火熬至紫黃色用綿濾過復入清油在銚內乘冷投黃丹急攪片時又移銚於火上以文武慢火熬不住手柳枝攪千餘轉候藥油變黑色滴於水中凝結成珠則是膏成就若珠子稀再熬少時必候其得所然後瓷器內收封待用或恐偶然熬火太過稍硬難於用卻少將蠟熬麻油在內以瓷器盛封蓋於甑上蒸乘熱攪調收用膏藥熬成了須連所乘瓷器置淨水中出火毒一晝夜歇三日方可用日換兩次夜換一次熬此膏藥極難於火候須耐煩看火緊慢火猛則藥中火發不特失藥性又傷人面目救助不及千萬謹戒膏藥方甚多不下數十治疽之時神效無出於此方千金不換杖瘡尤妙白玉膏治縮收癰疽不令延蔓切忌用涼藥杏仁二十一粒去皮尖別研川椒四十九粒去目炒出汗為末清油一兩酒蠟半兩上用熬至紫黑新綿濾過用無灰薄紙看瘡大小剪作梳樣攤藥在上於瘡暈盡處兩邊圍繞貼之候暈漸收近里即別剪差小者再攤藥圍貼暈又收即又再移近里貼仍頻換候暈已收見瘡根腳成瘡口即用次方凡貼大惡瘡毒氣方盛不可以藥當上貼恐趕散毒氣瘡益大此藥能收暈見瘡其法大妙水晶膏治疔瘡背疽瘤疽奶癰丹毒杖瘡等疾好白油單紙十張每張剪作八片黃連一兩去須切細上用水兩碗砂鍋以黃連煎至一碗半先下油單紙五張又續下五張同剪五七百沸湯耗旋添不得犯鐵器漉起擦去黃連滓屑焙乾如瘡破有膿將藥花旋鬆貼如杖瘡約度大小恰將剪貼不可過大先將周回剪下油紙燒灰熱酒調嚼生薑湯下次貼藥不得犯女人手十香膏治風毒瘡腫癰疽於贅瘤癭沉香銼檀香銼鬱金銼松香丁香銼木香研龍齒研蘇合香白膠香研薰陸香各半兩麝香一分黃丹六兩麻油一斤上先將沉檀鬱金丁松五味油內浸七日入鐺中以少炭火溫養五日後用武火煎二三十沸漉去香綿濾過淨拭鐺卻下油於內下丹以柳木枝不住手於火上攪候色黑滴水中如珠軟硬得所去火入後木香等末六味入膏中攪三五百遍膏成安瓷盒內以軟帛攤貼日二換之止痛膏治一切癰疽發背潰後日夜疼痛排膿當歸鹿角膠各一兩半白芷密陀僧研鹽花硃砂研各一兩川芎藁木各一兩桂心細辛黃蠟膩粉乳香研各三分麝香一分研黃丹五兩麻油一斤上將油安鐺內煉沸下當歸等煎候白芷赤焦色綿濾去滓淨拭鐺仍下藥油依前慢火熬下蠟丹不住手以柳木枝攪候色黑次下密陀僧鹿角膠鹽花次下膩粉次下乳香次下麝香硃砂等慢火熬攪候藥黑色即滴水內如軟硬得所藥成入銅罐中待凝於淨地上安一宿以物蓋之出火毒每用故帛上攤貼日再換生肌膏治一切癰疽發背潰後肌肉不生亂髮松脂薰陸香各半兩故緋帛一尺燒灰故青帛一尺燒灰黃蠟一兩黃丹六兩上以油一斤先煎一兩沸內發煎令消盡然後下蠟松脂薰陸香青緋帛灰煎攪令煬以綿濾去滓卻入鐺中下丹以火煎攪令黑色軟硬得所貯瓷器中少許塗於楸葉上貼日二易之拔毒膏治臁瘡漏瘡一切惡瘡上用黃丹不拘多少以苦竹園中地龍泥裹包火煅令紅取出放冷去泥細研和以輕粉麻油調如膏藥攤在油紙上貼之李中父傳屢用效太乙膏治癧子瘡神效沒藥四錢麝香三錢乳香輕粉各二錢片腦一錢黃丹五兩清油一斤上先將油丹熬以柳枝攪又用憨蔥七根先熬一根令焦再下一根蔥盡為度下火不住手攪看冷熱入腦等攪勻瓷器盛用時旋攤貼騏麟膏治八發癰疽一切惡瘡軟癤不問年月深淺已未成膿者貼之即效及湯火傷皆可內服外貼神效白芷白蘞川芎甘草以上各四兩當歸二兩丁香乾蟾各半兩木鱉子二十八個沒藥一兩半別研乳香二錢半別研片腦一錢研杏仁九十八個鼠頭二個臘月者騏麟竭一兩研真緋絹一尺燒灰黃丹十兩清麻油二斤室女油頭髮如拳大上銼細以好酒拌濕一宿入鐺內用油煎候藥深赤黑色濾去滓別入淨鐺慢火煎少頃即入別研者及黃丹蠟以柳枝不住手攪時時滴入水試看軟硬得所即是成膏發背未膿者半入銀石器慢火熬及半盞許去滓次入乳香碾碎先入又熬之候如一茶腳許先將蜜熬去滓放冷卻入煎熬者膏子及衆藥攪勻再熬候金漆狀乃成入不犯水瓷器內收之每用少許點大效五枝膏治一切惡瘡腫毒等疾香油一斤黃丹五兩槐枝梧桐枝柳枝桑枝桃枝銼長一寸各一兩上先將油同枝入鍋內文武火煎衆藥黑色濾去滓次下黃丹不住手攪候黑色收瓷器內絹帛攤貼司馬溫公解毒膏治諸瘡及杖瘡宜貼之杏仁四十八個萆麻子三十四個巴豆一十四個木鱉子二十四個去殼槐枝四指長四兩柳枝二兩桃枝三兩乳香三錢黃丹春秋用三兩半夏用四兩冬用三兩麻油半斤上將油入鍋內下藥熬焦黃色綿濾去滓再熬滴水中成珠不散為度下乳香末攪勻每用紙攤貼神效回生膏治癰疽癤毒遠近臁瘡打撲攧傷腫毒發背刀斧所傷箭頭在內蛇犬所傷並皆治之槐枝柳枝桃枝榆枝桑枝枸杞枝以上各銼長二寸者各二十條嫩者剝取皮白芷白芨白蘞當歸大黃黃柏杏仁赤芍藥萆麻子去殼以上各一兩半血竭半兩輕粉三錢黃丹十二兩沒藥半兩乳香半兩雄黃半兩上先將六枝皮用清油三斤於砂鍋內文武火煎令津液盡為度濾過卻將白芷等九味銼碎下油內浸透又用慢火煎焦去滓再濾過卻將黃丹分作三次下熬令黑色滴水中不散為度卻將血竭等末待油微溫下於油內瓷罐盛之蓋口埋土內三日出火毒任意攤貼萬金膏治癰疽發背諸般瘡癤從高墜墮打撲傷損腳膝生瘡遠年臁瘡五般痔漏一切惡瘡又云專治發背神妙不可具言有初覺或做瘡用牛皮膠熬令稀稠得所如藥化攤在毛頭紙上於初覺處或有做瘡處貼次用軟布帕子二條於釅米醋內煮令熱漉出互相於膠紙上乘熱蒸尉不可令布帕冷布帕二條不可都齊漉出常留一條在醋內煮候蒸尉得一條冷卻於醋內取熱布蒸冷布卻入醋內煮庶幾常得熱布替換尉蒸即易見效若瘡癢乃是藥攻其病須忍癢不止蒸尉直候膿出將盡即濃前貫衆湯候溫洗去膠紙次日依前更洗若尚有膿又如前法蒸尉雖連數日蒸尉不妨但要瘡中膿盡瘡干為度然後用生肌紅玉散摻在瘡上即以萬金膏貼每日一上或兩上每用再蒸尉並如前先鋪膠紙於瘡上尉了亦如前用貫衆湯洗去膠紙龍骨鱉甲苦參烏賊魚骨黃柏草烏黃連豬牙皂角黃芩白芨白蘞木鱉子當歸白芷川芎厚朴去粗皮槐枝柳枝俱銼碎各一分乳香別研一錢沒藥別研一分黃丹一兩半清麻油四兩冬月半斤上除乳沒丹外余藥入油內慢火煎候白芷焦色去滓入黃丹一半不住手攪令微黑色更入黃丹仍攪待滴入水中成珠不黏手為度攪溫下乳沒末亦攪勻瓷器盛用時量瘡大小攤紙貼之治諸惡瘡如自然銅肉桂各一分一方無當歸活絡內灸膏治閃肭筋骨但是一切無名腫毒疼痛當歸黃耆白芷芍藥半夏木鱉子銅青各一兩白膠香一斤半乳香沒藥各一兩麻油一斤上將前六味銼碎入油內熬至白芷焦色濾去滓下白膠香煎至黑色次下乳沒銅青末攪勻用時隨病大小厚紙攤貼患處金絲萬應膏治顛撲傷損手足肩背並寒濕腳氣疼痛不可忍小兒脾疳瀉痢咳嗽不肯服藥者瀝青二斤半威靈仙二兩萆麻子一百枚去皮殼研黃蠟二兩木鱉子二十八枚去殼切片研沒藥乳香各一兩別研麻油夏二兩春秋三兩冬四兩上先將瀝青同威靈仙下鍋熬化以槐柳枝攪候焦黑色重綿濾過以瀝青入水盆候冷成塊取出稱三斤淨再下鍋熔開下麻油黃蠟萆麻木鱉子泥不住手槐柳枝攪勻須慢火滴入水中不黏手扯拔如金絲狀方可如硬再旋加油少許如軟加瀝青試得如法卻下乳沒末起鍋在灰火上再用槐柳條攪數百次又以粗布濾膏在水盆內扯拔如金絲頻換水浸二日卻用小銚盛頓如落馬墜車於被傷疼痛處火上炙熱貼透骨肉為驗連換熱水數次熔之則熱血聚處自消小兒脾疳貼患處瀉痢貼肚上咳嗽貼背心上無比神應膏治諸般惡毒瘡腫發背瘤疽瘰癧臁瘡腳氣打撲傷損刀斧傷湯澆火燒馬犬蛇蟲蜈蚣蜂蠍多年咳嗽口內吐血貼背取毒愈心疼腹痛小腸疝氣赤白痢泄不止於臍下貼即痊牙疼貼腮上止肉潰流膿頑癬腰痛奶癰癰瘓杖瘡重者再貼即安白芨白蘞白芷木鱉子仁官桂杏仁當歸柿花乳香沒藥各一兩蘇合香一丸黃丹二斤半真麻油五斤槐柳枝各半斤上銼碎除乳香沒藥黃丹蘇合香丸另研外其餘藥於油內浸春秋五日夏三日冬十日遇冬減黃丹二兩新鐵鍋內浸至日期用文武火熬一順攪槐柳枝黑色去滓待溫下乳沒蘇合香丸再熬不住手攪微滾三兩沸放溫一面攪一面下黃丹文武火熬滾起出火再滾如此五七次不住手攪至數千次煙盡黑色為度滴水中不散方可切不可用火辰日熬忌雞犬婦人見飛丹法凡膏藥中鮮有不用虢丹其貨賣者多用硝與鹽雜和在內重稱若不飛過而用反有害方法於後上用虢丹即黃丹先以冷水漂過去其鹽硝水再用水漂再去其水澄干微火炒紫色將紙撣地上出火毒用時再研至無聲稱用熬膏藥法凡用乳香沒藥須用燈心同於乳鉢內研細不然難為研細候熬藥成膏提起藥銚仍攪無煙起去燈心篩末入油內不住手攪勻上熬藥用瓷器或銅鐵銚內盛油浸藥一宿慢火煎熬諸藥黑色用生絹帛濾去滓留下一兩重藥油復將所濾油於慢火上再熬卻將黃丹入油內用長槐柳枝不住手攪候有微煙即提起藥銚就柳條點藥油滴在水面上凝結成珠不散方成膏矣如油散珠不成再熬直待成膏提起藥銚攪無煙出卻入乳香沒藥攪勻傾出瓷器內將原留下油洗銚一同收貯器內用新汲水一日一換將藥器坐水內浸三日出火毒方可用如膏藥硬約量加黃蠟清油入膏內攪勻得所其黃蠟等油減半用熬膏藥極難於火候須耐煩看火緊慢火猛則藥中火發不特失藥性又燎傷製藥人面目
