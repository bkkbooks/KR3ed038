方治一切瘡已潰者及炙貼之無痂生肉去膿上用地黃汁一升松脂二兩薰陸香一兩羊脂牛酥各如雞子大先於地黃汁煎松脂及香令消即內羊脂酥更用蠟半雞子大一同相和以慢火煎令水盡膏成去滓塗帛貼瘡日一二易當歸和血散治瘡瘍未發出內痛不可忍及治婦人産前産後腹痛當歸二錢乳香半錢沒藥一錢半白芍藥三錢上為細末每服一錢水一中盞煎七分和滓溫服日二婦人酒煎瘡既發不須用瘡癢者加人參木香婦人服之加赤芍藥百合散治頤頦瘡一名獨骨瘡百合黃柏各一兩白芨一分萆麻子五十粒研上為末用朴硝水和作餅貼之日三五次回瘡金銀花散治瘡瘍痛甚色變紫黑者金銀花連枝葉俱用銼研二兩黃耆四兩甘草一兩上㕮咀用酒一升同入壺瓶內閉口重湯煮三兩時辰取出去滓頓服之一方無黃耆二金散治大人小兒蝕透腮頰初生如米豆名含腮瘡雞內金礬金上等分為末先用鹽漿盥漱了貼之芙蓉敷方治腮頷腫痛或破成瘡芙蓉葉不拘多少上搗爛敷之以帛系定日一換治蛇纏瘡上用雄黃研為末以醋調塗仍用酒調服凡為蛇傷及蜂蠆蜈蚣毒蟲顛犬所傷皆可用之雞內金散治穀道邊生瘡久不愈者上用雞䏶胵不拘多少即是雞䏶內去下黃皮燒灰存性研為極細末每用干貼之如神舍時從證至元壬午有人王伯祿年五十有七上臂膊腫盛上至肩下至手指色變皮膚涼六脈沉細而微脈證俱寒舉瘍瘍醫彥和視之曰此乃附骨癰開發已運以燔起之膿清稀解待日肘下再開之加吃逆不絶彥和與丁香柿蒂湯兩服稍緩待日咳逆尤甚自利臍腹冷痛腹滿飲食減少時發昏憒於左乳下黑盡處炙二七壯又處以乾薑附子木香沉香茴香羌活類藥㕮咀一兩半欲與服或者曰諸痛癢瘡皆屬心火又當盛暑之時用乾薑附子可乎豫應之曰理所當然內經曰脈細皮寒瀉利前後飲食不入此謂五虛吃逆者胃中虛極也諸腫瘡瘍皆屬心火是定理也此證內外相反須當舍時從證非大方辛熱之劑急治之則不能愈也遂投之諸證悉去飲食進瘡勢溫膿色正彥和又與五香湯數服月餘平復噫守常者衆人之見知變者大事知常而不知變細事因而取敗者亦多矣況醫乎守常知變豈可同日而語哉托裡溫中湯治瘡為寒變而內陷者膿出清解皮膚涼心下痞滿腸鳴切痛大便微溏食則嘔氣短促吃逆不絶不知安臥時有昏憒丁香沉香茴香益智仁陳皮各一錢木香羌活乾薑炙二錢黑附子炮去皮臍四錢內經曰寒淫於內治以辛熱佐以苦溫以附子乾薑大辛熱溫中外發陽氣自里之表以為君羌活苦辛溫透關節炙甘草甘溫補脾胃行經絡通血脈胃寒則嘔吐吃逆不下食益智仁丁香沉香大辛熱以散寒為佐瘡氣內攻氣聚而為滿木香茴香陳皮苦辛溫治痞散滿為使也上㕮咀作一服水三盞生薑五片煎至一盅去滓不拘時溫服忌一切冷物連翹散堅湯治耳下至缺盆或至肩上生瘡堅硬如石動之無根名曰馬刀從手足少陽經中來也或生兩脅或已流膿作瘡未破者並皆治之連翹黃芩生用芍藥當歸尾酒製京三稜細銼廣朮細銼同三稜酒製一次微炒以上各半兩草龍膽酒製四次二兩黃芩酒炒二次黃連酒炒二次蒼朮以上各二錢土瓜根酒炒一兩柴胡一兩二錢甘草炙三錢上件一半為末煉蜜和丸如緑豆大每服一百丸或百五十丸一半㕮咀每服半兩水一盞八分浸半日煎至一盞去滓臨睡熱服頭下腳高去枕而臥每口作十次咽留一口送下丸藥畢臥如常柴胡連翹湯治男子婦人馬刀瘡柴胡連翹知母酒製黃芩炒以上各半兩黃柏酒製生地黃甘草炙以上各三錢當歸尾一錢半中桂三分牛蒡子二錢瞿麥穗六錢上銼如麻豆大每服三錢或五錢水二大盞煎至一盞去滓食後稍熱時時服之消腫湯治馬刀瘡柴胡黃芩生用各二錢黃連牛蒡子炒各半錢黃耆栝蔞根各一錢半連翹三錢當歸尾甘草各一錢紅花少許上㕮咀每服半兩水二大盞煎至一盞去滓食後稍熱服忌酒濕面熏洗方凡諸發及癰疽瘰癧臁瘡湯燙火燒等疾或有別作一種穢臭氣息不堪聞者最是惡證或已破未破或小或大皆當作急治之可用忍冬藤一握擂細用無灰酒濾汁服之以滓敷瘡四圍用雲母膏別研亦可剪開大口以護其瘡之上俟其瘡出膿便以獖豬蹄湯等十分淨洗久洗為妙洗一二時辰不妨次用後藥熏之好降真香末楓香末上二味於銚中攪熔丸如彈子大卻取香爐一枚依爐口造紙煙筒一個如燒龍涎香樣慢火爇之謹以煙筒口熏瘡上不拘丸數稍倦暫止然後更熏未出膿者即出已出膿者即干直候生肌合口然後止向後有赤腫腳處又再熏大概欲屏去穢氣也四生散治風氣上攻下注耳鳴目癢鼻赤齒浮或作口瘡下疰陰濕四肢燥癢遍體生瘡及婦人血風瘡羌活黃耆白附子沙苑蒺藜上等分為細末用豬腰子一枚切開去筋膜入藥少許於內濕紙裹炮熟再入藥三錢浸酒調藥並腰子嚼吃令盡服三五服後只用鹽酒調亦可或腰子一枚分兩次用羊腰豬腰皆可雄豬羊者為妙千金托裡散治一切瘡腫發背疔瘡黃耆一兩半厚朴防風桔梗各二兩連翹二兩二錢木香沒藥各三錢乳香二錢當歸半兩川芎白芷芍藥官桂人參甘草各一兩上為細末每服三錢酒一大盞煎三二沸和滓溫服治疔瘡黃連羌活青皮白殭蠶防風獨活蟬蛻細辛赤芍藥甘草節各等分上㕮咀每服五錢先將一服入澤蘭葉少許薑一錢重同擂爛熱酒和服然後用酒水各半盞薑二片煎服病勢退減後再加大黃少許煎服略下一二行蕩去餘毒再用白梅蒼耳子研爛貼瘡上拔去根腳返魂丹治十三腫疔瘡硃砂膽礬各一兩半血蠍銅緑蝸牛生用各一兩雄黃白礬枯各二兩沒藥蟾酥各半兩麝香少許輕粉半兩上將蝸牛蟾酥研爛余藥研為細末同研和丸如雞頭實大每服一丸令病人先嚼蔥白三寸吐在手心內將藥丸裹在蔥內用熱酒一盞吞下如重車行五里許有汗出即瘥如不能嚼將蔥研爛裹藥服之極有效驗破棺丹治疔黃走胤不止當歸赤芍藥山梔子牽牛以上各二兩半連翹牡蠣金銀花紫花地丁各一兩半京三稜甘草各二兩加大黃三兩半上為細末煉蜜和丸如彈子大每服一丸食前用童子小便化開服忌酒生冷硬物內托連翹散疔瘡出時皮色不變及不疼痛按搖不動身發寒熱便是此瘡有水疔魚臍疔紫燕疔火疔諸般疔瘡如瘡黃於黃上用針刺仍服內托散自然消散連翹白芷生地黃赤芍藥以上各一兩大黃去皮黃梔去頂蒂薄荷葉各七錢朴硝二兩黃芩去心半兩甘草一兩半上為粗末每服一兩水一碗燈心竹葉煎七分其人喘加人參少許大病只三四服愈如服了心煩嘔用不二散止不二散上以甘草半兩豆粉一兩分作二服酸齏水下立馬回疔丹治疔瘡走胤不止金腳信蟾酥血竭硃砂沒藥以上各半錢輕粉龍腦麝香以上各一字上為細末用生草烏頭汁和作錠如麥子大用時將瘡頂刺破將藥一錠放瘡口內第二日瘡腫是效走馬赴筵丹治疔瘡沒藥乳香硼砂硇砂雄黃輕粉以上各三錢片腦一分麝香少許上為細末蟾酥汁和為丸如黃米大每服一丸溫酒送下奪命返魂散治一切疔瘡增寒發熱昏悶不語腫遍皮膚不思飲食並皆治之大黃連翹山梔子以上各二錢半研為細末巴豆杏仁各二錢麩皮同炒黑色研為細末牽牛頭末苦丁香各一錢人言五錢用大蒜五個去心填入人言同燒過存性研為細末上為細末研勻每服半錢病重者服一錢用新汲井花水調下一服見效如病重無脈者吃下藥約一頓飯時吐了藥便醫不得吐不了藥即活滴滴金治疔瘡硇砂輕粉人言雄黃硃砂各一錢麝香少許上為細末每用些少先以針刺開瘡頭貼藥黃水出效疔瘡錠子硇砂一錢白芷雄黃蒼耳子甘草各半錢上為細末用蟾酥汁和作錠子如前法用須五月五日合回瘡錠子治疔瘡大效草烏頭各一兩蟾酥七粒巴豆七個去皮麝香一字上為細末麵糊和就捻作錠子如有惡瘡透丁不痛無血者用針深刺至痛處有血出以此錠子紝之上用膏藥貼之疔瘡四畔紝之其疔三二日自然拔出此藥最宜緊用此證大抵與傷寒頗類其中亦有可針鐮砭射出血者亦有久而敗爛出膿者其間變異百端不可不慎也日本國傳治疔瘡塗方巴豆十粒半夏一枚附子半枚蜣螂一枚上各研為末以人糞相和看瘡大小作紙圈子圍瘡口以藥泥瘡上絹貼之一日三易五聖散治疔瘡皂角針二兩栝蔞一個大黃金銀花生薑甘草各一兩上㕮咀用好酒二升同煎至八分去滓不拘時溫服又方以鐵衣末用人乳汁和敷之立可玉山韓光方治疔腫上以艾蒿一擔燒作灰於竹筒中淋取汁以一二合和石灰如麵漿以針刺瘡中至痛即點之點三次其根自拔亦大神效正觀中用治三十餘人得瘥蟾酥膏治疔瘡上取蟾酥以白麵黃丹搜作劑丸如麥顆狀用指甲抓動瘡上插入重者針破患者以一粒納之仍以水沉膏貼之水沉膏上以百芨末半錢水盞內沉下澄去水卻於皮紙上攤開貼在瘡上治一切疔腫懸癰上用蒼耳根莖苗但取一束燒為灰醋泔藍靛和如泥先以針刺瘡上及四邊數下令血出度藥氣可以入針孔中能去血敷藥干即易之不過數度即拔桶出其未結膿者即內消也已結膿破潰者再不用針刺只以藥塗之余以忽口角上生疔腫造甘子振家母為貼藥經十日不瘥余以此藥塗之得愈常作此藥以救人無有不瘥者故特以傳後嗣疔腫方殆有千首皆不及此雖齊州榮姥方亦不能勝此物造次易得也治一切疔腫上作蒼耳草又名羊負來草只用根紅嫩者擂爛無灰白酒調勻服次用鹽梅肉研爛以豬膽汁和塗瘡頂上其毒即散又先用好京墨以薑汁研爛用薑片蘸墨塗四圍腫熱處即效一方用蒼耳根葉童子小便絞取汁令服一升日三或燒灰和臘月豬脂敷一方用苗葉搗汁飲之一方用子或葉或根研爛以米醋腳調塗腫處立散仍研汁服以瘥為度治疔瘡上於九月九日採芙蓉花葉陰乾研細用時以井花水調銀叉打成膏厚紙攤貼瘡上次日用蚰蜒螺即鬼丁螺一個用銀器盛打破依前調藥卻將蚰蜒螺放在瘡上貼待過周日揭起其疔自出立效其藥不要攤闊治疔瘡上用多年牆內或泥土中鏽釘洗淨以炭火內煅紅醋淬待冷用刀刮釘鏽又入火內煅紅入醋淬仍前刮末再煅再淬再刮下末研為細末用時將瘡口拔開挑藥末在內以膏藥貼之少時如病深取疔如病淺即取出黑紫色血其瘡自愈飛龍奪命丹治一切惡疔瘡半夏洗淨硃砂南星洗淨各三錢人言二錢半黃丹血竭乳香沒藥硼砂硇砂各二錢巴豆十二粒去殼斑蝥十二枚去翅足麝香半分上為細末用蟾酥汁和為丸如紅豆大五分中一分加斑蝥二個人言少許捻成錠子如半粒小麥大凡遇瘡針破見血下錠子一粒以飯黏白紙封護用藥一丸噙在舌上覺麻冷水吞下忌熱物片時重者隨服藥不必盡劑沖病即止一伏時黃水流出為病源先癢後疼先寒後熱如傷寒病狀忌房事並諸毒物魚腥凡病人眼見紅火光者難治如蟾酥干用些兒乳汁化開為度立馬回疔奪命散治疔瘡及喉痹乳鵝腫痛大效牡蠣當歸牛蒡子白殭蠶各半兩大黃一兩上㕮咀每服半兩用青石磨刀水酒各一盞煎去滓連進二服疔瘡服後出汗者生無汗者死治疔走了黃打袞將死者牡蠣大黃山梔子金銀花木通連翹牛蒡子地骨皮乳香沒藥皂角刺栝蔞上各等分銼碎每服半兩氣壯者加朴硝用水一碗酒半碗煎一服定愈救命仙方也芫花根膏治魚臍疔瘡久治不瘥者芫花根二兩黑豆三合豬牙皂角五挺白礬三兩煅研細上用醋一斗將前三味先浸三日於釜中以火煎至二升去滓卻入鐺中煎至一升入白礬末攪令勻去火成膏但是魚臍丹惡瘡攤於帛上貼日二易之治魚臍疔瘡韭菜連須蔥絲瓜葉上入石鉢內搗爛如泥以酒和服以滓貼腋下如病在左手貼左腋下右手貼右腋下在左腳貼左胯右腳貼右胯如在中貼心臍並用布帛縛住候肉下紅線處皆白則可如有潮熱亦用此法卻用人抱住恐其顫倒倒則難救治疔瘡陰證脈沉四肢冷瘡不發上用五香散去大黃加蒼耳蓮肉酸棗仁藿香茯苓黃耆肉桂當歸防風白芷附子生薑半水半酒煎服以發藥性如潮熱皮膚受毒加生大黃柴胡地骨皮如嘔逆脾胃受毒加丁香如喘嗽肺經受毒加杏仁去皮尖知母秦艽紫菀如眼花心經受毒加硃砂雄黃麝香如腳冷腎經受毒加木瓜牽牛並鹽炒如發渴自汗肝經受毒加黃芩山梔如大小便祕腹脹滿加枳殼炒木通苦葶藶大黃生用治疔瘡陽證潮熱心間霍亂或譫語六脈洪大上用五香散熱不退而渴用不二散蛇床子大黃生為末以冷酒或冷水調二錢止二服使微利救生丹治諸腫疔瘡眼內火光出昏迷不醒上於三月辰日採桑葉荊葉用竹針穿成孔用紙裹風內陰乾至端午日研為細末用蟾酥和為丸如小豆大用時再以雄黃同藥一丸研細放舌中汗出效胭脂散治反花瘡胭脂貝母胡粉各一分硼砂沒藥各半分上研細先以溫漿水洗拭後敷藥甘草塗敷方治反花瘡甘草半生半炒礬石灰人中白密陀僧各半兩上為細末以童子小便半盞以無灰火熬用竹篦攪成膏取塗瘡上日五次惡實根塗敷方治反花瘡並諸瘡積年不瘥者惡實根研末四兩豬脂二兩上調和如糊塗瘡上日三四次升麻湯治心有風熱生浸淫瘡遍體升麻大黃銼微炒黃芩去黑心枳實麩炒芍藥各一兩當歸切焙甘草炙各半兩上銼碎每服五錢匕水一盞半燈心一握煎至一盞去滓空心溫服香瓣瘡方治面上耳邊生浸淫瘡有黃水出久不愈羚羊須荊芥干棗去核各二錢上燒灰存性研勻入膩粉半錢同研極細每用少許清油調搽先以溫湯淨洗拭乾塗藥二三次效亦治大人小兒兩吻生瘡雞冠血塗方治卒得浸淫瘡不早治則繞身周匝能殺人外臺云浸淫瘡轉廣有汗多起於心上以雄雞冠上刺血塗敷日三五度豬骨膏治諸瘡口氣冷不瘥豬筒骨二個取髓松脂二錢通明者研乳香另研黃連去須為末白芨研末各一分鉛丹別研黃蠟各半兩上搗研熔蠟和為膏不拘時敷之乳香膏治諸瘡痛久不瘥乳香一兩另研食鹽松脂杏仁去皮尖研各一兩半黃蠟三兩生地黃取汁三合白羊腎胰脂半斤上先熬脂令沸下杏仁地黃汁蠟煎候蠟熔盡入香鹽松脂煎以柳篦攪令勻稀稠得所瓷盒盛敷瘡上日三二度雄黃散治冷瘡暖瘡口雄黃研百合乳香黃柏炙去皮牆上爛白蜆子小蚌蛤子是各一分上為細末研勻先用漿水煎甘草柳枝湯溫洗拭乾敷之附子散治冷瘡日夜發歇疼痛附子半兩炮去皮臍川椒去目雄黃三分火煅研膩粉二錢研上為細末研勻每用清麻油調敷瘡上日二換黃耆湯治諸瘡退風熱黃耆銼黃芩去黑皮麥門冬去心焙芍藥甘草炙銼各一兩半生地黃四兩半夏薑製半兩當歸切焙大黃銼炒石膏沖川芎人參各一兩上銼如麻豆每服五錢匕用水一盞半竹葉七片煎至一盞去滓空心溫服日晚再服白蒺藜散治熱毒瘡瘙癢心神壅躁白蒺藜炒去刺白蘚皮防風去蘆川大黃銼炒赤芍藥梔子仁子芩麥門冬去心焙玄參桔梗去蘆前胡去蘆甘草炙赤銼各一兩上為細末每服二錢食後用薄荷湯調服密陀僧散治熱毒惡瘡臭爛久不生肌密陀僧雄黃雌黃定粉各半兩膩粉三錢上研為細末先用柳枝一握生甘草一兩捶碎以漿二升煎六七沸去滓稍熱淋洗瘡淨拭乾敷之白金散治風毒攻注遍身及手足生熱瘡疼痛出黃水上用桂府滑石為細末先用虎杖甘草豌豆各等分約半兩許水二碗煎上項藥至一碗去滓微熱淋洗瘡水冷拭乾上摻滑石末令通身便睡至明決愈玉粉散治熱汗浸漬成瘡腫癢焮痛定粉一兩蛤粉九兩半白石脂白龍骨石膏各半兩滑石八兩半寒水石燒通赤於淨地上放冷出火毒一兩粟米粉二兩上為細末研勻每用些少乾擦患處七寶散治熱汗浸漬成瘡癢痛不止黃耆當歸防風荊芥穗地骨皮木通各二兩白礬一兩上為粗末每用藥一兩水二大碗煎至五六沸濾去滓稍熱淋泄患處拭乾避風少時東垣老人云此方城北獨柳店之客舍有推江軸者皮膚皴裂不住痛兩手不能執轅足不能履地而輒止宿因制此藥與敷之即效明日遂行自此屢用屢效赤石脂散治痱子磨破成瘡用此止痛生肌赤石脂細研黃柏去粗皮銼臘茶末各半兩白麵二兩龍腦半錢另研上為細末研勻每用時綿搵撲之龍腦粉方治痱瘡癢痛龍腦一錢粟米粉五兩上研細末先用棗葉湯洗後以綿搵撲之玉女英治痱瘡癢痛滑石半兩細研緑豆粉四兩微炒上研勻以綿搵撲之一方有棗葉一兩楝花粉敷方治痱子瘙癢上用苦楝花不拘多少焙乾為末入蚌粉滑石末各少許研勻日頻敷之治暑月汗漬液下赤腫及痱瘡上以臘雪水和蛤粉敷之立瘥皂子散治水毒入瘡腫痛或刺入骨者皂莢子七枚大蛤蟆乾者一枚胡椒十五枚上用乾鍋入藥在內瓦蓋鍋口慢火燒煙盡取出研細每用藥先以溫漿水洗瘡口拭乾摻藥次以別膏藥貼之良久水盡出有刺者即自見鉛丹散治破傷入水腫潰不愈鉛丹蛤粉等分上同炒令變色摻瘡口中水即出漸愈連翹飲治諸惡瘡紅赤痛癢心煩口乾及婦人血血風斑圓點開爛成瘡癢痛流黃水汁連翹當歸栝蔞根生乾地黃荊芥黃芩赤芍藥麥門冬瞿麥木通牛蒡子炒山梔子防風川芎粉草各等分上㕮咀每服四錢水一盞半燈心二十莖煎至八分去滓不拘時服桑螵蛸散治諸惡瘡桑螵蛸地龍貝母黃柏各半兩虢丹煅一兩乳香一分粳米粉二錢麝香半錢雄黃輕粉各一錢上為細末以新汲井水和沙糖調敷洗瘡藥治諸般惡瘡貫衆川芎茵陳地骨皮荊芥獨活防風地萹蓄甘草各二錢當歸三錢上㕮咀水三碗煎三沸去滓通手洗之救苦黃耆散治諸惡瘡癰癤黃耆當歸芍藥栝蔞根甘草各一兩五錢栝蔞一對金銀花二兩熟地黃不拘多少皂角棘為引上㕮咀每服半兩無灰好酒一升同引子裝入瓷瓶內瓶頭用筍葉封將瓶坐於鍋內上以火盆覆鍋口盆外以黃泥封之勿令出氣煮至外聞藥香為度取出瓶澄定飲清將藥滓再添酒一升依前煮服若酒少者酒水各半煮服瘡在上食後臨臥服在下空心服此藥治病萬無一失神驗如鼓應聲常於五月五日修合托裡金銀地丁散治諸惡瘡腫毒疼痛服之如神金銀花黃連當歸紫花地丁赤芍藥黃耆人參甘草節桔梗大黃各半兩乳香白檀香沒藥連翹各三錢子芩梔子仁玄參各二錢麥門冬去心前胡甘草蜜炙各一兩上㕮咀每服五錢水一盞酒一盞煎至八分去滓隨病上下溫服紫花地丁散治諸惡毒瘡腫疼如神紫花地丁當歸大黃赤芍藥金銀花黃耆各半兩甘草節二錢上㕮咀每服一兩用水一盞酒一盞同煎至一大盞去滓隨病上下服桃花散治一切惡瘡生肌活血治金瘡去風烏魚骨虎骨龍骨各一兩寒水石半斤煅白石脂赤石脂白蘞各半兩黃丹少許上入白芨半兩同為細末量瘡大小敷貼洗藥白芷荊芥葳蕤何首烏茯苓苦參川芎白牽牛防風蔓荊子各一錢上為細末用漿水四碗煎五七沸臨臥時洗淨塗後藥塗藥輕粉白礬舶上硫黃各等分上為細末用酥油調臨睡塗三次增益四物湯治一切惡瘡川芎當歸芍藥地黃防風荊芥甘草各等分鳳尾草斟量加入上銼碎每服三大錢水一盞半煎八分去滓食前溫服龍葵散治諸惡瘡多出膿水不幹龍葵即天茄子景天即慎火草黃連去須天靈蓋各一兩龍骨大鱉子乳香黃蜀葵花各半兩上為細末入膩粉少許蜜調隨瘡大小紙攤貼之萬寶代針膏治諸惡瘡腫核赤暈已成膿不肯用針刺膿此藥代之但用小針點破瘡頭卻貼上膏藥膿即自潰此祕妙良方硼砂血竭輕粉各一錢半金頭蜈蚣一個蟾酥半錢雄黃一錢片腦少許麝香一字上為細末用蜜和為膏看瘡有頭處用小針挑破以藥些小在紙花上封貼次早其膿自出如腋下有耍核兒名暗疔瘡或有走核可於腫處用針挑破如前用之忌雞羊魚酒面等物吃白粥三日為妙神效方治一切惡瘡醫所不識者水銀黃柏黃連松脂黃明者膩粉土蜂窠著壁上者南方多有之或云蠮螉窠甘草各等分上將水銀放掌中以唾津殺為泥入瓷器中以生麻油和研生絹濾如稀飭和藥末再研如稠飭先溫水洗瘡帛拭乾塗之一切無名瘡塗一次即瘥有黃水者塗之隨手便乾癢不堪忍者塗之立止痛甚者塗之立定治疥尤佳抓破敷藥拔毒散治諸惡瘡消腫去毒天花粉無名異黃柏黃芩大鱉子大黃牡蠣各等分上為細末好醋調敷貼立效烏金膏治一切惡瘡桑枝槐枝榆枝枸杞枝桃枝柳枝上各長一尺粗如小指俱一寸截劈四破用油四兩炒令焦黑濾去滓入鉛丹半兩蠟一兩復熬令黑色傾在瓷合內候冷以新汲水浸出火毒用塗瘡熊膽膏治一切惡瘡熊膽一錢研膩粉半分雄黃研麝香研各半錢檳榔研一字上研勻於臘日用獖豬膽一個取汁和藥仍入在膽內用綿繩系定揉勻以松明黑焰熏遍黑挂於陰處如惡瘡有指面大者用如黍米大貼之如錢大者用如緑豆大貼之恐藥干難貼薄以津唾調如稀糊塗之仍用薄樺皮蓋貼以帛子系之藥不可多用碧霞錠子治惡瘡透不覺疼痛銅緑一兩硇砂二錢蟾酥一錢上為細末軟米飯一處擦勻捻作錠子如粳米樣每用針刺之不覺痛者但有血出嵌一錠子在內以膏藥貼之或作散以紙捻蘸藥衽之治蛇頭瘡共形生時在手足上瘡旁一塊開如蛇口之狀痛而流血不止者此藥治之雄黃蜈蚣全蠍各一錢上為細末看瘡濕劈開入藥擦在瘡上卻以小油抹裁帛拴住如干小油調搽治一切惡瘡及沙蝨水弩甲疽疼痛不可忍者上用蜣蜋十枚端午日收搗為細末以油調敷之即易一方取末以鹽水調塗四圍如韭菜闊一方用蜣蜋二枚取腸肚安在紙中心四面以醋糊貼瘡上乳香散治遠年惡瘡乳香膩粉各半錢黃柏去粗皮龍骨大黃銼各三錢麝香一字上為細末先以苦竹瀝洗瘡拭乾摻上水銀膏治月蝕瘡多在兩耳上及竅旁隨月盈虛水銀一分胡粉研松脂黃連去須為末各半兩豬脂四兩上先熬豬脂令沸下松脂諸藥末及水銀攪令勻瓷盒盛先以鹽湯洗淨瘡塗敷日三五度治臁瘡方鼠糞苦參桃枝杉樹刺柳枝松枝麩醬雞子殼皂角雀糞芍藥木綿子芝麻桑枝蛇殼鍋底煤杜當歸鬚松明不拘多少上件各四錢俱為細末先將松明捶碎和諸藥於瓦銚中掘一地坑將藥銚安坑中四圍用火熬熔取出再研令勻瘡自然痊可忌一切發氣熱物隔紙膏治內外臁瘡當歸白芷黃連五倍子雄黃沒藥血竭海螵蛸白芨白蘞黃柏厚朴以上各半兩黃丹六錢乳香二錢半研輕粉一錢上為細末研勻用清油調成膏用油紙貼藥敷瘡上絹帛縛定有膿水解開刮去不潔再貼藥如此數次即愈須先用燒鹽湯洗淨片帛拭乾待片時水氣干然後貼藥治臁瘡久不愈龍骨二錢半輕粉少許檳榔半兩乳香沒藥各一錢干豬糞半兩燒存性上為細末先以燒鹽湯洗瘡以軟絹帛拭乾清油調敷瘡濕則乾摻之治臁瘡下注白石脂龍骨各半兩白礬一兩枯五倍子二兩燒存性黃丹三錢飛雄黃少許上為細末先將蔥鹽湯洗瘡見赤肉然後將前藥敷瘡上用藥如法厚者卻用帛子包縛著不要動直候乾自脫去瘡皮治臁瘡黃丹輕粉白芨樟腦敗船灰各等分上研細末以桐油調成膏攤在油紙袋內先煎溫蔥湯洗淨以帛拭乾將藥置瘡上扎住用了一面番轉如前洗貼一方無輕粉若用糞船灰亦妙治臁瘡方詹武子年三十歲時曾患此用之屢效白芨白蘞黃柏黃丹另研各等分上為極細末入輕粉些少研勻以煉蜜和成劑捏作餅貼瘡上深者填滿以帛片包扎一日一換後來瘡漸干或有裂處只須乾摻以瘥為度驢蹄散治腎藏風毒下注生瘡驢蹄二十片燒灰密陀僧一分研輕粉一錢匕麝香半錢匕上研極細末以帛拭去膿用些少乾摻日三四次瘥翠玉膏治臁瘡瀝青一兩銅緑研黃蠟各二錢乳香研沒藥研各一錢上將銅緑以油調勻將瀝蠟火上熔開下緑攪勻次入乳沒末仍攪勻傾在河水盆內拌勻以油紙裹口嚼旋捏作餅子貼瘡以緋絹包直候瘡好其藥自脫治血注腳桑樹菰牛屎菰又名石灰菰生地上如有石成塊者碎其中有灰起肥株樹菰胎髮男用男女用女三個上將三菰焙乾各五錢胎髮燒灰存性三錢併為細末研勻濕則干搽干則清麻油調塗治臁瘡方冬青葉臘豬膽百草霜二味和勻上將冬青葉與本人嚼爛先以蔥椒湯洗淨瘡口以膽霜敷後卻敷嚼藥在上三四次即可奇妙梔子散治遠年日久內外臁瘡山梔子不拘多少燒作灰研為細末乳香另研各半錢輕粉少許上研勻以磁器盛每用時先以蔥白花椒煎湯洗淨瘡稍歇再以溫漿水又洗一次候惡水去盡再將白水煎百沸候溫再洗但瘡口無膿水血絲清水各盡多用粉帛片拭乾然後敷藥如干者香油調敷濕者乾摻但將瘡口實滿軟絹帛護之堅硬不作膿者未可用腫如軟有膿者依前法再洗後敷貼之三二次即愈乃一藥二洗之功也治足瘡方趙子固母劉氏年八十左足面一瘡下連大指上延外踝以至臁骨每歲輒數發發必兼旬纍月昏暮癢甚抓搔移時出血如泉流呻吟痛楚殆不可忍夜分即漸已明日復然每一更藥則瘡轉大而劇百試不驗如是二十餘年淳熙甲辰仲冬之末先生為太府丞一夕母病大作相對悲泣無計困極就睡夢四神僧默坐一室旁有一辰榻子固亦坐因而發嘆一僧問其故子固答之以實僧云可服牛黃金虎丹又一僧云硃砂亦好既覺頗驚異試取藥半粒強服之良久大痛舉家相泣且悔俄而下礧磈物如鐵石者數升是夕瘡但微癢不痛而無血數日成痂自此遂愈硃砂之説竟不復試先生因圖僧像如所夢者而記其事金虎丹出和劑局方本治中風痰涎壅塞所用牛黃龍腦膩粉金箔之類皆非老人所宜今乃取奇效意熱積臟腑而發於皮膚歲久根深未易洗滌故假涼劑以攻之不可以常論也神僧之夢蓋孝感云牛黃金虎丹牛黃研二兩半龍腦生研五兩膩粉研二十五兩雄黃研飛一百五十兩白礬枯過二十五兩金箔八十片為衣天雌去皮臍研十二兩半天南星湯洗焙二十五兩碾為末用牛膽汁和作餅子焙乾如無牛膽即用法酒蒸七晝夜研天竺黃研二十五兩上為細末煉蜜搜和每一兩半作十丸以金箔為衣每服一丸新汲水化下有孕婦人不可服治臁瘡方上用鱔魚數條黃色者尤佳打死先用油塗其腹下置瘡上盤屈令遍帛子系定食頃覺瘡痛不可忍然後取鱔魚看腹下有針眼大竅子皆蟲也如未盡再以數條依上再縛待蟲去盡卻用死人脛骨燒灰麻油調敷瘡上或以骨灰一兩入好茶末二錢同調亦可治臁瘡方上先以蔥白漿水熬湯洗淨瘡口絹帛拭乾塗以輕粉末摻上瘡口卻用五靈脂黃柏各等分碾為細末涼水調貼敷瘡上紙蓋定三五次即平復治湯火傷大黃黃芩黃連山梔子黃柏知母貝母密陀僧乳香沒藥輕粉甘草各等分上為細末用雞子清加蜜調不住手時時掃之清涼膏治湯潑火燒此藥止痛解毒潤肌生肉梔子仁黃連去須白芷各一分生地黃二兩蔥白十莖擘黃蠟半兩清麻油四兩上細銼於油鐺中煎地黃焦黑色綿濾去滓澄清卻於鐺內入蠟慢火熬候蠟消傾於瓷盒內用時以雞羽搵少許塗瘡上以瘥為度麻子膏治火燒人肉爛壞麻子一合取仁碎柏白皮柳白皮山梔子碎白芷甘草各二兩上銼細以豬脂一斤煎三上三下去滓以塗瘡上日三黃柏散治湯火傷黃柏大黃朴硝雞子殼寒水石等分上為細末用水調塗極效止痛膏治灸瘡及湯火傷日夜啼呼此藥止痛滅瘢松脂羊脂豬膏黃蠟各一分上取松脂破銚中切脂嚼蠟著松明上少頃銚內燒諸物皆消以杯盛汁敷之松明是肥松節也神效當歸膏治湯火瘡初起瘭漿熱毒侵展焮赤痛毒氣壅盛腐化成膿此藥斂口生肌拔熱毒止疼痛當歸黃蠟各一兩麻油四兩上將當歸入油煎令焦黑去滓次入黃蠟急攪化放冷以瓷盒盛用時以故帛子攤貼一方用白蠟柏葉散治湯火傷柏葉梔子仁各一兩胡粉研半兩上為細末以羊髓五大合熔化和藥以木椎研三五百遍一日三次塗之瘥蛤粉散治湯火傷上以蛤蜊殼不拘多少炙焦黃色搗為細末用生油調如膏敷之加冰仍無痕一方以蜜水調敷之疼立止不膿不瘕吳內翰居鄉中鄰家釜翻一小兒自頭至踵皆傷急以敷之啼立止遂無恙唯才傷隨手用即效少緩即不及當預先合以備用紫雪治湯燙火燒疼不可忍或潰爛成惡瘡上用松樹皮燒灰二錢瀝青一分研為細末清油調敷濕則乾摻忌冷水洗日三一方不用瀝青以松樹皮陰乾為細末入輕粉少許生油調敷如敷不住絹帛縛定即生痂治湯火燒瘡上以側柏葉入臼中濕搗令極爛如泥冷水調作膏敷傷處以帛子系定三二日瘡當斂仍滅瘢一方燒灰存性為末以雞子清調敷如干再上或蜜調亦可或搗末以脂調塗瘡上干即易一方以山柏子葉爛搗塗敷治湯火傷上用霜後芙蓉葉桑葉等分陰乾研為細末用蜜調塗敷之濕則乾摻雞黃油治湯火傷上用雞子煮熟去白用黃於銀石鍋內炒乾再炒直待都化作油去火毒毛翎掃下入韶粉夜明沙為末香油調敷濕則乾摻之治湯火燒方上用蕎麥麵炒黃色以井花水調敷如神治人向火生火斑成瘡有汗及治火氣入瘡方上用黃柏薄荷為末乾摻之即愈一方用黃柏皮為末摻之立愈薄荷煎塗亦可止痛生肌散治灸瘡牡蠣半兩煅研寒水石煅研滑石研各一分上為細末凡用之時切護爪甲勿令中風仍須洗瘡令淨然後摻藥薄薄令遍以軟綿帛系之候肌生漸用柏皮膏柏皮膏治灸瘡久不瘥柏樹白皮伏龍肝各四兩豬脂半斤煉為油上同熬成膏濾去滓入瓷器中每用時薄薄塗之上以油紙隔軟帛裹緑雲散治灸瘡止痛柏葉芙蓉葉並端午日午時採不拘多少陰乾上為細末每遇灸瘡黑蓋子脫了即用水調少許如膏藥攤楮紙上貼之養膿更無痛楚四時貼護方治灸瘡未著痂及出膿久不合者春以柳絮夏以竹膜秋以新綿冬以兔毛上各隨時貼瘡上內托黃耆丸治針灸傷經絡流膿不止黃耆八兩當歸洗三兩肉桂去皮木香乳香另研沉香各一兩緑豆粉四兩上為細末生薑汁煮糊為丸如梧桐子大每服五十丸不拘時白湯送下治馬汗入瘡毒氣攻腫痛方上用馬鞭上手執處皮燒灰研細和豬膏塗瘡上一方以馬鞭梢燒灰豬脂塗瘡上治驢涎馬汗入瘡上用干冬瓜燒灰洗淨瘡口擦藥在內一方用冬瓜青皮陰乾為末敷之五香散治肉中忽有惡核生腫硬不消惡肉惡脈瘰癧風結腫氣木香雞舌香沉香各一兩麝香細研一分射干薰陸香乾葛銼川升麻獨活桑寄生連翹甘草生各二兩川大黃三兩銼碎微炒上銼碎入麝香研勻每服三錢水一中盞煎至五分去滓入竹瀝半盞更煎一二沸溫服日三連翹散治項上惡核焮腫連翹射干獨活川升麻木香沉香木通銼各一兩桑寄生丁香各半兩川大黃二兩銼碎微炒上為細末每服二錢清粥飲調下日三服獨活散治惡核風結腫毒四肢煩熱拘急獨活木香射干桑寄生連翹升麻沉香川大黃生用甘草生各一兩上銼碎每服四錢水一中盞煎至六分去滓入竹瀝半合更煎一二沸放溫服日三得快利為度治赤遊腫方川大黃二兩慎火草五兩上各搗塗之干即再換治遊腫流遍身赤色入腹即死方上用生豬肉敷上數數換之其肉蟲鳥俱不食臭惡甚也玄參散治癰腫始發熱毒氣盛寒熱心煩四肢疼痛玄參甘草生銼各半兩石膏二兩麥門冬去心三分前胡去蘆枳實麩炒人參去蘆赤芍藥黃耆赤茯苓川芎生乾地黃黃芩各一兩上㕮咀每服四錢水一中盞入竹葉二七片小麥一百粒煎六分去滓不拘時溫服生地黃散治發癰腫熱毒疼痛心神煩悶生地黃二兩川大黃銼碎炒川升麻地骨皮當歸銼微炒黃芩木通赤芍藥黃耆玄參甘草生各一兩赤茯苓一兩半上為散每服四錢水一中盞入竹葉二七片煎至六分去滓不拘時溫服連翹飲治癰腫瘡癤排膿連翹防風世紀去叉各三兩薺苨白芍藥黃芩去黑心玄參各二兩人參白茯苓去黑皮桔梗銼碎研前胡去蘆甘草炙各一兩黃耆炒四兩桑根白皮銼炒二兩半上搗篩每服五錢水一盞半煎至八分去滓溫服日二內消散治癰腫結硬疼痛人參去蘆瞿麥白蘞川升麻當歸微炒黃芩防風黃耆銼沉香甘草生銼各一兩赤小豆煮熟一合上為細末每服二錢不拘時溫水調服解毒散治癰瘡始覺便宜服犀角屑川升麻川朴硝赤芍藥木通銼各一兩石膏二兩玄參麥門冬去心甘草生銼各半兩上銼碎每服四錢水一中盞煎至六分去滓不拘時溫服水澄膏治癰腫雄黃水飛鬱金各二錢黃連黃丹水飛黃柏大黃各半兩上為細末量所腫處用藥多少以新汲水半盞抄藥在內須臾藥沉澄去其浮者水盡然後用槐柳枝攪藥數百餘轉如麵糊相似勻以小紙花攤藥貼腫處更以雞翎撩涼水不住掃之天南星膏治風毒癰癤大天南星一兩厚黃柏半兩赤小豆一分皂角一挺不蛀者燒灰存性上為細末以新汲水調成膏皮紙貼之已結即破未結即散之立效牡丹散治腸癰冷證腹濡而痛時時利膿牡丹皮人參天麻白茯苓黃耆木香當歸川芎官桂桃仁去皮炒各三分白芷薏苡仁甘草炙各二分上為細末每服三錢用水一盅煎至七分食前溫服梅仁湯治腸癰裡急隱痛大便閉澀梅核仁四十九個去皮尖大黃三兩牡丹皮一兩三分冬瓜仁四兩芒硝二兩半犀角鎊一兩半上銼如麻豆大每服五錢水二盞煎至一盞去滓溫服以利下膿血三兩行為度大黃湯治腸癰少腹堅硬腫大如掌而熱按之則痛其上色或赤或白小便稠數汗出增寒其脈遲緊者未成膿如脈數則膿已成大黃銼炒牡丹皮硝石研芥子桃仁湯浸去皮尖雙仁炒各半兩上銼碎每服五錢水二盞煎至一盞去滓空心溫服以利下膿血為度未利再服四聖散一名神效栝蔞散治腸癰癰疽生於腦髭背腋乳便毒服之神效生黃栝蔞一枚去皮粉草研末四錢沒藥研末三錢乳香研末一錢上用好紅酒二大碗慢火煎至一碗分作兩服兩日服盡大便順導惡物妙若干栝蔞則用兩枚一方若病在上食後服病在下食前服毒已結成即膿化為水毒未成即於小便中出疾甚再合服以退為妙桔梗湯治男子婦人咳而胸膈隱痛兩腳腫滿咽乾口燥煩悶多渴時出濁唾腥臭名曰肺癰小便赤黃大便多澀桔梗貝母當歸酒浸栝蔞仁枳殼麩炒薏苡仁微炒桑白皮甘草節防己去粗皮各一兩百合蒸黃耆各一兩半北五味子甜葶藶地骨皮知母杏仁各半兩上銼碎每服四錢水一盞半生薑三片煎七分不拘時溫服咳者加百藥煎熱加黃芩大便不利加煨大黃少許小便澀甚加木通車前子煎煩躁加白茅根煎咳而疼甚加人參白芷煎四順湯治肺癰吐膿五心煩熱壅悶咳嗽貝母去心紫菀去苗土桔梗炒各一兩甘草炙銼半兩上搗篩每服三錢水一盞煎五七沸去滓不拘時稍冷服如咳嗽甚加去皮尖杏仁三枚同煎小兒量減治肺癰方上用薏苡米為末糯米飲調下或入粥內煮吃亦可一方用水煎服當下膿血便愈栝蔞散治便