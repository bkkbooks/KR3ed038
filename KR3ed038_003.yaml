body:
  text: 卷之三五膽丸治心風狂走癲癇鯉魚膽雞膽狗膽豬膽羊膽各一個傾汁作一處蛇黃五兩火煅蘸膽汁盡為度上為末別以狗膽汁為丸如綠豆大硃砂為衣每服十五丸食後以磨刀汁吞下或只作末以磨刀水調服亦可抱膽丸治男子婦人一切癲癇風狂或因驚恐怖畏所致者及婦人產後血虛驚氣入心室女月脈通行驚恐蘊結此方累曾經效本是忠懿王之子有疾忽得一僧授此服之即效本名靈砂觀音丹忠懿得之未敢輕信或有一風犬飼以此藥立效破犬腹而視乃抱犬膽因易今名水銀二兩硃砂一兩細研黑鉛一兩半乳香一兩細研上將黑鉛入銚子內下水銀結成砂子次下硃砂滴乳乘熱用柳木捶研勻丸如雞頭大每服一丸空心井花水吞下病者得睡切莫驚動覺來即安再服一丸可除根本奪命散壓氣癲癇用青礞石好者一兩為末同焰硝一兩拌勻入甘鍋內炭火煅通紅須化盡為度冷色如金取研為末每服一錢用薄荷自然汁入蜜調微溫服良久其藥自裹痰逐下隨大便夾和稠黏如膠乃藥之功牛黃丸治風邪變成癲癇時時發動不知人事定心神風癲之狀發無常時每發則仆地吐涎沫無所覺知蓋由血氣皆虛精神離散魂魄失守風邪入於陰經故也又以晚胎之初其母卒大驚精氣並居能令子發癲其證與風癲大率相似牛黃另研珍珠另研琥珀另研鐵粉另研天竺黃另研龍齒另研麝香另研人參去蘆龍膽草去土升麻防風去叉黃芩去黑心鉤藤犀角鎊水銀丹砂各半兩金箔七十片銀箔七十片與水銀丹砂金箔四味同研露蜂房炙全蠍酒炒各一兩知母天門冬去心石菖蒲米泔浸切酒炒白芍藥茯神麥門冬去心甘草炙各一分上除另研藥外余藥搗羅為細末卻入另研藥再羅令勻煉蜜拌和得所更搗千杵丸如梧桐子大夜臥及食後煎新竹葉湯下十五丸至二十丸治癲癇發熱急狂走上以鐵漿服之鬱金丸治癲狂可畏數年不愈多因驚憂得之乃痰涎留於心竅蟬肚鬱金真蜀地來者七兩明礬三兩上為末以薄糊丸如梧桐子大每服五十丸湯水任下初服覺心胸間有物脫去神氣灑然再服稍蘇多服此藥大能去痰一方治癇加生薑汁糊為丸仍以生薑湯下治諸癲風等疾上用鯉魚一片制淨切成塊用明礬四兩為末醃一兩日煎吃其疾必愈瓜蒂散治風癲宜服此藥吐之上用瓜蒂末一錢熱水調下吐痰如吐不止者以真麝香少許溫水服之一方名獨聖散治諸風隔實諸癲痰涎津液湧溢雜病亦然瓜蒂一兩上銼如麻豆大炒令黃色為細末每服量虛實久新或三錢藥末茶一錢酸齏汁一盞調下若用吐法天氣晴明險晦無用如病卒暴者不拘於此法吐時辰午巳前故內經曰平旦至日中天之陽陽中之陽也論四時之氣仲景曰大法春宜吐是天氣在上人氣亦在上一日之氣寅卯辰候也故宜早不宜夜也先令病人隔夜不食服藥不吐再用熱齏水投之如吐風癇病者加全蠍半錢微炒如有蟲者加狗油五七點雄黃末一錢甚者加芫花末半錢立吐出蟲如濕腫滿者加赤小豆末一錢故此不可常用大要辨其虛實實則瓜蒂散虛則梔子豉湯滿加厚朴不可一概用之吐罷可服降火利氣安神定志之劑治邪癲狂大叫奔走上用蛤蟆一枚大者去腸中滓令淨將腸胃卻入腹中入瓶子中固濟以火燒通赤以上罨定隔日取出入麝香一錢同研令細每服一錢新汲水調下守宮膏治久年驚癇心血不足守宮一兩即蠍虎也珍珠麝香片腦各一字研細上將守宮一個以鐵鈐鈐定剪子取去四足連血細研入珍珠麝香片腦各一字許研細薄荷湯調作一服先須用奪命散逐下痰涎或用吐法次服此藥大有神效蓋癇者皆心血不足此物可守宮其血與心之血類也取下如童女血服之於心故能補也心全則病瘥矣治癇疾上用凌霄花為末每服三錢空心用溫酒調下每服藥時解開頭髮用木梳不住手梳以冷水一大碗在側含水口中溫即換以一碗水盡則住梳如此法服四十九日永絕根本不以受病淺深皆愈百無所忌來蘇膏治遠年日近風癇心恙風狂中風涎沫潮閉牙關不開破傷風搐並皆治之上用皂角一斤好肥實無蟲蛀者去皮弦切碎用漿水一大碗春秋浸三四日冬浸七日夏浸一二日揉取淨漿水浸透皂角汁入銀石器或砂鍋內以文武慢火熬用新柳條槐枝攪熬似膏藥取攤在夾紙上陰乾收頓如遇病人取手掌大一片用溫漿水化在盞內用竹筒兒盛藥水將病人扶坐定頭微抬起將藥吹入左右鼻孔中內良久扶起涎出為驗欲要涎止將溫鹽湯令病人服一二口便止忌雞魚生硬濕面等物治癇疾上用金燈花根似蒜者一個以茶清研如泥令患者日中臥茶清調下仍且臥日中良久吐出雞子大物永不發如不吐即熱茶投之大定心湯治心虛中風驚悸恍惚多忘或夢寐驚魘志少不足人參白茯苓去皮茯神去木遠志去心龍骨乾薑炮當歸切焙甘草炙白朮芍藥桂心紫菀去苗土防風赤石脂各二兩上㕮咀每服五錢匕水二盞入棗二枚擘破煎至一盞去滓溫服日三夜二小定心湯治心氣不足風邪所乘驚悸恍惚夢多魘白茯苓去皮四兩官桂去粗皮三兩甘草炙芍藥乾薑炮遠志去心人參各一兩上㕮咀每服五錢匕水二盞棗二枚煎至一盞二分去滓溫服日三夜一秦艽竹瀝湯治風狂亂走秦艽二兩去苗竹瀝一升石膏三兩白茯苓龍齒各一兩半玄參一兩防風一兩生鐵二十斤用水二斗煮取一斗去鐵上為散入鐵汁中煮取五升去滓內竹瀝和勻不拘時候溫服二合防己湯治久風邪入肝脾二經言語不轉漢防己防風桂心附子麻黃各半兩威靈仙三分上㕮咀每服四錢水一盞煎至七分去滓入竹瀝荊瀝地黃汁各一盞生薑自然汁半盞和勻溫服之日三四金箔十珍丸治心神驚悸頭目不清金箔五片銀箔五片丹砂一兩與金銀箔同研琥珀別研玳瑁鎊珍珠別研犀角鎊硼砂別研龍腦別研各一分牛黃別研半錢白茯苓去皮人參各一兩半紫河車二兩茯神半兩去木甘草生一兩上除別研藥外搗羅為末入別研藥和勻煉蜜和丸如雞頭實大每服一丸嚼細用竹葉湯下食後臨臥服茯神丸治心氣不定五臟不足甚者憂愁悲傷不樂忽忽喜忘朝瘥暮劇暮瘥朝發發則狂眩加茯神名茯神丸不加茯神名定志丸菖蒲遠志去心茯苓各二分人參三分上為細末煉蜜和丸如梧桐子大每服六七十丸食後白湯下日三亦得一方加茯神一兩半牛黃五銖為六物茯苓遠志菖蒲各一兩忌酢物羊肉腸茯神散治諸風恍惚心神煩亂志意不安或臥驚恐茯神一兩石膏研龍齒各二兩麥門冬去心一兩半黃耆一兩甘草半兩炙石菖蒲人參去蘆各一兩防風三分遠志半兩去心熟乾地黃羚羊角屑各一兩上㕮咀每服四錢以水一中盞入生薑半分棗三枚煎至六分去滓不拘時候溫服石菖蒲丸治風虛安寢寐鎮心神止恍惚化痰滯石菖蒲遠志去心鐵粉別研丹砂別研各二兩白茯苓去皮人參各一兩半防風去蘆羚羊角鎊各一分金箔五十片三十片研入藥二十片為衣上為末和勻煉蜜為丸如梧桐子大以金箔為衣每服十五丸至二十丸煎人參湯下早晚食後服虎骨散治白虎風走注疼痛發歇不定積年不效者虎骨酥炙黃烏梅肉赤茯苓去皮肉蓯蓉酒浸切焙人參甘草炙芍藥鱉甲去裙邊醋浸炙白朮豆豉慢火炒紫菀去土黃耆焙常山炒枳殼去穰麩炒犀角鎊知母以上各一兩當歸升麻柴胡桔梗炒前胡去蘆桂心去皮木香天靈蓋酥炙各三分桃仁湯浸去皮炒四十九粒上為細末每服二錢匕溫酒調下空心臨臥各一若為丸即煉蜜和丸如梧桐子大每服二十丸至三十丸溫酒下沒藥散治白虎風流注筋骨疼痛沒藥一兩獨活晚蠶砂微炒川芎各一兩半防風去蘆蔓荊子當歸赤芍藥桂心各一兩虎脛骨一兩酥塗炙黃上搗羅為細末每服二錢食前熱酒調下海桐皮散治白虎歷節走注骨節疼痛獨活萆薢鹽水浸焙川芎當歸各三分桃仁去皮焙天麻辣桂牛膝麻黃去節枳殼麩炒海桐皮白芍藥川烏炮去皮臍松節防風杜仲薑製甘草炙各半兩麝香一分虎脛骨一兩酒炙黃上㕮咀每服四錢水一盞半姜五片棗二枚煎六分食前溫服攝風酒治白虎歷節風及諸般風濕流注四肢大風鶴膝一切風疾尋風藤一兩五加皮一兩半虎脛骨二錢半烏藥五錢石楠葉青木香各二錢半蒼朮五錢骨碎補七錢半三角尖一兩石上生者威靈仙川續斷當歸滴乳香川羌活北細辛各二錢半青藤根一兩川牛膝四錢防風甘草節蘇木各五錢南木香二錢半石薜荔一兩石上生者佳生薑一兩半川烏頭一隻分作四分止生用一分上銼碎用無灰酒一罈將藥盛於布袋內放酒罈中油紙封縛以鍋內盛水將酒罈坐於鍋內慢火自辰煮至午連壇取出放冷每日不拘時隨意溫服藥酒如夏恐停久作酸只作半料用小壇酒依上法煮服治白虎歷節風痛者狀如虎咬骨節驚疼白芥子大戟木鱉子甘遂乳香川烏上各等分為細末水糊為丸如梧桐子大每服七八十丸酒下烏蛇浸酒方治風及白癜紫癜烏蛇酒浸去炙微黃防風去蘆桂心白蒺藜炒去刺五加皮各二兩熟乾地黃四兩天麻牛膝去苗枳殼去穰麩炒微黃羌活各三兩上銼細以生絹袋盛藥以無灰酒二斗於瓷瓦中浸密封七日後開每日三度溫飲一小盞忌毒滑物豬雞肉四神散治紫白癜風雄黃雌黃硫黃白礬並用透明者上各等分研為末每用時先浴令通身汗出次以生薑蘸藥擦患處良久以熱湯淋洗當日色淡五日除根硫黃方治赤白癜風詩曰赤癜白癜兩般風附子硫黃最有功薑汁調勻茄蒂擦一擦之後便無蹤白癜用白茄蒂紫癜用紫茄蒂如用藥時先以布擦洗其瘡令損卻以茄蒂蘸藥擦之一方去附子加黃丹枯礬南星一方用雞子一枚釅醋浸過宿針刺小孔瀝取清液入砒霜一綠豆許和勻將粗布痛擦患處以指點藥揩之亦妙一方治紫癜風再入胡粉一分膩粉少許同繁柳汁和勻臨臥時揩三五遍並瘥治白癜不拘遠近用烏雞卵一枚取清先用硫黃碾為末以雞子清調勻用生布一片將藥刷在布上日中曝反復刷三四次釘布子在板上令不皺候乾收起每遇浴罷或動作勞苦汗出之時將布子於患處擦之即愈治白癜風詩曰紫癜白癜一般風水銀輕粉最成功搗取生薑自然汁只消一擦便無蹤治白癜風上平旦以手掠取韭頭露水塗之極效鰻鱺魚塗方治頭項及面上白駁浸淫漸長如癬狀但即無瘡者上用鰻鱺魚一頭肥者炙令脂出先洗白駁用物揩拭之令小痛然後用熟魚脂塗之一度便愈甚者不過三度鶴膝風又名鼓槌風治兩大小腿瘦如蘆柴止有膝蓋大者行履不得用小續命湯料內加萆薢川楝子獨活幹木瓜㕮咀不用生薑用水煎熬於碗底先放麝香少許去滓入於碗內服之服至數十帖後加五積散同煎服永瘥一方用紫荊皮老酒煎候溫常服葈耳散治諸風上於五月五日午時乾地刈取蒼耳葉洗曝燥搗下篩酒若漿服一方寸匕日三作散若吐逆可蜜和為丸每服十丸進前計一方寸匕數也風輕易治者日再服若身體有風者皆作粟樣從肌膚出或如麻豆粒此為風毒了也可以鈹針刺潰出之皆黃汁出盡乃止五月五日多取陰乾貯大甕中稍取用之此草辟惡若欲看病省疾者便服之令人無所畏若時氣不和舉家服之若病胃脹滿心悶發熱即服之並殺三蟲腸痔能進食一周年服之佳七月七九月九皆可採用一方用子炒令香搗去刺使腹破浸酒服能去風補益一方取嫩葉一石切搗和五升麥蘖團作塊放於蒿艾中盛二十日狀成曲取米一斗炊作飯看冷暖入蒼耳麥蘖曲作三大升釀之封二十四日成熟取此酒可兩重布不得全密則溢出又不可和馬肉食之空心暖服酒妙治風何首烏丸王豐甫傳云其父禹玉平生服此有效何首烏西京者尤佳米泔浸一宿用竹刀刮去皮切片焙乾用一斤熟地黃四兩焙懷州牛膝酒浸一宿焙乾四兩上不得犯銅鐵器搗羅為末煉蜜為劑再入木桕內杵一千下丸如梧桐子大每日空心溫酒下四五十丸忌羊血生蔥蘿蔔藕不飲酒以飯飲下大有神效療風以丁公藤漬酒服南史解叔謙門人母有疾夜於庭中稽顙祈告聞空中語云得丁公藤為酒即瘥訪醫及本草皆無至宜都山中見一翁伐木云是丁公藤能療風乃拜泣求得之及漬酒法受畢失翁所在母疾遂愈魯王酒治風眩心亂耳聾目暗淚流鼻不聞香臭口爛生瘡風齒瘰癧喉下生瘡煩熱厥逆上氣胸脅肩髀痛手不能上頭不能解衣帶腰脊不能俯仰腳痠不仁難以久立八風十二痹五緩六急半身不遂四肢偏枯筋攣不能屈伸賊風咽喉閉塞哽哽不利或如錐刀所刺行人皮膚中無有常處久久不治入人五臟或在心下或在膏肓遊走四肢偏有冷處如風所吹久寒積聚風濕五勞七傷虛損百病悉皆治之茵芋烏頭躑躅各三十銖天雄防己石斛各二十四銖細辛牛黃甘草柏子仁通草桂心秦艽茵陳山茱萸去核黃芩胡洽作黃耆附子瞿麥乾地黃杜仲澤瀉石楠葉防風遠志去心王不留行胡洽作天門冬千金翼作王孫以上各十八銖上㕮咀以酒四斗漬十日每服一合加至四五合以知為度千金翼名此為魯公酒有乾薑胡洽無防己以絹囊盛藥用水二斗法曲二斤同漬三四宿出藥囊飲二斗黍米內汁釀之酒熱飲如雞子大日二服稍稍飲之以知為度治風疾取消梨不限多少絞汁而飲昔有一朝士見梁奉御診之曰風疾已深請速歸去朝士復見鄭州馬醫趙鄂者復診之言疾危與梁所說同矣曰只有一法可試吃消梨不限多少咀齕不及絞汁而飲到家旬日唯吃消梨頓爽矣亦以梨葉作煎服搜風大九寶飲治挾氣中風痰雖微去當先服此順氣並開其關竅不致枯廢然後進以風藥或非重熱氣實者亦可服之沉香防風南星炮天雄氣弱者以大附子代薄荷地龍去土木香不見火全蠍去毒各等分上㕮咀每服四錢水一盞生薑五片煎六分去滓入麝香少許啜服不拘時二香散治風氣食三證通用調腸胃氣須兼服之木香藿香白豆蔻半夏曲厚朴薑製陳皮茯苓蒼朮炒甘草炙各半兩益智仁縮砂仁各一兩丁香二錢半上㕮咀每服二錢半水一盞生薑三片棗二枚煎五分去滓不拘時溫服黃耆羌活飲治心脾受病精血虛少風氣乘之日益削消黃耆一兩半羌活石斛去根防風枳殼麩炒人參附子炮裂去皮臍茯苓去皮牛膝酒浸炒五味子牡蠣煅各一兩續斷半兩地骨皮三分生地黃焙二兩上銼如麻豆大每服五錢匕水一盞半煎至一盞去滓溫服日三服人參湯治風厥志意不樂身背疼痛多驚善欠噫氣人參川芎枳殼麩炒芍藥防風細辛附子炮裂去皮臍甘草炙桂心各半兩桔梗炒茯神去木木香各一分上㕮咀每服五錢匕水一盞半生薑半分煎至八分去滓溫服茯神湯治風眩倒屋轉吐逆惡聞人聲茯神去木獨活各四兩黃耆遠志去心防風各五兩生薑三兩甘草人參當歸牡蠣煅白朮蓯蓉附子各一兩上㕮咀以澇水一斗二升煮取三升服五合一日夜盡附子散治風眩目痛耳聾附子炮裂去皮臍乾薑炮防風去皮山茱萸去核細辛各一兩山芋一兩半上為細末每服一錢匕空心溫酒調下六神散治風眩煩悶頭目運轉不止川芎防風去叉甘草炙羌活各一兩荊芥穗雞蘇各一兩半上為細末每服一錢不拘時米飲調下伏龍肝湯治風痱卒不能言口噤手足不隨而強直者上用伏龍肝末五升水八升和攪取汁飲之以盡為善羚羊角散治風痱筋脈緩弱言語蹇澀羚羊角屑桂心茯神麻黃去根節葛根附子炮裂去皮臍當歸炒酸棗仁五加皮各一兩升麻枳殼麩炒獨活各一兩半上㕮咀每服四錢以水一中盞入生薑半分煎至五分去滓不拘時服四生散治男子婦人肝腎風毒上攻眼赤癢痛不時羞明多淚下疰腳膝生瘡及遍身風癬服藥不驗居常多覺兩耳中癢正宜服此無不取效黃耆羌活沙苑蒺藜白附子生用各等分上為細末每服二錢用薄荷酒調下如腎臟風下疰生瘡以豬腰子批開以藥末二錢合定裹煨香熟空心細嚼以鹽酒送下羌活飲子治風毒上攻頭面發熱夾赤唇焦眼澀鼻出熱氣項背拘急兼治肝元虛風等疾羌活獨活川芎柴胡去苗前胡細辛白蒺藜炒去刺麥門冬去心山藥紫蘇葉黃耆蜜炙升麻以上各二錢半烏梅去核枳殼麩炒防風蔓荊子藁本去土荊芥穗甘草炙桑皮炙以上各半兩乾葛一兩上㕮咀每服三錢水一盞半生薑三片薄荷五葉同煎至八分去渣食後溫服麻仁丸順三焦和五臟潤腸胃除風氣治冷熱壅結津液耗少大便閉難或不通若年高氣弱及有風之人大便秘澀者宜服枳殼麩炒白檳榔煨半生菟絲子酒浸別研山藥防風山茱萸去核肉桂去皮車前子各一兩半木香羌活各一兩郁李仁去皮研大黃半蒸半生麻仁研各四兩上為細末入別研藥和勻煉蜜為丸如梧桐子大每服十五丸至二十丸溫水臨臥服之搜風散治風氣中脘不利大便閉澀大黃銼半兩郁李仁去皮半兩川芎一兩枳殼麩炒一兩麻子仁一分檳榔一枚木香一分旋覆花防風各一兩青皮去白焙一分牽牛取頭末二兩一兩生用一兩炒上為細末每服二錢匕臨臥生薑茶調老小加減服導秘丸一名大聖丸治風熱大腸秘澀不通心煩腹滿體熱引飲檳榔木香川芎羌活桂心各二兩大黃濕紙裹煨郁李仁湯浸去皮焙各四兩上為細末煉蜜和丸如梧桐子大每服二十丸漿水下茶湯亦得一方加枳殼二兩蜜丸一方加枳殼麻仁各四兩名麻仁丸一方加甘菊訶黎勒生地黃山芋各二兩名如聖丸一方治熱毒風用溫酒或生薑湯空心服枳殼飲治老人大便風秘不通塞澀妨悶或用蜜導之類不能通者上用枳殼水洗去穰麩炒為粗散每服一大錢入阿膠二片生薑五片蔥白五莖水一大盞煎至六分去滓入蜜少許空心溫服次用蔥白十莖爛研塗臍中卻以手巾蘸蔥湯自內腎腰間浴熨至小腹下少頃氣透即通通秘散治風秘大便澀香白芷不以多少焙乾上為細末每服二錢食前用蜜少許溫米飲調下連進二服即通漢防己散治賊風身體拘急舌強難言手足不遂漢防己黃芩各一兩麻黃去根節石膏各一兩半赤芍藥川芎防風羌活附子炮裂去皮臍當歸炒各三分杏仁湯浸去皮尖炒白朮各半兩上㕮咀每服三錢以水一中盞入生薑半分煎至六分去滓不拘時溫服倉公酒治賊風口噤角弓反張當歸防風各三分獨活一兩半麻黃一兩一分細辛半兩附子一個上㕮咀每服四錢水酒各半煎服口不開者抉開納藥一服蘇二服少汗三服大汗愈白花蛇煎治蠱風身痛如刀割白花蛇烏蛇並用酒浸去皮骨焙乾各二兩白蜜三十兩生薑汁六兩薄荷汁六兩白殭蠶炒乾蠍炒苦參各一兩白附子炮三分上為末先下蜜並生薑汁薄荷汁次下諸藥末拌和勻銀器中重湯熬成煎以無灰酒調下半匙匕久服身體滑膩乳香犀角丸治刺風遍身如針刺乳香研犀角鎊自然銅火煅醋淬附子生去皮臍各一分沒藥研木香蔓荊子草烏炮去皮尖人參丹砂研鐵沙水洗十次用醋一盞煮乾盤內炒出煙盡即傾出研香附各半分上為末再同研藥和勻用酒糊杵為丸如梧桐子大每服十五丸米飲下臨臥服天麻散治體虛腠理開為風邪所中遍身淫濯如針刺天麻白花蛇酒浸去皮骨炙槐實子炒羌活防風去叉蔓荊子白蘚皮晚蠶砂炒枳殼麩炒威靈仙去苗土甘草炙各一兩上為細末每服二錢匕溫酒調下不拘時候獖肝丸治四肢攣縮不伸等證曾有人自幼年酒多長而風痰為酒使痰注骨節四肢不能運動服此有效茯神去心木白茯苓去皮薑黃白朮黃耆羌活五加皮川烏炮去皮臍薏苡仁木瓜半夏曲神麯天雄炮去皮白芍藥乳香別研沒藥別研防風獨活當歸玄胡索桑寄生海桐皮去粗皮木香陳皮去白枳殼麩炒南星炮地龍去土荊芥穗各五錢麝香一錢上用獖肝一具洗淨煮存性研爛同藥末酒糊為劑搗千杵丸如梧桐子大每服三十丸用溫酒吞下如不飲酒用木瓜湯送下牡蠣白朮散治風虛多汗少氣汗多如洗少者痿劣牡蠣煅三分白朮二兩一分防風去叉三兩半上為細末每服二錢匕溫水調下不拘時服如惡風倍防風少氣倍白朮汗多面腫倍牡蠣葳蕤飲治勞風項強急痛四肢煩熱葳蕤三兩羚羊角鎊人參各二兩上搗篩每服半兩入豆豉一二合蔥白一握以水五盞煎取二盞去滓分溫空腹二服附子湯治房室忽中風惡風多汗汗出黏衣口乾上瀆不能勞事身體盡痛名曰內風附子生去皮臍人參各半兩茴香炒茯苓山藥各一分甘草炙乾薑炮各三分上㕮咀每服四大錢水二盅生薑三片鹽少許煎至七分去滓食前服之牛黃天南星丸治風熱相搏肌肉瞤動頭目旋眩筋脈拘急涎潮發搐精神昏昧舌強語澀肢節煩疼心胸不利凡病風氣悉皆治之天南星以牛膽制者用二兩如無即用漿水煮透軟切作片子焙乾天麻二兩獨活白附子炮殭蠶炒人參各一兩當歸洗切焙桑螵蛸炒乾蠍炒甘草生用各三分桂心一分羚羊角鎊犀角鎊麝香別研牛黃別研雄黃別研片腦別研各半兩丹砂別研一兩上先以十三味搗羅為細末再入別研五味和勻煉蜜為丸如酸棗大每服一丸不拘時細嚼溫酒下或雞蘇湯下苦參丸治榮虛衛實肌肉不仁病名肉苛苦參二兩取粉丹參去土炙沙參去土人參五加皮防風去叉蒺藜炒去刺烏蛇酒浸用肉蔓荊子敗龜版酥炙黃虎骨酥炙黃玄參堅者各一兩上為末用不蛀皂角一斤銼碎以水三升挼取汁去滓於無油器內煎熬成膏用煉蜜四兩拌和為丸如梧桐子大每服十五丸至二十丸食後良久夜臥共三服各用荊芥薄荷酒下炊帚散治面及項或生白駁狀如白癬名曰癧瘍故炊帚甑帶履底蛇蛻皮一具上以月蝕夜伺候正蝕時都燒成灰研令細每服不拘時候以溫酒調服二錢仍以醋調藥如膏以塗敷駁上即消治風熱毒氣客於皮膚遍身生㾦癗狀如麻豆方秦艽一兩防風黃芩麻黃去根節犀角屑玄參甘草炙各半兩枳殼麩炒牛蒡子炒黃耆升麻各三分上㕮咀每服三錢以水一中盞煎六分去滓不拘時溫服垂柳湯浴方治皮膚風熱生瘡㾦癗或癢痛倒垂柳二斤銼白礬二兩生用杏仁三兩上㕮咀以水一斗五升煎一斗去滓於無風處洗浴極妙苦參散治遍身風瘙癢不可止苦參蒼耳苗牡荊子白蒺藜炒去刺玄參胡麻子晚蠶砂蛇床子天麻各一兩晚蠶蛾乳香各半兩上為細末每服二錢不拘時候以紫筍茶物調下療舉體痛癢如蟲齧皮上癢時搔則皮脫作瘡蒺藜子三升碎蛇床子二升茺蔚子一升防風五兩大戟一斤大黃一兩礬石二兩熬上㕮咀以酒四升水七升煮取四升去滓內礬石三上火燒用帛拭身上瘥止一方無大黃苦參丸治肺風皮膚瘙癢或生癮疹疥癬寇宗奭云有人病遍身風熱細疹癢痛不可任者連胸頸臍腹及近隱皆然涎痰亦多夜不得睡苦參一斤皂莢去皮並子捶碎二斤以水一斗浸揉取濃汁濾去滓熬成膏上搗苦參為細末用皂莢膏和丸如梧桐子大每服三十丸荊芥薄荷酒下一方無荊芥薄荷唯酒調下治遍身風熱細疹癢痛亦可卷柏散治風皮膚癮疹及風熱毒瘡卷柏枳殼麩炒羌活五加皮麻黃去根節各一兩犀角屑天竺黃赤箭藁本桑耳防風川芎黃耆各半兩烏蛇酒浸去皮骨炙黃二兩上為細末每服二錢食前薄荷湯調下忌熱面雞豬魚蒜秦艽丸治諸風瘙癢癮疹搔之愈甚秦艽防己松脂煉成者各一兩半枳殼麩炒蒺藜炒去角各二兩半川芎苦參白朮防風去叉附子炮裂去皮臍蒴翟乾薑炮各一兩上為細末煉蜜和丸如梧桐子大每服二十丸溫酒下漸加至三十丸旦晚食前各一服鬼箭湯治風疹累醫不效鬼箭白蘞白朮一作白蒺藜礬石熬令汁枯甘草炙各一兩防風去叉二兩上㕮咀每服五錢匕水一盞半粟米粉二錢匕同煎至七分去滓食後溫服兼用粉粉身一方以溫水調藥服蒼耳散治風癮疹瘙癢不止上用蒼耳花子葉各等分為細末以黑豆炒微焦浸酒在內去豆以酒調藥二錢不拘時候服此酒名豆淋酒清肌散治風寒暑濕外搏肌膚發為癮疹遍身瘙癢或赤或白口苦咽乾或作寒熱用敗毒散一兩半加天麻薄荷各三錢蟬蛻二十個去足翼分作六服每服水一盞半生薑三片煎溫服取效五參散治惡風人參沙參丹參玄參苦參木通蒺藜炒去刺烏蛇酒浸去皮骨乾蠍去土天麻赤箭何首烏去皮陳皮去白各一兩黃芩去黑心半兩原蠶蛾一分上並生用搗羅為細末每服三錢匕熱茶湯調下服及半料即減服二錢匕初服三日後先覺頭項脊肩身上疼痛乃藥力與病相擊也當安臥兩復時許即無事如或身上有瘡腫服藥一日後便覺漸減硫黃酒治惡風頭面肢體癮疹魁瘰用透明鋒芒硫黃二錢乳缽內研細入醇酒再研空心飲其清酒將滓又研細再入酒飲之連日如是硫黃能殺惡蟲自大便下治諸破傷風腫及頭面者宜服人參茯苓甘草前胡川芎羌活獨活桔梗柴胡枳殼當歸防風荊芥各等分上㕮咀每服五錢水一盅半生薑一片煎一盅不拘時服急風一字散治破傷風雄黃川烏各二錢半南星川芎白芷各半兩全蠍白附子各一錢半辰砂一錢麝香少許上為細末每服半錢匕溫酒調下忌熱物片時太白散治破傷風欲死者雖患人口已禁但必腹間暖者灌藥入口下咽喉即生附子炮去皮臍草烏炮去皮臍天南星炮藿香去土人參當歸各一兩水銀一錢錫一錢半與水銀結作砂子麝香一錢另研上為細末每服半錢溫酒調下不拘時服惟忌冷水如飲冷水再發不可治矣一方無錫治破傷風將欲死者川烏頭生天南星生半夏生天麻去蘆各等分上銼碎每服一兩半以童男子小便二升半隔夜浸藥明日煎取一大升空心溫服分為三服次服調檳榔末三錢如人行十里更進一服如丈夫病婦人煎婦人病丈夫煎合藥時忌孝子孕婦病人及腥穢物雞犬等仍忌油膩濕面生冷硬物服至一二劑即吐出蟲子或泄瀉更不須服余藥若未吐利即當盡服病在上即吐病在下即利皆出蟲如馬尾人發即瘥此藥能逐諸疾守宮丸治破傷風身如角弓反張及筋脈拘急口噤守宮七枚炙乾去足即蠍虎膩粉半錢天南星一兩酒浸三日曝乾上搗研為細末以薄麵糊為丸如綠豆大每服斡開口以酒灌下七丸有傾汗出得解更與一服再汗即瘥一方加白附子一兩煉蜜為丸守宮一名闢宮子又方治破傷風用蛤蟆二兩半切爛為泥入花椒一兩同酒炒熟再入酒二盞半溫熱去滓服之如重車行五里地通身汗出神效治破傷風欲死者用蜈蚣碾細末擦牙吐出涎沫立瘥白殭蠶散治破傷風身腫牙關不開用白殭蠶直者不拘多少生研為末每用生薑自然汁調以雞翎於瘡口掃之勿令乾斯須腫塌皮皺為效仍用生薑汁調半錢匕服一方治癮疹及大腸風秘以酒調服之一方治風痰生薑汁一茶腳濕水調灌之羌活防風湯治破傷風初得在表羌活防風川芎藁本當歸芍藥甘草炙各二錢地榆細辛各一錢上分作二帖每帖水二盞煎至八分熱服若大便閉加大黃緩緩令過加黃芩白朮防風湯若服前藥有自汗者白朮四錢防風八錢黃耆四錢上分作二帖每帖水二盞煎至八分食後服蜈蚣散蜈蚣一對魚鰾五分炒左盤龍五分炒煙盡上為細末用防風湯調服
