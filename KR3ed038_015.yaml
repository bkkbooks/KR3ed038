閃墜驢踢馬咬蛇傷與販往來客旅不服水土他鄉諸般雜證同治調理偏宜此方木香檳榔青皮商枳殼麩炒陳皮莪朮煨黃連各一兩黃柏香附炒大黃各三兩黑牽牛生半斤取頭末四兩上為細末滴水和丸和梧桐子大每服三十丸或五十丸加至微利為度食後生薑湯下如不利加丸數服常服快氣消食通潤大腸一方無黑牽牛一方有當歸黃芩各一兩萬和散治男子婦人一切氣刺氣悶氣脹食傷及中毒積滯兩脅臍下四肢攻注宿有氣疾心腹痞塞嘔吐不思飲食傷風煩悶鼻出清水夜多盜汗漸致瘦弱腸滑水瀉不止等疾皆治之茴香炒蘿蔔子生莪朮濕紙裹煨桂心各一兩白芷一兩半陳皮一兩一分麥蘖一分乾薑炮三分甘草炙一兩三分白朮米泔水浸一宿桔梗牽牛炒熟取頭末各半兩荊三稜三兩半用濕紙裹煨上為細末每服一錢水八分煎至六分和滓稍熱服或入棗煎如湯點服亦得婦人血氣入當歸少許心痛炒茴香酒調下中酒熱酒調下小兒久瀉不止及瀉後傷動胃氣不思飲食瘦悴並以一錢棗半枚水五分煎四分熱服引氣丸治一切滯氣丹砂研安息香研麝香研各一分白芥子三百六十粒炒大戟末牽牛末各一錢牛黃研半錢巴豆一七粒去皮研出油五靈脂研乳香研沒藥研各一兩斑蝥二十二枚去翅頭足研上同研勻用糯米飯和丸如麻子大臨時隨意湯使下一塊氣丸官桂延胡索莪朮炮薑黃砂仁枳實枳殼黑牽牛取頭末檳榔大黃醋煮雷丸使君子取肉白豆蔻丁香各半兩芫花酒浸炒香附子醋浸荊三稜炮陳皮去白胡椒各一兩皂角半斤去皮醋浸炒沉香木香各四錢錫灰四兩川烏二錢半酒浸炒糖球青皮各一兩半大麥芽四兩用江子炒熟去江子蘿蔔子一兩用江子炒去江子江子一兩去油上為末酒糊丸如梧桐子大善治諸般病疾每服五七丸各隨後項湯使下有孕婦人不可服之忌一切熱物婦人一切血氣當歸酒下血崩燕子泥湯下小兒脫肛艾湯下小兒檔脾橘皮湯下小兒驚風一歲一丸薄荷湯下白痢乾薑湯下小兒脾積使君子豬膽蘆薈湯下赤痢甘草湯下一切吐逆生薑湯下心膈膨脹新水下下元冷好酒下風熱閉塞大小便不通花水豆粉調下婦人紅脈不通紅花當歸酒下赤白帶下蔓荊子湯下血昏當歸酒下産前産後吳茱萸一兩重酒一升煎至二沸下血塊氣血等生薑橘皮煎湯入醋少許下常服者淡薑湯下小女紅脈不通紅花當歸酒下男子小腸氣茴香湯下咳嗽烏梅湯下腰疼牽牛湯下傷寒蔥白湯下升降氣六一湯香附子炒六兩藿香葉一兩上為細末每服二錢食前白沸湯點服二聖散治諸般氣痛芫花醋煮乾半兩延胡索炒一兩半上為細末每服一錢男子元臟氣痛蔥酒調下瘧疾煎烏梅湯下婦人血氣痛當歸酒調下諸般氣痛薄荷湯調下小腸氣茴香湯調下勝金散治男子婦人五臟氣一切冷氣血氣肥氣息賁氣痞氣奔豚氣伏梁氣疾搶心切痛不可忍似板築定冷汗喘急不語欲絶痛令立止天台烏藥細銼酒浸一宿微炒茴香炒青皮去白良薑各一兩上為細末每服二錢空心用溫酒調服婦人用薑煎童子小便調服酴醿丸順氣寬胸進美飲食木香甘草炙各半兩丁香枝薑黃各一兩上為細末煉蜜丸每兩作四十丸每服一丸細嚼溫水下溫中分氣丸治三焦氣不升降胸膈滿悶南星半夏各一兩香附二兩三味用薑汁半盞米醋半盞水一盞同煮乾白朮茯苓各半兩木香一分青皮陳皮良薑乾薑四味各一分用酒半盞水一盞同煮乾上為細末酒煮麵糊為丸如梧桐子大每服二十丸湯飲任下不拘時服疏氣丸治上氣腹脹大黃銼炒一兩半檳榔炮三枚郁李仁去皮尖焙陳皮去白焙各一兩青皮去白焙枳殼麩炒羌活川芎各半兩檀香銼木香各一分上為細末煉蜜和丸如梧桐子大每服二十丸用生薑湯送下食後臨臥時服半夏湯治上氣嘔吐不能下食半夏湯洗焙三分陳皮去白焙白朮甘草銼炙桂心各半兩人參一兩厚朴去粗皮薑汁炙香熟二兩上㕮咀每服五錢水一盞生薑五片棗三枚煎至七分去滓溫服日三壓氣散治上氣嘔逆及疏利過多虛氣上攻及短氣少氣噎悶宜服木香人參白茯苓去皮藿香葉陳皮去白焙枳殼麩炒甘草炙各一兩附子一枚炮裂去皮臍上為細末每服二錢煎紫蘇木瓜生薑湯調再入銀盞重湯煎五七沸溫服無比沉香丸治男子婦人諸物所傷遍身走注疼痛多年沉積不散嘔吐噁心胸膈不利心腹刺痛久痢不止肋脅脹滿一切冷氣不和婦人胎前産後諸疾並皆治之沉香檀香木香乳香沒藥各半兩丁香香附炒去毛八角茴香莪朮炮胡椒官桂荊三稜醋煮良薑青皮陳皮去白巴豆炒去油川烏炮草烏炮大麥蘖川椒去目炒各二錢半上為細末用醋煮麵糊為丸如櫻桃大每服一丸用棗一枚燒熟去核同藥細嚼用冷米飲送下心腹急痛用冷水送下傷損腸內痛煎乳香湯下積聚亦如前法服後以乾物壓之忌熱物大有神效食後臨臥時服
