body:
  text: 卷之十五氣門附論陰陽應象論云喜怒傷氣寒暑傷形暴怒傷陰暴喜傷陽厥氣上行滿脈去形喜怒不節寒暑過度生乃不固故重陰必陽重陽必陰玉機真藏論云憂喜悲恐怒令不得以其次故令人有大病矣因而喜大虛則腎氣乘矣憂則心氣乘矣怒則肝氣乘矣悲則肺氣乘矣恐則脾氣乘矣丹溪云夫氣周流一身以為生者氣也陽往則陰來陰往則陽來一升一降無有窮已苟內不動於七情外不感於六淫其為氣也何病之有世言冷氣滯氣逆氣上氣皆是肺受火邪氣得炎上之化有升無降熏蒸清道甚而至於上焦不納中焦不化下焦不滲輾轉變為嘔為吐為膈為噎為痰為飲為翻胃為吞酸或痞或痛為脹滿或嘈雜或噫腐氣或不思食諸證互見後人不明經旨以脈訣熱則生風冷生氣寒主收引令冷氣上衝氣逆氣滯矣非冷而何原病式曰諸氣逆沖上嘔湧溢食不下皆屬於火諸病吐嘔酸皆屬於熱諸積飲痞膈中滿皆屬於濕然則諸氣諸飲諸嘔吐翻胃吞酸等病豈有寒乎曰五臟各有火五志激之其火隨起若諸寒為病必須身犯寒氣口食寒物乃為病寒非若諸火病自內作所以氣之病寒者十無一二舉痛論云百病生於氣也怒則氣上喜則氣緩悲則氣消恐則氣下寒則氣收炅則氣泄驚則氣亂勞則氣耗思則氣結九氣之不同也然諸氣動作皆為熱也子和云夫天地之氣常則安變則病而況人稟天地之氣五運迭侵於外七情交戰於中是以前人惜氣如持至寶庸人投物而反傷大和此軒歧所以論諸痛皆因於氣百病皆生於氣遂有九氣不同之説氣本一也因所觸而為九怒喜悲恐寒暑驚思勞也其言曰怒則氣逆甚則嘔血及飧泄故氣逆上矣王太僕曰怒則陽氣逆上而肝木乘脾故甚則嘔吐及飧泄喜則氣和志達營衛通利故氣緩矣悲則心系急肺布葉舉而上焦不通營衛不散熱氣在中故氣消矣恐則精卻卻則上焦閉閉則氣還則下焦脹故氣不行矣又曰恐則傷精卻上而不下流下焦陰氣亦回還而不散故聚而脹也然上焦固禁下焦氣還故氣下行也寒則腠理閉氣不行故氣收矣又曰身涼則衛氣沉故皮膚之理及滲泄之處皆閉密而氣不流行衛氣收斂於中而不散炅則腠理開營衛通汗大出故氣泄矣又曰人在陽則舒在陰則慘故熱則膚腠開發營衛大通津液而汗大出驚則心無所倚神無所歸慮無所定故氣亂矣勞則喘息汗出內外皆越故氣耗矣又曰疲勞役則氣奔速故喘息氣奔速則陽外發故汗出內外皆踰越於常紀故氣耗損也思則心有所存神有所歸正氣留而不行故氣結矣又曰繫心不散故氣亦停留此素問之論九氣其變甚詳其理甚明然論九氣所感之疾則略惟論嘔吐及飧泄余皆不言惟靈樞論思慮悲哀喜樂愁憂盛怒恐懼而言其病曰思慮而傷神傷神則恐懼自失破㿉脫肉毛瘁色夭死於冬脾憂愁而不解則傷意意傷則恍亂四肢不舉毛瘁色夭死於春肝悲哀動中則傷魂魂傷則狂忘不靜不正陰筋而攣兩脅不舉毛瘁死於秋肺喜樂無極則傷魄魄傷則狂狂者意不存人毛革焦毛瘁色夭死於夏心盛怒而不止則傷志志傷則喜忘其前腰脊不可俯仰屈身毛瘁色夭死於季夏脾恐懼不解則傷精精傷則骨痿厥精時自下是故五臟主藏精者也不可傷傷則失守而陰虛虛則無氣無氣則死矣又曰神意魂魄志精所主之病然無寒暑驚勞四證余以是推廣之怒氣所至為嘔血為飧泄為煎厥為薄厥為陽厥為胸滿脅痛食則氣逆而不下為喘渴煩心為消痹為肥氣為目暴盲為耳暴閉筋縱發於外為疽癰喜氣所至為笑不休為毛革焦為肉病為陽氣不收甚則為狂悲氣所至為陰縮為筋攣為肌痹為脈痿男為數溲血女為血崩為酸鼻辛頞為目昏為少氣不能報息為泣則臂麻恐氣所至為破㿉脫肉為骨酸痿厥為暴下淥水為面熱膚急為陰痿為懼而脫頤驚氣所至為潮涎為口呿為癡癇為不省人為僵仆久則為𤸷痹勞氣所至為咽噎病為喘促為嗽血為腰痛骨痿為肺鳴為高骨壞為陰痿為唾血為冥視為耳閉男為少精女為不月衰甚則潰潰乎若壞都汨汨乎不可止思氣所至為不眠為嗜臥為昏瞀為中痞三焦閉塞為咽嗌不利為膽疸嘔苦為筋痿為白淫為慮後與氣怏然如衰為不嗜食寒氣所至為上下所出水液炅氣所至為喘嘔吐酸暴注下迫凡此九者內經有治法但以五行相勝之理治之夫怒傷肝肝屬木怒則氣並於肝而脾土受邪木太過則肝亦自病喜傷心心屬火喜則氣並於心而肺金受邪火太過則心亦自病悲傷肺肺屬金悲則氣並於肺而肝木受邪金太過則肺亦自病恐傷腎腎屬水恐則氣並於腎而心火受邪水太過則腎亦自病炅傷脾脾屬土思則氣並於脾而腎水受邪土太過則脾亦自病寒傷形形屬陰寒勝熱則陽受病寒太過則陰亦自病炅傷氣氣屬陽熱勝寒則陰受病熱太過則陽亦自病凡此七者更相為治盛衰之理經曰脈滑者多血少氣澀者少血多氣大者氣血俱多脈來大而堅者血氣俱實小者血氣俱少脈來細而緩者血氣俱虛代者氣衰細者氣少浮而絶者氣闢大而滑中有短氣尺脈澀而堅為血實氣虛尺脈細而微者血氣俱不足也劉立之脈理玄要曰下手脈沉便知是氣沉極則伏澀弱難治其或沉滑氣兼痰飲且人身稟天地陰陽以生藉血肉以成其氣一氣周流以成其神形神俱備乃謂全體故陰陽升降血脈流行營衛運轉五臟六腑相養相生皆氣之使也蓋天地有五行而變化生風寒暑濕燥之順逆順之平逆之害人有五臟亦生喜怒憂思恐故曰根於化育者天地之泰和其體自安發於疢疾者陰陽之乖戾大抵氣鬱在上宜以散之氣鬱在下當以利之此則舉其大略言之工於醫者當推脈證治之氣通治方三香正氣散治陰多陽少手足厥冷氣刺壅滯胸膈噎塞心下堅痞嘔噦酸水木香丁香各半錢陳皮去白厚朴去粗皮薑製益智仁縮砂仁香附子炒去毛甘草各一錢半乾薑炮丁香皮蓬莪朮炮烏藥各一錢上作一服用水二盅生薑三片紅棗一枚煎至一盅去滓不拘時服沉香降氣湯治三焦痞滯氣不宣暢心腹痛嘔吐痰沫五噎五膈並皆治之沉香木香丁香藿香葉人參去蘆白朮甘草炙各半錢肉豆蔻桂花檳榔陳皮去白縮砂川薑炮枳實炒白檀香各一錢白茯苓去皮青皮去白白豆蔻各二分半上作一服用水二盅入鹽少許煎至一盅不拘時服紫沉通氣湯治三焦氣滯不能宣通腹脅脹大便祕紫蘇葉枳殼麩炒陳皮去白赤茯苓去皮檳榔甘草炙各一錢沉香麥門冬去心木香五味子桑白皮黃耆乾生薑薄荷葉荊芥穗枳實麩炒各半錢上作一服用水二盅煎至一盅空心溫服異香散治腎氣不和腹脅膨脹飲食難化噫氣吞酸一切冷氣結聚腹中刺痛並皆治之石蓮肉去皮半錢莪朮煨益智仁去殼炒荊三稜炮甘草炙各三錢青皮去白陳皮去白各一錢半厚朴去皮薑製炒一錢上作一服用水二盅生薑三片紅棗一枚鹽一捻同煎至一盅不拘時熱服順氣木香散治氣不升降胸膈痞悶時或引痛及酒食過度噫氣吞酸心脾刺痛女人一切血氣刺痛並皆治之木香蒼朮米泔水浸桔梗去蘆茴香炒乾薑炮陳皮去白縮砂仁厚朴去皮薑製炒丁皮良薑炒肉桂去粗皮甘草炙各一錢上作一服用水二盅生薑三片紅棗二枚煎至一盅不拘時熱服入鹽少許亦可和氣散治脾胃不和中脘氣滯心腹脹滿嘔吐酸水青皮去白茴香炒蒼朮米泔水浸陳皮去白肉桂去粗皮良薑去蘆炒香附子炒去毛甘草炙各一兩桔梗去蘆三兩上為細末每服二錢鹽少許沸湯調服化氣湯治一切氣逆胸膈噎塞心脾卒痛嘔吐酸水丈夫小腸氣婦人血氣並皆治之沉香胡椒各一兩半縮砂去殼桂心去粗皮木香各一兩乾薑炮莪朮煨青皮去白炒茴香炒陳皮去白炒丁皮甘草炙各二兩上為細末每服二錢生薑紫蘇湯調下婦人淡醋湯調服蟠蔥散治男子婦人脾胃虛冷氣滯不行攻刺心腹痛膀胱小腸腎氣疼痛及婦人血氣刺痛並皆治之延胡索肉桂去粗皮乾薑炮各半錢蒼朮米泔水浸一宿切焙甘草炙各三錢縮砂去皮檳榔丁皮各一錢半三稜煨莪朮煨茯苓去皮青皮去白各一錢上作一服用水二盅連根蔥白一莖煎至一盅空心熱服木香流氣飲治諸氣痞塞不通胸膈膨脹面目虛浮四肢腫滿口苦咽乾大小便祕陳皮去白二錢半夏湯洗七次厚朴去皮薑製青皮去白紫蘇葉香附去毛肉桂去皮不見火蓬莪朮煨丁皮不見火大腹皮檳榔藿香葉木香不見火草果甘草炙各一錢木通去節麥門冬去心香白芷赤茯苓去皮白朮乾木瓜人參去蘆石菖蒲各半錢上作一服用水二盅生薑三片紅棗二枚煎至一盅不拘時熱服鹽煎散治男子婦人一切冷氣攻衝胸膈刺痛不已及脾胃虛冷嘔吐泄瀉膀胱小腸氣婦人血氣並皆治之縮砂仁去殼蒼朮米泔水浸二宿茯苓去皮草果去皮煨川芎肉豆蔻茴香炒蓽澄茄大麥芽檳榔良薑炒枳殼麩炒厚朴去皮薑製炒陳皮去白羌活去蘆甘草炙各一錢上作一服用水二盅入鹽少許煎至一盅空心熱服雞舌香散治心脾引痛中脘氣滯停積痰飲胸膈脹滿陰陽不和臟腑虛弱並皆治之香附子炒去毛肉桂去皮赤芍藥天台烏藥良薑炒各二錢甘草炙半錢上作一服用水二錢入鹽少許煎至一盅空心熱服分心氣飲治一切氣留滯於胸膈之間不能流暢以致痞悶噎塞不通大便虛祕木香不見火丁皮人參去蘆麥門冬去心大腹皮大腹子炮桑白皮草果仁桔梗去蘆厚朴去皮薑汁製白朮各七分半香附子炒去皮毛藿香去土紫蘇葉去梗陳皮去白各一錢一分半甘草五分上作一服用水二盅生薑三片紅棗二枚去核燈心十莖煎至一盅食遠服七氣湯治七情之氣鬱結於中心腹絞痛不可忍者人參去蘆肉桂去皮甘草炙各二錢半夏湯泡七次焙乾半兩上作一服用水二盅生薑五片煎至一盅食遠服蘇合香丸專能順氣化痰治傳尸骨蒸諸虛勞瘵卒暴心痛鬼魅瘴瘧赤白下痢小兒驚搐等證並皆治之沉香麝香訶黎勒煨去核丁香青皮安息香別研為末用無灰酒一升熬膏香附子炒去毛蓽茇白朮白檀香犀角硃砂研飛各二兩薰陸香別研龍腦研蘇合香油入安息香膏內上件研為極細末和勻用安息香膏並煉蜜和劑每一兩作五丸不拘時用溫水化下一丸或溫酒化服或生薑湯磨化服亦可撞氣阿魏丸治五種噎疾九般心痛痃癖氣塊冷氣攻刺腹痛腸鳴嘔吐酸水丈夫小腸氣婦人血氣並皆治之茴香炒青皮去白陳皮去白莪朮炮川芎甘草炙各一兩生薑四兩切片鹽半兩醃一宿炒令黑色肉桂去皮縮砂仁丁香皮白芷各半兩胡椒阿魏醋浸一宿同面為糊各二錢半上為細末用阿魏和麵糊丸如雞頭大硃砂為衣每服二三丸丈夫氣痛炒薑鹽湯下婦人血氣刺痛醋湯下沉香降氣湯治陰陽壅滯氣不升降胸膈痞塞喘促短氣又治脾胃留飲噫醋吞酸脅下妨悶沉香四兩半縮砂仁十二兩甘草炙三十兩香附子去毛一百兩上為細末每服二錢入鹽少許沸湯調服不拘時聚香飲子治七情所傷遂成七疝心脅引痛不可俯仰檀香木香乳香沉香丁香並不見火藿香各一錢半玄胡索炒片子薑黃洗川烏炮去皮桔梗去蘆炒桂心不見火甘草炙各半錢上作一服用水二盅生薑五片棗子一枚煎一盅食遠服益智仁湯治疝氣連小腹痛甚不已診其脈沉緊是腎經有積冷所致益智仁乾薑炮茴香炒甘草炙各二錢烏頭炮去皮三錢青皮去白一錢上作一服用水二盅生薑三片入鹽少許煎一盅空心服回陽湯治體虛氣中脈息大弱飲食不進乾薑炮一錢益智仁四錢青皮去白三錢川烏生去皮臍一錢半附子生去皮臍一錢半上作一服用