body:
  text: 卷之六十二牙齒門附論東垣曰夫齒者腎之標口者脾之竅諸經多有會於口者其齒牙者是也手足陽明之所過上齦隸於坤上乃足陽明胃之脈貫絡也止而不動下斷嚼物動而不休手陽明大腸之脈所貫絡也手陽明惡寒飲而喜熱足陽明喜寒飲而惡熱其病不一牙者腎之標亦喜寒寒者堅牢為病不同熱甚則齒動齦齦袒脫作痛不已故所治療不同也有惡寒冷之物作痛者有惡熱物而作痛者又有惡寒物又惡熱物而作痛者有惡寒飲少熱飲多而作痛者有惡熱飲少寒飲多而作痛者有牙齒動搖而作痛者有齒袒而為痛者有齒為疳所蝕缺少血出為痛者有齒齦腫起為痛者有脾胃中有風邪但覺風而作痛者又有牙上多為蟲所蝕其齒缺少而色變為蟲牙痛者有胃中氣少不能衛寒袒露其齒作痛者有牙齒疼痛而穢臭之氣不可近者痛既不一豈可一藥而治之大抵齒之諸痛皆胃熱火旺之故且齒者骨之精華骨乃腎之所主外板則為牙內床則為齒腎氣強盛則齒自堅衰則齒必為病且手陽明之脈貫頰入於下齒縫中灌注於牙倘風寒壅熱之氣或鬱滯胸中沖發於口則病之於齒輕者為宣露齦頰浮腫甚者則為疳䘌齲脫之證齒牙之病在乎手足陽明二經動搖齦脫是以足少陰故此三經所主為多然齒袒蟲疳濕熱齦腫血出作痛痛而穢臭者皆胃熱火盛所致亦有諸經錯雜之邪與夫外因得之者學者宜深究之陳無擇云齒為關門腎之榮骨之餘也腎衰則齒豁精固則齒堅又大腸支脈在牙齦主灌注於牙大腸壅則齒之為浮大腸虛則齒露挾風則攻目頭面或腫盛動作不時東垣又云有劉經歷乃內年三十餘病齒痛不可忍須騎馬外行口吸涼風其痛立止至家其痛復作家人以為祟神禱於巫師而不能愈病乃濕熱為邪也足陽明多血多氣加以膏粱之味助其濕熱故為此痛因立一方不須騎馬常令風寒之氣生於齒間以黃連胡桐淚之苦寒新薄荷葉荊芥穗之辛涼四味相合而作風寒之氣治其濕熱為主以新升麻行陽明經為使牙齒骨之餘以羊脛骨灰補之為佐麝香少許入肉為引共為細末擦之痛乃減半又以調胃承氣湯去硝加黃連以治其本服之下三兩行其痛良愈遂不復作是以前人立方用辛涼風劑風能勝濕苦以泄熱也世俗多有用芫花大戟小麥川椒細辛蒼耳熬湯熱漱而牙痛立止者人之牙齒致病實多內則氣鬱血熱等因兼啖炙爆或以寒水鹹酸辛辣之味適口豈不漬搏且如以醋沃石則石蘇矣況人之骨余者余然雖經絡之喜寒熱氣各不同受病之由自有虛實後之學者熟究此論治之獲功在乎剋日矣牙齒通治方清胃散治因服補胃熱藥致使牙齦上下疼痛不可忍牽引頭腦滿面熱發大痛足陽明之別絡於腦喜寒惡熱乃手足陽明經中熱盛而作痛也牡丹皮升麻各一錢當歸生地黃黃連各一錢半上作一服用水二盅煎至一盅食遠服神功丸治多食肉口臭不可近牙齒疳蝕牙齦肉將脫齒落血不止黃連三錢酒製升麻二錢木香當歸身茴香葉如無藿香代之各一錢上為細末湯浸蒸餅和丸如綠豆大每服八十丸食遠用白湯送下漱口玉池散治風蛀牙疼腫癢動搖牙齦潰爛宣露出血口氣等疾當歸川芎防風白芷藁本細辛升麻地骨皮槐花甘草各等分上作一服用水二盅黑豆三十粒生薑三片煎至一盅去滓不拘時漱口吐去牢牙散治牙齦綻肉牙疳腫疼牙齒動搖欲落牙黃口臭升麻四錢羊脛骨灰羌活各一兩草龍膽一兩半酒製上為細末每用少許貼牙齦疼處噙良久有涎吐去麝香散治熱多寒少牙露齦內脫血出齒動欲落大作疼痛妨食麝香少許升麻一錢黃連草豆蔻各一錢半熟地黃麻黃各一分益智二分半羊脛骨灰二錢人參生地黃當歸漢防己酒製各三分上為細末每用少許擦牙疼處噙有涎吐去蛀牙散白礬枯滴乳香各等分上為細末熔蠟和成膏子如慄米大每用一丸塞於蛀牙孔中疼即止牢牙地黃散治腦寒痛及牙齒疼生地黃藁本各二分人參漢防己熟地黃羌活各三分益智當歸各四分白芷黃耆各五分麻黃羊脛骨灰黃連各一錢升麻一錢半吳茱萸八分草豆蔻一錢二分上為細末每用少許擦牙疼處荊槐散治牙宣出血不止疼痛荊芥穗槐花上各等分為細末干貼牙患處鬱金散治牙齒出血疼痛鬱金白芷細辛各等分上為細末擦牙齦疼處噙少時有涎吐去防風散治牙齒疼痛防風鶴蝨各三錢上作一服用水二盅煎至一盅不拘時噙飲香椒散治冷證牙齒疼痛香附子紅川椒破故紙炒各二錢蓽茇一錢上為細末入炒鹽二錢研勻每用敷擦患處川芎散治面腫牙疼不可忍川芎白芷細辛各等分上為細末每用少許擦牙疼處噙良久有涎吐去秘方揩牙散治牙齒疼痛遇冷熱痛者良薑細辛胡椒草烏尖各等分上為細末每用少許擦牙疼處噙良久有涎吐去細辛散治風寒邪頭腦牙齒疼痛細辛少許桂枝二分半羌活羊脛骨灰各一錢半麻黃蒼朮藁本各三分柴胡升麻防風白芷各二分當歸四分上為細末每用少許擦牙齒痛處噙有涎吐去救苦散治一切牙齒疼痛及蛀牙疼並治川烏草烏桂花良薑紅豆細辛各二錢石膏官桂各一錢上為細末每用少許貼牙齦疼處噙有涎吐去麝香散治牙齒疼痛麝香一錢銅綠五錢白蘞三錢半白礬白芨各二錢半上為細末研勻每用少許擦牙齒疼處噙有涎吐去長春散治牙齒動搖疼痛牢牙黑鬢髮深有神效皂角一斤去皮弦食鹽二味同燒香附淨洗去毛青鹽另研牛蒡子炒各四兩藿香蓮花蕊旱蓮草各一兩麝香另研片腦另研各二錢半上將皂角銼碎用瓦盆二個上盆底鑽孔三個下盆裝一重皂角一重食鹽將四兩都裝在下盆內將上盆相合泥固濟炭火煅煉煙青為度取出同將余藥碾細入麝香片腦再同研勻為細末每用少許擦牙患處噙良久有涎吐去後用淡鹽湯灌漱即愈草豆蔻散治寒多熱少牙齒疼痛不可忍者草豆蔻一錢三分當歸六分羊脛骨灰熟地黃各七分細辛葉防風各二分黃連升麻各一錢半上為細末每用少許擦牙疼處麻黃散治冬月時風寒濕頭疼項筋急牙齒動搖麻黃不去節防風藁本羊脛骨灰各三錢羌活一錢半升麻黃連草豆蔻各一錢細辛少許熟地黃當歸各主分生地黃草龍膽酒製各二錢上為細末每用少許擦牙疼處白芷散治大寒犯腦牙齒疼痛白芷吳茱萸各四分當歸熟地黃各五分麻黃草豆蔻各一錢半黃耆升麻各一錢藁本三分羌活八分桂枝二分半上為細末每用少許擦牙疼處治蟲散治大寒犯腦牙齒疼痛及風寒作痛蟲腫作疼羊脛骨灰麻黃各二錢半黃耆草豆蔻升麻各一錢黃連當歸益智各四分羌活五分白芷藁本各三分吳茱萸八分桂枝一分熟地黃二分上為細末每用少許擦牙齦疼處皂鹽散治牙齒歷蠹黯黑皂莢一挺酥炙去皮子鹽花槐白皮各半兩細辛去苗葉白礬枯升麻甘松各一分上為細末先以鹽揩齒後用藥半錢勻敷之升麻散治牙齒蠹齒根黯黑升麻槐枝灰各半兩露蜂房白附子炮密陀僧煅各一分上為細末入地黃汁一合和勻陰乾每用揩齒黃丹散治牙齒歷蠹色黑黃丹半兩白礬一兩川升麻研末細辛研末各一分麝香細研一錢上先研白礬黃丹令細於生鐵銚子內炒如火色取出於地上用紙一層襯以物蓋之出火毒一宿後入升麻等三味末同研細每用少許摻於患處麝香散治齒歷蠹麝香一字研定粉一錢研上研勻用黃蠟半兩熔開調攤紙上臨臥時剪作片子貼所患齒齦上脆壞欲盡方治牙齒歷蠹上用白礬以新綿裹於患齒咬定有涎吐去一方治齒齦腫用白礬枯過為末傅齒根下以熱水漱去亦治牙疼治齒痛方蓽茇白芷生地黃當歸鬚蜂房炒薑黃赤芍藥桑白皮炒細辛藁本荊芥穗甘草生用各等分上銼碎每服三錢用水煎出味頻漱神應散治牙疼川芎升麻防風茯苓白芷細辛香附蓽茇甘松各等分石膏比余藥加三倍上為細末每用少許臨臥刷淨牙以指蘸藥搽所患處覺熱麻以水漱去露蜂房散治牙疼不可忍者川芎白芷當歸赤芍藥細辛防風藁本升麻蜂房炒各二錢川椒五粒上作一服用水煎乘熱含漱冷即吐去治牙疼方胡椒青鹽乳香芫花蓽茇良薑細辛雄黃烏頭麇香各等分上為細末牙疼時噙水一口左邊牙疼以藥些少吹入右鼻孔內右邊牙疼吹入左鼻孔中即止治牙疼方石膏四兩荊芥穗川芎各二錢升麻細辛各一兩蓽茇蠍梢各一錢胡椒半錢膽礬少許上為細末先以溫漿水漱過以藥一字擦痛處仍以漿水漱口再以藥擦之叩齒三遍再以溫漿水漱去即愈麝香白牙散治牙疼牙宣口臭麝香少許研石膏半斤膽細辛蒺藜各一兩三柰青鹽炒各半兩丁香檀香甘松白芷各三錢上為細末研勻以指蘸些少擦牙加川芎半兩尤妙升麻散治牙齒疼痛升麻地骨皮槐白皮防風去蘆各半兩莽草桑寄生藁本各一分柳枝一握上銼碎每服五錢以水二大盞入鹽末一錢荊芥五穗同煎至一盞去滓熱含冷即吐日三雄黃散治諸牙疼雄黃細辛青鹽乳香另研良薑蓽茇胡椒各等分麝香少許上為細末研勻以溫漿水刷淨以藥末於疼處擦追出頑涎休吐去就漱數十次痛立止忌油膩一二日一方無青鹽有枯礬九寶散治牙疼膽礬細辛各一錢半青鹽蓽茇如有蟲用無蟲不用川芎砂仁滑石五倍子各一錢麝香少許上為細末與好茶對半研勻早晚擦牙草烏頭散治牙齒疼痛草烏頭米泔浸一宿去粗皮切作片炒一兩五靈脂高良薑白殭蠶蓽茇細辛去苗各半兩乳香另研一錢上為細末研勻每用一字擦牙合口少時去涎盡以鹽湯漱口吐去定痛追風散治牙疼全蠍白芷細辛荊芥防風川芎川椒各一錢上銼碎煎湯熱漱吐去開笑散治負冷齒疼白芷細辛良薑蓽茇香附川椒蜂房炒上等分為細末擦牙嗅鼻一字散治牙齒疼痛蠍梢細辛良薑蓽茇胡椒蜂房炒黃各半兩上為細末每用一字噙溫水隨痛左右鼻內嗅更以半錢擦牙疼處有涎即吐誤咽不妨不拘時候透關散治牙疼蜈蚣頭蠍梢去毒草烏頭尖如麥粒大者各十一枚胡椒七粒川烏頭底如錢薄十枚雄黃七粒如麥大別研上為細末用紙捻子蘸醋點藥少許於火上炙乾塞兩耳內閉口少時即可神效巴豆散治牙疼巴豆七枚去皮雄黃大椒密陀僧蓽茇各二錢上為細末以飯和捻作錠子綿裹塞痛處菖蒲散治牙齒疼痛動搖作臭血出石菖蒲棘針燒煅細辛去苗葉各半兩乾薑炮裂雞舌香各一分上為細末以綿裹一錢貼牙齦上有涎吐之露蜂房散治牙齒疼痛經驗如神蜜蜂房炒細辛各一兩大戟三兩防風半兩上銼碎每服半兩水一大盞煎至八分去滓不拘時熱漱冷則吐去透明雄黃散治牙疼雄黃透明者另研滴乳香透明另研白芷各一錢另研麻黃去節研末半錢上研勻用紙卷緊作捻兒約三寸長捻一頭尖用津液濕蘸藥在紙尖頭上匝入耳內即愈匝得耳緊麝香丸治牙齒疼痛麝香半錢另研胡椒甘松各一分雄黃半分細研上為細末研勻煉蜜和丸如梧桐子大每用新綿裹一丸安在患處咬定立效玄胡索散治牙疼玄胡索一錢斑蝥三個去頭足炒白丁香三十個上為細末新汲水調為丸如小豆大每用一丸以新綿裹左疼入左耳右疼入右耳治牙疼方蟾酥少許巴豆去油研如泥杏仁燒上研如泥以綿裹如粟米大如蛀牙扎入蛀處如風牙扎入牙縫中吐涎盡是效蓽茇丸治牙齒疼痛蓽茇胡椒各等分上為細末熔蠟丸如麻子大每用一丸內蛀孔中香附子散治牙齒疼痛往來不歇香附子四兩細辛半兩上銼碎每服二錢水一盞煎至八分去滓稍熱漱冷則吐之再易治諸牙疼方平胃散少許梅花片腦少許上研勻擦牙疼處立止治牙疼方川椒細辛蓽茇豬牙皂角荊芥食鹽煅上各等分研為末擦患處良久以水漱去麝香一字散治牙疼麝香半錢三柰子二錢以麵裹煨熟上為細末每用三字口噙溫水隨疼一邊鼻內嗅之漱動水吐去便可神效蟾酥丸治牙疼口瘡積年不瘥蟾酥一片水浸令軟麝香少許研上細研丸如粟米大以綿裹一丸於痛處咬之有涎吐去胡椒丸治牙疼胡椒一錢研末蟾酥一字水浸過上細研丸如麻子大以綿裹一丸於疼處咬之有涎吐去橘針湯治牙齒疼久不瘥上用臭橘針不拘多少銼如麻豆每用一合以水一盞煎五七沸熱漱疼處立效治牙齒痛方上以蕪荑仁安蛀齒上有縫就以窒之立驗鯽魚砒方上用鯽魚一個破開入信於內放在地孔中候魚身上自然霜掃燈心點蟲牙咳嗽自落又方靳季謙云常牙疼月餘一試即愈屢效於人上用蠟少許炙洋攤於紙上卻以熟艾攤於蠟紙上以箸卷之成筒去箸置艾筒於牙疼一邊鼻孔內以火燒艾筒待其煙滿口疼止腫消治牙疼方上用藜蘆為末塞於牙孔中勿咽汁神效治牙疼方上於春月採槐嫩枝火煅為末以揩齒止蛀痛治牙疼方上以蘿蔔子二七粒去赤皮細研以人乳和左邊牙疼點於右鼻中如右邊牙疼即點左鼻中立效治齒疼立效方上用川椒去目搗為細末以好白麵搜和丸如皂角子大燒令熱於疼處咬之不過三五度瘥固牙散治牙疼上用仙靈脾不拘多少為粗末煎湯漱牙齒大效治牙疼殊方上用青荷葉剪去四緣留中間連柄處大如錢七枚以釅米醋一盞煎取半盞去荷葉熬成膏抹痛處妙麝香散治齒䘌麝香研附子炮各一分細辛去苗丁香蒲黃白礬研各半兩青黛一兩上為細末綿裹一錢於患處咬之咽津不妨日三五度黃礬菜治疳䘌齒根宣露黃礬燒研干蛤殼燒灰另研各一分防風去叉獨活去蘆各一兩麝香研一錢上為細末研勻以溫漿水漱口後以藥貼齒根上有涎即吐出日再貼即瘥細辛散治齒䘌細辛去苗葉蟾酥炙乾瓜蒂黃連各一分上為細末每服一錢塗貼齒齦上日三五度麝膽散治走馬牙疳危惡候麝香少許膽礬一錢銅綠半兩白礬生用一分上為細末研勻上擦牙蝕處青金膏治走馬牙疳蝕損腐爛青黛二錢砒霜一錢粉霜輕粉麝香少許上為細末以少油旋研如稀糊塗之於夾紙上重疊砑之每用量大小剪貼之仍以白紙封護三礬散治牙根急疳青礬黃礬各半兩白礬枯一分麝香一錢上為細末研勻每用些少敷於瘡上有涎吐之青金散治走馬牙疳蝕損唇舌肉腐牙落臭爛其效如神銅綠砒各等分上研細每用些少敷患處紅鉛散治走馬牙疳上用綠礬不以多少須用鮮明者入乾鍋以炭火燒令赤傾出以好酒拌勻再入鍋如此數遍色紅研為細末入麝香少許研勻先以溫漿水漱淨以指蘸些少敷患處有涎即吐去治走馬牙疳方上用北棗去核每個入信一米許包棗內燒存性研細每以些少敷患處青黛散治牙疳風疳齒及齦朽爛欲盡根出有蟲疼痛青黛細辛當歸棘針微炒木香香附青葙子各半兩梧桐淚菖蒲乾薑炮麝香細研各一分上為細末研勻每用半錢以綿裹含日四五度夜二度此藥無毒兼以溫水調一錢服八仙散治牙疼防風白芷細辛地骨皮川芎荊芥羌活甘草各等分上銼碎每服三錢水一大盞煎數沸去滓澄清漱鶴蝨散治牙齒風疳膿血出牙根有蟲鶴蝨露蜂房燒灰細辛各半兩膩粉麝香細研各一分上為細末研勻每用臨臥時剪紙如柳枝葉樣塗藥貼所患處一方以濕帛子摻藥貼患處麝香散治齒漏疳蟲蝕齒齦臭爛麝香黃礬燒赤青礬燒赤白礬枯各一分蘆薈半分蛤蟆燒灰半兩上為細末研勻先以綿拭齦上惡血出即用濕紙片蘸藥貼患處富次律有女年數歲齒上忽生一黑點後數日齦爛成走馬疳用此方即愈鯽魚散治齒漏疳宣露膿血出大鯽魚一枚砒霜一分乾地黃研末一兩上將魚破腹去腸入下二味藥以紙裹魚入火燒煙絕取去其紙灰更入白礬灰麝香少許細研為末每用半錢摻濕紙片上貼患處細辛散治風蚛牙疼牙齦宣爛牙齒動搖腮頷浮腫細辛去苗荊芥去梗各一兩白芷草烏各一兩紅椒去目炒鶴蝨縮砂去殼豬牙皂角蓽茇各半兩上為細末每用少許於痛處擦之有涎吐去不得咽少時以溫水漱口頻頻擦之立有神效七香散治風蚛牙疼及牙宣蔓荊子去皮荊芥穗香附子炒去毛地骨皮白芷防風各一分草烏三枚麝香少許研上銼碎每服三錢水一盞煎數沸去滓澄清熱含冷吐附子丸治久患牙疼及齒齦附子一兩去皮臍生用胡椒蓽茇黃蠟各一分上為細末熔蠟和丸如梧桐子大每用一丸綿裹以患牙咬之如蛀牙安在竅內雄黃膏治蟲牙疼雄黃二錢乳香沒藥各一錢麝香半錢上為細末熔黃蠟和丸安在蟲蛀牙孔中白礬丸治牙齒被蟲蝕有蛀孔疼痛牙齒根朽爛白礬枯黃丹各一錢蝙蝠糞二十粒巴豆一粒微炒去皮上同細研以軟粟米飯和丸如粟米大曬乾凡有蛀蚛孔疼痛不可忍者以一丸於痛處咬之立效掃痛丸治風蛀牙疼引太陽穴痛川烏炮半兩鶴蝨焙乾一兩良薑一兩以青鹽半兩炒上為細末風牙痛刀上燒鹽同前藥擦蛀牙痛白梅肉同前藥丸塞之治蟲蛀牙疼巴豆肉三枚明乳香一錢上同研熔黃蠟和丸如麻子大每用一丸塞蛀孔中殺牙蟲方治牙齒被蟲蝕有蛀孔疼痛上用雄黃研細以棗膏和丸塞孔中卻燒針篦烙之或研細隨左右疼處以剜耳送入耳中一方以雄黃研末入麝香少許研勻敷痛處治蟲牙方上取韭菜子碗蓋火燒之卻以竹箬卷一小角兒通蛀處如下牙蛀則以韭菜子濃煎湯頻漱其蟲自出治蟲牙疼方上用蟾酥搽生絲線陰乾剪二分長紝入痛牙根里停熱物片時一方蟾酥以熱湯化開新綿少許蘸藥如粟米大塞痛處取蟲牙法治風腫蟲蛀動搖不安上於三伏內用赤馬肉一塊或白者懸空於靜室候其生蛆吊下者收拾起於熱瓦上焙乾研為末每用竹篦蘸一小點放在疼牙上咳嗽一聲牙自落柳枝湯治齒齦腫連耳腦腫疼垂柳枝槐白皮桑白皮白楊皮各一握上細銼每用半兩以水一大盞煎至七分去滓入鹽一錢攪勻熱含冷即吐去細辛散治齒齦連頷腫疼頻發無時細辛露蜂房各半兩槐枝二兩鹽花一兩上銼碎每服五錢以水一大盞煎至七分去滓熱含冷即吐去消毒飲治大小人兒唇口並齒齦有瘡腫痛臭氣及一切惡瘡並皆治之晚蠶蛾五倍子密陀僧各等分上為細末每用少許摻貼一方干敷瘡上有津吐去皂角散昔有人食蟹多齒間肉壅出昔汪承相好食動風物性及嗜蟹而患此有道人教服此藥而愈上以生地黃汁一碗用豬牙皂角數錠於火上炙令極熱蘸地黃汁再炙再蘸令汁盡為細末敷壅肉上即消縮又用朴硝為末敷壅肉上即消尤快五倍丹治牙腫連喉立效上用五倍子研細以冷水調敷頰外屢效治齒熱痛齦腫方上用川升麻煎湯漱咽解毒治風熱毒攻頭面齒齦腫痛不可忍上用牛蒡根一斤熟搗絞取汁入鹽花一錢於銀器中熬成膏每用塗齒根下重者不過三五度清上防風散治上焦不利風熱攻衝氣血鬱滯牙關悶痛肉虛腫鼻塞聲重頭昏目眩並皆治之防風細辛去苗薄荷各一兩片腦一錢別研川芎七錢白檀香白芷獨活天麻荊芥甘草炙各半兩上為細末研勻每用二錢不拘時淡茶清調稍熱漱冷即吐出如頭昏目痛牙齒悶腫用熱茶清食後調服三錢升麻湯治一切風齒疼痛升麻一兩雞蘇四兩地骨皮去土八兩露蜂房去土甘松去土細辛去苗防風去叉甘草生用各二兩上㕮咀每服三錢水一盞煎至七分去滓熱漱冷即吐出雄黃散治諸般風腫牙疼雄黃細辛青鹽石膏良薑蓽茇胡椒各等分麝香少許上為極細末早晚搽於牙上漱三五次吐去再搽草烏散治風牙疼痛草烏全蠍白殭蠶炒去嘴足兩頭尖各七個上為細末以指蘸藥擦於疼處唾津勿咽然後漱之吐出逡巡散治風牙疼腫不拘新久一服立效全蠍一枚瓦上焙乾高良薑一塊約二寸上為細末以手指蘸藥如齒藥用須擦令熱徹須吐出少涎以鹽湯漱口大妙亦治腮頰腫痛治風熱上攻齒痛余頃任淮西幕府己酉冬被檄來和州至含山縣齒痛大作忽於一刀鑷人處得草藥一捻許以湯泡少時冷暖隨意以手指蘸藥水浥痛處即定明日若人去歸余因得傳其方於後以治人多效上用皺面地蔥子即本草豨薟又名地松者霜後收之每用少許湯泡或云即是鶴蝨但本草別有鶴蝨差為不同沈存中筆談專辨地松云其子名鶴蝨余之所用正是此物也錢季誠方用鶴蝨一枝折置齒中高監云以米醋煎鶴蝨漱口其痛立定尤妙又方治風腫氣腫牙疼及風蛀牙疼有苦牙痛者百藥不效用此馬敏叔說一村媼苦牙痛百藥不效用此即愈上用生絲瓜一個小者擦鹽火燒成灰存性為末擦於痛處腫處涎出盡即愈上乃嚴月軒家傳屢效之方自患此證一試而可睡後以水調藥灰掩上腮腫處尤妙前有此方治蛀牙據月軒此物大能去風若蛀牙則不效治風齒疼頰腫上用獨活酒煮熱含之一方銼碎以水二大碗煎至一碗去滓熱含冷即吐亦治齒風宣露天雄散治腎虛齒痛天雄炮去臍當歸切焙細辛去苗附子炮去皮臍乾薑炮藜蘆去蘆苦參生地黃切焙甘草炙各半兩上為細末揩齒痛處日三五次勿咽津每藥盡以水漱去牢牙散治牙齦宣露栝蔞根二兩用砂鍋子內甘草水煮軟取出令乾為末白檀香一兩雞舌香十枚白芷半兩麝香一分研上為細末每用少許揩牙久使牢牙誤咽無妨治齒齦宣露上以蚯蚓屎水和為泥火燒令赤研之如粉臘月豬脂和敷上日三次永瘥一方同入瓷瓶內黃泥固濟煻火煨燒一夜候冷取出細研用如常法揩牙三因方謂石佛庵主年七十餘云祖上多患齒疼脫落此方奇效數世用之齒白齊密乃良方也治熱毒上攻宣露出血齒痛齦腫亦治舌出血百草霜食鹽各等分上同研細每用乾擦舌上其血自止牙藥紫金散解風熱疏積壅去口氣止牙宣揩牙白療齦腫及一切痛楚上用生大黃不拘多少入罐內煅存性研為細末早晚用少許擦之溫水漱口大有奇效路鈐梁園村云都下一家專貨此藥兩宮常常以數千來贖其門如市鄰人咸訝其不曾見修制之工密叩厥子遂得是方雄黃麝香散治牙齦腫爛出血雄黃一錢半麝香一字銅綠輕粉黃連黃丹炒各一錢血竭白礬枯各半錢上為細末研勻每用些少敷患處黃連散治齒齦間出血吃食不得黃連白龍骨馬牙硝各一兩白礬一分龍腦一錢上為細末每用少許敷牙根下生肌桃花散治牙齦內血出或有竅時時出血寒水石煅三兩硃砂研二錢甘草炒一字片腦加一字上為細末研勻每用少許貼患處鬱金散治齒出血鬱金白芷細辛各等分上為細末擦牙仍以竹葉竹皮濃煎入鹽少許含咽或炒鹽敷亦可治牙宣出血明白礬煅二錢乳香半錢麝香少許上研細輕手擦良久鹽湯灌漱神效散治牙縫血出草烏青鹽皂莢各一分上入瓦器內燒灰存性每用一字揩齒立效治滿口齒血出上用枸杞為末煎湯漱之然後吞下立止根亦可一方用子汁含滿口更後吃治齒縫忽然血出不止方上用梧桐淚研為細末干貼齒縫如血不止再貼治齒縫中血出上以紙紝子蘸乾蟾酥少許於血出處按之立止嗽口沉香散治牙槽熱毒之氣衝發齒齦腫痛成瘡或瘥或發並皆治之沉香升麻各一兩細辛半兩香附子八兩上銼碎每服二錢水一大盞煎三兩沸去滓溫漱冷即吐去誤咽不妨日三五次牙痛茵陳散治牙齒疼痛外面赤腫疼痛及去骨槽風熱茵陳連翹半夏荊芥穗麻黃升麻黃芩牡丹皮射干羌活獨活大黃炮薄荷殭蠶各一分細辛半兩牽牛一兩上為細末每服三錢水一盞先煎湯熟下藥末攪一攪急瀉出食後連滓熱服露蜂房散治牙齒不生及齒風痛露蜂房炙荊芥川椒去目及合口者炒出汗地骨皮松節青鹽白礬枯各一兩上為細末每用半錢綿裹於患處咬之有涎吐之川升麻散治牙齒不生及齒風宣露川升麻白附子炮各一兩上為細末研勻於八月內取生地黃四斤洗去土絞取汁二大盞即下藥攪令勻放瓷器中每用以柳枝綿裹一頭點藥炙令熱烙齒根下縫中更塗膏少許即驗治牙齒不生雄鼠屎三七枚麝香半錢上同研細用之揩齒勿食酸鹹之物治大人小兒牙齒多年不生上用黑豆三十枚牛糞火內燒令煙盡取出細研入麝香少許研勻先以針挑破不生處令血出卻塗藥在上不可見風忌酸鹹物地骨皮湯治牙齒風蟲齒根挺出動搖疼痛地骨皮防風細辛去苗杏仁湯浸去皮尖炒生地黃焙蔓荊子鹽各一兩白楊皮一握銼上㕮咀每服五錢水一盞半同煎十餘沸去滓熱漱冷吐甘草膏治牙齒挺出疼痛甘草生研末雄黃另研各半兩泔澱二合羊腎脂三兩煉過牛屎汁一合青黛研半分上先於銅器中微火煎三味脂汁五七沸次下三味藥末攪勻慢火熬成膏取桃枝如箸綿裹頭點藥熱烙齒縫中十餘遍日三次好肉生龍齒散治牙齒根宣露挺出爛肉黑血不止疼痛搖動臭氣欲脫落龍齒白石脂黃礬各二兩皂莢刺一兩銼炒川芎半兩桂心一分上為末用不津器中盛之每於食後少許貼之有津勿咽蔓荊子散治牙齒宣露挺出皆是積熱風毒所為蔓荊子生地黃地骨皮青蒿各一兩郁李根皮二兩上㕮咀每服半兩水二大盞煎至一盞去滓熱含冷吐治牙齒宣露挺出方上以生地黃一斤於木臼內搗碎入鹽二合和之上用白麵裹可厚半寸已來於煻灰火中燒斷煙始成去焦面入麝香一分同研末每用少許貼於齒根上石膽散治牙齒齦肉褪縮虛浮時有濃汁牙齒動搖疼痛石膽細辛當歸地龍去土川芎牛膝棘刺炒各三錢梧桐律升麻硃砂黃礬燒過各半兩乳香麝香各二錢半龍腦一字上為細末每用少許敷擦牙齦上津誤咽不妨早晨臨臥每食後日用五六次太和散治牙齒動搖齦肉浮腫蟲蚛發疼梧桐律白茯苓生地黃各半兩華陰細辛川芎白芷升麻各三錢豬牙皂角煅存性二錢青鹽另研一錢麝香另研半錢上為細末研勻每用少許以指蘸擦牙患處常用去疳牢牙定疼五靈膏治牙齒動搖五靈脂半兩松脂黃蠟各一兩黃丹一分蟾酥半字上於瓷器中以慢火熬成膏用白熟絹上攤候冷剪作片子每夜貼於齦上有津即吐誤咽不妨此藥臨臥時用一次於惡硬物底一個牙根兒下裡外貼之亦不甚悶若是牙兒堅固自然得力不惡硬物也地黃丸治齒動搖白茯苓去皮人參山芋各四兩枸杞根三四生地黃五斤取汁白蜜一斤酥少許上將前四味為末以好酒一斗煎至三升去滓入地黃汁白蜜酥同煎至可丸即丸如小豆大每服二十丸用溫酒送下一日三服漸加至五服治牙動搖疼痛五倍子白茯苓細辛各五錢青鹽三錢上為細末朝暮刷牙久有大效宣牙膏治牙齒動搖不牢疼痛不止定粉龍骨各二錢半麝香一字黃蠟一兩上為細末研勻將黃蠟熔化和藥放冷取出熨斗燒熱鋪紙用藥攤之勻薄每用剪作紙條兒臨臥於齒患處齒齦間封貼一宿至次日早晨取出藥每夜用之如此半月消牙齒腫悶生齦肉治疳蝕去風邪牢牙齒大有神效五倍子散治牙齒搖及外物所傷諸藥不效欲落者川五倍子乾地龍去土微炒各半兩上為細末先用生薑揩牙根後以藥末敷之五日內不得咬硬物如齒初折落時熱黏齒槽中貼藥齒上即牢如故治牙齒動搖髭鬚赤黃一服髭黑牙牢甚妙生薑半斤取汁地黃一斤洗淨研細取自然汁仍留滓上以不蛀皂角十莖刮去黑皮弦將前藥汁蘸皂角慢火炙乾再蘸再炙用藥盡為度並前藥滓同入瓷瓶內用火煅存性為末牙齒動搖用藥擦齒齦上如髭黃以針器盛藥末三錢湯調過三日後將藥汁蘸擦髭鬚臨睡時用次早已黑色三夜三次用其黑如漆甚妙治齒根動欲脫落上用生地黃綿裹著齒上咂之又㕮咀以汁漬齒根日四五夜著之並咽汁十日大佳如齒挺出嚼之亦可上蒺藜散治牙齒疼痛齦腫搖動及打動牙齒上用土蒺藜去角生用不以多少為粗末每服五錢以淡漿水半碗煎七八沸去滓入鹽末一捻帶熱時時漱之別無所忌然雖藥味不眾單方之藥取效急速或用根燒灰貼動牙即牢治牙齒動搖上用黑錫半斤大鍋內熔成汁旋入桑條灰柳木槌研令沙以熟絹羅為末每日早晨如常揩牙後用溫水漱在盂內以水洗眼能明目烏髭發及治諸般眼疾麝香礬雄散治大人小兒牙齒動搖齦宣露骨槽風毒宣蝕潰爛不能下食麝香別研龍骨各一錢膽礬雄黃各二錢上為細末每用一字鵝毛蘸藥掃患處又用三錢以水七分煎至五分熱呷滿口喉冷吐去或每日揩牙溫水漱之牙藥麝香散治牙齒不牢固去一切疳蝕黑牙縫去腐臭麝香別研綠礬炒各一兩白茯苓去皮何首烏白龍骨訶子肉藿香去土甘松去土各四錢細辛去苗石膽炒各二錢砂仁八錢零陵香六錢百藥煎五倍子去蛀穰各一兩二錢上為細末研勻先用熱漿水漱口以藥少許擦牙含口少時後以熱水漱口每日早晨用安腎丸治虛壅牙齒浮腫疼痛桃仁麩炒肉蓯蓉酒浸焙破故紙炒乾山藥石斛去根白蒺藜炒去刺川萆薢川烏炮去皮尖巴戟去心白朮各等分上為細末煉蜜和丸如梧桐子大每服七十丸空心用鹽湯送下熟銅末散治牙齒非時脫落令牢定熟銅末一兩當歸細辛地骨皮防風各一分上為細末研如粉每用塗藥在患處以蠟紙封之日夜二三度三五日牢定一日忌嚼硬物牢牙散牢牙齒定疼痛寒水石飛過三錢生定粉二錢龍骨一錢半烏賊魚骨一錢上為細末研勻每用少許不時擦牙誤咽不妨煨腎散治病齒非腫非疼虛不能嚼食上用局方嘉禾散姜煎食後一服次以地骨皮煎湯漱之候空心以羊腰子一對片切勿令斷以蔥絲椒子青鹽蒺藜末固元散二錢拌勻摻於腰子內以豆蔻葉或荷葉包裹煨令熟食之服經兩日頓覺疾利飲食如故蒺藜杵去刺耿運官舊病朽齒朽者既去後來齒之上下左右非腫非疼但覺齒虛不能嚼食良以為苦偶得何主簿授此一試而驗此方乃耿師道傳屢試有效牢牙密齒方上以橡斗子以鹽實之兩個相合以針線縛定火中煅過入荊芥香白芷香附子細辛同為細末橡斗子鹽二兩餘四味各半兩研勻每日擦牙祛風牢牙散防風沉香白芷白蒺藜川芎石膏青鹽荊芥穗細辛甘松香附旱蓮草三柰升麻膽礬荷葉灰沒石子各等分上為細末每日早晨擦牙以溫水漱口吐出烏金散牢牙齒上用芭蕉葉不以多少陰乾燒灰研為細末更入燒鹽少許再研勻早晚揩牙用一生齒無動搖牢牙散治牙無力不能嚼物升麻三錢生地黃石膏各一錢白茯苓玄參各五分羊脛骨灰梧桐律各三分黃連一錢三分麝香少許另研上為細末研勻每用少許臨臥擦牙復以溫水漱去取牙不犯手草烏蓽茇各一兩半川椒細辛各三兩上為細末每用少許揩患牙內外其牙自落長春牢牙散烏髭發去牙風川芎砂仁香附子百藥煎丁香升麻五倍子白茯苓細辛青鹽金絲礬白蒺藜檀香甘松破故紙各半兩石膏二兩沒石子訶子去核各九個膽礬三錢麝香半錢上為細末研勻早晚刷牙次以溫水漱口吐出沒香散堅固牙齒榮養髭發沉香訶子皮青鹽青黛研各二錢半白檀香母丁香各一錢半當歸香附子炒去毛細辛去苗各半兩荷葉灰乳香研各一錢苦楝子破四片炒半兩龍腦另研麝香另研半錢酸石榴皮二兩半上為細末每用半錢如常刷牙溫水刷漱了早晚二次硃砂散揩牙令白淨硃砂細研茅香藿香丁皮香附甘松白芷升麻黃丹各一兩石膏四兩寒水石八兩豬牙皂角二兩白檀香零陵香各半兩上為細末研勻每用揩齒甚佳妙應散牢牙疏風理氣烏髭發人參細辛去苗白茯苓香附子炒去毛川芎白蒺藜炒去角砂仁各半兩百藥煎白芷石膏煅龍骨研各六錢麝香另研少許上為細末早晚溫水刷漱之白牙散詩曰細辛蓽茇與防風白芷茯苓配貫芎升麻甘松香附子石膏三倍有神功上為細末研勻常用揩牙沉香散揩齒瑩淨令白及治口臭沉香麝香各一錢升麻藁本藿香甘松白芷各二錢半細辛半兩石膏四兩寒水石二兩上為細末每用早晚擦牙漱洗受拜齒藥香附子用新大者半斤去粗皮細銼以生薑一斤研取汁拌和浸五七日取出去姜滓汁不用細辛銼碎鹽各二兩上同以瓦器炒存性研細逐日揩牙石膏散治齒黑黃並口臭石膏研白芷沉香各一兩寒水石研一兩升麻藁本細辛去苗各半兩丹砂一分研為細末研勻每用柳枝咬頭令軟蘸藥揩齒
