body:
  text: 卷之三十六遺溺失禁門附論夫以方論其小便遺失者為腎與膀胱虛冷不能約其水也今乃以為熱有所據乎曰此劉河間深得其旨乃作原病式云熱客膀胱鬱結不能滲泄故也或曰小便澀而不通者為熱遺溺不禁者為寒豈知熱甚而氣血不能宣通則痿痹而神無所用故液滲入膀胱漩溺遺失不能收禁也內經則謂督脈生病為遺溺又曰膀胱不禁為遺溺靈樞謂肝所生病亦遺溺蓋因二經循陰器系廷孔病則勞衛不至氣血虛勞莫能約束水道之竅故遺失不禁也又曰水穀入於口其味有五各注其海津液各走其道故三焦出氣以溫肌肉充皮膚為其津液流而不行者為液天熱衣厚則腠理開故汗出也寒氣留於分肉聚沫則為痛天寒衣薄則腠理閉氣濕不行水下留於膀胱則為溺與氣也靈樞又云手太陽虛小便遺遺者觀之則人不獨病在陰廷孔而已人如是者乃是三焦決瀆之失常何以足三焦之手少陽從足上入絡膀胱故不約也肺手太陰從上焦通調水道下輸膀胱腎又上連肺故將兩臟更是子母臟也母虛子亦虛此非上下三焦氣虛皆足以致其遺溺乎肺屬金腎與膀胱屬水所以金乃水之源膀胱者乃滲泄之府腎者水之竅今患不禁病何止於熱極鬱結痿痹腎部而已又自內經所謂太陰在泉客勝濕客下焦溲便不時太陰之復綦則入腎竅泄無度者觀之但濕主於否況是所勝之邪其不為鬱結痿痹者乎從而思之聖人之言舉一隅便當以三隅反前謂肺腎膀胱之病不言其邪可見諸邪盡能病之也故言手太陰別之虛者為子母藏氣者之安也可見所生所復不勝之五邪亦是能挾之也大抵人之漩溺蓋心屬火與小腸為表裡二氣所以受盛是為傳送又腎屬水合膀胱為表裡膀胱為之腑水注於膀胱而泄於小腸實相交通也若心腎氣弱陽道衰冷傳送失度必遺尿失禁經云膀胱不利為癃不約為遺矣夫水火不濟陰陽不調下焦蓄冷腎與膀胱受克故不能制水水道滑則因水挾寒而不禁也又曰下焦蓄血虛勞內損則便溺自遺而不知下焦虛寒不能溫制水液則便溺欲出而不禁乃心不與腎交通或冷或熱而滑澀隨之也不然若不觀於色不辨於脈不審所兼之病狀獨指為冷指為熱獨務澀水道之竅不求邪所自之本者五味所從也傷寒論脈法有曰寸口脈微而澀微者胃氣不行澀者榮氣不足榮衛不能調則三焦無所伸而歸其部上焦不歸噯而吞酸中焦不歸者不能消穀引飲下焦不歸者則遺溺失禁也治之之法當溫補下元清心寡欲宜用祕元丹家韭子丸分清飲之類又有産後所傷及小兒胞冷皆有遺溺失禁者臨證察脈究其所因度其遺禁對病用藥服餌決效矣遺溺失禁通治方二氣丹治內虛里寒膀胱積冷陽氣漸微小便不禁硫黃細研桂心為末各二錢半附子大者一枚炮去皮臍為末半兩乾薑炮為末二錢硃砂另研二錢為衣上件拌勻麵糊和丸如梧桐子大以硃砂為衣每服五十丸空心用鹽湯送下家韭子丸治下元虛冷小便不禁或成白濁常服補養元氣進美飲食家韭子炒六兩鹿茸酥炙四兩牛膝酒浸肉蓯蓉酒浸熟地黃當歸以上各二兩巴戟去心菟絲子酒浸各一兩半杜仲去粗皮炒石斛去根乾薑炮桂心以上各一兩上為細末酒煮糊為丸如梧桐子大每服一百丸空心用溫酒或鹽湯送下茯苓丸治心腎俱虛神志不守小便淋瀝不禁赤茯苓白茯苓各等分上為細末以新汲水挼洗澄去新沫控干復研為末別取地黃汁與好酒同於銀石器內熬成膏搜和丸如彈子大每服一丸細嚼空心用鹽酒送下雞內金散治遺尿失禁雞䏶胵一具並腸淨洗燒灰男用雌女用雄者上為細末每服二錢空心溫酒調服一方加豬脬燒灰存性焙乾同為末依前法調服菟絲子丸治小便多或致失禁菟絲子水淘酒蒸肉蓯蓉酒浸各一兩五味子附子炮去皮臍鹿茸酒炙牡蠣煅各一兩桑螵蛸酒炙雞䏶胵炙各半兩上為細末酒煮糊和丸如梧桐子大每服七十丸空心用鹽酒或鹽湯送下桑螵蛸散治小便頻數如稠米泔色此由勞傷心腎得之服此藥不終劑而愈大能安神定志桑螵蛸鹽水炙遠志去心龍骨石菖蒲鹽炙人參去蘆茯神去木鱉甲醋炙當歸各等分上為細末每服二錢臨臥時用人參煎湯調服益智仁湯治疝氣痛連小腹叫呼不已小便頻數是腎經積冷所致方見氣門治小便遺失方阿膠炒牡蠣煅鹿茸酒炙桑螵蛸酒炙各等分上為細末糯米糊為丸如梧桐子大每服五十丸空心用鹽酒送下鹿角霜丸治上熱下焦寒小便不禁上用鹿角帶頂骨者不以多少鋸作鋌子長三寸洗了用水桶內浸夏三冬五晝夜用浸水同入爐內煮之覺湯少添溫湯日夜不絶候角蘇糜為度輕漉出用刀刮去皮如雪白放在篩子上候自干微火焙之其汁慢火熬為膠候角極干為細末酒煮糊為丸如梧桐子大每服三十丸加至四十丸空心用溫酒或鹽湯送下牡蠣丸治小便不禁牡蠣白者三兩盛瓷器盒子內更用鹽末一兩蓋頭鋪底以炭火約五斤燒半日取出研如粉赤石脂三兩搗碎醋拌勻濕於生鐵銚子內慢火炒令乾研如粉上同研勻酒煮糊和丸如梧桐子大每服十五丸空心用鹽湯送下雞腸散治小便不禁日夜無度黃雞腸雄者四具切破淨洗炙令黃色黃連去須肉蓯蓉酒浸切焙赤石脂別研白石脂別研苦參各五兩上為細末更研勻每服二錢食前酒調服日二夜一治少小睡中遺尿不自覺方雄雞肝桂心各等分上同搗爛如泥丸如小豆大每服十粒溫酒送下日三服療尿床方上用羊脬盛水貯令滿系兩頭煮熟開取水頓服之即瘥固脬丸治小便不禁菟絲子二兩制茴香一兩附子炮去皮臍桑螵蛸炙焦各半兩戎鹽一分上為細末酒煮麵糊為丸如梧桐子大每服三十丸空心用米飲送下治小便不禁方益智仁巴戟去心二味以青鹽酒煮桑螵蛸菟絲子酒蒸上各等分為細末酒煮糊為丸如梧桐子大每服二十丸食前用鹽酒或鹽湯送下澤瀉散治遺尿小便澀澤瀉牡丹皮牡蠣煅為粉鹿茸去毛酥塗炙微黃赤茯苓桑螵蛸微炒阿膠搗碎炒令黃燥各一兩上為細末每服二錢食前用酒調服治小便遺失方阿膠炒牡蠣煅桑螵蛸酒炙鹿茸酒炙各等分上為細末糯米糊和丸如梧桐子大每服五十丸空心用鹽酒送下一方治遺尿小便澀無桑螵蛸有桑耳以水七升煮取二升分作二服一方以粥飲下阿膠飲治小便遺失不禁阿膠三兩炒牡蠣燒成粉鹿茸切酥炙各四兩上銼散每服四錢水一盞煎七分空心服或為細末米飲調服二錢亦可治小便失禁方上用雞腸一具以水三升煮取一升分三服一方用雄雞燒灰為末用三指撮溫漿水調一錢向北鬥服之更良白薇散治小便不禁白薇白蘞白芍藥各等分上為細末每服二錢食前以粥飲調下白茯苓散治小便不禁日夜不止白茯苓龍骨乾薑炮附子炮去皮臍續斷桂心甘草炙以上各一兩熟地黃桑螵蛸微炒各二兩上銼碎每服四錢水一盞煎至六分去滓食前溫服鹿茸散治小便不禁陰痿腳弱鹿茸二兩去毛塗酥炙微黃韭子微炒羊躑躅酒拌炒乾附子炮去皮臍澤瀉桂心各一兩上為細末每服二錢食前以粥飲調服漿水調服亦可鹿茸散治腎臟虛腰臍冷疼夜遺小便鹿茸去毛酥炙令黃烏賊魚骨去甲微炙各三兩當歸白芍藥桑寄生龍骨研人參以上各一兩桑螵蛸一兩半中劈破慢火炙令黃上為細末更入龍骨同研令勻每服一錢用溫酒調服空心日晚臨臥各一服菟絲子散治小便多或不禁菟絲子二兩酒浸三日曝乾別搗為末用牡蠣燒為粉附子炮去皮臍五味子各一兩雞䏶胵中黃皮二兩微炒肉蓯蓉二兩酒浸炙黃上為細末每服二錢食前以粥飲調下治小便多或不禁上用雄雞喉嚨及矢白䏶胵裹黃皮燒為末麥粥清盡服之亦可以赤雞翅燒末酒服三指撮日三治遺尿及小便多或不禁益智一兩鹽水炒龍骨四錢另研牡蠣煅研半兩川烏去皮半兩炒黃色上為細末酒煮糊為丸如梧桐子大每服五十丸空心用川萆薢煎湯送下
