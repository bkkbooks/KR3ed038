body:
  text: 卷之二十六心痛門附論內經曰五臟卒痛何氣使然曰寒氣客於背俞之脈則血脈泣脈泣則血虛血虛則痛其俞注於心故相引而痛按之則熱氣至則痛止矣感於寒則痛久矣病機要曰諸心痛者皆少陰厥陰氣上衝也有熱厥心痛者身熱足寒痛甚煩躁而吐額自汗出知為熱也其脈浮大而洪當灸太溪及崑崙謂表裡俱瀉之是謂熱病汗不出引熱下利長汗通身而出者愈也灸畢服金鈴子散則愈痛止服枳朮丸去其餘邪也有大實心中痛者因氣而食卒然發痛大便或祕久則注悶心胸高起按之愈痛不能飲食急可利之利後以藁本湯去其邪也有寒厥心痛者手足逆而通身冷汗出便溺清利或大便利而不渴氣微力弱急以朮附湯溫之寒厥暴痛非久病也朝發暮死急當救之是知久病無寒暴病非熱也以是論寒厥熱厥與夫大實心痛治法已詳又有病久氣血虛損及素作勞羸弱之人患心痛者皆虛痛也故錢氏心虛者炒鹽補之圖經衍義中具蠣治心痛則蠣粉與鹽實得之矣大意治病必求其本究其本究其虛實正謂紫之奪紅相去一間耳而毫釐疑似實霄壤焉夫心為五官之主百骸之所以聽命者也心之正經果為風冷邪氣所幹果為氣血痰水所犯則其痛掣背脅脹胸煩咽乾兩頰赤黃手足俱青至節朝發而暮殂矣然心之包絡與胃口相應往往脾痛連心或腸虛陰厥亦令心下疼痛或他臟之邪亦有客乘於心者是則心之別脈受焉如所謂九種心痛一曰蟲二曰疰三曰風四曰悸五曰食六曰飲七曰冷八曰熱九曰來去者皆是也真心果痛不知能愈否乎若手足俱青至節不治陳無擇論心痛又分三因云十二經絡外感六淫則其氣閉塞鬱於中焦氣與邪氣發為疼痛足厥陰心痛兩脅急引小腹連陰股相引痛手心主痛徹背心煩掌中熱咽乾目黃赤脅滿足太陰心痛腹脹滿澀澀然大便不利膈閉咽塞手太陰心痛短氣不得倚息季脅堅痛遺失無度胸滿煩心足少陰心痛煩劇面黑心懸若飢胸滿腰脊痛背俞諸經心痛心與背相引心痛徹背背痛徹心諸腑心痛難以俯仰小腹上衝卒不知人嘔吐泄瀉此皆諸經諸俞諸腑涉邪所致病屬外所因若五臟內動汨以七情則其氣痞結聚於中脘氣與血搏發為疼痛肝心痛者色蒼蒼如死狀終日不得太息真心痛者旦發夕死夕發旦死脾心痛者如針錐刺其心腹蘊蘊然氣滿肺心痛者若從心間起動作痛益甚不變色腎心痛者與背相引善瘛如物從後觸其心身偃僂胃心痛者腹脹滿不下食食則不消皆臟氣不平喜怒憂鬱所致屬內因飲食勞逸觸忤悲類使臟氣不平痞膈於中食飲遁注變亂腸胃發為疼痛或飲啖生冷果實中寒不能消散結而為積遇食還散名積心痛及其臟寒生蛔致心痛者故有九種之名除風熱冷屬外所因余皆不內外因更婦人惡血入心脾經發作疼痛尤甚於諸痛更有卒中客忤鬼擊尸疰使人心痛亦有不由外因丹溪先生曰凡心膈之痛須分久新若知身受寒氣口食寒物而病初得之時當用溫散或溫利之藥病得稍久則成郁矣鬱則蒸熱熱久必生火原病式曰若欲行溫利溫散寧無助火添病耶凡治此病必要先問平日起居何如假如心痛有因平日喜食熱物以致死血留於胃口作痛者用桃仁承氣湯下之脈經曰厥心痛者乃寒氣客於心胞絡也諸蟲痛如心腹痛懊憹發作腫聚往來上下行痛有休作心腹中熱善渴涎出面色乍青乍白乍赤嘔吐清水者蛔咬也以手緊按而堅持之無令得移以針刺之久持之蟲不動乃出針也心痛之脈陰弦為痛微急為痛微大為心痹引背痛短數為痛澀則為痛浮大弦長者死沉細者生且古人論諸心痛皆因六淫七情所致有寒厥熱厥有大實者有內因有外因有不內外因以成前證是以古人立論置方後之學者當以誠心切脈熱者涼之寒者溫之感受風邪者散之順氣補血逐水豁痰此其要略耳心痛通治方加味七氣湯治喜怒憂思悲恐驚七氣為病發則心腹刺痛不可忍者或外感風寒濕氣作痛亦宜服之半夏湯泡洗三錢桂心不見火玄胡索炒去皮以上各二錢半人參去蘆乳香甘草以上各一錢上作一服用水二盅生薑五片紅棗二枚煎一盅食遠服加味四七湯治風冷寒邪客搏心腹作痛桂枝白芍藥半夏制人參紫蘇以上各一錢半白茯苓厚朴制枳殼炒各一錢上作一服用水二盅生薑五片紅棗二枚煎一盅食前服七氣湯治七情之氣鬱結心腹㽱痛不可忍半夏人參肉桂甘草各二錢半上作一服用水二盅生薑三片煎一盅不拘時服妙香散治心氣不足精神恍惚虛煩少睡夜多盜汗常服補益氣血安鎮心神山藥薑汁炙茯苓去皮茯神去皮木遠志去心炒黃耆以上各一兩人參桔梗去蘆甘草炙以上各半兩木香煨二錢半辰砂三錢別研麝香一錢別研上為細末每服二錢不拘時溫酒調服卻痛散治心氣冷痛不可忍者五靈脂去砂蒲黃炒各一錢肉桂去皮石菖蒲當歸木香胡椒以上各一錢半川烏炮二錢上作一服用水二盅煎至一盅入鹽米醋少許食前服雞舌香散治心卒痛安胃進食調冷熱定泄瀉丁香一百枚高良薑一兩白芍藥甘草各半兩上為細末每服二錢食前米飲湯調服玄胡索散治卒心痛久不愈者玄胡索一兩甘草二錢上作一服用水二盅煎一盅服如吐逆分作三五次服勝金散治卒心痛桂枝玄胡索炒五靈脂當歸各四錢上作一服用水二盅煎至一盅去滓入鹽少許食前服拈痛丸治九種心痛五靈脂蓬莪朮煨木香當歸各半兩上為細末煉蜜和丸如梧桐子大每服二十丸食前用橘皮煎湯送下薑桂飲治心刺痛良薑辣桂各等分上為細末每服二錢米湯調不拘時熱服生薑枳殼湯治中脘氣滯心下引痛生薑七錢枳殼三錢辣桂五錢上作一服用水二盅煎至一盅食前服九痛丸治九種心疼及腹脅氣脹不欲飲食附子炮去皮臍二兩吳茱萸炒人參去蘆乾薑炮狼毒銼碎醋拌炒黃以上各一兩巴豆去殼油膜半兩上為細末煉蜜和丸如梧桐子大每服三丸不拘時用熱酒送下愈痛散治急心痛胃痛五靈脂去砂玄胡索炒去皮蓬莪朮煨銼良薑銼炒當歸去薑上各等分為細末每服二錢不拘時用熱醋湯調服蜜附湯治冒涉風邪入腹拘急切痛或吐或瀉狀如霍亂附子一隻去皮臍切作四片以蜜煎令附子黃色以湯洗去蜜切作片桂心芍藥以上各三錢甘草炙一錢上作一服用水二盅生薑五片紅棗二枚煎一盅食前服加味麻黃湯治惡氣發熱外因心痛內攻五臟拘急不得轉側宜服之麻黃去節白芍藥桂心半夏湯泡七次乾薑炮香附子炒細辛以上各一錢甘草炙一錢半上作一服用水二盅生薑五片煎至一盅食前服二薑丸治心脾冷痛暖胃消痰乾薑炮良薑去皮各等分上為細末麵糊和丸如梧桐子大每服三十丸食後橘皮煎湯送下沒藥散治一切心腹痛不可忍者沒藥乳香各三錢同研穿山甲五錢炙木鱉子四錢上為細末每服一錢用酒同煎不拘時服大沉香丸治冷氣攻衝心腹刺痛亦治卒暴心痛沉香乾薑炮薑黃辣桂檀香以上各四錢甘松洗焙白芷天台烏藥甘草以上各八兩香附一斤白豆蔻仁二兩上為細末煉蜜和丸如彈子大每服一丸食前細嚼用生薑湯送下蘇合香丸治卒心痛用生薑橘皮湯化下方見氣門沉香降氣湯加乳香方見氣門治陰有陽不和心腹刺痛燒脾散治食啖生冷果菜寒留中焦心脾冷痛不可忍及老人霍亂吐瀉乾薑炮厚朴薑製麥蘖炒草果仁神麯炒良薑銼炒橘紅縮砂仁甘草炙各等分上為細末每服三錢不拘時用熱鹽湯調服紫沉煎丸治虛寒積冷伏滯陰氣膨脹心腹疼痛兩脅刺痛妨悶用之如神重者緊服沉香一兩煉蜜半斤煎五十沸別貯阿魏一兩酒半升研化盡沒藥一兩酒半升搗研研化盡入阿魏巴豆霜一分酒半升洗入銀器內煮十餘沸硇砂一兩酒半升煮化去石入巴豆酒內熬欲得如稀糊次入沉香等三味一處熬成膏下後藥研同丸硫黃滴水研細木香不見火青橘皮去白人參去蘆胡椒官桂去皮不見火良薑水煮六七沸曝乾以上各一兩檳榔一兩乾薑三分丁香不見火硃砂別研各半兩上除硫黃硃砂外先將諸藥為末次入二味研勻入煎膏搜和入臼杵二三千下丸如梧桐子大每服二三丸橘皮湯送下如卒暴心痛嚼破醋湯吞下立效靈脂酒治熱氣乘心作痛五靈脂去砂石炒加玄胡索沒藥炒各等分上為細末每服二錢溫酒調下蕪荑散治大人小兒蛔咬心痛經云蟲貫心則殺人欲驗之大痛不可忍或吐青黃緑水涎沫或吐蟲出發有休止此是蛔心痛也宜速療之蕪荑雷丸各半兩乾漆捶碎炒大煙盡一兩上為細末每服三錢溫水七分盞調和服不拘時甚者不過三服小兒每服半錢金鈴子散治熱厥心痛或發或止久不愈者宜先灸太溪及崑崙穴金鈴子肉玄胡索各一兩上為細末每服二錢溫酒調下白湯亦可食後服朮附湯治寒厥心痛手足逆冷通身冷汗脈微氣弱白朮九錢附子四錢半甘草炙一錢半上㕮咀作二帖每帖用水二盞煎食前溫服蠶砂散治男子婦人心氣痛不可忍者服之立止上用晚蠶砂為末滾湯泡過濾清汁服之不拘時候立應散治婦人血刺心痛玄胡索一兩炒上為細末每服二錢不拘時用熱酒調服米湯亦可神保丸治心膈氣築痛甚者方見氣門鐵刷湯治心脾積痛婦人血氣刺痛中酒惡心腸滑泄瀉良薑炒二兩茴香炒七錢蒼朮制甘草炙各二兩八錢上為細末每服一兩空心薑鹽湯調服辰砂一粒金丹治一切厥心小腸膀胱痛不可忍者附子炮鬱金乾薑上各等分為細末醋煮糊和丸如梧桐子大硃砂為衣每服三十丸男子溫酒下婦人醋湯下食遠服神效散治遠年近日一切脾疼或陰寒作痛引入背膂疼蓽澄茄丁香各四錢補骨脂炒玄胡索白芍藥官桂香白芷神麯炒蓬朮煨三稜煨枳殼炒麥蘖炒陳皮木香青皮甘草炙以上各一錢上㕮咀作二帖每帖用水二盞生薑三片紅棗一枚煎空心日午臨臥各一服神聖代針散治心痛不可忍者乳香沒藥川芎當歸白芷以上各半兩芫青一兩去翅足上為細末更研每服一字病甚者半錢先點好茶一盞次糝藥末在茶上不得吹攪沉底細細急呷之心驚欲死者小腸氣搐得如角弓膀胱腫硬一切氣刺虛痛並婦人血癖血刺迷悶血暈血衝心胎衣不下難産痛疾服之神驗治心疼歌曰薑黃共玄索乳香同沒藥好酒用一盞心疼如手捉一方用水煎上各等分為末每服二錢不拘時溫酒調服治心脾痛此藥極奇葉石林遊山見一小寺頗整潔學徒亦衆問僧所以仰給者答云素無田産亦不苦求於人只貨數藥以贍其間脾疼藥最流布有詩云草果玄胡索云脂並沒藥酒調一二錢一似手拈卻一方有乳香上各等分為細末每服三錢不拘時溫酒調下治男子婦人急心氣疼禁閉牙關欲死者可急救上將隔年老蔥白三五根去皮須葉搗為膏將病人口斡開用銀銅匙將蔥膏送入咽喉中用香油四兩灌送蔥膏油不可少用但得蔥膏下喉中其人即蘇少時將腹內所停蟲病等物化為黃水微利為佳除根永不再發海上方治一切心痛不問新久服之良久當利即愈上用生地黃隨人所食多少搗絞取汁搜面作餺飥或冷淘食良久當利出蟲長一尺許頭似守宮後不復患矣昔有人患此一年不瘥深以為恨臨終戒其家人吾死後當剖去病本果得蟲置竹節中每所食皆飼之因食地黃餺飥亦與之隨即壞爛由此得方劉禹錫傳信方亦紀其事云貞元十年通事舍人崔抗女患心痛垂氣欲絶遂作地黃冷淘食之便吐一物可方一寸以來如蛤蟆狀無目足等微似有口蓋為此物所食自此遂愈食冷淘不用鹽治暴心痛不可忍男子婦人小兒皆可服及治小腸氣上用荔枝核為末每服一錢水一大盞煎至七分稍溫服一方燒灰存性為末每服二錢用糊粉湯下之或熱酒調下集驗方用醋湯調下一錢神捷丸治急心疼不可忍渾身手足厥逆嘔吐冷沫吳茱萸湯泡乾薑炮肉桂去粗皮莪朮煨附子炮去皮臍川芎以上各等分上為細末醋煮麵糊和丸如梧桐子大每服五十丸食前熱醋湯送下雷丸鶴蝨散治心痛三十年不瘥者月上旬日服殺蟲雷丸鶴蝨貫衆狼牙桂心當歸檳榔各八分上為末空心煮蜜水半雞子許服方寸匕日二服若重不過三服瘥忌生蔥生冷油膩豬魚小豆大蒜等暖胃散治心脾疼不可忍上用蒼朮四兩黃泥和漿水煮令透洗淨焙干碾為細末每服二錢空心米飲調下或酒煮麵糊和丸如梧桐子大米湯下五十丸立效史丞相奉內祠偶患此疾不可忍宣和時百般治療得此藥服愈香附散治心脾疼不可忍香附炒良薑炒各一兩上為細末每服二錢米飲入鹽調服二味須各炒同炒即不效一方治肚疼腹脹及婦人脾血痛用麵糊和丸如梧桐子大每服五十丸空心用溫酒送下一方為細末用陳米飲調下吳開內翰宣和壬寅得此方即修合次日登舟舟人妻患心痛欲死以半碗飲之即愈蠲毒丸治九種心痛巴豆一粒去油丁香十枚胡椒四十九粒斑蝥一枚去翅足上為細末搗爛飯和丸如小緑豆大硃砂為衣每服三五丸不拘時用溫醋湯送下必效方治蜎心痛上用熊膽如大豆和水服大效一方療心痛細研溫水服又方治同前上取鰻鱺魚淡炙令熟與患人食一二枚永瘥飽食彌佳玄胡散治冷氣心痛及疝氣心腹疼痛玄胡索炒胡椒各等分上為細末每服二錢食前用溫酒調服治心氣冷痛良薑四兩切碎分作四分一兩用陳壁土半兩同炒黃色去土一兩用斑蝥三十四個同炒黃色去斑蝥一兩用巴豆三十四個去殼同炒黃色去豆一兩用陳倉米半合同炒黃去米陳茱萸一兩揀淘淨用酒浸一宿上將茱萸同四色炒過良薑再同炒令乾碾為細末用浸茱萸酒煮麵糊和丸如梧桐子大每服五十丸更看病人腹中冷熱加減空心用生薑湯送下調中湯治心掣胸中忿氣不欲飲食赤茯苓去黑皮當歸切碎乾薑炮人參白朮以上各二兩官桂去粗皮一兩半五味子甘草炙各一兩上銼如麻豆大每服五錢水一盞半煎至八分去滓稍熱服日二夜二
