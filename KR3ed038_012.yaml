body:
  text: 卷之十二瘧門附論瘧之為病其名有五一曰癉瘧二曰寒瘧三曰濕瘧四曰牝瘧五曰牡瘧名雖不同其感皆由六淫七情所傷飢飽勞逸經云夏傷於暑秋必痎瘧體虛之人易感發則呵欠寒熱頭疼或先寒後熱或先熱後寒或單熱單寒或熱多寒少或寒多熱少一日一發者易治又有二三日一發者難愈夫癉瘧陰氣獨微陽氣獨發但熱不寒裡實不泄煩渴且嘔肌肉消瘦也寒瘧自感寒而得無汗惡寒攣痛面慘先寒後熱也濕瘧冒襲雨濕汗出澡浴得之身體重肢節煩疼嘔逆脹滿也牝瘧久受陰濕陰勝陽虛不能制陰所以寒多不熱氣虛而泄悽慘振振也牡瘧飲食不節飢飽有傷表裡俱虛致使然也病由邪氣交爭陰陽二氣更相勝負邪正相搏而作焉衛氣與邪氣相離故汗而解衛氣晝行陽夜行陰得陽而外出故發於日間得陰則內搏故發於暮夜若邪氣內搏於五臟橫連於募原其道遠不能與衛氣交併故有隔日發之又有三四日一發衛氣之行遲行速病作有早有晏甚者內外失守真邪不分陰陽失勝寒熱互起則休作無定時也素問論六經瘧足太陽瘧令人腰痛頭重寒從背起先寒後熱熇熇暍暍然熱止汗出難已足少陽瘧令人身體解㑊寒不甚熱不甚惡見人見人心惕惕然熱多汗出甚足陽明瘧令人先寒灑淅灑淅寒甚久乃熱熱去汗出喜見日月光火氣乃快然足太陽瘧令人不樂好安息不嗜食多寒熱汗出病至則善嘔嘔已乃衰足少陰之瘧令人嘔吐甚多寒熱熱多寒少欲閉戶牖而處其病難已足厥陰之瘧令人腰痛少腹滿小便不利如癃狀非癃也數便意恐懼氣不足腹中悒悒雖此之分皆是五臟之受病夫心瘧者令人煩心甚欲得清水反寒多不甚熱肝瘧者令人色蒼蒼然大息其狀若死者脾瘧者令人寒腹中痛熱則腸中鳴鳴已汗出肺瘧者令人心寒寒甚熱熱間善驚如有所見腎瘧者令人洒洒然腰脊痛宛轉大便難目眴然手足寒又有胃瘧者令人且病也善飢而不能食食而支滿腹大大率治法瘧脈多弦數則熱弦遲則寒風以散之寒以溫之不虛不實以經取之痰以滌之停滯疏利之虛則補之不可便用斷截之藥截之太早邪氣薄於五臟傳留日久變證多端用藥次序無不效矣瘧疾通治方清脾湯治癉瘧脈來弦數但熱不寒或熱多寒少口苦咽乾小便赤澀青皮厚朴薑製白朮半夏柴胡黃芩茯苓去皮草果各一錢半甘草炙半錢上作一服水二盅生薑五片煎至一盅不拘時服定齋草果飲子快脾治瘧草果二錢蒼朮三錢米泔水浸厚朴二錢薑製半夏曲陳皮各一錢半甘草半錢烏梅一個上㕮咀每服半兩水一盞半姜五片棗二枚煎至七分不拘時服寒多者加乾薑附子熱甚者加柴胡瘴瘧加檳榔所加者各等分一方加人參一方熱多者加石膏草果飲治寒熱瘧疾初愈服此進食理脾草果仁紫蘇良薑炒川芎青皮去白炒白芷甘草炒各一錢半上作一服水二盅生薑三片煎至一盅食遠服四獸飲治五臟氣虛喜怒不節致陰陽相勝結聚涎飲與衛氣相搏發為瘧疾人參白朮茯苓去皮橘紅半夏湯泡七次草果各一錢半烏梅一錢甘草半錢上作一服水二盅生薑七片紅棗三枚煎一盅不拘時服人參養胃湯治瘧疾寒多熱少者必須先服此藥人參去蘆厚朴薑製陳皮各一錢半蒼朮二錢米泔水浸炒茯苓去皮半夏湯洗七次草果藿香甘草炙各一錢上作一服水二盅生薑三片紅棗一枚煎一盅不拘時服柴胡桂薑湯治瘧疾寒多微熱但寒不熱並治癆瘵柴胡三錢桂枝乾薑牡蠣甘草炙各一錢黃芩一錢半栝蔞根二錢上作一服水二盅煎至一盅不拘時服七寶飲治一切瘧疾無問寒熱多少及山嵐瘴氣寒熱如瘧等證厚朴薑製炒陳皮草果常山雞骨者檳榔青皮甘草炙各一錢半上作一服水一盅半酒半盅煎至一盅去渣露星月一宿空心向東服小柴胡湯治瘧疾熱多寒少或單熱頭痛胸滿咽乾方見傷寒門白虎加桂湯治瘧疾但熱不寒者知母三錢石膏五錢粳米一撮甘草一錢半炙肉桂去皮一錢上作一服水二盅煎至一盅不拘時服鱉甲飲子治瘧疾久不愈脅下痞滿腹中結塊名曰瘧母鱉甲醋炙白朮草果檳榔川芎白芍藥厚朴薑製橘紅甘草炙各一錢黃耆一錢半上作一服水二盅生薑七片紅棗一枚烏梅少許煎至一盅不拘時服老瘧飲治久瘧結成癥瘕痞在胸脅諸藥不愈者蒼朮米泔水浸草果桔梗青皮陳皮良薑半夏湯泡茯苓各一錢枳殼麩炒甘草炙乾薑桂心柴蘇川芎白芷各半錢上作一服水二盅鹽少許煎至一盅空心服四將軍飲治寒熱瘧疾作而僕厥手足俱冷昏不知人此雖一時急用之有驗附子炮去皮二錢訶子二錢半陳皮三錢甘草一錢半上作一服水二盅生薑七片棗七枚煎至一盅不拘時服勝金丸治一切寒熱瘧疾胸膈停痰發散不愈者檳榔四兩常山一斤酒浸蒸焙上為細末用麵糊為丸如梧桐子大每服三十丸當發前一日臨臥時用涼酒吞下便睡至四更再吞一服一方用雞子清為丸碧霞丹治久瘧不愈者東方甲乙木巴豆去油別研南方丙丁火官桂別研中央戊己土硫黃去砂石別研西方庚辛金白礬別研北方壬癸水青黛別研各等分上於五月一日修治了用紙各裹以盤盛依前方位排定勿令貓犬及婦人見安在神佛前至端午日午時用五家粽尖和前藥令勻丸如梧桐子大遇患者以綿裹一丸塞於鼻竅中男左女右於未發前一日安之約度尋常發過少許方除一方塞於耳內灸法治瘧疾久不愈不問男女皆治其法於大椎中第一骨節盡處先針後灸三七壯立效或第三骨節亦可桂枝黃芩湯治瘧三陽合病熱甚者桂枝一錢黃芩半夏炮人參各二錢柴胡六錢石膏四錢知母一錢半甘草炙一錢上㕮咀分作二帖用水二盅生薑三片煎至一盅食遠服露姜飲大治脾胃聚痰發為寒熱生薑四兩上和皮搗汁一碗夜露至曉空心冷服或吐或利即安芎歸鱉甲散治勞瘧表裡俱虛真元未復疾雖暫止小勞復來川芎當歸鱉甲醋炙茯苓青皮陳皮半夏芍藥上㕮咀各等分每帖二兩用水二盅生薑五片棗二枚烏梅一枚煎至一盅食遠服熱加柴胡寒多加草果交加飲子治久瘧不已山嵐瘴氣肉豆蔻二個一個麵裹煨一個生用草果二個同上法厚朴二寸一寸生一寸薑製甘草二寸一寸生一寸炙生薑一塊半煨半生上㕮咀作一服當發日用水二盅煎八分服渣再煎服虎頭骨丸治一切瘧疾虎頭骨酥炙二兩硃砂細研牡蠣粉川大黃銼炒桂心知母以上各一兩乳香甘草炙烏梅肉炒附子炮枳殼去穰麩炒麝香別研木香常山以上各半兩桃仁三七枚湯浸去皮尖雙仁炒生薑一塊如雞子大半煨半生上為末入研藥令勻煉蜜和搗三二百杵丸如梧桐子大每服十五丸食前用桃條湯下克效餅子治一切瘧疾發作有時先覺伸欠乃作寒慄鼓振頤頷中外皆寒腰脊俱痛寒戰既已內外皆熱頭痛如破渴欲飲冷或痰聚胸中煩滿欲嘔或先熱後寒或先寒後熱或寒多熱少或熱多寒少或寒熱相半或但熱不寒或但寒不熱或一日一發或一發後六七日再發皆治之甘草爐綠豆末荷葉爛各五錢定粉研龍腦研麝香研各半兩金箔二十五片為衣信砒醋煮二兩半硃砂研飛一兩上為細末煉蜜搜和每兩作二十丸捏匾以金箔為衣每服一餅以新水磨化日發者未發前服之間日者不發夜服隔數日發者前一日夜服連日者凌晨服常山酒治瘧常山鱉甲醋炙黃各三分虎頭骨炙半兩豉炒半分桃枝一握柳枝一握桃仁三七枚去皮尖炒干棗三枚去核烏梅炙十枚上細銼以酒一升浸一宿明日入生薑五片煎取五合去滓空心分為二服五行神驗丸治一切瘧疾靛花二兩東方桂心一兩南方乾薑一兩西方巴豆一兩北方硫黃一兩中央麝香少許上將五般藥於盤內據五方安排定取四月二十八日夜安桌子上於中庭露以香一爐當虔心如是露七夜至端午日早修合將巴豆去殼湯五十沸搗研余藥為散入麝香以薄糊調靛花末為丸如櫻桃大合時忌女子等見丸子焙乾於盒內盛發日淨手取以綿裹香火炙令熱男左女右預前帶安耳中便利時除卻淨手後再安耳中不得女子捻觸女子患男子與安忌一切葷腥果子一方無麝香辟邪丹治嵐瘴鬼瘧食瘧頻並者雄黑豆一作小豆綠豆各四十九粒信砒半錢另研黃丹一錢為衣上為末於端午日同入乳缽內滴水為丸分作三十粒每服一粒用東南桃心七枝研汁將井花水早晨日欲出末出時吞之醋湯亦得其驗不具言三五月患者只一丸服後大段者只微寒若小可便絕去也當發日服忌葷腥三日一服孕婦不可服一方有雄黃神聖藥師餅治瘧疾等證人言雄黃各一錢半白麵七錢半干胭脂一錢上各研極細和勻滴水和為餅子如棋大每服三餅臨臥細嚼冷水送下忌濕面葷腥生硬冷物分作三十服虛實大小加減服之斷魔如聖丹治瘧疾信一錢蜘蛛大者三枚雄黑豆四十九粒上為末同研細滴水和丸如豌豆大來日發今夜北斗下獻早晨紙裹一丸塞耳中一粒可治三人其效如神白扁豆丸治瘧疾白扁豆一兩炒綠豆一兩炒好信五錢醋煮上為末入白麵四兩水和丸如梧桐子大臨發日五更用涼水送下忌熱物瞻仰丸治一切瘧疾常山四兩草果二兩各炒存性上為末薄糊為丸如梧桐子大臨臥冷酒下四十丸五更時再服三十丸忌熱物並羊肉治瘧疾如神方黃丹大蒜小者亦可上二味先將大蒜搗碎後入黃丹為丸朝東吞下一方去蒜皮再入大蒜五個入辰砂末一錢宿蒸餅丸如梧桐子大空心井花水下一丸十歲以下丸如麻子大忌生冷油膩熱物湯合藥時宜端午日治瘧方上用桃仁一百個去皮尖大小於乳缽中細研成膏不得犯生水候成膏入黃丹三錢丸如梧桐子大每服三丸當發日面北用溫酒吞下如不飲酒井花水下亦得須五月五日午時合忌雞犬婦人見龍華散治諸瘧疾上用蛇蛻一條或三五條用炭火燒存性研為細末每服一字無根水下未發前一時服忌雞魚冷物一方用蛇皮塞兩耳中臨發服少許療十二瘧昔黃帝問歧伯曰瘧多方少愈者何歧伯答曰瘧有十二種帝曰瘧鬼字何可得聞乎歧伯曰但得瘧鬼字便愈不得其字百方不愈曰願聞之寅時發者獄死鬼所為療之以瘧人著窯上灰火一周莫令火滅即瘥卯時發者鞭死鬼所為療之用五色衣燒作灰三指撮著酒中無酒用清水服之辰時發者墮木死鬼所為療之令瘧人上木高危處巳時發者燒死鬼所為療之令瘧人坐地以周匝然火午時發者飢死鬼所為療之令瘧人持脂火于田中無人處燒脂香假拾薪去未時發者溺死鬼所為療之令瘧人臨發時三渡東流水申時發者自刺死鬼所為療之令瘧人慾發時以刀刺塚上使得姓名字咒曰若瘥我與汝拔卻酉時發者奴婢死鬼所為療之令瘧人碓稍上臥莫令人道姓字戍時發者自絞死鬼所為療之左索繩系其手腳腰頭亥時發者盜死鬼所為療之以刀子一口箭一枝灰一周安瘧人腹上其箭橫著底下子時發者寡婦死鬼所為療之令瘧人脫衣東廂床上臥左手持刀右手持杖打令聲不絕瓦盆盛水著路邊丑時發者斬死鬼所為療之令瘧人當戶前臥頭向東截瘧散常山雞骨樣者良茯神去皮木肉桂去粗皮等分甘草減半熱多加之上石捶不犯鐵器為粗散每服半兩用常酒大半碗浸一宿於當發日早晨空心去滓冷服服後不可吃熱湯熱物滓再浸或略煎近發時再服一方不用肉桂茯神卻用檳榔烏梅要在人增損也凡瘧須是發作三五次後卻用截之為妙知母散治一切瘧疾不問先熱後寒先寒後熱熱多寒少寒多熱少年久瘧者止一服取效贛州羅鹽稅傳方大有功效知母直者貝母常山檳榔各五錢上㕮咀作一服水酒各一盞用綿蓋定露一宿五更望東冷服直到巳時食乾物若吃水便吐煎時不得婦人見大蒜平胃散治一切瘧上平胃散一帖大蒜一個擂爛用一大碗井花水調蒜澄清以半調平胃散飲盡又以余蒜水再飲用厚被蓋臥汗出即愈友人鄭瀛叟由赴監試感此遇道人授此方一剪金治瘧疾寒熱乃聖藥也好信硫黃各等分上同研末用緋紅絹子手捻一捻放絹上裹如豆大細絲練系纏數遭系定用剪子剪下勿得不繫緊恐有藥失每服一丸星全新水送空心服無得人知如服藥先一日夜服至明正發日早勿令人知去無人知靜處避之或廟宇內亦得足厥陰肝瘧附論夫經謂足厥陰肝瘧在經則令人腰痛小腹滿小便不利如癃狀非癃也數便意欲恐懼氣不足腹中悒悒在臟則令人色蒼蒼然太息其狀若死者俱刺足厥陰蓋足厥陰之脈循陰器邪氣客之則少腹滿小便不利也肝為將軍之官謀慮出焉故病則恐懼不足也蒼蒼者肝之色也宜察其經絡腑臟而治之治已汗出故謂足太陰瘧又名脾瘧橘皮甘草湯治脾臟不和瀉痢瘧疾腹痛下部無力體重足痿腳下痛飲食中滿四肢不舉等病陸景淵方曾以治瘧甚效橘皮生用甘草炙厚朴去皮薑汁製以上各一兩羌活防風肉豆蔻茯苓各二錢半川芎半兩吳茱萸一錢上㕮咀每服四錢水一盞半生薑三片煎至八分去渣食前服人參飲治脾瘧人參甘草炙各一分陳橘皮湯浸去白又焙半兩烏梅五枚去核焙草豆蔻仁七枚去皮上銼為末每服五錢用濕紙裹煨熱用水二盞生薑一片棗一枚擘碎煎至一盞未發前溫服獨蒜丸能截脾寒上於五月五日用大蒜不以多少搗爛次入礬紅拌勻為丸如圓眼大每服一丸大蒜湯嚼下良薑丸醒脾治瘧良薑二兩上為末豬膽汁和丸如梧桐子大紫蘇湯空心下二十丸手太陰肺瘧附論夫肺瘧者內經謂令人心寒寒甚則熱熱間善驚如有所見刺夫心瘧者內經謂令人煩心甚欲得清水反寒多不甚熱刺手少陰是也蓋心為神舍邪不可干邪氣干之故煩心其欲清水者以心火內熱故也其反寒多不甚熱者內熱而外寒故也治宜通心經利邪熱則愈甘草湯治心熱為瘧不止或止後熱不渴乍來乍去令人煩心甚欲飲清水反寒多不甚熱者甘草一兩蜀漆三兩常山鱉甲各四兩石膏五兩香豉一合梔子烏梅各十三枚竹葉切二升上㕮咀以水九升煮取三升分三服麝香丸治心瘧麝香黃丹炒紫色砒霜各一分硃砂一兩金箔三十片上細研令勻用粳米飯和丸如梧桐子大男左女右中指節上用緋絹裹系一丸發前以冷醋湯下一丸忌食熱物硃砂丸治心瘧光明砂半兩細研常山一兩杏仁十枚湯浸去皮尖麩炒微黃上為末研入硃砂令勻煉蜜和丸如梧桐子大未發前以粥飲下十五丸欲發時再服足太陰脾瘧附論夫足太陰之經脾之脈也脾經之瘧令人不樂好太息不嗜食多寒熱汗出病至則嘔嘔已乃寒寒則腹中痛熱則腸中鳴鳴肝瘧顏色蒼蒼顫掉氣喘積年不瘥鱉甲丸等方主之鱉甲丸治肝瘧色蒼蒼顫掉氣喘久不瘥者或久熱勞微動如瘧鱉甲去裙袢醋浸炙蜀漆葉烏梅取肉炒常山知母各一分甘草微炙苦參葳蕤石膏各半兩香豉一合微炒上為細末煉蜜為丸如梧桐子大每服十丸未發前米飲下臨發再服知母湯治肝瘧上焦壅滯心煩頭疼寒熱不止肌肉消瘦不下食知母地骨皮升麻各一兩鱉甲去裙袢醋炙黃犀角鎊屑人參麥門冬去心焙柴胡石膏各二兩甘草生半兩虎頭骨酥炙一兩半一方無此有赤茯苓二兩上粗搗篩每服四錢水一大盞入香豉五十粒煎至六分去滓不拘時溫服木香犀角丸治肝瘧木香羚羊角鎊屑犀角鎊屑各一兩半升麻玄參豬苓檳榔各二兩半鱉甲酥炙甘草炙各二兩豉炒五兩上為細末煉蜜和丸如梧桐子大每服三十丸用溫酒或米飲送下日再服體熱即去甘草檳榔加大黃五兩手少陰心瘧附論手太陰陽明是也蓋心肺獨居膈上其氣相通故瘧邪干肺內動於心則為寒熱善驚之候也人參丸治肺瘧心寒熱善驚如有所見人參鱉甲去裙袢醋炙桃仁去皮尖及雙仁炒研常山甘草炙肉蓯蓉酒浸切焙升麻各三分桂心去粗皮半兩烏梅肉炒龍齒研各一兩丹砂研一分阿魏研一分杏仁去皮尖雙仁炒研半兩上為末煉蜜丸如梧桐子大每服十五丸空心用米飲下未發時並二服杏仁丸治肺瘧杏仁四十枚湯浸去皮尖雙仁炒常山三分丹砂別研半兩甘草一分上為細末煉蜜和丸如綠豆大每服十五丸未發米飲下日再服之足少陰腎瘧附論內經謂足少陰腎瘧在經則令人嘔吐甚多寒熱熱多寒少欲閉戶牖而處其病難已在臟則令人洒洒然腰脊痛宛轉大便難目眴眴然手足寒刺足太陽少陰蓋腎脈入肺中肺脈環胃口故使人嘔陰虛則陽氣偏故熱多若灑淅腰脊痛大便難目眴手足寒特以藏氣內虛機關不利故為此證也烏梅丸治腎瘧令人洒洒然腰脊痛大便難目眴手足寒及諸瘧久不瘥者烏梅肉炒一兩半常山三分豉一合炒虎頭骨酥炙附子炮去皮臍肉蓯蓉酒浸切焙以上各半兩麝香別研一錢桂心去粗皮知母切焙各一分桃仁湯浸去皮尖雙仁炒別研一兩上搗研為末拌勻煉蜜和丸如梧桐子大每服二十丸空腹米飲下未發服一方無知母蓯蓉丸治腎瘧肉蓯蓉酒浸切焙烏梅肉炒桂心去粗皮甘草炙升麻各半兩豉炒三分常山三分桃仁湯浸去皮尖炒研三分上搗研為末和勻煉蜜和丸如梧桐子大未發日空腹溫酒下二十丸米飲亦得至發時更服二十丸足少陽膽瘧附論夫少陽膽之狀內經謂令人身體解㑊寒不甚熱不甚惡見人見人心惕惕然熱多汗出甚刺足少陽是也蓋膽為中正之官決斷出焉今瘧邪外中其氣不守故心常惕惕然邪盛故熱多有風故汗出升麻湯治足少陽瘧身體解㑊見人心惕惕然熱多汗出升麻鱉甲去裙袢醋炙淡竹葉各一兩常山一兩半犀角屑麥門冬去心焙知母切各三兩甘草炙半兩上㕮咀如麻豆大每服五錢水一盞半煎至一盞去滓空心日午溫服犀角湯治足少陽瘧解㑊熱多汗出犀角鎊甘草炙各一兩麥門冬去心升麻知母鱉甲酥炙去裙袢各一兩半石膏碎研二兩上㕮咀如麻豆大每服五錢水一盞半煎至一盞去滓於未發前溫服足太陽膀胱瘧附論夫太陽瘧之狀內經謂令人腰痛頭重寒從背起先寒後熱熇熇暍暍然熱止汗出難已刺郄中出血蓋膀胱經下抵腰中上巔絡腦故腰痛頭重寒從背起也經虛受邪故先寒後熱也熱止汗出難已以真氣不勝邪故也柴胡湯治足太陽瘧寒熱柴胡常山知母焙鱉甲去裙袢醋炙黃青蒿乾者甘草炙枳殼去穰麩炒官桂去粗皮各一兩上粗搗篩每服三錢水一盞入柳枝心七枚蔥白二寸細切同煎至七分去滓空腹溫服發前再服足陽明胃瘧附論夫足陽明胃瘧在經則令人先寒酒淅寒甚久乃熱熱去汗出喜見日月光火氣快然當刺足陽明跗上在胃則令人旦病善飢而不能食食則支滿腹大當刺足陽明太陰橫脈出血蓋胃圍沖氣為水穀之海邪氣客之則沖氣不和故善飢不能食食則支滿腹大傳於經者為寒熱陽不勝於陰故喜見日月光及火氣也順氣湯治足陽明胃瘧支滿腹大厚朴去皮薑汁製陳皮湯浸去白焙白朮半夏湯浸七次制各一兩乾薑炮柴胡去苗甘草炙各半兩上粗搗篩每服三錢水一盞姜五片棗二枚擘破煎七分去滓不拘時溫服枳殼湯治胃瘧心腹脹滿不食枳殼去穰麩炒三兩厚朴去皮薑製人參白朮白茯苓各二兩上粗搗篩每服四錢水一盞半入生薑一棗大切煎至一盞去滓溫服紅丸子專治食瘧荊三稜醋煮莪朮各二兩胡椒一兩青皮炒香三兩阿魏一分醋化上為細末別用陳倉米同阿魏醋煮糊為丸如梧桐子大每服五十丸加至百丸用薑湯吞下或因食生果成瘧用麝香湯吞下一方炒土朱為衣以老瘧飲下古方雖有鱉甲煎等不時服不見效神效方治寒瘧硃砂細研白芥子阿魏各一錢香墨五錢砒霜一兩酸漿水一碗於端午日日未出時慢火熬如稀糊便入後藥上為末以砒霜煎和丸如黍米大每於未發前冷醋湯下一丸至二丸忌食熱物分利順元散治體虛之人患瘧寒多不可服截瘧藥者川烏附子各一兩南星二兩木香五錢別銼臨時入上除木香不見火外三味各將一半去皮生用一半炮熟合和㕮咀每服四錢水一盞半生薑十片棗七枚煎至七分發前一日及當發日早晨連進兩三服半生半熟能解陰陽果附湯治氣虛脾寒瘧疾不愈振寒少熱面青或單寒者或大便溏泄小便反多不下食草果仁附子炮上各等分㕮咀每服半兩水二盞生薑七片棗一枚煎至七分去滓不拘時溫服知母鱉甲湯療溫瘧壯熱不能食知母鱉甲炙地骨皮各三兩竹葉切一升石膏四兩碎常山二兩上切以水七升煮取一升半去滓分三服忌蒜豬肉莧菜生蔥生菜藥餛飩治證同前良薑吳茱萸胡椒各一分上為細末豬脾一條銼作臛加五味炒之一半袞藥一半不袞藥並作餛飩有藥者以墨點之遇點者吞下無藥者嚼下一服效白朮丸治瘴瘧白朮丹砂研麝香研丁香訶黎勒皮安息香入胡桃仁研檀香蓽茇犀角鎊各半兩薰陸香蘇合香龍腦研各一分莎草根石膏木香各半兩上為末煉蜜丸如梧桐子大每服十丸空腹井花水下老人小兒三丸仍用紗絹袋盛藥帶於臂上闢鬼氣臘月合以新瓷器盛勿令泄氣卻毒散治山嵐瘴氣有黑霧起處急服麻黃防風去叉蜀椒去目併合口者炒出汗各一兩烏頭炮去皮臍官桂去粗皮白朮桔梗炒各半兩乾薑炮一分上為細末每服一錢溫酒調下每日食前常服一云嵐氣者嶺南青草黃芒瘴氣如嶺北傷寒也南地暖故太陰時草木不黃而落伏蟄不閉而藏雜蟲因暖而生則仲夏有青草瘴孟冬有黃芒瘴彼人失醫多成疸病即為難治嶺南人得之亦如傷寒壯熱頭疼一日三日以上在於皮膚前可汗而愈五日以上結於臟腑身重而腹痛當下之得愈即不可先下下之亦為難療其或不解則春秋作瘧痢而肌膚黃瘦預固丸治嶺南諸瘧丹砂雄黃各一兩並研細水飛過令乾鬼臼半兩為末阿魏一分用酒半升熬成膏上再研令勻以阿魏膏和丸如雞頭大緋絹袋貯十丸常執手中頻嗅瘴氣內行不著人遇瘴氣病者井花水嚼下三丸五服瘥香椿散治瘴氣噁心四肢疼痛口吐酸水不思飲食增寒壯熱發過引飲二廣八閩多山嵐煙霧蛇虺郁毒之氣當秋七八月之間芒華髮時此時疾大作謂之黃芒瘴又謂之黃茅瘴是也蓋人或因飢飽或由虛怯或沖煙霧或涉溪澗遂得此疾謂之黑腳瘴蛤蟆瘴啞瘴其名不一並皆治之香椿嫩葉三兩酒浸炒南壁土向日者甘草炙臘茶各一兩上為細末每服四錢用酒調下如患久者更入甘遂柴胡各半兩空心臨臥服鯪鯉甲酒治山嵐瘧南方山嶺瘴氣令人寒熱發作無時痿黃腫滿四肢痹弱鯪鯉甲炙五枚鱉甲去裙袢醋炙黃烏賊魚骨去甲附子炮裂去皮臍各一分常山半兩一方無上細銼以酒二升半煎漬一宿瘧發前稍稍服之勿絕藥味兼以酒塗身體服藥良久方可進食山瘴瘧酒療乍寒乍熱乍有乍無及瘧痰滯發歇不定久不瘥者常山三兩鱉甲炙升麻烏賊魚骨去甲附子各一兩上並切絹袋盛以酒六升漬之少令近火轉之一宿每服一合匕發可數服或吐忌豬肉生蔥生菜莧菜保安湯治山嵐瘴瘧寒熱久不瘥常山半兩青蒿知母各一兩桃仁湯浸去皮尖雙仁研半兩上粗搗篩每服二錢水一盞生薑半分同煎至六分去滓不拘時稍熱服觀音丸治取下暑毒瘴毒圓白半夏生烏梅肉川巴豆不去油母丁香每件各一枚上為末薑汁煮麵糊丸如麻子大上下以厚紙蓋貼有油曬又再易紙每服五丸臨臥冷水下此方舟人於海角遇白衣人授之破塊丸治受瘴結成氣塊腹中不能消散服之效蓽茇大黃各一兩俱生用上為細末入麝香少許煉蜜為丸如梧桐子大每服三十丸空心冷酒下日三服附子湯治瘴瘧經久不瘥正氣羸弱身熱如火極寒極熱連日方醒發時沉著枕簟不能抬身戰掉不堪便溺飲食不便附子二枚一枚生去皮臍一枚炮熟去皮臍鹽水浸各一兩上銼散每服三錢水一盞半生薑七片紅棗七枚煎至七分去滓攤冷吞靈砂丹五十粒或百粒未效再以七棗湯吞黃芽丹二十丸仍服黑錫丹以墜痰亦可順元氣凡此瘧但當守續真元沉虛熱為法沃雪湯治山嵐瘴氣蒼朮去粗皮炒甘草鹽擦炙各二兩防風細切白芍藥去皮厚朴去粗皮姜壓一宿後炒黑色乾葛各四兩朴硝一兩半研上銼散每服四錢水二盞煎至一盞去滓不拘時熱服服畢少時以薑蔥作羹或作粥吃了避風坐臥身體滋潤即愈兩滓又合煎服茵陳蒿湯治癉瘧發作有時但熱不寒頭痛不安通身俱黑大腸秘熱小便黃赤宜服此茵陳蒿山梔子去皮柴胡黃芩去黑心桔梗炒牡丹皮去心貝母荊芥穗去梗升麻半夏湯泡浸七次焙羌活杏仁湯浸去皮尖雙仁炒獨活麻黃去根節焙以上各半兩細辛一分上粗搗篩每服三錢水一盞生薑三片煎一沸急瀉出臨發熱頭痛去滓熱服不拘時候但此瘧止發熱並初發時先壯熱者可服熱多寒少食後吃此藥大青飲癉瘧積熱痰盛寒少熱多煩躁引飲大青一兩莖葉紫者是不紫即是遠志不可用也如無真者以青黛代之大黃醋炒赤芍藥常山炒龍膽去土甘草炙各三兩上粗搗篩每服五錢用水一盞半煎至八分去滓溫服氣盛熱多宜服得利或熱稍退即止人宿有冷疾年四十以上者雖有熱證不宜多服常山飲治癉瘧但熱不寒煩渴不止常山銼炒半兩甘草銼炒二分青蒿焙一分烏梅七枚捶碎去核焙上粗篩卻以小便一盞水一盞酒一盞煎至一盞去滓當發日空心服鬼哭散治癉瘧但熱不寒上用黃丹煅過臨發時蜜湯調下稍大能飲酒用酒調下神聖丸治間日瘧砒霜研一錢大棗三枚煮去皮核黑豆小者二十一粒水浸去皮上須於重午七夕日修合研丸如碗豆大以丹砂為衣合時忌婦人雞犬見於發日早晨將一丸面北香上度過用冷茶清送下忌熱物一復時治瘧或間日發或夜發者常山竹葉各三兩秫米一百粒石膏八兩上㕮咀以水八升銅器中漬藥露置星月下高淨處橫刀其上明日取藥病人房中以銅器緩火煎取三升分三服清旦一服未發前候一食頃一服臨發一服服訖靜室中臥莫共人語當日勿洗手面及漱口勿進食取過時不發少頃乃澡洗進食並用藥汁塗五心胸前頭面藥滓置頭邊常山酒治間日瘧常山一兩糯米黑豆各一百粒蒜獨頭者一顆去根莖橫切上㕮咀以清酒一升病未發前一日以酒浸藥於碗中以白紙覆之碗上橫一刀欲發時三分飲一分如未吐更服一分得吐則瘥半夏散治痰瘧發作有時熱多寒少頭痛額角並胸前肌肉瞤動食才入口即吐出面色帶赤宜服此半夏湯浸洗去滑為末生薑汁搜和作餅曝乾藿香羌活川芎各一分牽牛各半兩上為細末每服三錢食後白湯調下蒜丹丸截瘧消痰虢丹穿山甲灰火中炮焦各一分土朱半兩上為末以獨蒜煨去皮研膏和丸如梧桐子大每服十丸生薑烏梅紫蘇湯送下鱉甲漬酒治痎瘧以時發鱉甲半兩醋炙烏賊魚骨去甲常山各二兩附子炮裂去皮臍甘草炙各一兩上銼如麻豆大每服五錢以酒一盞半漬藥一宿明日以酒先塗五心遇發時瘧斷若不斷可飲藥酒一二盞即瘥七棗湯治五臟氣虛陰陽相勝作痎瘧不問寒熱先後與夫獨作疊作間日及痰痞塞不通發作無時或寒多熱少或單寒者悉皆治之附子一枚炮裂以鹽水泡再泡如此七次不浸去皮臍一方以陳壁土為糊泡浸七次上㕮咀分作二服水半碗生薑七片棗七枚煎至八分盞當發日去滓空心溫服川烏亦可一方名冷附湯去棗煎熟露一宿五更初冷服凡患瘧疾無過是痰實痞塞不通脾氣弱虛熱在上停於胸膈不得入於臟腑所以五更冷服乃使藥下達壯脾胃去痰實降虛熱養心氣屢試驗治瘧虛寒久不瘥者空心服仍食棗三個一方蔥白七寸同煎龍虎丹治瘧久不瘥或止或發繼月連年諸藥無效者狗頭骨鼠頭骨牛頭骨虎頭骨兔頭骨貍頭骨龍角猢猻頭骨馬頭骨天靈蓋鱉甲龜甲阿魏細研麝香別研各半兩蛇頭一枚雄黃細研一兩硃砂細研一兩上為末入別研藥和令勻以軟飯和丸如雞頭大以青絹裹男左女右中指上系一丸未定即以醋茶下一丸鯪鯉甲酒治瘧久不瘥鯪鯉甲酒浸炙黃鱉甲去裙欄醋浸炙黃各半兩烏賊魚骨去甲常山各三分烏梅肉微炒一分竹葉一握豉一合桃仁二十四枚湯浸去皮尖雙仁麩炒蔥白七莖切上銼如麻豆大用生絹袋盛以酒三升浸經一宿每日空腹溫服半盞良久取吐如不吐至巳午時再服三兩服如不瘥隔日更依前服之治久瘧狐糞雄黃阿魏黃丹硃砂丁香各一兩麝香一分上同研為細末醋煮麵糊為丸如雞頭實大以緋帛裹一丸男左女右系其臂上治瘧久不瘥蜘蛛五枚大者去腳研如膏蛇蛻皮一條全者燒灰蝙蝠一枚炙微焦麝香半兩細研鱉甲一枚去裙袢醋塗炙黃上為末研勻五月五日合以蜘蛛膏入煉蜜和丸如麻子大每服五丸空心溫酒下小兒茶下二丸久瘧丸治瘧百方不瘥者宜服砒霜一錢研乳香半兩研半夏湯洗七遍焙乾秤一兩上為細末於重午日正午時用粽子尖和為丸如皂角子大發時以醋湯下一丸更不再服如非重午日須兩服瘥祛瘧神應丸治久瘧及諸瘧疾上用三姓人家寒食日食用白麵每一家取一匙於五月五日午時採青蒿擂取自然汁和前面為丸如綠豆大每服一丸當發日早晨取無根井水送下一方用黃丹一匙炒過與面一處碾和勻鱉甲煮散治勞瘧鱉甲去裙袢醋炙黃耆銼牛膝酒浸切焙天靈蓋酥炙菟絲子酒浸別搗續斷各半兩羌活去蘆柴胡去苗赤茯苓去皮生乾地黃焙木香陳橘皮湯浸去白焙川芎山茱萸去核獨活去蘆藿香各一分麝香研一錢上為末每服三錢水一盞入鹽少許同煎七分空心和滓服或煉蜜丸如梧桐子大空心鹽湯下四十丸亦得烏梅丸治勞瘧及瘴鬼等瘧悉皆治之烏梅肉微炒肉蓯蓉酒浸一宿刮去微皮炙乾鱉甲去裙袢醋塗炙令黃桃仁湯浸去皮尖雙仁麩炒以上各一兩香豉一合炒乾麝香半兩細研常山川升麻人參去蘆甘草炙微赤知母桂心各三分上為末入麝香研勻煉蜜和搗二三百杵丸如梧桐子大每服未發前空心溫酒下三十丸至發時又服三十丸每日服之以瘥為度露星飲治久瘧成癆白茯苓檳榔常山秦艽柴胡黃芩半夏官桂白朮甘草各等分上㕮咀每服三錢水酒各半盞露一宿次早溫去滓服神效手把丸治鬼瘧猢猻頭骨虎頭骨貓兒頭骨砒霜細研常山硃砂細研乳香細研麝香細研白芥子阿魏各一分蜈蚣一枚上為末研令勻取五月五日午時煉蜜和搗三五百杵丸如皂角子大以緋絹裹一丸男左女右臂上系之發時於淨室內焚香恭信解下男左女右以手把之時時就鼻嗅之四五度效治鬼瘧神效丸砒霜細研硃砂細研乳香細研各半兩麝香細研阿魏細研安息香綠豆末猢猻頭骨虎糞中骨各一分上為末研勻以蒸餅和丸如梧桐子大未發前男左女右手把一丸便臥一炊時久便瘥萬安丸治鬼瘧虎頭骨酒炙三兩藜蘆六兩雄黃研鬼臼天雄炮去皮臍蕪荑炒皂莢酥炙去皮子各一兩上為細末入別研雄黃末令勻煉蜜和丸如彈子大令患者頭上戴一丸立瘥若除伏屍於房內四角燒四粒除疫氣於床前燒一粒或熱甚男左女右臂上帶一粒則便愈矣雄黃丸治一切遠年瘧結成癥瘕雄黃研丹砂研麝香研各半兩鱉甲去裙袢醋炙龜甲醋炙木香虎頭骨酒炙羚羊角鎊屑犀角鎊屑白薇玄參當歸切焙知母防風去皮麻黃去根節龍膽去苗牡蠣燒赤豬苓去黑皮柴胡去苗茯神去木升麻檳榔銼地骨皮赤芍藥梔子仁黃連去須烏梅肉阿魏安息香研桃仁湯浸去皮尖雙仁炒葳蕤龍齒各三分上除別研外余藥為細末合研勻煉蜜和丸如梧桐子大每服二十丸白粥飲下未發前服消癖丸治瘧母停水結癖腹脅堅痛芫花炒二兩硃砂細研五錢上為末煉蜜和丸如小豆大每服十丸濃煎棗湯下去癖用芫花大戟破水之劑下後即愈柴胡栝蔞根湯治瘧而發渴柴胡黃耆人參甘草生薑各三分大棗二十枚栝蔞根四兩上㕮咀用水一斗二升煮取六升去滓煎取三升溫服一升日三麥門冬湯治瘧病發熱煩躁體黃小便不利令人多驚如有所見麥門冬去心焙犀角屑杏仁湯浸去皮尖雙仁麩炒微黃常山甘草炙各半兩糯米八十一粒上粗搗篩以水五盞煎至三盞去滓分為五服於發前溫服之茯苓湯治瘧病發熱身黃小便不利赤茯苓去黑皮白芍藥瞿麥穗各一兩白朮三分上粗搗篩每服五錢水一盞半入蔥白三寸生薑一分擘碎同煎至七分去滓食前溫服
