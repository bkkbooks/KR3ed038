body:
  text: 卷之四十六怔忡健忘動悸門附論原病式曰夫怔忡為病躁擾動煩熱擾亂而不寧火之體也甚於外則肢體躁擾甚於內則神志躁動返覆顛倒惟憹煩心不得眠或以煩心嘔噦而為胃冷心痰者非也故煩心心痛腹空熱王而發得食熱退而減也或逆氣動躁者由水衰火旺而猶火之動也故心胸躁動謂之怔忪此心血不足也蓋心主血血乃心之主心乃形之主血富則心主自安矣多因汲汲富貴戚戚貧賤又思所愛觸事不意真血虛耗心主失輔漸成怔忡怔忡不已變生諸證舌強恍惚善憂悲少顏色皆心病之候難經云損其心者益其榮法當專補真血血若富心主有輔無不愈者又有風寒暑濕閉塞諸經令人怔忡又有七情過傷加以協飲所致遂成五飲停蓄堙塞中脘亦令人怔忡當隨其證施以治法且如健忘者陡然而忘其事也皆主於心脾二經蓋心之官則思脾之官亦主思此由思慮過矣傷於心則血耗散神不守舍傷於脾則胃氣衰憊而慮愈深二者皆令人事則卒然而遂忘也蓋心主血因血少不能養其真臟或停飲而氣鬱以生痰氣既滯脾不得舒是病皆由此作然治之法必須養其心血理其脾土凝神定志之劑以調理亦當以幽間之處安樂之中使其絶於憂慮遠其六淫七情如此日漸安矣且夫驚悸即動悸也動之為病惕然而驚悸之為病心下怯怯如人所捕皆心虛膽怯之所致也且心者君主之官神明出焉膽者中正之官決斷出焉心事安逸膽氣不怯決斷思慮得其所矣或因事有所大驚或聞虛響或見異相登高涉險驚忤心神氣與涎郁遂使驚悸驚悸不已變生諸證或短氣悸乏或體倦自汗四肢浮腫飲食無味心虛煩悶坐臥不安皆心虛膽怯之候也人之所主心心之所養血心血一虛神氣不守此驚氣之所肇端也曰驚曰悸其可無辭乎驚者恐怖之謂悸者怔忡之謂心虛而鬱痰則或聞大聲目擊異物遇險臨危觸事喪志心為之忤使人有惕惕之狀是則為驚即動悸也此則心虛而傷腎水則胸中滲漉虛氣流動水即去心火惡之心不自安使人有怏怏之狀是則為悸驚者去之豁痰定驚之劑悸者去之逐水消飲之劑所謂扶虛不過溫養心血和平心氣而已若一概以剛燥用工或者心火自炎反助風熱之證可不慎乎且前人析為怔忡健忘驚悸三證名異病同此立方之法俾後之學者當循規守矩體前人之心斯須之間不可造次致傷人命反此實醫之過歟怔忡健忘動悸通治方益榮湯治思慮過多耗傷心血心血既傷神無所守是以怔忡恍惚善悲憂少顏色夜不多寐小便或濁當歸去蘆酒浸黃耆去蘆小草酸棗仁炒去殼柏子仁炒茯神去木木香不見火麥門冬去心白芍藥人參去蘆紫石英煅研甘草炙各一錢上作一服水二盅生薑三片紅棗一枚煎一盅不拘時服茯苓飲子治痰飲蓄於心胃怔忡不已赤茯苓去皮半夏湯泡茯神去木麥門冬去心橘皮去白各一錢半沉香不見火檳榔甘草炙各一錢上作一服水二盅生薑五片煎至一盅不拘時服薑朮湯治虛證停飲怔忡白薑生白朮茯苓去皮半夏曲各二錢辣桂去皮甘草炙各半錢上作一服水二盅生薑三片紅棗一枚煎一盅不拘時服五苓散治水氣心下怔忡方見暑門龍齒丹治心血虛寒怔忡不已痰多恍惚龍齒遠志去心甘草水煮酸棗仁炒去殼研官桂去皮不見火當歸去蘆酒浸琥珀附子炮去皮臍切作片生薑汁浸一宿南星銼碎生薑汁浸一宿以上各一兩木香不見火沉香另研不見火紫石英煅醋淬熟地黃酒蒸焙各半兩上為細末煉蜜為丸如梧桐子大以硃砂為衣每服五十丸不拘時用棗湯送下參乳丸治心氣不足怔忡自汗人參去蘆一兩乳香三錢另研當歸二兩上為細末研勻山藥煮糊和丸如梧桐子大每服三十丸食後棗湯送下小定志丸治心氣不足恍惚多忘常服安神定志遠志去苗心菖蒲各二兩人參去蘆白茯苓去皮各三兩上為細末煉蜜為丸以硃砂為衣每服二十丸食後用米飲送下壽星丸治心膽被驚神不守舍或痰迷心竅恍惚健忘天南星一斤先用炭三十斤燒一地坑通紅去炭火以酒五升傾於地坑內候滲泄盡下南星在坑內以盆覆坑周圍用灰擁定勿令走氣次日取出為末硃砂二兩另研琥珀一兩另研上各為細末和勻用生薑汁煮麵糊和丸如梧桐子大每服三十丸加至五十丸食後煎人參石菖蒲湯送下歸脾湯治思慮過度勞傷心脾健忘怔忡人參去蘆木香各一錢茯神去皮木龍眼肉黃耆去蘆酸棗仁白朮以上各一錢半甘草炙半錢上作一服水二盅生薑五片紅棗一枚煎一盅不拘時服寧志膏治心神恍惚一時健忘辰砂研細水飛乳香另研各半兩酸棗仁炒去皮研人參去蘆研各一兩上為末和勻煉蜜為丸如彈子大每服一丸空心用溫酒或棗湯化下人參遠志丸治心氣不安驚悸恍惚神思不寧人參去蘆遠志去心酸棗仁黃耆以上各半兩桔梗去蘆官桂去皮丹砂以上各二錢半天門冬去心白茯苓去皮菖蒲各七錢半上為細末煉蜜為丸如梧桐子大每服三十丸食遠用米湯送下朱雀丸治心神不定事多健忘心火不降腎水不升沉香半兩茯神去皮木二兩上為細末煉蜜為丸如小豆大每服三十丸食後用人參湯送下二丹丸治健忘養神定志和血安神外華腠理天門冬去心熟地黃丹參以上各一兩半白茯苓去皮麥門冬去心甘草以上各一兩遠志去心人參去蘆各半兩上為細末煉蜜和丸以硃砂半兩研極細為衣每服五十丸加至百丸空心煎愈風湯送下愈風湯方見風門菖蒲益智丸治善忘恍惚破積聚止痛安神定志聰明耳目菖蒲炒遠志去心薑汁淹炒川牛膝酒浸桔梗炒人參各三兩三分桂心三錢茯苓一兩三分附子一兩炮去皮臍上為細末煉蜜為丸如梧桐子大每服三十丸食前用溫酒或米湯送下加味茯苓湯治痰迷心胞健忘失事言語如癡白茯苓去皮陳皮去白半夏湯泡人參去蘆香附子炒去毛益智以上各一錢半甘草炙一錢上作一服水二盅生薑三片烏梅一個煎一盅不拘時服十味溫膽湯治心膽虛怯觸事易驚夢寐不祥異象感觸遂致心驚氣鬱生痰涎涎與氣搏變生諸證或短氣悸乏或復自汗四肢浮腫飲食無味心虛煩悶坐臥不安半夏湯泡枳實麩炒陳皮去白各二錢白茯苓去皮一錢半酸棗仁炒遠志去心甘草水煮五味子熟地黃酒洗焙人參去蘆各一錢粉甘草炙半錢上作一服水二盅生薑五片紅棗一枚煎一盅不拘時服溫膽湯治痰涎氣搏觸事易驚或短氣悸乏心虛不安方見傷寒門加味四七湯治心氣鬱滯豁痰散驚半夏薑製三錢半厚朴薑製炒茯苓去皮各一錢半紫蘇葉茯神去皮各一錢遠志去心石菖蒲甘草各半錢上作一服水二盅生薑三片紅棗一枚煎一盅不拘時服養心湯治心虛血少驚惕不寧黃耆炙茯神去木白茯苓去皮半夏曲當歸川芎以上各一錢半遠志去心薑汁淹焙酸棗仁去皮隔紙炒香辣桂柏子仁五味子人參以上各一錢甘草炙半錢上作一服水二盅生薑五片紅棗二枚煎至一盅食前服加檳榔赤茯苓治停水怔悸茯苓甘草湯治心下停水忪悸茯苓去皮桂枝各三錢生薑半兩甘草二錢上作一服水二盅煎至一盅不拘時服寧志丸治心虛血少多驚人參去蘆茯神去木白茯苓去皮酸棗仁酒浸去殼微炒柏子仁遠志酒浸去心焙當歸琥珀以上各半兩石菖蒲硃砂另研乳香各二錢半上為細末煉蜜為丸如梧桐子大每服三十丸食後用棗湯送下十四友丸治心血俱虛怔忡驚惕柏子仁研遠志去心薑汁焙紫石英煅酸棗仁去皮隔紙炒熟地黃當歸去蘆白茯苓去皮白茯神去木人參去蘆黃耆炙阿膠炒辣桂去皮龍齒研各一兩硃砂研各半兩上為細末煉蜜為丸如梧桐子大每服三十丸食後用棗湯送下遠志丸治因事有所大驚夢寐不祥登高涉險神魂不安驚悸恐怯遠志去心薑汁製石菖蒲各二兩茯神去皮木白茯苓去皮人參去蘆龍齒各一兩上為細末煉蜜和丸如梧桐子大硃砂為衣每服七十丸用白湯送下食後臨臥服妙香散治心氣不足志意不定驚悸恐怖悲憂慘戚虛煩少睡喜怒不常夜多盜汗飲食無味頭目昏眩常服補益氣血安神鎮心方見心痛門天地煎治心血燥少口乾咽燥心煩喜冷怔忡恍惚小便黃赤或生瘡瘍天門冬去心二兩熟地黃九蒸九曝一兩上為細末煉蜜為丸如梧桐子大每服一百丸不拘時用人參煎湯送下治膽虛睡臥不安心多驚悸酸棗仁炒香一兩上為細末每服二錢不拘時竹葉煎湯調服祕傳酸棗仁湯治心腎水火不交精血虛耗痰飲內蓄怔忡恍惚夜臥不安酸棗仁去皮炒遠志去心制黃耆白茯苓蓮肉去心當歸酒浸人參茯神以上各一兩陳皮粉草炙各半兩上㕮咀每服四錢水一盞半生薑三片棗一枚以瓦器煎七分日二服臨臥一服俞居士選奇方治心常忪悸行險懼往忘前失後不定白檀香白茯苓桂心以上各十二分石菖蒲天竺黃熟地黃蘇合香犀角以上各四分天門冬遠志人參以上各六分甘草十分上為細末煉蜜為丸如櫻桃大每服一丸食後噙化或米飲咽下蕊珠丸治心恙豬心一個取血靛花一匙硃砂一兩為衣上先將青靛花曝乾次入豬心血同研爛次入硃砂末為丸如梧桐子大每服二十丸不拘時茶酒任下鬱金丸治失心及心恙風蟬肚鬱金有節者七兩白礬三兩上為細末薄糊為丸如梧桐子大每服六十丸湯水任下不拘時服有患癲狂數年者服之皆愈至人授此初服心胸間有物脫去神氣灑然再服而蘇此經憂戚痰絡於心竅所致也朱雀湯治心氣勞傷變生諸疾椎雀一隻取肉炙赤小豆一合人參去蘆赤茯苓去黑皮大棗去核紫石英小麥以上各一兩紫菀去土遠志去心丹參以上各半兩甘草炙一分上細銼拌勻每服三錢用水一盞煎六分去滓食遠溫服
