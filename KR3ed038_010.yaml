body:
  text: 卷之十奪命獨參湯治傷寒汗下後終日昏悶不省人事發熱發渴似有狂言一切危急之證宜服此藥服後額上鼻尖有微汗是其應也揀人參一兩上㕮咀作一服用水一升煎至七分去滓溫冷不拘時服滓再煎服神效附子回陽散治陰毒傷寒面青四逆及臍腹㽲痛身體如冰並一切卒暴冷氣上用附子二枚炮裂去皮臍搗為細末每服三錢匕取生薑自然汁半盞冷酒攪勻共一盞調服更以冷清酒一盞送下相次更進一服良久臍下如火遍身和暖為度回生神膏治男女陰毒傷寒外接法牡蠣煅粉乾薑炮各一錢上為細末男病用女唾調手內擦熱緊掩二卵上得汗出愈女病用男唾調手內擦熱緊掩二乳上得汗出愈卵與乳男女之根蒂坎離之分也陰證大小便不通及諸雜證陰候大小便不通者並宜此外治法數日不通為急非急者勿用蔥餅熨法治氣虛陽脫體冷無脈氣息欲絕不省人事及傷寒陰厥百藥不效者上用蔥一束以索纏如餅餤大去根葉唯存白長二寸許先以火燒一面令通熱勿至灼人乃以熱處著病人臍下上以熨斗盛火熨之令蔥餅熱氣透入腹中更作三四餅遇一餅壞不可熨即易一餅候病醒手足溫有汗乃瘥更服四逆湯以溫其中昔曾有患傷寒冥冥不知人四肢堅冷如石藥不可入用此遂瘥一方用釅醋拌麩炒熱注布袋中蒸熨比上法尤佳霹靂散治陰勝隔陽傷寒其人必躁熱而不欲飲水是也上用附子一枚燒為灰存性為末作一服蜜水調下而愈此逼散寒氣然後熱氣上行而汗出乃愈大羌活湯解利兩感神方天之邪氣感則害人五臟以是知內外兩感腑臟俱病欲表之則有里欲下之則有表表裡既不能一治故云兩感者不治然所稟有虛實所感有淺深虛而感之深者必死實而感之淺者尤或可治治之而不救者有矣未有不治而獲生者也予嘗用此間有生者十得二三故立此方以待好生君子用之羌活獨活防己防風黃芩黃連蒼朮制白朮甘草炒川芎細辛各三錢生地黃知母各一兩上㕮咀每服秤半兩水二大盞煎至一盞半去滓得清藥一大盞熱飲之不解再服三四解之亦可病愈則止若有餘證並依仲景隨經法神效沃雪湯治傷寒陰陽二證未辨時行疫癘惡氣相傳服之如湯沃雪此藥功力不可具述蒼朮堅者炮刮去皮乾薑炮製甘草炙各六兩厚朴去皮薑汁製防風嫩者白芍藥去皮葛根各四兩上㕮咀每服四錢水二盅煎至一盅去滓熱服之不拘時服少頃取生薑蔥作羹或粥投之避風坐臥身體微潤即愈如疫氣正相傳染清晨進一服為佳常服每用二錢水一盞煎至八分服桔梗枳殼湯治結胸心下痛欲死者桔梗炒枳殼麩炒甘草炙各等分上㕮咀每服五錢水一盞半生薑三片煎至七分去滓服或不用生薑亦可痰多加半夏生薑有熱加黃芩治傷寒陽證結胸死無可藥者上用蚯蚓十五條活者擂爛蜜半盞冷水半碗灌服若無蜜砂糖亦妙茵陳蒿大黃湯治傷寒發黃面目悉黃小便赤宜服茵陳蒿山梔仁柴胡黃柏蜜炙龍膽草各半兩黃芩去黑心升麻大黃炒各一兩上㕮咀每服五錢水一盞半煎一盞去滓早晚食後溫服茅根湯治傷寒發黃遍身如金色者茅根洗銼山梔仁茵陳蒿地骨皮甘草炙各半兩上㕮咀每服五錢用水一盞半生薑三片豆豉三七粒同煎至一盞去滓早晚食遠溫服茵陳五苓散治傷寒溫濕熱病感冒後發為黃疸小便黑赤煩渴發熱不得安寧此蓋汗下太早服藥不對證因感濕熱病以致遍身發黃予當用茵陳五苓散治之甚效上用生料五苓散一兩加入茵陳半兩車前子一錢木通一錢半柴胡一錢半酒後得證加乾葛二錢作㕮咀並前藥和勻分作二服每服水一碗燈草五十莖同煎八分去滓食前服滓再煎連進數服小便清利為愈百合知母湯治百合傷寒已經汗後病人飲食復不能食常默默欲臥復不能臥欲行復不能行有寒如無寒有熱如無熱飲食或美不美如強健人而臥不能行口苦小便赤藥入口即吐利此因虛勞大病之後不平復變成此疾名百合病宜服百合七枚擘知母一兩上先將百合擘碎用新汲水二盞浸一宿當有白沫出去卻沫水了卻用新汲水二盞煮百合取汁一盞去渣盛於淨器中又將知母亦用新汲水二盞煮取一盞去渣後將百合知母汁相和同煎取一盞不拘時分合作二服百合散治傷寒百合病一月不解變如渴疾宜服百合栝蔞根各一兩牡蠣煅為粉麥門冬去心焙山梔仁各三分甘草炙半兩上㕮咀每服五錢水一中盞入生薑半分竹葉二七片煎至六分去滓不拘時溫服治傷寒百合病腹中滿痛宜服此方上用百合一兩炒令黃色為細末每服二錢不拘時米湯調下雄黃丸治傷寒狐惑微煩默默欲臥毒氣上攻咽乾聲嗄下蝕濕䘌或便膿血雄黃研當歸炒各三分蘆薈研麝香研各一分檳榔半兩上搗研為末煮麵糊為丸如梧桐子大每服十五丸至二十丸食前溫粥飲下日三服訶黎勒丸治傷寒後膿血痢下部疼痛訶黎勒炮去核人參各一兩白茯苓去皮當歸焙木香白芷各三分牡丹皮半兩上搗羅為末煉蜜和搗三五百杵丸如梧桐子大每服三十丸食前米飲下日再服黃連丸治傷寒熱病後熱毒下痢膿血黃連炒三分烏梅肉炒二兩上為細末煉蜜入少蠟和搗五六百杵丸如梧桐子大每服二十丸加至三十丸空心米飲下阿黎勒飲治傷寒後氣不和自利無度阿黎勒四枚二生二煨去核草豆蔻四枚二生二煨去皮上㕮咀每服二錢匕漿水一盞煎至六分去渣空心溫服燥腸丸治傷寒汗下後大小便自利腹中痛者附子一枚炮乾薑一兩龍骨吳茱萸訶黎勒去核米殼各半兩上為細末酒糊為丸如梧桐子大每服三十丸溫水下痢止勿服治傷寒發汗吐下後體虛元臟積冷氣刺腰痛轉動艱難原蠶蛾半斤糯米半升上二味同炒令米色焦在後搗羅為末每用半兩以米醋調如稀糊入銚子內煎攪勻稠乘熱攤於蠟紙上貼痛處以帛纏縛冷即易之杜仲酒治傷寒後體虛元臟挾風冷腰膝疼痛行履不得杜仲去粗皮炙二兩獨活半兩附子炮裂去皮臍牛膝各一兩仙靈脾三分上細銼用生絹袋盛以酒五升浸密封頭經七日後開每日取三二合溫服日三服未瘥再浸服二瀝湯治傷寒失音不語竹瀝荊瀝梨汁各二合上攪令勻以綿濾過分溫四服空心日晚各一服人參湯治傷寒後虛羸少力嘔噦氣逆人參二分白茯苓去皮二分麥門冬去心焙黃耆各一兩半夏湯洗七次炒陳皮去白白朮各半兩甘草炙一分上㕮咀每服五錢匕水一盞半入生薑三片棗三枚擘破同煎至八分去滓食前溫服牡蠣散治傷寒後虛損心多怔悸夜夢泄精牡蠣燒為粉桂心白芍藥鹿茸酥炙龍骨各一兩甘草炙半兩上㕮咀每服五錢水一大盞生薑半分棗三枚煎至五分去渣食前溫服羚羊角丸治傷寒夜夢精泄不禁身體枯燥瘦脊骨立者羚羊角屑犀角屑石龍芮韭子炒龍骨硃砂細研水飛鹿茸酒浸炙澤瀉各一兩半桂心木香各一兩上為細末煉蜜和搗五七百杵丸如梧桐子大每服三十丸食前用溫酒送下葳蕤湯風溫之病脈陰陽俱浮汗出體重其息必喘其形狀不仁嘿嘿但欲眠下之者則小便難發其汗者必譫語加燒針者則耳聾難言但吐下之則遺失便利如此病者宜服葳蕤白薇麻黃獨活杏仁川芎青木香甘草各一兩石膏三兩上㕮咀以水八升煮取三升去渣分三服取汗若一寒一熱加朴硝一分及大黃三兩下之如無木香可用麝香一分小品方云葳蕤湯治冬溫春月中風傷寒則發頭腦疼痛咽喉干舌強肉疼心胸痞滿腰背強柴胡石膏湯治時行瘟疫壯熱惡風頭痛體疼鼻塞咽乾心胸煩滿寒熱往來痰實咳嗽涕唾稠黏柴胡石膏煅赤芍藥前胡乾葛各十五兩升麻二十五兩黃芩桑皮各三十七兩半荊芥穗三十七兩上㕮咀每服五錢水一盞生薑三片豉十餘粒同煎七分去滓熱服小兒分作三服更量大小加減不拘時服茯神散治傷寒後虛羸心氣乏力弱驚悸多忘茯神黃耆菖蒲各一兩白芍藥人參各半兩遠志去心三分上㕮咀每服五錢水一中盞入棗三枚煎至六分去滓不拘時溫服龍齒丸治傷寒後伏熱在心心虛驚悸龍齒人參生乾地黃茯神各一兩遠志去心鐵粉細研各半兩黃連去須馬牙硝細研防風各三分麝香細研半分麥門冬一兩半焙上為細末都研令勻煉蜜和丸如梧桐子大每服二十丸竹葉金銀湯下不拘時服柴胡湯治傷寒後夾勞五心煩熱背膊疼痛手足無力不能飲食柴胡赤茯苓鱉甲去裙袢醋浸炙黃耆各一兩秦艽地骨皮黃芩去黑心枳殼去穰麩炒葛根各半兩甘草炙人參各三分上㕮咀每服四錢水一盞半煎至七分不拘時溫服鱉甲散治傷寒後虛羸盜汗不止四肢無力向晚增寒鱉甲醋炙黃去裙袢附子炮裂去皮臍甘草炙肉蓯蓉酒浸去皮炙乾人參黃耆熟地黃桃仁去皮尖雙仁麩炒枳殼去穰麩炒杜仲炙黃五味子各三分牡蠣煅一兩柴胡牛膝各三分蒼朮炒一兩上㕮咀每服五錢水一大盞生薑半分棗三枚煎至五分不拘時溫服治傷寒後虛羸日夜汗出不止心燥口乾咽喉不利黃雌雞一隻去腸肚理如常法肉蓯蓉一兩酒浸一宿刮去皺皮切牡蠣燒如粉麻黃根各二兩上先將雞麻黃根以水七大盞煮取汁三大盞去雞麻黃根後下肉蓯蓉牡蠣煎取一錢半去滓分為三服空心午前夜後臨臥時服大病瘥後多虛汗龍骨牡蠣麻黃根上等分為末以粉身紫菀散治傷寒後肺痿勞嗽唾膿血腥臭連連不止漸將羸瘦紫菀洗去苗土天門冬貝母煨微黃各一兩生乾地黃桔梗各一兩半百合知母各三分上㕮咀每服四錢水一盅半煎六分去滓不拘時溫服補肺散治傷寒汗下後喘咳不止恐傳肺痿人參一兩五味子款冬花各半兩桑白皮二兩蛤蚧一對上為細末每服五錢沸湯一盞調服韭根散治傷寒後陰陽易頭重百節解痛翕翕氣劣著床不能起動甚者手足拳腳腫疼痛韭根栝蔞根各二兩青竹茹乾薑炮各半兩上細銼和勻分作八服每服用水一大盞煎至五分去滓入鼠糞末一字攪令勻不拘時服聖濟方搗篩五錢匕用水一盞半煎至一盞去滓食前溫服一名豐本湯治傷寒婦人得病雖瘥未滿百日不可與交合為陰陽之病必拘急手足拳欲死丈夫病名曰陰易婦人病名曰陽易速當汗之可痊滿四日不可療宜令服此藥其病體重小腹急熱上衝胸頭重不能舉眼中生翳膝脛拘急上以乾薑四兩為末沸湯調連進服以衣被覆出汗方解手足伸而愈二灰散治傷寒陰陽易手足指甲二十片男病用女者女病用男者中衣襠一斤男病用女者女病用男者上並燒作灰研令極細分三服不拘時候用溫酒調下或米湯調服六君子湯治傷寒汗下之後將見平復宜服此調理助脾進食辟邪氣大妙人參白朮黃耆白茯苓山藥甘草各等分上㕮咀每服四錢水一盞半生薑三片棗三枚同煎至七分去滓溫服養脾湯治傷寒後脾胃虛弱不思飲食茯苓乾薑炮各一兩白朮二兩丁香人參甘草上如法事治一處搗羅為末每服三錢水一盞煎至六分溫服日進三服不拘時候補脾湯治傷寒汗後脾胃傷冷物胸膈不決尋常血氣不和人參乾薑白朮陳皮去白青橘皮去白甘草各等分上為細末每服三錢水一盞煎數沸熱服入鹽點亦得又記有人患傷寒得汗數日忽身熱自汗脈弦數心不得寧真勞復也予診曰勞心之所致未復其初而又勞其神榮衛失度當補其子入其脾解發其勞庶幾得愈授以補脾湯佐以小柴胡湯得解難經曰虛則補其母今補其子何也予曰子不知虛勞之異乎難經曰虛則補其母實則拂其子此虛當補其母人所共知也千金曰心勞甚者補脾氣以益之脾王則感於心矣此勞則當補其子人所未聞也蓋母生我者也子繼我而助我者也方治其虛則補其生我者與錦囊所謂本骸得氣遺體受蔭同義方治其勞則補其助我者與荀子所謂未有子富而父貧同義此治虛與勞所以異也健脾散治傷寒後脾胃虛弱不欲飲食縱食不能消化訶黎勒皮白朮麥蘖炒令微黃人參各一兩神麯炒甘草炙枳殼麩炒大腹皮各半兩乾薑二分炮上㕮咀每服四錢水一中盞入生薑半分煎至六分去滓不拘時服熱服助胃丸治宿食不化縮砂仁茯苓去黑皮白朮各一兩紅豆甘草炙人參枳殼各五錢上搗羅為細末煉蜜和搗三五百杵丸如梧桐子大每服十五丸空心溫酒送下米飲亦得神仙百解散治傷寒無問陰陽二證其間所用藥味各隨經絡治病如傷寒在表未傳入經發熱惡寒腰痛連進二服汗出而愈若已傳經絡胸滿短氣肢體煩疼目睛微痛耳聾口燥咽乾或渴或不渴手足自溫或四肢厥逆自利或不利小便反快服之調中順氣祛逐寒邪如頭面感寒風傷腠理頭痛項強發熱增寒鼻流清涕咳嗽痰涎及治風濕相搏骨節煩疼肢體沉重灑淅惡風時自汗出此藥大能調順三焦解表救里溫潤肺經正四時之氣升降陰陽進美飲食不問傷風傷寒中暑中暍骨蒸頭疼氣逆胸滿失飢吐逆眩暈噁心及已經汗後不解下之不當吐之不中此藥清而不涼溫而不壅無問老人虛人丈夫婦人孕婦小兒並宜服之如連進二服無不取效春常服免瘟疫之疾夏常服不中暑暍之病秋服之不生瘧疾冬服之不感寒毒真神仙衛生之藥也功效不可盡述山茵陳柴胡去蘆前胡人參羌活獨活蒼朮米泔浸炒甘草乾薑白芍藥升麻防風藁本藿香半夏薑製白朮各一兩立春以後不加減立夏以後一料內加柴胡赤茯苓當歸各半兩立秋以後減柴胡一分不用當歸赤茯苓只加乾薑炮肉桂去粗皮各一分麻黃去節半兩立冬以後並無加減一方無當歸有黃芩去蘆半兩上為細末每服三錢水一盞半姜三片棗二枚煎一盞熱服不拘時並進二服如要表散加蔥白三寸淡豆豉三十粒同煎服之衣被蓋覆汗出而愈一方無山茵陳前胡加減五苓散藥中之寶五苓散專治傷寒有大功陽證見時須去桂陰加附子水煎濃狂言亂語辰砂末頭目疼痛入川芎咳嗽多加五味子心氣不定麥門冬胃中嘔逆人參妙痰多半夏喜相逢定喘馬兜零最好蒼朮去濕腹中空小便澀閉加瞿麥黃芩能使大便通腹中氣塊三稜術青皮能退熱如烘麻黃用根除盜汗下部赤腫使椒紅飲水煩渴加乾葛鼻衄烏藥卻為功眼中黃色茵陳炒勞復桔梗有神功目赤令添赤芍藥茵陳退腫又相逢眼中若赤石膏末陳皮止渴又參同急醫水氣甜葶藶伏暑燈心浸水中二十四證真妙訣專心盡救效無窮
