body:
  text: 卷之四寒門附論論曰夫中寒者寒為天地殺癘之氣人中之者其病速而危倉卒受邪生命暴絶蓋由胃氣大虛而又觸冒大寒胃虛則肺不能生旺而皮毛之氣先絶氣弱則表失衛護而寒邪易於外入使周身陽氣遏絶而不行四肢厥逆禁固而僵直故口噤目瞪面色青白或自汗表絶或下痢內脫內外俱虛而寒邪獨盛治失稍緩脈散而死岐伯曰冬三月此為閉藏水冰地坼無擾乎陽早臥晚起必待日光乃去寒就溫之意寒者天地為殺癘之氣在天為寒在地為水在人臟為腎而寒喜中腎若中之者拘急攣痛昏不知人但言寒喜中腎者不言他臟中者且如辛苦之徒飢飽勞役不避風雪觸冒嚴寒之氣卒然病者以其五臟皆能有所中寒之證先頭痛身熱惡寒體痛此是傷寒也當以傷寒法內求之若卒然運倒懵然無所知覺而牙緊口噤與中風相類但脈弦緊或沉細者乃中寒也若素有血虛氣滯沉寒痼冷偏枯不仁拘攣痹厥之證與夫虛寒者虛謂陽不足寒謂陰有餘陽不足則五虛生焉陰有餘則寒氣積矣五虛既生則脈細弱氣少泄利不食乃其證也此證非比傷寒為病邪氣次序循經相傳表漸入里熱雖甚不死夫人以腎為根本惟腎受寒傷腎腎氣一虛寒邪交併致生病焉大抵中寒脈必遲挾風脈必浮眩暈不仁兼濕則脈濡腫滿疼痛治療之法不可妄吐妄下則當補陽消陰暖丹田固真氣若嚴氏所論惟中寒時刻之間便有挾風兼濕脈證之轉展相乘者經曰以身之虛而逢天之虛兩虛相感其氣著人則傷五臟醫工救之不可妄誤緩急之勢明可見矣欲求捷效局方發揮論前人治以附子理中湯其議此藥用得之矣蓋謂溫經則寒散而陽復補土則氣和而表實氣充形完神無餒而不病矣寒證通治方不換金正氣散解散寒邪蒼朮橘皮半夏曲厚朴薑製藿香各二錢甘草炙一錢上作一服水二盅生薑五片紅棗二個煎至一盅食前服人參養胃湯治外感風邪內傷生冷蒼朮厚朴薑製半夏湯洗七次各二錢人參茯苓草果藿香各一錢橘皮一錢二分甘草炙半錢上作一服水二盅生薑七片烏梅半個煎一盅不拘時服理中丸治中寒腹痛人參白朮乾薑炮甘草炙各二兩上為末麵糊為丸如梧桐子大每服八十丸米飲湯送下食前服一方加炮過附子一兩生料五積散治感冒寒邪頭疼身痛項背拘急惡寒嘔吐肚腹疼痛外感風寒及寒濕客於經絡腰腳痠疼並皆治之白芷七分陳皮一錢厚朴薑製二分桔梗九分枳殼去穰制炒八分川芎八分甘草炙六分茯苓八分蒼朮米泔浸二錢當歸八分麻黃一錢肉桂六分芍藥八分乾薑炮八分半夏湯洗七次七分上作一服水二盅生薑三片蔥白三莖煎一盅不拘時服理中湯治五臟中寒口噤失言四肢強直兼治胃脘停痰冷氣刺痛人參乾薑炮甘草炙白朮各二錢上作一服水二盅煎至一盅不拘時服姜附湯治中寒四肢厥冷強直失音口噤吐沫附子炮三錢乾薑炮五錢上作一服水二蠱煎至八分不拘時服薑桂散溫中散寒乾薑良薑各一錢半辣桂木香半夏曲甘草炙各一錢上作一服水二盅生薑五片紅棗二個煎一盅不拘時服附子理中湯治中寒中濕嘔逆虛弱人參白朮乾薑炮附子炮去皮臍各二錢甘草炙一錢上作一服水二盅生薑五片煎至一盅食前服如血少加當歸一錢同煎服沉附湯治虛寒無陽胃弱乾嘔附子炮去皮臍乾薑炮各二錢半沉香白朮各一錢二分甘草炙八分上作一服水二盅生薑五片煎至一盅食前服沉香桂附丸治中寒心腹冷痛霍亂轉筋等證沉香附子炮去皮臍乾薑炮良薑炒官桂去皮茴香炒川烏頭炮去皮臍銼作小塊子如豆大吳茱萸湯浸洗炒上各一兩為細末用好醋煮麵糊為丸如梧桐子大每服五七十丸熟米飲下空腹食前日進二服忌生冷硬物尉法治三陰中寒一切虛冷厥逆嘔噦陰盛陽虛之證及陰毒傷寒四肢厥冷臍腹痛咽喉疼嘔吐下利身背強自汗脈沉細唇青面黑諸虛冷證皆宜用之肥蔥細切銼麥麩各三升滄鹽二兩上三件入水一大盞同和拌勻濕分作二次於鐺鍋內同炒極熱同重絹縫作二包將一包熱尉臍上冷更易一包蔥包既冷再用鹽水拌濕炒焦依前用之至煤爛不用別取蔥麩日夜不住相續至身體溫熱脈壯陽氣復來而守正氣養之和之又方治陰證傷寒腹痛吐利唇青面黑身背強四肢冷脈沉細咽喉不利上用滄鹽一斤炒焦大熱布絹二重作囊包裹盛之尉陰臍間亦同蔥尉法尤妙溫中降氣丸治中寒氣痞脾胃不和飲食進退臍腹虛冷及中酒吐逆胸膈不利附子去皮臍切作半棗大稱一兩用生薑自然汁半升銀石器內慢火煮薑汁盡為度薄切焙乾生薑二兩去皮白朮人參陳皮去白神麯炒黃半夏湯洗七次白附子炮當歸洗焙天南星炮高良薑煨切油炒丁香木香沉香胡椒肉桂去皮各一兩上為細末用生薑自然汁煮神麯糊為丸如梧桐子大每服五十丸生薑湯下不拘時服附子散治陰證傷寒唇青面黑身背強痛四肢厥冷及諸虛沉寒附子炮官桂當歸白朮各二錢半乾薑炮半夏曲各二錢上作一服水二盅生薑五片紅棗二枚煎至一盅食前服
