body:
  text: 卷之三十二喘門附論諸喘為熱夫火熱為陽主乎急數而火動於上喘急乃作若夏熱甚則息數氣粗喘之屬熱無疑矣經云諸逆衝上皆屬相火者此也蓋肺主氣為陽陽氣流行通榮臟腑故肺為五臟之華蓋喜清虛不欲窒澀若陰氣在下陽氣在上與氣之有餘者則發咳嘔而喘急也聖濟方云呼隨陽出氣於是升吸隨陰入氣於是降一升一降陰陽乃和苟有乖和則氣上不行升而不降痞塞膈中氣道奔迫喘息有聲也又風寒暑濕邪氣相干肺張滿而喘者或喜怒之氣傷於五氣鬱而生痰作喘者或肺腎俱虛由體弱不能攝養一身之痰而喘者或脾濕腫滿水氣乘呻而喘者或本臟虛風邪所幹於肺葉氣壅遏而上衝者豈可一概而論之內經靈樞諸篇所論諸喘而名不同所感各異若言喘喝與言喘息言喘迫言喘致言喘嘔言上氣者雖名不同而病之皆出於肺內經又云臥則喘者水氣之客經脈篇云夜行則喘出於腎淫氣病肺有所墮恐喘出於肝淫氣害脾有所驚恐喘出於肺淫氣傷心度水跌僕喘出於腎與骨痹論篇云腰痹者中氣喘爭大奇篇云肺之喘而兩怯滿至真大要篇論太陰司天為客勝則首面胕腫呼吸喘氣陽明篇云謂邪入六腑身熱喘呼不得臥也此各藏所感之異乎仲景云發汗如油汗出如珠不流喘而不休者此為不治其脈滑而手足溫者生脈澀四肢厥者死又有婦人喘急為病尤亟因產後所下過多榮氣暴竭衛氣無依獨聚於肺故發喘也此名孤陽絕陰為難治治法外感者以祛散之氣之內郁者以調順為先腎虛者宜以溫補痰盛者當以疏導有陰血虛少而上喘者宜以滋陰養榮之劑所論前證臨期用藥在乎消息治之無不愈矣喘急通治方人參定喘湯治肺氣上喘喉中有聲坐臥不安胸膈緊痛又治肺感寒邪咳嗽聲重人參去蘆麻黃去節阿膠蛤粉炒半夏曲五味子罌粟殼去蒂蜜炙甘草以上各一錢桑白皮二錢上作一服用水二盅生薑三片煎至一盅食後服團參散治肺氣不利咳嗽上喘紫團參紫菀茸各三錢款冬花一錢上作一服用水二盅烏梅一枚煎至一盅食遠服蘇子降氣湯治虛陽上攻喘促咳嗽方見氣門杏參散治墜墮驚恐或渡水跌僕疲極喘息杏仁炒去皮尖人參去蘆橘紅大腹皮檳榔白朮訶子麵煨取肉半夏湯泡桂心不見火紫菀洗桑白皮甘草炙各一錢上作一服用水二盅生薑三片紫蘇七葉煎至二盅去滓不拘時服四磨湯治七情鬱結上氣喘息沉香檳榔人參天台烏藥上各濃磨水共取七分盞煎三五沸不拘時服紫蘇子湯治憂思過度邪傷脾肺心腹膨脹喘促煩悶腸鳴氣走漉漉有聲大小便不利脈虛緊而澀紫蘇子半夏湯泡木通木腹皮木香不見火陳皮人參草果仁枳實麩炒白朮厚朴薑製甘草炙以上各一錢上作一服用水二盅生薑三片紅棗二枚煎至一盅去滓不拘時服五味子湯治喘促脈伏而數者五味子二錢人參去蘆麥門冬去心杏仁去皮尖橘皮去白以上各二錢半上作一服用水二盅生薑三片紅棗三枚煎至一盅去滓不拘時服人參潤肺湯治肺氣不足喘急咳嗽不已及治傷寒頭疼增寒壯熱四肢疼痛杏仁半夏湯治肺痿涎喘不定咳嗽不已甚者寒熱往來杏仁去皮尖半夏桔梗陳皮去白茯苓去皮漢防己各一錢半薄荷七分半豬牙皂角二錢白礬甘草各一錢上作一服用水二盅生薑三片煎至一盅食後服葶藶散治過食煎爆或飲食過度致肺壅喘不得臥及肺癰咽燥不渴唾腥臭甜葶藶炒桔梗去蘆栝蔞仁川升麻薏苡仁桑白皮炙葛根以上各一錢半甘草炙一錢上作一服水二盅生薑五片煎至一盅食後服華蓋散治風寒冷濕之氣傷於肺經上氣喘促不得睡臥或聲音不出者方見咳嗽門葶藶散治肺氣喘滿痰嗽睡臥不寧不思飲食方見咳嗽門定肺湯治上氣喘嗽紫菀橘紅去白杏仁去皮尖炒五味子枳殼麩炒半夏薑製桑白皮炒紫蘇子炒甘草炙以上各一錢半上作一服用水二盅生薑三片紫蘇五葉煎一盅食後服杏蘇飲治上氣喘嗽浮腫杏仁去皮尖炒一錢半紫蘇葉二錢五味子大腹皮烏梅去核紫菀甘草炙以上各一錢陳皮去白麻黃去節桑皮炒阿膠炒桔梗以上各七分半上作一服用水二盅生薑五片煎至一盅食後服玉華散治咳嗽上喘調順肺經清利咽膈安和神氣甜葶藶焙桑白皮炒半夏薑製貝母炮天門冬去心馬兜鈴杏仁去皮尖紫菀洗百合蒸人參以上各一錢百部甘草炙各七分半上作一服用水二盅生薑三片紅棗二枚煎一盅食後服人參理肺散治喘不止人參杏仁麩炒粟殼炒以上各二錢麻黃去節炒黃色木香當歸以上各一錢上作一服用水二盅煎至一盅食後服麻黃散傷風喘急坐臥不安痰涎壅盛涕唾稠黏手足冷痹麻黃去節四錢款冬花三錢肉桂二錢四分杏仁去皮尖炒一錢半訶子肉二錢甘草炙一錢上作二貼每貼用水二盞子茶一錢食前煎服九寶湯治經年喘嗽通用麻黃去節陳皮肉桂紫蘇桑皮炒杏仁去皮尖炒大腹皮薄荷甘草炙各一錢六分上作二貼每貼用水二盞生薑五片烏梅一個食遠煎服神秘湯治上氣喘急不得臥者陳皮桔梗紫蘇五味子人參各三錢上作二貼每貼用水二盅煎至一盅食遠服臥則喘者水氣逆上乘於肺也一方無桔梗五味有桑白皮木香茯苓生薑煎服安神散治遠年近日喘嗽不已粟殼蜜炒人參陳皮以上各三錢甘草炙一錢半上為細末每服一二錢食後烏梅湯調服加味控涎丸治風熱上攻壅盛中脘停痰留飲喘急四肢浮腫腳氣入腹及腹中諸氣結聚服之得利即效大戟芫花醋炒甘遂苦葶藶炒以上各三錢巴豆去油一錢牽牛頭末一兩炒上為細末滴水和丸如粟米大每服三丸茶清下湯亦可千緡湯治痰喘半夏七個泡七次每個切作四片皂角去皮弦子炙一寸甘草節一寸上作一服用水二盞生薑如指大一塊煎至半盞去滓頓服數貼瘥陳皮湯治痰喘陳皮湯浸去白半斤明礬二兩半銚內飛烊與陳皮同炒香甘草二兩炙大半夏五兩湯煮每個切四片用明礬泡湯浸露七日夜漉出薑汁搗成餅焙乾上為細末每服二錢不拘時用米湯調下清氣散專治喘急粟殼去穰蒂五味子桑白皮紫蘇青皮款冬花枳殼麩炒陳皮各等分甘草減半上用慢火炒焦色急傾水中煎服加半夏生薑煎尤妙五味子湯治癰疽五味子紫蘇麻黃細辛赤茯苓紫菀黃芩陳皮桑白皮官桂葶藶半夏甘草各等分上㕮咀每服五錢水二盞生薑半分煎至一盞食後服消膿飲治肺癰有膿腥氣上衝嘔而咳嗽南星半夏知母生地黃川芎防風貝母桑白皮阿膠射干桔梗天門冬薄荷杏仁去皮尖紫蘇白芷烏梅白芨各等分甘草減半上㕮咀每服一兩水二盞生薑五片煎一盞食後服五味子散治肺虛寒理喘下氣去痰飲務觀郎中姊忽發喘嗽服諸藥皆不效得此三服遂愈五味子官桂去粗皮茯苓以上各一兩陳皮去白三分乾薑炮甘草炙各半兩上㕮咀每服五錢水一大盞煎至六分食遠熱服神秘方治喘上以豬爪甲二枚燒灰研細入麝香當門子一枚同研細用臘茶清調下皺肺丸治喘款冬花知母秦艽百部去心紫菀茸貝母阿膠糯米炒以上各一兩杏仁去皮尖別研四兩上為末將羊肺一個先以水灌洗看容得水多少即以許水更添些煮杏仁令沸濾過灌入肺中系定以糯米泔煮熟研細成膏搜和前藥末杵數千下丸如梧桐子大每服五十丸食前用桑白皮煎湯送下定喘化涎方上用豬蹄甲四十九個淨洗控干每個指甲內半夏白礬各一字入罐子內封閉勿令煙出火煅赤去火細研入麝香一錢人有上喘咳嗽用糯米飲下小兒服半錢平氣散治盛則為喘己未歲初秋三日奉召至六盤山至八月中霖雨時承上命治不憐吉吳元帥夫人年逾五十身體肥盛因過飲酒及湩乳腹脹喘滿聲聞舍外不得安臥大小便澀滯氣口脈大兩倍於人迎關脈沉緩而有力子思霖雨之濕飲食之熱濕熱大盛上攻於肺神氣躁亂故為喘滿邪氣盛則實實則宜下之故制平氣散以下白牽牛半生半炒熟取頭末一兩大黃七錢陳皮去白半兩青皮去白檳榔以上各三錢內經云肺苦氣上逆急食苦以泄之故用牽牛苦寒瀉表分濕熱上攻為喘故以為君陳皮苦溫體輕浮理其肺氣青皮苦辛散肺中滯氣為臣檳榔辛溫性沉重下痰降氣大黃苦寒盪滌滿實故以為使上為細末每服三錢煎生薑湯一大盞調下無時一服減半再服喘愈止有胸膈不利煩熱口乾時時咳嗽以加減瀉白散主之加減瀉白散青皮去白二兩桑白皮一兩知母地骨皮陳皮桔梗以上各半兩細黃芩甘草炙各三錢上銼如麻豆大每服半兩水二盞煎至一盞去滓食後溫服數服良愈華陀云盛則為喘減則為枯活人云發喘者氣有餘也凡看文字須要會得本意盛而為喘者非肺氣盛也喘為氣有餘者亦非肺氣有餘也氣盛當認作氣衰有餘當認作不足肺氣果盛又為有餘當清肅下行而不喘以其火入於肺衰與不足而為喘也故言盛非有肺氣盛也言肺中之火盛也言有餘者非言肺氣有餘也言肺中火有餘也故瀉肺以苦寒之劑非瀉肺中之火實補肺氣用者不可不知也調降湯治喘嗽枳殼一兩半夏制桔梗青皮陳皮紫蘇子檳榔茯苓葶藶隔紙炒以上各半兩縮砂仁白豆蔻仁紫蘇葉以上各二錢半甘草炙三分上銼散每服三錢生薑五片水一盞煎至七分不拘時服八仙丸治喘嗽神效天南星一兩炮半夏洗款冬花小皂角炙黃去弦子白礬枯甘草炒以上各半兩巴豆七個杏仁三十五個去皮尖炒棗三個去核煨裹巴豆慢火燒煙盡上為細末醋煮糊和丸如梧桐子大每服二三十丸食後用溫薤菜汁送下或細嚼蘿蔔栗子生薑湯下沉香散定喘止嗽沉香阿膠炒人參紫蘇陳皮以上各半兩桑白皮揀一兩微炒氣虛人減半甘草炙一分上為細末每服三錢水一大盞生薑三片煎至七分去滓通口服元方只以棗湯調下白雲換肺丸治遠年近日喘嗽不止款冬花一兩寒水石半夏明礬各二兩上為細末生薑汁煮糊和丸如梧桐子大每服三四十丸不拘時用生薑湯送下治遠年近日喘嗽方上用皂角不蛀者三大莖刮去黑皮刀切開去子每子倉內入巴豆肉一粒合就以麻皮縛定用生薑自然汁和蜜塗令周匝慢火炙之又塗又炙以焦黃為度劈開去巴豆不用又以好明礬一兩枯過用麻子七粒生薑汁和蜜再塗炙前皂角三味同為末卻以杏仁二兩去皮尖研成膏卻與前藥和勻每服一錢用柿子干炙過候冷點入藥內細嚼臨睡服忌熱毒魚鮓鮭鯗油麵酒米醋煎爆熱物定喘丹治男子婦人久患咳嗽肺氣喘促倚息不得睡臥齁䶎久嗽亦宜服之累年不瘥漸致面目浮腫者神效杏仁去皮尖炒別研馬兜鈴蟬蛻去土並足翅以上各一兩砒二錢煅別研上為細末蒸棗肉為丸如葵子大每服六七丸臨睡用蔥茶清放冷送下忌熱物半日一名定喘瑞應丹人參方治咳嗽上氣喘急嗽血吐血者宜服上用揀參搗為末每服三錢用雞子清調之五更初服便睡去枕仰臥只一服愈年深者再服忌腥咸鮓醬面等並勿過醉飽將息百花膏治喘嗽不以痰中有血百合蒸焙款冬花各等分上為細末煉蜜和丸如龍眼大每服一丸食後細嚼生薑湯送下噙化尤佳七七散治喘嗽上用長皂莢三條去黑皮破開兩邊去子一莢入巴豆十粒一莢入半夏十粒一莢入杏仁十粒用生薑汁製杏仁麻油制巴豆蜜製半夏各制三條皂莢畢又將皂莢火炙黃色碾為細末每服一字安在手掌中臨睡用生薑汁調舌舐吃神效內金丸治𠯜喘雞內金二十一個信石二錢半黃丹半兩上各研細露星七宿再入白牽牛末半兩葶藶末半兩半夏末二錢半共研勻用蒸棗肉為丸如麻子大露星二宿以硃砂末為衣每服七丸臨睡用冷茶清送下紫金丹治𠯜喘信石一錢半研淡豉一兩水潤去皮研成膏上共研和丸如綠豆大每服七丸或十丸臨睡用冷茶清送下只一服二服後不可吃一應物湯水之類今以信八分豉一兩每服二十丸一法二件成膏搽碗內艾熏入生珠末丸有一親戚婦人患十年遍求醫者皆不效忽有一道人貨此藥謾贖一服是夜減半數服頓愈遂多金丐得此方子屢用以救人特為神異鯽魚丸治肺經久受寒邪喘急初發則寒從背起冷如冰霜漸漸喘促氣不相續痰涎壅塞咯吐不出坐臥不得莫可支吾兩肩聳豎曲背弩目困憊欲死宜服或未效再服即愈其效如神上用鯽魚重一斤者不去鱗腸只於肚下近頭處開一空入信石一錢令深入在內卻以魚入竹筒內外以青蒿搗泥固濟候乾火煅竹筒通紅候冷去泥取魚去燒不過者研細入蛤粉三錢研和得所丸如綠豆大硃砂為衣每服三五丸臨睡用冷沙糖水送下忌熱物一方正喘急時宜服不可多過丸數欲試此藥用豬肺一枚吹脹入此藥數丸於肺脘內頃刻漸痿方表其功
