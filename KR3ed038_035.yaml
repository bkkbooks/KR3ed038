車前子當歸微炒荊實以上各三分麥門冬去心生地黃各二兩上為細末煉蜜和搗二三百杵丸如梧桐子大每服三十丸食前用米飲送下牡蠣散治勞損傷中尿血牡蠣燒為粉車前子白龍骨煅令赤熟地黃黃芩桂心各一兩上為細末每服二錢食前米飲調下如神散治心臟有熱熱乘於血血滲小腸故尿血也阿膠蛤粉炒二兩山梔仁車前子黃芩甘草各二錢半上為細末每服半錢或一錢井花水調下日三服鹿茸散治小便尿血日夜不止鹿茸酒洗去毛塗酥炙令黃生地黃焙當歸焙以上各二兩蒲黃一合冬葵子炒四兩半上為極細末每服三錢匕空心用溫酒調服日二一方治下元虛憊尿血煉蜜為丸如梧桐子大每服二十丸食前用炒鹽湯送下治小便出血方當歸四兩銼細上以酒三升煮取一升頓服亦治遺尿小便澀治小便頻數卒然下血不止並不疼痛此緣心中積惡機謀艱險長懷嫉妒多積忿干傷損肝心正氣又因色傷小腸氣虛血承虛妄行故有此疾宜服此方桑寄生一兩熟地黃茯苓各半兩人參川芎獨活蒲黃各一分甘松沉香各二銖上為細末每服三錢匕水一盞煎一二沸便瀉出去滓非時吃服此藥後其血已安校覺丹田元氣之虛腰膝沉重多困少力者宜用桑寄生為細末每服一二錢非時點吃以補之犀角地黃湯治小腸淋瀝出血疼痛難忍及治心血妄行衄血等疾食後臨臥服之用絲茅根煎服余癸丑夏嘗苦淋漓之疾出血不已得黃應明受此方數服而愈犀角半兩如無以升麻代之芍藥三錢牡丹皮半兩生地黃二錢上銼碎作一服水一盞煎八分空心服石葦散治小便不利石葦去毛瞿麥穗冬葵子各二兩滑石研五兩上為細末每服三錢匕空心用溫水調服治小便不利莖中疼痛小腹急痛蒲黃滑石各等分上為末酒服方寸匕日三服大驗治小便不快沒藥木香當歸各等分上為細末以刺薊心取自然汁和丸如梧桐子大每服五七丸食前用鹽湯送下治小便不快小便不快為何緣不用針醫用藥餐扁竹水煎連口咽神仙聖德不虛傳治忍小便胞轉方上以自爪甲燒灰水服治男子婦人過忍小便胞轉上以滑石末蔥湯調下通關瞿麥湯治膀胱積熱小便不通瞿麥穗芍藥大黃炒梔子仁榆白皮葵子當歸焙火麻仁石葦去毛木通甘草炙各一兩上銼碎每服五錢匕水一盞半燈心少許煎至一盞去滓不拘時溫服治小便不通數日欲死者神效桃枝柳枝木通旱蓮子漢椒白礬枯以上各一兩蔥白一握燈心一束上細銼以水三斗煎至一斗五升用瓷瓶一所熱盛一半藥汁熏外腎周回以被圍繞輒不得外風入良久便通如赤豆汁若冷即換之其功甚大一方無旱蓮子獨蒜塗臍方治小便不通大蒜獨顆者一枚梔子仁二七枚鹽花少許上搗爛攤紙花子上貼臍良久即通未通塗陰囊上立通牛膝湯治小便不通莖中痛及治女人血結腹堅痛牛膝根葉一握生用當歸焙一兩黃芩去黑心半兩上銼碎每服五錢匕水一盞半煎七分去滓溫服日三豬肚丸治小便頻數豬肚一個以蓮子一升同煮一周日取出去皮心焙乾為末舶上茴香破故紙川楝子母丁香各一兩上為細末煉蜜為丸如梧桐子大每服五十丸空心用溫酒送下雞䏶胵丸治小便數而多雞䏶胵二兩微炙麥門冬去心焙熟地黃黃連去須龍骨以上各一兩土瓜根半兩上為細末煉蜜和搗二三百杵丸如梧桐子大每服三十丸食前用米飲送下川方五子丸治小便夜多腳弱老人虛人多有此證菟絲子酒蒸家韭子微炒益智子去皮蛇床子炒茴香炒各等分上為細末酒煮糊為丸如梧桐子大每服五十丸食前用糯米飲或鹽湯送下治小便數氣少走泄上用香附子為末食前湯酒任調服水芝丸治下焦真氣虛弱小便頻多日夜無度蓮實去皮不以多少用好酒浸二宿用豬肚一個將酒蓮實入在內用水煮熟取出切焙乾不用豬肚上為細末醋煮糊和丸如梧桐子大每服三十丸食前用溫酒送下雙白丸治證同前白茯苓去皮鹿角霜各等分上為細末酒煮糊為丸如梧桐子大每服三十丸空心用鹽湯送下
