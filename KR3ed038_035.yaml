body:
  text: 卷之三十五諸淋門附論內經曰胞移熱於膀胱則癃溺血靈樞又曰足厥陰肝之經病遺溺閉癃戴人分析為二閉為小溲不行癃為淋瀝而下諸方謂之血淋證也原病式曰淋小便澀痛也因熱結膀胱鬱結不能滲泄故也以其熱甚客於腎肝陰分血受熱也下焦有熱則熱鬱膀胱膀胱為津液之府胞為受納之司故熱入膀胱胞中外熱陰絡內溢故不得小便而溺血也諸方論有五淋之名所感不一病則大同小異皆由熱鬱之所致或謂有冷淋者誤也殊不知溲下淋瀝疼痛忍之身必戰栗而增寒故似乎冷若遂以為冷此不明矣氣運變化之機亢則害承乃制戰栗似寒經屬於火反兼水化之象乃熱甚而鬱結不開或熱出砂石者或如脂膏者亦非冷凝也是若熱在脬中煎熬日漬輕則凝如脂膏甚則結如砂石且如湯瓶煎煉日久熬成湯鹼又如清水煎湯熱甚則沸溢自然渾濁也脈經曰少陰脈數婦人則陰中生瘡男子則氣淋熱結下焦令人淋閉不通淋之為病小便數而澀小腹痛引臍中原病式又曰淋小便澀而不通也為熱遺尿不禁者為冷豈知熱甚客於腎部干於厥陰之經鬱結極甚而氣血不能宣通則痿痹神無所用故液滲入膀胱而漩溺遺失不能收禁也經云目得血而能視髒得血而能液腑得血而能氣夫血隨氣運氣血宣行則其中神自清利而應機能為用矣靈樞又曰腎主二陰然水衰虛而怫溲客其部二陰鬱結而痿痹神無所用溲便遺失而不能禁止然則熱證明矣痹論云胞痹者少腹膀胱按之內痛若沃以湯澀於小便上為清涕夫膀胱為州都之官津液藏焉氣化則能出矣今風寒濕邪客於胞中則不能化出故胞滿水道不通其證少腹膀胱按之內痛若沃以湯澀於小便是足太陽經其直上行者交額入絡腦氣下灌於鼻竅則為清涕也嚴氏有五林之分氣石血膏勞是也氣淋為病小便澀常有餘瀝石淋莖中痛尿不得率出膏淋尿似膏出勞淋勞倦即發痛引氣衝血淋遇熱即發甚則溺血候其鼻頭色黃者小便難也大抵此證多由心腎不交積蘊熱毒或酒後房勞服食熱燥七情鬱結所致癃閉淋閉皆一類也世之所用黃芩山梔伏苓瞿麥通草生地黃郁李仁之類寒藥治之則已其方乃是也或謂患淋而服茴香益智滑石之藥而愈者然則非冷歟殊不知此皆利小便之要藥也又云足少陰腎脈澀則病溲血又論曰熱在下焦則溺血詳此溲血者諸方所謂尿血病也若此與淋血同歟異歟淋痛而溲不痛得無異乎本雖出於熱淋血者腎虛有熱也法當補益不痛為虛宜補之謂也此則多因憂勞房室過度腎虛有熱而致陳無擇治之發灰散發乃血之餘以屬補陰甚捷審此二説切其所感之由治之亦足以有考云諸淋通治方八正散治心經蘊熱臟腑祕結小便赤澀癃閉不通及熱淋血淋並皆治之方見火門清心蓮子飲治上盛下虛心火炎上口苦咽乾煩渴微熱小便赤澀或欲成淋石蓮肉去心白茯苓去皮人參去蘆黃耆蜜炙黃芩以上各錢半車前子麥門冬去心地骨皮甘草炙各一錢上作一服水二盅煎至一盅食前服如發熱加柴胡薄荷各一錢五苓散治伏暑積熱小便赤澀如淋方見暑門石葦散治腎氣不足膀胱有熱水道不通淋瀝不出臍腹急痛蓄作有時勞倦即發或尿如豆汁或出砂石並皆治之石葦去毛葵子木通瞿麥芍藥白朮滑石以上各一錢半王不留行當歸去蘆甘草以上各一錢上作一服水二盅煎至一盅食前服如作末每服二錢小麥煎湯調服導赤散治心虛蘊熱小便赤淋或成淋痛生地黃四錢木通三錢甘草二錢上作一服水二盅竹葉十片煎至一盅不拘時服地膚子湯治諸病後體虛觸熱熱結下焦遂成淋疾小便赤澀數起少出莖痛如刺或尿出血並皆治之地膚子豬苓各一錢半海藻洗去鹼甘草梢瞿麥去梗通草黃芩知母枳實麩炒升麻葵子各一錢上作一服水二盅生薑三片煎至一盅不拘時服五淋散治膀胱有熱水道不通淋瀝不止臍腹急痛或尿如豆汁或如砂石膏淋尿血並皆治之山茵陳淡竹葉各一錢木通滑石甘草炙各一錢半山梔子仁炒赤芍藥赤茯苓各二錢上作一服水二盅煎至一盅食前服琥珀散治小便不通或尿血琥珀不以多少上為細末每服二錢食前燈心煎湯調服通草湯治諸淋通草葵子茅根王不留行蒲黃炒桃膠瞿麥滑石各一錢半甘草炙一錢上作一服水二盅煎至一盅不拘時服立效散治小便淋閉作痛有時尿血下焦結熱瞿麥穗山梔子仁炒甘草各三錢上作一服水二盅煎至一盅食前服車前子散治諸淋小便痛不可忍車前子淡竹葉赤茯苓荊芥穗各二錢半燈心二十莖上作一服新汲水二盅煎至一盅食前服瞿麥散治血淋尿血瞿麥穗赤芍藥車前子白茅根如無根用茅花赤茯苓桑白皮炒石葦去毛生乾地黃阿膠炒滑石黃芩甘草炙各二錢上為細末每服二錢入血餘燒灰一錢食前沸湯調服海金沙散治小便淋瀝及下焦濕熱氣不施化或五種淋疾癃閉不通海金沙研木通滑石瞿麥穗通草以上各一錢半杏仁去皮尖麩炒二錢上作一服水二盅燈心二十莖煎至一盅食前服小薊飲子治下焦結熱尿血成淋小薊根滑石通草淡竹葉當歸去蘆酒浸蒲黃炒藕節山梔子仁甘草炙以上各一錢生地黃二錢上作一服水二盅煎至一盅食前服琥珀散治五淋澀痛小便有膿血出琥珀海金沙沒藥蒲黃炒上各等分為細末每服三錢食前通草煎湯調服葵子散治小便不通葵子茯苓去皮各半兩上作一服水二盅煎至一盅食前服火府丹治心經蘊熱小便赤少及五淋澀痛木通黃芩各一兩生乾地黃二兩上為細末煉蜜為丸如梧桐子大每服五十丸空心用木通煎湯送下清肺飲子治渴而小便不利邪熱在上焦氣分也茯苓去皮豬苓去皮澤瀉以上各二錢車前子炒琥珀木通瞿麥萹蓄以上各一錢通草燈心各五分上作一服水二盅煎至一盅食遠熱服此證八正散五苓散多宜服之木通湯治小便不通小腹痛不可忍木通滑石各半兩牽牛取頭末二錢半上作一服水二盅燈心十莖蔥白一根煎至一盅食前服豬苓湯治五淋豬苓赤茯苓阿膠炒澤瀉滑石各二錢上作一服水二盅煎至一盅食前服木香湯治冷氣凝滯小便淋瀝作痛身體冷木香木通檳榔舶上茴香焙當歸青皮去白澤瀉赤芍藥辣桂橘紅甘草炙各一錢上作一服水二盅生薑三片煎至一盅食前服二神散治諸淋急痛海金沙七錢滑石五錢上為細末每服二錢半用燈心木通麥門冬用新汲水煎入蜜少許食前調服柿蒂散治血淋上用乾柿蒂燒灰存性為末每服二錢空心米飲調服蒲黃散治心腎有熱小便不通蒲黃生用木通荊芥車前子桑白皮炒滑石燈心赤芍藥赤茯苓甘草炙各等分上為細末每服二錢食前用蔥白紫蘇煎湯調服鬱金黃連丸治心火炎上腎水不升致使水火不得相濟故火獨炎上水流下淋膀胱受心火所熾而脬囊中積熱或癃閉不通或遺泄不禁或白濁如泔水或膏淋如膿或如梔子汁或如砂石或如粉糊相似俱為熱證此藥治之鬱金黃連各一兩琥珀研大黃酒浸黃芩以上各二兩白茯苓滑石各四兩黑牽牛炒取頭末三兩上為末滴水為丸如梧桐子大每服五十丸空心白湯下淡竹葉湯治諸淋淡竹葉車前子大棗烏豆炒去殼燈心甘草各一錢半上作一服用水二盞煎至七分去滓不拘時溫服通心飲治心經有熱唇焦面赤小便不通木通連翹上各等分為細末每服一二錢不拘時用麥門冬煎湯調服或燈心煎湯亦可肉蓯蓉丸治稟賦虛弱小便數亦不禁肉蓯蓉八兩熟地黃六兩五味子四兩菟絲搗餅二兩上為細末酒煮山藥糊和丸如梧桐子大每服七十丸空心用鹽酒送下萆薢丸治小便頻數川萆薢一斤上為細末酒煮麵糊為丸如梧桐子大每服七十丸食前用鹽酒送下縮泉丸治脬氣不足小便頻多烏藥益智仁各等分上為細末酒煮山藥糊和丸如梧桐子大每服五十丸空心用鹽酒送下雞腸散治腎與膀胱虛冷不能約制故遺尿失禁或睡自出雞腸燒存性牡蠣粉白茯苓桑螵蛸各二錢辣桂龍骨各一錢半上作二帖每貼用水二盞生薑三片棗二枚煎至六分去滓食前服補脬飲治婦人生産傷動尿脬破終日不能小便但漏濕不能幹宜服黃絲絹生者用一尺剪碎白牡丹皮末千葉者可用他無妨白芨末一錢上用水一碗煮至絹爛如餳空心頓服時時不得作一聲如作聲無效琥珀茯苓丸治膀胱經積熱以致小便癃閉淋瀝琥珀另研赤茯苓去皮滑石桂府者另研知母去毛黃柏去粗皮蛤粉另研川木通去皮當歸澤瀉以上各二兩人參赤芍藥山梔子仁黃連去須大黃蒸黃芩去腐白朮瞿麥萹蓄豬苓以上各一兩木香半兩上為細末入另研藥研勻滴水和丸如梧桐子大每服四十丸早晨用溫白湯送下引水散治小水祕澀不快或不通及腫滿腳氣一切濕證海馬海蛤赤茯苓川木通琥珀滑石忘憂根白丁香通草豬苓去皮鬼棘針苦葶藶紙襯炒萹蓄車前子微炒越桃炒即山梔子瞿麥穗澤瀉茴香微炒木香以上各一兩燕子一對火煅醋淬上為粗散每服五錢水一盞半燈心三十莖同煎取清汁八分內麝香末一字拌勻放溫食前服沉香琥珀散治諸淋不通皆可服沉香琥珀各三錢通草忘憂根萹蓄小茴香炒木通麒麟竭滑石海金沙木香各半兩上為粗散每服一兩水二盞半燈心一把竹葉十片連根蔥白三枝同煎至七分去滓空心食前溫服如便塊加大黃半兩水道澀痛加山梔子半兩淋血加生地黃一兩瀑流水煎極驗海金沙散治五淋澀痛海金沙肉桂甘草炙以上各二錢赤茯苓豬苓白朮芍藥以上各三錢澤瀉五錢滑石七錢石葦一錢上為細末每服三錢水一盞燈心三十莖同煎至七分去滓空心溫服琥珀散治五淋琥珀滑石各二兩木通當歸木香鬱金萹蓄各一兩上為末每服五錢水一盞蘆葦葉五片同煎食前日三服治淋痛方滑石四兩茯苓白朮貝母通草芍藥各二兩上為末酒服方寸匕日二服十日瘥五淋散治腎氣不足膀胱有熱水道不通淋瀝不宣出少起多臍腹急痛蓄作有時勞倦即發或尿如豆汁或如砂石或冷淋如膏或熱淋便血並皆治之山梔子仁赤芍藥去蘆銼各二十兩一方用白芍藥當歸去蘆甘草生用各五兩赤茯苓六兩一方用白茯苓上為細末每服二錢水一盞煎八分空心食前服或以五苓散和之用竹園荽門冬草蔥頭燈心煎湯調服葵子散利小便葵子半升地榆三兩滑石二兩石葦去毛石楠葉通草各一兩上為散飲服方寸匕日三服良瞑眩膏治諸淋疼痛不可忍及砂石淋皆治上用大蘿蔔切一指厚四五片以好白蜜二兩浸少時安淨鐵鏟上慢火炙乾再蘸蜜再炙番覆炙令香軟不可焦待蜜盡為度候溫細嚼以鹽湯一盞送下立效鏽刀散治一切淋瀝服藥未效上用生鐵刀一口多年者最佳用石一塊磨以盆內碗盛水磨之澄清每服半盞或一盞不拘時服一方磨剪刀交股水一盞服之即通治尿淋痛益原散三錢茴香二錢微炒黃捶碎上為細末水一盅半煎至一盅不拘時服車前子散治諸淋閉澀不通大抵諸淋由腎與膀胱熱也腎與膀胱為表裡俱屬於水水入小腸下脬中行於陰為小便也腎氣不通於陰水液之道路膀胱為津液府津液內溢流於腎水道不通停積於脬腎熱而氣澀故水道不利小便淋澀故謂之淋其狀小便數而出以小腹引臍急痛又有氣淋石淋血淋形證殊異主療不同今以治之車前子滑石各一兩上為細末每服半錢食前米飲調服日三服一方塗臍四畔約四寸水和調服亦可地髓湯治五淋小便不利莖中痛欲死上用牛膝濃煎汁飲極效酒煎亦可一方以根煮服之一方捶碎一兩用水二盞煎至一盞去滓一日五服有葉朝議親人患血淋流下小便盆內凝聚如蒟蒻久而有變如鼠但無足耳百治不瘥遇一名醫言服此藥雖未愈而血色漸淡久乃復舊後十年其病再作又服此藥瘥矣經驗方陳氏云豫在臨汀妻黨方守夷吾以其編類集要方見示遂刊於郡齋後鄂渚得九江守王南強書云老人久苦此淋疾百藥不效偶見臨汀集要方中用牛膝者服之而愈乃致謝云嘗聞郡士有苦此者再試亦驗因檢本草自載治小便不利莖中痛欲死卻將煮飲今再檢出表其神驗通草散治腎氣不足膀胱有熱水道不通淋瀝砂石痛不可忍或出鮮血並皆治之通草二兩切作片以糯米飲拌日中曬乾白芍藥石葦去毛蒲黃炒桂心以上各一兩王不留行滑石各半兩葵子一兩半甘遂三錢上為細末每服三錢食前用沸湯調服參苓琥珀湯治小便淋瀝莖中痛不可忍相引脅下痛人參五分茯苓去皮四錢琥珀當歸梢柴胡澤瀉以上各三分玄胡索七分川楝子去核炒甘草生用各一錢上㕮咀作一服長流水三盞煎至一盞去滓食前溫服數服大效中統三年六月中黃明之小便淋瀝莖中痛不可忍相引脅下痛制以參苓琥珀散治之中書右丞相合剌合孫病小便數而欠晝夜約二十餘行臍腹脹滿腰腳沉疰不得安臥至元癸未季春一日奉勸治之遂往診脈得沉緩時時帶數嘗記小便不利有三不可一概而論津液偏滲於腸胃大便泄瀉而小便澀少者一也宜分利而已熱搏下焦隨濕而不行者二也必滲泄而愈脾胃氣澀不能通調水道下輸膀胱者三也可順氣令施化而出右丞公平素膏粱濕熱內蓄不得施化膀胱竅澀是以起數而見少也非滲泄分利則不能快利遂處一方名曰茯苓琥珀湯內經曰甘緩而淡滲熱搏津液內蓄臍腹脹滿當須緩之泄之必以甘淡為主是以茯苓為君滑石甘寒滑以利竅澀豬苓琥珀之淡以滲泄以利水道故以三味為臣脾惡濕濕氣內蓄則脾氣不治益脾勝濕必以甘為助故以甘草白朮為佐鹹入腎鹹味下泄為陰澤瀉之咸以泄伏水腎惡燥急食辛以潤之津液不行以辛散之桂枝味辛散濕以潤燥此為因用故以二味為使煎長流甘爛水使不助其腎氣大作湯劑令直達於下而急速也兩服減半旬日良愈茯苓琥珀湯茯苓琥珀豬苓白朮以上各半兩澤瀉一兩滑石七分桂心甘草炙各三錢上為細末每服五錢煎長流甘爛水一盞調下空心服待少時以美膳壓之瞿麥湯治氣淋澀滯瞿麥穗黃連去須大黃蒸枳殼去穰麩炒當歸切焙羌活去蘆木通牽牛延胡索桔梗大腹皮射干以上各一兩半桂心去粗皮半兩上㕮咀每服四錢匕水一盞半生薑七片煎至八分去滓不拘時溫服石葦散治氣壅不通小便淋結臍下妨悶疼痛石葦去毛赤芍藥各半兩白茅根木通瞿麥川芒硝葵子木香以上各一兩滑石二兩上㕮咀每服四錢水一盞煎至六分去滓食前溫服榆枝湯治氣淋臍下滿急切痛榆枝半兩石燕子三枚上搗篩每服三錢匕水一盞煎七分去滓不拘時服肉蓯蓉丸治冷淋肉蓯蓉酒浸切焙熟地黃焙山芋石斛去根牛膝酒浸切焙官桂去粗皮檳榔以上各半兩附子炮去皮臍黃耆各一兩黃連去須三分細辛去苗葉甘草炙各一分上為細末煉蜜為丸如梧桐子大每服二十丸不拘時用鹽酒送下澤瀉散治冷淋小便澀痛脹滿澤瀉雞蘇石葦去毛炙赤茯苓去皮蒲黃當歸切焙琥珀另研檳榔以上各一兩枳殼去穰麩炒桑螵蛸炒各半兩官桂去粗皮三分上為細末每服二錢匕不拘時用冬葵子煎湯調服或木通煎湯調亦可沉香散治冷淋臍下妨悶小便疼痛不可忍者沉香石葦去毛滑石當歸微炒王不留行瞿麥以上各半兩葵子赤芍藥白朮以上各三分甘草炙一分上為細末每服二錢食前用大麥煎湯調服以利為度檳榔散治冷淋腹脅脹滿小腸急痛檳榔木香當歸炒以上各半兩母丁香桂心各一分龍腦一錢細研豬苓一兩去黑皮上為細末每服一錢不拘時生薑蔥湯調服生附散治冷淋小便祕澀數起不通竅中疼痛增寒凜凜多因飲水過度或為寒泣心虛氣耗皆有此證附子生用去皮臍滑石各半兩瞿麥半夏湯洗七次木通各三分上為末每服二大錢水二盞生薑七片燈心二十莖蜜半匙煎七分空心服榆白皮湯治熱淋小腹脹滿數澀疼痛榆白皮赤茯苓甘遂煨瞿麥犀角屑山梔子木通子芩滑石以上各半兩川芒硝一兩上為散每服三錢水一盞煎至五分去滓食前溫服瞿麥湯治心經蘊熱小便淋澀赤痛瞿麥穗三分冬瓜子茅根各半兩黃芩去黑心六錢木通一分竹葉一把滑石二兩研為細末分作三帖葵子二合上除滑石外粗搗篩分作三劑每劑用水三盞煎至二盞去滓入滑石末一帖攪勻食前分溫服麥門冬散治心熱氣壅澀滯成淋臍下妨悶麥門冬去心木通赤芍藥葵子以上各一兩滑石二兩川芒硝一兩半上為散每服四錢水一盞生薑半分蔥白二莖煎至六分去滓食前溫服四汁飲治熱淋小便赤澀疼痛葡萄取自然汁生藕取自然汁生地黃取自然汁白蜜各五合上和勻每服七分一盞銀石器內慢火熬沸不拘時溫服治熱淋方上用大田螺十五個以淨水養待田螺口中吐出泥澄去上面清水以底下濃泥入膩粉半錢調塗臍上尿立通將田螺便放長江如留田螺或殺其病則不效治熱淋方上用白茅根切四斤以水一斗五升煮取五升服一升日三夜二服又方用泉水飲之王不留行散治熱淋疼痛不止王不留行車前子木通以上各一兩葵子滑石各一兩半當歸微炒蒲黃赤芍藥甘遂煨桂心各半兩上為細末每服一錢食前用粥飲調服當歸湯治血淋及五淋等疾當歸去蘆淡竹葉燈心竹園荽紅棗麥門冬烏梅木龍一名野葡萄藤甘草上各等分銼碎煎湯作熟水患此疾者多渴隨意飲之羚羊角飲治血淋小便熱結澀痛羚羊角屑梔子仁葵子炒以上各