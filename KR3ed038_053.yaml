body:
  text: 卷之五十三癘風門附論內經云風氣與太陽行諸脈俞散於分肉之間與衛氣相干其道不利故使肌肉膭䐜而有瘍衛氣有所凝而不行故其肉有不仁也癘者有榮衛熱胕其氣不清故使鼻柱壞而色敗皮膚瘍潰風寒客於脈而不去名曰癘風以其酷熱曝悍可畏耳夫人患此病者先分在上在下所感之處古方治以在上者以醉仙散取其臭涎惡血於齒縫中出在下者以通天再造散取惡物陳蟲於穀道中出然此邪毒藥雖攻出其源尚在經絡受病於陽明之經凡治此病先觀患人身上疙瘩與瘡若先見於上者或下體多者或上下同得者或下而覆在上者乃陽明胃經也是以無物不受此其濕熱浸漬經絡久則虛使風入於人也氣受之則在上多血受之則在下多氣血俱受甚重非醫之神手能起此病者鮮矣有或從上或從下以漸而來者皆是可治之病人見其病勢緩多忽之若能攝養保和得宜鮮有不愈者也若不能絶滋味遠色欲皆不免再發則終於不能救矣前人曾治五人中間惟一婦人得免而疾安以其貧甚無物可吃欲啖無從所覓餘四人不能禁忌妄許者三二年後皆再發而危孫真人云吾常治四五百人終無一人免於死非孫真人不能治也蓋無一人能守禁忌耳此一婦人本病外因又服三五百服加減四物湯半年之上方得月經行十分安愈若人患此鼻柱壞爛肌肉瘍潰遊思知陽明經分受風木之邪也明矣不可泥於風寒而已內有臭涎惡血陳蟲惡物之類者又何為而致然也蓋謂厥陰主生五蟲其相火熱甚而制金金衰故木來侮肺受熱而氣不清矣況血隨氣運涎隨氣降氣既不能施化則血聚而涎積矣血聚久則汙惡涎積久則臭濁濕涎熱血相為熏蒸久則肌肉潰爛而生蟲治之使邪出於齒縫大腸之間者乃是陽明經之道路也蓋真土敗木賊之泟宜乎況又不能守戒忌者歟此丹溪先生所以痛言之深也大風病是受天地間殺物之風古為癘風可不畏哉三因方之所載此其惡疾者是也雖名曰風未必因風所得大率多嗜色欲勞動氣血熱發汗泄不避邪風冷濕使淫氣與衛氣相干致肌肉皮膚瘍潰鼻梁塌壞千金方云所謂自作不仁極猥之業雖有悔言而無悔心良可嘆也然亦有傳染者原其所因皆夫婦不知禁忌因而不避風寒暑濕之氣因虛邪入經絡久則漸成斯疾又有勞役飲食涎結於胃流入經絡風濕相搏致使風癢不可一例作癘風治之則誤矣內經云脈風成為癘俗云癩病也先樺皮散從少至多服三五七日灸承漿穴七壯灸瘡輕再灸瘡愈三灸之後服二聖散泄熱祛血中之風邪戒房室三年病愈藥灸同止述類右形此治肺風之法也靈樞云癘風數刺其腫上已刺以鋭針針其處按出其惡氣腫盡乃止常食方食勿食他食以犯其病且癩病古今以為難治之證前人救生民之病苦置諸方論詳備於象後之學者誠心鑑諸癘風通治方通天再造散治大風惡疾鬱金一兩半大黃一兩炮白牽牛取頭末六錢半生半炒皂角刺一兩炮經年者上為細末每服五錢日未出面東以無灰酒調下儘量為度晚利黑頭小蟲病稍輕者止利如魚腸臭穢物忌食發毒之物半年但食稠粥軟飯漸漸調理自然頭毛皮膚如常甚者不過三兩次須將理不可妄有勞動及終身不得食牛馬驢等肉犯者死不救矣神效追命散治大風北大黃七錢半川鬱金半兩大皂莢刺一兩上為細末每服二錢用真大楓子油入好酒溫調臨睡服隔兩日再服直候瀉下無蟲方瘥皂棘湯治大風皂莢刺燒半生半灰二錢北大黃一錢輕粉半錢上為細末每服二錢空心酒調服取下惡物服藥數日齒出毒血甚臭皂角丸治大風諸癩肥長皂角二十條先炙透後去皮弦其核自落上以皂角肉多用酒慢火煎得稠黏濾去清者候冷入雪糕杵為丸如梧桐子大每服五十丸不問飢飽酒送下硫黃酒殺癩風蟲明硫黃不拘多少研細上酒調空心飲清汁明日添硫黃再研入酒如前服或添大楓子油更好黑虎丹治大風諸癩惡蟲內蝕形骸變壞天靈蓋三兩蛤蟆二個去頭足燒存性半生桃仁去皮尖人中白以上各二兩麝香一錢雄黃硫黃各一兩穿山甲熱灰炮老皂莢刺燒存性各半兩輕粉二錢半上為細末煉蜜和丸如梧桐子大每服三十丸月初五更米飲湯送下連日取蟲盡則愈殺瘵蟲通用烏蛇丸治風癩殺蟲烏蛇肉酒浸焙蜂房炙各一兩半桃仁浸去皮曬乾白蒺藜炒杵去刺皂角刺炒焦貫衆獨活檳榔苦參各七錢半蕪荑雷丸雄黃硫黃各半兩硃砂二錢半胡麻子四兩蛤蟆二個去頭足炙焦上為細末以長皂角十條水三升煎成膏和藥末丸如梧桐子大每服三十丸空心溫酒送下治大風上用烏蛇三條事治令淨蒸煮熟去骨取肉焙乾為細末用宿蒸餅丸如米粒大以喂烏雞其雞食盡烏蛇三條後卻烹雞取肉為末或為丸或作散酒服之丸時仍用宿蒸餅每服三五十丸甚者不過三五雞即愈雷丸散風癩取蟲雷丸阿魏貫衆末各二錢麝香半錢水銀硫黃雄黃各二錢半用乳鉢入醋同研令盡為度上為極細末每服一錢天明溫酒調下明日再服蛤蟆丸治大風殺五蟲干蛤蟆一兩炙黃肥長皂角一條先炙透後去皮弦核蘸酒再炙上為細末以竹管引入羊腸內系兩頭用麩二升鋪甑內置麩上蒸熟去麩入麝香半錢同搗丸如梧桐子大每服二十一丸空心溫酒送下蔓荊丸治大風蔓荊子蒼耳子枸杞子牛蒡子炒黑牽牛炒胡麻子香白芷何首烏威靈仙荊芥穗白蒺藜炒去刺直殭蠶炒去絲細辛去苗皂角刺苦參大草烏去皮尖生用獨活各一兩上為細末大風油和丸如梧桐子大每服二十四丸食前用茶清送下胡麻散解風熱毒氣癮疹瘙癢方見風門得效第一方治癘風即大風惡疾癩是也雖名曰風未必皆因風大率多嗜欲勞動氣血熱發汗出不避邪風使淫氣相干則肌肉不仁勞氣泣濁則胕熱不利故色敗皮膚瘍潰鼻梁塌壞或自作不仁極猥之業所致久則或遍身白皮脫落如蛇蛻狀上用桑枝灰一斗熱湯淋取汁洗頭面次用大豆及緑豆漿添熟水三日一浴一日一洗面卻用側柏葉蒸曝乾白膠香各等分為細末滴水為丸不拘時溫水下三七粒日三服仙方治大風惡疾雙眼昏咫尺不辨人物發眉自落鼻梁崩倒肌膚瘡如苔蘚勢若不可救此方特效上用皂角刺三斤炭火蒸久曬乾為末濃煎大黃湯下一匕服旬日間眉發再生肌膚悅潤眼目愈明浴法治大風頑麻癩風紫癜白癜麻黃根地骨皮草烏頭各二兩上銼碎碾朴硝二兩和勻每用藥一兩水一桶椒一合蔥三十根艾葉一兩同煎十沸用米醋一中盞又打勻去滓坐溫室中自用手巾搭四肢候湯可浴即浴令汗透面上如珠出更坐室中或睡片時尤佳汗解方著衣避風而出五日再浴如此浴二次浴罷便服換骨丹換骨丹九肋鱉甲大蜈蚣細銼各二兩上以鹽泥固濟候乾火煅存二分性為末巴豆十兩去皮膜順手碾青州棗七枚去核入巴豆膏在棗中火燒令焦存巴豆五分性將棗巴豆碾爛如泥入前二味末碾勻以醋煮粗和丸如緑豆大每服七丸虛人四五丸用溫齏汁下候利惡物如膿血爛腸即住三兩服未利更加三丸次服遇仙丹遇仙丹人參紫參各一兩苦參白殭蠶去嘴各二兩上為細末入朴硝半兩研令勻每服一錢食後淡茶清調下次用佛手膏佛手膏去黑紫瘡核蝥貓七枚去翅足巴豆去殼七枚杏仁二十枚去皮紅娘子二十枚去翅足砒霜一錢另研韶粉黃蠟各半兩槐角三條緑豆一合盆硝瀝青研膩粉炒亂髮各一兩硫黃黃丹各三錢清油四兩上先將油煎令亂髮化次下紅娘子次下巴豆槐角等逐味下焦者漉出方下硫黃盆硝丹粉蠟等以箅子不住手攪令勻滴水中成珠不散為度以瓷器貯之用時先將針刺瘡核用藥一粟米大放針處次日擠瘡有惡臭黑膿血出三兩日血漸少次服去毒丹去毒丹赤芍藥滑石甘草各半兩朴硝大黃各一分巴豆去皮炒別研黑牽牛一兩半生半炒上為細末麵糊為丸如緑豆大每服十五丸加至三十丸臨臥時用金銀薄荷湯送下次服甘草散甘草散甘草滑石各半兩大黃一分山豆根一兩上為細末每服一錢蜜湯調下日二服次服解毒丸解毒丸栝蔞根三兩大黃二錢半生朴硝二錢半另研甘草半兩炒上為細末麵糊為丸如緑豆大每服二十丸加至三十丸白湯下次服黑神丹黑神丹訶子四個炒黑牽牛生巴戟炒各半兩甘遂三錢赤小豆生四十九粒上為細末麵糊和丸如緑豆大每服十丸加至十五丸不拘時用薄荷湯送下次用水膏藥水膏藥敷貼破處及面腳上瘡令生肉陳米半升炒馬蹄香藿香各一兩麝香一錢另研陳皮去灰土半斤炒紫色上為細末入麝香用冷水調掃敷瘡上有膿處如損破即煎槐枝湯洗再上藥此十方乃祕傳有驗大要病人須能如法將息理會敬而信之三濟丸治大風惡疾川芎當歸熟地黃荊芥穗各二兩細辛去葉防風各一兩桂心半兩上銼碎先以醋一升浸一宿漉出焙乾再以生地黃一斤搗汁浸一宿焙乾再以酒一升浸一宿焙乾旋入乳香半兩以余酒醋地黃汁浸蒸餅為丸如梧桐子大陰乾收貯後用好烏頭一個炮裂銼荊芥穗半兩浸酒三升旋溫熱下藥五十丸食遠服八葉湯淋泄大風瘡桑葉荷葉地黃葉皂角葉蒻葉蒼耳葉菖蒲葉何首烏葉上等分曬乾燒存性為細末如面藥用洗手面身體大風惡疾瘡痍荼毒膿汁淋漓眉鬢墮落手足指脫頑痹痛癢顏色枯瘁鼻塌眼爛齒豁唇揭病證之惡無越於斯負此病者百無一生換肌散治大風疾年深久不能愈以至毛髮墮落鼻梁崩壞額顱腫破不至逾月取效如神白花蛇酒浸一宿黑烏蛇酒浸一宿地龍去土沙苑蒺藜蔓荊子威靈仙荊芥穗甘菊花苦參紫參沙參天門冬木賊不灰木赤芍藥石菖蒲川芎定風草何首烏胡麻子炒草烏去皮臍蒼朮去皮米泔浸木鱉子甘草炙各三兩當歸細辛香白芷各一兩天麻一兩上為細末每服五錢匕酒調下食後服酒多為妙如聖散治大風疾洗瘡藥大有神效苦參玄參紫參荊芥穗沙參陳皮厚朴頑荊子麻黃去節各一兩防風白芷蔓荊子威靈仙各二兩上為細末每用三錢桃柳枝各一把水五升同煎臨睡時熱洗忌五辛物黃精煎治大風癩病面赤疹起手足攣急身發瘡痍及指節已落者黃精生者十二斤白蜜五斤生地黃肥者五斤上先將黃精生地黃洗淨細銼以木石杵臼搗熟復研入水三斗絞取汁置銀銅器中和蜜攪勻煎之成稠煎為度每用溫酒調化二錢匕或三錢匕日三夜一久服風癩痊平面如童子延年不老治大風瘡上用楓木子不以多少燒存性灰研羅與輕粉等分用麻油調敷瘡上極妙如濕則乾摻之經驗方云昔章貢有鼓角匠生肉瘰因詰之云舊害大風得道人傳此藥今遂愈蒿艾酒治癩疾上取白艾蒿十束如升大煮取汁以曲糯米亦如釀酒法候熟稍稍飲之但是惡疾遍體面目有瘡皆可服雄朱散治大風雄黃硃砂滑石阿魏雌黃雷丸炒藜蘆炒生犀角屑硫黃各一錢半斑蝥芫青各去翅足糯米炒各用二十四個黑皂角刺焙七錢半上為極細末每服一錢天明溫酒調下明日再服白花蛇造酒方治大風每白花蛇一條蒸米一斗缸底先用酒麴次將蛇用絹袋盛之頓於曲上然後糜和勻頓於蛇上用紙封缸口候三七日開缸取酒將蛇去皮骨為末每服酒一盞溫服蛇末少許仍將酒腳並糟做餅食之尤佳治身上癩瘡上以蒼耳子葉煎湯洗之
