body:
  text: 卷之五十諸血門附論內經曰諸血者皆屬於心又云肝藏血夫血錯經妄行者豈無因而致哉又曰陽明厥逆喘咳身熱善驚衄吐血淫淫汗出鼽衄脾移熱於肝則為驚衄陽氣者大怒則形氣絕而血菀於上使人薄厥怒則氣逆甚則嘔血肺咳之狀咳而喘息有音甚則唾血暴痹內逆肝肺相搏血溢鼻口可於手太陰經內求穴以瀉之足少陰腎之脈從腎貫肝入肺中循咽喉其病則飢不欲食面黑咳唾則有血金匱要略曰夫酒客咳者必至吐血此因極飲過度所致也原病式曰衄者陽熱怫鬱干於足陽明而上熱則血妄行鼻衄也又云血溢者上出也血有餘而妄行也局方發揮論口鼻出血皆系陰虛陽盛有升無降血隨氣上竅法當補陰益陽氣降則血歸經東垣云雜病見血者多責其熱也夫血者陰也氣者陽也氣主煦之血主濡之今血妄行上出於口鼻者皆氣逆也分之則各有所屬治之則各有所主如衄血出於肺嘔吐血出於胃其經有虛實之分當以脈理究治唾血出於腎血證上行或衄或吐或嘔噦唾者皆逆也若血下行者為順內經又云榮者水穀之精氣也和調於五臟酒陳於六腑乃能入於脈也心主之肝藏之脾裹之肺營之腎泄之生化於脾總總於心藏諸於肝宣布於肺隨氣運行灌溉一身夫人目得之而能視耳得之而能聽手得之而能攝掌得之而能握足得之而能步髒得之而能液腑得之而能氣是以出入升降濡潤宣通者由此使然也寒則凝結暑則氣流澤熱則生通為脈澀則血少充則血實血虛常以飲食滋胃乃中焦受氣取汁變化而赤為血也故經雲水入於經其血乃成又曰血者神氣也持之則存失之則亡且人身皆藉氣血所養可不謹哉諸經有云陽道實陰道虛陽易亢陰易乏陽道常饒陰道常乏陽常有餘陰常不足可見人之生也故氣常有餘血常不足年至四十陰氣自半起居衰矣男子十六歲而精通至六十四歲而精絕女子十四歲而經行至四十九歲而經斷而陰血之難成易虧也如此陰氣一傷最難調治以其陽虛陰虧妄行於上則吐衄衰涸於中則虛勞妄返於下則便紅移熱於膀胱則癃溺血滲透腸間則為腸風陰虛陽搏則為崩中濕蒸熱瘀則為滯下熱極腐化則為膿血熱極色紫黑者熱勝於陰發於瘡瘍濕滯於血則為脾痛癮疹蓄之在上則人喜妄蓄之在下則人喜狂前證諸論至詳其脈沉細者順洪大弦數者逆治法病在何經何病隨經而治之對證之方條具於後且如長沙公言少陰病但厥無汗而強發之必動其血或從口鼻耳目中出是名下厥上竭為難治又不可不知也諸血通治方茯苓補心湯治心氣虛耗不能藏血以致面色黃瘁五心煩熱咳嗽唾血及婦人懷娠惡阻嘔吐亦宜服之白茯苓去皮人參去蘆前胡去蘆半夏陳皮枳殼去穰紫蘇白芍藥桔梗乾葛當歸熟地黃川芎甘草各一錢上作一服水二盅生薑五片紅棗一枚煎至一盅食前服必勝散治男子婦人血妄流溢或吐或咳衄血並皆治之小蘇並根用人參去蘆蒲黃炒熟地黃當歸去蘆烏梅去核川芎各一錢半上作一服水二盅煎至一盅不拘時服茜根散治鼻衄不止茜根黃芩側柏葉阿膠蛤粉炒生地黃各二錢甘草炙一錢上作一服水二盅生薑五片煎至一盅不拘時服天門冬湯治思慮傷心吐血衄血天門冬去心遠志去心甘草煮黃耆去蘆白芍藥麥門冬去心藕節阿膠蛤粉炒生地黃當歸去蘆人參沒藥甘草炙各一錢上作一服水二盅生薑五片煎至一盅不拘時服大薊散治食啖辛物傷於肺經嘔吐出血名曰肺疸大薊根洗犀角鎊升麻桑白皮去皮炙蒲黃炒杏仁去皮尖甘草炙各一錢桔梗炒各一錢半上作一服水二盅生薑五片煎至一盅不拘時服雞蘇散治勞傷肺經唾內有血咽喉不利雞蘇葉黃耆去蘆阿膠蛤粉炒生地黃洗白茅根貝母桔梗麥門冬去心蒲黃炒甘草炙各一錢上作一服水二盅生薑三片煎至一盅不拘時服犀角地黃湯治主脈浮客脈芤浮芤相合血積胸中熱之甚血在上焦此藥主之犀角大黃各一錢黃芩黃連各二錢生地黃四錢上作一服水二盅煎至一盅食後服麥門冬飲子一名清肺飲子治衄血吐血久不愈麥門冬去心五味子三十個當歸身人參各一錢半黃耆去蘆三錢生地黃二錢上作一服水二盅煎至一盅不拘時服以三稜針於氣衝出血立愈人參飲子治脾胃虛弱氣促氣虛精神短少衄血吐血人參去蘆三錢五味子二十個黃耆去蘆麥門冬去心白芍藥當歸身各一錢半甘草炙一錢上作一服水二盅煎至一盅食遠服是齋白朮散治積熱吐血咳血若因飲酒過度負重傷胃而吐血者最宜服之忌濕面煎爆之物白朮三錢白茯苓黃耆蜜浸炒人參去蘆各一錢半百合去心柴胡山藥前胡去蘆各一錢甘草炙七分半上作一服水二盅生薑三片棗一枚煎至一盅食遠服龍腦雞蘇丸治膈熱咳嗽或吐血衄血方見積熱門黃耆芍藥湯治衄血多噦面黃眼澀多眵手麻木黃耆三錢芍藥一錢半升麻羌活葛根各一錢甘草炙二錢上作一服水二盅煎至一盅食遠服人參救肺散治咳吐血人參黃耆當歸尾熟地黃以上各二錢蒼朮升麻白芍藥柴胡以上各一錢蘇木陳皮甘草各半錢上作一服水二盅煎至一盅食遠服升陽去熱和血湯治腸癖下血作泒其血唧出有力而射四散腹大作痛乃陽明氣衝熱毒作也當去濕白芍藥二錢生地黃牡丹皮生甘草橘皮各一錢炙甘草黃耆各一錢半當歸身熟地黃蒼朮秦艽肉桂升麻各半錢上作一服水二盅煎至一盅空心服犀角地黃湯治傷寒汗下不解鬱於經絡隨氣湧泄為衄血或清道閉塞流入胃脘吐血如鼻衄吐血不盡余血停留致面色痿黃大便黑者更宜服之犀角鎊生地黃白芍藥牡丹皮去木各二錢上作一服水二盅煎至一盅食遠服如潮熱發狂加黃芩大黃涼血地黃湯治飲食不節起居不時陰受之則入五臟䐜滿閉塞下為飧泄久為腸癖水穀與血作一泒唧出熟地黃青皮槐花炒當歸各一錢黃柏去皮炒知母各二錢上作一服水二盅煎至一盅食遠服雞蘇丸治虛熱昏冒倦怠下虛上壅嗽血衄血雞蘇葉八兩黃耆防風去蘆荊芥各一兩菊花四錢片腦半錢川芎生地黃桔梗甘草各半兩上為細末煉蜜和丸如彈子大每服一丸細嚼麥門冬去心煎湯下不拘時服又治肺損吐血日漸乏力行步不得喘嗽痰涎飲食不美或發寒熱小便赤澀加車前子三錢用桑枝銼炒香煎湯嚼下團參丸治吐血咳嗽服涼藥不得者人參黃耆飛羅面各一兩百合五錢上為細末滴水和丸如梧桐子大每服三五十丸用茅根湯下食遠服當歸地黃湯治漱血衄血大小便血或婦人經候不調月水過喘嗽當歸川芎芍藥黃藥子白朮槐花各一錢茯苓去皮生地黃黃芩白龍骨甘草各一錢半上作一服水二盅煎至一盅食後服生地黃湯治上熱衄血生地黃四錢阿膠炒二錢川芎桔梗蒲黃炒甘草炒各一錢上作一服水二盅入生薑汁二匙煎至一盅食後服麥門冬散治鼻血麥門冬去心生地黃各二錢白芍藥蒲黃各二錢上作一服水二盅生薑五片煎至一盅食後服藕汁飲治吐血衄血不止生藕汁生地黃汁大薊汁各三合生蜜半匙上件藥汁調和令勻每服一小盞細細冷呷之不拘時服犀角湯治吐血酒客溫疫中熱毒乾嘔心煩者犀角蒲黃栝蔞根甘草各二兩葛根桑寄生各三兩上㕮咀以水七升煮取三升分三服不拘時天門冬丸治吐血咯血大能潤肺止嗽天門冬一兩貝母杏仁炒各七錢半白茯苓阿膠甘草各半兩上為細末煉蜜為丸如梧桐子大每服一丸含化咽津綠雲散治吐血柏葉百合人參阿膠炙令燥各二兩上為細末每服二錢不拘時糯米飲調下云雪散治吐血云雪即寒食麵蒲黃各一兩上俱生研勻每服二錢冷水調下地黃煎治吐血憂恚絕傷胸膈疼痛及虛勞唾血上用生地黃五斤絞取汁於銀鍋內微火煎一二沸投白蜜一升再煎至三升每服半升日三服主胸痛百病久服佳一方治吐血不止用生蜜和調服之一方用生地黃汁一升生薑汁一合相和溫服日四五服一方治虛勞吐血生地黃五升搗酒一升煮去滓服掌中金治吐血真蒲黃黃藥子各等分上為細末用生芝麻油於手心內調以舌舐之人參湯治吐血咯血上用人參一兩為細末五更時用雞子清調如稀糊匙抄服若服人參末盡甚效或服半兩亦可服訖卻臥一方用烏雞子清以手磨成水須磨千百次自然化成水然後以人參末二錢調勻約五更服服藥時不得語仰啜自下自然覺心肺俱涼滿口津液治傷力吐血方上用豬肝煮熟蘸白蜜末服之四生丸治吐血生地黃柏葉艾葉荷葉各等分上四味俱生爛搗團成雞子大每服一丸水三盞煎至一盞去滓不拘時服生乾地黃散治卒吐血皆因心經暴熱毒入胃致吐不止生地黃阿膠炒令黃甘草各二兩黃芩犀角屑柏葉刺薊各一兩上銼碎每服三錢水一中盞入青竹茹如雞子大同煎至六分去滓不拘時溫服雙荷湯治卒吐血藕節七個荷葉頂七個上以蜜少許擂細用水二盅煎至八分去滓溫服或為細末調服亦可松花散治吐血久不止松花一兩半生地黃鹿角膠炒黃薯蕷以上各一兩艾葉一分茜草根白茯苓紫菀去苗人參百合刺薊甘草炙赤各半兩上為細末每服二錢不拘時米飲調下百花煎治吐血不止咳嗽補肺生地黃汁藕汁各一升黃牛乳一升半胡桃仁十枚研如糊生薑汁半升乾柿五枚細銼研如糊大棗二十一枚浸去核細研如糊清酒一升將以上七味一處同酒入銀鍋中煎沸方下後藥黃明膠炙燥為末秦艽各半兩為末杏仁湯浸去皮尖雙仁炒研如糊三兩同入煎中上相次下煎減一半卻入好蜜四兩徐徐著火養成煎後入瓷盒中盛每日三度每服一匙糯米飲調下酒亦可又方治丈夫婦人吐血連日不止粥食湯藥不能下者上用五靈脂不夾土石揀好精者不拘多少研為末以狗膽汁和丸如雞頭大每服一丸煎生薑酒磨令極細更以少生薑酒化以湯燙藥令極熱須是先做下粥溫熱得所左手與患人藥吃不得漱口右手急將粥與患人吃不可太多石膏散治心胸煩熱吐血不止口舌乾燥頭疼石膏麥門冬各二兩黃芩生地黃升麻青竹茹葛根栝蔞根以上各一兩甘草炙半兩上㕮咀每服三錢水一中盞煎六分去滓不拘時溫服杏仁散治心肺客熱吐血唇口乾燥杏仁去皮尖雙仁炒赤茯苓黃連梔子仁黃芩大黃炒各一兩桂心半兩栝蔞根三分上㕮咀每服三錢水一中盞煎六分去滓不拘時溫服加味理中湯治飲酒傷胃遂成吐血人參乾薑炮白朮以上各一兩乾葛甘草各半兩上㕮咀每服三錢水一大盞煎六分去滓不拘時溫服去乾葛加川芎治鼻衄理中脘分利陰陽安定血脈白朮丸治傷胃吐血白朮十兩乾薑黃耆伏龍肝人參各三兩上為細末煉蜜和丸如梧桐子大每服三十丸不拘時用米飲送下雞子白丸治吐血衄血雞子白三錢好香墨二兩為末上和丸如梧桐子大每服十丸不拘時生地黃汁送下茅花湯治吐血衄血上用茅花煎湯服之蘿蔔飲治諸血熱吐血衄血上用生蘿蔔取汁半盞入白鹽少許用服之立效如無生蘿蔔子一分微炒紫蘇葉莖半分銼碎用煎亦效一方用蘿蔔汁滴入鼻中門冬飲子治脾胃虛弱氣促氣弱精神短少衄血吐血麥門冬當歸身人參以上各五分紫菀一錢半一方不用芍藥甘草黃耆以上各一錢五味子五個上㕮咀作二服每服水二盞煎一盞去滓食後稍熱服三奇散治衄血不止亂髮灰一錢人中白半錢麝香一字上為細末鼻內嗅少許立止一方不用麝香發灰垂困者焙乾為末湯調服血止白芨散治鼻衄及嘔血咯血肺損或食飽負重者服之愈上用白芨為細末用冷水調紙花貼鼻穴中效一方用雪水調如無以新汲水調自兩眉際傳至鼻上以編子緊繫摺紙極令緊時蘸冷水挹藥上飯頃即止去藥吹鼻方治鼻衄吐血上用柏葉石榴花為細末每用少許吹鼻中亦用花瓣塞鼻內立止刺薊散治鼻衄出血經日不止刺薊苦參黃連梔子仁生地黃側柏葉大黃炒各一兩上㕮咀每服五錢水一大盞入青竹茹半雞子大煎至三分去滓不拘時服千針散治鼻衄不止刺薊木賊各一分白麵一錢上為細末每服一錢研青蒿心七枚新汲水調下並二服二花散治鼻衄不止酸石榴花一分黃蜀葵花一錢上銼每服一錢水一盞煎至六分不拘時溫服山梔散治鼻衄不止昏悶欲死上把山梔子不拘多少燒存性為末每用少許吹入鼻中立止一方用竹刀破作兩邊一邊用濕紙裹煨令熟一邊生用同研為末酒調服一方曾服燒煉藥方致鼻血者生用煎湯解之蔡子涯云同官無錫鹽酒趙無疪兄衄血甚多至危殆血尚未止一醫人過其門聞其家哭詢問其由醫人云曾服丹或燒煉藥予有藥用之即活囊間出藥半錢匕吹入鼻中立止良久得活扎指法治鼻衄不止上用線緊扎中指中節如左鼻孔出血扎左手中指中節右鼻孔出血扎右手中指中節兩鼻出血左右俱扎之大蒜貼足方治鼻衄不止諸藥不驗者上用大蒜一枚去皮研細攤作餅子如錢大厚一豆許若左竅出血貼於左腳心下以帛系定右竅出血即貼右腳心下兩竅出血俱貼之血止即以溫水洗腳心令去蒜氣一方以摩手心亦效刺薊湯治熱氣上行衄血汗血刺薊雞蘇葉各二兩黃連生地黃犀角鎊各一兩上㕮咀每服五錢水一盞半煎至八分去滓不拘時溫服當歸湯治三焦虛損或上下發泄吐唾血皆從三焦起或因熱損發或因酒發悉皆治之當歸乾薑炮黃柏熟地黃小薊羚羊角鎊阿膠各三錢三字白朮芍藥各半兩黃芩甘草炙各一分上㕮咀每服三錢水二盞入竹茹如指大煎至八分去滓入伏龍肝頭髮灰蒲黃各半錢再煎至七分不拘時溫服一方無白朮竹茹散治嘔血久不瘥心神煩悶臟腑勞傷竹茹如雞子大白芍藥生地黃當歸各半兩茜根二兩羚羊角鎊麥門冬去心鹿角膠各一兩半甘草炙一兩上㕮咀每服三錢以水一中盞生薑三片煎至六分去滓不拘時溫服麥門冬汁治嘔血吐血及鼻衄血麥門冬生取汁生地黃生取汁生藕取汁冷熟水各一盞白藥一兩為末上和令勻每服二盞略煎沸不拘時溫服治嘔血方黃柏以蜜塗炙乾上為細末每服二錢不拘時用麥門冬煎湯調下瘥治咯血方趙君猷云屢用效上以薏苡仁不拘多少為末熟煮豬胰切片蘸藥食後微空時取食之蓋薏苡能補肺以豬胰導入經絡耳陳敏捷云治肺癰唾膿血薏苡仁為末米飲調下一方搗碎用水煎服亦效聖餅子治咯血青黛一錢杏仁四十粒去皮尖以黃明蠟煎黃色取出研細上同研勻卻以所煎蠟少許熔開和之捏作錢大餅子每服用乾柿一個中破開入藥一餅合定以濕紙裹慢火煨熟取出以糯米粥嚼下黑散子治諸竅出血蓮蓬隔年者敗棕櫚頭髮並燒存性等分上為細末每服二錢用南木香煎湯調下或只用棕櫚燒灰用米湯調下亦可治九竅出血方上用刺薊一握絞取汁以酒半盞調和頓服之如無青汁只搗乾者為末冷水調三錢服南天竺飲治血妄行九竅皆出服藥不止者南天竺草生瞿麥是如拇指大一把銼碎生薑一塊如拇指大山梔子三十枚去皮燈草如小拇指一把大棗去核五枚甘草炙半兩上銼入瓷器中水一大碗煎至半碗去滓不拘時溫服神白散治血汗從膚腠出及鼻衄五七日不止上用人中白不以多少刮在新瓦上用火逼干研令極細每服二錢入麝香少許溫酒調下一方治鼻衄不止不用麝香每用少許吹入鼻中立瘥生血地黃百花丸治諸虛不定下血咯血衄血腸澼內痔虛勞寒熱肌肉枯瘦生地黃十斤搗汁生薑半斤搗汁藕四斤搗汁白沙蜜四兩無灰酒一升以上五味用銀器或砂鍋內熬至二碗許漸成膏一半瓷器收之一半入乾山藥末三兩再熬一二十沸次入後藥當歸焙熟地黃焙肉蓯蓉酒浸焙破故紙阿膠麩炒黃耆蜜炙石斛去根焙覆盆子遠志去心麥門冬去心白茯苓去皮枸杞子以上各二兩上為細末以山藥膏子和丸如梧桐子大每服五十丸用溫酒調地黃膏子送下空心食前日進三服蓮心散治勞心吐血蓮心五十粒糯米五十粒上研為末用溫酒調服不拘時候側柏散治內損吐血下血或飲酒太過勞傷於內其血妄行出如湧泉口鼻皆流須臾不救即死側柏葉一兩半蒸焙荊芥穗燒灰人參各一兩上為細末入飛羅面一錢新汲水調如稀糊不拘時啜服生地黃飲子治諸吐血下血溺血衄血生地黃熟地黃枸杞子地骨皮天門冬黃耆芍藥黃芩甘草各等分上銼碎每服一兩水二盞煎七分食後溫服如脈微身涼惡風加桂半錢吐血者多有此證大薊飲治吐嘔血大薊汁地黃汁生薑汁麥門冬汁刺薊汁各三合上用白蜜半匙相和勻冷服麝香散治鼻衄不止麝香半字另研明礬枯另研龍骨另研各五錢上和勻每用一字先以冰水洗淨鼻內血涕然後吹入鼻中或以濕紙蘸藥塞鼻中亦可凡九竅出血皆可用方牆頭苔蘚可以塞車前草汁可以滴火燒蓮房用水調鍋底墨煤可以吃石榴花片可以塞生蘿蔔汁可以滴火煅龍骨可以吹水煎茅花可以吃
