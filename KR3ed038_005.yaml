body:
  text: 卷之五暑門附論夏三月炎暑大行山澤燔燎林木流津正由火熱極甚熏蒸於物致之然也在人亦應之而多汗由火氣浮泄於表時於此際濕熱隆盛人多肢體困倦精神短少一或將理失宜輕則氣虛身熱頭重腳軟脾弱少食之證所謂注夏病也暑之為氣在天為熱在地為火在人臟為心且暑之中人者先著於心伏為三焦腸胃之間凡中之者蓋熱傷氣而不傷形也乃六淫中無形之火大率以五行中有形之水制之輕則前證所感大同小異重則昏不知人或吐或瀉或眩暈頑痹丹溪以陰虛所致甚則瞀悶懊惱而死客氣旺而主氣弱為熱傷元氣古人立法夏月宜補者補天真元氣非補熱火也以用人參五味子麥門冬名生脈散蓋此藥能益金水以御火土之旺又令人夏食寒以扶陰氣養其陽也蓋謂陽亢於外陰微於內庚金受因於上清肅之源竭於下也丹溪又辨云世言夏月伏陰在內此陰字有虛之義若作陰冷看其誤甚矣或曰以手捫腹明知其冷而何曰人之腹屬地氣於此時浮於肌表散於皮毛腹中之陽虛矣如子月一陽生寅月三陽生此氣之升也巳月六陽生陽盡出於地之上矣此氣之浮也經曰夏者經滿氣溢入孫絡受血皮膚充實長夏孫絡皆盛內溢肌中又曰陽氣在孫絡長夏氣在肌肉所以表實者里必虛又言春夏養陽王太僕謂春食涼夏食寒所以養陽也何以溫熱取其用此理固然且如涼臺水館當風取涼寒泉水果之物所傷或吐或瀉或腹疼自內及外當用溫劑前哲又謂升降浮沉則順寒熱溫涼則逆夏月火令之時不可妄投溫燥之藥看其虛實不為患乎或曰巳月純陽五日一陰生六月二陰生陰氣即動豈無陰冷此陰之初動於地下四陽浮於上燔灼梵炎流金爍石何冷之有且潔古治中暑之藥有中暑傷暑之分若人或傷或中之意但言避暑納涼於深堂大廈謂靜而得之為中暑其病必頭疼惡寒身形拘急肢節疼痛而煩心肌膚大熱無汗為房室之陰寒所遏使周身陽氣不得伸越為陰證故治以大順散以取辛甘發散之意後人不察用溫熱之意又辨傷暑之證若人或農夫於日中勞役謂動而得之為傷暑其病必頭疼發躁熱捫之肌膚大滿大熱大渴引飲汗大出元氣已動乃為大熱外傷肺氣以人參白虎湯為陽證熱傷元氣非形體受病也夫白虎治熱傷風謂元氣不甚虛也暑去氣清則安矣脾胃論中長夏濕熱胃困尤甚又有暑風一證因其夏月而病搐搦故有此名非風也乃病暑熱亢極火盛金衰術無以制正邪相拒汗閉於外痰鬱於內風勢妄行脾必受邪故手足陽為動搖內擾神舍志識不清而瞀悶無所知矣慎勿以風藥治之治以兼化但清時令之火則心經之熱亦泄金清氣行則木邪有制而風不作開鬱悶之疾則神識氣寧當用黃連香薷飲加羌活且如有人在途路中傷暑者湯藥皆無將人攙扶涼處就將當道上熱土包裹尉臍腹之上下或布蘸湯尉之冷即頻易待其蘇省用溫米飲湯徐徐灌之便不可用剛燥之劑可不畏哉暑證通治方五物香薷湯驅暑和中通用香薷四錢白扁豆厚朴薑製各一錢半白茯苓二錢甘草炙一錢上作一服水二盅煎至一盅不拘時服香薷縮脾飲驅暑和中除煩止渴香薷三錢縮砂二錢草果仁乾葛各一錢半烏梅肉白扁豆甘草炙各二錢上作一服水二盅生薑五片煎至一盅不拘時服冷香飲子治老人虛人伏暑煩躁引飲無度噁心疲倦服涼藥不得者草果仁五錢附子橘紅甘草炙各一錢上作一服水二盅生薑七片煎至一盅去渣沉冷旋旋服不拘時候香薷銼散解暑毒止霍亂香薷厚朴薑製各二錢茯苓一錢半甘草半錢陳皮良薑各一錢上作一服水二盅入鹽些少煎至一盅不拘時服二氣丹治伏暑傷冷二氣交錯中脘痞悶或頭痛惡心並皆治之硝石硫黃各等分上為末銀器內文武火炒令鵝黃色再碾細用糯米煮糊為丸如梧桐子大每服四十丸新汲水送下不拘時服五苓散治中暑煩渴身熱頭痛霍亂吐瀉小便赤色心神恍惚一方加辰砂名辰砂五苓散澤瀉二錢半肉桂一兩赤茯苓白朮豬苓各一兩半上為細末每服二錢白湯調下不拘時服枇杷葉散治中暑伏熱煩渴引飲嘔噦噁心頭目昏眩枇杷葉去毛炙厚朴薑製陳皮丁香各半兩白茅根麥門冬去心乾木瓜甘草炙各一兩香薷七錢半上為細末每服二錢生薑湯或冷水調下不拘時服消暑丸治伏暑引飲脾胃不和半夏醋煮一斤甘草生用茯苓去皮各半斤上為細末用生薑汁煮麵糊為丸如梧桐子每服五十丸熱湯下不拘時服桂苓甘露飲治伏暑引飲過度肚腹膨脹霍亂吐瀉皆治肉桂半兩白茯苓去皮白朮豬苓滑石碾各二錢寒水石碾甘草炙澤瀉各一兩上為細末每服三錢入蜜些少熱湯冷水任調下解暑三白散治冒暑伏熱霍亂吐瀉小便不利頭目昏眩澤瀉白茯苓白朮各五錢上作一服水二盅生薑五片燈心十莖煎一盅不拘時服十味香薷飲清暑氣和脾胃香薷人參陳皮白朮黃耆白扁豆甘草炙厚朴木瓜茯苓去皮各半兩上為細末每服二錢熱湯冷水任調下不拘時服香朴飲子治大人小兒伏熱吐瀉虛煩悶亂人參去蘆茯苓去皮甘草炙紫蘇澤瀉香薷半夏曲白扁豆烏梅肉木瓜厚朴薑製各二錢上作一服水二盅生薑三片紅棗一個煎至一盅食前服六和湯治心脾不調氣不升降霍亂轉筋嘔吐泄瀉寒熱交作痰喘咳嗽胃脘痞滿頭目昏痛肢體浮腫嗜臥倦怠小便赤澀並傷寒陰陽不分冒暑伏熱煩悶或成痢疾中酒煩渴畏食並皆治之縮砂半夏湯洗七次杏仁去皮尖人參去蘆赤茯苓去皮藿香去土白扁豆薑製香薷厚朴薑製木瓜各一錢甘草炙半錢上作一服水二盅生薑五片紅棗一個煎一盅不拘時服聖惠方治絞腸痧痛不可忍輾轉在地或起或僕其腸絞結在腹此是中毒之深須臾令人死上用鹽一兩熱湯調灌病人口中鹽氣到腹其痛即定竹葉石膏湯治伏暑內外熱熾煩躁大渴石膏半兩麥門冬去心人參去蘆各二錢甘草炙半錢半夏湯洗七次一錢半上作一服水二盅生薑五片青竹葉十四片粳米一撮煎至一盅不拘時服黃連香薷湯治伏暑傷冷霍亂轉筋心腹撮痛四肢厥冷香薷三錢厚朴薑製黃連各二錢上先將厚朴黃連二味同生姜四錢一處搗細於銀石器內慢火同炒令紫色取起入香薷入水一盞酒一盞煎八分去渣用瓷器盛於新汲水中沉令極冷服如中暑搐搦內加羌活二錢尋常感暑燥渴吐瀉不甚重者方中可去黃連只加白扁豆二錢微炒銼煎如前法服之如炒煮藥莫犯銅鐵器辰砂益原散治伏暑煩渴引飲小便不利心神恍惚辰砂三錢滑石六兩甘草一兩上為細末每服三錢不拘時白沸湯調下冷香湯治伏暑引飲躁渴過食生冷成霍亂良薑附子炮去皮臍甘草炙檀香各二錢乾薑炮一錢丁香三分草果一錢半上㕮咀作二帖用水二盅煎至一盅去滓貯瓶中沉井中待冷服之御愛姜蘇丸治中暑噁心頭疼煩躁生津止渴紫蘇葉揀淨五兩烏梅肉切炒二兩甘草生三分桂心去粗皮半兩香薷揀淨半兩生薑切焙乾一分木瓜乾者二兩如生去皮穰切焙上為細末煉蜜為丸如櫻桃大每服一丸細嚼熱水送下廣順散治中暑煩渴甘草三兩半炙肉桂去粗皮一兩乾薑炮一兩紫蘇葉半兩烏梅肉焙乾一兩半上為細末每服二錢冷水調下沸湯調服亦得龍鬚散一名甘草散治冒暑伏熱心膈燥悶飲水過度不知人事及霍亂作瀉作渴咳血吐血小便下血頭旋目暈五倍子一作五味子二兩烏梅去仁二兩甘草炙一兩半飛羅面二兩一方用清明日面尤佳白礬枯一兩一方生用上為細末每服二大錢新汲水調下一服即愈亦解諸毒物雖平日不飲冷者服之亦有奇效一方加訶子肉滴水為丸謂之龍涎丸仍以末調下翟公巽參政易名濯熱飲子水為丸彈子大陰乾細嚼水送下地仙散治傷寒後伏暑煩熱不安及煩熱虛勞地骨皮去木二兩防風去蘆一兩甘草炙半兩上㕮咀每服四錢水一盞半煎至七分去滓食遠溫服治中暑不拘老少上用不蛀皂角不計多少刮去黑皮燒煙欲盡用盆合於地上周回勿令透煙每用皂角灰一兩用甘草末六錢和勻每服一錢新汲水調下氣虛人溫漿水調下昏迷不省者不過兩服吳內翰備急用皂角五斤去皮弦炙焦存性甘草五兩蓋中暑人痰塞關竅皂角能疏利去痰故也一方用米飲下治中暑甚妙上用上等重羅細面以薑汁及水和成餅子曝乾卻碾末收之每服二三錢新汲水調服香薷丸治大人小兒傷暑伏熱燥渴瞀悶頭目昏眩胸膈煩滿嘔噦噁心口苦舌乾肢體困倦不思飲食或發霍亂吐利轉筋並宜服之香薷去根一兩紫蘇去粗梗乾木瓜藿香葉洗去砂土茯神去木各五錢甘草炙赤色檀香丁香各二錢半上為細末煉蜜和丸每兩作三十丸每服一丸至二丸細嚼溫湯下或新汲水化下亦得小兒每服半丸不拘時候水瓢丸治冒暑解煩渴烏梅肉四兩甘草青鹽乾木瓜白茯苓檀香各一兩麝香二錢半上除麝香別研余併為細末煉蜜為丸每兩作三十丸每服一丸含化或新汲水溫水嚼下不拘時候一方有人參水葫蘆丸治證同前川百藥煎三兩人參二錢麥門冬烏梅肉白梅肉乾葛甘草各半兩上為細末麵糊為丸如雞頭實大每服一丸含化夏月出行一丸可度一日潑火散治傷暑煩躁發渴口苦舌乾頭痛惡心不思飲食昏迷不省人事欲死者及治血痢婦人熱血崩青皮去白赤芍藥黃連去須地榆各等分上為細末每服三錢冷水調下如蓄熱而氣血妄行加甘草等分一方將水調服治血痢水一盞煎服通草散治伏暑下血如久痢崇寧二年自太府出為發運夏及秋患痢兩月一日一夜三四十次然血多白少名醫皆曰此痢也聞泗州青陽鎮李中和助教善醫即遣人召之中和至看脈即曰此非痢也始甚怒之徐叩之李曰血多白少小便澀少即非痢其言中余之病心已神之乃是舊因伏暑小便轉導入大腑由心經而過遂化為血大小便下故其狀似痢而非痢也但令大小便各歸本臟即安通草木通各半兩澤瀉一分竹茹二錢少用老人減半上銼如大米粒或為細末就銼時即每服稱三錢水一盞煎至七分溫服細末即每服抄二錢依前法煎食後並夜臥各一服便住信知天下有如此妙醫余家致婢久痢服之皆安故記傳久異功敵暑丸治伏暑或吐或瀉有效黃連一斤淨陳倉米二升水二碗拌濕上於鍋內如罨飯法米熟為度晾乾為末以水為丸如梧桐子大每服三五十丸飯湯下不以時檀香丸解暑毒檀香一錢杏仁去皮二錢半烏梅肉二兩紫蘇葉一兩茴香三錢半百藥煎二錢半甘草一兩半上為細末煉蜜為丸如彈子大非時含化白梅湯治中熱五心煩躁霍亂嘔吐口乾煩渴津液不通白梅二十九個檀香三兩甘草四兩鹽五兩上為細末每服二錢入生薑五片青竹葉七片粳米百粒水煎服五聖湯治暑病嘔惡每遇夏月不進飲食疲倦少力見日色則頭目昏痛噁心多睡貫衆黃連去須甘草微炙吳茱萸湯洗七次白茯苓去皮以上五味並生用各半兩上㕮咀平分二服每服用水一碗半煎至一碗去滓放冷候日午時先取香熟甜瓜一枚切去皮作十二片先嚼瓜一片呷藥一二呷送下了再如前嚼瓜一片呷藥一二呷看吃得幾片以藥汁盡為度不損脾胃不動臟腑須是覺大煩時服之蠟梅丸止渴生津蠟梅花末乾薑末甘草末枇杷葉末百藥煎末烏梅肉末以上各一兩蠟五兩上先熔蠟開投蜜二兩和上拌藥末搗二三百下丸如雞頭實大夏月長途一日含化一丸妙治中暑迷悶欲死上取蒜一瓣生嚼以新水送下或不能嚼水研灌之立可效熱死人切勿便與冷水及臥冷地正如凍死人須先與冷水若遽近火即死一法行路暍死人惟得置日中或令近火以熱湯灌之即活一方以爛蒜嚼三兩瓣溫水送下治時暫伏暑上用香附子臼中搗去皮入薑汁炒香為末入砂糖丸如龍眼大先呷麻油少許次嚼藥冷水送下當時便覺清涼春澤湯治伏暑發熱煩渴引飲小便不利兼治傷寒陰陽不分疑二之間最宜服此澤瀉三錢豬苓二錢茯苓二錢白朮二錢桂心一錢人參一錢半柴胡一錢麥門冬一錢半渴甚去桂加五味子黃連各二錢上㕮咀每服七錢水一盅半燈心二十莖煎一盅食遠服
