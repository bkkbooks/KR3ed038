body:
  text: 卷之四十七疝門附論巢氏病源論疝者痛也其名曰厥曰症曰寒曰盤曰氣曰附曰狼此七者疝之名也其厥逆心痛足寒諸飲食吐不下曰厥疝腹中氣乍滿心下盡痛氣積如臂曰症疝因寒飲食即脅下腹中盡痛曰寒疝腹中乍滿乍減而痛曰氣疝腹中痛在臍旁曰盤疝腹中臍下有積聚曰附疝小腹與陰相引而痛大便難曰狼疝其證發則可驗又有石疝血疝陰疝妒疝氣疝此五者有名而無形也外有心疝寒疝飢疝疝癖數者其名不同病則大同小異世俗呼為小腸氣膀胱氣奔豚氣蟠腸氣橫弦豎弦偏墜木腎腎余陰腫由疝之為病其名別也至於張子和論七疝曰寒疝水疝筋疝血疝狐疝氣疝㿗疝名與諸論不同且如㿗疝者外腎堅腫也痛者為陰腫不痛者為木腎一邊墜下者為偏墜疝名諸論立雖多且異靈樞經云邪在小腸連睪系屬腎貫肝絡肺繫心氣盛厥氣上衝也內經又云任脈為病男子內結七疝女子帶下瘕聚衝脈逆為氣裡急然則任脈雖稱病有七疝之名而無七疝之狀而任脈者是疝病之本源各經是病疝之支流也又云厥陰脈滑為狐疝小腸脈滑為肝風疝太陰脈滑為脾風疝少陰脈滑為心風疝太陽脈滑為腎風疝陽明脈滑為肺風疝此風非外入之風乃肝木陽脈氣動之風也此六疝者應乎六經在於五藏何謂疝病皆屬肝病生於陰起於下陰者內之太陰肝厥陰肝少陰腎皆足之陰經也下者地之寒氣也足常履地蓋天之風寒皆入於地人之風濕皆從足起或因經虛聚於胞囊小腹兩陰相併二氣相搏則為疼痛矣或冷飲過情水流歸腎或坐臥處濕寒搏留陰以寒攻陰則為疝痛經曰痛者通也疝氣作痛宜通不宜塞宜溫不宜寒通謂溫其實不瀉其虛寒謂補其虛不補其實虛者邪氣也實者正氣也若正氣盛極則先溫而後瀉若邪氣盛極則先瀉然後補溫者必兼於氣虛者必因於寒寒則入於肝而正其邪溫則疏其氣養其正也大凡內外之氣交入於腎者為腎氣入於膀胱者為膀胱氣入於小腸者為小腸氣腎與膀胱為溝渠其氣相通連為外腎繫於睪丸此三經乃相連相會者也其脈當以弦緊弦則為寒緊則為痛從寒則痛從濕則腫疝而不愈邪氣留滯結成積聚而為疼痛或脅左右如杯或臍上下如臂或腹大如盤令人羸瘦少氣灑淅寒熱嗜臥飲食不為肌膚腹滿嘔吐醫者當臨期審察若因七情而得者當調其氣安五臟外邪相干者散濕祛寒為先去邪之實補肝之虛則亦愈矣疝氣通治方聚香飲子治七情所傷遂成七疝心腹脹痛痛引腰脅連背不可俯仰方見氣門蟠蔥散治男子脾胃虛寒氣滯不行攻刺心腹痛連胸脅膀胱小腸腎氣乃婦人血氣刺痛並皆治之方見氣門五積散治體虛冷膀胱小腸氣作痛不可忍每服一兩入鹽炒吳茱萸茴香各一錢生薑三片蔥白五十煎空心熱服方見寒門桂枝烏頭湯治風寒疝腹中痛逆冷手足不仁身體疼痛風入腹五臟拘急不得轉側大烏頭炮去皮臍二錢半桂枝不見火白芍藥甘草炙各二錢上作一服用水二盅生薑七片紅棗二枚入蜜半匙同煎至一盅去滓食前服益智仁湯治疝痛連小腹攣搐叫呼不已診其脈沉緊是腎經有積冷所致方見氣門玄附湯治七疝心腹冷痛腸鳴氣走身寒自汗延胡索三錢炒附子炮去皮臍木香不見火各二錢半上作一服水二盅生薑七片煎至一盅不拘時服金鈴子散治七疝寒注下焦小腹引外腎疼痛大便多閉金鈴子去皮核取肉一兩用巴豆七粒去殼同炒令黃色去巴豆不用上為細末每服二錢空心用熱鹽酒調服狼毒丸治七疝久而不愈發作無時臍腹堅硬疼痛狼毒銼炒川烏炮去皮臍芫花醋炒各二兩椒紅炒乾薑炮乾漆炒煙盡三稜鱉甲沒藥各半兩全蠍去毒九枚上為細末醋糊為丸如梧桐子大每服四十丸空心用生薑湯或溫酒送下孕婦不可服木香散治心疝小腹痛悶不已者木香陳皮良薑乾薑訶子去核枳實以上各一錢半草豆蔻黑牽牛川芎以上各一錢上作一服水二盅煎至一盅食前服或為細末每服二錢空心用白湯調服沉附湯治腎虛無陽小腸氣痛小腹外腎臍冷兼治濕證附子生用香附各二錢沉香蓽澄茄辣桂甘草炙各一錢上作一服水二盅生薑七片煎至一盅空心服桂薑湯治無陽臍冷疝氣兼治濕證辣桂川白姜吳茱萸用酒醋浸一宿焙乾以上各一錢良薑茴香炒蓽澄茄縮砂仁木香茯苓益智仁甘草炙各八分上作一服水二盅煎至一盅食前服金鈴丸治膀胱腫痛小腸氣陰囊腫水出不幹金鈴子取肉五兩茴香炒海蛤馬蘭花炒破故紙炒海帶木香菟絲子丁香各一兩上為細末麵糊為丸如梧桐子大每服五十丸空心用溫酒或鹽湯送下川楝子丸治疝氣一切下部之疾腫痛悉皆治之川楝子取淨肉一斤作四分四兩用麩一合斑蝥四十九粒同炒麩黃色去麩斑蝥不用四兩用麩一合巴豆四十九個同炒麩黃色去麩巴豆不用四兩用麩一合巴戟一兩同炒麩黃色去麩巴戟不用四兩用鹽一兩茴香一合同炒黃色為度去鹽茴香不用木香不見火一兩破故紙一兩炒香為度上為細末酒糊為丸如梧桐子大每服五十丸用鹽湯送下甚者日進三次空心食前服立效散治疝氣川芎青皮去白川楝子舶上茴香炒桃仁黑牽牛炒各二錢上作一服水一盅酒一盞煎至一盅空心服三茱丸治小腸氣痛外腎腫墜山茱萸去核吳茱萸去梗食茱萸去梗以上各二兩川楝子一兩用斑蝥四十個去翅嘴同炒赤色去斑蝥不用破故紙一兩七錢炒青皮去白茴香鹽炒青鹽以上各三兩黑牽牛一兩炒上為細末醋糊為丸如梧桐子大每服五十丸用桃仁十五個炒煎酒送下或茴香酒亦可空心服葫蘆巴丸治大人小兒小腸氣蟠腸氣奔豚氣疝氣偏墜陰腫小腸有形如卵上下走痛不可忍者葫蘆巴炒八兩茴香去土炒六兩大巴戟去心炒川烏炮去皮臍各三兩吳茱萸湯泡七次炒五兩川楝子去核取肉炒九兩上為細末酒糊為丸如梧桐子大每服十五丸空心溫酒送下小兒服五丸茴香湯下一方加牽牛二兩海藻丸治偏墜小腸氣海藻海帶以上各一兩斑蝥二十八個去足翅巴豆二十八個去殼完全者上斑蝥巴豆二味作一處生絹袋盛用好醋一碗以瓦銚盛四味藥同煮將干去斑蝥巴豆不用只將海帶二味細碾為末以淡豆豉一百粒以煮藥余醋略浸蒸碾為膏和藥末為丸如梧桐子大每服用麝香少許硃砂三錢乳缽細碾卻入麝香再碾勻為衣曬乾以新瓦瓶收之初服七粒二服十粒三服十五粒若未愈再進三兩服皆用十五粒仍用鹽炒茴香細嚼酒吞下空心服忌食鴨子並鮓醬動氣之物補腎湯治寒疝入腹小腸㽲痛時復泄瀉胸膈痞塞沉香五分人參茯苓附子炮去皮臍黃耆白朮木瓜以上各一錢半羌活川芎紫蘇甘草炙各一錢上作一服水二盅生薑三片紅棗一枚煎至一盅食前服嘔吐加半夏一錢生薑七片煎服敷法治腎囊偏墜牡蠣煅良薑各一兩上為細末津唾調敷大便處須臾如火熱著痛即安敷金丸治疝氣外腎腫脹極大或生瘡出黃水其痛繞腹寒熱往來忤三稜煨莪朮煨豬苓白附子蘿蔔子赤芍藥黑牽牛川楝子山茵陳青木香陳橘皮五靈脂薑黃小茴香海藻酒浸焙穿山甲灰火煨焦海浮石米醋浸火煅紅醋淬又煅紅又以醋淬黑色為度以上各一兩南木香半兩青皮去白二兩一兩生用一兩截碎以斑蝥五十個去頭足翅同炒黃色去斑蝥不用丁香一分香附子淨三兩一兩生用一兩以巴豆五十粒去殼同炒色焦去巴豆不用澤瀉一兩半上為細末酒煮麵糊為丸如梧桐子大每服三十丸用溫酒送下此藥能泄斟酌用之海藻丸治奔豚疝氣膀胱小腸氣㿗疝木腎及小兒偏墜一切腎氣等疾海藻洗焙木香檳榔川椒去目炒甘遂以上各半兩川烏半兩炮小兒去之老人用一兩吳茱萸四錢炒茴香炒豬苓去皮澤瀉以上各三錢白牽牛二兩取末半兩黑牽牛二兩取末半兩上為細末滴水為丸如梧桐子大每服五十丸加至百丸空心溫酒鹽湯任下利下黃涎是驗十五歲以下者服二十五丸至五十丸此藥不特利大便亦能利小便服藥後忌甘草相反茴香楝子丸治諸疝證川楝子一兩二錢小茴香一兩半吳茱萸二兩海藻酒洗青皮各一兩木香澤瀉各半兩青鹽三錢三稜醋炒莪朮醋炒各七錢半黑牽牛七錢一半生用一半炒熟上將川楝茴香茱萸用酒醋童子小便各浸半兩又用巴豆去皮斑蝥去翅足各二十五個以川楝茴香青皮共炒色變去巴斑二藥研為細末醋煮糊為丸如梧桐子大每服五十丸空心用溫酒送下荔核散治疝氣陰核腫大痛不可忍荔枝核十四個新者燒灰存性沉香八角茴香炒木香青鹽食鹽以上各一錢川楝肉小茴香各二錢上為細末每服三錢空心用熱酒調服安息香丸一名煉陰丹治陰氣下墜腫脹卵核偏大堅硬如石痛不可忍安息香阿魏硇砂以上各二錢半用酒一盞醋一盞研開淘去沙石再用酒醋各一盞熬成膏子和摻藥青皮去白延胡索微炒海藻洗昆布炒茴香炒川楝子去核馬藺花炒各一兩木香不濕半兩巴戟酒浸三宿切焙沒藥另研各二錢半麝香另研一錢上為細末研勻以前膏和丸如綠豆大每服十丸至十五丸空心用綿子灰調酒送下寸金丸治奔豚諸疝作痛當歸延胡索舶上茴香炒葫蘆巴炒以上各一兩桃仁去皮焙桑螵蛸川楝子取肉川五靈脂另研白芍藥各半兩蓽澄茄木香各一錢半全蠍十個焙上為細末醋煮糊為丸如梧桐子大每服五十丸用鹽湯送下有熱小便秘車前子赤茯苓煎湯送下天雄沉香煎丸治下元傷憊陽事不能或成下墜及小腸氣痛腎臟風攻注脾胃不和腰腳重疼天雄生銼碎附子生銼碎草烏生銼漢椒以上各四兩防風生用牛膝黑豆緊小者生用天麻以上各二兩上八味以無灰好酒一斗於銀鍋內慢火煨不得令大沸煙盡為度炒令乾肉蓯蓉酒浸官桂去皮各三兩紫巴戟去心二兩沉香丁香木香羌活乾薑以上各一兩上為細末煉蜜和丸如梧桐子大每服二十丸空心用溫酒送下久服明目雄氣海駐容顏廣茂煮散治心疝心痛肢體虛冷蓬莪朮煨檳榔生銼官桂去粗皮附子炮去皮臍甘草銼炙各半兩川芎白朮各三分上銼碎每服二錢水一盞煎至七分不拘時溫服山茱萸丸治厥疝上搶心腹冷痛山茱萸吳茱萸湯泡焙炒川楝實銼碎麩炒馬藺花蘹香子炒青皮去白焙陳皮去白焙京三稜煨乾薑炮各三分附子一枚取半兩者炮裂去皮臍上為細末醋煮麵糊和丸如梧桐子大每服一十丸空心用湯服或鹽湯送下木香丸治卒疝腹痛不可忍木香官桂去粗皮蘹香子炒蓬莪朮煨銼桃仁去皮尖雙仁研檳榔銼以上各三分青皮湯浸去白焙萊菔子炒各半兩厚朴去粗皮生薑汁炙銼一兩上為細末入桃仁泥和勻酒煮麵糊為丸如梧桐子大每服二十丸食前用溫酒送下四制茱萸香煉丹治小腸疝氣陽事衰敗下元虛冷吳茱萸一斤揀去梗分四分一分裝豬尿脬帶尿裝酒浸煮一分醋浸一分童子小便浸一分鹽炒澤瀉四兩枳殼去穰炒木香石菖蒲炒青皮陳皮茴香鹽炒白茯苓檳榔萆薢三稜煨桃仁去皮尖炒莪朮煨乳香另研官桂以上各二兩荔枝核四十九枚川楝子四十九個入巴豆二十個同炒黃去巴豆不用上為細末酒糊為丸如梧桐子大每服五十丸空心用溫酒或鹽湯送下常服疏利邪氣進美飲食專治腎經虛弱寒腫痛諸種疝氣木香湯治寒疝攻注胸脅滿痛汗出木香三分檳榔細辛去苗葉赤茯苓去皮人參去蘆芍藥當歸切焙官桂去粗皮前胡去蘆青皮去白焙各一兩上銼碎每服三錢水一盞煎七分去滓不拘時溫服三增茴香丸治腎與膀胱俱虛為邪氣搏結遂成寒疝伏留不散臍腹痛陰核偏大膚囊壅腫重墜滋長有妨行步瘙癢不止時出黃水浸成瘡瘍或長怪肉累治不痊致令腎經閉結陰陽不通外腎腫脹冷硬如石漸大皆由頻服熱藥內攻或因兜取以致如此用藥溫導陽氣漸退寒邪補虛消疝暖養腎經能使復元一應小腸氣寒疝之疾久新不過三料第一料藥舶上茴香用鹽半兩同炒焦黃和鹽稱川楝子炮去核沙參洗銼木香各一兩上為細末水煮米粉稠糊為丸如梧桐子大每服二十丸空心用溫酒或鹽湯送下日進三服小病此一料可安才盡便可服第二料藥第二料藥加下項藥蓽茇一兩檳榔半兩上加入前藥內通共六味重五兩半為細末依前糊丸丸數湯使亦如前若病未愈便服第三料藥第三料藥又加下項藥白茯苓四兩緊小實者去黑皮黑附子半兩炮去皮臍秤或加作一兩上通前八味重十兩並依前糊丸湯使丸數服加至三十丸新久大病不過三料可愈小腸氣發頻及三十年者寒疝氣至如栲栳大者皆可消散神效吳茱萸丸治寒疝心腹痛面目青黃不下飲食縱食嘔逆肌體羸瘦吳茱萸湯泡焙炒乾薑炮赤茯苓甘草炙微赤以上各半兩白朮桂心半夏湯泡赤芍藥前胡去蘆當歸微炒陳皮川椒去目合口者炒出汗附子炮去皮臍人參去蘆木香以上各一兩上為細末煉蜜和搗二三百杵丸如梧桐子大每服二十丸生薑湯送下日四五服蜀椒散治寒疝心痛如刺繞臍腹中疼痛自汗出氣欲絕川椒一錢去目及合口者微炒出汗附子一個炮去皮臍乾薑炮半夏湯泡去滑桂心甘草炙各半兩上㕮咀每服五錢以水一中盞入粳米半合生薑半分棗三枚煎六分去滓不拘時稍熱服一方無粳米芫花丸治寒疝積聚動搖大者如鱉小者如杯乍來乍去在於胃脘大腸不通感風寒則腸鳴心下寒氣上搶胸脅滿芫花二兩醋拌炒川椒炒川大黃銼炒川烏頭炮去皮臍細辛赤芍藥桂心赤茯苓木香以上各一兩吳茱萸湯泡微炒半夏湯泡桔梗去蘆各半兩上為細末煉蜜和搗二三百杵丸如梧桐子大每服七丸溫酒送下日三服當下如泥昆布丸治陰疝腫大偏墜昆布洗去殼炙海藻洗去殼炙蕪荑仁炒蒺藜子炒去角檳榔銼各一兩半枳殼去穰麩炒火麻子研各二兩訶黎勒煅去核黃耆木香以上各三分陳皮去白炒桃仁去皮尖炒研菟絲子酒浸一宿別研各一兩上為細末研勻煉蜜和丸如梧桐子大每服三十丸空心用溫酒或鹽湯送下雄黃洗方治陰疝腫痛不能忍及陰腫大如斗核痛者雄黃研甘草各一兩白礬研二兩上為細末每用藥一兩熱湯五升通手洗腫處良久再暖洗至冷候汗出瘥治陰忽疼痛桃仁湯浸去皮尖雙仁麩炒微黃苦楝子蘹香子沒藥各一兩上為細末每服二錢食前熱酒調服宣胞丸治外腎腫痛黑牽牛半生半熟取頭末一兩青木香一兩斑蝥七個同炒香用斑蝥五個川木通一兩炒上為細末酒糊為丸如梧桐子大每服三十丸用溫酒或鹽湯送下治蚯蚓吹腎囊腫方上用鹽湯洗之又以炒鹽包熨痛處神效方治腎囊腫大上用黑牽牛一兩淨炒黃色香熟為度次將舶上硫黃研末拌牽牛須要入內不見硫黃將牽牛紙襯於地上一宿碾末用宿蒸餅糊為丸每服三十丸空心鹽湯下木香導氣丸治男子小腸氣肚疼一切氣積以補下元虛冷脾胃不和並宜服之有效木香乳香川楝子去核八角茴香丁香香附子破故紙葫蘆巴京三稜甘草以上各一兩杜仲半兩炒去絲上為細末酒糊為丸如梧桐子大每服三十丸加至五十丸空心用溫酒或鹽湯送下日進三服加味通心飲治諸疝脹痛及小便不利木通去皮節梔子去核黃芩瞿麥穗連翹枳殼去穰川楝子去核甘草各等分上㕮咀每服五錢水一盞半燈心二十莖車前草五莖同煎七分空心溫服喝起丸治小腸氣及腰痛杜仲酥炙去絲葫蘆巴芝麻炒破故紙炒小茴香鹽水浸一宿萆薢以上各一兩胡桃仁湯浸去皮研如泥上為細末入胡桃肉和勻為丸如梧桐子大每服三十丸或五十丸空心用鹽酒或鹽湯送下一捻金散治奔豚小腸諸氣痛不可忍延胡索川楝子炒全蠍炒舶上茴香炒各一兩附子半兩銼去皮臍上為細末每服二錢痛時熱酒調下甚者再服效沉香內消丸治小腸疝氣陰囊腫大或左右偏腎結核疼痛難忍下元虛冷久不愈者並治之沉香木香各半兩葫蘆巴酒浸小茴香炒各二兩上為細末酒糊為丸如梧桐子大每服五七十丸空心鹽湯鹽酒任下奪命丹治遠年近日小腸疝氣偏墜搐痛臍下脹痛以致悶亂及外腎腫硬日漸滋長陰間濕癢抓之成癬瘡皆治之吳茱萸一斤去枝梗淨四兩酒浸四兩鹽湯浸四兩醋浸四兩童子小便浸各浸一宿焙乾研澤瀉二兩去灰土切作片去粗皮酒浸一宿上為細末酒糊為丸如梧桐子大每服五十丸食前鹽酒或鹽湯送下馮仲永苦奔豚寒氣攻衝小腹引痛一日只一服臟腑微動痛若失去遂安救痛散治小腸疝氣築心疼痛不可忍者肉豆蔻麵裹煨木香煨各半兩京三稜煨馬藺花醋炒金鈴子去核茴香炒各一兩上為細末每服一大錢痛時熱酒調下服之立效尋氣丸治小腸疝氣偏墜疼痛甘遂二錢炒石燕子雌雄一對斑蝥三個去翅足炒上為細末酒煮糊為丸如綠豆大每服三丸麝香溫酒送下空心臨臥食前服忌熱物一時忌甘草一日神效胡桃酒治小腸氣上以胡桃一枚火內燒成炭細研以熱酒調服絕妙蔥白散治一切冷氣不和及本臟膀胱發氣攻刺疼痛及治婦人產後腹痛或血刺痛及治臟腑宿冷百節倦痛怯弱傷勞滯降久服盡除但婦人一切疾病宜服川芎當歸枳殼去穰麩炒厚朴薑蔥炒青皮官桂去皮乾薑炮川楝子炒茴香炒神麯炒麥蘖炒乾地黃三稜煅人參茯苓芍藥莪朮醋浸焙木香炮各一兩上為末每服三錢水一盞蔥白二寸煎七分入鹽少許熱服如大便秘澀加大黃煎大便溏利加訶子煎食前服茴香散治膀胱氣痛茴香莪朮京三稜金鈴子肉各一兩甘草半兩炙上為細末每服二錢熱酒調服又云每發痛甚連日只二三服立定頃在徽城歙尉宋荀甫膀胱氣作疼不可忍醫者以剛劑與之疼愈甚小便不通三日矣臍下虛脹心悶予候之見其面赤黑脈洪大予曰投熱藥太過陰陽痞塞氣不得通為之奈何適有五苓散一兩許分三服用連須蔥一根茴香一撮鹽一錢水一盞半煎八分服中夜下小便如墨汁者一二升臍下寬得睡翌日診之脈已平矣大抵此疾因虛得之不可以虛而驟用補藥經云邪之所湊其氣必虛留而不去其虛則實故必先滌所蓄之邪然後補之是以諸方多借巴豆氣者蓋謂此也小腸氣方治一切丈夫元陽虛弱小腸虛冷非時氣痛忽衝心脅疼痛難忍宜服益智去皮莪朮各半兩茴香山茱萸去核牛膝續斷川芎葫蘆巴防風牽牛炒熟甘草以上各一分上為細末每服三錢水一盞二分煎兩三沸空心連滓服白湯調下二錢匕亦得治奔豚氣穿山甲麩炒破故紙麩炒香附去毛各半兩土狗十個去頭尾瓦焙乾海藻焙茴香各一兩全蠍十五個去毒黑牽牛頭末四兩木香一兩吳茱萸一兩半上為細末用萊菔一個大者剜去心肉入茱萸在內用糯米一碗同萊菔煮熟飯爛為度次將萊菔細切入米飯搗細茱萸曬乾同前藥為末與萊菔同搗丸如梧桐子大每服二十丸加至三十丸食前鹽酒送下代灸膏治症同前木香附子吳茱萸蛇床子馬藺花各等分上為細末同姜搗熱麵攤開貼痛處腰子散治腎氣作痛黑牽牛炒熟白牽牛炒熟等分上為細末每用三錢以豬腰一付薄切開縫入川椒五十粒茴香一百粒以牽牛末遍摻入腎中線系濕紙數重裹煨香熟出火氣燈後空心嚼吃好酒送下少頃就枕天明取下惡物即愈治腎氣疼痛方治丈夫腎氣婦人血氣疼痛不可勝忍面青唇黑幾於不救丈夫則攻擊臟腑腰背拳曲婦人則腹中成塊結為癥瘕驟然疼痛便至危困經年累月痛無暫停者並宜服之神驗不可具述當歸芍藥各一兩沒藥麒麟竭莪朮延胡索三稜牽牛醋煮焙乾木香以上各半兩芫花四兩狼毒半兩捶碎同芫花於瓦器內醋炒黃色上先修制芫花狼毒乳缽內研如泥又將麒麟竭沒藥亦作一處研如飛塵所餘眾藥共作一處搗為細末方將芫花狼毒麒麟竭沒藥等末相袞令勻更爛研千遍每服一錢半氣痛時蔥酒調下和滓吃不用飽食後吃也若是大腑秘熱出後不通唇皮焦赤口中涎溢吃此藥一盞見效八仙丸治育腸氣木香青皮去白焙高良薑桃仁去皮尖麩炒各三分阿魏麵裹煨膃肭臍酒炙黃桂心各半兩乾蠍一分微炒上為細末用醋浸蒸餅為丸如梧桐子大每服二十丸食前以熱酒送下桃仁丸治育腸氣疼痛不可忍桃仁酒浸去皮尖雙仁麩炒微黃木香各三分阿魏麵裹煨熟為度乾蠍微炒芫花醋拌炒黃苦楝子桂心以上各半兩檳榔一兩上為細末以醋浸蒸餅和丸如梧桐子大每服十丸不拘時熱生薑酒送下橘核丸治四種㿗病卵核腫脹偏有大小或堅硬如石或引臍腹絞痛甚則腎囊腫脹或成瘡毒輕則時出黃水甚則成癰潰爛橘核炒海藻洗昆布洗桃仁去皮尖炒川楝肉炒海帶洗以上各一兩厚朴姜炙延胡索炒枳實麩炒桂心不見火木香不見火木通以上各半兩上為細末酒糊為丸如梧桐子大每服六十丸空心溫酒鹽湯任下虛寒者加川烏一兩腎腫久不消加硇砂二錢醋煮旋入有熱氣滯者加黑牽牛大黃各半兩療超越舉重卒得陰㿗地膚子十分白朮五分桂心上為細末以飲服一刀圭日三忌生蔥桃李雀肉物一方用溫酒調下蜘蛛散治陰孤㿗氣偏有大小時時上下脹人蜘蛛十四個熬焦桂心半兩上為細末煉蜜為丸如梧桐子大每服十丸空心用米飲送下為散取八分飲和服亦可香附散治㿗疝脹及小腸氣上為香附不拘多少為末每用酒一盞入海藻一錢煎至半盞先澇海藻嚼細用煎酒調香附末二錢服一方以海藻為末以熱酒調尤妙甚者灌之一方熱酒下荊芥末秘傳茱萸內消丸治腎虛為邪所襲留伏作痛陰㿗偏大或生瘡出黃水吳茱萸半酒半醋浸一宿焙乾山茱萸蒸去核馬藺花醋浸焙黑牽牛炒取頭末延胡索略炒川楝子蒸去皮核舶上茴香鹽炒海藻洗去殼焙橘皮青皮去白官桂以上各一兩桃仁去皮焙白蒺藜炒杵去刺木香各半兩上為細末酒煮稀糊為丸如梧桐子大每服四十丸食前用溫酒或鹽湯送下
