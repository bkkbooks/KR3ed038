body:
  text: 卷之二十七腰痛門附論六元正紀論曰太陽所至為腰痛又曰巨陽即太陽也虛則腰背頭項痛夫腎肝為病則腰滯而痛故經云腰乃腎之腑轉搖不能腎將憊矣蓋諸經皆貫於腎而終於腰脊腎氣一虛邪氣易入或風寒暑濕客之或血凝氣滯鬱郁悶悶而不伸積水沉重則小腸不得宣通其證遂作素問刺腰痛論云分六經之病且如太陽腰痛引項脊尻背如重狀陽明腰痛不可以顧顧則如有所見者善悲少陽腰痛如針刺皮循循然不可俯仰不可以顧太陰腰痛令人而熟熱甚則勞腰下如有橫木居其中甚則遺溲少陰腰痛痛引脊內廉厥陽腰痛如張弓弩弦善言默默然不慧解脈是足太陽之別脈令人腰痛引肩䀮䀮然時遺溲又云痛如引帶常苦折腰狀善恐同陰之脈是足少陽之別絡也令人腰痛痛若小錘居其中怫然腫陽維之脈是太陽之所生奇脈也令人腰痛痛上怫然腫衡絡之脈是太陽之外絡令人腰痛不可俯仰恐僕得之舉重傷腰衡絡絶惡血歸之會陰之脈是足太陽之中經也令人腰痛痛上漯漯然汗出汗乾令人欲飲飲以欲走飛揚之脈是陰維之脈也令人腰痛痛上怫怫然甚則悲恐昌陽之脈是陰蹺脈也令人腰痛痛引膺目䀮䀮然甚則反折舌卷不能言肉裡之脈是少陽所生則陽維之脈所發也令人腰痛不可以咳咳則筋縮急挾脊而痛至頭几几然目䀮䀮欲僵仆刺足太陽腰痛上寒刺足太陽陽明上熱刺足厥陰不可俯仰刺足少陽中熱而喘刺足少陰少腹滿刺足少陰腰痛引少腹控䏚不可俯仰刺腰尻交者兩髁胛上刺熱篇云脾熱病者熱爭則腰痛不可俯仰腹滿澀腎熱病者先腰疼胻酸舌渴且人之腰者乃一身之大關節六經所繫支絡其經多虛少實或房勞之過度或四氣之所襲因虛則邪相搏以為痛也巢氏與千金方二家之論腰痛有五所感不同一曰陽氣不足少陰腎衰是以腰痛二曰風痹風寒濕著腰而痛三曰腎虛勞役傷腎而痛四曰彎腰作實傷腰而痛五曰寢臥濕地而痛此論受病各因陳無擇云又有三因而分之蓋太陽少陰多中寒少陽厥陰多中風陽明太陰多中燥濕若此六經腰痛者為外之所因也若失志傷腎鬱怒傷肝憂思傷脾若此腰痛為內之所因也大抵此病未嘗不由腎虛而或以內經推足三陰三陽十二經八脈有貫絡於腰腎而痛者則經中各有刺法治之或風寒濕蓄熱與失志房勞及墜傷閃肭氣滯血滯而痛者當於五種三因而推之不過發其所由用汗下補瀉之法以療之若脈浮弦為風弦緊為寒沉細為濕沉實為熱沉澀為氣與血也治法識六經五種三因之病則心胸瞭然用藥收十全之功豈不美歟腰痛通治方獨活寄生湯治風傷腎經腰痛如掣久不治流入腳膝為偏枯冷痹緩弱之患及婦新産腰腳攣急疼痛除風治之獨活桑寄生如無以川續斷代之白芍藥細辛桂心黃柏防風人參熟地黃川當歸秦艽牛膝茯苓杜仲去皮切炒去絲甘草炙各一錢上作一服水二盅煎至一盅空心服獨活湯治因勞役腰痛如折沉重如山獨活羌活防風肉桂大黃煨澤瀉以上各一錢半連翹當歸梢防己酒拌黃柏酒拌甘草炙以上各一錢桃仁二十五個上作一服水二盅好酒半盞煎至一盅食前服五積散治寒濕傷於腎經腰痛不可俯仰方見寒門木香流氣飲治氣滯腰痛方見氣門朮附湯治濕傷腎經腰重冷痛小便自利白朮四錢附子泡去皮臍杜仲去皮炒去絲各三錢上作一服水二盅生薑七片煎至一盅空心服人參順氣散治氣滯腰痛人參川芎桔梗白朮白芷陳皮枳殼麻黃去節烏藥白姜炮甘草炙各一錢上作一服水二盅食前服或為細末食前用甘草湯調服一方加五加皮一錢烏藥順氣散加五加皮治氣滯腰痛方見風門上為細末每服二錢食前用甘草湯調服生附湯治受濕腰痛附子生用白朮茯苓牛膝厚朴乾生薑甘草炙以上各一錢蒼朮炒杜仲去皮薑製炒各二錢上作一服水二盅生薑三片紅棗二枚煎至一盅食前服通氣防風湯治肩背痛不可回顧者此手太陽氣鬱而不行以風藥散之脊痛項強腰似折項似拔者足太陽經不通羌活獨活各一錢半蒼朮防風甘草炙各一錢蔓荊子川芎各二錢上作一服水二盅煎至一盅食遠服如身重腰沉沉然經中有寒濕也更加酒浸漢防已一錢輕者加附子一錢重者加川烏一錢當歸拈痛湯治濕熱為病肢節煩疼肩背沉重胸膈不利及遍身疼痛下注於足經痛腫不可忍當歸身知母酒洗茯苓去皮澤瀉豬苓白朮以上各八分苦參酒浸人參去蘆葛根升麻以上各七分茵陳酒浸黃芩酒浸羌活甘草炙各一錢半防風去蘆蒼朮各八分上作一服水二盅煎至一盅不拘時服舒經湯治臂痛不能舉有人常苦左臂痛或以為飲或以為風為濕諸藥悉投繼以針灸俱不得效用此方而愈蓋是氣血凝滯經絡不行所致非風非濕腰以下食前服腰以上食後服片薑黃二錢如無則以嫩莪朮代之赤芍藥當歸海桐皮去粗皮白朮以上各一錢半羌活甘草炙各一錢上作一服水二盅生薑三片煎至一盅去滓磨沉香汁少許食前服青蛾丸治腎經虛腰腿疼痛常服壯筋補虛杜仲一斤炒去絲破故紙一斤炒生薑十兩炒上為細末用胡桃一百二十個湯浸去皮研成膏入少熟蜜和丸如梧桐子大每服五十丸空心鹽酒薑湯任下立安丸治五種腰痛當服補暖腎經壯健腰腳破故紙乾木瓜杜仲去皮姜炒去絲牛膝酒浸續斷以上各一兩萆薢二兩上作細末煉蜜和丸如梧桐子大每服五十丸空心用溫酒或鹽湯送下牛膝酒治腎受風毒攻刺腰痛不可忍者牛膝地骨皮五加皮薏苡仁川芎羌活甘草以上各一兩海桐皮二兩生地黃十兩上㕮咀用綿帛袋盛藥入無灰酒一斗裝於壇內浸春五夏三秋七冬十日每服一盞一日三四次長令酒氣不絶一方加杜仲杜仲酒治風冷傷腎腰痛不能屈伸杜仲一斤切生薑汁製炒去絲上用無灰酒三升浸十日每服二三合日四五服一方研為細末每服二錢空心用溫酒調服蒼朮湯治濕熱腰腿疼痛蒼朮五錢去濕止痛柴胡三錢行經防風一錢半去風勝濕黃柏一錢半始得之時寒也久不愈寒化為濕除濕止痛上作一服水二盅煎至一盅空心食前服麻黃蒼朮湯治寒濕所客身體沉重腰痛面色萎黃不澤麻黃澤瀉炒曲白茯苓橘皮以上各一錢半夏桂枝草豆蔻豬苓以上各半錢黃耆三錢杏仁十個蒼朮甘草炙以上各二錢上作一服水二盅煎至一盅食前服二至丸治老人虛弱腎氣虛損腰痛不可屈伸附子炮去皮臍桂心不見火杜仲去皮銼炒去絲補骨脂炒以上各一兩鹿角鎊糜角鎊以上各二兩鹿茸酒炙青鹽另研以上各半兩上作細末酒煮糊和丸如梧桐子大每服七十丸空心用胡桃肉細嚼用鹽湯或鹽酒送下如惡熱藥者去附子加肉蓯蓉一兩橘香丸治腰痛經久不瘥橘核炒茴香炒葫蘆巴炒菴䕡子炒破故紙炒附子炮各等分上作細末酒煮麵糊和丸如梧桐子大每服三四十丸食前用鹽湯送下腰重痛方上用八角茴香炒為末每服二錢食前用溫酒調下治腰痛牽引足膝腳踝屢用如神杜仲薑汁炒去絲續斷黑牽牛破故紙桃仁炒去皮尖玄胡索各等分上為細末酒煮麵糊和丸如梧子大每服五七十丸食前溫酒白湯任下或加胡桃肉同丸尤妙治腰痛方官桂玄胡索杜仲去皮銼炒去絲各等分上為細末每服三錢空心用熱酒調服速效散治男女腰痛不可忍者川楝子取肉巴豆五粒去殼同炒赤去巴豆茴香鹽炒香去鹽破故紙炒以上各一兩上為細末每服三錢空心用熱酒調服一方去川楝子加官桂治腰痛降真香檀香沉香共一兩重上用煎湯空心服便不疼治腰疼方胡桃肉補骨脂杜仲各四兩上㕮咀作二帖每帖用水二盞煎空心服散滯丸治腰痛不可忍者上用牽牛不以多少碾取頭末去滓不用取大蒜每一瓣入巴豆肉一粒在內以濕紙裹定煨令香熟去巴豆將蒜研細和牽牛末為丸如梧桐子大每服五丸空心食前醋茶湯下量虛實服一方無巴豆以珠砂為衣每服二十丸酒下只一服便安神麯酒治挫閃腰痛不能轉側上用陳久神麯一大塊燒通紅淬老酒去神麯通口吞青蛾丸兩服頓愈一方不用青蛾丸只服酒後仰臥片時未效再服又方治證同前上以茴香根同紅曲擂爛好熱酒調服一方只用茴香根擂爛好酒下立愈雪溪傳甚妙萆薢酒治五種腰痛連腳膝筋脈拘急痠疼萆薢牛膝各三兩羌活附子炮去皮臍狗脊杜仲銼炒去絲桂心桑寄生以上各二兩上細銼用生絹袋盛以酒二斗浸密封七日後開每於食前溫服一盞復春丸治腰腳風濕勞損手足麻痹筋骨疼痛老壽長服此藥活氣血駐顏色補虛損萆薢四兩甜瓜子三兩炒破故紙炒杜仲銼炒去絲巴戟去心牛膝去蘆酒浸葫蘆巴炒木通以上各二兩虎骨酥炙骨碎補去毛乳香另研檳榔沒藥另研木香以上各一兩半黑附子一兩胡桃一百個去皮另研細上為細末入胡桃肉再研細酒煮糊和丸如梧桐子大每服四五十丸食前溫酒送下附子散治腰痛強直不能俯仰及筋脈拘急附子炮當歸銼炒各一兩半防風二兩杜仲去皮銼炒去絲玄胡索羌活以上各一兩桂心半兩牛膝三分上㕮咀每服四錢水一中盞入生薑半分煎至六分去滓食前溫服張走馬家飛步丸此係第一方筋骨藥能去筋脈骨節手足腰背諸般疼痛攣縮不伸之患神效乳香一兩另研白芍藥川烏生去皮臍草烏生去皮臍白膠香木鱉子取肉別研去油以上各二兩上為細末用赤小豆末煮糊為丸如梧桐子大每服十五丸木瓜湯下病在上食後服病在下空心服忌熱物片時沉香丸治腎臟風虛冷滯腰間久痛連腿膝麻痹或時疼痛乏力羸瘦沉香桂心萆薢熟乾地黃白茯苓海桐皮檳榔杜仲去粗皮炙黃石斛去根牛膝羌活漏蘆以上各三分川芎木香當歸銼微炒白朮防風以上各半兩附子炮去皮臍補骨脂微炒以上各一兩上為細末煉蜜和搗三五百杵丸如梧桐子大每服三十丸空心用溫酒送下晚間食前再服牛膝丸治腰胯疼痛四肢少力不能飲食牛膝訶黎勒煨用皮附子炮當歸銼以上各一兩乾薑炮川芎各半兩桂心白芍藥白朮羌活以上各三分厚朴去粗皮塗生薑汁炙黃香熟一兩半上為細末酒煮糊和搗二三百杵丸如梧桐子大每服三十丸食前用溫酒送下獨活散治冷滯風氣攻刺腰胯疼痛獨活附子炮各一兩牛膝二兩赤芍藥桂心川芎當歸微炒以上各三分桃仁半兩湯浸去皮尖雙仁麩炒微黃上㕮咀每服三錢水一中盞入生薑半分煎至六分去滓食前溫服虎骨散治腰胯連腳膝曉夜疼痛虎脛骨酥炙敗龜酥炙當歸川芎萆薢牛膝桂心羌活以上各一兩上為細末每服二錢食前溫酒調服補骨脂丸治腰腳疼痛不止神效補骨脂微炒牛膝去苗各三兩骨碎補一兩桂心一兩半檳榔二兩安息香二兩入胡桃仁搗爛上為細末煉蜜入安息香和搗百餘杵丸如梧桐子大每服十丸至二十丸空心用溫酒送下百倍丸治男子婦人腰膝疼痛筋脈拘急敗龜版虎骨二味各醋浸一宿蘸醋炙令黃為度肉蓯蓉酒浸一宿牛膝酒浸一宿乳香別研沒藥別研木鱉子去殼骨碎補去毛自然銅醋淬七次破故紙炒以上各等分上為細末以浸蓯蓉牛膝酒煮麵糊和丸如梧桐子大每服三十丸食前溫酒送下養腎散治腰腳筋骨疼痛不能步履其效如神蒼朮去皮一兩全蠍半兩天麻三錢黑附子炮去皮臍草烏去尖各二錢上為細末每服一錢淋黑豆酒調下藥氣所至麻痹少時須臾疾隨藥氣頓愈知是骨髓中痛用胡桃酒調此藥去積聚癥瘕傷寒中風皆治百一選方載忠州太守陳逄原因暑中取涼食瓜至秋忽然右腰腿間疼痛連及膝脛曲折不能經月右腳難於舉動凡治腰腳藥服之無效得此養腎散才一服移刻舉身麻痹不數服腳能屈伸再一服即康寧又本州鹽酒年四十歲虛損兩腳不能行步進此藥二服迤邐可行三服馳走慮祖常易簡方紏繆謂有子弟者忽兩足拳攣連腰疼楚脈弦緊甚此證兩感寒多於風只投百一選方養腎散隨效惠倅李參議亦嘗謂余曰其家曾有婦人腰腳不能轉動用此藥即效皆風寒兩感腎著湯治居處卑濕或雨露所襲濕傷腎經腰重冷痛如帶五千錢冷如水洗熱物著痛方少寬不渴小便自利茯苓乾薑各五錢白朮二錢半甘草一錢炙上作二帖每帖用水二盞煎不拘時服神應丸治腎經不足風冷乘之腰痛如折痛引背膂俯仰或勞役傷於腎或寢濕地或墜墮傷損風寒客搏皆令腰痛威靈仙桂心當歸各二兩上為細末酒煮麵糊和丸如梧桐子大每服二三十丸食前用溫酒送下或茴香湯下婦人桂心煎湯下如神湯一名舒筋湯治男子婦人腰痛閃肭血滯腹中㽲痛産後服之更妙玄胡索微炒當歸桂心各等分上為細末每服二錢不拘時用溫酒調服一方加杜仲或加桃仁牛膝續斷亦可牽牛丸治冷氣流注腰疼不可俯仰黑牽牛玄胡索微炒補骨脂三味另炒另搗取末各一兩上煨蒜研膏丸如梧桐子大每服五十丸食前蔥酒鹽湯任下一方不用玄胡索補骨脂用麩炒為末酒糊丸立安散專治腰痛杜仲炒橘核取仁炒上等分為細末每服二錢不拘時用鹽酒調服神骨脂丸治腰痛不可忍補骨脂二兩酒浸一宿用麩炒為末入杏仁湯泡去皮尖研桃仁泡去皮尖研各一兩上和勻以浸藥酒煮麵糊和丸如梧桐子大每服五十丸空心鹽湯或鹽酒送下菴䕡丸治墜墮閃肭血氣凝滯腰痛菴䕡子當歸酒浸焙威靈仙破故紙炒杜仲炒桂心以上各五錢乳香別研沒藥別研各二錢半上為細末酒煮麵糊和丸如梧桐子大每服七十丸空心用鹽湯或鹽酒任下治腰痛如神方杜仲炒去絲木香各四兩官桂一兩上為細末每服二錢空心溫酒調下此藥活血化氣
