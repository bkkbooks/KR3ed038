body:
  text: 卷之十七脾胃門附論夫脾胃者清純沖和之氣位居中州其屬土也無物不入無物不包營衛出焉而脾又受胃之稟行其氣血灌溉諸經榮養百骸生髮諸陽上升之氣元氣由此而充焉故為十二經之海常以食入於胃散精於肝淫氣於筋食氣入胃濁氣歸心淫精於脈脈氣流經氣歸於肺肺朝百脈輸精皮毛毛脈合精行氣於腑腑精神明流於四臟氣歸於權衡權衡以平氣口成寸以決生死也飲入於胃遊溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸膀胱水精四布五經並行合於四時五臟陰陽揆度以為常也凡人之生皆以胃氣為本經云谷入於胃脈道乃行水入於經其血乃成若人絶水穀則死蓋胃氣絶而故也正所謂安穀則昌絶谷則亡水去則營散谷消則衛亡營散衛消將何以立此之謂也蓋天地以生五氣五味人之所養莫重於此慎勿以太過不及以傷其正故曰陰之所生本在五味陰之五宮傷在五味可不謹乎此乃大經大法故調經篇論云病生陰者得之飲食居處陰陽喜怒五亂交作病則身熱頭痛目眩體重四肢不收怠惰嗜臥實者則腹脹中滿停食霍亂虛者為嘔吐噦逆泄瀉浮腫噁心又曰飲食勞倦則傷脾脾傷則內閉九竅外壅肌肉衛氣散解此謂自傷氣之削也蓋脾好乾惡濕或濕邪所淫為五泄變為痢為疸原病式云諸濕腫滿皆屬脾土土衰則不能制水水泛四肢上乘於肺為腫為滿為喘為小便不利為泄瀉為飲食停積胃口脾不能克化鬱而為痰變生嗽喘眩暈嘈雜噯氣吞酸翻胃吐食胃脘當心而痛有脾間蟲動其為痛也氣血痰水食積風冷諸證之痛每每停聚而不散惟蟲痛則乍作乍止來去無定又嘔吐清沫之為可驗又有動氣按之牢若痛者脾胃虛之故也若人湯飲入胃至臍便欲小便者由精不輸於脾不歸於肺心火上攻令人口燥咽乾陰火太盛也東垣發明逮盡其旨之要人之百病皆由脾胃衰而生也至於經論天地之邪氣感則害人五臟六腑及形氣俱虛乃受外邪不因虛邪賊邪不能獨傷人乎豈不從脾胃虛而生明矣然所傷之因不一為病多端分而其略飲食傷胃勞倦傷脾飢則損氣飽則傷氣勞則氣耗逸則氣滯及喜怒憂恐皆能損胃之元氣而為不足之證惟飲食所傷者有異耳一則內弱強食填塞不化此有物也屬乎克伐一則中虛少食痞滿難運此不足也屬乎補養醫者便以飲食內傷中氣不和之病治之不分何物所傷又不審傷物之有無又不辨脾胃之強弱而據投局方之劑輕以香熱克化重以巴豆攻逐一途取利實實虛虛之禍豈小哉實者則已虛者愈損其胃甚至病轉危殆而死者有之今將治法分類施之是以物各有性若傷於飲者飲乃無形之物或微汗散之於表或淡滲利之於下或若濕以燥其中傷於食者或損谷以和之或強脾以磨之果因食物停滯甚盛而作悶亂者吐下以奪之中有物傷於寒者則熱之傷於熱者則涼之寒熱共傷者各從其性以和之傷於魚肉菜果之類求其氣之相剋而相制者用之如硇砂阿魏治肉積胡黃連麝香治果積神麯麥蘖礞石巴豆皆治酒積食積痰積是皆有形之物填塞不化必待驅逐然後從其所宜制之而得安豈可一例而用香熱藥也若夫飲食勞倦內傷中氣脾胃虛弱虛滿不食使營運減削不能輸精皮毛行氣六腑發為諸證此乃不足之邪理宜溫之和之調之養之必使生氣增益胃氣完而後愈也脾胃之證前人所論甚詳後學必須誠究決無實實虛虛之咎豈可輕易哉脾胃通治方嘉禾散治脾胃不和胸膈痞悶氣逆生痰不進飲食如五噎五膈並皆治之方見膈噎門四君子湯治脾胃不和不思飲食人參去蘆茯苓去皮白朮甘草炙各三錢上作一服水二盅煎至一盅不拘時服六君子湯治脾胃不和不思飲食人參去蘆茯苓去皮白朮甘草炙半夏湯泡七次陳皮去白各二錢上作一服水二盅生薑三片紅棗二枚煎至一盅食遠服平胃散治脾胃不和嘔吐噁心不思飲食蒼朮米泔水浸三錢厚朴去皮薑製炒陳皮去白甘草炙各二錢上作一服水二盅生薑三片紅棗二枚煎至一盅食遠服一方加草果名草果平胃散或為細末每服二錢用鹽湯調服亦可二陳湯理脾胃消痰飲陳皮去白茯苓去皮半夏湯洗甘草炙各三錢上作一服水二盅生薑三片煎至一盅食遠服參苓白朮散治脾胃不和飲食不進或致嘔吐泄瀉及大病後調理脾胃方見痢門千金大養脾丸治脾胃虛弱停寒留飲膈塞氣噎翻胃吐食常服養脾壯氣多進飲食枳殼麩炒神麯炒陳皮去白麥蘖炒三稜煨茴香炒白薑炮肉豆蔻縮砂去皮莪朮煨茯苓去皮良薑益智去殼胡椒木香藿香去梗土薏苡仁紅豆白朮丁香人參白扁豆炒苦梗山藥甘草各等分上為細末煉蜜和丸如彈子大每服一丸食遠細嚼用白湯或溫酒送下養胃湯治脾胃虛寒嘔逆噁心腹脅脹痛腸鳴泄瀉或有外感寒熱如瘧骨節煩疼宜服之藿香去梗土厚朴薑汁製炒半夏湯泡茯苓去皮各一錢半草果仁陳皮去白人參去蘆橘紅各二錢半甘草炙一錢白朮七分半上作一服水二盅生薑五片紅棗一枚烏梅半個煎至一盅食遠服丁沉透膈湯治脾胃不和痰逆噁心或時嘔吐飲食不進十膈五噎痞塞不通並皆治之丁香白豆蔻肉豆蔻青皮去白麥蘖炒各五分半夏湯泡神麯炒草果各三分沉香厚朴薑製炒藿香陳皮各七分香附子炒縮砂仁人參去蘆各一錢木香五分白朮二錢甘草炙一錢半上作一服水二盅生薑三片紅棗一枚煎至一盅食遠服透膈湯治脾胃不和中脘氣滯胸膈滿悶噎塞不通噫氣吞酸脅肋刺脹嘔逆痰涎食飲不下並皆治之木香白豆蔻縮砂仁檳榔枳殼麩炒厚朴薑製炒半夏湯炮青皮去白陳皮去白大黃朴硝甘草炙各一錢上作一服水二盅生薑三片紅棗一枚煎至一盅食遠服凝神散收斂胃氣清涼肌表人參白朮茯苓山藥各一錢半白扁豆知母生地黃粳米甘草各一錢淡竹葉地骨皮麥門冬各五分上作一服水二盅生薑三片紅棗一枚煎至一盅食遠服枳朮丸治痞消食強胃枳實去穰麩炒一兩白朮二兩上為細末用荷葉包米煨熟飯搗和丸如梧桐子大每服五十丸不拘時白湯送下木香和中丸治脾氣益腎水消腸胃中積聚癥瘕癖塊宣暢三焦和脾開利胸膈氣逆攻心脅肋脹滿痞痛身體困倦大小便不利並皆治之木香沉香檳榔枳實去穰麩炒青皮去白莪朮煨橘皮去白當歸酒浸黃芩去蘆木通去皮黃連白豆蔻郁李仁去皮另研牙皂連子酥炙三稜各一兩縮砂仁二兩半香附子去毛黃柏去皮各三兩牽牛取頭末大黃蒸各四兩上為細末滴水為丸如梧桐子大每服二錢不拘時生薑湯下或茶湯下亦可治中湯治脾胃不和嘔逆霍亂中滿虛痞或致泄瀉人參去蘆乾薑炮青皮去白陳皮去白白朮甘草炙各二錢上作一服水二盅煎至一盅空心服如嘔吐不已加半夏二錢丁香一錢名丁香溫中湯進食散治脾胃虛冷不思飲食青皮去白陳皮去白良薑炒肉桂去粗皮川烏頭炮草果甘草炙各一錢半訶子煨去核一錢上作一服水二盅生薑五片煎至一盅空心服思食調中丸治脾胃久弱三焦不調氣滯胸膈痞悶不食嘔吐噁心或吐痰水人參檳榔各七錢半神麯炒麥蘖炒陳皮去白半夏曲木香沉香各半兩烏藥一兩白朮一兩半上為細末蜜調白麵打糊為丸如梧桐子大每服三十丸食遠用米飲湯送下八味湯治脾胃虛寒氣不升降心腹刺痛臟腑虛滑吳茱萸湯洗七次乾薑炮肉桂去粗皮人參去蘆當歸洗炮丁香木香陳皮各一錢半上作一服水二盅煎至一盅不拘時服補脾湯治脾胃虛寒泄瀉腹滿氣逆嘔吐飲食不消人參去蘆茯苓去皮草果去皮乾薑炮麥蘖炒甘草炙各一錢半厚朴去皮薑製陳皮白朮各一錢上作一服水二盅煎至一盅空心服養脾丸治脾胃虛寒心腹脹滿嘔逆噁心臟寒泄瀉人參去蘆白茯苓去皮麥蘖炒各四兩白朮二兩縮砂去皮乾薑炮各八兩甘草炙十二兩上為細末煉蜜和丸每兩作八丸每服一丸不拘時細嚼用生薑湯送下白朮湯理脾和胃順氣進食白朮厚朴桂心乾薑桔梗人參茯苓當歸甘草各一錢半上作一服水二盅生薑三片棗二枚煎至一盅不拘時服天下受拜平胃散治脾胃不和嘔吐痰水脅膈痞滯不美飲食並皆治之茅山蒼朮去皮米泔浸一宿五兩炒厚朴去皮薑製陳皮甘草炙生薑各三兩紅棗二百枚去核上件用水五升煮乾搗作餅子晾乾再研為細末每服二錢食遠用鹽湯調服治泄瀉用生薑湯調下和中益氣丸治脾胃不和氣不升降嘔吐減食口苦吞酸脅滿短氣肢體怠惰面色萎黃中焦虛痞不任攻擊臟氣久寒不受峻補又療心脅愊愊如滿五飲停滯不散常服和中益氣進美飲食或大便不通尤宜服之木香丁香各半兩肉豆蔻茴香微炒京三稜炮銼白豆蔻人參去蘆官桂去粗皮各一兩縮砂仁二兩青皮去白陳皮去白各四兩上為細末用白麵糊為丸如梧桐子大每服六十丸到七十丸食遠用溫生薑湯送下安神丸消食健脾益氣進美飲食人參縮砂香附子炒去毛三稜莪朮煨青皮陳皮神麯炒麥蘖炒枳殼炒去穰各等分上為細末用粳米煮糊為丸如梧桐子大每服三十丸空心用米飲送下鹽湯下亦得快活丸消導飲食順氣健陽住小便丁香木香官桂茴香各三錢乾薑蒼朮去皮炒各半兩上為細末醋煮糊為丸如梧桐子大每服五七十丸食前用好酒送下延年草邢和璞真人常服安神導氣消酒食益脾胃老人小兒皆可服清晨食後嚼數片安神健體賜呂申公劉斯立祕之名延年草上等白鹽花五兩再淋煎用須要雪白新舶上茴香四兩青皮一斤湯浸三日換水候苦味出盡然後去穰切作指面大方去子甘草六兩炙銼稱上用甜水一斗同藥入銀鍋內熬不住手攪勿令著底置密器中收不得走氣候水盡取出慢火炒令乾不得有炒焦氣選勤謹者一人專一掌之去甘草茴香不用只取貯青皮如傷生冷及果實蔬菜之類即嚼數片氣通即無恙常服一兩片極佳以其尤宜老人邢和璞所以名延年草斯立又以延年目之也一方治心腹虛膨手足厥冷或飲苦澀涼劑晨朝未食先嘔或聞食即吐不思飲食此乃脾胃虛弱上用山藥銼如小豆大一半銀石器內炒熟一半生用為末不拘時用米飲調二錢服之闢寒湯治脾寒胃弱嘔逆噁心腹脅脹痛茴香三兩高良薑二兩胡椒半兩丁香一分甘草二兩銼白鹽三兩同甘草炒上為細末每服一錢不拘時沸湯調服丁附丸治脾胃虛寒嘔吐不止丁香一兩附子炮草豆蔻麵煨胡椒各半兩上為細末煉蜜和丸如梧桐子大每服十五丸不拘時嚼細煎橘皮湯下棗附丸治脾氣虛弱大腸冷滑臟腑泄瀉米穀不化飲食無味乏力短氣常服益脾壯氣方見泄瀉門神麯丸治脾胃冷氣不和心腹㽱痛脅肋氣滯不思飲食四肢少力神麯一兩炒微黃乾薑炮銼附子炮裂去皮臍橘皮湯浸去白焙甘草炙微赤銼桂心各半兩當歸銼微炒人參去蘆各三分檳榔一兩上為細末煉蜜和搗二三百杵丸如梧桐子大每服二十丸不拘時生薑橘皮煎湯下至靈散療食飽煩悶但欲臥而腹痛用神麯炒令香黃為細末不拘時用米湯調服方寸匕用大麥蘖亦佳白豆蔻丸治脾胃不和不能飲食白豆蔻去皮一兩乾薑炮裂白朮各三分上為細末煉蜜和丸如梧桐子大每服二十丸用薑棗煎湯送下空心食前服脾不磨方脾虛不磨寒心胸腹滿腹脹如物攻但將五膈煎三服可送尋常小理中傷脾方病後傷脾胸膈滿老人強食氣必短更兼可食噁心來草果寬中煎一碗上病後傷脾經令人氣必短用寬中散加草果二個灰火炮銼用水二盅生薑十片煎至八分去滓不拘時服四炒健脾散進食極妙蒼朮四兩麩炒乾薑四兩灰炒烏頭六兩以江水浸七日取出切片以鹽四兩炒乾或先切片子以江水浸兩日炒黃為度同鹽取出甘草五兩半炒上為細末每服一錢食前用白湯入鹽調服消穀丸治脾胃氣弱飲食多傷胸膈痞悶可思飲食肉豆蔻麵裹煨檳榔火炮各一枚神麯二兩炒青皮去白京三稜炮切橘皮去白麥蘖炒各一兩木香半兩上為細末用湯浸蒸餅和丸如梧桐子大每服五十丸食後用橘皮湯送下丁香附子散治脾胃虛弱胸膈痞結吐逆不止丁香四十九粒附子一兩煮生薑半斤取自然汁半碗上將附子鑽孔四十九個以丁香填在孔內將生薑汁用文武火熬盡取大羅卜一個取一穴子入附子在內仍以羅卜蓋之用文武桑柴火燒香熟為度取出附子切片焙乾為細末每服一錢用米湯一盞調服日進三服甚妙粟附丸治脾胃氣虛四肢倦怠肌體瘦弱臟腑受濕大便頻數不思飲食陳粟米一升附子一兩上同入鍋銚內用水煮令附子透取出附子切作片焙乾別取陳粟米半升水淘淨控干慢火炒令香熟同附子碾為細末卻用元煮附子者粟米飲和為丸如梧桐子大每服三十丸加至五十丸陳橘皮湯下空心食前服和胃丸治脾胃不和中脘氣痞心腹脹悶不思飲食嘔吐痰逆噫氣吞酸面色萎黃肌肉消瘦腹脅刺痛便利下調少力嗜臥體重節痛及治虛勞脾胃弱飲食不化心腹痞痛並宜常服老幼氣弱皆可能和中溫脾胃進飲食厚朴去粗皮銼碎以生薑二兩搗碎同炒鱉甲九斤大者一個黃泥外固以米醋半碗化開硇砂一兩放鱉甲內慢火熬干取出細研如粉用半夏一半湯洗日乾後炒一半薑汁製作餅子炙神麯炒微黃麥蘖炒微黃白朮銼炒肉桂去粗皮各二兩枳殼去穰麩炒三稜炮青皮去白人參各三兩訶子炮去核陳皮去白各四兩檳榔當歸各一兩半芍藥甘草炙各一兩赤茯苓去皮乾薑炮各三分上為細末煉蜜和丸如小豆大每服二十丸加至三十丸微嚼碎用溫水送下不拘時服大建脾丸調中養氣和胃健脾治中焦積寒胸膈氣痞嘔逆噁心腹脅疼痛臟腑虛滑飲食多傷困倦少力肢體怠惰少精神肉桂去粗皮銼厚朴去粗皮細銼用生薑一兩研碎同淹一宿炒令香熟甘草炒各一兩肉豆蔻麵裹煨乾薑炮丁香胡椒附子炮去皮臍木香蓽茇神麯炒麥蘖炒人參去蘆白茯苓去皮白豆蔻白朮各半兩訶子麵裹煨去核二錢半上為細末煉蜜和丸彈子大每服一丸細嚼用溫水飲送下食前服吳茱萸丸大理脾胃胸膈不通調中順氣方治冬三月陰氣在外陽氣內藏當外助陽氣不得發汗內消陰火勿令泄瀉此閉藏周密之大要也盛冬乃水旺之時水旺則金旺子能令母實肺者腎之母皮毛之陽元本虛弱更以冬月助其令故病者善嚏鼻流清涕寒甚出濁涕嚏不止比常人大惡風寒小便數而欠或上飲下便色清而多大便不調夜寒無寐甚則為痰咳為嘔為噦為吐為唾白沫以致口開目瞪氣不交通欲絶者此藥主之吳茱萸草豆蔻仁各二錢二分益智仁人參黃耆升麻各八分白殭蠶澤瀉薑黃柴胡各上分當歸身甘草炙各六分木香二分青皮三分半夏一錢大麥蘖一錢五分橘皮八分上為細末用湯浸蒸餅為丸如緑豆大每服三十丸細嚼用白湯送下無時夏三月大暑陽氣在外陰氣在內以此病而值此時是天助正氣而勝其邪氣不治而自愈然亦有當愈而不愈者蓋陰氣極盛正氣不能伸故耳且如膈噎不通咽中如梗甚者前證俱作治法當從時利膈丸瀉肺火以黃耆補中湯送下如兩足酸厥行步頽然欹側欲倒癖臑如折及作痛而無力或氣短氣促而喘或不得倚息以黃耆人參甘草白朮蒼朮澤瀉豬苓茯苓橘皮等作湯送下滋腎丸一百五十丸六七月之間濕熱之令大行氣短不能言者加五味子麥門冬如心下痞膨悶食不下以上件白朮蒼朮等湯下消痞丸五七十丸更審而用之溫脾散青皮陳皮縮砂仁乾葛舶上茴香炒桔梗白芷良薑厚朴各一兩木香香附子麥蘖白朮各半兩紅豆三分甘草一兩半上㕮咀每服三錢水一盞半棗一枚煎七分空心服大藿香散大治一切心肺脾胃虛寒為萬病服之皆愈盛季文傳於賀方回云頃在河朔因食羊肝生脾胃泄瀉膿血仍發嘔吐霍亂心腹撮痛時出冷汗四肢厥逆不可忍邑宰万俟湜懷此藥煎以進再服即定藿香葉三兩白乾薑半兩炮木香青皮去白麩炒神麯炒人參去蘆良薑炒肉豆蔻麵裹煨訶子煨去核白茯苓大麥蘖炒厚朴薑汁製炒陳皮去白甘草炙各一兩上為細末每服二錢吐逆瀉痢不下食或嘔酸苦水翻胃噁心並用水一盞煨生薑半塊擘破同煎鹽一捻安盞中候煎藥七分熱呷水瀉滑泄腸風臟毒陳米飲熱調入鹽少許下赤白痢煎甘草黑豆湯下脾元受虛邪變為寒熱或脾胃虛冷醋心氣脹宿滯酒食噫滿不化膈上不快面色積黑痰氣作暈頭目眩掉水一盞薑三片棗一枚擘開同煎七分入鹽少許嚼薑棗湯熱服胃氣吃噫生薑自然汁半茶腳入鹽點熱呷絶不思食或吃少氣弱膈滿煨薑一小塊先嚼入鹽點熱吃中酒亦如之一切氣膈變成百病如上服之不拘時如湯點入鹽薑紫蘇尤佳大能消食順氣利膈開胃攻效不可細述白朮沉香散墜氣益脾胃沉香人參白茯苓半夏曲木香訶子肉乾薑各一兩乾山藥白朮各一兩半丁香半兩附子二個炮甘草八錢上為細末每服二大錢水一中盞生薑三片棗子一枚木瓜一片煎七分食前服桂曲丸健脾胃進飲食克化生冷溫中下氣治食少易傷胸滿噁心或心腹疼痛病後衰弱氣不復常桂心陳皮湯浸去白肉豆蔻麵裹煨縮砂仁良薑微炒乾薑炮蓽茇人參白朮各一兩神麯三兩銼炒熟丁香甘草銼炒各半兩上為細末用湯浸蒸餅和丸如梧桐子大每服五十丸加到七十丸食前用米飲送下豆蔻橘紅散溫脾養胃升降陰陽和三焦消宿食白豆蔻去皮橘紅去白人參去蘆厚朴薑製半夏曲炒神麯炒乾薑炮藿香葉去土白朮甘草炙各半兩丁香木香各一兩上㕮咀每服三錢水一盞生薑三片棗一枚煎至七分食前溫服術香啓中湯補脾胃進飲食寬膈順氣木香人參白朮茯苓陳皮半夏枳殼香附縮砂白豆蔻甘草各等分上㕮咀每服六錢水一盞半生薑七片棗一枚同煎至八分去滓不拘時溫服丁香和胃丸治脾胃不和中脘氣痞胸膈停痰嘔吐噁心脅肋刺痛飲食無味肢體倦怠常服溫中和胃止嘔進食丁香木香沉香各半兩藿香葉白豆蔻去皮白茯苓去皮陳皮去白白朮人參各一兩半夏三兩薑製上為細末生薑汁煮麵糊和丸如梧桐子大每服三十丸加至五十丸不拘時用生薑湯送下是齋安中湯治腸胃一切寒疾不利三稜炮莪朮炮乾薑炮良薑炒草果仁益智仁陳皮不去白甘草炙各一兩一分神麯炒麥蘖炒各三分上為細末每服二錢食遠用鹽湯調服七珍散開胃養氣溫脾進食人參白朮茯苓黃耆蜜炙山芋粟米炒甘草各一兩上為末每服三錢水一盞生薑三片棗二枚煎服又方加白扁豆一兩蒸用名八珍散豫制此方溫平不熱每有傷寒瘧疾中暑得瘥之後用此藥調理脾胃日三四服十日之外飲食倍常建脾湯大益脾胃消痰進食早出胃冷及酒病尤宜服生薑一斤洗淨切碎磁盒內用鹽四兩醃一宿日中拌曬以鹽水盡為度草豆蔻去皮焙乾陳皮去白神麯炒麥蘖炒勿焦甘草炙各二兩上為細末每服一錢半用白湯調空心食前服理中丸溫脾暖胃逐痰消飲順三焦進飲食闢風寒濕冷之邪及大病瘥後胸中有寒涕唾不止及治婦人新産五臟俱虛血脈未定腹痛作瀉最為急證並宜服之人參白朮乾薑炮甘草炙各一兩上為細末煉蜜和丸每一兩作十丸每服一丸食前用沸湯化服嚼食亦可或丸如梧桐子大熟水下五七十丸脾病方云肺寒作嗽加五味子阿膠等分脾肺俱受虛寒作嗽不止加胡椒八分服一名胡椒理中丸二方能理脾溫胃散寒止嗽功效特異脾屬土肺屬金土能生金脾為肺母母能令子實肺受寒而溫理脾胃者此其意也又治心腹絞痛霍亂轉筋一切沉寒痼冷加附子等分每服一丸用水煎化服名附子理中丸益中丸健脾暖胃消化冷痰治中滿脹悶噫氣吞酸心腹時痛不進飲食神麯炒麥蘖炒乾薑炮良薑炒陳皮各二兩枳殼去穰麩炒肉豆蔻麵裹煨丁香各半兩上為細末麵糊和丸如梧桐子大每服五十丸食遠溫米飲或白湯送下秦綾錦家二十四味養脾丸治風冷寒濕邪氣腹脹痞滿刺痛腸鳴泄瀉吐逆吞酸羸弱困倦無力不思飲食一切脾胃之疾並宜服之丁香沉香木香各一錢半附子炮去皮臍六錢陳皮去白大腹皮神麯炒各半兩大麥蘖炒肉桂去皮不見火白朮各一兩半厚朴去皮薑製三兩訶子煨去核一個三錢人參去蘆茯苓各四錢縮砂八錢蓽澄茄白附子炮良薑油炒紅豆去紅皮胡椒炒蓽茇川薑炮甘草炙各二錢生薑十四兩切作片焙乾上為細末煉蜜和丸如彈子大每服一丸細嚼用白湯送下食前服六君子湯治胸膈痞悶脾寒不嗜食服燥藥不得者宜服人參白朮茯苓陳橘皮半夏枳殼各等分上㕮咀每服五錢水二盞生薑五片煎至一盅去滓不拘時溫服胃愛散治脾胃久虛中焦氣滯壅上或有冷涎上潮嘔惡或胸腹疼痛不思飲食人參一兩白朮茯苓丁香甘草各一分肉豆蔻三個黃耆乾薑各半兩上用白米二盞同碾為細末每服二大錢水一盞入生薑一片同煎至七分通口服如臟腑不調加丁香十四粒石蓮肉七粒同煎如前法空心食前服桂附丸和脾胃進飲食桂心香附子厚朴陳皮蒼朮三稜阿魏別研甘草各半兩肉豆蔻一個煨上為細末酒煮麵糊和丸如龍眼大每服一丸生薑一塊切開作孔安藥在內合定用濕紙裹煨候熟嚼細鹽湯下沉香養脾丸沉香一分人參白朮肉豆蔻麵裹煨乾薑炮縮砂丁香木香甘草炙各半兩上為細末煉蜜和丸每兩作十丸每服一丸食前細嚼用白湯送下或化下亦可運脾散通中健胃消食快氣人參白朮藿香肉豆蔻丁香縮砂神麯各一兩甘草半兩上為細末每服二錢不拘時用橘皮湯調服安胃丸治寒邪傷胃溫中補氣安胃進食木香一錢半縮砂白茯苓青皮各二錢乾薑炮陳皮各三錢大麥蘖白朮各五錢上為細末湯浸蒸餅和丸如梧桐子大每服三十丸食前用溫水送下忌冷物大黃瀉熱湯治脾脈厥逆大腹中熱切痛舌強腹脹身重食不下心注脾急痛大黃三兩細切以水一升半別浸一宿茯苓澤瀉黃芩橘皮細辛芒硝各二兩甘草三兩上㕮咀除大黃芒硝外以水七升煮至三升三合去滓下大黃更煎兩沸再去滓下芒硝分作三服瀉黃散治脾胃壅實口內生瘡煩悶多渴頰痛心煩唇乾燥壅滯不食防風去蘆四兩藿香七錢石膏煨縮砂仁山梔仁甘草炙各半兩上㕮咀每服五錢水一盞半煎七分去滓食後溫服參附大正氣散治男子婦人虛弱及瘧安後體氣尚虛眼昏暗加淨枸杞子揀菊花蕊各半兩常服順氣快脾進美飲食附子一個炮去皮臍人參去蘆木香不見火藿香縮砂仁檳榔白茯苓益智仁沉香不見火草果仁煨丁香不見火白朮各半兩陳皮去白香附去毛炒肉桂不見火烏藥炒黃青皮去白枳殼去穰麩炒黃耆擘開鹽水浸厚朴薑製粉草炙各一兩上㕮咀每服四錢水二盞生薑三片棗一枚煎至八分去滓空心服參苓壯脾丸治脾胃虛弱胸膈痞悶脅肋脹滿心腹刺痛翻胃吐食口苦吞酸脅滿短氣肢體怠惰面色萎黃及中焦痞悶不任攻擊臟腑虛寒不受峻補或因病後氣衰食不復常或元稟受怯弱不能飲食及久患泄痢腸胃虛滑者並宜服之人參茯苓去皮白朮肉桂去粗皮不見火乾薑縮砂仁胡椒麥蘖炒神麯炒山藥扁豆炒各等分上為細末煉蜜和丸如彈子大每服一丸空心細嚼用白湯或溫酒送下常服育養神氣和補脾胃進美飲食啓脾丸治脾胃不和氣不升降中滿痞塞心腹膨脹腸鳴泄瀉不思飲食宜此最佳人參白朮青皮湯洗去穰陳皮湯洗去穰神麯炒麥蘖炒縮砂仁乾薑炮厚朴去粗皮銼生薑汁製各一兩甘草炙一兩半上為細末煉蜜和丸如彈子大每服一丸食前細嚼用米飲送下升陽益胃湯脾胃虛乏怠惰嗜臥四肢不收時值秋燥令行濕熱少退體重節痛口苦舌乾飲食無味大便不調小便頻數不嗜食食不消兼見肺病灑淅惡寒慘慘不樂面色惡而不和乃陽氣不伸故也當升陽益胃黃耆二兩半夏湯洗此一味脈澀者宜用人參去蘆甘草炙以上各一兩防風以其秋旺故以辛溫瀉之白芍藥羌活獨活以上各五錢橘皮不去白四錢茯苓小便利不渴者勿用澤瀉不淋勿用柴胡白朮以上各三錢黃連二錢何故秋旺用人參白朮芍藥之類反補肺為脾胃虛則肺最受病故因時而補易為力也上㕮咀每服三錢水三盞生薑五片棗二枚去核煎一盞去滓溫服早飯午飯之間服之禁忌如前其藥漸加至五錢止服藥後如小便罷而病加增劇是不宜利小便當少去茯苓澤瀉若喜食初一二日不可飽食恐胃再傷以藥力尚少胃氣不得轉運升發也須薄滋味之食或美食助其藥力益升浮之氣而滋其胃氣也慎不可淡食以損藥力而助邪氣之降沉也可以少役形體使胃與藥得轉運升發慎勿大勞役使復傷若脾胃得安靜尤佳若胃氣稍強少食果以助谷藥之力經云五穀為養五果為助者也黃耆人參湯脾胃虛弱必上焦之氣不足遇夏天氣熱盛損傷元氣怠惰嗜臥四肢不收精神不足兩腳痿軟遇早晚寒厥日高之後陽氣將旺復熱如火乃陰陽氣血俱不足故或熱厥而陰虛或寒厥而氣虛口不知味目中溜火而視物慌慌無所見小便頻數大便難而結祕胃脘當心而痛兩脅痛或急縮臍下周回如繩束之急甚則如刀刺腹難舒伸胸中悶塞時顯嘔噦或有痰嗽口沃白沫舌強腰背胛眼皆痛頭痛時作食不下或食入即飽全不思食自汗尤甚若陰氣覆在皮毛之上皆天氣之熱助本病也乃庚大腸辛肺金為熱所乘而作當先助元氣理治庚辛之不足以此藥主之黃耆一錢如自汗過多更加一錢升麻六分人參去蘆橘皮不去白麥門冬去心蒼朮無汗更加五分白朮以上各五分當歸身酒洗炙甘草各二分五味子九個炒曲黃柏酒洗以救水之源以上各三分上㕮咀作一服水二盞煎至一盞去滓稍熱服食遠或空心服之忌酒濕面大料物之類及過食生冷物如心下痞悶加黃連二分或三分如胃脘當心痛減大寒藥加草豆蔻仁五分如脅下痛或縮急加柴胡二分或三分如頭痛目中溜火加黃連二分或三分川芎三分如頭痛目不清利上壅上熱加蔓荊子川芎以上三分藁本生地黃以上各二分細辛一分如氣短精神如夢寐之間困乏無力加五味子九個如大便澀滯隔一二日不見者致食少食不下血少血中伏火而不得潤也加當歸身生地黃麻子仁泥以上各五分桃仁三枚湯泡去皮尖另研如大便通行所加藥勿再服如大便久不快利勿用別藥少加大黃煨五分如不利者非血結血祕而不通也是熱則生風其病人必顯風證單血藥不可復加之止常服黃耆人參湯藥只用羌活防風以上各二錢二味㕮咀以水四盞煎至一盞去滓空心服之其大便必大走也一服便止如胸中氣滯加青皮皮薄清香可愛者一分或二分並去白橘皮倍之去其邪氣此病本元氣不足惟當補元氣不當瀉之如氣滯太甚或補藥太過病人心下有憂滯鬱結之事更加木香縮砂仁以上各二分或三分白豆蔻二分與正藥同煎如腹痛不惡寒者加白芍藥五分黃芩二分卻減五味子升陽除濕湯治脾胃虛弱不思飲食腸鳴腹痛泄瀉無度小便黃四肢困倦並宜服此蒼朮一錢半夏益智澤瀉羌活防風神麯柴胡升麻各半錢豬苓陳皮麥蘖如胃寒腸鳴者加甘草各三分上㕮咀作一服水三盞生薑三片棗二枚煎至一盅去滓空心服益胃湯治頭悶勞動則微痛不喜飲食四肢怠惰躁熱氣短口不知味腸鳴大便微溏黃色身體昏悶口乾不喜食冷蒼朮一錢半當歸梢升麻陳皮各五分人參白朮柴胡益智仁黃芩各三分半夏黃耆甘草各二分上㕮咀作一服水二大盞生薑三片煎至一盞去滓食前稍熱服忌飲食失節生冷硬物及酒濕面一方用紅花少許名人參益胃湯草豆蔻丸治脾胃虛弱而心火乘之不能滋榮上焦元氣遇冬腎與膀胱寒水旺時子能令母實以致肺金大腸相輔而來克心乘脾胃此大復仇也經云大勝必大復理之常也故皮毛血脈分肉之間元氣已絶於外只大寒大燥二氣並乘之則苦惡風寒耳鳴及腰背相引而痛鼻息不通不聞香臭額寒腦痛大惡風寒目時眩不欲開腹中為寒水反乘痰唾沃沫食則反出腹中常痛及心胃作痛脅下縮急有時而痛腹不能努大便多瀉而少祕下氣不絶或腹中鳴此脾胃虛之至極也胸中氣亂心煩不安而為霍亂之漸咽膈不通極則噎塞有聲喘喝閉塞或於日陽處或於暖室中少緩口吸風寒之氣則復作四肢厥逆身體沉重不能轉側頭不可以回顧小便泄而時躁此藥主之秋冬寒涼大復氣之藥也草豆蔻麵裹煨熟為度用仁一錢四分神麯柴胡詳脅下痛多少用之薑黃以上各四分當歸身青皮生甘草炙甘草各六分黃耆人參益智仁吳茱萸湯洗焙乾白殭蠶陳皮以上各八分澤瀉小便數減半半夏湯洗各一錢麥蘖炒一錢五分桃仁七個湯浸去皮尖另研上除桃仁外余藥為細末同研勻湯浸蒸餅和丸如梧桐子大每服五七十丸食遠用白湯送下斟酌加減和中丸治脾胃怯弱陰陽不和三焦氣滯心腹痞悶嘔逆痰甚頭目不清困倦少力飲食減少肌體瘦瘁肢節煩疼常服和中順氣升降陰陽消痰止嘔長肌起困進美飲食藿香葉去土人參去蘆陳皮巴豆二錢半同炒焦去巴豆不用以上各一兩白朮白茯苓去皮半夏湯泡七次生薑汁浸以上各二兩丁香不見火木香不見火各半兩上為細末麵糊為丸如梧桐子大每服五十丸食前生薑湯送下一方用生薑汁煮麵糊和丸食遠米湯下木香消穀丸治脾胃俱虛不能克化水穀胸膈痞悶腹脅時脹連年纍月食減嗜臥口苦無味虛羸少氣又治胸中有寒飲食不下翻胃噁心霍亂嘔吐及病後新虛不勝穀氣或因病氣衰食不復常並宜服之木香半兩青皮洗淨焙乾陳皮洗淨焙乾各四兩辣桂去粗皮乾薑炮各二兩牽牛取頭末八兩半生半炒上為細末麵糊和丸如小豆大每服十五丸加至二十丸不拘時用米飲送下加減思食丸治脾胃俱虛水穀不化胸膈痞悶腹脅時脹連年纍月食減嗜臥口苦無味虛羸少氣又治胸中有寒飲食不下反胃噁心霍亂嘔吐及病後新虛不勝穀氣或因病氣衰食不復常並宜服之神麯炒黃麥蘖炒黃各二兩烏梅四兩乾木瓜切半兩白茯苓去皮揀甘草細銼炒各二錢半上為細末煉蜜和丸如櫻桃大每服一丸不拘時細嚼用白湯送下如渴時噙化一丸生津液進飲食一方無木瓜茯苓有人參乾薑各一錢法制薑附丸治脾胃虛弱香附子炒去毛稱一斤用泔水浸秋冬三日夏春一日一夜漉出新水浸洗入銀器中水三碗令香附上有水寸余次取大蒜二十個去皮搗鋪在香附上慢火熬之候蒜如糊即用銀匙不住手攪二三百轉以蒜不見汁干為度取出待冷每香附子一個切作四五段慢火焙乾候冷入後藥神麯炒黃六兩乾薑炮四兩蓽茇丁皮縮砂仁炒胡椒各二兩上為細末用蒸餅湯浸一宿用布包裹水和藥如難丸入少麵糊和丸如梧桐子大每服五十丸不拘時白湯送下更加淨陳皮二兩用鹽水浸焙乾尤妙如寒加附子二兩桂一兩周馬帥之祖承奉因靖康初自泗州逃難山陽夜行墜古冢中已先有人在矣至曉各散出於冢外得幅紙裹太平錢八十四文紙上有此藥方云江南上下人弱疾常作於脾胃脾元壯實則飲食美健自然無病壯脾有藥名曰法制薑附丸先祖甫弛簷即合此藥無日不服一生無疾壽年八十四祖母安人服之壽九十六母永國夫人服之壽九十八婆婦雖老皆飲食不減壯年甚妙水沃雪丹治脾胃弱腹脹減食甚者成水氣作水治即愈附子四兩去皮臍切作片子同小豆四升水一斗煮令水盡揀出附子焙乾為末上用生薑自然汁煮麵糊和丸如梧桐子大每服三十丸加至五十丸食後陳皮湯下溫中良薑丸溫脾胃順三焦治寒痰聚結氣壅不通食則輒吐咽膈噎悶兩脅刺痛嘔吐噦逆噫醋噁心中滿短氣惡聞食臭及療留飲腸鳴濕澀腹瀉注下盡止常服健脾胃美飲食闢寒邪養正氣高良薑四斤炒乾薑炮白朮各二斤四兩肉桂去粗皮二十八兩甘草一斤炙上為細末煉蜜和丸每兩作十二丸每服一丸空心食前細嚼用生薑橘皮湯下或米飲下亦可和胃丸治脾胃虛冷食即嘔逆水穀不化或時泄利厚朴去粗皮生薑汁炙透四兩乾薑炮當歸切焙各一兩半檳榔銼桔梗焙人參各一兩半夏湯洗七次去滑陳皮湯浸去白焙白朮各二兩甘草炙半兩訶黎勒皮三分上為細末酒煮糊和丸如梧桐子大每服十五丸漸加至二十丸溫生薑棗湯下米飲下亦得不拘時服大溫脾丸治脾胃中冷水穀不化心腹疼脹嘔逆吞酸不思飲食神麯五兩乾薑人參桔梗甘草炙各三兩麥蘖炒吳茱萸桂心各五兩附子炮去皮臍細辛各二兩枳實三枚炙上為細末煉蜜和丸如梧桐子大空心食前酒下七丸加至十五丸日三服忌海藻菘菜豬肉生菜一方米飲下張氏建中湯治脾胃虛弱冒犯風冷腹痛腸鳴泄瀉經云食畢而下謂之洞泄手足厥冷面色青白下部虛寒中滿氣短常服寬中健脾養胃育真固氣大效附子炮去皮臍胡椒桂心吳茱萸湯洗焙川烏炮去皮臍乾薑炮良薑炒蓽茇各等分上為細末醋煮糊和丸如梧桐子大每服五十丸漸加至一百丸空心食前用米飲吞下雞舌香散治脾受寒濕時作疼痛良薑四兩用好油四兩炸令紫色上為細末每服一錢入鹽一捻沸湯調服空心食前服治脾疼上用荔枝核為末每服二錢熟醋湯調下脾疼單方張忠順盛夏調官都城苦熱食冰雪過多又飲木瓜漿積冷於中遂感脾疼之疾藥不釋口殊無退證纍歲日齋道人適一道人曰我受官人供固非所借但取漢椒二十一粒浸於漿中盆內一宿漉出還以漿水吞之若是而已張如所戒明日椒才下腹即脫然更不復作炙雞散治脾胃氣虛腸滑下痢方見痢門治脾胃氣冷吃食嘔逆下痢赤白如麵糊腰腹作痛上用豬腎一對細研著胡椒陳皮鹽醬椒末等搜面如常法作餛飩煮熟空心吃立瘥治脾胃氣弱下痢日夜不止腸滑不下食上用野雞一隻如常法細切著陳皮椒蔥鹽醬調和作餛飩煮熟空心食之松脂丸治脾勞胃氣不和時有泄瀉食少無力宜服松脂肉豆蔻去殼蓽茇縮砂去皮人參去蘆乾薑炮木香白茯苓麥蘖炒黃白朮以上各一兩訶子煨去核二兩陳皮湯浸去白半兩炒上為細末用白蠟熔和丸如梧桐子大每服三十丸食前用粥飲送下六君子湯治臟腑虛怯心腹脹滿嘔噦不食腸鳴泄瀉人參白朮茯苓甘草訶子煨去核肉豆蔻濕紙裹煨銼用厚紙包壓去油以上各等分上㕮咀每服三錢水二盅生薑三片棗二枚煎至一盅不拘時服或為細末用熱鹽湯調服亦可豬臟丸治臟寒泄瀉飲食不進氣體倦怠吳茱萸揀去枝梗不以多少水浸透上用獖豬頭一截去脂膜淨洗將茱萸入臟內兩頭用線扎定慢火煮令極爛用甑蒸熟尤好二味於臼內搗千下令極細丸如梧桐子大每服五十丸食前米湯下蓼酒治胃脘不能飲食耳目不聰明四肢無力冬臥腳冷服此酒十日後耳目聰明精神充壯上於八月三日取蓼曝燥把之如五升大六十把水六石煮一石去滓釀酒如常法隨多少飲之其功甚速麥門冬湯治胃熱腸寒飲食數飢小腹脹滿麥門冬去心焙甘草炙銼各二兩羌活白茯苓去皮旋覆花玄參白朮柴胡去苗白芍藥人參升麻桑根白皮銼當歸切焙各一兩木香半兩胡黃連一分乾地黃焙一兩半上㕮咀每服三錢水一盞入甘草一寸同煎至八分去滓不拘時溫服大腹木香湯治胃寒腸熱腹脹泄瀉大腹子銼半夏湯洗七次焙木香銼各二兩枳殼去穰麩炒前胡去蘆白芷銼肉桂去粗皮陳橘皮湯浸去白焙白朮各一兩延胡索當歸切焙旋覆花柴胡去苗芍藥甘草炙各半兩乾薑炮人參各三分上㕮咀每服三錢水一盞生薑三片紅棗三枚煎至六分去滓食前稍熱服當歸黃連丸治胃寒腸熱腹脹泄利當歸銼焙黃連去須各二兩赤茯苓去皮吳茱萸湯洗焙乾炒厚朴去粗皮薑汁製訶子炮去核木香以上各一兩上為細末煉蜜和丸如梧桐子大每服三十丸食前用米飲送下日三升麻湯治胃熱消穀善飢不生肌肉病名食㑊升麻山梔仁赤茯苓去皮射干各三兩芍藥四兩白朮五兩生地黃汁蜜各一升上六味㕮咀每服六錢水一盞半煎一盞去滓入生地黃汁半合再煎兩沸次下蜜半匙共煎取一盞溫服薑棗丸治胃寒痰多噫醋吞酸胸膈不利不思飲食生薑去皮切片焙乾四兩附子炮裂去皮臍丁香以上各一兩上為細末用蒸熟棗肉和為丸如梧桐子大每服十五丸加至二十丸不拘時用米飲送下
