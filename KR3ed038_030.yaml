咽下便仰臥低枕想藥入於肺中須臾得睡其嗽立止黑金散治久咳嗽喘急豬蹄合子黑者四十九枚水浸洗淨天南星大者一枚款冬花帶葉者半兩研上用瓶子一枚鋪豬蹄合子在內上以天南星勻蓋之合了鹽泥赤石脂固濟火煅白煙出為度候冷取出入款冬花末並麝香一分龍腦少許同研每服一錢食後煎桑根白皮湯調下若年少即用生犀中年即用羚羊角末半兩代豬蹄合子青金丹治肺虛壅咳嗽喘滿咯痰血杏仁去皮尖一兩用牡蠣煅成粉與同杏仁炒黃色去牡蠣粉不用青黛一兩上研勻用黃蠟一兩溶化搜和丸如彈子大壓制如餅每用軟柿餅一個去核入藥在內濕紙裹煨約藥溶方取出去火毒細嚼糯米飲下一方名甲乙餅治咳出血片兼痰內有血絲不問年深日近但只在一服取效上用青黛一分牡蠣二錢杏仁七粒去皮尖研蠟丸湯使同上治久咳嗽上氣十年二十年諸藥治不瘥者上以蝙蝠去頭燒令焦為細末每服二錢不拘時用米湯調下治上氣咳嗽脅膈妨悶氣喘上用鯉魚一個切作鱠以姜醋食之蒜亦得治久咳嗽上氣心脅煩熱唾膿血紫蘇子微炒鹿角膠搗碎炒杏仁湯泡去皮尖雙仁炒黃以上各三兩生薑汁一合白蜜一中盞生地黃汁一合上前三味都搗令熟入生薑汁地黃汁蜜相和以慢火熬成膏於不津器中密封之每服半匙許用溫粥飲調下一日三四服蘇子煎治上氣咳嗽紫蘇子生薑汁生地黃汁白蜜杏仁各一升上搗蘇子以地黃汁薑汁澆之以絹絞取汁更搗以汁澆之絞令味盡出去滓熬令杏仁微黃黑如脂又以汁澆之絹絞往來六七度令味盡去滓內蜜合和置銅器中於湯上煎之令如飴每服方寸匕日三夜一一方無地黃汁救急療上氣咳肺氣胸痛病源咳嗽上氣者肺氣有餘也肺感於寒則成咳嗽肺主氣氣有餘則喘咳上氣此為邪搏於氣氣壅滯不得宣通是為有餘故咳嗽而上氣也其狀喘咳上氣及多涕唾面目浮腫則氣逆也杏仁三大升去皮尖雙仁者研如泥白蜜一大升牛酥二大升上將杏仁於瓷盆中用水研取汁五升淨磨銅鐺勿令脂膩先傾三升汁於鐺中刻木記其深淺又傾汁二升以緩火煎減至於所記處即內白蜜牛酥還至木記處藥乃成貯於不津磁器中每日三度以暖酒服一大匙不能飲酒和粥服亦得服至一七日唾色變白二七日唾稀三七日咳斷此方非獨治咳兼補虛損去風冷悅肌膚白如瓠婦人服之尤佳百合湯治肺氣壅滯咳嗽喘悶膈脘不利氣否多渴腰膝浮腫小便淋澀百合赤茯苓陳皮湯浸去白紫蘇莖葉人參大腹皮豬苓去黑皮桑根白皮枳殼麩炒麥門冬去心甘草炙以上各一兩馬兜鈴七枚和皮上粗搗篩每服四錢水一盞半入生薑一棗大同煎至八分去滓不拘時溫服葶藶散治咳嗽面目浮腫不得安臥涕唾稠黏甜葶藶隔紙炒郁李仁湯去皮炒桑皮以上各一兩紫菀去苗土旋覆花檳榔木通以上各半兩大腹皮三分上為散每服三錢水一中盞生薑半分煎至六分去滓不拘時溫服天門冬丸治肺寒外內合邪咳嗽語聲不出口中如含霜雪停飲寒痰咽喉妨悶狀如梅核噎塞不通膈氣噎氣皆可服之大效天門冬去心焙紫菀去土百合杏仁湯浸去皮尖雙仁炒麥門冬去心焙貝母去心焙人參半夏湯煮軟切片焙桔梗炒桂心去粗皮阿膠炒至燥生乾地黃橘皮湯浸去白甘草炙以上各三兩上為細末煮糯米粉並黃蠟一兩成粥更入蜜再熬勻和前藥末丸如櫻桃大每服一丸同生姜細嚼下嗽時服咳嗽膿血者服之大效通聲煎治咳嗽氣促胸中滿悶語聲不出杏仁去皮尖及雙仁炒一升另研如泥木通五味子人參桂心去粗皮細辛款冬花菖蒲竹茹酥以上各三兩白蜜生薑汁各一升棗肉二升上前九味銼如麻豆大以水五升微火煎五七沸去滓內酥蜜薑汁並棗肉同煎為膏每服一茶匙用溫酒一小盞化下一方無酒含咽效羊肺湯治咳晝夜無間息氣欲絶肺傷唾血牡蠣煅桂心生薑以上各六兩盅乳粉白石英半夏洗以上各五兩五味子百部根貝母橘皮桃仁去皮尖射干以上各三兩厚朴款冬花甘草炙以上各二兩羊肺一具切碎上先以羊肺用水二斗三升煮至一斗去肺內諸藥再煮取三升分作四服日三夜一忌海藻菘菜羊肉餳生蔥葶藶散治肺壅咳唾膿血喘嗽不得睡臥甜葶藶一兩半隔紙炒令紫色上為細末每服二錢水一盞煎至六分不拘時溫服治一切肺疾咳嗽膿血不止上用豬胰一具削薄竹筒盛於糖火中炮令極熟食上吃之一方以苦酒煮食令盡不過二服桑白皮煎療咳經年不瘥氣喘欲絶傷肺見血桑白皮切五合麥門冬去心杏仁去尖熬取脂款冬花以上各六分茯苓貝母升麻黃芩以上各十二分芍藥十分白羊肺一具切蜜一升生地黃汁一升上切以水一斗煮取三升去滓內杏仁脂地黃汁蜜等微火上煎如魚眼沸攪勿停手取二升二合煎成淨綿夾布濾過每食後含一合日夜三四度老小以量減之微含之佳忌生冷油醋面魚蒜蕪荑蛤蚧湯治咳嗽吐膿血及肺痿羸瘦涎涕稠黏蛤蚧酒浸酥炙知母焙貝母焙鹿角膠炙令燥枇杷葉去毛炙葛根桑皮炙人參甘草炙杏仁去皮尖雙仁湯浸炒以上各一兩上銼碎每服三錢水一盞半煎至八分去滓不拘時溫服栝蔞湯治咳嗽咯血喘滿肺痿栝蔞一枚取瓤入蛤一匙同炒黃馬兜鈴炒杏仁湯浸去皮尖雙仁炒防己葛根貝母去心甘草阿膠銼入糯米二合同炒去米以上各二兩上銼碎每服三錢水一盞入蜜半匙煎至七分去滓不拘時溫服日三夜一阿膠散治肺破嗽血唾血阿膠酥炙白芨各二分天門冬去心北五味子生地黃人參茯苓以上各一分上除白芨別為細末余藥銼散每服三錢水一大盞入蜜二匙秫米百粒生薑五片同煎臨熟入白芨末少許食後溫服杏仁膏治咳嗽喘急喉中似有物唾血不止杏仁二兩湯浸去皮尖雙仁炒微黃研如膏酥三兩阿膠二兩搗碎炒黃為末白蜜五合生薑汁一合紫蘇子二兩微炒研如膏上件相和於銀鍋內以慢火熬成膏每服一匙不拘時以溫粥飲調下日四五服黃耆散治咳嗽唾血黃耆糯米炒阿膠炒各等分上為細末每服二錢不拘時用米湯調下治一切肺病咳嗽膿血及唾血不止上用好酥三十斤三遍煉停取凝當取醍醐一合日三服瘥止一切藥皆不出此神方天門冬丸治肺臟壅熱咳嗽痰唾稠黏天門冬去心一兩半焙百合前胡貝母煨半夏湯洗去滑桔梗桑白皮防己紫菀赤茯苓杏仁湯浸去皮尖雙仁麩炒黃研如膏生乾地黃以上各三分上為細末煉蜜和搗二三百杵丸如梧桐子大每服二十丸不拘時生薑湯送下日三服前胡散治咳嗽涕唾稠黏心胸不利時有煩熱前胡桑白皮貝母煨以上各一兩麥門冬一兩半去心杏仁半兩湯浸去皮尖雙仁炒甘草一分炙上為散每服四錢以水一中盞入生薑半分煎至六分去滓不拘時溫服寧氣湯治肺氣不利咳嗽聲重咽嗌乾燥痰唾稠黏不得眠粟殼二兩半蜜制陳皮去白桑皮炒紫蘇葉半夏薑製甜葶藶五味子人參以上各一兩杏仁去皮尖麩炒桔梗紫菀甘草炙以上各七錢半上㕮咀每服五錢用水一大盞生薑七片煎至六分去滓食後稍熱服又方調肺止嗽順氣消痰如咳嗽不得息者服之便安佛耳草白茯苓去皮款冬花陳皮去白知母貝母桔梗以上各一兩漢防己豬牙皂角去皮弦酥炙各一兩半上為細末每服三錢水一大盞入黃蠟烏梅各少許同煎至五分去烏梅和滓溫服安眠散治上喘咳嗽久而不愈者款冬花麥門冬去心烏梅肉佛耳草以上各二錢半陳皮去白半兩粟殼七錢半蜜炙甘草炙三錢半上為細末每服三錢水一盞入黃蠟如棗核許同煎至八分去滓臨睡溫服祕方煙筒兒治遠年近日一切咳嗽婦人胎前産後嗽皆治雄黃半兩人參艾葉各三錢款冬花佛耳草各二錢半上為細末以蠟紙厚紙闊四寸長八寸長卷一眼裝藥在內燒煙燻喉款花散治年深日近咳嗽肺虛寒熱上用款冬花不以多少於密室中如香焚之煙起以筆管吸其煙則咽之或於坐臥處如香焚之不吸亦妙重病數日見效輕者便效一方咽乾口燥用茶清送下連年咳嗽人難治休要胡醫枉使錢細搗款冬花作末燒煙口吸奔喉咽三奇散治一切嗽不問新舊喘頓不止日夜無度款冬花二百文佛耳草五十文熟地黃二兩上焙乾碾為末每用二大錢裝猛火於香爐中燒之用紙作筒子一頭大一頭小如粽子樣安在爐上以口吸烟盡為度即以茶清咽下有涎吐之經驗方陳氏云豫家一僕久苦此疾數令醫治如水澆石偶在曲江置得沅州一婢新制此藥兩服而愈
