body:
  text: 卷之三十咳嗽門附論夫咳嗽者古人所謂咳嗽是也蓋皮毛肺之合也皮毛先受邪氣邪氣以從其合也嗽非肺一臟受之五臟六腑皆令人有嗽經曰秋傷於濕冬必咳嗽大抵素秋之氣清肅而反動必氣上衝經曰逆秋氣則太陰不收肺氣焦滿而為咳嗽之分蓋咳謂有聲而無痰肺氣傷而不清也嗽謂無聲而有痰由脾濕動其痰也咳嗽者有聲而有痰也因邪傷於肺脾濕痰動以致有聲有痰且肺五臟之華蓋專主於氣氣之清濁既分則無嗽清氣不分濁氣上干於華蓋加以協水停飲肺不得清則為嗽矣素問咳論云五臟各有其時受以風寒而咳嗽變病各異嗽不以乃移於六腑腑既受之亦以喘嗽形證各異凡臟腑百脈皆取氣於肺因而咳嗽始自本經且傷風為證憎寒身熱自汗惡風而咳傷於寒者憎寒身熱無汗惡寒而咳傷於暑者煩渴引飲而咳傷於濕者骨節煩疼四肢重著而咳傷於心者喉中介介如梗狀甚則咽腫喉痹謂之心咳怒傷於肝兩脅下痛甚則兩怯下滿謂之肝咳思傷於脾者右脅下痛痛引肩背甚則不可以動動則咳劇謂之脾咳恐傷於腎者腰背相引而痛甚則咳謂之腎咳憂傷於肺者喘息有音甚則唾血謂之肺咳臟咳不已則腑受之心咳不已小腸受之咳與氣俱失肝咳膽受之咳嘔膽汁脾咳不已胃受之咳而嘔嘔甚長蟲出肺咳不已大腸受之咳而遺屎腎咳不已膀胱受之咳而遺溺久咳不已三焦受之咳而腹滿不欲食此皆聚於胃關於肺使人多涕唾而面浮腫氣逆也又況房勞過度氣體虛弱形寒飲冷最易得寒燥氣鬱蒸最易生熱或傷風寒或風熱相搏夫肺金生水腎為肺之子蓋人不能保養腎水真元耗散因子虛以泄母氣而成嗽者若脈浮緩為風宜以散之弦緊為寒宜以溫解沉澀為濕當以燥之弦滑在胃口者以滌其痰浮盛在氣口者為氣則當疏之微細者為虛則當補之細數者為虛勞宜以滋養血氣沉實有力為氣實實則當瀉濡弱無力者為肺氣耗散則當收斂各從其類醫者詳審考證用藥則無差失可為上工矣咳嗽通治方華蓋散治肺受風寒咳嗽痰壅麻黃去節紫蘇子炒杏仁炒去皮尖桑白皮炒赤茯苓去皮橘紅以上各一錢半甘草一錢上作一服用水二盅生薑五片紅棗一枚煎至一盅去滓不拘時服加減麻黃湯治肺感寒邪咳嗽麻黃去節二錢半杏仁炒去皮尖半夏薑製陳皮以上各一錢半辣桂甘草炙各半錢上作一服用水二盅生薑四片紫蘇半錢同煎至一盅去滓不拘時服溫肺湯治肺虛感冷咳嗽嘔吐痰沫乾薑辣桂半夏薑製五味子杏仁陳皮甘草以上各一錢半細辛阿膠炒各半錢上作一服用水二盅生薑三片紅棗一個煎至一盅去滓不拘時服三拗湯治寒燠不常暴嗽喘急鼻塞痰壅麻黃不去節杏仁不去皮尖甘草不炙各二錢半上作一服用水二盅生薑五片煎至一盅不拘時服金沸草散治傷風上壅熱嗽方見傷寒門杏子湯治一切咳嗽不問外感風寒內傷生冷及痰飲停積悉皆治之杏仁炒去皮尖人參茯苓細辛洗半夏湯泡七次官桂不見水乾薑炮白芍藥五味子甘草炙各一錢上作一服用水二盅生薑五片煎至一盅不拘時服此藥味多辛熱之劑若冷嗽則可服橘蘇散治傷風咳嗽身熱有汗惡風脈浮病人挾熱服杏子湯不得者此藥穩當橘紅紫蘇葉杏仁去皮尖五味子半夏湯泡七次桑白皮炒貝母去心白朮以上各一錢半甘草炙七分半上作一服用水二盅生薑五片煎至一盅不拘時服白朮湯治五臟受濕咳嗽痰多上氣喘急身體重痛脈濡細白朮三錢白茯苓去皮半夏湯泡七次橘紅以上各二錢五味子甘草炙各一錢上作一服用水二盅生薑五片煎至一盅不拘時服團參飲子治病因抑鬱憂思喜怒飢飽失宜致臟氣不平咳嗽膿血漸成肺痿增寒發熱羸瘦困倦將成勞瘵方見勞瘵門參蘇飲治上膈有熱咳嗽聲重方見傷寒門人參紫菀湯治肺氣不調咳嗽喘急久不愈者人參紫菀茸桂枝五味子杏仁甘草以上各一錢縮砂罌粟殼去穰薑製炒各二錢上作一服用水二盅生薑五片烏梅二個煎一盅食遠服五拗湯治感寒咳嗽肺氣喘急麻黃不去節杏仁不去皮甘草生用荊芥穗桔梗各二錢上作一服用水二盅生薑三片煎至一盅食遠服咽喉痛者煎熟後加朴硝少許一方去荊芥桔梗用枳實半夏玉液丸治風壅化痰涎利咽膈清頭目止咳嗽除煩熱寒水石煅令赤出火毒水飛過三十兩半夏湯洗為細末白礬枯碾細各十兩上研和勻用麵糊和丸如梧桐子大每服三十丸食後用淡生薑湯送下玉芝丸治風壅痰實頭目昏眩咳嗽聲重咽膈不利人參去蘆白茯苓去皮白礬枯天南星米泔浸焙薄荷以上各三十兩半夏曲六十兩上為細末生薑汁煮麵糊和丸如梧桐子大每服三十丸食後生薑湯送下如痰盛燥熱薄荷湯送下鍾乳補肺湯治肺氣不足久年咳嗽以致皮毛焦枯唾血腥臭喘乏不止鍾乳粉碎如米桑白皮各二錢肉桂去粗皮白石英碾末五味子款冬花去梗紫菀洗去土麥門冬去心人參去蘆各一錢上除鍾乳粉白石英同為粗末拌勻上作一服用水二盅生薑五片棗一枚粳米三十粒煎至一盅食後服人參養肺丸治肺胃俱傷氣奔於上客熱熏肺咳嗽喘急胸中煩悸涕唾稠黏勞傷肺胃吐血嘔血並皆治之人參去蘆黃耆蜜炙各一兩八錢栝蔞根白茯苓去皮各六錢杏仁炒去皮二兩四錢皂角子三十個炒去皮半夏曲四兩炒上為細末煉蜜和丸如彈子大每服一丸食後細嚼用紫蘇湯送下如喘用桑白皮湯送下溫中化痰丸治停痰留飲胸膈滿悶頭眩目暈咳嗽涎唾或飲酒過多嘔噦噁心良薑炒青皮去白乾薑炒陳皮去皮各半兩上為細末醋煮麵糊為丸如梧桐子大每服五十丸食後用米飲送下人參潤肺丸治肺氣不足咳嗽喘急久年不愈漸成虛勞及療風壅痰實頭目眩暈口舌乾燥涕唾稠黏人參款冬花細辛去葉杏仁炒去皮甘草炙以上各四兩官桂去皮桔梗以上各五兩知母六兩上為細末煉蜜和丸如雞頭實大每服一丸食後細嚼用淡生薑湯送下人參清肺湯治肺胃虛寒咳嗽喘急坐臥不安年久勞嗽唾痰腥臭人參阿膠蛤粉炒杏仁炒去皮罌粟殼去筋膜蜜炒知母桑白皮炒烏梅去核地骨皮甘草炙各一錢上作一服用水二盅烏梅一個紅棗一個煎一盅食遠服八味款花散治肺經寒熱不調痰涎不已款冬花洗焙紫菀茸五味子甘草炙以上各一錢半桑白皮炒麻黃去節杏仁湯浸去皮尖各一錢上作一服用水二盅煎一盅入黃蠟如皂角子大食後服人參丸治遠年近日咳嗽諸藥不效者人參桔梗甘草炙以上各一兩阿膠蛤粉炒如珠五味子各半兩肉桂去皮杏仁湯去皮炒烏梅肉以上各二錢半上為細末煉蜜和丸每兩作十五丸每服一丸用新綿裹定於湯內濕過噙化咽津大降氣湯治上盛下虛膈壅痰實喘嗽咽乾不利紫蘇子微炒川芎細辛去葉土當歸洗焙白茯苓去皮桔梗去蘆厚朴去皮薑製陳皮去白半夏曲炒前胡肉桂去粗皮甘草炙各一錢上作一服用水二盅生薑五片紫蘇五葉同煎至一盅去滓食後服平肺湯治肺氣上壅喘嗽痰實寒熱往來咽乾口燥陳皮一錢半半夏湯泡七次桔梗炒薄荷紫蘇烏梅去核紫菀知母杏仁炒桑白皮蜜炒五味子罌粟殼甘草炙各一錢上作一服用水二盅生薑五片煎至一盅食後服人參荊芥散治肺感風邪上壅痰嗽頭目不清語言不出咽乾項強鼻流清涕人參杏仁去皮尖桔梗炒細辛麻黃去根節陳皮以上各一錢半夏湯泡洗一錢半荊芥穗通草甘草炙各半錢上作一服用水二盅生薑五片煎至一盅食後服桔梗湯治肺癰咳嗽膿血咽乾多渴大便難小便赤色桔梗貝母去心薏苡仁炒桑白皮蜜水炒當歸枳殼麩炒栝蔞仁防己以上各一錢黃耆一錢半甘草節生用杏仁麩炒去皮尖百合蒸各半錢上作一服用水二盅生薑五片煎至一盅大便祕加大黃小便少加木通紫菀茸湯治飲食過度或食煎爆邪熱傷肺咳嗽咽癢痰多唾血喘急脅痛不得安臥紫菀茸洗經霜桑葉款冬花百合蒸焙杏仁去皮尖阿膠蛤粉炒貝母去心半夏湯泡七次蒲黃炒以上各一錢犀角鎊屑人參去蘆甘草炙以上各七分半上作一服用水二盅生薑五片煎至一盅食後服杏仁煎治老人久患喘嗽不已睡臥不得者服之立效杏仁去皮尖胡桃肉各等分上共碾為膏入煉蜜少許搜和得所丸如彈子大每服一丸食後細嚼生薑湯送下祛痰丸治風痰喘嗽人參去蘆陳皮去白青皮去白茯苓去皮白朮煨木香天麻以上各一兩槐角子半夏湯泡洗七次各七錢半獵牙皂角去皮弦酥炙五錢上為細末生薑汁煮麵糊為丸如梧桐子大每服五七十丸食後溫酒送下生薑湯亦可紫蘇半夏湯治喘嗽痰涎紫蘇半夏湯泡七次紫菀茸陳皮去白五味子各一錢杏仁去皮尖麩炒桑白皮各二錢上作一服用水二盅生薑三片煎至一盅日進三服人參平肺散治心火干肺傳為肺痿咳嗽喘嘔痰涎壅盛胸膈痞滿咽嗌不利人參青皮茯苓天門冬去心陳皮去白地骨皮甘草炙以上各一錢五味子三十個知母一錢半桑白皮炒二錢上作一服用水二盅生薑五片煎至一盅食遠服如熱加黃芩紫蘇半夏各一錢寧肺湯治榮衛俱虛發熱自汗肺氣喘急咳嗽痰涎人參去蘆當歸白朮熟地黃川芎白芍藥五味子麥門冬去心桑白皮白茯苓去皮甘草炙以上各一錢阿膠蛤粉炒一錢半上作一服用水二盅生薑五片煎至一盅食後服補肺湯治肺虛氣乏久嗽阿膠蛤粉炒紫蘇子桔梗半夏制甘草炙以上各一錢款冬花砂仁紫菀杏仁炒去皮五味子細辛陳皮桑皮炒石菖蒲草果青皮以上各半錢上作一服用水二盅生薑四片紫蘇五葉煎至一盅食後服人參飲治咳嗽痰飲通用人參桔梗半夏曲五味子細辛枳殼赤茯苓去皮杏仁以上各一錢半甘草炙半錢上作一服用水二盅生薑五片烏梅半個煎至一盅食後服一方無杏仁不用烏梅煎服痰嗽加紫菀添甘草人參潤肺散治咳嗽氣急痰壅鼻塞人參二錢麻黃去根節杏仁去皮尖炒貝母去心各一錢半阿膠蛤粉炒桔梗去蘆甘草炙以上各一錢橘紅五分上作一服用水二盅紫蘇三五葉煎至一盅食後服知母茯苓湯治肺痿喘嗽不已往來寒熱自汗知母白朮各八分茯苓去皮五味子人參半夏湯泡七次柴胡甘草炙以上各一錢薄荷川芎阿膠以上各半錢款冬花桔梗麥門冬黃芩以上各七分上作一服用水二盅生薑五片煎至一盅食後服人參款花散治喘嗽久不已者人參去蘆款冬花粟殼炒以上各二錢知母貝母半夏以上各一錢半上作一服用水二盅烏梅一個煎至一盅臨睡服貝母散治暴發咳嗽多日不愈貝母杏仁去皮尖桑皮以上各二錢五味子知母甘草以上各一錢款冬花一錢半上作一服用水二盅生薑三片煎至一盅食後服人參散治諸咳嗽喘急語言不出年久者多服見效人參知母貝母馬兜鈴去皮用肉麻黃去節杏仁生用半夏以上各一錢半天仙藤一錢上作一服用水二盅烏梅一個蜜一匙煎至一盅臨睡服人參養肺腸治肺痿咳嗽有痰午後熱並聲嘶者人參去蘆阿膠蛤粉炒貝母杏仁炒桔梗茯苓桑皮枳實甘草以上各一錢柴胡二錢五味子半錢上作一服用水二盅生薑三片棗子一枚煎一盅食遠服星香丸治諸氣嗽生痰南星半夏各三兩白礬一兩研同水浸南星半夏一宿陳皮五兩泔浸一周時去白取三兩香附子三兩皂角水浸一周時曬乾上四味俱不見火碾為細末用生薑汁煮麵糊和丸如梧桐子大每服五十丸食後用淡生薑湯送下加減瀉白散治陰氣在下陽氣在上咳嗽嘔吐痰喘桑白皮地骨皮各二錢陳皮去白人參甘草以上各一錢白茯苓青皮各一錢半五