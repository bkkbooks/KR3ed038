body:
  text: 卷之一風門附論謹按玉機真藏曰風者百病之長也風之為病善行而數變者也金匱論曰天有八風經有五風八風發邪以為經風觸五臟邪氣發動且八風之名偏風腦風目風漏風內風首風腸風泄風此八風者皆中臟腑臟者言之以五音宮商角徵羽應乎五臟所感不同其病大同小異歧伯曰風名有四一曰偏枯半身不遂口眼歪斜肌肉偏而不用且痛言不變智不亂病在分腠之間二曰風痱者身無疼痛四肢不收智亂不甚言微有知可治甚則不能言不可治內經脈解論曰內奪而厥則為喑痱此由腎虛所致痱之狀舌喑不能語足廢不為用蓋腎脈挾舌本故不能言而為喑腎脈循陰股內廉斜入膕中循胻骨內廉及內踝後入足下腎氣不順故廢而為痱三曰風懿者一旦奄忽不知人事痰涎上迷心竅咽中窒塞突然舌強不語牙關不開手足拘攣氣不升降病在臟腑故風中臟則性命危中腑則肢體廢矣四曰風痹者脈浮而緩筋骨痿弱肢體麻痹不仁又有飲酒中風謂之漏風則身熱懈惰汗出少氣謂酒所以養陽酒入於胃與穀氣相搏熱盛於中其氣剽悍陽氣俱泄腠理疏風邪入以中之證似風懿其脈短而滑或洪而數內熱外汗法當清解消痰祛風及其內風名曰勞風由房勞虛損真氣內虧風邪從此入病之所由皆從此始但髮直吐沫遺尿失禁口開眼合鼻鼾手撒搖頭上竄面赤如妝或頭面青黑汗綴如珠昏不知人皆為不治風證多端所感各異臨病詳辨察脈觀形對證用藥故風者清靜則肉腠閉拒雖有大風苛毒弗之能害此因時之序也尤當切脈究之風以散之寒以溫之實以竭之虛以補之熱以涼之痰以越之又有中氣與中風相類語言蹇澀涎潮昏塞不知人事牙關緊急但手足不偏廢為異耳大凡治中風之藥必先順氣後以疏風其功可獲若中氣妄用風藥其誤豈淺淺哉此病皆由七情不調氣鬱所致以富貴汲汲貧賤戚戚久思不遂鬱郁而不得志者成此氣中之疾所用之劑調降其氣自然平復經曰暴喜傷陽暴怒傷陰憂思不樂遂多厥逆此之謂也歟夫中風中氣何以別之當辨其脈若浮盛而弦速或浮而洪斯為風也脈沉而伏者為中氣治中氣氣多風少先以蘇合香丸薑汁磨化擦牙通竅人事漸蘇然後徐徐灌服看其虛實若虛則補若實則瀉寒則溫熱則清切其脈理審病詳細用藥主治無不效矣若一概作風治之則愈傷脾氣所誤在反掌之間經云無故而得喑脈不至者不治此為寒氣暴逆故也俟其氣復則已切不可便用疏風泄氣之劑誤人性命醫工不諳是理反加發散導散真氣虛邪愈作遂至不療可不痛哉風證通治方八味順氣散凡有風之人先服此藥順氣次進風藥人參白朮茯苓去皮青皮陳皮去白白芷烏藥各一錢半甘草七分半上作一服水二盅煎至一盅不拘時服烏藥順氣散治男子婦人一切風氣攻注四肢骨節疼痛遍身頑麻凡卒手足癱瘓言語蹇澀先宜多服此藥以疏通氣道然後隨證投以風藥烏藥陳皮各二錢麻黃去根節白殭蠶炒去絲嘴川芎枳殼麩炒甘草炙桔梗白芷各一錢乾薑炮半錢上作一服水二盅生薑三片紅棗一枚煎至一盅食遠服排風湯治中風邪氣入於五臟令人狂言妄語精神錯亂手足不仁痰涎壅盛白蘚皮當歸去蘆肉桂去粗皮芍藥杏仁去皮尖麩炒麻黃去根節甘草防風去蘆川芎獨活各一錢茯苓去皮白朮各二錢上作一服水二盅生薑三片煎至一盅不拘時溫服省風湯治卒急中風口噤全不能言口眼歪斜筋脈急掣疼痛風盛痰實頭目旋眩胸膈煩滿左癱右瘓手足麻痹骨節煩疼恍惚不定神志昏憒一切風症可服防風去蘆天南星各三錢半夏湯洗黃芩各二錢甘草一錢上作一服水二盅生薑五片煎至一盅不拘時服大醒風湯治中風痰涎壅盛半身不遂歷節痛風筋脈拘急南星四錢防風二錢全蠍半錢微炒附子去皮臍生用獨活甘草各一錢上作一服水二盅生薑七片煎至一盅不拘時服大防風湯去風順氣活血壯筋又治痢後腳痛緩弱不能行履名曰痢風或兩膝腫痛腳脛枯細名曰鶴膝風防風熟地黃白朮羌活人參川芎黃耆牛膝各一錢附子炮去皮臍當歸酒洗杜仲薑汁炒去絲芍藥各一錢半甘草炙半錢上作一服水二盅生薑五片紅棗一枚煎一盅不拘時服清風散治諸風上攻頭目昏眩項背拘急鼻涕聲重耳作蟬鳴皮膚頑麻瘙癢癮疹婦人血風頭皮腫癢並治之荊芥穗甘草炙各一錢半陳皮人參茯苓去皮白殭蠶炒去絲防風川芎藿香葉蟬蛻厚朴羌活各一錢上作一服水二盅煎至一盅不拘時服小續命湯治中風半身不遂口眼歪斜手足戰掉語言蹇澀麻黃去節人參去蘆黃芩芍藥甘草炙川芎杏仁去皮尖麩炒防己各一錢肉桂七分防風一錢半附子炮去皮臍二錢中風無汗惡寒倍加麻黃防風杏仁中風有汗惡風加桂枝中風身熱無汗不惡寒加石膏知母中風身熱有汗不惡風加葛根中風無汗身涼倍加附子加乾薑中風有汗無熱倍加附子加桂枝三生飲治卒中風昏不知人口眼歪斜半身不遂並痰厥氣厥南星五錢生用木香一錢半川烏一錢去皮生用附子一錢去皮生用上作一服水二盅生薑七片煎至一盅不拘時服有卒中風不省人事者以蘇合香丸用生薑自然汁化開擦牙大秦艽湯治中風外無六經之形證內無便溺之阻隔為血弱不能養於筋故手足不能運化舌強不能言宜養血而筋自榮秦艽石膏各一錢半甘草川芎當歸羌活獨活防風黃芩白芍藥白芷白朮生地黃熟地黃白茯苓各一錢細辛半錢上作一服水二盅生薑三片煎至一盅不拘時服如心下痞加枳實一錢星香湯治中風痰盛服熱藥不得者南星六錢木香二錢上作一服水二盅生薑七片煎至一盅不拘時服救急稀涎散治中風四肢不收痰涎壅塞氣閉不通晉礬一兩豬牙皂角四個肥實不蛀者去黑皮上為細末碾勻每服二錢溫水調下以吐為度川芎石膏湯治風熱上攻頭目眩痛咽乾煩渴石膏桔梗各一錢川芎芍藥山梔人參白朮各五分黃芩大黃菊花荊芥穗防風各七分寒水石甘草各二錢滑石三錢連翹薄荷各一錢縮砂三分上作一服水二盅煎至一盅食後服防風通聖散治一切風熱等證防風川芎當歸芍藥大黃薄荷葉麻黃連翹芒硝各五分石膏黃芩桔梗各一錢滑石三錢甘草二錢荊芥梔子白朮各二分半上作一服水二盅生薑三片煎至一盅不拘時服如痰嗽加半夏一錢牛黃清心丸治諸風緩縱不隨語言蹇澀痰涎壅盛心怔健忘或發癲狂並皆治之羚羊角鎊另研麝香另研龍腦另研各一兩人參去蘆蒲黃各二兩半白茯苓去皮二錢半川芎柴胡杏仁另研桔梗各一兩六錢半防風去蘆白朮白芍藥麥門冬黃芩神麯當歸各一兩半阿膠炒大豆黃卷肉桂各一兩七錢半乾薑七錢半牛黃一兩二錢另研犀角二兩另研雄黃八錢另研金箔一千二百箔甘草五錢乾山藥十兩白蘞七錢半大棗一百個另研上除大棗杏仁金箔羚羊角麝香龍腦雄黃另研余藥別研為細末入羚羊角等藥七味入內再研和勻將大棗煮熟去皮核搗爛如泥同煉蜜為丸每一兩作十丸金箔為衣每服一丸食後溫水化下祛風至寶丹治諸風熱等證防風芍藥各一兩半石膏黃芩桔梗熟地黃天麻人參羌活獨活各一兩當歸川芎各二兩半滑石三兩甘草二兩梔子六錢白朮一兩三錢連翹荊芥穗薄荷麻黃芒硝黃連大黃黃柏全蠍細辛各五錢上為細末用煉蜜為丸如彈子大每服一丸細嚼茶酒任下臨臥服三化湯治中風外有六經之形證先以加減續命湯隨證治之內有便溺之阻隔復以此導之厚朴薑製羌活各二錢枳實一錢半大黃四錢上作一服水二盅生薑三片煎至一盅不拘時服滌痰湯治中風痰迷心竅舌強不能言南星薑製半夏湯洗七次各二錢半枳實麩炒二錢茯苓去皮二錢橘紅一錢半石菖蒲人參各一錢竹茹七分甘草半錢上作一服水二盅生薑五片煎至一盅食後服羌活愈風湯治腎肝虛筋骨弱語言難神昏憒風濕內弱風熱體重或瘦而一肢偏枯或肥而半身不遂心不寧自勞役則百病生心靜則萬病息此藥能安心養神調陰陽無偏勝羌活甘草炙防風去蘆黃耆去蘆人參去蘆蔓荊子川芎細辛去苗枳殼麩炒地骨皮去骨麻黃去節知母去毛杜仲炒去絲秦艽去蘆柴胡去苗枸杞子當歸去蘆獨活白芷半夏薑製厚朴薑製防己芍藥黃芩白茯苓甘菊花薄荷前胡各七分半石膏生地黃熟地黃蒼朮各一錢官桂去皮半錢上作二服每服水二盅生薑三片煎至一盅空心服臨睡渣再煎服加減三五七散治八風五痹肢體不仁大治風寒入腦陽虛頭痛畏聞人聲目旋運轉耳內蟬鳴濕痹腳氣緩弱並治細辛八兩乾薑炮十兩防風十二兩去蘆山茱萸十六兩去核茯苓十六兩去皮上為細末每服二錢食前溫酒調服資壽解語湯治心脾中風舌強不語半身不遂附子炮去皮臍防風去蘆天麻酸棗仁各一錢半羚羊角官桂羌活各一錢甘草五分上作一服水二盅煎至一盅入竹瀝二匙不拘時服取竹瀝法用鮮竹數竿截長一尺余許劈開作片用磚兩口對立置竹在上其下著火磚外兩頭各置碗以盛竹瀝瀝盡以絹濾澄清夏秋沉冷水中防瀝酸大熱有風痰人亦可單服冷暖隨意勿過度荊柴燒瀝法同青州白丸子治男子婦人手足癱瘓風痰壅盛嘔吐涎沫及小兒驚風並皆治之南星生用白附子各二兩川烏頭半兩去皮臍半夏七兩好白者水浸洗過上碾為細末以生絹袋盛於井花水內擺出未出者更以手揉令出以滓更研再生絹袋擺盡為度於瓷盆中日曬夜露每旦換新水攪而復澄春五夏三秋七冬十日去水曬乾如玉片碎研以糯米粉煎粥清為丸如緑豆大每服二三十丸生薑湯送下不拘時服如癱瘓風濕酒送下小兒驚風薄荷湯下三五丸清神散消風化痰治頭風目眩耳鳴鼻塞咽嗌不利檀香銼人參去蘆羌活防風各一兩甘草炙荊芥穗薄荷各一兩細辛去心石膏研各二兩半上為細末每服二錢食後沸湯點服澡洗藥治一切風疾燥癢淋洗乾荷葉藿香葉威靈仙藁本各三兩零陵香茅香各四兩香白芷甘松各二兩煎湯無風處帶熱洗澡追風散治諸風上攻頭疼目眩鼻塞聲重皮膚瘙癢口角牽引婦人血風及一切頭風並治之川烏炮石膏另研防風去蘆各一兩甘草炙白殭蠶炒去絲全蠍去尾荊芥各二兩川芎一兩麝香另研一兩上為細末每服二錢食後臨臥茶湯調下川芎茶調散治諸風上攻頭目昏重偏正頭疼言語聲重川芎荊芥穗各四兩細辛去心白芷甘草羌活各一兩防風去蘆一兩半薄荷葉八兩蜜炙上為細末每服二錢食後茶清調下常服清頭目搐鼻通天散治卒暗中風倒地牙關緊急人事昏沉川芎細辛藜蘆白芷防風薄荷各一錢豬牙皂角炙去皮三個上為細末用蘆筒納藥每用少許吹入鼻中五臟正治方肝臟中風夫肝臟中風者其候筋脈拘攣手足不收厲風入肝坐踞不得胸背強直脅肋脹滿目眩心煩言語蹇澀此其是也犀角散治肝臟中風流注四肢上攻頭面疼痛言語蹇澀上焦風熱口眼歪斜腳膝疼痛無力犀角屑二錢石膏二錢羌活去蘆一錢半羚半角一錢半人參甘菊花獨活去蘆黃芩天麻枳殼去穰麩炒當歸去蘆黃耆去蘆川芎白朮酸棗仁防風白芷各五分甘草三分上作一服水二盅生薑五片煎至一盅不拘時服薏苡仁散治肝臟中風四肢攣急身體強直薏苡仁一錢半麻黃去節一錢半防風去蘆一錢附子炮去皮臍川芎柏子仁去殼桂心枳殼麩炒石膏細辛獨活去蘆羚羊角各一錢上作一服水二盅生薑五片煎至一盅不拘時服牛黃散治肝臟中風筋脈攣急口眼歪斜言語蹇澀神思昏憒並宜服之牛黃研龍