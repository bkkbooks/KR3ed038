body:
  text: 卷之四十五痿門附論蓋人身之有皮毛血脈筋膜肌肉骨髓而成其形內有肝心脾肺腎以主之若喜怒不節勞役兼致內之精血虛耗榮衛失調發為寒熱使皮血筋骨肌肉痿弱無力以運動故致痿躄狀似柔風腳弱相類以脈證並所因別之不可混作柔風腳氣論此乃外所因凡痿躄乃內藏氣不足之所為也大抵痿弱之由因肺熱脾虛弱薄著足痿躄其色白而毛敗名皮痿曰肺熱葉焦曰五臟因肺熱發為痿躄也心下熱其膝樞紐如折去而不相提挈脛筋縱緩不能任地也色赤而絡脈溢名脈痿由悲哀太甚陽氣內傷數尿血曰大筋空虛發為肌痹傳為脈痿病肝熱口苦筋膜乾筋急而攣色蒼而爪枯曰筋痿由思慮無窮所願不得意淫於外房勞太甚宗筋弛緩及為白淫曰筋痿者生於肝也病脾熱胃干而渴肌肉不仁色黃而肉蠕動曰肉痿由漸於濕地居處下澤濡漬痹而不仁曰肉痿也病腎熱腰脊不舉骨枯髓減色黑齒槁曰骨痿因所遠行勞倦遇天熱而渴陽氣內乏熱舍於腎致水不勝火則骨枯而髓虛故為之曰骨痿生於大熱者也難經曰骨痿不能起於床者是也大抵諸痿生於肺熱此一句便見治法大意經曰東方實西方虛瀉南方補北方此因是就生就制而言補瀉大經大法不外於此東方木肝也西方金肺也南方火心也北方水腎也五行之中惟火有二腎雖有二水居其一陽常有餘陰常不足故經曰一水不勝二火理之必然肺金體燥而居上主氣畏火者也脾土性濕而居中主四肢畏水者也火性炎上若嗜欲無節則水失所養火寡於畏而侮所勝肺得火邪而熱矣木性剛急馳受熱則金失所養火寡於畏而侮所勝脾得木邪而傷矣肺熱則不能管攝一身脾傷則四腳不能為用而諸痿之病作瀉南方者則肺金清而東方不實何脾傷之有補北方水則心火降而西方不虛何肺熱之有故陽明實則宗筋潤能束骨而利機關矣治痿之法無出於此痿通治方東坦清燥湯治濕熱成痿以燥金受濕熱之邪絕寒水生化之源絕則腎虧痿厥之病大作腰以下痿軟癱瘓不能動履者宜服方見濕門藿香養胃湯治胃虛不食四肢痿弱行立不能皆由陽明虛宗筋無所養遂成痿躄藿香白朮神麯炒白茯苓烏藥縮砂半夏曲薏苡仁人參以上各一錢半蓽澄茄甘草炒各一錢上作一服水二盅生薑五片棗二枚煎至一盅不拘時服補肝湯治前陰如冰冷並陰汗兩腳痿軟無力黃耆去蘆一錢半人參去蘆乾葛白茯苓去皮豬苓升麻以上各一錢柴胡去蘆當歸身羌活連翹黃柏炒澤瀉蒼朮神麯知母防風陳皮甘草炙各半錢上作一服水二盅煎至一盅空心熱服忌酒濕面溫腎湯治面色痿黃腳痿弱無力陰汗出麻黃柴胡各六分白朮酒黃柏豬苓白茯苓去皮升麻以上各一錢防風去蘆蒼朮各一錢半澤瀉二錢上作一服水二盅煎至一盅食前熱服候一時才飲食芎桂散治四肢疼痛軟弱行步不便川芎一兩半桂心乾薑炮甘草炙以上各一兩川烏頭八兩切作片水浸一宿切作算子條更以米泔浸一宿不洗日乾麩炒微赤為度幹了秤上為細末每服二錢溫鹽酒調下日進三服加味四斤丸治腎熱肝虛熱淫於內致筋骨痿弱自不勝持起居須人扶足不能任地驚恐戰掉潮熱時作飲食無味不生氣力諸虛不足肉蓯蓉酒浸牛膝酒浸天麻木瓜干鹿茸燎去毛酥炙熟地黃五味子酒浸菟絲子酒浸另研上各等分為細末煉蜜和丸如梧桐子大每服五十丸食前用溫酒或米飲任下一方不用五味子有杜仲麋角丸治五痿皮緩毛瘁血脈枯槁肌膚薄著筋骨羸弱飲食不美庶事不興四肢無力爪枯發落眼昏唇燥疲備不能反側麋角鎊一斤重用酒浸一宿大附子生去皮臍一兩半熟地黃四兩上用大麥米二升以一半藉底以一半在上以二布巾隔覆炊一日取出藥與麥別焙乾為末浸藥酒添清酒煮麥粉為糊搜和杵三千下丸如梧桐子大每服五十丸食前用溫酒或米湯送下健步丸治膝中無力屈伸不得腰背腿腳沉重行步艱難酒防己一兩防風澤瀉各三錢川烏炮去皮酒苦參各一錢肉桂滑石炒栝蔞根酒洗柴胡羌活甘草炙各半錢上為細末酒糊為丸如梧桐子大每服七十丸空心食前溫酒送下龍骨丸治膀胱腎冷坐起欲倒目𥉂𥉂氣不足骨痿龍骨柏子仁防風乾地黃甘草以上各五分禹餘糧白石英白茯苓桂心黃耆以上各七分五味子羌活附子人參以上各六分山茱萸玄參川芎以上各四分磁石杜仲乾薑各八分上為細末煉蜜為丸如梧桐子大每服三十丸加至四十丸空心用溫酒送下日二服起痿丹治諸痿法當在陽明與衝脈陽明在胃乃五臟六腑之海主潤宗筋束骨之利機關衝脈者諸經之海主滲灌溪谷與陽明合養於宗筋會於氣衝屬於帶脈絡於督脈故陽明虛則宗筋縱帶脈不引故足痿不用也治之各補其榮而通其輸調其虛實和其逆順至筋脈骨肉各得其時病乃已矣腎經虛憊遂成骨痿腰腳難舉日加困乏附子炮去皮臍沉香不見火硃砂別研枸杞子去枝梗母丁香木香不見火陽起石煅肉蓯蓉酒浸焙熟地黃麝香別研天雄炮去皮臍或用鹿茸亦可官桂去粗皮硫黃以上各一兩膩粉半兩白丁香少許上為細末煉蜜為丸如彈子大每用一丸以薑汁火上入藥熔化卻用手點藥於腰眼上磨擦至藥盡用至二十丸大有神效若有他處癱瘓風疾加皂角一片去筋捶爛薑汁浸一宿瓦上焙乾為末入前藥內依前法用又方治筋痿兩手握固無力兩腿行動無力急飢食少此名筋痿其證候口舌生瘡忽生痰涎忽然睡中涎溢身上躁熱忽時增寒項頸強急小便赤白不定大腑忽冷忽熱不調連翹防風荊芥穗蔓荊子羌活獨活牡丹皮山梔仁秦艽麻黃去根木香各等分上為細末每服一錢食後用白湯調下金剛丸治腎損骨痿不能起於床宜服此益精萆薢杜仲炒去絲蓯蓉酒浸菟絲子酒浸等分上為細末酒煮豬腰子搗和為丸如梧桐子大每服五七十丸空心用溫酒送下牛膝丸治腎肝損骨痿不能起於床筋弱不能收持宜益精緩其中牛膝酒浸萆薢杜仲炒去絲白蒺藜防風菟絲子酒浸蓯蓉酒浸等分官桂減半上為細末酒煮豬腰子搗和丸如梧桐子大每服五七十丸空心用溫酒送下煨腎丸治腎肝損及脾損穀不化宜益精緩中消穀牛膝萆薢杜仲炒去絲白蒺藜防風菟絲子酒浸蓯蓉酒浸葫蘆巴破故紙酒炒等分官桂減半上為細末將豬腰子制如食法搗爛煉蜜和杵丸如梧桐子大每服五七十丸空心用溫酒送下如腰痛不起甚效
