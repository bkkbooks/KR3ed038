  - {type: 'tls:div-end', offset: 7035, content: '', id: KR3ed038_jc_065-d67.d2.d2d18}
  - {type: 'tls:div-start', offset: 7035, content: '', id: KR3ed038_jc_065-d67.d2.d2d19, level: 4, head_text: 瘡疹有發出者有溫出者有解毒者}
  - {type: 'tls:head', offset: 7035, content: '', id: KR3ed038_jc_065-d67.d2.d2.d19.h1s1}
  - {type: 'tls:div-end', offset: 7250, content: '', id: KR3ed038_jc_065-d67.d2.d2d19}
  - {type: 'tls:div-start', offset: 7250, content: '', id: KR3ed038_jc_065-d67.d2.d2d20, level: 4, head_text: 瘡疹雖有熱證大便如常過則不可再下}
  - {type: 'tls:head', offset: 7250, content: '', id: KR3ed038_jc_065-d67.d2.d2.d20.h1s1}
  - {type: 'tls:div-end', offset: 7531, content: '', id: KR3ed038_jc_065-d67.d2.d2d20}
  - {type: 'tls:div-start', offset: 7531, content: '', id: KR3ed038_jc_065-d67.d2.d2d21, level: 4, head_text: 不可妄發妄下}
  - {type: 'tls:head', offset: 7531, content: '', id: KR3ed038_jc_065-d67.d2.d2.d21.h1s1}
  - {type: 'tls:div-end', offset: 7970, content: '', id: KR3ed038_jc_065-d67.d2.d2d21}
  - {type: 'tls:div-start', offset: 7970, content: '', id: KR3ed038_jc_065-d67.d2.d2d22, level: 4, head_text: 發熱有時則應臟腑知其斑瘡痘水疱膿疱}
  - {type: 'tls:head', offset: 7970, content: '', id: KR3ed038_jc_065-d67.d2.d2.d22.h1s1}
  - {type: 'tls:div-end', offset: 8105, content: '', id: KR3ed038_jc_065-d67.d2.d2d22}
  - {type: 'tls:div-start', offset: 8105, content: '', id: KR3ed038_jc_065-d67.d2.d2d23, level: 4, head_text: 蘊熱而斑毒}
  - {type: 'tls:head', offset: 8105, content: '', id: KR3ed038_jc_065-d67.d2.d2.d23.h1s1}
  - {type: 'tls:div-end', offset: 8357, content: '', id: KR3ed038_jc_065-d67.d2.d2d23}
  - {type: 'tls:div-start', offset: 8357, content: '', id: KR3ed038_jc_065-d67.d2.d2d24, level: 4, head_text: 瘡痘已出未能勻}
  - {type: 'tls:head', offset: 8357, content: '', id: KR3ed038_jc_065-d67.d2.d2.d24.h1s1}
  - {type: 'tls:div-end', offset: 8461, content: '', id: KR3ed038_jc_065-d67.d2.d2d24}
  - {type: 'tls:div-start', offset: 8461, content: '', id: KR3ed038_jc_065-d67.d2.d2d25, level: 4, head_text: 瘡子未發者令內消}
  - {type: 'tls:head', offset: 8461, content: '', id: KR3ed038_jc_065-d67.d2.d2.d25.h1s1}
  - {type: 'tls:div-end', offset: 8574, content: '', id: KR3ed038_jc_065-d67.d2.d2d25}
  - {type: 'tls:div-start', offset: 8574, content: '', id: KR3ed038_jc_065-d67.d2.d2d26, level: 4, head_text: 瘡疹發熱而痛者}
  - {type: 'tls:head', offset: 8574, content: '', id: KR3ed038_jc_065-d67.d2.d2.d26.h1s1}
  - {type: 'tls:div-end', offset: 8677, content: '', id: KR3ed038_jc_065-d67.d2.d2d26}
  - {type: 'tls:div-start', offset: 8677, content: '', id: KR3ed038_jc_065-d67.d2.d2d27, level: 4, head_text: 瘡疹出不快}
  - {type: 'tls:head', offset: 8677, content: '', id: KR3ed038_jc_065-d67.d2.d2.d27.h1s1}
  - {type: 'tls:div-end', offset: 9382, content: '', id: KR3ed038_jc_065-d67.d2.d2d27}
  - {type: 'tls:div-start', offset: 9382, content: '', id: KR3ed038_jc_065-d67.d2.d2d28, level: 4, head_text: 瘡疹面青者逆}
  - {type: 'tls:head', offset: 9382, content: '', id: KR3ed038_jc_065-d67.d2.d2.d28.h1s1}
  - {type: 'tls:div-end', offset: 9618, content: '', id: KR3ed038_jc_065-d67.d2.d2d28}
  - {type: 'tls:div-start', offset: 9618, content: '', id: KR3ed038_jc_065-d67.d2.d2d29, level: 4, head_text: 瘡疹身熱而脈反遲}
  - {type: 'tls:head', offset: 9618, content: '', id: KR3ed038_jc_065-d67.d2.d2.d29.h1s1}
  - {type: 'tls:div-end', offset: 9746, content: '', id: KR3ed038_jc_065-d67.d2.d2d29}
  - {type: 'tls:div-start', offset: 9746, content: '', id: KR3ed038_jc_065-d67.d2.d2d30, level: 4, head_text: 瘡疹非微汗則表不解}
  - {type: 'tls:head', offset: 9746, content: '', id: KR3ed038_jc_065-d67.d2.d2.d30.h1s1}
  - {type: 'tls:div-end', offset: 9967, content: '', id: KR3ed038_jc_065-d67.d2.d2d30}
  - {type: 'tls:div-start', offset: 9967, content: '', id: KR3ed038_jc_065-d67.d2.d2d31, level: 4, head_text: 瘡疹既出不盡透透而不長血疱}
  - {type: 'tls:head', offset: 9967, content: '', id: KR3ed038_jc_065-d67.d2.d2.d31.h1s1}
  - {type: 'tls:div-end', offset: 10207, content: '', id: KR3ed038_jc_065-d67.d2.d2d31}
  - {type: 'tls:div-start', offset: 10207, content: '', id: KR3ed038_jc_065-d67.d2.d2d32, level: 4, head_text: 未出可下已出不可下出已定當利其大小便}
  - {type: 'tls:head', offset: 10207, content: '', id: KR3ed038_jc_065-d67.d2.d2.d32.h1s1}
  - {type: 'tls:div-end', offset: 10310, content: '', id: KR3ed038_jc_065-d67.d2.d2d32}
  - {type: 'tls:div-start', offset: 10310, content: '', id: KR3ed038_jc_065-d67.d2.d2d33, level: 4, head_text: 發瘡疹有微盛}
  - {type: 'tls:head', offset: 10310, content: '', id: KR3ed038_jc_065-d67.d2.d2.d33.h1s1}
  - {type: 'tls:div-end', offset: 10445, content: '', id: KR3ed038_jc_065-d67.d2.d2d33}
  - {type: 'tls:div-start', offset: 10445, content: '', id: KR3ed038_jc_065-d67.d2.d2d34, level: 4, head_text: 瘡疹熱在表不可疏轉}
  - {type: 'tls:head', offset: 10445, content: '', id: KR3ed038_jc_065-d67.d2.d2.d34.h1s1}
  - {type: 'tls:div-end', offset: 10591, content: '', id: KR3ed038_jc_065-d67.d2.d2d34}
  - {type: 'tls:div-start', offset: 10591, content: '', id: KR3ed038_jc_065-d67.d2.d2d35, level: 4, head_text: 瘡疹出大盛}
  - {type: 'tls:head', offset: 10591, content: '', id: KR3ed038_jc_065-d67.d2.d2.d35.h1s1}
  - {type: 'tls:div-end', offset: 10702, content: '', id: KR3ed038_jc_065-d67.d2.d2d35}
  - {type: 'tls:div-start', offset: 10702, content: '', id: KR3ed038_jc_065-d67.d2.d2d36, level: 4, head_text: 傷寒與瘡疹同異}
  - {type: 'tls:head', offset: 10702, content: '', id: KR3ed038_jc_065-d67.d2.d2.d36.h1s1}
  - {type: 'tls:div-end', offset: 10792, content: '', id: KR3ed038_jc_065-d67.d2.d2d36}
  - {type: 'tls:div-start', offset: 10792, content: '', id: KR3ed038_jc_065-d67.d2.d2d37, level: 4, head_text: 未能辨認間服升麻湯已發未發用胡荽酒}
  - {type: 'tls:head', offset: 10792, content: '', id: KR3ed038_jc_065-d67.d2.d2.d37.h1s1}
  - {type: 'tls:div-end', offset: 11185, content: '', id: KR3ed038_jc_065-d67.d2.d2d37}
  - {type: 'tls:div-start', offset: 11185, content: '', id: KR3ed038_jc_065-d67.d2.d2d38, level: 4, head_text: 張氏論瘡疹氣勻即出快}
  - {type: 'tls:head', offset: 11185, content: '', id: KR3ed038_jc_065-d67.d2.d2.d38.h1s1}
  - {type: 'tls:div-end', offset: 11360, content: '', id: KR3ed038_jc_065-d67.d2.d2d38}
  - {type: 'tls:div-start', offset: 11360, content: '', id: KR3ed038_jc_065-d67.d2.d2d39, level: 4, head_text: 瘡疹血疱作成膿疱令人心膈煩躁不安}
  - {type: 'tls:head', offset: 11360, content: '', id: KR3ed038_jc_065-d67.d2.d2.d39.h1s1}
  - {type: 'tls:div-end', offset: 11574, content: '', id: KR3ed038_jc_065-d67.d2.d2d39}
  - {type: 'tls:div-start', offset: 11574, content: '', id: KR3ed038_jc_065-d67.d2.d2d40, level: 4, head_text: 瘡疹身熱耳尖腳稍冷腹內痛或塊}
  - {type: 'tls:head', offset: 11574, content: '', id: KR3ed038_jc_065-d67.d2.d2.d40.h1s1}
  - {type: 'tls:div-end', offset: 11809, content: '', id: KR3ed038_jc_065-d67.d2.d2d40}
  - {type: 'tls:div-start', offset: 11809, content: '', id: KR3ed038_jc_065-d67.d2.d2d41, level: 4, head_text: 愛護將理}
  - {type: 'tls:head', offset: 11809, content: '', id: KR3ed038_jc_065-d67.d2.d2.d41.h1s1}
  - {type: 'tls:div-end', offset: 12086, content: '', id: KR3ed038_jc_065-d67.d2.d2d41}
  - {type: 'tls:div-start', offset: 12086, content: '', id: KR3ed038_jc_065-d67.d2.d2d42, level: 4, head_text: 手足冷腹中硬為瘡疹}
  - {type: 'tls:head', offset: 12086, content: '', id: KR3ed038_jc_065-d67.d2.d2.d42.h1s1}
  - {type: 'tls:div-end', offset: 12199, content: '', id: KR3ed038_jc_065-d67.d2.d2d42}
  - {type: 'tls:div-start', offset: 12199, content: '', id: KR3ed038_jc_065-d67.d2.d2d43, level: 4, head_text: 聖惠方論瘡疹未見乃可疏利}
  - {type: 'tls:head', offset: 12199, content: '', id: KR3ed038_jc_065-d67.d2.d2.d43.h1s1}
  - {type: 'tls:div-end', offset: 12353, content: '', id: KR3ed038_jc_065-d67.d2.d2d43}
  - {type: 'tls:div-start', offset: 12353, content: '', id: KR3ed038_jc_065-d67.d2.d2d44, level: 4, head_text: 石壁經論瘡疹歌備詳其證}
  - {type: 'tls:head', offset: 12353, content: '', id: KR3ed038_jc_065-d67.d2.d2.d44.h1s1}
  - {type: 'tls:div-end', offset: 12476, content: '', id: KR3ed038_jc_065-d67.d2.d2d44}
  - {type: 'tls:div-start', offset: 12476, content: '', id: KR3ed038_jc_065-d67.d2.d2d45, level: 4, head_text: 辨劉氏論轉下張氏論用藥}
  - {type: 'tls:head', offset: 12476, content: '', id: KR3ed038_jc_065-d67.d2.d2.d45.h1s1}
  - {type: 'tls:div-end', offset: 12641, content: '', id: KR3ed038_jc_065-d67.d2.d2d45}
  - {type: 'tls:div-end', offset: 12641, content: '', id: KR3ed038_jc_065-d67.d2d2}
  - {type: 'tls:div-start', offset: 12641, content: '', id: KR3ed038_jc_065-d67.d2d3, level: 3, head_text: 論痘疹已出證第二}
  - {type: 'tls:head', offset: 12641, content: '', id: KR3ed038_jc_065-d67.d2.d3.h1s1}
  - {type: 'tls:div-start', offset: 12649, content: '', id: KR3ed038_jc_065-d67.d2.d3d2, level: 4, head_text: 瘡疹熱與諸般熱不同}
  - {type: 'tls:head', offset: 12649, content: '', id: KR3ed038_jc_065-d67.d2.d3.d2.h1s1}
  - {type: 'tls:div-end', offset: 12930, content: '', id: KR3ed038_jc_065-d67.d2.d3d2}
  - {type: 'tls:div-start', offset: 12930, content: '', id: KR3ed038_jc_065-d67.d2.d3d3, level: 4, head_text: 瘡疹出視輕重}
  - {type: 'tls:head', offset: 12930, content: '', id: KR3ed038_jc_065-d67.d2.d3.d3.h1s1}
  - {type: 'tls:div-end', offset: 13599, content: '', id: KR3ed038_jc_065-d67.d2.d3d3}
  - {type: 'tls:div-start', offset: 13599, content: '', id: KR3ed038_jc_065-d67.d2.d3d4, level: 4, head_text: 瘡疹疏利與取轉不同}
  - {type: 'tls:head', offset: 13599, content: '', id: KR3ed038_jc_065-d67.d2.d3.d4.h1s1}
  - {type: 'tls:div-end', offset: 13794, content: '', id: KR3ed038_jc_065-d67.d2.d3d4}
  - {type: 'tls:div-start', offset: 13794, content: '', id: KR3ed038_jc_065-d67.d2.d3d5, level: 4, head_text: 辨董汲指迷方論與錢氏活人書不同}
  - {type: 'tls:head', offset: 13794, content: '', id: KR3ed038_jc_065-d67.d2.d3.d5.h1s1}
  - {type: 'tls:div-end', offset: 14198, content: '', id: KR3ed038_jc_065-d67.d2.d3d5}
  - {type: 'tls:div-start', offset: 14198, content: '', id: KR3ed038_jc_065-d67.d2.d3d6, level: 4, head_text: 治瘡疹方宜不同用藥亦異}
  - {type: 'tls:head', offset: 14198, content: '', id: KR3ed038_jc_065-d67.d2.d3.d6.h1s1}
  - {type: 'tls:div-end', offset: 14600, content: '', id: KR3ed038_jc_065-d67.d2.d3d6}
  - {type: 'tls:div-start', offset: 14600, content: '', id: KR3ed038_jc_065-d67.d2.d3d7, level: 4, head_text: 瘡疹戒失飢不可當風冷}
  - {type: 'tls:head', offset: 14600, content: '', id: KR3ed038_jc_065-d67.d2.d3.d7.h1s1}
  - {type: 'tls:div-end', offset: 14846, content: '', id: KR3ed038_jc_065-d67.d2.d3d7}
  - {type: 'tls:div-start', offset: 14846, content: '', id: KR3ed038_jc_065-d67.d2.d3d8, level: 4, head_text: 瘡疹有大熱者當利小便有小熱者當解毒}
  - {type: 'tls:head', offset: 14846, content: '', id: KR3ed038_jc_065-d67.d2.d3.d8.h1s1}
  - {type: 'tls:div-end', offset: 15064, content: '', id: KR3ed038_jc_065-d67.d2.d3d8}
  - {type: 'tls:div-start', offset: 15064, content: '', id: KR3ed038_jc_065-d67.d2.d3d9, level: 4, head_text: 小便赤澀心腹脹滿}
  - {type: 'tls:head', offset: 15064, content: '', id: KR3ed038_jc_065-d67.d2.d3.d9.h1s1}
  - {type: 'tls:div-end', offset: 15187, content: '', id: KR3ed038_jc_065-d67.d2.d3d9}
  - {type: 'tls:div-start', offset: 15187, content: '', id: KR3ed038_jc_065-d67.d2.d3d10, level: 4, head_text: 先曾利而後瘡疹出不可再利但解毒而已}
  - {type: 'tls:head', offset: 15187, content: '', id: KR3ed038_jc_065-d67.d2.d3.d10.h1s1}
  - {type: 'tls:div-end', offset: 15328, content: '', id: KR3ed038_jc_065-d67.d2.d3d10}
  - {type: 'tls:div-start', offset: 15328, content: '', id: KR3ed038_jc_065-d67.d2.d3d11, level: 4, head_text: 煩躁而渴}
  - {type: 'tls:head', offset: 15328, content: '', id: KR3ed038_jc_065-d67.d2.d3.d11.h1s1}
  - {type: 'tls:div-end', offset: 15448, content: '', id: KR3ed038_jc_065-d67.d2.d3d11}
  - {type: 'tls:div-start', offset: 15448, content: '', id: KR3ed038_jc_065-d67.d2.d3d12, level: 4, head_text: 瘡疹煩躁睡臥不安者}
  - {type: 'tls:head', offset: 15448, content: '', id: KR3ed038_jc_065-d67.d2.d3.d12.h1s1}
  - {type: 'tls:div-end', offset: 15584, content: '', id: KR3ed038_jc_065-d67.d2.d3d12}
  - {type: 'tls:div-start', offset: 15584, content: '', id: KR3ed038_jc_065-d67.d2.d3d13, level: 4, head_text: 麩疹斑毒狀如蚊蚤所齧毒盛而黑色者}
  - {type: 'tls:head', offset: 15584, content: '', id: KR3ed038_jc_065-d67.d2.d3.d13.h1s1}
  - {type: 'tls:div-end', offset: 15836, content: '', id: KR3ed038_jc_065-d67.d2.d3d13}
  - {type: 'tls:div-start', offset: 15836, content: '', id: KR3ed038_jc_065-d67.d2.d3d14, level: 4, head_text: 誤服涼藥冰伏瘡疹者服胃愛散}
  - {type: 'tls:head', offset: 15836, content: '', id: KR3ed038_jc_065-d67.d2.d3.d14.h1s1}
  - {type: 'tls:div-end', offset: 15998, content: '', id: KR3ed038_jc_065-d67.d2.d3d14}
  - {type: 'tls:div-start', offset: 15998, content: '', id: KR3ed038_jc_065-d67.d2.d3d15, level: 4, head_text: 瘡子便血糞黑睡不醒者}
  - {type: 'tls:head', offset: 15998, content: '', id: KR3ed038_jc_065-d67.d2.d3.d15.h1s1}
  - {type: 'tls:div-end', offset: 16070, content: '', id: KR3ed038_jc_065-d67.d2.d3d15}
  - {type: 'tls:div-start', offset: 16070, content: '', id: KR3ed038_jc_065-d67.d2.d3d16, level: 4, head_text: 瘡疹已出而腹脹}
  - {type: 'tls:head', offset: 16070, content: '', id: KR3ed038_jc_065-d67.d2.d3.d16.h1s1}
  - {type: 'tls:div-end', offset: 16363, content: '', id: KR3ed038_jc_065-d67.d2.d3d16}
  - {type: 'tls:div-start', offset: 16363, content: '', id: KR3ed038_jc_065-d67.d2.d3d17, level: 4, head_text: 當下當救里}
  - {type: 'tls:head', offset: 16363, content: '', id: KR3ed038_jc_065-d67.d2.d3.d17.h1s1}
  - {type: 'tls:div-end', offset: 16539, content: '', id: KR3ed038_jc_065-d67.d2.d3d17}
  - {type: 'tls:div-start', offset: 16539, content: '', id: KR3ed038_jc_065-d67.d2.d3d18, level: 4, head_text: 瘡疹既下懼太早}
  - {type: 'tls:head', offset: 16539, content: '', id: KR3ed038_jc_065-d67.d2.d3.d18.h1s1}
  - {type: 'tls:div-end', offset: 17039, content: '', id: KR3ed038_jc_065-d67.d2.d3d18}
  - {type: 'tls:div-start', offset: 17039, content: '', id: KR3ed038_jc_065-d67.d2.d3d19, level: 4, head_text: 誤下證}
  - {type: 'tls:head', offset: 17039, content: '', id: KR3ed038_jc_065-d67.d2.d3.d19.h1s1}
  - {type: 'tls:div-end', offset: 17236, content: '', id: KR3ed038_jc_065-d67.d2.d3d19}
  - {type: 'tls:div-end', offset: 17236, content: '', id: KR3ed038_jc_065-d67.d2d3}
  - {type: 'tls:div-start', offset: 17236, content: '', id: KR3ed038_jc_065-d67.d2d4, level: 3, head_text: 論瘡痘已出後復生他疾第三}
  - {type: 'tls:head', offset: 17236, content: '', id: KR3ed038_jc_065-d67.d2.d4.h1s1}
  - {type: 'tls:div-start', offset: 17248, content: '', id: KR3ed038_jc_065-d67.d2.d4d2, level: 4, head_text: 瘡疹當令大便過者有當溫者有當令下者}
  - {type: 'tls:head', offset: 17248, content: '', id: KR3ed038_jc_065-d67.d2.d4.d2.h1s1}
  - {type: 'tls:div-end', offset: 17711, content: '', id: KR3ed038_jc_065-d67.d2.d4d2}
  - {type: 'tls:div-start', offset: 17711, content: '', id: KR3ed038_jc_065-d67.d2.d4d3, level: 4, head_text: 瘡疹或吐或瀉或不食}
  - {type: 'tls:head', offset: 17711, content: '', id: KR3ed038_jc_065-d67.d2.d4.d3.h1s1}
  - {type: 'tls:div-end', offset: 18077, content: '', id: KR3ed038_jc_065-d67.d2.d4d3}
  - {type: 'tls:div-start', offset: 18077, content: '', id: KR3ed038_jc_065-d67.d2.d4d4, level: 4, head_text: 瘡疹皆多在表不可妄下}
  - {type: 'tls:head', offset: 18077, content: '', id: KR3ed038_jc_065-d67.d2.d4.d4.h1s1}
  - {type: 'tls:div-end', offset: 18267, content: '', id: KR3ed038_jc_065-d67.d2.d4d4}
  - {type: 'tls:div-start', offset: 18267, content: '', id: KR3ed038_jc_065-d67.d2.d4d5, level: 4, head_text: 瘡疹陷伏倒靨}
  - {type: 'tls:head', offset: 18267, content: '', id: KR3ed038_jc_065-d67.d2.d4.d5.h1s1}
  - {type: 'tls:div-end', offset: 19309, content: '', id: KR3ed038_jc_065-d67.d2.d4d5}
  - {type: 'tls:div-start', offset: 19309, content: '', id: KR3ed038_jc_065-d67.d2.d4d6, level: 4, head_text: 瘡痘黑陷耳尻反熱}
  - {type: 'tls:head', offset: 19309, content: '', id: KR3ed038_jc_065-d67.d2.d4.d6.h1s1}
  - {type: 'tls:div-end', offset: 19613, content: '', id: KR3ed038_jc_065-d67.d2.d4d6}
  - {type: 'tls:div-start', offset: 19613, content: '', id: KR3ed038_jc_065-d67.d2.d4d7, level: 4, head_text: 瘡黑亦有逆順者}
  - {type: 'tls:head', offset: 19613, content: '', id: KR3ed038_jc_065-d67.d2.d4.d7.h1s1}
  - {type: 'tls:div-end', offset: 19869, content: '', id: KR3ed038_jc_065-d67.d2.d4d7}
  - {type: 'tls:div-start', offset: 19869, content: '', id: KR3ed038_jc_065-d67.d2.d4d8, level: 4, head_text: 瘡疹出遲朝夜啼哭}
  - {type: 'tls:head', offset: 19869, content: '', id: KR3ed038_jc_065-d67.d2.d4.d8.h1s1}
  - {type: 'tls:div-end', offset: 20081, content: '', id: KR3ed038_jc_065-d67.d2.d4d8}
  - {type: 'tls:div-start', offset: 20081, content: '', id: KR3ed038_jc_065-d67.d2.d4d9, level: 4, head_text: 瘡疹凸凹生瘡}
  - {type: 'tls:head', offset: 20081, content: '', id: KR3ed038_jc_065-d67.d2.d4.d9.h1s1}
  - {type: 'tls:div-end', offset: 20220, content: '', id: KR3ed038_jc_065-d67.d2.d4d9}
  - {type: 'tls:div-start', offset: 20220, content: '', id: KR3ed038_jc_065-d67.d2.d4d10, level: 4, head_text: 瘡疹大便如常}
  - {type: 'tls:head', offset: 20220, content: '', id: KR3ed038_jc_065-d67.d2.d4.d10.h1s1}
  - {type: 'tls:div-end', offset: 20550, content: '', id: KR3ed038_jc_065-d67.d2.d4d10}
  - {type: 'tls:div-start', offset: 20550, content: '', id: KR3ed038_jc_065-d67.d2.d4d11, level: 4, head_text: 瘡疹誤服熱藥則損目服冷藥則無不夭傷}
  - {type: 'tls:head', offset: 20550, content: '', id: KR3ed038_jc_065-d67.d2.d4.d11.h1s1}
  - {type: 'tls:div-end', offset: 20762, content: '', id: KR3ed038_jc_065-d67.d2.d4d11}
  - {type: 'tls:div-start', offset: 20762, content: '', id: KR3ed038_jc_065-d67.d2.d4d12, level: 4, head_text: 斑爛}
  - {type: 'tls:head', offset: 20762, content: '', id: KR3ed038_jc_065-d67.d2.d4.d12.h1s1}
  - {type: 'tls:div-end', offset: 20995, content: '', id: KR3ed038_jc_065-d67.d2.d4d12}
  - {type: 'tls:div-start', offset: 20995, content: '', id: KR3ed038_jc_065-d67.d2.d4d13, level: 4, head_text: 感寒與瘡疹伏熱混雜而發者}
  - {type: 'tls:head', offset: 20995, content: '', id: KR3ed038_jc_065-d67.d2.d4.d13.h1s1}
  - {type: 'tls:div-end', offset: 21286, content: '', id: KR3ed038_jc_065-d67.d2.d4d13}
  - {type: 'tls:div-start', offset: 21286, content: '', id: KR3ed038_jc_065-d67.d2.d4d14, level: 4, head_text: 郁毒不散}
  - {type: 'tls:head', offset: 21286, content: '', id: KR3ed038_jc_065-d67.d2.d4.d14.h1s1}
  - {type: 'tls:div-end', offset: 21758, content: '', id: KR3ed038_jc_065-d67.d2.d4d14}
  - {type: 'tls:div-start', offset: 21758, content: '', id: KR3ed038_jc_065-d67.d2.d4d15, level: 4, head_text: 飲乳嬰兒與能食童子用藥不同}
  - {type: 'tls:head', offset: 21758, content: '', id: KR3ed038_jc_065-d67.d2.d4.d15.h1s1}
  - {type: 'tls:div-end', offset: 22030, content: '', id: KR3ed038_jc_065-d67.d2.d4d15}
  - {type: 'tls:div-start', offset: 22030, content: '', id: KR3ed038_jc_065-d67.d2.d4d16, level: 4, head_text: 瘡疹本稀不可發表}
  - {type: 'tls:head', offset: 22030, content: '', id: KR3ed038_jc_065-d67.d2.d4.d16.h1s1}
  - {type: 'tls:div-end', offset: 22293, content: '', id: KR3ed038_jc_065-d67.d2.d4d16}
  - {type: 'tls:div-start', offset: 22293, content: '', id: KR3ed038_jc_065-d67.d2.d4d17, level: 4, head_text: 瘡疹無凝滯則勿表勿下}
  - {type: 'tls:head', offset: 22293, content: '', id: KR3ed038_jc_065-d67.d2.d4.d17.h1s1}
  - {type: 'tls:div-end', offset: 22582, content: '', id: KR3ed038_jc_065-d67.d2.d4d17}
  - {type: 'tls:div-start', offset: 22582, content: '', id: KR3ed038_jc_065-d67.d2.d4d18, level: 4, head_text: 瘡痂起而能食}
  - {type: 'tls:head', offset: 22582, content: '', id: KR3ed038_jc_065-d67.d2.d4.d18.h1s1}
  - {type: 'tls:div-end', offset: 22735, content: '', id: KR3ed038_jc_065-d67.d2.d4d18}
  - {type: 'tls:div-start', offset: 22735, content: '', id: KR3ed038_jc_065-d67.d2.d4d19, level: 4, head_text: 黑靨而未發寒}
  - {type: 'tls:head', offset: 22735, content: '', id: KR3ed038_jc_065-d67.d2.d4.d19.h1s1}
  - {type: 'tls:div-end', offset: 23584, content: '', id: KR3ed038_jc_065-d67.d2.d4d19}
  - {type: 'tls:div-start', offset: 23584, content: '', id: KR3ed038_jc_065-d67.d2.d4d20, level: 4, head_text: 可下證}
  - {type: 'tls:head', offset: 23584, content: '', id: KR3ed038_jc_065-d67.d2.d4.d20.h1s1}
  - {type: 'tls:div-end', offset: 23841, content: '', id: KR3ed038_jc_065-d67.d2.d4d20}
  - {type: 'tls:div-end', offset: 23841, content: '', id: KR3ed038_jc_065-d67.d2d4}
  - {type: 'tls:div-start', offset: 23841, content: '', id: KR3ed038_jc_065-d67.d2d5, level: 3, head_text: 論雜病第四}
  - {type: 'tls:head', offset: 23841, content: '', id: KR3ed038_jc_065-d67.d2.d5.h1s1}
  - {type: 'tls:div-start', offset: 23846, content: '', id: KR3ed038_jc_065-d67.d2.d5d2, level: 4, head_text: 諸惡證}
  - {type: 'tls:head', offset: 23846, content: '', id: KR3ed038_jc_065-d67.d2.d5.d2.h1s1}
  - {type: 'tls:div-end', offset: 24135, content: '', id: KR3ed038_jc_065-d67.d2.d5d2}
  - {type: 'tls:div-start', offset: 24135, content: '', id: KR3ed038_jc_065-d67.d2.d5d3, level: 4, head_text: 先知節候陰陽臟腑虛實}
  - {type: 'tls:head', offset: 24135, content: '', id: KR3ed038_jc_065-d67.d2.d5.d3.h1s1}
  - {type: 'tls:div-end', offset: 24611, content: '', id: KR3ed038_jc_065-d67.d2.d5d3}
  - {type: 'tls:div-start', offset: 24611, content: '', id: KR3ed038_jc_065-d67.d2.d5d4, level: 4, head_text: 行房觸犯燒赤朮豬甲}
  - {type: 'tls:head', offset: 24611, content: '', id: KR3ed038_jc_065-d67.d2.d5.d4.h1s1}
  - {type: 'tls:div-end', offset: 24879, content: '', id: KR3ed038_jc_065-d67.d2.d5d4}
  - {type: 'tls:div-start', offset: 24879, content: '', id: KR3ed038_jc_065-d67.d2.d5d5, level: 4, head_text: 初生服生地黃汁令不生瘡}
  - {type: 'tls:head', offset: 24879, content: '', id: KR3ed038_jc_065-d67.d2.d5.d5.h1s1}
  - {type: 'tls:div-end', offset: 24991, content: '', id: KR3ed038_jc_065-d67.d2.d5d5}
  - {type: 'tls:div-start', offset: 24991, content: '', id: KR3ed038_jc_065-d67.d2.d5d6, level: 4, head_text: 瘡疹毒氣令胃爛便血}
  - {type: 'tls:head', offset: 24991, content: '', id: KR3ed038_jc_065-d67.d2.d5.d6.h1s1}
  - {type: 'tls:div-end', offset: 25272, content: '', id: KR3ed038_jc_065-d67.d2.d5d6}
  - {type: 'tls:div-start', offset: 25272, content: '', id: KR3ed038_jc_065-d67.d2.d5d7, level: 4, head_text: 餘毒失解利則嘔吐並諸雜證}
