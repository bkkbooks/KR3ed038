  - {type: 'tls:div-end', offset: 26221, content: '', id: KR3ed038_jc_065-d67.d2.d5d11}
  - {type: 'tls:div-start', offset: 26221, content: '', id: KR3ed038_jc_065-d67.d2.d5d12, level: 4, head_text: 熱毒攻肝衝於目}
  - {type: 'tls:head', offset: 26221, content: '', id: KR3ed038_jc_065-d67.d2.d5.d12.h1s1}
  - {type: 'tls:div-end', offset: 26452, content: '', id: KR3ed038_jc_065-d67.d2.d5d12}
  - {type: 'tls:div-start', offset: 26452, content: '', id: KR3ed038_jc_065-d67.d2.d5d13, level: 4, head_text: 瘡疹後餘毒咳嗽脅痛}
  - {type: 'tls:head', offset: 26452, content: '', id: KR3ed038_jc_065-d67.d2.d5.d13.h1s1}
  - {type: 'tls:div-end', offset: 26635, content: '', id: KR3ed038_jc_065-d67.d2.d5d13}
  - {type: 'tls:div-start', offset: 26635, content: '', id: KR3ed038_jc_065-d67.d2.d5d14, level: 4, head_text: 傷寒熱毒甚則不可不發表}
  - {type: 'tls:head', offset: 26635, content: '', id: KR3ed038_jc_065-d67.d2.d5.d14.h1s1}
  - {type: 'tls:div-end', offset: 26742, content: '', id: KR3ed038_jc_065-d67.d2.d5d14}
  - {type: 'tls:div-start', offset: 26742, content: '', id: KR3ed038_jc_065-d67.d2.d5d15, level: 4, head_text: 瘡疹餘毒不盡煩渴胸滿}
