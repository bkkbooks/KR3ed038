  - {type: 'tls:div-end', offset: 29960, content: '', id: KR3ed038_jc_065-d67.d2.d5d32}
  - {type: 'tls:div-start', offset: 29960, content: '', id: KR3ed038_jc_065-d67.d2.d5d33, level: 4, head_text: 痘癰}
  - {type: 'tls:head', offset: 29960, content: '', id: KR3ed038_jc_065-d67.d2.d5.d33.h1s1}
  - {type: 'tls:div-end', offset: 30197, content: '', id: KR3ed038_jc_065-d67.d2.d5d33}
