  - {type: 'tls:div-end', offset: 28267, content: '', id: KR3ed038_jc_065-d67.d2.d5d22}
  - {type: 'tls:div-start', offset: 28267, content: '', id: KR3ed038_jc_065-d67.d2.d5d23, level: 4, head_text: 瘡疹入目防備法}
  - {type: 'tls:head', offset: 28267, content: '', id: KR3ed038_jc_065-d67.d2.d5.d23.h1s1}
  - {type: 'tls:div-end', offset: 28474, content: '', id: KR3ed038_jc_065-d67.d2.d5d23}
  - {type: 'tls:div-start', offset: 28474, content: '', id: KR3ed038_jc_065-d67.d2.d5d24, level: 4, head_text: 瘡疹攻咽毒}
  - {type: 'tls:head', offset: 28474, content: '', id: KR3ed038_jc_065-d67.d2.d5.d24.h1s1}
  - {type: 'tls:div-end', offset: 28665, content: '', id: KR3ed038_jc_065-d67.d2.d5d24}
  - {type: 'tls:div-start', offset: 28665, content: '', id: KR3ed038_jc_065-d67.d2.d5d25, level: 4, head_text: 瘡疹大小便不通}
  - {type: 'tls:head', offset: 28665, content: '', id: KR3ed038_jc_065-d67.d2.d5.d25.h1s1}
  - {type: 'tls:div-end', offset: 28873, content: '', id: KR3ed038_jc_065-d67.d2.d5d25}
  - {type: 'tls:div-start', offset: 28873, content: '', id: KR3ed038_jc_065-d67.d2.d5d26, level: 4, head_text: 乳下嬰兒服湯藥多則反為累}
