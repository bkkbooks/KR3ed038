  - {type: 'tls:div-end', offset: 25652, content: '', id: KR3ed038_jc_065-d67.d2.d5d7}
  - {type: 'tls:div-start', offset: 25652, content: '', id: KR3ed038_jc_065-d67.d2.d5d8, level: 4, head_text: 預服油劑以解瘡毒}
