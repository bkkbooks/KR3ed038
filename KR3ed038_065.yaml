  - {type: 'tls:div-end', offset: 25944, content: '', id: KR3ed038_jc_065-d67.d2.d5d9}
  - {type: 'tls:div-start', offset: 25944, content: '', id: KR3ed038_jc_065-d67.d2.d5d10, level: 4, head_text: 誤以巴豆丸子藥下之則內虛而熱不除}
