  - {type: 'tls:div-start', offset: 29715, content: '', id: KR3ed038_jc_065-d67.d2.d5d31, level: 4, head_text: 瘡疹後餘毒諸方}
  - {type: 'tls:head', offset: 29715, content: '', id: KR3ed038_jc_065-d67.d2.d5.d31.h1s1}
  - {type: 'tls:div-end', offset: 29851, content: '', id: KR3ed038_jc_065-d67.d2.d5d31}
  - {type: 'tls:div-start', offset: 29851, content: '', id: KR3ed038_jc_065-d67.d2.d5d32, level: 4, head_text: 消瘢痕}
