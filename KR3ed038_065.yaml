  - {type: 'tls:div-end', offset: 29536, content: '', id: KR3ed038_jc_065-d67.d2.d5d29}
  - {type: 'tls:div-start', offset: 29536, content: '', id: KR3ed038_jc_065-d67.d2.d5d30, level: 4, head_text: 瘡疹入目用藥}
  - {type: 'tls:head', offset: 29536, content: '', id: KR3ed038_jc_065-d67.d2.d5.d30.h1s1}
