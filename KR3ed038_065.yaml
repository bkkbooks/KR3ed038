body:
  text: 瘡診論卷之六十五論瘡痘初出證第一論瘡診世嘗治瘡疹與傷寒時疫傷食風熱潮熱疳熱疑似之間便與一藥均而治之殊不知邪正不同虛實各異輕者至重重者性命危於風燭束手待斃誠為可哀今試論之且瘡診與傷寒時疫等證始者均為發熱又有他證不同可相為別證則列之次篇小兒身熱耳冷尻冷咳嗽固瘡疹也雖然五臟證各別究之則歸一臟也疹疹為內實而生熱毒由兒在母腹中所受非若內虛而感外寒之比蓋古方論云風熱傷胎生兒口噤風冷傷胎生兒躽啼納汙則為血癖胎弱則為諸癇積驚而夜啼蘊熱而斑毒以此觀之子之虛實由母之盛衰所致也母若有疾亦為子患故知瘡痘在母腹中蘊熱毒也非若一歲中有異氣暴寒時疫風熱傷食比比學者不可不察錢氏云疹痘是母腹中所受積穢故五臟各有一證夫人始生而蒙衝和均稟五行陰陽形態變易蓋母導胎育有盛衰虛實在其子也皆是母胎所受是知積穢故生下有瘡疹則五臟各見一證其呵欠頓悶者肝也時發驚悸者心也乍驚乍熱手足冷者脾也面目腮赤咳嗽時嚏者肺也腎在腑下不納穢濁瘡黑者屬腎由冒風冷內虛之所致也且以嬰兒初生下惡血未咽綿脂拭之兒吞惡血在胸膈者吐以甘草如惡血入腹中者利以黃連綠豆粉皆以革惡穢也此乃世用保子之常法觀已生既出腹外其母之虛實邪正在於子也況在腹中同母氣血呼吸出入豈非受積穢而成乎錢氏論之當矣瘡診論日數熱毒蒸三日則熱運於肌而紅斑生惟紅斑生至足為出齊不可拘多少重者遍身輕者數枚而已以紅斑生血疱血疱起如豆在肌皮之上故以痘名焉血疱結膿疱膿疱結痂疕方為愈者紅點出者以紫草飲子欲出速用胡荽酒紅點出齊之後作血疱血疱七日則當結膿窠此皆大略之言爾病人虛實不等不可拘以日數但正應病日形證以為活法古人云熱三日而成斑有熱五七日而生斑者有至十餘日而生斑者但足上有斑為出齊不可拘以日數也自斑至足有為出齊出齊之後長成血疱血疱七日當結膿疱苟若血疱中又尚有紅斑點相夾而生則不可拘以日數待其皆作血疱為齊為血疱當結膿血痂疕至七日以上而不結膿血痂疕當此恐毒氣內外貫注倒靨急與豬尾膏服則隨時結痂疕故以血疱出七日為齊若七日為期膿疱血疱出齊而不結膿血痂疕則失其平矣大抵小兒有病發熱日數稍久用藥者便當預防為瘡疹證蓋熱不解而熱毒運於肌中變為瘡疹故也所以不可不防也如紅斑出齊生血疱血疱七日結膿疱此乃榮衛調和內外無諸感冒方能如期且如血疱正作之際遇天令寒暑燥濕固不節氣候異宜遲速因而失敘亦不可拘日數但以紅斑皆為血疱日為齊若出血疱七日病人氣虛尚有紅斑未能皆生成血疱者毒氣為未盡當此合宜溫肌快榮衛藥以托之且以皆出血疱七日為期膿疱如期結痂疕矣如當結膿疱而不結此是毒氣彌盛而不斂用豬尾膏以解之此為急務然豬尾膏是治毒氣盛血疱脹起不結膿血痂疕血熱瘡毒盛後入心故也非或外感風寒倒靨內虛吐瀉陷伏者更宜詳之瘡疹出於心則有先驚搐者夫熱吐熱瀉不可投燥藥傷寒而身熱不可便投涼藥瘡疹發搐不可投驚藥此皆外同而內異也素問云瘡瘍煩躁痛癢皆出於心今瘡疹出於心驚搐亦出於心也瘡疹毒氣始作心火大盛則生風生風則驚悸甚則搐搦熱氣蒸盛則煩躁為瘡疹則痛癢矣所以為驚搐為煩躁為痛癢為瘡疹數證心所主者必備無一闕焉如始者毒氣蘊於心臟則驚悸搐搦醫者不以內外證辨明之不為瘡疹防之便以銀粉腦麝青黛硃砂硝石等投之則心寒而肌斂毒氣內伏是瘡疹而驚搐者無由而出也此證似驚風用藥當作瘡疹防備之蓋瘡疹之初似驚風者多醫者不審便作驚風治之為害不淺大抵瘡疹必有他證相雜必先有咳嗽痰涎心神驚悸煩躁嘔吐唇紅頰赤發渴耳冷足冷脈數舌白如有此數證則銀粉涼心藥切不可用之心一涼而肌斂伏何由運出又有小兒平常安樂皆無疾病忽然發搐者必是瘡疹尤當審諦之蓋毒氣內盛但以發散毒氣如惺惺散消毒散升麻湯紅綿散兼以快氣利小便祛風等藥與服之此等藥雖未能即效亦不至敗事其證次第待其熱氣得泄於肌膚心氣亦自定矣有風寒與內熱相搏而驚搐者則各見其證治之亦如前法但加勻氣藥為妙張氏云瘡疹氣勻即出快氣行即榮衛無滯有寒亦散瘡疹當自出矣紅斑點隱隱在肌中似出不出者紅斑點隱隱在肌中似出不出者此由榮衛有病也蓋蘊熱而生斑毒非熱毒則不能成斑瘡矣小兒所稟有虛有實且寶鑑云受父精不足者頭骨巨以顱開母氣衰微肌體虛而肉極此皆所稟不足者大抵瘡疹緣兒在母腹中食穢而成蘊熱卻能隨天氣非節之暖而蒸出如冬月應寒而反熱謂之冬溫亦有隨春氣暄暖而出者有因他病發熱而蒸出者此皆發熱於外所蘊熱毒隨之出於肌中為瘡疹醫者不能防備見其熱而攻其熱殊不知因他病蒸發而其中有瘡子證已存焉者若蒸既成斑疹而出使內虛而無熱以應之則瘡疹雖見而外無壅盛之氣內不得泄外無由復入當此之際其人面青而惡寒肌肉慢而不食精神昏倦令瘡疹隱隱在肌膚似出不得出者內虛寒也有身熱面赤者又大便利小便清有此證者但溫中進食然後榮衛自復則毒氣隨多少出而不至太過與不及矣有人於此見瘡疹出遲不能溫里但用發散與之又豈知內無陽以相應更發陽氣外出令瘡疹色白其人必脫當此反言既出得甚好忽然而斃如此者不可勝數此為虛脫也世常患之活人書云瘡疹出遲者以活血散用白芍藥末入酒數點湯調服之及人齒散幼幼新書云患瘡疹而瀉甚者至於硫黃附子之姜亦可用蓋胃溫而榮衛復行疹疹必出矣夫治病用藥或冷或熱不同所以救一時之不及有人於此或見瘡疹隱隱在肌膚欲出而不出不以為榮衛虛則以為脾胃冷猶在發散或下之發之為斑爛為虛脫下之而愈危殆矣其不誤人者幾希如瘡疹始作身熱似傷寒口耳尖並腳冷或腹痛者是瘡疹必大便閉而腮頰赤若大便自利面青手足冷且溫之若臟腑如常或秘者可用蟬殼散樺皮湯發灰飲兔肉醬兔毛煎湯浴之出後咳嗽脅痛吐食不下赤茯苓湯赤瘡子者犀角散未能勻者必勝散靈苑云未發令內消已發解利並出得太盛俱宜用玳瑁湯最良養生方瘡疹與他證相似疑似之間宜升麻湯及已髮結痂疕亦宜服解利之藥正患瘡疹並稟受怯弱者皆不宜用之可用獨勝散荊芥散安斑散紅子湯快斑散如聖散調中散犀角湯化毒湯紫草木通湯牛蒡散紅綿散消毒散控心散奪命散黃耆散皆可選而用之恐出太密者牛蒡甘草散預解風壅毒令不生瘡子者羌活散疹疹出有逆順瘡疹既出而有逆順者三有時之逆順有虛實之逆順有出入之逆順且春夏陽氣發生瘡疹出之為順秋冬陽氣伏藏瘡疹出之為逆此時之逆順也何謂虛實之逆順大小便秘而能食者此為實順也大小便利而不能食者此為虛逆也此虛實之逆順也何謂出入之逆順大抵瘡疹出者為順倒靨隱伏者為逆此出入之逆順也要之傷寒熱在表而不可下者恐裡虛不能作汗而解故也瘡疹發熱在表結膿痂必先得其裡實則外方不隱伏此簡易平直之理人之通論也又有稟氣弱而內虛冷因出瘡疹間大便自利懼其陷伏至於服姜附硫黃豆蔻鍾乳桂術等藥以助之至於平安者固有之又有內實皮厚肉密難出毒氣不得渲泄至於服大黃硫石龍膽乾葛大青梔子木通石膏服之至於平安者亦有之此皆臨用則隨時變通豈可執泥於一曲哉瘡疹出遲有數證瘡疹出遲有數證不可不辨一者出紅斑於肌膚之中紅點生為血疱血疱生膿胞膿胞結痂疕而方愈若紅點見至數日而反不出者此為毒氣復陷其證危也蓋小兒熱毒在內又遇冬溫或春夏暄暖內外皆熱郁發腠理遂為瘡疹始者瘡疹出必先為紅斑點或遇天氣大寒肌膚閉密毒氣反伏而不出則身涼內躁面青而煩或譫言妄語當此之際宜用解肌表出之藥如紫草散猴犁酒發散如活血散之類又有紅斑點方出於外或內虛或食生冷或投涼劑宣瀉致令臟腑虛冷不食自利亦復陷而不出者宜用溫里之藥蓋謂裡虛寒故也益黃散活血散參朮丸之類以溫之此紅斑既見不可復入者但宜溫出之一也二者瘡疹已見斑點斑點盡生成血疱者期七日而結膿疱今一半尚為斑點未全皆為血疱此毒氣半出故也緣瘡疹遇冬溫或春月陽氣乍暄其熱毒一時隨天氣運出於肌中當其未出則內外皆熱及其出也則外盛而裡虛大抵五行四時寒暑則從漸而久非節氣之冬溫而夏冷來暴而去速小兒為暴熱運行內熱出外天之暴熱一退令兒外盛而裡虛虛則無陽以應瘡痘故出遲令半出半未出也故半為斑點半為血疱當此必不能食乳大便如常小便清白者宜用半溫里半發表之藥如紫草蟬殼芍藥葡萄酒以表之如活血散人齒散以溫之內虛甚者生寒寒則大便或溏或瀉宜理中益黃豆蔻丁香之類以溫里里溫則氣不消削氣不消削則不伏陷矣蓋胃腑為里既得溫暖與肌膚相應血氣溫深方能蒸出也三者瘡疹既出太盛而不出者尋之臟腑無病榮衛自和無諸虛實寒熱為害但遲遲不結痂疕而反成血片甚者至於內陷其瘡黑靨爛臭痛如刀剜由毒氣入心悶亂而危此由雜氣衝之房室觸犯故也故仲景云瘡疹未生之間宜燒赤朮豬甲以辟惡氣勿令外人入房及勞人力狐臭人熏觸其中縱得安者亦必瘢痕經年黑色也坐臥切忌當風寒愈而成瘡疥宜燒黑牛糞貼之則速愈而無瘢痕矣左右上下安胡荽酒以御汗氣惡氣食葡萄以利小便大凡患瘡疹處常燒乳香最闢諸惡氣不可不知人之榮衛遇香則行遇臭則止故惡氣不可不闢譬如物理相感木得桂而枯雌黃遇明粉而黑亦如此之意前人既有所戒在後人不得不遵之論諸熱失治變為瘡疹候病有初同而後異有初異而後同者此皆物極則反勢使之變也若不通而變之則似是而非若同而異迷而不反者有矣且傷寒傷風傷食風熱均是熱也須詳辨之且如手足指微冷而青煩躁而惡寒左額有青紋者傷寒也面赤而鼻流清涕手足煩躁自汗惡風者傷風也眼胞腫而右額有青筋頭與肚俱熱胸滿不食腹脹者傷食也面青紅額正中有青紋手掌心有汗獨處不安時發驚怖手絡肚微動似驚惕此驚熱也身熱而倍能食唇紅面赤大小便秘脅下汗此風熱也夫諸熱證則均究其所以熱則異且諸證皆熱也故人身無非常之熱亦無非常之冷但溫和而已今失於將理肌膚蘊熱蒸於一身蓋善醫者如此而汗如此而下隨證滲泄應手而愈若用藥遲速失序當溫反吐療熱以溫則變證百出蒸為瘡疹者多矣且前諸證皆熱也瘡疹亦熱也熱毒蘊於肌中失於治療皆可變為瘡疹故傷寒則有胃爛發斑小兒則有胃熱發斑冬溫則有溫毒發斑故初發熱則不同其蘊熱則同此乃後同而初異皆瘡疹證也夫知其始異不致於變成瘡疹者明矣不知其始異救其變成瘡疹者敗矣瘡疹作搐水流濕火就燥此勢之必至瘡疹本熱熱則動心此理之自然夫心火熱而生肝風肝風旺而克脾土脾土受克於中則上下氣不循環五行之氣無以相制則心火獨盛於上肺金受火克而無力不能制伏肝木熱則生風風火盛而脾土衰熱氣相擊動於心神必喜為熱神氣不安故發驚也當此此宜瀉肝利小便風定而斑疹隨出心臟斑脾臟疹瀉肝則風去利小便則心熱退矣風熱既定則驚搐亦自愈矣昧者見風火相勝而作搐不顧瘡疹便用水銀硃砂黑錫腦子硝石諸般涼藥以治之使已出者反陷伏則當出而不能出蓋瘡瘍煩躁痛癢皆出於心心熱太過則搐古人治大熱則利小便熱雖甚不能蘊蓄為驚搐之害今心受熱投以寒涼損心胃藥以冷之則其氣斂何由而出況中焦即冷上焦熱愈不降其熱尤甚常見小兒患此誤投寒毒藥至死者臨終則遍身斑出以致不救蓋心一寒無緣發已在表者命終氣散黑靨陷伏已無及矣要之但是治驚當平肝去風利小便最為要妙況瘡疹在發驚之後何不謹防瘡疹之敗耶又況治驚者專用涼毒藥使脾滯心氣不降尤為驚病大害況後有瘡疹者乎瘡疹論疏利龐安常云冬月溫暖小兒至春月必出瘡痘則冬月預服三豆飲子以解利之千金論云人之初生便服生地黃汁數蜆殼而下黑糞則無瘡疹矣外臺方云時行暄暖便服油劑又瘡疹盛行恐相傳染煎茜根汁與服以解利之此皆防微杜漸見其未兆間以疏利為良也何嘗拘於臨發熱時然後利之耶且如用升麻湯是治未發已發皆可可服夫未發之意其為未見斑點以前可服之已發之意其為已結痂疕以後服今人咸稱方狀云治已發未發皆可服之曾不知稟氣厚者則庶幾若受氣薄者則為害不淺遂使遲速失度致於陷伏者多矣然則小兒稟氣厚者能食唇紅頰赤渴水睡中譫語或時啼哭又遇天氣暄熱易生瘡疹逐時以少藥疏利心肺使熱毒皆散縱有瘡疹亦輕矣雖曰小兒純陽亦有稟受怯弱內無蘊熱雖天氣暄若面青大小便如常無熱者則不可輕用解利藥恐反生他疾故用解利藥者宜審察虛實可也蓋瘡痘屬血熱轉下屬穀氣今言小兒發斑瘡此熱在裡而未發者斑毒未出則宜疏散熱毒導引快利使無壅遏何嘗以轉下為法況疏利與轉下相去之甚遠疏利者如三豆飲子油劑生地黃茜根紫草湯升麻之類又何嘗在已發斑之後用也瘡疹雖有轉下之法非謂瘡疹而轉下因生內熱使瘡疹毒氣內外蒸郁恐生他疾方以疏導之以平為期因瘡疹外熱臟腑受熱內外皆熱遂令正患瘡疹之中大便秘裡急後重小便赤澀腹滿而喘渴飲水漿手掌心並腋下汗出譫言妄語能食而瘡痘不結痂疕此是胃中谷氣瘡疹熱毒蒸蘊亦熱至甚方可令大便調過一二次使里無壅遏之患而已轉下雖有內熱亦不可過利常因有內熱昧者偶然大利使內虛痘疹必陷反為深害不可不知故傷寒下之早為結胸瘡疹下之早為陷伏或有不問虛實寒熱見出不快便下之言瘡疹是熱毒壅殊不知瘡疹因熱而得出因虛寒不熱而陷如此為害者甚多大抵治小兒純陽多熱毒固為防瘡疹之患然身不熱斑未出以前內有熱證可下者則下之若已出斑瘡疏利在結疕之後二者迎合毒氣在臟腑則宣利之毒氣在肌膚則疏散之若瘡疹在肌膚無空瀉腸胃之理又云才覺是瘡疹便宣利使出快此恐方宜不同用藥亦異若執之以為用則得失相半治疾用藥豈專在於補瀉當隨證所宜斯為活法矣論表出與溫里不同瘡疹因熱而生斑此皆因熱氣藏於腸胃故因內熱與外熱相合隨榮衛運於肌膚則為瘡疹矣夫外熱者或感寒或感風風熱驚熱皆感外邪而生熱苟失於治療邪氣盛則實實則生熱故為外熱也既為瘡疹因熱而生斑因寒而陷伏蓋熱則出而散寒則收而斂當此溫肌表散而已又有熱毒正盛因煩熱而食生冷或服涼劑使胃寒則榮衛流注循行失度不能運化當此溫里最為宜也此則內外之感當隨證滲泄或感風寒閉密腠理而瘡痘不出或出紅點或血疱其肌膚青白而惡寒鼻流清涕耳與陰皆熱宜與表散則可如惺惺正氣散活血散紅綿散紫草湯之類是表散之藥也其內傷生冷或服涼藥過劑或吐或利此為裡寒急宜溫里以救之其人必大小便利腹痛不食或嘔此宜用理中丸益黃散五積散治中湯之類若醫者不明於此裡寒不能運出當溫之反發散外寒所伏不能出當表散而復下之是皆表裡不分寒溫失度當察其證論瘡痘膚疹臟腑不同表裡有異是以瘡痘與膚疹分淺深也腑屬陽有熱則易出是以名膚疹膚疹一出便如痱瘡細疱出於肌皮之上一出而便沒以言膚疹在肌其所受氣淺故易出也臟屬陰有熱則難出其為瘡痘在肌肉血脈間必先出紅斑而後生成如痘故名瘡痘其所受氣深是以難出也暴熱而便出者必膚疹久熱而難出者必瘡痘不可不知天氣暄熱即與疏轉後有瘡疹則輕既出不可疏利瘡疹所感而未成既成瘡疹而已出瘡疹出盡而結膿痂此三者邪氣輕重表裡先後不同用藥亦異方書云才覺是瘡疹便與疏轉即輕者大凡用藥之意是瘡疹便與疏轉蓋冬月究觀天氣暄暖至春夏陽氣發生兩熱相合則生病或嬰孩或童子內藏蘊熱天氣暄暖即唇紅頰赤又渴飲水咳嗽痰盛睡中驚悸此皆熱氣所作以意推之臟腑蘊熱春夏必發瘡疹以藥疏利臟腑熱氣既去縱有瘡痘亦輕此冬時便當即解之今人不然見紅斑已出熱毒在表復轉下之是表熱不除胃氣大虛無以運行榮衛毒氣輒伏入里則多危斃矣但既成瘡疹而已出是紅斑見時切不可疏轉其熱氣已在表故也既結膿疱者是毒氣已出而未結痂疕恐毒氣再入臟腑餘毒為害即宜疏利之則不生他疾矣以此觀之疏利在未發瘡子之前及已愈之後不在瘡子正發出時利也瘡疹已出諸證不一響應桴影逐形動則隨之病有證榮有性用則應之如虛補實瀉未當不愈也瀉虛而補實未嘗不危也瘡痘本蘊熱毒於內及其發也體熱則血脈敷榮於外要在血氣溫深胃氣盛壯水升火降然後熱不能伏藏隨血氣以流於肌絡結瘡痘而出豈一證可拘有胃虛不食而出或吐或瀉不食可見也則宜溫之有榮衛虛弱不能出者惡寒面青白肌膚軟慢似出不出者是榮衛弱也當和其榮衛如活血散可也有已出被風所感不能出者或發熱或狂言或風搐或遍身青紫紋是也當發散如惺惺散殭蠶散有已出而服冷藥或食生冷而內寒沉伏不出者則令瘡黑靨潮熱啼哭或白色腹脹口氣目閉四肢微厥如人齒散理中湯可也有出甚被穢氣所熏觸則成血片燒乳香如胡荽酒可也有誤服表藥過多遍身成一片謂之斑爛者宜安養之如六神七珍散內補散雙和湯可也有正出盛服涼心藥沉伏在裡發心寒戰靨伏者如丁香豆蔻薑桂當歸附子可也有本虛少用藥大發之出得正盛忽然氣脫者此里本虛也如丹砂養氣理中益黃等可也有出毒氣彌盛內外通遂無陰氣所感但血疱灌注結痂疕不成者七日以上豬尾膏證是也其證各異宜細辨之論瘡疹熱毒所起之由熱毒伏於臟腑則蒸於肌膚而成瘡疹非熱毒則不能出或感四時非節之氣或感外寒相搏於榮衛邪氣盛則實實則生熱因熱而成斑或傷食滯於中焦心氣不下隔熱而斑生或心熱甚則生風風盛搐搦如驚癇而生斑是皆熱有所起之由其熱至極動臟腑之熱而成瘡疹也則五臟各見一證且呵欠頓悶肝熱也時發驚悸心熱也乍涼乍熱手足冷脾熱也面目腮頰赤嗽嚏肺熱也腎居下焦不受穢無諸證但瘡黑者屬腎也良由不謹風冷或因失肌內虛毒氣伏陷歸腎則變黑色靨黯世皆言瘡疹是熱此人之通稱也因熱而內外相蒸兩熱相合陽喜歸外熱蒸而出昧者不察見瘡疹發熱諸證已見便與疏利殊不知疏轉當時未覺為害後因瘡子出盛之時胃氣因疏而致虛不能運出使人不覺是先疏轉為害則因內虛為倒靨為不食為下利為昏倦變證百出不知所遇之初因疏轉為害而瘡疹出遲醫者不察當此又增發散更或下之愈增重困因此又救之不善他疾必生殊不知傷寒因身熱而下早為結胸傷寒身熱固不可下瘡疹毒氣已發在表尤不可疏轉固言小兒因身熱耳冷尻冷咳嗽輒用利藥毒氣入里則殺人因知傷寒身熱為汗解瘡疹身熱為瘡疹為血疱為膿窠為痂疕而方愈則瘡疹又不宜利甚於傷寒身熱不可下無以異也其瘡疹有宜利者在合下證詳論之矣大抵瘡疹是熱毒非熱則不能出瘡子有大熱者當利其小便有小熱者當解毒是亦利其熱也何必須轉利反虛其穀氣耶故知瘡疹是熱毒銼其熱則瘡疹反不出為陷伏為害更深矣瘡疹已出不可服油劑冬嚴寒而反溫小兒陽盛而陰微無陰以制之則熱停於胸膈令兒頭髮豎直飲食以減此伏熱之兆便宜解之服油劑隨時便服預以防之也如千金方論人之初生服生地黃汁一蜆殼則不害瘡疹龐氏論冬月天氣溫暖小兒至春陽氣發生必發瘡疹宜預服三豆飲子常論瘡疹未發服升麻葛根湯此皆未見紅點時先服以防之豈是身熱斑生而用者且油劑三豆飲子升麻湯是皆預用之或是冬月應寒而反熱名曰冬溫前人推度之小兒純陽至春陽氣發生與伏熱相搏必作瘡疹故隨冬溫時以服之又何嘗見斑點時服耶千金論人之初生服生地黃汁數蜆殼終身不患瘡疹此為知幾尤防於未然者若斑點已出則不可服油劑矣瘡疹有發出者有溫出者有解毒者病之在人所得有輕重善用藥者能使病重者即輕病輕者即安故仲景謂之隨證滲泄最為活法且瘡疹身熱而煩躁喘滿脈促有諸瘡疹證不見斑點其熱未退者以麻黃等湯發之若已出斑點者即止不用再服此表發出之也或稟受虛寒脾胃怯弱或服冷藥至多傷於脾胃令兒手足逆冷脈息遲細大便溏而小便清者炮乾薑炙甘草湯豆蔻丁香參朮藥可選而用之此溫里使令自出也或瘡疹出後有餘毒者下利黃赤膿血身熱而渴當以薤白湯與解之於斯二者或發或溫或解能審而用之瘡可保無虞矣瘡疹雖有熱證大便如常過則不可再下事物以中為正臟腑以溫為平故過熱大涼皆非所宜臟腑有熱者則大便數日不通熱蓄血聚壅遏不行勢必增劇不得已則下之若或下為害不淺故大便如常是內無蓄熱切不可再下此前人言之諄復者蓋驚策後人使無誤爾方書論五實證人能食而大便秘脈大皮熱無汗又有熱證相兼睹可下之又論五虛證令人不能食嘔吐皮寒脈細大小便利則宜補之以此而觀臟腑既已過如常則知里無毒熱若下之者豈不為重虛者乎大便既如常有大熱證者但利其小便則雖熱亦不能為害矣常觀病者大便不濡瀉有虛證用溫藥而愈者有矣大便濡瀉又用下藥而愈者未之聞也雖或有之是食積或冷熱不和互相為害但半補半利去其食積分其冷熱此非正下者也不可妄發妄下一物具一性一性有一用藥之必或補或瀉或表或下或散或斂既各不同若能以所性施之所用用之當則遂時而病愈故錢氏論發散轉下皆稱不可妄者恐其用之不當爾且瘡疹諸證俱見及斑點既生若無內外寒熱虛實者但安養之待其所蘊多少任其自然則無太過不及之患如此非為當時不生他證亦病後易於將理今人則不然才瘡疹斑點方出不顧所蘊輕重多寡心速而惟恐不出故用藥表而出之服以紫草蟬蛻副以人齒猴梨並與酒面芫荽無所不試曾不知毒氣遇藥發之則一為十十為百百為千千為萬一之變合為一瘡方書稱名斑爛至於五內七竅皆有則重者為之不救輕者為聲啞為目疾為斑爛為閉耳塞鼻之患又有用表藥過多瘡表則盛里無陽氣以應之為虛脫者多矣此妄表者之過也大抵瘡疹已出方賴熱氣運其毒氣以出出則無眩冒壅悶之苦善攻其熱者熱甚則利其小便熱輕則解其毒氣昧理者不知但言瘡疹是熱無時進涼劑致於胃氣虛羸令兒胸滿腹脹又且下之致內虛毒氣入里則殺人甚眾此不善下之過也錢氏稱不可妄發妄下誠不誣矣要之治熱以溫涼而行之未至於冷治寒以溫未至於熱當從其漸而已合下合發各有其證則論又詳具矣發熱有時則應臟腑知其斑瘡痘水疱膿疱谷空而響答形動而影隨舉此而得彼也故錢氏云熱應時而出是見熱而知臟腑明矣且以一日而觀之寅卯辰時熱者屬肝為水疱巳午未熱者屬心為斑子醜寅熱者脾疹也耳腎不受穢無證但出瘡疹變黑屬腎申酉戌時熱者屬肺為膿疱觀其熱發有時亦知瘡疹之所本是亦即前錄後之先見也蘊熱而斑毒人之將理失之於微積微成損故冰厚三尺非一日之寒蘊熱而斑毒非一日之熱皆積微成著也大抵小兒自然陽盛而陰微況朝夕飲啜熱乳兼重衣溫厚幃帳周密則傷皮膚害血脈瘡瘍發黃是生多疾此蘊熱而斑毒者表裡皆受熱也宜預服升麻湯消毒散紫草湯油劑為良又有傷寒發斑為感寒毒失於解利邪氣盛則實實則熱熱毒而斑生遍身如被蚊蚤所齧不作瘡胞起但赤斑點者此五死一生之證作黑點者九死一生之證名曰發斑非瘡痘之比皆稱曰斑故因而及之瘡痘有數證疹起如痱瘡隨出隨愈此名麩疹其毒輕瘡痘如豆水疱如淚而青小膿疱有膿而大其形各異又有心斑脾疹五臟各有所主不可不知瘡痘已出未能勻人之平居樂逸則心神安靜氣體和平及其病則陰陽偏勝盛衰雖不同故令虛實不齊是以瘡疹已出不能遍勻前人治法透肌解毒而已使毒得出肌透消解氣既無壅遏則自然出勻也用必勝散快毒丹令出快紫草飲胡荽酒紅粉丹自然勻順之瘡子未發者令內消前人於瘡疹防微杜漸無不盡其意焉見小兒遇天氣溫熱或冬溫恐發瘡疹遂以犀角玳瑁二味磨汁與服之以茜草煎汁與消之則未發者令內消已發者亦能解利使毒氣不致太盛或有伏熱瘡疹未出四肢微熱飲食似減頭髮干立或時額多微熱宜服生油方最佳瘡疹發熱而痛者癢為虛痛為實又云諸寒為痛又云內快而外痛者為外實內虛外快而內痛者為內實外虛是以聖惠方云痛者言其通也則痛為實可知矣今瘡疹身熱而疼是時行寒熱所感未能解也故用麻黃湯水解散以解肌汗出寒熱自已瘡疹亦無阻矣瘡疹出不快病之始末不同深淺各異瘡疹之出不快者非一端用之當隨宜而已且瘡疹紅斑點出日數未盡其內實而肌熱者宜疏利有里自利者宜溫里斑點見齊血疱結起遲者實熱大小便秘渴而腹脹者宜勻氣解毒甚熱者宜利小便虛而自利者宜溫里調榮衛蓋血疱出甚亦令小兒內虛故也自血疱作膿疱膿疱不結痂疕者當此毒氣已出在表但解餘毒而已故出遲名同出遲先後之序不同醫者當辨毒氣在表在裡若虛若實補瀉調解隨治之此是正瘡疹證無諸內外邪氣所感者也若患瘡疹中說有所感冒則治療不同且患瘡疹正出遇時令寒暑燥濕風不節則脈證與居常相異用藥則不同尤當消息且正患瘡疹中暑氣大作則或煩躁而咽痛或喘滿而作渴此乃暑氣與瘡疹表裡熱氣並遏壅滯而出不快宜與白虎湯荊芥散如出瘡疹中遇天氣暴寒令兒膚腠秘密寒氣結聚出不快者宜用麻黃正氣散之類又有瘡疹正出煩躁飲冷過多或誤服涼藥使胃冷無以運行榮衛致中滿則上下氣不升降出不快者宜用理中湯薑黃散活血散至於下痢者硫附豆蔻之類皆可選而用之又有瘡出正盛內外熱氣壅遏血蓄結聚令兒能食腹脹不大便煩躁而渴手掌里有汗喘滿出不快者此由毒氣與心火貫注無陰氣以斂之宜用乳香豬血膏紫金散豬尾膏飲之或瘡疹正出被惡沖觸房室觸犯禁忌或狐臭人勞力人氣觸著令出不快者宜燒豬甲赤朮乳香常燒令氣不絕仍上下安胡荽酒以御之是以略舉其數證方書但云出不快而已皆在隨所得之由變通若大小便秘氣壅遏而出不快紫草木通散是瘡疹發而不出者鉤藤紫草散氣澀出而不快滑石散取竅滑故也氣虛者以脫齒散活血散倒靨者以紫金散如聖散開花蘿蔔煎汁與服之蟬蛻甘草散獵血乳香丸獵血麝香丸木星飲紫草膏瘡疹已出熱滯喉舌生瘡懊悶氣慌煩渴多睡精神昏塞者以透肌散主之伏熱在胃腹脹便赤者四聖散瘡疹不出傷寒不語干野人糞散瘟毒既發痘瘡不出者地黃豆豉散瘡疹面青者逆素問云內臟心肺聲色彰明大凡病在臟腑其證皆見於外所以瘡疹病而煩躁面赤者心也面黃體倦者脾也面青多怒者肝也喘嚏面浮而白者肺也面黑善恐欠耳尻手足厥者腎也此五臟有五色常與寸口尺內相應其不相應者病也又曰色之與脈當參相應其不相應者病今瘡疹屬心令人身熱煩躁驚悸面赤皆屬於心其赤者順今面色青是色不與病相應為不順也當更察外證防備之故素問云色以應日脈以應月今瘡疹臨時觀之豈不以色應日也瘡疹當唇紅頰赤而反青色其為病實者必生風大小便秘而燥渴者實也虛者必下利不食四肢厥者虛也各宜用藥預製之瘡疹身熱而脈反遲脈數為熱脈遲為寒此最驗也數熱屬腑遲寒屬臟今瘡疹在表屬腑而外發熱脈反遲者屬臟而為寒是脈不應其病陽病而得陰脈也宜當溫之以活血散當歸散人齒散之類臟寒下利脈遲者以甘草乾薑湯豆乳散之類蓋得胃氣既溫榮衛以和則或汗或疹而解矣其脈遲者是胃氣虛冷榮衛不足故也瘡疹非微汗則表不解用藥之法貴簡而當則病重者輕而危者安且瘡疹證雖蘊久熱然發斑之際必因天氣暄暖或感風而發熱或驚熱或傷食而熱因熱而生斑疹斑未出者方其初發熱得微汗散之後雖為斑瘡亦輕此由非微汗則表不解也其證令人身熱頭痛鼻中壅塞咽喉不利咳嗽目赤毛焦皮膚緊而脈數此皆熱極為瘡痘雖順而出毒氣亦不輕議者始以微汗解散其毒漸輕矣如水解散控心散麻黃湯等主之如斑點已出則謹不可用此法蓋自然出快則不可表表之成斑爛又有用發散隨汗為白珠子或出小紅瘡亦因汗而毒氣隨散不可不知也瘡疹既出不盡透透而不長血疱瘡疹既出隱隱在肌膚不盡出透盡透而不長血疱此皆脾胃虛榮衛怯弱使然也良由一時被天氣暄暖諸暴熱壅而成斑點斑點既出無陽氣以應之故令在肌膚隱隱而不出也當此則先和脾胃以行榮衛榮衛既暖毒無所容則出矣故前人用人齒散活血散皆暖榮衛以發之發之斑未出者用乳香豬心血丸出而不盡透者以豬血麝香塗手足心唇上最為要妙或以紫草散之類並脫殼散皆隨寒熱虛實而投之又有當出被外風寒所逼而不能出者其人必鼻流清涕頭痛宜以解利藥隨證溫散也又有被風寒所迫而不能出其人必鼻流清涕頭痛發熱宜以麻黃湯解利之未出可下已出不可下出已定當利其大小便毒氣在裡瘡疹未出者可下毒氣在表瘡疹見斑點已出者不可下如已出定結膿窠尚有熱證見者當利在大小便此猶恐重有餘毒不盡因而生疾其大小腸主出而不納有餘毒可利之前人一動一靜必有至理存焉發瘡疹有微盛是瘡疹證而熱數日瘡疹不出進退皆難誠可慮也便欲大發之懼其瘡本稀而成斑爛成倒靨不發之又無以散毒熱故方書論始以微發之微發之而不出即加藥加藥不出則大發之大發之後或出不多或無斑疹脈息和平無他證者即瘡疹本稀不可更發也以此思之皆是用藥有漸發散不至太過亦不至不及亦用藥之善也瘡疹熱在表不可疏轉毒氣在表宜散在裡宜下此為不易之法也今瘡痘熱在表卻用疏轉其里是表裡不分是故有人於一言一字無不審之其在表宜散在裡宜下其瘡疹是熱毒在表每每妄下虛其里則至於夭傷多矣殊不知傷寒身扇在表者不可下故活人書論瘡疹身熱耳冷尻冷咳嗽輒用利藥即毒氣入里殺人尤甚刀刃瘡疹固有下者自有可下證別具其詳矣瘡疹出大盛瘡疹出太盛而面黃大便黑色煩喘燥渴或腹脹此為有瘀血在裡故也宜以犀角地黃湯及治瘡疹中鼻衄吐血毒氣未盡有餘瘀血皆可服之然出得太盛燥渴者服甘草散其未出者亦可服之煩喘甚者以麻黃湯咽痛而嗽者入麝香服之尤妙出遲者與紫草飲子為良傷寒與瘡疹同異傷寒男體面黃女面赤增寒而口中無熱呵欠頓悶項急也瘡疹則腮赤燥多噴嚏悸動昏倦四肢冷傷寒當散瘡疹當溫平勻氣面赤腮赤之不同又有諸熱證蒸為瘡痘雖始終各變當隨證而治之不可泥於一曲未能辨認間服升麻湯已發未發用胡荽酒善治病者期於未然不善治者治已然昔人論升麻湯未能辨認間可服之是瘡子未發未見斑點之前可以內消所以服之若已發見斑點者不可服蓋升麻湯性大寒故也已發而服升麻湯是以出齊結痂疕之後方服解餘毒也往往人未知此見斑點既出而後服之令肌涼而反不得出為害極多用胡荽酒則曰已發未發皆可服之胡荽闢一切惡氣沖觸外護之用胡荽酒者酒胡荽於床帳左右上下安之可辟惡氣瘡疹正宜用之非升麻湯之比故知升麻湯未辨認間服之能消諸蘊熱而解毒於未然及其斑已見則當以和平藥安養之升麻葛根性大寒瘡疹既出而服之則反使寒弱為出遲為寒中為陷伏小兒稟受實者庶幾或所稟怯弱者最為大害不可不知故方書有直言瘡疹可下者有直言不可下者人之稟受不同方宜又異豈可執於一偏而不知變且北方冬月則風寒冰烈南方除夜天氣溫和花卉亦發萬物亦應時豐四季皆無毒熱酷寒之害以此觀之所稟既異所治亦殊在臨時隨宜而用之不可下與可下自有證候故執泥者乃醫之病矣張氏論瘡疹氣勻即出快難經云氣行則血行氣止則血止故氣主煦之血主濡之濡軟也氣行則血隨而行之氣滯則血壅之故張氏論瘡疹氣勻即出快蓋臟腑既有蘊毒方其壅於肌膚熱喜散而出為瘡疹熱亦不能復還榮衛周流血氣流注則出而無阻蓋氣勻即出快此其義也或有結搏或里有食滯於中焦不化或外寒所感皆令壅遏不通故氣既滯則血不流何由而出當此不能審察之財至危斃者有矣能使氣勻行而不滯瘡疹無不出者瘡疹血疱作成膿疱令人心膈煩躁不安瘡疹之發有漸當審次序可也若先後失序輕重失時斂散不得其宜則必見差誤矣夫斑瘡疹始作而未出者當疏利令輕也既出而成血疱當令榮衛升降調脾胃令不冷不熱及其將作膿毒氣正盛大腸不通者潤以通之大便自利者溫而固之小便不通者導之及其痂結則解散其毒此治之大體也且瘡疹作膿是血疱結造也心者主瘡瘍生煩躁當其作膿毒氣已出未得淨盡則毒氣應心而煩躁生矣若血疱作而煩躁此熱毒欲散未散之際但解熱毒而已宜用豆湯解之以黑豆煎汁放溫徐徐與飲瘡疹身熱耳尖腳稍冷腹內痛或塊病有似是而非若同而異者蓋肢體冷而腹痛者此毒氣在裡若不能審諦必作極冷治之反以熱藥為害愈深未冷極者不問身有無寒熱肢冷腹痛必大便自利蜷臥惡寒今身熱肢冷腹痛大便不通蓋熱毒在裡則熱甚而發厥伏熱深而瘡疹不能出者宜以蟬蛻末水煎服之而已出者亦可服之無害毒氣得泄則四肢溫暖腹痛自止矣前人論腹痛有虛有實腸鳴自利而腹痛者為虛痛乃是冷也腹滿而不大便者為實痛是熱也今腹中痛而不大便又身熱耳尖冷腳冷為瘡疹明矣又有瘡疹始發腹中有塊而痛醫者不能詳辨多作食積下之至於夭橫者多矣愛護將理小兒鼻塞摩囟以通之榮衛不和洗浴以通之腠理空疏粉末以密之此皆外可以通肌也及其瘡疹既作血肉作膿痂肌嫩未實諸氣可通恐惡氣有所觸犯而入故制方論使愛護而為防備計故云已出未出切忌見雜氣衝觸兼勞人及狐臭人熏之尤忌房勞人相近未愈者不可當風坐臥如當風即成疥癬也若瘡疥膿疱出可燒牛糞灰貼之則速愈而無瘢痕也及左右上下不可缺胡荽酒能御汗氣惡氣也若能食者時與葡萄食之為其能利小便及取出快如穗之義若斑爛膿痛甚者以乾淨黃土細羅以爆之仍數數食蜜若勢輕者則以芒硝和豬膽調塗瘡上勿令動著直候瘡痂落也有大段瘡發不通臥席者以麥麩簟臥將息不問已發未發皆可燒乳香於房室中令氣味不絕闢一切惡氣手足冷腹中硬為瘡疹臟腑已有伏熱而感外風寒以擊之此陰陽相搏於榮衛輕者在腑為疹重者在臟為瘡痘若手足稍冷尻陰冷腹中硬痛者是瘡疹證或有驚證者由蘊熱動心切不可誤投驚藥若驚藥誤投則毒邪內攻其瘡不出便至危殆或出後為靨倒但服平和勻氣發散藥必愈聖惠方論瘡疹未見乃可疏利凡嬰童患瘡痘候初覺似傷寒面色與四肢俱赤壯熱頭疼腰背痛足多厥冷眼睛或黃或赤脈息但多洪數絕大不定小便赤而大便多秘才覺四肢色候雖是瘡疹未攻皮毛穴出者可便服餌勻和臟腑疏利毒氣若瘡痘已結在皮毛穴間微微自出即不可疏利也或實膿水者卻可疏利也蓋熱毒已在外恐里有餘未解則可疏利也疏利宜黃連散青黛散當歸散石壁經論瘡疹歌備詳其證小兒瘡疹候偏多咳嗽痰涎作久疴熱候心神如怕物驚時羊眼白翻波認目看燈睛有焰吐來氣逆入相磨十歲夢中如發搐唇紅臉赤疏交羅湯水心煩頭滿熱耳冷腳冷發無過舌上有如粟米樣定知三日發交瘥此病未來宜早療莫將涼藥與伊摩細辨形證為妙用只將平藥以調和辨劉氏論轉下張氏論用藥劉氏云初虞世所著必用方大有益於世惟瘡疹去當轉下誤人甚多緣方宜不同所稟虛實有異故也蓋小兒瘡疹轉瀉則內虛毒氣不能運出復攻於裡陷伏多致夭傷張氏論用藥瘡疹服惺惺散次服人參羌活散等如壯熱未退切不可通利大便及溫熱藥恐令瘡疹不出二人之論與初虞世之論皆未可執須在臨時可溫則溫可下則下皆有可溫可下證別具詳之矣學者宜通變用之可也論痘疹已出證第二瘡疹熱與諸般熱不同發熱證候多般瘡疹亦發熱也其體熱則同所得之由不同須引證而辨明之則各異發熱如瘧狀熱作有時者名潮熱發熱飲食不減者名風熱發熱而頭熱肚熱右額有紋者名食熱發熱而多渴渴則瀉者名疳熱發熱唇上下汗出唇中間起一白疱子及耳陰皆冷者名變蒸發熱而額正中髮際有青紋下至眉心則發驚者名驚熱發熱而皮膚或赤色熱痛時時啼叫者名丹熱發熱目閉面赤色者名胎熱發熱而面赤汗出而鼻流清涕左額有青筋紋者名傷風熱發熱而面色青慘耳鼻冷惡寒無汗亦左額有青筋手足厥冷者此名傷寒熱也又有變蒸之中偶有時行寒疫者則耳與陰反熱若瘡疹發熱則不同然呵欠頓悶時發驚悸乍涼乍熱手足時冷面目腮頰赤嗽嚏者此皆瘡疹之熱證也瘡疹出視輕重病有輕重藥有淺深病深藥淺不能去病病淺藥深真氣受弊觀瘡疹分輕重而治之其瘡痘出稀者輕裡外肥紅者輕外黑裡白者輕瘡夾疹者半輕半重也一發而出盡者重也外黑而里赤者微重外白而里黑太重也青干勢陷昏睡汗出不止煩躁熱渴腹脹啼喘大小便不通者困也瘡中端黑點如針孔紺紫劇也論輕重為用藥之法輕者宜勻氣令其自出也半輕半重宜解毒毒散則自輕也毒氣重者宜利小便太重而勢劇者當隨證滲泄熱氣衝於心則譫言妄語則硃砂參苓之類可用也蒸於肝則搐搦狀若驚癇則防風羌活天麻全蠍南星之類可用也蒸於脾則腹脹渴水大便秘目腫則枳殼散橘曲山梔地黃之類可用也蒸於肺則喘急渴水咳嗽鼻乾則桑白皮馬兜鈴半夏之類皆可用毒氣歸腎而黑靨倒入者宜豬尾膏活血散皆可急而用之也又有風邪客搏於皮膚熱不得泄瘡變為癮疹之狀皮膚瘙癢者則輕又有內先蘊熱外被風邪相連搏於血則赤斑其毒亦深傷寒變瘡痘者其傷寒熱毒甚而發疱瘡其瘡色白或赤發於皮膚頭作瘭漿戴白膿者輕有紫黑作根隱隱在肌肉裡者其毒必甚重者五內七竅皆有瘡其形發如豆故以名焉大抵正瘡痘是母腹中時受積穢良由內實而斑毒生其感風感寒為癮疹為斑毒為痘瘡皆外邪乘內虛而伏於臟腑內外皆熱熱蓄血聚壅遏不行蘊結而成也所遇之初不同可不辨乎正瘡子內實而生者五臟各有一證前篇備論之矣且傷寒傷風何以別之面青四肢微厥無汗而惡寒耳與陰皆熱者傷寒也傷風者面赤四肢煩鼻流涕有汗惡風此二者宜審而早治之不爾必為瘡疹也若在母腹中蘊毒氣者千金方云兒初生以生地黃汁一蜆殼與服便黑糞為解又瘡多臨發未出之間以升麻湯解之冬溫以三豆飲子解之時氣發瘡疹恐相傳染以茜草根煎汁解之此皆瘡痘當用者惟傷寒傷風變為瘡痘是汗下失時之過瘡疹疏利與取轉不同瘡疹已出熱毒居表而不可疏利疏利是未出時即疏利之疏則散其熱氣利則滑其肌竅使熱毒則發泄而不壅遏其瘡疹輕而易出也及其瘡疹已出即不可疏利惟以和平勻氣藥調服為宜又曷常令人取轉耶且疏利與取轉相去遼遠疏利者是以輕涼之藥疏散使易出也如黃連散青黛散當歸散煩躁而臥不安頻煎豆湯徐徐服之取轉者是以峻快之藥轉下也如巴豆芒硝輕粉水銀之類是也疏利與取轉輕重殊等不可同日而語古言疏利今乃為取轉得不為誤耶辨董汲指迷方論與錢氏活人書不同小兒所稟有虛有實病證有寒有溫故良工隨宜而治各得其所今觀董汲與指迷方論其稟氣厚者或病熱而又失於解利有蘊積熱毒者治法則當利利之無不愈此由小兒稟氣已厚又有病熱而失於解利蘊熱在裡則宜利之利之無不愈矣此董汲指迷用藥之意皆熱毒未出於表蘊毒在裡時用之也若非錢氏方與活人書用藥之意錢氏論倒靨欲脾強而勝腎得身溫而渴陽氣復者可生也活人書云身熱耳冷尻冷輕用利藥則殺人二人之論身熱為瘡疹毒以在表氣虛在裡故不可利但以溫平解毒而已故知傷寒身熱而下之早毒氣入里為結胸瘡疹為熱在表下之早為黑靨為陷伏四人之論皆不可廢用之要得其宜後之醫者當以董汲指迷方治瘡疹未出預截熱毒若已出了者解利餘毒則無不愈矣以錢氏朱氏之意治瘡疹正作使外不至太過里不至陷伏亦無不愈者大抵治病皆當隨宜用之最為要法譬如小兒患有傷生冷者有伏熱者有被驚者有感風寒者有傷食者臨期分別豈可泥於一曲況習醫者又隨方而用之以愚觀之昧者徒互見其偏審之四說皆為可用治瘡疹方宜不同用藥亦異素問云一病而用藥各不同皆愈者何也此地勢使然爾且東方食魚而嗜咸令人黑色而疏理為病癰瘍以砭石治之西方風土剛強外邪不能傷其病生於里治之宜於毒藥北方風寒冰烈藏寒生滿病其治宜於炙焫南方天地所以長陽盛處其地下水土弱而霧露之所聚其民嗜酸而食胕病為攣痹治以微針中央地平以溫其生萬物也眾雜食而不勞病為痿厥寒熱其治宜於導引按蹺是以五方地勢高下不同治法亦異故仲景治傷寒用桂枝麻黃大青龍湯皆是熱性藥云四二方行之無不應驗惟江淮地暖處用加減法加升麻石膏知母之類是隨此五方地氣而用藥也又云病素有虛實者並用古方不在加減方當此隨時變通不可泥於一曲且西方風土剛強外邪不能襲病生於里其治宜毒藥利之設有陰證者亦須用理中湯四逆湯之類以復陽氣南方雖為陽精拱上其地下水土弱霧露之所聚病為攣痹設有陽證者即用大黃大青黃連葶藶苦酒之類以復陰氣也此皆前人得隨時增減之理則知瘡疹豈在專補專瀉但應當日脈證祛逐可也方宜各自不同故用藥豈可執泥哉瘡疹戒失飢不可當風冷人之飲良起居有消息虛實存焉且晝日起居行坐其氣血漸降也夜則倒眠血氣漸升則心安而逸也此上下升降虛實運動也且人之胸腹方其飢也則腸實而胃虛及其飽也則胃實而腸虛此平居飲食進而無病尚且一起居一飲食而一虛一實存焉況小兒在母腹中所蘊穢毒在臟腑欲出為裡熱熱甚而發於外其熱曝出其里曝虛正賴飲食湯藥以助之苟或失飢內無食以助胃何以運出其瘡痘則為黑靨陷伏者多矣此內虛所致也故不可失飢者此也又瘡疹正出乃表實裡虛心煩惡熱而欲冷或起居當風或失蓋覆則虛熱被外風寒所搏而為陷伏者亦多此外邪所致視瘡疹者可不謹歟瘡疹有大熱者當利小便有小熱者當解毒前人論瘡疹有大熱則當利其小便蓋大熱則皮熱脈實大小便皆不利心熱而渴氣滿而喘能食不結膿血痂疕當此裡熱既盛懼其生他疾故利小便心火有所導引雖不用冷藥熱亦自減去矣可待其瘡疹至熱過不為冷誤尤為良法其小熱則解毒蓋小熱不解大熱必生小熱而利小便則損氣當此有小熱不可利小便但解熱而已如玳瑁湯獨勝散安斑散如聖散紫草湯犀角飲此雖不利其小便其熱亦不能為害當思前人云大熱者方利其小便有小熱者尚不敢利其小便恐致損氣彼其妄下者可不慎乎小便赤澀心腹脹滿因瘡疹伏熱在胃則中有所膈上則心火不降故小便赤下則陰氣不能升故為心腹脹滿董氏紫草散發出其毒胃中熱散自然冰釋詳其藥味以紫草發散以黃耆定痛解毒生肌以枳殼治腹脹令大腸不秘氣通消脹以木通導心熱而利小便以甘草和之古人用藥必有至理焉可不以意推之先曾利而後瘡疹出不可再利但解毒而已飲食芳味雖能益人用之過亦能害人況烈毒剽悍之藥又在以下之後豈可再利之此五臟不可再傷故也蓋瘡疹未出也曾先利之今瘡疹始出則內無壅滯熱毒縱有亦已輕矣故云曾經下後惟有熱者但解毒其熱亦庶幾矣大抵瘡疹不經下亦有內虛者宜勻氣安養之又況曾下而後瘡疹出若又下之是重虛也煩躁而渴心經有熱則煩躁脾臟津液少必口燥咽乾而渴也瘡疹已出未出皆宜用甘草散若心煩發渴大便不通小便赤澀者宜服通關散煩而喘悶燈心湯主之夏月天氣大熱夾暑煩躁熱渴大便秘而小便赤者白虎湯人參煎服之虛煩發燥而渴小便不利者五苓散酒蒸黃連丸皆要藥也宜擇而用之瘡疹煩躁睡臥不安者陽氣勝而陰氣少則煩而躁甚則其心悸動不能安矣故身熱煩躁睡臥不安但清心利小便則自然安適若表不解身熱而煩躁睡臥不安者服水解散或結糞大便秘而煩躁不得收藏者必腹脹手掌心腋下有汗宜服麻仁丸或煎黑豆徐徐飲之甚者青黛散以水調服惟津液枯少虛煩乏氣晝夜不得眠者酸棗仁湯為良也麩疹斑毒狀如蚊蚤所齧毒盛而黑色者瘡疹陷伏虛實不同宜詳辨之有胃寒榮衛氣虛而陷伏者則肌膚慢瘡瘢皆白不欲食或嘔大便不秘小便清白者此皆宜溫之活血散人齒散胃愛散虛寒甚而至於自利間亦可用雖附子理中豆蔻亦可用瘡出為期又有毒氣內外壅遏熱蓄結聚而不散毒氣壅瘀於肌膚急出不得壅於毒氣倒靨黑色蓋血活如硃砂如雞冠色若毒瘀血聚則黑色又如蚊蚤所齧而黑色者由毒氣暴出瘀熱搏之故血凝而不得出為黑靨其證最惡其大小便秘腹脹滿喘急煩躁者宜用山梔子湯宣毒膏治黑瘡子患候無比散毒氣內攻紫黑色出不快者莊氏云斑瘡倒靨而黑色者謂之鬼瘡子宜豬尾血調腦子佳誤服涼藥冰伏瘡疹者服胃愛散小兒胃熱出斑瘡蓋胃者主一身肌肉其胃中熱則身熱身熱太甚斑毒得出胃熱既出其里已虛合以和平藥調助之又有醫者及病家未明乎此見其熱便用涼藥是里無熱又加冷藥則里稍寒使瘡子不能出也蓋有熱則氣散有寒則氣斂使肌膚急而腠理秘固瘡子輕者為出遲重者為倒靨可用胃愛散以溫之胃氣既復得溫榮衛復行則出矣故胃愛散以脾胃虛生寒而用之瘡子便血糞黑睡不醒者瘡子當出而不出者此由毒氣當散而不散也蓋心主血而營於血瘡疹不出毒氣瘀於裡則為便血黑色故神昏睡而不醒其證甚惡脫殼散犀角地黃湯主之瘡疹已出而腹脹瘡疹已出而腹脹者何此陰陽不和也此毒氣陷伏入里也二者緣毒氣已出而未盡又正熱或外傷寒而內傷於冷也大抵瘡毒正作熱毒蘊積則多渴煩躁而引飲又或投涼藥或飲冷水故熱被冷激而不能蒸出冷氣內拒而不能消化其冷熱毒氣相搏於裡則不消令人腹脹氣喘甚者發寒肢厥瘡瘢白而無血色或至不救急宜以溫中藥逐冷氣冷氣散則腹脹亦消昧者一見腹脹莫不更增宣瀉是謂重困蓋傷於冷者必不能食大小便利時時下氣此傷冷陰陽氣不和也又有毒氣陷伏入里者瘡疹出遲毒氣倒靨令兒腹脹亦宜用溫平解毒快氣藥如人齒散活血散之類服之大抵毒氣伏入者必有熱證相雜或渴或煩躁或大小便秘澀或啼哭不止者則陷伏黑靨證中具詳矣若腹脹目閉口中如爛肉臭者其證惡此難治當下當救里瘡子半出半不出此毒氣半在裡而不出盡故也或盛出大便不通小便赤澀喘粗腹脹而齒唇乾口燥引飲譫語者當急下之此由毒氣彌盛而內外皆熱若大便裡急後重者當令大便潤過內不燥不裡急後重腹不脹者且利其小便又有瘡子半出半不出下利四肢厥逆腹脹吃𠸺此由裡寒毒氣不能出故宜以姜附理中等藥急溫之一則言當下者恐毒氣復入故也一則言宜溫者恐無胃陽以行榮衛虛實之勢劇也故二者俱不可廢瘡疹既下懼太早人病有遲速藥當隨應而用可以速則速可以緩則緩如響應桴間不容櫛且瘡疹始出未有可下證但以和平藥調理之乳食飽哺之避風寒以溫之三者皆為保子之常法如瘡疹見而三五日尚未出者可微發之微發不出則大發之大發之出不多脈息平和無他證者即瘡本稀不可更表散也今人才見表不出熱又不退必便下之其內虛瘡子將發者則因利而不出瘡子已出者必復陷陷必黑靨瘡子歸腎此為脾土弱而腎水反勝錢氏以百祥丸下膀胱毒則脾土自實瘡痘可以復出與其下膀胱毒於黑靨之後莫若正脾土於未出之先則不下為愈是風與熱證皆可下今見熱而便下故不可也況下之縱愈亦有三證一為疥癬二為豆癰三為目赤有此證者皆下之失於早不可不戒故前人論曰瘡疹未見乃可疏利是熱毒未形容間毒在臟腑則預下之也又牛黃丹證云瘡疹出定大便不通令膿汁不幹者可下之以此觀之當下證是未出之前及已出定之後非正出而可下也且利毒丸雖治胃熱瘡疹散出溫壯腹脹氣粗大小便赤澀煩渴舌乾睡中驚而厥脈沉太滑數雖名利毒丸利其邪熱況用大黃大黃性利毒解表故傷寒當利亦用之又通關散證云治患瘡疹心燥發渴便赤口舌生瘡用木通瞿麥滑石皆利小便藥也二方皆謂大小便熱為害甚則去其熱毒氣苟不用之又為失下之害故用之豈是瘡疹正出而下之也故下之者不可太早誤下證傷寒身熱固不可下瘡疹熱亦在表尤不可轉下者蓋熱毒已在表故也活人書云小兒身熱耳冷尻冷咳嗽輒用利藥必毒氣入里則殺人蓋熱在表則表實而裡虛故身雖熱里無可下證而便下之則里無陽以應表至於陷伏而死者多矣大抵瘡疹血氣順脾胃溫則易發若里無熱而誤於疏轉則令氣弱血澀脾冷榮衛無以運化而毒氣難泄立見危殆尤當審諦又況小兒鼻塞唇焦內伏熱也脈細面色萎黃或青色皮膚又慢口吐清涎者此誤下證也或服涼藥太過或里無熱壅滯則不可下也論瘡痘已出後復生他疾第三瘡疹當令大便過者有當溫者有當令下者夫瘡疹傷寒風熱傷食諸證身有熱者如大便四五日或六七日不通者須用少藥令潤過非取峻快之意亦有外證參之須仔細辨認為宜如仲景云陽結陰結大便秘者至十四日十七日方劇苟若至十四日十七日因有他病損耗津液而無結糞腹不脹不裡急後重則不可攻之蓋腸無結糞故也今言六七日令潤過氣升降則身熱者不生他疾緣小兒純陽身熱而大便不通者易實大便自利者易虛易生他疾當調令大便如常最為候臟腑虛實之要法也雖然大便秘非一證有風秘有氣秘有熱秘虛秘冷秘用藥當細辨也且人能食大便不通結澀如下慄塊者風秘也煩躁引飲小便赤而大便秘腋下手掌心有汗者熱秘也腹脹腸中虛鳴胸脅不利腰腹引痛者氣秘也嘔吐清水不能食面青而瘦冷秘也或久病人不能乳食腹不脹不裡急後重雖久不大便者虛秘也凡此五秘者當隨證治之若大便如常且不可以冷藥與服恐冰住胃脈榮衛不行則瘡疹亦不出矣又有患至五七日自然瀉者須用與理中丸等溫腸胃藥若瀉住即止後服亦不下過熱此是當下當溫之證又有瘡疹出正盛喘粗氣急腹脹小便赤澀手掌心並腋下有汗或睡中譫語大便不通者用四順飲子得氣通喘定腹不脹則已之下之瘡紅快者更不須通也瘡疹或吐或瀉或不食瘡疹之證或吐或瀉或不食者此由脾胃虛弱也小兒胃熱出斑瘡大抵瘡疹多出於胃緣熱毒方作之際必多煩渴燥熱引飲或於風寒處坐臥遂令冷熱相搏冷氣入胃故令胃冷則吐脾冷則瀉脾胃皆虛則不食也當以治中益黃等隨證與之甚者隨宜增減以吐利止為度又有熱吐熱瀉則不同何以別之蓋熱吐者手掌心並液下熱而濈濈有汗發渴而臉赤而飲冷未能言而渴者則一向飲乳聚其飲乳滿於胸臆不能消化吐射出是熱吐也才吐了又急欲食乳是內熱而渴但不能言其渴醫者不審見吐利便用燥藥熱極生風者害人甚眾非特瘡疹有此他證亦不用此分熱吐熱瀉尤審熱瀉者小便澀而渴口燥咽乾皆當用五苓散竹葉半夏湯主之小兒不食亦有虛實二證或吐或利面青而目睛青黑色而不食乳者為虛寒而不食也宜溫之大小便如常面赤而壅或渴或睡中驚或咬唇目白睛黃赤氣喘或身熱而不食乳者此為實熱中滿而不食乳也又如伏熱者亦不思食胸膈滿悶故也尤宜詳審瘡疹皆多在表不可妄下傷風與寒以汗解汗者谷之精氣也瘡疹作膿血痂疕膿血痂疕血也古人以解利藥如升麻湯之類皆懼其血熱毒甚則瘡疹尤甚故少涼血以解其毒瘡疹亦易於將理何嘗以轉瀉傷其臟腑脾胃也蓋臟腑脾胃既寒何以運行榮衛榮衛既遲瘡疹膿血痂疕何以蒸成故知傷寒則氣行汗出而已尚不可下況瘡痘在血氣溫厚內不虛而外不寒則出而不伏陷矣胡不觀內補散治癰疽至驗皆是暖血行榮衛藥今瘡疹與癰疽皆瘡也何嘗以轉瀉而治癰疽也瘡疹陷伏倒靨瘡疹陷伏倒靨方書稱倒靨而已殊不知內虛不能盡出者為陷伏外被風寒所迫或被惡氣沖觸而不得出者名倒靨然得之有始末輕重不同若一概用藥因茲夭折者多矣蓋瘡疹已出斑點為始以血疱為中以結膿窠痂疕為末三者淺深不同烏得不論夫既出斑點為始者臟腑蒸蘊毒氣內外皆熱數日既熱甚蘊斑毒於肌竅出於皮膚亦有陷伏亦有倒靨斑點始出外被風寒所感使肌竅復開血凝澀而不行必身疼四肢微厥氣血盛與風寒相搏於肌膚必大小便秘斑點不長或黑色或身生青紫癮疹此為倒靨也當此可溫肌發散風寒如紫草蟬蛻陳皮葡萄人齒殭蠶荷葉之類溫散寒邪然後熱氣復行則斑出矣有胃虛而不能副榮衛者雖出而覆沒故斑運白色或黑色此內虛所致故出而無血氣以應之其人必不能食乳或大便自利小便不赤而清或倦或嘔四肢微厥乃由內胃既虛自不能出因為陷伏也當此宜用溫辛之藥令其胃暖榮衛復溫必自然出矣如理中湯活血散人齒散之類以溫之吐利甚者須姜附硫桂亦可用此治內自虛而陷伏者也若以血疱為中者是紅斑出之後至足有斑為出齊斑疹毒方出盡也自斑點生如豆起於肌皮之上所以血疱為中者未結膿血痂疱之前證也血疱七日當結膿血痂疱當此或外被風寒所感為倒靨或胃氣虛而吐瀉為陷伏者亦前法治之可也血疱是毒氣正盛陽熱內外彌滿無陰以收之血疱出至七日而當結膿窠痂疕而愈今七日而尚如豆大血貫之不結膿窠此由毒氣內外貫注血熱相搏必復入於心矣痘至危斃急以豬尾膏涼心血使陰氣感之必隨時結痂疕而愈古人以硃砂腦麝豬血等涼心藥治瘡疹是治其毒氣已出後心熱毒氣倍常則用之也非治里自弱而陷伏者非肌竅感寒而倒靨者可用也陷伏倒靨皆虛寒證陷伏胃弱自不能出當溫之倒靨是風寒外感於肌竅當發散故非豬尾膏證豬尾膏是治心熱太過而不能自收斂結痂疕者非為涼脾之藥也蓋素問云瘡瘍燥痛非皆出於心當血疱後紫黑而不結膿窠痂疕內外貫注毒氣還復於心則危矣以血疱結膿窠膿窠結痂疕如結濃膿窠痂疕無外有感冒而生病者此觸冒之過治之無異於前斑點時用者也觀小兒數日減食則胃虛熱甚氣耗作斑點膿窠則血弱在痂疕之際少增滋養榮衛調適寒溫藥以助之為佳病後服解利藥亦不可緩也瘡疹未透心煩狂燥氣喘妄語或見鬼者龍腦膏觸犯黑色者奪命膏黑陷者百祥丸藍根散四聖散人齒散毒盛而黑色者山梔湯宣毒膏良方治毒氣入臟而不出者腦子豬血酒活人書黑瘡子惡候無比散倍金散硃砂散瘡子反入抵聖丸救生散玳瑁散化斑散瘡子靨花蛇散麻黃湯濕生蟲散橄欖核磨水牛蒡散治黑色名鬼瘡子人齒豬血散皆是熱盛毒氣倒靨者非治裡虛吐瀉不食而倒靨者如脾胃虛吐瀉或斑未出醫人不識懼用涼藥冰卻致令內伏不出胃愛散主之服之汗出者不用控心散如無汗即服控心散後下羌活散為良瘡痘黑陷耳尻反熱五行以土旺制水五臟以脾制腎蓋土旺水升上而不下走泄此五行相生相制使之既濟此五臟平和陰陽升降也且人平居飲食以滋脾土脾土運化滋榮衛觀脾土於中上滋肝榮肺衛下以腎水不走泄苟失其平則有太過不及之患何以知之瘡痘出耳尻冷此脾土勝腎水瘡痘陷而耳尻熱此腎水反勝脾土矣蓋耳尻者腎也體熱則血脈敷榮則穀氣盛也錢氏百祥丸瀉膀胱腎水令脾土復旺當此致於不救者亦十有八九亦豈得已而用之哉當此之際不用百祥丸則無治法毒氣去而真氣不絕者猶活不去其毒則束手矣如活人書厥陰證土敗木賊用承氣湯瀉其毒氣亦豈得已而用之當此而不下亦不可也愚思之與其瘡痘用百祥丸傷寒承氣湯下其毒莫若救脾土於未侵之先治其未然者為良庶幾不致狼狽之地成功於不見危處為妙瘡黑亦有逆順者瘡疹出者為順黑靨陷伏者為逆然其中黑靨亦有順者此為瘡逆脾氣乃強則脾土盛制水也是脾強而腎退雖黑靨而忽瀉膿血並痂疕者順此必舊服補脾藥脾氣得盛而不衰其外肢絡瘡黑靨而不危者得脾臟不衰則心肺肝腎有以救之素問云脾病則五臟危今脾土既盛餘四臟則慮矣臟腑既無虧盈則不能為害又有黑靨而逆者乃水穀不消瀉乳不化而逆是脾虛不能制腎故水穀乳食不化而自泄此脾土既衰於裡外有瘡疹黑靨者是毒氣陷伏必先入脾脾虛而受毒四臟皆因而危殆矣是以為逆為難治嘗觀古書云病在臟者半死半生病在表者輕以此瘡疹瀉膿血瘡痂者雖順非可為常治法此亦九死一生之證爾瘡疹出遲朝夜啼哭神魂魄意智五臟之正神也喜怒悲憂恐五臟之情偽也人之五臟調暢則安適抑鬱則煩悶故小兒瘡疹者蘊非常之熱毒為瘡疹而外未得出在臟腑而不能散故喜怒不常悲恐相仍則神不能安而朝夜啼哭也當此醫者察其蘊毒在表在裡當隨證滲泄若發熱渴水面赤小便赤宜微表令出可也若外無熱大便秘腹脹滿者當令大便通大抵內無壅滯之氣則榮衛通行神魂泰然瘡疹亦出快矣昧者不知察惟見朝夜啼哭或以為心熱或以為聚痰或涼或下不能去其表裡熱毒復使其冷熱相併反生多疾不可不知瘡疹凸凹生瘡瘡疹結膿痂可抓碎之則不成瘢痕今瘡痂雖結瘢猶靨肌肉致令凸凹也故在結膿未成干疕抓去之則不成瘢痕矣有瘡疹愈而再生者此因瘡疹安後失解利毒氣留滯敗熱於肌肉之間也宜用明膠散次服密陀僧散膩粉散鷹屎白散牡蠣散馬齒莧散秦皮散等以敷之為良與其用藥於已再生瘡疹之後莫若解毒於未再成瘡疹之先瘡疹大便如常脾胃納穀氣大小腸出滓粕此平居察虛實冷熱之處蓋飲食進退則知人穀氣之虛實大小便滑澀則知人之冷熱也熱則秘澀而不通冷則滑泄而無度今大便如常則知臟腑平和無大熱大冷之患故不在補瀉亦不可妄攻擊也且活人書云清便自調則是大便如常又云大便堅小便數不可用承氣湯攻之是津液已行於小便故但以麻仁脾約丸用之可了小便清者不可下此無裡熱也大便硬而小便少者未可攻此津液當還入胃中大便自過也陽明病自汗出若發汗小便自利者不可下此表裡皆亡津液也又云小便赤卻當下此是表裡證俱見以五苓散主之又云不大便六七日頭疼有熱者是里證當下小便清者知不在裡仍在表又云大便硬而脈沉細是里證當下以此觀之古人治病未有不審飲食進退大小便滑澀者自外而知里此非專治瘡疹之法若害瘡疹或醫他病用之亦良況嬰童未能言者尤當用此瘡疹誤服熱藥則損目服冷藥則無不夭傷火制金木製土水生木木生火皆自然之理也順之則安逆之則否故瘡疹是熱而生又益以熱藥則損目抑之以冷藥則為陷伏蓋人身無非常之熱亦無非常之冷但溫和而已今瘡疹身暴蘊非常之熱而鬱發肌腠蒸之為瘡疹順其熱則出而毒散及其熱過則損目為咽痛為癰瘍為狂眩抑之以冷為陷伏為黑靨為夭傷故善醫者使陽不至虧盈陰不至埋伏調適中和而已苟為不然陽勝則熱盛而生風肝應於目無不害目者陰盛則脾土無燥氣腎水反勝為黑靨陷伏則夭傷者多矣不可不察斑爛病當發散而不發散則毒氣閉塞胸滿喘促悶亂而不知人不當發散而強發散則熱毒隨陽出於肌竅皆為斑瘡遍身無數肌肉如爛故名曰斑爛此失於不善表者之過也治斑爛之法調脾進食大便令不秘不利養榮衛以生肌解毒則無目赤無咽痛無口瘡無吐衄等證解之不至於冷調養不至於熱最為良法也但斑爛發膿痛甚者用干黃土羅為細末敷之輕者則芒硝豬臟汁調塗瘡上勿令動者直候瘡疹痂疕爛自落大段瘡發多不通臥席者即用麥麩簟臥將息最為佳又有因發表過多外則斑爛為陽氣在外內虛生寒臟腑自利急當救里如理中豆蔻之類臟腑自溫平其瘡必愈感寒與瘡疹伏熱混雜而發者瘡疹是五臟伏熱於裡因熱蒸而出外其感冒是外感寒邪漸伏入里且感寒始發則頭疼發熱惡寒鼻流清涕左額有青紋者感寒也夫感寒者寒極則生熱邪熱盛則實實則動所伏瘡疹之寒熱交作陰陽混雜證候非一故醫者若汗若下則瘡疹隨出蓋感寒在表蘊熱在裡寒極而生熱熱則隨出若不去其寒則瘡疹不能出但表證身熱而喘則微汗和解之里證腹脹大便秘小便赤澀者則微利之煩躁渴甚者但利小便胸滿食不下者宜吐之此發汗吐下利小便皆是去感寒伏熱邪氣也治之則當發汗吐下利小便隨手而愈但用藥者不可令藥太過最為良法如過於表者瘡疹隨出則為斑爛為口傷爛赤下之過者為否悶為內陷為下膿血當此細推之瘡疹非感寒之比緣有瘡疹隨出故用藥者不可不謹郁毒不散治病當隨時變通不可泥於一曲也且瘡疹之證如熱毒在表者不可下下之則裡虛為害非虛亦不可助之助之裡有壅熱為害亦不可令有大熱故前人云斑疹未見者以葛根湯鼠黏子湯惺惺散紫草飲子解利之但里不至冷大便不至利氣實者可服之也或有不問虛實以胡荽酒灑之以葡萄酒飲之又火煅人齒用酒調服之若盛實者服之則為害蓋胡荽酒葡萄酒火煅人齒此皆內虛自利陷伏者可服之苟為不然則助之以熱毒氣貫注耳目口鼻悉平咽中閉塞大便堅秘小便如血是郁毒不散則熱毒無從出也毒氣反攻臟腑故使凹而不起謂之倒靨蓋郁毒不散又不能解之至於斃者不可勝數矣蓋陽熱無陰氣以守之當此之際豈不觀大便堅秘小便皆如血若有此證者豬尾膏化斑湯犀角地黃湯犀角玳瑁湯可選而用之也用之則毒散榮衛無滯瘡疹自出矣皆常用已驗之法姑條次於下其疾始覺頭疼發熱或微熱而後作寒煩躁咽痛者則以四味升麻湯瘙癢或癮疹者則以荊芥湯面赤大便秘小便赤而嘔者以小柴胡湯不惡寒但煩躁而小便澀又多渴而成赤斑點者以竹葉湯犀角飲子大便不通者與四順飲子昏甚譫語大通不通與承氣湯若大便自利黑黃色毒氣亦有所出大便已利又得調氣藥以助之其瘡亦稀肌生斑者此自然出者不可表也斑生而至足飲乳嬰兒與能食童子用藥不同夫飲乳嬰兒者由人之生胃氣未固膚革未成飲乳易傷風邪易入臟腑嬌嫩血氣懦弱肌體不密精神易弊故用藥當審其大小輕重而用之可也蓋差之毫釐立見危殆安可與能食童子同用藥也且能食童子自絕乳後食火灼炮炙之物酒面甘肥魚肉滋味安可與飲乳嬰兒同用藥也夫嬰兒有疾服藥但與乳母服之為要法譬如童子吃食與嬰兒飲乳同乳母既服其藥必流入乳兒亦飲之是以童子能食服藥也免其剽悍毒烈之藥蒸熏臟腑亦為良法且能食童子穀氣既實臟腑充盈如生疾病能食不大便裡急後重手掌心並腋下有汗當令大便如常遇心熱啼哭小便不通心神不安當利其小便飲乳嬰兒有斯疾但將斯藥與乳母服是亦嬰兒服之也瘡疹本稀不可發表夫傷寒表證須看榮衛淺深故仲景有發汗者有調榮衛者有和解者三者分輕重虛實淺深也瘡疹固蘊熱毒而斑生亦看熱氣深淺故瘡疹本稀者為不可表小兒數日熱運於少自快但以升麻湯荊芥散主之出雖少足心有者此出齊不可表也出齊皆成血疱或已出膿疱或水疱或至於痂疕者皆不可表此臟氣既平榮衛既和自然而愈妄加治療補之則熱瀉之則寒表之為斑爛愈生多疾矣何謂瘡本稀蓋瘡疹無定數如汗之無多寡但看所蘊熱毒之微盛爾且瘡疹出而不甚熱既出而喜笑如常無寒熱無煩躁諸證蓋有少便膿血痂疕此皆瘡本稀不可表也但解毒而已若本稀而強欲發之則為斑爛為倒靨為虛脫為中寒為虛熱不可不知瘡疹無凝滯則勿表勿下病有遲速蓋日數待榮衛以祛運其蘊毒而出也且瘡疹熱數日運熱毒為赤斑點出於肌膚中至足有方為出齊蓋斑點長成血疱血疱成膿疱膿疱結痂疕此雖大略之言瘡疹必先斑次血疱又次膿疱又次結痂疕此自然之序善治病者不可先時而後亦不可後時而先也蓋傷寒表證出汗而愈其有一二日便汗出者則名為狂汗雖出之必復重又期六七日正汗出則愈矣傷寒里證當下則下之若下早為結胸為痞氣蓋病深在裡者則可下以此言之比之治瘡疹或表或下若太早則病毒不去真氣受弊有如瘡疹自然出快不勝其幸若反加妄表妄下適以為害然發表則熱氣承表而出不知自然微盛為斑爛為倒靨為虛脫者多矣妄下則為內虛為陷伏為夭傷宜審慎之可也合表合下證各別具詳之矣瘡痂起而能食病生於里而達於表觀其表而知其里亦在乎熟之而已矣且瘡痂起而能食者蓋瘡疹出於表而裡虛當食少今陽氣出表能食為里不虛而有熱本方用大黃丸下之亦更看脈與外證然後用之若瘡疕起而能食大小便秘而喘滿面赤冒悶者則宜下之若無此證知其熱便下之則誤矣豈不謂瘡痂起而能食便下之但知其中不虛爾雖瘡起而能食無別熱毒證則不必下也黑靨而未發寒夫黑靨世俗之稱有二二曰陷伏且倒靨有四證一則感風寒二則毒氣彌盛心熱與外熱壅鬱蒸不消毒復入里三則飲食少而內虛臟腑或泄利無陽以應之遂倒靨四則不禁房室穢氣衝觸名同倒靨所得之由既不同用藥救之豈得不異若不究其源一概論之則無不夭傷不特此爾一者瘡疹正出坐臥當風或失於蓋覆感外風寒轉於肌膚之中榮衛受寒必發熱而惡寒頭痛鼻流清涕當此之際宜以溫辛藥表散寒氣若失於治療榮衛受寒不解加寒戰而喘悶則為倒靨者一也二者五臟蘊積其熱出於肌膚小兒陽盛而陰微熱毒瀚漫心熱壅搐而不收使外不得作膿結痂疕內不得毒氣消散當此之際用涼藥解毒利小便藥以治之令其毒氣漸消則愈苟失其治療則為倒靨者二也三者其人稟受氣怯或因患而飲食少遂致脾胃虛弱因虛而生寒因寒而下利因利而內虛冷當此宜急用進食固臟腑藥以溫之臟腑既平因飲食進手足溫暖則瘡疹復出矣世有醫者瘡子是熱不敢用溫藥遂致倒靨者三也四者瘡疹正盛內外無寒熱無虛實證候而不出者此由不能禁忌穢氣衝冒房勞觸犯若有此犯則瘡疹不出毒氣入心悶亂而斃若已出之後觸之則令其瘡黑爛痛極如刀割其瘢痕經年黑色此仲景所謂瘡疹未發之間宜於房室燒赤朮豬甲二物辟惡氣謹戒淫欲常令人守房室門戶忌生人入房恐有觸犯令兒瘡疹難出也其他或得上喘面青黃者輕甚而至斃者不可救藥此謂倒靨者四也夫一日感寒宜溫表二日內盛毒復入里宜利小便解毒三日內虛宜溫表四日觸犯宜禁忌凡此四者治療失度用藥差殊則難救矣夫所謂倒靨其不發寒者為輕倒靨發寒者為重蓋脾之土弱反被腎水所勝故錢氏用百祥丸瀉膀胱之毒要之黑靨而發寒此是誤認瘡疹證候為他疾而重下之脾暴虛極至於發寒以致危殆錢氏百祥丸以瀉膀胱經毒是陽氣復還以助脾土者則可矣若言瀉膀胱經水必令脾土自勝此好奇者之言蓋黑靨屬腎但瀉膀胱經毒爾殊不知先誤下之則脾土虛又言瀉膀胱經水豈不知臟腑根本皆虛是謂重虛前人之意但瀉去膀胱經毒氣也故曰黑靨而未發寒者稍輕況黑靨是逆而發寒者為重愚因而詳論之正如活人書云厥陰證土敗木賊乃胃土受肝木所克則心火腎水不能既濟令人胃昧以大承氣湯下之胃毒既去水升火降則寒熱作而大汗解矣承氣湯或百祥丸皆去毒之意也可下證瘡痘出大盛為血疱在肌膚之上至三日或五六日當結膿血痂疕而愈今瘡痘六七日不結膿血痂疕者此由毒氣盛而裡外貫注若不速解之毒氣復入為倒靨宜豬尾膏看脈與外證審諦方可下之其血疱至五七日不結痂能食而喘發渴腹脹昏睡譫語不大便者用承氣湯川黃散下之如作渴發熱面赤悶亂大小便澀或大吐者當利其小便宜通關散主之又瘡疹已出定大便不通瘡出膿汁不幹者牛黃丹又有瘡疹證而未出胃熱發溫狀氣粗腹脹滿大小便赤澀睡中驚悸煩渴口乾脈沉大滑數此是毒盛而不能泄當用利毒丸下之里無滯氣榮衛升降瘡疹自出矣此皆合下證也又有瘡黑陷大便自利腹脹者乃虛寒證也當溫之不可下論雜病第四諸惡證夫痘子出而復不出或大瀉而渴或有此候皆因瘡痘出而服外藥逼熱毒在肺中也故煩躁迷悶不食或大小便難皆惡候也瘡痘帶白膿者其毒輕或紫黑色隱又在於肌肉裡者其毒重甚者五臟咽喉內皆有瘡其不大小便兼便澀出血而痛黑靨不生膿者死鼻有黑氣者死或痘疹未出毒氣內通目瞪上竄驚叫有如驚風者此乃瘡欲出之候也若誤認為驚癇調治必使毒氣內蓄邪熱不泄亦乃死候或有瘡痘既出譫語不止此亦惡候或見是瘡以藥解利見瘡疹反沒者乃死宜急溫之復出乃愈或瘡作白疱忽然伏入臟腑漸作紫黑無膿日夜煩悶啼哭其證尤惡服化毒散其毒從手足心出乃瘥此是五死一生之候若便血瘡陷無膿者死其有瘟毒痘瘡不出者一法以地黃雄黃令飲不可太多多則反有所損前證皆惡候先知節候陰陽臟腑虛實夫氣盛者夏酷暑而不熱冬嚴寒而不冷此裡實而寒暑不能侵之也稟氣弱者未寒先寒未熱先熱故未有十日天寒日陰則感寒濕而濡瀉未有十日天溫日明則伏熱而中暍虛弱之人常態也蓋先知節氣者能辨陰陽寒暑出入之盛衰素問云陽盛人能冬不能夏陰盛人能夏不能冬此亦人之虛實與寒暑相為否泰者矣且立夏氣變純陽萬物茂盛用藥者用熱遠熱如桂枝麻黃大青龍湯並諸熱藥必加知母升麻石膏輩是不盡其熱藥也且立冬兩陰俱盡氣合純陰用藥者用寒遠寒如服諸涼劑服湯利過者止後服不必盡劑是不盡用涼藥也是寒月不盡用涼藥若盡用涼藥表裡皆寒人不能當故也治瘡疹亦當依此隨虛實寒溫陰陽出入而用藥也豈可拘一證一藥為盡而已矣病人素有盛實或素有虛者並用古方不在加減爾且春分陽漸在外而陰漸在內秋分陽漸在內而陰漸在外用藥者豈得而同諸此按四時陰陽迎合臟腑內外虛實而用之故時當陽出而陰入則實者愈陰出而陽入則虛者愈故陽出而陰入者虛者病陰出而陽入者實者病此其常理不變者也如冬溫虛者安而實者病夏寒則實者安而虛者病此皆節氣陰陽虛實使之也冬溫暖夏寒涼非節氣為病者在人將攝而可爾所以錢氏治瘡痘言春夏順而秋冬逆者是論陰陽出入迎合表裡之意也行房觸犯燒赤朮豬甲伏積熱毒甚者為瘡疹方其榮衛被熱毒所蒸毒出為斑痘方其出肌膚受痛靜以守之則順出而愈若加觸以不馨之氣兼以行房觸犯陰陽相感毒氣著於人則使瘡疹入里毒氣入心悶亂而死若已出之後觸則令瘡黑爛極如刀割縱或瘡疹得安瘢痕經年黑色仲景論瘡疹未出之間宜於房室內燒赤朮豬甲二物辟惡氣謹戒飲酒嗜欲令人守房室門戶恐生人入有觸犯令小兒瘡疹難出也如有觸犯或有面青黃色者猶輕要之安胡荽於左右上下安頓之能解狐臭雜惡穢汙之氣更燒乳香令室中香不絕闢除一切惡氣兼令易出易結痂疕瘡疹畏雜惡氣不可不謹者譬如柑脯同處一壞皆壞古語云樹得桂而枯雌黃遇胡粉而黑抑亦物類相感云爾初生服生地黃汁令不生瘡錢氏論瘡疹是母腹中所受穢毒故小兒患瘡疹五臟皆見證故前人亦先有以制之也千金論云方嬰兒初生宜進生地黃汁點孩兒口中令便下黑穢則至長亦不害瘡疹蓋便下黑者此腹中所受穢毒令人但見簡易平直而不用抑亦顧目前不思後患者歟瘡疹毒氣令胃爛便血小兒胃熱發斑其斑既出於肌膚今瘡疹正出或外被風寒所伏或毒氣太盛熱毒壅遏則出不快蓋毒氣復輒還於里有誤服涼藥使腠理秘外不得出於肌膚毒氣倒於裡者有被惡氣熏觸不謹房事復觸入里甚者皆可為胃爛便血各隨證救之如風寒所伏者當解表而散之治瘡疹麻黃湯是也內外毒氣壅遏復入里當解毒如犀角湯之類是也冷氣入胃冰伏者當溫之胃愛散之類是也惡氣熏觸不謹房事觸伏者當燒乳香赤朮豬甲之類服以蘇合香丸等以御之又有毒氣內外有所感冒陷伏者急以麻黃湯主之王氏手集白花蛇散橄欖核水煮服之無不立效如有內外觸冒失於救療遂至胃爛便血此證最惡急宜用犀角地黃湯甘草散以解之解之漸甦醒瘡出者活神昏冒悶者死餘毒失解利則嘔吐並諸雜證脾胃主納而不出大小腸主出而不納是平居飲食水穀糟粕出納也常論胃主納食而瘡疹後嘔逆是有邪氣相干使胃逆而不順故使氣逆而吐也其吐有冷吐有熱吐瘡疹病後吐者此餘毒在胃不解當仔細辨驗終是不同其熱毒在胃而吐者令人心煩作渴小兒不住食乳者是渴也小便赤澀手掌心有汗或熱面赤引飲停於胃中成痰膈中不利縱能食乳聚滿吐出如射則一時胸中稍寬又復飲乳者渴也飲乳又吐脈洪數此熱吐也冷吐者不渴飲食與水隨吃隨吐面青白手手足冷大小便利宜細辨之有熱有餘毒在胃脘嘔吐者宜服黃芩散五苓散人參竹葉湯若餘毒在口口舌生瘡下部亦有瘡或下膿血服黃連散三黃熟艾湯發喘而煩躁小便小利者燈心湯若胃熱齒齦腫痛妨其嚼食飢不欲食煩熱面黃者宜服甘露飲槐花散如毒入目者服淨心散最良咽喉痛並嗽不已者麻黃湯加麝香服之或大便不通停熱毒攻於臟腑及眼並咽喉腫塞口舌壞爛者以如聖湯紫河車散紫雪之類可選而用之皆解餘毒之要藥也預服油劑以解瘡毒防患於未然者則思熱毒未成瘡痘時預服油劑以解之蓋小兒四肢微熱食物似減頭髮干立或時額微熱則與生油劑飲之每夜如方法與飲似覺四肢熱服之良久就臥多至三五服大小便利四肢熱減邪毒漸退疹痘雖出亦輕尤良法也斑疹熱則出愈難大便不通小便如血或為癰身體破裂似是而非若同而異醫者不詳審於疑似之間言斑疹得熱則出愈難此非得熱而愈出難為氣不通榮衛與毒氣混雜不行故出難非獨熱而難出也胡不觀大便不通是氣不通行故或便血或為癰疱或肌肉破裂以此觀之氣不通又熱毒之氣壅盛毒在腸中則血滲入腸為便血毒壅肢絡不行為癰疱為身體破裂使其大便通小便利則無斯患矣有此證者宜服犀角地黃湯白虎湯升麻湯紫雪之類便血以牛黃散可選而用之誤以巴豆丸子藥下之則內虛而熱不除表熱而盪滌故宜湯液以散之取食積宜下之用丸子藥磨之蓋用丸子藥者取收攝之義也今病瘡疹是表熱若用丸子藥反攻虛其里則表熱陷伏於裡其熱愈不除復為倒靨為便膿血肌膚毒壅遏不通為痘癰為腫毒瘡疹不可用巴豆丸子藥者但能取腸中積故也非瘡疹表熱者可用瘡疹不可用巴豆水銀輕粉小兒頭痛身有大熱口鼻有熱咽乾痛口頰生瘡兩目如火耳尖手足指冷脈洪大而作渴面赤增寒心逆熱口臭此是伏瘡子候先當去熱毒邪氣用大黃湯煮湯液盪滌其表熱表熱散則諸疾皆愈矣昧者以巴豆水銀輕粉此藥無去表藥之理反傷臟也蓋巴豆水銀輕粉但能去臟中驚涎積熱而已豈可以為瘡疹表熱者用則用之者夭傷不可不戒熱毒攻肝衝於目肺金燥心火熱肝木風脾土濕各有所統夫肝木勝脾土衰且風入臟腑熱則為腸風為秘結為下鮮血冷則為不食為餐泄為肢厥此五行相生相剋之意也熱則生風由火盛而風作肺金既受火克金衰不能制木則無金以制之木勝肝旺心火炎上肝竅於目心熱壅則衝於目故瘡疹之始最宜防備之使之視井則欲觀深視遠則自運於目得陰氣感之搽胭脂則欲涼血散毒氣服以黍黏荊芥防風已去其風敷以白芥子末於兩腳心瘡痘則不入於眼是皆防微杜漸使神水不被風毒熱壅之害得無睛脹凹凸音喑之憂方書多稱於此卷首者欲消目疾於未然不可不察瘡疹後餘毒咳嗽脅痛夫血氣者陰陽之男女水火者陰陽之徵兆左右者陰陽之道路今瘡疹病後咳嗽左右脅痛飲食不下此餘毒所膈氣不能升降也且咳嗽者由陽不降心火克於肺金也脅痛者脅居人之左右左右者陰陽之道路氣之所行處今脅痛是氣不能升降也飲食不下者由呼吸升降之間脾受穀味今氣不能升降脾氣不能運磨水穀也數者但解毒毒去然後真氣自育當以赤茯苓湯導心火利小腸小柴胡湯治咳嗽脅痛二和散調順陰陽則自愈矣傷寒熱毒甚則不可不發表傷寒熱毒在表未能作汗或當汗而不得汗暴熱灼於肌膚故發斑瘡疹痘疱也其疱色白或赤如火丹瘡頭瘭漿白膿者輕若紫色作根隱隱在肌肉者甚重五內七竅皆有瘡其形如豆故以名焉此乃傷寒發疱小兒肌肉嬌嫩多有此故因而及之瘡疹餘毒不盡煩渴胸滿熱在表而生瘡疹瘡疹已出將愈則表雖退有餘毒在裡則令小兒胸滿煩躁而渴此皆失於解利熱毒不散所致也宜黃連散燈心散黃芩散甘露散皆可選而用之瘡疹不結痂疕瘡疹因熱而出又因太熱甚而不能結痂疕是以內外蒸郁無陰氣以斂之故也前人以宣風散導之以生犀散解之使熱不復脹必結痂疕矣又有發如膿窠不肯作靨者調砂糖水與吃則結疕此法須觀瘡子未出盡切不可用蓋瘡子初發而食甜物如糖蜜棗柿必瘡子入目尤宜忌之此云用砂糖者是瘡子作膿窠毒氣已定而用之庶不為目害矣又有血疱出已七日不結痂疕者宜用豬尾膏則愈矣辨瘡疹並水瘡子入大腸疹與痘輕重不同疹自表而出於腑則輕痘自里而出於臟則重世俗但見疹見痘方知輕重未能預知而防備然疹與痘其初何以辨之茅先生論有見於未然且早晨渾身微熱眼睛黃色兩脅下汲汲然動甚至發如驚風狀亦身有大熱手足逆冷此病屬臟治以獨勝散發之以和平生津藥潤之此必是瘡痘謹不可投涼藥恐水入大腸而痘子不出則瀉下如赤豆汁及朝出而暮靨或腮頰赤色如掌大口內有臭氣唇焦目閉腹脹者此必死候此是瘡毒入里由用利藥裡虛毒陷入腸中或便膿或便赤汁皆惡候也且疹候早晨微熱午後亦大熱眼白赤色而不黃手足冷而吐逆此屬腑為疹治法如治瘡痘若輒用利藥變為惡候結核腫毒瘡疹熱毒藏於肌膚使榮衛流注失度則榮衛合行而不行為之壅遏壅遏則結核腫癤毒或為痞癗或為瘡瘍發於頭頂手足肢節間甚者則為癰毒此熱毒壅遏之過也亦令人咽膈不利痰涎壅塞咳嗽咽乾眼赤臉腮項焮腫宜以消毒散小柴胡湯最驗癰癤腫毒出膿數日不止體虛煩熱頭痛昏悶者黃耆散大便不通者大黃散主之癰毒赤腫初生者燒雞毛水傅之醋調伏龍肝敷之地松胡荽以敷之雞子清調赤小豆末以敷之地龍糞新水以敷之並馬齒莧龍葵葉雞腸草蕓薹葉景天葉皆可搗敷之赤腫不散成瘡而未得頭出者馬鞭草以敷之冬溫發斑癮疹如錦紋活人書云冬月暄暖而溫毒發斑癮疹如錦紋者以冬月觸冒寒毒至春始發病初在表或已發汗或未發汗表證未罷毒不散故發斑以黑膏主之又有冬月溫暖非節乖戾之氣外來即病至春或被積寒所折毒氣不得泄至天氣暄暖溫毒始發則肌膚斑爛癮疹如錦紋咳而心悶但嘔清汁者葛根橘皮湯主之小兒常有此證令兒心悶咳嗽嘔吐清水醫者不辨作冒寒治之轉如悶亂狀若驚癇遂生他疾但咳嗽而吐汁者知其心悶矣預宜服葛根橘皮湯則立愈瘡疹用百祥丸證黑紫干陷者下以百祥丸不黑者謹勿下要之紫黑干陷則下之無疑矣然當下有數證宜子細以外證與脈別之有感風寒而黑陷者則宜溫散之有內虛自利而陷者則宜溫之有下之早毒氣入里而陷者則宜溫而表出之有被外物沖觸而陷者則宜熏解之其用藥皆不同又有蘊積毒氣深而內外蒸郁瘡起能食不結痂疕毒氣不得散大小便秘腹脹而陷者為其毒氣入里宜用百祥丸瀉膀胱之毒服之身溫飲水者可治以脾旺而勝腎水寒去而復溫則瘡疹復出矣若寒戰不已身冷汗出耳尻反熱者死要之錢氏積腎氣太旺脾虛不能制之此寒氣太旺胃氣不溫瘡疹復陷乃不出耳下後身熱氣溫欲飲水者此寒去而復溫為可治以此而言瘡疹不可妄下故不過溫脾胃暖血氣也錢氏言瀉膀胱水於已陷之後不若助脾土於未陷之先尤為盡善盡美矣瘡疹後患目翳忌點藥湯散膏丹之殊異灸刺點洗之同且瘡疹之為目翳者毒氣自臟里而達外治之要法但活血解毒而已活血不至於熱解毒不至於冷得其血活毒散則睛不壅血不怯不致凹凸損陷是為良法也方其病根自里而外始者毒氣在於臟腑外達於筋絡筋絡而至目其病深似非點藥可取效蓋點藥非毒則冷必相攻擊反以為害前人有所不取也瘡疹後患目不在點藥故辨及之冬月預服三豆飲子龐氏云冬令溫暖當時便服三豆飲子以解其毒則春夏不生瘡疹矣蓋冬令風寒冰烈是謂閉藏之時此天地之正氣也冬月天氣暄暖是冬應寒而反熱是非其時有其氣小兒抱純陽以生至春必發瘡疹預服三豆飲子以緣豆赤小豆黑豆副以甘草淡竹葉木通砂糖煎之臨睡之飲之則解一切熱毒冬月隨受熱而隨解之也至春夏間則無瘡痘之患縱有亦輕此乃冬月暖時預服之也瘡疹入目防備法瘡疹方出間欲使不入耳目可噴胡荽酒於耳目邊或以黃柏末水調敷兩目兼以白芥子末水調敷兩腳心乃抱兒令自投緣豆七枚於井水中使斑瘡不入目中此皆愛護目之法也又有忌食之法如醬醋五味牛雞鵝鴨皆不可食蓋小兒患瘡子食雞鵝鴨卵未有不患目者雖瘡疹已愈數月尚未可與食之食之亦為目患此皆為瘡疹之所忌但令小兒食淡物為淡豬肉淡餅之類不能食淡物者入少鹽無害患瘡疹之家可預而令知之最為要法患瘡疹之家亦不可煮雞鵝鴨卵之氣相襲亦能損目不可不知瘡疹攻咽毒瘡疹咽痛者由心胃有熱衝於咽故咽乾而痛口舌生瘡上衝齒齦腫而牙齒搖動者宜服甘露飲子欲涼膈去痰則服消毒散咽喉腫痛者宜如聖散消毒散心煩者宜鼠黏子湯冬月老幼皆可服之則春夏不生瘡瘍也有聲音不出舌頰生瘡煩悶潮熱面赤者以紫河車散主之咽痹水漿不下者以紫雪主之已上諸證屬熱須是臟腑亦熱者方可用之如上焦有熱其人若小便清或大便稀溏是臟腑無熱則別以清上溫下藥兼服不可一概而用藥也以上並用小柴胡湯尤宜瘡疹大小便不通瘡疹熱毒在裡令兒大小便不通熱毒蘊而不散則不結痂疕及其熱氣少而下之早則為陷伏如大小便不通欲以藥下之者須是微覺腹脹滿而喘按之腹微實手掌心並腋下汗出者此有熱毒燥糞在裡宜下之瘡疹大便不通者川黃散瘡疹既出定大便不通瘡出膿汁不幹敗毒牛黃丹大承氣湯又有瘡疹欲出胃熱發溫壯氣粗腹滿大小赤澀睡中驚煩渴口舌乾手足微冷多睡時嗽涎脈實沉大滑數宜服利毒丸心煩躁渴小便赤澀者通關散前四藥皆有熱證方可用之性寒通利故也不可妄投為害不輕乳下嬰兒服湯藥多則反為累小兒如水中之泡草頭之露以表用藥無令造次焉為小兒臟腑嬌嫩血氣懦弱肌膚不密精神易憊故言不易醫也然乳下嬰兒周歲二三歲有病者宜少服湯藥量其大小但將藥與乳母服之為妙忌一切藥與兒吃恐反生多疾蓋藥性剽悍毒烈非寒即熱不表即下或斂或散服多則反為累蓋其攻擊太甚不可不察大抵用藥在簡而當則病除又不損氣若泛然而用非止不效藥性將何處之必反為害故瘡疹出而無他證者宜少與湯藥瘡疹冬溫當先下其毒夏月陽氣在外陰氣在內冬月陰氣在外陽氣在內其陽氣在外人喜冷陰氣在外則人喜熱蓋夏月扶陰以助陽冬月扶陽以助陰以平為期人有盛衰與四時不相當者則反為病且夏月天氣大熱則人食冷以助陰素問云用熱遠熱者是也亦不可過冷過冷則逆正氣為害且老人氣衰而火少夏月豈可過冷也嬰童自然陽盛而火壯雖冬月豈可多食熱物其能食童子兼能啜熱乳嬰兒如冬月食火炮炙烙之物乳母恣食酒面甘肥便與兒乳其熱毒內積微成著又遇冬月天氣暄暖則內外蘊熱於臟腑至春陽發生其毒熱隨榮衛而出遂成瘡疹無可疑慮如冬月應寒而反熱此是冬溫毒氣在臟未出於肌膚者當冬月便疏利解去其毒可也如葛根湯三豆飲子消毒飲子三黃丸當歸飲油劑導赤散化毒丹之類皆可隨輕重冬月溫暖時皆可選而用之也瘡疹便膿血瘡疹病後餘毒不解毒熱入胃令兒便血日夜無度腹痛啼哭者宜用牛黃散又有渾身熱下痢黃赤膿血者薤白散解之或胃風湯尤佳小便赤而煩宜以導赤散犀角地黃湯主之瘡疹膿汁不幹小兒瘡疹太盛膿汁水黏不可著席不可轉側疼痛者用黃土末敷之便乾欲不成瘢痕者以牛糞曬乾火煉成粉研如蛤粉相似用綿撲有瘡痛處膿甚者以黃土細羅為末敷之大段不通臥席者以麥麩不計多少簟臥將息最為要法瘡疹入目用藥心熱毒生肝風肝主目熱毒衛之故為目患以涼肝丸服之秦皮散洗之密蒙花散服之因食毒物睛突出外者仙靈脾散暴赤腫痛者蓖麻子散患半年一年餘者蟬蛻散出正盛而不令入目者調肝散入眼成翳者瓜蔞散生翳遮膜者威靈仙散入目痛楚傷目者浮萍散生翳者撥雲散風熱攻眼者井眾石散目中豆瘡成翳者大黃散貼之赤脈侵睛者羚羊角丸豆瘡入目昏暗者金花散瘡入目里侵睛者樺皮散翳障不見光明者蟬花散為良瘡疹後餘毒諸方瘡疹熱毒內外皆作今瘡疹已出而結痂疕餘毒在臟者宜解利之若解之稍遲至於生病多端瘡疹出盡後大便秘者宜服大黃散小便赤澀者宜服黃芩散胃中有熱胸中有邪氣而嘔面赤而渴大便秘或如常或瘡疹後下利色黃者黃連散煩喘小便不利者燈心湯槐花散發渴飲水下血水止者消毒散薄荷湯調下黃耆散服之消瘢痕瘡疹生於肌中瘡痂不可早抓去之而出風早則為之癮疹肌膚為凹凸宜用硼砂散酒調服之密陀僧水研塗之蒺藜散胡粉散鷹屎白散馬齒莧散豬胰羊胰鸕鷀散升麻水豆散黃柏散白蜜羊骨髓等青金散皆可選而用之欲無瘢痕者在結膿結疕勿令癮疹在瘢痕矣痘癰痘癰者瘡疹毒氣當出而不得出毒氣壅遏於肌膚故使肌虛偏盛而成痘癰又有瘡疹既平失於解利是致毒氣不散外不得泄於肌膚內無由入於臟腑滯於肢體則為痘癰或為腫毒令頭項胸脅股內赤腫大抵瘡疹結痂疕之後便以消毒散升麻湯五香散連翹散犀角地黃湯皆可選而解之失於解利腫毒所發未成腫者小柴胡湯加生地黃煎服之立愈又有稟受怯弱病瘡疹後面青不能飲食自利肌體倦怠無熱證者且與調平藥安養之令其裡實如面赤大便秘或發渴咳嗽睡中驚叫小便赤澀則可用前諸藥解利之今人見解利可治餘毒不問虛實便解利之遂為虛弱者害亦不可不知也瘡疹後發搐素問云瘡瘍煩躁痛癢驚悸喜笑皆出於心五臟蘊熱毒成瘡疹熱則生風當其未出心火生肝風令兒發搐今瘡疹既出之後又發搐者是餘毒未解熱積停蘊不能消散故動肝風而發搐也宜以導赤散化毒丹消毒飲柴胡湯三白散之類散熱退風而已或瘡疹後飲食暴復未能損穀食蒸發搐者宜以紫霜丸服之其證必頭熱肚熱是傷食證也又有瘡疹後再作瘡疹者亦輕此亦餘毒未盡皆失解利之故瘡疹之出後豈可不解利解利者當隨虛實而用藥也後人見瘡疹後解利餘毒一例妄投涼藥氣虛者反為大害不可不知氣虛者不渴面青飲食少大便不秘肌體瘦無力皆虛證也有此證者未可解利也又詳有瘡疹證而瘡疹未出而發搐者用藥不可太冷恐為瘡疹之後害瘡疹已出後發搐者此熱甚也故宜用化毒丹大青膏諸搐藥無害蓋無瘡疹之悔矣若能詳審而調理皆護安愈因而具述以廣其傅瘡疹愈後忽遍身青色或黑色手足厥冷口噤涎聲如鋸者何此名中地風也小兒瘡疹方愈榮衛尚弱餘毒未解忽然遍身或青或黑色手足厥冷口噤涎響甚者手足微搐此由四時五行節令氣交有風雨寒暑地氣暴至小兒瘡疹方愈榮衛尚弱被地風所吹毒氣襲虛而入故生是疾也宜用和劑方消風散二錢入蟬蛻末二錢分作三服生薑薄荷汁酒各數點溫湯頓服二三服即立醒矣隨時少汗而解或出癮疹或再出麩疹而愈此乃京師醫官宋鑑用此無不愈者後敷於此方用之瘡疹已出狂叫喘呼瘡疹已出者熱毒自里而達外狂叫喘呼者臟腑熱燥而無津液也夫腎水常欲升心火斂而降今五臟皆熱瘡疹既出津液外泄臟腑乾涸無陰氣以守之則陽毒燥於上故狂叫喘呼宜服犀角地黃湯玳瑁散甘草散麻黃散主之更看大小便何部不利利之必愈豬尾膏證虛汗實汗皆汗也虛熱實熱皆熱也是以瘡疹倒靨有虛有實方論皆稱倒靨而已可不分而辨正之蓋以瘡痘始發或斑或血疱未結痂疕之際或因久不食或因自利或感寒邪裡虛寒不能運行榮衛至不能出者瘡疹雖黑靨則出宜豬尾膏使心既通榮衛將復則氣和神蘇瘡疹自結痂疕矣夫蘊毒作斑點斑點作血疱血疱如豆起於肌皮之上名曰痘瘡既作血疱血疱作膿疱膿疱結痂疕而愈今作血疱而日數當結膿窠而不結膿窠者是毒氣尚有復入於裡古人處方心涼熱毒氣不能復侵於心若毒在肌膚則無慮矣以此觀之瘡痘至血疱是毒已盡在外也後用豬尾膏則毒氣不能復入也今有醫者及病家見斑點或見血疱出遲便用豬尾膏殊不知毒氣未出盡而心胃寒涼毒氣不能出誤人者多矣豬尾膏是毒氣已未出盡未結膿窠者熱氣與血相搏尚可同榮衛出入周流恐其毒氣入里而用之也又論小兒方書亦用腦子豬血等藥服之遂斑點出而愈者此言為害尤甚非瘡痘之藥也乃是治傷寒瘟毒熱證危急用之熱散然後斑出而愈是治發斑者非治瘡痘之斑後人不為祖述以誤敷誤而用之者可怪矣貴賤不同用藥亦異此論原本參錯難以序次貴賤不同形志有異士貴之人形雖樂而志苦動慮關心所稟多虛未三日天晴而中暑心間未陰雨則寒嗅荊芥薄荷而腹痛服桂附茸乳而宜溫之蓋皆裡寒不能運行榮衛故也又有瘡疹始發或斑或血疱未結痂疕時心煩狂躁氣喘妄語或見神鬼大小便秘腹脹渴而能食若毒氣發而黑色者此為實宜用豬尾膏奪命膏宣毒膏良方豬血龍腦膏皆可從漸而與服以知效為度常人不辨別虛實既用藥又不能撙節小熱遂以大涼藥治之熱疾未去冷病為害者多矣又有瘡疹自斑點結血疱瘡六七日當結痂疕設或六七日不結痂疕者此是毒氣盛實心火既躁熱毒內外貫注故令不結痂疕當此宜用豬尾膏曾用之進一服隨時結痂疕神速特異以意思之人常遇天氣節令寒暄不時脫著衣服以避寒溫必先呷冷水一二呷即不感冒是心涼腠理秘而斂則風寒不能侵之也今瘡痘用豬尾膏是心屬火而躁居於上焦又加之被蘊熱毒氣並於心臟熱氣既盛則毒氣內外貫注古人用豬尾血乃以心血歸心用龍腦香以涼其心榮衛得香而行遇臭則止心得血引龍腦香已行榮衛血疱始結膿窠膿血結痂疕餘證自退矣大抵用豬尾膏之意豈不觀傷寒厥陰證土敗木賊用承氣湯下之脾間毒去脾土既和則水升火降寒熱作而大汗解不知其熱此富貴之人常態也田野之人其形雖苦其志甚樂其神甚安所稟多實嗅薑桂而熱發服橘實而便秘負危亡而不知其憂此田野之人常態也雖幼稚霜露中向日不知霜露之寒此皆素習以為常態也是以醫者當察富貴貧賤之不同用藥亦異不可一概而治也防用藥之失前輩言治老人之病當先助火蓋老人者自然陰盛而陽微謂不欲見其虛而治其虛預以溫之治小兒則曰當先瀉火為小兒自然陽盛而陰微預以藥導引以平為期不至生熱也此治之大略也若老而實幼而虛此為當隨時變通不可執於一曲也又曰五實當瀉五虛當補何謂五實身熱脈大大小便不利無汗為實有此證者下之愈何謂五虛身冷皮冷大便自利汗出為五虛溫之愈又曰用利藥者候大小便秘而利之愈用溫藥者候大小便利而溫之愈二者合利而利合溫而溫也又有外證合利大小便已自利何必利外證合溫大小便已秘何必溫大抵治病最嫌陰陽偏絕則無能救藥善用藥者但令陰陽不偏則人不死也故因而知又有熱瀉冷秘之辨此好事者必言之則終是不同熱瀉者渴水心煩小便赤手掌心出汗宜利小便冷秘者不能食胸滿吐清涎面青瘦而不能食者冷秘也其證少又非暴病不可不知病證未分所用藥病有外同而內異又有病中遇天氣寒暑躁濕不同感異氣者又有病中喜怒哀樂不節病變異不常書中無名者仲景謂之目睛不了了睛不和是也目睛不了醫未識其證也了睛不和用藥不中其病此外同而內異也大抵治病多調適寒溫治熱熱去而不冷治冷冷去而不熱陰不虧而陽不損無不愈者治風以治風藥治以治冷藥治勞治氣無非用治勞治氣藥後人不能究其病之源流緊要一概用四君子湯參苓之類藥性溫平為不能知病之由欲逃其差誤殊不知縱令病熱瀰漫卒不能救誤人者多不可不知要之用和緩之藥各從其類而和緩但不致剛烈爾且防風白朮治漏風川芎當歸治血風川芎荊芥治頭風獨活羌活治高風天雄附子治虛風乾薑細辛治寒風大黃荊芥治熱風木瓜天麻治筋風各隨虛實寒熱而治之何嘗治風而不用風藥治冷而不用冷藥但令病去而不生他證為妙也瘡疹後觀虛實而解利稟受有虛實病後亦有虛實安得一概而論且瘡疹病後須解利之解利須觀虛實而用藥也且小兒稟受既實平時榮衛充壯瘡疹後須觀熱氣淺深熱者必大便難咽乾作渴面赤而煩小便或赤有熱證者方可解利大段熱甚者以大黃散胃有餘毒嘔吐口赤有瘡或下利黃赤黃連散主之煩喘而小便利燈心湯餘熱溫壯齒齦宣腫牙疼不能嚼物面赤而黃或煩甘露飲子槐花散肝臟餘毒不解叫怒不能睡臥者調肝散瘡疹出而恐入目淨心散出後餘毒未退渴水仍下血疼痛牛蒡子散黃耆散痘癰才發者小柴胡湯犀角地黃湯為良今才見病瘡疹當解利不問虛實便乃解利誤投涼劑者多蓋解利是治其有餘毒者用之瘡疹後無熱毒者但當隨宜安養之又有稟受怯弱因天氣不常冬溫邪熱遂成瘡痘瘡痘既出榮衛為斑為血疱為膿血為痂疕其榮衛大虛坐立戰搖大便不秘小便不赤身無諸熱證宜用胃愛散七寶散雙和散之類安養之候其乳食如故不畏風寒肌膚稍充實而少以解利藥無害常見瘡疹不問虛實便解利之或為寒中或為下利生病多端故因而及之瘡疹論藥方預截熱毒第一一初生服生地黃汁仲景云孩兒初生下時宜進生地黃汁點在孩兒口中即下黑屎至壯年亦不害瘡疹二冬溫服生油劑扁鵲云小兒臟腑伏於熱毒未成瘡疹疾候四肢微覺有熱食物似減頭髮干立或時額多微熱宜服生油劑方上用生油一小盞似人體溫熱水一小盞旋旋傾熱水一小盞入油盞內不住手以杖子打攪直候入盡熱水更打令勻如蜜即止夜臥時三歲前至百日及一晬內每服二蜆谷五歲至七歲每服三蜆谷十五歲以前至十五歲服三蜆谷至半合直至大人每服一合至二合量大小增減與服之服後良久令臥少時服三五服大小便利四肢熱退瘡痘不生也萬全方云扁鵲論可先服以油劑服之行解四肢熱極或瘡痘已出不可以油劑服但服和平藥療於肝臟解其大熱慮熱毒太盛三冬溫服三豆飲子大凡有時行瘟毒天行瘡痘者宜預服之赤小豆黑豆綠豆各半升甘草一兩上用水九升煮候豆熟為度逐日空心任意飲之七日後瘡必發快龐氏云冬月溫暖小兒輩必發瘡痘宜預服三豆飲子以解之四欲不患瘡疹服茜根汁治時行瘟毒瘡痘正發欲不患疳候者預煎汁入酒以飲之則解之累用甚應本草云茜味苦寒治一切蟲毒又治一切血病月經不止腸風痔瘻排膿治瘡癤尿血撲損於血皆宜服之五覺溫壯熱服葛根散天行熱氣欲發痘瘡作熱疼者宜服解肌出汗葛根麻黃各二兩石膏二兩黃芩芍藥桂枝甘草各半兩上為粗末每服四錢水一盞煎至半盞溫服取少汗出若先自汗者即去麻黃六樺皮湯治傷寒時氣豌豆瘡毒上用樺皮木銼煎溫服取安樺皮味苦平無毒治肌熱黃疸治時燼熱熱毒瘡今豌豆是也及治乳癰初作腫硬欲結成膿者一服愈以樺皮燒存性為末酒調服之即安能治癰腫其治瘡痘可知七必勝散治瘡疱出未能勻遍此藥透肌解毒或未利其瘡毒已先發者宜解毒服之上以牛蒡子不限多少炒令熟杵為細末每服一錢入荊芥二穗水一盞同煎至四分放溫與服如瘡疹已出更與服尤妙牛蒡子本草云癰未破者服一枚能出癰痘頭故出而未透勻者宜用之又云通十二經脈十二經脈既通毒氣出齊無阻矣八涼驚丸治瘡疹五臟皆見木勝土木歸心故預防發癇者龍膽草防風各末青黛研三分匕牛黃麝香各一字匕黃連末五分匕龍腦一錢匕研上同研細末麵糊為丸如粟米大每服三五丸至一二十丸煎金銀湯送下溫服九栝蔞散治斑生於心心生熱熱則生風風屬肝二臟相搏風火相爭故發搐也治之當瀉心肝補其母宜用之栝蔞根末白甘遂末各二錢上同慢火上炒焦黃研勻每服一字煎麝香薄荷湯調下無時服病疑似間解利第二十升麻湯治大人小兒時氣瘟疫頭痛足冷脈數發熱肢體煩疼及瘡疹疑貳之間並宜服之或未經解利而瘡毒已發又云證候未全或未明者但可與解散之也又云患瘡疹大便自如常者亦可服升麻湯蓋用升麻其性苦寒無毒主解百毒殺鬼邪闢瘟瘴蟲毒中惡腹痛咽喉口瘡皆毒也瘡痘亦毒故也其次用葛根性平治消渴大熱解肌發表出汗開腠理治頭痛升麻葛根二藥皆治伏熱毒動心恍惚驚悸煩躁大抵瘡疹是蘊熱毒葛根解熱升麻去毒也病熱而藥性微寒冷熱相攻則芍藥治時行寒熱又活血痹使瘡痘易出也又利小便瘡疹有大熱者則利小便也次有甘草調和之況新書言瘡疹渴躁甚者亦用炙草散主之四者解毒治熱調榮衛為治瘡疹之要藥也為在疑貳之間非瘡疹伏熱而發熱者有傷寒傷風傷食驚證兼患瘡疹而稟氣怯者皆發虛熱而非實熱若服之是瘡疹者則毒減而愈他證者反以為害不能盡述其由但有壯熱而面青目白睛不黃赤大便不秘小便清者皆不可服里無蘊熱故也此藥治未發瘡疹之前瘡疹已愈之後服之清毒故也非正出時服升麻葛根芍藥甘草等分上為粗末每服二錢水一盞同煎至半盞去滓溫服不拘時候亦可為細末湯調服身心煩熱即溫服寒多即熱服十一惺惺散治數證皆為純陽人所用古人處為小兒藥非乃里寒者可服且以藥對其證用之意大抵渾身壯熱必由風熱瘡疹傷寒時氣且先與之也其頭痛目澀鼻流清涕者用細辛喘粗者用桔梗人參多睡者用茯苓恐傷寒時氣乘里弱者用白朮也治風熱瘡疹栝蔞根也栝蔞味苦寒治身熱煩滿大熱除腸胃中痼熱入疽面黃躁渴通月水而利小便熱而胸痹不下乳陽證傷寒治癰下乳皆攻其熱也故非裡寒者可用其裡寒者由身有大壯熱不渴而大便反利小便不赤面青目白睛不黃赤皆裡寒證也其中雖有白朮以溫終非為虛熱者用人之臟腑寒則寒藥先效熱藥未必能制之臟腑熱則熱藥先效寒未能制之此熱之自然也豈得不辨表裡冷熱而用藥也和劑方小兒傷寒壯熱當先服此大效次服羌活散如壯熱未退切不可與通利大便及涼藥恐是瘡疹服藥則誤矣苦桔梗細辛去葉人參甘草白茯苓去皮栝蔞根白朮各一兩半上為細末每服一錢水一盞入薄荷二葉同煎至三分去渣溫服要和氣入姜煎不拘時候身雖壯熱大便自利者不可服十二荊芥散治麻痘子兼瘙癢或癮疹大便自過上用荊芥少許爛研以新井水將布帛裂過入一滴許麻油打勻令飲之便不亂悶麻豆已出用黃蠟煎青膠水飲即安青膠水乃牛皮膠也荊芥治血風麻子是疹子常言風瘙癮疹則皆出皮膚其毒輕而浮又以麻油打勻此滑竅之理又以黃蠟煎青膠水服則安此滋血行榮衛榮衛既順麻疹出矣指迷方荊芥湯乃消毒飲加薄荷煎服之十三羌活散解熱散毒治風壅欲作瘡痘者羌活獨活川芎桔梗蟬蛻前胡柴胡地骨皮甘草炙栝蔞天麻炙荊芥防風各等分上為細末每服一錢水三分盞薄荷三葉盞內煎至二分通口服量大小加減藥水此藥詳其藥味治風治寒治驚下痰涼脾治血熱透肌但實熱發無所不治如稟受怯弱或脾胃弱或外熱目白睛青色皆里無熱不可誤用十四奪命散治瘡疹已發未發並宜服之升麻糯米紫草甘草以上各半兩木通二錢半上銼為散每服一大錢水七分煎四分去滓溫服出瘡疹熱毒熱甚者可服解蘊熱利小便瘡痘初發氣盛亦宜服十五牛蒡散涼風解毒上用牛蒡子炒為末水煎一盞服之小兒冬月有非節之暖及春月天氣暄暖或甘肥之過或重衣溫厚幃帳周密傷皮膚害血脈瘡瘍發黃是生多疾宜預常服之也十六葛根橘皮湯治冬溫未即病春被積寒所折不得發至夏熱得其寒解冬溫始發肌肉斑爛癮疹如錦紋而咳心悶但嘔吐清汁服此葛根橘皮去白杏仁去皮尖知母黃芩麻黃去節甘草炙上件銼散等分每服抄三錢用水一盞同煎半盞去渣溫服不拘時候十七薄荷散方小兒才覺是瘡疹宜服之薄荷葉一兩麻黃去節甘草炙半兩上為細末每服二錢水一中盞棗二枚生薑三片同煎至六分去渣放溫日三兩次服此是小兒稟受壅實毒氣甚者宜服蓋此方云小兒才覺是疹痘便服之服之而汗出者服調中散服薄荷散若作寒熱脈反遲者進脫齒散以溫之詳其理非下藥之法也實者服之未必安虛者服之必危殆熱甚生風者第三十八獨勝散治小發瘡痘早微熱晚大熱目黃脅動身熱手冷發甚如驚者又名牛蒡殭蠶散牛蒡子半兩白殭蠶一分上為粗末每服一大錢水六分盞紫草二七寸同煎至四分盞連進三服其痘便出此藥用牛蒡子出癰透肌白殭蠶治遍身癮疹疼痛成瘡為末酒調服之立瘥又以紫草煎之令利竅是瘡疹證無虛寒證者服之立出也十九抱龍丸治小兒一切風熱中暑驚悸瘡疹欲出多睡咳嗽痰盛面赤手足冷發溫壯睡中驚搐搦不寧脈洪數頭痛嘔吐小便赤澀南星銼開里白者為末用臘月黃牛膽汁和為劑卻入膽中陰乾再為末半斤天竺黃二兩硃砂二錢研水飛雄黃半兩水飛麝香一錢牛黃半錢上同研極細滴水和丸如雞頭實大每服二歲兒竹葉薄荷湯化下一丸不拘時候錢氏云因驚而生熱用藥發散熱入於表故表熱不退而生斑宜服之有大熱者利小便有小熱者宜解毒其出快勿表下宜服抱龍丸紫草膏治麻豆不快紫草白附子各一錢麻黃去節甘草各二錢全蠍十個殭蠶二個炒上件為末用蜜一兩酒半盞入紫草煎數沸後令旋旋同和前藥丸如皂角子大每服一粒用紫草煎湯化下續用黃耆散調治詳之本草云無毒治病十去其半此上等藥也猶如紫草膏治瘡痘兼此藥治驚癇風疾又治瘡痘出不快如瘡疹所作之初似傷寒傷風驚風瘡疹疑貳之間與服之皆有主治不至敗事可與上等藥同矣醫家常善之為妙感冒風寒與瘡疹相雜者第四二十紅綿散一名天麻散治傷寒及痘疹天麻荊芥各一分甘草炙麻黃去節各二錢全蠍七個全者上為末令勻每服一錢水半盞薄荷二三葉酒四五滴煎二三沸帶熱服之如疹子未出再進一服相次又進一服若是傷風服亦不妨此藥大抵為解表之藥也治身有大熱面赤氣粗無汗者為表未解也可服之蓋此藥以天麻麻黃為主治也有汗不得服麻黃者其腠理已疏開不宜更發汗也如有熱更有汗者則惺惺散為和解之藥也故仲景論表證有發汗者有和解者有調和營衛者今有汗者不可服麻黃則和解藥為可用如更有虛寒證者勿服宜調榮衛也如和中散之類是也論此藥能治瘡疹者荊芥主寒熱鼠瘻瘰癧生瘡下瘀血天麻治諸毒惡氣皮膚壅滿熱毒癰腫蠍治諸風癮疹筋脈諸風小兒驚風其荊芥天麻蠍三味皆性平治瘡理血故宜瘡痘所服也二十一五積散治傷寒寒痰內傷生冷者所服也瘡痘本為寒毒小兒熱盛渴則飲冷熱則當風反被風寒所伏寒熱相搏面青發熱心煩自利者宜以此藥散其內外寒毒然後熱氣上行或汗或瘡痘或癮疹服之而愈矣方見寒門二十二麻黃湯治瘡疹煩喘甚者主之麻黃杏仁去皮尖甘草炙桑白皮蜜炙上銼為散每藥一錢用水七分盞同煎至四分盞去渣溫服之若脈數有熱未退者入竹瀝少許咽喉痛或嗽者煎熱入麝香少許服之調平瘡疹用之第五二十三紫草飲子治小兒初覺不安辨證候有瘡疹證三四日隱又在肌膚而未出者及瘡出而遲亦宜當與服蓋紫草者能利竅則瘡痘易出也通水道去心腹邪氣則內除積蓄之熱臟腑自安也上用紫草二兩細銼以百沸湯一大盞沃以物合定勿令紫草氣出量兒大小溫溫服之雖瘡子出亦當輕二十四發灰飲治斑瘡豌豆上用頭髮燒灰令存性飲調服之古方以亂髮治疔腫骨疽治孩兒熱瘡痰熱諸般血病極驗發本血之餘今治諸血瘡證從其類也二十五牛蒡甘草散治麻豆初作服此即稀牛蒡子麩炒一兩甘草炙一錢上為細末每服一字或二字胡荽煎湯調服之不拘時候二十六兔肉醬去小兒豌豆瘡上用兔肉臘月者作醬食去豌豆瘡兼臘兔毛煎湯洗豌豆瘡及兔毛敷良其兔腦主凍瘡骨醋磨敷久疥兔毛一主炙瘡兔頭皮主兔疰毒氣在皮膚如針刺者又云主氣瘻以兔腦兔骨兔頭皮兔毛以上主治此之皆治皮膚癢瘍故藥性論云兔肉平寒作醬去豌豆涼血故也蓋兔肉多食則令人色痿損陽事絕血脈此亦涼血散熱故也二十七安斑散調理瘡疹升麻赤茯苓羌活黃耆人參桔梗炒枳谷麩炒甘草各等分上為細末每服一錢水七分盞紫草薄荷少許同煎至四分盞去渣放溫服之量兒大小增減此藥為解毒涼血生肌寬腸導熱利小便快膈之藥也患瘡疹有熱無寒者可服之二十八蘿蔔湯治斑疹瘡出不快者上用開花蘿蔔煎汁時時與飲之張氏云瘡疹氣勻即出快尋諸本草蘿蔔主治嗽定喘下氣消脹解毒解渴解面毒詳之皆勻氣解毒消壅則瘡疹自然勻快矣此氣勻即出快之意開花蘿蔔取欲出之義爾二十九紅子湯平調瘡疹紅花子紫草茸各一兩麻黃去節升麻各半兩上為細末每服半錢煎薄荷湯入酒一滴同調下此藥用麻黃表毒氣令出升麻解蘊毒紫草滑竅也內紅花子本草云治天行瘡子不出者吞數顆即出故用之三十快斑散調瘡疹貫眾赤芍藥各一兩甘草炙升麻枳殼各半兩麩炒上為細末每服一錢水一盞竹葉七片同煎至五分盞去渣溫服量大小與之此藥內貫眾主腹中諸熱邪毒其味微寒故也患瘡痘煩渴咽躁喘急大便秘小便赤澀口乾目赤皆裡熱也宜服之如無裡熱證則與藥不相當反為之害若當服而不服斯害也已可不審之三十一甘草散治瘡子未出及雖出躁渴者宜服上用大甘草不以多少炙過為末每服一錢或二錢水一盞煎至六分盞去滓溫服不拘時候呷之以少解利熱毒即住若瘡出遲當常服紫草飲子方見瘡疹初出門大人當針兩腕硯子骨間男左女右取之或灸一壯亦助發瘡痘毒氣已發不必用三十二紫草如聖散瘡疹初出急服方吃乳嬰兒與乳母兼服之四五歲已外只令兒服之紫草二兩陳皮去白一兩上為細末每服一錢水一小盞入蔥白三寸煎至五分盞去渣溫服量兒大小與服妙選方云瘡疹氣勻即出快紫草滑竅去心腹邪氣陳橘皮快氣蔥白髮散而開泄腠理也三十三化毒湯治瘡疹已出未出並可服之紫草升麻甘草炙各半兩上件如麻豆大水二盞糯米五十粒煎至一盞去滓放溫分作數服劉氏傅云麩豆瘡欲出渾身壯熱不思飲食若服此一服即內消已有一兩顆出即解其半若令出即當日頭焦只三服瘥詳其前人處方藥與化毒之名至於主治之證無不切要但看人臨時用之何如爾且瘡疹病無他病加兼無不愈也又在人稟受虛實不同冬夏各異又乘異氣所得之因由風寒食驚不一當隨時而曲順安養之又如仲景治傷風雲正患傷寒如其人有故疾者發動則兼以故疾藥攻之活人書云治傷寒云病中又感異氣者乃時令寒暑躁濕風不節脈息與少陽相異證候與傷寒不同者當隨宜以法治之不可泥於一曲也此藥化毒但能化實熱之毒若稟虛而浮熱而伏冷者皆當調適以平為期三十四調中散白茯苓人參紫河車甘草炙上件各等分為細末每服二錢水一盞生薑二片棗二枚同煎至六分去滓溫服作兩三次服三十五紫草木通湯治小兒瘡疹木通紫草人參茯苓糯米各一兩甘草炙半兩上為粗末每抄四錢水一盞半煎至一盞去渣放溫分二三服小兒瘡痘熱熱甚則出熱心主之熱甚則小便赤澀其熱蘊蓄而生病此藥利心火以躁脾土心清則不生他疾脾平五臟自安也木通導心火糯米歸脾土也三十六如聖湯治小兒瘡疹毒攻咽喉腫痛桔梗炙甘草炙牛蒡子各一兩麥門冬去心半兩上為細末每服二錢沸湯點細細呷服入竹葉煎尤妙董汲方同以牛蒡子為惡實蓋異名也三十七蟬蛻甘草湯發小兒斑瘡大蟬蛻二十一個去足甘草一錢半上用水半碗煎至一小盞旋旋與服效已用驗三十八紫草枳殼湯治瘡子出不快倒靨紫草木通甘草炙枳殼麩炒上等分為粗末每服三錢水一小盞煎至半盞去滓溫服大抵壅瘀則榮衛不行令出不快則倒靨用枳谷寬大腸木通利小腸紫草滑竅治心腹蘊蓄邪氣皆易出也大小便秘澀者無不可用三十九當歸散治小兒初得病便驚狂身熱汗出問之不增寒不惡風脈洪數者當下之如覺得有此證瘡痘未發之前宜服當歸散當歸一兩甘草一錢炙上為細末每服二錢水一中盞豆豉十粒同煎至半盞去滓量兒大小服以利為度逐日冷吃甘草汁三歲以下一歲以上加減服之四十快毒丹治小兒瘡疹氣勻即出快蓋血與氣相隨若內有邪熱即血妄行使氣不勻大抵瘡疹氣快自勻宜快毒丹瘡疹出皆宜服之牽牛黑者略炒木香以上各一分肉豆蔻半兩青皮一兩半生半熟上件搗羅為細末滴水和丸如黍米大每服七粒至十粒濃煎紫草蔥白湯下乳前服之量大小加減防備薰沐用之第六四十一胡荽酒治小兒初覺不安辨證是瘡疹或已發未發以出而快者用之蓋瘡瘍煩躁痛癢皆出於心胡荽味辛能通心竅故以胡荽酒煎噴之立出心主瘡瘍主煩躁主痛癢主驚悸凡為瘡疹數證必備是胡荽能通心竅而通之則瘡疹易出也若辨證是瘡疹而大便利者紫草胡荽二藥皆未可用恐紫草性寒胡荽利大腸故也則宜先溫之臟腑如常瘡疹證未退者宜用之上用胡荽三兩細切以酒二大盞煎令沸沃胡荽便以物合定不令氣出候冷去滓微微從頂以下塗兒面頰眼目之間噴背膂及兩腳胸腹令遍勿噴於面錢氏用好酒二盞煎一兩沸入胡荽四兩再煎又云病人左右上下常令有胡荽氣即令闢去汗氣惡氣瘡疹出快忌外人及向穢觸之物雖不可受風冷然亦不可壅遏常令衣服得中並虛涼處坐臥四十二葡萄酒治時氣發瘡疹不出者上以葡萄研酒飲之葡萄味甘平利小便取穗出快之義也四十三燒赤朮豬甲仲景謂瘡疹表出之間宜於房室燒赤朮乃蒼朮也豬甲二物辟惡氣父母常戒其色欲亦令人守房室門戶勿令外人入房恐觸犯令小兒瘡疹難出或有觸犯得上喘面青黃色者猶輕因此犯而死者不可勝數宜謹之四十四燒乳香熏瘡疹法如瘡疹正發則忌諸臭穢惡氣以逆榮衛恐陷伏倒靨也於房室中常令燒乳香不絕可去惡氣瘡疹無不效者四十五黃土末敷瘡痘已出者不可發表如又表之者更增斑爛若發膿痛甚者即用乾淨黃土羅為細末敷之仍數數食蜜為妙四十六芒硝豬膽汁如瘡斑爛為不合表之太過一手一足面腦腹背皆各為一片瘡相似令不忍觀之者用芒硝豬膽汁調塗瘡上勿令動著直候瘡痂落有大段瘡發不通臥席者用麥麩簟臥將息為妙四十七黑牛糞燒灰貼瘡疹治已出而未平切忌見雜人恐勞力之人及狐臭熏觸故也未愈不可風當風則成瘡瘢也如膿疱出可煅黑牛糞貼之令速愈而無瘢痕也四十八黃柏膏小兒瘡痘出後即須愛護面目勿令沾染欲用胡荽酒噴時先用此方塗面上然後噴四肢大人嬰孩有此悉宜用之黃柏一兩綠豆一兩甘草四兩生上件搗羅為末再研令細後以生麻油調如薄膏從耳前眼唇並厚塗三五遍上塗面後可用胡荽酒噴也早用此方塗面上令不生疹痘也如用此方塗遲縱有疹痘亦少諸家方愛護面目者皆以此方治療分兩用法皆同惟疹痘論一料用緣豆粉三兩五錢四十九白芥子散治小兒患瘡疹令不入眼上用白芥子為末水調敷腳心則瘡不入目矣五十爛肉汁治豌豆瘡上用爛肉汁洗之干脯亦得微表而欲散第七五十一蟬蛻散治瘡疹漸作身熱似傷寒只耳尖腳稍冷或腹痛大便秘者是瘡疹上用蟬蛻二十一個洗去泥為末水一盞慢火煎至半盞去滓量兒大小溫服之如瘡疹已出便依前服三五次不是瘡疹亦無害小兒瘡疹欲發出加甘草一錢半煎半盞旋旋與服累效小兒伏所蘊積熱毒蟬蛻味鹹寒可以制況有暴感風作熱客於表者蟬蛻亦治風毒充於皮膚瘙癢不止驚癇夜啼癲疾寒熱驚悸皆宜服之五十二猴梨酒治瘡痘出不快猴梨子五個又名山果子上用酒煎入水浸服之瘡痘即出五十三麻黃紫草湯治瘡子不出麻黃去節人參各一分杏仁七枚去皮尖上為粗末每服二錢水二盞用紫草五寸同煎至一盞去滓分為三四服分作二日服末可服諸藥五十四水解散治瘡疹出不快煩躁不得眠者或出而身體尚有熱者大黃黃芩桂心甘草炙芍藥各二錢麻黃去節四兩上為末患者以生熟湯浴訖暖水調下二錢相次二服得汗利便差強實人服二方寸匕此調風實之人三伏中亦宜用之若去大黃則春夏通用之凡人飲酒食瓜果多以生熟湯浸身皆為酒及瓜氣味以此觀之先用此浴身亦出其毒矣五十五玄參升麻湯治傷風傷寒風熱驚食等熱運於肌或汗或下後毒氣不散表虛里實熱發於外故身斑如錦紋甚則煩躁譫語兼治喉閉腫痛玄參升麻甘草炙等分上銼如麻豆大每抄三錢水一小盞同煎至半盞去渣溫服不拘時候五十六麻黃黃芩湯治瘡疹出不快煩躁不得眠麻黃去節一兩黃芩赤芍藥各半兩甘草炙官桂去皮各一分上為細末每服二錢暖水調服日三服兼治天行熱氣出豌豆瘡不快蓋煩躁昏憒或出尚身熱疼者五十七升麻黃芩湯治瘡疹出不快煩躁不得眠升麻黃芩乾葛芍藥各三錢甘草炙一錢半上銼如麻豆大每服二錢水一中盞煎至六分去滓溫服若時行瘡疹出不快煩躁不眠者加木香一錢半五十八葛根散治天行熱毒氣欲發瘡痘作熱甚疼者宜服解肌出汗葛根麻黃各一兩石膏二兩黃芩芍藥桂枝甘草各半兩上為粗末每服四錢水一盞煎至半盞去滓溫服不拘時候自出汗者去麻黃微下而自消第八五十九四順散患瘡疹至四五日不大便瘡子又盛出即喘粗氣急腹脹小便赤澀須用此方大黃甘草炙芍藥當歸各一錢上為粗末每服抄三錢水一盞煎至六分去滓溫服不拘時候若得氣通不喘腹不脹便休與此藥若初覺有赤點子大便如常小便赤澀須用藥通大便要出快也若出得色紅而快更不須通也六十利毒丸治小兒瘡疹欲出胃熱發溫壯氣粗滿大小便赤澀眠中驚煩渴口舌乾手足微冷多睡時嗽涎實脈沉大滑數便宜服之大黃半兩膩粉大青各一錢龍腦硃砂各五分檳榔生牽牛黃芩青黛各一錢半上為細末麵糊為丸如黃米大二歲小兒服八丸生薑蜜水下不動再服量兒大小虛實加減六十一夾食者紫霜丸治頭疼壯熱脹為夾食方見和劑方瘡疹出太盛解毒第九六十二消毒散治瘡疹已出未能勻透毒氣壅遏出不快壯熱狂躁咽膈壅塞睡臥不安大便秘澀及治大人小兒上膈壅熱咽喉腫痛胸膈不利治造與鼠黏子同但如防風為鼠黏子湯牛蒡子炒六兩一名惡實甘草炙二兩荊芥一兩上為粗末每服一錢水七分盞煎至四分去滓食後臨臥服之此藥治大便秘澀是治裡熱故也況本草云惡實味辛平其中治證治風腫治暴餐熱肉生風解丹石毒治咽喉四肢風腫此性稍涼也為瘡疹所宜服者能透肌出癰瘡是以瘡疹亦出也大便利則不可服六十三化斑散石膏用紙里炮令透為末或用泥瓦燒之取出去火毒知母切片焙乾為細末上件等分用熟水調下一字服之或調塗唇上去頭痛除昏發泄瘡子此名石膏知母化毒散治小兒瘡斑此二方極妙後方恐太涼六十四地黃雄黃散治溫毒發斑瘡痘出不快者乃冬應寒反熱或被積寒暴發熱毒不得宣泄令身斑如錦紋心悶而咳但嘔清汁者葛根橘皮湯地黃雄黃飲子地黃淡豆豉各四兩上以豬脂一斤和勻露一宿煎三分減去一分去滓下雄黃末一錢麝香半錢攪勻量兒大小飲若太多反有所損六十五犀角散治小兒瘡疹不惡寒但煩躁小便赤澀多渴或赤斑點者犀角鎊甘草炙各半兩防風二兩黃芩半兩上為粗末每服抄三錢水一盞煎至七分去渣溫服不拘時候六十六紫河車散治小兒斑瘡毒氣不解攻咽喉者聲音不出舌頰生瘡渴逆煩悶潮熱面赤紫河車茜根貫眾各三錢芍藥甘草炙各半兩上為粗末每服一錢水七分盞生薑一片同煎至四分去滓溫服一方用牛蒡子六十七玳瑁湯治時行豌豆瘡及赤瘡疹子未發者令內消已發者解利毒氣令不太盛生玳瑁生犀各以冷水濃磨汁二合上同攪令勻每服半合微溫服一日四五服為佳又治出而未快者宜服之又云毒氣內攻紫黑色出不快用玳瑁水磨濃汁一合入獖豬心血一皂子大以紫草濃煎湯都作一服服之玳瑁犀角其性微寒以治熱毒則知其無失也二藥皆治瘟疫蟲瘴解百毒通血脈消癰腫故用之以解蘊毒可宜服也六十八白虎湯治小兒痘疱麩瘡斑瘡赤黑出不快及瘡毒餘熱並溫熱病暑中氣煩躁熱渴大便秘小便赤四時天氣大熱即可與服如冬無大寒天氣大溫即可服之石膏四兩知母一兩半甘草炙三錢人參半兩上為粗末每服抄二錢水一小盞粳米二十粒同煎至半盞去渣溫服不拘時候此藥治中暑又患瘡痘天氣大熱與肌熱心熱相應煩躁狂亂渴水發黃鼻衄吐血便血淋秘皆可服之指迷方治瘡疹夏月煩躁加麥門冬用竹葉煎一名竹葉湯六十九人參竹葉湯治夏月壯熱煩躁心悶口乾渴心神不寧痰壅嘔逆兼治瘡疹後餘毒熱不退小便赤澀成赤斑者人參半夏湯泡炒七次當歸淡竹葉天門冬去心上五味等分為粗末每服抄二錢用水一小盞生薑二片同煎至半盞去滓溫服不拘時候瘡疹始覺不惡寒但煩躁小便赤澀乾渴成赤斑點者宜服之此藥治中暑虛煩渴瘡疹後餘熱不退皆宜服也七十通神散治瘡疹毒氣少大小便利倒伏不出者生地黃炒地龍炒硃砂另研各一兩上為細末每服一字煎胡荽酒少許同溫湯調下七十一青黛散治瘡疹未作膿痛甚心膈煩躁睡臥不安者並宜服之上用波斯青黛如棗核大以水調服之一方用溫磨刀水調服之七十二野通散治痘瘡出不快並傷寒不語干野人糞炭火煅為灰片腦麝香各少許上為細末每服一錢新汲水入蜜調下本草云干野人糞治蜘蛛咬瘡此治瘡疹出快明矣蓋蜘蛛咬瘡久而不愈其絲生皮膚延蔓遍身不愈用雄黃青黛麝香水調以蜘蛛試之蜘蛛化為水後果驗其雄黃青黛麝香是治瘡疹當用之藥干野人糞亦治瘡疹之藥野人乃彌猴也黃羢毛長面赤者若人家養者肉及屎皆不主病為其食息雜違其本真也七十三無比散治瘡子惡候不快及黑瘡子應一切惡候硃砂一兩研如粉牛黃片腦麝香膩粉各一分研上同研細如有患者小兒一字大人半錢水銀少許同小獖豬尾上血三二滴新汲水少許同調服先寧穩得睡然後取轉下如爛魚腸葡萄穗之類臭涎惡物便安小兒用乳汁滴尤妙觀之此藥方思古人論證處方無有不效者須是病藥相主則藥下咽而病去若不相主而用之下咽即死也且傷寒有用硝石大黃而愈者有用附子乾薑硫黃丹硫著艾而愈者此合用而用之也設若合用硝石大黃卻用硫黃附子薑桂合硫附薑桂卻用硝石大黃下咽即死矣此用無比散之意也無比散治瘡痘熱毒太盛壅瘀榮衛不行外不得泄而內不得通毒氣在裡外則瘡疹黑色里則腹脹喘急譫語大小便不通昏困者宜服之此有其毒則用其藥無不效者設或瘡黑靨里無腹脹無喘急無譫語無大小便不通無昏困大便反如常或反利者則無比散不可用也常言對證用藥是也有一士大夫之家一子弟八歲患瘡疹黑靨診胃脈大弱前醫用升麻湯羌活散問其胃弱之故言平時胃弱不能進食今瘡疹黑靨服升麻羌活散臟腑日夜數次後用溫臟腑藥更不止而卒服升麻羌活散愈臟腑不固而米穀不化當此見瘡黑不見其臟寒則無比散亦無如之何故下藥先審病之虛實寒熱豈可一概見黑靨便投涼劑豈不誤人生死之計也七十四豆湯治瘡痘未作膿心膈躁睡不安者上用黑豆煮汁徐徐溫服之亦解七十五透肌散治證並方與三十三化毒湯同七十六黃連散治瘡痘毒氣上衝口舌有瘡下部亦有瘡有熱者亦服之上用黃連一兩去須為末每服一錢水一盞煎至五分去渣不拘時服量大小虛實與服瘡痘初發亦宜服之七十七通關散治小兒斑瘡水痘心悶煩躁發渴及小便赤澀口舌生瘡通心經利小便山梔子大黃炒各一分木通甘草炙車前子炒瞿麥茯苓人參滑石各三分地萹蓄半兩焙上為細末每服一字二三歲者半錢水半盞入燈心同煎至三分服稟受稍弱者五苓散人參白朮散導赤散亦得七十八紫雪治大人小兒一切熱毒胃熱發斑消痘疱麩疹及傷寒熱入胃發斑並驚癇涎厥走馬急疳熱疳黃瘦喉痹痛及瘡疹發毒攻咽喉水食不下者黃金一百兩寒水石石膏各三斤犀角羚羊角各三兩玄參一斤沉香木香丁香甘草八兩上用水五斗煮金至三斗去金不用入諸藥再煎至一斗濾去滓投上好芒硝二斤半微火煎以柳木篦攪勿停手候欲凝入盆中更下研硃砂麝香各三兩急攪候勻冷貯於密器中勿令見風每服一錢溫水化下小兒半錢一字咽喉危急捻少許乾嚥之七十九竹葉湯治小兒瘡疹不惡寒但煩躁小便赤澀多渴成赤斑點者宜服竹葉湯犀角散石膏四兩知母二兩麥門冬去心甘草各一兩炙上為粗末每服抄二錢水一盞竹葉一握同煎至半盞去滓溫服不拘時候八十導赤散治瘡疹心經蘊熱睡臥不寧煩躁而小便不利面赤多渴小兒貪食乳者渴也人參木通麥門冬去心生地黃甘草炙上等分為粗末每服抄二錢水一小盞煎至半盞去滓溫服不拘時候八十一救生散治小兒瘡疹膿疱惡候危困陷下黑色方此藥治大段熱毒顛倒入臟腑者不得已而用之獖豬血腦月內以新瓦罐子內盛掛於當屋陰乾為未馬牙硝研各一兩硃砂牛黃片腦麝香各一錢上同研極細每服一字新汲水調下大便下惡物瘡疱紅色為度不過再服神驗無比八十二犀角湯治小兒疹痘瘡及赤瘡子犀角鎊大黃炒桑白皮蜜炙鉤藤甘草炙麻黃去節各一兩龍膽半錢石膏瓜蔞黃耆炙各半兩上為粗末每服一錢水一小盞煎至四分去滓溫服量兒大小加減服瘡子退後濃磨犀角水塗之更良錢氏亦附方同以此藥治療瘡疹太盛令不入眼則名調肝散此藥治風盛氣實心肝血熱津液內躁大便不通毒氣上盛表熱未散之藥也且大黃瓜蔞治內躁鉤藤龍膽治風血熱桑白皮石膏治上焦熱麻黃黃耆散肌熱犀角甘草解毒熱大抵用藥貴於與病相主則病去而正氣自復苟為不然則反為大害如犀角散自非大便數日不通喘急悶亂煩躁譫語者豈可服之恐病藥不相主治也八十三牛黃散治便血由瘡疹陽毒入胃便血致日夜無度腹痛啼哭牛黃一分鬱金一兩上為細末每服半錢以漿水半盞煎至三分和滓溫服量兒大小以此增減日二服八十四玉露散治暑月出瘡疹煩躁熱渴寒水石軟而微青黑中有細紋者是半兩甘草一錢生用方解石堅白而有牆壁手不可採者是如無以石膏代之堅白似石膏敲之成段皆方者是半兩八十五犀角飲子解熱毒去風疹犀角甘草炙各半兩防風二兩黃芩一兩上為粗末每服五錢用水一小盞煎至半盞去渣溫服不拘時候八十六犀角地黃湯治瘡疹出太盛者宜服之活人書云傷寒及瘟病應發汗而不發汗內有瘀血者及鼻衄吐血不盡內有餘瘀血面黃大便黑者此方主消化瘀血兼治瘡疹太盛者此方解之犀角一兩生地黃半斤芍藥三分牡丹皮一兩上銼如麻豆大每服五錢水一盞半煮取一盞有熱如狂者加黃芩二兩其人脈大來遲腹又滿自言滿者為無熱不用黃芩毒氣壅瘀倒靨黑色第十八十七豬尾膏治瘡疹初作未能出透及已出盡內外熱毒貫注血疱如豆在於肌皮之上不結痂疕二者皆用之且瘡疹蘊伏毒熱欲出而未能透則熱甚動心心煩狂躁妄語或見鬼神此皆心熱也蓋心營於血血熱則瘀瘀則色敗未出者則為鬼瘡子一出而便黑也已出者為黑靨大抵瘡痘自紅斑生成血疱疱至五七日結膿窠至六七日不結膿窠者此是毒氣彌滿恐復入里古人用龍腦香涼心血行榮衛用豬心血者以心歸心用豬尾血者取其常動欲散外也況有前狂躁證而未省者以溫酒化下此意欲散而行榮衛故也皆治熱毒太盛者後人見用豬尾膏亦名龍腦膏得效間有虛而陷伏者亦用之誤人甚多深可怪也又有當用一字卻用一錢熱少而不能當之及以為害者亦多如合用一字者且與半字如傷寒作渴甚能飲一斗者且與五升正此之意況有心經熱兼有他虛寒證見者又不可輕服如吐瀉人發熱煩渴小便赤則不全為寒證治也煩躁人大便自利而小便清則不全為熱證治也如有此證在醫者兩全之去其所苦扶和陰陽不至偏絕無不安者上用龍腦半字許研細旋滴豬心血和丸以紫草湯化下煩躁狂悶未省者以溫酒浸服之錢氏用豬尾膏用豬尾血其意皆通又名龍腦膏八十八控心散小兒斑瘡一服而出全蠍二十四個炒雄黃麻黃去節各一分上為細末每服一錢用胡荽煎酒調下蠍治諸風癮疹中風半身不遂口眼歪斜語澀抽掣者為能手透諸筋脈雄黃主惡瘡疽痔透百節治疥瘍亦治瘡疹毒氣不能出也麻黃解肌泄邪氣惡氣消赤黑斑毒三藥治瘡疹當出而不出者如自然出快者不須服也八十九獨味麻黃湯治斑瘡倒靨上用麻黃三十寸去節蜜拌炒令香紫色為度水一盞煎至六分服昔有人得此方後知兗州仙源縣值工筆李用之子肉瘡倒靨已至危困投此藥一服瘡子便出其應如神未至胃爛便血者皆可治服九十南金散治小兒瘡疹已出而復顛其熱甚危諸藥不效者萬無一失紫背荷葉霜後搭水紫背者白殭蠶直者炒去絲上為細末各一錢匕小兒半錢研胡荽汁和酒下米飲亦得本家在處貼印施人其全活者甚眾蓋藥有用龍腦人牙齒者卒難得之唯此藥無毒而效速荷葉卒難得可於鹽鋪內尋之九十一滑石散治瘡痘出遲恐壅瘀黑色此藥滑竅令出快治膈上煩熱多渴小便赤澀面青氣粗大便不利者滑石甘草炙上等分為細末每服一錢雞子清酒少許調服九十二橄欖核水治瘡子倒靨上用橄欖子核中截斷水磨少許服立發九十三快毒丹治小兒瘡疹氣勻即出快蓋血與氣相隨若內有邪熱即血妄行使氣不勻大抵瘡疹氣快自勻宜快毒丹瘡疹出皆服之牽牛黑者炒木香各一分肉豆蔻半兩面里煨熟青皮一兩半生半熟上為細末滴水和丸如黍米大每服七丸至二丸濃煎紫草蔥白湯下乳前服之量其大小加減九十四紅粉丹治臟腑熱瘡疹不勻龍腦細研一錢壞子胭脂天竺黃硃砂細研各一兩南星臘日釀牛酪中百日內陰乾取末一兩上五味煉蜜和搜為丸如雞頭子大每服一丸煎人參湯化下九十五乳香豬血膏治斑瘡不發上以乳香研細用豬心血為丸如櫻桃大每服一丸用水磨化下九十六紫金散治小兒瘡疹倒靨及出不快者紫草蛇蛻炒焦牛李子炒各半兩上為粗末每服一錢水七分盞煎至四分去滓溫服不拘時候蛇蛻治一切惡瘡十年不愈者亦用之良故也九十七鉤藤紫草散發斑疹令出快鉤藤鉤子紫草茸上等分為細末每服一字或半錢用溫酒調下無時服紫草滑竅利小便散諸十二經毒氣鉤藤治小兒寒熱十二驚癇治瘡疹而用之素問云瘡瘍煩躁痛癢皆出於心驚癇心病也瘡瘍亦心所主者故用也九十八麝香豬血丸治小兒瘡疹不透上旋取豬心血調麝香少許兩手心塗之並塗些小口唇上無不極驗九十九木星飲子治小兒瘡疹不出及出不快者硃砂一分鬱金半兩上為細末每服一字或二字量大小入龍腦少許以新汲水茶腳少許同調勻然後刺豬尾滴三點子入藥汁令服不過一二時辰瘡子出便紅活小兒無他病神效本草云鬱金辛寒主血積下氣生肌上血破惡血氣尿血金瘡以意詳瘡疹出於心也由熱而出也硃砂安心性微寒以治熱也熱有所蘊蓄則壅瘀而不出用鬱金者下氣消惡血無壅瘀則出出而不遲也一百四聖散治瘡疹出不快及倒靨紫草木通甘草炙枳殼麩炒黃麩上件等分為粗末每服一錢水一中盞煎六分去渣溫服一百一脫殼散上以雞子抱出殼子於新瓦上焙乾去膜取殼搗研如粉細遇小兒斑瘡倒靨顛不出或臟腑糞血糞黑頭瘡昏睡不醒用酒調一字塗兒唇上令兒舐或以酒調塗風池背上心前此名脫殼散或以熱湯調一字服之一百二山梔子湯治麩疹及斑毒狀如蚊蚤所齧毒盛黑色者山梔子仁白蘚皮赤芍藥升麻各一兩寒水石甘草炙各半兩上件為細末每服一錢水八分盞以紫草薄荷各少許同煎至五分去滓放溫服一百三化毒散鬱金香一枚甘草炙一分上用水半碗同煎令水乾去甘草將鬱金切作片令乾為末入生腦子五分研令勻用豬血研成稀膏子煎薄荷湯化下一錢不過二服其毒氣從手足心出乃瘥此五死一生之候若便血瘡壞無膿者十死不治一法可用蟬蛻末一錢好腦子一皂角子大大豬心血三皂子大和作膏子用熱酒浸紫草令溫化下服移時身上發大熱瘡毒頓出然後依證調治一百四宣毒膏治毒氣盛瘡疹已出不快倒靨急服此藥曾經大效獖豬血先臘八日取後尾血一升用新瓦器盛好硃砂細研揀乳香細研各一兩甘草炙為末馬牙硝各半兩片腦麝香各一字上件一處同豬血拌勻用一寬新竹筒底二個盡入諸藥在筒內用密紙數重系定於大糞坑屋梁上至清明日取出曝乾更入腦麝各一錢細研勻滴水丸如皂角子大煎人參湯化下一丸若毒盛瘡黑靨服之者瘡疹紅活再長神驗一百五百祥丸治瘡疹黑陷而耳尻反熱者為逆也用百祥丸牛李膏各三服而不愈又云紫黑干陷者百祥丸下之不黑者謹勿下又云黑者無問何時十難救一其候或寒戰噤牙或耳黃腫紫宜急以百祥丸下之下之復惡寒不已身冷汗耳尻反熱者死病也得身溫欲飲水可治又云瘡黑陷而不發寒病未固也遂用百祥丸為藥以牛李膏為助各一大服五日而復紅活七日而愈上紅芽大戟不以多少陰乾漿水煮軟去骨日中曝乾復入汁中煮汁盡焙乾為末水丸如粟大每服一二十丸研赤芝麻湯下吐利同無時一百六牛李膏治瘡痘倒靨又云已出未出快者宜服紫草散玳瑁散之類重者以牛李膏又云治小兒瘡疹毒氣不散出不快及觸犯黑色者宜用之又云奪命膏上用黑熟牛李子七八月內採於盆內研汁生絹裂去滓用銀器盛慢火熬成膏瓷器內收常令透風每服一皂角子大煎杏膠化如人行二十里再進一服其瘡疹自然紅色毒氣慢此藥神妙一切瘡疹出不快並可服錢乙同名牛李膏又云至秋結實黑圓成穗無生者市肆中乾者為末水熬代用董汲治小兒瘡疹痘疱惡候見皮膚下不出或出不快長及紫黑干陷亦用此藥仍云汲小年病此惡候極危殆父母不忍見之遇錢乙下此藥得安因懇求得真方遂傅於世惟於收時不知早晚故無全效今並收時載之九月後收取研濾成膏每膏二兩研入好麝香半錢收貯不津器中九籥衛生方同但用桃膠半兩牛李子一兩炒為粗末每服一錢水七分盞煎至四分去滓溫服治療亦同一百七倍金散治小兒瘡痘倒靨黑色鼠黏子炒二兩神麯炒半兩減杖華山果子連枚一兩上為粗末每服一錢水八分盞入荊芥七穗紫草十根同煎至四分去渣溫服一百八抵聖丸治小兒斑瘡不出反入方上用十二月老鴉左翅不計多少風中令乾辰日燒為灰用中等獖豬背上刺血為丸如雞頭實大每服一丸以獖豬尾上血少許溫水同化下未效二三時間再一服一百九濕生蟲散治瘡子倒靨上用濕生蟲不計多少焙乾為末酒調下一字一百一十白花蛇散治大人小兒瘡子倒靨白花蛇連骨一兩火炙令乾勿焦大丁香二十一枚上為細末每服一錢小兒半錢以水解淡酒調下如黑靨者服之移時重紅生如聖毒氣滿盛而下第十一一百一十一敗毒牛黃丹瘡子出定大便不通瘡中膿汁不幹真牛黃大黃末和兩粉霜珍珠末各一兩上件同研勻煉蜜和丸如黍米大每服十粒煎人參湯下量兒大小加減一百一十二大黃丸治瘡痂起而能食以此藥下之錢氏雖云此未可以能食為有熱而便下須有他證相表裡方可下且瘡痂起而能食食而腹滿腹滿而不大便不大便而喘急喘急昏甚而譫語者方可下下之藥但能去熱毒不為瘡痘之害若瘡痂起而能食一證便下之下之則不穩蓋熱氣未深故也如傷寒發厥須在六七日已後益氣深方能發厥厥而下之表裡皆解傷寒則汗解蘊熱則瘡疹出矣大黃一兩酒浸洗蒸熟黑牽牛半生半熟各一錢川芎半兩甘草炙一錢上為細末糯米糊為丸如麻子大每服量大小加減蜜湯吞下以溏利為度一百一十三川黃散治麩瘡及斑瘡大便不通大黃銼微炒川芎各一兩甘草炙黃芩枳谷炒各半兩上為粗末每服一錢水一小盞紫草少許同煎至半小盞去滓溫服不拘時候瘡痘則大便不通不為害者則不下其為害可下者證大便不通欲大便而不得通不得通而腹脹滿心胃悶喘急面赤睡中譫語有諸證即可下又看熱氣淺深藥有多少輕重也又有諸熱證大便如常此又不可下熱在表故也當與小柴胡湯五苓散治之一百一十四大承氣湯治昏甚譫語妄言大便不通腹脹手心腋下有汗目睛黃赤喘急者當用之厚朴八兩大黃四兩枳實一兩麩炒上為粗末每服五錢水半盞煎至二分入芒硝一字去滓溫服不拘時候瘡疹病中表里感寒或吐或利者第十二一百一十五益黃散治小兒胃冷嘔吐脾虛泄瀉又治患瘡疹因煩躁渴水飲冷過多暴傷脾胃或吐或瀉並宜服之丁香訶子煨青皮去穰陳皮去白木香各一分上為細末水半盞藥末一錢同煎至三分盞去滓溫服不拘時候一百一十六參朮丸治小兒脾胃傷冷外熱裡寒不思飲食身常壯熱大便或溏色白或患瘡疹身有大熱因食冷物或冷藥過度或瀉或腹脹或已出瘡疹瘢白無血色此由裡寒脾胃伏冷榮衛不行致令毒氣內伏不出宜服之其瘡瘢白無血色者皆從瘢白四圍紅暈再起作膿結痂而愈人參白朮乾薑炮甘草炙各一分上為細末米糕泡糊為丸如麻子大每服百餘丸溫水吞下或米飲亦得乳食前服前世之書如仲景諸論治傷寒云輕者用理中湯重者用四逆湯此乃胃足陽明經而感寒邪脾胃乃為中州之府和理中湯曰辛甘發散為陽以蛻寒邪也理中湯煉蜜丸而嚼下曰理中丸蓋添蜜甘以入脾胃嚼而便化於中焦今參朮丸以粳米糕為丸取其難化服在脾胃滲漉漸得消化則中焦得暖脾土喜躁其熱自歸此所以能治熱也一百一十七二和散治瘡疹並傷寒冷熱不和陰陽痞滿氣不升降服之調榮衛升降氣和冷熱消食快氣藿香葉香附子炒去毛上等分為細末每服抄一字溫水調服不拘時候一百一十八六神散治脾胃虛弱津液躁少內虛不食身發虛熱人參白朮茯苓甘草炙白扁豆炒黃耆蜜炙上等分為細末每服抄二錢用水半盞生薑一片棗一枚同煎至三分去滓溫服之不拘時候身熱甚者加烏梅少許同煎服一百一十九治中湯治瘡痘方作熱渴欲飲或飲冷水或食冷物雖身熱其中寒不食嘔吐下利宜服之人參白朮乾薑炮甘草炙青皮陳皮去白上等分為細末每服一錢用水半盞煎至三分去滓溫服不拘時候量大小服之一百二十胃風湯證候並方見集效方一百二十一乾薑甘草湯治瘡疹服冷藥太過咳嗽手足冷脈遲者自利嘔吐不食乾薑炮甘草炙各四錢上銼為散水一升二合煎至四合去滓溫服一百二十二胃愛散調理小兒脾胃吐瀉如斑瘡未出醫者不識形候便將冷藥冰卻瘡子致令內伏不出將此胃愛散調理如身體汗即不用控心散發也如無汗即控心散發之後下羌活散胃愛散糯米一兩干淡木瓜三錢甘草一錢丁香十六個同炒藿香葉紫蘇葉各一錢上件藥同一處令乾碾為細末每服一錢或五分煎粟米棗子湯下一百二十三勻氣湯取餘毒後調理桔梗洗淨干五兩甘草炙二兩白乾薑一錢縮砂陳皮去白茴香各一兩洗上為細末每服半錢或一錢用霜木瓜煎湯調下或用紫蘇鹽煎湯送下一百二十四豆乳散治小兒瘡疹間偶滑泄不止甚者宜服之肉豆蔻一枚乳香一豆大上為細末米飲調下一百二十五姜附湯治瘡疹半出而半不出或出盛時卻下利肢厥嘔逆腹脹吃噫須急與理中丸四逆姜附湯之類不須疑已試之驗也大便自利腹脹者是熱毒被冷所搐不能出冷甚則為下利其毒小得出則為腹脹當此以理中丸四逆姜附湯等服之里復溫則利止熱毒得復出則腹脹自消瘡疹亦自出矣又有瘡疹半出半未出或出盛時卻大便不通小便赤澀喘粗腹脹而唇齒乾口躁渴引飲譫語者當急下之此證是毒氣壅瘀欲出而出不辨故腹脹下之熱毒散榮衛伸則里脹消外瘡出合溫合下皆得其宜不可不述之若下膿血而腹脹者又非此證宜服南金散乳香豬血膏理中丸姜附湯方見寒門四逆湯方見傷寒門一百二十六七珍散調胃進食滋養榮衛人參茯苓白朮山藥黃耆蜜炙甘草炙白扁豆炒上等分為細末每服抄二錢水一盞生薑三片棗子一枚同煎至六分盞連滓溫服不拘時候加粟米名曰八珍散此藥大能進食時人患不食用諸藥皆不效後用此數日飲食大進脾土居中躁溫皆非所宜但得其中則水升火降脾愛穀味也一百二十七薤白湯治瘡疹下利黃赤膿血及身熱薤白切半盞豆豉一盞山梔子十枚上用水五盞同煎薤白爛為度去滓量大小服之解去惡積也瘡子因吐利內虛自陷者第十三一百二十八活血散治是瘡疹證不出或出而遲或出而倒靨者皆宜服之上用白芍藥炒為細末用溫酒調服或入酒一匙則出快如欲止痛者只用溫熱水調服之以意尋之此乃調榮衛藥也蓋張氏妙選方云瘡疹氣勻即出快氣行由榮衛無阻矣又芍藥主時行寒熱消癰腫則治瘡痘矣素問論腳受血而能行目受血而能視手受血而能握物活人書一證感寒寸大尺弱兩足拘攣為下焦血少不能伸用芍藥甘草湯三服遂腳伸不拘攣能行常用有效又有老貴人不能拜跪宣醫用六辛湯乃是白芍藥六兩甘草半兩服十日而能行此亦活血散行榮衛也一百二十九人齒散治瘡疹已出而不快既出而倒靨患瘡疹作寒熱而脈反遲者或攻皮膚而出遲或面額赤脈不洪大者或服涼藥過多血澀氣弱或出之未快隱隱在皮膚間以酒調服之錢乙附方治瘡疹倒靨入麝香酒調服之尤佳又云瘡疹倒靨不出加赤小豆七粒薄荷酒調服之若黑色者名曰鬼瘡子用獖豬血調下二錢移時再服之上用人齒脫落者以瓷瓶固濟大火煅令通赤候冷取出為末用薄荷酒調服之半錢良久脈平毒氣散瘡如粟米而出詳之此為發出瘡疹之藥也如傷寒表汗之藥故傷寒發汗須看榮衛之淺深瘡疹表出須看蘊熱之多少也恐蘊熱少而用藥過為斑爛故也其已出而未快者活血散蒺藜酒葡萄酒之類可也既出而倒靨者須人齒散則病藥與稟受弱人三者皆相當也不爾則病輕藥重反以為累後人不能究其毒氣輕重一概用藥因茲夭橫者多昔有士貴之家患瘡疹已出而稍遲遂用正氣散加白芍藥又用胡荽酒猴梨酒亦出遲渠家云大抵醫家用藥太緩自夜來燒人齒五個酒調服之一身瘡疹俱出駭聞渠用遂再診視脈已微觀腦後並兩腳盡白色是榮衛弱熱毒少而藥力過則陽氣少而無以應接故無血色也告云陽氣盡出表外今裡寒寒氣成濕濕必濡瀉急以二氣丹為小丸服至半兩水瀉二日方止又服內補散治瘡痘其瘡痘服人齒散表過為斑爛遍體為一將息月餘方愈其人精神稍緩蓋耗竭心液故也詳人齒治奶乳癰破腫出箭鏃刺表瘡疹甚驗若誤用早則一變十不可勝數為斑爛為虛脫為裡寒不可不知又有田舍及市井間小兒患瘡痘中行走當風任服朴硝大黃之類無害者恐富貴之稟非貧荷者比各隨宜而治前云服人齒散脈微而瘡色白為外陽微濡瀉為內陰盛自非先用二氣丹後尚濡瀉若用之遲豈不為虛脫也一百三十內補散治小兒正患瘡疹中或感外寒或內傷生冷或服冷藥過多因生吐瀉脾虛血澀瘡疹遲遲不出肌膚瘦而無血色里服諸調脾胃藥外服此可以滋養血氣瘡毒得出人參黃耆白芷當歸肉桂桔梗炒川芎木香甘草炙防風厚朴薑製橘皮去白上等分為細末每服一錢入酒二匙溫湯浸調服之不拘時候王子建云仲景論證多而用藥少男子詳而婦人略云此乃穿鑿之過若使仲景存日其方有餘用蓋無壞病矣今則醫者治病紛紛擾擾為利是圖動輒差誤後賢處方救其不及是乃方愈多皆是救差誤爾治瘡疹用內補散亦救其差誤爾俚俗人常云瘡疹是熱毒見其藥稍溫便以為誤此不審之過也殊不知傷寒是傷其寒卻有間或用大黃朴硝升麻知母之類此皆救一時不及若不述此恐人執而不移一向偏見使緩急療病意議不能完備疑謀敗事者則多矣解毒利餘毒第十四一百三十一赤茯苓湯治小兒疹痘瘡出後咳逆脅痛不下食赤茯苓甘草炙大青升麻枳殼麩炒各半兩梔子一分上為粗末每服一錢水一小盞入苦竹葉一七片豆豉三十粒同煎至五分盞去滓分為三服日三四服看兒大小以意加減本方稱疹痘出後脅痛者由病後毒氣溷亂阻於升降左右為陰陽之道路氣之所行處令氣滯為脅痛以枳殼寬腸下氣令氣順脅不痛也大青梔子去蘊熱升麻解毒赤茯苓導心火利小腸無熱以克肺氣而咳逆自平爾一百三十二小柴胡湯治發熱甚而嘔吐者宜服之柴胡人參黃芩各三兩甘草炙半夏各二兩半湯泡七次上為粗末每服三錢水一盞生薑二片棗子一枚同煎至半盞去滓溫服咳嗽者加五味子煎服頭痛發熱肢節痛者四味升麻湯大便不通者四順飲若大便自利黃黑色者此毒亦有所出不必廣與湯劑恐重增他病大便自然通不得以溫藥助之瘡疹亦稀少自快利只與四味升麻湯荊芥散雖大便利不可以溫藥助之其下利甚者卻與少溫之一百三十三大青四物湯治熱病十日已上發汗及吐利後熱不除身上斑出大青四兩豆豉八合阿膠甘草炙各一兩上銼如麻豆每服抄五錢水一盞煎至六分去滓入膠煎令化服一百三十四沙糖水治瘡子作膿窠了是毒氣已盡出在肌但未結靨者上宜調沙糖水與吃瘡子浮欲干時須與兒掐去痂令血出則定無瘢子若從他至干定隱一瘢子也後人見吃沙糖水瘡干不問毒氣出與不出盡便與沙糖水吃損目者多矣蓋嘗瘡疹結成膿疱是毒氣出盡在肌膚可服之又設或尚爾血疱未成膿疱乃毒未出盡便吃沙糖水則損目蓋患瘡疹兒食糖蜜棗柿即瘡入目及患瘡疹家煮鵝鴨卵食其兒聞卵氣目中即生翳膜更不可食也一百三十五藍根散板藍根一兩甘草炙三分上同銼為細末每服半錢或一錢用雄雞冠血三兩點同溫酒少許食後同調下一百三十六甘露飲解胃熱及小兒瘡疹已發後餘毒後餘熱溫壯齒齦宣腫牙痛不能嚼物飢而不欲食煩熱面黃及病後瘡疱乳母俱可服甘草山茵陳石斛枳殼麩炒黃芩枇杷葉生地黃麥門冬去心上等分為粗末每服抄二錢水一盞同煎至八分食後溫服牙齒動搖牙齦腫熱含漱並服一百三十七槐花散治斑瘡餘熱不退槐花赤小豆各炒二錢麝香少許上為細末每服半錢蜜湯調服不拘時候一百三十八淨心散治瘡痘出欲盡便服之如入眼即自退蛇蛻一條燒灰不蛀皂角十莖燒灰甘草生用半錢上為細末每服一錢熱水調下小兒半錢一百三十九青金丹治小兒瘡疹病後取下餘毒滑石末白丁香研過天南星青黛細羅輕粉水銀各二錢先以餳二錢於銅銚內溶化便以水銀拌和勻瀉於地上冷用川巴豆去皮心膜七十三片無缺失者用井花水浸一宿懸於當風吹乾爛研上件藥用拌和勻用軟飯為丸如梧桐子大巴豆不出油依形證用湯使傷寒後取積淡煎蔥白湯送下取疳蟲用牛肉汁下驚風吐中緊硬面青黑用金銀薄荷蔥白湯下因傷著肚中及腹皮上微熱腹脹夜間作熱似疳又不是疳面青黃色眼微黃肚腹中有積用皂角子二七粒灰內煨過水一盞煎至半盞送下此藥有積作瀉魚鮓湯下氣積炒茴香湯下凡下此藥周歲十四丸二歲十八丸七歲二十四丸看大小加減下須是四更初天明通下積來盡時可依形證候下藥補之臨服此藥恐先吐下些少涎來亦不妨一百四十黃芩散治瘡毒出盡後服之恐瘡毒入目極妙黃芩山梔子黃丹上等分為細末用牛蒡子葉取汁調塗於頂門一百四十一燈心湯治瘡痘出後煩喘小便不利者宜進之燈心一把鱉甲醋煮黃二兩上銼為散每服一兩用水八合煎取四分服之各量大小加減服之一百四十二黃耆散治壯熱不退可涼肌膚散熱黃耆柴胡乾葛甘草炙各等分上為末每服一錢薄荷三葉水半盞煎至三分約三呷空心服此藥治發熱數日未退者其熱是瘡疹者量其虛實用之也一百四十三硃砂膏治小兒驚積熱病後可常服硃砂半兩硼砂馬牙硝各三分真珠末一錢玄明粉二錢以上拌研片腦麝香各一錢上件各為末於一處拌合和用好蜜煉成膏如小兒諸般驚用藥一黃豆大常用金銀薄荷湯少許化開下如遍身潮熱用甘草煎湯化下一臘及一月內小兒不通下藥可以藥用乳調塗乳上令小兒吃乳下一百四十四宣風散治身熱煩渴腹滿而喘大小便赤澀面赤悶亂大吐當利其小便不瘥者宜服之檳榔二個陳皮去白甘草炙各半兩牽牛四兩半生用半炒熟上為細末三兩歲用蜜湯調下半錢以上者服一錢食乳前服一百四十五甘桔湯治瘡疹咽喉疼痛生瘡者服之甘草炒二兩桔梗米泔水浸一宿焙乾用一兩上為細末每服二大錢水一盞煎至五分食後溫服如肺熱手撏眉目鼻面加阿膠半斤炒過同煎至五分服一百四十六定命硃砂散治小兒瘡疹毒氣不出或出後乾黑色服此藥發出毒氣其瘡子細紅而出也此方系出瘡子倒靨門中硃砂半兩生龍腦滴乳香馬牙硝四味各研甘草炙各二錢上五味研勻用腦月新獖豬血半升同研勻取青竹筒長二尺留兩節開一頭作竅子注藥在內黃蠟塞定以油絹緊里封勿令透氣埋地坑中至一百五日取出水洗掛風中四十九日劈開取藥研為細末每服半錢新汲水下一百四十七鼠黏子湯治瘡疹出太盛解毒門內消毒散加防風治療與方同一百四十八斑瘡入眼目方牛蒡子人參各二兩上同研為細末每服二錢糯米薄粥調下神效不可具述治瘡疹出不快既出不正色先用粉乾葛一味為細末每服三錢用雄雞頭一個搗眼入乾葛末在內每用水二盅煎至一盅去滓服其驗如神
