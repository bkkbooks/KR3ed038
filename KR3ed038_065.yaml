  - {type: 'tls:div-end', offset: 29364, content: '', id: KR3ed038_jc_065-d67.d2.d5d27}
  - {type: 'tls:div-start', offset: 29364, content: '', id: KR3ed038_jc_065-d67.d2.d5d28, level: 4, head_text: 瘡疹便膿血}
  - {type: 'tls:head', offset: 29364, content: '', id: KR3ed038_jc_065-d67.d2.d5.d28.h1s1}
  - {type: 'tls:div-end', offset: 29439, content: '', id: KR3ed038_jc_065-d67.d2.d5d28}
  - {type: 'tls:div-start', offset: 29439, content: '', id: KR3ed038_jc_065-d67.d2.d5d29, level: 4, head_text: 瘡疹膿汁不幹}
