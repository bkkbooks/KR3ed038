  - {type: 'tls:div-end', offset: 27951, content: '', id: KR3ed038_jc_065-d67.d2.d5d20}
  - {type: 'tls:div-start', offset: 27951, content: '', id: KR3ed038_jc_065-d67.d2.d5d21, level: 4, head_text: 瘡疹後患目翳忌點藥}
