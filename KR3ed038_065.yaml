  - {type: 'tls:div-start', offset: 27235, content: '', id: KR3ed038_jc_065-d67.d2.d5d18, level: 4, head_text: 結核腫毒}
  - {type: 'tls:head', offset: 27235, content: '', id: KR3ed038_jc_065-d67.d2.d5.d18.h1s1}
