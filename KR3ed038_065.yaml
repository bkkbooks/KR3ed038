  - {type: 'tls:div-end', offset: 25754, content: '', id: KR3ed038_jc_065-d67.d2.d5d8}
  - {type: 'tls:div-start', offset: 25754, content: '', id: KR3ed038_jc_065-d67.d2.d5d9, level: 4, head_text: 斑疹熱則出愈難大便不通小便如血或為癰身體破裂}
