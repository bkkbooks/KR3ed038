  - {type: 'tls:div-end', offset: 26816, content: '', id: KR3ed038_jc_065-d67.d2.d5d15}
  - {type: 'tls:div-start', offset: 26816, content: '', id: KR3ed038_jc_065-d67.d2.d5d16, level: 4, head_text: 瘡疹不結痂疕}
  - {type: 'tls:head', offset: 26816, content: '', id: KR3ed038_jc_065-d67.d2.d5.d16.h1s1}
  - {type: 'tls:div-end', offset: 26979, content: '', id: KR3ed038_jc_065-d67.d2.d5d16}
  - {type: 'tls:div-start', offset: 26979, content: '', id: KR3ed038_jc_065-d67.d2.d5d17, level: 4, head_text: 辨瘡疹並水瘡子入大腸}
