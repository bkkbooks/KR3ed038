  - {type: 'tls:div-end', offset: 26073, content: '', id: KR3ed038_jc_065-d67.d2.d5d10}
  - {type: 'tls:div-start', offset: 26073, content: '', id: KR3ed038_jc_065-d67.d2.d5d11, level: 4, head_text: 瘡疹不可用巴豆水銀輕粉}
