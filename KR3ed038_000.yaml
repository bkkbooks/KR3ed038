body:
  text: 奇效良方瘡疹論序醫之為難古今通患且大人之有疾能言致疾之因與具即所苦醫者因參脈證隨虛實冷熱療之亦易為愈若夫小兒不能言得疾之由及目即所苦醫之診治倍見其難兼小兒瘡疹欲出未見之間或發壯熱或發驚悸不止一端疑似難明非深於醫者不能辨也新學小生諳歷未久多執偏見率以小兒為純陽胃熱則發斑每投涼劑夫以疹疹為熱固是一説然盡以為熱則又不可世徒知用熱藥太過往往損目曾不知服冷藥太過比比傷生利害皆自不細況嬰孩腸胃嬌脆胎氣稟受虛實不同運氣時令寒暑燥濕不齊隨證施藥以收十全之功則善矣詎可執一偏之見乎比年書肆刊行方書充棟汗牛瘡疹一證散漫難考檢閲彌艱或收方之家不能全備設遇此疾憂惶窘迫不過付庸醫之手以僥幸萬一籲可勝惜哉今痘疹方論豫家藏是編久矣有論有方有證有治門類綱目靡不畢備明效大驗彰灼弗誣不敢私祕紹定庚寅春謹鋟梓以廣其傳庶好事者便於觀覽云
