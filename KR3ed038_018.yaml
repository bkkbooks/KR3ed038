body:
  text: 卷之十八翻胃門附論金匱要略曰發汗令陽微膈氣虛脈乃數數為客熱不能消為胃中虛冷故也胃氣無餘則朝食暮吐為反胃又云夫陽脈浮而澀浮則為虛澀則傷脾脾傷則不磨谷而朝食而暮吐也暮食而朝吐者宿食不化名曰反胃王冰注云以晨食入胃胃虛不能克化至暮胃氣行里與邪相搏則食反出也巢氏曰營衛俱虛血氣不足停水積飲而在胃脘即臟冷臟冷則脾不磨而宿食不化其氣逆而成反胃也則朝食暮吐暮食朝吐甚則食已即吐其脈緊而弦緊為寒弦為虛虛寒相搏故食已即吐曰反胃經曰食不得入是有火也食入反出是無火也諸書論之詳矣夫反胃者本乎胃食物所傷嘔吐言胃口翻也多因胃氣先逆飲酒過傷或積風寒或因憂思悒怏或因蓄怒抑鬱宿滯痼癖積聚冷痰動擾脾虛胃弱不能消磨穀食遂成此證原其所自女人得之由血氣虛損男子得之多因下元冷憊又因喜怒不常驚恐無時氣與痰搏升而不降留於咽嗌則成膈噎結於痰者咯之不出咽之不下有大便祕少如羊屎者名結腸反胃大抵翻胃未嘗不由膈噎而起內經謂陽結謂之膈蓋氣之與神併為陽也逸則氣神安勞則氣神耗氣神俱擾使陽氣先結陰氣後亂陰陽不和臟腑生病結於胸膈則成膈氣留於咽嗌則成五噎五膈治之不當歲月因循久則反胃治法氣虛者補其氣血虛者養其血調順陰陽化痰下氣陰陽平勻氣順痰下其證自平王冰又云食痹者食已心下痛陰陰然不可忍也吐出痛止此胃氣逆而不下行也若脈軟散當病食痹又肺病傳肝曰肝痹膈痛出食者是也金匱要略又有肝中寒心中風厥陰之為病三者皆以食入即吐學者全在切脈用藥醫者人之司命可不謹乎且如十膈氣散治冷膈風膈氣膈痰膈熱膈憂膈悲膈喜膈水膈食膈對其脈證用之取效用之不當取禍非輕且翻胃不可峻用香燥之劑治之不循次序如抱薪救火其脈浮緩者生沉澀者逆在乎審察慎之可也翻胃通治方安脾散治胃氣先逆飲食過傷憂思蓄怒宿食痼癖積聚冷痰動擾脾胃不能消磨穀食致成斯疾女人得之皆由血氣虛損男子得之多因下元虛憊有食罷即吐有朝食暮吐暮食朝吐所吐酸臭可畏或吐黃水凡有斯疾乃是脾敗惟當速療遲則發煩渴大便祕水飲不得入口而不旋踵斃矣高良薑一兩以百年壁上土三合敲碎用水二碗煮乾薄切成片南木香草果麵裹煨去殼陳橘皮湯泡去白人參去蘆白茯苓白朮胡椒丁香各半兩甘草炙各一兩半上為細末每服二錢食前米飲入鹽調服鹽酒亦可附子黃耆草果飲治翻胃不進飲食附子炮黃耆去蘆炙草果炮厚朴去皮薑製炒白朮官桂白芍藥良薑白茯苓各一錢白豆蔻檀香甘草炙各五分半夏湯泡七次八分上作一服水二鍾生薑五片紅棗一枚煎一盅不拘時服丁香煮散治翻胃嘔吐丁香石蓮肉各十四枚生薑七片北棗七枚切碎黃黍米半合淘淨上四味用水碗半煎去滓入黃黍米煮稀粥食之薤白粥治翻胃無問久新冷熱皆治薤白二莖雞子三個去黃人參一兩細切以水一大升煎取三合白粟米三合上以薤白雞子白白粟米三味同煮熟攪勻然後溫熱人參湯相和調頓服不拘早晚如思食即與粟米粥飲漸漸加粳米和之桂苓散治翻胃發渴桂心甘草各一錢半赤茯苓半夏澤瀉各二錢上作一服水二盅生薑五片煎至一盅不拘時服姜合丸治中脘停痰胸膈痞結欲成翻胃硇砂紙上飛過肉桂去粗皮附子炮去皮臍木香各一兩茴香炒一錢半青皮去白陳皮去白蓽澄茄丁香沉香各半兩上為細末次入硇砂研勻酒煮糊為丸每兩作二十丸每服一丸以生薑一塊剜如盒子安藥在內濕紙裹煨令香去紙待溫細嚼以鹽湯送下不拘時服養胃湯治脾胃虛冷不思飲食翻胃嘔吐人參丁香縮砂白豆蔻仁附子炮沉香橘皮肉豆蔻麥蘖麥曲粉草炙各二錢半上為細末每服二錢姜鹽湯調下不拘時服大倉丸治脾胃虛弱不思飲食翻胃不食亦宜服之白豆蔻仁縮砂仁各二兩陳倉米一升用黃土炒熟去土不用上為細末用生薑自然汁和丸如梧桐子大每服一百丸食後用淡生薑湯送下小半夏丸治翻胃半夏湯泡七次胡椒各等分上為細末生薑汁和丸如梧桐子大每服三五十丸食遠用生薑湯送下十膈氣散專治十般膈氣漸成翻胃人參去蘆白茯苓去皮官桂去粗皮枳殼去穰麩炒神麯炒黃色麥蘖炒黃色乾生薑炮訶黎勒煨去核荊三稜煨莪朮煨陳皮去白甘草炙白朮各一兩厚朴去皮薑製檳榔煨木香各半兩上為細末每服二錢入鹽少許白湯調服如脾胃不和腹脅脹滿用水一盞生薑七片棗一枚鹽少許煎服膈氣散治五種膈氣三焦痞塞嘔吐痰逆飲食不下方見膈噎門五噎散治五噎食不下嘔啘痰多咽喉塞噎方見膈噎門五膈散治五種膈氣胸膈痞悶痰逆噁心不進飲食方見膈噎門五膈寬中散治七情之氣傷於脾胃以致陰陽不和胸膈痞滿停痰氣逆遂成五膈之病一切冷氣並皆治之青皮去白陳皮去白丁香各四兩厚朴去皮薑製一斤白豆蔻去皮二兩縮砂仁木香香附子炒去毛各三兩甘草炙五兩上為細末每服二錢不拘時用姜鹽湯調服玉浮丸治男子婦人脾胃虛弱一切嘔吐久新翻胃皆可服之真良方也人參白殭蠶炒去絲白朮乾薑炮丁香肉豆蔻麵裹煨橘紅麥蘖炒檳榔白豆蔻南星炮木香不見火附子炮去皮臍半夏湯泡七次甘草炙各等分上為細末用白麵一分與生薑自然汁搜和作棋子大餅入百沸湯煮令浮極漉出搗爛和前藥末為丸如梧桐子大每服五十丸用淡生薑湯送下不拘時服病甚者不過三服如惡熱藥內去附子大便祕者除肉豆蔻丁香餅子治脾胃虛寒痰逆嘔吐飲食減少五膈五噎翻胃噁心並皆治之丁香木香各一兩白豆蔻半夏曲神麯各半兩白朮白姜陳皮各一兩半人參蓽澄茄各三錢肉豆蔻半兩甘草二錢上為細末用生薑汁煮糊和作餅子如棋子大每服一餅空心嚼細生薑湯送下化鐵丸治結腸翻胃兼治蠱脹緊急如鼓妨悶氣促不能坐臥飲食頓減手足乾瘦纍治不效者服之立瘥五靈脂去沙石青皮不去白陳皮不去白各一兩陳秫米一合揀淨一作糯米巴豆三十五粒去殼膜上各銼先炒五靈脂香透次下青皮炒候色變又下陳皮亦炒變色卻下秫米巴豆炒黃色取出以紙攤在地上出火毒揀去巴豆不用留三五粒亦可碾為細末用好米醋浸化蒸餅和丸如緑豆大每服十五丸加至二十九丸用蔥湯或茶湯送下婦人醋湯或艾湯送下千轉丹治翻胃吐食等病牛涎半斤好蜜半斤木鱉子三十個去皮油研上共一處入銀器內用慢火熬以槐條七根攪煨乾為度每和白粥兩匙日進三服罌粟粥法治翻胃不下食白罌粟米二合人參為末二錢生山芋五寸長細切上共用水一升二合煮取六合入生薑自然汁及鹽花少許攪勻分二服不拘時食之亦不妨別物湯丸甘露湯治翻胃嘔吐不止飲食減少常服快利胸膈調養脾胃欣進飲食常州一富人病翻胃往京口甘露寺設水陸泊舟岸下夢一僧持湯一碗與之飲罷猶記其香味便覺胸膈少快早入寺知客供湯乃是夢中所飲者胸膈尤快遂求其方合數十服後疾遂瘥名曰觀音應夢散豫得之常以待賓易名曰甘露湯在臨汀療一人旋愈切勿忽之干餳糟頭榨者用六分生薑連皮用四分上拌勻搗爛作餅子或焙或曬乾每十兩人炙甘草二兩同研為末每服二錢用沸湯入鹽少許調不拘時服大效散治翻胃田螺殼黃蜆殼二件不以多少在土中多年陳者尤佳各另燒成白灰研細上每料用田螺殼灰二兩黃蜆殼灰一兩用白梅肉四兩同搜和作團以砂盒子盛蓋了鹽泥固濟封頂火煅令焦黑存性取出研細每服二錢人參縮砂煎湯調下陳米飲亦得如無盒子只以建盞兩隻相合依上法燒食前服凡覺心腹疼痛即是翻胃以此藥治之加味青金丹治清濁不分中焦氣痞若心下牢大如杯或寒或熱朝食暮吐暮食朝吐其關脈弦而緊弦則為虛緊則為寒虛寒相搏此名為格與關格同也是謂之反胃硫黃水銀木香別研丁香別研各等分上先將硫黃水銀同研至無星次下木香末丁香末研勻用生薑自然汁煮糊和丸如梧桐子大每服十五丸食前用米飲送下健脾丁香散治翻胃嘔逆氣噎關格不通淨全丁香廣木香各一兩上㕮咀每服四錢水一盞半煎一盞時先用好黃土和泥做成碗一個卻以藥濾在土碗內食前服滓依時再煎服此方因臺櫞吳安之得傳於內臺蓋耘夫都事自得之效本堂試果驗蓋用土碗盛藥取其有脾土生助之功鯽魚散治翻胃上用大鯽魚一個去腸留膽納緑礬末填滿縫口以炭火炙令黃干為細末每服一錢陳米飲調下日三服螺泥丸治翻胃嘔噎上用大田螺不拘多少洗淨磁盆內養令吐出泥用米篩張灰於地上卻將沙皮紙鋪於灰上去已養田螺令泥水澄清旋去上面清水卻將泥傾於紙上候泥干稠丸如梧桐子大每服三十丸藿香湯下立愈仍將田螺放江中如殺食之其病則不愈一方用爛殼燒灰服之治翻胃朝食暮吐暮食朝吐旋即吐者上用甘蔗汁七升生薑汁一升相和打如粉分作三服又方治翻胃上用騾小便昔有患此疾每遇食餅或羹粥等須臾吐出貞觀中許奉御弟兄及柴蔣等家時稱名醫奉敕令治罄竭其術所患竟不能療漸至羸憊死在朝夕忽有一衛士云服騾小便極驗日服二合後食微吐一半晡時又食二合人定時食粥吐即便定迄至今日午時奏知之大內中五六人患翻胃同服一時俱瘥此物有毒服之不可過多盛取尿及熱服二合病深七日以來服之良後療人並瘥治翻胃始因膈噎所成有痰母蟲瘕此病非好手不能治附子片一兩南星片一兩巴豆十一粒去皮上用糯米一兩同炒色變去巴豆入乾薑丁香末各半兩同前作末五更早掌中舌蘸干吃半錢津化橘皮湯一呷下又方治翻胃噎塞煩悶諸藥不效者上以蘇合香丸與青州白丸子相和勻用生薑汁丸用蘆根煎湯下或枳殼湯下又方治翻胃吐黑汁上用澄茄為末米糊丸薑湯下仍令服平胃散三十帖又方治翻胃用真阿魏末外加野人拋下干糞多作末五更初以薑片蘸食能起死回生治翻胃吐食除心胸痰水上以年深蜆爛殼燒為白灰米飲調下一錢蚌殼亦得治翻胃上用附子一枚極大者坐於磚上四面以炭火逼熱淬生薑自然汁內依前再逼再淬直待生薑汁約至半碗許卻搗為細末每服一錢用米飲調下不過三服瘥
