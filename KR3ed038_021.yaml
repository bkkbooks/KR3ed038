雀肉豬肉蕪荑等垂命茯苓丸療男子五勞七傷兩目𥇀𥇀迎風淚出頭項急僵不能回顧心腹滿脹上干胸脅下引膀胱表裡疼痛不得平康飲食漸減面目萎黃小便淋瀝陰痿不強五心煩熱盜汗如漿四肢拘急夢寐驚惶狀如消渴忽忽喜忘悲憂不樂此藥最良令人肥壯氣力倍常飲食加進百病潛藏冬三月宜服之茯苓三兩白朮澤瀉牡荊子牡蒙桂心牡蠣煅石長生薯蕷杜仲天雄炮菟絲子附子炮人參甘草炙山茱萸乾薑巴戟天門冬去心肉蓯蓉以上各二兩上為細末煉蜜和丸如梧桐子大先食服五丸溫酒送下忌海藻菘菜鯉魚生蔥豬肉雞魚等補真丹接真養氣健脾益胃升降陰陽調順三焦常服快利胸膈消導飲食此藥性平不燥沉香丁香白豆蔻檀香薑黃沒藥另研肉豆蔻補骨脂炒縮砂以上各一兩茴香微炒穿山甲炙牛膝酒浸焙肉蓯蓉酒浸焙乳香另研白朮以上各半兩青皮去白香附子木香甘草炙以上各二兩附子炮裂去皮臍巴戟去心山藥以上各七錢蒼朮三兩酒浸焙乾用青鹽一兩同炒黃去鹽不用桂心一分上為末酒浸蒸餅糊和丸如梧桐子大每服八十丸至百丸空心用溫酒或鹽湯送下補真丸大抵不進飲食以脾胃之藥治之多不效者亦有謂焉人之有生不善攝養房勞過度元陽衰虛真火不溫不能上蒸脾土沖和失布中州不運是致飲食不進胸膈痞塞或不食而脹滿或已食而不消大腑溏泄此皆真火衰虛不能蒸蘊脾土而然古人云補胃不如補脾補脾不如補腎腎氣若壯丹田之火上蒸脾土脾土溫和中焦自治膈開能食矣葫蘆巴炒附子炮去皮臍肉豆蔻麵裹煨菟絲子淘淨酒蒸陽起石煅川烏炮去皮臍肉蓯蓉酒浸焙沉香不見火另研五味子各半兩鹿茸去毛酒浸焙川巴蟲去心鍾乳粉各一兩上為細末用羊腰子二對細切制如食法入蔥椒酒煮爛搗如泥入少酒糊同和藥末再搗三五百杵丸如梧桐子大每服七十丸空心用米飲或鹽湯任下神助丹一名二虎丹補益元臟強壯筋骨進美飲食附子二兩重五錢以上者皆可川烏四兩用端正者上二味同於瓷器內用好醋五升浸或三五日或半月每日一攪浸至通心軟透為度取出切作片子將浸藥醋傾於無蟲處恐傷生其瓷器亦勿別用止可再浸藥別用好醋五升浸藥卻掘一土坑深闊約七八寸以木炭火燒令通赤傾藥片並醋在內以新瓦盆蓋合四圍用黃土封固勿令透氣待一晝夜取出藥片曬乾去泥土以青鹽四兩先搗為粗末同藥片炒令杏黃色同碾為細末用醋煮麵糊和丸如梧桐子大每服十五丸至三五十丸如氣虛弱或冷物所傷可倍丸數空心用溫酒送下或鹽湯亦可婦人淡醋湯下百無所忌如久服真氣壯實尤宜節慎神仙巨勝子丸安魂定魄改易容顏通神仙延壽命添髓生精補虛益氣壯筋骨潤肌膚發白再黑齒落更生目視有光心力無倦行步如飛寒暑不侵能除百病巨勝子焙一兩生地黃熟地黃何首烏各四兩枸杞子菟絲子五味子酸棗仁破故紙炒柏子仁覆盆子雞頭實廣木香蓮花蕊巴戟天去心肉蓯蓉酒浸三日牛膝酒浸天門冬酒浸官桂人參茯苓去皮楮實子韭子天雄炮去皮臍蓮肉川續斷山藥以上各一兩上為細末春夏蜜為丸秋冬蒸棗肉入胡桃肉一十個搗如泥同藥末和更搗千餘杵丸如梧桐子大每服三十丸空心用溫酒送下鹽湯亦可日二如久服去天雄用鹿茸亦得此藥耳聾復聰眼昏再明服一月元臟強勝六十日發白變黑一百日容顏改變目明可黑處穿針冬月單衣不寒若將白雞用藥拌飯喂六十日則變為黑雞矣金鎖丸補虛損壯元氣益精髓龍骨一兩茅香湯浴三次研如粉官桂去粗皮山茱萸酒浸取肉焙附子炮去皮臍肉蓯蓉湯浸焙蓮花蕊曬乾沉香以上各二兩雞頭實三兩上為細末以金櫻煎膏和丸如無即以煉蜜和丸如梧桐子大每服二十丸至三十丸空心用溫酒送下延壽丹治腎經不足添精補髓益氣壯陽久服輕身耐老柏子仁甘菊花茯苓以上各十兩松脂三十兩法酒煮白上為細末煉蜜和丸如梧桐子大每服二十丸空心用溫酒或鹽湯送下日三服能愈諸疾靈芝丸治脾腎氣虛添補骨髓通利耳目蒼朮一斤用米泔水浸春夏五日秋冬七日逐日換水候日足用竹刀刮去黑皮曬乾上於木臼內搗為細末棗肉和丸如梧桐子大每服三十丸加至五十丸食前用棗湯送下秋石方世之煉秋石者但得火煉一法而已此藥須兼用陰陽二石方為至藥凡火煉者陽中之陰故得火而凝入水則釋然消散歸於無體蓋質去但有味在此離中之虛火水煉者陰中之陽故得水而凝遇曝潤千歲不變味去而質留此坎中之實也二物皆出於心腎二臟而流於小腸水火勝蛇玄武正氣外假天地之水火凝而為體服之還補太陽相火二臟上為養命之本今具二法於後陽煉法上用小便不拘多少約兩桶一擔先以清水挼好皂角濃汁以粗布濾去滓每小便一擔入皂角汁一盞用竹篦志攪令轉百千匝乃止直候小便澄清白濁者皆定底腳徐徐闢去清水不用只取濁腳並作一滿桶又用竹篦急攪百餘匝更候澄清又闢去清者不用十數擔不過取濃腳一二斗其小便須先布濾過勿令有滓取得濃汁入淨鍋中熬刮下搗碎再入鍋內以清湯煮令化乃於筲箕內布筋紙兩重傾藥入紙筲箕內淋過取淋下清汁再入鍋熬干又用湯煮化再依前法淋直候色如霜雪即止乃固濟砂盒內歇口火煅成汁傾出如藥未成更煅一兩遍候瑩白玉色即止細研入砂盒內固濟頂火四兩養七晝夜久養火尤善再研每服二錢空心溫酒下或用棗肉為丸如梧桐子大每服三十丸亦得空心服陽煉日午服陰煉各一服一名還元丹昔有人得瘦疾且嗽萬方不效服此暫愈又有病顛眩腹鼓日久漸加喘滿垂困者亦服此即痊此法極省力只一小鍋便可煉體如金石永不曝潤與常法功力不侔久疾只數服便效陰煉法上用小便三五石夏月雖腐敗亦堪用分置大盆中以新水一半以上相和旋轉攪數百匝候澄清闢去清者留濁腳又入新水同攪水多為妙又澄去清者直候無臭氣澄下秋石如粉即止曝乾刮下如膩粉光白粲然可愛再研以乳男兒乳和如膏烈日中曝乾如此九度須揀好日色乃和蓋假太陽真氣也第九度即以棗肉和丸如梧桐子大曝乾每服三十丸空心用溫酒送下保命延齡丸安神養氣補填骨髓起弱扶衰潤澤肌膚聰明耳目久服烏髭發固牙齒能夜讀細字心力不倦巨勝子補骨脂酒浸焙柏子仁去殼另研甘菊花肉蓯蓉酒浸焙楮實子天雄炮去皮尖枸杞子天門冬去心五味子牛膝酒浸焙覆盆子白茯苓去皮巴戟去心人參去蘆菟絲子酒浸一宿杵作餅焙乾入藥同研山藥以上各一兩肉桂去粗皮四兩生乾地黃半斤細切新瓦上焙乾上為細末春夏白沙蜜秋冬蒸棗肉入胡桃肉十枚去皮同藥末於臼內搗千餘杵丸如梧桐子大每服三十丸加至五十丸空心用溫酒送下陳體常先生傳菟絲子丸菟絲子酒浸一宿搗作餅焙乾稱二兩遠志去心焙稱一兩乾山藥白茯苓肉蓯蓉龍骨煅牛膝去苗韭子以上各半兩上為細末煉蜜和丸如梧桐子大每服二十丸空心用鹽酒或鹽湯送下日進三服枸杞子丸一名延年丸育神養氣強力益志及治風勞氣冷美顏色烏髭發枸杞子焙覆盆子車前子甘菊花去梗生地黃焙地骨皮何首烏巴戟天去心續斷白朮細辛去苗遠志去心石菖蒲米泔洗曝牛膝酒浸焙菟絲子酒浸一宿搗作餅曬乾入藥以上各一兩上為細末煉蜜和丸如梧桐子大每服十丸加至三十丸空心用溫酒送下治五臟虛損羸瘦益氣力堅筋骨上以巨勝子蒸九次曝九次每取二合用湯浸布裹挼去皮再研水濾取汁煎飲和粳米煮粥食之薯蕷丸治風虛益顏色令人體健氣力強壯薯蕷熟地黃肉蓯蓉酒浸一宿刮去皺皮炙乾附子炮裂去皮臍菟絲子酒浸三日搗赤石脂以上各一兩牛膝去苗山茱萸去核白茯苓去皮五味子柏子仁巴戟去心人參去蘆乾薑炮澤瀉白朮桂心以上各一兩為細末煉蜜和搗三五百杵丸如梧桐子大每服十丸加至四十丸空心用溫酒送下骨補丸治下元傷憊駐顏悅色黃狗脊骨一條兩頭去兩節截為五段用硇砂一兩細研以漿水一升調浸取令消化作水下脊骨在汁中浸三宿後用炭火炙乾再以汁刷之汁盡為度研為細末鹿茸一隻去毛酥炙肉蓯蓉酒浸切焙官桂去粗皮附子炮裂去皮臍牛膝酒浸焙乾蛇床子炒乾薑炮五味子陽起石火煅研為粉胡椒以上各一兩上為細末和前狗脊骨末用棗肉五兩酥一兩相和搜搗一月其精溫暖兩月精結實三月精祕不泄益顏色壯筋骨百病不生容顏不老方一斤生薑半斤棗二兩白鹽三兩草丁香沉香各半兩四兩茴香一處搗煎也好點也好修合此藥勝如寶每日清晨飲一杯一世容顏長不老枸杞煎去萬病通神明安五臟延年駐顏枸杞子取汁三升生地黃取汁三升麥門冬取汁三升杏仁去皮尖研如膏一升人參搗為末三兩白茯苓去黑皮研為末三兩上為銀鍋內慢火先熬前四味如稀餳後入人參茯苓末待煎候如膏以瓷器盛之每服半匙空心溫酒化服日二駐春丹縮小便美顏色白茯苓去黑皮四兩細碾為末白麵一斤另頓青鹽一匙人參不犯銅鐵器捶碎一兩川椒一合去目於木臼內杵碎上為粗末用水二大碗煎至一碗與茯苓白麵和勻如臂大文武火燒熟三日服一料半年之後當減三料每月止服七料又半年再減三料每月止服四料若兩日一次見小便是效也如此不必常服蒼朮丸烏髭發駐顏色壯筋骨聰耳目除風濕潤肌膚久服令人身輕體健百病不侵蒼朮用米泔水浸逐日換水浸三日取出刮去黑皮切作片子曝乾用慢火炒令黃色研為細末一斤茯苓蒸過去黑皮研為末半斤上和勻煉蜜為丸如梧桐子大每服十五丸空心或臨臥白湯送下別用白朮末六兩甘草末一兩和勻作湯點之令人好顏色上以百花上露飲之令人肥白美顏色上以麋鹿骨煮汁釀酒飲之悅顏色令人肥澤上以桃蠹食之益顏色上以小麥苗作虀汁吃令人好顏色上以花水研硃砂末服之應驗打老丹強壯筋骨滋補丹田安定魂魄溫暖下元添精補髓悅色駐顏祛除百病身輕體健長生不老益壽延年不問男子歸人並宜服之白茯苓去皮柏子仁另研乾山藥密蒙花甘菊花去梗雲母石火煅覆盆子五味子山茱萸去核鍾乳粉另研蛇床子生地黃蔓荊子去萼赤石脂另研金鈴子熟地黃天門冬去心麥門冬去心枸杞子白芍藥川芎續斷去蘆石斛去根菟絲子酒浸一宿桂心玄參去蘆藁本去苗肉蓯蓉酒浸一宿蓽茇紫菀去蘆遠志去心牡丹皮沙參丹參去蘆鹿茸去毛酥炙茴香黃耆去蘆巴戟去心附子炮去皮臍澤瀉人參去蘆乾薑炮天雄炮如無附子代白朮獨活去蘆牡蠣煨烏藥苦參杜仲鹽炒甘草以上各等分上為細末煉蜜和搗千餘杵丸如梧桐子大每服三十丸不拘時溫酒送下日進三服至六十日見效按方云薛侍郎便經泥川見一女子將一老人捶之因詰其故女子曰乃妾之子也薛問汝年幾何答曰妾年六十七歲昔隨伯父隱於華山一日歸見妾夫婦年老無子手足不遂令服此藥至一百日身體輕健氣力加倍手足頓愈變為童顏一年乃有此子薛曰願聞此方女子遂以此授之既濟丹升降水火育神益血久服延年令人不老嫩鹿茸二兩酥炙附子二兩炮去皮臍柏子仁別研茯神去木牛膝酒浸一宿枸杞子酒浸一宿肉蓯蓉酒浸一宿當歸去蘆酒浸一宿酸棗仁微炒別研熟地黃酒浸焙沉香別研山藥炒遠志用甘草同煮去心不用甘草以上各一兩半上為細末蒸棗肉和丸如梧桐子大每服五六十丸空心用溫酒或鹽湯送下麋角丸聰耳目補心神安臟腑填骨髓理腰腳能久立發白更黑耄者還少諸麋角丸方凡有一百一十方此特出衆方之外容成子煎服而羽化麋角取當年新角連腦頂者為上看角根著痕處亦堪用退角根下平者不堪夫造此藥取角五具或四具三具二具一具為一劑先尖一大寸即各長七八寸取勢截斷量把鎊得即於長流水中以竹器盛懸浸十宿如無長流水處即於淨盆中滿著水浸每夜易換即將出削去皺皮以利鎊鎊取白處至心即止以清粟米泔浸兩宿初經一宿即干握去舊水置新絹上曝乾淨擇去惡物粗骨皮及鎊不勻者即以無灰美酒於大磁器中浸經兩宿其酒及器物隨藥多少其藥及酒俱入淨釜中初用武火煮一食久後即又著火微煎如蟹目沸以柳木篦長四尺闊三指徐徐攪不得住手困則易人時時更添美酒以成煎為度煎時皆須平旦下手不得經兩宿仍看屑如稀膠即以牛乳五升酥一片以次漸下後項藥仍以麋角一條炙令黃為末與諸藥同制之檳榔通草秦艽肉蓯蓉人參菟絲子酒浸兩宿別搗待乾甘草以上各一兩上搗為末如不要補即不須此藥共煎又可一食時候藥似稀稠粥即止火少時歇熱氣即投諸藥末相和攪令相得仍待少時漸稠黏堪作丸即以新器盛貯以衆手一時丸就如梧桐子大若不能衆手丸就旋暖漸丸亦得如黏手著少酥塗手其服餌之法空腹以酒下之初服三十丸日加一丸加至五十丸為度日二服初服一百日內忌房室服經一月腹內諸疾自相驅逐有微利勿怪漸後多泄氣能食患氣者加枳實青木香准前各一大兩若先曾服丹石芍藥即以三黃丸食上壓令宣泄如飲酒食麵口乾鼻中氣粗眼澀即以蜜漿飲之即止如不止加三黃丸使微利如此一度發動以後方始調暢服至二百日面皺自展光澤一年齒落更生強記身輕若風日行數百里二年常令人肥飽少食七十以上服之卻成後生三年腸作筋髓預見未明四年常飽不食自見仙人三十以下服之不輟顏一定而不變修合時須在淨室中勿令陰人雞犬孝子等見婦人服之尤佳昔道士戴寧古於城市中遇一醉人召飲遺一詩曰尾閭不禁滄海竭九轉靈丹徒用說惟有班龍頂上珠能補玉堂關下血約九月於峨眉山相見寧古如期而往果然於太虛岩下見之授以修養之術曰子血氣動蕩虛且竭矣宜先服麋角丸使血氣有補筋骨壯盛乃可用此術寧古始悟斑龍之句服之逾年體輕色潤壽至一百七十歲故留此方以諭後人金髓煎上用枸杞子不拘多少逐日旋採擇紅熟去嫩華子揀令潔淨便以無灰酒於淨甕內浸至兩月為度用蠟紙封固緊密勿令透氣候日數漉出於新竹器內盛貯旋於砂盆內研令爛細以細布濾去滓不用即同前漬藥酒與藥汁攪勻量銀鍋內多少升斗作番次慢火熬成膏切須不住手用物攪恐黏底不勻候稀稠得所傾出用淨瓷器貯之勿令泄氣每日早晨用溫酒半盞化開二大匙服夜臥再服至百歲身輕氣壯積年不廢可以羽化三仙丸一名長壽丸詩曰一烏二術三茴香久服令人壽命長順氣搜風輕腰膝駐顏悅色鬢難蒼空心溫酒鹽湯下誰知世上有仙方川烏一兩去皮銼如骰子大用鹽半兩同炒黃去鹽茴香三兩炒香蒼朮二兩用米泔水浸一宿用竹刀刮去黑皮切片用蔥白一握同炒黃去蔥上為細末酒煮麵糊和丸如梧桐子大每服五十丸空心鹽湯送下日進二服忌豬羊血昔有人年八十髭發皆黑云自三十以後日進此藥一服自不變白何仙姑慶世丹如有人抱一切危疾及癱瘓痛楚久在枕床旦暮齊心服之靈神必護一名四神丹能還精安魂魄順五臟和六腑添智慧烏髭發去八邪一名還精丹能補五臟不足四肢少力口乾氣虛神亂骨節疼痛毛髮焦枯一名護命丹此藥稟天地之氣感得洞府仙岩間有醉翁降臨居處立便去邪一名延齡丹如有惡疾居體不安行步艱辛飲食少進或寐不安或痛連筋骨或十生九死服之是疾皆除駐悅顏色滋潤肌膚聰明耳目四肢強健延年益智功效不可具述枸杞子仙經云此藥是星之精益血海足筋骨補氣安神甘菊花仙經云是木之精服以聰明耳目去頭濕手軟利九竅通三焦去萼用遠志消胃腸痞悶去驚悸潤肌膚壯筋骨須用硬物捶破取去心車前子仙經云是鎮星之精益胃安慮根注頓去夜驚惡想生地黃用乾者去蘆仙經云是太陰之精開心神去邪養脾胃五千營衛神巴戟仙經云是黃龍之精去心疾補血海輕身延年覆盆子仙經云是神門之精開暢輕身安五臟三萬六千神白朮仙經云是太陰之精祛濕痹止吐逆消食化痰滋養營衛肉蓯蓉用有肉者其藥一百年一生入小腸補下元酒浸七日石菖蒲細小九節者能升智慧清神明暖下元補虛利小便地骨皮菟絲子酒浸七晝夜曬乾炒令黃色為度牛膝治濕腳氣腰膝疼痛去蘆頭酒浸七日細辛療百病順氣益血炮去苗用續斷治五勞七傷何首烏性溫無毒上各用本土所生者逐件擇洗各等分搗為細末煉蜜和丸如梧桐子大每服三十丸空心用溫酒送下服一月百病不生服一年至二年返老還童顏貌若蓮花是病皆除元是神仙之術摩腰膏補下元虛敗白濁若摩一丸腰下如火二丸血脈舒暢三丸顏色悅澤十丸骨健身輕氣全精足骨髓堅定母丁香木香硃砂藿香附子乾薑沉香桂心生硫黃枯礬雄黃杏仁別研吳茱萸陳皮以上各二錢輕粉別研麝香別研各一分上為細末入杏仁輕粉麝香同研勻煉蜜和丸如雞頭大每用老薑一塊切碎煎滾汁傾在盞內將一丸浸汁中良久化研如膏令人手蘸藥於腰上摩之至藥汁盡為度逡巡腰上熱如火但是諸虛之證並皆治之坎離丸治心脾腎三經不足蒼朮八兩銼如豆大米泔浸二日或焙或曬乾分作四處一分用烏頭一兩去皮臍切作片川楝子淨肉一兩同蒼朮一處炒黑黃為度一分用川椒去目一兩陳皮一兩破故紙一兩酒浸一宿炒令乾次下蒼朮川椒等一處炒黃一分用茴香一兩青鹽一兩半食鹽半兩先下蒼朮炒黃次下茴香等一處炒黃色一分用醇酒和醋各一兩煮蒼朮令透取出焙乾再煮二次麥門冬去心焙天門冬去心焙各三錢遠志去心焙茯神去皮木各三分沉香一兩鹿茸去毛酥炙巴戟去心酒浸焙葫蘆巴酒浸炒當歸酒浸焙人參去蘆枸杞子陳皮去白川芎以上各半兩上為細末用神麯末二兩好酒煮糊為丸如梧桐子大每服五七十丸空心服如補心棗湯下補腎溫酒鹽湯送下神仙不老丸養營衛潤三焦滑肌膚去邪氣惡蟲等疾還奇方云豫劫也勤瘁衰不待年方三十而白髮生三十五而白鬚生自是時時薾去四十九則不勝芟矣乃聽其自然未幾遭喪天之慘繼罹哭子之憂心志凋耗其白者益多余者益黃久之忽遇金華山張先生謂豫曰子今半百容貌衰甚可不為門戶計進補治氣血以強色身之藥乎慨然傳一方云初得之異人豫拜而受之遂合服逾百日覺前時之白者黃者皆返黑矣見者以為異豫遂名之曰神仙不老丸以其藥品概括為歌曰不老神方功效殊駐顏全不費工夫人參牛膝川巴戟蜀地當歸杜仲俱一味地黃生熟用菟絲柏子石菖蒲更添枸杞皮根子細末蜜丸桐子如早午臨眠三次服鹽湯溫酒任君須忌食三白並諸血能使髭烏髮亦烏人參須團結重實精美者洗去蘆焙燥稱二兩菟絲子以水漂去浮用取沉著酒蒸焙乾稱二兩枸杞子色紅潤者去蒂酒浸一宿焙乾一兩柏子仁色紅新者去殼取仁一兩細研臨時和入石菖蒲去毛節米泔浸一宿節密者稱一兩川牛膝長而闊者去皮酒浸一宿焙燥稱一兩半杜仲刮去粗皮銼碎生薑汁拌炒斷絲一兩半地骨皮色黃者刮去浮皮淨稱一兩地黃以水浸重者用以浮者搗取汁浸沉者蒸令透焙乾如是者三次色黑者味甘熟稱一兩又用生沉者一兩酒浸各用竹刀刃忌鐵器川當歸揀大者去蘆頭二兩川巴戟用黑色紫沉重大穿心者不用色黃細者捶去心酒浸焙一兩上件揀選精製如法勿曬用慢火焙乾若大燥則失藥味待乾即於風前略吹令冷熱相激便燥淨稱碾為細末煉蜜擇火日搜和於木臼內搗千餘杵丸如梧桐子大每日空心日午臨臥各一服每服七十丸鹽酒鹽湯任下忌食蔥白韭白蘆蔔豆粉及藕諸般血蓋諸血能破血又解藥力若三白誤食亦無他說止令人髭發反白耳合時切忌穢觸婦人孝子雞犬等見此方非特為髭發大能安養營衛補益五臟和調六腑滋充百脈潤澤三焦活血助氣添精實體最要節色欲使藥力效之速也犢髓全陽膏凡體氣虛弱感動疾病羸瘦少食似無大害積久可憂不慣服藥者用之小牛犢兒一隻未知草食者産八日宰遍捋去毛開破洗淨肚腸全體不遺大鍋頓煮黃耆一斤刮淨皮官桂良薑陳皮甘草以上各銼川椒去白各四兩食鹽一兩好酒二斗上以藥並酒同入鍋內用水添至八分鍋慢火熬肉爛如泥取骨捶髓盡化濾去肉骨藥但存稠汁待冷入甕內蓋覆掘土深藏露翁面如法遮蔽凡遇吃飯麵食諸物即取肉汁任意調和食用以盡為度三才丸滋陰養血溫補下元天門冬去心生地黃各三兩二味用柳甑箄以酒灑之蒸九次曝九次待乾稱用人參去蘆一兩上為細末用蒸棗肉和丸如梧桐子大每服三十丸食前溫酒送下日進三服一方用蜜麵糊和丸米飲下亦可封髓丹降心火益腎水黃柏三兩縮砂一兩半甘草一兩上為細末稀糊為丸如梧桐子大每服五十丸用肉蓯蓉半兩切碎用酒一大盞浸一宿次日早空心煎三五沸去滓以清酒送下大沉香丸闢山嵐瘴氣進飲食厚腸胃令人肥白填精補髓去渾身走注活經脈輕身健體百病不生沉香白檀香胡桃肉枸杞子木香大茴香小茴香丁香破故紙用羯羊大白腸一尺半盛上項藥在內好酒煮熟瓦器內蒸乾或醋炙亦可葫蘆巴酒浸全蠍去毒炒穿山甲醋炙川楝子去皮遠志去心韭子酒浸木通肉蓯蓉去鱗酒浸巴戟去心酒浸乾山藥不蛀者知母去毛山茱萸去核白茯苓去皮黃精酒浸天門冬去心麥門冬去心菟絲子酒浸別研熟地黃乳香別研細墨燒灰北五味生地黃巨勝子別研人參以上各半兩蓮花蕊陳皮各二錢仙靈脾酥炙牛膝酒浸青皮去白各三錢上為細末好酒煮麵糊和丸如梧桐子大每服三五十丸空心溫酒送下乾物壓之忌諸般血豆粉等物萬應延齡丹補諸虛不足麥門冬去心天門冬去心熟地黃酒蒸生地黃酒洗人參去蘆澤瀉枸杞子酒洗杜仲薑汁炒去絲白茯苓去皮遠志去心赤石脂煅覆盆子山茱萸地骨皮酒洗車前子石菖蒲柏子仁各一兩巴戟去心山藥各二兩五味子二兩半菟絲子酒浸牛膝酒浸各三兩川椒七錢肉豆蔻四兩酒浸上為細末煉蜜和丸如梧桐子大每服三十丸空心溫酒送下初服一日三服常服只一服漸加至五十丸老者加至百丸服至百日百病皆散身體榮潤初服三日小便或下雜色惡物是腎間病出五日間氣痞是臟腑間寒熱氣出至七日唇口生津液覺腹痛勿怪至十日全體漸肥潤至二十日鼻頂辛酸去頭風消除一切痛證四十五日語言雄壯胸膈微痛或吐微血去積滯鬱結至百日身體強健至誠修合服之其效不淺也膃肭臍丸補益丹田固濟水臟安神益智明目駐顏壯腰膝充肌膚補虛冷安臟腑膃肭臍酒炙黃蓽澄加附子炮去皮臍牛膝去苗覆盆子沉香薯蕷補骨脂微炒石斛去根檳榔麝香別研肉蓯蓉去鱗酒浸炙桂心木香以上各一兩山茱萸遠志去心白朮巴戟去心蛇床子石龍芮肉豆蔻川芎澤瀉以上各三分母丁香半兩上為細末煉蜜和搗三五百杵丸如梧桐子大每服三十丸漸加至四十丸空心用溫酒送下正氣補虛湯治憂恚思慮喜怒不常失飢勞力或飲食不調肌肉減耗營衛虛弱外邪所襲入於經絡頭痛昏悶拘攣憎寒壯熱身疼腰倦腳弱轉筋自汗手足冷四肢麻痹五臟諸虛百損並皆治之人參藿香葉黃耆厚朴去粗皮銼薑汁炒茯神熟地黃酒炒川芎以上各二兩桂心白朮五味子附子炮半夏洗丁香南木香乾薑當歸去尾甘草以上各一兩白芷半兩上銼散每服五錢用水一盞半生薑三片紅棗二枚煎至八分去滓空心溫服巨勝丸治男子筋痿少腹不利小便頻數腰背悶疼不能久立則腿膝麻冷難以屈伸以意多忘耳作蟬鳴久服滋血氣壯元陽烏髭發添精補髓益壽延年婦人尤宜服之巨勝子甘菊花旋覆花白茯苓去皮蓽澄茄覆盆子熟地黃肉桂去粗皮牛膝去苗酒浸遠志去心白芷以上各一兩旱蓮子去莖葉七錢半上各制度畢共為細末酒煮麵糊和丸如梧桐子大每服四十丸空心溫酒送下日進二服忌羊血生蔥蘿蔔等鹿血丸治諸虛百損精血俱耗血少不能養筋精虛不能實骨筋骨痿弱面色黧黑耳鳴氣短目視昏花腰脊疼痛足膝酸弱步履艱辛小便白濁或頻數但是一切虛損之證悉能治療婦人虛弱者亦宜服之鹿角鎊鹿茸麋角鎊麋茸去毛酒蒸續斷酒浸附子炮去皮臍川烏炮去皮臍鍾乳粉研陽起石煅川巴戟去心沉香不見火川牛膝去蘆酒浸萆薢以上各一兩桑寄生菟絲子酒浸蒸焙五味子以上各二兩川椒去目併合口者微炒出汗取紅半兩宣木瓜二枚去皮穰蒸爛上為細末刺鹿血乘熱和杵千餘下丸如梧桐子大每服一百丸食前用鹽酒或鹽湯任下婦人用醋湯送下麋茸丸補虛損益下元暖水臟治風冷調三焦利腰腳麋茸二兩去毛酥炙膃肭臍酒洗炙巴戟去心附子炮去皮臍石斛去根遠志去心山茱萸去核肉蓯蓉去鱗酒浸炙澤瀉五味子酸棗仁炒蘹香子炒柏子仁川續斷菟絲子天麻以上各一兩牛膝去苗一兩半白茯苓蛇床子桂心以上各三分杜仲去粗皮炒枳殼麩炒各三錢川芎當歸萆薢漢椒去目併合口者微炒出汗以上各半兩上為細末煉蜜和搗千餘杵丸如梧桐子大每服四十丸空心及晚食前用溫酒送下韓魏王自養丸益真氣逐真氣填骨髓治肌體羸瘦精神昏倦減食痞滿嘔吐心腹常痛腰重腿疼泄瀉無時烏頭銼作塊蛤粉炒紅椒去目併合口者破故紙炒舶上茴香炒山藥以上各四兩川楝子取肉三兩菟絲子二兩酒浸蒸別研入藥葫蘆巴酒浸巴戟酒浸各一兩半牛膝去苗酒浸一兩附子炮去皮臍一兩上為細末用醋煮麵糊和丸如梧桐子大每服三十丸空心用鹽酒鹽湯任下大金液丹補虛弱大天雄大川烏大附子並用四川者各十二雙俱炮去皮臍麝茸鹿角霜並用蜀地者各十二兩肉蓯蓉四斤川牛膝四斤硫黃三斤水火鼎飛煉一斤半上用鹿角膠為丸原方無蓯蓉牛膝愚恐其燥添之亦非常服之藥然大瀉大吐大虛脫證得之極妙此丹燥甚本難以許人服餌然卒暴虛脫孤陰絶陽救急之際又不可廢古人之法也且人之臟腑不同有宜於丹者有不宜於丹者嘗聞有一趙知府雖是平生酒色斫喪然其服藥亦甚有不可曉處每日早晨煎乾姜熟附子湯吞此丹百粒方能健啖否則身體倦弱不能支持遂與此丹相依為命壽至九十他人進一粒半粒尚恐為害此者恃之為家常飯賴之以壽其身臟腑之不同如此而不可曉也玉女砂治男子婦人諸虛百損暖下元固陽氣暖宮胃産後諸虛尤宜服又治諸虛寒熱自汗如神此乃潼州許德修名醫遇至人得此方極驗好辰砂八兩或六兩或十兩夾絹袋盛若塊大打令稍小惟紅者為上添砂添葉吳茱萸菟絲子杜仲金毛狗脊去毛熟地黃五味子人參瓦松古屋瓦上青毛焙乾去土肉豆蔻麵煨桑寄生萆薢巴戟去心芍藥黃耆牡丹皮肉蓯蓉當歸茯神去木茴香焙遠志去心山茱萸去核上各一兩裝在一斗瓶內著童子小便五七升將砂袋懸胎掛瓶內如煮酒法於鍋內著水亦懸藥瓶於鍋內桑柴或間松柴煮五日夜火不要急小便不住忖添煮令乾日足取出將砂袋以溫水滌十餘次又換溫水浸半日棄藥不用辰砂又洗三二次糯米糰子和丸空心用棗湯下五粒或十粒既濟丹治心腎不交靈砂陽起石煅鍾乳粉磁石茯神去木鹿茸以上各一兩沉香半兩硃砂一錢為衣上為細末麵糊和丸如緑豆大每服二十丸空心用棗湯送下茯苓酥除萬病久服通仙方上用白茯苓三十斤取山之陽者甘美取山之陰者味苦去皮薄切曝乾蒸之以湯淋去苦味若淋不止其汁當甜則曝乾搗羅為末用酒三石蜜三升和酒相得內茯苓末於大甕中攪之百匝封之勿泄氣冬五十日夏二十五日酥浮酒上掠取其味甘美作餅子如手掌大於空室中陰乾色赤如棗飢食之此為茯苓酥也忌食米醋真人餌茯苓法上用白茯苓三斤細銼以絹袋盛之懸於甕中用小麥細面七斤糯米五斗炊為爛飯和曲末經宿入蜜一升和令勻入甕中又經一宿炊糯米二斗投之不得令熱入水六升即封其甕口春秋三七日冬五七日夏一七日當出其藥袋可隔宿不食清旦取茯苓半斤服之其酒即旋旋飲之勿令勝藥若服此藥多時者永不飢渴無寒無熱身如碧玉令人身輕走如奔馬與天地相畢矣其藥袋懸於空中勿令著甕底繩系袋頭取木橫梔之仍以紙密封旋取服之勿令泄氣忌食米醋煉茯苓方上取茯苓上黨者去黑皮銼作如雞子大任多少置甕中其甕近底鑽作竅以木塞之即下水令沒得藥每兩日一換水七日後數以筋導卻水取茯苓蒸候熟及熱出之置盤中揉塌拾去脈膜控干仍入甕中以木椎研極細更下熟水攪和先縫生絹為袋以藥汁傾袋中以盆器盛汁瀝盡余滓更研復取前汁攪渾傾袋中如前法候滓盡澄之更傾去清汁取稠汁納絹袋中垂瀝之候水盡取茯苓曝乾是為茯苓粉可入諸藥若不如此即脈膜損人令人夭折或作瘦病服地黃延年不老方用地黃淨洗隨多少搗絞取汁煎令小稠納蜜再煎可丸即丸如梧桐子大每日食前以溫酒下三十丸日三服如此十年白髮再黑力如二十時令人多子神效無比餌地黃治病長生方用生地黃十斤擘碎於一大銅器上安炊簞上安地黃入甑蒸之汗當下流於銅器中候消地黃汗盡即止將銅器內汁置於重湯中煎之可丸即丸如半雞子大每服一丸以溫酒化開服之日三服服至百日與天地相保白子高從太上受此方作熟乾地黃法采地黃去其須葉及細根搗絞取汁以漬肥者著甑中如上米蒸飯以蓋覆蒸之一時出曝燥更內汁中又蒸汁盡止便乾之亦可有切蒸之半日數以酒灑之候周匝稍潤出曝乾可搗蜜丸如前法服之黃精膏神仙延年補益療萬病用黃精一石去鬚毛洗令淨潔打碎蒸熟壓得汁復煎去游水得一斗肉乾薑末三兩桂心末一兩微火煎看色鬱郁然欲黃便去火待冷盛不津器中酒五合和服二合常未食前日三服舊皮脫顏色變光花色有異鬢髮更改欲長服者不須和酒納生大豆黃絶穀食之不飢渴不老二精丸助氣固精保鎮丹田黃精去皮枸杞子各二斤上各於八九月開採取先用清水浸黃精令淨控細銼與枸杞子相和杵碎拌勻陰乾再搗羅為細末煉蜜為丸如梧桐子大每服三五十丸空心溫酒下常服助氣固精補鎮丹田活血駐顏長生不老服黃精成地仙方黃精者是芝草精也一名葳蕤一名仙人餘糧一名苟洛一名勉竹一名兔子一名重樓一名垂珠一名馬箭一名白芨一名黃精其葉如竹其莖如桃其花白四月莖長五六尺本廣末赤其花如小豆其實如黍其根似姜昔隨羊公神仙常服此藥言與天地相畢常以二月三月採根入地八九寸為上取一石五斗淨洗切細以水二石五斗煮令苦味盡漉出以布袋盛壓取汁澄清再煎如膏即止然後炒黑豆黃搗為末相和得所捏作餅子如錢許大每服二枚日漸加之百日知驗也一年內即變老為少氣力倍增亦焙乾篩末每服二錢溫水調服食前功與上等煉雲母粉服餌法雲母取上好白澤者細擘以水淨淘漉出蒸之一日夕下之復更淨淘如前法去水令乾凡雲母二斤用鹽三斤硝石一斤和雲母搗之一日至暮取少許掌上泯著不見星光為熟出安盆甕中以水漬之令相得經一宿炊久澄去上清水徐徐去之盡更添水如前凡三十遍易水令淡如水味即漉出其法一如研粉澄取澱然後取雲母澱徐徐生絹袋中濾著單上曝乾即成粉矣每日空心以酒調下一錢或水下亦得久服輕身延年強筋填髓可以負重登山不乏悅澤不老耐寒暑志高神仙此非古法近出東海賣鹽女子年三百貌同笄女自負鹽重五百餘斤如斯得效之者其數不一可驗神功矣服天門冬法如居山遠行闢粒不飢服至十日身輕目明二十日百病愈顏色如花三十日發白更黑齒落更生六十日行及奔馬百日服之延年矣天門冬二斤熟地黃一斤上搗羅為末煉蜜為丸如彈子大每服三丸以溫酒化破服之日三忌食鯉魚服天門冬方強筋髓駐容顏用天門冬曝乾搗下篩食方寸匕日三可至十服小兒服尤良與松以崖蜜丸服之益善彌佳又搗取汁微火煎取五斗下白蜜一斗胡麻炒末二升合煎搗勿息手可丸即止火下大豆黃末和為餅徑三寸厚半寸一服一枚日三百日以上得益此方最妙一方釀酒服如傷多無若多即吐去病也蒯道人年近二百而少告皇甫隆云但取天門冬去心皮切乾末酒服方寸匕日三令人不老補中益氣愈百病也天門冬生奉高山谷在東嶽名淫羊食在中嶽名天門冬在西嶽名管松在南嶽名百部在北嶽名無不愈在原陸山阜名顛棘雖然處處有之異名其實一也在陰地者佳取細切烈日乾之久服令人長生氣力百倍治虛勞絶傷年老衰損羸瘦偏枯不隨風濕不仁冷痹心腹積惡瘡癰疽腫癩疾重者周身膿壞鼻柱敗爛服之皮脫蟲出顏色肥白此無所不治亦治陰痿耳聾目暗久服白髮黑齒落生延年益命入水不濡二百日後恬泰疾損拘急者緩劣者強三百日身輕三年走及奔馬又三年心腹痼疾皆去矣忌食鯉魚須常以七八九月採其根亦云丑月過此味也餌術法用蒼朮一石揀擇令淨錘碎又從平旦裝入甑中蒸至午時即止以釜中湯淋三七遍取汁卻入釜中微火煎令可丸即丸如彈子大每服一丸以溫酒化開服之日二服治百病輕身益氣能去風寒不飢渴延年忌桃李雀肉服枸杞養神延年不老地仙方用枸杞不限多少常以十一月十二月正月採根二月三月採莖四月採葉五月六月採花七月八月九月收子以上採者並搗羅為末每服二錢以溫酒調下日三服能治一切風久服諸疾不生矣服槐子法取槐子去皮納牛膽中令滿陰乾百日取出每服一粒空心新汲水下日晚再服月內身輕百日內白髮變黑久服齒落更生走及奔馬杏仁酥治萬病及風虛勞冷上用家杏仁一石揀完者湯去雙仁皮尖搗令爛用好酒二石研濾取汁一石五斗入蜜一斗五升納兩磁甕中攪令勻封之勿泄氣三十日看清酒酥出掠取內器中貯之取其酒滓團如梨大置空室中按格安之候成飴餔狀每日旦服一枚以前酒下其酒亦任性飲之夏姬服杏仁法上用杏仁三斗湯去皮尖雙仁早朝蒸至午時即便慢火微烘之至七日即止每日空心不約多少隨意食之延駐治病必驗矣須用五月採吳真君服椒方椒性稟五行其葉青其皮赤其花黃其膜白其實黑暖丹府通血脈助元氣消酒食闢濕毒去邪氣安五臟調三焦而熱不上蒸芳草之中功皆莫及每金州椒一斤揀去浮及合口者並目銀器內炒令透地上鋪紙兩重傾在紙上用新盆合定周回以黃土培半日許其毒成汗自出曬乾木臼內輕搗取紅皮四五兩再入鐵臼杵為末以煉蜜和丸如梧桐子大候乾炒袋盛掛通風處每日空心酒下十丸至十五丸半年加至二十丸一年後加至二十五丸可無所忌歌曰其椒應五行其人通六義欲之加有功夜間且不起服之半年內腳心汗如水四時去煩勞五臟無風氣明目腰不疼身輕心健記別更自異能三年精自祕顏貌若嬰童精爽又少睡但服此神妙一生無瘧痢若能志心服三尸自然棄更有九般蟲各各自回避倘逢此色人第一須傳意雖未遇神仙初緣已得地服雄黃法凡雌黃千年化為雄黃雄黃千年化為黃金黃金者若真人餌法微妙難可知輕身益氣莫過雄黃之效上用雄黃一斤細研以酒三升和青銅器中用炭火上微煎令沸勿令大熱以好漆二升去滓合著其中攪令相得藥成如黃金或作紫色丸如梧桐子大常先食含化一丸咽津日三服十日諸疾即愈二十日肌肉中藥氣遍行能耐寒暑寒則熱熱則涼服之百日腸中肥皮膚厚筋骨堅耳目聰明無復諸患行步如飛服之二百日顏色有光白髮再黑齒落更生返老成少身形堅固真人所貴神仙所保勿示非人恐招譴謫服菟絲子方用菟絲子一斗酒浸良久漉出曝乾又浸令酒盡為度搗為細末每服二錢以酒調下日三服後吃三五匙水飯壓之至三七日更加至日三服之令人光澤惟服多甚好三年後老變為少此藥治腰膝去風冷益顏色兼明目久服延年神祕勿示非道服鹿角法鹿角屑十兩附子三兩去皮臍生用上搗羅為細末每服二錢用溫酒調服日三令人少睡益氣力通神明但力速矣出彭祖傳中服乳香法用乳香上好者三斤白蜜三升瓷銀器中合煎如無好蜜好酒亦得以柳木篦數攪令如餳每日空心及晚食前服一栗殼去風益顏色神仙服人參法開心肥健人用人參一分豬脂十分酒拌和服一百日滿體髓溢日誦千言肌膚潤去熱風痰服菖蒲法駐顏色延年明耳目去風氣通關竅安神益智九節菖蒲不以多少惟生山澤日上東流水中者採取為妙若是少得時只石上水中生者亦得不可陂澤中生者於八月間採取得去根鬚淨擇了以淘米泔浸三日三夜每日換米泔浸出控干以硬竹削為片子如錢厚以布袋盛貯長流水中浸三復時更用花水淨洗擇如蒸飯九度每蒸候曬一日候數足不得犯鐵器於木石臼內搗為細末煉蜜為丸如梧桐子大初服三十丸漸加至五十丸用鹽湯下茶酒亦得忌羊血若有餘者以紙袋子盛貯掛通風處如服盡更將末合或酒糊丸亦可服柏實法柏子仁二斤搗羅為末以酒浸攪如膏棗肉三斤白蜜乾地黃末白朮以上各一斤上和令勻丸如棗大每服三丸以水研服之日三服一月百病愈久服延年服柏實方用柏實於八月合房取乃曝令折其子自脫用清水淘洗沉者控干輕捶取仁搗羅為細末每服二錢匕酒調下冬月溫酒下早晨日午近晚各一服稍增至四五錢若絶谷者取飽為度渴即飲水令人悅澤一方用煉成松脂及白蜜丸如梧桐子大每服十丸或二十丸日三服又方與松子等分松脂和丸酒下又方加菊花末等分蜜丸如梧桐子大每服十丸至二十丸酒下日三服餌百花法以三月三日五月五日七月七日九月九日採百花陰乾搗為細末每服二錢以水調下日二服百日身輕面目光澤三年通神忽然與真人同位如春採百草枝陰乾搗末每服二錢用溫酒調食後服之以水亦得輕身長壽一名草精也服百花方桃花三月三日採蒺藜花七月七日採甘菊花九月九日採枸杞葉春採枸杞花夏採枸杞子秋採枸杞根冬採上並陰乾各等分搗為細末每服二錢以水調下日三服百日自知其效二百日力加百倍久服令人輕身長壽辟穀松蠟丸松脂陳一斤十二兩白蠟一斤四兩酥半斤蜜一斤四兩白茯苓去黑皮搗末十兩上先取松脂白蠟酥蜜四味入磁器內盛密封坐於二鬥黍米甑內同蒸候米熟取出納茯苓末以杖攪和之再密封如前經五日即開搗和為丸如梧桐子大每服五丸酒下早晨近晚服十日後即服一丸若飢加至二丸三丸服此藥時不得食一切物服盡即不食亦可延年辟穀方若遇荒年穀貴無盡以充糧應須藥濟命者用粳米一斗酒三升漬之出曝之又漬至盡飲食之渴飲之闢三十日足一斛三升可闢周年地黃酒補益變白肥地黃二斤搗研糯米五斗熟炊面曲五升搗碎上相杵於盆中熟揉納入水三斗於不津器中密封春夏三七日秋冬五七日滿啓之常中有一盞緑汁是真精也宜先酌飲之餘生布絞取別置器中任性飲之續釅使其相接不過三劑發黑若以新牛膝搗取汁二三升用拌饋即變白更急矣黃精酒主萬病延年補壽發白再黑齒落更生黃精蒼朮各四斤枸杞根五斤松葉九斤天門冬三斤去心上都銼以水三石煮取汁一石浸曲十斤炊米一石如常法釀酒候熱任性飲之忌桃李雀肉天門冬酒補五臟調六腑令人無病天門冬三十斤去心搗碎以水二石煮取汁一石糯米一斗淘淨細曲十斤搗碎上炊米熟相拌入甕密封三七日候熟壓漉出冬溫夏冷日飲三盞枸杞酒用枸杞一百二十斤切以東流水四石煮一日一夜取清汁一石漬曲一如家醞法熟取清貯不津器中納乾地黃末二斤半桂心乾薑澤瀉蜀椒末各一升商陸末二升以絹袋貯納酒底緊塞口埋入地三尺堅覆土三七日沐浴整衣冠再拜平曉向甲寅地日出處開之其酒赤如金色旦空腹服半升十日萬病皆愈三十日瘢痕滅惡疾人以水一升和酒半升分五服愈千金翼又云若欲服石者取河中青白石如棗杏大者二升以水三升煮一沸以此酒半合置中須臾即便可用薯蕷酒治頭風眩不能食補益氣力薯蕷山茱萸五味子白朮以上各八兩防風人參去蘆丹參生薑以上各六兩上細銼生絹袋盛用清酒三斗入磁甕中浸七日開每度溫飲一盞日三菊花酒壯筋骨補精髓延年益壽耐老菊花生地黃枸杞根各一斤上搗碎以水一石煮取汁五斗炊糯米五斗細曲碎拌令勻入甕密封候熟澄清每溫飲一中盞日三菖蒲酒主大風十二痹通血脈調營衛治骨立萎黃醫所不治者服一劑服輕百日顏色豐足氣力倍常耳目聰明行及奔馬發白更黑齒落再生晝夜有光延年益壽久服得與神通上用菖蒲削治薄切曝乾一斗生絹袋之以好酒一石入不津器中安藥囊在酒中密封泥之百日發視之如緑葉色復炊一斗秫米納酒中復封四十日便漉去滓溫飲一盞日三其藥滓曝乾搗羅為細末酒調一錢服之尤妙一切三十種風有不治者悉效葡萄酒駐顏暖腰腎干葡萄一斤末細曲五斤末糯米五斗上炊糯米熟候冷入面並葡萄末水三斗攪令勻入甕蓋覆候熟即時飲一盞不拘時地黃煎補五勞七傷長肌肉填骨髓生地黃取汁一斗生薑取汁一升酥一斤蜜一升杏仁一升湯浸去皮尖研如膏用之上先取地黃汁於銀器中煎如稀餳納姜酥蜜杏仁等和更煎令稠於不津器中盛每服以溫酒調一蜆殼服之日三度服之九仙薯蕷煎治腰腳疼痛腹內一切冷病服之令人肥白顏色悅澤身體輕健骨髓堅牢行及奔馬久服可通仙矣薯蕷杏仁一升湯浸去皮尖雙仁生牛乳三升上爛研杏仁入牛乳絞取汁以杏仁盡為度後取薯蕷相合都入新磁瓶盛之密封瓶口安於釜中以重湯煮一復時乃成每日空心以溫酒調一匙服之韻梅湯半黃梅一百枚椎去核並仁青椒四兩揀淨甘草四兩炙為末生薑一斤去皮研鹽半斤上於淨盆中一處拌勻安烈日中曬半月以色變稍紫為度更約稀稠得所為佳安淨器中每用少許沸湯點梅橙湯橙子十個乾山藥一兩鹽白梅四兩捶破去仁不去核鹽四兩炒用甘草二兩上先用橙子山藥甘草白梅一處研細搗成餅子焙乾研為細末入檀香半兩尤佳一方入生薑二兩百沸湯調醍醐湯神麯官桂乾薑煨各二兩烏梅八兩淨洗拍碎甘草七兩淨鹽三兩炒上將前五味焙乾為細末後入炒鹽袞令作一處用新淨磁器貯白湯點下暗香湯清神爽氣香附子一兩揀大而無皮者炒縮砂仁一兩半炒木香一分檀香一錢胡椒一錢炒甘草二兩炙上件同為細末入鹽點服不拘時檀香湯治精神不爽頭目昏眩心忪煩躁志意不定檀香不見火三兩川芎不見火白芷不見火各二兩桔梗焙三十兩甘草六兩炒上為末每服一錢入鹽少許沸湯點服常服調中順氣安神定志清爽頭目金粟湯粟米一升生薑十兩甘草四兩草果肉二兩上先將粟米淘淨同生姜研碎罨一宿作餅子焙乾卻同將甘草草果搗羅為末若更入白朮二兩絶妙每服二三錢入鹽少許沸湯點服不拘時荔枝湯烏梅肉甘草各二兩百藥煎一兩白芷半兩白檀三錢上為細末用沸湯點服一二錢食前服橄欖湯百藥煎三兩細切檀香銼白芷各二兩半甘草炙一兩半上為細末檀香一二錢以百沸湯不拘時點服桂花湯一名桂香湯桂花二升揀去青柄子細研以磁器貯覆略蒸花須就園摘墮地者不可甘草略炙乾薑各一兩上為細末同桂心打勻量入炒鹽少許磁器盛貯莫令漏氣如常法點服風池湯一名造化湯臘中合伏中方成伏中合臘中方成故名造化湯烏梅去仁留核甘草鹽上每合時三味各以一斤為準炒鹽為妙等分不焙先以烏梅甘草杵為粗末次以鹽一處拌勻入罐子實按收起須臘月或伏內合半年後方取出焙乾研為細末如常法點服夏月宜漿近侍湯官桂去粗皮半兩丁香檀香各一兩甘草銼一兩半縮砂仁四兩鹽三兩上先將鹽炒令乾次入縮砂甘草慢火炒黃色乘熱用淨器先入一半在底次下丁檀在中又以一半蓋之密封口候冷入桂急碾為細末拌勻磁盒窨五日沸湯點一錢洞庭湯青橘一斤切去核曬乾檀香半兩甘草一兩上為細末每服一二錢入鹽少許點服不拘時經進過院湯草豆蔻一兩用生薑五兩切片同拌炒以水三升慢火煮水乾為度取出焙乾白豆蔻仁益智仁莪朮各半兩粉草炒鹽各一兩半上為細末以沸湯點服一二錢食前服寇相入朝湯沖冒霧氣春天不可無此空心進餌沉香木香人參肉豆蔻茴香草豆蔻蓽澄茄甘草各等分上為細末以沸湯入鹽少許點服一二錢不拘時服香橙湯寬中快氣消酒食橙子三斤大者破去核切作片子連生薑五兩去皮切片焙乾上件於淨砂盆內爛研如泥次入炙甘草末二兩檀香末半兩並搜和作餅子焙乾為細末每服一錢用沸湯入鹽少許點服不拘時醍醐膏用烏梅一斤捶碎甜水四大碗煎至一碗濾去滓白沙蜜五斤砂仁末半兩入砂石器內慢火熬成赤色膏為度取下放冷加白檀末三錢麝香一字攪勻於磁石器內盛貯封口一宿夏月冷水調冬月沸湯烏梅化痰止煩渴蜜生津液潤心肺白檀大能解暑毒麝香通竅辟邪氣
