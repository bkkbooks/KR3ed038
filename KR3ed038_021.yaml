body:
  text: 卷之二十一諸虛門附論論曰諸虛難經所謂五損因虛而致損也一損損於皮毛皮聚而毛落二損損於血脈血脈虛少不能榮於五臟六腑三損損於肌肉肌肉消瘦飲食不為肌膚四損損於筋筋緩不能自收持五損損於骨骨痿不能起於床反此者皆脈之病也從上下者骨痿不能起於床者死從下上者皮聚而毛落者死損其肺者益其氣損其心者調其營衛損其脾者調其飲食適其寒溫損其肝者緩其中損其腎者益其精夫人有五臟要在乎心與腎而已二者何蓋心屬火火降則血流通四肢和暢腎屬水水升則精滿神氣盛而肢體和則病不生素問云恬淡虛無真氣從之精神內守病安從來人能保惜乃知固養之道或失調理或心腎有虧左陽升而不升右陰降而不降稟賦素弱寒暑勞役或色欲過度俱能損耗真氣以致肌體羸瘦腰膝無力小便頻而又澀目眩耳聾遺精自汗甚則虛火上攻面紅喘滿遇熱難禁或下部濕熱所襲變生諸證此皆虛勞之病盡力謀為勞傷乎肝應乎筋極曲運神機勞傷乎心應乎脈極意外過思勞傷乎脾應乎肉極預事而憂勞傷乎肺應乎氣極矜持志節勞傷乎腎應乎骨極此五勞應乎五臟之勞極然精極者五臟六腑之氣衰形體皆極眼視無明齒焦發落體重耳聾行履不正邪氣入於六腑厥於五臟故成精極大抵虛損勞極之脈多弦治療之法隨其虛實冷熱而調之精極者當補其精素問所謂形不足者溫之以氣精不足者補之以味年分門列大略如此若能保養不妄作勞精神俱備所以天年庶百歲乃去不能謹守不知持滿難保天年臨病之際在乎詳審諸虛通治方十全大補湯治男子婦人諸虛不足五勞七傷此藥性溫補常服主血壯脾胃人參去蘆肉桂去粗皮熟地黃酒焙白芍藥川芎茯苓去皮川當歸去蘆黃耆去蘆白朮甘草炙各一錢二分上作一服用水二盅生薑三片紅棗二枚煎一盅食前服黃耆建中湯治男子婦人諸虛不足羸乏少力此藥大生氣血補益營衛黃耆去蘆三錢白芍藥四錢肉桂去粗皮一錢半甘草炙二錢上作一服用水二盅生薑三片紅棗二枚煎一盅食遠服三建湯治元陽素虛寒邪外攻手足厥冷六脈沉微大小便滑婁凡中風涎潮不省人事傷寒陰證皆可服之大川烏炮去皮臍附子炮去皮臍天雄炮去皮臍各三錢上作一服用水二盅生薑十片煎至一盅不拘時服自汗加肉桂浮麥各一錢氣逆者加沉香一錢胃冷者加丁香胡椒各半錢十四味建中湯治營衛失調血氣不足積勞虛損形體羸瘦短氣嗜臥欲成勞瘵當歸去蘆酒焙白芍藥麥門冬去心黃耆炙人參去蘆肉蓯蓉酒浸熟地黃酒洗焙茯苓去皮肉桂去粗皮附子炮去皮臍川芎白朮半夏湯泡七次甘草炙各一錢上作一服用水二盅生薑三片紅棗二枚煎一盅空心服人參養營湯治積勞虛損四肢倦怠肌肉消瘦而少顏色汲汲短氣飲食無味人參去蘆當歸去蘆陳皮去白黃耆蜜炙桂心去粗皮白朮炒甘草炙各一錢白芍藥二錢熟地黃酒浸茯苓去皮五味子各七分半遠志去心炒五分上作一服用水二盅生薑三片紅棗二枚煎至一盅食前服遺精者加龍骨一錢咳嗽者加阿膠一錢鹿茸大補湯治男子諸虛不足婦人亡血一切虛損鹿茸酒炙黃耆蜜炙肉蓯蓉酒浸杜仲炒去絲白茯苓去皮當歸酒浸各一錢白芍藥附子炮肉桂去粗皮石斛酒浸蒸焙五味子白朮煨半夏湯泡七次人參各七分半甘草炙五分熟地黃一錢半上作一服用水二盅生薑三片紅棗二枚煎一盅空心服九子丸強陽補腎益精氣壯筋骨肉蓯蓉四兩酒浸三宿切焙乾其味甘酸鹹其性溫治男子絶陽不興女子絶陰不産調五臟養肌肉健腰膝益精血令人有子仙茅一兩糯米泔浸三宿用竹刀刮去皮於槐木砧子上切陰乾其味辛其性溫主丈夫虛損婦人失血無子久服通神養志壯筋骨益肌膚長精神明眼目遠志一兩去心其味苦其性溫主傷中補不足除邪氣利九竅益智慧聰耳明目強志久服輕身不老駐顏益精補陰壯氣鹿茸一兩刮去毛酥塗炙黃色其味甘酸其性溫治男子腰腎虛冷腳膝少力夜多異夢精溢自出助陰續斷一兩捶碎去筋脈酒浸一宿其味苦辛其性溫主助氣潤血脈補不足蛇床子一兩微炒其味辛其性溫平主男子陰痿濕癢久服輕身好顏色強陰令人有子巴戟一兩去心其味辛甘其性溫主男子陰痿強筋骨安五臟補中增志益精養氣蘹香子一兩舶上者微炒其味辛其性平主膀胱腎間冷氣人重之能助陽道車前子一兩其味甘其性平微寒主男子傷中強陰益精令人有子明目利水道上為細末用鹿脊髓五條去血脈筋膜以無灰酒一升煮熬成膏更碾極爛同煉蜜少許和丸如梧桐子大每服五十丸空心用溫酒送下固陽丹養氣守神固精壯陽補益真氣常服有效黑附子三兩炮川烏二兩炮白龍骨一兩舶上茴香補骨脂川楝子各一兩七錢上為細末酒煮麵糊和丸如梧桐子大每服五十丸空心用溫酒送下固真丸治諸虛不足常服補益五臟接助真陽潤澤肌膚強壯筋骨川烏鹽炒黃去鹽熟乾地黃焙秦艽肉桂去粗皮茴香酒浸炒五味子威靈仙仙靈脾山藥各二兩附子炮去皮臍白茯苓去皮當歸酒洗焙牛膝酒浸一宿石菖蒲萆薢各半兩上為細末煉蜜和杵千餘下丸如梧桐子大每服五十丸空心溫酒鹽湯任下還少丸大補真氣虛損肌體瘦悴目暗耳鳴氣血凝滯脾胃怯弱飲食無味並皆治之牛膝酒浸一宿焙乾乾山藥各一兩半白茯苓去皮山茱萸去核肉蓯蓉酒浸焙乾遠志去心茴香鹽炒杜仲薑汁和酒炙去絲楮實子五味子各一兩石菖蒲去毛枸杞子熟乾地黃酒洗焙各五錢上為細末煉蜜同蒸熟棗肉和搗三二百杵丸如梧桐子大每服五十丸空心溫酒鹽湯任下八仙丸療元氣虛損血氣不足耳鳴目暗腰膝痠疼肌體羸瘦飲食無味肉蓯蓉酒浸焙乾牛膝酒浸焙天麻去苗酒浸木瓜去穰酒浸焙各四兩附子炮去皮臍當歸酒洗焙各二兩鹿茸一兩去毛酥炙麝香二錢上為細末煉蜜和丸如梧桐子大每服五十丸空心用溫酒送下十精丸升降陰陽既濟水火平補心腎遠志去心青鹽炒別碾破故紙炒白茯苓去皮益智仁菟絲子酒浸川當歸酒浸牛膝各一兩石菖蒲九節者山茱萸去核各半兩上為細末用獖豬腰子一個去膜切細和酒碾爛同白麵打糊丸如梧桐子大每服五十丸空心溫酒鹽湯任下如小便赤少車前子煎湯下心虛精神不定茯神湯下如夜間煩躁不得睡用酸棗仁末調湯下如心氣盛濃煎麥門冬湯下一方去石菖蒲加熟地黃一兩用羊腰子為丸八味丸治下元冷憊心火炎上渴欲飲水或腎水不能攝養多吐痰唾及男子消渴小便反多婦人轉胞小便不通附子炮去皮臍桂心去粗皮各二兩牡丹皮茯苓去皮澤瀉各三兩山茱萸去核山藥各四兩熟地黃八兩上為細末煉蜜和丸如梧桐子大每服五十丸空心用鹽湯送下安腎丸治腎經積冷下元衰敗目暗耳鳴四肢無力夜夢遺精小便頻數常服補元陽益腎水桃仁去皮尖炒白蒺藜炒去刺巴戟去心肉蓯蓉酒浸焙破故紙茯苓去皮石斛炙山藥萆薢白朮各二十四兩肉桂去粗皮不見火川烏炮去皮臍各八兩上為細末煉蜜和丸如梧桐子大每服三十丸食前用溫酒或鹽湯送下無比山藥丸治諸虛百損五勞七傷肌體消瘦目暗耳鳴常服壯筋骨益腎水赤石脂煅茯神去皮木山茱萸去核熟乾地黃酒浸焙巴戟去心牛膝去苗酒浸澤瀉以上各一兩杜仲去皮切生薑汁炒菟絲子酒浸山藥以上各三兩五味子揀六兩肉蓯蓉酒浸四兩上為細末煉蜜和丸如梧桐子大每服五十丸空心用溫酒送下小菟絲子丸治腎氣虛損目眩耳鳴四肢倦怠夜夢遺精常服補益心腎菟絲子酒浸五兩石蓮肉二兩白茯苓去皮一兩山藥二兩納七分打糊上為細末用山藥煮糊和丸如梧桐子大每服五十丸空心用溫酒鹽湯任下還少丹補虛勞益心腎生精血羊膝酒浸焙白茯苓去皮山茱萸去核舶上茴香炒山藥各一兩半菟絲子酒蒸別碾肉蓯蓉酒浸焙遠志去心薑汁浸焙北五味子楮實子巴戟去心熟地黃酒浸焙川續斷杜仲去粗皮切生薑汁炒斷絲以上各一兩上為細末煉蜜和丸如梧桐子大每服五十丸用鹽湯送下食前服黃耆十補湯補虛勞養血氣黃耆蜜炙當歸酒浸熟地黃洗茯神去皮木沉香木香各半錢麥門冬去心天台烏藥肉桂去粗皮北五味子半夏薑製酸棗仁白朮人參去蘆白芍藥陳皮甘草炙各一錢上作一服用水二盅生薑五片紅棗一枚煎一盅食前服黃耆六一湯治虛勞自汗黃耆蜜炙六錢甘草炙一錢加白朮白芍藥各二錢上作一服用水二盅生薑三片紅棗二枚煎至一盅不拘時服黃耆益損湯治諸虛勞倦黃耆蜜炙白芍藥白朮煨石斛酒炒當歸川芎各一錢半肉桂去粗皮熟地黃半夏薑製甘草炙各一錢木香四分北五味子五分上作一服用水二盅生薑五片紅棗二枚煎至一盅食前服有熱加柴胡一錢大建中湯治諸虛不足小腹急痛脅肋䐜脹骨肉痠疼短氣喘咳痰嗽潮熱多汗心下驚悸腰背僵直多臥少起黃耆去蘆蜜炙附子炮去皮臍鹿茸去毛酥炙地骨皮石斛去根人參去蘆當歸去蘆酒浸白芍藥續斷川芎小草各一錢甘草炙五分上作一服用水二盅生薑五片煎至一盅不拘時服咳嗽者加款冬花唾血者加阿膠便精遺泄者加龍骨怔忡者加茯神鹿茸四斤丸治肝腎虛極熱淫於內致筋骨痿弱不自勝持起居無力足不任地驚恐戰掉潮熱時作飲食無味不生氣力諸虛不足鹿茸去皮毛酥炙肉蓯蓉酒浸焙天麻去蘆菟絲子酒浸蒸別碾牛膝酒浸熟地黃酒浸焙杜仲酒浸炒乾木瓜各等分上為細末煉蜜和丸如梧桐子大每服五十丸食前用溫酒或米湯送下葫蘆巴丸治虛損之疾不可醫者極能關鎖精氣升降陰陽攻效如神葫蘆巴附子炮去皮臍川烏炮去皮臍沉香當歸去蘆巴戟去心天雄炮川芎酸棗仁湯泡去皮柏子仁去皮破故紙微炒牡蠣煅龍骨赤石脂煨各一兩鹿茸酥炙茴香各二兩澤瀉半兩硫黃生用明者七錢半上為細末酒煮糊和丸如梧桐子大每服五十丸空心用鹽湯或米飲送下日二雙芝丸治諸虛補精氣填骨髓壯筋骨助五臟調六腑久服駐顏不老熟地黃取末石斛去根酒炙肉蓯蓉酒浸菟絲子酒浸三日淘炒牛膝酒浸黃耆以上各四兩杜仲蜜水浸泡五味子焙薏苡仁炒各二兩沉香三錢麝香二錢麋鹿角霜半斤白茯苓去皮天麻酒浸乾山藥覆盆子人參木瓜秦艽以上各一兩上為細末煉蜜和丸如梧桐子大每服二十丸至三四十丸用溫酒下鹽湯米飲亦得凡年五十以上者加入黑附子以青鹽湯蘸炮一兩鹿角一對去頂二指硫黃半斤渾用上用麻油釜中以水同煮常微沸勿大急甚水耗只旋添溫水須用水以備添之煉令角膠汁盡其角如霜以手捻如膩粉乃盛之取用勿令穢汙著也一方無山藥玉關丸治諸虛不足膀胱腎經痼敗陰陽不交致生多病水欲升而沃心火欲降而溫腎如是則坎離既濟陰陽協和火不炎而神自清水不滲而精自固久服閉精補益永無膏淋白濁遺精之患功效難以盡述鹿茸去毛切片酥炙柏子仁炒別研遠志去心炒各二兩菟絲子水淘酒蒸別研杜仲去粗皮酒浸五味子各一兩半石斛去根酒浸牛膝去蘆酒浸茯神去木肉蓯蓉酒浸黃耆去蘆酒浸當歸酒浸焙巴戟去心沉香別研各一兩辰砂一兩入附子內附子七錢重者四個去皮臍各切下頂剜空心中分安辰砂在內以前頂子蓋定用線扎住木瓜二個大者去皮穰切開頂入辰砂附子四個在內以木瓜元頂子蓋之線扎定爛蒸訖取出附子切片焙乾研為細末辰砂細研水飛木瓜研如膏用宣州瓜為妙上