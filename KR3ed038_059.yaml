body:
  text: 卷之五十九鼻門附論鼻者肺之通竅主清氣出入之道路若氣血和平陰陽升降則呼吸通和榮衛行焉鼻和則知香臭矣或六淫七情內外傷感又因飲食勞倦因時鼻氣不得宣通清道壅塞其為病也若積熱客於陽明遂以迫血妄行自鼻孔中出謂之衄熱則津液中干冷則腦髓流注或風冷隨氣入於經上貫於腦下注於鼻則涕下不能自收謂之流涕或冷滯氣塞鼻則不聞香臭於是為鼻齆血脈聚日久纏綿轉加壅結變生息肉或氣壅滯於上為邪熱留伏不散則為鼻瘡久則變為疳䘌腐潰汁臭鼻之為病不過風熱而流河間云鼻窒塞也火主腹膹腫脹故熱客陽明而鼻中䐜脹則鼻窒塞也或謂寒主閉藏妄以鼻窒為寒者誤也蓋陽氣甚於上而側臥則上竅通利而下竅閉塞者謂陽明之脈左右相交而左脈注於右竅右脈注於左竅故風熱鬱結病偏於左則上竅反塞之類也所謂鼽者鼻出清涕也夫五行之理微則當其本化甚則兼其鬼賊故經曰亢則害承乃制也易曰燥萬物者莫熯乎火以火鍊金熱極而反化為水反其熱極則反汗出也由是肝熱甚則出泣心熱甚則出汗脾熱甚則出涎肺熱甚則出涕腎熱甚則出唾經曰鼻熱甚出濁涕又云膽移熱於腦則辛頞鼻淵者濁涕滲不止也凡痰涎涕唾稠濁者火熱極甚銷鑠致之然也或言鼽為肺寒者誤也但見鼽涕鼻窒胃寒則甚遂以為然豈知寒傷皮毛則腠理閉密熱氣怫鬱而痛愈甚也及夫嚏者鼻中因癢而氣噴作於聲也鼻為肺竅癢為火化心火邪熱干於陽明發於鼻而癢則嚏也或故以物擾之癢而嚏者擾癢屬血故或視目而嚏者由目為五臟精華太陽真火晃耀於目則心神躁亂而發熱於上則鼻中癢而嚏也或傷寒病衰而或嚏者由火熱已退而虛熱為癢癢發鼻則嚏也或風熱上攻頭鼻壅滯脈浮而無他證者內藥鼻中得嚏則壅滯開通而愈也或有痛處因嚏而痛其不可忍者因嚏之氣攻衝結痛而不得通利故也三者之證同為熱也故為病不同邪熱所乘之經有異故也鼻窒與嚏癢者熱客陽明胃之經也鼽涕者熱客太陰肺之經也蓋鼻者足陽明胃經所主陽明之脈左右相交注於鼻孔又鼻者肺之竅故肺氣通於鼻其邪熱干於二經發於鼻而為窒塞鼽涕之證故經曰心肺有病而鼻為之不利也治法觀邪所中之何經所治則不失矣或因外冒風寒而痛轉甚遂作寒治而用溫熱之劑表散獲者偶爾所中豈知寒覆於熱熱鬱氣濁清道不利故有是證可以辛甘發散腠理開通結滯得散陽熱外泄微者則已甚者鬱結不開其病轉加者雖用退熱疏風辛涼之劑解之時使結散熱退暫愈而已全在乎驗其內外結熱之微甚宜以辛溫辛涼之藥可也凡此諸證全在醫之識病治之瞭然無不瘥矣鼻通治方人參湯治肺氣上攻鼻塞不通人參白茯苓黃芩陳皮去白羌活麻黃去根節蜀椒去目併合口者炒出汗各一錢半上作一服水二盅煎至一盅食後服辛夷散治肺虛為四氣所幹鼻內壅塞涕出不已或氣息不通不聞香臭辛夷川芎木通去節細辛洗去土防風去蘆羌活藁本升麻白芷甘草炙各等分上為細末每服二錢食後茶清調服防風湯治鼻淵腦熱滲下濁涕不止久而不已必成衄血防風去蘆一兩半黃芩人參麥門冬去心川芎甘草炙各一兩上為細末每服二錢食後沸湯調服日三服蒼耳散治鼻流濁涕不止名曰鼻淵蒼耳子炒一錢半辛夷半兩香白芷一兩薄荷葉半錢上為細末每服二錢食後用蔥茶調服白芷散治鼻痛白芷杏仁湯泡去皮尖細辛各一錢全蠍二個焙上為細末麻油調敷川椒散治鼻流涕川椒開口者炒出汗訶子去核辣桂川白姜生用川芎細辛白朮各等分上為細末每用手微抓動患處以藥擦之愈硫黃散治酒糟鼻鼻上生黑粉刺硫黃生用輕粉各一錢杏仁二七個去皮上為細末唾津調臨臥時調塗鼻上早晨洗去細辛散治鼻齆有息肉不聞香臭北細辛瓜蒂各等分上為細末綿裹如豆大塞鼻中凌霄花散治酒糟鼻凌霄花山梔子各等分上為細末每服二錢食後茶湯調服增損通聖散治肺氣不和鼻塞不利鼠黏子桔梗桑皮紫菀各一錢半荊芥穗二錢甘草生用一錢上作一服水二盅生薑五片煎至一盅食後服菖蒲散治鼻內窒塞不通不得喘息菖蒲皂角各等分上為細末每用一錢綿裹塞鼻中仰臥少時羊肺散治肺虛上壅鼻生息肉不聞香臭羊肺一具洗白朮四兩木通肉蓯蓉川芎乾薑各一兩上除羊肺外為細末以水調稀稠得所灌入肺中煮熟細切焙乾為末每服二錢食後米飲調服消鼻痔方苦丁香甘遂各二錢青黛草烏尖白礬枯各二分半上為細末麻油搜合令硬不可爛旋丸如鼻孔大小用藥納入鼻內令至痔肉上其痔化為水肉皆爛下每日一次辛夷湯治肺氣不利頭目昏眩鼻塞聲重咯嚀稠黏辛夷去毛川芎白芷甘菊花前胡石膏白朮生地黃薄荷赤茯苓去皮陳皮去白各一兩甘草炙二兩上㕮咀每服五錢水一盞半煎至一盞去滓食遠溫服醍醐散治傷風鼻塞聲重細辛半兩川芎一兩薄荷一兩半川烏炮去皮臍撫芎白芷甘草各二兩上為細末每服一錢蔥茶調下薄荷湯調亦可通關散治腦風鼻息不通不聞香臭或鼻流清涕多嚏肩項拘急頭目昏痛風府怯寒原蠶蛾瓦上焙黃白附子炮益智去皮蒺藜炒去角薄荷苦參各一兩上為細末每服三錢不拘時溫酒調下又方治鼻中窒塞氣息不通皆有肉柱若不得出終不能瘥余藥雖漸通利旋覆生長宜服此藥地膽二十枚白雄犬膽一枚上先搗地膽為細末納犬膽中以繩系定三日乃於日出時令病人西首臥中庭以鼻孔向日傍人以故筆黏藥塗入鼻孔中一日一度至五六日當鼻孔里近眼痛此是欲落更候三四敷之漸漸嚏之即落落後急以綿塞之慎風治鼻塞不通及治衄血上用小薊一把水三升煮取一升去滓溫服曾有人陰冷漸漸冷氣入陰囊腫滿恐死夜疼痛不能眠煮大薊根汁服之立瘥一方為末酒調服禦寒湯治寒氣風邪傷於皮毛令人鼻塞咳嗽上喘黃耆二錢陳皮人參升麻各五分蒼朮七分款冬花黃連各一分佛耳草白芷防風羌活甘草炙各三分黃柏二分上作一服水二大盞煎至一盞去滓稍熱服防風湯治鼻塞不聞香臭防風七兩梔子七枚升麻一兩石膏一兩半麻黃去節三分官桂去皮半兩木通一兩一分上㕮咀每服三錢水一盞煎至七分去滓空心溫服排風散治鼻塞不通不聞香臭或生息肉防風秦艽去苗土吳茱萸湯浸焙炒天雄炮去皮臍山芋各一兩羌活半兩上為細末每服二錢空心溫酒調下通頂散治鼻塞不聞香臭胡黃連研滑石研各一分瓜蒂七枚研麝香一錢研蟾酥半錢研上研勻每用少許吹入鼻內即瘥川芎散治鼻塞不聞香臭川芎辛夷各一兩細辛去苗三分木通半兩上為細末每用少許綿裹塞鼻中濕則易之五七日痊瓜蒂散治鼻塞不聞香臭瓜蒂藜蘆各一分上為細末每服一錢綿裹塞鼻中日三易之一方以狗膽汁和綿裹塞鼻中蒺藜汁方治鼻塞多年不聞香臭清水出不止上取當道車碾過蒺藜一把搗以水三升煎取熟先仰臥使人滿口含飯取一合汁灌鼻中使人不過再度大嚏必出一兩個息肉似赤蛹蟲一方有黃連等分同煎溫肺湯治鼻不聞香臭眼多眵淚麻黃不去節四錢升麻黃耆丁香各二錢乾葛防風羌活甘草炙各一錢上㕮咀作二服水二盞蔥白二根煎至一盞去滓食後服溫衛湯治鼻不聞香臭目中溜火氣寒血熱冷淚多臍下冷陰汗多痿弱蒼朮升麻柴胡黃耆知母羌活各一錢青皮陳皮黃連木香各三分當歸身一錢半澤瀉黃柏白芷防風人參甘草炙各半錢上㕮咀作一服水二盞煎至一盞去滓食前溫服川芎散治鼻塞為齆川芎檳榔肉桂麻黃去節防己木通細辛石菖蒲白芷各一分木香川椒甘草炙各半分上㕮咀每服三錢水二盞生薑三片紫蘇葉少許煎至八分去滓食遠溫服山茱萸丸治齆鼻山茱萸大黃銼炒菊花各一兩一分朴硝三兩三分附子炮去皮臍獨活各三分秦艽去苗土一兩半蔓荊子去白皮山梔子去皮炒防風甘草炙各一兩上為細末煉蜜為丸如梧桐子大每服三十丸空心用溫酒送下老人亦宜服妊娠去附子加細辛半分赤龍散治鼻齆大抵鼻者由肺氣注於鼻上榮頭面若上焦壅滯風寒客於頭腦則氣不通冷氣停滯搏於津液膿涕結聚則鼻不聞香遂成齆也龍腦半錢研瓜蒂十四枚黃連三大莖赤小豆三十粒上為細末研勻每用綠豆許臨臥吹入鼻中水出愈通頂散治鼻齆瓜蒂藜蘆各一分皂角肉半分麝香少許上為細末每用少許吹入鼻中雄黃散治鼻齆雄黃半錢瓜蒂二枚綠礬一錢麝香少許上為細末每用少許搐鼻中亦治息肉黃白散治鼻齆息肉鼻痔等證雄黃半錢白礬瓜蒂細辛各一錢上為細末以雄犬膽汁和丸綿裹塞鼻一方為末搐鼻治息肉方甘遂硃砂雄黃雌黃藜蘆瓜蒂明礬煅各等分上為細末蜜調敷鼻息肉處二丁散治鼻中生息肉苦丁香丁香粟米赤小豆各七粒石膏少許上為細末以竹筒吹入鼻中如鼻不聞香臭亦可吹或偏頭風亦可吹皆效一方無粟米石膏治鼻痔方明礬一兩蓖麻七個鹽梅五個去核麝香少許上搗為丸綿裹塞鼻內令著息肉候化清水出四邊自然玲瓏其息肉自下瓜丁香治鼻有息肉不聞香臭此藥敷之即化黃水點滴至盡不三四日遂愈不復作瓜丁即瓜蒂細辛各等分上為細末綿裹綠豆許塞鼻中須臾即通地龍散治鼻中息肉地龍去土炒二分豬牙皂莢一挺上煅存性研為末先洗鼻內令淨以蜜塗之敷藥少許在內出清水盡其息肉自除沒藥散治風冷搏於肺臟上攻於鼻則令鼻痛沒藥研乾蠍去土炒南星炮白附子炮雄黃研當歸切焙丹砂研胡黃連牛黃研白芷麝香研官桂去皮丁香甘草炙各一分烏蛇酒浸去皮骨炙半兩上為細末研勻每服半錢溫酒調下早晚各一服白蘚皮湯治肺受風面色枯白頰時赤皮膚乾燥鼻塞干痛此為虛風白蘚皮麥門冬去心焙白茯苓去皮杏仁去皮尖雙仁研細辛去苗白芷各一兩半桑白皮切石膏研各二兩上㕮咀每服三錢水三盞先煮大豆三合取汁一盞去豆下藥煎至七分去滓不拘時溫服葫蘆酒治鼻塞眼昏疼痛腦悶上取苦葫蘆子碎以醇酒半升浸之春三夏一秋五冬七日少少內鼻中一方以童子小便浸之脂膏方治卒食物從鼻中縮入腦中介介痛不出上以牛脂或羊脂如指頭大內鼻中以鼻吸取脂入須臾脂消則物逐脂俱出也雁鴨脂亦可用神效宣腦散取黃水鼻中下立效川鬱金川芎青黛薄荷小黃米各二分上為細末每用少許口噙冷水搐鼻中川芎丸治腦瀉臭穢川芎生用二兩蒼朮生用一兩草烏生去皮尖半兩上為細末麵糊和丸如梧桐子大每服十丸食後茶清送下服藥後忌熱物一時治鼻淵腦瀉上用生附子為末煨蔥涎和如泥夜間塗湧泉穴細辛散治肺傷風冷鼻流清涕頭目疼痛胸膈不利細辛一兩附子炮去皮臍白朮訶黎勒煨去核蔓荊子川芎桂心各三分枳殼麩炒甘草炙各半兩上㕮咀每服三錢水一盞生薑半分煎至六分去滓食後溫服塞鼻柱膏治鼻常有清涕桂心細辛乾薑炮皂莢一分川椒去目併合口者炒出汗各半兩上為細末以羊脂和成膏每用如棗核大綿裹塞鼻中白芷丸治鼻流清涕不止上將白芷研為細末以蔥白搗爛和為丸如小豆大每服二十丸不拘時茶湯送下烏犀丸治鼻中生瘡烏犀鎊羚羊角鎊牛黃研柴胡淨各一兩丹砂研天門冬去心焙貝母炒去心胡黃連人參各半兩麥門冬去心焙知母各三分黃芩甘草炙各一分上為細末研勻煉蜜和丸如梧桐子大每服二十丸空心用溫酒送下地黃煎治鼻生瘡癢痛不止生地黃汁生薑汁各一合苦參一兩銼酥三合鹽花二錢後入上將地黃汁生薑汁浸苦參一宿以酥和於銅石器中煎九上九下候汁入酥盡去滓傾入盒中每用少許滴於瘡上諸風熱瘡亦佳其鹽花至半卻下辛夷膏治鼻內生瘡疼痛或窒塞不通及治鼻齆氣不宣通並宜塗用之甚效辛夷一兩細辛木香木通白芷杏仁湯浸去皮尖研各半兩上為細末以羊髓豬脂各二兩同諸藥於石器中慢火熬成膏待冷入龍腦麝香末各一錢為丸以綿裹塞鼻中數日內即愈椿根湯治疳蝕口鼻椿根去皮切一升蔥白細切半升豆豉半升鹽半合川椒去目井合口者炒出汗一合上合和以醋及清泔各三升煎十數沸去滓約及一升分作三服有惡物下即效小兒量大小加減烏香散治鼻疳侵蝕鼻柱草烏燒灰麝香研各等分上研極細以少許貼瘡上治鼻口急疳蝕數日欲死上用藍靛傅之令遍日十度夜四度立瘥犀角散治肺熱鼻乾無涕心神煩悶犀角屑木通升麻赤茯苓黃耆馬牙硝杏仁湯浸去皮尖雙仁炒黃各半兩麥門冬去心一兩硃砂研龍腦研甘草炙各一分上為細末每服一錢食後竹葉湯調下桑根白皮散治肺臟積熱皮膚乾燥鼻痛無涕頭疼心悶桑根白皮木通大黃銼炒各一兩升麻一兩半石膏葛根各三兩甘草炙赤一兩上㕮咀每服三錢水一中盞煎至六分去滓食後溫服吹鼻散治鼻乾無涕龍腦半錢馬牙硝一錢瓜蒂十四枚為末上研極細每用一豆大吹入鼻中何首烏丸治肺風面赤鼻赤何首烏一兩半防風黑豆荊芥地骨皮洗各一兩桑白皮天仙藤苦參赤土各半兩上為細末煉蜜和丸如梧桐子大每服三四十丸食後用茶清送下一方有藁本一兩治赤鼻方小椒雄黃枯礬舶上硫黃天仙子三柰各一兩輕粉麝香各少許上為細末小油調搽患處冬瓜子散治鼻面酒糟如麻豆疼痛黃水出冬瓜子仁柏子仁白茯苓葵子微炒枳實麩炒各一兩梔子仁二兩上為細末每服二錢食後米飲調下治肺風鼻赤草烏尖七個明礬半錢麝香一字豬牙皂角一錢上為細末以大楓油和勻用瓷器火上熔開先以姜擦次以指蘸藥擦之一日三次無不效治酒渣鼻生硫黃三錢黃連白礬乳香各一錢半輕粉半錢上為細末用唾津蘸藥擦之一日二次須塗去赤為度治酒渣鼻並鼻上贅肉及面上雀子斑等疾亦可點痣黃丹五文硇砂二十文研極細巴豆十個去殼心用紙捶去油酒餅藥五十文罐子盛上同入餅藥罐子中慢火熬兩三沸取下續入研細生礦灰三錢雞子清調勻酒渣鼻以鵝毛掃紅處一日一次上藥追出毒物病退即止次服消風散樺皮散之類五七貼雀子斑用小竹棒兒挑藥點患處才覺微腫即洗去不洗去恐力太猛趙君猷撫干所傳云二卿趙再可知湖州時與一詩僧相厚而僧患酒渣鼻端生赤贅數枚大者如橘小者如梅李下垂過口飲食言語皆所妨廢良自厭惡之郡有一小兵事刀鑷人但聞其善取靨誠不知其能治酒齆也一旦自言於僧請醫此疾即以藥敷之凡半月餘每日取惡物如膿血自皮膚中出者甚多其贅後悉成痂落去鼻面瑩然遂以十千錢為謝且語二卿俾直齋閣而求得其方以傳秀卿治人良驗治赤鼻及面上風瘡大楓油五十文草烏一個為末輕粉麝香各一百文上先將草烏入油內熬令勻取出少時後下輕粉麝香末攪勻每用少許塗擦患處令熱旬日得瘥一方無輕粉以生薑擦患處敷藥治酒渣鼻及婦人鼻上生黑粉刺生硫黃半兩杏仁二錢半輕粉一錢上為細末用酒餅藥調臥時塗上早則洗去數次絕根治赤鼻肺風詩曰肺風鼻赤最難醫我有良方付與伊但用硫礬為細末茄汁調塗始見奇荊芥散治肺風齄疱荊芥穗四兩防風杏仁去皮尖白蒺藜炒去刺白殭蠶炒甘草炙各一兩上為細末每服二錢食後茶清調下蓖麻子膏治酒渣鼻及治肺風面赤生瘡蓖麻子去殼研輕粉研瀝青研硫黃研黃蠟各二錢麻油一兩上熬成膏以瓷合盛每用少許擦於患處蓽澄茄丸治鼻塞不通蓽澄茄半兩薄荷葉三錢荊芥穗二錢半上為細末煉蜜和丸如櫻桃大不拘時噙化一二丸千金細辛膏治鼻塞腦冷清涕常出細辛川椒川芎黑附子炮去皮乾薑吳茱萸各二錢半桂心三錢三分皂角屑一錢六分半上用豬脂二兩煎油先一宿以米醋浸藥取入豬油內同煎附子色黃為度以綿蘸藥塞鼻中抑金散治肺熱鼻塞涕濁細辛白芷與防風羌活當歸半夏芎桔梗陳皮茯苓輩十般等分銼和同三錢薄荷姜煎服氣息調勻鼻貫通通草膏治鼻齆有息肉不聞香臭通草附子炮細辛各等分上為細末煉蜜和丸如棗核大綿裹塞鼻內
