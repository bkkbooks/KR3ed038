body:
  text: 卷之六十一咽喉門附論戴人云咽與喉會厭與舌此四者同在一門而其因各異咽以納氣故咽氣通於天喉以納食故喉氣通於地會厭管乎其上以司開闔掩其食下不掩之其喉錯必舌抵上齶則會厭能閉其咽矣四者相交為用缺一則飲食廢而死矣此四者乃氣與食出入之門戶最急之處故為病也為咽痛喉痹之證是以難治輕者或治而愈甚者雖治必殆矣內經曰一陰一陽結為之喉痹王注曰一陰者手少陰君火心主之脈也一陽者手少陽相火三焦之脈也二火皆主脈並絡於喉氣熱則內結甚則腫脹腫脹則甚甚則痹痹甚而不通則死矣非惟二脈系此為病以十二經推之惟足太陽別下項其餘皆腠於喉嚨惟君相二火獨勝則熱結正絡故痛且速也故十二經中言嗌痛咽腫頷腫舌本強皆君火為之也惟喉閉急速相火之所為也夫君火者猶人火也相火者猶龍火也人火焚木其勢緩龍火焚木其勢速經言喉痹則咽與舌在其中矣以其病同是火故不分也後之學者各詳其狀今略咽喉一十八證一曰單蛾風其形圓如小箸頭生於咽喉關上或左或右可治生於關下者難治二曰雙蛾風生兩個在喉關兩邊亦圓如小箸頭大或生關下者難治三曰蟬舌風又名子舌自舌下再生重舌者是也四曰牙蜞風牙齦上腫盛聚毒成瘡者是五曰木舌風其舌漸漸長大相似煮熟豬舌不能轉動六曰舌黃風自舌上腫痛黃色七曰咬牙噤風牙盡頭作臖口噤不開八曰魚口風如魚吸水者不治九曰聚毒塞喉風喉關聚毒涎唾稠實發寒熱仍分上下關上者依法治療關下者難治十曰懸蜞蟲毒風上眶腫食而不能掩水外形腫如雞卵十一曰搶食風又名飛絲毒口中或食腥鱠之惡物發泡者十二曰獵頰風腮頰結腫者是牙盡處腫破十三曰纏喉風風自頤邊過頤下赤色者是亦有寒熱甚者危殆十四曰松子風口內滿喉赤如豬肝張口吞物則氣逆關閉飲食不能者用吹喉藥或絳雪點腫處輕者退甚者喉關響急不治十五曰崩砂甘口風自舌下牙齦上下腫赤口內作臖如湯熱牙齦漸甚爛者亦能脫齒十六曰連珠風自舌下起初起一個又起一個甚者三五七九個連珠者是也十七曰蜂子毒或在肋腮臉癢爛或在喉關舌下作臖其色黃如蜂者是十八曰走疰瘰癧風頸項結核五七個皮膚赤腫作寒熱者惟木舌者木者強而不柔和也熱結於喉頭腫繞於外且麻且癢腫而大者名曰纏喉風喉痹暴發暴死者名走馬喉痹於十八證外之別名雖為治若不歸之於火則相去遠矣其微者可以痠軟之其大者可以辛散之治此疾者世之有方如薄荷烏頭殭蠶白礬朴硝銅緑之類至如走馬喉痹何待此乎其死生如人之反掌之間耳其最不誤人者無如砭針出血血出則病已但人畏針委曲傍求若執不從瞬息喪命凡用針時喉中搶者宜搗生薑一塊入熱白湯時時呷之則搶而止治喉痹之疾如救火之法同豈可容易哉諸書治驗木舌脹者急以緋針小而鋭者砭之五七度腫減出血而安纏喉風腫藥不能下者以涼藥灌鼻中吐之外以拔毒散之劑敷之熱退腫消而已喉痹者龍火也雖用涼劑常令煎極熱時時呷之此藥熱行寒不為熱病扦格故也又常以扉針刺少商穴出血而愈後之業醫者須分人火龍火之病用藥無不取效矣咽喉通治方三黃丸治咽喉疼痛作腫痰涎壅盛方見積熱門上清丸治咽喉腫痛痰涎壅盛薄荷一斤川芎防風各二兩桔梗五兩砂仁半兩甘草四兩上為細末煉蜜和丸如皂角子大每服一丸不拘時噙化龍麝聚聖丹治心脾客熱毒氣攻心咽喉赤腫疼痛或成喉痹或結硬不消愈而復發經久不瘥或舌本腫脹滿口生瘡飲食難咽並皆治之南硼砂研川芎各一兩生地黃犀角屑琥珀研玄參羚羊角鉛白霜桔梗升麻連翹各半兩赤茯苓去皮人參馬牙硝片腦研各三錢硃砂飛牛黃研各二錢麝香研一錢上為細末研勻煉蜜和丸每兩作十丸金箔五十片為衣每服一丸用薄荷湯或新汲水化下或細嚼或噙化津液咽下食後臨睡皆可服祛毒牛黃丸治大人小兒咽喉腫痛舌本強硬口內生瘡涎潮喘急胸膈不利不欲飲食牛黃研三錢半南硼砂桔梗生地黃犀角取末人參琥珀研各半兩寒水石燒去火毒二兩鉛白霜片腦雄黃各一兩蛤粉水飛四兩玄參升麻各三錢硃砂研七錢上為細末研勻煉蜜和丸如小彈子大金箔為衣瓷器內收貯每服一丸濃煎薄荷湯化下或新汲水化服亦可食後日進三服或噙化亦得碧玉散治心肺積熱上攻咽喉腫痛閉塞水漿不下或喉痹重舌木舌腫脹皆可服青黛盆硝蒲黃甘草各等分上為細末研勻每用少許吹入咽喉內細細咽下若作丸用砂糖為丸每兩作五十丸每服一丸噙化咽下玉粉丸治冬月寒痰咽喉不利語音不出針經云寒氣客於會厭卒然如啞宜服官桂草烏各一字半夏洗五錢上為細末生薑自然汁浸蒸餅和丸如芡實大每服一丸至夜噙化多年不愈者並皆治之防風散治咽喉疼痛虛者少用實者多用防風去蘆一兩羌活殭蠶炒白藥子蜜炙硼砂荊芥黃藥子大黃濕紙裹煨令香熟細辛川芎紅內消山豆根鬱金甘草以上各半兩牙硝三錢薄荷半斤上為細末研薄荷汁同蜜少許調每服一匙不拘時服玄參散治懸癰腫痛不可忍玄參升麻射干大黃各一錢半甘草一錢上作一服用水二盅煎至一盅不拘時緩緩噙咽服追風散治咽喉腫痛黃丹朴硝豬牙皂角煅砂仁殼煅灰各半兩上為細末每用少許以鵝翎蘸藥入口中敷舌上下及腫處然後以溫水灌漱如咽喉間毒已破瘡口痛者用豬腦髓蒸熟淡薑醋蘸吃下立效升麻散治咽喉腫痛上膈壅熱口舌生瘡升麻人參乾葛赤芍藥桔梗去蘆各二錢甘草一錢上作一服用水二盅生薑三片煎至一盅食遠服七寶散治喉閉及纏喉風殭蠶直者十個硼砂雄黃全蠍十個頭尾全者去毒明礬豬牙皂角一挺去皮弦各一錢膽礬半錢上為細末每用一字吹入喉中即愈又方治喉閉青黛五分膽礬熟者二錢半豬牙皂角去皮弦五錢上為細末醋煮薄麵糊和丸如櫻桃大每用一丸以熟絹裹在箸頭上用好醋潤透將藥點在口內喉瘡上咬著箸其涎如水出即解後服防風通聖散防風通聖散方見風門硼砂散治喉風硼砂半兩朴硝一兩片腦三錢硃砂一錢雄黃半錢麝香少許上為細末以竹筒納藥吹入喉中即消碧雪散治咽喉閉壅一時不能言語痰涎壅盛燈心灰二錢硼砂一錢上為細末每用少許吹入喉中有涎吐出治風熱喉閉及纏喉風焰硝一兩半硼砂半兩片腦一字白殭蠶一錢上為細末每用少許吹入喉中噙之有涎吐出針法治喉閉上法針少商穴出血立愈其穴在兩手大指內側去爪甲角如韭菜許三稜針針之出血立效五香散治咽喉腫痛諸惡氣結塞不通急宜服之木香沉香雞舌香薰陸香各一兩麝香三分上為細末研勻每服二錢水一盅煎至一分不拘時服涼膈散治大人小兒臟腑積熱口舌生瘡咽喉腫痛痰涎不利腸胃祕澀一切風熱並皆治之方見火門甘露飲治胃中客熱牙宣齦腫咽喉乾燥伏熱在裡身黃如金並皆治之方見積熱門麝香硃砂丸治咽喉腫疼閉塞不通或生瘡癤舌根脹痛麝香二錢硃砂一兩半硼砂三兩寒水石煅淨四兩馬牙硝生用鉛白霜片腦各三錢甘草二十兩熬膏上為細末用甘草膏和丸如梧桐子大以硃砂為衣每服一二丸不拘時噙化咽下清心利膈湯治咽喉腫痛痰涎壅盛防風荊芥薄荷桔梗黃芩黃連各一錢半山梔連翹各一錢玄參大黃朴硝牛蒡子甘草各七分上作一服用水二盅煎至一盅食遠服勝金散治咽喉腫痛氣急諸項等證麝香旋入如婦人有孕不可用麝香不問冷熱虛實咽喉腫痛皆通用若痰盛者略加膽礬少許立效或吐無妨鬱金三兩大硃砂雄黃明者白礬半生半枯光粉各半兩干胭脂緑豆粉麝香各二錢半上為細末每服一匙食後薄荷湯調服白礬散治纏喉風急喉閉膽礬二錢半白殭蠶少去絲嘴半兩上為細末每用少許吹入喉中治咽喉牙關緊閉上用巴豆去殼以紙包巴豆肉用竹管奈出巴豆油在紙上將油紙作紙捻點燈吹滅以煙燻左右鼻孔中口鼻涎流牙關開矣碧雪治一切積熱咽喉腫痛口舌生瘡胸中煩躁咽物妨礙或喉閉壅塞水漿不下天行時疫昏憒並皆治之方見積熱門絳雪治咽喉腫痛咽物妨礙及口舌生瘡片腦半字硼砂一錢辰砂三錢馬牙硝寒水石各二錢上為細末研勻每用一字摻於舌上津液咽之吹喉散治三焦熱盛口舌生瘡咽喉腫塞神思昏悶方見口舌門甘桔湯治風痰上壅咽喉腫痛吞吐如有所礙苦桔梗一兩甘草炙二兩半上作一服水二盅煎至一盅食遠服利膈湯治脾肺有熱虛煩上壅咽喉腫痛方見積熱門解毒雄黃丸治纏喉風咽喉腫痛及上膈壅熱痰涎不利雄黃鬱金各二錢半巴豆去皮油十四粒上為細末醋糊和丸如緑豆大每服七丸用茶清送下吐出頑痰即愈玉鑰匙治風熱喉閉及纏喉風焰硝一兩半硼砂半兩片腦一字白殭蠶一分上為細末每用少許吹入喉中如聖散治風痰壅盛咽喉腫痛水穀不下牙關緊急雄黃細研白礬飛藜蘆去蘆豬牙皂角去皮炒黃上各等分為細末每用一字嗅入鼻內去痰為愈升麻散治上焦蘊熱口舌生瘡咽喉腫痛升麻人參桔梗赤芍藥乾薑甘草各二錢上作一服水二盅煎至一盅食遠服絳雪散治熱結喉間連頰腫不消心膈煩滿木通桔梗炒檳榔赤茯苓去黑皮木香官桂去皮人參升麻柴胡去苗各二兩枳殼去穰麩炒犀角鎊各一兩半訶黎勒去核五枚蘇枋木五兩桑根白皮山梔子各四兩朴硝研一斤丹砂研一兩麝香研一分上除朴硝丹砂麝香外各細銼以水二斗於銀器內慢火熬至七升以生絹濾去滓再煎至五升下朴硝以柳木箅動勿住手候稍凝即去火傾入盆中下丹砂麝香抹令勻以瓷器貯之勿令透氣每服一錢或二錢用冷蜜湯調下食後臨臥服看老少加減干喉風全蠍七個去毒硼砂三錢片腦麝香各半錢朴硝川烏當歸牛膝荊芥薄荷葛粉甘草各半兩上為細末用清泔調春用菘菜汁調夏用黃麥汁調如不能吞用豆腐切如棋子大蘸藥入口內含化或新艾上亦可開關潤喉蓬萊雪片腦麝香各一字硼砂明乳香沒藥各三錢全蠍去毒防風去叉百藥煎朴硝薄荷葉粉草各半兩上為細末每用少許以匙挑乾摻咽間及瘡上如在關下摻舌下旋旋咽下仍用薄荷桔梗甘草煎水噙漱或以薄荷研自然汁調成膏噙化亦妙奪命無憂散一名玉屑無憂散治纏喉風咽喉疼痛風涎壅盛口舌生瘡心腹脹滿脾積症塊小兒奶癖誤吞骨屑硬塞不下熱盛喉閉涎滿氣急悶亂不省人事並皆治之寒水石三兩煅玄參貫衆縮砂仁去殼滑石研黃連去毛茯苓山豆根荊芥甘草炙各半兩硼砂三錢上為細末每服一錢乾摻舌上後以新水咽下不拘時任是百毒硬物可以除化如吃著巴豆杏仁辛辣薑桂胡椒燥毒蔥韭蒜等物及諸藥毒火毒亦可用此藥每服半錢能潤三焦消五穀除三尸去八邪除九蟲趕瘟疫去醫渴疾其效如神魯直號金臺玉簡方龍腦散治馬喉閉頰腫咽痛龍腦研牛黃研玄參羚羊角屑沉香硃砂研犀角屑馬牙硝研甘草炙各一分川升麻半兩硼砂一錢研上除龍腦牙硝外為細末每服三錢匕水一盞竹葉七片煎至六分去滓溫服入龍腦牙硝一錢攪勻細細含咽龍腦丸治咽喉連頰頷腫日數深遠咽津液或發歇疼痛龍腦研升麻黃耆馬牙硝研大黃銼石膏碎麝香研甘草各一分玄明粉研三分生地黃二兩絞取汁上除地黃汁外研為細末以地黃汁和如干更入煉過蜜少許為丸如小彈子大每用一丸以綿裹含化咽津日四五次不拘時橘皮湯治馬喉痹勢如奔馬腫痛煩滿數數吐氣陳橘皮去白青竹茹生地黃切焙山梔子仁白朮黃芩去黑心各二兩官桂去粗皮一兩赤茯苓去黑皮二兩上銼碎每服三錢匕水一盞入生薑半分大紅棗二枚擘破煎至五分去滓下芒硝末一錢匕攪勻食後溫服日三仙方奪命丹治纏喉風木舌脹雙單乳鵝喉閉或誤吞雞魚骨刺竹木刺一切咽喉急證烏賊骨二錢半麝香一字白茯苓密陀僧炒白殭蠶直者貫衆縮砂仁紫河車甘草節各一兩上為細末研勻用蒸餅包白麵蒸熟四兩和藥汲新井華水丸如豌豆大蛤粉為衣放干十年不壞每服一丸以瓦器研碎新水半盞浸一茶時化開用匙挑藥徐滴入喉中勿急用取藥盡為度開喉關方硃砂三錢片腦麝香各半錢山豆根川烏青鹽薄荷甘草各半兩上為細末每用半錢臘月內菘菜汁夏月黃麥挼水或葛水調如涕唾稠黏用芭蕉水調或蜜丸指頭大含化龍腦破毒散治喉痹咽喉腫塞不通片腦麝香各一錢蒲黃半兩馬勃末三錢盆硝研細四兩青黛白殭蠶炒甘草生用各八錢上為細末研勻瓷器收每用一錢以新汲水半盞調勻細細呷咽如是喉痹即破出血便愈如不是喉痹自然消散若是諸般舌脹用藥半錢以指蘸藥擦在舌上咽津如小兒一錢作四五服亦如前法不拘時候射干湯治喉痹腫塞不通疼痛不下飲食並諸毒發動射干白芷當歸切焙各一兩杏仁湯浸去皮尖雙仁炒升麻犀角鎊甘草炙各半兩上㕮咀每服三錢匕水一盞煎七分去滓不拘時溫服日三忌海藻菘菜如勝金錠治急喉痹纏喉風飛揚單鵝雙鵝結喉重舌木舌腮頷腫痛屢經用藥不用吞水粥者硫黃研川芎川烏炮薄荷葉硝石研臘茶生地黃各等分上為細末以生蔥汁搜和為錠每服先用新汲水灌漱吐出吹嚼生薄荷五七葉微爛用一錠同嚼極爛以井水咽下甚者連進三服即愈重舌腮腫先服一錠次以一錠安患處便消冒暑伏熱不省人事生薄荷水調研一錠灌下即蘇行路常噙一錠即無暑熱之患口舌生瘡不能合口並食熱物如上法服訖用水灌漱嚼薄荷十葉如泥吐出再以水灌嚼藥一錠噙口內聚涎裹之如涎滿吐出如此服三錠便能食酒醋遇食鹹酸酢餔炙爆喉中生泡須掐破吐血方著薄荷數葉以一錠同嚼井花水吞下沙淋熱淋小便出血用車前草七葉生薑一小塊研爛水調去滓嚼藥一錠以水送下分陰陽去風熱化血為涎化涎為水常帶隨身備急一錠可治一人小兒只服半錠一方去川烏加貫衆以嫩茶代臘茶如神散治咽喉一切急患不得開雄黃藜蘆玄參白殭蠶炒白礬生用各二錢乳香一字上為細末研勻每用一字兩鼻內嗅之口含水及舌下擦嚏出涎立效金鎖匙凡人卒中喉痹口噤咽喉腫痛木舌重舌鬱金大黃草烏豬牙皂角去皮煨南星各四錢巴豆五個去心不去油上為細末用生薑自然汁調半錢許鵝翎拂入喉中已死者用竹管吹入須臾醒然後用藥半錢以生薑汁調吃以吐瀉為驗碧雪治一切壅熱咽喉閉腫不能咽物口舌生瘡舌根強言語不正腮項腫痛蒲黃青黛硼砂焰硝甘草各等分上為細末每用手指捻摻於喉間咽津或冷水下頻用之一字散治喉閉氣塞不通飲食不下者或咽喉疼雄黃一分別研蠍梢七枚白礬生研藜蘆各二錢豬牙皂角七錠上為細末每用一字吹入鼻中即時吐出頑涎即愈一方無蠍梢亦治時氣纏喉風纍用救人萬無一失一捻金散治喉閉欲死及治咽喉疼地龍八錢麝香少許全蠍微炒白殭蠶炒鬱金甘草炙各半兩上為細末每用一字吹入喉內舌根不數次愈牛膽膏治鎖喉風青黛一錢殭蠶半兩去絲朴硝一兩研甘草二錢半生用上為細末用臘月黃牛膽入藥在內當風挂百日取出再入研麝香少許同研細每服半錢用井花水調服或吹入喉中一方不用牛膽吹喉內一方無麝香一方各等分治鎖喉風明礬輕粉銅緑鴨嘴膽礬各一字江茶半錢上研細每以新汲水逐旋調和呷咽之如吐即愈奪命箸頭散治急喉閉咽喉腫滿堵塞氣不得通欲死者膽礬草烏各四錢緑礬六錢雄黃二錢上為細末每用箸頭蘸藥點咽喉內急吐涎沫次以大黃甘草等分俱為粗末每服三錢水一盞半煎至一盞去滓化乳香一粒溫服滌去熱毒恐為再發一方加白礬二錢雄黃散治纏喉風喉痹先兩日胸膈氣緊取氣短促忽然咽喉腫痛手足厥氣痹不通頃刻不治雄黃透明者如皂角子大一塊研細干桑黃菰二片巴豆七粒三生四熱生者去殼生研熟者去殼燈上燒存性鬱金一枚蟬肚者研為末上研勻每用半字茶清少許下如口噤咽塞用小竹管納藥吹入喉中須臾吐利即愈一方無干桑黃菰如聖湯治痰去熱利咽喉治咽中有瘡咽物不下及咳嗽咯血肺痿痰唾氣促並小兒瘡疹毒攻咽喉腫痛麥門冬半兩牛蒡子炒桔梗甘草生用各一兩上為細末沸湯調細細服入竹葉煎尤妙地龍膏治纏喉風活地龍五條須用白頸者白梅肉二個朴硝二錢上同研成膏挑入喉中含化山豆根湯治熱喉閉山豆根射干升麻各等分上銼碎每服三錢水二盞煎至七分去滓通口時時呷之奪命散治急喉風等證白礬枯南硼砂豬牙皂角去皮弦子各等分上為細末每用少許吹喉中痰出即愈治喉中毒百發百中及咽喉內一切疾皂角略炮高良薑各等分上為細末嗅鼻或已甚先須含香油一口不可吞就後嗅之如已結成候少頃惡物膿血隨油麵出輕者只含水亦如前法一用竹管吹入喉中涎出愈去涎方草烏尖鴨嘴青膽礬各等分上為細末先用釅醋煮皂角調鵝翎刷敷赤腫處開口流出涎即將綿球一指頭大以布線系定蘸前藥末吞咽至腫處即抽出就如此一二次其毒即破開口流出去盡涎血即以後合瘡口藥點上停久溫鹽水灌漱後進食白礬黃丹麝香各等分上研極細每用以銅箸頭瘡口上金鎖匙治咽喉腫塞雄黃研末半分巴豆一粒去油上作一服用生薑自然汁調灌下或吐或利皆愈一方細研每遇急患不可針藥者用酒瓶裝灰坐瓶嘴下裝火一炷焚之候煙起將瓶嘴入一邊鼻中以紙覆瓶口熏之愈立聖膏治纏喉風齊州半夏巴豆各三七粒上將半夏輕捶每料分作四片巴豆剝去心膜銀銅石器內用米醋三大碗文武火熬盡醋為度以清醋微洗過研為膏每患纏喉風或喉痹或癇疾挑一斡耳以生薑自然汁一茶腳化下甚者灌藥少時吐出惡涎如魚凍相似極有功效立應丸一名如聖散治纏喉風及喉閉南星一個刮去皮一方炮地埋一夜去火毒白殭蠶七個將南星中心剜作孔入蠶在內以濕紙裹文武火煨熟取出等分為末粥飲丸如梧桐子大如不丸只以綿裹藥末吞之亦可如開口不得揩牙齒上亦妙又為末每一字以生薑汁調下如開喉不得以小竹管擘口灌之涎自出小可只塗於唇上後用大薑一塊略炙過含之一方用蜜薑汁調藥以鵝翎蘸藥繳口內有涎吐出即可治咽喉不得用針者上以小口瓶內燒蛇床子煙張口受煙一熏即破潤關住痛方上以生薄荷研蜜調成膏送入咽喉下立效如涎多未退再用如更不開可通頂又用蔥頭兩個捶碎安牙床頭處立開妙紫菀方治纏喉風喉閉飲食不通欲死者上用返魂草根一莖即紫菀內入喉中待取惡涎出即可如患乳鵝刺破後更以紫菀濃煎湯咽下更以馬牙硝末挑一錢入咽間即愈一名紫菀又南中呼為夜牽牛是也如聖丸一名寬咽救生散治纏喉風一切喉痹危急及走馬喉痹等證上用白殭蠶不拘多少直者新瓦上炒為末以生薑自然汁和丸如雞頭實大含化急者生薑汁調一大盞以竹筒灌入喉中即吐出頑涎半升許再服再吐將大黃一片如指大一分厚口內含咽半食間再換大黃含至三片皆愈若語不得神不清扶起坐灌藥從鼻入治豎鵝方上用芥菜子一合研細用好釅醋取汁濾淨以鵝毛蘸入喉內待喉內如雷響卻用隔年麻骨燒煙吸入喉中愈治急喉腫閉詩曰急喉腫閉最堪憂只用盛燈盞內油甚者不過三五呷此方原是聖人留奪命丹治大頭病及治五種喉閉詩曰人間治疫有仙方一兩殭蠶二大黃薑汁和丸如彈大井花調蜜便清涼一方為末生薑汁如蜜水調服名五痹散治喉痹及毒氣上以附子一枚破作大片蜜塗炙令黃含咽汁甘盡更塗炙更含如前法治喉痹卒不得語上用商陸以苦酒熬令濃熱傅之治喉痹方元公章少卿説開德府士人攜僕入京其一日忽患喉痹脹滿氣塞不通命在頃刻詢諸郡人云惟馬行街山水李家可看治即與之往李駭然曰證候危甚猶幸來用巴豆油紙作捻火著煙起吹滅之令僕張口刺於喉間俄然吐出紫血半合即時氣寬能言及啖粥飲摻藥傅之立驗後還鄉里材落一醫偶傳得此術云咽喉病發於六腑如引手可探及刺破瘀血即已若發於五臟則受毒牢深手法藥力難到惟用紙捻為第一然不言所用之意後有拾得其殘者蓋預以巴豆油紙故施火即著藉毒氣徑赴病處瓜蒂散治纏喉風咽中如束氣不通上用甜瓜蒂不限多少細研為末壯年一字十五歲以上及年老者服半字早晨用井花水調下一時須含砂糖一塊食久涎如水出年深者涎盡有一塊如涎布水上如鑑矣涎盡食粥一兩日如吐多困甚即咽麝香湯一盞即止矣麝香須細研以溫水調下此藥不大吐逆只吐涎水上瓜蒡須採自然落者用如未用以檳榔葉裹於東牆有風處挂令吹乾用射干丸治懸癰腫痛咽喉不利射干甘草炙杏仁湯浸去皮尖及雙仁麩炒微黃各半兩木鱉子川升麻川大黃微炒各一分上為細末煉蜜和丸如小彈子大常含一丸咽津玄參散治懸癰腫痛不能下食玄參一兩射干大黃升麻各半兩甘草一分上為細末每服三錢水一盞煎至七分放溫時時咽燒鹽散治喉中懸癰垂長咽中妨悶上用燒鹽枯礬研細各等分和勻以箸頭點之即消馬牙硝散治喉癰及傷寒熱後咽痛閉塞不通毒氣上衝上用馬牙硝細研每服一錢綿裹含咽津以通為度射干散治懸癰腫痛咽喉不利胸中煩熱射干天竺黃研馬牙硝研各一兩犀角屑玄參川升麻白藥黃藥甘草炙各半兩上為細末研勻煉蜜和搗三二百杵丸如小彈子大不拘時以綿裹一丸含咽津硼砂散治懸癰腫痛硼砂研馬牙硝滑石寒水石各二錢片腦研一錢白礬枯一錢半上為細末每用半錢不拘時新汲水調服啓關散治風熱客搏上焦懸癰腫痛惡實炒甘草生用各一兩上為末每服二錢匕水一盞煎六分旋含之食久咽下治喉內生癰方五倍子白殭蠶甘草各等分上為細末用梅肉和丸含化其癰自破聖藥筒治懸癰腫脹咽喉閉塞急令開口看有蛾無蛾若有須是針破方可若望不見以萆麻子打碎以紙卷作筒一頭燒煙起竟以煙燻咽喉內自然可開才望見即以三稜針刺破出紫血半盞便愈昔有貴宦之家不容用針者則惑之曰用筆蘸藥先以針安筆內刺之一方用巴豆依前法燒熏或只以巴豆萆麻子二味榨油在紙上以紙作捻子燒熏即愈橘葉湯治咽喉間生肉層層相疊漸漸腫起不痛多日乃有竅子臭氣自出遂退飲食上用臭橘葉煎湯連服愈治喉癰方楊立之自廣府通判歸楚州喉間生癰既腫潰而膿血流注曉夕不止寢食俱廢醫者束手適楊吉老求赴郡守招立之兩子走往邀之至熟視良久曰不須看脈已得之矣然此疾甚異須先啖生薑片一斤乃可投藥否則無法也語畢即出子有難色曰喉中潰膿痛楚豈宜食生薑立之曰吉老醫術通神其言不妄試取一片啖看如不能進則屏去無害遂食之殊有甘香稍加益至半斤許痛處已寬滿一斤始覺味辛辣膿血頓盡粥飲入口了無滯礙明日招吉老謝而問之對曰君居南方多食鷓鴣此禽好啖半夏久而毒發故以薑製之今病源已清無服他藥豫記唐小説載崔魏公暴亡醫梁新診之曰中食毒僕曰常好食竹雞梁曰竹雞多食半夏苗蓋其毒也命攪生薑汁折齒灌之遂復活甚與此相類也治咽喉痛方上以山豆根常常含咽津黃耆散治咽喉內生瘡疼痛黃耆檳榔紫菀洗去土牛蒡子梔子仁赤茯苓甘草生用各半兩麥門冬去心焙玄參各一兩川升麻黃芩各三分上銼碎每服二錢水一中盞煎至六分去滓不拘時溫服桃紅散治喉中生瘡腫赤紫色咽嗌痛咽物有妨金箔十片銀箔十片寒水石四兩太陰玄精石二兩二味搗碎入一盒子內火煅令通赤取出埋地土內出火毒研細鉛白霜少許馬牙硝研丹砂研甘草炙為末各一兩上為細末研勻每服一字甘草水調下或以稀糯米粥和丸如豌豆大含化咽津琥珀犀角膏治咽喉口舌生瘡菌真琥珀研犀角屑生用各一錢人參去蘆酸棗仁去皮研茯神去皮木辰砂研各二錢片腦研一字上為細末研勻煉蜜和為膏以瓷器收貯其疾作每服一彈子大以麥門冬去心濃煎湯化下一日連進五服救命散治脾胃熱毒上攻咽喉有瘡並纏喉風膩粉三錢匕五倍子一分大黃銼炒白殭蠶直者炒黃連去須甘草生各半兩上為細末每服一字大人以竹筒吸之小兒以竹筒吹之如餘毒攻心肺咽有瘡用男孩兒奶汁調藥一字以雞翎探之嘔者生不嘔者死牛蒡子丸治咽喉內熱毒所攻生瘡腫痛牛蒡子一兩微炒川升麻黃藥子干浮萍草玄參甘草生用各半兩上為細末煉蜜和丸如小彈子大常含一丸咽津硼砂散治心脾風熱所發咽喉生瘡腫疼或子舌脹或木舌重舌腫悶塞水漿不下硼砂研三兩薄荷葉蒲黃各一兩寒水石燒過研二兩半管仲玄參青黛研各半兩白茯苓去皮縮砂仁滑石研荊芥穗山豆根甘草生用各半兩上為細末研勻每服半錢不拘時用新汲水調下或諸舌脹摻在舌上咽津馬牙硝煎治咽喉氣塞腫痛氣欲絶者馬牙硝木通銼升麻瞿麥穗犀角屑馬藺子各一兩半玄參射干各一兩上細銼以水五盞煎至一盞去滓下白蜜二兩再煎成膏每服一匙含化咽津治咽喉忽然氣塞喘息不通須臾欲絶上用獨顆蒜一枚削去兩頭可塞鼻竅如患左塞右患右塞左鼻中喉中膿血出立愈射干湯治咽喉生谷賊咽物妨悶射干升麻玄參木通各三分桔梗一兩炒甘草半兩上銼細每服三錢匕水一盞入竹葉七片煎至五分去滓不拘時溫服日三射干散治咽喉中如有物妨悶噎塞疼痛咽物不下射干桔梗川升麻犀角屑各三錢木香木通銼各半兩紫蘇子炒訶黎勒去核檳榔枳殼去穰麩炒赤茯苓甘草炙各一兩上銼細每服三錢水一盞煎至八分去滓不拘時溫服含化龍腦丸治咽喉中有物如彈丸日數深遠津液難咽發渴疼痛即須深針腫結處散盡毒氣龍腦研射香研各一分川升麻馬牙硝鍾乳粉黃耆各一兩川大黃微炒甘草炙各半兩生地黃五兩取汁和藥上為細末研勻以地黃汁更入煉蜜和丸如楝子大不拘時以綿裹一丸噙化咽津以咽喉通利為度木香散治咽喉中如有物噎塞吞不能入吐不能出木香半兩紫雪射干羚羊角屑犀角屑檳榔各一兩玄參桑根白皮川升麻各一兩半上銼碎每服三錢水一中盞煎至六分去滓不拘時溫服絡石湯治咽喉中如有物噎塞絡石即石薜荔紫菀去苗土各半兩升麻射干各三分木通赤茯苓去黑皮桔梗炒各一兩上銼碎每服一錢匕水一盞半煎至八分去滓食後溫服如要通利及湯成加芒硝末一錢匕攪勻服之四味湯治咽喉中如有物咽吐不利半夏以生薑汁浸一宿湯浸切洗厚朴刮去粗皮以生薑汁浸炙黃陳橘皮以湯浸去白焙各一兩赤茯苓刮去黑皮二兩上銼碎每服三錢匕水一盞入生薑一棗大拍碎煎至六分去滓食遠溫服杏仁煎丸治咽喉食即噎塞如有物不下杏仁湯浸去皮尖及雙仁炒半兩官桂去粗皮枇杷葉拭去毛炙人參各一兩上為細末煉蜜和丸如櫻桃大每服一丸含化咽津以瘥為度玄參升麻湯治咽喉妨悶會厭後腫舌赤玄參白殭蠶鼠黏子甘草各二分桔梗連翹各三分升麻黃連各五分防風一分黃芩炒四分上銼如麻豆大作一服水二盞煎至七分稍熱噙漱時時咽之即愈會仙救苦丹治咽喉閉塞有妨咽物亦治骨鯁寒水石煅烏賊骨白殭蠶揀甘草炒各一兩縮砂仁白茯苓管仲各半兩射香少許南硼砂象牙末各一錢上為細末稀麵糊和丸如芡實大以硃砂為衣每服一丸噙化咽津合藥須擇庚申甲子日無比散治咽喉腫毒疼痛青黛薄荷白殭蠶馬牙硝桔梗板藍根紫河車甘草各等分上為細末每用乾摻或煉蜜和丸噙化亦可山豆根丸治積熱咽喉閉塞腫痛山豆根一兩北大黃川升麻朴硝生各半兩上為細末煉蜜和丸如皂角子大每服一丸以薄綿包待少痛便含咽津治咽喉腫方鬱金甘草馬牙硝研細將來冷水調更入殭蠶並半夏自然風熱不能潮牛蒡子湯治風熱上攻咽喉腫痛或生癰瘡有如肉臠牛蒡子炒玄參升麻桔梗炒犀角鎊黃芩木通去節甘草各等分上㕮咀每服四錢水一盞生薑三片煎至八分去滓不拘時溫服一方無犀角有羌活備急散治咽喉腫痛生瘡涎堵水穀難下盆硝四兩紫河車青黛各半兩白殭蠶三錢炒蒲黃一兩薄荷二兩半甘草二兩上研細末和勻每以半錢不時吹入咽喉中一方無蒲黃青黛神效破棺散治咽喉瘡毒腫痛膽礬銅緑白殭蠶馬牙硝各等分上為細末每用一字吹入喉中立效如走馬喉閉牙關緊急不省人事可用鐵物斡開口以冷水調一字灌下立效發聲散治咽痛不妨咽物咽物則微痛不宜用寒涼藥過泄之此妨悶非熱也白殭蠶微炒栝蔞去穰各半兩桔梗新白者七錢半甘草一錢炒上為細末每用少許吹入咽喉中大腫痛左右有紅或只一邊紅紫長大水米難下用此藥一錢加入朴硝一錢匕和勻吹入喉中生赤腫或有小白頭瘡用此藥一錢匕入白礬末半錢匕和勻干吹祕傳解毒丸治一切諸瘡痍之疾咽喉腫痛管仲山豆根黃藥子寒水石牙硝草龍膽雄大豆百藥煎乾葛紫河車山梔子甘草節薄荷緑豆粉大黃各四兩山慈菰二兩上為細末和勻煉蜜和丸如芡實大以銀箔為衣每服一丸不拘時噙化咽津覺效為度王醫師法上冬月於臨臥時食生蘿蔔三五片可無咽喉之疾百靈丸治咽喉中結核塊水食下不危困欲死者上用釜底百草霜研細煉蜜和丸如龍眼大每服一丸以新汲水化開灌下甚者不過三丸即愈治一切咽頷腫毒上用蟬殼為末以豬膽汁和蜜調敷腫處
