body:
  text: 卷之二十霍亂門附論內經云太陰所至為中滿霍亂吐下河間言霍亂吐下濕為留飲痞膈而傳化失常故甚則霍亂吐瀉也病起於中焦皆因冒暑中熱或因渴大飲或飲而過量或飢而飽食或食而過度飲食不節寒熱不調清濁相干陰陽乖隔時當夏月風濕暍三氣應之故其邪大作矣風者風木也內應足厥陰肝木濕者濕土也內應足太陰脾土暍者火熱也內應手少陰心火此三經各為顯然之病經言諸轉反戾水液渾濁皆屬於熱熱氣燥爍於筋故筋轉而痛應風屬於肝也故諸轉筋以湯漬之而使腠理開泄陽氣散則愈矣因湯漬而愈俗反疑於寒也又言濕勝則濡瀉瀉為濕土也而脾主濕應濕屬於脾也又言諸嘔吐逆皆屬於熱王注曰炎熱薄爍心之氣也心火炎上胃膈熱甚故為吐應暍屬於心也是則風動肝熱則轉筋水濕傷脾則為瀉暍熱乘胃則為吐三氣雜乃為霍亂又有乾霍亂濕霍亂之分吐利並作邪氣得出名為濕霍亂十存八九設若不吐不利揮霍撩亂邪無所出名為乾霍亂九死一生且夫人既有入必有出今有其入而不得出者痞也塞也此其鬱甚而不通也且東垣發明木鬱則達之意正謂此也如飽食所傷填塞胸中當吐不吐者死也內經五亂篇云清氣在陰濁氣在陽營氣順轉衛氣逆行亂於胸中是謂大悗亂於腸胃則成霍亂內經又云陰之所生本在五味陰之五宮傷在五味由此觀之雖五味能養五臟過則亦能傷人之體弱遂感前證長沙公論治之法有所生矣若邪在上焦則吐邪在下焦則瀉邪在中焦則既吐且利熱多欲飲水者五苓散寒多不飲水者理中丸原病式曰大法吐利煩渴為熱不渴為寒或熱吐利始得亦不渴者此亡津液後必渴也或寒本不渴若亡津液過多則燥而渴但寒者脈當沉細而遲熱者脈當實大而數戴人論此死生反掌之説為急病土為風木所克土化不行也書以治驗而斥巢氏論因為寒之非以及方士妄用熱劑誤治而死主以六一散通療脾胃受傷風濕暍三氣為邪於時宜矣故言飲食調養之節大忌飲食太早謂脾胃極損不能傳化谷入於胃則必危矣病安之後宜以粥飲漸漸養之大凡霍亂脈大者生沉細而遲氣少不語者為難治也霍亂通治方藿香正氣散治中寒霍亂嘔吐泄瀉方見傷寒門通脈四逆湯治霍亂多寒肉冷脈絶吳茱萸三錢炒附子二錢炮桂心不見火當歸甘草炙各一錢白芍藥木通細辛各半錢上作一服用水二盅酒半鍾生薑七片紅棗一枚煎至一盅不拘時服薑附湯治中寒霍亂轉筋手足厥冷方見寒門七氣湯治七氣鬱結五臟之間互相刑剋陰陽不和揮霍撩亂吐利交作半夏湯泡厚朴白芍藥茯苓各二錢桂心紫蘇橘紅人參各一錢上作一服用水二盅生薑七片紅棗一枚煎至一盅不拘時服不換金正氣散治霍亂轉筋嘔吐泄瀉頭疼不止方見寒門木瓜湯治霍亂吐瀉轉筋擾悶酸木瓜三錢吳茱萸洗炒茴香炒各二錢甘草一錢炙上作一服用水二盅生薑五片紫蘇十葉煎一盅食前服桂苓甘露飲治伏暑引飲過度肚腹膨脹霍亂瀉痢並治之方見暑門枇杷葉散治中暑轉筋煩渴引飲方見暑門二香散治暑濕相搏霍亂轉筋煩渴悶亂藿香白朮厚朴陳皮茯苓半夏紫蘇桔梗白芷香薷黃連扁豆各一錢大腹皮甘草各半錢上作一服用水二盅生薑五片蔥白三根煎至一盅不拘時服加味五苓散治霍亂吐瀉其效如神即暑門五苓散減桂加蘇木煎加減理中湯治霍亂嘔吐人參乾薑白朮各三錢甘草炙一錢上作一服水二盅煎至一盅不拘時服若為寒氣濕所中者加附子一錢名附子理中湯若霍亂吐瀉者加橘紅青皮各一錢半名治中湯若干霍亂心腹作痛先以鹽湯少許頻服候吐出令透即進此藥若嘔吐者於治中湯內加丁皮半夏各一錢生薑十片半若泄瀉者加橘紅茯苓各一錢名補中湯若溏泄不已者於補中湯內加附子一錢不喜飲食水穀不化者再加砂仁一錢若霍亂嘔吐心腹作痛手足逆冷於本方內去白朮加熟附子名四順湯若傷寒結胸先以桔梗枳殼等分煎服不愈者及諸吐利後胸痞欲絶心膈高起急痛手不可近者加枳實白茯苓各一錢名枳實理中湯若渴者再於枳實理中湯內加栝蔞根一錢若霍亂後轉筋者理中湯內加火煅石膏一錢若臍上築者腎氣動也去朮加官桂一錢半腎惡燥去朮恐作奔豚故加官桂若悸多者加茯苓一錢若渴欲飲水者加朮半錢若寒者加乾薑半錢若腹滿者去白朮加附子一錢若飲酒過多及啖炙爆熱食發為鼻衄加川芎一錢若傷胃吐血以此藥能理中脘分利陰陽安定血脈只用本方冷香湯治夏秋傷暑引飲過食生冷無度脾胃不和遂成霍亂之證方見暑門止渴湯治霍亂煩渴人參去蘆麥門冬去心茯苓去皮桔梗栝蔞根葛根澤瀉甘草炙各五錢上為細末每服二錢不拘時用蜜湯調下回生散治霍亂吐瀉但一點胃氣存者服之回生陳皮去白藿香去土各半兩上作一服水二盅煎一盅不拘時服既濟湯治霍亂後虛煩不得眠麥門冬去心人參各三錢淡竹葉一錢半附子半錢半夏甘草炙各一錢上作一服用水二盅生薑五片粳米百餘粒煎至一盅不拘時服麥門冬湯治霍亂已愈發熱煩渴小便不利麥門冬去心白茯苓去皮半夏湯泡七次橘皮白朮各一錢半人參小麥甘草炙各一錢上作一服用水二盅生薑五片烏梅少許同煎至一盅不拘時服白朮散治傷寒雜病一切吐瀉煩渴霍亂虛損氣弱保養衰老及治酒積嘔噦白朮茯苓去皮人參藿香各半兩葛根一兩木香二錢半甘草炙一兩半上為細末每服二錢用白湯調下如煩渴加滑石二兩甚者加薑汁續續飲之不拘時服人參散止吐逆及治瀉後除煩渴常服調中和氣人參二錢半茯苓二錢葛根一錢半藿香木香甘草炙各一錢上作一服水二盅生薑五片紅棗一枚煎一盅不拘時服丁香散治霍亂吐利不止丁香桂心白朮各半兩訶黎勒煨去核厚朴去粗皮薑汁製附子炮去皮臍良薑各三分陳橘皮湯浸去白焙木瓜乾者各一兩上為細末每服二錢不拘時粥飲調下乾薑湯治霍亂吐利心腹疼痛氣逆手足冷乾薑炮桂心去粗皮附子炮去皮臍草豆蔻去皮木香高良薑炒肉豆蔻去殼麵煨干木香甘草炙各半兩上㕮咀每服三錢水一盞煎至七分去滓不拘時溫服香薷丸治冷熱不調霍亂吐瀉香薷一兩半白扁豆炒零陵香赤者藿香去梗土木香各一兩丁香皮二兩益智仁一分上為細末用麵糊和丸如梧桐子大每服二十丸食前用溫紫蘇湯下霍亂證本自胃經或因胃寒飲水或傷暑毒或感濕氣冷熱不調水火相干陰陽相搏故轉筋攣痛經絡亂行暴熱吐瀉中焦胃氣所主也察其色脈隨經標本此治霍亂吐瀉之法也如頭痛發熱邪自風寒而來中焦為熱相半之分邪稍高者居陽分則為熱熱多飲水者五苓散以散之如邪稍下者居陰分則為寒寒多不飲水者理中丸以溫之如吐利後有表者解之汗出厥者溫之如既吐且利小便利大汗出內外熱者亦溫之如吐下後汗出厥逆不解脈欲絶者四逆等湯治之如吐瀉轉筋身熱脈長陽明本病也宜和中四君子湯平胃散建中湯四君子湯人參白朮茯苓黃耆各一兩上銼如麻豆大每服一兩水三盞生薑五片煎至一盞去滓不拘時服如吐瀉轉筋頭痛自汗脈虛者四君子湯加桂五錢如吐瀉轉筋脅下痛脈弦者宜建中加木瓜柴胡湯平胃散加木瓜五錢亦可也桂枝二兩半芍藥二兩甘草一兩膠糖半升生薑一兩半大棗六枚木瓜五錢柴胡五錢上銼如麻豆大每服一兩水三盞煎至一盞半去滓下膠糖兩匙服如吐瀉轉筋腹中痛體重脈沉而細者宜四君子加白芍藥高良薑湯四君子湯各一兩芍藥良薑各五錢同前法煎服如吐瀉霍亂四肢拘急脈沉而遲者宜四君子加薑附厚朴湯四君子湯各一兩生薑附子炮厚朴薑製各三錢如前法煎服如吐瀉四肢厥冷脈微緩者宜建中加附子當歸湯桂枝一兩芍藥二兩甘草半兩膠糖半升附子三錢炮當歸三錢生薑一兩半大棗六枚同前法煎服丁香散治霍亂不止丁香肉豆蔻去殼木香各一兩上為細末每服二錢用白粥飲調熱服不拘時正胃湯治霍亂吐利不止枇杷葉拭去毛炙厚朴去粗皮薑汁製陳橘皮去白焙桂心去粗皮各半兩上為粗末每服二錢匕水一盞入生薑三片煎至六分去滓不拘時熱服良薑飲治霍亂神效良薑藿香陳皮各一兩甘草炙三分上㕮咀每服三錢水一盞煎至七分不拘時服吳茱萸湯治冒暑伏熱腹痛作瀉或痢並飲水過度霍亂吐瀉其證始因飲冷或冒寒或忍飢或大怒或乘舟車傷動胃氣令人上吐下瀉吐瀉並行頭旋眼暈手腳轉筋四肢逆冷用藥遲慢須臾不救命在頃刻之間吳茱萸木瓜食鹽各半兩上同炒令焦先用瓷瓶盛水三升煮令百沸入藥煎至二升以下傾一盞冷熱隨病人服之卒無前藥用枯白礬為末每服一大錢沸湯調服更無前藥用鹽一撮醋一盞同煎至八分溫服或鹽梅鹹酸等物皆可服治霍亂吐瀉臨時無藥上用生蒜頭研細塗心下及兩腳心冰壺散治備急霍亂吐利不止上用高良薑火炙令香焦三兩打破以酒一升煮三四沸頓服亦治腹痛氣惡一方加粳米水煮良薑作粥食之一方用水煎服艾尉方治霍亂吐瀉上用患人仰臥揉艾鋪臍上如碟子大一指厚尉斗盛火尉之如無尉斗以旋子盛湯燙之亦可訶黎勒散治霍亂嘔吐脾胃虛冷氣隔不思飲食訶黎勒皮三分桂心澤瀉赤芍藥乾薑炮人參各半兩白朮陳皮湯浸去白焙厚朴去粗皮薑汁塗炙令香熟各一兩甘草炙微赤一分上㕮咀每服四錢水一中盞生薑半分煎至六分去滓不拘時溫服桔梗散治霍亂食不消化嘔吐不止桔梗去蘆陳皮湯浸去白焙白朮各一兩枇杷葉拭去毛炙微黃乾薑炮良薑各半兩白茯苓三分甘草一分炙上㕮咀每服三錢用水一中盞入倉粳米五十粒紅棗三枚同煎至六分去滓不拘時溫服正氣丹治下虛陰陽錯逆霍亂吐痢粥食不下半夏碾為末生薑汁搜和作餅日曝乾藿香葉各一兩硫黃三分盞內熔成汁水銀一分入硫黃汁內結成砂子附子炮裂去皮臍半兩上為細末酒煮麵糊和丸如梧桐子大以丹砂末為衣每服二十丸加至三十丸不拘時米飲送下丁香散治霍亂嘔吐不止丁香藿香葉去土枇杷葉拭去毛各一兩上銼碎用水一盞生薑半錢煎七分去滓不拘時熱服木瓜丸治霍亂腹中冷氣下利木瓜乾者一兩當歸切焙熟艾微炒官桂去粗皮人參各半兩陳橘皮湯浸去白高良薑炒訶黎勒皮厚朴去粗皮薑汁炒白朮以上各三分木香半兩赤石脂二兩上為細末煉蜜和丸梧桐子大每服三十丸空心用米飲送下烏梅散治霍亂後利不止冷汗出腹脅脹烏梅肉微炒黃連去須微炒當歸銼微炒附子炮裂去皮臍熟艾以上各三分阿膠搗碎炒令燥肉豆蔻去殼赤石脂以上各一兩甘草炙半兩上為細末不拘時以粥飲調下二錢黃連丸治霍亂後下痢無度腹中㽱痛黃連去須微炒黃柏微炙厚朴去粗皮生薑汁塗炙令香熟以上各三分當歸銼碎微炒乾薑炮裂木香不見火地榆以上各半兩阿膠搗碎炒令黃燥一兩上搗為細末煉蜜和搗三二百杵丸如梧桐子大每服二十丸不拘時用粥飲送下止血湯治霍亂下焦虛寒或便利後見血當歸切焙桂心去粗皮續斷各三兩生地黃焙乾薑炮裂各四兩阿膠炙令燥蒲黃甘草炙各二兩上搗篩每服三錢匕水一盞煎至七分去滓溫服日三赤石脂湯治霍亂下焦熱結或利下膿血煩痛赤石脂四兩升麻白朮各一兩半烏梅去核炒乾乾薑炮裂各一兩陳皮木微炒梔子仁各半兩上搗篩每服五錢匕水一盞半煎至八分去滓空心溫服人參散治霍亂身體疼痛四肢逆冷