心用米飲送下人參散治霍亂吐利汗出心煩人參去蘆麥門冬去心茯神各三分白朮黃耆乾薑炮桂心甘草炙各半兩上搗篩每服四錢用水一中盞生薑半分煎至六分去滓頻頻溫服竹瀝飲治霍亂狂悶煩渴吐瀉無度氣欲絶者竹瀝一合粳米一合炒以水二盞同研去滓取汁用上二味和勻頓服之木香湯治霍亂煩躁懊憹不得安臥木香乾木瓜紫蘇不去莖各一兩草豆蔻去皮一兩半上搗篩每服三錢匕水一盞入黑豆半合許生薑三片煎至八分去滓溫服日二竹葉湯治霍亂利後煩熱躁渴臥不安上用竹葉濃煮汁飲五六合佳藿香散治霍亂逆滿開胃口藿香葉五兩焙人參丁香各十兩訶黎勒煨去核十枚糯米三百粒石蓮心二百個如無以白豆蔻半兩代之甘草炙一分上為細末每服一錢用煨和皮生薑一塊棗二枚去滓煎湯調下早晚食前服麥門冬湯治霍亂逆滿不下食食即吐出煩臥不安方見嘔吐門白朮散治霍亂胃氣虛乾嘔不止白朮人參去蘆藿香各一兩枇杷葉拭去毛炙黃草豆蔻去皮高良薑銼各半兩上搗篩每服三錢水一中盞入生薑三片煎至六分去滓不拘時溫服薤白湯治霍亂乾嘔不止薤白切細一握生薑切細半兩陳皮去白三錢上用水二大盞煎至七分去滓分溫二服橘皮湯治霍亂嘔噦不止橘皮湯浸去白甘草炙各一兩枇杷葉拭去毛炙黃二兩上搗篩每服三錢匕水一盞生薑三片煎至七分去滓溫服如人行五七里再服治霍亂轉筋方附子炮去皮臍白礬各三兩桃枝切細三握蔥根鬚切細三握垂柳切細三握川椒三分生薑一兩磨以綿裹系在腳心上以水三斗煎三二十沸以來看冷暖淋多時為妙如急即加醋五升同煎用之附子湯治霍亂轉筋淋足附子一枚去皮臍生椒綿裹生薑切碎各一分蔥半斤切碎上以水一斗煎三兩沸入磁盆中濾去滓以鹽漿解之冷熱得所淋洗立瘥鹽塌方治霍亂轉筋入腹上用鹽三合以水五升煎取三升浸青布塌轉筋上一方煮令灼灼爾漬手足在胸脅者湯洗之入腹者倒擔病人令頭在下腹中平乃止劇者引陰陰縮者必死一方用極鹹鹽湯於槽中暖漬之裹足法治轉筋入腹氣急煩渴上用木瓜二個切破以水五升煎取三升取青布浸湯中用裹轉筋上如無木瓜用枝二兩煎亦得或木瓜煮汁服亦可治轉筋不止上用吳茱萸木瓜等分為末溫酒調服治沙子絞腸危急之甚上用黑神散以童子小便調服如不止再服立愈絞腸沙方有一證心腹絞痛冷汗出脹悶欲絶俗謂之絞腸沙今考此證乃名乾霍亂此亦由山嵐瘴氣或因飢飽失時陰陽暴亂而致急用吐法此法救人不一上用鹽半盞以熱湯數碗泡鹽令患人飲盡後卻以雞羽掃咽喉間即時吐所飲鹽湯出盡其證即愈糯米薑水治上吐下瀉心腹㽱痛水食不下糯米一百二十粒生薑一塊上作一處搗細用新汲水解服如倉卒無藥掘地坑投水攪之待澄取清飲之亦可名地漿灸法霍亂已死腹中尚有暖氣上用鹽納臍中灸二七壯仍灸氣海穴洗法治霍亂轉筋上用蓼一把去兩頭水煎熏洗一方用陳蓼漬法治霍亂轉筋入腹上以鹽多用煎湯漬之
