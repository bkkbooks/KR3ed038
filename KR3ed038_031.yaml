body:
  text: 卷之三十一痰飲門附論諸方論痰飲為病有因氣脈閉塞津液不通水飲停留結成痰者有胃氣虛弱不能運行水穀成痰者有因酒後飲水停滯於脾胃成痰者有風寒濕入脾相搏成痰者此證之始所感不同難以類舉且人之脾胃為倉廩以納穀因脾弱不能運行致氣血失於滋養故不周流氣道壅澀中焦不能腐谷遂且停滯或有喜怒哀樂之過情飲食起居之不節濕熱內蘊風寒外搏皆為痰飲變則為寒為熱為喘為嗽為嘔吐為反背為腫滿為眩暈為風癇為噯氣為吞酸為嘈雜為痞膈為疼痛為怔忡此皆痰之為病內經有云從脾胃濕土大過為積飲痞膈與飲發於中者數條末有痰之名也自張仲景分飲名有四痰飲懸飲溢飲支飲後人續增留飲謂之五飲一曰懸飲者飲水流於脅下咳嗽引痛二曰溢飲者飲水流於四肢當汗不汗身體疼重三曰支飲者咳逆倚息短氣不得臥其形如腫四曰痰飲者其人素虛腸間瀝瀝有聲五曰留飲者背惡寒或短氣而渴四支歷節疼痛脅下滿引缺盆咳嗽轉甚龐安常云人身無倒上之痰天下無逆流之水誠哉斯言且如頭風眉稜角疼纍以風藥不效投以痰藥收功如患眼赤羞明而痛與之涼藥勿瘳用之痰劑獲愈凡此證以脈理推之至朱丹溪各分其因以施吐利燥潤溫散升降消導動達開軟提補之方法而治之最得其當劉張又論痰飲其文亂一也東垣云脾土上應於天亦屬濕化經以水穀津液不行即停聚而為痰飲也是以五痰之分言其濕熱相乘如濕在心經為之熱痰結而如膠其色紅濕在肝經為之風痰其色青如沫濕在脾經為之濕痰濕久而熱其色黃濕在肺經為之氣痰其色白咯出如米粒濕在腎經為之寒痰其色黑如唾由此言之歲氣淫邪乘於脾胃津液不布積為痰飲也亦必從其所乘之氣兼化而為五痰也且如人之氣道貴乎順順則津液流通決無痰飲之患診其脈偏弦為飲浮而滑亦為痰治法或下或汗或溫或利莫若順氣為先分導次之氣順流通痰飲自下臨病診視在乎詳審痰飲通治方橘皮湯治胸膈停痰橘皮茯苓半夏以上各一錢半旋覆花青皮桔梗枳殼薑製細辛人參以上各一錢甘草二錢上作一服用水二盅生薑五片煎至一盅食遠服前胡半夏湯治痰盛前胡半夏薑製茯苓以上各二錢陳皮木香紫蘇枳殼甘草以上各一錢上作一服用水二盅生薑三片烏梅一個煎一盅食遠服蘇子降氣湯治虛陽上攻氣不升降上盛下虛痰涎壅盛方見氣門紫蘇飲治痰嗽方見咳嗽門俞山人降氣湯治上盛下虛痰涎壅盛或喘或滿咽乾不利並治腳氣上攻煩渴引飲前胡去蘆黃耆厚朴薑製五加皮薑製當歸去蘆桔梗羌活半夏曲人參去蘆陳皮乾薑附子炮去皮臍官桂以上各半錢紫蘇子一錢炙上作一服用水二盅生薑三片煎至一盅食遠服豁痰丸治頑痰壅盛南星三兩半夏二兩各銼作大片用濃皂角水浸一宿焙乾為末白附子五靈脂殭蠶炒去絲白礬枯細辛以上各一兩全蠍三錢半焙上為細末用皂角研碎按水煮麵糊和丸如梧桐子大每服三十丸食後用生薑湯送下辰砂化痰丸治風痰安神定志利咽膈清頭目辰砂飛研為衣白礬枯研各半兩天南星炮一兩半夏曲二兩上為細末生薑汁煮麵糊和丸如梧桐子大用辰砂為衣每服三十丸食後生薑湯送下桔梗湯治胸膈脹滿短氣痰盛嘔逆或吐涎沫桔梗炒半夏薑製陳皮去白各三錢枳實一錢半麩炒上作一服用水二盅生薑五片煎至一盅不拘時服二陳湯治痰飲為患或嘔吐噁心或頭眩心悸或中脘不快或因食生冷或飲食過度脾胃不和並皆治之方見脾胃門四七湯治七精之氣鬱聚痰涎狀如破絮或如梅核在咽喉之間咯不出咽不下並治中脘痞痛痰涎壅盛上氣喘急方見氣門參蘇飲治痰飲停積胸膈咳嗽氣促言語不能相續者方見傷寒門導痰湯治一切痰涎壅盛或胸膈留飲痞塞不通半夏湯泡三日天南星炮枳實去穰麩炒赤茯苓去皮橘紅以上各一兩甘草一錢上作一服用水二盅生薑十片煎至一盅食遠服大人參半夏丸墜化痰涎止嗽定喘治諸痰不可盡述人參去蘆茯苓去皮天南星薄荷葉以上各半兩白礬生用乾生薑寒水石半夏以上各一兩蛤粉二兩藿香葉一兩半上為細末麵糊和丸如緑豆大每服五十丸食後用生薑湯送下白湯亦可一方加黃連半兩黃柏二兩取效愈妙又治酒病調和臟腑尤宜服之海藏五飲湯一留飲心下二闢飲脅下三痰飲胃中四溢飲膈上五流飲腸間凡此五飲酒後飲冷過多故有此痰旋覆花去梗人參去蘆陳皮去白枳實麩炒茯苓去皮白朮厚朴薑製半夏湯泡豬苓澤瀉前胡桂心芍藥甘草炙以上各一錢上作一服用水二盅生薑十片煎至一盅不拘時服或因飲酒多加乾葛砂仁丁香五套丸治胃氣虛弱三焦痞澀不能宣行水穀故為痰飲結聚胸膈之間嘔吐噁心腹滿不食丁香木香不見火陳皮去白青皮以上各半兩白朮乾薑炮茯苓去皮良薑以上各一兩半夏天南星各二兩同半夏浸三日上為細末用神麯一兩大麥蘖二兩同研取面煮糊和丸如梧桐子大每服二十丸不拘時用熟水送下此藥常服溫脾順氣半夏利膈丸治風痰壅盛頭疼目眩咽膈不利涕唾稠黏並治酒過停飲嘔逆噁心胸脅引痛腹內有聲半夏湯洗三兩白附子生用二兩白茯苓去皮白礬生用人參去蘆白朮滑石貝母以上各一兩天南星一兩半生用上為細末麵糊和丸如梧桐子大每服三十丸食後用生薑湯送下茯苓半夏湯治胃氣虛弱身重有痰噁心欲吐風邪羈絆於脾胃之間當先實於脾胃茯苓白朮半夏炒曲以上各三錢大麥蘖一錢半陳皮天麻各三錢上作一服用水二盅生薑五片煎至一盅食前服柴胡半夏湯治風證不敢見風眼澀頭痛有痰眼黑噁心兀兀欲吐風來覺皮肉緊手足重難舉居暖處有微汗便減如見風即復作一名補肝湯柴胡蒼朮各一錢半半夏二錢半白茯苓二錢炒曲藁本各一錢升麻半錢上作一服用水二盅生薑五片煎至一盅食遠服半夏白朮天麻湯治頭目眩暈噁心煩悶氣短促上喘無力心神顛倒兀兀欲吐目不敢開如在風雲中痰厥頭痛如裂身重如山脾胃虛損停痰並皆治之方見眩暈門黑錫丹治痰氣壅塞上盛下虛心火炎熾腎水枯竭下虛之證及治婦人血海久冷無子赤白帶下方見頭痛門破痰消飲丸治一切停痰留飲陳皮去白川薑炮京三稜炮捶碎草果麵裹煨良薑濕紙裹煨莪朮炮青皮以上各一兩半夏湯炮七次三兩上為細末水煮麵糊和丸如梧桐子大陰乾每服五十丸食遠用生薑湯送下控涎丹治痰飲停積胸膈或結為塊喘滿不安痛連胸脅走注不定決不可誤作風痛癱瘓等證治之甘遂去心紫大戟去皮白芥子真者各等分上為細末水煮麵糊和丸如梧桐子大曬乾每服三十丸臨睡用淡生薑湯或熟水送下以下痰飲為愈化痰鐵刷丸治男子婦人風痰酒痰茶痰食痰氣痰一切痰逆嘔吐頭疼目眩肺痿咯膿聲如拽鋸並皆治之白附子炮南星炮半夏洗白礬生用以上各半兩寒水石一兩煅乾生薑七錢半硇砂輕粉各一錢皂角去子一兩上為細末水煮麵糊和丸如梧桐子大每服二三十丸食後用淡生薑湯送下此藥墜痰止嗽定喘沉香墮痰丸治宿飲不消咽膈不利咳嗽痰涎頭目昏運嘔逆噁心胸膈不快沉香木香各二錢半夏曲二兩青皮去白二錢半檳榔大者二枚麵裹煨熟上為細末用生薑汁浸蒸餅和丸如小豆大每服二十丸不拘時用生薑湯送下快活丸常服消食化痰養生之家不可缺枳殼一兩半炒官桂一兩半夏湯洗桔梗各二兩上為細末用生薑汁煮麵糊和丸如梧桐子大每服二十丸不拘時用生薑湯送下日進一二服茯苓丸一名指迷茯苓丸本治臂痛具指迷方中云有人臂痛不能舉手足或左右時復轉移由伏痰在內中脘停滯脾氣不流行上與氣搏四肢屬脾脾滯而氣不下故上行攻臂其脈沉細者是也後人為此臂痛乃痰證也但治痰而臂痛自止及婦人産後發喘四肢浮腫者用此而愈半夏二兩茯苓一兩枳殼去穰麩炒半兩風化朴硝一分上為細末生薑汁煮麵糊和丸如梧桐子大每服三十丸生薑湯送下風化朴硝一時未易成但以朴硝撒在竹盤中少時盛水置當風處即干如芒硝刮取用亦可纍有人為痰所苦夜間兩臂常覺有如人抽牽兩手戰掉至於茶盞亦不能舉隨服隨愈痰藥方多立見功效者未有如此神效人之氣脈常欲周流以衛護榮養其身也凡一日一夜呼吸出入計一萬三千五百息血行於身八百一十丈營周不息五十而復大會如環無端焉是以習禪者趺坐究意觀想學仙者吐納引導按摩其知道者不為血氣所使反所以運其血氣也其或喜怒哀樂不中節起居飲食失其常皆令榮衛否齟氣血敗濁為痰為涎為飲諸證生焉結伏於胸膈則眩運嘈忪忡悸癃閉痞膈喘嗽氣急停滯於關節則筋脈攣急肢節疼痛手足嚲曳寒熱往來三者同源而異治痰則伏於包絡隨氣上浮客於肺經因嗽而發涎則伏於脾源隨氣上溢口角流出唯飲則生胃腑為嘔為吐宜詳斟別也神仙墜痰丸治痰飲胸膈痞塞此藥下痰皂角無蟲蛀者刮去皮弦酥炙黃色去子淨一兩六錢白礬一兩二錢生用黑牽牛一斤取頭末四兩上為細末滴水和丸如梧桐子大每服三十丸漸加至百丸空心用溫酒送下看病輕重輕者五日十日愈重者半月一月愈久服永無癱瘓之疾搜飲丸治證同前上用木瓜一個切下頂作罐兒去穰用生白礬半夏曲等分為細末填在木瓜內卻用原頂蓋定用麻縷扎縛於飯甑上炊熟搗爛研以宿蒸餅和丸如梧桐子大每服三五十丸不拘時用生薑湯送下二賢湯治痰橘皮用真洞庭陳者溫水浸去穰白取紅一斤甘草四兩鹽四兩上用水五碗慢火煮焙乾搗為細末白湯點服一方用橘紅四兩甘草炙一兩為細末湯點服治痰極有驗世醫但知用半夏南星枳實茯苓之類何足語此玉王璆史均外舅莫強中服之腹痛利下物數塊如鐵彈子臭不可聞胸滿之疾豁然頓愈半夏丸治痰上用半夏南星各四兩生薑半斤共搗作餅以楮葉包縛卻於草中如罨曲法候乾入去皮香附子四兩同為細末以生薑汁煮搗和丸如梧桐子大每服四十丸食後用生薑湯送下烏巴丸治胸膈間久年頑痰為害積成痰氣面目青白色無時浮腫全不進食逼身疼痛夜間上壅不得睡臥寒熱往來手足疼痛不能轉側用南星半夏黑錫靈砂不計服數墜之則不下取之則不出此是痰母堅滯宜服此藥須臾利下頑痰如魚凍如未利再服決然洞利可除終身之疾大烏梅取肉三兩巴豆五枚去殼皮膜上用水二碗於瓦石器內將烏梅慢火煮爛候水稍干入巴豆在內將竹篦攪干直候如干糊方住火攤冷研爛就丸如緑豆大每服七丸九丸十五丸二十一丸不拘時用生薑湯送下醉鄉寶屑寬中化痰止嘔解醒醉後雅宜隨意服之陳皮縮砂各四兩紅豆一兩六錢甘草炙二兩四錢生薑一斤丁香一錢檳榔一兩白豆蔻仁一兩半上為粗末每用少許細嚼咽下治懸飲心腹氣滯兩脅多疼半夏三兩搗為末皂角六兩三兩去黑皮酥炙令黃搗為末三兩去皮子搗碎以酒一升挼取汁去滓煎成膏將半夏末以膏和作餅以青蒿蓋出青衣如造麴法搗羅為細末旋覆花一兩木香檳榔各二兩上為細末酒煮麵糊和丸如梧桐子大每服二十丸食前用生薑湯送下破飲丸治五飲停蓄胸膈呼吸之間痛引兩脅脹滿氣促胸腹結為症癖支滿胸脅傍攻兩脅搶心疼痛飲食不下反胃吐逆九種心疼積年宿食不消久瘧久痢遁尸疰忤癲癇厥運心氣不足憂愁思慮婦人腹中諸病悉能治之久服尤妙且不傷臟氣蓽茇丁香不見火縮砂仁蠍梢胡椒木香不見火烏梅肉青皮巴豆去皮膜各等分上將青皮巴豆以漿水同浸一宿次日濾出同炒青皮焦去巴豆水淹烏梅肉蒸一炊久細研為膏入藥末和勻丸如緑豆大每服五七丸臨睡生薑湯送下丸寶丸治留飲宿食腹脅脹滿吞酸嘔逆桂心三分木香肉豆蔻厚朴去粗肉姜炙丹砂研麝香以上各半兩乳香另研一兩檳榔二兩半夏一兩半生薑汁搗作餅曝乾上為細末和勻生薑汁和丸如豌豆大每服七丸食後用橘皮煎湯送下溫胃散治留飲順氣消宿食生薑半斤洗切曝乾和鹽二兩醃一宿炒過入陳曲末一兩同炒令乾陳橘皮湯浸去白焙半夏碾為末以生薑汁同搗作餅曝乾草豆蔻大者三枚不去皮以上各一兩丁香一分甘草炙二兩上為細末每服二錢如茶點服覺脾胃寒加附子半兩炮去皮臍半夏一兩湯泡去滑切片焙枇杷葉散治痰逆此藥溫胃可思飲食青皮去白焙草豆蔻各半兩前胡枇杷葉拭去毛炙黃半夏湯泡茯苓去皮人參大腹皮白朮厚朴去粗皮薑汁炙以上各一兩上㕮咀每服四錢水一中盞生薑半分煎至六分去滓不拘時熱服檳榔散治胸中痰壅嘔逆不納飲食四肢少力腹鳴檳榔桂心各三分杏仁二分湯浸去皮尖雙仁麵炒微黃半夏湯泡赤茯苓陳皮去白人參以上各一兩白朮二兩上㕮咀每服四錢水一中盞生薑半分煎至六分去滓不拘時溫服御愛紫宸湯解宿酒嘔噦噁心痰唾不進飲食木香半兩砂仁葛花檀香茯苓官桂藿香以上各一兩陳皮乾葛良薑丁香甘草炙以上各二兩上㕮咀每服四錢水一盞半煎至八分去滓不拘時服驅痰飲子治痰飲如人頭痛背疼飲食嘔惡皆痰飲之證天南星切作十片湯浸七次半夏湯浸七次青皮去白陳皮去白一兩赤茯苓草果仁甘草炙各半兩上㕮咀每服四錢水一盞生薑七片紅棗一枚煎至七分去滓不拘時通口服如過飲酒先進一服後再一服或次日夜醒又一服永無痰飲八珍丸治膈痰結實脅膈不利喘嗽嘔逆丹砂研半兩犀角鎊羚羊角鎊茯神去木牛黃研龍腦研以上一分牛膽南星硼砂研各一錢上為細末研勻煉蜜和丸如雞頭實大每服一丸食後嚼細用人參荊芥湯送下銀粉丸治膈痰結實滿悶喘逆鉛白霜白礬熬令汁枯水銀鉛與水銀結砂子粉霜以上各半兩天南星炮一兩半半夏湯泡丹砂研各一兩上各研為細末和勻麵糊和丸如梧桐子大每服三丸食後用薄荷湯送下小兒丸如麻子大鵝梨煎丸治熱痰涼心肺利脅膈解熱毒補元氣大鵝梨二十枚去皮核用淨布絞取汁皂角不蛀者十挺去黑皮子漿水二升挼取濃汁薄荷半斤研汁蜜半斤生地黃半斤研取汁同上五味慢火熬膏和後藥人參白茯苓去皮白蒺藜炒去刺肉蓯蓉酒浸切焙乾牛膝酒浸半夏湯泡木香以上各一兩檳榔煨二兩防風去叉青橘皮去白桔梗炒羌活白朮山芋以上各三分甘草炙半兩上除前五味熬膏余藥搗為細末同前膏拌和杵令得所丸如梧桐子大每服十五丸加至二十丸食後用荊芥湯送下日二服麝香丹砂丸治痰熱咽膈不利頭目昏痛麝香另研一分丹砂另研一兩龍腦另研一錢麥門冬去心三分木香丁香犀角甘草炙以上各一分人參藿香去梗天南星羊膽制防風去叉黃耆以上各半兩上為細末煉蜜和丸如雞頭實大每服一丸食後嚼破用荊芥湯送下旋覆花散治心脅痰熱頭目旋痛飲食不下旋覆花甘草炙各半兩枳殼去穰麩炒石膏細研各二兩赤茯苓麥門冬去心柴胡去苗人參以上各一兩犀角屑防風去叉黃芩以上各三分上㕮咀每服五錢水一大盞生薑半分煎至五分去滓食後良久溫服化涎散治熱痰利脅膈止煩渴凝水石煅研一兩鉛白霜另研馬牙硝另研雄黃另研以上各一錢白礬枯研甘草炙以上各一分龍腦少許上為細末研勻每服一錢不拘時水調下小兒風熱痰涎用砂糖水調下半錢此藥大涼不可多服金珠化痰丸治痰熱安神志除頭痛眩暈心忪恍惚脅膈煩悶涕唾稠黏咳嗽咽嗌不利皂角子仁炒天竺黃另研半夏湯浸洗七次生薑二兩去皮同搗作餅炙微黃白礬明者枯過另研以上各四兩龍腦另研半兩辰砂水飛研二兩上將皂角仁半夏為末與諸藥研勻生薑汁煮麵糊和丸如梧桐子大金箔二十片為衣每服十五丸加至二十五丸食後用生薑湯送下法制紅半夏治風熱止咳嗽清頭目利咽膈消痰降氣每用半夏一兩以龍腦半錢研極細展在半夏上仍用水飛硃砂研末於半夏再為衣先鋪長燈草一重約厚一指單排半夏在燈草上再以燈草蓋約厚一指以煮豆焙之候乾取出於器內收貯每服一二粒細嚼食後用溫水或冷水送下高良薑散治脅膈痰飲冷氣口中清水自出脅急脹滿不欲飲食此由胃氣虛冷高良薑赤茯苓半夏湯泡橘皮湯浸去白桂心以上各三分訶黎勒用皮一兩厚朴去粗皮薑汁炙香二兩細辛三分人參桔梗各半兩甘草一分炙上㕮咀每服五錢水一大盞生薑半分棗三枚煎至五分去滓不拘時服丁香茯苓湯治脾胃虛寒宿飲留滯以致嘔吐痰沫或有酸水不思飲食丁香茯苓去皮木香以上各二兩乾薑炮一兩半附子炮去皮臍半夏湯泡肉桂去粗皮陳皮去白以上各一兩縮砂半兩上㕮咀每服四錢水二盞生薑七片棗一枚煎至七分去滓不拘時服一方無肉桂奇效湯治冷痰壅盛脅膈不利胃寒脾氣弱嘔吐痰涎木香半兩附子炮去皮臍半夏湯泡七次各二兩上㕮咀每服三錢水一盞半生薑半分紅棗二枚煎至一盞去滓空心服二生湯治胃冷有痰附子生去皮臍半夏生用各等分上㕮咀每服四錢水二盞生薑十片煎至七分去滓空心溫服加木香少許煎尤佳一方去半夏用南星名南附湯省風湯治痰厥半夏八兩防風四兩甘草二兩炙上為細末每服三錢水一大盞生薑二十片煎至七分去滓不拘時服一方用南星代半夏水玉湯治眉稜骨痛不可忍者此痰厥也半夏不拘多少湯洗七次切作片子上每服三錢水一盞半生薑十片煎八分去滓食後溫服
