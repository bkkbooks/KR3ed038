之九日而藥成前一夕病者夢人戒令翌日勿令服藥次日將服之為屋土墮器中不可服再合既成又將服為貓覆器又不可服又再作未就而是人卒矣此藥之異如此若小小血妄行一啜而愈或云是陸農師夫人鄉人艾孚先常親説此事渠後作大觀本草亦取入集中但人未識不苦信爾太上延年方勝追魂散治勞瘦垂死方人參杏仁去皮尖柴胡天靈蓋炙各一兩川椒一分去目微炒出汗桃心柳心各一小握上以童子小便一升入藥末一兩煎令熟每日空心日午各一服神授散治諸傳尸勞氣殺蟲上用川椒二斤擇去子併合口者炒出汗碾為細末每服二錢空心用米湯調下須痹暈悶少頃如不能禁即以酒糊丸如梧桐子大空心服三五十丸昔人嘗與病勞婦人交婦人死遂得疾遇一異人云勞氣已入臟遂令急服二斤其病當去如其言服之幾盡大便出一蟲狀如蛇遂安續與人服之獲安濟者多矣夏貴公熏勞法治骨蒸發熱咳嗽不已雄黃明者玄參百部厚朴以上各三錢款冬花茜草各二錢艾葉雷丸各一錢信石雌黃各半錢上為末用香爐有蓋者入藥燒煙止留一小孔出煙患人以紙塞鼻以口吸其煙久則飲少清米飲日三次蟲死嗽愈一方加百部蕪荑仁蘇木焙為末溶蠟和攤紙上貴公在蜀作宣撫甚祕寶之已膏肓之疾藥不能及熏之有效治勞瘵上三月四日取桃葉五升熟搗脫衣避風密室中坐其上從旦至暮尸蟲悉出治勞瘵上於空心食棐子百個諸勞蟲悉化為水治傳尸勞疾羸瘦者上以鱉甲一個炙令黃色為末酒服方寸匕日二服治五蒸方夫蒸者乃附骨熱毒之氣皆是死證庸醫不識熱蒸形狀或妄稱神祟以相疑惑致使蒸咸變為疳而致死者今具各方於後一曰骨蒸上用芒硝水服方寸匕日再服或搗苦參蜜和丸如梧桐子大每服七丸米飲下日再服無忌以體涼為度二曰脈蒸青葙子苦參各二兩艾葉甘草炙各一兩上切以水四升煮取一升半分為三服用羊胞盛之以葦筒灌下部中若不利取芒硝一方寸匕和冷水合和服之日再服忌海藻菘菜三曰皮蒸上用芒硝一兩以水一升半和分為二服三日服訖以冷水浸手以尉脅下並胸上胸痛處亦可舉臂指灸側腋下第三肋間腋下空中七壯立止四曰肉蒸上用大黃一兩半銼如小豆大以水一升浸一宿明旦絞取汁一服五合許微利即止若熱不定亦可服芒硝一方寸匕日三服以體涼為度五曰內蒸所以言內者必外寒內熱附骨也其根在五臟六腑之中必因患後得之骨肉自消飲食無味或皮燥而無光蒸作之時四肢漸細足趺腫者上用石膏細研如粉涼水和服方寸匕日再體涼為度加減青蒿丸治男子女人一切勞疾骨蒸風氣此藥有七名一名杏仁丸能治嗽二名木香丸能治尸疰鬼氣九種心痛三種蟲咬心痛三名犀角丸能治時行熱疾瘟疫四名龍腦丸治小兒無辜疳痢五名萬病丸治一切虛傷六名丹砂丸治毒邪痃癖氣等七名青蒿丸治男子女人一切勞氣若常帶行山林曠野坑阱冢墓前後鬼神不敢近若被毒蛇惡物所傷爛嚼一丸敷之必效青蒿心三支細切童子小便二大斗生地黃三挺竹刀切搗東引桃枝半握細搗碎三兩甘草炙四兩上以上藥用新甕一口用小便浸一七日入鍋內同煮三五百沸潦出藥曬乾搗研為末然後將小便三斗入釜中以桑柴火煉之以篦攪勿住手煉至三升用不津器乘和後藥杏仁去皮尖炒桃仁去皮尖炒桔梗炒蒼朮炒一方用白朮枳殼去穰麩炒白茯苓去黑皮葳蕤天靈蓋酥炙無虎骨代升麻大黃焙地骨皮貝母去心蕪荑炒當歸焙防風去叉檳榔忌鐵器桂心橘皮黃耆厚朴去粗皮薑汁炙吳茱萸湯泡炒丹砂另研麝香另研甘草炙各一兩木香二兩半犀角屑一兩半羚羊角屑一兩一分上為細末用前小便煎和勻入臼內搗五百下如不黏可入煉蜜和丸如梧桐子大每服三十丸食後溫水下疾重日再服通三焦安五臟四時常服永無虛勞之疾時行瘴瘧常不能害上氣咳嗽無問涕唾並乾咳嗽後有血水名肺熱熱毒氣壅轉成鼻塞聲重胸中結痛若不速除當成肺痿勞瘦服此藥五兩其疾乃平手足熱如火口生瘡舌爛夜夢驚恐口中𧈟齒牙痛咽痹服五兩癧子根本從大腸出如朽筋爛肉又如蛤蟆衣櫻桃狀異腥臭者若瘰癧當發不治根本必攻五臟狀如藤蘿繞木榮枯不相舍令項頸破損必死服此五兩當效若患時氣頭痛欲死身熱大小便祕澀復不識人不下食新汲水下五十丸即瘥丈夫婦人曾服熱藥過度近雖藥盡氣力猶有往往發來沖人頭面致眼痛昏熱心胃躁煩口臭生瘡溫水下二丸不過一二兩嬰孩無辜病與大人勞病同惟在胎中受精血致令唇口焦乾或瀉或痢腹中漸結眼生白膜服之可愈若孩漸大準大人例服之女人月經不勻或前或後多少不定青黑雜色或凝或散漸成勞瘦服一二兩當愈春加龍膽草龍骨柴胡去苗黃連去須炒各一分夏加石菖蒲麥門冬去心白茯苓去皮知母各一兩秋加秦艽旋覆花訶梨勒皮各一兩冬加紫菀去土五味子芍藥黃芩去黑心各一兩加減黃耆建中湯治男子婦人五勞骨蒸者世用神效黃耆一兩秦艽防風北柴胡去苗當歸去蘆澤瀉白芍藥生地黃熟地黃地骨皮肉豆蔻煨甘草縮砂仁檳榔以上各半兩豬苓四錢桔梗白茯苓白朮以上各三錢人參一錢半上為散每服三錢水一盞煎八分不拘時溫服老人更加黃耆一兩或為末蜜湯調服臨期斟酌麥門冬湯治心中煩熱惟欲露體覆之即悶驚悸心忪面無顏色忘前失後婦人患血風氣者多成此疾乃心蒸之狀麥門冬去心焙茯神去木防風去叉地骨皮去土各三兩遠志去心人參龍齒羚羊角屑甘草炙石膏各二兩紫石英一兩上銼如麻豆大每服三錢水一盞半棗二枚煎至半盞去滓溫服未瘥再服以瘥為度甚益心力曾經吐血者服之尤佳若畏藥者去紫石英團魚丸治骨蒸潮熱咳嗽柴胡前胡知母貝母杏仁各等分團魚二個上將藥同魚煮候魚熟提起團魚除去魚頭不用取肉連汁服之卻將藥焙乾為末就用團魚裙甲及骨更煮汁一盞和藥為丸如梧桐子大每服三十丸空心煎黃耆湯下病安仍服後黃耆益損湯補理黃耆益損湯治男子婦人童男室女諸虛不足榮衛虛弱五勞七傷骨蒸潮熱腰背拘急百節痠疼夜多盜汗心常驚惕咽燥唇焦嗜臥少力肌膚瘦悴咳嗽多痰咯唾血絲寒熱往來頰赤神昏全不思食服熱藥則煩躁沖滿上焦進涼藥則膈滿而腹痛及治大病後榮衛不調及婦人産後血氣未復宜服此藥黃耆人參去蘆石斛去根木香白朮當歸肉桂茯苓芍藥半夏川芎熟地黃酒炒山藥牡丹皮麥門冬去心五味子甘草各等分上銼散每服三錢水一盞半生薑五片棗二枚小麥五十粒烏梅一個煎七分食前服柴胡梅連散治骨蒸勞久而不痊三服除根其效如神又治五勞七傷虛弱皆治柴胡前胡烏梅胡黃連各三分上㕮咀每服八錢用童子小便二盞豬膽一個豬脊骨髓一條韭白半錢同煎至一盞去滓服無時陽病開關散治證同前北柴胡去苗桔梗炒麥門冬去心木通秦艽以上各半兩地骨皮桑皮蜜炙芍藥木香澤瀉當歸以上各一兩甘草一錢炙上㕮咀每服三錢水一大盞生薑二片煎至六分去滓空心服小便多即病去矣陰病開關散赤芍藥當歸肉桂白芷甘草炙各半兩枳殼三錢炒木香二錢南星一錢去皮薑汁浸焙上㕮咀每服二錢水一大盞生薑三片煎七分入無灰酒三分盞又煎七分溫服先服起胃散一二日後不問退否兼玉龍膏服之起胃散陰陽二證皆用黃耆二兩炙白朮炒山藥各一兩白芷人參各半兩木瓜三錢上㕮咀每服三錢水一大盞煎七分去滓不拘時服一方加沉香茯苓甘草各半兩玉龍膏青蒿子北柴胡白檳榔各二兩肉蓯蓉酒浸炙生地黃虎頭骨劈開酒炙人參各一兩鱉甲去皮裙酒浸炙酥地骨皮赤茯苓白朮牡蠣木香各半兩當歸三錢硃砂一錢豆豉心二合上加烏梅肉枳殼同為細末卻以肥實杏仁五升用童便浸春夏七日秋冬十日和瓶日中曬每日一換新者候日數足以清水淘去皮尖焙乾別以童便一升於銀石器內文火煎至隨手爛傾入砂盆內用柳木捶研爛為膏細布濾過入酥一兩薄荷自然汁二合攪勻和藥用捶搗五百下丸如梧桐子大空心白湯下十五丸加至三十丸如覺熱減丸數服熱少還添加減經月日諸疾悉退進食安臥面有血色乃藥力也當勤服忌莧菜冷水生血雀鴿等天門冬去心焙一兩半赤茯苓桔梗去蘆柴胡去苗各一兩百合白前各半兩前胡去蘆川升麻黃芩杏仁湯浸去皮尖雙仁麩炒微黃甘草炙各三分桑根白皮一兩上銼為散每服四錢以水一中盞生薑半分煎至六分去滓食後溫服鱉甲丸治骨蒸脅下痃癖及婦人月水不通鱉甲去裙醋炙訶梨勒去核琥珀各二兩牛膝去苗酒浸京三稜煨大黃銼炒土瓜根切焙官桂去粗皮牡丹皮各一兩半桃仁湯浸去皮尖及雙仁別研三兩上為細末和勻煉蜜和丸如梧桐子大每服二十丸食前用桃仁煎湯送下檳榔散治骨蒸腹中痃癖脅下妨悶漸加瘦劣檳榔赤芍藥訶梨勒去核桃仁湯浸去皮尖雙仁麩炒微黃木香以上各三分赤茯苓桔梗去蘆京三稜煨銼鱉甲去裙醋炙黃以上各一兩上銼散每服三錢水一中盞入生薑半分煎至六分去滓食前溫服甜葶藶散治骨蒸肺痿咳嗽上氣不得眠臥涕唾稠黏甜葶藶二兩炒香陳皮去白焙枳殼去穰麩炒紫菀去土赤茯苓各一兩桑根白皮三兩銼上銼散每服三錢以水一中盞入生薑半分棗三枚煎至六分去滓不拘時溫服生犀散治骨蒸肌瘦頰赤口乾日晚潮熱夜有盜汗五心煩躁及大病瘥後餘毒不解犀角鎊地骨皮秦艽去蘆麥門冬去心柴胡去苗枳殼炒茯苓去皮赤芍藥桑皮去赤黃耆蜜炙人參去蘆鱉甲醋炙知母去毛大黃各等分上銼散每服三錢水一盞入陳青蒿一根煎或桃枝亦可同煎至八分服及治小兒疳病熱似骨蒸者及久病後時作潮熱並瘧病有痰加半夏熱輕者去大黃加黃芩益母草煎丸治骨蒸勞瘦益母草一斤曝乾青蒿半斤去根桃枝一尺長者一握以上三味細搗以童便一斗於鍋內煎取三升濾去滓用丹砂三分麝香半兩別研桃仁去皮尖雙仁炒研柴胡去苗各五兩天靈蓋一枚酒煮曝乾別研為末鱉甲去裙酒浸炙酥二兩甘草炙銼一兩上除煎外搗為細末用益母草煎和為丸如梧桐子大空心烏梅湯下三十丸漸加至四十丸初服覺心熱減丸數如不熱依法服後以四五匙軟粥壓之紫菀散一名紫菀湯治傳尸骨蒸復連殗殜肺氣咳嗽紫菀去土桑根白皮炙桔梗炒生地黃酒浸切焙續斷各一兩半五味子甘草炙各一兩赤小豆一合上銼散每服五錢匕水一盞半入青竹茹彈子大煎至一盞去滓食後溫服良久再服若熱甚加麥門冬去心一兩石膏一兩五錢天門冬丸治骨蒸勞熱潤心肺止咳嗽天門冬去心焙乾三兩半桑根白皮炒白茯苓去皮各三分杏仁湯浸去皮尖雙仁麩炒貝母去心甘草炙各一兩上為細末煉蜜和丸如彈子大每服一丸綿裹咽津煎麥門冬湯嚼下亦得不拘時雄黃丸治諸尸癥瘕及中惡心痛蠱疰鬼氣雄黃細研真珠細研白礬煨枯附子炮去皮臍藜蘆去蘆牡丹皮桂心以上各一兩蜈蚣一枚微炙去足巴豆半兩去皮心細研紙裹壓去油上為細末入別研藥令勻煉蜜和搗五七百杵丸如梧桐子大每服三丸不拘時以粥飲下又方雄黃細研酥各一兩上相和丸如彈子大每服一丸用熱酒三合化開服之須臾再服瘥已有尸疰者常蓄此藥甚良五香丸治諸毒尸疰鬼氣心腹脹滿大小便不通及鬼注心痛不可忍者沉香薰陸香青木香麝香研當歸桂心鬼箭羽雄黃研巴豆去皮心硃砂研訶梨勒去穰吳茱萸檳榔乾薑肉豆蔻甘草炙升麻以上各四分犀角屑牛黃研各三分桃仁去皮尖附子炮去皮臍各五分上為細末煉蜜和丸如梧桐子大以暖水下三丸至五丸如不利更服以利為度此方甚驗忌海藻菘菜豬肉冷水生蔥蘆筍生血等物鸛骨丸治尸疰邪氣流傳忽然悶絶時發寒熱或腹痛脹滿鸛骨酒炙雄黃研各一兩官桂去粗皮大黃銼炒各三分丹砂一分研麝香半兩研赤足蜈蚣一條酒浸炙上為細末煉蜜和丸如梧桐子大每服二十丸食前用桃枝煎湯送下還魂湯治卒感忤鬼擊飛尸諸疰奄忽氣絶無復覺或已死咬牙口噤不開去齒下湯湯入口不下者分病人發左右捉踏肩引之藥下復增取盡一升須臾立蘇金匱云寸脈沉而滑沉則為實滑則為氣實氣相搏血氣入臟則死入胃則愈若卒厥唇口青身冷入臟則死身和汗出愈麻黃三兩桂心二兩杏仁七十粒甘草一兩上㕮咀水八升煮取三升分三服一方無桂心密陀僧散治臨尸哭泣尸氣入腹沉滯臟腑有時發動取勞積神效密陀僧半斤火煨醋淬水淘研控干稱六兩京三稜煨搗為末稱二兩訶梨勒不去核生用搗為末一兩上和令勻每服二錢用煮粥濃湯調下當晚不食臨臥一服余時勿服並服三夜當下惡物如不下第三夜加生牽牛頭末一錢同調下獺肝丸治傳尸勞病用諸冷熱勞疾日月將久面色萎黃漸漸羸瘦獺肝一具生用青蒿一握肉蓯蓉去甲酒浸柴胡去苗各二兩黃連去須炒木香地骨皮桃仁去皮尖雙仁炒附子炮去皮臍官桂去粗皮天靈蓋炙陳皮去白焙當歸切焙甘草銼炙生地黃焙知母澤瀉以上各一兩黃耆銼二兩半柏木脂研檳榔銼各一兩半上為細末煉蜜和丸如梧桐子大空心酒下四十丸烏雞丸治傳尸勞尸疾骨蒸眼目昏澀面色青黑咽喉噎塞痰涕咳嗽或痃癖攻刺疼痛胸膈滿悶時或恚怒或多感傷情思不樂夢寐虛驚精臟滑泄失血增寒潮熱盜汗肩背拘急腰臂肢節煩疼四肢少力不喜飲食小便黃赤大便或瀉乍進乍退服取藥後宜服此藥附子炮去皮臍黃連去須各一兩柴胡去苗白附子生當歸切焙秦艽去苗槐膠肉蓯蓉酒浸切焙遠志去心陳皮去白焙巴戟續斷以上各一兩乳香研雄黃研丹砂研甘草以上各半兩丁香乾薑炮各一分上搗研極細先養烏雌雞一隻以硫黃三兩為末分作三十分每日拌飯喂一月日用大麻子一升喂盡宰治去毛及嘴爪並腸留心肝將前藥末入在雞腹內以麻線纏定再用無灰酒一斗銀石鍋內用文武火煮令雞熟取出除去粗骨將雞肉並藥同研更將雞骨焙乾亦研為末同搜和入臼中千餘下丸如梧桐子大每服二十丸用溫酒送下空心日午臨臥各進一服犀角紫河車丸治傳尸勞服三月平復其餘勞只數服愈紫河車一具是首生孩兒的胞衣以米泔水淹一宿洗淨焙乾用鱉甲酥炙胡黃連桔梗芍藥大黃龍膽草黃藥子貝母敗鼓皮心酥炙知母以上各二錢半莪朮犀角鎊芒硝以上各一錢半硃砂二錢別研上為細末煉蜜和丸如梧桐子大以硃砂為衣每服二十丸空心用溫酒送下天靈蓋丸治傳尸天靈蓋即骷髏有十字縫者取中心一片先以茅香湯洗以安息香酒塗炙黃色紫河車一枚頭首生兒胞衣是也於石上用新草鞋踏洗淨控干以麝香一兩摻拌令勻入瓶以泥固濟如法火煅通赤存性勿令煅過石蜥蜴一條和腸肚醋炙四十九遍令乾獺肝一具薄切用新瓦上焙乾赤足蜈蚣一條用酒浸炙黃色蛤蚧一對酥炙令黃色只取頭尾用金線蛤蟆端午日收者以醋炙令黃色只用頭黃鷹糞一錢上為細末以醋煮豬膽令熟成膏搜和為丸如梧桐子大以槐花版青各一錢研為細末熟絹篩過藥令青黃色每服四十丸煎生薑湯初更一服二更初再一服牡蠣粉治一切虛勞傳尸骨蒸盜汗牡蠣煅研粉三合麻黃根為末三兩白米粉三合蒺藜炒去刺為末二兩丹砂熟飛研半兩胡燕屎乾者一兩上同研勻以生絹袋盛夜臥汗出以粉身時時用之天門冬大煎治男女五勞七傷八風十二痹傷中六極一氣極則多寒痹腹痛喘息驚恐頭痛二肺極則寒痹腰痛心下堅有積聚小便不利手足不仁三脈極則顏色苦青逆意恍惚失氣狀似悲泣之候苦舌強咽喉干寒熱惡風不可動不嗜食苦眩善怒妄言四筋極則拘攣小腹堅脹心痛膝寒冷四肢骨節皆疼痛五骨極則肢節厥逆黃疸消渴癰疽妄發重病浮腫如水病狀六肉極則發疰如被擊不復言甚有至死復生衆醫所不能治此皆六極七傷所致非獨房室之所為也憂患積思喜怒悲歡復隨風濕結氣咳時嘔吐食已變化大小便不利時泄利下重溺血上氣吐下乍寒乍熱臥不安席時時惡夢與死人共飲食入冢神室魂飛魄散筋極則傷肝傷肝則腰背引引難可俯仰氣極則傷肺傷肺則小便有血目不明髓極則陰痿不起往而不交骨極則傷腎傷腎則短氣不可久立陰疼惡寒甚者卵縮陰下生瘡濕癢手搔不欲化汁出此皆腎病甚者多遭風毒四肢頑麻手足浮腫名曰腳弱一名腳氣醫所不治此悉主之常服尤佳天門冬切三斗半搗壓取汁生地黃切三斗半搗壓盡取汁白蜜三升酥用三升煉枸杞根切三斗洗淨以水二石煮取一斗二升麋骨一具搗碎以水一石煮取五斗澄清以上並用大斗銅器中微火先煎門冬地黃汁減半乃各煎取大斗二斗下後件散藥煎取一斗內銅器重釜煎令引手可丸如梧桐子大平旦空心酒服二十丸加至五十丸日二服忌生冷醋滑豬雞魚蒜油麵等須擇旺相日修合今具散藥方於後茯苓桂心白朮五加皮葳蕤遠志澤瀉石菖蒲薯蕷人參石斛柏子仁牛膝杜仲細辛覆盆子獨活川芎黃耆肉蓯蓉續斷萆薢茯神胡麻仁橘皮巴戟狗脊大豆黃卷石楠菜楮實白芷以上各二兩蔓荊子三兩薏苡仁蜀椒各一升阿膠十兩鹿角膠五兩甘草六兩大棗一百枚煮作膏上治下篩內再加牛髓鹿髓各加三升大佳小便澀去柏子仁加秦艽二兩乾地黃六兩陰痿失精去葳蕤加五味子二兩頭風去柏子仁加菊花防風各二兩小便利陰氣弱去細辛防風加山茱萸二兩腹中冷去防風加乾薑二兩無他疾依方修合凡此煎九月下旬採藥立冬日合服至五月上旬止若十二月臘日合者經夏至七月下旬止若停留不壞當於舍北陰處入地深六尺填沙置藥中上加沙覆之則經夏不損女人先患熱者可服患冷者勿服填骨丸治五勞七傷補五臟除萬病石斛人參當歸石長生石葦白朮遠志肉蓯蓉紫菀乾薑天雄蛇床子茯苓牛膝附子柏子仁牡蠣薯蕷阿膠牡丹皮牡蒙巴戟五味子乾地黃甘草以上各二兩蜀椒三兩上為細末煉蜜和丸如梧桐子大每服三十丸用溫酒送下不拘時服日三鍾乳白澤丸治丈夫諸虛百損五勞七傷真氣不足元臟不固神志俱耗筋力頓衰頭目眩暈耳內虛鳴心腹急痛氣逆嘔吐痰嗽喘促胸膈脹悶脾泄下痢遺精便濁厥冷自汗脈微欲絶婦人血海虛冷崩漏不止赤白帶下經候不調臍腹時痛面無顏色飲食不進但是虛勞之疾宜服白檀香取末乳香別研各一兩附子炮去皮臍陽起石煅研各一兩半鍾乳粉二兩麝香別研一錢上和勻滴水搜成劑分作六十丸每服一丸水一盞煎化及七分盞空心熱服如急病不拘時久服補益精血助陽消陰安心神定魂魄延年增壽起死回生一方用鹽酒或鹽湯送下石斛萬病散療五勞七傷大風緩急濕痹不仁甚則偏枯筋縮拘攣胸脅支滿引身僵直或頸項腰背疼痛四肢酸煩元陽衰弱下部癢濕臥便盜汗心腹滿急小便莖中疼痛或時便血咽乾口燥飲食不消往來寒熱羸瘦短氣肌肉損減或無子息若生男女才欲及人便死此皆極勞傷血氣心神不足所致此藥悉主之令人康健多子石斛菊花萆薢石菖蒲白朮天雄炮雲母粉細辛桂心杜仲肉蓯蓉續斷遠志去心牛膝乾地黃防風茯苓以上各二分蜀椒出汗乾薑各一分蛇床子三分菟絲子三兩酒浸上隨病倍其分搗篩為散先食以酒服方寸匕日三以知為度神良忌豬羊肉冷水桃李雀肉生蔥生菜大酢餳等聚寶丹治五勞七傷諸虛不足溫中正氣祛風活血逐寒除濕填精益髓強陰壯陽聰耳明目開心益智暖胃化食消痰寬中殺九蟲通九竅補五臟祕精氣止夢遺除咳嗽養肌膚治腰膝疼痛輕身白茯苓去皮山茱萸去核五味子乾山藥石蓮肉雞頭肉金櫻子破故紙石菖蒲熟地黃酒浸焙肉蓯蓉酒浸焙枸杞子酒浸焙牛膝酒浸遠志去心杜仲去粗皮炒斷絲茴香炒龍骨仙茅楮實巴戟去心沉香以上各一兩上為細末用棗肉和丸如梧桐子大以硃砂為衣每服五十丸空心用溫酒或鹽湯送下金櫻丹治男子去血失精婦人半産漏下五勞七傷三尸百疰肌肉陷下形色俱脫傳尸骨蒸虛勞衰損諸風變易瘦劣難痊或因嘔吐或從汗出痢積久津液耗散婦人崩漏無停色肉衰朽男子精滑不固筋力消痿傷寒纍經勞復瘡漏方在淹延大肉減削下血過多心氣不足健忘成狂肝血衰虛昏暗作暝陰陽衰廢飲食忘思常服充實肌肉堅填骨髓悅澤面目長養精神祕精固氣壯力強筋沖和百脈正理三焦定神魄安尸蟲烏髭發牢牙齒男子全精使婦人妊娠通神明不老能健捷其藥之功不可具述金櫻子蒼朮生地黃仙靈脾四味並取汁肉蓯蓉酒浸研膏人參牛膝酒浸生雞頭肉干乾山藥丁香陳皮去白生蓮子肉柏子仁別研木香茯苓去皮菟絲子酒浸別研石菖蒲麝香別研後入甘草炙各二兩上將人參以下同為細末入柏子仁和勻以白沙蜜入銀石器中於天地爐中置熟火五斤煉微解入男孩兒乳汁二升以木篦攪次入上項膏汁同攪令勻勿令手住傾入藥末一處攪熬之火消續續旋添熟火勿令大緊熬至可丸即止取出卻於銀石器中候稍溫入麝香末一處搜和成劑更於石臼中杵千餘下每兩作十丸每服一丸空心細嚼用溫酒送下人參五味子散治男女老稚諸虛百損氣血勞傷涎喘咳膿或嗽咯血寒熱往來夜有盜汗羸瘦困乏一切虛損人參五味子桔梗當歸焙白朮白茯苓熟地黃甘草炙以上各半兩黃耆桑白皮炒枳殼去穰麩炒柴胡去苗前胡去苗地骨皮陳皮以上各三分上㕮咀每服三錢水一盞半煎至五分去滓食後溫服日三服如煩渴加烏梅青蒿同煎咳膿血加知母阿膠同煎尤妙玉龍軟金丹治男子諸虛百損五勞七傷下元久冷腰腿膝痛婦人赤白帶下添精補髓活血駐顏沉香二錢檀香安息香八角茴香益智仁各一錢半麝香蓮子心仙靈脾酥炙硃砂穿山甲犀角乳香丁香以上各一錢上為細末煉蜜和丸如梧桐子大每服十丸空心以溫酒送下以乾物壓之又方治證同前上用烏雌雞一隻治如食法以生地黃一斤切飴糖二升內腹中急縛銅器貯瓶中蒸五升米久須臾取出食肉飲汁勿啖鹽三月三度作之神良並止盜汗補勞茯神散補一切氣虛勞疾茯神白茯苓人參遠志去心龍骨肉桂陳皮甘草炙以上各一兩麥門冬去心五味子當歸以上各一兩半黃耆二兩上為末分作八服每服用水一升半生薑五片紅棗七枚煎至一升趁前藥後空心服之延齡膏治一切勞蛤蟆鶴骨鰻鯏豬牙皂角棗葉木香丁香以上各等分麝香少許另研上為細末用羊腸大者盛之纏定兩頭於飯甑上蒸熟為度取出候冷以竹刀割開刮下同腸表裡盡研細便入麝香一處同研令勻丸如梧桐子大每服一百丸服藥時須辰巳間用茅香熟湯吞下更看病人壯劣旋旋服之須得一度吃盡一百丸後以衣被覆出汗病甚者略露面其蟲從汗出尸蟲如麥麩大余者皆微狀用出盡汗後病人其身便輕快候汗乾即換卻元著衣服及臥物等初服藥覺當時藥便盡吐出並不住即難療或一百丸存六七十丸猶可醫別以初藥補數如藥便住疾無不退服藥忌一切發勞物甚者進兩服