body:
  text: 卷之二十二癆瘵門附論夫人之稟賦天地以生而以心為主宰腎為根本心腎既病則精神減而志意散百病由是而生也內經湯液醪醴篇何以雲精神不進志意不治故病不可愈謂其精壞神去則營衛不可復收營泣衛除故病不可愈也夫腎藏精與志為生性之本元氣之根精神之所舍也靈樞經云積精全神此之謂也且人身有精而後有神今精神既壞則心腎不濟而盜汗遺濁等病奚可無焉蓋精者腎之液也汗者心之液也心之所藏者神也腎之所藏者精也而心有病則神不守舍而日患怔忡恍惚失志夜多異夢登高涉險或發追捕或與鬼交睡出盜汗而腎受病則髓海枯竭而日為精神倦怠腳膝軟弱遺精白濁諸虛百損莫不由是心腎而致也至如人病有至如是尚或孜孜於財氣戀戀於色欲不知遵節禁忌愈傷坎離以致沉羸而成癆瘵諸疾若曰五勞六極六損七傷五尸九蟲十疰諸骨蒸之證是也蓋五勞者志勞思勞憂勞心勞瘦勞此五臟之病也六極者氣極血極筋極骨極肉極精極此六腑之患也七傷者心肝脾肺腎並內外所傷或為五臟併骨脈所傷為七傷也五尸者為蜚尸遁尸寒尸喪尸尸疰也九蟲者曰伏蟲蛔蟲白蟲肉蟲肺蟲胃蟲弱蟲赤蟲蟯蟲也十疰者為風疰氣疰寒疰生人疰涼疰酒疰食疰水疰尸疰土疰也諸骨蒸者為心肝脾肺腎膽胃大腸小腸膀胱三焦鬲宗筋回腸玉房腦骨髓筋脈血肉是也然勞極損傷尸疰諸蒸之名既以聞矣其所感之因所患之狀又果何如哉曰矜持志節勞傷乎腎應乎骨極預事而憂勞傷乎肺應乎氣極意外思慮勞傷於脾應乎肉極盡力謀慮勞傷於肝應乎筋極曲運神機勞傷於心應乎脈極勞極精氣變生諸疾此非五勞而應六極者哉蓋勞者謂勞於神氣傷者謂傷於形容也而六極之病又何如氣極者令人內虛五臟不足邪氣多正氣少不欲言血極令人顏色少澤眉發脫落忽忽喜忘筋極令人轉筋十指爪甲皆痛苦倦不能久立骨極令人酸削齒痛手足煩疼不可舉動行立肉極令人羸瘦面無色澤飲食不為肌膚精極令人氣翕翕然內虛五臟氣不足發落悲傷喜忘六損者為感寒則損陽陽虛則陰盛故損則自上而下感熱則損陰陰虛則陽盛故損則自下而上自上而損者一損損於肺則皮聚而毛落二損損於心則血脈虛少不能榮於臟腑三損損於胃則飲食不為肌膚若損過此病不可治矣自下而損者一損損於腎則骨痿不能起於床二損損於肝則筋緩不能自收持三損損於脾則肌肉消鑠若損過此證難以療矣是故心肺損而色弊肝腎損而骨痿脾胃損穀不化斯謂六損也若飲食不節傷脾思慮太過傷心色欲太過傷腎起居無常傷肝喜怒悲愁太甚傷肺風寒暑濕傷於外飢飽勞身傷於內此所謂七傷也若晝感之則病營夜感之則病衛營衛經行內外交運各從其所司也五尸者蜚尸則發無由漸忽而至如飛走之急疾心腹刺痛氣息喘急脹滿上衝心胸也遁尸者言其停遁在人肌肉血脈之間卒有所犯令人心腹脹滿刺痛喘促攻刺兩脅上衝心胸瘥後復發停遁不消寒尸者緣身內尸蟲與外邪相引接而成發動令人心胸脹滿刺痛但至冬感寒氣即發喪尸者因人年命衰弱至於喪死之處心意忽有畏惡其身內尸蟲性既忌惡更接引外邪共為此病其發亦心腹刺痛脹滿喘急但逢喪死其病則發也尸疰病者挾外鬼邪之氣流注身體令人寒熱淋瀝沉沉默默不知所苦或腹痛脹滿喘急氣息上衝心胸傍攻兩脅或纍塊踴起或攣引腰脊或舉身沉重精神錯雜常覺昏憒每節氣改變輒致大惡積月纍年漸至於死死後復易傍人乃至滅門以其尸病故易傍人故為尸疰九蟲者一曰伏蟲長四分為群蟲之長二曰蛔蟲長一尺貫心則殺人三曰白蟲長一寸相生子孫轉大長至四五尺亦能殺人四曰肉蟲狀若爛杏令人煩滿五曰肺蟲狀如蠶令人咳嗽六曰胃蟲狀如蛤蟆令人嘔逆吐噦七曰弱蟲又名鬲蟲狀如瓜瓣令人多唾八曰赤蟲狀若生肉令人腸鳴九曰蟯蟲至微細形似菜蟲居回腸多則為痔極則為癩及生癰疽疥癬瘻瘑齲蟲無不為也凡此諸蟲依人腸胃之間臟腑實則害臟腑虛則蝕人臟腑腸胃血髓變成諸患至於不療人將氣絶從九竅膚腠飛通而出著於怯弱之人遂成傳尸勞瘵綿綿不絶也夫十疰者疰者注也注之為言住也此由陰陽失守經絡空虛而風寒暑濕飲食勞倦一切之邪氣或作感生死之氣卒感鬼神之情留住人身變病多端至於三十六種九十九般而方書皆不顯載惟有十疰之證名一曰風疰皮膚掣振遊易不定一年之後頭髮墮落頸項掣痛骨拉解鳴兩目痛鼻中酸牙齒蟲蝕變為溫風汗風柔風水風大風絶風顛狂風寄風罩風等病人死三年之後魂神因作風塵著人遂成病名曰風疰也二是氣疰走入神機妄言百日後體皮腫起乍來乍去一年後體滿失色三年後變作蟲難治三曰寒疰心腹懊疾嘔沫二年後大便出血吐逆青沫心疼腹滿腰脊強痛四曰生人疰心脅痛轉移無常三日後體中痛移易牽掣沖絞心脅一年後目赤面色青黑二年後咳逆下痢變作蟲難治五曰涼疰心下乍熱乍寒一年一復四肢喜臥噫酢體常浮腫往來不時而皮黑羸瘦生癖目黃爪甲及唇口青六曰酒疰體氣動熱氣從胸中上下無處不痛一年外四肢重喜噦七曰食疰心下痛懊憹徹背一年後羸瘦體腫先從腳起肉變黑臍內時痛八曰水疰手足腫百日體肉變發落目失明一年後難治三年身腫轉盛體生蟲死九曰尸疰體疼牽掣七日後體肉變白駁咽喉中吞如有物兩脅痛也十曰土疰人之五臟配合五行土內主於脾氣為五行五臟之主其所禁忌尤難觸犯人有居住穿鑿地土不擇便利觸犯禁忌土氣與人血氣相感便致疾病其狀土氣流注皮膚連腑臟骨節沉重遍身虛腫其腫自破故謂之土疰夫蒸之在心少氣煩悶舌必焦黑蒸在小腸腹內腸鳴大便或祕或泄蒸在肝目昏暈躁恐無時蒸在膽耳聾口苦脅下堅痛蒸在腎耳輪焦枯腰腳痠疼蒸在右腎情意不定精泄如白絮蒸在肺喘嗽咳血聲音嘶遠蒸在大腸右鼻乾疼大腸隱痛蒸在脾唇口乾腹脅脹滿畏寒不食蒸在胃鼻口乾燥肚脹自汗睡不寧蒸在膀胱小便黃赤凝濁如膏蒸在三焦或寒或熱中脘膻中時覺煩悶蒸在膈心胸噎塞疼痛不舒蒸在宗筋筋脈縱緩小腹急痛蒸在回腸肛門蹇澀傳道之時裡急後重蒸在玉房男子遺精女子白淫蒸在腦眼眵頭眩口吐濁涎蒸在肌肉鱗起毛折發落蒸在骨板齒黑燥大杼痠疼蒸在髓肩背倦疼胻骨痠痛蒸在筋眼昏脅痛爪甲焦枯蒸在脈心煩體熱痛如針刺蒸在肉自覺身熱多不奈何四肢瞤動蒸在血毛髮焦枯時有鼻衄或復尿血此為諸般骨蒸也大凡醫工遇此諸疾其人血氣未敗精神未散尤可施治若血氣精神已壞形體肌肉俱削及日夕發熱咳嗽大便作泄斷不可療雖有神丹聖藥亦不能作效也癆瘵通治方樂令建中湯治臟腑虛損身體消瘦潮熱自汗將成癆瘵此藥大能退虛熱生血氣前胡去蘆細辛去葉當歸去土白芍藥人參去蘆橘皮去白桂心去皮麥門冬去心黃耆蜜炙茯苓去皮甘草炙各一錢半夏湯泡七次八分上作一服水二盅生薑五片紅棗一枚煎一盅不拘時服黃耆鱉甲散治虛勞客熱肌肉消瘦四肢煩熱心悸盜汗減食多渴咳嗽有血黃耆蜜炙鱉甲去裙醋炙桑白皮半夏湯泡七次秦艽去蘆地骨皮白茯苓去皮天門冬去心人參去蘆赤芍藥生地黃洗焙桔梗去蘆紫菀去蘆知母以上各一錢肉桂去皮半錢柴胡去蘆甘草炙各八分上作一服水二盅生薑三片煎至一盅食後服秦艽鱉甲散治氣血勞傷四肢倦怠面黃肌瘦骨節煩疼潮熱盜汗咳嗽痰唾並皆治之秦艽鱉甲去裙醋炙荊芥去梗天仙藤青皮貝母去心前胡去蘆柴胡去蘆白芷陳皮去白乾葛甘草炙各一錢肉桂去皮羌活各半錢上作一服水二盅生薑三片煎至一盅食後服秦艽扶羸湯治肺痿骨蒸已成勞嗽或寒或熱聲嗄不出體虛自汗四肢倦怠秦艽鱉甲米醋炙人參去蘆當歸洗焙紫菀半夏湯泡七次甘草炙各一錢地骨皮一錢半柴胡去苗二錢上作一服用水二盅生薑五片烏梅紅棗各一枚同煎至一盅食後服鱉甲地黃湯治虛勞手足煩熱心下怔忡身體羸瘦飲食不為肌膚鱉甲醋炙熟地黃酒浸柴胡去蘆當歸酒浸石斛去根秦艽去蘆茯苓去皮麥門冬去心白朮各一錢半人參去蘆肉桂不見火甘草炙各一錢上作一服水二盅生薑五片烏梅一枚煎一盅不拘時服黃耆飲子治諸虛勞氣四肢倦怠骨節痠疼潮熱乏力自汗怔忡日漸黃瘦胸膈痞塞不思飲食咳嗽痰多甚則唾血黃耆蜜炙當歸酒浸紫菀去土地骨皮石斛去根人參去蘆鹿茸酒炙桑白皮附子泡去皮臍款冬花半夏湯泡七次甘草炙各一錢上作一服水二盅生薑五片紅棗一枚煎一盅不拘時服參耆散治勞瘵嗽喘咯血聲嗄潮熱盜汗人參北五味子杏仁去皮尖防風羌活款冬花桑白皮炒各半錢明阿膠炒柴胡白茯苓黃耆蜜炙紫菀茸當歸川芎半夏制貝母去心枳殼麩炒秦艽洗桔梗甘草炙各八分鱉甲去裙米醋炙黃一錢上作一服水二盅生薑三片紅棗二枚煎至一盅食後服劫勞散治心腎俱虛勞嗽時復三四聲潮熱熱過即有盜汗四肢倦怠體瘦恍惚異夢嗽中有血名曰肺痿白芍藥二錢半黃耆蜜炙人參白茯苓熟地黃酒洗當歸去蘆半夏曲五味子阿膠蛤粉炒甘草炙各一錢上作一服水二盅生薑三片紅棗二枚煎一盅食後服凝神飲子治勞瘵增寒發熱口乾咽燥自汗煩郁咳嗽聲重唾中血絲瘦劇倦乏人參當歸白芍藥茯神去木白朮黃耆半夏曲蓮肉去心桔梗麥門冬去心熟地黃酒浸五味子白茯苓甘草炙各一錢上作一服水二盅烏梅紅棗各一枚煎至一盅食後服如嗽加阿膠虛極胸滿加木香濕紙裹煨加沉香亦可如不思飲食加扁豆阿膠丸治勞嗽並嗽血唾血阿膠蛤粉炒生地黃洗卷柏葉薊根五味子雞蘇葉山藥各一兩柏子仁炒另研麥門冬去心人參防風各半兩上為細末煉蜜和丸如彈子大每服一丸細嚼濃煎小麥湯或麥門冬湯咽下青蒿散治虛勞骨蒸咳嗽聲嗄皮毛乾枯四肢倦怠夜多盜汗時作潮熱飲食減少日漸瘦弱青蒿秦艽香附子炒去毛桔梗去蘆天仙藤鱉甲醋炙前胡去苗各一兩烏藥半兩川芎二錢半甘草炙一兩半上為末每服三錢水一盞生薑三片紅棗一枚煎至六分濾去渣食後服清骨散治男子婦人五心煩熱欲成勞瘵北柴胡生地黃各二錢熟地黃人參去蘆赤茯苓防風去蘆秦艽各一錢薄荷葉七分胡黃連五分上作一服水二盅煎至一盅食遠服團參飲子治憂思善怒飢飽失宜以致臟氣不安咳唾膿血增寒壯熱肌膚消瘦將成勞瘵人參紫菀去土阿膠蛤粉炒細辛去葉杏仁去皮尖款冬花天門冬去心經霜桑葉半夏湯泡七次五味子百合蒸各一錢甘草炙半錢上作一服水二盅生薑五片煎至七分食後服因氣而成嗽者加木香吐血有絲者加生地黃咳而唾血有寒者加鍾乳粉因疲極而咳嗽者加黃耆因損嗽而唾血者加沒藥藕節咳而嘔逆腹滿不食者加白朮仍倍加生薑咳而小便多者加益智仁咳而大便溏者去杏仁加鍾乳粉咳而氣逆者加沉香橘皮同煎地仙散治骨蒸肌熱一切虛勞煩躁並皆治之地骨皮防風各一兩薄荷一錢半甘草二錢半上為末每服三錢水一盞生薑三片竹葉七片煎至六分去生薑竹葉食後服一方加人參半兩雞蘇一兩倍甘草白朮黃耆散治五心煩熱自汗四肢痿弱飲食減少白朮黃耆當歸黃芩芍藥以上各半兩寒水石茯苓各一兩人參川芎各七錢半官桂二錢半石膏甘草炙各二兩上為末每服三錢水一盞煎至六