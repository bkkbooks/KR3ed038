末半兩更煎至六分去滓空心及晚食前分為二服白羊肉湯治虛勞羸瘦腳膝無力耳聾盜汗心多忪悸白羊肉二斤去脂膜汲水四升煮取二升桂心三分杜仲去粗皮炙黃銼白茯苓熟地黃牛膝去苗人參去蘆白朮遠志去心黃耆銼龍骨以上各一兩磁石三兩搗碎水淘去赤汁上㕮咀每服四錢用羊肉汁一中盞煎至六分去滓每於食前溫服之麻黃根散治虛勞盜汗口乾心煩不欲飲食四肢少力麻黃根牡蠣粉枸杞子白龍骨白茯苓熟地黃人參以上各一兩麥門冬去心三分黃耆二兩上㕮咀每服四錢以水一中盞入生薑半分棗三枚煎至六分去滓不拘時溫服牡蠣散治虛勞盜汗牡蠣粉麻黃根敗蒲扇灰杜仲去粗皮炙各一兩白茯苓去皮黃耆各二兩上㕮咀每服四錢以水一中盞煎六分去滓不拘時溫服輕骨湯治虛勞身體倦怠百節痠疼羸瘦發熱神思不爽知母焙人參白朮天仙藤洗柴胡鱉甲去裙醋炙秦艽以上各一兩黃耆鹽水浸焙當歸白茯苓前胡紫菀洗焙川芎常山甘草生以上各半兩上㕮咀每服三錢以水一盞半入烏梅半個同煎至八分去滓不拘時溫服治男子婦人勞極虛損遍身筋骨拘緊腰背腳手疼痛及痛風打傷跌損勞風寒濕證疼痛或時舉發不可忍者無問年遠日近悉皆治之羌活細辛各二錢草烏半生半熟赤芍藥白芷以上各一錢半當歸麝香真者另研肉桂以上各二錢半防風獨活藿香川烏銼碎米泔浸一宿甘草以上各一錢以上除麝香另研外余藥俱要道地好者陳蛀者不用銼碎研為細末用絹篩過分作五服每服入麝香末半錢用後藥浸酒調服生地黃韭菜根木瓜松節露根者不用上不拘多少捶碎用好酒浸經一宿次日可用大補摩腰膏治五勞七傷腰膝疼痛鬢髮早白面色痿黃水臟久冷疝氣下墮耳聾目暗痔瘻腸風凡百疾病悉能除療兼治女人子宮久冷頭髮疏薄面生皯𪒟風勞血氣産後諸疾赤白帶下並皆治之木香丁香沉香零陵香附子炮去皮臍乾薑炮官桂去粗皮吳茱萸膩粉另研白礬火煅另研麝香另研舶上硫黃另研等分上將前八味為細末入後四味同研勻用煉蜜和丸如雞頭實大每用生薑自然汁一合煎令沸投水一盞入藥一丸同煎良久化破以指研之就溫室中蘸藥摩腰上藥盡為度仍如棉裹肚系之少頃腰上熱如火久用之則血脈舒暢容顏悅懌牛膝散治虛勞損腰腳疼痛牛膝熟地黃赤茯苓赤芍藥以上各一兩附子炮去皮臍酸棗仁微炒當歸羚羊角屑桂心以上各三分五加皮防風去蘆各半兩上㕮咀每服三錢水一中盞煎至六分去滓食前溫服五味子丸治五勞六極七傷虛損腰膝疼痛腎氣不足五味子菟絲子酒浸別研肉蓯蓉酒浸切焙以上各二兩車前子二兩半白茯苓去皮一兩巴戟去心三兩上為細末煉蜜和搗三五百杵丸如梧桐子大每服三十丸食前用溫酒送下治虛勞腰腳無力久服令人強健麋角鎊為屑入酥少許慢火炒黃色稱五兩附子炮去皮臍稱半兩上為細末酒煮麵糊和丸如梧桐子大每服五十丸空心用溫酒送下酸棗仁散治虛勞口舌乾燥心神煩渴少得睡臥酸棗仁烏梅取肉微炒麥門冬去心白茯苓去皮黃耆人參以上各一兩覆盆子甘草炙栝蔞以上各半兩上㕮咀每服四錢水一中盞煎至六分去滓不拘時溫服栝蔞根丸治虛勞煩熱口乾舌燥煩渴栝蔞根杏仁湯浸去皮尖雙仁麩炒微黃烏梅肉微炒甘草炙以上各一兩上為細末蒸棗肉入少許蜜和丸如彈子大每服以綿裹一丸含咽津日四五服骨填煎治虛勞渴無不效天門冬五兩白茯苓菟絲子山茱萸五味子麥門冬肉蓯蓉當歸牛膝附子巴戟石膏石葦人參桂心以上各四兩大豆黃卷一升上為細末取生地黃栝蔞根各十斤搗絞取汁於微火上煎減半便作數分內藥並下白蜜二斤牛髓一斤微火煎如糜食如雞子黃大日三亦可飲服之治虛勞上用白羊肝一具去肥膩於柳木砧上以竹刀細切後於砂盆內以柳木捶研傾於淨瓷器中以冷熟水三升浸經一日一夜取其汁渴即漸漸飲之紫芝丸治虛勞短氣胸脅苦傷唇口乾燥手足逆冷或時煩躁目視慌慌腹內時痛不思飲食此藥安神保精紫芝一兩半山芋天雄炮去皮臍柏子仁炒香別研枳殼去穰麩炒巴戟去心白茯苓去皮以上各一分半生地黃洗焙麥門冬去心焙五味子炒半夏湯洗去滑炒附子炮去皮臍牡丹皮人參以上各三分遠志去心蓼實各一分瓜子仁炒香澤瀉各半兩上為細末煉蜜和丸如梧桐子大每服十五丸加至三十丸用溫酒送下空心日午夜臥各一服續命丸治虛勞久病真氣欲絶喘滿自汗四肢厥逆面色青白全不入食牛膝酒浸焙一兩半楮實四兩附子炮去皮臍官桂去粗皮蜀椒去目併合口者炒出汗以上各一兩上為細末煉蜜和丸如梧桐子大每服二十丸用溫酒或鹽湯送下空心服椒紅丸治虛勞元臟久冷小便數利精神恍惚四肢無力骨節痠疼蜀椒去目補骨脂炒川楝實去核炒等分上為細末煉蜜和丸如梧桐子大每服十丸加至二十丸空心用溫酒送下堅固丸治虛勞極冷陽道衰弱小便滑數遺瀝烏頭炮去皮臍蘹香子炒各等分上為細末薑汁煮麵糊和丸如梧桐子大每服十五丸加至三十丸空心溫酒送下婦人赤白帶下醋湯下王不留行散治虛勞小腸熱小便淋瀝莖中痛王不留行生地黃滑石以上各一兩子芩半兩榆白皮赤芍藥當歸木通以上各三分上為細末每服二錢食前用米飲調下八靈散治虛勞補不足利小便赤茯苓去皮天門冬去心石菖蒲冬葵子白芥子官桂去粗皮椒紅澤瀉以上各等分上為細末每服二錢不拘時用溫湯調下茅根散治虛勞小腸熱小便出血水道不利茅根一兩半赤茯苓生地黃瞿麥黃芩滑石以上各一兩上㕮咀每服三錢水一中盞煎至六分去滓食前溫服五柔丸治虛勞不足飲食不生肌肉三焦不調大便閉澀並療癖飲百病大黃一斤炒前胡去苗二兩赤茯苓去皮細辛去葉肉蓯容酒浸芍藥葶藶隔紙炒半夏湯洗去滑當歸以上各一兩上為細末煉蜜和丸如梧桐子大每服十丸至二十丸食前用溫酒送下食後生薑湯送下亦可忌食生菜羊肉酢物及餳等蓽茇散治虛勞大腸久冷泄痢不止蓽茇肉豆蔻去殼縮砂去皮厚朴去粗皮薑汁炙人參去蘆龍骨以上各三分白茯苓去皮陳皮湯浸去白焙阿膠搗碎炒令黃桂心當歸丁香以上各三兩訶梨勒煨用皮赤石脂各一兩甘草炙微赤一分上為細末每服二錢空心煎艾粥飲調下及晚食前服赤石脂丸治虛勞泄痢腸胃虛冷飲食不消腹內雷鳴疼痛赤石脂石斛去根乾薑炮肉豆蔻去殼白龍骨人參去蘆附子炮白茯苓去皮鍾乳粉當歸去蘆川椒去目及合口者微炒出汗以上各一兩訶梨勒煨用皮肉桂去粗皮各一兩上為細末以神麯末酒煮糊和搗三二百杵丸如梧桐子大每服三十丸不拘時米飲送下附子丸治五勞及飽食房室傷胃令人大便數至溷而不能便日數十行劇者下血及治婦人産後余疾腹內絞痛附子一枚以豬脂如雞子黃大煎候裂削去上黑皮上為細末煉蜜和丸如豆大每服三丸先食服用溫白湯下日三稍加至十丸常服之永不痢忌豬肉羌活散治虛勞痿痹肢節疼痛羌活附子炮去皮臍牛膝去苗萆薢以上各一兩防風枳殼麩炒白蒺藜微炒去刺甘菊花沉香以上各半兩當歸白茯苓肉蓯蓉酒浸刮去皮桂心以上各三分上㕮咀每服三錢水一中盞煎至六分去滓食前溫服防風散治虛勞筋脈拘攣腰膝疼痛防風五加皮薏苡仁赤芍藥萆薢海桐皮枳殼麩炒熟地黃黃耆桂心以上各一兩杜仲去粗皮炙牛膝各一兩半牛蒡子續斷羚羊角屑以上各三分上銼散每服四錢水一盞生薑三片煎服蔓荊子散治虛勞傷筋風引筋脈拘攣疼痛肢節浮腫手指不可拳蔓荊子酸棗仁微炒防風去蘆枳實麩炒桂心以上各一兩木通一兩半百合二兩薏苡仁二兩半牽牛微炒三兩上㕮咀每服三錢水一中盞入生薑半分煎至六分去滓食前溫服石斛散治虛勞手足煩疼羸瘦無力不能飲食小便數石斛一兩半桑螵蛸微炒黃耆人參去蘆牛膝去苗雞䏶胵微炒熟地黃當歸以上各一兩麥門冬去心赤芍藥白龍骨以上各三分上㕮咀每服四錢水一中盞入生薑半分棗三枚煎至六分去滓不拘時溫服川椒丸治虛勞膝冷陰痿四肢羸弱川椒去目併合口者微炒出汗山茱萸肉蓯蓉酒浸去皮炙乾附子炮裂去皮臍蛇床子續斷以上各一兩菟絲子酒浸別搗為末鹿茸酥炙各二兩牛膝去苗一兩半遠志去心防風去蘆桂心以上各三分上為細末煉蜜和丸如梧桐子大每服三十丸食前用溫酒送下附子丸治虛勞膝冷附子半斤以新汲水浸一日一度換水浸經七日刮去黑皮切片焙乾補骨脂微炒肉蓯蓉酒浸一宿刮去皺皮焙乾石斛去根以上各四兩上為細末煉蜜和搗千餘下丸如梧桐子大每服三十丸食前用溫酒送下
