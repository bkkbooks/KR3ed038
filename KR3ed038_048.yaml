body:
  text: 卷之四十八積熱門附論張子和云李屏山素飲酒一日得病醫用酒症丸熱藥後目睹天地但見紅色遂成龍火之證卒不能救棠溪李濟之常病目及居省掾每服補肝散以致睛脹但見窗檻橫排幾至喪明令湧泄五七次繼服涼劑方始如故丹霞朱僧人曾病三陽蓄熱常居靜室不敢見明明則頭疼如錐每置冰於頂上不能解其物詢諸醫莫能辨其病後治之七日而愈其用汗吐下三法而已後用涼物清鎮之平復如故夫人陰平陽秘神氣以寧蓋昧者徇情縱欲因致積熱之證非一朝一日故也皆出於心熱甚則能傷血故出於心積熱者熱毒蘊積於內也或有體氣素實一時感觸熱毒之氣鬱積臟腑之間或在心肺之內令人口苦咽乾涎唾稠黏眼澀多淚心氣通於舌脾氣通於口熱燥相合無所受制故口舌上生瘡小便秘澀非傷寒之熱非風證之熱此乃積聚之熱也又有酒面煎爆雄附峻補皆能有熱謂之積熱也何哉一陰一陽之謂道偏陰偏陽之謂疾若偏者皆致成疾過於熱者積溫成熱蘊積於內遂成前證經云偏勝則有偏害偏害則有偏絕不可不察也王安道曰人之所賴以生者氣也氣者何陰陽是也夫陰與陽可以和而平可以乖而否善攝與否吉凶於是系不能善者故偏寒偏熱之病莫逃乎乖否之餘雖然寒也熱也粗工為之不難設積熱良工猶弗能以為計且以積熱言之始而涼和次而寒取寒取不愈則因熱而從之從之不愈則技窮矣王太僕故曰益火之源以消陰氣壯水之主以制陽光又曰取心者不必齊以熱取腎者不必齊以寒籲千言萬語之間殆猶和璧之在璞也積熱之病由此來矣人處中和偏陰不可以無陽偏陽不可以無陰惟在冷暖得中而已矯枉過正識者憂焉治法以三黃丸凡熱皆出於心熱甚則能傷血或以洗心散四順清涼飲子之類此皆前人立率處方後之學者不可將陰陽虛盛之熱又有血分氣分之熱陰盛格陽之熱一例作積熱證治之反誤多矣今聞積熱之方條具於後積熱通治方涼膈散治大人小兒臟腑積熱口舌生瘡痰實不利煩躁多痞腸胃秘澀便溺不利一切風熱並皆治之方見火門洗心散治風熱痰滯心經積熱口苦唇燥眼澀多淚大便秘結小便赤澀白朮一錢麻黃當歸荊芥穗大黃麵裹煨芍藥甘草各二錢上作一服用水二盅生薑三片薄荷少許同煎至一盅不拘時溫服三黃湯治積熱結滯臟腑大便秘結心膈煩躁黃連去須黃芩去蘆大黃煨各三錢上作一服用水二盅煎至一盅空心服甘露飲治胃中客熱牙宣齦腫咽膈乾燥吐氣腥臭或胃經受濕伏熱在裡身黃如疸亦能治之枳殼麩炒石斛去蘆枇杷葉去毛熟地黃黃芩麥門冬去心山茵陳生地黃天門冬去心甘草炙各一錢半上作一服用水二盅煎至一盅食後溫服消毒犀角飲治大人小兒內蘊邪熱痰涎壅滯或腮項結核遍生瘡癤已潰未潰並宜服之防風去苗一錢鼠黏子炒三錢荊芥穗二錢甘草炙一錢半上作一服用水二盅煎至一盅食後溫服八正散治大人小兒心經蘊熱咽乾口燥目赤睛疼臟腑秘結小便赤澀方見淋門荊黃湯治風熱結滯或生瘡癤荊芥四錢大黃二錢上作一服用水二盅煎至一盅空心服清氣散治風壅痰涎上膈煩熱枳殼川芎柴胡前胡茯苓羌活獨活青皮白朮人參甘草各一錢上作一服用水二盅荊芥一穗煎至一盅不拘時服黃連解毒湯治熱毒煩悶口燥呻吟蓄熱內甚諸藥不能退其熱勢者方見火門人參瀉肺湯治肺經積熱上喘咳嗽胸脅脹滿痰多大便澀人參黃芩梔子枳殼炒薄荷連翹杏仁炒去皮桑白皮炒大黃桔梗炒甘草炙各一錢上作一服用水二盅煎至一盅食後通口服天門冬散治肺壅腦熱鼻乾無涕大腸秘澀眠臥心躁天門冬大黃升麻桑白皮枳殼甘草各一錢二分荊芥二錢四分上作一服用水二盅煎至一盅食後服四順清涼飲子治血熱蘊結壅滯方見火門黃芩湯治心勞實熱口瘡心煩腹滿小便不利黃芩澤瀉梔子仁生乾地黃木通黃連去須麥門冬去心甘草炙一錢二分上作一服用水二盅生薑五片煎至一盅食前溫服利膈湯治脾肺有熱虛煩上壅咽喉生瘡雞蘇葉荊芥穗防風桔梗生蒡子炒人參甘草各一兩上為細末每服二錢不拘時沸湯點服如咽痛口瘡甚者加殭蠶一兩防風通聖散治一切風熱疥癘等疾方見風門三黃丸治丈夫婦人三焦積熱咽喉腫閉心膈煩躁小便赤澀大便秘結黃連去須黃芩去蘆大黃煨各十兩上為細末煉蜜為丸如梧桐子大每服四十丸熱水送下一方以腦麝為衣丸如大豆夜間含化一二丸亦可薄荷煎治口舌生瘡痰涎壅塞咽喉腫痛薄荷一斤取頭末三兩半縮砂半兩取末二錢川芎半兩取末二錢片腦半錢別研甘草半兩取末二錢半上為細末和勻煉蜜成劑不拘時任意嚼咽和劑方無片腦有桔梗天竺黃散治臟腑積熱煩躁多渴口舌生瘡咽喉腫痛山梔子去殼連翹各三錢栝蔞根一兩六錢雞冠雄黃半錢鬱金用皂角水煮切片焙乾三錢甘草三兩二錢上為細末每服一錢食後臨臥新汲水調服龍腦雞蘇丸消煩渴涼上膈解酒毒除邪熱並治咳嗽唾血鼻衄吐血諸淋下血胃熱口臭肺熱喉腥脾疸口甜膽疸口苦並宜服之柴胡銀州者二兩和木通以湯半升浸一二宿取汁後入膏生地黃六兩另為末黃耆去蘆一兩麥門冬去心四兩木通同柴胡浸人參去蘆蒲黃炒阿膠炒以上各二兩雞蘇淨葉一斤即薄荷甘草炙一兩半上除別碾藥外余藥為細末用好蜜二斤先煉一二沸然後下生地黃末不住手攪令勻取木通柴胡汁慢火熬成膏勿令焦然後入余藥末同和為丸如豌豆大每服二十丸嚼破熱水下虛寒煩熱消渴驚悸人參湯下咳嗽唾血鼻衄吐血麥門冬煎湯下惟諸淋車前子煎湯下噙化三黃丸大黃黃芩黃連各二兩半黃藥子白藥子各一兩半黃柏苦參山豆根硼砂各一兩京墨三錢片腦一錢半麝香少許上為細末用豬膽汁調勻攤在碗內甑上蒸三次露一宿後入腦麝硼砂為丸如豆大每服一丸食後噙化冬加知母一方有甘草大金花丸治中外諸熱寢汗咬牙睡語驚悸溺血淋閉咳衄血瘦弱頭痛併骨蒸肺瘻喘嗽去大黃加梔子名曰梔子金花丸又名既濟解毒丸方見火門神芎丸治心經積熱風痰壅滯頭目赤腫或有瘡癤咽膈不利大小便閉澀一切風熱之證並宜服之大黃生用黃芩各二兩牽牛生用滑石各四兩黃連薄荷葉川芎各半兩上為細末滴水和丸如梧桐子大每服五十丸食後用溫水送下牛黃涼膈丸治上焦壅熱口乾咽痛煩躁涎潮牛黃片腦麝香各一分紫石英半兩研飛馬牙硝寒水石煅硬石膏各二兩牛膽南星三分甘草一兩微炙上為細末煉蜜為丸每兩作四十丸每服一丸食後溫薄荷人參湯下酒蒸黃連丸治膈熱解酒毒厚腸胃黃連半斤淨用酒二升浸以瓦器置甑上累蒸至爛取出曬乾上為細末滴水為丸如梧桐子大每服五十丸食前用溫水送下碧雪治一切積熱咽喉腫痛口舌生瘡心中煩躁咽物妨悶或喉閉壅塞水漿不下天行時疫發狂昏憒並皆治之芒硝青黛石膏煅過研飛寒水石研飛朴硝硝石馬牙硝甘草各等分上將甘草煎湯二升去滓卻入諸藥再煎用柳木篦不住手攪令消熔得所卻入青黛和勻傾入砂盆內候冷結凝成霜研為細末每用少許含化咽津不拘時候如喉閉壅塞不能咽物者即用小竹筒吹藥入喉中即愈頻吹效既濟清神散益腎水降心火清上實下桔梗黃芩川芎山梔子當歸羌活白朮茯苓以上各一兩知母甘草薄荷各十兩上㕮咀每服五錢水一盞半煎至七分去滓入蜜調服玄明粉治邪熱所幹膈上氣滯五臟秘澀上用朴硝煎過澄濾五七遍至夜於星月下露至天明自然結成青白塊子用瓷罐子按實於炭火內從慢至緊自然成汁煎沸直候不響再加頂火一煅便取出於淨地上倒下用盆子合蓋了以去火毒然後研為細末每二斤入生熟甘草末二兩一處攪勻臨臥斟量用之或一錢二錢以桃花煎湯或蔥白湯下此藥本性寒燒過性溫無毒忌諸般魚及毒物等地黃煎治積熱地黃汁四升二合茯神知母葳蕤以上各四兩栝蔞根五兩生薑汁生地骨皮生麥門冬汁白蜜各二升石膏八兩竹瀝三合一方用竹葉上㕮咀以水一斗二升先煮諸藥取汁三升去滓下竹瀝地黃麥門冬汁慢火煎四五沸下蜜薑汁微火煎取出六升初服四合日三夜一加至五七合四五月作散服之海仙丸治諸伏熱頭目不清神志昏塞解諸大毒以取水之精漬於船板木中累見風日久則日炙變為青色以取太陽之氣而蒸曝中有陰陽之氣結而不散聚而成青服之分陰陽去邪熱調臟腑聖人處治以度物之氣味故所用如東壁牆土取之以新水調化取清水服之治腑臟不調謂脾主於土脾受濕濡瀉取以太陽真火其土引入於脾藉太陽真火之氣以除去濕而吐瀉得止又以魚骨入喉中肉內不出燒魚網灰新水調服其魚骨即時便出又有月蝕瘡不愈者令人燒救月鼓杖燒灰乾摻瘡上立已此聖人取其物類相感故也此船板青與上同意船板青五兩酥油餅末一兩半上為細末稀麵糊和丸如梧桐子大每服四五十丸不拘時溫酒送下硃砂膏治心臟驚熱至甚不省人事硃砂硼砂煙硝各二錢半金銀箔各五片腦子一字寒水石石膏各半兩粉草三錢上為細末每服二錢麥門冬二十粒去心煎湯調下
