body:
  text: 卷之四十一脹滿門附論活人書謂腹脹滿者由陰陽不和蓋天之陰陽寒暑也人之陰陽氣血也其有不和必致偏勝則寒暑不調人之偏勝則氣血乖和氣血乖和則變生百病夫脹滿者豈不由偏勝之所致乎六元正紀論云太陰所至為中滿又云濁氣在上則生䐜脹又云諸濕腫滿皆屬脾土蓋心肺為陽居上腎肝為陰居下脾屬土居中州亦陰也為倉廩之官主納水穀灌溉四臟經曰飲食入胃遊溢清氣上通於肺下輸膀胱水精四布五經並行陰陽自和心肺之陽降腎肝之陰升以成交泰而為無病或六淫七情之侵擾又飲食失節房勞致損俾脾土之陰傷胃雖納穀不能運化則陽自升而陰自降陰陽不和則為否膈矣遂使清濁相混氣道壅塞氣化濁血瘀郁為熱熱留而久氣化成濕濕熱相搏遂成脹滿是曰鼓脹外雖堅滿而脹中空無物腹之虛大經曰腹脹大鼓之如鼓者此之義也又有單腹蠱脹者蠱之一字從蟲似有蟲食於內之義其謬固氣之盤結於腸間固難治也靈樞脹論云五臟六腑皆有其脹各各不同然脹者皆因厥氣在下寒氣逆上榮氣留止真邪相攻兩氣相搏合而為脹或為臟腑之間或為氣血之分或為胸脅或為皮膚各有其病各有其狀蓋營氣循脈衛氣逆則為脈脹衛氣並脈循分則為膚脹此病皆由人之臟氣所致或四氣七情之所乘襲至於飲食飢飽致使三焦虛實而為脹者治法不同設冬感寒胸中痞滿脈來沉細為寒脹治宜溫解寒邪夏月傷熱胸腹堅滿脈來虛弱為暑脹治宜清熱除濕若飢飽傷脾脾氣若虛遲於克化少有停滯即為脹滿脈浮滑者為膨滿也宜以消導所滯其病自愈若其不升降痞結胸中三焦相混大小便不通卒然脹滿脈來沉伏為三焦脹也又有虛實之分虛者皮膚殼殼然而堅不痛而氣滿治以升降氣道溫補脾元即復矣實者內挾宿食邪實於內按之堅痛當以疏氣滌實可也至以久病而脹脾土已敗最為危證治難取效諸脹當推其原而療之實者滌之虛者補之寒者熱之熱者清之結者散之留者行之在血分則通其血在氣分則行其氣始可萬全不致殆矣脹滿通治方中滿分消湯治中滿寒脹寒疝大小便不通四肢厥冷食入反出下虛中滿腹中寒心下痞躁寒厥奔豚不收並治之益智半夏湯泡木香茯苓去皮升麻以上各一錢人參去蘆青皮川烏炮去皮臍當歸柴胡乾薑蓽澄茄黃連以上各六分黃耆黃柏去皮吳茱萸草豆蔻厚朴麻黃澤瀉以上各半錢上作一服水二盅生薑三片煎至一盅食前服大忌房勞酒濕面生冷硬物消脹丸治諸脹木香大黃茯苓去皮厚朴薑製澤瀉以上各一兩黑牽牛取末滑石各六兩上為細末滴水和丸如梧桐子大每服五十丸食前用生薑湯送下導氣丸治諸痞塞關格不通腹脹如鼓大便祕結小腸腎氣等疾功效尤速青皮用水蛭等分同炒赤去水蛭莪朮用虻蟲等分同炒赤去虻蟲胡椒茴香炒去茴香三稜乾漆炒去幹漆檳榔斑蝥炒去斑蝥赤芍藥川椒炒去川椒乾薑硇砂炒去硇砂附子青鹽炒去青鹽茱萸牽牛炒去牽牛石菖蒲桃仁炒去桃仁上各等分銼碎與所製藥炒熟去水蛭等不用只以青皮等十味為細末酒糊為丸如梧桐子大每服五十丸加至七十丸空心用紫蘇湯送下沉香散治腹脹氣喘坐臥不得沉香木香各一錢半枳殼麩炒蘿蔔子炒各三錢上作一服水二盅生薑三片煎至一盅不拘時服順氣木香散治氣不升降嘔逆噁心胸膈痞悶脅肋脹滿及酒食所傷噎氣吞酸心脾剌痛大便不調面色萎黃肌肉消瘦不思飲食兼治婦人血氣刺痛一切冷氣並皆治之方見氣門七物厚朴湯治腹滿發熱陽盛陰虛陽盛則外熱陰虛則內熱脈必浮數浮則為虛數則為熱陰虛不能宣導飲食如故致脹滿者為熱脹厚朴薑汁炒三錢大黃蒸二錢桂心五分枳實去穰麩炒一錢半甘草炙一錢上作一服水二盅生薑五片紅棗二枚煎至一盅食前服嘔者加半夏利者去大黃中滿分消丸治中滿熱脹鼓腹氣脹厚朴薑製炒一兩半夏湯泡枳實炒各半兩黃芩去皮半兩夏月一兩乾生薑知母炒各四錢茯苓去皮砂仁去皮澤瀉陳皮以上各三錢豬苓去皮黃連去須炒薑黃白朮人參甘草各二錢半上為細末和勻湯浸蒸餅和丸如梧桐子大每服一百丸焙熱以熟水送下食遠服量病大小加減廣茂潰堅湯治中滿腹脹內有積塊堅硬如石令人坐臥不安大小便澀滯上喘氣促面色痿黃通身虛腫廣朮煨黃連柴胡去蘆甘草生用神麯炒澤瀉以上各一錢半陳皮去白吳茱萸湯泡青皮去白升麻以上各一錢黃芩去黑皮草豆蔻煨厚朴薑製當歸梢益智以上各半錢紅花一分半夏七分乾葛二分上作一服水二盅先浸藥少時煎至一盅食遠服忌酒濕面中滿服後漸減積塊未潰再服後半夏厚朴湯半夏厚朴湯半夏一錢厚朴八分神麯六分桃仁去皮尖十五個黃芩生用澤瀉紅花白茯苓橘紅蘇木青皮吳茱萸蒼朮草豆蔻黃連以上各五分當歸梢豬苓京三稜升麻以上各四分乾生薑肉桂生甘草柴胡木香昆布乾葛以上各三分上作一服水二盅煎至一盅食遠服三稜煎丸治心腹堅脹脅下滿硬胸中痞塞喘滿短氣常服順氣消積滯除膨脹京三稜生半斤搗為細末以酒三升於銀石器內熬成膏杏仁湯泡去皮尖炒黃色乾漆炒煙盡麥蘖炒以上各三兩青皮去白蘿蔔子炒神麯炒以上各二兩硇砂飛研一兩上為細末以三稜膏和丸如梧桐子大每服二十丸食後溫米飲送下木香流氣飲調榮衛利三焦行痞滯消脹滿方見諸氣門五膈寬中散治七氣流滯飲食不下氣滿膨脹方見翻胃門溫胃湯治憂思聚結脾肺氣凝陽不能正大腸與胃氣不平脹滿上衝咳食不下脈虛而緊澀附子炮去皮臍厚朴去皮生用當歸白芍藥人參甘草炙橘皮以上各一錢半乾薑一錢一分川椒去合口者炒出汗三分上作一服水二盅生薑三片煎至一盅食前服人參芎歸湯治煩躁喘急虛汗厥逆小便赤大便黑名血脹人參木香辣桂去皮五靈脂炒烏藥莪朮煨甘草炙縮砂仁以上各一錢川芎一錢半當歸二錢半夏湯泡一錢半上作一服水二盅生薑五片紅棗二枚紫蘇四葉煎至一盅食前服木通飲治脅肋刺痛膨脹小便赤澀大便不利或浮腫木通陳皮去白紫蘇莖甘草炙各三錢上作一服水二盅生薑三片紅棗二枚燈心十莖煎至一盅不拘時服參香散治一切氣脾虛作脹痞氣人參官桂甘草炙以上各七分桑白皮桔梗陳皮枳實麩炒麥門冬青皮大腹皮半夏以上各一錢紫蘇子茯苓香附子木香各一錢二分上作一服水二盅生薑三片紅棗二枚煎至一盅食前服大半夏湯治肝氣大盛勝克於脾脾不運化結聚涎沫閉塞臟氣胃冷中虛遂成脹滿之病其脈多弦遲半夏湯泡二錢附子炮去皮臍枳實麩炒厚朴姜炒桂心以上各一錢半當歸茯苓川椒炒出汗甘草炙以上各一錢人參五分上作一服水二盅生薑五片紅棗二枚煎至一盅食遠服平肝飲子治喜怒不節肝氣不平邪乘脾胃心腹脹滿頭眩嘔逆脈來浮弦防風去蘆枳殼麩炒桔梗去蘆赤芍藥桂枝以上各一錢半木香不見火人參檳榔川芎當歸陳皮甘草炙各八分上作一服水二盅生薑五片煎至一盅不拘時服紫蘇子湯治憂思過度致傷脾胃心腹膨脹喘促煩悶腸鳴氣走漉漉有聲大小便不利脈虛緊澀方見喘門強中湯治食啖生冷過飲寒漿有傷脾胃遂成脹滿有妨飲食甚則腹痛人參青皮去白陳皮去白丁香以上各二錢白朮一錢半附子炮去皮臍草果仁乾薑炮以上各一錢厚朴薑製甘草炙各五分上作一服水二盅生薑三片紅棗二枚煎至一盅不拘時服嘔者加半夏或食麵脹滿加蘿蔔子各一錢大正氣散治脾胃怯弱為風寒濕氣所傷遂致心腹脹滿有妨飲食白朮陳皮各二錢半夏湯泡藿香葉厚朴薑製桂枝不見火枳殼麩炒檳榔乾薑炮以上各一錢甘草炙半錢上作一服水二盅生薑三片紅棗二枚煎一盅不拘時服枳實湯治腹脹發熱大便祕實脈多洪數病名熱脹枳實麩炒大黃酒蒸各二錢厚朴薑製炒三錢桂心去皮不見火八分甘草炙一錢上作一服水二盅生薑五片紅棗二枚煎至一盅去滓不拘時服嘔者加半夏一錢沉香交泰丸治濁氣在上而擾清陽之氣鬱而不伸為䐜脹沉香陳皮去白白朮以上各三錢枳實麩炒澤瀉當歸洗白茯苓去皮吳茱萸湯泡青皮去白木香以上各二錢大黃酒浸一兩厚朴薑製半兩上為細末湯浸蒸餅為丸如梧桐子大每服七八十丸食前用溫白湯送下微利為度木香塌氣丸治中滿腹脹下虛損者木香胡椒草豆蔻麵裹煨青皮去白以上各三錢蘿蔔子炒陳皮去白各五錢全蠍梢去毒二錢半上為細末麵糊為丸如梧桐子大每服三十丸不拘時用米飲送下小兒用桑白皮煎湯送下大異香散治失飲傷飽痞悶停酸旦食不能暮食病名谷脹三稜莪朮青皮半夏曲陳皮藿香桔梗枳殼炒香附炒益智以上各一錢半甘草炙半錢上分作二帖每帖用水二盞生薑三片棗一枚煎至一盅去滓食遠服氣針丸治氣膨脹薑黃青皮以上各半兩全蠍去毒肉豆蔻麵煨木香丁香胡椒以上各一兩蘿蔔子炒去皮研二兩上為細末研勻用酒生薑汁煮糊和丸如梧桐子大每服五十丸紫蘇湯下陳皮湯亦可萬金丸治諸食積氣積血積鼓脹之類石菖蒲八兩銼斑蝥四兩去翅足二味同炒焦黃色揀去斑蝥不用上用粗布袋盛起兩人牽掣去盡蝥毒屑了卻將菖蒲為細末以醋煮糊和丸如梧桐子大每服三五十丸溫酒或白湯送下如治蠱脹加香附子末一二錢為末調服此藥治腫脹尤妙遇仙如意丸治氣積氣脹痃癖水蠱宜服白茯苓青皮陳皮以上各一錢白豆蔻石菖蒲人參丁香三稜炮白朮砂仁官桂莪朮炮遠志木香以上各三錢山藥半兩香附五兩牽牛取頭末八兩甘草五分上為細末醋煮糊和丸如梧桐子大每服一百二十丸臨睡溫白湯送下看老幼虛實加減服忌一切生冷硬物氣鼓水蠱每服三百丸立消若風病加地骨皮一兩婦人月事不調産後腹中有惡物並宜服之利後服米汁一口即止住利後可服甘露散補之甘露散人參白朮茯苓豬苓以上各半兩滑石六兩澤瀉甘草各一兩上為細末每服三錢食前白滾湯調服撞關飲子治關格不通氣不升降脹滿丁香不見火沉香不見火砂仁去殼白豆蔻去殼三稜去毛炮香附去毛烏藥已上各一錢半甘草炙半錢上作一服水二盞煎至七分食遠溫服敷藥治腹滿緊硬如石或陰囊腫大先用甘草嚼後用此大戟芫花甘遂海藻各等分上為細末用釅醋調面和藥攤於綿紙上覆貼腫處仍以軟帛裹住蓽澄茄丸治痞滿脹痛谷脹氣脹蓽澄茄砂仁青皮白豆蔻蘿蔔子木香以上各二分茴香炒肉豆蔻煨辣桂丁香以上各一分半陳皮三分上為細末麵糊和丸如梧桐子大每服三十丸空心用陳皮湯送下十全丸治心腹痞悶脅肋脹滿食少多傷丁香木香各一兩枳殼麩炒京三稜去毛煨莪朮青皮去白陳皮去白縮砂仁去殼檳榔以上各二兩香附子炒四兩上為細末麵糊和丸如梧桐子大每服五十丸食前用米飲送下木香化滯散破滯氣治心腹滿悶木香薑黃青皮去白縮砂仁去殼人參檳榔白朮以上各二錢白豆蔻去殼藿香橘皮大腹子白茯苓去皮白檀香桔梗以上各五分甘草炙四分上為細末每服三錢水一盞半煎至一盞食前稍熱服沸湯點服亦可忌生冷硬物治腹脹方腹裡胸間久痞疼多因氣食動脾經縮砂三和同煎服調理中湯效最靈治久患腹脹脾疼中滿痞悶不食大小便或澀小腹脹急用局方三和散二帖縮砂仁二十粒捶碎用水三盞生薑十片燈心十莖同煎至一盞半去滓分作三次每服用前藥調理中湯半帖立效治腹脹方腹脹脾疼怎抵當椒姜之外有丁香三般等分羅教細次入白鹽和白湯脾疼之疾皆因寒氣停滯積於胸膈或時嘔吐酸水不思飲食用胡椒食姜丁香三味等分為細末每服一錢半或二錢入鹽少許不拘時白湯點服消脹丸治久患腹脹丁香木香檳榔蘿蔔子牽牛各等分上為細末水糊為丸如梧桐子大每服十丸空心用紫蘇湯送下又方凡治腹脹經久患泄瀉數升晝夜不止服藥不驗者乃氣脫也宜用此上用益智子煎濃湯服立愈木香順氣湯治濁氣在上則生䐜脹木香草豆蔻麵裹煨蒼朮米泔浸各三分厚朴薑製四分當歸五分青皮去白益智仁白茯苓去皮陳皮澤瀉乾生薑吳茱萸湯泡半夏以上各二分升麻柴胡各一分內經曰留者行之結者散之以柴胡升麻之苦平行少陽陽明二經發散清氣運行陽分為君以生薑半夏草豆蔻益智仁辛甘大熱消散中寒為臣以厚朴木香蒼朮青皮苦辛大溫通順滯氣以當歸陳皮人參之辛甘溫調和榮衛滋養中氣濁氣不降以苦泄之吳茱萸之苦熱泄之者也氣之薄者為陽中之陰茯苓甘平澤瀉鹹平氣薄引導濁陰之氣自天而下故以為佐氣味相合散之泄之上之下之使清濁之氣各安其位也範天驤夫人先因勞役飲食失節加之憂思氣結病心腹脹滿旦食則不能暮食兩脅刺痛診其脈弦而細至夜濁陰之氣當降而不降䐜脹尤甚大抵陽主運化飲食勞倦損傷脾胃陽氣不能運化精微聚而不散故為脹滿先灸中脘乃胃之募穴引胃中生髮之氣上行陽道又以前藥助之使濁陰之氣自此而降矣上㕮咀都作一服用水二盞煎至一盞去滓食前溫服忌食生冷硬物雞矢醴治心腹脹滿旦食不能暮食由脾元虛弱不能剋制於水水氣上行浸漬於土土濕不能運化水穀氣不宣流上下痞塞故令人中滿旦陽氣方長穀氣易消故能食暮陰氣方進谷不得化故不能食其脈沉實滑病名谷脹上用雞矢白半升以好酒一斗漬七日每服一盞食後臨臥時溫服
