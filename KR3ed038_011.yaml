body:
  text: 卷之十一普濟消毒飲子時毒治驗泰和二年先師以進納鹽濟源稅時四月民多疫癘初覺增寒體重次傳頭面腫盛目不能開上喘咽喉不利舌乾口燥俗云大頭天行親戚不相訪問如染之多不能救張縣丞侄亦得此病至五六日醫以承氣加藍根下之稍緩翌日其病如故下之又緩終莫能愈漸至危篤或曰李明之存心於醫可請治之遂命診視具說其由先師曰夫身半已上天之氣也身半已下地之氣也此邪熱客於心肺之間上攻頭目而為腫盛以承氣下之瀉胃中之實熱是誅罰無過殊不知適其所至焉故遂處方用黃芩黃連味苦寒瀉心肺間熱以為君橘紅味平玄參苦寒生甘草甘寒瀉火補氣以為臣連翹鼠黏子薄荷葉苦辛平板藍根味苦寒馬勃白殭蠶味苦平散腫消毒定喘以為佐升麻柴胡苦平行少陽陽明二經不得伸桔梗味辛溫為舟楫不令下行共為細末半用湯調時時服之半用蜜為丸噙化之服盡良愈因嘆曰往者不可追來者猶可及凡他所有病者皆方書以貼之全活甚衆時人皆曰此方天人所制遂刊於石以傳永久黃芩黃連各半兩人參三錢橘紅玄參生甘草柴胡桔梗各二錢連翹鼠黏子板藍根馬勃各一錢白殭蠶炒升麻各七分上件為細末服餌如前法或加防風薄荷當歸身㕮咀如麻豆大每服稱五錢水二盞煎至一盞去滓稍熱時服之食後服如大便硬加酒煨大黃一錢或二錢以利之腫勢甚者宜砭刺之治熱病五六日壯熱狂語欲走雞子二枚取清芒硝研細寒水石細研各半兩上先以新汲水一小盞調芒硝等末次下雞子清攪令勻不拘時候分為二服羚羊角散治熱病發汗後熱毒未盡因有所驚發熱癲狂羚羊角屑犀角屑茯神黃芩甘草炙防風各半兩龍齒人參鐵粉各一兩地骨皮三分上㕮咀每服五錢水一大盞煎五分去滓不拘時溫服鐵粉丸治熱病心神恍惚悲喜不常發狂欲走鐵粉細研牛黃細研遠志去心丹參茯神升麻各半兩金箔三七片細研銀箔三七片細研麝香細研白殭蠶微炒白附子炮各一分馬牙硝細研三分上為細末同研令勻煉蜜和搗三五百杵丸如梧桐子大每服二三十丸不拘時薄荷湯下含化犀角丸治熱病心脾虛熱肺氣暴壅喉中腫痛口舌乾燥咽津有妨不下飲食宜服犀角屑黃藥子黃芩鬱金大黃銼炒玄參甘草炙升麻各半兩絡石葉射干各三分天門冬去心焙馬牙硝各一兩上為細末入馬牙硝研令勻煉蜜和搗三五百杵丸如小彈子大每服不拘時常含化一丸咽津生地黃煎治熱病心胸煩熱口乾皮肉黃宜服生地黃汁生栝蔞汁生麥門冬根汁各五合蜜二合酥酪一兩生藕汁三合上一處相和於鍋中熬令稍稠每服不拘時抄半匙服刺薊飲子治熱病頭痛壯熱鼻衄及吐血心中緊硬遍身疼痛四肢煩悶宜服刺薊生地黃生麥門冬去心各一兩赤茯苓雞蘇生薑各半兩青竹茹一分上㕮咀水三大盞煎一盞半去滓不拘時分溫三服治熱病衄血日夜無度身面如金黃色上以韭根一握搗絞取汁以罐盛索系投於井中深處良久急取出瀝水同和滴二七滴於鼻中瘥治熱病鼻衄若血下數升者宜服上以好松煙墨二兩搗羅為細末用雞子白和為丸如梧桐子大每服二十丸用生地黃汁下如人行五里再服以瘥為度龍膽煎治熱病口瘡發渴疼痛不可忍宜塗龍膽草黃連升麻槐白皮大黃各一兩薔薇根竹葉各二兩上細銼卻以水兩大盞煎至一大盞去滓入蜜三合慢火煎成膏塗於瘡上有涎吐之青葙子丸治熱病毒攻於眼內生翳膜宜服青葙子防風枳殼麩炒各一兩枸杞子生地黃石決明澤瀉各一兩半麥門冬二兩半去心焙茺蔚子細辛黃連各三分車前子二兩上為細末煉蜜和搗三二百杵丸如梧桐子大每服三十丸以粥清飲下不拘時服解毒犀角丸治熱病毒氣外攻皮膚斑出狂亂躁熱宜服犀角屑黃芩馬牙硝大青各一兩梔子仁牛黃細研天竺黃細研赤茯苓甘草生用黃連各半兩麝香細研一錢麥門冬一兩半去心焙上為細末每服二錢不拘時竹葉煎湯調下白蘚皮散治熱病毒氣不散遍身生熱毒瘡白蘚皮升麻黃芩犀角屑梔子仁赤芍藥大黃炒甘草炙玄參杏仁湯浸去皮尖炒各半兩麥門冬一兩去心焙上㕮咀每服四錢水一中盞煎六分去渣不拘時溫服藍葉散治熱病熱毒盛疱瘡出頭黑者為難治藍葉玄參瞿麥各一兩犀角屑升麻各一兩半木香一兩甘草炙半兩上㕮咀每服五錢以水一大盛煎五分去渣不拘時溫服茵陳散治熱病黃疸目黃如金小便如血心煩躁悶口苦頭痛宜服茵陳梔子各三分木通栝蔞根柴胡秦艽各一兩甘草炙半兩麥門冬一兩半去心上㕮咀每服五錢以水一大盞入竹葉三七片煎至五分去滓不拘時候溫服承氣丸治熱病若十餘日不大便者宜服大黃炒芒硝各二兩枳實麩炒火麻仁研入郁李仁湯浸去皮研各一兩上為細末和勻煉蜜和搗三五百杵丸如梧桐子大每服五十丸不拘時以溫水下未利再服木通散治熱病小便不通或淋瀝疼痛木通琥珀別研各一兩赤芍藥枳實麩炒茅根甘草炙各半兩上㕮咀每服四大錢水一中盞煎六分去滓不拘時溫服石葦散治熱病小便不通石葦去毛瞿麥各一兩木通甘草炙子芩各半兩葵子三合上㕮咀每服四錢水一中盞煎六分去滓不拘時溫服
