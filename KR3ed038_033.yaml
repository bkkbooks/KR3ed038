body:
  text: 卷之三十三消渴門附論內經陰陽別論曰二陽結為之消脈要精微論曰疸成為消中調逆論曰心移熱於肺傳為膈消也凡治消疸偏枯痿厥氣滿皆飲食膏梁之病也歧伯曰脈實病久可治脈弦細小病久不可治後分為三消膈消者舌上赤裂大渴引飲脈經云堅數相搏則為消渴脈軟散者當病消渴病機云消渴之疾三焦受病也上消者肺也多飲水而少食大便如常小便清利知其燥在上焦也治以流濕潤燥消中者胃也渴而飲食多小便赤黃熱前消穀知熱在其中焦也宜下之消腎者初發而為膏淋謂淋下如膏油之狀至病成面色黧黑形瘦而耳焦小便濁而有脂液治法宜養血以分其清濁而自愈也是以劉河間三消之論始言天地六氣五味以配養人身六位五臟而究乎萬病之源終引內經論渴諸證以辨乎或熱藥之誤此證反復要在詳明非深探陰陽造化之機者孰能知之請陳其略經云有言心肺氣厥而渴者有言肝脾而渴者有言脾熱而渴者有言腎熱而渴者有言胃與大腸熱結而渴者有言脾痹而渴者有言小腸痹熱而渴者有因病瘧而渴者有因肥甘石藥而渴者有因醉飽後入房而渴者有遠行勞倦大熱而渴者有因傷胃干而渴者有因病風而渴者雖五臟部分所感不同之病皆因燥熱亡液一也三消之疾本濕寒相搏陰氣極為燥熱陽氣太甚亦皆飲食服餌失宜腸胃乾涸而氣液不可宣平或耗亂精神過違其度或因大病陰氣損而液衰虛陽氣悍而燥熱亦甚或因久嗜咸物恣食炙爆飲酒過度亦有年少服金石丸散久積金石之毒熱結於胸中下焦虛熱益甚因而腎水不能制金石熱燥甚於腎故渴而引飲若飲水多而小便多者名曰消渴若飲食多而不甚渴小便數而消瘦者名曰消中若渴而飲水下不絶肌消瘦而小便有脂膏者名曰腎消此三消者其燥熱同也治此疾者補腎水陰寒之虛而瀉心火陽熱之實除腸胃燥熱之甚水升火降津液充則無危矣此則三消之渴明矣東垣云夫飲食不節勞役所傷以致脾胃虛弱胃既虛不能滋養氣血所生病主口中津液不行故口乾咽燥也病人自以為渴醫者治以五苓散謂止渴燥而反渴燥乃重竭津液以至危亡經云虛則補其母當於心與小腸中以補脾胃之根蒂也甘溫之藥以為君苦寒之藥為之使以酸味為之臣佐以其心食苦急食酸以收之心火旺則肺金受邪金虛以酸補之次以甘溫及甘寒之劑於脾胃中瀉心火亢盛治其本也所勝妄行者言心火旺能令母實母者肝木也肝木旺則挾火之勢無所畏懼而妄行也故脾胃先受之又如胃氣不行內亡津液而乾涸求湯飲以自救非渴也乃口乾也非熱勝也乃血病也當以辛甘益之淡滲五苓散之類所當禁也又謂胃虛不能食而大渴不止者不可用淡滲之藥止之乃胃中元氣少故也用七味白朮散補之世見渴甚者不求所因例用淡滲之劑重竭其液故也今推其所因合而分之夫渴本乎熱也而熱有內外虛實之分若傳經之熱熱甚耗液而為渴者氣分而受邪也當與寒涼淡滲之劑速清其熱熱去而陰生陰生而渴止矣若胃虛亡液陰虧而為渴者血受病也當與甘溫辛酸之劑滋益其陰陰生而燥除燥除而渴已矣豈可一概而治哉且消渴之疾三焦之病火炎其心則危邪熱熏蒸漸漬日深氣血凝滯有患癰疽瘡愈渴止則生瘡潰渴甚則危叔和云消渴之脈大者活虛小病深厄難脫此之謂也古人論三焦者消渴消中消腎是也渴有虛實之分皆立其論以啓後人之學當以誠心鑑之消渴通治方地黃飲子治消渴咽乾面赤煩躁生地黃熟地黃天門冬去心麥門冬去心人參去蘆黃耆蜜炙石斛去根枇杷葉去毛枳殼去穰麩炒澤瀉甘草炙各一錢上作一服水二盅煎至一盅食後服麥門冬飲子治膈消胸滿心煩津液短少多為消渴病麥門冬去心二錢五味子栝蔞實生地黃人參去蘆茯神去木乾葛知母甘草炙以上各一錢二分上作一服水二鍾竹葉十四片煎至一鍾不拘時服烏梅五味子湯治消渴生津液烏梅五味子百藥煎巴戟去心酒浸甘草炙各二錢上作一服水二盅煎至一盅空心服加味錢氏白朮散治消中消穀善飢人參去蘆白茯苓去皮白朮以上各二錢枳殼去穰麩炒柴胡藿香乾葛北五味子木香甘草炙各一錢上作一服水二盅煎至一盅食遠服人參石膏湯治膈消上焦燥渴不欲多食人參去蘆三錢石膏四錢知母二錢甘草黃芩杏仁各一錢上作一服水二盅粳米一撮煎至一盅不拘時服六神湯治三消渴疾白茯苓去皮牡丹皮去滑澤瀉酒潤蒸各八錢五味子微炒一兩半山茱萸取肉焙乾肉桂去粗皮不見火熟地黃蒸熟乾乾山藥微炒各二兩上各研末稱和勻煉蜜為丸如梧桐子大五更初溫酒鹽湯任下三五十丸午前晚間空腹再服此藥不惟止渴亦免生癰疽久服永除渴疾氣血加壯茯神丸治消中煩熱消穀小便數茯神去木人參去蘆枳殼去穰生地黃麥門冬去心牡蠣粉黃連以上各一兩蓮肉去心黃耆去蘆炙知母以上各半兩栝蔞根七錢半上為細末煉蜜和搗三五百杵丸如梧桐子大每服五十丸食遠用米飲送下加減腎氣丸治腎氣不足心火上炎口舌乾燥多渴引飲肢體消瘦並皆治之山茱萸去核白茯苓去皮牡丹皮去心熟地黃酒蒸五味子山藥炒鹿角鎊澤瀉以上各一兩半官桂不見火沉香不見火各半兩上為細末煉蜜為丸如梧桐子大每服七十丸米飲鹽湯任下弱甚者加附子一兩兼常服黃耆六一湯黃耆六一湯治諸虛不足胸中煩悸時常消渴或先渴而欲發瘡或病癰疽而後渴者宜服之黃耆去蘆蜜炙九錢甘草炙一錢半上作一服水二盅棗二枚煎至一盅不拘時服枇杷葉栝蔞根黃耆乾葛蓮房甘草各二錢上作一服水二盅煎至一盅空心服小便不利加茯苓止渴湯治霍亂煩渴方見霍亂門栝蔞散治壯盛之時不自謹惜恣情縱欲長年腎氣虛弱不能房事多服丹石真氣既盡石氣孤立唇口乾焦精液自泄小便赤黃大便乾實小便日夜百十行須當除熱補虛天花粉宣黃連白扁豆白茯苓去皮寒水石甘草節人參去蘆白朮去蘆石膏豬苓各等分上為細末每服二錢不拘時用白湯調服人參散治消腎善飲而食後數小便溺者人參去蘆砂仁白朮山梔子桔梗去蘆栝蔞連翹澤瀉以上各半錢葛根黃芩大黃白茯苓甘草生用薄荷以上各一錢石膏寒水石滑石以上各一錢半上作一服水二盅入蜜少許煎至一盅不拘時服加減八味丸治腎水枯竭不能上潤心火上炎不能既濟心煩躁渴小便頻數白濁陰痿弱飲食不多肌膚漸漸如削或腿腫腳先瘦小宜降心火生腎水其煩頓止降心湯治心火上炎腎水不濟煩渴引飲氣血日消天花粉二錢人參去蘆當歸遠志去心生薑汁拌焙乾白茯苓去皮黃耆蜜炙川芎北五味子熟地黃甘草微炙各一錢上作一服水二盅紅棗二枚煎至一盅食前服黃耆湯治諸渴疾黃耆蜜炙茯苓去木栝蔞根麥門冬去心生地黃五味子甘草炙各一錢半上作一服水二盅煎至一盅食遠服天花散治消渴天花粉生地黃麥門冬去心乾葛以上各二錢五味子甘草以上各一錢上作一服水二盅粳米百粒煎至一盅食遠服止渴銼散治消渴枇杷葉去毛炙生薑切片焙乾葛以上各二錢大烏梅二個淡竹葉甘草生用草果以上各一錢上作一服水二盅煎至一盅不拘時服鹿茸丸治失志傷腎腎虛消渴小便無度鹿茸去毛酒浸炙熟地黃洗蒸黃耆去蘆蜜炙雞䏶胵麩炒肉蓯蓉酒浸焙乾山茱萸去核破故紙炒五味子人參去蘆川牛膝去蘆酒浸以上各七錢半白茯苓去皮地骨皮去滑以上各半兩麥門冬去心二兩上為細末煉蜜為丸如梧桐子大每服五十丸食前用米湯送下天王補心丹寧心保神益血固精壯力強志令人不忘清三焦化痰涎祛煩熱除驚悸療咽乾口燥育養心氣人參去蘆丹參洗白茯苓去皮酸棗仁洗遠志去心百部洗石菖蒲去毛柏子仁桔梗去蘆玄參天門冬去心五味子茯神去木當歸熟地黃各等分上為細末煉蜜為丸每兩作十丸以金箔為衣燈心棗湯化下食後臨臥服或作梧桐子大丸吞服亦可雙補丸消腎虛水涸燥渴勞倦鹿角膠二兩白茯苓去皮人參去蘆薏苡仁炒熟地黃洗蒸肉蓯蓉酒浸焙乾菟絲子酒浸蒸焙覆盆子五味子石斛酒浸焙當歸去蘆酒浸焙黃耆去蘆蜜炙木瓜以上各一兩沉香不見火澤瀉各半兩麝香一錢另研上為細末煉蜜為丸如梧桐子大以硃砂為衣每服五十丸空心用棗湯送下玉泉丸治煩渴口乾麥門冬去心人參去蘆茯苓去皮黃耆半生半蜜炙烏梅肉焙甘草以上各一兩天花粉乾葛以上各一兩半上為細末煉蜜為丸如彈子大每服一丸不拘時細嚼用白湯送下川黃連丸治諸渴川黃連五兩淨麥門冬去心天花粉各半兩上為細末以生地黃汁並牛乳汁夾和搗杵為丸如梧桐子大每服五十丸食前用粳米飲送下天花粉丸治消渴飲水多身體瘦弱天花粉人參去蘆等分上為細末煉蜜為丸如梧桐子大每服五十丸食前用麥門冬煎湯送下枸杞子丸治消腎久渴困乏小便滑數枸杞子白茯苓去皮牛膝酒浸焙乾菟絲子酒浸研焙麥門冬去心熟地黃洗黃耆蜜炙牡蠣粉以上各一兩雞內金炙一兩半桑螵蛸栝蔞根各七錢半山茱萸去核牡丹皮各半兩上為細末煉蜜和搗三五百杵為丸如梧桐子大每服五十丸食前用米飲湯送下平補丸治消腎不渴肌肉瘦削小便澀數而瀝如欲滲之狀菟絲子酒浸研焙山茱萸去核酒浸益智仁當歸以上各半兩川楝子去核牛膝去蘆酒浸葫蘆巴炒杜仲去粗皮薑汁炒肉蓯蓉酒浸焙乾巴戟去心各三兩半乳香二兩上為細末用糯米糊為丸如梧桐子大每服五十丸食前用棗湯或鹽湯送下茯菟丹治三消渴通用亦治白濁白茯苓五兩菟絲子酒浸三宿蒸研細作餅焙乾一十兩上為細末用山藥末六兩打糊搜和搗三五百杵丸如梧桐子大每服五十丸食前用米飲湯送下和血益氣湯治消渴消中諸方只止燥渴殊不知足陽明胃主血所生病手陽明大腸主津所生病此方治口舌乾小便數舌上赤脈生津液除乾燥長肌肉生地黃酒浸黃柏酒浸升麻以上各二錢杏仁去皮尖炒十二個防己酒浸知母酒浸羌活以上各一錢桃仁去皮尖炒十二個石膏一錢半黃連酒浸一錢六分當歸酒浸八分麻黃六分紅花三分柴胡六分甘草生用五分炙用六分上㕮咀作二貼每貼用水二盅煎至七分不拘時溫服黃連膏治證同前黃連一片碾為末牛乳汁上將汁熬膏搓黃連末為丸如小豆大每服二十丸少呷湯下日進十服生地黃膏治證同前生地黃碗大一握冬蜜一碗人參半兩白茯苓去皮一兩上先將地黃洗搗爛以新水一大盞調開同蜜煎至一半次入參苓末拌和以瓷器密收用匙挑服三和甘露飲大治消渴有此證者每日須進一二服滑石六錢石膏四錢知母人參白朮茯苓豬苓澤瀉以上各一錢半甘草一錢上㕮咀分作二貼每貼用水二盞煎至一盞食遠溫服三消丸治消渴骨蒸宣黃連去須上為細末搗冬瓜自然汁和末成餅陰乾再研為末用冬瓜汁為丸如梧桐子大每服三五十丸不拘時用冬瓜煎湯送下或大麥煎湯亦可硃砂黃連丸治心虛蘊熱或因飲酒過多發為消渴辰砂一兩宣黃連三兩生地黃二兩上為細末煉蜜和丸如梧桐子大每服五十丸食前用燈心棗湯送下加減三黃丸治消渴及治服丹石毒致成此疾黃芩春四兩夏六兩秋六兩冬三兩黃連春四兩夏七兩秋三兩冬二兩大黃春三兩夏一兩秋二兩冬四兩上為細末煉蜜為丸如梧桐子大每服二十丸空心用白湯送下服一月愈黃連豬肚丸治消渴強中黃連粱米栝蔞根茯神各四兩麥門冬去心知母各二兩上為細末內豬肚中縫定置甑中蒸極爛取出藥搗豬肚為膏丸或再入蜜杵千餘下丸如梧桐子大每服五十丸人參湯送下米飲亦得一方加生地黃乾葛一方去知母粱米用小麥爛金丸治熱中消渴止燥補精血益諸虛解勞倦去骨節間熱寧心強志安神定魄固臟腑進飲食免生瘡瘍大豬肚一個黃連三兩生薑研蜜各二兩上先將豬肚淨洗控干復以蔥椒醋面等同藥以水酒入銀石器內煮半日漉出黃連洗去蜜酒令盡銼研為細末再用水調為膏入豬肚內以絲縫定仍入銀石器內水煮爛研如泥搜和下項藥人參五味子山藥杜仲去皮切薑汁炒去絲石斛山茱萸去核車前子新蓮肉去皮鱉甲醋炙熟地黃當歸以上各二兩磁石煅白茯苓槐角子炒川芎以上各一兩菟絲子酒浸蒸研五兩黃耆四兩沉香半兩麝香一錢別研入上為細末用豬肚膏搜和得所如膏少則添熟蜜搗數千杵丸如梧桐子大每服五十丸食前用溫酒或糯米飲送下一方有白朮二兩陽起石一兩真珠丸治心虛煩悶或外傷暑熱內積愁煩酣飲過多以致煩渴口乾舌燥引飲無度小便或利或不利鐵胤粉研牡蠣煅知母玄參以上各一兩一分苦參一兩硃砂二兩別研黃連一兩麥門冬去心天花粉各一兩金箔二百片銀箔二百片上為細末爛蜜入生栝蔞根汁少許丸如梧桐子大以金銀箔為衣每服二十丸至三十丸先用栝蔞根汁送下一服次用麥門冬熟水下病退日二服忌炙爆酒色一方有蘆薈二錢半白扁豆二兩炒天花丸治渴通用消渴消中消腎病三焦五臟生虛熱惟有膀胱冷似冰意中飲水無休歇小便日夜不記行骨冷皮焦心肺裂本因飲酒炙爆多四肢肌膚轉枯竭莫交便利白如泔口苦咽乾舌似血若如此狀病須危遇此神仙真妙訣天花粉白茯苓去皮牡蠣粉知母鐵胤粉苦參辰砂以上各半兩白扁豆薑製炒二兩黃連三兩以童子小便浸三宿焙乾蘆薈一分金銀箔各二十片上為細末用生栝蔞根汁和生蜜丸如梧桐子大每服三十丸用麥門冬湯送下一方無茯苓梅花聚香湯又名斬龍劊子手治消渴飲水至石鬥病極者可服之即愈天花粉烏梅肉枇杷葉麥門冬五味子栝蔞實人參黃耆乾葛以上各一兩檀香半兩上為細末水調隨意不時服之子童桑白皮湯治三消渴病或飲多利少或不飲自利肌膚瘦削四肢怠墮常服補虛止渴然渴有三消渴屬心內積煩愁心火炎上與暑熱或飲食相挺而動消中屬脾有陰勝陽蔚成寒中者有陰不勝陽成熱中者有狂陰興盛不交精泄成強中者消腎屬腎少不謹惜壯乃腎衰多服丹石以致發動唇乾咽竭精溢自泄不飲而利亦曰內消不亦危乎童根桑白皮去粗皮日乾不焙人參麥門冬去心白茯苓乾葛山藥桂心以上各一兩甘草半兩生用上銼碎水一盞半煎至七分去滓不拘時溫服參耆湯治消渴人參桔梗天花粉甘草以上各一兩綿黃耆鹽湯浸炙白芍藥各二兩白茯苓北五味子各一兩半上銼碎每服四錢水一盞半煎至八分日進四服留滓合煎一方有乾葛木瓜烏梅龍鳳丸治飲酒多發積為酷熱熏蒸五臟津液枯燥血泣小便並多肌肉消鑠專嗜冷物寒漿鹿茸一兩酒炙菟絲子酒浸山藥各二兩上為細末煉蜜為丸如梧桐子大每服三十丸食前用米飲送下濃煎人參湯亦可一方用麵糊為丸鹽酒鹽湯任下一名龍肝鳳髓丸冬瓜飲治消渴熱勝心神煩亂及飲水多小便如脂麩片日夜無度大冬瓜一枚黃連去須半斤上先搗黃連為末將冬瓜三停中截去一停取二停去淨瓤子內黃連末於冬瓜中卻取截下一砂蓋搜白麵孕裹冬瓜令遍即更以黃土硬泥裹一重候微干坐冬瓜在灰火中四面蔟炭火燒令泥赤即止候冷打去泥土並剝去面揭開冬瓜裡面有黃連汁不限多少濾過每服一盞渴即飲之立瘥更作一服冬瓜皮肉曬乾兼治骨蒸勞熱及酒黃多年者為末每於食後溫水調下二錢甚效醍醐膏治消渴上用烏梅一斤捶碎甜水四大碗煎至一碗濾去滓白沙蜜五斤砂仁末半兩入沙石器內慢火熬赤色成膏為度取下放冷加白檀末三錢麝香一字攪勻以磁石器盛密封口夏月冷水調冬月沸湯調服詩曰烏梅化痰止煩渴蜜生津液潤心肺白檀大能解暑毒麝香通竅辟邪氣繭絲湯治渴神效上用煮繭繅絲湯任意飲之頓效如非時以絲或綿煎湯服亦可有一人苦渴疾日飲鬥水服此有效治消渴方上用香水梨或好鵝梨或江南雪梨取汁用蜜相停同熬瓶盛不時用熟水或冷冰水調服大有功效止㕮梨亦妙東坡家藏方載消渴日飲水數斗飲食倍常而頻溺連年服藥不愈者可用麝香當門子一個酒浸之作十小丸以枸杞熬湯送下隨愈此病脾脈實而腎脈衰初因飲酒瓜果過度熱在脾胃而停積生冷雖飲食過人而多飲水飲水既多不得不溺非消渴也言甚當理服者審之珍珠龍腦丸治消渴鎮心安神珍珠辰砂人參黃連以上各半兩龍腦一錢上為細末煉蜜為丸如雞頭實大每服一丸空心日午及臨睡時細嚼用麥門冬湯送下天門冬丸治初得消中食以如飢手足煩熱背膊疼悶小便白濁並宜服之天門冬去心焙乾一兩半雞內金三具微炙桑螵蛸十枚炙土瓜根乾者熟地黃栝蔞根肉蓯蓉酒浸一宿切焙知母焙鹿茸酒炙五味子赤石脂澤瀉以上各一兩半牡蠣煅二兩苦參一兩上為細末煉蜜為丸如梧桐子大每服二十丸用粟米飲送下食前服豬腎薺苨湯治消中日夜尿八九升者豬腎一具大豆一升薺苨石膏以上各三兩人參茯神一作茯苓知母葛根黃芩磁石綿裹栝蔞甘草以上各二兩上㕮咀用水一斗五升先煮豬腎大豆取一斗去滓下藥煮取三升分作三服渴急飲之下焦熱者夜輒服一劑病勢減渴即止薺苨丸治強中為病莖長興盛不交精溢自出消渴之後多作癰疽皆由過服丹石所致薺苨大豆去皮茯神去木磁石煅研極細玄參石斛去根栝蔞根地骨皮去木鹿茸以上各一兩沉香不見火人參以上各半兩熟地黃酒蒸一兩上為細末用豬腎一具煮如食法爛杵和為丸如梧桐子大如難丸入少酒糊丸或爛蜜丸亦可每服七十丸空心用鹽湯送下止渴潤燥湯治消中大便祕澀燥硬兼喜溫飲陰頭退縮舌白乾燥唇口乾眼澀黑處見浮雲升麻一錢半黃柏酒浸當歸身荊芥穗桃仁泥麻仁泥知母防風以上各一錢柴胡石膏各七分杏仁泥六個熟地黃三分甘草梢小椒各二分細辛一分紅花少許上㕮咀作一服水二碗煎一碗去滓食遠溫服忌辛熱物腎瀝散治消腎腎氣虛損發渴小便數腰膝痛雞䏶胵微炙遠志去心人參桑螵蛸微炒黃耆澤瀉桂心熟地黃白茯苓龍骨當歸以上各一兩麥門冬去心川芎各二兩五味子甘草炙玄參以上各半兩磁石三兩研碎水淘去赤汁用上銼碎每服用羊腎一對切去脂膜先以水一盞半煮腎至一盞去水上浮脂及腎次入藥五錢生薑半分煎至五分去滓空心溫服晚食前再服金銀箔丸治消腎口乾眼澀陰痿手足煩疼小便多金箔一百片細研銀箔一百片細研丹砂細研栝蔞根各二兩巴戟去心熟地黃五味子澤瀉以上各一兩半天門冬去皮心當歸酒浸一宿切焙乾各二兩半上除別研藥外搗為細末再研勻煉蜜和丸如梧桐子大每服二十丸加至三十丸不拘時用粟米飲送下白茯苓丸治消腎因消中之後胃熱入腎消爍腎脂令腎枯燥遂致此疾即兩腿漸細腰腳無力白茯苓覆盆子黃連栝蔞根萆薢人參熟地黃玄參以上各一兩石斛去根蛇床子各三分雞䏶胵三十枚微炙上為細末煉蜜和搗三五百杵丸如梧桐子大每服三十丸食前煎磁石湯送下梅蘇丸治消渴膈熱煩躁生津液白梅肉紫蘇葉烏梅肉各半兩麥門冬去心三分百藥煎三兩訶黎勒煨用皮人參各一分甘草炙一兩半上為細末煉黃蠟汁拌和為丸如雞頭實大每服一丸不拘時含化咽津路行解渴䏶胵散治久渴旬日見效雞䏶胵雞腸各五具炙乾白龍骨漏蘆去蘆炙鹿角膠炙燥白石脂各一兩土瓜根三兩桑螵蛸二七個炙牡蠣粉黃連苦參各二兩半上為細末每服一錢至二錢米飲調下日三夜一神仙減水法一名斬龍劊子手治三焦虛熱三消渴疾日夜飲水無度此藥主之不可輕用其效如神人參天花粉知母宣黃連苦參麥門冬浮萍白扁豆黃耆各一兩黃丹少許上為細末每服一錢新汲水調下妙不可言生津甘露飲子治膈消大渴飲水無度舌上赤澀上下齒皆枯舌根強硬腫痛食不下腹時脹痛渾身色黃目白睛黃甚則四肢痿弱無力面塵脫色脅下急痛善嚏善怒健忘臀腰背寒兩尻冷甚石膏一兩一錢黃連桔梗木香以上各三錢黃柏酒拌二錢半薑黃山梔子炙甘草升麻人參以上各二錢全蠍一個杏仁去皮尖一錢半蓽澄茄生甘草連翹白豆蔻白芷以上各一錢麥門冬當歸白葵茴香以上各五分柴胡三分知母酒浸藿香以上各二分消渴之疾燥熱之氣勝也內經曰熱淫所勝佐以甘苦以甘瀉之熱則傷氣氣傷則無潤折熱補氣非甘寒之劑不能故以石膏甘草之甘寒為君啓玄子云滋水之源以制陽光故以黃柏黃連梔子知母之苦寒瀉熱補水為臣以當歸人參杏仁麥門冬全蠍連翹白芷白葵蘭香甘草之辛寒和血潤燥為佐以升麻柴胡苦平行陽明少陽二經白豆蔻木香蓽澄茄霍香反佐以取之又為因用桔梗為舟楫使浮而不下也上件為細末湯浸蒸餅和勻成劑捻作餅子曬半乾杵碎篩如米大食後每服二錢抄於掌內以舌舐之隨津唾下或以白湯少許送下亦可此治之緩也不惟不成中滿亦不傳瘡瘍下消矣東垣嘗謂余曰潔古老人有云能食而消渴者白虎倍加人參湯主之大作湯劑多服不能食而渴者錢氏白朮散倍加葛根大作湯劑廣服之赤茯苓湯治消渴飲水太過胃氣不和腹脹不思飲食赤茯苓赤芍藥枳殼麩炒甘草炙人參以上各半兩白朮前胡檳榔桂心以上各三分厚朴去粗皮生薑汁炙一兩上㕮咀每服四錢水一中盞入生薑半分棗三枚煎至六分去滓食前溫服肉蓯蓉丸治消渴尿脂小便如泔肉蓯蓉酒浸切焙地骨皮澤瀉五味子巴戟去心當歸切焙韭子熟地黃焙牡丹皮白龍骨甘草炙以上各一兩磁石火煅醋淬七次赤石脂人參以上各一兩半禹餘糧煅三分桑螵蛸炙十四枚上為細末煉蜜為丸如梧桐子大每服二十丸以牛乳或白湯送下日進三服鐵粉丸治消渴臟腑枯燥口乾引飲小便如脂鐵粉研水飛過干稱三兩再研雞䏶胵五枚陰乾炙熟為末黃連三兩碾末牡蠣煨研二兩上再研勻煉蜜和劑以酥塗杵熟丸如梧桐子大每服三十丸加至四十丸食前煎粟米飲送下紫蘇湯治消渴後遍身浮腫心膈不利紫蘇莖葉桑白皮赤茯苓各一兩郁李仁去皮炒二兩羚羊角鎊檳榔各三分桂心去皮枳殼麩炒獨活木香各半兩上㕮咀每服四錢水一盞半生薑半分煎至八分去滓不拘時溫服瞿麥湯治消渴欲成水氣面目並足膝脛浮腫小便不利瞿麥穗澤瀉滑石各半兩防己三分黃芩大黃各一分桑螵蛸炒十四枚上㕮咀每服三錢用水一盞煎至七分去滓空心溫服良久再服葶藶丸治消渴後成水病浮腫甜葶藶隔紙炒栝蔞仁杏仁湯浸去皮尖及雙仁麩炒黃漢防己各一兩上為細末煉蜜和搗一二百杵丸如梧桐子大每服三十丸食前赤茯苓煎湯送下日進三四服填骨煎治消渴後虛乏白茯苓去皮菟絲子酒浸別搗山茱萸去核麥門冬去心附子炮去皮臍石斛去根一作石膏牛膝酒浸焙巴戟去心當歸以上各二兩半大豆炒去皮三合石葦去毛桂心去皮各一兩三分五味子遠志去心人參以上各三兩半肉蓯蓉二兩酒浸切焙天門冬去心三兩三分上為細末用生地黃生栝蔞根各三斤搗絞取汁以銀石器慢火煎減半然後內藥並下白蜜十兩牛髓五兩再煎令如糜丸如雞子黃大米飲下日三藥末不必盡入惟看稀稠得所甚佳一方無遠志藍葉散治渴利口乾煩熱背生癰疽赤焮疼痛藍葉升麻玄參麥門冬去心黃耆葛根沉香赤芍藥犀角屑甘草生用一兩大黃二兩微炒上㕮咀每服四錢水一中盞煎至六分去滓不拘時溫服玄參散治渴利煩熱生癰疽發背焮腫疼痛玄參芒硝大黃微炒犀角屑羚羊角屑沉香木香黃耆各一兩甘草三分生用上為細末每服二錢不拘時用溫水調下忍冬丸治渴疾愈須預防發癰疽忍冬草不以多少根莖花葉皆可用之一名老公須一名蜜啜花一名金銀花一名左纏藤水洗淨用上用米麵酒於瓶內浸以粳火煨一宿取出曬乾入甘草少許為末即以所浸酒煮糊為丸如梧桐子大每服五十丸至百丸酒飲任下不拘時服一方用忍冬草煎服此藤經冬不凋三月開花五出黃白相間微香蒂帶紅外科精要又以煮酒窨服取時不犯鐵器服至大小腸通利此藥到得力用乾者不及生者效速仍治五種飛尸酒研敷瘡亦好但留一口泄毒氣真經效奇藥也此藥不特治癰亦能止渴並五痔諸漏
