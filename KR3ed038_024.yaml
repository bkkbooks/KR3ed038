body:
  text: 卷之二十四頭痛頭風大頭風門附論頭痛為病靈樞云厥頭痛取足六經手少陰真頭痛其腦盡痛手足寒至節死不治難經曰手三陽之脈受風寒伏留而不去則名厥頭痛入連在腦者名真頭痛內經云寸口脈中短者曰頭痛脈經云陽弦則頭痛又云寸口脈浮中風發熱頭痛脈緊頭痛是傷寒脈緊上寸口者風頭痛脈訣云頭痛短澀應須死浮滑風痰皆易除內經云東風生於春病在肝俞在頭項故春氣者病在頭又諸陽會於頭面如足太陽膀胱之脈起於目內眥上頞交巔上入絡腦還出別下項病沖頭痛又足少陽膽之脈起於目鋭眥上抵頭角病在頭角額痛夫風從上受之風寒傷上邪從外入客於經絡令人振寒頭痛身重惡寒治在風池風府調其陰陽不足則補有餘汗之則愈此傷寒頭痛也頭痛耳鳴九竅不利者腸胃之所生乃氣虛頭痛也心煩頭痛者痞在膈中過在手巨陽少陰乃濕熱頭痛也如氣上而不下頭痛巔疾者下虛上實也過在足少陰巨陽甚則入腎寒濕頭痛也如頭半寒痛者先取手少陽陽明後取足少陽陽明此偏頭痛也有真頭痛者甚則入連於腦手足寒至節者旦發夕死夕發旦死有厥逆頭痛者所犯大寒內至骨髓髓者以腦為至腦逆故令頭痛齒亦痛東垣云凡頭痛皆以風藥治之者終其大體而言之也高巔之上惟風可用緩藥之薄者陰中之陽乃自地升天者也然亦有三陰三陽病症者太陽頭痛惡風脈浮緊以芎羌活獨活麻黃之類為多少陽頭痛脈弦緩往來寒熱柴胡為多陽明頭痛自汗發熱惡寒脈浮緩長實者升麻葛根石膏白芷為多太陰頭痛必有痰體重腹痛為痰癖其脈沉緩蒼朮半夏南星為多少陰頭痛三陰三陽經不流行兩足寒氣逆為寒厥其脈沉細麻黃附子細辛為多厥陰頭痛項痛或痰吐涎沫厥冷其脈浮緩吳茱萸湯主之諸血虛頭痛當歸川芎為多諸氣虛頭痛人參黃耆為多為多者主治實藥也兼見何證以佐使藥治之此立方之大法也氣血俱虛頭痛者調中益氣湯中少加川芎蔓荊子細辛其效不可盡述半夏白朮天麻湯治痰厥頭痛藥也清空膏乃風濕熱頭痛藥也羌活附子湯治厥逆頭痛藥也如濕氣在頭者以苦吐之不可執方而治所論頭痛大法甚詳著矣世之方論又言頭風病名何以此不見發明請言其略凡邪令人頭痛者其邪一也但有新久去留之分耳淺而近者名頭痛其痛卒然而至易於解散速安也深而遠者為頭風其痛作止不常愈後遇觸復發也皆當驗其邪所從來而施治之觀於試效方載潔古老人壯歲時病頭痛每發時兩頰青黃暈眩目不欲開懶於言語身體沉重兀兀欲吐食數日方過乃曰此太陰厥陰合而為病名曰風痰以水煮金花丸更灸俠溪二穴二七壯不旬日愈以是觀之豈非頭風乎於此不言風者是言經之本也世言風者是言經之標乎何不明少陽厥陰頭痛者令人偏頭痛其經肝膽風木為邪也後人遂以此而名頭風可謂不求其本歟潔古云夫大頭風證者是陽明邪熱太甚資實少陽相火而為之也多在少陽或在陽明或傳太陽視其腫勢在何部分隨經取之濕熱為腫木盛為痛此邪見於頭風在兩耳前後所主其病也治之大不宜藥速速則過其病所謂上熱未除中寒復生必傷人命此病自外支內者是血病況頭部分受邪見於無形跡之部當先緩而後急先緩者謂邪氣在上著無形之分部既著無形無所不至若用重劑速下過其病難已雖用緩藥若急服之或食前或頓服皆失緩體則藥不能除病當徐徐浸漬無形之邪也或藥性味形體不離緩體是也且緩急者謂緩劑已瀉邪氣入於中是到陰部來於有形質之所若不速去則損陰也此終治卻為客邪當急去之治客以急也且治主病當緩者謂陽邪在上陰邪在下本家病也若急治之不能解分而益亂也治客以急者謂陽分受陰邪陰分受陽邪此客氣急除去之也假令少陽陽明為邪出於耳之前後也陽明為邪者首大腫也先以黃芩黃連甘草湯通炒煎少少不住服服畢不愈用新瓦上炒鼠黏子待香同大黃煎去滓內芒硝俱各等分亦時時呷之無令飲食在前得微利則邪氣去若陽明行經之藥升麻葛根芍藥甘草太陽行經獨活防風之類是也又以東垣治驗其所論制方自有來矣天之四時民多疫癘初覺增寒體重次傳頭面腫盛目不能開上喘咽喉不利舌乾口燥俗云大頭天行親戚不相訪問慮其傳染之故得此病者五六日醫以承氣加藍根下之稍緩翌日其病如故再下之又緩終莫能愈潔古謂之曰夫身半以上天之氣也身半以下地之氣也此邪熱客於心肺之間上攻頭目而為腫盛以承氣下之瀉胃中之實熱是誅罰無過殊不知適其所至為故遂處方用藥黃芩黃連味苦寒瀉心肺熱以為君橘紅苦平玄參苦寒生甘草甘寒人參甘溫瀉火補氣以為臣連翹鼠黏子薄荷味辛平板藍根味苦寒馬勃白殭蠶味苦平散腫消毒以為佐升麻柴胡平行少陽陽明二經不得伸桔梗味辛溫為舟楫不令下行共為細末一半用白沸湯調時時呷下一半用蜜為丸噙化之服盡良愈如大便硬者加酒煨大黃一錢或二錢以利之腫勢甚者宜砭刺之是皆深得病機之道詳盡立論處方以為後人之規焉頭痛頭風大頭風通治方芎術湯治濕頭痛眩暈痛極川芎附子生去皮臍白朮以上各三錢桂心去皮甘草各一錢上作一服水二盅生薑七片紅棗二枚煎至一盅食遠服小芎辛湯治風寒在腦頭痛眩暈嘔吐不止川芎三錢細辛洗去土白朮甘草炙各二錢上作一服水二盅生薑五片芽茶一撮煎至一盅食後服川芎散治風盛膈壅鼻塞清涕熱氣上攻眼目多淚生眵乃偏正頭痛川芎柴胡各二錢細辛半夏曲人參前胡防風甘菊花甘草炙各一錢薄荷少許上作一服水二盅生薑三片煎至一盅食後服菊花散治風熱上攻頭痛不止甘菊花去梗旋覆花去梗防風去蘆枳殼去穰麩炒川羌活去蘆蔓荊子石膏甘草炙各一錢半上作一服水二盅生薑五片煎至一盅不拘時服通關散治感風發熱頭痛鼻塞撫芎二兩川烏白芷薄荷甘草各一兩半川芎一兩細辛半兩上為細末每服二錢食後蔥茶調下薄荷湯亦可三生丸治痰厥頭痛天南星白附子半夏各等分上為細末用生薑自然汁浸蒸餅和丸如緑豆大每服五十丸食後生薑湯送下天香散治年久頭風不得愈者天南星半夏湯泡川烏去皮白芷各二錢上作一服水二盅入生薑自然汁小半盞煎一盅食遠服藿香散治體虛傷風停聚痰飲上厥頭痛或偏正頭疼及治諸風等證草烏炮去皮尖藿香洗去土各半兩川烏炮去皮臍一兩乳香如皂角子大三塊上為細末每服一錢食後薄荷湯調下芎辛導痰湯治痰厥頭痛川芎細辛南星陳皮去白茯苓以上各一錢半半夏二錢枳實麩炒甘草各一錢上作一服水二盅生薑七片煎至一盅食後服如聖餅子治風寒伏留陽經氣厥痰飲一切頭痛防風去蘆半夏生用天麻以上各半兩南星湯泡川烏去皮臍乾薑炮以上各一兩川芎甘草炙各二兩上為細末滴水和捻作餅子每服三五餅食後同荊芥穗細嚼茶酒任下一方加細辛加減三五七散治風寒入腦太陽頭痛方見風門川芎茶調散治諸風上攻頭目昏重偏正頭疼鼻塞聲重方見風門普濟消毒飲專治天行大頭纍試神效方見傷寒門大川芎丸治新沐感風名曰首風旋暈昏眩偏正頭疼川芎四兩天麻一兩上為細末煉蜜和丸每兩作十丸每服一丸細嚼茶酒任下不拘時服大追風散治久新偏正頭疼肝臟久虛血氣衰弱風毒上攻頭目眩暈心煩百節痠疼鼻塞聲重項背拘急皮膚瘙癢面上遊風狀若蟲行一切頭風兼治婦人血風攻注此乃消風化談清利頭目川烏炮去皮臍防風川芎荊芥殭蠶炒去絲石膏煅甘草炙以上各一兩白附子炮全蠍去毒炒羌活地龍去土炒南星天麻白芷以上各五錢乳香研沒藥研草烏炮雄黃以上各一錢半上為細末每服半錢臨睡用細茶湯調服急風散治男女偏正頭疼夾腦風太陽穴痛坐臥不安川烏生去皮臍辰砂研各一兩南星生用二兩上為細末用酒調塗痛處小兒貼囟門清空膏治偏正頭疼久不愈善療熱損目腦痛不止羌活防風黃連以上各一兩甘草炙一兩半柴胡七錢川芎五錢黃芩刮淨三兩半一半用酒炒上為細末每服三錢用茶清少許調如膏抹口內少用白湯送下臨臥服頭疼甚加細辛二錢痰厥頭疼多加半夏偏頭疼不愈減羌活防風川芎一半加柴胡神應散治一切頭風光草烏炮裂細辛去土各五錢好茶一兩半上為細末每服半錢臨臥濃茶點服星烏散治諸般頭風二三十年不愈者只二三服效天南星川烏生去皮尖各等分上為細末每服二錢入細茶一錢薄荷七葉鹽梅一個同煎一二沸入生薑汁些少溫服通頂煙治諸頭風如斧劈痛不可忍者川烏一兩上為末燒煙燻碗內熱茶清泡碗內煙氣服之大效點頭散治偏頭疼川芎二兩香附四兩炒去毛上為細末每服二錢食後用茶清調服石膏鼠黏子散治偏正頭疼連睛疼石膏鼠黏子炒各等分上為細末每服二錢食後用溫酒或茶清調服又方白芷須經日曬香草烏等分炒令黃半錢細末蔥茶點此是頭疼決捷方又方老少頭風總一般良薑細辛等殭蠶白梅湯點三分許才發之時服便安芎犀丸治偏正頭疼一邊鼻不聞香臭常流清涕或作臭氣一陳服芎蠍等藥不效者服此不十服愈及治噴嚏稠濃川芎硃砂研內一兩為灰石膏研片腦以上各四兩人參茯苓甘草炙細辛以上各二兩犀角生用梔子各一兩阿膠炒一兩半麥門冬去心三兩上為細末煉蜜和丸如彈子大每服一丸或二丸食後細嚼茶酒任下青火金針治頭風牙痛赤眼腦瀉耳鳴焰硝一兩青黛川芎薄荷各一錢上為細末口噙水用此藥些少搐鼻赤火金針治證同前盆硝一兩雄黃乳香沒藥川芎石膏以上各一錢全蠍一對上為細末依前法搐鼻又治暴赤眼及治蜈蚣蛇蠍傷神聖餅子治證同前玄胡索豬牙皂角煅存性取淨末各一錢青黛半錢上為細末滴水和捻作小餅子如前以水化開用竹筒吹入鼻內男左女右吹之白附散治腦逆頭疼牙亦疼白附子一兩麻黃不去節南星川烏以上各半兩蠍梢五個乾薑炮硃砂各二錢半麝香少許上為細末每服二錢用溫酒調服去枕臥片時蔥附丸治頭風疼痛附子一個炮去皮臍上為細末用蔥涎和丸如梧桐子大每服五十丸食遠用茶清送下升蒼荷葉散活法機要云夫雷頭風者震卦主之諸藥不效與證不相對也宜用此方升麻蒼朮制各一兩荷葉十個全者上銼散每服五錢水二盞半食後煎服或燒荷葉一個研細煎調上清散治頭痛眉骨痛眼痛不可忍者川芎鬱金芍藥荊芥穗芒硝以上各半兩薄荷葉乳香沒藥以上各一錢片腦半錢上為細末每用一字鼻內搐之麝香茶芽散治諸般頭疼百藥不效者麝香少許茶芽一兩川芎細辛荊芥川烏甘草以上各半兩上㕮咀每服三錢水一盞半煎至八分去滓不拘時溫服大芎辛湯治一切頭疼但發熱者不宜服其餘痰厥飲厥腎氣氣厥等證偏正頭疼不可忍者只以此藥並如聖餅子服之但多服自能作效如氣虛年高之人仍服養正丹黑錫丹並用此藥調鍾乳粉間服諸證頭疼緊捷之法無以逾此但頭疼多用石膏蓋取其能墜痰飲然恐性寒故以鍾乳粉代之腎厥頭疼尤得其治或疑鍾乳粉煅煉之藥則以軟石膏煅過為末服之亦驗生附子生烏頭天南星乾薑細辛川芎以上各一兩甘草三分上㕮咀每服四錢水二盞生薑七片茶芽少許至六分去滓食前服如中脘素寒者不用茶芽若氣壅盛只用川芎一兩細辛半兩甘草二分煎如前法一方治頭痛細辛二錢川芎白芷減半為細末搐鼻一方高良薑曬乾不見火碾為細末口含水少許搐鼻中如此數次即愈久患頭疼尤能作效一方治氣虛頭疼附子一隻生去皮臍切作片用生薑自然汁一大盞浸一宿漫火炙乾再炙候滲盡薑汁為度以高良薑等分為末腦茶調服名必效散一方白芷四錢生烏頭一錢為末每服一字茶清調服有人患眼疼先令含水以此藥搐鼻其效尤驗川芎羌活散治頭痛川芎細辛蔓荊子藁本以上各二兩羌活二兩半防風一兩半白芷半兩上㕮咀每服二兩水煎去滓臨臥旋服烏罌散治諸般頭疼不可忍者川烏炮去皮臍御米殼去蒂蜜炒橘皮甘草以上各半兩上㕮咀每服三錢水一盞半煎七分去滓不拘時溫服雙方治頭痛不止丁香一錢白芷半兩瓜蒂一兩上為細末每服半字吹入鼻中即瘥葫蘆巴丸治氣攻頭痛如破葫蘆巴炒三稜銼醋浸炒乾乾薑炮各一兩上為細末每服二錢不拘時溫生薑湯或溫酒調服及治瘴瘧瘥後頭痛服之即愈韭根丸治頭疼眼睛如刀刺全蠍糯米炒大川烏去皮尖微炒各等分上為細末用韭根取汁和丸如梧桐子大每服十五丸食後用薄荷茶清送下止痛太陽丹天南星川芎各等分上為細末用連須蔥白同搗爛作餅貼於太陽痛處治氣攻頭疼不可忍者萆麻子乳香各等分上同搗爛作餅貼太陽穴上如痛定急去頂上解開頭髮出氣即去藥一方無乳香治頭痛不可忍方上用蒜一顆去皮研取自然汁令病人仰臥垂頭以銅箸點少許滴入鼻中急令搐入腦眼中淚出瘥治頭痛上用水調決明子末貼太陽穴一方作枕去頭風明目芎辛丸治頭痛面赤煩悶咽乾上膈風痰頭目昏暈百節疼痛項背拘急川芎防風殭蠶獨活以上各一兩桔梗三兩細辛羌活白附子甘草以上各半兩天麻四兩薄荷荊芥各一兩半上為細末煉蜜和丸如彈子大每服一丸食後茶酒化下龍珠丹治頭痛目暈及喉痹纏喉風上於五月五日取長蚯蚓不拘多少以片腦麝香各少許相和同研丸如麻子大每用一丸以生薑汁塗鼻中逐邊各內一丸立愈黑錫丹治真頭痛茴香炒附子制葫蘆巴破故紙炒川楝子巴戟以上各一兩肉豆蔻制木香沉香桂心以上各半兩錫硫砂四兩上為末同研勻酒煮麵糊和丸如梧桐子大陰乾以布袋擦令光瑩每服四十丸空心姜鹽湯送下一方有陽起石順氣和中湯黃耆一錢半人參一錢使白芍藥使當歸使陳皮佐白朮佐以上各五分升麻引柴胡引各三分細辛使蔓荊子使川芎使各二分炙甘草佐七分內經曰陽氣者衛外而為固也今年高氣弱又加發汗衛外之氣愈損故以黃耆甘溫補衛實表為君人參甘溫當歸辛溫氣補血芍藥酸寒收衛氣為臣白朮陳皮炙甘草苦甘溫養胃氣生髮陽氣上實皮毛肥腠理為佐柴胡升麻苦平引少陽陽明之氣上升通百脈灌周身者也川芎蔓荊子細辛溫體輕浮清利空竅為使也上銼如麻豆大作一服水二盞煎至一盞去滓食後溫服服之減半再服而愈明年春赴詔至六盤出曹郎中以古風贈云東垣李明之嘗以能醫鳴易水得奧訣為竭黃金嬴一燈靜室窮內經黃帝拊掌歧伯驚日儲月積不易售半世豐得三折肱所長用藥有活法祕方堆案白兔生不聞李延同居且同病一汗一下得其平乃知古人一證處一方後世以方合證此理殊未明公心審是者誰子直以異己喧謗聲先生飲恨臥黃壤門生賴汝卓卓醫中英活人事業將與相一旦去已權非輕連年應召天策府廉臺草木皆欣榮好藏漆葉青黏散莫使樊阿獨植名清上瀉火湯燕京溫官人年小時氣弱常於氣海三里灸之節次約五七千壯至年老添熱厥頭痛雖冬天大寒猶喜寒風其頭痛則愈微來暖處或見煙火其痛復作五七年不愈此皆灸之過也羌活根三錢知母酒浸黃芩酒浸各一錢半黃柏酒浸炙甘草黃耆以上各一錢防風升麻各七分生地黃柴胡根甘草根黃連酒浸藁本以上各五分蔓荊子當歸身蒼朮以上各三分荊芥穗川芎各二分細辛紅花各少許上銼如麻豆大分作二服每服水二盞煎至一盞去滓稍熱食後服中書左丞姚公茂年六十七宿有時毒至元戊辰春因酒再發頭面赤腫而痛耳前後尤甚胸中煩悶咽嗌不利身半以下惡寒足䯒尤甚由是以床炕相接身半以上臥於床身半之下臥於炕飲食減少精神困弱脈得浮數按之弦細上熱下寒明矣內經云熱勝則腫春氣者病在頭難經云熱在頭身宜砭刺之取其易散故也遂於腫上約五十餘刺其血紫黑如露珠之狀頃時腫痛消散又於氣海穴中大艾炷灸百壯乃助下焦陽虛退其陰寒次於三里二穴中各灸三七壯治足䯒冷亦引導熱氣下行故也遂處方云熱者寒之然病有高下治有遠近無越度其制度君以黃芩黃連苦寒酒炒亦為因用以瀉其上熱桔梗甘草辛甘溫上升佐諸苦藥以治其熱柴胡升麻苦平味之薄者陰中之陽發散上熱以為臣連翹苦辛平以散結消腫當歸身辛溫和血止痛大黃苦寒酒煨引苦性上行至巔驅熱而下以為使也投劑之後腫痛全減大便利再服減大黃慎言語節飲食不旬日良愈既濟解毒湯治上熱頭目赤腫而痛胸膈煩悶不得安臥身半以下皆寒足䯒尤甚大便微祕升麻去苗柴胡去苗當歸身連翹以上各一錢黃芩酒炒黃連酒炒甘草炙大黃煨大便利勿用桔梗以上各二錢上銼如麻豆大作一服水二盞煎至一盞去滓食後溫服忌酒濕面大料物及生冷硬物治偏頭痛不可忍方萆麻子半兩去皮大棗十五枚去核上共搗令熟塗於紙上用箸一隻卷之去箸內在鼻中良久取下清涕即止治偏頭疼方鬱金一顆苦葫蘆子一合上為細末用白絹子裹藥末一錢於新汲水內浸過滴向患處鼻中得黃水出即瘥神效方治偏頭風疼上用生蘿蔔汁仰臥注鼻中左痛注右右痛注左若頭疼兩鼻皆注數十年病者用之皆效仙靈脾浸酒方治偏頭風手足不遂皮膚不仁上用仙靈脾一斤細銼以無灰酒二斗浸之春五夏三秋七冬十日取出藥每日隨性暖酒飲之常令醺醺不得大醉酒盡再合無不效合時忌雞犬見之一字散治偏頭疼不可忍者乳香別研延胡索盆硝研以上各一分川芎二錢雄黃別研三錢上為細末每用一字左疼搐左右疼搐右飛虎散治偏正頭疼白附子香白芷荊芥穗石膏煅研川芎天麻薄荷防風以上各半兩蒼朮米泔浸兩頭尖黑心者不用各一兩上為細末每服一錢臨臥溫茶清調服忌食熱物千金散治偏正頭疼川芎細辛防風甘菊花全蠍藁本芽茶石菖蒲青藤根甘草各一兩上㕮咀每服五錢水一盞半蔥白一根同煎至七分去滓再煎如眼目疼加貫衆一兩盞落湯治偏正頭疼頭風麻黃去根節七錢半人參去蘆五錢陳皮去白七錢甘草八錢御米殼去隔穰頂蒂炙微黃二分上㕮咀每服五錢水一盞半生薑七片同煎至七分去滓食遠溫服抽刀一字散治偏正頭痛頭風烏頭生去皮鹽水浸一月取出切作片再以生薑汁浸一宿炒乾如急用只炮去皮尖上為細末每服一字食後茶清調下一方有雄黃半兩蘆薈散治頭風頭痛蘆薈防風去叉丹砂研龍腦研以上各半兩天麻白附子炮白芷白朮以上各一兩上為細末每服半錢食後蔥白薄荷茶清調下沐頭方治風頭痛或頭旋目眩四肢煩痛坐臥不安蔓荊子川芎玄參以上各一兩石膏半斤甘菊花葛根各三兩上搗篩分作三度用每度以米泔水一斗二升煮取八升去滓於暖室中稍熱沐頭如汗出宜避風惡實入篋中方治風頭及腦掣痛不可忍者以此膏摩之上用牛蒡莖搗取濃汁二升無灰酒一升鹽花一匙慢火同令稠成膏以摩痛處其風毒自散亦治時行頭痛摩時須極力令熱乃速效冬月無苗以根代之亦可都梁丸一名芷單丸王定國因被風吹項背拘急頭目昏眩太陽並腦俱痛自山陽撐舟至泗州求醫楊吉老即診脈即與一丸便服王因款話經一時再作並進二丸病若失去王甚喜問為何藥答云公如道得其中一味即傳此方王思索良久自川芎防風之類凡舉數種皆非但一味白芷耳王益神之此藥用初無名王曰是藥處自都梁名人可名都梁丸也大治諸風眩暈婦人産前産後乍傷風邪頭目昏重及血風頭痛服之令人目明並沐浴後服一二丸甚佳暴寒乍暖神思不清頭目昏暈並皆治之香白芷大塊白色新潔者先以棕刷刷去塵土用沸湯泡洗四五次曬乾上為細末煉蜜和丸如彈子大每服一丸多用荊芥點淡茶細嚼下食後常服百無所忌只干嚼亦可一方如熱風冷酒調冷風熱酒調下一方細嚼川芎蔥白茶清送下大蒜搐鼻法治頭風痛不可忍亦可搐小兒驚風上用蒜七個先燒地通紅掃出火將蒜去皮逐個於紅地上磨成膏子在地上卻將殭蠶一兩炙去足放在蒜上用碗覆定四邊勿透氣來日取出只用殭蠶為末先含水一口將藥末一豆許搐於鼻內立效枕頭方治風頭痛百藥不瘥者上用食茱萸葉細銼灑酒拌勻以絹袋盛之於甑中蒸煮乘熱分作二包更換枕之取瘥為度仙方如聖餅子草烏川芎半夏天花粉細辛蒼朮赤小豆松香甘松藿香晚蠶砂菊花白芷甘草赤芍藥蔓荊子各等分上為細末用炒麵作糊和為餅赤土為衣每服一餅食後細嚼茶清送下一字輕金散治偏正頭風疼夾腦風眉稜骨痛牽引兩眼抽掣疼痛並或生翳膜視物不明藿香葉荊芥穗防風石膏細研水飛旋覆花香白芷川芎以上各半兩川烏去皮尖生用南星各二錢半草烏一錢半上曬乾研為細末每服一字食後淡茶調下清神散麝香片腦雄黃青黛全蠍乳香沒藥各等分上為細末每用少許口含水搐入鼻中一滴金丸治首風及偏正頭風人中白地龍炒各一分上為細末用羊膽汁和丸如芥子大每用一丸用新汲水一滴化開滴入兩鼻中治頭風百藥不效者上用天南星一兩以白礬湯泡去毒水五七次焙乾為末分作三分每分水二盞入白梅三個同煎至一盞當發時食後服川芎丸治頭風化痰川芎不拘多少以淨水洗浸薄切作片或曬或焙乾上為細末煉蜜和丸如彈子大每服一丸不拘時細嚼用茶清或酒送下羌活散治頭風羌活防風旋覆花獨活川芎細辛芽蔓荊子停通七味甘草石膏各半加中風作銼煎為妙尋常只得點清茶大師留下羌活散選盡仙方不及他治雷頭風發雷頭風發聽斯言羊糞將來不用錢細搗羅為極細末溫酒調下便安然通關散治八般頭風上用半夏為末同百草霜少許以紙一條入藥半錢作紙捻子焙極干每用藥時先含水一口將紙捻子燃著吹滅就鼻中搐之如有涎即吐出再含水再搐如此用三五次見效太一麝香湯一名烏香散治風邪客於腦頭痛至甚及偏正頭疼夾腦風連眉骨項頸上徹腮頤疼痛不可忍者草烏生用一兩一方用鹽炒新茶芽細辛去苗各二兩上銼如麻豆大每服三錢水一盞半入真麝香一捻同煎八分去滓熱服一方無麝香為細末茶清調下食後服必捷散治腦風頭痛甚者白花蛇去骨酒浸三宿炙二兩蒺藜炒去角一分蓽澄茄二十枚白附子五枚酒浸一宿切作片炒乾蔓荊子酒浸一宿焙一分上為細末每服一錢用薄荷自然汁和溫酒半盞食後調服忌發風之物湖南押衙顏思退傳頭風掣疼黃蠟二斤鹽半斤上二味相和於錫羅中熔令相入捏作一兜盔勢可合腦大小搭頭至額頭痛立止全蠍散治頭風攻注口眼不正全蠍二枚去毒赤足蜈蚣一條醋炙麝香一字別研辰砂一字別研上為細末同研勻每服一字食後溫酒調服治眉心並眉梁骨疼者上用二陳湯煎飲下青州白丸子立驗
