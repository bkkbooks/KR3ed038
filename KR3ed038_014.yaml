body:
  text: 卷之十四泄瀉門附論素問云春傷於風夏必飧泄邪氣留連乃為洞泄叔和云濕多成五泄腸走若雷奔此因氣血虛弱肌膚不密邪氣搏於腸胃因虛襲之遂成此證但泄瀉人為一證耳豈知泄者泄漏之義時時溏泄或作或愈瀉者一時水去如注泄名有五有胃泄脾泄大腸泄小腸泄有大瘕泄胃泄者飲食不化色黃脾泄者腹脹滿泄注食即嘔吐逆大腸泄者食已窘迫大便色白腸鳴切痛小腸泄者溲而便膿血小腹痛大瘕泄者裡急後重數至圊而不能便莖中痛又有飧泄腎泄洞泄滯泄胃寒腸熱泄鶩溏之分且飧泄者始春之時風木盛行脾土受風木之邪夏以伏陰在內或當風取涼過飡生冷復傷脾胃不能克化飲食水穀完出而脈弦細名為飧泄腎泄者由腎虛每於五更時溏泄一二次而連月經年弗止水泄者謂臟腑虛寒四肢厥冷暴頓洞下洞泄者手足厥冷心腹痛腳轉筋鶩溏者少腹生寒則為此證蓋陰中之至陰脾也脾胃虛弱為風寒所勝則陰氣太盛陰盛則臟寒臟寒則糟粕不化大便黑狀似鶩溏大腸有寒證亦如之又云濁寒之氣在上清熱之氣在下則脹滿而泄也且大腸為傳送之官胃為水穀之海其精英則流布以養五臟其糟粕則傳送以歸大腸且如傷食一證因失飢傷飽胃不能消則脹滿所下酸臭可驗此證當疏利消導前證諸瀉以脈論之大抵泄瀉非特在脾胃經亦有當以各類治之治法以分利為先實脾土益元氣用藥無不效矣泄瀉通治方理中湯治腸胃虛弱漉漉有聲泄瀉頻並人參白朮乾薑炒甘草炒各二錢半加茯苓厚朴薑製各一錢上作一服水二盅生薑三片棗一枚煎至一盅不拘時服調中湯治腸虛泄瀉止嘔進食藿香縮砂莪朮炮乾薑炮肉桂茴香炒草果各一錢麥芽炒益智仁橘紅蒼朮神麯炒桔梗甘草炙各半錢上作一服水二盅生薑三片紅棗二個鹽少許煎至一盅不拘時服肉豆蔻散治脾虛腸鳴泄瀉不食肉豆蔻七枚每一枚剜一竅納木香一粒在內以麵裹燉熟去面不用上碾為末分作二服不拘時用米飲湯調下平胃散治傷濕泄瀉蒼朮三錢炒厚朴薑製橘紅各二錢甘草炙一錢上作一服水二盅生薑三片紅棗二個煎一盅不拘時服六和湯治心脾不調氣不升降霍亂吐瀉或致泄瀉寒熱交併小便赤澀方見暑門加味五苓散治伏暑發熱及虛實泄瀉或煩渴小便不利赤茯苓去皮木豬苓去皮澤瀉白朮各二錢車前子肉桂各一錢上作一服水二盅生薑五片煎至一盅不拘時服厚朴丸治泄瀉不止白龍骨乾薑炮附子炮去皮臍厚朴薑製訶子炮去核肉豆蔻麵煨陳皮各一兩上為細末酒煮糊為丸如梧桐子大每服五七十丸空心用米飲送下補脾丸治滑泄不禁肉豆蔻麵煨川厚朴薑製川白姜炮赤石脂白朮各一兩神麯炒麥蘖炒附子炮去皮臍蓽茇各五錢上為細末醋煮糊為丸如梧桐子大每服五十丸空心用米飲送下大藿香散治一切脾胃虛寒嘔吐霍亂心腹撮痛如泄瀉不已最能取效藿香一兩陳皮厚朴薑製青皮麩炒木香人參肉豆蔻麵裹煨良薑炒麥蘖炒神麯炒訶子煨去核白豆蔻去皮甘草炙各半兩白乾薑炮三錢上為細末每服三錢空心用生薑湯調服如水瀉滑泄腸風臟毒米飲湯調下赤白痢甘草黑豆湯調下脾胃虛冷宿滯酒食痰氣作暈入鹽少許生薑紅棗湯調服胃氣吃噫生薑自然汁一呷入鹽少許調服此藥大能消食順氣利膈開胃四神丸治脾泄腎泄肉豆蔻生用二兩破故紙炒四兩木香不見火茴香炒各一兩上為細末生薑煮棗肉為丸如梧桐子大每服八九十丸空心用鹽湯送下一方去木香茴香用神麯麥蘖各炒一兩為丸豆附丸治腸胃虛弱內受風寒水穀不化泄瀉注下肉豆蔻麵煨附子炮去皮臍白茯苓去皮各四兩木香不見火乾薑炮肉桂各二兩丁香不見火一兩上為細末生薑汁煮麵糊為丸如梧桐子大每服五七十丸或至一百丸用生薑湯送下粥飲亦可肉豆蔻散治脾胃虛弱腹脅脹滿水穀不消臟腑滑泄肉豆蔻麵裹煨乾薑炮厚朴去皮薑製陳皮去白甘草炙各二兩茴香肉桂訶子皮川烏炮去皮臍各一兩蒼朮米泔浸炒四兩上為細末每服二錢用生薑紅棗煎湯不拘時調服金鎖正元丹治腎虛泄瀉小便頻數盜汗遺精一切虛冷之證並皆治之五倍子茯苓去皮各四兩龍骨煅硃砂另研各一兩半肉蓯蓉洗焙紫巴戟去心葫蘆巴炒各八兩補骨脂酒浸各五兩上為細末和勻酒煮糊為丸如梧桐子大每服五七十丸空心用溫鹽酒送下豆附丸治臟腑久虛下寒泄瀉不止腸滑不禁日夜無度全不進食一切虛寒泄瀉困乏肉豆蔻麵裹煨附子炮去皮臍訶子麵裹煨良薑炒乾薑炮赤石脂煨陽起石煅白礬枯龍骨生用各二兩白茯苓去皮桂心不見火細辛洗各一兩上為細末酒煮麵糊為丸如梧桐子大每服七十丸空心用米飲送下燒胃丸治脾胃虛冷疼痛泄瀉乾薑厚朴二味同搗炒附子炮去皮臍茯苓去皮陳皮桂心不見火訶子皮甘草炙各等分上為細末醋煮糊為丸如梧桐子大每服三十丸食前用米飲送下訶黎勒丸治大腸虛冷泄瀉不止腹脅引痛飲食不化訶黎勒麵裹煨青皮陳皮吳茱萸龍骨生用白茯苓去皮細辛洗桂心不見火蓽茇各一兩上為細末生薑汁煮麵糊為丸如梧桐子大每服八九十丸空心用米湯送下九寶飲子分利水穀止泄瀉罌粟殼蜜炙赤茯苓去皮陳皮木通各二錢黃耆微炒厚朴薑製青皮各一錢半車前子微炒粉草炙各一錢上作一服水二盅煎至一盅食前服實腸散治泄瀉不止蒼朮二錢炒訶子炮縮砂肉豆蔻陳皮茯苓各一錢半木香甘草炙各半錢厚朴薑製一錢上作一服水二盅生薑五片紅棗三個煎一盅不拘時服升陽除濕湯治脾胃虛弱不思飲食腸鳴腹痛泄瀉無度小便黃色四肢沉困蒼朮米泔浸二錢半夏湯泡七次益智羌活防風去蘆神麯炒柴胡去皮升麻各一錢豬苓陳皮各六分麥蘖炒甘草炙各四分上作一服水二盅生薑三片紅棗二枚煎至一盅食前服益胃湯治頭悶勞動則微痛不喜飲食四肢怠墮燥熱短氣口乾不知味腸鳴大便微溏黃色身體昏悶並皆治之蒼朮二錢當歸梢陳皮各一錢升麻一錢益智白朮人參柴胡黃芩各九分半夏黃耆甘草各六分上作一服水二盅生薑三片煎至一盅去滓食前通口服白朮芍藥湯治太陰脾經受濕水泄注下體重微滿困弱無力不欲飲食暴泄無數水穀不化宜服此藥白朮芍藥各五錢甘草勻二錢半上作一服水二盅煎至一盅食前服升陽湯治一日大便三四次溏而不多有時泄瀉腹中鳴小便黃黃耆三錢甘草二錢橘皮一錢升麻七分柴胡當歸身益智各五分紅花少許上作一服水二盅煎至一盅食前溫服止瀉秘方人參去蘆白朮乾薑炮訶子去核茯苓去皮木香藿香去土甘草炙肉豆蔻麵裹煨各一錢半上作一服水二盅煎至一盅去滓食前通口服斂腸丸治久瀉木香丁香附子炮去皮臍縮砂仁訶子皮罌粟殼去穰頂炒川薑炮沒石子白龍骨肉豆蔻麵裹煨赤石脂煅梓州厚朴薑製禹餘糧醋淬七次各一兩上為細末麵糊為丸如梧桐子大每服七十丸食前用米飲湯送下訶子四柱散治臟腑虛怯元氣弱脾胃不快不進飲食時加泄利晝夜不息附子炮去皮臍白茯苓去皮人參去蘆各一兩木香濕紙裹煨訶子濕紙裹煨取皮各半兩上件㕮咀每服三錢水一盞生薑三片棗一枚煎至六分食前服一方加肉豆蔻一方有白朮真陽耗散兩耳常鳴臍腹冷痛頭旋目暈四肢急倦脾胃不和晝夜泄痢小便滑數並宜服之蓽茇丸治滑泄甚妙附子炮去皮臍蓽茇川薑炮丁香不見火吳茱萸炒良薑胡椒各一兩山茱萸去核草豆蔻去皮各半兩上為細末棗肉為丸如梧桐子大每服五十丸食前陳米飲下日三服廬州知錄周汝功嘉禾人乃尊守永嘉時每苦滑泄服此藥果有效此方董發運閟有序多不復錄上二方亦周氏所傳也縮砂丸治大便泄瀉米穀不化腹中疼痛可思飲食縮砂仁黃連去須微炒附子炮去皮臍吳茱萸湯洗七次焙炒訶子皮肉豆蔻各二兩乾薑炮木香各半兩上為細末水煮麵糊為丸如梧桐子大每服五七十丸食前用米飲送下羊肉扶羸丸治脾胃不和不進飲食臟腑虛滑老人虛人皆可服之肉豆蔻煨白姜炮川椒去目併合口者炒出汗木香一分神麯炒附子炮去皮臍各半兩精羊肉一斤半微斷血脈焙乾取末四兩上為細末煮粟火飯為丸如梧桐子大每服五十丸食前用米飲送下曲術丸治時暑暴瀉壯脾溫胃進美飲食及療飲食所傷胸膈痞悶等疾服此取效神麯炒蒼朮米泔浸一宿焙乾等分為末上為細末水煮麵糊為丸如梧桐子大每服三十丸不拘時用米飲送下百粒丸治遠近泄瀉大腸滑神效紅椒胡椒附子炮丁香乾薑炮麥蘖各等分上為細末酸醋煮大蒜為丸如梧桐子大每服百粒食前用米飲送下治脾泄多年老人腎虛謂之水土同化上用吳茱萸揀淨不以多少白水煮去滓盞內入鹽少許通口服蓋吳茱萸能暖膀胱水道既清大腸自同余藥雖熱不能分解清濁也曲芎丸治脾胃中風濕臟腑滑泄不止神麯川芎白朮附子炮去皮臍各等分上為細末麵糊為丸如梧桐子大每服三五十丸空心用米飲送下左氏述楚子圍蕭蕭將潰無社告甲叔展曰有麥麹乎有山麴乎鞠藭芎藭也意欲令逃水中以避禍是知芎藭能除濕子常加朮附以制方治脾濕而泄者萬無不中此藥亦治飧泄素問曰春傷於風夏必飧泄飧泄者食穀不化蓋春木旺時肝生風邪淫於脾經至夏飲冷當風故多飧泄此藥尤宜棗肉丸治脾腎虛寒或腸鳴泄瀉腹脅虛脹或胸膈不快食不消化宜服破故紙四兩炒木香一兩不見火肉豆蔻二兩麵裹煨香去面不用上為細末燈心煮棗肉為丸如梧桐子大每服七十丸空心用生薑湯送下香茸丸治飲酒多遂成酒泄骨立不能食但再飲一二盞泄作幾年矣麝香別研一錢肉豆蔻一兩嫩鹿茸草火燎去毛酥炙黃一兩上為細末用白陳米飯為丸如梧桐子大每服五十丸空心用米飲下熱者服酒蒸黃連丸神授丸治臟腑滑瀉南木香二錢半肉豆蔻一兩麵裹煨上為細末煮棗肉為丸如梧桐子大每服三五十丸不拘時用陳米飲下治臟腑泄瀉上用雞爪黃連不以多少碾為細末用大蒜煨熟去皮研和丸如梧桐子大每服三十丸或五十丸米飲下治瀉久不效者老人尤宜服一名護命方上用大附子一個炮去皮臍以韭菜根研爛絞取汁和丸如梧桐子大曬乾每服三十丸米飲湯下不幹恐麻人一方治一切冷瀉出後頻並面無顏色不思飲食杵為末以一錢煮粥一碗空心服胃苓散治傷暑泄瀉煩渴引飲所下如水上用平胃散五苓散各二錢用水一盞棗二枚生薑二片同煎至七分嚼薑棗和滓咽服少刻又服辰砂五苓散亦可用來復丹亦可或寒濕水泄正胃散理中湯蘇梅米湯下一方入鹽煎棗附丸治臟腑寒滑泄上用端正大附子一個干棗半斤同於銀石器中用水於慢火煮上留水二指許水乾旋添湯煮兩三時取出切作半個再煮候至晚棗爛壞將附子溫水洗剝去皮臍切作薄片焙乾搗為末別煮棗肉和丸如梧桐子大每服三十四丸空心用米飲下患滑泄垂死者服之皆愈治夏月脾胃傷冷滑腸泄瀉肚痛及治霍亂瀉不止上用胡椒末不以多少研爛飯搜和手心內揉勻丸如梧桐子大每服四十丸食前用陳米飲吞下實腸丸治腸胃虛弱腹脹泄瀉時時刺痛黃連一兩淨肉豆蔻麵裹煨乾薑炮白茯苓去皮當歸洗焙訶子煨去核丁香各半兩木香一分上為細末用豬膽汁煮麵糊和丸如梧桐子大每服五十丸空心用米飲下養臟丸治腸胃虛寒泄瀉無度不進飲食生硫黃四兩研粉乾薑炮附子炮去皮臍鹿角霜肉豆蔻麵煨山藥各三兩上為細末麵糊為丸如梧桐子大每服三十丸漸加至五十丸用溫米飲下空心食前服黃連烏梅丸治飲食不節營衛不和風邪侵襲臟腑之間致腸胃虛弱泄瀉腸鳴腹脅膨脹裡急後重日夜頻並不思飲食黃連去須阿膠蛤粉炒成珠子當歸洗淨各二兩人參去蘆龍骨煅赤石脂乾薑炮白茯苓去皮烏梅肉焙乾陳皮去白訶子去核肉豆蔻麵裹煨罌粟殼蜜炙木香各一兩上為細末醋煮麵糊為丸如梧桐子大每服五十丸食前米飲送下如腹痛當歸煎湯下下血地榆煎湯下煨肝散治臟腑久虛挾寒滑泄全不入食口生白瘡川椒去目炒出汁茴香炒砂仁肉豆蔻麵裹煨丁香木香各半兩附子炮去皮臍白朮以上二味各一兩入生薑四兩用醋煮十數沸焙乾上為細末每用二錢用獖豬肝或羊肝二兩切作片子批開摻藥末在內更用好紙三兩重裹於慢火煨候肝熟取出細嚼用溫酒送下不拘時候療二十種雜下江夏太守用此法療盡愈黃連黃柏熟艾附子炮甘草炙各一兩烏梅二十枚取肉煮乾薑二兩上七物搗下蜜丸如大豆服十丸漸至二十丸日三忌肥肉生冷一方無甘草附子黃柏一方除甘草附子換腸丸治泄瀉不止及諸下痢之疾木香訶子皮白芍藥當歸去蘆炒人參白茯苓去皮白朮甘草炒各一兩半御米殼二兩去隔蒂捶碎微炒淨秤上為細末煉蜜和丸如梧桐子大每服七十丸用生白薑絲鹽各少許拌勻用紙裹水濕文武火煨熟卻用生薑煮粥送下食前日進二服豬臟丸治元臟久冷滑泄不止飲食不進漸至危困硫黃二兩研為末豬臟一斤淨洗入硫黃末在臟內以線縛兩頭用米醋五升同入磁瓶內裝以鹽泥固濟用炭火一秤煅候醋乾為度取出入後藥吳茱萸二兩炒厚朴去皮一斤薑汁炒上為末先研臟令細次入藥末一處同研勻丸如梧桐子大每服十丸空心鹽酒鹽湯下癸卯歲冬十月小雪薄冰天令應時白樞判家一老僕面塵脫色神氣衰弱病脫肛日久服藥未驗近日復下赤白膿痢作裡急後重白多赤少不任其苦先師料曰此非肉食膏粱必多蔬食或飲食不節天氣應時衣蓋尤薄寒氣形體乃寒滑氣泄不固故形質下脫也當以澀去其脫而除其滑微酸之氣固氣上收去其下脫以大熱之劑除寒補陽以補氣之藥升陽益氣是的對其證訶子皮散治腸胃虛寒泄瀉米穀不化腸鳴腹痛脫肛或作膿血日夜無度訶子去核煨七分乾薑炮六分粟殼去蒂隔蜜炒橘皮各半錢本草十劑云澀可去脫以粟殼之酸微澀上收固氣去脫主用為君也以訶子皮之微酸上收固血治其形脫橘皮微苦溫益真氣升陽為之使以乾薑大辛熱之劑除寒為臣上為細末分作二服水二盞煎至一盞和滓熱服空心再服痊愈治久患脾泄瀉臟腑虛滑不進飲食上用青州大棗擘破去核以木香如棗枚大置棗中十數枚以水一盞煮候棗軟熟食前溫嚼吃就以煮棗湯送下甚者不過一二劑龍骨散治水瀉腹痛不納飲食龍骨當歸炒肉豆蔻麵裹煨木香各一兩厚朴二兩去粗皮薑汁炙上為細末每服二錢食前用粥飲調下代赭丸治水瀉腸鳴臍腹撮痛代赭石煅乾薑炮龍骨各一兩附子炮去皮臍三分上為細末研軟飯和丸如梧桐子大每服三十丸空心用米飲湯送下日午再服如聖丸治水瀉並赤白痢綠豆烏頭端正大者炮裂去皮臍各等分上為細末新水和丸如綠豆大以丹砂為衣每服五丸不拘時服白痢乾薑湯下赤痢甘草湯下赤白痢乾薑甘草湯下水瀉新汲水下小兒服一二丸梅棗湯治水瀉不止烏梅十個取肉棗子十個去核罌粟殼一個去蒂膈上銼粗末每服二錢水一盞煎七分去滓不拘時溫服紅豆丸治臟腑泄瀉名為飧泄紅豆藿香糖求莪朮煨鬱金陳皮去白青皮去穰甘草各三兩神麯炒麥蘖炒半夏湯洗七次砂仁各一兩半良薑蓽茇各二兩丁香不見火半兩硇砂三錢醋化上為細末水煮麵糊為丸如梧桐子大每服一百丸用米飲或隨物空心送下病甚者日進三服高良薑湯治腸胃受風久為飧泄下痢嘔逆腹內㽲痛高良薑木香檳榔赤茯苓去皮人參各三分肉豆蔻去殼吳茱萸湯洗焙炒陳皮湯浸去白焙縮砂去皮各半兩乾薑一分炮上㕮咀每服四錢水一盞半煎至八分不拘時日三服乾薑丸治腸胃風冷飧泄注下腹痛不止乾薑炮厚朴去粗皮薑汁炙當歸切焙各三分阿膠炙燥龍骨各一兩上為細末煉蜜為丸如梧桐子大每服三十丸空心用棗湯下日午再服木香散內經曰清氣在下則生飧泄又曰久風入中則為腸風飧泄夫脾胃土也其氣衝和以化為事今清氣下降不升則風邪入而干胃是木賊土也故中和之氣不能化而令物完出謂之飧泄或飲食太過腸胃所傷亦致米穀不化此俗呼水穀痢也法當下舉之而消克之以加減木香散主之木香良薑升麻檳榔人參各七錢半肉豆蔻煨吳茱萸湯洗陳皮砂仁乾薑炮各半錢神麯二錢炒上為細末每服四錢水一盞半煎至一盞去滓食前溫服堅中丸治脾胃受濕滑泄注下黃連去須黃柏赤茯苓白朮澤瀉各一兩陳皮人參肉豆蔻白芍藥半夏曲官桂各半兩上為細末水浸蒸餅和丸如梧桐子大每服五七十丸食前用溫米飲送下肉豆蔻散治腸胃受濕濡泄不止兼治暴水瀉肉豆蔻去殼煨訶黎勒煨去核黃連去須各三分甘草炙赤茯苓去皮乾薑炮白朮各半兩厚朴去粗皮薑汁炙一兩上為細末每服二錢空心米飲調下日三當歸散治腸胃寒濕濡瀉腹內㽲刺疼痛當歸切焙乾薑炮肉豆蔻去殼炮木香各半兩訶黎勒炮去核黃連去須炒各三分上為細末每服三錢用甘草生薑各一分黑豆一合並半生半炒用水四盞煎取二盞作二次空心日午調服炙肝散治飲食生冷內受風寒泄瀉無度川乾薑炮大附子炮縮砂仁各半兩肉豆蔻二個小茴香四錢炒小川椒四兩上為細末用白羊肝二三兩或豬肝或豬羊腰子批開放藥末三四錢在內鹽一錢蔥白二莖同肝內一處用濕紙裹燒香熟空心食前細嚼用生薑湯或米湯或酒送下白豆蔻湯治腸胃受濕濡瀉無度腹痛飲食不化白豆蔻去皮訶黎勒炮去核陳皮湯浸去白焙炒乾薑炮各半兩厚朴去粗皮生薑汁炙三分上㕮咀每服五錢切薤白三寸水一盞半煎至七分去滓空心溫服日午再服蓽茇丸治腸胃久寒大便鶩溏蓽茇附子炮裂去皮臍厚朴去粗皮薑汁炙肉豆蔻乾薑炮各一兩訶黎勒皮縮砂仁龍骨各半兩上為細末用麵糊和丸如梧桐子大每服二十丸食前用米飲送下日再龍骨黃連湯治大便滑泄色如鶩溏龍骨黃連去須炒三分當歸切焙乾薑炮甘草炙各半兩上㕮咀每服五錢水一盞半煎八分去滓食前溫服日再橘皮散治脾胃虛寒洞泄不止腸內雷鳴氣脹膨滿冷氣痛陳皮去白焙白朮炒各二兩訶黎勒炮乾薑炮枳殼去穰麩炒官桂去粗皮木香炮甘草炙人參各一兩檳榔炮一枚草豆蔻煨五枚半夏湯洗七次薑汁製三分厚朴去粗皮生薑汁炙一兩半上為細末每服二錢食前煎生薑棗湯調下木香訶黎勒丸治洞泄大腸切痛腸鳴食不化木香半生半炒白朮高良薑炒肉豆蔻去殼各一兩訶黎勒煨去核三分官桂去粗皮蕪荑炒各一兩半附子炮裂去皮臍厚朴去粗皮生薑汁炙焦各二兩甘草炙半兩乾薑炮一分上為細末用陳曲末煮糊為丸如梧桐子大每服三十丸食前姜鹽湯送下茱萸斷下丸治臟腑寒腹痛泄瀉不止甚效吳茱萸二兩半炒赤石脂川薑各半兩艾葉炒縮砂仁肉豆蔻附子炮去皮臍各一分上為細末麵糊為丸如梧桐子大每服五七十丸食前用米飲送下趙從簡通判甲辰年丁母憂食素之久苦瀉不止日七八行首尾歲年每服他藥不過一二日後作得此方而愈後數年間遇瀉服之又效豆蔻附子散治脾胃久寒大腸虛滑洞泄肉豆蔻麵裹煨附子去皮臍鹽炒縮砂去皮半兩木香半分上為細末每服一錢食前用米飲調下固腸散治脾胃虛弱內受寒氣泄瀉注下水穀不分冷熱不調下痢膿血赤少白多或如魚腦腸滑腹痛遍數頻並心腹脹滿食減乏力並宜服陳米炒二十兩木香不見火一兩肉豆蔻生用粟殼去蒂蓋蜜炙各二兩乾薑炮甘草炙各二兩半上為細末每用二錢酒一盞生薑二片棗一枚煎至七分不拘時溫服如不飲酒水煎亦得忌酒面魚腥等物加味三建湯治洞泄不止大川烏綿附天雄三味並炮鹽水浸去皮臍木香肉豆蔻煨訶子肉去核各一兩上銼散每服三錢水一盞生薑十片紅棗二枚鹽梅一個陳米一撮煎六分空心熱服蒜煮壯脾丸治證同前白茯苓蒼朮厚朴各二兩陳皮七錢甘草二錢半訶子附子川烏各一兩生薑半斤棗子五十枚大蒜十枚去皮煮爛上為細末用神麯糊為丸如梧桐子大每服百十丸空心用米飲湯任下
