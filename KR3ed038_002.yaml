body:
  text: 卷之二順風勻氣散治中風中氣半身不遂口眼歪斜先宜服此白朮四錢天麻一錢沉香白芷青皮各半錢甘草炙半錢人參一錢烏藥二錢紫蘇木瓜各半錢分作二帖每帖水二盞生薑二片煎八分溫服二渣並煎風氣腰疼痛亦宜服之獨活酒治中風通身冷口噤不知人者獨活四兩去蘆用好酒四大盞煎分二三次熱服側子散治中風手足不遂言語蹇澀用之纍驗側子炮附子炮人參白朮煨各七分半防己半錢白茯苓七分半麻黃七分半防風七分半甘菊細辛肉桂各一錢半赤芍藥七分半當歸川芎秦艽茯神各七分半甘草四分上銼分作二帖水二盞生薑三片棗一枚去核煎服牽正散治中風口眼歪斜半身不遂白附子殭蠶全蠍上等分生用為末熱酒調下不拘時服二錢治口眼歪斜奇方桂心用酒煮取汁紙蘸貼患處左歪貼右右歪貼左一方用大鱔魚一條以針刺頭上血左歪塗右右歪塗左正即洗去鱔魚放之一法灸耳垂下艾炷三壯左灸右右灸左正舌散治中風舌木強難轉語不正神效蠍梢去毒二七個茯苓一兩上銼分二帖每帖水二盞生薑五片棗一枚去核煮八分去滓不拘時服轉舌膏治中風瘛瘲舌蹇不語即涼膈散加石菖蒲遠志為末煉蜜為丸如彈子大硃砂為衣每服一丸薄荷湯化開食後或臨臥服活命金丹治中風神不清即涼膈散加青黛藍根上為細末煉蜜為丸如彈子大硃砂為衣金箔蓋每服一丸茶清化開食後臨睡服腦麝祛風丸治左癱右瘓最效白花蛇頭一個帶項三寸酒浸炙烏梢蛇尾二個長七寸酒浸炙川烏尖七個去黑皮附子底四個去黑皮南星炮半夏薑製白附子細辛防風天麻全蠍去毒炒殭蠶炒去絲嘴草烏炮各五錢片腦一分麝香一分研上為細末生薑汁糊為丸如梧桐子大每服五十丸煎小續命湯送下四白丹清肺氣養魄中風多昏冒肺氣不清也白朮白茯苓人參縮砂香附甘草防風川芎各五錢白芷一兩白檀香三錢半知母二錢羌活薄荷獨活各二錢半細辛二錢麝香一錢另研牛黃半錢另研龍腦半錢另研藿香一錢半甜竹葉二兩上為細末煉蜜為丸每兩作十丸臨睡嚼一丸煎愈風湯送下上清肺氣下強骨髓大神效活絡丹治風濕諸痹筋骨疼痛清心明目寬胸溢血養氣暖膝腰臂疼痛口眼歪斜行步艱辛筋脈拘攣年四十以上每服一丸至老不生風疾大有神效白花蛇二兩酒浸焙乾烏梢蛇半兩酒浸焙乾麻黃二兩去節細辛一兩去土全蠍一兩半去毒炒兩頭尖二兩酒浸赤芍藥一兩川芎二兩防風二兩半葛根一兩半沒藥一兩另研血竭七錢半另研硃砂一兩另研烏犀屑半兩地龍半兩去土甘草二兩去皮炙丁香一兩去枝白殭蠶一兩炒乳香一兩另研麝香半兩另研片腦一錢半另研官桂二兩去粗皮草豆蔻二兩川羌活二兩虎脛骨一兩酥炙玄參一兩牛黃二錢半另研威靈仙一兩半酒浸天麻二兩藿香二兩去土天竺黃一兩敗龜板一兩炙人參一兩何首烏二兩白芷二兩烏藥一兩安息香一兩青皮一兩黑附子一兩炮去皮臍香附一兩白豆蔻一兩骨碎補一兩黃連二兩茯苓一兩黃芩二兩白朮一兩熟地黃二兩松香脂半兩大黃二兩當歸一兩半木香二兩沉香一兩金箔為衣上為細末煉蜜為丸如彈子大每服一丸細嚼溫酒茶清漱下隨證上下服之頭風擂茶下追魂湯治卒厥暴死及客忤鬼擊蜚尸奄忽氣絶口噤麻黃去節六錢杏仁去皮尖五十粒甘草炙二錢千金方有桂分作二服煎至七分去滓灌之口噤斡開若更不下分病人發左右提搦肩引之藥下漸蘇若唇青身冷為入臟即死身和汗出即愈黃耆酒治風濕痹身體吊麻皮膚瘙癢筋脈拘攣言語蹇澀手足不遂時覺不仁黃耆防風桂心天麻萆薢石斛虎骨酥炙白芍藥當歸雲母粉白朮茵芋葉木香仙靈脾甘草川續斷各一兩上銼生絹袋盛好酒一斗浸之春五日夏三日秋七日冬十日每次一盞溫服不拘時候常令酒氣相續為佳虎骨散一名乳香定疼散治風毒邪氣乘虛攻注皮膚骨髓之間血氣相搏往來交擊痛無常處遊走不定晝靜夜劇少得眠睡筋脈拘攣不得屈伸血竭另研附子炮赤芍藥各一兩當歸肉桂去皮白芷沒藥防風骨碎補自然銅火煅醋淬牛膝酒浸各一兩五加皮天麻檳榔羌活各三錢三分半虎脛骨酥炙敗龜版六錢七分酥炙蒼耳子微炒一兩上為細末每服一錢溫酒調不拘時服透骨膏治一切風濕走注疼痛生乾地黃馬鞭草各半斤吳茱萸白麵各三兩骨碎補敗龜版各四兩酒炙鱉甲三個酒炙蒲黃二兩上為細末用米醋調似膏子火上溫熱攤於痛處用紙裹候冷再炒於避風處用之薏苡仁湯治中風手足流注疼痛麻痹不仁難以屈伸薏苡仁當歸芍藥麻黃官桂各一兩甘草炙蒼朮米泔浸一宿去皮銼炒一兩上銼每服七錢半水二盞生薑七片煎至八分去滓食前溫服自汗減麻黃熱減官桂如神救苦散治左癱右瘓風濕痹走注疼無問男子女人遠近並皆治之御米殼去頂囊蜜炙一兩陳皮去白五錢虎骨酥炙乳香研沒藥研甘草炙各二錢半上為細末每服三錢水一盞煎八分連滓熱服如煎藥一順攪之忌雞豬等肉十味銼散治中風血弱臂痛連及筋骨舉動艱難當歸黃耆炙白芍藥各二錢附子炮二錢半川芎防風白朮各一錢半肉桂一錢茯苓熟地黃酒浸焙各七錢半上㕮咀分二帖每帖水二盞生薑八片棗二枚煎至八分食後臨臥服鱉甲湯治中風手足不遂舉體疼痛或筋脈攣急鱉甲醋炙虎骨酥炙各六兩海桐皮羌活去蘆丹參獨活去蘆萆薢牛膝去苗酒浸切焙五加皮酸棗仁炒各三兩附子炮裂去皮臍天雄炮裂去皮臍天麻去蒂防風去叉威靈仙去土川芎各二兩半當歸切焙桂心紫參各三兩薄荷焙六兩檳榔煨六兩石菖蒲九節者米泔浸切焙一兩半上銼如麻豆每用八錢匕水一盞酒一盞生薑十片同煎去滓取一大盞溫分三服空心日午夜臥服出汗並二服如人行五里以熱生薑稀粥投厚衣覆汗出慎外風活命金丹治中風不語半身不遂肢節頑痹痰涎上潮咽嗌不利飲食不下牙關緊及解一切藥毒酒毒發熱腹脹大小便不利胸膈痞滿上實下虛氣閉面赤汗後餘熱不退勞病諸藥不治無問老幼男子婦人俱宜服之貫衆甘草板藍根甜硝乾薑各一兩一作乾葛龍腦研麝香研青黛各三錢牛黃研牛犀珠子末薄荷各半兩大黃一兩半辰砂四錢另研一半入藥一半為衣桂心三兩上為細末與研藥和勻煉蜜同水浸蒸餅為劑每兩作十丸以硃砂為衣就濕以真金箔四十箔為衣臘月修合瓷器收貯多年不壞如療風毒茶清化下解藥毒新冷水化下汗後餘熱勞病及小兒驚熱薄荷湯化下以上並量病人大小加減用之大有效一方無貫衆附子湯治中風欲死身體緩急目不得開舌強不能語芍藥甘草炙麻黃去根節白朮各一兩防風去叉防己各一兩半附子炮裂去皮臍一枚人參黃芩去黑心桂心獨活去蘆川芎各一兩天雄炮裂去皮臍一枚上銼如麻豆每服五錢匕水一盞半入生薑半分切煎至八分去滓空心日午夜臥各溫服如人行五里以熱生薑粥投之微汗出慎外風神照散治中風昏塞肢體不收口眼歪斜木香白茯苓去皮川芎蒺藜炒去角人參獨活去蘆黃耆銼一兩一分附子炮裂去皮臍遠志去心各三分萆薢茵芋各一兩梔子仁二兩上為細末每服一錢匕溫酒調下加至二錢三錢空心日午夜臥服桂附續命湯治中風有汗無熱桂枝附子甘草依本方加一倍宜針太溪此一證少陽經中風也用水煎服通關散治失音不能言由風邪客於脾經上入關機者舌本也又關膈不通其人精神昏憒失忘白殭蠶炒半兩羌活三分麝香半錢上為細末每服二錢先以薑汁少許調勻以沸湯浸放溫服之以真菖蒲末時時著舌根下治中風失音並一切風疾以白殭蠶七枚為末用酒調服方寸匕立效治感風不能語以黃耆防風煮湯數斛置床下熏之昔唐許裔宗初仕陳為新蔡王外兵參軍時有柳太后感風而不能言脈沉而口噤裔宗曰既不能下藥宜湯氣熏之藥入腠理周時可瘥乃造此湯數斛置床下氣如煙霧其夕便得語藥力熏蒸其效如此三聖散治中風舌強不語沒藥研琥珀研各一分乾蠍七枚全者炒上為細末每服三錢匕用鵝梨汁半盞皂角末一錢匕濃煎湯一合與梨汁相和調下須臾吐出涎毒便能語甘竹瀝湯治卒中惡風噎倒悶口噤不能語肝厥尸厥死不識人閉目灸針不知痛風狂宜服此湯甘竹瀝一斗生薑三兩防風甘草炙各三兩防己麻黃去節人參黃芩白朮細辛茵芋秦艽桂心各一兩附子一枚大者炮上㕮咀以湯漬藥令赤合竹瀝煮取四升分為四服忌海藻菘菜桃李雀肉生蔥生菜豬肉冷水白礬散治一切急風口噤不開白礬半兩鹽花一分上並細研以手點揩牙根下更將半錢匕以綿裹安牙盡頭治中風牙關緊急方用甘草比中指節截作五截於生油內浸過炭火上炙候油入甘草以物斡開牙關令咬定甘草可人行一里時候又換甘草一截後灌藥極效白神散治中風或吐瀉牙關緊噤下藥不能用白梅末不以多少將揩牙立開蓋酸能收斂自然齒骨易開也金箔丸治風癔奄忽不知人喉中噫噫然有聲舌強不能言身軟自汗口吐涎沫項背強直神志昏憒金箔研一百片銀箔研一百片犀角屑另研牛黃另研丁香另研龍腦另研沉香另研珍珠末另研木香另研麝香另研琥珀另研硼砂另研烏蛇酒浸去皮骨炙天麻酒浸切焙雄黃另研蠍梢炒白殭蠶炒附子炮裂去皮臍南星炮防風去叉白附子炮甘草炙各一分丹砂另研一兩墨燒研半兩上將九味各依制度研為細末卻入另研藥一處和內將金銀箔入水銀三分同研如泥與諸藥再研和勻煉蜜和丸如緑豆大每服大人五丸薄荷酒下小兒二丸薄荷湯化下消風丸治風邪引頰口歪僻言語不正草烏頭半斤用香油四兩炒令黃色麻黃去節根先煎掠去沫焙乾白芷各半兩附子炮裂去皮臍半兩防風去叉白茯苓去皮藿香葉乾薑炮前胡去蘆青橘皮去白炒桂心各一兩甘草炙二兩龍腦研麝香研丁香木香白殭蠶炒各一分蟬蛻炒半兩皂角不蛀者一兩一分去皮子酥炙焦黃上為細末煉蜜和丸如彈子大每服一丸用溫酒化下不拘時候服不換金丹治中風口歪荊芥穗白殭蠶炒天麻甘草炙防風各一兩川烏頭生用白附子生用羌活去蘆細辛去葉川芎蠍梢去毒炒藿香各半兩薄荷三兩上為細末煉蜜和丸如彈子大每服一丸細嚼茶酒任下如口歪向左即右腮上塗之便正搜風順氣丸治風濕氣口眼歪斜大便結澀人參一兩半麻子仁柏子仁大黃各一兩皂角不去皮生用二兩黑牽牛末一兩威靈仙二兩朴硝半兩上為細末麵糊為丸如梧桐子大每服五六十丸溫酒下一字散治賊風吹著口眼歪斜烏頭生用青礬各半兩上為細末每用一字搐入鼻內取出涕吐涎蒜塗法治中風口眼歪斜用橡斗盛蒜泥塗合谷穴右歪左貼正則止之萆薢膏治中風口眼歪斜不正大萆薢子一十四個正東南枝上取七個正西枝上取七個巴豆七個去皮上為泥成膏子後加麝香半錢一處和成膏子左患安藥於右手勞宮穴內用紙七重蓋定藥餅上以碗坐在藥上碗用熱酒蒸之如右患用左手略坐一時辰用手托碗便正也一方無麝香松葉酒治中風口眼歪斜亦治三年中風不較者用青松葉一斤細銼如豆木石臼中搗令汁出用生絹囊貯以清酒一斗浸二宿近火煨一宿初服半升漸加至一升頭面汗出即止或無酒止用水浸亦可蜘蛛摩方治中風口歪用蜘蛛大者一枚摩其偏緩頰車上及耳前候視正則止亦可向火摩之或取蜘蛛大網絲成團如彈子摩之亦得白魚膏治中風口眼歪斜用衣中白魚七枚摩偏緩一邊才正便止恐大過凡患急邊緩邊皆有病先摩緩邊次摩急邊急邊少用皂角膏治中風口歪不正語則牽急四肢余無他苦此由居處不便因臥而孔風入耳客於陽明之經宜敷之用大皂角五兩去皮子為末以三年米醋和左歪塗右右歪塗左干更塗之三蚣散治諸風口眼歪斜蜈蚣三條一條蜜炙一條酒浸一條紙裹煨熟共三條南星三個每個切作四塊逐個如蜈蚣法制白芷半兩上為細末入真麝香少許熱酒調一錢食後服清涼丹治風熱壅實上攻頭面口眼歪斜語言不正肌肉瞤動面若蟲行及治傷寒熱盛狂言昏冒剛痓及一切風熱並皆治之片腦半兩另研牛黃三兩另研蠍梢去毒炒石膏以上二味各一兩半白花蛇酒浸取肉犀角屑防風去叉甘草炙珍珠末硃砂大黃以上七味各一兩南星末四兩臘月黃牛膽制者上為細末研勻煉蜜為丸每兩作十丸每服一丸薄荷湯化下食後臨臥服治中風口歪以葦筒子長五寸一頭刺於耳內四面以面密封塞不透風一頭以艾灸之七壯患右灸左患左灸右耳痛亦灸得換骨丹治中風癱瘓久不愈四肢嚲曳不隨服諸藥不效麝香研半錢桂心一兩半甘松去土川烏生用去皮臍白芥子炒藿香草烏去皮臍生用海桐皮炒何首烏羌活龍腦研骨碎補去毛炒牛膝酒浸炒威靈仙去土桑皮炒槐角木鱉子炒青皮去白自然銅醋淬七次研陳皮去白各二兩白芷防風甜瓜子炒萆薢炒五靈脂川芎甘草鹽水炙苦參白膠香各半兩硃砂二兩為衣麻黃去根節一十斤河水七斗煮減半去滓澄清再煎如餳瓷器收貯上為細末用麻黃膏子入煉蜜少許搜成劑丸如彈子大硃砂為衣每服一丸食後捶碎茶酒任下或用生薑自然汁更入酒半盞化開服可更進酒一二盞投之日二服至三日於病處微汗為效至十日大效無不愈但藥性稍熱病寒者多效天麻浸酒方治癱緩風不計深淺久在床枕天麻骨碎補龍骨虎骨酒炙烏蛇酒浸去皮骨炙白花蛇酒浸去皮骨炙惡實切焙熟地黃焙各半兩松節銼敗龜版醋炙川芎當歸切焙各一兩茄子根切焙火麻仁原蠶砂炒各二兩附子炮裂去皮臍一枚羌活去蘆獨活去蘆牛膝酒浸炒各半兩上㕮咀如麻豆大用酒二斗浸密封春夏三日秋冬七日熟每服一盞不拘時溫服金虎丸治癱緩風南星天麻白附子烏蛇酒浸去皮骨焙附子去皮臍乾蠍去土狼毒白殭蠶各二兩桂心檳榔三兩五靈脂烏頭去皮臍各三兩牛黃麝香丹砂三味同細研各半兩上並生用除別研外為末共和勻煉蜜為丸如雞頭大每服一丸嚼細茶酒下若用牛膽丸尤妙舒筋保安散治左癱右瘓筋脈拘攣身體不遂腳腿少力乾溼腳氣及濕滯經絡久不能去宣導諸氣木瓜五兩萆薢五靈脂牛膝酒浸續斷白殭蠶炒松節白芍藥烏藥去木天麻威靈仙黃耆當歸防風虎骨酒炙各一兩上用無灰酒一斗浸上藥二七日緊封扎日數足取藥焙乾搗為細末每服二錢用浸藥酒半盞調下吃酒盡用米湯調下又方金毛狗脊一兩卻將乳香白膠香各一兩同研入干藥末內輕腳丸治左癱右瘓腳弱不能行履木鱉子另研白膠香另研白芍藥各二兩草烏去皮尖四兩赤小豆一兩另研為末打糊上為末以赤小豆糊為丸如梧桐子大每服七丸旋如至十丸溫酒或木瓜湯下病在上食後臨臥服病在下空心服忌熱物少時追魂散治癱緩風五靈脂三兩上杵碎以水浸攪勻先傾去上黑濁者後去下沙石者取中間細者於灰盆之中紙上挹干搗研為末每服三錢匕酒一盞煎兩沸服繼服小續命湯換骨酒昔人早年患偏風證四肢不舉未服此藥非人回轉不能自動服藥三日便覺手梳頭七日四肢漸舒十日行步半月覺身輕眼明此藥神效不敢隱藏白茯苓晚蠶砂炒各三兩蒼耳子炒天雄炮去皮臍尖乾薑炮郁李仁湯浸去皮附子炮去皮虎脛骨酒浸炙黃白花蛇酒浸去皮骨炙牛蒡子根牛膝各半兩何首烏甘草檳榔白附子益智仁各一兩甘菊花防風栝蔞牡蠣牡丹皮石菖蒲杜仲炒去絲黃耆羌活鼠黏子枸杞子各半兩天麻山茱萸去核白朮桔梗狗脊去毛蛇床子肉蓯蓉菟絲子各一兩紫菀半兩上入臼為粗末用無灰好酒三五斗生絹袋盛藥在罈子內封閉令密浸之春夏二七日秋冬三七日開時人面不得向壇上取浸藥酒日進三服各一盞溫暖服久患者不過月日近者只三五服其藥渣陰乾為末煉蜜為丸亦名換骨丹每服三四十丸梧桐子大溫酒送下此藥神效益精補虛活血駐顏潤皮膚兼治眼目能退一切風疾常服烏髭發身輕骨健爽精神淨房修養一月妙至聖一醉膏治癱緩風天麻一分沒藥黃明滴乳香各半兩附子一兩炮裂去皮臍安息香一分麻黃去根節四兩片腦少許上件七味一處搗羅為細末每服四大錢用法酒一升於銀石器內熬成膏後卻出分在四盞內別用法酒看病人吃酒多少漸調膏子服盡為度令枕病處臥以衣被蓋或汗出或似蟲行即效次日再吃一服手足必已舉得此疾五十日以上方治若髮直者不在治限經進骨碎補丸治左癱右瘓五靈脂去砂石別研細木鱉子去殼銼另研細生薑作片子地龍用麻布包石上捶去土黑牽牛炒令微熟草烏去皮尖切作小塊子用鹽少許炒令裡外俱透黑豆炒令微熟威靈仙用鐵角者洗去土用滴乳香用糯米數粒同乳香一處研細入藥南星灰火包去皮各一兩麝香一錢另研臨了拌入藥白膠香蒸煮二三十沸傾在冷水中少時控干別研極細用防風去叉各一兩各依制度研為細末和勻用醋糊為丸如梧桐子大初服五丸加至七丸食後薄荷茶酒下乳香寬筋丸治左癱右瘓口眼歪斜走注風氣腰腳麻痹一切風疾赤根白頭風瘡如瘡乾用油調塗瘡濕只糝如打撲閃肭皮骨損碎入沒藥乳香半錢調塗乳香別研沒藥別研川烏炮去皮尖草烏炮去皮尖地龍去土白牽牛炒鍋內煮數沸各半兩白殭蠶一錢炒五靈脂七錢酒研去砂石何首烏一兩砂器煮去黑水上焙碾為細末酒糊為丸如梧桐子大每服十五丸至二十丸食後茶酒任下保命龍虎丸治癱緩走注疼痛風勞氣冷腰膝軟弱四肢嚲曳兼治從高墜下折傷口眼歪斜久臥床枕起止不得白膠香別研虎骨酥炙黑牽牛生乳香別研地龍去土炒古文錢火燒醋淬七次木鱉子去殼另研當歸洗焙川烏炮去皮臍沒藥別研附子炮去皮臍巴戟去心草烏銼鹽炒令黃去鹽牛膝酒浸炒肉蓯蓉酒浸焙自然銅火燒醋淬七次上件各等分為細末醋煮麵糊為丸如梧桐子大每服三十丸溫酒或鹽湯送下婦人醋湯下空心服酒浸藥仙方凡患風疾四肢不舉服之三日舉手梳頭七日漸舒十日行步半月遍身依舊覺得輕健眼目更明大有神效治之甘菊花防風去蘆羌活杜仲牡礪栝蔞根牡丹皮紫菀菖蒲人參白蒺藜牛蒡子枸杞子各半兩白花蛇桔梗白朮山茱萸去核白茯苓晚蠶砂炒官桂遠志去心牛膝各二錢虎脛骨牛蒡根乾薑熟地黃柏子仁狗脊去毛焙天雄炮去皮萆薢蛇床子附子肉蓯蓉菟絲子續斷芍藥去皮石斛各三錢上並要川廣好者依方揀擇為粗末用新絹袋盛藥用新小甕兒一個放藥在內以無灰酒二斗將藥浸之密封其口春夏浸二七日秋冬浸三七日開甕早晨臨午晚三時令病人自取冷酒三盞依時服之每服不過一盞不多服亦不可添減亂開酒甕久病服者不過一月近者十日輕者五日見效不問男子婦人小兒骨節疼痛四肢浮腫眼目昏暗半身不遂語言蹇澀口眼歪斜中風失音並治之夜合枝醞酒治中風手足不隨攣縮屈伸艱難夜合枝桑枝槐枝柏枝並生用銼五兩糯米五升石榴枝生銼五兩羌活去蘆二兩赤豆緊小者五升防風去叉五兩細曲七斤半上先以水五斗將五枝同煎取二斗五升去滓浸米黑豆兩宿蒸熟入曲與防風羌活二味拌和造酒依常醞法封三七日壓去糟滓取清酒三合至五合飲之常令有酒氣無令過醉恐致吐即悖亂正氣鐵骨丹治諸風癱瘓拳攣半身不遂川烏炮去皮臍尖草烏炮去皮臍尖川芎當歸酒浸曬肉桂續斷洗曬細辛補骨脂炒烏蛇酒浸取肉曬七錢半白殭蠶炒木鱉子去殼炒天麻酒浸曬巴戟去心酒浸防風乳香沒藥麻黃去節羌活獨活南星炮白蒺藜炒薏苡仁蒼朮炒各十兩萆薢鹽水煮杜仲生皮銼薑製炒去絲牛膝酒浸焙乾各一兩虎脛骨酒洗浸炙焦白附子炮各三兩全蠍去毒炒秦艽各二錢半五靈脂四錢麝香半錢另研自然銅火燒醋淬七次三兩上為細末除乳沒麝別研細拌入和勻以浸藥酒調飛面煮糊為丸如彈子大每服一丸溫酒磨下或木瓜煎湯下黑豆淋酒下不拘時服仍間用良薑碎一升煎湯圍熏湯浴最妙未服藥前須以斑蝥二十一個去翅足用黑豆一建盞慢火同炒焦只用七個並豆入全蠍十四枚微炒五靈脂二錢半為末糕糊丸麻子大每服二十一丸老酒下先去其風根八風九州湯治男子婦人寒冷不自愛護當風解衣汗出臥冷濕地半身不遂或俯仰屈伸難周身淫淫痹四肢不收狀如風狂飲食損少手足苦冷或不隨麻黃四兩去節甘草炙乾薑附子炮防風獨活各三兩石膏綿裹捶碎茯苓白朮川芎柴胡當歸人參細辛各二兩杏仁四十九粒去皮尖上㕮咀以水一斗清酒五升漬三夜煮取四升分為三服一日令盡若病人羸瘦者用水煎服藥訖厚覆當汗出微微去上衣汗解以粉粉之忌生菜海藻菘菜酢桃李豬肉雀肉金鳳丹治肝腎久虛風邪攻注腰腳不隨五靈脂天麻酒浸一宿焙各三兩烏頭炮裂去皮臍楓香脂研各二兩乳香研一分地龍去土炒二兩半沒藥研半兩木鱉子去殼二兩海桐皮銼一兩黑豆去皮一合草烏去尖全蠍狼毒炮牛膝酒浸炒各一兩丹砂研半兩附子炮裂去皮臍薄荷葉各一兩當歸切焙一兩半自然銅火煅醋淬骨碎補去毛虎骨炙酥各一兩龍腦研麝香研各一錢上為細末以生薑蔥白汁為丸如雞頭大每服一丸生薑蔥酒下諸風疾治之皆效走注風乳香酒下卒中風薄荷酒下卒中暗風雞冠血酒下半身不遂煎松明酒下婦人産後破血氣煎黑豆酒下不可食蔥婦人産後虛腫及頭面生瘡遍身癢痛白芷酒下雄豆散治中風腰腳不隨筋急行履不得用雄黑豆緊小者不限多少以新汲水淨淘漉干頻灑水候生蘖才及半曝乾炒熱不退皮搗羅為末每服二錢至三錢匕溫酒調下日三服至半月後所患處覺有觸動是驗也仙靈脾散治中風腳膝軟弱筋骨緩縱不能行立仙靈脾天雄炮裂去皮臍石斛去根銼天麻牛膝去苗麻黃去根節各一兩川芎五加皮萆薢丹參桂心當歸防風羌活各三分虎脛骨酥炙檳榔各一兩上為細末每服一錢食前溫酒調下忌生冷油膩豬雞肉海桐皮浸酒方治風毒腳膝軟弱行立不得海桐皮五加皮獨活天雄炮裂去皮臍石斛去根桂心防風去蘆當歸杜仲去皮炙黃仙靈脾萆薢牛膝薏苡仁生地黃各二兩虎脛骨酥炙令黃三兩上細銼以生絹袋盛用清酒二斗春夏浸七日秋冬浸二七日每日時時暖飲一小盞常令醺醺不得大醉重者不過兩劑若酒盡旋旋添之以藥味盡即止桑枝煎方治風腳膝軟弱桑枝銼三升黑豆一升附子生用銼五兩茄子根銼一升以上四味用水三斗煮至一斗濾去滓再熬取五升入後藥末石斛去根銼天雄炮裂去皮臍天麻牛膝川芎桂心各二兩上為末入前汁中於銀鍋內慢火熬用柳木篦不住手攪候如膏盛於瓷盒中每日空心用熱酒調下一茶匙晚食前再服尤妙治風軟腳以丹參酒浸服之可逐奔馬治風軟腳用龜殼炙之為末酒調服之白花蛇丸治中風不仁皮膚𤸷厚搔之如隔衣白花蛇酒浸去皮骨炙乾蠍炒仙靈脾天雄炮裂去皮臍天麻桂心麻黃去根節鹿角膠炙令燥萆薢各一兩桑螵蛸炒茵芋烏頭炮裂去皮臍南星炮各半兩雄黃研麝香研各一分上為細末外又用火麻仁三兩為末入無灰酒慢火熬成膏與前末和搗五百杵丸如梧桐子大每服二十丸薄荷酒下不拘時候服五參散治風不仁皮膚𤸷麻繞腰遍身似蛇皮黑癮旋生旋沒通身麻痹人參玄參丹參沙參苦參各一兩白花蛇酒浸去皮骨炙一兩半上為細末每服二錢匕加至三錢匕食後夜臥溫酒調下赤箭丸治風邪所攻肌膚虛弱手足嚲曳筋脈不利赤箭二兩天雄去皮臍丹參川烏去皮臍南星獨活防風去蘆五加皮桂心白花蛇肉川芎白附子牛膝去苗仙靈脾白殭蠶桑螵蛸檳榔細辛酸棗仁乾蠍野狐肝蒺藜萆薢各一兩麻黃去根節一兩半牛黃半兩細研硃砂一兩細研水飛麝香半兩細研龍腦一分細研上並生用搗羅為末入別研藥和令勻煉蜜和搗五七百杵為丸如梧桐子大每服二十丸食前用溫酒下忌食生冷油膩毒滑魚肉羊血附子湯治風嚲曳手足不隨身體不能俯仰附子炮裂去皮臍乾薑炮甘草炙防風去叉獨活去蘆各一兩半石膏碎白茯苓去皮白朮川芎柴胡去苗當歸酒浸切焙人參各一兩杏仁去皮尖炒研二十枚細辛一兩上銼如麻豆每服五錢匕水酒共一盞半煎至一盞去蘆溫服日三羸瘦者只用水煎服羚羊角丸治中風手顫嚲曳語澀羚羊角鎊一兩犀角鎊三分羌活去蘆防風去叉各一兩薏苡仁炒秦艽洗各二兩上為末煉蜜丸如梧桐子大每服二十丸漸加至三十丸煎竹葉湯下犀角搜風丸治風下痰解結順氣乾生薑木香各半兩白茯苓去皮車前子木通各一兩青皮去白三兩陳皮去白枳實麩炒各二兩牽牛取頭末四兩犀角鎊一兩半上為細末湯浸蒸餅為丸如梧桐子大每服三十丸加至五十丸食後溫生薑湯下乳香尋痛丸治中風癱瘓不遂手足嚲曳口眼歪斜或旋運僵仆涎潮搐溺卒中急風不省人事每服二十丸黑豆淋酒下風虛眩冒項筋拘急太陽穴疼痛亦用生地黃汁調酒下腰腳疼重行步艱辛筋脈攣促俯仰不利賊風所中痛如錐刺皮膚頑厚麻痹不仁或血脈不行肌肉乾瘦生蔥酒下或生蔥茶亦可風濕腳氣腿膝無力或腫或疼不能舉步兩腳生瘡膿血浸漬癢痛無時愈而又發溫鹽酒下打撲閃肭筋骨內損已經多年每遇天寒時發疼痛沒藥酒下乳香川烏沒藥五靈脂白膠香地龍白薑半夏五加皮赤小豆各等分上為細末麵糊丸如梧桐子大隨證湯引如前並空心服七寶丸治中風不計緩急涎潮冒悶不知人丹砂牛黃水銀龍腦膩粉麝香以上並研細各一分金箔大者二十一片與藥末同研上再同研令水銀星盡用蒸棗肉為丸如梧桐子大病輕者每服十丸重者二十丸溫水化破服利下涎須服和氣藥日後時慢服治風藥治中風涎潮不下精神昏憒不省人事用薄荷湯磨下紅龍散治一切中風前開關竅不致枯廢服此藥後服治風之藥硃砂別研五靈脂各一兩半全蠍半兩茯神萆薢各一兩片腦別研麝香別研各半錢上為細末每服二錢用溫酒或荊芥薄荷湯調服十二味正氣散治風中氣中人參二錢半厚朴半夏藿香甘草茯苓白朮石菖蒲遠志去心薏苡仁陳皮木香各半兩上㕮咀每服三錢水一盞生薑三片棗一枚煎八分服二香三建湯治男子婦人中風虛極言語蹇澀六脈俱微舌強不語痰涎並多精神如癡手足偏廢不能舉運此等證候不可攻風止可扶虛天雄去皮生用附子去皮生用川烏去皮生用各一兩木香不見火半兩沉香旋磨水入上㕮咀每服四錢水二盞生薑十片煎至七分去滓溫服空心食前楊氏神柏散治中風不省人事涎潮口噤語言不出手中嚲曳得病之日便進此藥可使風退氣和不成廢人卒有此證無藥去處用之得力柏藥一握去枝蔥白一握同根上研如泥用無灰酒一升同煎一二十沸去滓溫服不拘時如不飲酒分作四五服服盡方進他藥蘇青丸和氣血散風痰亦可常服上以蘇合香丸與青州白丸子打和薑蘇湯化下定神琥珀丸治心中風發動不知漸成癲癇驚悸恍惚琥珀研珍珠研牛黃研天竺黃研鐵粉研龍齒研各一兩膩粉研犀角鎊甘草銼炙龍膽升麻露蜂房微炙丹砂研防風去叉黃芩去黑心麥門冬去心焙白芍藥鉤藤人參遠志去心知母焙天門冬去心焙茯神去木各三分乾蠍酒炒一兩半麝香研一分金箔一百片銀箔一百片與金箔丹砂同研斷星石菖蒲九節者去須米泔浸切焙三分上除別研藥外為末入研者同研令斷星煉蜜和搗三百杵丸如梧桐子大每服二十丸食後臨臥煎甜竹葉湯下日二夜一牛黃定志丸治心中風精神不寧壓驚鎮心化涎安神牛黃研龍腦研乾蠍炒殭蠶炒白附子炮各半兩雄黃研一兩丹砂研二兩天麻酒浸焙甘草炙各一兩半夏湯洗七次焙乾炒黃用二兩琥珀研三分麝香研一分南星牛膽制者半兩烏蛇酒浸去皮骨炙一兩上為細末煉蜜為丸如雞頭大每服一丸細嚼荊芥人參湯下食後臨臥服開關散治急中風目瞑牙噤無門下藥者用南星搗為末白龍腦二件各等分研自五月五日午時合患者只使一字至半錢以中指點末揩齒三二十揩在牙左右其口自開始得下藥牛黃丸治風痙身體強直牙關緊急心神昏昧牛黃研麝香研龍腦細研各一分硃砂細研水飛三分白殭蠶炒赤茯苓白芷羌活獨活蔓荊子麻黃去根節防己木香檳榔藁本防風乾蠍炒當歸炒各一兩上為細末入研藥令勻煉蜜和搗二三百杵丸如梧桐子大每服十丸不拘時用溫酒研化服麻黃湯治風痙身體強直口噤不知人事麻黃去節先煎掠去沫焙乾二兩甘草炙當歸焙黃芩去黑心各一分石膏捶碎一兩桂心川芎附子炮去皮臍乾薑炮各半兩杏仁湯浸去皮尖炒研二十枚上銼如麻豆每服五錢匕水二盞煎至一盞去滓入荊瀝半合更同煎三五沸溫服日二夜一一方治風痱身體不能自收不能言語冒昧不知人者不用荊瀝每服六錢匕水三盞煎至一盞半去滓分溫二服空心夜臥各並二服初服一日獨能自覺者勿熱服服訖密室臥用厚衣覆微汗出漸減衣未汗出更用熱生薑稀粥投之汗出忌觸外風並治上氣咳逆若面目大腫但得坐不得臥凡産婦並病人已曾大汗者不可服若虛羸人但當少服天麻湯治風痙身如板直遍身硬強天麻半兩羌活去蘆人參桂心白朮麻黃去節先煎掠去沫焙杏仁湯浸去皮尖炒各一分附子炮裂去皮臍一枚上銼如麻豆每服五錢匕生薑三片水二盞煎至一盞去滓入酒半盞再煎一沸熱服服後以生薑稀粥投之取汗日二服續命湯治風痙口噤不開身背強直發如癇狀麻黃去節先煮掠去沫焙獨活各一兩半升麻葛根各半兩羚羊角屑桂心各一兩防風去叉一兩半甘草炙一兩上㕮咀每服六錢匕水二盞浸一宿明旦煎取一盞去滓溫服衣覆避外風每年春分後常服二三劑即不患天行傷寒及諸風邪等疾治中風痙口噤面青手足急強婦人産後亦宜服之上用竹瀝一升分為五服微溫頻服大效大豆紫湯治風痙昏迷吐沫抽掣背脊強直産後中痓上用黑豆炒焦好酒淋之取清汁酒一盞獨活銼三錢煎七分溫服又連續進劑以瘥為度此湯大能去風消血結如妊娠折傷胎死腹中服此並瘥此歸荊湯獨活酒人為邪氣所幹則發而為病若氣若血若痰若水若風若寒若暑若濕腑臟表裡冷熱虛實各有受病之處用藥之法必究其原而後可以起病否則前賢所謂獵不知兔廣絡原野冀一人獲之術亦疏耳是可以人試伎乎哉一方用羌活得汗則愈歸荊湯治風痓昏迷吐沫抽掣背脊強直産後中痓通用當歸荊芥穗各等分上為細末每服二錢水一盞酒少許煎七分灌下如牙關緊用銅匙斡開以雞羽蘸藥入口或用童尿調下或以川芎代當歸也炒犀角散治中風角弓反張心神煩亂口噤不語犀角屑麻黃去根節羌活附子炮裂去皮臍杏仁去皮尖麩炒各一兩防風去蘆桂心白朮人參川芎白茯苓細辛當歸各三分石膏二兩甘草炙赤半兩上搗羅為散每服四錢用水一中盞入生薑半分煎至五分去滓入竹瀝一合更煎一二沸不拘時溫服龍腦丸治中風身如角弓反張不語昏悶龍腦細研一錢麝香細研蟬殼牛黃細研各一分乾蠍炒南星炮硃砂研阿膠炒香墨白附子炮裂防風去蘆羚羊角屑肉桂去皮羌活各半兩烏蛇肉酒浸去皮骨炙黃三分上為末入別研藥和勻煉蜜和搗三五百杵丸如緑豆大每服十丸用溫酒下不拘時候服枸杞浸酒治中風身如角弓反張及婦人一切血風上攻下注若久服悅澤顏色滋潤皮膚退風益氣強力枸杞子晚蠶砂炒各半升惡實炒蒼耳炒各一升防風去叉火麻子炒各二升茄子根二斤洗淨細切蒸一伏時須要九月九日採牛膝酒浸炒惡實根切炒各一斤桔梗炒羌活去蘆秦艽去土石菖蒲九節者各二兩上以夾絹袋盛用好法酒三斗浸密封閉勿令通氣七日方開開時不得面對瓶口每服一盞溫過空心食前臨臥服常令有酒容久病風疾不過一月瘥薏苡仁散治中風身如角弓反張心胸滿悶薏苡仁川芎桂心各一兩當歸細辛前胡去蘆羌活茵芋生地黃萆薢羚羊角屑各三分甘草炙赤半兩上搗羅為散每服四錢以水一中盞入生薑半分煎至六分去滓不拘時稍熱服急風散治中風身如角弓反張附子一枚炮裂去皮臍川烏二枚炮裂去皮臍南星一枚炮藿香防風去叉白芷各半兩全蠍一分炒白附子一分炮上為細末每服半錢匕豆淋溫酒調下並二服未愈再服牛黃散治急風垂涎臂嚲胸膈燥悶牛黃研龍腦研麝香研蟬殼微炒各一分硃砂研雄黃研南星炮裂烏蛇肉酒浸去皮骨炙黃白附子炮裂殭蠶炒川芎防風紫葛麻黃去根節細辛藁本各三分側子炮裂去皮臍天麻乾蠍炒甘菊花犀角屑羚羊角屑天竺黃研各半兩上為細末入別研藥和勻不拘時候以熱酒調下二錢蟬蛻丸治急風卒中半身不隨腰腳軟弱歷節疼痛手足拘攣口面歪斜言語蹇澀白癜頑麻心驚恍惚肢體戰掉腰腿癱緩及腳氣風腫疼痛等疾蟬蛻一兩乾蠍炒一兩烏蛇酒浸去皮骨炙一兩五味子一兩四味用酒浸焙乾附子生去皮臍一兩南星炮天麻各二兩白附子炮川芎殭蠶炒防風去叉乾薑炮麻黃去根節蔓荊子去白皮狗脊去毛雄雀糞炒各一兩當歸切焙三分雄黃研一分丹砂麝香研各三分上為細末煉蜜為丸如彈子大每服半丸薄荷酒嚼下急風癱緩及攻注筋骨疼痛薄荷汁化開一丸以熱酒投下向患處臥衣被蓋汗出睡覺疼痛即定雄黃散治急風不省人事雄黃研香墨乾蠍炒蟬蛻炒各半兩龍腦研麝香研丁香牛黃研膩粉各一分硃砂研三分南星炮裂阿膠炒各一兩上為細末入研藥和勻不拘時用溫酒調下一錢妙追風散治一切急風角弓反張四肢抽掣牙關緊急骨節疼痛及破傷風川烏去皮臍附子去皮臍白附子白花蛇酒浸去皮骨丹砂研各一兩蠍梢麝香研各三分膩粉研一分南星去臍一兩上並生用搗羅六味為細末入別研藥和勻瓷盒收每服半錢至一錢豆淋酒或煎蔥白酒下口噤者用少藥揩牙即開為妙透關丸治中急風榮衛痹滯頭目昏運額角偏痛手足無力舉動戰掉語言蹇澀心神不寧麻黃去根節二兩麝香研天麻各半兩沒藥研乳香研地榆甜瓜子川烏生去皮臍玄參各一兩上為末以酒一升慢火熬為膏更重入煉蜜丸如梧桐子大每服三十丸溫荊芥湯下不拘時候雄黃散治急風及破傷風立效雄黃研白附子炮南星醋煮十沸炙乾以上各三分牛黃研一分麝香研一錢蛜蜥微炒殭蠶炒各半兩天麻二兩白花蛇肉酒浸炙一兩上為細末入研藥和勻不拘時以溫酒調下一錢分涎散治急風口噤手足搐搦涎潮作聲不得出藿香葉蠍梢一方用乾蠍白附子炮各一分南星炮半兩丹砂研膩粉研粉霜研各