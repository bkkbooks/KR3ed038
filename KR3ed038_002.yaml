牛取頭末一兩上將芫花狼毒二味別作一處為末牽牛半夏亦別作一處為末其餘衆藥共作一處為末每服芫花狼毒半錢半夏牽牛末一錢衆藥末一錢半計三錢匕共作一服臨臥蔥湯調下治風走注疼痛不定隨痛處尉之黑豆五升芫花一斤生薑切半斤上都炒旋入醋拌用青布裹尉痛上更番炒尉以效為度治風走注疼痛地龍微炒一兩麝香研一分上研為細末每服一錢以溫酒調下不拘時候赤芍藥散治風入腹攻五臟拘急不得轉側陰縮手足厥冷腹中㽱痛赤芍藥桂心甘草炙防風去叉川芎各一兩川烏炮裂去皮臍二兩上㕮咀每服三錢以水一中盞入生薑半分棗二枚煎至六分去滓不拘時候稍熱服搜風丸治邪風上逆以致上實下虛風熱上攻眼目昏蒙耳鳴鼻塞頭痛眩運燥熱上壅痰逆涎嗽心腹痞痛大小便結滯常服清利頭目開通鼻竅聰耳明目宣通血氣調順飲食南星人參茯苓各半兩乾生薑寒水石白礬半夏各一兩蛤粉大黃黃芩各二兩牽牛末滑石各四兩薄荷葉半兩藿香二錢半上為末滴水丸如小豆大每服十丸加至二十丸用生薑湯下日進三服羌活散治風熱頭面生瘡羌活去蘆防風去叉川芎荊芥穗麻黃去根節甘草炙惡實炒木通各等分上為細末每服二錢匕茶酒調下不拘時服一品丸治風熱上攻頭目昏眩及療偏正頭疼上用大香附子去毛皮用水煮一時久細切焙乾為細末煉蜜為丸如彈子大每服一丸水一盞煎至八分通口服婦人用醋湯煎服治脾氣虛弱肝熱有餘胃氣不足虛涎所積聚在胃口風氣一上潮涎並起其狀先有津液滿口漸次心前潰亂如有一物上觸咽喉即便噎塞滿悶不覺兩手相亂把拽頭上搔癢或氣上時忙惶高聲叫喊逡巡仍遂平復此名虛涎無論大人小兒若得此病但大腑虛冷即吃此藥若大腑祕熱不可吃此藥只吃後方也草豆蔻細辛川芎厚朴薑製各半兩防風羌活獨活薏苡仁黃橘皮南星半夏殭蠶炒檳榔肉豆蔻牽牛各一分上為細末煉蜜為丸如梧桐子大早朝空心薑湯下四十丸食後吃後方大腑熱添牽牛半兩防風荊芥穗麻黃羌活獨活乾蠍薄荷連翹殭蠶炒各一分半夏三株上為細末每服一錢食後薄荷湯調下清神散治風壅熱甚咽膈不利荊芥穗薄荷葉各二兩甘草炒一兩牛蒡子炒川芎各半兩上為細末每服二錢沸湯調食後服治熱風以牛乳服之去風熱以椰子漿飲之治一切風熱毒氣攻注目臉外及發於頭面並四肢腫痛應手神驗上於臘月中以新瓦罐滿貯熱水用朴硝二升投湯中攪散挂北簷下候硝滲出罐外以羽收之每用時以人乳汁調半錢掃之防風飲治中風發熱無汗肢節煩疼腹內急痛大小便祕澀防風去叉當歸切焙白朮麻黃去節先煎掠去沫焙赤茯苓去皮附子炮裂去皮臍山茱萸去核黃芩去心各一兩人參甘草炙大黃炒各三分熟地黃焙一兩上銼如麻豆大每服五錢匕用水一盞半入生薑半分切碎大棗二枚擘破煎至八分去滓溫服空心日晚各一一方加天門冬一兩石膏湯治中風頭疼煩熱口乾小便赤石膏研白茅根萹蓄各三分滑石半兩上㕮咀每服三錢匕水一盞煎至七分去滓食遠熱服防風散治熱毒風痰壅頭目運悶心神不寧防風去叉枳殼麩炒各三分沙參半兩秦艽去苗一兩半犀角屑升麻木通羌活甘草炙茯神去木龍齒前胡各一兩上㕮咀每服三錢水一中盞煎至五分去滓入生地黃汁一合更煎一二沸不拘時溫服前胡散治熱毒風攻頭面壅熱口乾心煩不欲吃食前胡子芩山梔仁防風甘菊花沙參甘草炙各半兩羚牛角屑麥門冬去心枳殼麩炒各一兩石膏二兩上㕮咀每服三錢水一中盞煎至六分去滓不拘時溫服天竺黃丸治熱毒風心神煩躁頭目昏痛天竺黃硃砂研水飛過子芩各一兩犀角屑半兩石膏二兩研水飛過甘草炙半兩甘菊花防風苦參各三分上為末入別研藥令勻煉蜜為丸如梧桐子大每服二十丸不拘時煎竹葉湯下黃連白朮湯治風證寒熱二氣交爭調順陰陽黃連麥門冬去心焙各一兩旋覆花炒甘草炙黃芩去黑心附子炮裂去皮臍白朮各半兩桂心白茯苓去皮陳皮去白焙桔梗炒各七錢地骨皮一兩二錢桑白皮一兩半上銼如麻豆大每服五錢匕水一盞半入生薑三片同煎至八分去滓溫服溫中湯治風邪所傷肌瘦泄汗寒中泣出當歸切焙白朮各二兩人參附子炮裂去皮臍乾薑炮甘草炙蜀椒去目炮出汗桂心各一兩上㕮咀銼如麻豆大每服四錢匕以水一盞半煎取八分去滓溫服日二雄黃散治風氣入中蘊積生熱口乾目黃時發潮燥雄黃研半兩丹砂研牛黃研丁香各一分桂心半兩麝香研一兩南星炮半夏為末生薑汁搜作餅曬乾麻黃去節殭蠶炒天麻各三分龍腦研一分附子炮裂去皮臍大黃醋炒乾薑炮各半兩上將十味搗為細末入別研五味藥和勻每服半錢加至一錢匕空心夜臥溫酒調下汗出即愈金箔牛黃丸治風邪除熱中金箔十片研牛黃研龍腦研各一兩犀角鎊琥珀研人參各一分丹砂研水飛白茯苓去皮各二兩白花蛇酒浸去皮骨炙天麻各半兩白附子炮殭蠶炒甘草炙各一兩上為細末入別研藥和勻煉蜜和搗一千杵丸如櫻桃大以金箔為衣每服一丸細嚼溫酒或溫薄荷湯下茶湯亦得常服半丸不拘時候菊花酒治男女風虛寒冷腰背痛食少羸瘦無顏色噓吸少氣去風冷補不足菊花杜仲各一斤防風附子黃耆乾薑桂心當歸石斛各四兩紫英石肉蓯蓉各五兩萆薢獨活鍾乳粉各八兩茯苓三兩上㕮咀以酒七斗浸五日一服二合稍稍加至五合日三千金翼不用幹薑羌活湯治寒風中面青遍身骨節俱冷兩手拘急筋脈牽抽手足不仁厥冷得暖氣則舒展羌活獨活乾薑炮牛膝酒浸炒草豆蔻桂心各半兩細辛藿香各一分吳茱萸湯洗炒陳皮去白各半兩乾蠍炒半夏湯洗各一分甘草炙四錢川芎白朮各一兩上㕮咀每服三錢匕水一盞煎至七分去滓稍熱不拘時候身暖並筋脈舒展則止羊肉湯治風冷氣血虛乏羊肉一斤半去脂膜煮取汁生薑二兩當歸切焙芍藥黃芩川芎甘草炙防風去叉各一兩上除羊肉外㕮咀如麻豆大每服五錢匕羊肉汁二盞煎取一盞去滓不拘時溫服菊花散治風冷邪氣入於腦停滯鼻間氣不得宣散結聚不通故使鼻塞也甘菊花防風前胡各一兩細辛桂心各半兩甘草炙二錢半上為細末每服二錢入乳香少許煎荊芥湯食遠調服人參羌活散治風壅痰實頭目昏運遍體拘攣頭項強急肢節煩疼壯熱煩渴前胡羌活人參防風天麻赤茯苓去皮薄荷蔓荊子川芎粉草黃芩枳殼桔梗獨活各一兩上㕮咀每服四錢水一盞生薑三片桑白皮七寸煎至六分去滓不拘時服半夏飲治風痰心腹煩滿嘔吐不欲飲食半夏湯洗麥門冬去心赤茯苓去皮白朮桔梗青皮去白前胡各三分厚朴生薑制炙一兩枇杷葉去毛炙防風各半兩大腹皮三分上㕮咀每服三錢匕水一盞入生薑三片煎至六分去滓不拘時候熱服上清白附子丸治諸風痰甚頭疼目眩旋運欲倒嘔噦噁心恍惚不寧神思昏憒肢體倦痛頸項強硬手足頑麻常服除風化痰清利頭目白附子炮半夏湯洗川芎菊花南星殭蠶炒陳皮去白旋覆花天麻各一兩全蠍炒半兩上為細末用生薑汁浸蒸餅為丸如梧桐子大每服三十丸食遠生薑湯下
