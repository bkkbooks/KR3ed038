body:
  text: 卷之四十四自汗盜汗門附論內經云汗者心之液又云陽加於陰謂之汗由此推之是陽熱加於陰血散於外而為汗也然有自汗盜汗之別焉成無己云自汗者不因發散而自汗出也盜汗者睡而汗出也因而思之自汗盜汗其一液也其出異也盜如盜竊之盜窺人息而潛出行於陰也自汗如自然之自居常有而明顯見於陽也皆因腠理空疏衛護氣虛不能緻密收斂於表虛則陽熱泄焉陽主動而散津液走於肝若陽蒸陽分而液出者為自汗陽蒸陰分而液出者為盜汗由是內分陰陽之虛外閉腠理之氣乃得其源也皆由心腎俱虛以致此陰虛陽必湊發熱自汗陽虛陰必乘發厥而自汗陰陽偏勝有傷風中暑故經云風從外入令人汗出頭痛身重惡寒天熱衣厚則為汗天寒衣薄則為溺病痹多汗而濡者其濕甚也陰氣有餘為多汗身寒陽氣有餘為身熱無多勞則氣耗喘且汗出飲食飽甚汗出於胃驚而奪精汗出於心持重遠行汗出於腎疾走恐懼汗出於肝搖體勞苦汗出於脾或人有熱飲食下胃其氣未定汗則出或出於面或背或身其不循胃氣之道出此因傷於風內開腠理毛蒸理泄衛氣走之固不得循其常道此氣剽悍而出故不得從其道名曰漏泄驚怖房勞虛極痰飲亦成此證診法尺脈澀滑謂之多汗男子平人脈虛細微者善盜汗也參之表裡虛實之異其藥條列諸家方論者察其所宜而用之經言有病身熱解墮汗出如浴惡風少氣名曰酒風長沙言太陽病頭痛發熱汗出惡風者太陽病發汗遂漏不止其人惡風小便難四肢微急難以屈伸者太陽中熱者暍是也汗出惡寒身熱而渴者且太陽此五證全在乎醫於本經內藥治之當涼反熱當熱反涼醫之過歟金匱要略曰風濕脈浮身重汗出惡風者除濕固腠理為先東坦云飲食勞倦皆自汗當用甘溫之劑滋益皮毛之氣不合自汗損其元氣也暑邪干衛故身熱自汗當用清暑益氣治之試效方云濕熱大作汗出不休勝濕之劑最為穩當王海藏云太陽自汗桂枝湯陽明自汗白虎湯少陰自汗四逆湯陽明發熱自汗多者大承氣湯此皆內傷外感之邪干衛而出也此方論皆前人注立後之學者識經絡用之取效不明脈理錯認經絡用之反禍不輕其於盜汗非若自汗猶有實者此則陽熱侵行於蒸出陰液復越於表是陰虧而表亦虛也其汗因寢而至寢則衛氣亦行於里覺則氣散於表而汗止矣故經曰太陽所至為寢汗東坦謂太陽老陽也太陽標有陽之名無陽之實以膀胱之真寒為純陰之氣也蘭室祕藏治療之證以黃耆黃連生地黃當歸之屬滋陰以制陽熱靜而汗止此其論也自汗盜汗通治方桂枝湯治傷風脈浮自汗惡風方見傷寒門朮附湯治中濕脈細自汗體重方見頭痛門黃耆建中湯治男子血氣不足體常自汗方見諸虛門當歸六黃湯治盜汗之聖藥也當歸黃柏生地黃熟地黃黃芩黃連以上各一錢半黃耆二錢上作一服水二盅煎至一盅臨臥服黃耆湯治喜怒驚恐房室虛勞致陰陽偏虛或發厥自汗或盜汗不止並宜服之黃耆去蘆蜜炙二錢白茯苓去皮熟地黃酒蒸肉桂不見火天門冬麻黃根龍骨以上各一錢五味子浮小麥炒防風去蘆各八分當歸去蘆酒浸甘草炙各七分上作一服水二盅生薑五片煎至一盅食遠服發厥自汗加附子發熱自汗加石斛三建湯治真氣不足上盛下虛面赤自汗小便頻數如汗不斂加肉桂黃耆方見諸虛門建中湯治表虛自汗芍藥五錢官桂甘草炙各二錢上作一服水二盅生薑五片棗二枚煎至一盅食前服本方加黃耆二錢名黃耆建中湯治虛勞自汗加當歸名當歸建中湯治婦人血虛自汗其自汗漏不止者加桂枝一錢熟附子半個名桂枝附子湯煎空心服防風散治盜汗防風五錢川芎二錢半人參一錢二分半上為細末每服二錢臨臥米飲調下白朮散治盜汗極驗白朮不拘多少銼作小塊或稍大浮麥一升上用水煮乾如白朮尚硬又加水一二升煮軟取出去麥不用切作片焙乾研為細末每服二三錢不拘時另用浮麥煎湯調服麥煎散治榮衛不調夜多盜汗四肢煩疼飲食進退面黃肌瘦並皆治之柴胡去苗秦艽各二兩鱉甲二兩醋煮三五十沸去裙襴再用醋炙黃乾漆炒盡煙人參茯苓乾葛川烏炮去皮尖玄參以上各一兩上為細末每服二錢先用小麥三七粒煎湯一盞去麥入藥再煎三五沸食後服大建中湯治虛熱盜汗百節痠疼腰痛肢體倦怠日漸羸弱口苦舌澀心怔短氣綿黃耆炙遠志燈心煮去心當歸酒洗澤瀉以上各二錢白芍藥龍骨煅人參以上各一錢半甘草一錢炙上作一服水二盅生薑五片煎至一盅食前服氣弱加炮附子二錢腰痛筋急加官桂去皮一錢止汗溫粉川芎白芷藁本以上各一兩米粉三兩上為末每用綿包裹撲於身上止汗紅粉麻黃根牡蠣煅各一兩赤石脂龍骨各半兩上為末以絹袋盛如撲粉用之牡蠣白朮散治漏風證飲酒中風汗多食則汗出如洗久不治必為消渴牡蠣煅三錢白朮一兩二錢半防風二兩半上銼碎每服五錢水二盞煎至七分食遠溫服惡風倍防風白朮汗多面腫倍牡蠣耆附湯治氣虛陽弱虛汗倦怠黃耆蜜炙附子炮去皮臍各二錢上銼作一服水二盞生薑三片煎至七分去滓食遠服撫芎湯治自汗頭眩痰逆噁心川芎白朮炒陳皮以上各二錢甘草一錢炙上銼作一服水二盞生薑三片煎至七分不拘時服牡蠣散治諸虛體常自汗驚惕不寧左顧牡蠣用米泔水洗煅過黃耆蜜炙麻黃根以上各一兩白朮半兩甘草炙一分小麥百餘粒上銼每服三錢水三盞煎一盞半服一方為細末每服三錢入紅棗三枚同煎分三服止自汗方上用川鬱金研為細末臨臥以唾津調敷乳上周衛湯治自汗麻黃根黃耆各一錢生甘草梢當歸梢生黃芩各半錢生地黃麥門冬各三分五味子七個豬苓二分羌活七分蘇木紅花各一分上銼作一服水二盞煎至七分食前服四白散治男子婦人血虛發熱夜多盜汗羸瘦腳痛不能行白朮白扁豆藿香益智厚朴黃耆陳皮以上各一兩白茯苓人參半夏烏藥白豆蔻甘草以上各半兩芍藥一兩半檀香沉香各二錢半上銼碎每服三錢水二盞生薑三片棗一枚煎至一盞去滓食前溫服又方治盜汗夜臥床席衣被並濕麻黃根牡蠣煅為粉各三兩黃耆人參各二兩龍骨打碎枸杞根白皮各四兩大棗七枚擘破上切以水六升煮取二升五合去滓分溫六服如人行八九里久中任食一日令盡忌蒜熱面等物止汗粉麻黃根牡蠣粉敗扇灰栝蔞以上各三兩白朮二兩米粉三升上為末和粉攪勻以生絹袋盛用粉身體日三兩度忌桃李雀肉仍灸大椎五六百炷日灸二七五七任意灸亦得汗即漸止加腦子收陽粉治一切虛汗盜汗自汗及漏風等證汗泄不禁服諸藥不能止者並宜用之麻黃根藁本白芷牡蠣煅龍骨以上各半兩米粉二兩腦子半錢上為細末研勻以紗帛包藥於汗處撲敷之汗止為度椒目散治盜汗日久不止椒目麻黃根各等分上為細末每服一錢用無灰熱酒調食後服團參湯治大人小兒腋汗大人乃心血液盛面常發赤者是也小兒因驚而得宜服珍珠散史丞相苦常盜汗不止氣弱體贏治之不愈一日洪舍人相見一醫人云心血液盛亦為汗非虛也宜用藥收斂心經遂傳此方服之而愈人參新羅者川當歸去蘆焙各半兩上㕮咀用豬心一個切作三片藥三分服每服用水一碗豬心一片煎至一盞去滓服食前二次服一方加黃耆
