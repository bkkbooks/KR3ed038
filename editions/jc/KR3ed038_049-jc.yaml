body:
  text: 卷之四十九痼冷門附論夫痼冷者痼為年久長固者也冷為寒極至甚者也三因方云人以臟腑稟賦不同亦有將理失宜遂致偏冷偏熱故方中有痼冷積熱之說痼冷者中寒也多因真氣既微胃氣不實復啖生冷冰雪之屬致腸胃虛寒陰既停凝陽不能正大便洞泄小便頻數鼻多清涕嘔吐涎沫水穀不化腸胃絞痛肚腹如冰冷洒洒淅淅皆陽虛陰盛之所為也張長沙有陰毒之證雖不為痼冷即冷寒所傷令人為手足冷腰背強臍腹築痛咽喉不利嘔吐不利身如被杖脈細欲絕此由腎氣虛寒外傷風冷或因冷物傷脾蓋脾為太陰內外皆陰則陽氣不守遂成陰毒四肢逆冷額上手背冷而汗出不止或眼痛不堪任唇口手足爪甲俱青黑氣上衝心而脈沉細伏匿者或多煩渴者精神如失故曰陰勝則身寒汗出身必鼓慄而寒寒則厥宜溫藥以復其陽氣或於氣海關元灸之醫律云冷者陰之至盛陽之至衰陰過曰寒經曰寒者熱之服以熱劑乃治冷之正法內則飲以至燥至剛之藥外則灼以數百艾炷逐其陰而助其陽斯又治冷夾攻之道也大抵人身貴乎陰陽升降平和無偏則無疾矣若有偏勝是即有沉寒痼冷之證乃真陽耗散脾胃虛弱失於調理以致胃寒食啖冷物黏膩難化生硬之類經年累月久積而成痼冷漸被其傷脾腎因而漬積臟腑以成痼疾矣但有寒冷等邪觸犯速然而作以臻手足厥逆畏冷增寒飲食不化或嘔吐涎沫或大便洞泄米穀不消或小便頻數或肚腹絞痛或逢寒咳嗽或㿗疝大作是其證也內經曰寒淫所勝平以辛熱又內經舉痛篇云經脈流行不止環周不休寒氣入經而稽遲泣而不行客於脈外則血少客於脈中則氣不通故卒然而痛岐伯曰寒氣客於脈外則脈寒脈寒則縮蜷縮蜷則脈絀急絀急則外引小絡故卒然而痛得炅則痛立止因重中於寒則痛久矣寒氣客於經脈之中與炅氣相搏則脈滿滿則痛而不可按也寒氣稽留炅氣從上則脈充大而血氣聚故痛甚不可按也寒氣客於腸胃之間膜原之下血不得散小絡急引故痛按之則血氣散故按之痛止寒氣客於俠脊之脈則深按之不能及故按之無益也寒氣客於衝脈衝脈起於關元隨腹直上寒氣客則脈不通脈不通則氣因之故喘動應手矣寒氣客於背俞之脈則血脈泣脈泣則血虛血虛則痛其俞注於心故相引而痛按之則熱氣至熱氣至則痛止矣寒氣客於厥陰之脈厥陰之脈者絡陰器繫於肝寒氣客於脈中則血泣脈急故脅肋與少腹相引痛矣厥氣客於陰股寒氣上及少腹血泣在下相引故腹痛引陰股寒氣客於小腸膜原之間絡血之中血泣不得注於大經血氣稽留不得行故宿昔而成積矣寒氣客於五臟厥逆上泄陰氣竭陽氣未入故卒然痛死不知人氣復反則生矣寒氣客於腸胃厥逆上出故痛而嘔也寒氣客於小腸小腸不得成聚故後泄腹痛矣然寒則腠理閉則氣道不行故氣收斂冷積於中遂為痼冷之疾也直指方云人之處世飲食為上湯藥次之惟其口腹不充嗜欲無節所以臟中停聚而為之沉痼也故有沉寒痼冷之名耶男子遺精女子帶下骨寒腦冷氣乏血衰嘔吐噁心久泄暴下皆其證耳療治之法在乎溫補不可用剛劑惟於滋血養氣之中或佐以薑桂則可古人所謂精不足者補之以味若執剛燥之劑亟欲陽氣頓回猶恐腎水易涸心火獨盛亢則害承乃制也內經曰陰氣有餘多汗身寒陰陽應象云陰盛則身寒汗出身常清數慄而寒寒而厥調經篇云陰盛生內寒岐伯曰厥氣上逆寒氣積於胸中而不可瀉瀉則溫氣去寒獨留故為寒中東垣解云此脾胃不足勞役形體中焦不能營運病傳為寒中宜補陽以附子理中湯為末用蔥白煎羊肉湯取清汁調進數服而愈前人立論至詳凡為醫者深探其意依經用藥則無夭閼之禍也痼冷通治方附子理中丸治脾胃冷弱心腹疼痛嘔吐泄利霍亂轉筋體冷微汗手足厥寒心下逆滿腹中雷鳴嘔噦不止飲食不進一切沉寒痼冷並皆治之附子炮去皮臍人參去蘆乾薑炮白朮甘草炙各三兩上為細末煉蜜為丸每兩作十丸每服一丸用水一盅化開煎至七分空心服三建湯治真氣不足元陽久虛寒邪攻衝肢節煩疼腰背痠困自汗厥冷大便滑泄小便白濁及中風涎潮不省人事傷寒陰證厥逆脈微皆可服之方見諸虛門姜附湯治證同前方見寒門沉附湯治上盛下虛氣不升降陰陽不和胸膈痞滿飲食不進肢節倦痛沉香二錢半煅附子炮去皮臍半兩上作一服水二盅生薑十片煎至一盅食前服耆附湯治氣虛陽弱虛汗不止肢體倦怠黃耆去蘆蜜炙五錢附子炮去皮臍四錢上作一服水二盅生薑十片煎至一盅不拘時服參附湯治真陽不足上氣喘急自汗盜汗氣短眩暈但是陽虛氣弱之證並宜服之人參去蘆五錢附子炮去皮臍三錢上作一服水二盅生薑十片煎至一盅不拘時服茸附湯治精血俱虛榮衛耗損潮熱自汗怔忡驚悸肢體倦乏但是一切虛弱之證並皆治之鹿茸去毛酒炙附子炮去皮臍各四錢上作一服水二盅生薑十片煎至八分食前服桂附湯治虛汗不止及體虛失血大效官桂去粗皮三錢附子炮去皮臍四錢上作一服水二盅生薑五片棗二枚煎至一盅食前服訶子四柱散治元臟氣虛真陽耗散兩耳常鳴臍腹冷痛頭旋目暈四肢倦怠小便滑數泄瀉不止並皆治之方見泄瀉門沉香蓽澄茄散治內挾積冷臍腹弦痛引腰背面色痿黃臟腑自利小便滑數小腸氣痛並皆治之沉香蓽澄茄附子炮去皮臍葫蘆巴炒肉桂去粗皮補骨脂炒川楝子去核巴戟去心茴香炒木香以上各一錢桃仁去皮尖雙仁川烏炮去皮臍各半錢上作一服水二盅入鹽少許煎至八分空心服附子茴香散治氣虛積冷心腹絞痛附子大者一枚炮去皮臍三錢茴香炒肉豆蔻煨乾薑炮人參白朮白茯苓去皮木香以上各一錢丁香甘草炙各半錢上作一服水二盅入鹽少許煎至八分空心服黑錫丹治元臟虛冷真陽不固三焦不和上熱下冷耳內虛鳴腰背疼痛心氣虛乏飲食無味膀胱久冷夜多小便婦人月事愆期血海久冷赤白帶白帶下及陰毒傷寒四肢厥冷不省人事急用棗湯吞一二百粒即便回陽此藥大能調治榮衛升降陰陽補虛損益元陽返陰方見頭痛門十補湯治諸虛百損人參去蘆白朮肉桂去粗皮白茯苓去皮黃耆蜜炙川芎當歸熟地黃白芍藥甘草炙各一錢上作一服水二盅生薑三片紅棗二枚煎至一盅空心服加熟附子溫之八味丸治下元冷憊腰腳痠重虛勞消渴方見諸虛門金鎖正元丹治真氣不足元臟虛弱四肢倦怠百節痠痛頭目眩痛目暗耳鳴面色黃黑鬢須脫落頭皮腫癢精神昏困手足多冷心胸痞悶繞臍切痛膝脛痠疼不能久立或腳弱隱痛步履艱難腰背拘急不得俯仰腹痛氣刺兩脅虛脹水穀不消大便不調嘔逆噁心飲食減少恍惚多忘氣促喘乏夜多異夢心忪盜汗小便滑數遺精白濁一切元臟虛冷並皆治之方見泄瀉門來復丹此藥配類二氣均調陰陽奪天地衝和之氣乃水火既濟之方可冷可熱可緩可急善治榮衛不交滋養心腎氣不升降上實下虛氣閉痰厥心腹冷痛臟腑虛滑不問男女老幼危急之證但有胃氣無不獲安補損扶虛救陰助陽為效殊勝舶上硫黃用透明不夾沙石者硝石各一兩同硫黃併為末入定碟內以微火溫炒用柳篦子不住手攪令陰陽氣相入不可用太過恐傷藥力再碾令極細青皮去白陳皮去白五靈脂須擇五壽山者研細用水澄去沙石曬乾以上各二兩太陰玄精石二兩另碾細上將五靈脂青皮陳皮為細末入玄精石末及硝石硫黃末拌勻以好酒醋煮麵糊和丸如豌豆大每服三十粒空心粥飲吞下甚者五十粒新生嬰兒一粒小兒慢驚風或吐利不止變成虛風搐搦者非風也胃氣欲絕故也用五粒碾碎米飲送下老人伏暑迷悶紫蘇湯下婦人產後血迷上搶悶絕並惡露不止及赤白帶下並用醋湯下常服和陰陽益精神散腰腎陰濕止腹脅冷疼立效諸疾不辨陰陽證者並宜服之灸法腎與膀胱俱虛灸腎俞伯壯穴在對臍兩邊向後夾脊相去各一寸五分兼治便濁失精五臟虛勞痼冷小腹弦急夢遺泄精三陰交穴灸七壯在內踝上大脈並四指是諸虛極灸膏肓俞氣海穴壯數愈多愈妙保元丹治老弱諸沉寒痼冷小便滑數大便時泄腰腿臍腹疼痛困倦瘦虛食減附子炮去皮臍白朮山藥肉豆蔻赤石脂乾薑各一兩肉桂半兩上為細末麵糊為丸如梧桐子大每服一二十丸空心用溫酒送下浴體法治下元虛寒腰腹冷痛崩漏帶下一切冷病椒目川烏細辛乾薑官桂各等分上為粗末水煮澡洗下部為妙洞陽丹治陽虛陰盛手足厥冷暴吐大下脈細羸瘦傷寒陰證並皆治之川烏炮去皮四兩天雄炮去皮三兩附子炮去皮臍鍾乳粉各二兩陽起石火煅硃砂另研各一兩上為細末酒煮神麯糊丸如梧桐子大每服五十丸空心用溫酒或鹽湯送下接真湯治陰病手足厥冷臍腹疼痛真氣不足衰憊欲絕沉香丁香各二錢麝香一錢附子炮去皮臍四錢上銼碎用水二盅生薑七片棗二枚去核煎至七分去滓空心溫服
