body:
  text: 卷之六十八中惡門附論夫病者卒心腹臟滿吐利不行如干霍亂狀世所謂沖惡是也由人精神不全心志多恐遂為邪鬼所擊或復附著沉沉默默寢言譫語誹謗罵詈訐露人事不避讒嫌口中好言未然禍福及至其時毫毛無失人有起心已知其肇登高涉險如履平地或悲泣呻吟不欲見人其狀萬端如醉如狂不可概舉此皆鬼神及諸精魅附著惑人或復觸犯忌諱土地神靈為其所作非有真實但隨方俗考驗治之中惡者是人精神衰弱為鬼邪之氣卒中之也夫人陰陽順理榮衛調平神守則強邪不幹若將攝失宜精神衰弱便中鬼毒之氣其狀卒然心腹刺痛悶亂欲死又凡卒中惡腹大而滿者診其脈緊大而浮者死緊細而微者生又中惡吐血數升脈數細者死浮緩而疾者生中惡者瘥後余勢尚滯發作則變成疰也中惡通治方避穢丹避穢氣細辛半兩甘松一兩川芎二兩麝香少許上為細末水和丸如彈子大久窨好每燒一丸桃皮湯治中惡喘急心腹痛胸膈臟滿短氣桃枝一握東引者白楊皮一握梔子仁十四枚當歸切焙桂心去粗皮各三兩附子炮去皮臍吳茱萸湯炮焙炒香豉各半兩上銼碎每服半兩水一盞去滓入真珠末半錢攪勻溫服一方無白楊皮硃砂丸治中惡客忤垂死硃砂水飛細研附子炮去皮臍雄黃水飛研各一兩麝香一分研巴豆二十枚去皮心研紙裹捶去油上細研勻煉蜜和搗三五百杵丸如麻子大每服三丸不拘時粥飲下如不利更加三丸至五七丸以利為度朱犀散治中惡中忤鬼氣其證暮夜或登廁或出郊野或遊空屋或人所不至之地猛然眼見鬼物鼻口吸著惡氣突然倒地四肢厥冷兩手握拳鼻口出清血性命逡巡須臾不救此證與屍厥同但腹不鳴心脅俱暖切勿移動即令人圍繞打鼓澆火或燒麝香安息香蒼朮樟木之類候醒方可移歸大硃砂麝香生研各一分犀角半兩鎊屑研末上為細末研勻每服二錢用井花水調灌服如無前件藥只用單方治卒中惡方上用蔥心黃刺鼻孔中血出愈肘後方云入七八寸無苦使目中血出佳崔氏云男左女右治卒中惡方上令仰臥以物塞兩耳以兩竹筒內病人鼻中使兩人痛吹之塞口旁無令得氣出半曰病人則噫噫則勿復吹治卒中惡氣絕上以硃砂書舌作鬼字額上亦書之大良治中惡與卒死鬼擊亦相類上搗菖蒲生根絞汁灌之立瘥屍厥之病卒死脈尤動聽其耳中如微語聲股間暖是也以此方治之殺鬼五邪丸治邪氣鬼魅所持妄言狂走恍惚不識人丹砂研雄黃龍骨鬼臼去毛炙赤小豆各一兩半桃仁湯浸去皮尖雙仁炒細五十粒鬼箭羽去莖二兩半芫青三十枚炒去翅足上為細末研勻熔蠟和丸如彈子大囊盛之男左女右繫於臂上小兒繫於頭上合藥時勿令婦人雞犬見或煉蜜和丸如梧桐子大每服一丸米飲下亦可日三服一方有犀角屑闢諸邪祟附著及小兒驚畏恐悸上用安息香一皂子大澆令煙服邪自去治人臥忽不寤切勿以火照照之殺人但痛齧其踵及足拇指甲際多唾其面即活仍以菖蒲末吹兩鼻中及桂末吹舌下鎮心丸治心氣怯弱常多魘夢恍惚謬忘丹砂研防風去蘆官桂去粗皮細辛去苗葉當歸切焙鐵精防己各一兩白茯苓去皮茯神去木雄黃研桔梗去蘆石菖蒲遠志去心乾薑炮銀屑紫石英研人參甘草炙各一兩上為細末煉蜜和丸如梧桐子大每服十丸食後用白湯送下日三增之茯神散治虛羸心氣乏弱多魘茯神黃耆乾薑炮白芍藥人參桂心甘草炙各一兩遠志三兩去心上銼碎每服半兩水一大盞煎五分去滓不拘時溫服八毒赤丸治男子婦人染著神鬼謂之鬼疰病服之甚效雄黃研礬石一方礜石硃砂研牡丹皮附子炮黎蘆巴豆各一兩蜈蚣一條上為細末煉蜜和丸如小豆大每服五七丸至十丸冷水送下無時昔有副使許可道到雄州請醫看脈乍大乍小乍短乍長氣血不勻邪氣傷正本官說去路到邯鄲驛中夜夢一婦人著青衣不見面用手於脅下打了一拳脅一點痛往來不止寒熱不食乃鬼擊也可服八毒赤丸本官常讀名醫錄中看李子愈八毒赤丸為殺鬼杖乎遂與藥三粒臨臥服明旦下清水二斗立效合時宜齋戒誠心破棺散一名復生散治魘卒死及為焰壁竹木所壓水溺金瘡卒致悶絕產婦惡血衝心諸暴絕證兼治自縊死一切橫死心頭溫者並治之上用半夏不以多少湯洗去滑研為細末每用大豆許吹入鼻中即活但心頭溫者可治治卒鬼擊如中箭忽然一點痛如注不可忽上以桃皮一片將裡面濕處貼痛上取一匙頭安桃皮上緊搓艾一團如胡桃大安匙頭上灸之須臾痛徹治夢中被刺殺或杖打諸般不祥卒然吐血衄血下血甚者九竅皆有病名鬼擊升麻獨活續斷地黃各半兩官桂去粗皮一兩上為細末每服二錢食前白湯調下日三服治自縊死方凡自縊死從早至晚雖已冷必可活從夜至早稍難若心下溫一日以上猶可救款抱其身緩緩解繩切不可截斷繩放臥令人踏其肩以手拔其發常令一人緊以手擦胸脅散動之一人摩搦臂足屈伸之若已僵但漸漸強屈之及按其腹如此一飯時即氣口中出得呼吸眼開勿苦勞動可用官桂湯少與飲及粥清令潤喉更以兩人以筆管吹其耳中依此法救無不活者又緊用手掩其口勿令透氣兩時氣急即活治自縊死方凡救自縊死者急須按定其心勿截繩手抱起徐徐解之心下尚暖以氈覆口鼻兩人吹其兩耳一方以衣物塞耳將竹筒口中重吹氣入仍塞口邊莫令氣出則可活矣治自縊死及中惡氣欲絕者上用皂角細辛搗為細末吹兩鼻中治自縊死方上刺雞冠血出滴著口中即治男用雌女用雄者塗喉下治自縊死方上用雞屎白如棗大酒半盞和灌口鼻中佳治自縊死方上有梁上塵如大豆許以小竹筒時吹兩耳兩鼻即活治自縊死方上用屎灌鼻口眼耳中並捉頭髮一撮如鼻管大掣之立活治自縊死方上以藍青汁灌之立活治自縊死方上以松子油內口中令得入咽中便活及治溺死治自縊死救之未活以車載之法上以絹緊絞身體令堅以車牛載行三十里許使人於車上行踏肩引發如前治溺死已縊半日上取大甕覆地以溺死人腹伏甕上以微火於甕下燃之正對死人心下須臾死人心下甕暖口中水出盡蘇勿令過熱治溺水蔥汁導水法上取不蛀皂角為細末以蔥白汁或棗穰和丸如棗核大內下部中其水自出效治溺水死以酒灌法上法倒垂死人以好酒灌鼻中及灌鼻部或醋灌鼻中亦得治忽溺水死者上倒臥瀝卻水便於肚上多者灰掩之仍以皂角末吹兩鼻中即活治溺水石灰壅之得活上以石灰壅之捏下部中水出盡即活一言以綿里石灰納下部中救溺水法凡人溺水者救上岸即將牛一頭卻令溺水之人將肚橫覆在牛背上兩邊用人扶策徐徐牽牛而行以出腹內之水如醒即以蘇合香丸之類或老薑擦牙若無牛以活人於長板凳上仰臥卻令溺水人如前法將肚抵活人身上水出即活仍灸臍中百壯治溺水心頭尚溫上先用人抱定令頭微仰用口於鼻中吸出黃水卻先用綿絮溫其下體及食囊處即活如無綿絮可用灰數十籮通體埋蓋只留面在外令頭仰亦可活凡溺水一宿尚可救上先屈死人兩腳著生人肩上以死人背貼生人背擔起吐出水即活亦治凍死又方先解死人火灸臍中即活又方上以酒罈一個以紙錢一把燒放壇中急以壇口覆溺水人臍上冷則再燒紙錢放於壇內覆臍去水即活治凍死凡冬月落水凍四肢直口噤尚有微氣者方或因風雨霜雪冷氣入臟陽氣暴絕上以大器中多焚灰使暖囊盛以摶其心冷則更易心暖氣通目則得轉口亦乃開可以溫酒服粥清稍稍咽之即活若不先溫其心便將心炙其身冷氣與火相搏即不活治凍死人已救活宜服此藥一二服生薑去皮銼研陳皮不去白銼碎各十兩上用水二盞煎至一盞半放溫與服不可熱不可冷治凍死方上用氈或藁藨裹之以索系定放在平穩處令兩人對面輕輕滾轉往來如趕氈法四肢溫和即活仍灸臍中三五壯凡冬月凍倒人急與冷水一兩口扶在溫暖處不得與熱湯如便與熱物向火必死雪泥中行便近火即腳指隨落療入井塚悶冒凡五六月井中及深塚中皆有伏氣入則令大鬱悶殺人如欲入必須先以雞鴨雜鳥毛投之宜下至底則無伏氣毛若徘徊不下則有毒氣也亦可內生六畜等置中若有毒其物即死若或不得已而入當先以酒或苦酒數升先灑井塚中四邊畔停少時然後可入若覺有些氣鬱悶奄奄欲死者還取其中水漉人面令飲之又以灌其頭及身體即活若無水取他水用之夏月不可淘井多致殺人宜先以雞毛放井中試之如搖動不肯便下是有毒氣不可入古塚亦然九月七日尤甚如已中毒以水漉其面並含水調雄黃末一二錢轉筋入腹痛欲死者使四人捉手足灸臍左邊二寸十四壯又生薑一兩擘破酒五盞煮濃頓服又醋煮衣絮令撤溫里轉筋處又濃煮鹽湯通手浸手足洗胸腹間即蘇治遍身忽皮底混混如波浪聲癢不可忍抓之血出亦不能解謂之氣奔人參苦杖青鹽白朮細辛各一兩上銼碎作一服水二碗煎十沸去滓飲盡愈治手十指節斷壞唯有筋連無節肉間蟲出如燈心長尺余遍身綠毛卷名曰血餘茯苓四錢胡黃連一錢上銼碎水一盞半煎至七分不拘時服治眼赤鼻張大喘渾身出斑毛髮直起乃熱毒氣結於下焦白礬滑石研各一兩上作一服水三碗煎至半碗令不住飲候盡乃安治手足甲忽然長倒生肉刺如錐痛不可忍上食葵菜自愈治眼睛垂出至鼻如黑角色痛不可忍或時時大便血出其名曰肝臟上用羌活煎汁服數盞愈治腹中有物作聲隨人言語上用板藍汁一盞分五服服又名應聲蟲當服雷丸自愈治人自覺自形作兩人起臥不別真假不語問亦對是離魂上用辰砂人參茯苓濃煎湯服之真者氣爽假者化矣治頭面發熱有鬼色他人手近之如火燒人上用蒜汁半兩酒調下吐出蛇狀遂安治鼻中毛出晝夜可長一二尺漸漸經圍如繩痛不可忍雖忍痛摘去一莖即復更生此由食豬羊血過多遂生鐘乳石硇砂各一兩上為細末飯和丸如梧桐子大每服十丸空心臨臥各一服水送下自然退落一方有乳香不用乳石治脅破腸出臭穢急以油摸腸用手送入煎人參枸杞湯淋之皮自合矣吃羊腎粥一十日即愈治忽然氣上喘不能言語口中汁流吐逆齒皆搖動氣出轉大則悶絕蘇復如是名曰傷寒並熱霍亂大黃人參銼碎各五兩上用水三盞煎至一盞去滓熱服治渾身生燎泡如甘棠梨每個破出水內有石一片如指甲大泡破復生抽盡肌膚肉則不可治京三稜蓬莪朮各半兩上為細末每服二錢食前溫酒調服治大腸頭出寸余治之上用芝麻清油器盛之以臀坐之飲火麻子汁服數升愈治鼻中腥臭水流以碗盛之有鐵色鰍魚如梗米大走躍不住以手捉之即化為水此肉壞矣上任意饌食雞肉月餘愈治兩足心凸如腫上面生黑色豆瘡硬似釘子釘了履地不得脛骨生碎眼髓流出身發寒顫唯思飲酒此是肝腎氣冷熱相吞上炮川烏末敷之煎韭子湯服之愈治四肢節腕但有皮連不即舉動名曰筋解黃蘆三兩酒浸一宿取出焙乾上為細末每服二錢用酒調下服盡即安治腹脹如鐵石臍中水出旋變作蟲行之狀繞身匝啄癢痛難忍撥掃不即盡上濃煎蒼朮湯浴之及以蒼朮末入麝香少許研勻以水調服痊治眼白瞳仁渾黑見物依舊毛髮直如鐵線雖能飲食不語如醉名曰血潰上用五靈脂為細末每服二錢食前用溫酒調服治遍身忽然肉出如錐既癢且痛不即飲食此名血注若不速治潰而膿出上以赤皮蔥數莖燒灰淋洗吃豉湯三盞自安治眉毛搖動目不能視交睫喚之不應但能飲食有經日不效上用蒜三兩搗取汁酒調下即愈治毛竅節次血出若血不出皮脹膨如鼓須臾眼鼻口被氣脹合矣此名脈滋夏子益治奇病方二十八道唐與義刊印於上饒其間一二證昔常見有病之者皆莫知所以治療之法今得子益之方敢以附此書之末用廣其傳上用生薑汁水合半盞服之而安治血自皮膚濺出上以煮酒瓶上紙碎揉如楊花以手捏在出血處立止治怪疾奇方昔廬陵朋田李教諭梅心傳袁州分宜縣有一男子自十歲喜飲酒至十九歲日間飲一二斗不醉片時無酒叫呼不絕全不進食日就羸斃其父驚惶叩神忽遇一道人令其父用手巾縛住其手足不令動搖但扶住少立卻取生辣酒一罐就於其子口邊打開其酒氣衝入口中病人必欲取飲而道人堅不肯與之須臾口中吐出物一塊直下壇底道人卻用紙封塞壇口用猛火燒滾約酒幹一半卻開視之其一塊如豬肝樣三兩重周迴有小孔如針眼不可數計棄之江中自後飲食復舊雖滴酒不即飲矣治居民逃避石窟中賊以煙火熏之昔李師者被煙燻欲死迷悶中摸索得一束蘆服俗名蘿蔔嚼汁下咽而蘇或臨臥含蘿蔔一塊或預曝為末新水調灌或以新水擂爛飲之皆可治因攧穿斷舌心血出不止諸藥不即救者上以米醋用雞翎掃所斷舌處其血即止仍用真蒲黃杏仁湯泡去皮尖硼砂少許研為細末以煉熟蜜調藥稀稠得所含化而安治人身上及頭面肉上浮腫如蛇狀者上為雨滴磚街上苔痕一錢水塗患處立消昔江左常有商人左膊上有瘡如人面亦無他苦商人歲滴酒口中其面亦赤色以物食之亦即食食多則覺膊內肉脹起或不食之則一臂痹有善醫者教其歷試諸藥不效以草木之類悉試之無苦至貝母其瘡乃聚眉閉口商人喜曰此藥可治也因以小葦筒毀其口灌之數日成痂遂愈然不知何疾也昔華陀行道見車載一人病咽塞食不下呻吟陀入餅店家取蒜齏並大酢三升飲之當痊果吐大蛇一枚而愈治有蟲如蟹走於皮下作聲如小兒啼為筋肉之化上用雷丸雄黃各一兩為細末用豬肉一片摻藥在上炙熟吃盡其病自安治腹上麻痹不仁上多煮蔥白吃之自愈凡腹脹經久忽瀉數升晝夜不止服藥不效乃為氣脫上用益智子煎湯服立愈治眼前常見禽蟲飛走以手捉之則無乃肝膽經為疾羌活玄明粉酸棗仁青葙子花各一兩上為細末服二錢水一大盞煎至七分和滓飲之一日服三次治面上及遍身生瘡似貓兒眼有光彩無膿血但痛癢不常飲食減少久則透脛名曰寒瘡上多吃雞魚蔥韭自愈治口內生肉球臭惡自己惡見有根線長五寸余如釵股吐球出以飲食了卻吞其線以手輕捏痛徹於心困不可言上用麝香一錢研細食後水調服三日驗治婦人產後忽兩乳伸長細小如腸垂下直下小肚痛不可忍危亡須臾名曰乳懸上將川芎當歸各二斤半銼碎於瓦石器內用水濃煎不拘時候多少溫服餘一斤半銼作大塊用香爐慢火逐旋燒煙安在病人面前桌子下要煙氣直上不絕令病人低頭伏桌子上將口鼻及病乳常吸菸氣直候用此一料藥盡看病證如何或未痊安略縮減再用一料如前法煎服及燒煙燻吸必安如此用二料已盡雖兩乳縮上而不復舊用冷水磨蓖麻子一粒於頭頂心上塗片時即洗去則痊安矣治婦人臨產服催生藥驚動太早未嘗離經而用力太過以致育膜有傷產後水道中垂出肉線一條約三四尺長牽引心腹痛不可忍以手微動之則痛苦欲絕上先服失笑散數服仍用生薑三片淨洗不去皮於石缽內研爛以清油二斤拌勻入鍋內炒熟以油乾焦為度先用熟絹一段約五尺長折作結方令穩重婦人輕輕盛起使之屈曲一團納在水道中卻用絹袋兜裹油姜少溫敷在肉線上熏覺姜漸冷又用熨斗火熨熱使之常有姜氣已過除去又用新者如此熏熨一日一夜其肉線已縮太半再用前法越兩日其肉線盡入腹中其病痊安卻再服失笑散芎歸湯補之切不可使肉線斷則不可治
