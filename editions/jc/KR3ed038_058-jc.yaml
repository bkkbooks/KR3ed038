body:
  text: 卷之五十八耳鳴耳聾門附論河間云耳者蓋非一也以竅言之是水也以經言之手足少陽俱會其中也有從內不能聽者主也有從外不能入者經見有若蟬鳴者有若鐘聲者有若火熇熇然者各隨經也之其間虛實不可不察也夫耳鳴有聲非妄聞也耳為腎竅交會手太陽少陽足厥陰少陰少陽之經若水虛火實而熱氣上甚客其經絡衝於耳中則鼓其聽戶隨其脈氣微甚而作諸音聲也經言陽氣上甚而躍故耳鳴也夫耳聾者由水衰火實熱鬱於上而使聽戶玄府壅塞神氣不得通泄也其所驗者論曰屬足少陰腎經寄竅於耳而通之所主者精精氣調和腎氣充足則耳目聰矣且耳聾所感不一有勞傷氣血風邪乘熱使精脫腎憊而聾者有挾風而聾者有勞損而聾者蓋十二經脈上絡於耳其諸經適有交併則臟氣逆而為厥厥氣搏入於耳為厥聾耳為厥聾耳者宗脈之所附脈虛而風邪乘之風入於耳使經氣否而不寬為風聾勞役傷於血氣淫欲耗其精元瘦悴力疲昏昏憒憒為勞聾或人善調養氣血和平不妄作勞其證漸愈或不能謹迎勞傷精氣神風邪停滯則為久聾之證又有耳觸風邪熱邪相持其聲嘈嘈眼或見光為虛鳴有熱氣乘熱隨脈入耳聚熱不散膿汁出焉為膿耳俗醫多用剽悍燥烈之藥制之往往謂腎水虛冷故也夫心火本熱虛則寒矣腎水本寒衰則熱矣腎水既少豈能反為病耶故一法用酒浸針砂一日至晚去針砂將酒含口中用好瓷石一塊綿裹塞耳在左塞左在右塞右欲導其氣而通泄也或問曰聾既為熱或服乾蠍生薑附子醇酒之類性熱之物而或愈者何也答曰欲以開發玄府而令耳中鬱滯通泄也凡治聾者適其所宜若熱證已退而聾不已者當以辛熱之劑發散疾止即已不可久服恐熱極而成他病爾若聾有熱證相兼者宜以退風散熱調之熱退結散而愈然聾甚悶絕亦為難已慎不可攻之過極反傷正氣若非其病不可服其藥飲食同法當所宜者過度則反傷正氣病已即止藥欲求不病無損而已矣又言老人之氣也多病頭目昏眩耳鳴或聾上氣等證此皆陽實陰虛之證也俗言老弱為虛冷而無熱也縱有熱證或云少水不勝多火而反言腎水虛則為寒此乃舉世受誤之由也可不鑑哉耳鳴耳聾通治方犀角飲子治風熱上壅耳內聾閉臖腫掣痛膿血流出犀角鎊木通石菖蒲甘菊花去枝根玄參赤芍藥赤小豆炒各二錢甘草炙一錢上作一服水二盅生薑五片煎至一盅不拘時服芷芎散治風入耳虛鳴白芷蒼朮陳皮石菖蒲炒細辛厚朴制半夏制紫蘇莖葉辣桂木通甘草炙各一錢川芎二錢上作一服水二盅生薑五片蔥白二根煎一盅食後服排風湯治風虛耳聾方見風門芍藥散治氣虛生風耳內痛與頭相連膿血流出赤芍藥白芍藥川芎木鱉子當歸大黃甘草各一錢半上作一服水二盅煎至一盅食後服益氣聰明湯治飲食不節勞役形體脾胃不足得受內障耳聾之患服此令人精神過倍元氣自益身輕體健耳目聰明矣黃柏酒製炒芍藥各半錢蔓荊子一錢升麻葛根各一錢半人參黃耆甘草各二錢半上作一服水二盅煎至一盅臨臥服治厥耳聾上用和劑流氣飲加石菖蒲生薑三片蔥白三根同煎食後溫服桂星散治風虛耳聾辣桂川芎當歸石菖蒲細辛木通木香白蒺藜炒去刺麻黃去節甘草炙各一錢白芷梢天南星煨裂各一錢半上作一服水二盅蔥白二根紫蘇五葉生薑五片煎至一盅食後服一方加全蠍去毒一錢益腎散治腎虛耳聾磁石火煅醋淬七次研細水飛巴戟川椒開口者各一兩石菖蒲沉香各半兩上為細末每服二錢用豬腎一隻細切和以蔥白少鹽並藥濕紙十重裹煨令香熟空心細嚼溫酒送下蔓荊散治內熱耳出膿汁蔓荊子赤芍藥生地黃桑白皮炒甘菊花赤茯苓川升麻麥門冬去心木通前胡甘草炙各一錢上作一服水二盅生薑三片紅棗二枚煎至一盅食後服通神散治耳聾全蠍一枚地龍二條土狗二枚明礬半生半煅雄黃各半兩麝香一字上為細末每用少許蔥白蘸藥引入耳中閉氣面壁坐一時三日一次補腎丸治腎虛耳聾巴戟去心乾薑炮芍藥山茱萸桂心遠志去心細辛菟絲子酒浸澤瀉石斛黃耆乾地黃當歸蛇床子牡丹皮肉蓯蓉酒浸人參附子炮甘草以上各二兩石菖蒲一兩茯苓去皮半兩防風一兩半羊腎二枚上為細末以羊腎研爛細酒煮麵糊丸如梧桐子大每服五十丸空心鹽酒送下蓯蓉丸治腎虛耳聾或風邪入於經絡耳內虛鳴肉蓯蓉酒浸切焙石龍芮石菖蒲山茱萸去核菟絲子酒浸蒸焙川羌活去蘆鹿茸酒炙磁石火煅醋淬七次水飛附子炮去皮臍石斛去根各一兩全蠍去毒七個麝香一字另研旋入上為細末煉蜜為丸如梧桐子大每服五十丸空心用鹽酒或鹽湯送下通耳法治耳聾久不聞者磁石用緊者如豆大一塊穿山甲燒存性為末一字上二味用新綿子裹了塞所患耳內口中銜少生鐵覺耳內如風雨聲即愈紅綿散治聤耳出膿及黃水白礬黏一錢胭脂一字麝香少許上為細末先用綿杖子纏去耳中膿水盡另用綿杖子送藥入耳中令到底摻之一方加黃丹龍骨磁石丸治風虛耳聾無聞磁石火煅醋淬七次防風去蘆羌活去蘆黃耆去蘆鹽水浸焙木通去皮白芍藥桂心不見火各一兩人參去蘆半兩上為細末用羊腎一對切去脂膜搗爛打酒糊為丸如梧桐子大每服五十丸空心溫酒鹽湯任下肉蓯蓉丸治腎虛耳聾肉蓯蓉酒浸焙菟絲子酒浸另研山芋白茯苓去皮人參官桂去粗皮防風去叉熟地黃芍藥黃耆各半兩附子炮去皮臍羌活去蘆澤瀉各一分羊腎一對薄切去筋膜炙乾上為細末煉蜜和丸如梧桐子大每服三十丸空心用溫酒送下桑螵蛸湯治虛損耳聾桑螵蛸十枚炙當歸白朮米泔浸炒白茯苓去皮官桂去粗皮附子炮牡荊子磁石火煅醋淬菖蒲米泔浸焙乾地黃焙各一兩大黃銼炒細辛去苗川芎牡丹皮各半兩上㕮咀每服三錢匕先以水三盞煮豬腎一隻取汁一盞去腎入藥煎至七分去滓食前溫服地風散治耳聾閉塞不通藜蘆雄黃川芎石菖蒲全蠍白芷藿香鵝不食草薄荷苦丁香各等分麝香少許上為細末每用些少吹鼻中如無鵝不食草加片腦少許清神散治氣壅頭目不清耳常重聽甘菊花白殭蠶炒各半兩羌活荊芥穗木通川芎防風各四兩木香一錢石菖蒲甘草各一錢半上為細末每服二錢食後茶清調服磁石羊腎丸治風虛不爽時有重聽或有風痹之狀磁石二兩火煅醋淬七次用蔥子一合木通三兩用水同煎一晝夜去蔥子木通川椒去目石棗去核防風遠志肉白朮茯苓細辛菟絲子酒浸川芎山藥木香鹿茸酒浸一宿炙當歸黃耆川烏炮各一兩石菖蒲一兩半肉桂六錢半熟地黃九蒸二兩上為細末用羊腎兩對去膜以酒煮爛和諸藥末搗以煮腎酒打糊和丸如梧桐子大每服百十丸空心溫酒鹽湯任下仍服清神散二藥相間服忌牛肉雞鴨子蓖麻丸治耳聾蓖麻子去殼松脂黃蠟杏仁去皮雙仁炒各半兩乳香食鹽巴豆去皮炒各一分上搗爛如膏捻如棗核樣如小拇指大以黃蠟薄卷之大針扎兩三眼子兩頭透用塞耳經宿當聞鐘聲黃水出愈雄黃散治耳聾雄黃防風礬石石菖蒲烏頭去皮臍川椒去目併合口者炒出汗各一分大棗核十枚上為末以香爐中安艾一彈子大次著黃柏末半錢匕於艾上復以藥二錢匕著艾上火燃向耳熏之菖蒲丸治腎虛耳聾重聽過於思慮則其病尤甚此藥主之石菖蒲蜀椒去目併合口者炒出汗各三分蔥子炒半兩皂莢一挺去皮子炙羊腎一對以酒一升煮乾取出切作片曝乾上為細末煉蜜和丸如梧桐子大每服三十丸空心溫酒送下日三服凡欲服此藥臨睡時先安鐵物於所患耳邊口中以牙齒咬定卻以瓷石一小塊安耳內覺氣微通略能聽聲然後服藥透耳筒治耳聾乃因腎虛耳中如風水聲或如鐘鼓聲椒目巴豆菖蒲松脂各一錢上為末攤令薄卷作筒子塞耳內一日一易一方同川椒以蠟為丸如棗核大塞耳中一方無松脂治耳聾方一豆三貓不出油麝香少許用真修煉蜜為丸麥粒大綿裹錠子耳中投燒腎散治耳聾磁石火煨醋淬七次細研水飛附子炮去皮臍巴戟去心川椒去目併合口者炒出汗各一兩上為細末每服用豬腎一隻去筋膜細切蔥白薤白各一分切入藥一錢鹽花一字和攪令勻以十重濕紙裹於糖灰火內煨熟空心細嚼用酒解薄粥送下十日大效桂心膏治耳聾桂心十八銖野葛六銖成煎雞肪五兩上㕮咀於銅器中微火煎三沸去滓密貯勿泄以葦筒盛如棗核大火炙令少熱欹臥側耳灌之如此十日盯聹自出大如指長一寸久聾不過三十日以發裹膏深塞莫使泄氣五日乃出之千金翼云治二十年耳聾鯽魚膽膏治耳聾鯽魚膽一枚烏驢脂少許生油半兩上和勻納樓蔥管中七日滴於耳內瘥蠍梢膏治遠年近日耳聾蠍梢七枚焙淡豉二十一枚揀大者焙乾巴豆七粒去心膜不去油上先研蠍梢淡豉令細別研巴豆成膏同研勻捏如小棗核狀用蔥白小頭取孔以藥一粒在內用薄綿裹定臨臥時置在耳中來早取出未通再用以通為度鼠膽丸治遠年近日耳聾不聞人聲曾青一錢龍腦地錢凌霄花三錢上為細末每用一字吹入耳內後用鼠膽滴入耳內隨即用綿子塞內從晚塞到晨雞報曉取綿子耳鳴大驗菖蒲散治耳聾石菖蒲十兩一寸九節者蒼朮五兩生用上銼成塊子置於瓶內以米泔浸七日取出去蒼朮只將菖蒲於甑上蒸三兩時取出焙乾搗為細末每服二錢糯米飲調服日進三服或將蒸熟者作指頂大塊子食後置口中時時嚼動咽津亦可雞卵方治耳聾新雞卵一枚巴豆一粒去心膜上先以雞卵上開一竅將巴豆納雞卵中以紙兩重面黏貼蓋卻與雞抱以其餘卵雞子出為度取汁滴於耳內日二次五七日瘥治耳聾灸方上用蒼朮一塊長七分將一頭削尖一頭截平將尖頭插耳內平頭上按箸頭大艾炷灸之輕者灸七壯重者灸十四壯覺耳內有熱氣者效又方上有竹筒盛鯉魚腦炊飯處蒸之令烊注耳中一方生用鯉魚腦綿裹包入耳中一方用鯉魚膽滴耳中並瘥姜蠍散治耳聾氣塞腎虛等證上用全蠍四十九個去姜泡濕以糯米半升於大瓦鋪平將蠍鋪於米上焙令米黃為度去米不用又切生薑四十九片每片放蠍再焙姜焦為度去姜不用將蠍研為細末三五日前每日先服黑錫丹三五服臨服藥時令夜飯半飽服時看其人酒量勿令大醉酒調畢令其入睡切勿令人叫醒令熟臥卻令人輕喚如不聽得濃煎蔥白湯一碗令飲耳即鳴五更耳中聞百十攢笙響便自此聞聲一方無糯米制銀石器炒治耳聾方上用蠟紙一張剪作四片每一片於箸上緊卷抽卻箸以蠟紙卷子安耳中燃之待火欲至耳急除去當有惡物出在殘紙上日一角用了以蠟塞定治耳聾法上用甘遂半寸綿裹插兩耳中卻將甘草口中嚼自然聽驢脂方治積年耳聾上用驢生脂和生薑熟搗綿裹塞耳數次能聽一方有川椒無生薑有人耳癢一日一作可畏每挑剔出血稍愈此乃腎臟虛致浮毒上攻未易以常法治也宜服透水丹勿飲酒啖濕面蔬菜雞豬之屬能盡一月為佳不能戒無效治大病後耳聾方上用生菖蒲裂汁滴耳中即效醋附方治耳聾塞耳疼痛上用附子以醇醋煮一宿削如棗核以綿裹塞耳中一方治風聾仍灸上星二七壯令氣通耳中即瘥龜尿方治耳聾滴耳上用龜一枚安於閤中荷葉上養之專看葉上有尿收取滴耳中一方用秦龜雄者以磁碗中或盤內置之以鏡照龜既有鑑中影往往淫發而失溺急以物收取用之又一法以紙炷火上熁熱以點其尻亦能失尿乾地龍方治耳聾立效上以乾地龍入鹽貯在蔥尾內為水點之一方為末用綿裹如棗核大塞耳中三五日即瘥一方用白頸者安蔥葉中面封頭蒸熟化為水以滴耳中通氣散治耳聾氣閉不通茴香木香全蠍玄胡索陳皮菖蒲各一錢羌活殭蠶川芎蟬蛻各半錢穿山甲各二錢甘草一錢半上為細末每服三錢不拘時溫酒調服白龍散耳者宗脈之所聚腎氣之所通小兒腎臟盛而有熱熱氣上衝於耳津液結滯則生膿汁有因沐浴水入耳內水濕停積搏於血氣蘊積成熱亦令耳膿汁出謂之聤耳久而不瘥則變成聾白礬枯黃丹龍骨各半兩麝香一錢上研極細以先綿杖子展盡耳中膿水用藥一字分摻兩耳內日二次勿令風入磁石浸酒方治風邪之氣干於腦或入於耳久而不散經絡痞塞不能宣利使人耳中悾悾然或作旋運磁石五兩搗碎水淘去赤汁山茱萸天雄炮去皮臍各二兩木通防風薯蕷菖蒲遠志去心川芎細辛蔓荊子白茯苓乾薑炮肉桂甘菊花各一兩熟地黃三兩上細銼和勻以生絹袋盛以酒二斗浸七日後每日任性飲之以瘥為度魚腦膏治風聾年久及耳鳴生鯉魚腦二兩當歸切焙細辛去莖葉附子炮去皮臍白芷菖蒲各半兩上除魚腦外搗為細末以魚腦置銀器中入藥在內微火上煎候香濾去滓傾入瓷盒中候凝丸如棗核大綿裹塞耳中一方無菖蒲有羊腎脂同魚腦先熬次下諸藥羊腎羹方治風虛耳聾杜仲去粗皮炙黃黃耆銼各半兩磁石五兩搗碎水淘去赤汁綿裹懸煎不得到鐺底羊腎一隻去脂膜切肉蓯蓉一兩酒浸一宿去皮炙乾上以水三大碗先煮磁石取汁二大碗下杜仲等又煎一盞半去滓入羊腎梗米一合蔥白姜椒鹽醋一如作羹法空心服白鹽方治卒得風疾覺耳恍恍卒痛者上用鹽五升甑上蒸熱以耳枕之冷即換亦治耳疼一方用軟布裹熨患耳或青布裹鹽亦可肉蓯蓉丸治勞聾腎虛損腰腳無力而黑體瘦小便滑數肉蓯蓉酒浸一宿去皮炙石菖蒲附子炮去皮臍磁石燒令赤醋淬七次搗碎研水飛過巴戟去心鹿茸去皮塗酥炙微黃菟絲子水淘淨酒浸三日曝乾為末石斛去根杜仲去粗皮炒黃牡蠣煅補骨脂炒各一兩桑螵蛸微炒半兩熟地黃桂心各一兩半上為細末煉蜜和搗五七百杵丸如梧桐子大每服三五十丸空心溫科送下晚再服羊腎附子丸治勞聾附子炮去皮臍肉蓯蓉酒浸去皮遠志去心菟絲子酒浸別搗為末牛膝去苗磁石燒令赤醋淬七次搗碎研水飛各一兩上為細末用羊腎五對去脂膜細切爛研入酒三升於銀鍋中微火煎如膏然後入藥末和搗三五百杵丸如梧桐子大每服五七十丸空心溫酒送下鹽湯亦可通耳丸治卒聾及腎虛耳內作風水聲鐘聲穿山甲用大片以蛤粉炒赤色去粉蠍梢七個麝香少許上為細末以蠟入麻油一滴為丸綿裹塞耳內治暴耳聾上用雞心檳榔一個以刀子從臍剜取一竅如錢眼大實以麝香坐於所患耳內從上以艾炷灸之不過二三次效犀角散治風毒壅熱心胸痰滯兩耳虛聾頭重目眩犀角屑前胡去蘆甘菊花石菖蒲枳殼生地黃澤瀉木通羌活各半兩麥門冬去心一兩甘草炙一分上㕮咀每服三錢水一中盞煎至五分去滓食後溫服茯神散治上焦風熱耳忽聾鳴四肢滿急昏悶不利茯神去木一兩羌活防風去叉蔓荊子黃耆銼石菖蒲薏苡仁五味子各半兩麥門冬去心一兩甘草一分炙上㕮咀每服三錢水一中盞入生薑半分煎至五分去滓食後溫服羚羊角散治耳聾不聞言語利腎氣退熱羚羊角屑一兩沙參澤瀉前胡各三分防風木通各二分旋覆花石菖蒲各半兩牽牛一兩半炒上㕮咀每服三錢水一中盞生薑半分煎至五分去滓食後溫服磁石散治暴熱耳聾心膈壅悶磁石搗碎水淘木通桑白皮生地黃防風各一兩枳殼三分麩炒上㕮咀每服五錢水一大盞煎至五分去滓空心溫服蓖麻子丸治久聾方蓖麻子二十一個去油用皂角煨取肉半錠生地龍中者一條全蠍二個焙遠志去心磁石火煅醋淬七次研細水飛乳香各二錢上為細末以黃蠟熔和為丸塞耳中天雄雞子方治耳聾三十年不聞者天雄一分附子一枚雞子一枚上為細末將雞子開一孔取去黃用清和藥卻內雞子封合其頭還令雞抱之待諸雛出其藥乃成取出以綿裹塞耳內取瘥為度通氣散治久聾諸藥不效穿山甲炮螻蛄各半兩麝香一錢上為細末以蔥涎和劑塞耳中或為細末以少許蔥管盛藥放耳中水銀方治久聾滴耳水銀一分蚯蚓中者一條上就樓蔥叢內以一莖去尖頭入水銀蚯蚓在內即系卻頭勿令傾出候蚯蚓化為水取滴耳中愈大蒜方治耳聾久不效者上用大蒜一瓣一頭剜一坑子以巴豆一粒去皮慢火炮令極熱入在蒜內以新綿裹定塞耳中不過三四次效勝金透關散治多年耳聾不可治者用此十日見效除病根川烏頭一個炮去皮臍一方草烏用尖細辛各二錢膽礬半錢活鼠一個熱湯內浸死砍喉開取膽真紅色是上為細末用鼠膽調和勻再焙令乾研細卻入麝香半字用鵝毛管吹入耳中吹時口含茶清待少時龍齒散治腎虛熱毒乘虛攻耳致耳內常鳴如蟬聲不可專服補藥宜用此方龍齒人參白茯苓去皮麥門冬去心焙遠志去心各半兩丹砂研鐵粉研龍腦研牛黃研麝香研各一分上為細末研勻每服半錢匕食後用沸湯調服日三服病愈即已地黃湯治男二十歲因瘡毒後腎經熱右耳聽事不真每心中不寧則轉覺重聽虛鳴疼痛生地黃一兩半桑白皮一兩磁石搗碎水淘二三十次去盡赤汁為度二兩羌活枳殼防風黃芩木通甘草各半兩上㕮咀每服四錢水一盞半煎七分去滓日二三服不拘時候一方無磁石麝香散治耳內虛鳴麝香半錢全蠍十四個薄荷十四葉裹麝香全蠍瓦上焙乾上為細末滴水捏作挺子塞耳內極妙療耳鳴沸鬧吳茱萸巴豆去皮熬乾薑石菖蒲磁石細辛各一分上為細末用鵝膏和少許以綿裹塞耳中以鹽五升布裹蒸熨耳門令暖氣通入耳內冷即易之如此數次瘥後常以亂髮卷塞耳中慎風一方無磁石芎歸飲治耳鳴川芎當歸細辛各半兩石菖蒲官桂去粗皮白芷各三錢上㕮咀每服三錢水二盞入紫蘇薑棗煎至一盞去滓不拘時服如虛冷甚者酌量加生附子蓋腎者宗脈所聚耳為之竅血氣不足宗脈乃虛風邪乘虛隨脈入耳氣與之搏故為耳鳴先用一料五苓散加制枳殼橘皮紫蘇生薑同煎吞青木香丸散邪疏風下氣續以芎歸飲和養之黃耆丸治腎虛耳鳴夜間睡著如打戰鼓覺耳內風吹更四肢抽掣疼痛黃耆一兩羌活白蒺藜瓦上炒去刺各半兩黑附子大者一個羯羊腎一對焙乾上為細末酒糊為丸如梧桐子大每服三四十丸空心煨蔥鹽湯送下一方有破故紙無白蒺藜生犀丸治耳中策策疼痛犀角鎊牛黃研南星白附子炮乾薑炮丹砂研沒藥研半夏湯洗龍腦研乳香研烏蛇酒浸去皮骨炙官桂去皮各一分防風當歸焙麝香研各半兩上為細末煉蜜為丸如梧桐子大每服二十丸空心用溫酒送下白龍散治耳中卒然大痛治瘡生肌止痛硼砂三錢滑石研一兩輕粉研一錢烏賊魚骨研各一兩寒水石四兩煅研上為細末每用少許摻耳中或油調如糊滴耳中痛立止治耳內疼穿山甲二片土狗子二個上將土狗子夾在穿山甲內同炒焦黑色為度入麝香少許同研細末吹一字於耳內一方治耵聹又方用草烏削如棗核大蘸生薑自然汁塞耳內其疼立止一方不用薑汁治耳內極痛方上用鬱金研細末每用一字以淨水調傾入耳卻急傾出杏仁膏治耳中汁出或痛或膿上用杏仁炒令赤黑研成膏薄綿裹納耳中日三四度易之或亂髮裹塞之亦妙一方治耳卒痛或水出用杏仁炒焦為末蔥涎搜和為丸以綿裹塞耳中熏耳亦可又治耳中腫兼有膿礬石散治耳卒腫出膿並底耳及治耳聾不瘥有蟲上用礬石熬令汁枯研細每以葦筒吹少許入耳中日三四度或以綿裹如棗核大塞耳中亦得一方先以干鹽摻之次入礬末尤妙一方先以紙纏去耳中汁次以礬末粉耳中次以食鹽末粉其上食久乃起不過再度永瘥一方不用鹽又方用商陸生者洗淨以竹刀子削如棗核大塞耳中亦治耳內生瘡蔥涎膏治耵聹塞耳聾不可強挑蔥汁三合細辛去苗附子炮去皮臍各一分上將細辛附子為末以蔥汁調令稀灌入耳中柴胡聰耳湯治耳中干耵耳鳴致聾柴胡三錢連翹四錢水蛭半錢炒另研繭蟲三個去翅足另研麝香少許另研當歸身人參炙甘草各一錢上除另研外以水二盞入生薑三片煎至一盞去滓稍熱下水蛭等末再煎一二沸食遠稍熱服通氣散治聤耳郁李仁去皮研芍藥人參各半兩大黃山芋官桂去皮各一兩檳榔三枚牡丹皮木香細辛去苗甘草炙各一分上為細末研勻每服一錢匕空心溫酒調下治聤耳有膿龍骨枯礬胭脂海螵蛸各等分麝香少許上為細末先繳耳淨將藥乾摻耳中菖蒲散治聤耳膿汁不止菖蒲焙狼毒磁石火煨醋淬附子炮去皮枯礬各半兩上為細末以羊髓和少許綿裹塞耳中竹蛀散治聤耳苦竹蛀末白礬枯各二錢干胭脂半錢麝香一錢上研極細以綿杖子卷之卻以鵝毛管輕吹一字入耳蠍倍散治聤耳膿汁不止全蠍三錢燒存性五倍子一兩炒白礬一錢枯麝香少許上為細末研勻每用少許吹耳中一方加干胭脂立效散治聤耳底耳有膿陳橘皮燈上燒黑一錢為末麝香少許別研上研勻每用少許先以綿拭耳內膿淨上藥治聤耳方麝香炒半錢蟬殼半兩洗淨火燒存性上研極細先用綿展耳內膿令淨吹入藥柱耳門不得動追出惡物即愈治聤耳膿水不止狗膽一枚取汁枯礬一錢研上以臘豬脂調和納耳中以綿塞之不經三兩上除根麝香散治聤耳底耳耳內有膿麝香少許另研桑螵蛸一個火炙八分燒存性上研極細每用半字先以綿杖子拭去膿以藥摻之香附散治膿耳上用香附子去毛研為末以綿杖送入耳內附子丸治耳聾出膿疼痛及耵聤塞耳附子炮去皮臍菖蒲米泔浸焙白礬枯蓖麻仁研松脂研各一兩干胭脂半兩杏仁去皮尖雙仁炒研二兩上為細末研勻熔黃蠟和捻如棗核大針穿一孔令透塞耳中日一換一方治耵聤不用黃蠟搗成膏以綿裹如棗核大塞耳亦瘥治耳膿密陀僧一錢輕粉半錢麝香一字上為細末先以綿拭耳內膿卻摻藥三黃散治耳內流膿雄黃硫黃雌黃各等分上為細末以少許吹入耳內立效二聖散治耳內出膿水羌活白附子炮各一兩上為細末用豬羊腎各一隻切開每隻入藥末半錢不得著鹽濕紙裹煨熟五更初溫酒嚼下續吃粥壓之麝香佛手散治五般耳出血水者麝香少許人牙煅過存性出火毒上為細末每用少許吹耳內即干及治小兒痘瘡出現而靨者酒調一字服之即出治凍耳成瘡柏葉三兩微炙為末杏仁四十九枚湯浸去皮研成膏亂髮兩雞子大食鹽細研乳香細研半兩黃蠟一兩半清油一斤上先煎油令沸即下亂髮以消盡為度次下諸藥煎令焦黃濾去滓更以綿重濾過再以慢火煎之後下乳香黃蠟等攪令稠稀得所於瓷器盛每用鵝翎旋取塗之治耳瘡方土馬鬃井中苔各等分上為細末以燈盞內油調塗之黃馬散治耳內外惡瘡及頭瘡口邊肥瘡瘑瘡黃柏半兩馬齒莧乾者一兩上為細末每用小豆許綿裹內耳中耳外敷之治凍耳成瘡柏白皮榆白皮桑白皮杏仁湯浸去皮各二兩甘草一兩羊髓腦半斤上細銼以羊腦髓煎令黃濾去滓於瓷器盛每用以鵝翎蘸藥塗之立驗散治蚰蜒入耳川芎白芷夜明沙炒豬牙皂角炙南星炮各三分百部白丁香藜蘆各四錢草烏半兩砒霜別研蓽茇各二兩海金沙一分上為細末研勻臨時更用鉛丹調色勻瓷器收如蛐蜒入耳取少許以醋一滴調化以細翎蘸藥入耳竅微吹令藥氣行立出藥不得多多即化蚰蜒成水不出如蠍螫先點少醋在螫處摻藥半字許擦令熱即效治蚰蜒入耳方及治蜈蚣諸蟲入耳雄黃綠礬礬石半夏各一分上為細末以醋調一字灌入耳內即出治蚰蜒入耳硇砂研膽礬研各一分上研細以雞翎管吹一字入耳中蟲化為水治百蟲入耳桃葉心二七枚胡麻一升炒令香上先以桃葉心塞耳中其蟲必死未出將胡麻以葛袋盛枕耳邊蟲自出治蚰蜒入耳方上用雞一隻去毛足以油煎令黃箸穿作孔枕之車脂膏治百蟲入耳上取車轄脂傅耳孔蟲自出肘後療聤耳膿血出綿裹塞耳中治百蟲入耳方上用雞冠血滴入耳即出治蚰蜒入耳方上用綠礬為末水調灌耳立出治蚰蜒入耳方上用雄黃為末釅醋調灌耳立出治蚰蜒入耳方上用蝸牛一個全捶碎置於耳邊即出一方去殼研爛滴水五七點研勻灌耳內自然出如無活者乾者研末亦可一方為末吹耳中以紙糊耳其蟲自出治百蟲入耳方上搗韭菜汁和醋灌耳中即出只以韭汁亦可治諸蟲及蝨等入耳方上用白膠香燒煙燻耳令知耳孔內暖其蟲自出治飛蟲入耳方上用酸醋滴耳內蟲必出不出必死治蚰蜒入耳方上用牛乳一盞少少灌入耳內即出若入腹者飲一二升當化為黃水出未出更飲一方用牛酪治蚰蜒入耳方上用驢乳三合灌耳中其蟲從左耳入右耳出一方用黑驢乳汁灌之亦妙治蚰蜒及百蟲入耳方上以香油少少灌耳中若入腹者空腹服酢酪一升不出更服仍以面和燒餅乘熱傅耳門須臾即出又方用水銀一豆大傾入耳中欹耳孔向下於耳上擊銅器物數聲即出又方上用麻油作煎餅側臥以耳枕之須臾即出李元淳尚書在河陽日蚰蜒入耳無計可為半月後腦中哄哄有聲腦悶不可撤至以頭自擊門柱奏疾狀危極困發御藥以療之無瘥者為受苦不願生存忽有人獻此方及愈治百蟲入耳方上以火照之即嚮明出治百蟲入耳方上以刀兩口於耳上相擊作聲蟲即走出治蜈蚣入耳方上即閉氣氣滿即吐復閉取令出或死耳中徐徐以物鉤出之若積久不出者取新熟雞肉安耳竅上蟲即出治惡蟲入耳方上用香油稻稈灰汁灌耳中即出追毒膏治百蟲入耳不出白礬雄黃各半兩上為細末用香油調成膏每用皂角子大塞耳蟲即出治諸蟲入耳方上用桃葉為枕蟲自鼻出形如鷹嘴人莫知其名有人蚰蜒入耳遇其極時以頭撞柱至血流不知其癢不可忍蚰蜒入耳往往食髓至盡又能孳生凡蟲麻油灌妙治蚰蜒及百蟲入耳上以雞心血以生油和滴入耳內蟲即出治百蟲入耳方上以川椒為末一錢醋半盞浸一宿良久方滴入耳中其蟲自出治蟲入耳方上以萵苣汁滴耳中蟲出或以切熟豬心置耳中留蟲出路蟲自出治蚤蝨入耳痛上以菖蒲為末炒乘熱以綿裹著耳邊蠟彈丸治兩耳虛聾白茯苓二兩山藥三兩炒杏仁去皮尖炒一兩半上為細末以黃蠟二兩熔和丸如彈子大每服一丸食後細嚼鹽湯送下塞耳丹治耳聾石菖蒲一寸巴豆一粒去殼全蠍一個去毒上為細末蔥涎和丸棗核大綿裹塞耳內
