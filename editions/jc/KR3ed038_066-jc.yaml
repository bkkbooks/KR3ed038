body:
  text: 卷之六十六腋臭門十香丸含化令人遍體俱香沉香水香白檀香零陵香甘松去土藿香雞舌香肉豆蔻去殼白芷細辛川芎檳榔丁香各半兩龍腦麝香各一錢上為細末研勻煉蜜和丸如芡實大每服一丸不拘時含化咽津每日不拘時三五度五香丸治口臭及身臭止腫痛散血氣丁香藿香青木香豆蔻子白芷當歸桂心零陵香各一兩甘松香附各二兩檳榔二枚上為細末煉蜜和丸如大豆日三夜一時含之咽津五日內口香十日身香二七日衣被香三七日下風人聞香四十七日淨洗手不落地香五十七日把他人手亦香禁五辛去臭氣之物治腋氣臭於狐貍者白礬燒令汁盡黃丹各一兩青礬鐵粉雄黃膩粉各一錢上為細末每夜先以皂莢水洗後用唾津調藥塗之治體氣方枯礬輕粉蛤粉密陀僧麝香各等分上為細末研勻每用少許摻之治腋氣方青礬白礬燒灰各一兩白梅七枚捶碎古文錢十四文上於瓷瓶內盛水一盞浸半日先洗淨液下將藥半濕時塗之治腋氣方田螺大生者一個巴豆去殼一枚膽礬一豆許麝香少許上將田螺以水養三日出泥土揭起靨入膽豆麝在螺內以線拴住放瓷器內次日化成水凡用須五更時將藥水以手自抹在兩腋內不住手抹藥直待腹內欲行肺腑卻住手先要揀深達無人到處空地內去大便黑糞極臭是其證以土厚蓋之不可令人知之如不盡再以藥水抹之又去大便後次日枯礬藥擦之可去病根治腋氣方上以膽礬如琉璃者半生半熟煅為細末入膩粉少許同研每用半錢以生薑自然汁調藥揩擦腋下亦令十分熱痛則止礬以無灰色石頭妙治腋氣方上用熱蒸餅一枚擘作兩片摻密陀僧細末一錢許急挾在腋下略睡少時候冷棄之如一腋有病只用一半葉元方平生苦此疾來紹興偶得此方用一次遂絕根治腋氣方上法撏去腋下毛以甘遂半兩為末用豬肉兩片薄批開將甘遂摻肉上午後貼放兩腋下候明旦五更濃煎甘草半兩為湯一碗服之須臾通下臭氣治腋氣方上用活田螺一個以好麝香少許安於田螺內卻埋於露天地上不可雨打待七七四十九日取出看患處淨洗拭乾用墨搽之卻再洗看有黑處是竅子用田螺汁點之兩度立愈治腋氣神妙不可盡述上用白礬飛過不以多少臨睡時以紙襯桌上伸手托壁柱上以藥干揩令腋下十分熱痛兩腋揩遍先於日中將所著上截衣服用灰汁淨洗又泡去衣袖中臭氣皆無氣息如新衣方可著若洗氣息不斷枉用其藥大概藥無不驗多是衣服再作氣故不能斷根一方用燒好礬石末絹袋盛常以粉腋下不過十度一方唾調塗之治陰汗鴉臭兩腋下臭不可與人同行白礬密陀僧黃丹各二分麝香一銖上於乳缽內研如飛塵以醋於手心內調藥末搽腋下經兩時辰許卻以香白芷煎湯洗之一日用一次治腋臭神效密陀僧四兩白礬枯過二兩輕粉三錢上為細末頻擦兩腋下擦至半月見效半年全愈
