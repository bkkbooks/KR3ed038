body:
  text: 卷之五十六正骨兼金鏃門附論內經云人有所墮墜惡血留內腹內脹滿不得前後先飲利藥此上傷厥陰之脈下傷少陰之絡刺足內踝然谷之前出血刺足肘上動脈不已刺三毛各一痏見血立已左刺右右刺左靈樞云有所墮墜惡血留於內若有所大怒氣上而不下積於脅下則傷肝又中風及有所擊打若醉入房汗出當風則傷脾又頭痛不可取於腧有所擊墮惡血惡血在於內痛不已可側刺不可遠取之也內經又云肝脈搏堅而長色不青當病墮若搏因血在脅下令人嘔逆金匱云寸口脈浮微而澀皆當亡血設不出汗者其身有瘡亡血故也子和云諸落馬墜井打撲傷損閃肭傷折杖瘡腫散焮痛不止者可峻下之痛止腫消宜以通經散等藥治之此墮墜之病內經靈樞金匱子和所論其詳獨正骨兼金鏃科惟危氏言其整頓手法折傷手足各有六出臼四折骨背脊骨折法十不治並用藥法則至矣盡矣後田馬騎啟發前人之書補其闕略經義大同小異此科之書當重危氏今之學者專攻治外不行診視不明其脈焉知內傷輕重因此之誤不淺淺哉若能識折傷出臼出臼處搦入其窠折傷處依法夾縛明脈理的在何經受證用後項次序之藥終無夭閼之禍可不謹乎今將人之周身總三百六十五骨節開列於後人身總有三百六十五骨節以一百六十五字都關次之首自鈴骨之上為頭左右前後至轅骨以四十九字共關七十二骨巔中為都顱骨者一有勢微有髓及有液次顱為髏骨者一有勢微有髓髏前為頂威骨者一微有髓女人無此骨髏後為腦骨者一有勢微有髓腦左為枕骨者一有勢無液枕就之中附下為天蓋骨者一下為肺系之本蓋骨之後為天柱骨者一下屬脊窳有髓蓋前為言骨者一言上覆合於髏骨有勢無髓言下為舌本骨者左右共二有勢無髓髏前為囟骨者一無勢無液囟下為伏委骨者一俚人訛為伏犀骨是也無勢髓伏委之下為俊骨者一附下即眉宇之分也無勢髓眉上左為天賢骨者一無勢髓下同眉上右為天貴骨者一眉上直目睛也左睛之上為智宮骨者一無勢髓右睛之上為命門骨者一兩睛之下中為鼻鼻之前為梁骨者一無勢髓梁之忘為顴骨者一有勢無髓下同梁之左為骨者一糺顴糺之後即耳之分梁之端為嵩柱骨者一無勢髓左耳為同正骨者一無勢髓右耳為納邪骨者一同上正邪之後溪完骨者左右共二無勢無髓正尋之上附內為嚏骨者一無勢少穴嚏後之上為通骨者左右前後共四有勢少液嚏上為齶骨者一無勢多液其齶後連屬為頷也左頷為乘骨者一有勢多液右頷溪車骨者一同上乘車之後為轅骨者左右共二有勢有液乘車上下出齒牙三十六事無勢髓庸下就一則不銘其數復次鈴骨之下為膻中左右前後至蓧以四十字關九十七骨轅骨之下左右為鈴骨者二多液鈴中為會厭骨者一無勢髓鈴中之下為咽骨者左中及右共三無髓嚥下為喉骨者左中及右共三同上喉下為嚨骨者環次共十事同上嚨下之內為肺系骨者累累然共十二無勢髓肺系之後為谷骨者一無髓谷下為亻鬲道骨者左右共二同上嚨外次下為順骨者共八少液順骨之端為順隱骨者共八同上順下之左為洞骨者一在上溪是順下之右為棚骨者一女人無此洞棚之下中央為𩩲骭骨者一缺盆有人呼為骮骨𩩲骭真下為天樞骨者一無髓鈴下之左右為缺盆骨者二有勢多液左缺盆前之下為下厭骨者一無髓右缺盆前之下為分蓧骨者一同上厭饍之後附下為倉骨者一同上倉下之左右為髎骨者共八有勢無液髎下之左為胸骨者一男子此骨大則好勇髎下之左右蕩骨者一女子此骨大則多夫胸之下為烏骨者一男子此骨滿者發甲白蕩之下為臆骨者一此骨高多彘妾鈴中之後為脊窳骨者共二十二上接天柱有髓脊窳次下為大動骨者一上通天柱共成二十四椎大動之端為歸下骨者一道家謂之尾閭歸下之後為篡骨者一此骨能限精液歸下之前蓧骨者一此骨薄者遇字處隱下復次缺盆之下左右至襯以二十五字關六十骨此下之骨至手共二十有七骨支其缺盆之後為傴甲骨者左右共二有勢多液傴甲之端為甲隱骨者左右共二此骨無則至賢前支缺盆為飛動骨左右共二此骨消病痱緩次飛動之左為龍臑骨者一有勢無髓無液次飛動之右為虎沖骨者一同上龍臑之下為龍本骨者一虎沖之下為虎端骨者一並有勢有髓本端之下為腕也龍本上肉為進賢骨者一男子此骨隆為名臣虎端上肉為及爵骨者一女人此骨定為命婦腕前左右為上力骨者共八有勢多液次上力為駐骨脊左右共十同上次駐骨為揭骨者左右共十同上次搦為助勢骨者左右共十左助外為爪右助外為甲爪甲之下各有襯骨左右共十無勢無液復次𩩲骭之下左右前後至初步以五十二字關一百三十六骨此下至兩乳下分左右自兩足心眾骨所會處也𩩲骭之下為心徼骨者一無髓𩩲骭之左為脅骨者上下共十二君小腸之分也左脅之端各有脅隱骨者分次亦十二無髓脅骨之下為季脅骨者共二多液季脅之端為季隱骨者共二無髓𩩲骭之右為肋骨者共十二脅大腹之分也肋骨之下為眇肋骨者共二各無隱骨唯獸有之右肋之端為肋隱骨者共十二無髓蓧骨之前為大橫骨者一有勢少髓橫骨之前為白環骨者共二有勢有液白環之前為內輔骨者左右共二有勢有液內輔之後為骸關骨者左右共二同上骸關之下為揵骨者左右共二同上揵骨之下為髀樞骨者左右共二有勢多髓髀樞下端為膝蓋骨者左右共二無勢多液膝蓋左右各有俠升骨者共二有勢多液髀樞之下為䯒骨者左右共二有勢多髓䯒骨之外為外輔骨者左右共二有勢有液䯒骨之下為立骨者左右共二同上立骨左右各有內外踝骨者共四有勢少液踝骨之前各有下力骨者左右共十有勢多液踝骨之後各有京骨者左右共二有勢少液下力之前各有釋欹之前各有起僕骨者共十有勢起僕之前各有平助骨者左右共十有勢平助之前各有襯甲骨者左右共十有勢少液釋欹兩旁各有核骨者左右共二有勢多液起僕之下各有初步骨者左右共二有勢無髓有液女人則無此骨凡此三百六十五骨也天地相乘惟人至靈其女人則無頂威左洞右棚及初步等五骨止有三百六十骨又男子女人一百九十骨或隱或襯或無髓勢餘二百五十六骨並有髓液以藏諸筋以會諸脈溪谷相需而成身形謂之四大此骨度之常也論手有四折骨六出臼凡手臂出臼此骨上段骨是臼下段骨是杵四邊筋脈鎖定或出臼亦銼損筋所以出臼此骨須拽手直一人拽須用手把定此間骨搦教歸窠看骨出那邊用竹一片夾定一邊一邊不用夾須在屈直處夾才服藥後不可放定或時又用拽屈拽直此處筋多吃藥後若不屈直則恐成疾日後曲直不得肩胛上出臼只是手骨出臼歸下身骨出臼歸上或出左或出右須用舂杵一枚矮凳一個令患者立凳上用杵撐在於出臼之處或低用物墊起杵長則墊凳起令一人把住手拽去凳一人把住舂杵令一人助患人放身從上坐落骨節已歸窠矣神效若不用小凳則兩小梯相對木棒穿從兩梯股中過用手把住木棒正稜在出臼腋下骨節蹉跌之處放身從上墜骨節自然歸臼矣腳六出臼四折骨或腳板上交牙處出臼須用一人拽去自用手摸其骨節或骨突出在內用手正從此骨頭拽歸外或骨突向外須用力拽歸內則歸窠若只拽不用手整入窠內誤人成疾腳膝出臼與手臂肘出臼同或出內出外亦用一邊夾定此處筋脈最多服藥後時時用屈直不可定放又恐再出窠時時看顧不可疏慢正骨金瘡須看脈候如傷臟腑致命處一觀其脈虛促危矣傷處淺命脈虛促亦為後慮傷至重命脈和緩亦無慮也脈有虛有實有去來有疏密或被傷藏脈不死者必關脈實重則無慮或傷至死處關脈無別脈洪大則難醫如用兩件藥後脈不轉動急急住藥若脈漸漸隨藥轉此則可治無慮或血出甚者脈不要洪大只要平正重實其血不曾出者亦無惡血在內其脈欲洪大不要疏密亦不要進退來去恐其變凶看傷脈每與內科脈不同或傷內或致命或難醫處被傷者命脈便已去矣此等切勿治之十不治證攧撲損傷或被傷入於肺者縱未即死二七難過左脅下傷透內者腸傷斷一半可醫全斷者不可治小腹下傷內者證候繁多者脈不實重者老人左股壓碎者傷破陰子者血出盡者肩內耳後傷透於內者皆不必用藥腸肚傷治法肚上被傷肚皮俱破腸出在外只腸全斷難醫傷破而不斷者皆可治療腸及肚皮破者用花乳石散敷線上輕用手從上縫之莫待糞出清油捻活於入肚內肚皮裂開者用麻縷為線或捶桑白為線亦用花乳石散敷線上須用從里重縫肚皮不可縫外重皮留外皮開用藥摻待生肉用藥加減法凡損若不折骨不碎骨則不可用自然銅於藥內除去無痰誕不用半夏老人有傷者骨脈冷每用加當歸川芎川烏木香丁香人參半夏去白芍藥生地黃此亦是二十五味藥內加減老人服丸或鄰臟腑者不問老少如有血並痰從口中出者用清心藥加丁皮川芎半夏入二十五味內同服或皮膚熱者加黃柏皮皂角半兩入二十五味藥內同煎服用麻藥法攧撲損傷骨肉疼痛整頓不得先用麻藥服待其不識痛處方可下手或服後麻不倒可加曼陀羅花及草烏五錢用好酒調些少與服若其人如酒醉即不可加藥被傷有老有幼無力有血出甚者此藥逐時相度入用不可過多亦有重者若見麻不倒者又旋添些更未倒又添酒調服少許已倒便住藥切不可過多用摻藥法瘡口血出不止則用方中止血藥敷之如洗開後瘡孔大甚且先用降真香龍骨沒藥摻之內即生瘡孔上須用油卑貼待膿血汁出莫待蔽塞如夏月用藥以薄荷葉貼瘡孔一日一度湯洗又用藥摻如肉上滿瘡口用手搦不痛如好肉一般即用收瘡口藥敷上卻莫貼待風稍瘡口立收若未生實肉切不可先收瘡口裡面恐為患也傷破肚皮用藥法如傷孔大肚腸與脂膏俱出放入內則用縫如孔小只有膏出先用清心藥與服用手擘去膏不用縫此膏出者已無用了不可復入肚中反成禍只可擘去不妨此是閉肉但放心去之肚肉被傷者專用退利大小腸不可待秘恐成重患打攧及樹木壓遍身痛者打攧樹木壓或自高處攧下者此等傷皆驚動四肢五臟必有惡血在內專怕噁心先用清心藥打血藥及通大小腸藥次第先服臨服加童子小便入藥內立效專用大小腸洗利恐作隘窒利害之甚清心藥加前方通利大小腸藥服之自然俱通無悶煩無惡血汙心以次用止痛藥服之即止去惡血法攧撲傷刀石傷諸般傷損至重者皆先服清心藥次服清小便三服去血藥或被傷者血未結打從瘡口出或結在內用藥打入大腸時即泄或被打被攧被木壓惡血未積者用藥打散四肢或歸胸脯者或歸上膈者打從口中吐出或歸中膈打入大腸泄出先用此急救次服止痛藥即二十五味藥中加減用用藥湯使法凡藥皆憑湯使所使方先但用清心藥煎後用童便一盞同服或止痛重傷者則用薑湯燈心湯調二十五味藥服之薄荷湯亦可凡傷或刀傷及損內臟腑恐作煩悶崩血之患如折骨者用姜酒服接骨藥敷之如骨碎被重打重攧重木及石壓者皆用先服湯使法並不用酒服如輕攧撲損傷則用薑湯調下二十五味藥立效正骨通治方傷原活血湯治從高墜下惡血流於脅下疼痛不可忍大黃酒浸五錢柴胡當歸各二錢桃仁五十個研如泥紅花半錢天花粉穿山甲炮甘草各一錢上作一服用水一盅酒半盅煎至八分食前服補損當歸散治墜馬落車及打傷折傷當歸川芎各七錢附子炮去皮臍澤蘭炒各一兩桂心四錢蜀椒三錢甘草炙五錢上為細末每服二錢食前用溫酒調服日三服忌海藻菘菜生蔥冷水沒藥乳香散治打撲傷損痛不可忍者沒藥別研乳香別研肉桂去皮當歸焙白芷甘草炒各一兩白朮炒五兩上為細末研勻每服二錢不拘時溫酒調服二十五味藥治攧撲損傷骨碎骨折筋斷刺痛不問輕重並皆治之香白芷醋炒紫金皮醋炒劉寄奴川當歸鹽炒赤芍藥米泔浸黑牽牛川牛膝茶水浸生地黃鹽水浸炒川芎乳香沒藥破故紙醋炒木通自然銅骨不碎不用臨好時用草烏醋炒孕婦不用木香川烏火煨孕婦不用藿香骨碎補木賊官桂羌活獨活以上各一兩熟地黃鹽水炒杜牛膝茶水炒各半兩金刀傷挫臼者去自然銅骨碎骨折者用之然須於此方內去自然銅臨好時卻入用之如早服以成他疾同研為末用蜜為丸如彈子大用黃丹為衣或被攧撲損傷金刀箭鏃不問輕重每服一丸溫酒磨化服或細嚼酒送下如被刀傷全斷內損重者以薄荷湯或木瓜湯薑湯燈心湯皆可服病在上食後病在下食前在中者不拘時服沒藥降聖丹治打撲傷損筋斷骨折攣急疼痛不能屈伸及榮衛虛弱外受風邪內傷經絡筋骨緩縱皮肉刺痛肩背拘急身體倦怠四肢少力沒藥別研當歸酒洗焙白芍藥骨碎補爁去毛川烏頭生去皮臍自然銅火煨醋淬十二次研為末水飛過焙各一兩生地黃川芎各一兩半上為細末以生薑自然汁與煉蜜和丸每一兩作四丸每服一丸捶碎用水酒各半盅入蘇木少許煎至八分去蘇木空心服花蕊石散治一切金刀折傷打撲身體血出急於傷處摻藥如有內損血入臟腑熱煎童子小便入酒少許調二錢服之立效若牛抵腸出不損者急送腸入用細絲或桑白皮為線縫合肚皮縫上摻藥血止立活如無桑白皮用麻線縫之亦可並不得封裹瘡口恐作膿血如瘡干以津液潤之然後摻藥婦人產後敗血不盡惡血奔心胎死胎衣不下並用童子小便調服花蕊石一兩搗為細末硫黃上色明者四兩研為末上二味和勻先用紙筋和鹽泥固濟罐子一個候乾入藥於內再用泥封口候乾安在四方磚上上書八卦五行字用炭一秤籠疊周匝於巳午時從下著火令漸漸上徹直至經宿火冷炭消又放經宿罐冷取出細研瓷瓶內盛依前法服加味川芎湯治打撲傷損敗血流入胃脘嘔吐黑血如豆汁川芎當歸白芍藥百合水浸一日荊芥各二錢上作一服水一盅半酒半盅煎至八分不拘時服導滯散治重物壓傷或從高墜下或吐血不能禁止或瘀血在內胸腹脹滿喘促氣短當歸大黃各二兩上為細末每服三錢不拘時溫酒調服大紫金皮散治打撲傷折內損肺肝紫金皮降真香補骨脂無名異燒紅酒淬七次川續斷琥珀另研牛膝酒浸一宿桃仁去皮炒當歸洗焙蒲黃各一兩大黃濕紙裹煨朴硝另研各一兩半上為細末每服二錢食前濃煎蘇木當歸酒調服沒藥丸治打撲內損筋骨疼痛沒藥乳香川芎川椒去目及合口者芍藥當歸各半兩自然銅二錢半火燒醋淬七次上為細末用黃蠟二兩熔開入藥末不住手攪勻丸如彈子大每服一丸用好酒一盅化開煎至五分乘熱服之隨痛處臥連服二三丸立效活血散治打撲傷折手足上用綠豆粉新鐵銚內炒令紫色用熱酒同熱醋調令成膏敷貼損處用紙花蓋貼將杉木一片或二片縛定其效如神萬金膏治癰疽發背諸般瘡癤從高墜下打撲傷損腳膝生瘡遠年臁瘡五般痔漏一切惡瘡並皆治之龍骨鱉甲苦參烏賊魚骨黃柏黃芩黃連獵牙皂角白芨白蘞厚朴木鱉子仁草烏川烏當歸洗焙香白芷各一兩沒藥另研乳香另研各半兩槐枝柳枝各四寸長二十一條黃丹一斤半炒過清油四斤上除乳沒丹外將諸藥於油內慢火煎紫赤色去滓秤淨油三斤放鍋內下丹不住手攪令黑色滴入水不散及不黏手下乳沒末再攪勻如硬入油些少以不黏手為度洗藥荊葉散治從高墜下及一切傷折筋骨瘀血結聚疼痛頑荊葉一兩白芷細辛去苗蔓荊子桂心川芎丁皮防風去蘆羌活各半兩上作一服入鹽半匙連根蔥五莖漿水五升煎取三升去滓通手淋洗痛處冷即再易避風處洗之玉真散治諸瘡口入風為破傷風項強牙關緊急欲死者防風南星各一兩上為細末每服三錢童子小便一大盅煎熱調不拘時服急風散治新舊諸瘡破傷中風項強背直腰反折口噤不語手足抽掣眼目上視喉中鋸聲並皆治之麝香另研五分硃砂一兩生黑豆二錢半草烏三兩半燒存性上為細末研勻破傷風以酒調一錢不拘時服如出箭頭先用酒調一錢就將此藥貼上箭瘡上如聖散治破傷風止血定痛蒼朮六兩川烏炮去皮兩頭尖炮各四兩草烏炮去皮防風細辛各二兩半白朮川芎白芷各一兩半蠍梢微炒雄黃各半兩上為細末每服一錢不拘時酒調下如損骨折乳香五錢一字散治破傷風金頭蜈蚣一個去頭足炙草烏天麻各半兩全蠍一錢香白芷三錢上為細末每服半錢如發熱茶清調下發寒溫酒調下不拘時服紫金皮散治打撲傷損金刀箭鏃傷處浮腫用此紫金皮醋炒南星半夏川當歸黃柏鹽炒草烏炮川烏炮杜當歸川芎烏藥破故紙川白芷鹽水炒劉寄奴川牛膝桑白皮各等分上為細末生薑薄荷汁兼水調敷腫處或傷處皮熱甚加黃柏皮生地黃半兩有瘡口者勿封瘡口四邊敷之草烏散治傷骨節不歸窠者用此麻之然後下手整頓白芷川芎木鱉子豬牙皂角烏藥半夏紫金皮杜當歸川烏各二兩舶上茴香草烏和兩木香半兩上為細末諸骨碎骨折出臼者每服一錢好酒調下麻倒不知疼處或用刀割開或用剪去骨鋒者以手整頓骨筋歸元端正用夾板夾縛定然後醫治或箭鏃入骨不出亦可用此藥麻之或鐵鉗拽出或用鑿鑿開取出若人昏沉後用鹽湯或鹽水與服立醒白膠香散治皮破筋斷上用白膠香為末敷之又方金沸草根擂汁塗筋封口便可相續止痛應痛丸治折傷後為四氣所侵手足疼者破故紙骨碎補去毛蒼朮生用草烏各半斤穿山甲去膜桑柴灰炒泡起為度柴灰亦可舶上茴香炒各六兩上除草烏半斤用生薑一斤擂爛同草烏一處淹兩宿焙乾為末酒煮麵糊為丸如梧桐子大每服五十丸用酒或米湯送下忌熱物片時乳香散治打傷損手足疼痛不可忍者乳香另研沒藥另研各三錢白芷二錢肉桂五錢白朮炒當歸炒粉草各五錢上為細末研勻每服二錢不拘時酒調下破血散治乘馬損傷跌其脊骨惡血流於脅下其疼苦楚不可轉側羌活防風肉桂各一錢水蛭炒煙盡另研半錢柴胡當歸梢連翹各二錢麝香另研各少許上作一服水一盅酒一盅煎至一盅去滓入水蛭麝香末調勻不拘時溫熱服地龍散治腰脊痛或打撲損傷從高墜下留在太陽經中令入腰脊或脛腨臂腰中痛不可忍地龍官桂蘇木各九分麻黃七分黃柏當歸梢甘草各一錢半桃仁九個上作一服水二盅煎至一盅食前服調經散治跌撲損傷疏利後用此藥調理川芎當歸芍藥黃耆各一錢半青皮烏藥陳皮熟地黃乳香另研茴香各一錢上作一服水二盅煎至一盅不拘時服治金瘡白藥黃柏黃芩當歸赤芍藥黃耆牡丹皮生地黃木鱉子黃連地骨皮桑白皮甘草各一錢半白芷馬蓼梢葉生者一錢火煅過上用桐油三兩煎黃色濾去滓再煎油稍熟入細白板松香一片慢火煎須頻頻柳枝攪勻卻入乳香沒藥虢丹各七錢煎數沸出火頃時以少綿鋪於前濾藥滓布上濾過先用瓦缽滿盛清水八分卻濾藥於缽水中將去清水中如繃面狀繃三二百度愈繃愈白故名白藥常以清水浸傾於冷地上用物遮蓋勿令塵入五七日一換水刀斧一應金傷最傷孔大小取一塊填於傷孔中以白紙護之隨手不疼一日一換五日生肉筋斷加杜仲續斷各二錢同煎收瘡口加龍骨半錢碎了煎入藥內打損只敷於油紙上貼之即愈卻不須入接筋龍骨等劑定痛乳香散專治金傷並折骨打撲傷損乳香沒藥各二錢敗龜版一兩紫金皮一兩當歸鬚骨碎補虎骨酥炙各半兩穿山甲火炮少許半兩錢五個如無以自然銅火煅醋淬代之上為細末每服一錢如病沉服二錢以好酒調服損上者食後服損下者食前服生肌止血立效方治金瘡闢一切風冷續筋骨石灰二升搗生地黃清蒿汁和作團火煅赤細研狗頭灰細研川芎艾葉地松蜜陀僧各半兩黃丹一兩麒麟竭一兩細研上為細末研勻密封之每遇金瘡傅之太乙膏治金瘡箭鏃不問輕重並癰疽癤毒用此傅之白芷蒼朮石膏醋炒白膠香乳香沒藥黃丹各五錢上為末用真麻油四兩桐油亦可以黃蠟一兩先煎油柳枝攪次入白芷等煎少傾卻入白膠香石膏得同煎試欲成珠卻入蠟同煎片時用生布濾過瓦器收藏用油單紙攤之損傷傅瘡口自然肉不痛速愈百草散治金瘡上五月五日平旦使四人出四方各於五里內採一方草木莖葉每種各半把勿令漏脫一事日正午時細切碓搗並石灰極令爛熟一石草斷一斗石灰先鑿大實中桑樹令可受藥取藥納孔中實築令堅仍以桑樹皮蔽之用麻油搗石灰極黏密泥之令不泄氣又以桑皮纏之使堅牢至九月九日午時取出陰乾百日藥成搗之日曬令乾便搗絹篩貯放凡一切金瘡出血傷折即時以藥封裹治使牢勿令動轉不過十日即瘥不腫不膿不畏風若傷後數日始得藥須暖水洗令血出然後敷此藥大驗平時無事宜多合以備倉卒金瘡之要無出於此一方云採時不得回顧任意摘取方回入杵臼內爛搗如泥量藥多少以量入石灰和勻取出拍成膏日中曝乾遇用旋取捻碎若刀斧傷干敷取血止為度得火傷冷水調開濕敷蛇蠍犬鼠咬傷先以溫水洗以津液調敷疥瘡先抓損以藥末干貼濕癬以醋調敷其效如神凡殺傷不透膜者上用乳香沒藥各一皂子大研爛以小便半盞好酒半盞同藥通口服然後用花蕊石散或烏賊魚骨或龍骨為末敷瘡口上立止殺傷氣偶未絕上取蔥白熱鍋炒熟遍敷傷處頃即再易其痛自止但青葉亦可灰彈散治刀斧傷血出不止及多年惡瘡上用多年石灰細研雞子清調成團煅過候冷再研細若刀斧傷摻之患處若多年惡瘡以薑汁調敷一方單用石灰摻患處裹定並瘥神仙刀箭藥上取桑葉陰乾為末干貼如無旋熨乾為末敷之一方用新桑葉研取白汁塗之能合金瘡治刀斧傷磕擦及破傷風浮腫者上用平胃散以薑汁調敷若急卒只以生薑和皮爛搗罨患處止痛截血且無疤痕又方用海舡縫內久年油灰研碎摻之佳藥蛆方治金瘡內爛生蛆者上以皂礬飛過干貼其中即死地榆絹煎治刀刃所傷內損大腸及兩脅肋並腹肚傷破大便從口中出並中大箭透射傷損腸胃及治產後傷損小腸並尿囊破小便出無節止此方神妙餌至一服其藥直至損處補定傷痕隔日開瘡口看之只有宿舊物出即無新惡物出瘡口內用長肉散子作捻子引散藥入瘡裡面候長肉出外其痕即自合地榆八兩洗淨搗為細末絹一疋小薄者上用清水洗淨絹糊以炭灰淋清汁二斗煮絹灰汁盡為度絹以爛熟擘得成片段五寸至三寸即取出壓盡灰汁於清水內洗三五度令去灰力盡重入鍋內以水二斗入地榆末煎煮熟爛以手捻看不作絹片取入砂盆研之如麵糊得所分為二服用白粳米粥飲調空心服之服了仰臥不得驚動轉側言語忌一切毒食熟爛黃雌雞白米軟飯余物不可食之其餘一服至來日空心亦用粥飲調服其將養一月內切須慎護如是產後所傷服一疋分作四服每服粥飲一中盞調服日一服治刀傷及竹木刺出血上急以自己小便淋洗三二次立止不妨入水治金瘡上以牛蒡葉貼之永不畏風亦不潰膿及搗敷之麒麟竭散治刀箭傷筋斷骨止痛定血避風麒麟竭白芨各半兩黃柏密陀僧白芷白蘞當歸炒甘草炙各一兩上為細末每用少許乾摻瘡上立效敗弩筋散治金刃弓弩所中筋急不得屈伸敗弩筋燒作灰秦艽去苗土杜仲去皮炙熟地黃焙各半兩附子炮去皮臍當歸切焙各一兩大棗三枚取肉焙上為細末每服二錢匕溫酒調下空心日午夜臥各一服一方有續斷無大棗治傷斷筋骨續筋方上取旋伏根搗汁滴瘡中仍用滓敷瘡上封之二七日即筋骨便續更不用易磁石散治金瘡腸出宜用之磁石煅研滑石研鐵精各三兩上為細末研勻每服一錢匕溫酒調下空心日午晚間各一服仍以針砂塗腸上其腸自收入一方用白米飲調服一方無鐵精治破傷腸出不斷腸出欲燥而草土著腸者上作大麥粥取汁洗腸推內之常研米粥飲之二十日稍稍作強糜百日後乃可瘥草土當踧在皮外治金瘡中腸出不能入者上以小麥三升用水九升煮取五升綿濾過候冷含噴瘡上漸入以冷水噴其背不宜多令人見亦不欲令傍人語又不可令病人知或尚未入取病人臥席四角令病人舉身搖須臾腸自入十日內食不可飽頻食而少勿使病人驚驚則殺人治金瘡腸出者上以桑白皮作線縫之更以熱雞血塗上立愈唐安藏剖腹用此法效雄黃散治藥毒箭頭在身未出雄黃細研二分粉霜細研半兩蜣螂四枚研末生用巴豆三粒去皮殼別研如泥生用上同研勻以銅箸頭取乳汁塗點瘡上頻頻用之七日瘡熟箭頭自出藍汁飲治毒箭所中上搗藍汁一升飲之滓敷瘡上若無藍取青布漬絞汁服之並淋瘡中鏃不出搗鼠肝塗之鼠腦亦得用之即出貝子散治毒箭上以貝子搗為末每服一錢匕溫酒調下不拘時日三四服此方治中毒並金瘡止痛紅散子摩金瘡上草烏尖麒麟竭茄子花蔓陀羅子蓖麻子去殼細研各半兩上為細末調酒面如膏瘡口上塗摩之箭頭自出牡丹散治金瘡箭頭在骨遠年不出牡丹皮去心白蘞各一兩桑白皮二兩藿香葉丁香麝香研各一分上為細末每服二錢匕溫酒調下日三服淺者十日深者二十日箭頭自出蠐螬丸治金瘡箭鏃在骨中遠年不出者蠐螬五枚乾者螻蛄三枚乾者赤小豆一分赤鯉魚鮓一兩硇砂一錢紅花末三錢上研細以鮓研和丸如綠豆大如有瘡口只於瘡口內紝一丸如無瘡口以針撥破內藥不過三丸至五丸箭頭自動輕搖即出出箭頭方蜣螂自死者十個土狗子三個婦人發灰少許上將蜣螂去殼取白肉與二味同研如泥用生塗中箭處如膏塗後內微癢即以兩手蹙之其箭頭自出解骨丸治箭鏃不出雄黃研蜣螂研象牙末各等分上為細末煉蜜和丸如黍米大內瘡口內後細嚼羊腎脂摩貼之覺癢箭頭自出治箭鏃入骨取不出疼痛宜用此方巴豆三枚蜣螂三枚上研塗所傷處候痛定微癢忍之極癢不可忍即撼動拔出次用生膏藥敷之以黃油貫眾五味子以牛膽制風化石灰敷之兼治惡瘡夏候鄲云初在潤州得方箭鏃出後速以生肌膏敷之說者云兼治瘡鄲得方後至洪州旅舍主人妻患背瘡呻吟鄲遽用此方試之愈治箭頭不出方磁石生搗研極細雄黃研各三分上同研勻每用二錢匕空心綠豆汁調服十日後輕按便出手足上用此藥貼之自出取箭鏃方上用天水牛一個獨角小者尤妙用小瓶盛之用硼砂一錢研細用水些少滴在內濕自然化水以藥水滴傷處箭頭自然出也淮西總管趙領衛名寓殿岩密之子云仇防禦方張循王屢求不得因奏知德壽宣取以賜之有奇效與楊氏方中用巴豆蜣螂者大率相似治箭頭在咽喉中或胸膈中及諸處不出者上用鼠肝五具細切爛研敷之兼以鼠腦髓或鼠頭血塗之並良亦治人針折在肉不出並刀刃傷牛膝膏治箭頭在咽喉中或胸膈中及諸處不出者上搗牛膝不拘多少為末以熱水調塗箭頭即出若火瘡傷久不瘥者塗之亦效治箭頭在肉不出方上以白項蚯蚓十四條內銅器中次入鹽一兩於日受曝並化作汁塗有箭鏃並刃傷處須臾癢則出又方治箭頭及諸刀刃在咽喉胸膈諸處不出者上嚼杏仁不限多少塗之一方研杏仁細敷之又方治箭鏃中傷在咽喉胸膈不出及針刺不出者上用螻蛄即土狗蟲乾者濃煎汁滴上三五度箭頭自出一方以螻蛄腦十枚細研塗瘡上亦出鼠油膏出箭頭鼠一枚熬取油蜣螂皂角燒灰定粉龍骨各一錢乳香少許另研上為細末以鼠油和成膏點藥在瘡口內其上更用磁石末蓋之箭頭自出神聖膏取針誤入皮膚車脂不以多少上成膏子者好攤在紙上如錢許二日一換三五次其針自出大有神效當歸散一名內補散一名蓯蓉散治金瘡去血多虛竭此藥內補當歸微炒川芎乾薑炮川椒去目併合口炒出汗桂心黃芩桑白皮吳茱萸湯浸焙炒白芍藥甘草炙各半兩肉蓯蓉四兩酒浸一宿去皮炒乾人參黃耆厚朴去粗皮薑汁炙令香熟各二兩上為細末每服二錢食前溫酒調下日三四服一方有白芨無黃芩桑白皮內塞散治金瘡去血多虛竭疼痛羸弱內補黃耆當歸白芷川芎乾薑黃芩芍藥續斷以上各二兩附子半兩細辛一兩鹿茸酥炙三兩上為細末每服五分匕食前酒調下日三服稍增至方寸匕一方無芍藥蒲黃散治金瘡血出腹脹欲死蒲黃生地黃各一兩半黃耆當歸川芎白芷續斷以上各一兩甘草炙三分上為細末每服三錢匕空心酒調下日三四服血化為水而下若口噤斡開口與之仍加大黃一兩半如神散治一切刀斧所傷血出不止並久患惡瘡虎骨炙研鉛丹火煅令赤龍骨研各半兩乳香如皂子大另研膩粉研丹砂研各一錢麝香少許另研上研極細勻一切瘡以黃連湯或鹽湯洗拭乾摻藥在瘡上不得衣黏著瘡口金傷散治金刃箭鏃所傷血出不止及落馬打傷內綻血出白芨白蘞乳香以上各一兩石灰半斤遠年者佳龍骨半兩黃丹少許上為細末入黃丹研如淡紅色每用乾摻患處上用軟紙更用絹帛裹護忌風水干痂為妙定血散治一切刀傷血出不止收斂瘡口南星生槐花炒鬱金以上各四兩半夏生用二兩乳香研沒藥另研各二錢半上為細末研勻每用乾摻患處忌水洗神仙止血散龍骨五色緊者訶子去核各一兩苧麻葉須用五月五日午時採陰乾半兩白石脂半兩上為細末每服一錢半食遠水調服之如修合時忌婦人雞犬見治金刃或打傷血出不止降真香末五倍子末銅末是削下鏡面銅於乳缽內研細等分上拌勻傅損處昔巡豐手擊朱嵩碎首用此而愈治金瘡傷損血出上用生牛膽入石灰末候乾摻上即止以臘月牛膽入風化石灰懸當風處候乾用五倍散治毒瘡血出不止亦治疳瘡上以五倍子生研為末干貼血立止神奇散治刀斧傷並箭傷血出不能止者麒麟竭研沒藥研自然銅煅南星炮乾薑燒灰銅丹炒黑膩粉瓦蘚各一分麝香少許上為細末和勻先以鹽湯洗瘡卻以燒蔥搗汁塗然後乾摻瘡上三二次軍中一捻金散金櫻葉嫩苧葉各二兩桑葉一兩上搗爛傅若欲致遠陰乾作末用帛縛上血止口合名草蠍經進方以五月五日或閉日收藥良治金瘡出血內漏上用蝙蝠二枚燒煙盡為末以水調服方寸匕令一日服盡當下如水血自消也治諸傷瘀血不散上於五六月收野苧葉擂爛塗金瘡上如瘀血在腹用順流水擂爛服即通血皆化水以死豬血試之可驗秋月恰無葉可早收之生乾地黃散治金瘡煩悶生乾地黃白芷當歸炒桃仁去皮尖雙仁麩炒續斷黃芩赤芍藥羚羊角屑甘草炙各一兩川芎桂心各三兩上為細末每服二錢食前溫酒調下日三四服白薇散治金瘡煩悶不得眠臥疼痛白薇枳實麩炒辛夷仁栝蔞根赤芍藥甘草炙各一兩酸棗仁二兩微炒上為細末每服二錢食前溫酒調下日三四服琥珀散治金瘡弓弩箭中悶絕無所識上用琥珀研如粉以童子小便調一錢服三服瘥高祖時寧州貢琥珀枕碎以賜軍士傅金瘡蒲黃方治金瘡中風寒水露腫痛入腹上用蒲黃並舊青布內在小口瓶中燒取煙熏瘡汗出愈虎骨散治金瘡中風痙肢節筋脈拘急虎脛骨酥炙當歸微炒敗龜板酥炙桃仁去皮尖雙仁麩炒乾蠍微炒川芎以上各一兩黑豆五合松脂二兩桂心三分上先將松脂並黑豆炒令熟後和諸藥搗為末每服二錢不拘時溫酒調下豆淋灑治因金瘡中風反強者大豆六合雞矢白一合上炒令大豆焦黑次入雞矢白同炒乘熱瀉於三升酒中密蓋良久濾去滓每服五合如人行五里更一服汗出佳未瘥即更作服之汗出為度服後宜吃熱生薑粥投之塗封方治金瘡中風角弓反張生雞子一枚烏麻油三兩上先將雞子打破與麻油相和煎之稍稠待冷塗封瘡上又方治金瘡中風痙欲死者及諸大脈皆血出多不可止血冷則殺人上用生葛根一斤銼碎以水五升煮取三升去滓每服熱飲一小盞日三四服若干者搗為末每服二錢溫酒調服若口噤不開但多服竹瀝即止葫蘆方治金瘡得風身體痙強口噤不能語或因打破而得及刀斧所傷得風臨死服此並瘥上取未開葫蘆一枚長柄者開其口隨瘡大小開之令瘡大小相當可繞四邊閉塞勿使通氣上覆開一孔取麻子油燭兩條並捻以葫蘆口向下熏之燭盡更續之不過半日即瘥若不止亦可經一二日熏之以瘥為度若燭長不得內葫蘆可中折用之必效酒治金瘡中風角弓反張者上用蒜四破去心頂一升以無灰酒四升煮蒜令極爛並滓每服五合頓服之須臾得汗則瘥豆淋酒治金刃傷破見骨中風口噤上用大豆炒去腥半熟勿使太熟五升粗搗篩蒸一饋頃傾出盆中以酒一斗五升淋之絞去滓每溫服五合至七合日二夜一衣蓋覆微汗出別研生杏仁膏敷於瘡上若腦髓出者難救治金瘡因風水腫上取蠟不以多少熔化入鹽少許滴在瘡上或先以鹽罨瘡上後熔蠟令熱得所灌瘡中亦可艾葉方治金瘡中風掣痛並手足不仁上用艾葉生熟者令揉團得所內瓦甑中塞諸孔獨留一目以通氣熏蒸患處良久身體自知立愈龍骨散治金刃箭傷生肌長肉定痛止血諸瘡斂口龍骨滑石枯礬寒水石乳香沒藥黃丹炒各半分輕粉少許上為細末每用乾摻外用膏藥貼之效金傷散治刀斧傷闢風生肌止痛白芨黃丹陳石灰風化桑白皮各二兩龍骨南星白附子各一兩上為細末每用干貼之完肌散治金瘡陳石灰二兩黃丹半兩龍骨密陀僧桑白皮各四兩麝香一錢另研上為細末乾摻患處生肌膏治金瘡及一切打損瘡胡粉白芍藥薰陸香乾薑炮各一兩油四兩黃蠟二兩上為細末以油蠟相和煎如膏用貼瘡上日二換之劉寄奴散斂金瘡止疼痛上取劉寄奴為末摻患處一方治湯火瘡以劉寄奴為末先以糯米漿雞翎掃傷處後摻藥末在上並不痛亦無痕大凡傷著急用炒鹽末摻之護肉不壞然後藥敷之朱氏集驗方云宋高祖劉裕微時伐狄見大蛇長數丈射之傷明日復至聞有杵臼聲往視之見青衣童子數人於榛中搗藥問其故答曰我王為劉寄奴所射合藥敷之帝曰吾神何不死答曰寄奴王者不死不可殺帝吒之皆散收藥而反每遇瘡敷之良驗寄奴高祖小字也治金瘡生肌肉上生搗薤白以火封之更以為就炙令熱氣徹瘡中干即易之白色者好亦治金瘡中風水腫痛止血收瘡口方上以雞內金焙為末敷之立止蠶蛾散治刀斧傷止血定痛生肌上用晚蠶蛾不以多少為細末每用干貼於瘡口上以綿裹不須再動一上便可定血散治刀斧傷止血定痛生肌密陀僧半斤烏賊魚骨龍骨白礬枯各二兩桑白皮一斤黃丹一兩上為細末每用乾摻患處定血如神綠礬散治竹草刺瘡發腫作疼傷時不曾出血盡被惡毒氣注痛不止夜臥不安初破時其瘡紫赤黑色較時起三五重皮是也綠礬半兩小便燒熱放礬於內候冷取出日乾丹參二錢半麝香一字馬兜鈴根一錢半上為細末漿水洗淨瘡口上敷貼立效又方治被刺入肉或針棘竹木等多日不出疼痛人參一兩龍葵根一把淨洗取皮醋少許蜡月豬脂一兩上為末和搗令勻每用少許敷瘡上其刺自出治手足卒中刺中水毒方韭藍青上搗置瘡上以火炙熱徹即愈又方上嚼豉不以多少塗之良若治狐尿刺人者當看豉中有毛為度如無再敷之治竹刺不出者上爛研蓖麻以絹帛襯傷處然後敷藥時時看覷若覺刺出即拔恐藥太緊並好肉努出也一方不用絹襯牛蒡葉散治一切金木竹所傷上用牛蒡葉惡實是六七月收者風乾炒末每用乾摻不得犯別藥如經暑月蠅蟲下蛆在瘡上或因肌肉生合有成竅子者即用杏仁研成膏手捻作條子入在竅內其蛆蟲自出治刺傷中風水疼腫上用鯉魚目燒灰研敷患處汗出即愈諸魚目皆可用鮧魚目尤佳松脂方治刺入肉疼悶百理不瘥上以松脂敷瘡上以帛裹三五日當有根出不痛不癢不覺自落甚良治針入肉方上刮指甲末同酸棗仁搗爛唾調塗上次日定出一方用酸棗核燒為末服之又方治烏雄雞刺在肉中不出者及治竹木針刺上用烏雞尾翎二七莖燒作灰以乳男子奶汁和封瘡口其刺即出桂蠟丸治惡刺入肉上用桂去粗皮搗為末熔黃蠟丸看病大小置瘡內濕紙三五重搭蓋以火熁候藥丸熔入肉其刺自出如無刺所傷者尤見愈速乳香膏治金瘡杖瘡神效乳香沒藥川芎自然銅以上各七錢當歸羌活獨活川牛膝石膏劉寄奴黑牽牛黃柏皮破故紙白膠香生地黃熟地黃赤芍藥白芍藥紫金皮黃丹白芷以上各五錢黃蠟一兩清油四兩上除膠香丹蠟外余藥為末入油內煎以柳枝不住手攪試將成膏卻入三味更試成膏以生布濾淨以瓦器盛水傾在水中用萆攤開貼瘡孔深者捻成膏條穿成孔中不問淺深放瘡上如作熱加輕粉片腦朴硝入膏內貼之治杖瘡片腦麝香各五分龍骨密陀僧胭脂輕粉乳香沒藥寒水石炒各一錢上為細末乾摻瘡上四邊以生面糊圍定次用緋紅絹帛貼之乳香散治杖瘡腫痛大黃黃連黃柏黃芩以上各三錢乳香另研沒藥另研和一錢片腦少許上為細末研勻冷水調攤緋絹上貼之治杖瘡血竭輕粉干胭脂密陀僧乳香沒藥各等分上研細末先以冷水洗淨拭乾以豬脂調搽紅紙貼之愈龍腦潤肌散治杖瘡熱毒疼痛龍腦一字輕粉一錢半麝香半錢密陀僧二錢黃丹一兩上為細末每用乾摻上用青帛貼之內留一孔生肌桃花散輕粉血竭密陀僧干胭脂各一錢乳香二錢上研細每用乾摻仍以膏藥貼之靈異膏治杖瘡金瘡攧撲皮破湯火傷久年惡瘡川鬱金三兩生地黃二兩粉草一兩臘豬板脂一斤上銼細入脂內煎焦黑色濾去滓入明淨黃蠟四兩熬化攪勻以瓷器貯之水浸久去水收用時先以冷水洗瘡拭乾卻敷藥在瘡上外以白紙貼之止血定疼且無瘢痕湯燙火燒不須水洗治凍瘡尤妙圍藥治腫未破用此消腫定疼無名異炒木耳去土炒大黃炒各等分上為極細末用蜜水調圍四邊腫處松皮散治金刀箭鏃傷用此生肌老松皮一兩石灰二兩礦者以瓦盛之上用瓦蓋灰火四畔上下煉一夜至曉研細上為細末和勻傅之止血收瘡口立效
