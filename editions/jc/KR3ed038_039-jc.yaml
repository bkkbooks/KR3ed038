浸去皮骨炙微黃上為細末煉蜜和搗二三百杵丸如梧桐子大每服三十丸不拘時溫酒送下治腳氣風毒壅盛生瘡腫痛不歇牛蒡子微炒枳殼麩炒檳榔以上各一兩防風去蘆半兩獨活一兩赤芍藥玄參薏苡仁以上各三分烏蛇三兩酒浸去皮骨炙微黃上銼碎每服三錢以水一中盞煎六分去滓不拘時服導氣除濕湯淋渫腳氣內受濕氣不能外達此藥淋渫開導泄越其邪威靈仙防風當歸荊芥穗地骨皮升麻白芍藥蒴藋葉上件等分銼細水二斗煮至一斗五升去滓熱熏洗無時足踏丸治腳氣腫滿痛連骨髓烏頭三兩生去皮臍搗為細末樟腦二兩細研上再研令勻釅醋為丸如彈子大置藥一丸於爐子上中心踏之衣被蓋覆汗出如涎為效熏洗方治腳氣防風半兩蛇床子黃耆各一兩木通一兩半荊芥莽草各二兩上為粗末濃煎湯極滾沸擱腿在桶上熏令通手時即洗之須是露出腳指不可洗鷺鷥藤散淋渫腿膝疼痛鷺鷥藤蘇枋木上件各等分㕮咀入定粉少許每用一兩水五碗煎數沸先熏候通手即洗沉香散治腳氣春夏妨發或肝腎風虛脾氣乏弱但覺昏悶不欲飲食並宜服之沉香黃耆銼牛膝去苗白茯苓白朮以上各三分羌活去蘆防風去蘆酸棗仁微炒羚羊角屑人參去蘆桂心甘草炙以上各半兩木瓜乾者附子炮去皮臍熟地黃訶黎勒皮石斛去根節以上各一兩上銼碎每服四錢水一中盞入生薑半分棗三枚煎至六分去滓不拘時溫服枳殼散治腳氣春夏妨發或稍心腹壅悶腳膝煩疼大便不利小便赤少枳殼麩炒紫蘇莖葉赤茯苓各三分川大黃銼微炒赤芍藥檳榔以上各一兩五加皮羚羊角屑木通獨活黃芩甘草炙以上各半兩上銼碎每服四錢以水一中盞入生薑半分煎至六分去滓食前溫服加味香蘇散治腿腳痠疼足面赤腫步履艱辛濕氣周遊腳腿疼香蘇散煮鷺鷥藤木香芍藥仍加入功效如神喚得應紫蘇散治風毒腳氣腳重虛腫紫蘇桑白皮茴香炒木通以上各一錢半枳殼三錢炒羌活獨活荊芥甘草炙青皮木瓜以上各七分增大腹子一錢二分上㕮咀分作二帖用水二盞生薑三片蔥白一莖煎至八分去滓食遠服桑白皮散治腳氣盛發兩腳浮腫小便赤澀腹脅脹滿氣急坐臥不得桑白皮郁李仁各二錢赤茯苓四錢大腹子防風木香以上各一錢紫蘇子炒木通檳榔青皮以上各一錢半甘草炙半錢上㕮咀分作二帖用水二盅生薑三片煎至一盅食遠服獨活湯治腳氣獨活麻黃去節川芎熟附子牛膝黃耆蜜炙人參生乾薑木香當歸白芍藥白茯苓辣桂杜仲姜炒白朮甘草炙各等分上㕮咀每服三錢水二盅生薑五片棗二枚煎至一盅支滓食前溫服仍吞活血定痛丸活血定痛丸治風濕客於腎經血脈凝滯腰腿重疼不能轉側皮膚不仁遍身麻木上攻頭目虛浮耳內常鳴下注腳膝重痛行步無力亦治項背拘急不得舒暢常服活血脈壯筋骨使氣脈宣流蒼朮六兩炒香附炒杵淨七兩威靈仙一兩陳皮五兩半沒藥一兩別研狗脊燎去毛四兩草烏頭二十四兩炮去皮臍上為細末稀麵糊和丸如梧桐子大每服二十丸空心溫酒熟水任下或用前獨活湯下兼治腎受風冷腳氣痠疼及久痢登廁風冷入於腸胃以致兩腳削小成鼓槌風而痢又不止用此藥主之
