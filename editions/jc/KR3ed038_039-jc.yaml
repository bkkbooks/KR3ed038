屬陰又加寒濕陰益甚矣血氣微冷凝結非至熱不可除今用川椒椒性熱復加以火蒸之自然寒濕去矣信乎處方之效也乳香木瓜丸專治遠年近日腳氣乳香另研血竭另研各等分上和勻用木瓜一個竹刀去皮心批取頂蓋將藥末攪勻將滿卻用批下頂蓋合續以麵裹之約半指厚於砂鍋內煮熟極爛為度連面於石臼內杵如泥丸如梧桐子大每服三十丸漸加至四十丸空心溫酒木瓜湯任下乾物壓之忌動氣生冷濕膩硬物甘鱉散治腳氣連珠甘遂一兩木鱉子去殼一雄一雌各用一個好者上為細末用獖豬腰子二個批開以藥末一錢摻勻紙裹數重火煨熟放溫五更初細嚼米飲湯下如左腳患則用左腰子右腳患則用右腰子藥末只須一錢毗陵有姓馬人鬻酒宿患腎臟風一足發腫如瓠自腰以下鉅細通為一律痛不可忍臥欲轉側用兩人挾持方可動或者用以鈹刀決之予用此藥合以贈服至五更初細嚼米飲下至辰巳間下膿如水晶者數升即時痛止腫退一月尚柱拐而行予再以赤烏散塗貼其膝方愈後十年過毗陵率其子列拜以謝云向腳疾至今不復作積年腎臟風並以失去今健步不苦矣神授方治腳氣神效上用木鱉子每個作兩邊麩炒炒畢切碎再炒用皮紙滲盡油為度每一兩用厚桂一兩同為末用熱酒調服以得醉為度蓋覆得汗即愈一作夢中神授方木瓜丹治腳疼重不能遠行久立常服補腎氣調血脈上用宣州木瓜一個杜木瓜大者亦可用取去穰隔切去蓋子用好艾填在木瓜內須滿實卻用蓋子覆竹籤之飯甑蒸爛次下入羌活一兩獨活二兩附子半兩炮同為末先搗木瓜令爛次下藥末搗成為丸如梧桐子大每服三五十丸食前用溫酒或鹽湯送下烏藥丸治腳氣徹骨痛不能行履者不過三服見效草烏不去皮白芍藥威靈仙北細辛沒藥木鱉子去殼紙捶去油各等分上為細末薄糊為丸如梧桐子大每服七丸至十丸食後臨臥木瓜湯下酒下亦可以身上覺麻痹即是效或未效加至十五丸量虛實不可妄增丸數亦不可於食前服之有草烏頭在其間最忌服藥後食熱物衝動烏頭之毒則昏不知人矣雞鳴散治腳氣第一品藥不問男女皆可服如人感風濕流注腳足痛不可忍用索懸吊叫聲不絕筋脈腫大檳榔七枚陳皮木瓜各一兩吳茱萸二錢生薑連皮桔梗各半兩紫蘇莖葉三錢上為粗末分作八服隔宿用水三大碗慢火煎至碗半去滓再用水二碗煎取一小碗兩次以煎汁相和安頓床頭次日五更分二三服只是冷服冬月略溫亦得服了用餅餌壓下如服不盡留次日漸漸吃亦可服此藥至天明大便當下一碗許黑糞水即是原腎家感寒濕毒氣下來也至早晚前後痛住腫消但即是放遲遲吃物候藥力過此藥不是宣藥並無所忌治腳氣風氣諸惡氣上用鯉魚大者洗去泥開肚以椒末半兩切大蒜三兩顆內魚腹中縫合並和小豆一升煮之臨熟下蘿蔔三五顆如指大切蔥一握煮熟空腹食之並豆等強飽盡食之至夜即泄氣無限三五日更一頓下一切惡氣川膝煎治肝腎虛為風寒濕毒所中流注腿膝歷節疼痛如錐刀鍛刺不可名狀牛膝二兩去蘆懷干烏頭正者十枚捶碎絹袋盛烏豆一斗同蒸一日取出去豆不用去皮尖為妙上不要銅鐵器及火與日見於木臼搗碎牛膝再以石磨中磨為末酒糊和丸如梧桐子大每服四十丸用無灰酒一瓶中樣木瓜一個切作片入瓶中煨木瓜爛為度用此酒下不拘時然肝氣惡鐵忌則有之不見火日此好事者妄忌且如烏頭牛膝採時乃一向陰乾也舒筋丸治寒濕在經絡腰腳腫痛行步艱難當歸酒洗焙赤小豆生用地龍去土炒甜瓜子生用木瓜去皮焙威靈仙去土白膠香另研骨碎補去毛海桐皮去粗皮烏藥草烏頭去皮尖五靈脂炒蕓薹子炒各等分上件為細末酒煮麵糊和丸如梧桐子大每服十五丸至二十丸空心用溫酒或鹽湯送下日進二服御愛忘杖丸治乾溼腳氣古文錢十文醋淬海金沙虎骨酒炙酥肉桂不見火以上各半兩斑蝥去頭足翼乳香另研沒藥另研硃砂研為衣以上各三錢上為細末和勻酒煮糊為丸如綠豆大以硃砂為衣每服七丸空心用麝香酒下三服見效桃花散治濕腳氣及腰腎膀胱宿水並痰飲不下食上用桃花陰乾量取一大升但隨虛滿不須按捺搗為散經羅下之溫清酒和一服令盡通利為度空腹服之須臾當轉可六七行但宿食不消化等物總瀉盡若中間覺飢虛用少許軟飯及糜粥補之極安穩不似轉藥虛人但覺腰腳輕快使人勇躍食味倍佳腳先腫者一宿頓消如囊中貯物傾卻相似又無毒意易將息惟忌葫菜豬肉三月內腹虛大都消慎生冷酸滑五辛酒面及黏食肥膩四五日外諸食復常桑白皮散治腳氣上攻坐臥不得咽喉不利四肢煩疼桑根白皮銼赤茯苓柴胡以上各一兩生乾地黃一兩半天門冬去心赤芍藥貝母煨微黃枳殼麩炒去穰射干白前檳榔百合以上各三分甘草炙半兩上㕮咀每服四錢以水一中盞入生薑半分煎至六分去滓不拘時溫服獨活酒治腰腳屈弱兼頭眩氣滿獨活去蘆石斛去根生薑一方用乾薑白茯苓去皮赤者亦可白朮以上各三兩牛膝丹參側子炮去皮臍萆薢以上各二兩薏苡仁防風去叉桂心去粗皮當歸切焙山茱萸人參天雄炮去皮臍秦艽去土甘菊花川芎以上各一兩半生地黃四兩焙上細銼用絹袋盛內淨瓷甕中以清酒三斗漬之密封春夏五日秋冬七日取開量情飲之日五六服常令酒力不絕如冷加蜀椒一兩去目併合口者炒出汗腳弱痛甚者作散每服三錢酒調下五獸三匱丹治因氣血耗損肝腎不足兩腳痿軟鹿茸酥炙麒麟竭即血竭也虎脛骨解片酥炙牛膝去蘆酒浸狗脊赤草根也燎去毛以上五味各等分修合為末即五獸丹料也辰砂一兩為末附子大者一枚生去皮臍剜旋中心空入辰砂於內宣木瓜一枚剜去心刀薄去皮入上附子於以旋附子末蓋附子口正坐於銀暖罐內重湯蒸十分爛附子白為度即三匱丹也上用三匱丹研成膏調前五獸丹末子為丸如雞頭大以木瓜酒或降氣湯下屢傳貴家多效患不再發若無腳氣隻手腳弱而無力服之尤佳更以分腳氣之要言之風寒濕三毒各隨所喜而入風喜入肝病多在筋濕喜在脾病多在肉寒喜入腎病多在骨推類治之亦思過半矣籲願為良醫力學者當在乎致知致知當在乎格物物不格則知不至若曰以循世俗眾人耳聞目見謂之知君子謂之不知也松葉酒治腳弱十二風痹不能行服更生散數劑及眾治不得力服此一劑便能行遠不過兩劑上用松葉六十斤㕮咀以水四石煮取四斗九升以釀五斗米如常法別煮松葉汁以漬米並饋飯泥釀封頭七日發澄飲之取醉得此力者甚眾神效立效丹治腳緩弱及膝弱甚者紹興府戒珠寺一僧病數十年不能行服此藥而愈亨老亦傳此方上以附子用麵裹煨熟去皮臍搗取蔥自然汁和丸如梧桐子大每服五六十丸空心蔥白煎酒下吃少蒸餅溫粥壓之一方用生附子以蔥涎和丸溫酒鹽湯任下十五丸至二十丸又方治久年腳氣或老年膝疼不能行步者可用局方朮附湯倍加附子加木香一錢用水三盞生薑五片木瓜三片煎取一盞二分去滓送下局方石楠丸五十丸數服立愈或元氣弱者煎前引子送下震靈丹十粒久患腳氣不曾寧膝痛筋寒步履疼朮附木香加倍飲石楠數服有神靈辰砂丹治足掌疼辰砂蠍梢去毒一錢沉香生麝各半錢上研為末用皺皮草烏去皮尖三錢為末一半入藥一半以米醋調煮熟取起和丸如綠豆大每服五十丸空心用溫酒送下五加皮丸治腳氣皮膚不仁發歇不定五加皮銼人參去蘆惡實炒吳茱萸湯洗焙乾官桂去粗皮檳榔銼以上各三分茯苓去皮柏子仁別研川芎以上各一兩杜仲去皮炙銼羌活以上各二兩郁李仁湯浸去皮尖研枳殼去穰麩炒厚朴薑汁製牛膝酒浸切焙以上各一兩半上為細末煉蜜和丸如梧桐子大每服三十丸空心用溫酒送下不飲酒者橘皮湯下沉香丸治風毒腳氣上攻臟腑散入四肢虛腫無力雄黑豆小者一升附子二兩炮去皮臍吳茱萸湯泡焙炒青橘皮湯浸焙各八兩生薑四兩切碎以上五味用葛布袋盛內大鍋中以水一斗煮令水盡焙乾取袋中黑豆曬乾搗羅為末其餘四味不用更入後藥白附子炮巴戟去心肉蓯蓉切焙沉香以上各二兩牛膝銼酒浸焙獨活去蘆海桐皮炙羌活去蘆山芋澤瀉川芎生地黃切焙以上各一兩上除前四味不用外搗為細末拌勻煉蜜和丸如梧桐子大每服二十丸空心溫酒送下近晚再服沉香大腹皮散治腳氣腫滿沉重疼痛筋脈不利此證皆由濕氣鬱滯經絡所致服之宣通經絡使上下無礙血氣和平腿腳輕利為效沉香檳榔烏藥桑白皮炒木通茴香甘草紫蘇子陳皮洗焙白茯苓荊芥穗紫蘇葉以上各一兩連皮大腹子三兩枳殼去穰麩炒半兩乾木瓜去穰二兩半上㕮咀每服五錢水一盞生薑五片蘿蔔五大片同煎至七分去滓食前溫服日進二服十日後日進一服病愈即止如無蘿蔔用蘿蔔子一錢微炒搗碎同煎代之如覺大便乾燥即服加減神功丸甘豆湯治腳腫此乃腳氣黑豆一兩甘草半兩上同煎湯服之郭鎮廷圭知縣云昔年太學士入圍閉中多患腳腫至腹則死前後如此者非一人後即施此方服之皆愈蓋神方也旋覆花丸治風毒腳氣壅熱生痰頭項強痛旋覆花微炒薏苡仁炒地骨皮赤茯苓去黑皮升麻以上各一兩白檳榔煨五枚麥門冬去心焙火麻子仁別研如泥前胡去蘆防風去蘆羌活去蘆馬牙硝別研芍藥以上各一兩半枳殼去穰麩炒羚羊角鎊白蒺藜炒去角黑參以上各三分上為細末入別研藥相和煉蜜為丸如梧桐子大每服二十丸食後用溫漿水送下日二夜一細辛散治腳氣發動心膈痰壅頭痛惡聞食氣宜服之細辛羚羊角鎊旋覆花枳殼去穰麩炒半夏湯泡防風去蘆蔓荊子川芎黃芩甘草炙以上各半兩紫蘇葉檳榔以上各一兩石膏二兩赤茯苓三分上㕮咀每服三錢水一中盞生薑半分煎至六分去滓不拘時溫服立效散療苦腳氣攻心此方甚散腫氣極驗及治一切暴腫檳榔大者七枚生薑二兩橘皮吳茱萸紫蘇木瓜以上各一兩上切碎以水三升煮取一升三合分再服忌如藥法沉香湯治腳氣衝心煩悶氣促腳膝痠疼沉香一兩赤芍藥二兩木通半兩紫蘇莖葉一兩檳榔七錢吳茱萸湯洗焙乾炒一分上㕮咀每服五錢水一盞半入生薑半分切碎煎至八分去滓不拘時溫服杉節湯治腳氣攻心痛悶脹滿不食干杉木節青皮陳皮天台烏藥雞心檳榔半夏制枳殼制宣木瓜赤茯苓縮砂以上各半兩茴香微炒大腹皮紫蘇子微炒蘿蔔子微炒桔梗丁香甘草炙以上各一分上銼碎每服三錢水一盞半生薑五片煎至八分去滓不拘時溫服高良薑丸治腳氣心腹脹滿兩膝疼痛高良薑威靈仙當歸檳榔羌活以上各三分陳皮去白桂心以上各半兩蘿蔔子微炒牽牛微炒各二兩上為細末煉蜜和搗二三百杵丸如梧桐子大每服三十丸不拘時用溫酒送下以利為度松節湯治腳氣入腹心腹脹急煩躁腫痛松節銼碎炒黃桑根白皮紫蘇葉以上各一兩檳榔三分甘草炙半兩上銼碎每服三錢水一盞入燈心二十莖生薑三片童子小便三分同煎至七分去滓食前溫服日二服吳茱萸湯許仁則曰此病有數種有飲氣下流以成腳氣飲氣即水氣之漸亦有腎氣先虛暑月承熱以冷水洗腳濕氣不散亦成腳氣亦有腎氣既虛諸事不節有因居卑濕濕氣上衝亦成腳氣此諸腳氣皆令人腳脛大腳趺踵重悶甚則上衝心腹滿悶短氣中間有乾溼二腳氣濕者腳腫乾者腳不腫漸覺枯燥皮膚甲錯須細察之若先覺脅肋心腹刺痛胸背滿悶吃食之後此狀彌加時時氣短手