body:
  text: 卷之三十九腳氣門附論夫腳氣者有南北之分孫真人云凡四時之中皆不得久坐久立濕冷之地亦不得因酒醉而為脫衣跣足當風取涼皆成腳氣若暑月久坐久立濕冷之地者則濕冷之氣蒸人經絡病發必熱而四肢痠疼煩悶若寒月久坐久立濕冷地者則濕冷之氣上入經絡病發則四肢皆為轉筋世有勤工學之士久坐久立於濕地冷風來入經絡不覺成病也內經曰當風取涼醉以入房能成此疾也東垣云千金外臺總錄所錄皆系南方卑濕霧露所聚之地其民腠理疏陽氣不能外固因而履之則清濕襲虛病起於下此由血氣衰弱受清濕之邪氣與血並行膚腠邪氣盛正氣少故血氣澀澀則痹虛則弱故令痹弱也後人名曰腳氣針經云有道以來有道以去治之多以艾焫為佳以導引濕氣出外及飲醪醴以通經散邪所制之方寒藥少熱藥多用麻黃川烏姜附之屬內經云濕淫於內以苦發之麻黃苦溫發散者也川烏辛熱走而不能守通行經絡姜附辛甘大熱助陽退陰亦散清熱之邪又察足之三陰三陽是何經絡所起以引用藥為主治復審六氣何氣客之治以佐使之藥醫學發明曰異法方宜論云北方者其地高陵居風寒冰冽其俗飲湩酪而肉食凡飲湩酪者以飲多速飲為能經曰因而大飲則氣逆又云食入於陰行氣為陽乃反陰道是為逆也夫乳酪醇酒者濕熱之物飲之屬也加以奉養太過亦滋其濕水性潤下氣不能煦故下注於足脛積久而成腫滿疼痛此飲食下流之所致也通評虛實論曰谷入多而氣少濕居下也況湩酪醇酒之濕熱蓄於谷者也至真要大論云太陰之勝火氣內菀流散於外足脛胕腫飲發於中胕腫於下此之謂也故飲入於胃遊溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸膀胱水精四布五經並行合於四時五臟陰陽揆度以為常也若飲食自倍脾胃乃傷則胃氣不能施行脾氣不能四布故下流乘其肝腎濕流於足脛加之房事不節陽虛陰盛遂成腳氣孫真人云古人少有此疾自永嘉南渡衣冠之人多有之亦此意也東垣云夫腳氣之疾實水濕之所為也蓋濕之害人皮肉筋脈而屬於下然亦有二焉一則自外而感一則自內而致南方之疾自外而感者也北方之疾自內而致者也其治法自應不同故諸公詳析而論之嚴氏曰古無腳氣之說內經名厥兩漢名緩風後謂之腳氣名雖不同其實一也初得不覺因他病乃始發或奄然大悶經三兩日方覺之先從腳起或緩弱疼痹或行起忽倒或兩脛腫滿或足膝枯細或心中忪悸或小腹不仁或舉體轉筋或見食吐逆惡聞食氣或胸滿氣急或遍體痠疼此其候之不同也其脈浮而弦者起於風濡而弱者起於濕洪而數者起於熱遲而澀者起於寒凡此皆由腎虛而生然婦人亦病腳氣者必因血海虛乘七情遂成斯疾且婦人病此者眾皆因血海虛而得之與男子腎虛相類矣男女用藥固無異但兼以治憂恚之藥無不效也須量人盛衰微加滋補不然則氣血日衰必使年年遇蒸熱而作理之必然陳無擇曰腳氣不專主一氣亦不專在一經故與中風寒暑濕為異耳兼有所雜生諸病未易分別須尋三陰三陽病所在後察脈虛實為治發明曰內經論南方者其地下水土弱霧露之所聚也江東嶺南大率如此春夏之交山川蒸菀風濕毒氣為甚感之遂成瘴毒腳氣外臺秘要云第一忌嗔嗔則心煩煩則腳氣發又禁大語大語則傷肺肺傷亦發動又不得露足當風冷水洗足雖夏月常須閉護慎之慎之發明曰第一凡酒及湩酪勿使過度過度則損傷脾胃下注於足脛胕腫遂成腳氣第一欲不可縱嗜欲則腳氣發凡飲食之後宜緩行經云逸者行之又云病在脾忌溫食飽食濕地濡衣楊大受云腳氣之疾自古皆當疏下為疾壅故也然不可太過則損傷脾胃使營運之氣不能上行反下注為腳氣也又不可不及不及則使氣壅不得消散立方於後詳虛實而用之羌活導滯湯導水丸除濕丹此藥如腳氣在表在氣血之分而疏下隨宜而用之活人書云凡腳氣服補藥及用湯渫洗者皆醫之大禁也楊大受云腳氣是為壅疾當以宣通之劑使氣不能成壅也壅既成而盛者砭惡血而去其重勢經曰蓄則腫熱砭射之也夫前代各人所論其腳氣所感不一有在表而得之有在氣血之分而得之或從風寒暑濕得之或因虛實而得之在乎醫者診視果決而治之腳氣通治方羌活導滯湯治腳氣初發一身盡疼或肢節腫痛便溺阻隔先用此藥導之後用當歸拈痛湯羌活獨活當歸以上各二錢防己一錢半大黃四錢枳實炒一錢上作一服水二盅煎至一盅食前服神秘左經湯治風寒暑濕流注足三陽經手足拘攣疼痛行步艱難增寒發熱自汗惡風頭眩腰重關節掣痛大小便秘澀或腹痛嘔吐下利兩腿頑麻並皆治之麻黃去節乾葛細辛厚朴去粗皮薑製炒茯苓去皮防己羌活枳殼去穰麩炒防風去蘆麥門冬去心黃芩以上各一錢肉桂去皮柴胡去蘆半夏湯泡小草白姜炮甘草炙以上各五分上作一服水二盅生薑三片紅棗一枚煎至一盅空心服自汗加牡蠣白朮去麻黃腫滿加澤瀉木通熱甚無汗加乾葛橘皮前胡腹痛吐利去黃芩加芍藥及炮附子大便秘加大黃竹瀝喘滿加杏仁桑白皮紫蘇凡有此病參詳逐一加減無不愈者加味敗毒散治三陽經腳氣流注腳踝上焮熱赤腫寒熱如瘧自汗惡風或無汗惡寒羌活獨活柴胡去蘆前胡去蘆枳殼去穰麩炒桔梗去蘆人參去蘆茯苓去皮川芎甘草炙以上各一錢蒼朮米泔水浸炒大黃蒸各二錢上作一服水二盅生薑五片煎至一盅食前服皮膚搔癢赤疹加蟬蛻煎服五積散治風濕流注兩腳痠疼方見寒門檳蘇散治風濕腳氣疼痛疏通氣道檳榔木瓜各一錢香附子紫蘇各三錢陳皮甘草各一錢上作一服水二盅生薑五片蔥白二根煎至一盅食前服大黃左經湯治風寒暑濕流注足陽明經使腰腳赤腫痛不可行大小便秘惡聞食氣喘滿自汗大黃蒸細辛去蘆茯苓杏仁去皮尖另研羌活前胡黃芩枳殼去穰麩炒厚朴薑製炒甘草炙各一錢六分上作一服水二盅生薑五片棗二枚煎至一盅空心服腹痛加芍藥喘急加桑白皮紫蘇小便秘加澤瀉四肢瘡癢加升麻並各等分烏藥平氣湯治腳氣上攻頭目昏眩腳膝痠疼行步艱苦氣不和喘滿迫促並皆治之烏藥茯神去皮木白芷當歸去蘆白朮五味子川芎紫蘇子人參去蘆乾木瓜甘草炙各一錢上作一服水二盅生薑五片紅棗二枚煎至一盅食前服木通散治腳氣小便不通淋閉脹滿木通當歸梔子仁赤芍藥赤茯苓甘草生用各二錢上作一服水二盅煎至一盅食前服檳榔湯治一切腳痛檳榔香附子去毛陳皮去白紫蘇葉木瓜去穰五加皮甘草炙各二錢上作一服水二盅生薑三片煎至一盅食前服婦人腳氣多由血虛加當歸一錢室女腳痛多由血實加芍藥一錢半如大便秘結虛弱者加枳實壯盛者加大黃麻黃左經湯治風寒暑濕流注足太陽經腰腳攣痹關節重痛增寒發熱無汗惡寒或自汗惡風頭疼眩暈麻黃乾葛茯苓蒼朮米泔水浸防己羌活防風桂心不見火細辛甘草炙各一錢二分上作一服水二盅生薑三片紅棗一枚煎至一盅空心服自汗去麻黃加肉桂芍藥重者加白朮陳皮無汗減桂加杏仁澤瀉等分半夏左經湯治足少陽經為風寒暑濕流注發熱腰腳疼痛嘔吐不食半夏湯泡乾葛細辛麥門冬去心桂心去皮白朮茯苓乾薑炮防風黃芩柴胡甘草炙各一錢上作一服水二盅生薑三片紅棗一枚煎至一盅空心服熱悶加竹瀝喘急加杏仁桑白皮當歸拈痛湯治濕熱為病肢節煩疼肩背沉重胸膈不利及遍身疼痛下注足脛腫痛不可忍方見腰痛門神烏丸治遠年近日乾濕腳氣川烏炮去皮臍切作片炒令色變虎脛骨酥炙海桐皮川萆薢各一兩川牛膝去蘆酒浸肉蓯蓉酒浸各一兩半金毛狗脊燎去毛半兩上為細末用木瓜膏子和丸如梧桐子大每服七十丸空心用溫酒送下獨活寄生湯治腎經虛弱坐臥當風著濕所得腰痛若不速治流入腳膝乃為偏枯冷痹緩弱重疼或腰攣疼痛腳重濕痹並宜服之方見腰痛門四蒸木瓜丸治肝腎脾三經氣虛為風寒暑濕相搏流注經絡治療不痊凡遇六化更變七情不寧必至發動或腫滿或頑痹增寒壯熱嘔吐自汗黃耆與續斷同入蒼朮與橘皮同入威靈仙去土與苦葶藶同入烏藥去木與黃松節同入各半兩上以大木瓜四個切蓋去穰入前件藥仍以蓋簪定酒灑蒸熟三蒸三曬取藥出焙乾為末碾木瓜為膏搜和搗千杵和丸如梧桐子大每服五十丸空心溫酒鹽湯任下世傳木瓜丸最多惟此有效當敬之黃松節即茯苓中木十全丹治腳氣上攻心腎相擊足心隱痛小腹不仁煩渴小便或秘或利關節攣痹疼痛神效不可盡述肉蓯蓉酒浸狗脊燎去毛萆薢茯苓去皮牛膝酒浸遠志去心炒地膚子石斛以上各一兩熟地黃酒浸焙乾杜仲去皮銼炒各三兩上為細末煉蜜和丸如梧桐子大每服五十丸食前用溫酒鹽湯任下八味丸治少陰腎經腳氣入腹小腹不仁上氣喘急嘔吐自汗此證最急以腎乘心水剋火之證方見諸虛門神應養真丹治厥陰經為四氣進襲肝臟左癱右瘓涎潮昏塞半身不遂手足頑麻語言謇澀頭旋目眩牙關緊急氣喘自汗心神恍惚肢體緩弱上攻頭目下注腳膝榮衛凝滯遍身疼痛兼治婦人產後中風角弓反張墮車落馬打撲傷損瘀血在內並宜服之當歸酒浸天麻川芎白芍藥羌活熟地黃各等分上為細末煉蜜和丸如雞子黃大每服一丸木瓜菟絲子浸酒下腳痹薏苡仁浸酒下中風溫酒米湯下一方無羌活有木瓜炒阿膠紫蘇子湯治腳氣虛弱上攻陰陽交錯清濁不分上實下虛中滿喘急嘔吐自汗紫蘇子炒半夏湯洗前胡厚朴去皮薑製炒當歸甘草炙以上各二錢桂心不見火桔梗各一錢半上作一服水二盅生薑七片紅棗二枚煎至一盅食前服虛甚者加炮附子黃耆各一錢秘方換腿丸治腎經虛弱下注腳膝或當風取涼冷氣所乘沉重少力移步遲緩筋脈攣痛不能屈伸腳心隱痛有妨履地大治乾溼腳氣赤腫痛楚發作無時呻吟難忍氣滿喘促舉動艱難面色黧黑傳送秘澀並皆治之薏苡仁石楠葉肉桂天麻去苗當歸附子炮去皮臍羌活防風去蘆天南星湯泡石斛去根萆薢炙川牛膝酒浸黃耆續斷以上各一兩檳榔半兩蒼朮米泔浸一兩半乾木瓜四兩上為細末麵糊和丸如梧桐子大每服三十丸至五十丸空心用溫酒或木瓜湯送下日二三服常服舒筋輕足永無腳氣之患木瓜牛膝丸治寒濕腳氣冷濕下注腳弱無力及腎經虛弱腰膝沉重腿腳腫急筋攣或時疼痛步履艱難大小便不利日見倦乏木瓜川牛膝去蘆酒浸當歸去尾石楠藤烏藥肉蓯蓉酒浸焙乾杏仁去皮尖熟地黃陳皮去白黑牽牛炒續斷去蘆赤芍藥各等分上為細末酒糊為丸如梧桐子大每服三十丸空心用木瓜煎湯送下鹽湯亦可未效用羌活木瓜酒浸或加牛膝同浸溫暖一盞許送下蒼朮散治一切風寒濕熱令足膝痛或赤腫骨間作熱痛及腰膝臀髀大骨疼痛令人痿躄一切腳氣百用百效蒼朮用米泔浸一日夜鹽炒黃柏去粗皮酒浸一日夜炙焦各四兩上銼碎每服一兩水二盅煎至一盅食前服日進二三服透骨丹專治腳氣川烏炮羌活沉香乳香另研川芎檳榔木瓜以上各一兩木香一兩半白茯苓去皮二兩上為細末麵糊和丸如梧桐子大每服六十丸食前用生薑湯送下活絡丹治諸般風邪濕毒之氣停滯經絡流注腳間筋攣腰腳沉重或發赤腫以及腳筋吊痛上衝心腹一切痛風走注並皆治之川烏炮去皮臍六兩草烏去皮地龍去土乳香另研沒藥另研南星炮各二兩二錢上為細末入另研藥和勻酒糊為丸如梧桐子大每服