body:
  text: 卷之四十二積聚門附論針經云夫積者蓋厥氣生足悗悗生脛寒脛寒則血脈凝澀凝澀則寒氣上入於腸胃入於腸胃則䐜脹䐜脹則腸外之汁沫迫聚不得散日以成積卒然多飲食則腸滿起居不節用力過度則絡脈傷陽絡傷則血外溢血外溢則衄血陰絡傷則血內溢血內溢則後血腸胃之絡傷則血溢於腸外有寒汁沫與血相搏則併合凝聚不得散而成積矣或外中於寒內傷於憂怒則氣上逆則六輸不通溫氣不行凝血蘊里不散津液凝澀滲著而不去而成積矣且如見於五臟者各有名焉肝之積曰肥氣以季夏戊己日得之何以言之肺病傳於肝肝當傳脾脾季夏適王王者不受邪肝復欲還肺肺不肯受故留結為積故謂之肥氣以季夏戊己日得之心之積名曰伏梁脾之積名曰痞氣肺之積名曰息賁腎之積名曰奔豚此其五積之名積者陰氣也聚者陽氣也故陰沉而伏陽浮而動氣之所積名曰積氣之所聚名曰聚故積者五臟所生聚者六腑所成其始發者有常處其痛不離其部上下有所終始左右有所窮處聚者陽氣也其始發無根本上下無所留止其痛無常處謂之聚故以是別知積聚也又有七症八瘕又有石瘕腸覃陳無擇論癥瘕屬肝部積聚屬肺部夫症者證也瘕者假也假物而成形然有七症八瘕之名經論亦不詳出雖有蛟蛇鱉肉發蝨米等七證初非定名偶因食物相感而致患爾若婦人癥瘕則由內外不內外因動傷五臟氣血而成古人謂為痼疾以蛟蛇等為生瘕然亦不必泥此並屬血病蛇發等事皆出偶成但飲食間誤中之留聚假血而成自有活性亦猶永徽中僧病噎者腹中有一物其狀如魚即生瘕也又有石瘕歧伯曰石瘕生於胞中寒氣客於子門子門閉塞惡血當瀉不瀉壞血留止日以益大狀如懷子月事不以時下皆生於女子可導而下寶鑑曰夫膀胱為津液之府氣化則能出矣今寒客於子門則必氣塞不通血壅不流而壞血以止之結硬如石是名石瘕也此氣先病而血後病故月事不來則可宣導而下出者也故難經云任之為病其內苦結男子為七疝女子為瘕聚此之謂也非大辛之藥不能已又有腸覃歧伯曰此病寒氣客於腸外與胃相搏不得榮養因有所繫瘕而內著惡氣乃起息肉乃生其始生者大如雞卵稍以益大至其成如懷子之狀久者離歲按之則堅推之則移月事以時下此其候也夫腸者大腸也覃者延也大腸以傳道為事乃肺之府肺主衛衛為氣氣者炅則泄寒則凝令寒氣客於大腸故衛氣不榮有所繫止而結瘕在內貼著其延久不已是名腸覃也氣散則清氣聚則濁結為瘕聚所以惡氣乃起息肉乃生小漸益大至期而鼓其腹則如懷子狀也此氣病而血未病故月事不斷以時下此非妊娠在乎脈辨原病式曰症者腹中堅硬按之應手謂之症也聖惠方謂症猶證也然水體柔順而今反堅硬如地者亢則害承乃制也瘕者腹雖硬而忽聚忽散無有常准故聖惠方云瘕猶假也以其病瘕未及症也經曰血不流而寒薄故血肉凝而成瘕也腹內結痛也經曰小腸移熱於大腸為虙瘕謂小腸熱移入大腸兩熱相搏則血溢而為虙瘕血澀不利則月事沉滯而不行故云虙瘕為沉虙與伏同若瘕為疝誤矣然則瘕病亦有熱者或陽氣鬱結怫熱壅滯而堅硬不消者非寒症瘕也以脈別之王氏謂脈沉伏者症也快堅者瘕也故難經乃言五積為病且如肝之積曰肥氣在左脅下如覆杯久不已令人發咳逆痎瘧連歲不已心之積曰伏梁起臍上大如臂上至心下久不已令人病煩心脾之積曰痞氣在胃脘覆大如盤久不已令人四肢不收發黃疸飲食不為肌膚肺之積曰息賁在右脅下如覆杯久不已令人灑淅寒熱喘嗽發肺癰腎之積曰奔豚發於小腹上至心下若豚狀或上或下無時久不已令人喘逆骨痿少氣此五積之狀各隨五臟之經發病故不同也東垣云且積之為病或因暴怒七情之氣或六淫之邪其初甚微導引去之可也留而不去遂成五積治當五郁之法經言積之生於陰者蓋憂思傷心重寒傷肺忿怒傷肝醉以入房汗出當風傷脾用力過度若入房汗出浴則傷腎積之所成由自來矣有言積聚有言癥瘕有言痃癖雖名異而病同東垣先生隨經用藥制立五方治五積各有所主論當察其所痛以知其應有餘不足可補則補可瀉則瀉無逆天時詳臟腑高下如寒者熱之結者散之客者除之留者行之堅者削之消者安之摩者咸而軟以苦瀉之全真氣節飲食慎起居和其中外可使畢已若以大毒之劑攻之積不能除反傷真氣終難治矣許學士解其要略大抵治積以所惡者攻之以所喜者誘之則愈且如硇砂阿魏治肉積葛根麥蘖治酒積木香檳榔治氣積桃仁紅花治血積南星半夏治痰積牽牛甘遂治水積三稜莪朮治癖積礞石巴豆治食積雄黃膩粉治涎積各從其類而對證治之若用群啄之藥分其勢則難取效須是認得分明是何積聚兼見何證然後增加佐使之藥不爾反有所損要在臨時消息也脈經曰脈來細而附骨者積也寸口積在胸中微出寸口積在喉中關上積在臍旁上關下積在心下微下關積在少腹尺中積在氣街脈出在右積在右脈出在左積在左脈兩出積在中央各以其部處之脈來小沉而實者胃中有積聚不食食即吐肺積脈浮而毛按之辟易心積脈沉而芤上下無常處肝積脈弦而細腎積脈沉而急脈沉重而中散者因寒食成症脈左轉而沉重者氣症在胃中右轉出不至寸口者肉有肉症也潔古云養正積自除譬如滿座皆君子縱有一小人自無容地而出今其真氣實胃氣強積自消矣潔古之言豈欺我哉內經曰大積大聚衰其大半而止滿實中有積氣大毒之劑尚不可過況虛中有積者乎此乃治積之一端也邪正虛實宜詳審焉此皆古人論脈病證治實後人之龜監為醫者能體古人之心為心治證無不效矣積聚通治方散聚湯治久氣積聚狀如癥瘕隨氣上下發作有時心腹絞痛攻刺腰脅小腹䐜脹大小便不利半夏湯泡七次檳榔當歸杏仁湯泡去皮尖麩炒附子炮去皮臍陳皮茯苓去皮枳殼去穰麩炒厚朴薑製桂心川芎吳茱萸湯泡甘草炙各一錢上作一服用水二盅生薑三片煎至一盅食遠服大便不利加大黃息賁湯治肺積在右脅下大如覆杯久不愈病洒洒熱氣逆喘咳發為肺癰其脈浮而毛半夏湯泡桂心人參去蘆吳茱萸湯泡桑白皮炙葶藶甘草炙各一錢半上作一服用水二盅生薑五片紅棗二枚煎一盅食前服奔豚湯治腎積發於小腹上至心如豚奔走之狀上下無時久不愈病喘逆骨痿少氣其脈沉而滑甘李根皮焙乾葛川芎當歸白芍藥黃芩甘草炙各一錢半半夏湯泡七次二錢上作一服用水二盅生薑五片煎至一盅食前服枳殼散治五種積氣三焦痞塞胸膈滿悶嘔吐痰逆口苦吞酸常服順氣寬中除痃癖消積聚枳殼麩炒益智陳皮京三稜莪朮檳榔肉桂以上各一錢肉豆蔻厚朴青皮木香乾薑甘草炙各半錢上作一服水二盅生薑三片紅棗二枚煎一盅不拘時服大七氣湯治五積六聚狀如癥瘕隨氣上下發作有時心腹疼痛上氣窒塞小腹脹滿大小便不利益智陳皮去白莪朮京三稜青皮去白桔梗去蘆香附炒去毛藿香葉肉桂以上各一錢半甘草炙一錢上作一服用水二盅生薑三片煎至一盅食前服廣茂潰堅湯治中滿腹脹內有積塊堅硬如石令人坐臥不能大小便澀滯上氣喘促面色萎黃通身虛腫方見脹滿門木香化滯湯治因憂氣食濕面結於中脘腹皮微痛心下痞滿不思飲食食之不散常常痞氣木香柴胡橘皮草豆蔻以上各一錢半當歸枳實麩炒各一錢半夏湯泡二錢紅花甘草炙各半錢上作一服用水二盅生薑三片煎至一盅食遠服溫白丸治心腹積聚癥瘕積塊大如杯碗心脅脹滿如有所礙十種水腫痞塞翻胃吐逆並皆治之皂角去皮弦子炙巴豆去皮心膜出油厚朴去粗皮薑製炒吳茱萸湯泡炒紫菀去葉土各半兩茯苓去皮人參去蘆蜀椒去目及合口者炒出汗肉桂去粗皮乾薑炮柴胡去蘆桔梗去蘆菖蒲各一兩川烏炮去皮臍二兩半上為細末入巴豆再研令勻煉蜜和丸如梧桐子大每服五丸食前生薑湯送下勝紅丸治脾積氣滯胸膈滿悶肚腹疼痛氣促不安嘔吐清水丈夫酒積婦人血積小兒食積並皆治之青皮陳皮三稜醋煮莪朮醋煮乾薑炮良薑以上各一兩香附炒去毛二兩上為細末醋糊為丸如梧桐子大每服五十丸食前用生薑湯送下一方用蘿蔔子一兩炒香稜丸治五積破痰癖消症塊散積聚木香不見火丁香不見火青皮去白川楝子炒茴香炒以上各半兩三稜炮銼酒浸一宿枳殼去穰麩炒各一兩莪朮一兩用去殼巴豆三十粒同炒巴豆黃色去巴豆不用上為細末醋煮麵糊為丸如梧桐子大以硃砂末為衣每服五十丸不拘時用炒生薑鹽湯送下溫酒亦可妙應丸治老人虛入一切虛寒痃癖積塊攻脹疼痛黑附子二枚各重七錢去皮臍剜作罐子硇砂三錢用水一盞化在盆中火上熬干秤木香七錢半不見火破故紙炒蓽茇各一兩上將飛過硇砂末入在附子罐內仍用附子末蓋口用面和成裹約半指厚以慢炭火內煨令黃色去面同木香等藥為細末卻將原裹附子熟面為細末醋調煮糊為丸如綠豆大每服十五丸至二十丸食後用生薑湯送下肥氣丸治肝之積在左脅下如覆杯有頭足如龜鱉狀久不愈發咳逆嘔其脈弦而細當歸頭蒼朮各一兩半青皮一兩炒蛇含石醋煅淬七錢半三稜莪朮鐵孕粉各三兩與三稜莪朮同入醋煮一伏時久上為細末醋煮米糊為丸如綠豆大每服四十丸用當歸浸酒下食遠服伏梁丸治心積起臍上至心大如臂久不已病煩心身體髀股皆腫環臍而痛其脈沉而芤茯苓去皮厚朴去皮薑製炒人參去蘆枳殼去穰麩炒三稜煨半夏湯泡七次白朮各等分上為細末麵糊和丸如梧桐子大每服五十丸食遠用米飲湯送下化氣湯治息積癖於腹脅之下偏脹膨滿不妨飲食諸藥不能取及治心脾疼痛嘔吐酸水丈夫小腸氣婦人血氣痛方見氣門痞氣丸治脾積在胃脘覆大如盤久不愈病四肢不仁黃疸飲食不為肌膚心痛徹背背痛徹心其脈浮大而長赤石脂火煅醋淬川椒炒出汗乾薑炮以上各二兩桂心附子炮各半兩大烏頭炮去皮臍二錢半上為細末煉蜜和丸如梧桐子大以硃砂為衣每服五十丸食遠用米湯送下積氣丹治一切新久沉積氣塊面黃羸瘦癥瘕積聚口吐酸水並皆治之孕婦勿服檳榔二個芫花三稜樟柳根牛膝黃連廣茂以上各一兩白牽牛大戟大黃甘遂青礞石乾薑乾漆以上各半兩硇砂一錢肉豆蔻二個巴豆生木香各二錢半青皮石菖蒲陳皮以上各三錢上為細末醋糊為丸如梧桐子大每服一丸臨臥用紅棗煎湯送下有積者肚內作聲病退為度木香通氣丸治痃癖氣滯心腹痞滿嘔逆咳嗽此藥順氣消痰進飲食散痞氣木香人參各一兩半陳皮黑牽牛各六兩檳榔丁香各半兩三稜炮廣朮炮各三兩木通半夏薑製炒茴香炒神麯麥蘖青皮以上各二兩延胡索一兩上為細末米糊為丸如小豆大每服三四十丸食後生薑湯送下日進二服天南星丸去酒積酒毒南星一斤端正者淨洗先於淨地上掘窟闊五寸深一尺五寸取土用剛炭於窟中簇燒過半除火灰令淨以煮酒一斗澆之將南星置其中覆以瓦盆用所掘土泥盆封縫勿令透氣一宿來早取出用酒並水各二升和冼淨切作片子焙乾研為細末硃砂一兩細研水飛過上研勻用生薑汁煮糊和丸如梧桐子大以硃砂為衣每服五十丸至百丸不拘時生薑湯送下妙功丸專治榮衛失調將理飲食不節冷熱所傷或飲醉酒狂陽流蕩強為傷損或大飽暴怒傷氣或憂驚而氣結不升或悲痛而氣消不聚或鬱結而氣不散或傷重而力不生或乘喜而氣散不斂七情所感眾事冗繁起居失常動勞不一四時乖戾觸冒天地之司氣留積於榮衛之中冒值風寒濕氣凝滯經絡之間或五臟中各生蓄積之恙或六腑中各長留結之聚或生癥瘕癖塊或留聚而為腫為癰瘡瘍疥癬風痹痿厥及黃疸水濕蠱毒鼓脹等疾功效不可具述大黃滑石各四兩黃連鬱金莪朮檳榔黃芩以上各一兩黑牽牛末八兩輕粉硇砂煅各二錢川芎二兩白豆蔻三錢沉香木香各半兩粉霜半錢或一錢上除輕粉硇砂粉霜別研外為細末和勻滴水為丸或稀糊和丸如梧桐子大量虛實加減丸數食遠白湯送下磨積丸治腸胃虛寒氣癖流於兩脅氣逆喘急久則榮衛凝滯潰為癰膿多致不救胡椒一百五十粒木香不見火二錢半全蠍去毒十個上為細末粟米飲為丸如綠豆大每服三十丸食遠用橘皮湯送下二香化積丸治諸食積丁香木香各一錢胡椒大者五十粒大烏梅八個去核炒巴豆十六個微去油青皮陳皮砂仁各半兩上為細末用米醋煮糊為丸如綠豆大每服九丸食前用生薑湯送下化鐵丹治氣塊等疾香附子四兩去毛通銼碎用巴豆三十粒去殼膜研細用熟水化開巴豆泥同煨香附透春三夏一秋五冬十取出用水洗曬乾只用一半香附卻用後藥杏仁去皮尖高良薑多年壁土炒三稜醋煮莪朮醋煮半夏醋煮青皮去白陳皮各一兩丁香半兩肉豆蔻麵裹煨半兩上為細末醋煮糊為丸如梧桐子大每服二三十丸空心用生薑湯送下消痞丸治心下痞滿及積年久不愈者薑黃白朮各一兩枳實炒半兩半夏洗人參橘皮以上各四錢黃連黃芩各六錢縮砂澤瀉厚朴以上各三錢豬苓二錢半神麯炒乾生薑甘草炙各二錢上為細末湯浸蒸餅為丸如梧桐子大每服七八十丸至百丸食前用白湯送下荊蓬煎丸治癥瘕痃癖冷熱積聚宿食不消嘔吐辛酸久服消積聚進飲食止嘔吐京三稜酒浸三日莪朮醋浸銼碎用去皮巴豆二十粒於銀石器內炒黃色去豆不用木香枳殼麩炒茴香一方此中入巴豆二十一粒同炒黃去豆不用青皮檳榔各一兩上為細末生薑汁煮糊為丸如梧桐子大每服五十丸食後用溫水送下生薑湯下亦可雞爪三稜丸治五臟痃癖氣塊雞爪三稜石三稜京三稜木香青皮陳皮以上各半兩肉豆蔻檳榔各一兩硇砂七錢半上為細末生薑汁煮麵糊為丸如梧桐子大每服二三十丸生薑湯送下三稜煎丸消癥瘕積聚化痰飲寬中順氣治心腹堅脹脅下緊硬喘滿短氣不進飲食大便或泄或閉京三稜生銼另為末以酒三升石器內熬膏神麯炒蘿蔔子微炒麥蘖炒硇砂飛煎如鹽研青皮去白乾漆炒以上各二兩杏仁去皮尖一兩上為細末以三稜膏和丸如梧桐子大每服十五丸至二十丸食前米飲下加阿魏半兩名阿魏丸晞露丸治寒傷於內氣凝不流結於腸外久為癥瘕時作疼痛腰不得伸乃腸覃結瘕之候京三稜蓬莪朮二味各一兩並用酒浸入巴豆二十粒同炒黃乾漆炒去煙川烏炮各半兩硇砂四錢另研輕粉一錢另研茴香鹽炒青皮去白雄黃另研穿山甲炮以上各二錢麝香五分另研上為細末研勻生薑汁煮麵糊和丸如梧桐子大每服二十丸生薑湯送下溫酒下亦可保安丸治症積心腹內結如拳漸上搶心痛及繞臍腹痛不可忍大黃三兩新汲水浸一宿蒸熟切作片焙乾乾薑一兩炮大附子半兩去皮臍鱉甲一兩半用醋煮一伏時炙黃上為細末用三年米醋一升先煮去四五合後和藥丸如梧桐子大每服二十丸空心醋湯溫酒米湯皆可送下取下積如魚腸爛肉膿血青泥是效三聖丸治積年癥瘕癖塊諸藥不瘥者用此至效舶上硫黃水銀各五錢硇砂二錢半上三味於乳缽內研如粉卻以生鐵銚內文武火溶成汁以火箸攪令勻停冷刀劃下以紙裹置地坑內一宿取出復研細次以赤芍藥當歸莪朮紅花京三稜各二錢半並細銼以好酒一升煎至一半漉出砂盆內研生布濾取汁再熬放冷入飛羅白麵煮糊為丸如綠豆大消磨癖塊空心溫酒吞下三丸至五丸婦人產後傷於飲食結伏腹脅間時發疼痛當歸浸酒下七丸至十丸軟金丸治血積食積及治婦人心胸腹臍急痛或淋秘產後經病刺痛乾血氣勞往來寒熱夜多盜汗當歸五錢焙乾漆炒去煙盡巴豆去油各二錢斑蝥去頭翅炒硇砂輕粉附子各一錢上研為末研棗肉膏旋丸如小豆大每服一丸空心用新水送下麴櫱丸治酒積癖不消心腹脹滿噫酸啘逆不食脅肋疼痛神麯炒麥蘖炒各一兩黃連半兩銼同巴豆三粒炒黃去豆上為細末沸湯搜和丸如梧桐子大每服五十丸食前用生薑湯送下酒症丸治飲酒過度頭旋噁心嘔吐酒停遇酒即吐久而成癖者宜服雄黃如皂角子大巴豆不去油皮蠍梢各十五個同研入白麵五兩半上研細水和丸如豌豆大候稍干入麩炒香將一丸放水中浮即去麩每服二丸溫酒下茶下亦可狀元丸治膈氣酒積涎嗽腹滿吐逆方見膈噎門破塊丸治瘴氣結成氣塊腹中不消服之立效蓽茇大黃各一兩麝香少許上為細末研勻煉蜜為丸如梧桐子大每服三十丸空心用冷酒送下冷湯下亦可秘傳掌中金丸凡真氣衰弱飲食多傷停於胸膈往往用感應丸如聖膏理中丸之類又不能克化任意取轉致傷真元臟腑別生他疾惟此藥能消酒食化痰飲寬中利膈久服永無胸膈不快之疾不動臟腑不損真元加檳榔木香各一兩名檳榔丸又能調經陳皮一斤去白濕秤生薑淨洗與陳皮對下切片如伏中二味曬炒白豆蔻一兩半夏三兩湯洗七次生薑汁和餅伏中曬炒砂仁一兩神麯炒麥蘖炒甘草各二兩上為細末生薑汁煮糊為丸如梧桐子大每服三四十丸食前生薑湯送下法制檳榔治酒食過度胸膈膨滿口吐清水一切積聚雞心檳榔一兩切作細塊縮砂取仁一兩白豆蔻取仁一兩丁香切作細條一兩粉草切作細塊一兩橘皮去白切作細條生薑各半斤切作細條鹽二兩上件用河水兩碗浸一宿次日用慢火砂鍋內煮乾焙乾入新瓶收每服一撮細嚼酒下或為細末湯調服亦可流氣丸治五積六聚癥瘕癖塊留飲以上此積皆系寒氣客搏於腸胃之間久而停留不去變成諸疾此藥能消導滯氣通和陰陽消宿飲雖年高氣弱者亦皆可服木香川茴香微炒石菖蒲蓬莪朮炮青皮去白紅橘皮去白蘿蔔子補骨脂微炒神麯微炒蓽澄茄縮砂仁枳殼去穰麩炒麥蘖微炒檳榔以上各一兩牽牛微炒一兩半上為細末麵糊和丸如梧桐子大每服五十丸食後細嚼白豆蔻一枚白湯送下硇砂煎丸治積聚久不消散腹脅脹滿面無顏色四肢不和硇砂一兩不夾石者細研以醋一升半與芫花末同煮成膏芫花一兩炒黃搗為細末木香蓬莪朮川烏頭炮去皮臍京三稜當歸以上各半兩川大黃煅銼炒一兩鱉甲醋炙黃各一兩青橘皮去白焙乾漆搗碎炒各三分上為細末以硇砂膏入少蒸餅和搗二三百杵丸如梧桐子大每服十五丸食前溫酒送下取積妙應丸家傳經驗專取男子婦人小兒諸般積氣多因茶酒生果肉面所傷又為悲憂喜怒之氣鬱結心懷積成脾癖癥瘕大如杯碗不消諸種蟲積及治黃疸水蠱遍身浮腫翻胃吐食九種心疼一切風證婦人血瘕淋帶經脈不通腹膨如懷胎孕及成鬼胎小兒脾疳積滯並皆治之此藥不動元陽真氣服後肚腹消平亦不疼痛雖年幼氣弱小兒加減服之有利無害檳榔大黃各一斤牽牛二斤蕪荑仁貫眾雷丸各半斤鶴蝨錫灰各四兩阿魏二兩另以酒化開上為細末用皂角去皮弦子淨一斤半熱水泡浸搓揉水汁濾去滓與藥末皂角水再入糊為丸如梧桐子大每服稱四錢重作一服五更用蔥白七根煎湯送下仍以棗三五枚食之壓藥次早天明候臟腑一行後取下惡積之物如有積者去盡數行如止見稀水無積物卻以溫薄米粥補之沉香海金沙丸治一切積聚脾濕腫脹肚大筋青羸瘦惡證沉香二錢海金沙一錢半輕粉一錢牽牛末一兩上為細末研獨顆蒜如泥為丸如梧桐子大每服三十丸加至五十丸煎百沸燈心湯通草湯空心服更量虛實加減丸數取利是效萬病無憂散治諸般氣積腫脹檳榔半兩大黃一兩甘草三錢半黑牽牛一兩半炒上為細末每服三錢不拘時茶清調服日進二服治酒食積水病石榴雙用又連皮三稜巴豆五靈脂瞿麥杏仁車前子大戟芫花甘遂宜上為細末醋糊為丸如綠豆大每服七丸食前用溫白湯送下三稜丸治五積六聚七症八瘕破一切血下一切氣三稜煨大黃煨乾漆炒去煙巴豆去皮油硇砂各一兩上為細末醋糊和丸如綠豆大每服三丸至七丸空心用米湯送下量虛實加減服剪紅丸追蟲取積利五臟不損六腑遠年近日諸般蟲積及血塊宿食不消婦人赤白痢疾並皆治之檳榔六錢巴豆一兩取霜土朱三錢白牽牛十二兩取頭末芫荑六兩雷丸五兩上為細末滴水為丸如梧桐子大硃砂為衣每服一丸食前蜜水送下取下病積為驗白粥補之馬家五積丸治諸般積聚縮砂仁紅豆赤小豆黑牽牛蘿蔔子丁皮以上各一兩同炒令香熟不可焦香附子京三稜青皮陳皮乾漆炒出煙大戟桔梗枳殼以上各一兩銼大塊以慢火炒令變紫黑色上為細末如碾剩得藥滓再炒令黑色再碾為末以好米醋煮麵糊和丸如綠豆大每服十五丸至二十丸不拘時淡生薑湯送下削堅丸治五積六聚氣結成塊食積癖瘕心腹脹滿瘦悴少食宜服鱉甲醋浸兩宿去裙襴再蘸醋炙黃色取末秤京三稜銼如半棗大好醋浸兩宿焙乾取末秤乾漆搗碎炒令煙出研末秤以上各二兩半沉香細松煙墨燒去膠肉桂去粗皮乾薑炮沒藥另研蘿蔔子乾蠍去毒炒胡椒檳榔木香硇砂通明者為末用湯內飛別研以上各半兩乳香另研粉霜另研輕粉以上各二錢半上件為細末研勻用好醋煮薄糊為丸如小綠豆大每服二十丸淡醋煎生薑湯送下日進二服夜間一服如未利漸加丸數服微利即減鱉甲丸治肥氣體瘦無力少思飲食鱉甲一枚可用重四兩酒洗以醋炒黃泥封密背上可厚三分令乾京三稜三兩炮銼川大黃二兩銼炒枳殼三兩用麩炒微黃去穰木香一兩半不見火桃仁湯浸去皮尖雙仁用麩炒微黃細研如膏二兩半上除鱉甲外搗為細末後泥一風爐子上開口可安得鱉甲取前藥末並桃仁膏內鱉甲中用好米醋二升時時旋取入鱉甲內以慢火熬令稠取出藥卻將鱉甲淨洗去泥焙乾搗為細末與前藥同和搗為丸如梧桐子大每服二十丸空心用溫酒送下晚食前再服肝之積肥氣丸治積在左脅下如覆杯有頭足久不愈令人發咳逆痎瘧連歲不已厚朴半兩黃連七錢柴胡二兩川烏炮去皮一錢二分川椒炒出汗四錢巴豆霜乾薑炮各五錢皂角去皮弦子煨茯苓去皮各一錢半廣朮炮人參去蘆昆布洗甘草炙各二錢半上為極細末入巴豆霜研勻煉蜜和丸如梧桐子大初服二丸一日加一丸二日加二丸漸加至大便微溏再從兩丸加服周而復始積減太半勿服在後積藥依此法服春夏秋冬另有加減法秋冬加厚朴半兩減黃連一錢半治風癇於一料中加人參茯神菖蒲各三錢黃連即依春夏用七錢雖秋冬不減空心用淡醋湯送下半夏散治伏梁積心下硬急滿悶不能食胸背疼痛半夏湯泡一錢鱉甲醋炙各一兩半川大黃銼炒訶黎勒皮桂心前胡當歸焙青橘皮去白檳榔木香京三稜炮以上各一兩上為末每服三錢水一中盞生薑半分煎至六分去滓不拘時稍熱服乾漆丸治伏梁氣橫心下堅牢不散胸甲連背多疼乾漆搗碎炒煙盡芫花醋拌炒鱉甲醋塗炙去裙襴硇砂研以上各一兩桃仁去皮尖麩炒木香不見火川烏頭去皮臍銼鹽拌炒黃以上各半兩雄黃細研麝香研各一分上為細末入別研藥令勻醋煮麵糊為丸如綠豆大每服十丸食前用溫酒送下心之積伏梁丸起臍上大如臂上至心下久不愈令人煩心黃連去須一兩半厚朴去粗皮薑製炒人參各半兩黃芩三錢桂心去粗心茯神去皮木丹參炒以上各一錢川烏頭炮去皮臍巴豆霜菖蒲乾薑炮以上各半錢紅豆二分上為極細末入巴豆霜研勻煉蜜和丸如梧桐子大初服二丸一日加一丸二日加二丸漸加至大便溏再從兩丸加服食遠黃連湯送下周而復始積減大半勿服秋末加厚朴半兩減黃連半兩黃芩全不用蒜紅丸治脾積腹脹如鼓青筋浮坐臥不得者丁香木香沉香縮砂仁青皮去白陳皮去白檳榔蓬莪朮草果去皮牽牛以上各一兩粉霜肉豆蔻麵裹煨各一兩白茯苓去皮人參各半兩蒜二百枚一半生用一半火煨熟上為細末以生熟蒜研如膏生絹紐取汁和藥為丸如梧桐子大每服五七丸加至十五丸食後淡鹽湯送下忌鹹酸魚酢茶醬淹藏雞鴨生冷馬牛雜肉之類只可食淡白粥一百日勻氣湯治脾積痞氣胃脘不安肌瘦減食陳曲炒麥蘖炒桂心去粗皮郁李仁半生半炒厚朴去粗皮薑汁炙白朮以上各一兩大腹子二枚連皮牽牛一兩半生半炒良薑炮半兩甘草炙二兩上㕮咀每服三錢水一盞生薑三片棗一枚擘破同煎至七分去滓食遠稍熱服日三鱉甲丸治痞氣當胃脘結聚如杯積久不散腹脅疼痛體瘦成勞不能飲食鱉甲三兩去裙襴以米醋一小盞化硬砂一兩用塗炙鱉甲令醋盡為度附子炮去皮臍京三稜炮乾漆搗碎炒煙盡木香以上各一兩吳茱萸半兩湯浸微炒川大黃二兩銼碎醋拌炒令乾上為細末醋煮麵糊為丸如梧桐子大每服二十丸空心用溫酒送下沉香飲子治痞氣升降陰陽沉香木香羌活桑白皮麩炙人參獨活白茯苓紫蘇葉各等分上㕮咀每服三大錢水一盞半生薑五片大棗二枚煎至七分去滓食前溫服二滓又作一服脾之積痞氣丸在胃脘覆大如盤久不愈令人四肢不收發黃疸飲食不為肌膚厚朴去皮四錢半黃連去須八錢吳茱萸洗三錢川烏頭炮裂皮臍川椒炒各半錢白茯苓去皮澤瀉人參以上各一錢茵陳酒炒乾薑炮砂仁以上各一錢半巴豆霜官桂各四分黃芩白朮各二錢上為細末入別研藥和勻煉蜜為丸如梧桐子大初服二丸一日加一丸二日加二丸漸加至大便溏再從二丸加服淡甘草湯送下食前周而復始積減大半勿服秋冬加厚朴五錢半減黃連一錢減黃芩一錢半夏湯治肺積息賁咳嗽半夏湯泡去滑焙乾細辛去苗葉桑根白皮炙前胡去蘆以上各一兩半桔梗炒貝母去心柴胡去苗訶黎勒煨去核人參去蘆白朮甘草炙各一兩上㕮咀每服三錢水一盞生薑三片棗三枚擘破同煎至七分去滓溫服食後夜臥各一服枳實散治息賁氣腹脅脹硬咳嗽見血痰黏不利枳實麩炒木香檳榔甜葶藶隔紙炒令紫色赤茯苓去皮五味子訶黎勒去核甘草微炙以上各半兩杏仁一兩湯浸去皮尖雙仁麩炒黃色上㕮咀每服三錢水一中盞生薑半分同煎至六分去滓不拘時溫服肺之積息賁丸治右脅下覆大如杯久不已令人灑淅寒熱喘咳發肺壅厚朴薑製八錢人參二錢巴豆霜四分黃連去須炒一兩二錢乾薑炮川椒炒出汗白茯苓去皮川烏頭炮裂去皮紫菀去苗陳皮天門冬白豆蔻桂心去皮桔梗三稜炮以上各一錢青皮五分上為細末入巴豆霜研勻煉蜜為丸如梧桐子大初服二丸一日加一丸二日加二丸漸加至大便溏再從二丸加服淡生薑湯下食遠服周而復始積減大半勿服秋冬加厚朴半兩減黃連七錢沉香石斛湯治腎臟積冷奔豚氣攻少腹疼痛上衝胸脅沉香石斛陳曲炒以上各一兩赤茯苓去皮巴戟去心桂心去粗皮五味子微炒白朮川芎以上各三分木香肉豆蔻各半兩上㕮咀每服三錢水一盞生薑三片棗三枚擘破煎至六分去滓食前熱服木香檳榔散治積氣不散結伏奔豚發即上衝心胸令人喘逆骨瘻少氣木香檳榔煨磁石煅醋淬訶黎勒去核沉香牡蠣煅桂心去粗皮蘹香子炒川芎白芷炒以上各一兩陳橘皮湯浸去白三分上為細末每服二錢炒生薑鹽湯下沉香丸治奔豚氣小腹積聚疼痛或時上衝心胸壅悶沉香檳榔蘹香子桃仁湯泡去皮微炒阿魏以少面搜和作餅子炙令黃以上各半兩木香一錢蛜蜥一兩生用硇砂一兩不夾石者細研以湯一盞化澄去滓取清內銀器中煎成霜研吳茱萸一分湯泡焙乾青橘皮一分湯浸去白焙上為細末入硇砂研勻酒煮麵糊和丸如梧桐子大每服二十丸食前生薑鹽湯送下茴香金鈴丸治奔豚氣茴香炒金鈴子一兩每個銼作四片用殭蠶半兩炒熟去蠶青皮馬藺花石茱萸吳茱萸酒浸炒令香山茱萸去核陳皮各一兩上為細末酒糊為丸如梧桐子大每服三五十丸食前溫酒鹽湯任下醫學發明名茴香楝實丸有芫花一兩用醋炒以糊丸量人虛實加減以利為度腎之積奔豚丸發於小腹上至心下若豚狀或上或下無時久不已令人喘逆骨瘦少氣及治男子內結七疝厚朴七錢薑製黃連去須炒五錢石菖蒲白茯苓去皮澤瀉以上各二錢附子去皮全蠍去毒獨活以上各一錢川烏頭炮丁香各五分肉桂二兩苦楝實酒煮三錢巴豆霜四分延胡索一錢半上為細末入巴豆霜末研勻煉蜜和丸如梧桐子大初服二丸一日加一丸二日加二丸漸加至大便溏再從二丸加服淡鹽湯送下食前服周而復始病減大半勿服秋冬加厚朴半兩如積勢堅大先服前藥不減於一料中加煅存性牡蠣三錢㿗疝帶下病勿加解鈴丸冶奔豚氣疼痛手足拳縮不可忍者茴香一兩用青鹽一兩研細同炒和鹽用蓬莪朮用濕紙數重蘸油燈上燒過銼蠍梢去毒上為細末酒煮糊和丸如梧桐子大每服三十丸空心用溫酒或鹽湯送下白豆蔻散治積聚心腹脹滿宿食不消氣刺㽲痛泄瀉善噫吞酸食即嘔吐手足厥冷白豆蔻去皮三分肉豆蔻去殼一分高良薑木香以上各一分桂心去粗皮附子炮去皮臍枳殼炒陳橘皮去白炒人參丁香甘草炙以上各半兩上為細末每服二錢食前用木瓜生薑煎湯調服檳榔散治積聚氣腹脅堅急心胸脹滿不能飲食檳榔京三稜炮桃仁去皮尖雙仁炒木香以上各一兩桂心郁李仁青橘皮湯泡去白各半兩上㕮咀每服四錢水一中盞生薑半分煎至六分去滓食前稍熱服異香紅丸子治一切積聚心腹疼痛婦人血氣攻注常服消酒食破積氣沉香硇砂另研史君子去殼蓬莪朮煨硃砂另研木香京三稜醋浸炮蓽澄茄以上各一分檳榔一枚大者母丁香五粒黑牽牛一兩炒熟取末半兩入靠缽者不用巴豆二十粒揀肥者不去油炒肉豆蔻大者一枚上為細末研勻面糊為丸如綠豆大以硃砂為衣每服三丸食後用茴香湯送下欲為利加至五七丸仙方內消丸治酒食過傷脾胃等疾青皮陳皮去白蒼朮米泔浸炒百草霜香附三稜煨芫花醋拌炒破故紙炒皂角莪朮煨乾漆炒煙盡官桂去皮以上各一兩黑牽牛半斤半生半炒上為細末醋糊和丸如梧桐子大每服二十丸白湯送下一方有半夏三兩七星丸化氣消食巴豆一兩去皮心腰用油煎令黃色硃砂細研肉豆蔻檳榔丁香木香乳香以上各半兩上為細末研勻以麵糊為丸如麻子大每服五丸用溫酒或湯水下鱉甲丸治久積瘕癖鱉甲大者一枚淨洗去筋膜麵裹外面二三分厚上面用紙固濟泥一風爐子安鱉甲在上面別入桃仁半斤去皮尖雙仁研以米醋四升無灰酒三升硇砂三兩同攪拌旋入向鱉甲中煎為膏取出用盒盛卻將鱉甲去紙泥炙令黃色青皮去白焙麥蘖炒肉豆蔻沉香銼神麯炒大黃生用京三稜煨檳榔半生半熟丁香木香厚朴去粗皮銼薑汁炒桂心以上各二兩柴胡八兩上為細末研勻用桃仁煎並煉蜜和丸如梧桐子大每服二十丸空心用米飲送下蓬莪朮散治久積癥瘕氣不消散脅下如覆杯多吐酸水面色痿黃或腹中㽲痛蓬莪朮肉桂去皮枳殼麩炒京三稜煨大黃炒當歸炒檳榔木香以上各一兩柴胡一兩半乾薑炮半兩鱉甲二兩醋炙赤芍藥半兩上㕮咀每服三錢水一中盞入生薑半分煎至六分去滓不拘時溫服麝香丸治久積症癖氣不瘥或於脅肋作塊形大如杯或如雞子透隱皮膚或時疼痛堅硬如石宜服麝香別研乾漆炒煙盡神麯炒黃麥蘖炒黃以上各一兩鱉甲醋炙芫花醋拌炒莪朮煨京三稜煨萆薢各二兩上為細末研勻用醋煮糊為丸如梧桐子大每服十丸食前用溫酒送下三稜草煎方治症癖及鼓脹上用京三稜一石細切以水五石煮至一石去滓更煎三斗許於銅器中重釜煎如稠糖取出置密器中每服一匙匕酒一盞溫服之日二服常令酒氣相噴檳榔湯治症癖腹滿如鼓坐臥不安食即欲吐氣悶喘急檳榔二兩煨赤茯苓去皮京三稜煨陳皮去白焙芍藥以上各一兩半食茱萸三分郁李仁湯浸去皮一兩上㕮咀每服三錢用水一盞煎至七分去滓溫服空心午後各一服乾漆丸破症塊消積氣乾漆炒煙盡四兩附子炮去皮臍青皮去白炒蘹香子炒大黃炒芫花醋拌炒陳皮去白炒白牽牛炒令香莪朮煨木香不見火檳榔京三稜用醋紙裹煨桂心以上各二兩五靈脂用木碗盛地坑子內以火煅令煙盡取灰二兩皂角長五寸許以麻縛定用泥固濟火煅煙盡取灰二兩上為細末研勻煉蜜和丸如梧桐子大每服二十丸加至三十丸生薑湯送下忌豬魚熱面等物取積一塊氣丸治男子婦人氣積檳榔末杏仁末羌活末黃芩以上各一兩神麯炒麥蘖炒雷丸以上各半兩牽牛末二兩江子去皮油取霜四錢上為細末湯浸蒸餅為丸如梧桐子大硃砂為衣每服大人七丸三歲服三丸五歲服五丸臨睡時用溫白湯送下以利為度當歸煮散治諸癥結痛起於脅下按之而堅妨痛不能飲食漸加羸瘦當歸切焙桔梗炒木香鱉甲用醋頻蘸炙黃桂心桃仁湯浸去皮尖雙仁炒別研以上各一兩半吳茱萸水淘炒乾半兩上除桃仁外為末卻入研勻每服三錢水一盞煎至七分去滓溫服逐日空心日午夜各一服麥蘖湯治食症咽酸吐津胸膈疼痛氣噎食飲進退麥蘖炒神麯炒紫菀去苗土厚朴去粗皮生薑汁炙大黃銼炒當歸焙鱉甲醋炙檳榔各半兩上銼碎每服五錢水一盞半煎至七分去滓溫服空心日午臨臥各進一服八靈丸治食症氣塊痃癖等疾木香京三稜石三稜雞爪三稜檳榔以上各一兩肉豆蔻半兩巴豆去心膜出油盡硇砂研各一分上為細末研勻醋糊為丸如小豆大每服五七丸丈夫生薑湯下婦人醋湯下痃癖氣木香湯下
