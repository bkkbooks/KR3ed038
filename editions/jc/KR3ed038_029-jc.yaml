body:
  text: 卷之二十九秘結門附論人之秘結大腸為傳道化物而出焉凡人五味以養五臟糟粕皆入歸於大腸大腸所司主出而不納或停蓄蘊結腎主水膀胱之腑水瀦於膀胱而泄於小腸實相通也然小腸獨應於心者何哉蓋陰不可無陽水不可無火水火即濟上下相交榮衛流行且水道熱不通冷不禁難經云謂七衝門者唇飛門其證為戶門會厭為吸門胃為賁門大倉下口為幽門大腸小腸會為闌門此為七衝門也易老云魄門對飛門其證為孤惑以下衝上故曰七衝門也而幽門不通則上衝吸門不開則噎塞燥秘不便氣不得上下者治在幽門宜以通幽湯潤腸去燥之劑因體虛之人攝養乖理三焦氣澀運掉不行而壅滯於腸胃之間遂成秘結之患有風秘氣秘濕秘寒秘熱秘風秘為病風痰秘於大腸結而不通也氣秘者因氣滯後重迫疼煩悶脹滿大便結燥而不通寒秘者年高腸冷及痃癖冷氣結滯大便秘結又有虛秘與夫積滯秘結虛秘者年老血少腸胃枯澀且古人論此病證有方全在醫者看其虛實隨證治之若婦人因產後失血耗氣大便秘者不可妄用疏利之劑恐傷元氣病之反復大抵秘結治法燥則潤澀則滑秘則通寒則溫熱則涼風則散氣則順此為一定之法學者誠心鑑之秘結通治方大黃飲子治身熱煩躁大便不通大黃濕紙裹煨二錢杏仁炒去皮尖枳殼麩炒梔子仁以上各一錢半川升麻一錢生地黃一錢半人參七分黃芩七分甘草炙五分上作一服用水二盅生薑五片豆豉二十一粒烏梅一枚煎至一盅不拘時服潤腸丸大便秘結通用杏仁炒去皮尖枳殼去穰炒麻黃去殼炒陳皮以上各一兩防風阿膠炒各半兩上為細末煉蜜和丸如梧桐子大每服五七十丸食前用紫蘇子煎湯送下壯者荊芥湯送下脾積丸治飲食停滯腹脹痛悶嘔惡口酸大便秘結蓬莪朮三兩京三稜二兩青皮一兩南木香良薑半兩米汁放瓷器內煮切細皂角三大挺不蛀者燒存性上為細末用巴豆半兩去殼研如泥漸入藥末研和得所麵糊和丸如麻子大每服五丸加至十丸用橘皮煎湯送下食遠服二香丸治積滯氣秘心腹刺痛中滿南木香丁香青皮去白五靈脂香潤者另研草果仁橘紅莪朮煨上為細末用巴豆半兩研如泥漸入藥末研和麵糊和丸如麻子大每服三丸加至五七丸食前生薑湯下疏風散治風毒秘結枳殼麩炒防風羌活獨活檳榔白芷威靈仙蒺藜炒赤去刺麻仁杏仁甘草炙各一兩上為粗末每服二錢半生薑五片蜜一匙慢火煎服無時三和散治七情之氣結於五臟不能通流以致脾胃不和心腹痞悶大便秘澀方見氣門脾約麻仁丸治腸胃熱燥大便秘結麻仁另研五兩大黃一斤蒸焙厚朴去皮薑製炒枳實麩炒芍藥以上各八兩杏仁去皮尖炒五兩半上為細末煉蜜和丸如梧桐子大每服二十丸臨睡用溫白湯送下大便利即止滋腸五仁丸治津液枯竭大腸秘澀傳道艱難桃仁杏仁炒去皮各一兩柏子仁半兩松子仁一錢二分郁李仁一錢炒陳皮四錢另研為末上將五仁另研為泥入陳皮末研勻煉蜜和丸如梧桐子大每服三五十丸空心用米飲送下潤腸湯治大便秘澀連日不通麻子仁一兩半揀研細水調濾去滓取濃汁芝麻一兩微炒研細水調濾取濃汁桃仁一兩湯浸去皮麩炒黃色研如泥荊芥穗一兩研為末上作一處入鹽少許同煎食前代茶飲之以利為度檳榔丸治大腸積熱氣壅不通心腹脹滿大便秘結大黃蒸黃芩枳實麩炒麻子仁炒去殼另研牽牛炒檳榔羌活去蘆杏仁去皮尖炒白芷以上各一兩人參上為細末煉蜜和丸如梧桐子大每服五七十丸空心用白湯送下掩臍法治大便不通上用連根蔥一二根帶土生薑一塊淡豆豉二十一粒鹽一匙同搗碎作餅子焙熱掩臍中以絹帛扎定良久氣透自通牛黃散治上焦熱臟腑秘結大黃一兩白牽牛取頭末半兩上為細末每服三錢如厥冷用溫酒調服手足煩者用蜜湯調服不拘時候潤燥湯治大便燥結不通生地黃升麻各一錢當歸尾麻仁去殼熟地黃大黃煨桃仁另研甘草生以上各一錢紅花三分上作一服水二盅煎至一盅食前服一方有黃柏無紅花穿結藥治大實大滿心胸高起氣塞不通者為結也蟾酥輕粉麝香各等分巴豆少許另研上研極細用孩兒乳汁和丸如黍米大每服二三丸不拘時薑湯下三仁丸治大腸有熱津液竭燥裡急後重大便秘結柏子仁松子仁火麻子仁各一兩上研令勻用黃蠟半兩焙化和丸如梧桐子大每服二十丸食前用米飲送下未快加丸數服之一方以白蠟和丸用黃丹湯下治老人虛秘小提盆散治大便燥結服轉藥久不通灶突墨一錢滄鹽三錢上研勻每用一錢竹筒吹入肛門立透敷藥治秘結至極昏不知人上用生大螺一二枚以鹽一匕連殼生搗碎置病者臍下一寸三分用寬帛緊縛之即大便如未效烏桕木根三寸研井水服亦效就多研爛敷臍下亦可枳殼丸治三焦約證調順氣脈消痞滯利胸膈治風氣通利大小便枳殼二兩陳皮一兩檳榔半兩木香二錢半黑牽牛取頭末七錢半半生半炒上為細末煉蜜和丸如梧桐子大每服十五丸不拘時生薑湯送下日三服皂角丸治老人虛人風秘乃大腸經有風大便秘結宜服之皂角炙去子枳殼去穰麩炒上等分為細末煉蜜和丸或飯飲丸亦可如梧桐子大每服七十丸不拘時米飲下六磨湯治氣滯腹急大便秘澀沉香木香檳榔烏藥枳殼大黃各等分上各件熱湯磨服
