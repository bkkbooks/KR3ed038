body:
  text: 卷之四十水腫門附論靈樞水脹篇云有水脹與膚脹鼓脹腸覃石瘕五者之分金匱千金論云水有十者其名不同所感各異蓋水之始起也未嘗不自心腎而作夫心與腎能生脾肺今心腎氣虧不能滋養脾肺故土不能制水水漬妄行三焦不瀉氣脈閉塞樞機不通喘息奔急水氣盈溢滲漏經絡皮膚溢滿目窠微腫如臥蠶之狀此其候也其膚脹鼓脹於脹滿別論其詳惟腸覃石瘕二證婦人有此起自血分之疾各有治法難與水脹病同夫水腫病皆起於臟腑諸書謂十水者一曰青水根於肝先從面腫漸行周身二曰赤水根於心先從胸腫而起三曰黃水起於脾腫從腹起四曰白水起於肺先從腳腫而喘嗽上氣也五曰黑水起於腎從四肢而起六曰玄水起於膽先頭面而至足脛腫七曰風水起於胃先自四肢腫而至通身及腹脹滿八曰石水根於膀胱其狀起於臍下面腹獨大者是也九曰里水起於小腸先小腹而漸至腫也十曰氣水起於大腸其狀乍來乍去乍盛乍虛此其候也皆因上下不通關竊不利氣血痞膈陰陽不調而致此也素問云面腫為風足腫為水然此當分陰水陽水少壯老弱而治之若陰水為腫脈來沉伏色多青白不煩渴小便澀而清大便自泄治宜實脾陽水為腫脈來沉數色多赤黃或煩渴小便赤而難去大便多秘治宜疏氣盪滌凡看水腫之病先要有其在何部分而得之必當以本經求之而用藥若腰以上腫者治宜發汗其腰以下腫者當利小便大抵治法強健脾元土壯則能運化運化則血氣充血氣充則陰陽和和則水歸元矣若少壯充實患此脈來浮大有力當導去其水年老虛弱得此補中行濕為先若氣下陷者即當提之蓋脾者養命之本腎者乃生氣之原也不可不究二臟之虛實慎不可輒用大戟芫花甘遂巴遂牽牛之藥大利其水暫取其效水去則脾土愈敗久則危殆若五傷證見則難治之肝傷者則唇黑脾傷者則臍凸肺傷者則背平心傷則缺盆平腎傷則足心平此證若一二發是皆難治療學者鑑之水腫通治方葶藶木香散治暑濕傷脾水腫腹脹小便赤大便滑葶藶木香茯苓肉桂豬苓澤瀉木通以上各一錢滑石五錢白朮二錢甘草五分上作一服水二盅煎至一盅食前服大橘皮湯治濕內攻心腹脹滿並水腫小便不利大便滑泄方見濕門葶藶丸治肺氣咳嗽面目浮腫喘促不安小便赤色甜葶藶隔紙炒貝母煨令黃色木通以上各一兩杏仁去皮尖雙仁炒防己各二兩上為細末用棗肉和丸如梧桐子大每服五十丸食前用桑白皮煎湯送下白朮木香散治喘嗽腫滿變成水病者不能食不能臥小便秘者宜服白朮豬苓去皮檳榔赤茯苓澤瀉以上各一錢半滑石三錢官桂七分木香甘草以上各一錢陳皮二錢上作一服水二盅生薑三片煎至一盅食前服十水丸治十種水氣四肢腫滿面目虛浮以手按之少時方起喘急不得安臥小便赤澀遠志去心菖蒲一寸九節者椒目炒肉豆蔻麵裹煨香羌活去蘆大戟以上各一兩豬苓去皮甜葶藶炒白牽牛炒澤瀉以上各半兩上為細末麵糊和丸如梧桐子大每服三十丸食前用米湯送下分氣補心湯治心氣鬱結發為四肢浮腫上氣喘急木通川芎前胡去苗大腹皮炒青皮白朮枳殼麩炒甘草炙以上各一錢香附炒去毛白茯苓桔梗以上各一錢半細辛木香各五分上作一服水二盅生薑三片紅棗二枚煎至一盅食前服杏蘇飲治上氣喘嗽面目浮腫方見喘門蘿蔔子飲治水病浮腫蘿蔔子半夏鹽制川芎青木香商陸青皮以上各一錢葶藶炒赤茯苓陳皮牽牛末炒檳榔甘草炙以上各一錢半官桂七分上作一服水二盅生薑五片煎至一盅食遠服調榮飲治瘀血留滯血化為水四肢浮腫皮肉赤紋名血分莪朮川芎當歸延胡索白芷檳榔陳皮赤芍藥桑白皮炒大腹皮赤茯苓葶藶炒瞿麥以上各一錢大黃一錢半細辛官桂甘草炙以上各五分上作一服水二盅生薑三片紅棗二枚煎至一盅食前服神助散又名葶藶散治十種水氣面目四肢浮腫以手按之隨手而起咳嗽喘急不得安臥小便赤澀大便不利黑牽牛炒取頭末澤瀉各二錢豬苓椒目各二錢半葶藶炒香五錢上作一服水二盅蔥白三根煎至一盅入酒半盞絕早向東立服如人行十里又以漿水蔥白煮稀粥候蔥爛入酒五合量人所飲多少須啜一升許自早至午當利小便三四升或大便微利喘定腫減隔日再服忌鹽面房事五皮散治風濕客邪於脾經氣血凝滯以致面目虛浮四肢腫滿心腹膨脹上氣喘促五加皮地骨皮大腹皮茯苓皮生薑皮各二錢半上作一服水二盅煎至一盅食遠服切忌生冷油膩堅硬之物澹寮方去五加皮地骨皮加陳皮桑白皮當歸散水腫之疾多由腎水不能攝養心火心火不能滋養脾土故土不制水水氣盈溢氣脈閉塞滲透經絡發為浮腫之證心腹堅脹喘滿不安當歸洗桂心木香赤茯苓木通檳榔赤芍藥牡丹皮陳皮白朮各一錢三分上作一服水二盅紫蘇五葉木瓜一片煎一盅不拘時服實脾散治陰水發腫用此先實脾土厚朴去皮薑製炒木瓜去穰木香不見火附子炮去皮臍乾薑炮草果仁大腹皮各一錢半甘草炙一錢上作一服水二盅生薑五片棗一枚煎一盅不拘時服木香流氣飲治面目虛浮四肢腫滿喘急水道赤澀方見氣門疏鑿飲子治水氣通身洪腫喘呼氣急煩躁多渴大小便不利服熱藥不得者羌活去蘆商陸澤瀉赤小豆炒秦艽去蘆木通檳榔大腹皮茯苓皮椒目各一錢三分上作一服水二盅生薑三片煎至一盅不拘時服消腫丸治水腫喘滿小便不利滑石木通白朮黑牽牛炒茯苓茯神去木半夏湯泡通草陳皮以上各二錢半木香一錢二分半瞿麥丁香各半兩上為細末酒糊為丸如梧桐子大每服五十丸食前用燈心麥門冬煎湯送下郁李仁散治小便不利浮腫郁李仁陳皮檳榔茯苓白朮以上各二錢半甘遂一錢上作一服水二盅生薑三片紅棗一枚煎至一盅食遠服烏鯉魚湯治水氣四腳浮腫烏鯉魚一個赤小豆桑白皮白朮陳皮以上各三錢蔥白五莖上用水三碗同煮不可入鹽先吃魚後服藥不拘時候無礙丸治脾病洪流四肢浮腫大腹皮二兩木香半兩檳榔郁李仁莪朮三稜以上各一兩上為細末用炒麥蘖面煮糊為丸如梧桐子大每服七八十丸食前用生薑湯送下導滯通經湯治脾氣有餘氣不宣流面目手足浮腫桑白皮茯苓陳皮去白各二錢半白朮三錢木香一錢半霖雨時加澤瀉二錢半上作一服水二盅煎至一盅不拘時服神助丸舊名葶藶丸治十種水氣面目四肢遍身俱腫十種水腫病證根源狀方法一青水先從左邊脅腫起根在肝大戟二赤水舌根腫起一云腳根腫起根在心葶藶三黃水腰腹腫起根在脾甘遂微炒四白水從腳腫起根在肺桑白皮五黑水從外腎腫起根在腎連翹六玄水從面腫起根在外腎芫花醋炒七風水從四肢腫起根在骨澤瀉八石水從腎腫起根在膀胱藁本九蒿水從小腹腫起根在小腸巴豆去油十氣水或盛或衰根在腹赤小豆上十味用所主藥一兩余者各半兩研為細末煉蜜和丸如梧桐子大每服十丸茯苓湯下一日三服忌鹽百日外忌魚蝦麵食一切毒物房事病痊後便服鴨頭丸治濕熱面目肢體悉腫腹脹喘急二便秘澀甜葶藶微炒豬苓防己各一兩上為細末取綠鴨頭血和丸如梧桐子大每服七十丸食前白湯送下三仁丸治水腫喘急二便不通郁李仁去皮杏仁去皮尖薏苡仁各等分上為細末米糊為丸如梧桐子大每服七十丸不拘時用米湯送下海金沙散治脾濕太過通身腫滿喘不得臥腹脹如鼓海金沙二錢半甘遂半兩黑牽牛炒一半生取末一半共一兩上為細末每服二錢食前用倒流水煎湯調服雄黃木香散治男子婦人十種水氣取水法大鯽魚一尾去腸肚入大戟甘遂各二錢半雄黃另研半錢黑牽牛木香各半兩土狗一個另研上以大戟同甘遂一半入魚肚內煨令焦取出焙乾同眾藥研為末每服二三錢冷水調下半邊散治諸般水腫芫花醋浸焙乾大戟甘遂大黃以上各三錢土狗七枚五月內取會飛的上先以蔥搗爛為餅攤新瓦上卻將土狗安蔥上焙乾去翅足嘴每個剪作兩片分左右成對記之再焙乾為末欲退左邊腫即以左邊七片為末入前藥調服右邊依前四味末每服二錢入土狗末和勻用淡竹葉天門冬煎湯調五更服候左邊退至第四日服右邊如或未動只以大黃三錢煎至一半助之如更不動茶清助之雄黃神金散治十種水腫證候一從腳腫根在心葶藶以糯米同炒去米二從肚腹腫根在腹椒目三從陰腫根在腎澤瀉四從膝腫根在肝芫花醋炒五從面腫根在肺桑白皮六從心腫根在肋雄黃七從四肢腫根在脾甘遂八從口腫根在小腸巴戟去心九從腰腫起根在腎大戟十從四肢腫起根在胃茯苓上為細末所主藥加倍余各等分每服二三錢空心用井水調服以利為度量人虛實加減服食忌如法塗臍膏治水腫小便澀少地龍豬苓針砂上等分為末蔥涎調敷臍中寸高束之病水寒不得宣行成濕腫證脈來沉遲色多青白不煩不渴小便艱少而澀大便滑泄一頭黃顙八須魚綠豆同煎一合余熟作濃羹成頓服自然水腫漸消除退腫集賢丸治諸腫商陸豬苓漢防己苦葶藶椒目滑石海金沙黑牽牛取末大腹皮續隨子去油赤茯苓各一兩巴豆二十七粒去油黃連半兩淨上為細末煨蒜搗為丸如梧桐子大每服二十五丸五更溫服兩日服一次初服商陸湯次服赤小豆湯三服用木瓜湯下木香分氣湯治氣留滯四肢腹急中滿胸膈脅肋膨脹虛氣上衝小便臭濁木香豬苓澤瀉赤茯苓半夏枳殼檳榔燈心草蘇子各等分上銼碎每服一兩水二盞煎入麝香末少許同服沉香海金沙丸治一切積聚脾腫脹肚大青筋羸瘦沉香三錢海金沙一錢半輕粉一錢牽牛末一兩上研獨頭蒜丸如梧桐子大每服三五十丸空心用燈心木通湯送下三白散治膀胱蘊熱風濕相乘陰囊腫脹大小便不利白牽牛二兩桑白皮微炒白朮木通陳皮各半兩上為細末每服二錢空心薑湯調服小兒服半錢治男子陰腫大如升核痛上以馬鞭草搗爛塗之治婦人陰腫硬上用枳實半斤銼碎炒熟布包熨之冷即易之又熨蟬蛻散治脬囊腫小兒坐地為風或蟻吹著蟬蛻半兩上用水一碗煎湯洗再溫再洗仍與五苓散加燈心煎服神效木香丸治二十四種蟲病木香沉香各二錢砂仁苦葶藶炒益智連翹以上各三錢桑皮白牽牛半炒椒目枳殼麩炒木通黑牽牛半炒陳皮青皮澤瀉大黃以上各半兩檳榔胡椒各一錢甘遂四錢上為細末米醋糊為丸如梧桐子大每服五錢空心五更初嚼蔥白湯下消上次服橘皮湯下消中第三服桑白皮湯下消下尚有餘腫沉香湯下忌鹽醬導水茯苓湯治水腫頭面手足遍身腫如爛瓜之狀手按而塌陷手起隨手而高突喘滿倚息不能轉側不得著床而睡飲食不下小便秘澀溺出如割而絕少雖有而如黑豆汁者服喘嗽氣逆諸藥不效用此即愈亦嘗驗其病重之人煎此藥時要如熬阿剌吉酒相似約水一斗止取藥一盞服後小水必行時即漸添多直至小便變清白色為愈赤茯苓麥門冬去心澤瀉白朮以上各三兩桑白皮紫蘇檳榔木瓜以上各一兩大腹皮陳皮砂仁木香以上各七錢半上㕮咀每服半兩水二盞燈草二十五根煎至八分去滓空心服如病重者可用藥五兩再加去心麥門冬二兩燈草半兩以水一斗於砂鍋內熬至一大碗再下小銚內煎至一大盞五更空心服滓再煎服連進此三服自然利小水一日添如一日沉香琥珀丸治水腫一切急難證小便不通者琥珀杏仁去皮尖紫蘇赤茯苓澤瀉以上各半兩葶藶炒郁李仁去皮沉香以上各一兩半陳皮去白防己以上各七錢半上為細末煉蜜為丸如梧桐子大以麝香為衣每服二十五丸加至五十丸空心用人參煎湯送下量虛實加減葶藶丸治腹中有濕熱氣目下微腫如新臥起之狀兩足脛微腫病在腎腎少陰也標在肺肺太陰也故滿氣急咳嗽喘息有音每就臥則右脅有氣上衝肩腋與缺盆相牽引不快少思飲食甜葶藶另研牽牛半生半炒白朮以上各半兩桑白皮赤茯苓漢防己羌活陳皮澤瀉郁李仁湯浸去皮炒紫色別研以上各上三分上為細末研勻煉蜜和杵二三百下丸如梧桐子大初服十丸加至三十丸空心及晚食前用生薑橘皮湯送下日進二服以知為度治氣虛水腫浮脹昔滁州公使酒庫攢司陳通患此一病垂死醫者已不下藥偶一婦人云是醫人所授服之病自小便而下幾數桶遂愈上用大蒜一個爛研以蛤粉和可為丸即止丸如梧桐子大每服十丸白湯送下若氣不升降即以大蒜一個每瓣切開逐瓣納入茴香七粒濕紙裹煨香熟爛嚼白湯送下不以多少若臟腑不止即以丁香如茴香法煨服每瓣蒜用三粒煨服治腹中水癖水腫上用黃雌雞一隻理如食法和赤小豆一升同煮候豆爛即出食之其汁日二夜一每服四合補丈夫陽氣治冷氣若瘦著床漸漸食之良先患骨熱者不可食也鯉魚方上用大鯉魚一尾去頭尾及骨惟取肉以水二斗赤小豆一大升和魚肉煮可取二升以上汁生布絞去滓頓服盡如不能盡分為二服後服溫令暖服訖當下利利盡則瘥一方療水腫滿下氣用鯉魚白煮食腹有宿瘕者不可食大腹皮散治風水身體浮腫發歇不定肢節疼痛上氣喘急大腹皮桑白皮川芎以上各二兩漢防己羌活青皮去白大黃炒檳榔桂心以上各一兩甘草炙半兩上㕮咀每服五錢水一大盞煎五分去滓不拘時溫服楮白皮散治風水毒氣遍身腫滿楮白皮豬苓去皮木通以上各二兩紫蘇莖葉桑白皮各三兩陳皮去白一兩上㕮咀每服五錢水一大盞生薑三片煎至六分去滓不拘時溫服海蛤丸治石水四肢細瘦腹獨腫大海蛤研防己各三分陳皮去白炒郁李仁去皮炒各半兩赤茯苓去皮桑白皮葶藶隔紙炒各一兩上為細末煉蜜和丸如梧桐子大每服二十丸加至三十丸米飲送下早晚各一服檳榔散治石水病腹光緊急如鼓大小便澀檳榔研末半兩商陸生薑各一兩桑白皮一兩半甘草炙一分上除檳榔外用水二大盞煎至一大盞去滓五更初分作二服每服調檳榔末一分至平明當利如未利再服漢防己散治皮水腫如裹水在皮膚中四肢習習然動漢防己桑白皮黃耆桂心以上各一兩赤茯苓二兩甘草炙半兩上㕮咀每服五錢水一大盞煎至五分去滓不拘時溫服木香丸治皮水身體面目悉浮腫木香苦葫蘆子炒乳香以上各一分檳榔二枚一枚生一枚炮甘遂炒令黃硃砂細研各半錢上為細末以爛飯和分作四十九丸用麵裹於銚子內以水煮熟令患人和汁吞之以盡為度從早晨服藥至午時其水便下不計行數水儘自止木香丸治水症腹內堅脹喘促大小便澀木香澤瀉各三分防己二分巴豆去心膜研紙捶去油膩粉各一分甘遂生用青皮去白蘿蔔子瞿麥水銀以少煮棗肉研令星盡各半兩上為細末糯米飯和丸如綠豆大每服三丸空心用木通湯送下人參木香散治水氣病人參木香茯苓枳殼滑石琥珀檳榔海金沙豬苓甘草各等分上為細末每服五錢生薑三片水一盞煎至七分不拘時溫服日進三服治水氣方上用宣州木瓜一個竹刀切下蓋子去子並穰入吳茱萸在內卻將蓋子用竹籤簽定蒸熟各研細焙乾為末以紫蘇熟水調下不拘時候治水氣方上用商陸根白者去皮切如小豆許一大盞以水三升煮取一升已上爛即取粟米一大盞煮成粥空心服若一日兩度服即恐利多每日服一頓即微利不得食生冷一方取汁半合和酒半升服利下瘥不可雜食治脾腎受水吃轉藥了後服此藥以補之白朮巴戟去心羌活山茱萸去核陳皮乾薑草豆蔻吳茱萸木通牽牛醋煮焙乾肉豆蔻檳榔以上各一分川芎半兩半夏二銖椒目一銖上為細末每服二錢水一盞煎至九分去滓空心服或煉蜜為丸如梧桐子大每服四十丸空心米湯送下補脾藿香散治脾受水氣吃轉藥了便服此藥以補之藿香丁香羌活紅豆蔻川芎獨活木香草豆蔻去皮甘草炙以上各一分乾薑三銖陳皮半兩上為細末每服二錢水一盞煎二三沸空心和滓服加味枳朮湯治氣為痰飲所膈心下堅脹名曰氣分歌云氣分中滿並胸痹三者雖殊皆此類胸痹氣實中滿虛氣分挾飲茲為異趺陽微遲寸遲澀兩處推求病端的陰氣不通則骨疼陽氣不通身冷劇陰氣前通痹不仁陽氣前通惡寒慄陰陽相得氣乃行氣轉即散分虛實實則失氣虛遺尿腹滿脅鳴何以療心下堅大似旋盤桂附木湯為最妙枳殼麩炒白朮辣桂紫蘇莖葉陳皮檳榔桔梗五靈脂炒木香以上各一分半夏茯苓甘草以上各二分上㕮咀每服五錢水二盞生薑三片煎至一盅去滓食前溫服桃溪氣寶丸治腰脅俱病如抱一甕肌膚堅硬按之如鼓兩腳腫滿曲膝仰臥不能屈伸自頭至膻中脊瘦露骨一切氣積食積並腳氣走注大便秘結寒熱往來狀如傷寒悉皆治之黑牽牛二兩大黃一兩半青皮去白檳榔各一兩木香羌活川芎陳皮當歸茴香炒各半兩上用細末用皂角膏為丸如梧桐子大每服五七十丸加至百丸空心生薑燈心湯送下大戟散治男子脾元虛憊水氣腫滿紅芽大戟炒主脾甜葶藶炒主肝黑牽牛半生半熟主腎續隨子炒去殼主肺甘遂炒主心上各為一兩觀其五臟病證主其病之藥加一兩共二兩併為細末煎燈心湯五更初面東方服一錢匕仍須相老少虛實加減至天明其水下三五次其腫即消卻用生薑蔥煮粥止之隔日服平胃散一帖如體虛不堪再下者只用前藥麵糊為丸三日一服二十丸謂之磨化丸屢效食忌如後芫花丸治女人脾元虛憊水氣腫滿芫花醋浸瓦炒七次牽牛半生半炒各七分上為細末醋煮麵糊和丸如梧桐子大每服三十丸相虛實茶清嚥下五更初面東方服天明其水即下用前法粥藥補之婦人止用二味用手捺有窟深者可醫忌生鹽油醬豉面醋羊鵝等毒食生冷只可食精肉如欲食鹽炒鹽食之以少為貴不食尤好服藥之日須忌以甘草又方用鯉魚長一尺五寸以酒淹漬一宿平旦以木蓖從口貫至尾微火炙令熟去皮隔宿勿食空腹頓服之不能者分再服勿與鹽沉附湯治腫病大凡腫病因積而得先用積藥積既除而腫再作小便不利到此束手矣若用利小便藥性寒而小便愈不通故小便不利則中焦下焦不升降痞膈為寒氣所結故水凝而不通但用沉附湯附子一隻生用去皮臍切作片上用水三盞入生薑十數片同煎至八分次以沉香濃磨二錢許加入藥再煎三五沸去滓空心服如此則小便自通喘滿自去矣沉附湯一向吃三五十隻附子無礙男子婦人皆可服之大半夏湯治脾土受濕不能制水水漬於腸胃溢於皮膚漉漉有聲怔忡喘息名水脹半夏湯泡陳皮茯苓桔梗檳榔甘草各等分上銼碎每服三錢水一盞半生薑三片煎至八分去滓食前溫服鯉魚湯治卒身面浮腫小便澀大便難上氣喘促鯉魚二斤去腸肚赤茯苓桑白皮澤漆澤瀉紫蘇以上各一兩杏仁半兩去皮尖雙仁炒上銼細先用水五升煮魚取汁三升去魚內藥煮至二升去滓食前溫服一中盞魚亦食之甜葶藶丸治卒身面四肢浮腫腹脅氣脹滿小便不利甜葶藶二兩隔紙炒令紫色漢防己赤茯苓海蛤細研椒目微炒芒硝以上各一兩上為細末煉蜜和搗二三百杵丸如梧桐子大每服三十丸以後藥煎湯送下日三服木通桑皮百合以上各一兩郁李仁半兩去皮尖炒上銼碎每服三錢水一大盞煎至六分去滓下前丸藥治卒腫滿身面目浮大方上用商陸根一斤刮去皮薄切之煮令爛去滓內羊肉一斤下蔥豉鹽如食法隨意食之腫消後亦宜作此或常搗商陸與米中蒸作餅子食之防己湯治膜外氣水病不限年月深淺浮腫大喘防己大戟木香赤茯苓去皮海蛤胡椒白朮犀角屑葶藶防風木通訶黎勒去核陳皮牽牛檳榔郁李仁桑皮紫蘇以上各一兩大黃二兩麝香少許湯澄下不用研上銼碎分作二劑以水三升隔宿浸明日五更用文火煎減去一升絞取飲可三盞平旦空心先飲一盞如人行五里更服一盞又如人行五里更服一盞至第三服如藥冷用重湯暖之不可冷服若久病腹中虛服至第三盞即微利三兩行若腹中實者至日午即轉瀉宜用盆盛驗之必有惡濁黃水或惡濁青黑物出三五升並氣化為之瀉若不甚困慎勿止之必自住若覺力乏即服漿水粥補之後隔三五日更服一劑還依此法服之按徒都先生云服第一劑則病減半至第二劑則去根本前後歷試重者朝服一劑而暮已瘥根本深者服藥當日腫消能起但覺小腹內有塊結則須後劑其藥滓慎勿拋棄布囊盛懸於風中他日或有微覺發動則更煎可更治兩人徒都先生云人家有此藥滓懸於戶上一家終不患疫氣此飲不獨治水氣凡是氣病皆治之若患氣不限年月深淺於此藥二十味中減去大黃及訶黎勒加貝母人參以童子小便煎每日空心服之當去病根有患肺氣困重者因逢患水氣人服此藥偶得一盞服之便當永瘥有人一生患腳氣時時衝心服此飲亦除根本以此推之但是氣皆治不獨治水氣而已婦人有娠服之亦無妨小兒及老人隨意加減服之皆瘥甘遂餅治膜外水氣甘遂大麥面各半兩上為末以水和作餅子燒熟熱食之如不利以熱飲投之如利以冷水洗手面即止一方治十腫水氣為末空心以蔥白湯調二錢服之炮腎散治水氣腫滿巴戟去心麩炒甘遂炒黃木香苦葶藶炒沉香銼澤瀉以上各一分膩粉一錢檳榔一枚生一枚炮陳皮去白芫花醋拌炒麥蘖以上各半兩上為末每服二錢用豬腰子一枚以竹刀割開去筋膜切作三片糝藥末在內用濕紙裹慢火煨令香熟先煮蔥白三莖令熟細切將蔥白與粟米同煮粥一碗先食粥一半方食腰子藥後再食粥令盡臨臥時服至五更大小便下赤黃惡物是效奪命丸治水氣腫病大戟麩炒甘遂炒各一分苦葶藶半兩一半生一半熟用澤瀉一分半上為細末煮棗肉和丸如梧桐子大若四肢腫者名為順水溫漿水下三丸星月上時服至天曉利下惡物若四肢瘦腹腫者名為逆水以苦葫蘆子神麯煎湯送下二丸小便頻快是效商陸豆方治水氣腫滿生商陸切如麻豆赤小豆各等分鯽魚三尾去腸肚存鱗上將二味實裝魚腹中以線縛之用水三升慢火煮豆爛去魚只取二味空心食之就以魚汁送下甚者過二日再為之不過三劑瘥檳榔散治水氣腳膝浮腫大小便不利上氣喘急檳榔二兩木香桂心各半兩紫蘇莖葉牽牛微炒陳皮去白赤茯苓木通以上各一兩郁李仁一兩半湯浸去皮微炒上為細末每服二錢空心煎桑白皮湯調下臨臥再服治腫從腳起稍上進者入腹則殺人亦治水腫上用赤小豆一斛煮令極爛得四五斗汁溫以漬膝以下日日為之數日消盡若已入腹者不必漬但煮小豆食之莫雜吃飯及鮭魚鹽甘甜丸治水腫腹脹甘遂半兩水煮甜葶藶一兩炒細辛去苗一兩半川椒二兩炒上為細末煉蜜為丸如梧桐子大每服十五丸用白湯送下空心日午臨臥各一服豬苓散治水氣遍身浮腫宜利三焦通水道豬苓去皮甜葶藶炒大黃炒赤茯苓陳皮去白狼毒醋拌炒乾薑炮五味子大戟炒椒目炒出汗澤瀉漢防己桂心白朮各等分上為細末每服二錢食前用蔥白湯調服大小便利為度海蛤丸治水氣遍身浮腫上喘小便不利海蛤細研甜葶藶炒昆布洗去鹼赤茯苓海藻洗去鹼澤漆以上各一兩木通桑皮各二兩漢防己三兩上為細末煉蜜和搗三五百杵丸如梧桐子大每服三十丸不拘時米湯送下續隨子丸治通身虛腫喘悶不快續隨子漢防己赤茯苓面蒸海金沙人參檳榔木香以上各半兩苦葶藶炒四兩上為細末用棗肉和丸如梧桐子大每服二三十丸食前桑白皮煎湯送下大沉香尊重丸治蠱脹腹滿水腫遍身腫滿氣逆嘔噦喘乏小便赤澀大便不調一切中滿下虛危困之病其效如神沉香丁香人參車前子葶藶炒檳榔以上各二錢青皮白牽牛枳實炒木通以上各四錢胡椒海金沙蠍梢去毒木香茯苓肉豆蔻以上各一分白丁香一錢半蘿蔔子六錢炒滑石三錢郁李仁去皮一兩一分上為細末用生薑自然汁煮糊為丸如梧桐子大每服二十丸不拘時用生薑湯送下日進三服忌鹽魚果肉麵食只可食米粥無比丸治水盅通身腫滿京三稜煨牽牛膽礬研芫花醋拌炒檳榔以上各一兩膩粉一分硇砂研續隨子去殼木香以上各半兩鐵粉三分研大棗三十枚湯內略煮過剝去皮核取肉研爛上除膽礬硇砂棗肉外同為細末用釅醋二大升於銀石器內先下膽礬硇砂棗肉煎五七沸次下諸藥末一處攪勻慢火熬候可丸如梧桐子大每服十丸丈夫用溫酒下婦人醋湯下
