body:
  text: 卷之七燥門附論內經曰諸燥枯涸幹勁皺揭皆屬於燥乃陽明燥金肺與太陽之氣也故曰燥萬物莫熯乎火燥之為病皆屬燥金之化然金體本燥能令燥者火也夫金為陰之主為水之源而受燥氣寒水生化之源竭絕於上而不能灌溉周身營養百骸色干而無潤澤皮膚滋生毫毛者有自來矣或大病而克伐太過或吐利而亡津液或預防養生誤餌金石之藥或房勞致虛補塞燥劑食味過厚辛熱太多醇酒炙肉皆能偏助狂火而損害真陰陰中伏火日漸煎熬血液衰耗使燥熱轉甚為諸病在外則皮膚皺揭在上則咽鼻焦乾在中則水液衰少而煩渴在下則腸胃枯涸津不潤而便難在手足則痿弱無力在脈則細澀而微此皆陰血為火熱所傷也原病式云風熱火同陽也寒燥濕同陰也又燥濕小異也燥金雖屬秋陰而異於寒濕故反同其風熱也火熱勝而金衰而風生則風能勝濕熱能耗液而反寒陽實陰虛則風熱勝於水濕而為燥也凡人風病多因熱甚而風燥者為其兼化以熱為其主也然陽實陰虛而風熱太甚以勝水濕因而成燥肝主於筋而風氣自甚又燥熱加之液還聚於胸膈則筋太燥也燥金主於收斂勁切腎澀故為病筋脈勁強緊急而口噤也或病燥熱太甚而脾胃乾涸而成消渴者或風熱燥甚怫鬱在表裡氣平者善伸數欠筋脈拘急或時惡寒或筋惕而搐脈浮數而弦也風熱燥郁甚於里故煩滿而或閉結也及風癇之發作者由熱甚而風燥為其兼化涎溢胸膈燥爍而瘛瘲昏冒僵仆也凡此諸證皆由熱甚而生風燥各有異者由風熱燥各微甚不等故也所謂中風或筋緩者因其風熱勝濕而為燥乃燥之甚也然筋緩不收而痿痹故諸膹郁病痿皆屬肺金乃燥之化也如秋深燥甚則草木痿落而不收病之象也是以手得血而能握足得血而能步夫燥之為病血液衰少而氣血不能通暢故其病也治法當以甘寒滋潤之劑故甘寒俱能生血又寒能勝熱陰得滋而火殺液得潤而燥除源泉下降精血上榮如是則氣液宣通由內神茂而外色澤矣內經治法燥者潤之非養血潤燥之謂歟世或有言風熱而燥誤以辛涼驅風苦泄之劑愈燥其液損之又損殊不知血衰致燥多招風象乃木火得侮金水之衰也風燥之疾當求其本治則不失矣燥通治方當歸潤燥湯當歸熟地黃生地黃大黃桃仁泥麻仁甘草各一錢升麻二錢紅花半錢上作一服水二盅煎至一盅空心熱服導滯通幽湯治大便難幽門不通上衝吸門不開噎塞大便燥閉氣不得下治在幽門以此潤之當歸桃仁泥各一錢半生地黃熟地黃各二錢升麻一錢紅花甘草各半錢上作一服用水二盅煎至一盅去渣調檳榔細末二錢稍溫服升麻瀉濕湯治咽膈不通逆氣裡急大便不行升麻生地黃熟地黃蒼朮青皮黃柏當歸各一錢黃耆一錢半桃仁泥槐子各五分甘草六分上作一服用水二盅煎至一盅食前熱服麻黃白朮散治大便不通小便赤黃渾身腫其色黃麻木身重如山沉困無力四肢痿軟不能舉動喘促唾清水白沫如膠吐噦痰唾時躁熱發欲去衣須臾而過振寒項額有時如冰頭旋眼黑目中溜火冷淚鼻不聞香臭少腹急痛當臍有動氣按之堅硬而痛麻黃不去節三錢吳茱萸草豆蔻厚朴生甘草各一錢神麯炒升麻柴胡白朮蒼朮茯苓澤瀉人參黃耆豬苓桂枝杏仁黃柏酒製橘紅各半錢黃連酒製青皮炙甘草各三分上作一服用水二盅入麻黃先煎令沸去沫再入諸藥同煎至一盅食遠稍熱服一方有白豆蔻半錢潤腸丸治脾胃伏火大便秘澀或乾燥塞不通全不思食乃風結秘血結秘皆令閉塞以潤燥活血疏風自然通快麻子仁桃仁去皮尖各一兩羌活當歸尾大黃煨各半兩上除麻仁桃仁別碾如泥外余藥研為細末和勻煉蜜為丸如梧桐子大每服三五十丸空心白湯送下活血潤燥丸治大便風秘不通常燥結當歸防風各三錢大黃濕紙裹煨羌活各一兩桃仁二兩湯泡去皮尖別研如泥麻子仁二兩半別研如泥皂角仁去皮燒存性一兩半其性得濕則滑濕滑則燥結自除用之勿誤上除桃仁麻仁別碾外其餘藥研為末和勻煉蜜為丸如梧桐子大每服五十丸三兩服後大便日久不能結燥也以瓷器盛之勿令見風神功丸大黃麵裹煨訶子肉麻子仁別研人參去蘆各一兩上為細末入麻仁泥和勻煉蜜丸如梧桐子大每服三十丸溫水下或酒或米飲下食後臨臥如大便不通加服脾約丸麻仁一兩二錢半枳實麩炒厚朴去粗皮芍藥各二兩大黃蒸四兩杏仁去皮尖炒黃一兩二錢上為細末煉蜜丸如梧桐子大每服二十丸臨臥溫水下麻仁丸郁李仁去皮別研麻子仁別研二味各六兩大黃二兩半半生半蒸枳殼炒去穰防風去蘆乾山藥各七錢半檳榔半兩羌活木香各五錢半上為細末入別研藥和勻煉蜜丸如梧桐子大每服二十丸至三十丸食後溫湯下加牽牛滑石尤妙潤體丸郁李仁大黃桂心黑牽牛當歸黃柏以上並生用各半兩輕粉少許上為細末滴水丸如梧桐子大每服三十丸至四十丸用溫湯或生薑湯送下導氣除燥湯治小便閉澀不通乃血澀致氣不通而竅澀也知母酒製澤瀉為末各三錢茯苓去皮滑石末炒黃色各二錢黃柏酒製四錢上和勻作一服有水二盅煎至一盅空心稍熱服如急閉不拘時候服
