body:
  text: 卷之六濕門附論丹溪云夫濕者土之氣土者火之子故濕病多自熱生蓋火熱能生土濕也或曰濕溫風濕寒濕矣未聞有所謂濕熱病者由六氣之中濕熱為病十居八九故內經云濕上潤而熱又云因於濕首如裹濕熱不攘大筋軟短小筋馳長軟短為拘弛長為痿或云溫熱在其中又云濕熱在其中此古人論其細微之處世之有病濕者或處卑濕或冒雨露或臥陰潤或衣濕汗俱能致害其病關節疼痛而煩肢體頑麻而重脈沉細者名曰濕痹其小便不利大便反快者當利其小便或身痛而煩脈沉而緩名曰重濕患一身盡痛發黃小便自利當燥陰土若肢體重著者可轉側額上微汗不欲去被身微腫或脈浮者名曰風濕是真風濕二氣相搏以致此治當微微發汗使風濕俱從汗出若大發汗則風去而濕存兩脛逆冷胸腹滿頭自痛多汗妄言脈陽濡溺陰急小是名濕溫因傷濕而復傷暑者濕熱相搏而成此患不可發汗汗則必不能言及耳聾不知痛癢乃是重暍濕家寒多者為痛為腫凡濕家不可大下下之額上汗出微喘小便利者不治下利不止者亦不治又有脾胃素弱內蓄痰飲外冒雨露痰濕相搏上衝心胸令人涎潮壅塞口眼歪斜半身不隨昏不知人與中風相似但脈沉澀或沉而細不可作中風治之謂其脾土好乾惡濕而被濕流相干則有是疾若作中風治之脾元愈虛痰濕愈盛必致危篤戴人論濕之證而以濕熱為源風寒為兼深得內經之旨也治濕得行則渙然而濕行而氣復散暫時開也殊不知濕得行則豁然而收也濕得衛也或從針灸而得安有以其開通而壅滯殊不知濕得開通而壅滯行如此亦用權者有可劫之病也要當分別上下內外之由自外而感者或因霧露陰雨所客澡浴為風所關涉水為寒所郁汗出當風而快坐臥卑地清氣襲虛從下而起上為頭重鼻塞而煩表鬱則發寒熱身色如似熏黃著入骨節為重疼痛足趺浮腫其脈浮緩內經曰地之濕氣感則害人皮肉筋脈又云傷於濕者下先受之非外感所致乎大法腰以上宜汗腰以下宜利小便之分東垣云濕淫所勝助風以平之非風藥表散之謂乎經云濕上甚而熱治以苦溫佐以甘辛以汗為故而止此治上治外之法也自內而致者或因酒面積多過飲湯液停滯膩物甘滑陳久燒炙香辛膏粱過度氣熱熏蒸濁液不行湧溢於中濕從內作重則發痙強直霍亂吐利輕則痞膈中滿怠惰嗜臥沉重無力流濫關節則煩疼注於絡脈屈伸不可轉側水性潤下氣不能煦滯於經絡發腫肉軟如泥按之不起其脈多沉潛內經曰濕氣在中又曰脾惡濕非內致所生乎治法脾苦濕急食苦以燥之又曰濕淫於內以苦燥之以淡泄之此濕自內成故宜燥宜利小便非表散所能去也此內治下之法也今濕分上下內外蓋可知矣藥亦有所據乎金匱方以汗藥發濕者也古方以熱藥燥寒濕者也東垣以風藥勝濕者也河間以涼藥治濕熱者也大率言淡滲之藥利濕者也諸家發明互相迨矣前人所述一證各有立論全在醫者識病或內因外因或虛或實六淫七情所感的於何經受證以致之治之無不效矣濕證通治方除濕湯治寒濕所傷身體重著腰腳痠疼大便溏泄小便赤澀半夏曲炒一錢半厚朴薑製一錢半蒼朮米泔浸二錢藿香一錢陳皮去白一錢半白茯苓去皮二錢白朮二錢甘草一錢作一服水二盅生薑七片紅棗一枚煎至一盅食前服羌附湯治風濕相搏身體煩疼掣痛不可屈伸或身微腫不仁羌活附子炮去皮臍白朮甘草炙各二錢半作一服水二盅生薑五片煎至一盅不拘時服滲濕湯治坐臥濕地或為雨露所襲身重腳弱關節疼痛發熱惡寒或多汗惡風或小便不利大腑溏泄白朮三錢乾薑炮白芍藥附子炮去皮臍白茯苓去皮人參各一錢桂枝不見火甘草炙各半錢作一服水二盅生薑五片紅棗一枚煎至一盅不拘時服清燥湯六七月之間濕令大行子能令母實而熱旺濕熱相合而刑庚踏腸故寒涼以救之燥金受濕熱之邪寒水生化之源源絕則腎虧痿厥之病大作腰以下痿軟癱瘓不能行走不正兩足欹側以此藥主之蒼朮米泔浸一錢半五味子十四個黃耆黃連白朮橘皮白茯苓去皮當歸各一錢人參生地黃各七分麥門冬去心神麯炒豬苓黃柏酒炒甘草澤瀉各半錢柴胡升麻各三分作一服水二盅煎至一盅食前服木瓜虎骨丸治寒濕合而成痹腳痛不仁疼痛少力足下隱痛不能踏地腰腿筋攣不能屈伸及項背拘急手臂無力耳內蟬鳴頭眩目旋腳氣行步艱難木瓜血竭另研沒藥另研虎脛骨酒炙木香自然銅醋淬七次楓香骨碎補去毛當歸甜瓜仁敗龜板炙肉桂各一兩安息香酒熬一兩乳香另研五錢地龍去土二兩上為末酒糊丸如梧桐子大每服五六十丸食前溫酒下羌活勝濕湯如脊痛項強腰似折項似拔上衝頭痛及足太陽經不行羌活獨活各二錢藁本防風蔓荊子川芎各一錢甘草炙半錢作一服水二盅煎至一盅食後溫服如身重腰沉沉然乃經中有濕熱也加黃柏一錢附子半錢蒼朮二錢四物附子湯治風濕相搏骨節煩疼四肢拘急不得屈伸附子炮一錢半肉桂二錢白朮三錢甘草一錢作一服水二盅生薑五片煎至一盅不拘時服防己黃耆湯治風濕相搏客於皮膚四肢少力關節煩疼防己三錢黃耆四錢白朮三錢甘草一錢作一服水二盅生薑三片紅棗一個煎至一盅不拘時服大橘皮湯治濕熱內甚心腹脹滿水腫小便不利大便滑泄橘皮三錢滑石四錢茯苓一錢半木香檳榔豬苓澤瀉白朮各一錢官桂半錢甘草三分作一服水二盅生薑五片煎至一盅食前服天麻散治風濕疼痛黃腫天麻全蠍去毒各四錢熟地黃木瓜烏頭當歸各三錢牛膝酒洗二錢乳香沒藥穿山甲炮川芎各一錢上為細末每服三錢空心用溫酒調服導水丸大黃二兩黃芩二兩滑石四兩牽牛頭末四兩去濕熱腰痛泄水濕腫痛久雨則加甘遂一兩去遍身走注腫痛加白芥子一兩退熱散腫毒止痛久旱加朴硝一兩散結滯通關節潤腸胃行滯氣通血脈加郁李仁一兩去腰腿沉重加樟柳根一兩上為末滴水丸如梧桐子大每服五十丸加至一百丸白湯送下臨臥時服除濕丹治諸濕客搏腰膝重痛足脛浮腫筋脈拘急津液凝澀便溺不利目赤癮疹疥癬走注腳氣盡皆治之檳榔甘遂威靈仙澤瀉赤芍藥葶藶乳香沒藥各一兩牽牛五錢大戟炒三兩陳皮去白四兩上為末麵糊為丸如梧桐子大每服五六十丸漸加八九十丸食前溫白湯送下服藥後忌酒濕面二三日一方有澤瀉陳皮各一兩無葶藶參濕湯治寒濕所傷身重腰冷如坐水中小便或澀或利大便溏泄皆因坐臥濕處或因雨露所襲或因汗漬衣冷久久得之腰下重疼兩腳痠痛腿膝或腫悉能除之蒼朮制白朮甘草炙各二錢茯苓乾薑炮各四錢陳皮丁香各一錢上㕮咀分作二帖每帖用水二盅生薑三片棗一枚煎至一盅食遠服瓜蒂搐鼻法治傷濕鼻塞頭疼上用瓜蒂為末口含水搐一字入鼻中流出黃水效白朮酒治中濕口噤不知人白朮一兩上㕮咀作一服用酒三盞煎一盞緩服不飲酒水煎亦可金沙流濕丸治男子婦人雜證及風濕酒濕海金砂五錢木通去皮木香郁李仁各一兩澤瀉白茯苓去皮大黃各一兩半牽牛頭末滑石各五兩上為末滴水丸如梧桐子大每服五十丸至八十丸生薑湯下忌濕面如小便不通燈草湯下傷酒生薑湯下酒疸食黃蘿蔔湯下痢疾高良薑湯下婦人血氣不調當歸湯下肢節疼痛濕酒下心疼韭根湯下膈氣枳實湯下尋痛丸治走注流濕以後宜用襲經絡除疼痛棕櫚燒存性一兩半穿山甲酥炙當歸去蘆乳香別研沒藥別研各一兩木香半兩麝香別研二錢皂莢子仁二兩炒上為細末酒煮麵糊為丸如梧桐子大每服五十丸不拘時溫酒下或木瓜湯下補骨脂丸治濕傷內外眾疾俱作陽氣衰絕乳石補益之藥百端皆不應唐鄭相公為海南節度七十有五越地卑濕服諸藥不應元和七年有阿陵國船主李摩獻此方經七八日而覺應驗自爾常服其功神驗十年二月罷郡歸京錄方傳之破故紙十兩揀洗淨為細末胡桃肉去皮二十兩研如泥上胡桃肉泥入破故紙末更以好煉蜜和勻如飴盛瓷器中旦日以溫酒化藥一匙服之不飲酒者以溫熱水化下彌久則延年益氣悅心明目補添筋骨但禁食蕓薹羊血生附湯治受濕腰疼痛附子生用牛膝酒浸焙厚朴制乾薑生用白朮茯苓甘草炙各二錢半蒼朮炒杜仲姜炒各半兩上㕮咀每服三錢水一盞半生薑三片棗一枚煎至八分去渣食前服七聖散治風濕流注經絡間肢節緩縱不隨或腳膝疼痛不能步履續斷獨活防風杜仲萆薢牛膝酒浸一宿甘草上各修事淨焙乾半兩為細末每服二錢溫酒調下蒼朮散治風濕常服壯筋骨健步蒼朮一斤用粟米泔水浸過用竹刀刮去粗皮以童子小便浸半斤無灰好酒浸半斤上浸至春五日夏三日秋七日冬十日取出蒼朮於淨地上撅一坑以炭火煅坑紅去炭將浸蒼朮酒小便傾在坑內卻放蒼朮在坑內以瓦器蓋覆用泥封固經一宿取出蒼朮研為細末每服二錢空心鹽湯或酒調服常服除濕壯筋骨明目乳香沒藥丸治遠年近日風濕腳氣攻註腳膝或腫或疼筋攣不能屈伸腳不能踏地及一切疼痛往來不已宜服乳香別研沒藥別研骨碎補去毛五靈脂去土縮砂仁白附子甜瓜子牛膝酒浸一宿當歸去蘆乾木瓜地龍去土木鱉子各一兩白牽牛三兩微炒上為細末酒煮麵糊為丸如梧桐子大每服二十丸溫木瓜湯下或溫酒亦可不拘時服上馬丸治寒濕臂痛腿疼筋骨諸疾川烏炮木香不見火各半兩虎骨酥炙牛膝杜仲木瓜當歸酒浸敗龜板酥炙自然銅醋淬黃耆蜜炙白朮各一兩上為細末煉蜜為丸如梧桐子大每服三四十丸溫酒下治風寒濕痹麻木不仁粥法上川烏生為末用香熟白米作粥半碗藥末四錢同米用慢火熬熟稀薄不要稠下薑汁一茶腳許蜜三大匙攪勻空心啜之溫為佳如是中濕更入薏苡仁末二錢增米作一中碗服此粥大治手足四肢不隨痛不能舉者有此證者預服防之左氏云風淫末疾謂四肢為四末也脾主四肢風邪客於肝則淫脾脾為肝克故疾在末穀氣引風濕之藥徑入脾經故四肢得安此湯劑極有力予嘗制此方以授人服者皆驗治腳轉筋急伸腳將腳緊鉤向前其痛即止輕腳丸逐風去濕消腫行血止痛白朮赤茯苓木豬苓去皮舶上茴香炒澤瀉赤芍藥紫蘇葉葫蘆巴枳實麩炒去穰檳榔各五錢桃仁一兩去皮尖及雙仁麩炒地膚子一兩上除桃仁別研外搗羅為細末入桃仁煉蜜和搗三五百杵丸如梧桐子大每服三五十丸加至百丸空心紫蘇湯下舊有寒濕之疾每發時不可忍呻吟之聲徹於外幾至於死忽遇道人授此方才服半料間或發作頓覺減於前時服盡全料厥疾遂瘳信而服之其驗如神秘傳循經丸治男子婦人兒童室女諸經絡風邪寒濕氣血留滯流注作痛筋脈攣拳並皆治之常服亦可川烏炮去皮臍當歸酒浸地龍去土南星炮各三兩草烏一兩炮去皮臍豆餅二兩用黑豆不以多少去皮好酒煮爛使酒干擂碎捏作餅子曬乾乳香別研沒藥別研各一兩上為末酒糊丸如桐子大每服三十丸食遠溫酒下芎術除眩湯治感寒濕頭目眩暈川芎二錢白朮三錢附子炮一錢半甘草炙官桂各一錢上作一服水二盅生薑三片煎至一盅食前服
