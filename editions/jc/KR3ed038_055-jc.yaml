body:
  text: 卷之五十五針灸門附論針經云必欲治病莫如用針巧運神機之妙攻開聖理之深外取砭針能蠲邪而扶正中含水火善回陽以倒陰又云觀夫九針之法毫針最微然是一寸六分包含妙理雖細擬於毫髮洞貫多歧可平五臟之寒熱能調六腑之虛實是以歧伯分九針九針者天地之大數也始於一而終於九故曰一以法天二以法地三以法人四以法時五以法音六以法律七以法星八以法風九以法野素問曰以針應九之野九而九之九九八十一以起黃鐘數焉以針應數也一者天也天者陽也五藏之應天者肺肺者五臟之華蓋也皮者肺之合也人之陽也故為之治針必以大其頭而銳其末令無得深入而陽氣出二者地也人之所以應上者肉也故為之治針必筒其身故員其末令無侵傷肉分傷則氣得竭三者人也人之所以生成者血脈也故為之治針必大其身員其末令可以按脈勿陷以致其氣令邪氣獨出四者時也時者四時八風之客於經絡之中為瘤病者也故為之治針必筒其身而鋒其末令可以瀉熱出血而痼病竭五者音也冬夏之分分於子午陰與陽別寒與熱爭兩氣相搏合為癰膿者也故為之治針必令其末如劍鋒可以治大膿六者律也律者調陰陽四時而合十二經脈虛邪客於經絡而為暴痹者也故為之治針必令尖如釐且員且銳中身微大以取暴氣七者星也星者人之七竅邪之所客於經而為痛痹含於經絡者也故為之治針令尖如蚊虻喙靜以徐往微以久留正氣因之真邪俱往出針而養者也八者風也風者人之股肱八節也八正之虛風八風傷人內舍於骨解腰脊節腠理之間為深痹也故為之治針長其身鋒其末可以取深邪遠痹九者野也野者人之節解皮膚之間也淫邪流溢於身如風水之狀而溜大能過於關節大節於關節者也歧伯又云九針之長短一曰鑱針長一寸六分主熱在頭身也二曰員針其鋒長一寸六分主治分間氣三曰鍉針長三寸半主按脈取氣令邪出四曰鋒針其身鋒其末長一寸六主癰熱出血五曰鈹針廣三分半長四寸主大癰膿兩熱爭者長一寸六分主取癰痹者也七曰毫針法於毫毛長一寸六分主寒熱痛痹在絡者也八曰長針長七寸主深邪遠痹者也九曰大針其針微員長四寸主取大氣不出關節者也歧伯又云身形之應九野左足應立春左脅應春分左手應立夏膺喉首頭應夏至右手應立秋右脅應秋分右足應立冬腰尻下竅應冬至六腑膈下三葴應中州凡所應之處不可犯禁靈樞云形樂志苦病生於脈治之以灸刺形苦志樂病生於筋治之以熨引形樂志樂病生於肉治之以針石形苦志苦病生於咽膈治之以甘藥形數驚恐經脈不通病生於不仁治之以按摩醪藥是謂形志為病又有人之五勞久視傷血久臥傷氣久坐傷肉久立傷骨久行傷筋此五久勞所病也治當隨經而取之且如前人甄權刺肩井曲池臂痛而復射華佗刺懸鐘環跳躄足而立行秋夫刺腰俞而鬼免沉淪王纂針交俞而妖精立出徐文伯瀉死胎補手陽明合谷瀉足三陰交應針而殞因前人仁術之妙載清名而不朽今已去聖逾遠此道罕明後之學者當究古人之心施以惠生之術明經絡識虛實行子午之術且如左有病右畔取非交經繆刺用進氣之法使針之氣安能到於病所若不明經絡妄以誤針其禍豈小小哉今將前人立法各經治病之穴並用針之法針經備載其詳所有缺略者開列於後指法一十四條動者如氣不行得針動伸提而已伸提者即非針出入引氣也搖者凡行赤鳳搖頭之法即搖之撥動其經以愈疾詳見本法進者行瀉法進針至穴得分寸令病人呼氣一口即用針進至入一豆許停針少時得氣即退針行瀉法退者行補法之時進針至穴得分寸令病人吸氣一口即用針退出一豆許停針少時得氣卻行補法搓者凡針要寒熱者以為搓之或外或內如搓線之貌勿轉之太緊恐人肉纏針難進退左捻則熱右捻則寒亦出入之理慎當忌之彈者凡瀉時用指輕彈使其氣速行則氣至也易至也補則不用氣實自至者不用此法努者凡用大指次指捻針名曰努針引其氣至也如氣不至令病人閉氣一口著力努之外以瀉針引之則氣至矣氣自至者不用此法掐者凡下針於所部分經絡用手上下掐抹之使氣往來推之則行引之則止捫者如痛處未除即於痛之處捫摩使痛散也復以飛針引之除其痛也攝者如針下氣澀滯隨經絡上下用爪甲攝之其氣自通攝與捻者同按者如補出針時令病人吸氣一口急用手指按閉其穴上此補法也如瀉出針時令病人呼氣一口則勿按針孔此乃瀉法也爪者以手爪甲掐穴令氣血散也方下其針刺入也切者以手爪甲極掐其穴氣血散開方下針切與爪同捻者以手大指次指捻針來去上下即飛針之法也行針法黃帝金針法最奇短長肥瘦在臨時但將他手橫紋指分寸尋來審用之身體心胸或是短身體心胸或是長求穴看紋還有理醫工此理要推詳定穴行針須細認瘦肥短小豈同群肥人針入三分半瘦體須當用二分不肥不瘦不相同如此之人但著中只在二三分內取用之無失且收功大飢大飽宜避忌大風大雨亦須容飢傷榮氣飽傷腑更看人神俱避之妙針之法世間稀多少醫工不得知寸寸人身皆是穴但開筋骨莫胡疑有筋有骨旁針去無骨無筋須透之見病行針宜子細必明升降闔開時邪入五經隨日過祟侵六脈浪翻基烏烏稷稷空中墮靜意冥冥起發機未補真陽九氣足次瀉餘邪九度噓同身遂穴歌中取捷法昭然逕不迷百會三陽頂之中五會天滿字相同前頂之上寸五取百病能祛理中風灸後火燥沖雙目四畔刺血令宣通井泉要求原針穴針刺無如灸自功前頂寸五三陽前甄權曾云一寸言稜針出血頭風愈鹽油楷根疾自痊囟會頂前寸五深八歲兒童不可針囟門未合那堪灸二者須當記在心上星會前一寸出神庭星前髮際尋諸風灸庭為最妙庭星宜灸不宜針印堂穴並兩眉攢素髎面正鼻柱端動脈之中定禁火若捻此穴鼻鼾酸水溝鼻下名人中兌端張口上唇宮齦交二斷中間取承漿下唇腕內蹤炷艾分半懸漿灸大則陽明脈不隆廉泉脘上定結喉一名舌本立重樓同身捷法須當記他日聲名播九州春夏刺淺秋冬刺深內經曰病有浮沉刺有淺深各正其理然春夏為陽其氣在外人氣亦浮凡刺者故淺取之秋冬為陰其氣在內人氣在藏凡刺者故當深取之又言春夏各致一陰秋冬各致一陽秋冬各致一陽者謂春夏為陽謂陰所養故刺之各致一陽春夏溫必致一陰謂下針深刺至腎肝之部得其氣針便出之是以外持之陰也秋冬寒必致一陽致一陽者謂下針淺則刺至心肺之部得氣推而內之良久出針是推內之陽也素問曰春夏養陽秋冬養陰故也三才法凡欲下針先以左手大指掐於穴上掐令多時令患人呼十息然後用右手持針用力揰之取穴則有準入穴既定撒手停針十息號曰天才待少時再進針五分依前停針住手十息號曰地才不可便起少待一二時方可出針號曰人才乃可瀉也赤鳳搖頭凡下針待氣要上行閉其下要下行閉其上進針從辰至巳退針巳至午未進針則左捻退針則右捻動也敬曰下水船中之櫓獨如赤鳳搖頭別辯迎隨逆順休時慢法徒求蒼龍擺尾凡下針飛氣至關要去處回撥者將針散漫伏之如船中之舵左右隨其氣輕而撥其氣自交周身遍體奪流不失其所矣如氣不行將針動伸動提敬曰蒼龍擺尾氣交流血氣奪流遍體周任他身上千般病一插教他即便瘳龍虎交戰夫用針時先行龍左行右捻凡得九數卻行虎右行左捻得六數乃先龍後虎而轉之得氣補之故陽中有陰陰中有陽乃得反之道使邪氣和其正龍虎升騰夫用針法以手大指自前捻入左大指向後捻入經得氣向前推轉以大指彈其針引其陽氣按而提之其氣自行如氣不應依前再施子午搗臼夫下針時調氣得勻以針上下九入六出之數按陰陽其病自愈矣陽中隱陰夫用針之時先入五分之中乃得九陽之數如覺熱便進入一寸行六陰之數以得氣為應夫如是可治先寒後熱之病陰中隱陽夫用針之時先進入一寸之中行六陰之數如患人自覺微涼即退針漸出五分之中卻行九陽之數故得陰中隱陽可治先熱後寒之病燒山火夫用針時先行九陽之數入於五分中得氣便進之漸進一寸之內三慢出三緊入如覺熱緊閉其穴即時熱氣復生其冷病自除如不效依前再施透天涼夫用針時先進入分寸之內行六陰之數若得氣便進伸漸退至五分之中三慢入三緊出其針自緊徐徐舉之得冷氣漸至其熱自愈不效再施留氣法夫用針之時先進七分之中行純陽之數若得氣便深刺微伸提之卻退之至原處又得氣依前法可治痃癖癥瘕之病進氣法夫用針之時先行純陽之數若覺針下氣滿便倒臥其針令患人吸氣五口其針氣上行此乃進針之法也可治肘臂腰腿身疼走注之病提針法夫用針之時先行陰數自覺氣來捻轉輕提其氣即行可治冷麻之病針解法凡刺手足欲使氣上行以指下抑之使氣下行以指上抑之用針頭按住少時其氣自然行也此即赤鳳搖頭之法盤針法盤針法且如針中脘關元之穴先刺入二寸五分退出一寸只留一寸五分在內盤之且如要取上焦胞中之病用針頭迎向上刺入二分補之使氣攻上若臍下有病退出二分逐日人神所在不宜針灸足大鼻柱手小指外踝髮際外踝求股內牙齒肝及足五口遍身足陽明六手胸中在胸遊內踝氣衝七膝上在腕股內八陰收九尻足趺及膝脛腰背內踝足趺休尻神一歲叉踝坤二震齒牙腨三巽頭口乳四中肩尾尻五乾背面耳六手膊腕肘七艮要項上八膝肋離邊九坎肘腳肚尻神上下傳且如人年十歲除九不算零一歲便起叉踝坤余皆仿此人身血忌不宜針灸出血正醜二未三在寅四申五卯酉六親七辰八戌九巳上十亥一子二午真凡醫者若不能知此諸般禁忌趨吉避凶妄亂針灸非惟不能愈疾甚者或致患人傷生喪命為害非輕若逢病人年命厄會處男女氣怯下手致難通人達士若遇卒急暴患何取選擇避忌即不可拘此若是誤犯禁穴諸般醫療不瘥以意詳之針灸瘟㾮神正羊二戌三居辰四寅五午六蛇行七酉八猴九在亥十子十一醜中存十二月當居卯位犯著瘟㾮必殺人午時補瀉歌曰每日午前皮上揭有似燒湯前湧熱若要寒時皮底尋不枉交人皮破裂午時前後歌曰午前要知寒與熱左捻為補右為瀉提針是熱插針寒此是先賢真妙訣午後右補左為瀉怎生此法寒與熱婦人反此插針為熱提針寒女人反此要分別順入為左逆為右不是知人休與說補法凡用九陽數行四九三十六也瀉法行六陰數也行三六一十八也補瀉提針此法用之大有驗補法假令此穴合針五分先針入二分候得氣再入二分至四分候得氣更針一分撞五分止然後急出其針便以左手大指按其針穴勿令出血是為補法瀉法假令此穴合針五分便針入五分候得氣便起針二分少停又起二分少停候得氣又起針慢出不用左手閉針孔令其氣出是為瀉法禁針穴法禁針穴俞古今留囟會神庭腦戶由神道靈臺膻中穴石門神闕水分休氣穴陰會手五里陽絡青靈承泣收橫骨承筋若有病禁針用灸疾須瘳孕婦休針合谷穴三陰若針墮胎憂關元胎死不能下子母俱亡切莫投禁灸穴法瘂門風府及承光攢竹睛明與少商天牖頭維下關穴系堂天府及迎香葉髎鳩尾陽關定心俞經渠陰市當淵液白環並五會當陽伏兔脊中藏禁灸人迎條口穴乳中殷門髀關鄉避灸穴中二十九用針補瀉即安康榮備迴避八法風凡用針刺天氣風盛令病人避風之處刺之無傷也寒凡用針刺天氣寒冷令病人向溫暖處先飲湯液醴暑凡用針夏月熱盛血淖而多脫其血以新水洗其面於風涼處坐而然後刺濕凡用針刺令病人致於高原之處先服辛燥之物然後刺陰凡用針刺遇陰氣重氣血不行先服溫補之藥然後刺燥凡用針刺遇夏月煩躁令病人於風涼處先服宣通氣血之藥然後刺之車凡用針刺若病人乘車而來其人經絡解㑊不可便刺氣血定然後刺之馬凡用針刺若病人乘馬而來必血氣亂而困於身候氣定然後刺之八證勿刺針之無功便黑不拘傷寒雜病若大便黑色皆是真氣已失俗云換腸死證勿刺之吐異其病臨食之間吐出異色之物後日必死勿刺之失聽不拘傷寒雜病暴然耳聾失音不語乃腎氣絕也必死勿刺之失明其目暴然而不見者乃是肝氣絕也必死慎勿刺之失志經云使志安寧詩云在心為志心無所存俗言改志後日必死慎勿刺之失便病人不覺大小便自出者乃是大小腸無氣也後日必死慎勿刺之失神老子云氣來入身謂之生神去於身謂之死所謂不離其身自遺其咎得神者昌失神者亡失溺病人不覺小便自出者乃是小腸經無氣也後日必死慎勿刺之醫與病者作用悅愉樂也和也病者發其信心所刺之處祝白自言已病之過從今針後再不敢犯也正己醫流臨病之處目無邪視心無邪念敦神醫與病者各自正己之神視股視婦人室女之病度其穴俞方寸然後隔衣而刺之嚴禮凡請命醫流志誠信意如侍賓客正目醫凡用針之時必專務一目無他視靜意想適之變咒語凡用針之時醫須默默誦其咒語曰大哉乾元成就成天神針到處萬病如拈急急如律令敕攝停針待氣病人作用起居停針待氣之間令病人平直坐臥而已存想凡用針刺病人心無邪念其邪氣易除耳取穴之時令病人坐臥平直其用針順快矣調嗔凡停針待氣之間令病人忘憂絕慮勿暴喜怒動其心絕慮若停針待氣之間令病人忘其憂絕其慮者也針畢病人禁忌八法喜凡病人針畢數日切忌暴喜喜則傷神神既有傷舊疾不除新病又生矣怒凡病人針畢數日勿令暴怒怒則傷肝其魂無定血無所歸何疾不生憂凡病人針畢數日勿令暴憂憂則傷心心既有傷則勞倦損於脾脾損則糟粕不化真氣日衰榮衛之道澀矣恐凡病人針畢數日勿令暴恐恐則傷腎腎既傷則損其志志損則無養生之道矣思凡病人針畢數日勿令苦思思則傷氣氣竭血泣則肌肉不滑澤矣勞凡病人針畢數日勿令勞役勞役則傷氣氣耗則舊疾不除新病又生矣醉凡病人針畢數日忌大醉醉則血氣盛衛氣竭氣竭則榮血必脫矣飽凡病人針畢數日忌大飽飽則傷筋脈橫解血溢滿也定尺寸法岐伯明堂經云以八寸為一尺以八分為一寸緣人有長短肥瘦不同取穴不準扁鵲明堂云取男左女右手中指第二節為一寸為緣人有身長手短身短手長取穴不準孫思邈明堂云取患人男左女右手大拇指節橫紋為一寸以意消詳巧拙在人亦有差互今取男左女右手中指第二節內度兩橫紋相去為一寸自依此寸法與人著灸療病已來其病多得獲愈此法有準今以為定定灸多少法凡灸頭與四肢皆不令多灸緣人身有三百六十五絡皆歸於頭頭者諸陽之會也若灸多令人頭旋目眩遠視不明緣頭與四肢肌肉薄若並灸則氣血滯絕於注下宜歇火氣少時令氣血遂通再使火氣流行候炷數足自然除病宜詳察之點灸法凡點灸時須要身體平直四肢勿令拳縮坐點勿令俯仰立點勿令傾側灸時孔穴不正無益於事徒燒好肉虛忍痛楚之苦有病先灸於上後灸於下先灸於少後灸於多宜詳審之發灸瘡法凡著灸療病歷春夏秋冬不較者灸炷雖然數足得瘡發膿壞所患即瘥如不得瘡發膿壞其疾不愈甲乙經云灸瘡不發者故履底灸今熱熨之三日即發膿出自然愈疾今用赤皮蔥三五莖去其蔥青於糖灰中煨熟拍破熱熨灸瘡十餘遍其瘡三日自發立壞膿出疾愈奇穴內迎香二穴在鼻孔中治目熱暴痛用蘆管子搐出惡血效鼻準一穴在鼻柱尖上是穴專治鼻上生酒醉風宜用三稜針出血立效耳尖二穴在耳尖上卷耳取之尖上是穴治眼生翳膜宜灸七壯不宜灸多聚泉一次在舌上當舌中吐舌出直者有縫陷中是穴治哮喘咳嗽及久嗽不愈若灸則不過七壯灸法用生薑薄切一片搭於舌上穴中然後灸之如熱嗽用雄黃末少許和於艾炷中灸之如冷嗽用款冬花為末和於艾炷中灸之灸畢以茶清連生薑細嚼嚥下又治舌胎舌強亦可治用小針出血穴在舌上當舌中吐舌出有直縫陷中是穴也左金津右玉液二穴在舌下兩旁紫脈上是穴捲舌取之治重舌腫痛喉閉用白湯煮三稜針出血海泉一穴在舌下中央脈上是穴治消渴用三稜針出血魚腰二穴在眉中間是穴治眼生垂簾翳膜針入一分沿皮向兩傍是也太陽二穴在眉後陷中太陽紫脈上是穴治眼紅腫及頭宜用三稜針出血出血之法用帛一條緊纏其項紫脈即見刺見血立愈又法以手緊扭其領令紫脈見卻於紫脈上刺見血立愈大骨空二穴在手大指中節上屈指當骨尖陷中是穴治目久痛及生翳膜內障可灸七壯中魁二穴在中指第二節骨尖屈指得之治五噎反胃吐食可灸七壯宜瀉之八邪八穴在手五指歧骨間左右手各四穴其一大都二穴在手大指次指虎口赤白肉際握拳取之可灸七壯針入一分治頭風牙痛其二上都二穴在手食指中指本節歧骨間握拳取之治手臂紅腫針入一分可灸五壯其三中都二穴在手中指無名指本節歧骨間又名液門也治手臂紅腫針入一分可灸五壯其四下都二穴在手無名指小指本節歧骨間一名中渚也中渚之穴本在液門下五分治手背紅腫針入一分可灸五壯兩手共八穴故名八邪八風八穴在足五指歧骨間兩足共八穴故名八風治腳背紅腫針入一分可灸五壯十宣十穴在手十指頭上去爪甲角一分每一指各一穴兩手指共十穴故名十宣治乳蛾用三稜針出血則大效矣五虎四穴在手食指及無名指第二節骨尖握拳得之治五指拘攣可灸五壯兩手共四穴也肘尖二穴在手肘骨尖上是穴屈肘得之治瘰癧可灸七壯肩柱骨二穴在肩端超骨尖上是穴大治瘰癧及治手不能舉動可灸七壯二白四穴即郄門也在掌後橫紋中直上四寸一手有二穴一穴在筋內兩筋間即間使後一寸一穴在筋外與筋內之穴相併治久痔脫肛獨陰二穴在足第二趾下橫紋中是穴治小腸疝氣又治死胎胎衣不下可灸五壯又治女人乾噦嘔吐又治經血不時內踝尖二穴在足內踝骨尖上是穴可灸七壯治下片牙疼及腳內廉轉筋外踝尖二穴在足外踝骨尖上是穴可灸七壯治腳外廉轉筋及治寒熱腳氣宜用三稜針出血囊底一穴在陰囊十字紋中治腎臟風瘡及小腸疝氣腎家一切證候悉皆治之可灸七壯艾炷如鼠矢大鬼眼四穴在手大拇指去爪甲角如韭葉兩指並起用帛縛之當兩指歧繞中是穴又二穴在足大趾取穴亦如在手者同治五癇等證當正發時灸之大效矣體骨四穴在梁丘兩傍各開一寸五分兩足共四穴治腿疼可灸二七壯四縫四穴在手四指內中節是穴用三稜針出血治小兒猢猻勞等證中泉二穴在手背腕中在陽谿陽池中間陷中是穴可灸二七壯治心痛及腹中諸氣痛不可忍者四開四穴合谷並行間是穴手足共四穴
