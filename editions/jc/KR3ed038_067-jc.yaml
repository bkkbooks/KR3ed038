body:
  text: 卷之六十七諸蟲門附論夫人腹中有屍蟲此物與人俱生而為人大害屍蟲之形狀似大馬尾或如薄筋依脾而居乃有頭尾皆長三寸又有九蟲一曰伏蟲長四分二曰蛔蟲長一尺三曰白蟲長一寸四曰肉蟲如爛杏五曰肺蟲狀如蠶六日胃蟲狀如蛤蟆七曰弱蟲狀如瓜瓣八曰赤蟲狀如生肉九曰蟯蟲至細微形如菜蟲狀伏蟲則群蟲之主也蛔蟲貫心殺人白蟲相生子孫轉多其母轉大長至四五尺亦能殺人肉蟲令人煩滿肺蟲令人咳嗽胃蟲令人嘔吐胃逆喜噦弱蟲又名膈蟲令人多唾赤蟲令人腸鳴蟯蟲居胴腸之間多則為痔劇則為㿗因人瘡痍即生癰疽癬瘻瘑疥齲蟲無所不為人亦不必盡有有亦不必盡多或偏有或偏無類婦人常多其蟲凶惡人之極患也常以白筵草沐浴佳根葉皆可用既是香草且是屍蟲所畏也凡欲服補藥及治諸病皆須去諸蟲並痰飲宿澼解醒除蟲盡可服補藥不爾必不得藥力凡得傷寒及天行熱病腹中有熱又入食少腸胃空虛三蟲行作求食蝕人五臟及下部若齒齘無色舌上盡白甚者唇里有瘡四肢沉重忽忽喜眠當數看其上唇內有瘡唾血唇內如粟瘡者心內懊憹痛悶此蟲在上蝕也九蟲皆由臟腑不實脾胃俱虛雜食生冷甘肥油膩咸藏等物筋宣不時腐敗停滯所以發動又有神志不舒魂魄失守及五臟勞熱又病餘毒氣血積鬱而生或食瓜果與畜獸內臟遺留諸蟲子類而生蟲之為候嘔惡吐涎口出清沫痛有去來乍作乍止寸白蟲色白形褊損人精氣力乏腰疼蟯蟲細如菜蟲能為痔漏瘡癩癬癰疽等患寸白蟯蛔是三者皆九蟲數中之一物也外此又有兒童疳䘌昏睡煩躁鼻爛汁臭齒齘生瘡下利黑血蟲食下部為狐下唇有瘡蟲食其臟為惑上唇有瘡三蟲者謂長蟲赤蟲蟯蟲也乃有九種而蟯蟲及寸白人多病之寸白從食牛肉飲白酒所成相連一尺則殺人服藥下之須結里潰然出盡乃佳若齘者相生未已更宜速除之蟯蟲多是小兒患之大人亦有其病令人心痛清朝口吐汁煩躁則是也其餘各種種不利人入胃無不有者宜服九蟲丸以除之蛔蟲者是九蟲之一也長一尺亦有長五六寸或因臟腑虛弱而動或因食甘肥而動其發動則腹中痛發作積聚往來上下痛有休息亦攻心痛腹中熱口中喜涎及吐清水貫傷之者則硬診其脈腹中痛其脈法當沉弱弦今反洪而大則蛔蟲也諸蟲通治方鶴蝨丸治積年常患諸蟲心痛吐水不能食鶴蝨狼牙附子炮去皮臍乾漆搗碎炒令煙盡檳榔白朮橘皮湯浸去白用甘草炙各一兩吳茱萸湯浸微炒乾薑煨各三分狼毒一兩半用醋拌炒黃上為細末煉蜜和搗二三百杵丸如梧桐子大每服十五丸不拘時粥飲送下職蟲積方檳榔牽牛各半斤雷丸一兩半苦楝皮一兩大黃四兩皂角半斤三稜莪朮各二兩另銼同醋煮木香隨意加入上為細末煎皂角膏子煮糊和丸如黍米大每服二錢四更時分冷茶清下小兒一錢下蟲以白粥補之萬靈丸取積追蟲黑牽牛一斤取頭末十兩生用大腹子一斤扁者取末七兩生用如尖者是檳榔莪朮二錢煨京三稜炮雷丸炮廣木香煨各五兩上為細末研勻用好紫色皂角半斤去皮弦切碎用水兩大盞浸一宿冬月浸兩宿撈去粗滓銅磁瓷內熬數沸白沫出為度放冷和藥必須揉搗為丸如梧桐子大每服四錢重五更時沙糖水送下溫冷不妨至天明利三五行看取下是何蟲積以溫白粥補之忌食生冷魚腥硬之物孕婦勿服石榴枝湯治九蟲動作腹中刺痛口吐清水面色黑黃及蟲攻心痛者東引石榴枝三兩陳皮酒浸去白焙吳茱萸湯泡焙炒木香各一兩半芍藥大黃碾各二兩薏苡根二兩半上㕮咀如麻豆大每服半兩水一盞半煎至八分去滓空心溫服狼牙散治九蟲在腸胃令人心煩吐逆下蟲狼牙貫眾鶴蝨紙上微炒過蕪荑仁各一兩上為細末每服一錢粥飲調下良久再服蟲出為度竹節丸治三蟲燒竹節雷丸各三分場灰二分橘皮一分半上為細末煉蜜和丸如梧桐子大每服八丸用白湯送下一日三服檳榔湯治三蟲並寸白蟲上用檳榔三枚以灰火煅過粗搗篩用水三盞煎至一盞半去滓分三服空心日午更各一服其蟲盡下或和蔥白鹽豉同煮飲之亦佳一方治寸白蟲用檳榔二七枚銼碎以水二升半煮成取一升半去滓內末頻服暖臥蟲出或不盡更服取瘥止宿勿食且服之麥門冬丸治肺勞熱生蟲其形如蠶令人咳逆氣喘或謂憂膈氣膈恚膈寒膈熱膈此皆從勞氣所生名曰膏盲病針灸不至麥冬門去心十兩乾薑炮蜀椒去目併合口者微炒出汗各一兩黃耆銼百部焙白朮人參桂去粗皮各一兩一分遠志去心附子炮去皮臍細辛去苗葉甘草炙各一兩半杏仁去雙仁皮尖焙乾麩炒令黃半兩上為細末煉蜜和更於鐵臼內塗酥杵令勻熟丸如酸棗大含化稍稍咽津一方有檳榔一方無白朮前胡湯治脾勞有白蟲長一寸在脾為病令人好嘔胸中咳咳即嘔而不出前胡去蘆白朮銼細辛去苗葉赤茯苓去皮枳殼去穰麩炒常山銼松蘿旋覆花各一兩半龍膽去苗杏仁去雙仁皮尖麩炒各一兩上銼碎每服半兩水二盞入竹葉十片洗淨細切同煎至一盞去滓空心服吐之即瘥若腹中熱滿加芒硝半錢梔子仁一兩半一方用枳實無枳殼雷丸丸治心臟勞熱傷心有長蟲名曰蠱長一尺貫心為病雷丸灰火炮過橘皮湯浸去白焙桃仁去雙仁皮尖麩炒各一兩一分貫眾大者去須半兩白蕪荑炒青葙子炒乾漆炒令煙出各一兩狼牙去連苗處淨刷去土銼一兩半亂髮如雞子大一塊燒為灰研上為細末研勻煉蜜和更於臼內塗酥杵令勻熟丸如梧桐子大每服十五丸空心用溫酒送下至晚再服米飲亦得一方不用塗酥一方有殭蠶吳茱萸根皮貫眾散治腎勞熱四肢腫急有蟯蟲如菜中蟲生於腎中貫眾大者三枚去穰乾漆炒令煙盡二兩吳茱萸水洗去毒焙乾炒一兩半槐白皮乾者銼白蕪荑炒各一兩胡粉炒黃色研一兩杏仁去皮尖雙仁炒半兩上為細末研勻每服二錢空心井花水調下日晚再服桑根白皮酒治肺勞熱生蟲在肺為病桑根白皮取東引者銼一升吳茱萸根皮取東引者淨刷去土五兩狼牙去連苗處淨刷去土三兩上細銼用酒七升煮至二升去滓分作三服每日空心一服一方無狼牙茱萸根浸酒方治脾勞熱有白蟲在脾中為病令人好嘔吳茱萸根取東引者一尺銼麻子八升淨揀陳橘皮去白炒二兩上先搗碎橘皮麻子如泥然後拌茱萸根用酒一斗浸一宿慢火上微煎絞去滓分作五服每服空心溫服蟲即下凡合藥時忌言合殺蟲藥一方以水煎服水銀膏治蟯蟲咬人下部癢上水銀一兩用蒸棗膏和丸如人指大綿里臨臥內下部中一宿內藥時常留綿帶子在外一方水銀損腸宜慎之集效丸治因臟腑虛弱或多食甘肥致蛔蟲動作心腹絞痛發則積聚往來上下痛有休止腹中煩熱口吐涎沫是蛔咬宜服此藥若積年不瘥服之亦愈又治下部有蟲坐痔癢痛木香鶴蝨炒檳榔訶子煨去核蕪荑炒研附子炮去皮臍乾薑炙各七錢半大黃銼炒一兩半上為細末煉蜜和丸如梧桐子大每服三十丸食前用橘皮湯送下婦人醋湯下蠶蛹汁方治蛔蟲上取繅絲蠶蛹兩合爛研生布絞取汁空心頓飲之非繅絲即須依時收取蠶蛹曝乾搗為細末用時以意斟酌多少和粥飲服之錫灰丸取寸白諸蟲錫灰研細末一兩雞心檳榔貫眾各半兩木香二錢半輕粉黃丹各二錢上為細末酒醋煮麵糊為丸如荔枝大每服一丸米泔浸軟日午先吃飯了至黃昏不飢飽時吃肉脯一片引蟲少刻溫酒嚼下至天明早出又吃韭菜亦治寸白蟲治寸白蟲令化為水狗脊貫眾白蕪荑酸石榴根銼各一兩上銼碎每服半兩以漿水一大盞煎至五分去滓四更初溫服先於晚間不得吃夜飯治寸白蟲為水瀉出永除方榧子檳榔蕪荑各等分上為細末每服二錢溫酒調服先燒牛肉脯吃後服藥聖功散治寸白蟲不拘遠年神效南木香檳榔各等分上為細末每服三錢濃米飲調下黎明空心先熟嚼炙豬肉之屬只咽汁吐去滓便服藥辰巳間蟲下其疾永除此方簡易如是取效速用之累驗治寸白蟲方上用榧子四十九枚去皮以月上旬平旦空心服七枚七日服盡蟲消成水永瘥又云食實七顆七日滿蟲化為水一方以百枚只燃啖之食盡佳不能者但啖五十枚亦得經宿蟲消自下一方並治三尸蟲治寸白蟲方上為黑鉛灰炒四錢一服先吃豬肉脯少許一時來卻用砂糖濃水半盞調灰五更服蟲盡下白粥將息一日良予宣和中每覺心中多嘈雜意謂飲作又疑是蟲漫依良方所說服翌日下蟲二條一長二尺五寸頭匾闊尾尖銳每寸作一節斑斑如錦紋一條皆寸斷矣千金謂勞則生熱熱則生蟲心蟲曰蛔脾蟲寸白腎蟲如寸截絲縷肝蟲如爛杏肺蟲如蠶五蟲皆能殺人惟肺蟲為急肺蟲居肺葉之內蝕人肺系故成瘵疾咯血聲嘶藥所不到治之為難有人說道藏中載諸般蟲皆頭向下行唯自初一至初五以其頭上行故用藥者多取胐以前蓋謂是也治濕䘌方青黛二兩黃連黃柏丁香各一兩麝香二分上為細末以車脂和如棗大內下部曰一二度治蟲蝕下部肛盡腸穿者上取長股蛤蟆青背者一枚雞骨一分燒為灰合和吹下部令深入累用效
