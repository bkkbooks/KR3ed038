body:
  text: 卷之三十四遺精白濁門附論蓋謂精之主宰在心精之藏制在腎經云精者身之本生氣之源髓之化也又曰腎主水受五臟六腑之精而藏之曰陰陽之要會也陽密乃固故陽強不密為陰氣乃絕陰平陽秘精神乃治陰陽離決精氣乃竭此之謂也然五臟六腑皆有精氣而腎為都會關司之所又聽命於心人能法道清淨則精氣內持蓋謂腎藏精右為命門為其所舍三焦為其府庫二者皆謂相火相火者即水中真火也然而所舍不可以失守府庫不可以受傷而失守受傷之由莫不在心心為君火右腎為相火而相火奉行君火之命令焉故其病雖在腎而責本在於心心主乎神神有所思動則神馳不返致君火傷而不能下降腎主乎智智有所勞則智亂於中智亂不已俾腎水虧而不能上升降者不下升者不上上下不交水火不媾是由君火失其令相火失其守府庫不能制藏真精自漏故不交而遺泄也夫遺泄之證非惟一種有夢中交而遺者乃心虛神交也有下元虛則敗精不禁而遺者乃腎虛精滑故也有壯年氣盛久節淫欲經絡壅滯而遺者乃曠久滿而溢也有情動於中所願不得而遺者乃為情不遂欲而泄也經云天之在我者德也地之在我者氣也德流氣通而行者也故生之來謂之精兩精相搏謂之神往來者謂之魂並精而出入者謂之魄所以任物者謂之心心有所憶之意意之所存謂之志因志而存變謂之思因思而遠慕謂之慮因慮而處物謂之智故智者謂之養生也如是者皆因心神情之所感變而分之若憂惕思慮則傷神神傷則恐懼流淫而不止喜樂恐懼則傷精精傷則骨酸痿厥而不舉喜樂者神揮散而不藏思慮者氣閉塞而不行盛怒者迷惑而不治則所主之精亦從神之所變隨處與合而精自下是曰遺精也且夫五臟各得藏其精神次行其用也若一臟之變不得其正則一臟病作矣若一臟精神傷之甚則必害豈不虧於心腎蓋精神乃心腎之所主也而遺精者豈非心腎不交之致哉金匱要略云虛勞為病脈浮大手足煩陰寒精自出又謂脈弦而大名曰革男子則遺精女子則失血又謂小腹弦急陰頭寒脈動微緊皆為失精夢交之證由是變為五勞六極諸蒸之病也至於白濁白淫自是一病而赤濁由腎虛膀胱火盛故小便去澀所以赤濁也此濁因腎水不能升運以制火則停凝自敗而成濁或思慮過度嗜欲無常俾心腎不交精元失守以為赤白二濁之患焉赤濁者為心虛有熱由思慮而得之白濁者為腎虛有寒因嗜欲而得之孫真人云流水不腐戶樞不蠹謂其運動而然也劉河間又謂赤白濁與夫白淫皆是熱也如清水作湯則有白腳又如夏則土燥而水濁渾冬則土堅而水清潔此理最當然遺精白濁皆本由心腎不交而得惟所出之路非為一途其可一例言之蓋遺精則自精氣道中而出淫濁等則於小便竅中而出澄定腳有渾濁其狀漩面或如油或如膏糊或有五色光彩多則漸久令人虛損成勞也王冰以白淫為白物如精之狀因溲而下雖云如精將化未成其精而竟出者何以言之蓋精有謂生來之精者身乃先生之精也有謂食氣入胃散精於五臟者有謂水飲自脾肺輸腎腎氣四布五經並行之精者此水穀日生之精也然飲食日生之精皆從生來元精之所化而後分布其臟盈溢則輸之於腎腎乃元氣之本生成之根此始終化之養之之道也遇一臟有邪則真精受傷不能化之而不得入與元精俱藏而竟走泄也若夫脾移熱於腎少腹冤熱而痛則出白者義亦如之為義者必究其本細推其處明辨詳的然後施治至若夢遺者治其心精滑者固其真滿者舒其情濁而赤者清其心濁而白者溫其經白淫者調其榮能攝生者存其神養其心心安神寧腎氣自升火來坎戶水到離扁水火交養遺濁皆清毋以我為過謬惟達道者以自明遺精白濁通治方加味清心飲治心中客熱煩躁赤濁肥脂白茯苓去皮石蓮肉各一錢半益智仁遠志水浸去心薑製炒麥門冬去心人參去蘆石菖蒲車前子白朮澤瀉甘草炙各一錢上作一服水二盅燈心二十莖煎至一盅食前服有熱加薄荷少許蓮子六一湯治心熱赤濁石蓮肉連心六兩甘草炙一兩上為細末每服二錢空心用燈心煎湯調下龍齒補心湯治諸虛不足虛熱潮來心神驚惕睡臥不寧小便油濁龍齒煅另碾人參去蘆熟地黃洗焙當歸酒浸焙乾桔梗去蘆酸棗仁炒白茯苓去皮茯神去皮木肉桂去皮麥門冬去心綿黃耆蜜炙遠志水浸去心薑製炒枳殼麩炒半夏曲白朮以上各一錢甘草炙半錢上作一服水二盅生薑三片粳米一撮煎一盅不拘時服分清飲治思慮過度清濁相干小便白濁益智仁酒浸一宿石菖蒲去毛白茯苓去皮天台烏藥川萆薢各一兩甘草炙四兩上為細末每服二錢食前用鹽湯調服益智湯治腎經虛寒遺精白濁四肢煩倦時發蒸熱鹿茸去毛酥炙巴戟去心肉蓯蓉酒洗熟地黃酒浸附子炮去皮臍桂心山茱萸白芍藥附風泡枸杞子牛膝酒浸甘草炙各一錢上作一服水二盅生薑五片鹽少許煎一盅空心服鹿茸益精丸治心虛腎冷漏精白濁鹿茸去毛酥炙黃桑螵蛸瓦上焙肉蓯蓉杜仲去皮切薑汁炒去絲巴戟去心菟絲子酒浸益智仁川楝子去皮核取肉焙禹餘糧火煅醋淬當歸以上各三兩韭子微炒破故紙炒山茱萸赤石脂龍骨另研各半兩滴乳香二錢半上為細末酒調糯米末煮湖為丸如梧桐子大每服七十丸食前用白茯苓煎湯送下固精丸治嗜欲過度勞傷腎經精元不固夢遺白濁肉蓯蓉酒浸焙乾陽起石火煅研細鹿茸去毛酥炙川巴戟去心酒浸赤石脂火煅七次白茯苓去皮附子炮去皮臍鹿角霜龍骨生用韭子炒各等分上為細末酒煮糊為丸如梧桐子大每服七十丸空心用鹽湯送下瑞蓮丸治思慮傷心便下赤濁白茯苓去皮石蓮肉去心炒龍骨生用天門冬去心麥門冬去心柏子仁炒另研紫石英火煅研細遠志甘草水煮去心當歸去蘆酒浸酸棗仁炒龍齒以上各一兩乳香半兩另研上為細末煉蜜為丸如梧桐子大以硃砂為衣每服七十丸空心用溫酒或棗湯送下遠志丸治小便赤濁如神遠志半斤以甘草水煮去心茯神去木益智仁各二兩上為細末酒煮麵糊為丸如梧桐子大每服五十丸臨臥用棗湯送下心腎丸治水火不既濟心下怔忡夜多盜汗便赤夢遺牛膝去苗酒浸熟地黃蓯蓉二兩酒浸菟絲子酒浸碾三兩鹿茸去毛酥炙附子炮去皮臍人參去蘆黃耆去蘆蜜炙五味子茯神去木山藥炒當歸去蘆酒浸龍骨煨遠志用甘草水煮剝去心薑汁炒各一兩上為細末酒煮糊為丸如梧桐子大每服七十丸空心用棗湯送下秘精丸治元氣不固遺精夢泄大附子炮去皮臍龍骨煅通紅肉蓯蓉酒浸一宿牛膝酒浸焙乾巴戟去心和一兩上為細末煉蜜為丸如梧桐子大每服三十丸空心用鹽酒或鹽湯送下鎖精丸治小便白濁破故紙炒青鹽各四兩白茯苓五倍子各二兩上為細末酒煮糊為丸如梧桐子大每服七十丸空心用鹽湯送下地黃丸治心腎水火不濟或因酒色遂至以甚謂之土淫蓋脾有虛熱而腎不足故土邪乾水先賢常言夏則土燥而水濁冬則土堅而水清此其理也醫者往往峻補其疾反甚此方中和水火既濟而土自堅其流清矣熟地黃十兩蒸九次曝九次菟絲子酒浸鹿角霜各五錢茯苓去皮柏子仁各三兩附子炮去皮臍一兩上為細末另用鹿角膠煮糊為丸如梧桐子大每服一百丸空心用鹽酒送下四精丸治白濁煩渴鹿茸肉蓯蓉山藥茯苓去皮各等分上為細末米糊為丸如梧桐子大每服三十丸空心用棗湯送下小菟絲子丸治腎氣虛損五勞七傷小腹拘急四肢痠疼面色黧黑唇口乾燥目暗耳鳴心忪短氣夜夢驚恐精神困倦喜怒無常悲憂不樂飲食無味舉動乏力心腹脹滿腳膝痿緩小便滑數房室不舉股內濕癢水道澀痛小便出血時有遺瀝並宜服之久服填骨髓補五臟去百病明耳目益顏色延壽菟絲子酒浸焙乾煅為末五兩石蓮肉二兩白茯苓去皮一兩山藥二兩七錢半碾為末打糊上為細末用山藥末打糊為丸如梧桐子大每服五十丸空心用溫酒或鹽湯送下如腰腳無力木瓜湯送下玉鎖固真丹治心氣不足思慮太過腎經虛損真陽不固漩有遺瀝小便經歲白濁或淡赤或如膏夢寐精泄甚則身體拘倦骨節痠疼飲食不進面色黧黑容枯肌瘦唇口乾燥虛煩盜汗舉動乏力多服取效白龍骨半斤磁石火煅醋淬七次牡蠣煅遠志甘草水煮去心白茯苓去皮川巴豆去心官桂去粗皮肉蓯蓉酒浸焙乾桑螵蛸酒浸焙桑寄生真者茴香炒附子炮去皮臍川楝子去核炒吳茱萸炒當歸去蘆蒼朮酒炒木香不見火黃耆去蘆硃砂以上各一兩紫稍花一兩半菟絲子酒浸焙乾家韭子各二兩半上為細末煉蜜和丸如梧桐子大每服五十丸空心用溫酒或鹽湯送下子午丸治心腎俱虛夢寐驚悸體常自汗煩悶短氣悲憂不樂消渴引飲漩下赤白停凝濁甚四肢無力面黃肌瘦耳鳴眼昏頭暈惡風怯寒並皆治之榧子去殼二兩蓮肉去心枸杞子白龍骨川巴戟去心破故紙炒真琥珀另研苦楮實去殼白礬枯赤茯苓去皮白茯苓去皮蓮花須鹽蒸芡實白牡蠣煅文蛤以上各一兩硃砂一兩半碾末為衣上為細末用肉蓯蓉一斤二兩酒蒸爛碾為膏和丸如梧桐子大以硃砂為衣每服五十丸空心濃煎萆薢湯下忌勞力房事專心服餌渴止濁清自有奇效桑螵蛸丸治下焦虛冷精滑不固遺瀝不斷桑螵蛸七個炒附子炮去皮臍五味子龍骨各半兩上為細末糯米糊為丸如梧桐子大每服五十丸空心用鹽酒送下仙方固真丹專治精泄不禁禹餘糧石中黃赤石脂紫石英石燕子以上各一兩俱用炭火內煅通紅醋三升淬干研為極細末白茯苓去皮四兩人參二兩青鹽一兩上為細末再研勻用無灰酒煮糊和丸如小指頭大以硃砂為衣每服二三丸用溫酒或鹽湯送下空心臨睡服鎖陽丹治脫精不禁白茯苓去皮龍骨另碾各一兩桑螵蛸三兩瓦上焙乾上為細末麵糊為丸如梧桐子大每服七十丸食前用茯苓煎湯入鹽少許送下辰砂妙香散治夢中遺精每服二錢虛者溫酒調熱者麥門冬去心濃煎湯調服方見心痛門鎖精丸治精滑不禁川獨活川續斷穀精草石蓮肉去殼干菱米金櫻子白茯苓川楝子酥炒木豬苓小茴香干藕節生雞頭去殼蓮蕊緊龍骨五色者各等分上為細末用雞子清為丸如梧桐子大每服四五十丸空心用鹽湯送下以乾物壓之芡實丸治思慮傷心疲勞傷腎心腎不交精元不固面少顏色驚悸健忘夢寐不安小便赤澀遺精白濁足脛痠疼耳聾目昏口乾腳弱芡實蒸去殼蓮花須各二兩茯神去木山茱萸取肉龍骨生用五味子韭子炒肉蓯蓉酒浸熟地黃酒蒸焙紫石英煅七次牛膝去苗酒浸焙枸杞子各一兩上為細末酒煮山藥糊為丸如梧桐子大每服七十丸空心用鹽酒或鹽湯送下水中金丹治元臟氣虛不足夢寐陰人走失精氣陽起石木香乳香研青鹽各一分白龍骨一兩緊者捶碎絹袋盛大豆蒸豆熟取出焙乾研杜仲去皮生薑汁製炒骨碎補炒茴香炒各半兩黃狗腎一對用酒一升煮熟切作片子焙乾上為細末酒煮麵糊為丸如皂子大每服二丸空心用溫酒送下忌房事八味丸一名腎氣丸治腎氣虛乏下元冷憊心火炎上渴欲飲水或腎水不能攝養多吐痰唾及脾虛不能剋制腎水亦吐痰唾而不咳者臍腹疼痛夜多漩溺尺脈緩弱肢體倦怠面色痿黃或黧黑及虛勞不足渴欲飲水腰重疼痛小便不利腳氣上攻小腹不仁男子消渴小便反多婦人轉胞小便不通並皆治之久服壯元陽益精髓活血駐顏強志輕身脾惡濕腎惡燥如硫黃附子盅乳丹砂之類皆剛劑也用以肋陽補接真氣則可若云補腎則正腎所惡者古人制方益腎皆滋腎之藥故仲景八味元本謂之腎氣丸以地黃為主正補腎經也用附子為佐以助脾元也熟地黃八兩山茱萸去核山藥各四兩白茯苓去皮牡丹皮澤瀉各三兩附子炮官桂去皮各二兩上為細末煉蜜和丸如梧桐子大每服五十丸至七十丸空心食前用溫酒或鹽湯送下婦人用淡醋湯下陽衰陰痿依全方夏減桂附一半春秋三停減一痰去精走全減桂附只服六味地黃丸血虛陰衰熟地黃為君精滑山茱萸為君小便或多或少或赤或黃白茯苓為君小便淋瀝澤瀉為君心虛腸間熱積熱心火盛心氣不足牡丹皮為君皮膚燥澀乾山藥為君以上但言為君者其分兩用熟地黃分兩其乾地黃卻依立為君分兩同或曰八味丸久服可為地仙今老者服之而腹痛少者服之而發瘡或小便頻數或大便結澀或眼昏或精滑泄其故何哉蓋八味修事失制度非方之罪今貨地黃以綠礬豆豉浸蒸欲其易干也地黃本性涼加以礬性冷此老人所以腹痛附子多是重三四錢此是漏藍側子大熱有毒此少者所以發瘡小便頻數澤瀉生也小便結澀山茱萸不去核也今具八味修事於後地黃生者去土水中浮者為天黃中者為人黃沉者為地黃先將地黃蒸良久天黃人黃搗汁取蒸地黃投其汁中候冷如此者三曝乾以酒浸一宿蒸曝乾山藥竹刀刮去皮布巾揩淨切作片子曝乾茯苓為末水飛過掠去筋膜曝乾澤瀉斫作塊子用酒浸一宿略蒸山茱萸酒水浸良久去核每一斤取肉二兩黑附子緊實重七錢者熱炭火內炮裂去皮臍牡丹皮去心及粗皮以酒浸一宿官桂削去外粗皮不可焙上搗為末勿犯銅器如此修合服之而仙復何疑哉久服去附子以揀淨五味子代之無名丹補虛守神澀精固陽道男子服之有奇功非筆可盡述其作用非至神不能處之遂無名可稱其效故曰無名茅山蒼朮一斤不浸入藥臼以麵杖舂令稍滑淨篩去粗皮亦不須過當龍骨別研細粉川烏頭大者炮去皮臍各一兩川楝子三兩去核微炒破故紙三兩微炒赤石脂二兩研茴香舶上並南京者一兩半微炒上為細末合和勻酒煮麵糊為丸如梧桐子大硃砂為衣多可百丸少止三十丸食前溫酒米飲鹽湯任下如欲恃藥力冷酒下五十丸婦人無子服之有益一方加遠志蓮肉並去心白茯苓三味各一兩用蘇合香丸酒下一方無赤石脂秘真丸治腎水真陰本虛心火狂陽過甚心有所欲速於感動應之於腎疾於施泄此藥秘固真元降心火益腎水蓮花蕊益智各一兩黃柏甘草炙各二兩白茯苓去皮砂仁各半兩木豬苓去皮半夏各二錢半上為細末水浸蒸餅和丸如梧桐子大每服四五十丸空心用溫酒送下秘真丹治思想無窮所願不協意淫於外作勞筋絕發為筋痿及為白淫遺溲而下故為勞弱羊脛炭燒紅窨殺厚朴薑製各三兩硃砂一兩上為細末用酒煮糊和丸如梧桐子大每服五十丸空心食前用溫酒送下煨腎附子散治腎臟虛憊遺精盜汗獖豬腎一隻附子一錢為末上將豬腎批開入附子末在內以濕紙裹煨熟空心稍熱服之好飲酒一盞送下心腎丸治心腎不足精少血燥心下煩熱怔腫不安或口乾生瘡目赤頭暈小便赤濁五心煩熱多渴引飲但是精虛血少不受峻補並宜服之菟絲子淘酒蒸擂麥門冬去心各二兩上為細末煉蜜為丸如梧桐子大每服七十丸空心食前用鹽湯送下固真散治才睡著即泄精白龍骨一兩韭子一合上為細末每服二錢匕空心用酒調服此二味藥大能澀精固真氣暖下元枸杞丸補精氣枸杞子冬採者佳黃精上各等分為細末二味相和搗成塊捏作餅子干復搗為末煉蜜為丸如梧桐子大每服五十丸空心溫水送下韭子丸治腎臟冷腰胯痠疼腳膝冷痹夜多小便夢寐遺泄日漸羸瘦面無顏色及治女人惡露赤白帶下上用韭子七升淨揀以醋湯煮千百沸取出焙乾旋炒如油麻香搗羅為細末煉蜜和丸如梧桐子大每服二十丸加至三十丸空心用溫酒送下烏金散療虛夢泄精滑不禁上用九肋鱉甲不以多少去裙袢淨洗過燒灰存性研為細末每服一字用清酒小半盞陳蔥白七八寸同煎至七分去蔥白和滓日西時服須臾得黏臭汗為度次日進粟米粥忌食他物葛玄真人百補交精丸治夢泄精滑不禁熟地黃酒浸一宿切焙乾四兩山藥二兩五味子去梗六兩杜仲去粗皮銼碎慢火炒斷絲三兩肉蓯蓉酒浸一宿切碎焙乾二兩牛膝去苗銼碎酒浸一宿焙乾二兩澤瀉山茱萸去核茯神去木遠志去心巴戟去心石膏火煅令赤去火毒柏子仁微炒別研赤石脂各一兩上為細末煉蜜為丸如梧桐子大每服二十丸空心用酒送下男女並宜服之王荊公妙香散安神閉精定心氣龍骨五色者益智去皮人參以上各一兩白茯苓去皮遠志去心茯神去木各半兩硃砂研甘草炙各一分上為細末每服二錢空心用溫酒調服既濟丹治水火不濟心有所感白濁遺精虛敗不禁腎虛不攝精髓久而不治若更多服熱藥遂致日增其病腰腳無力天門冬去心焙桑螵蛸蜜炙黃連去須雞䏶胵麥門冬去心焙海螵蛸蜜炙遠志去心牡蠣煅龍骨五色者澤瀉以上各二兩上為細末煉蜜和丸如梧桐子大硃砂為衣每服三十丸空心用燈心棗湯吞下日進二三服固真丹治證同前沉香丁香木香茴香人參當歸微炒滑石乳香別研沒藥別研琥珀別研全蠍微炒干胭脂別研一半為衣山藥穿山甲蛤粉炒木通頭末血竭別研破故紙酒浸炒地龍去土茯神去木各半兩燈心三錢干蓮心微炒桑螵蛸炒或酥炙麝香別研以上各二錢半蛤蚧去頭足酥炙膃肭臍酒浸酥炙各一對上為細末於辰火日合醋浸蒸餅為丸如櫻桃大每服二三丸空心用溫酒送下忌豬羊血蒜騎馬服訖乾物厭之咒曰三咒然後合之北海冷冷雪浪如銀三江四海盡入藥中能實骨髓能養精神誅殺鬼魅永保遐齡急急如律令奉敕攝香茸丸滋補精血益養真元治下焦陽竭臍腹㽲痛飲食減少目視茫茫夜夢鬼交遺泄失精肌肉消瘦鹿茸麋茸二味俱用火燎去毛酥炙各二兩麝香別研半兩沉香五味子白茯苓去皮白龍骨火煅肉蓯蓉酒浸一宿切焙乾五味各一兩上為細末和勻用熟地黃三兩焙乾為細末以酒二升熬成膏子搜藥入臼內搗千杵如硬更入酒少許丸如梧桐子大每服五十丸空心溫酒鹽湯任下麋角既濟丸治水火不濟精神恍惚夢寐紛紜陽道不興耳內虛鳴小便白濁遺瀝失精常服能使火不上炎而神自清水不下滲而精自固壯陽固氣益血駐顏功效特異麋角一具淨水浸三日刮去粗皮鎊作屑盛在瓷瓶內銀瓶尤佳以牛乳浸一日乳耗更添直候不耗於角屑上乳深二指以來用大麥只看瓶器大小臨時安頓瓶內約厚三寸上置瓶更用大麥周迴填實惟露瓶口不住火蒸一伏時如鍋內水耗旋添湯直候角屑蒸得細膩如面相似即住火取出細研別用下項藥人參去蘆遠志去心山茱萸去核全蠍艾葉炒去毒石菖蒲赤石脂五味子硃砂別研龍骨山藥以上各二兩天雄炮去皮臍菟絲子酒浸一宿焙補骨脂炒附子炮去皮臍巴戟去心各三兩肉蓯蓉酒浸一宿切焙柏子仁別研熟乾地黃洗焙各四兩上為細末用麋角膏子搜和搗一千杵丸如梧桐子大每服一百丸空心用溫酒送下煮鹿角膠法須用兩鍋一鍋常用溫湯準備用鹿角不以多少截斷三寸許去粗皮自死者不用上將鹿角於河水內浸七日其水每旦易換日中洗淨鍋中煮每鹿角五斤用桑白皮半斤楮實一斤舶上硫黃二兩硃砂二兩同煮之如水盡即旋添湯及一伏時自然以軟或火不相繼未軟再煮一伏時如軟放冷取出當風處掛起便可入藥用煮藥水濾去諸藥慢火再熬便可為膠既濟固真丹治水火不既濟精神恍惚頭目昏暗陽道痿弱陰濕多汗遺瀝失精脾胃虛怯心腎不寧凡腎水欲升而沃心心火欲降而滋腎則坎離既濟陰陽協和火不炎上則神自清水不滲下則精自固常服壯陽固氣溫脾益血白茯苓沉香肉蓯蓉酒浸一宿如無以鹿茸酥炙代之北五味子附子龍骨以上各一兩川巴戟去心當歸酒浸川椒去目各半兩柏子仁去殼炒酸棗仁去殼炒金鈴子去核炒菟絲子酒浸別研益智仁去皮補腎脂炒上為細末酒糊為丸如梧桐子大硃砂末三錢為衣每服五七十丸空心用鹽酒送下侍左王郎中容傳與右司謝大卿暨服之果是奇絕石斛散治虛勞脫營失精多驚榮衛耗奪形體毀沮大補益兼治不足乏力少食石斛去根肉蓯蓉酒洗去皺皮切焙令乾各二兩菟絲子酒浸一宿別搗遠志去心續斷各一兩一分天雄炮去皮臍三分熟地黃焙枸杞子各二兩半棗肉研二兩上為細末入棗肉研和勻每服二錢空心用溫酒調服食後再服一方無棗肉人參湯一名棗仁湯治虛勞失精便溺白濁形體枯瘦腰腳疼人參官桂去粗皮芍藥以上各三分白茯苓去皮白龍骨牡蠣煅黃耆甘草炙以上各半兩酸棗仁澤瀉各一分半夏湯洗去滑焙乾二兩上粗搗每服三錢水一盞入生薑半分拍碎煎至七分去滓空心溫服韭子丸治虛勞漏精韭子炒車前子菟絲子酒浸別搗天雄炮去皮臍龍骨以上各一兩鹿茸燎去毛酒炙桑螵蛸炙乾薑炮各三分上為細末煉蜜和丸如梧桐子大每服二十丸空心用黃耆煎湯送下固氣丸治清精自下天雄菟絲子五味子龍骨以上各一兩半桑螵蛸山茱萸乾薑巴戟以上各一兩韭子二兩上為細末煉蜜和丸如梧桐子大每服三四十丸空心用溫酒任下或乾薑減半亦可一方有木賊一兩半內固丸澀精健陽天雄龍骨鹿茸牡蠣韭子各半兩上為細末酒煮麵糊為丸如梧桐子大每服三十丸空心用冷酒送下臨臥時再服茯神散治虛勞無力夢與鬼交心神虛煩宜服茯神黃耆人參以上各一兩麝香一錢別研桂心牡蠣龍骨甘草炙各三分上為散入麝香合勻每服三錢水一中盞入生薑半分棗三枚煎至六分去滓溫服日三四服紫石英丸治虛勞夢與鬼交失精虛竭至甚紫石英細研水飛桑螵蛸微炒人參去蘆柏子仁去殼別研龍骨以上各二兩硃砂細研水飛肉蓯蓉酒浸一宿刮去皺皮炙乾各一兩麝香半兩細研上為細末入別研藥令勻煉蜜和搗三二百杵丸如梧桐子大每服二十丸食前用溫酒送下牡蠣散治虛勞夢泄乏力盜汗牡蠣煅二兩蒼朮炒龍骨各三兩桑螵蛸微炒白芍藥棘刺微炒桂心柏子仁車前子甘草炙各一兩上為細末每服二錢食前用粥飲調服柏子仁丸治虛勞夢泄柏子仁枸杞子炒各一兩地膚子一兩半新韭子三兩須十月霜後採者酒浸曝乾微炒上為細末以煮棗肉和搗百餘杵丸如梧桐子大每服三十丸空心及晚食前以粥飲下桑螵蛸散治虛勞夢泄桑螵蛸一兩微炒韭子二兩微炒上為細末每服二錢空心用溫酒調下晚食前再服真珠丸治虛勞夢泄鎮精真珠六兩以牡蠣六兩用水同煮一日去牡蠣取真珠為末上為細末卻入水於乳缽內研三五日後寬著水飛過候乾用蒸餅和丸如梧桐子大每服二十丸食前用溫酒下雞腸散治虛勞膀胱寒小便數而精出宜服赤雄雞腸雞䏶胵各二具俱炙令乾熟地黃一兩牡蠣粉赤石脂白石脂桑螵蛸微炒龍骨以上各三分黃連去須三兩肉蓯蓉一兩半酒浸一宿刮去皺皮炙乾上為細末每服二錢食前溫酒調服枸杞子散治虛勞小便精出口乾心煩宜服枸杞子龍骨各一兩五味子覆盆子白芍藥各三分麥門冬去心焙一兩半上為細末每服二錢不拘時用溫酒或粥飲調下鍾乳酒治陰痿不起遺瀝清精鍾乳粉三錢研細用絹袋盛之附子炮當歸前胡人參牡蠣煅生薑切枳實生用甘草炙以上各二兩五味子薯蕷各三兩石斛桂心各一兩菟絲子五合乾地黃五兩上銼碎用絹袋盛以清酒二斗浸之春夏三日秋冬七日量性飲之忌海藻菘菜豬肉冷水蔥白蕪荑黏食等安中湯治腎經虛寒遺精白濁四肢煩倦時發蒸熱精不禁熟地黃川巴戟龍骨茯苓遠志以上各三錢天雄五味子山藥以上各三錢半肉蓯蓉酒浸川續斷各四錢菟絲子蛇床子以上各四錢半上為細末每服二錢食前用酒調服金鎖玉關丸治遺精白濁心虛不寧雞頭肉蓮子肉蓮花蕊藕節白茯苓白茯神乾山藥各二兩上為細末用金櫻子二斤去毛茨捶碎水一斗熬至八分去滓再熬成膏仍用少麵糊同和為丸如梧桐子大每服五七十丸不拘時溫米飲送下治便濁方上用生白礬如圓眼大一塊碾細先用板豬油熬熟安放令冷次用童子小便或自己小便一小盞用瓦罐盛火上頓待沸入礬在內又挑熟豬油一塊候溫得所食前服之晚下空心又進每日一服甚者三四服便清大茴香丸治小便白濁出髓條大茴香酸棗仁炒破故紙炒白朮白茯苓牡蠣用左顧者砂鍋內慢火煅爆為度益智人參各等分上為細末用青鹽酒糊丸如梧桐子大每服二十丸食前用溫酒或米飲送下蓮肉散治小便白濁夢遺泄精等疾蓮肉益智仁龍骨五色者各等分上為細末每服二錢空心用清米飲調下威喜丸治精氣不固夢泄白濁白茯苓去皮切作塊以豬苓一分同放於瓷器內用水煮至二十餘沸取出焙乾研為細末四兩黃蠟四兩上將黃蠟熔化搜和茯苓末為丸如彈子大空心細嚼滿口生津徐徐咽津服以小便清為度仍忌食醋通靈散治心氣不足小便滑赤白二濁益智仁白茯苓白朮各等分上為細末每服二錢不拘時用白湯或溫酒調服治虛憊便濁滴地成霜方蓮肉去心藕節乾者龍骨遠志以上各一兩白礬枯靈砂各一分上為細末糯米糊為丸如梧桐子大每服十五丸食前用白湯送下玉鎖丸治夢遺失精小便白濁敗荷葉曬乾不見火二兩白茯苓牡蠣左顧者煅過各一兩龍骨用五色真者另研三錢上為細末研勻以敗蠟熔和丸如梧桐子大如無敗蠟以蠟糊代之每服三五十丸空心用麥門冬湯送下日進二服如覺陽道衰微小便清夢遺止即住服忌酒並熱面動風等物如欲陽道如故即以麝香酒解之此藥治大衰痿陽道止妄心惟修真養性之士宜服之二參丸治虛勞小便餘瀝尿精人參菟絲子酒浸一宿別搗各半兩麥門冬去心焙澤瀉各一兩官桂去粗皮牡蠣煅研成粉黃柏去粗皮蜜炙細辛去苗葉附子炮去皮臍苦參山芋以上各三分生地黃焙乾薑炮各一分上為細末煉蜜和丸如梧桐子大每服三十丸空心用溫酒送下如𤸷痹加附子炮裂去皮臍一分婦人血傷加生地黃焙半兩黃柏去粗皮蜜炙一分一方用熟地黃治虛勞失精小腹弦急隱隱頭疼目痛發落椒腎丸治虛勞內傷腎氣衰冷小便餘瀝精氣滑泄宜服漢椒去目併合口者微炒出汗鹿茸去毛酥炙雞頭實生用龍骨以上各二兩肉桂去粗皮桑螵蛸微炒白礬制乾薑炮白朮以上各一兩半補骨脂微炒一兩上為細末入鹽花二兩研令勻用獖豬腎十枚切去脂膜研令爛以酒三升漸入熬成膏次入藥末和搗二三百杵丸如梧桐子大每服三十丸食前溫酒送下益智子湯治遺精虛漏小便餘瀝益氣安神補不足安三焦調諸氣夜多小便者益智仁二十四枚上研碎用水一中盞入鹽少許同煎服有奇效韭子丸治房室過度精泄自出不禁腰背不得屈伸食不足肌肉兩腳苦弱此藥治之韭子一升桂心當歸紫石英遠志天雄紫菀山茱萸薯蕷細辛人參禹餘糧川芎白朮附子石菖蒲杜仲乾薑石斛白茯苓殭蠶天門冬甘草以上各一兩半肉蓯蓉菟絲子乾地黃蛇床子黃耆以上各二兩乾漆牛髓以上各四兩大棗五十枚上為細末以白蜜入牛髓棗膏合搗三五千杵丸如梧桐子大每服十五丸加至二十丸空心溫酒鹽湯任下治夢中遺泄精方上用乳香如大拇指一塊臨臥時放口中爛嚼至半夜即吞下不二三次病愈搏金散治便濁之疾皆緣心腎水火不濟或因酒色遂至以甚謂之土淫蓋心有虛熱而腎不足故土邪乾水史載之嘗言夏則土燥而水濁冬則土堅而水清此其理矣醫者往往峻補其疾反甚此方中和服之使水火既濟而土自堅其流清矣人參龍骨煅各一兩白茯苓絡石各二兩上為細末每服二錢空心用米飲調下臨睡再服坎離丹既濟水火滋補心腎止白濁夢遺酸棗仁淨肉研辰砂研各一兩乳香半兩研附子一個炮去皮臍上為細末研勻煉蜜和丸如雞頭實大每服一丸空心用溫酒送下須是臘日合以瓷器收之三仙丸治夢泄益智仁二兩用鹽二兩炒去鹽烏藥一兩半炒山藥一兩為末打糊上為細末用山藥末煮糊和丸如梧桐子大每服五十丸空心臨臥用鹽湯送下以硃砂末為衣凡病精泄不禁自汗頭眩虛極或寒或熱用補澀之藥不效其脈浮軟而散蓋非虛也亦非房室過度此無他心有所睹因有所慕意有所樂欲想方興不遂所欲而致斯疾既以藥補且固不效將何治之緣心有愛則神不歸意有想則志不寧當先和榮衛榮衛和則心安次調其脾脾氣和則志舍定心腎交媾精神內守其病自愈其法用人參三錢當歸一錢洗焙為末作三服糯米飲調服服畢自汗止而寒熱退頭眩未除川芎三錢人參一錢焙為末作三服沸湯調服頭眩遂瘥精不禁者用白芍藥半兩丁香三錢木香三錢銼散每服用生薑五片棗二枚以水同煎空心服即心安神定精固神悅水陸二仙丹治白濁金櫻子洗淨搗碎入甑中蒸令熟用湯淋之取汁入銀銚內慢火熬成稀膏將雞頭末和丸雞頭實去殼研為末等分上為末以煎膏同酒糊為丸如梧桐子大每服三十丸食前用溫酒送下一方用乳汁丸一方用鹽湯送下韭子方治夢泄失精及溺白上用新韭子二升須十月霜後採好者用好酒八合漬一宿明旦日色好童子向南搗一萬杵平旦用溫酒五合服方寸匕日再一方微炒為末食前酒服一方用生韭子空心鹽湯下三十粒赤腳道人龍骨丸治白濁龍骨牡蠟各半兩上研為末同入鯽魚腹內用紙裹入火內炮熟取出去紙將藥同魚肉搜和丸如梧桐子大每服三十丸空心用米飲下每用鯽魚不拘大小只著盡上件藥為度服時看藥效如何更加入茯苓遠志各半兩尤佳蓮實丸治下元虛冷小便白淫蓮實去殼巴戟去心附子炮去皮臍補骨脂炒以上各二兩山茱萸覆盆子各一兩龍骨研半兩上為細末煮米糊和丸如梧桐子大每服二十丸加至三十丸空心用鹽湯送下龍骨湯治小便白淫及遺泄精無故自出龍骨五兩別研牡蠣煅官桂去粗皮熟地黃白茯苓去皮人參甘草炙各二兩上為散每服五錢匕水一盞半煎至八分去滓空心服秘真丸治小便白淫不止精氣不固及有餘瀝或夢與陰人通泄龍骨一兩別研縮砂去皮半兩訶黎勒去核五枚丹砂研一兩存一分為衣上為細末煮糯米糊為丸如綠豆大以丹砂為衣每服一丸空心熱酒送下夜臥服三丸冷水送下不可多服或太秘欲通用蔥湯點茶服之即通
