body:
  text: 卷之二十三咳逆門附論內經云歲金太過咳逆金鬱之發咳逆少陰二氣咳逆活人書云咳逆仲景所謂噦是也胃寒所生傷寒本虛攻其熱必噦難知云夫咳逆證活人斷為噦逆其說似是而非蓋噦者乾嘔也若有物直出則為吐也物旋出則為嘔也嘔無物出則為噦也咳逆者或水漬於肺而心下痞或連續不已而氣逆或喜笑過多而氣噎或咽飲而錯喉而氣搶或急食乾物而氣塞皆能作咳逆之聲連續不絕俗謂之吃忒是也大抵咳逆者不順之義吃忒者差錯之義二者皆氣不得下為火熱托之而使上至咽喉中噎而止也人或以紙按鼻嚏而止或詐冤盜賊因恐而止或鼻熱聞食香而止皆抑之駭之而使氣下也千金以咳逆上氣者為病肺脈散者死是心火刑于肺金也格致餘論云吃病氣逆也氣自臍下直衝上出於口而作聲之名也書曰火炎上東垣謂火與元氣不兩立又謂元氣之賊古方悉以胃弱言之而不及火且以丁香柿蒂竹茹陳皮等劑治之未審孰為降火孰為補虛人之陰氣依胃而養胃土傷損則木氣侮之矣此土敗木賊也陰為火所乘不得內守木挾相火乘之故直衝清道而上言胃弱者陰弱也虛之甚也病人見此以為危證然亦有實者今以治驗略言之有一弱人暑月因大飢大怒得滯下疾渴飲蜜水滯下緩而吃作倦甚知其因下久而陰火盛以人參白朮煎湯調益原散與之數日而止又有一膏粱老人久喘病而作止不常新秋患滯下食大減至五七日後吃作脈大眾以為難以形瘦觀之尚可以人參白朮湯下大補丸以補血不數日獲安此二人虛之為也又一女子性躁味厚暑月因大怒而吃作每作則舉身跳動神昏不知問之乃暴病視其形氣俱實遂以人參蘆煎湯飲一碗大吐頑痰數碗大汗昏睡一日而安此曝怒氣上肝主怒肺主氣經曰怒則氣逆因怒逆肝木乘火侮肺故吃大作而神昏參蘆善吐痰盡氣降而火衰金氣復位胃氣得和而解矣難知云活人以咳逆為噦謂可下之宜調胃承氣湯是邪氣在胃故斷之為噦是則然矣抑不思咳逆者是足陽明失下傳手太陰活人但言其火之本不言其火之標炎上至極高之分而咳逆也合而觀之噦與咳逆同一熱也分而言之噦為本為膽為胃為中咳逆為標為心為肺為上若標病應見止當治標不必名噦若言作噦使後人只見膽胃本而不見心肺標也三因云咳逆之病古人以為噦耳多因吐利之後胃中虛寒遂成此疾亦有胃中虛膈上熱噦至八九聲相連收氣不回者大抵傷寒久病後老人虛人及婦人產後多有此證者皆病深之候也亦有噦而心下痞悸者有痰水所謂別無惡候者也丹溪云吃病者氣逆也氣自臍下直衝上出於口而作聲也書曰火炎上內經曰諸逆衝上皆屬於心朱奉議首論熱降而以下豈無超穎之士而極言者孰不謂之熱而有此乎至於海藏深發前人所未發故猶有陰證發之說但形證少瘥耳大抵治法虛則補之補中須分寒熱或因汗吐下誤服寒涼過劑當以溫而補之如脾胃陰虛火逆衝上當以平而補之挾熱者涼而補之若夫實者如傷寒失下地道不通因而咳逆當以下之如痰飲停蓄心下曝怒氣逆痰厥此等必形氣俱實別無惡候皆當隨其邪之所在而湧之泄之清之利之也諸論具詳皆前人所述學者當守規矩以治之咳逆通治方橘皮竹茹湯治吐利後胃虛膈熱而咳逆橘皮三錢竹茹二錢人參二錢甘草一錢炙上作一服水二盅生薑五片紅棗三枚煎一盅不拘時服柿蒂湯治胃膈痞滿咳逆柿蒂五錢丁香三錢上作一服水二盅生薑五片煎一盅不拘時服半夏生薑湯治噦欲死半夏湯泡六錢生薑五錢上作一服水二盅煎至一盅分作二服不拘時服桂苓白朮丸治痰逆止咳嗽散痞滿壅塞開堅結痛悶進飲食調和五臟辣桂乾生薑各二錢半半夏湯泡七次茯苓去皮各一兩白朮陳皮去白澤瀉以上各半兩上為細末麵糊和丸如小豆大每服二三十丸生薑湯下日三服病在膈上食後服病在下食前服病在中不拘時服一方用黃柏黃連各半兩水丸服效小柴胡湯治傷寒熱證咳逆嘔噦方見傷寒門加柿蒂煎服灸咳逆法其法於患人乳下一指許正與乳相直骨間陷處如婦人即屈乳頭下乳頭齊處是穴灸之艾炷如小豆大灸三壯男左女右只灸一處火到肌即瘥如不瘥不可治也其穴當取乳下骨間動脈處是穴丁香柿蒂散治吐利及病後胃中虛寒咳逆至七八聲相連收氣不回者難治丁香柿蒂人參茯苓橘皮良薑炒半夏以上各一兩生薑一兩半甘草三分上為末每服三錢水一盞煎乘熱頓服或用此藥調蘇合香丸服之亦妙治久患咳噫連咳四五十聲者上用生薑自然汁半合入蜜一匙同煎令熟不拘時溫服如此三四服立效治寒氣攻胃咳噫上用黑豆二合炒熱內於瓶中以熱醋沃之紙封開小孔子令患人以口吸其氣入咽喉中即定橘皮乾薑湯治胃中有寒咳逆橘皮乾薑通草桂心人參甘草各等分上為散每服四錢水一盞半煎六分溫服日三服羌活附子散止咳逆羌活附子炮去皮臍茴香炒各半兩木香丁香乾薑炮各一兩上為末每服二錢水七分盞鹽少許煎數沸空心服一方無丁香一方用丁香不用木香丁香散治咳逆噎汗丁香柿蒂各一錢良薑甘草炙各半錢上為末每服二錢不拘時用熱湯乘熱點服丁香柿蒂散治諸種吃噫嘔逆痰涎丁香柿蒂青皮陳皮各一兩上㕮咀每服三錢水一盞半煎七分去滓不拘時溫服治丈夫女子傷中絕脈筋急痛咳逆上以鹿髓和熱酒服之良治寒氣攻胃咳噫草豆蔻去皮益智去皮各一兩乾柿蒂二兩上㕮咀每服三錢水一中盞入生薑半分煎至五分去滓不拘時熱服治咳逆上以蘇合香丸用丁香柿蒂煎湯化下噫逆即咳逆也乃胃寒所致良薑為要藥人參白茯苓佐之蓋良薑能溫胃能解散胃中風邪香飲子治咳逆不止上用乾柿蒂十五枚為末用水一盞加白鹽梅少許煎至六分不拘時溫服蓽澄茄散治噫氣咳逆亦治傷寒咳逆日夜不定篳澄茄良薑各二兩上為末每服二錢水一盞煎六分沸投醋半盞取出呷之治諸吃噫橘皮三兩湯浸去穰銼枳殼一兩去穰麩炒上銼碎以水一升煎至五合去滓通熱頓服治寒氣攻胃咳噫吳茱萸半兩湯浸七次焙乾微炒青橘皮半兩湯浸去白焙上㕮咀每服三錢水一中盞入生薑半分同煎至五分去滓不拘時熱服硫黃嗅法治咳逆服藥無效者硫黃乳香上各等分為末用酒煎急令患人嗅之又方嗅法雄黃二錢上為末用酒一盞煎七分急令患人嗅其熱氣即止
