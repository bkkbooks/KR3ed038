body:
  text: 卷之五十一腸澼痔漏門附論經曰風客淫氣其精乃亡邪傷肝也因而飽食筋脈橫解腸澼為痔蓋緣風氣通於肝肝生風風生熱風客則淫氣傷精精亡則邪熱傷肝因飽食行房則筋脈橫解而腸澼痔漏生焉夫痔者而巢氏病源論有五曰牡痔牝痔脈痔腸痔血痔也及古諸方又有酒痔氣痔蟲痔番花螻蛄等痔之名不一且痔於肛門生癗或在外而或在內有似鼠乳者有似櫻桃者其形不一其病有痛有癢有硬有軟有膿潰者有不潰者有腫痛便難者有隨大便下清血不止者有穿竅血出如線者至於失治而成漏者成漏而穿臀者及有穿腸成孔糞從孔中出者或肛門四圍生癗數枚膿血浸淫若蓮花者詳此諸證大凡肛邊生乳鼠時出膿血者為牡痔肛邊生瘡腫痛出血者為牝痔肛邊生瘡且疼且癢者為脈痔肛內結核寒熱出血者為腸痔肛門腫痛大便難強力則肛出不收者為氣痔肛門瘡腫流血飲酒即發者為酒痔肛邊有竅血出如射線者為血痔肛門浸淫濕爛內有蟯蟲蝕腸穿穴遂成漏者為蟲痔也然此諸證皆本之於大腸也大腸者庚金也本性燥清肅殺之氣本位主收所司主行津液以從足陽明中州土之所化若旺則能生化萬物而衰則損傷萬物故云萬物生於土而歸於土此之謂也然手足之陽明同司其化焉若人醉飽行房精氣脫泄其脈空虛酒熱之毒流著於脈或因醉飽淫極而強忍泄或用藥固其精弗能泄越停積於脈歸注大腸以致木乘火勢而侮燥金以火就燥則大便閉而痔漏作矣治宜苦寒瀉火辛溫和血潤燥疏風止痛之劑也靈樞經云足太陽膀胱之脈及筋皆抵腰中入絡腎其支者貫臀足故主筋為病則生此疾由是推之足厥陰之脈環繞前後一陰故亦能為痔矣每見人患痔其發則色青痛甚蓋謂肝苦急而然也且夫痔與漏初致之由雖同所患之病實異初生肛邊成癗不破者曰痔破潰而出膿血黃水浸淫淋瀝久不止者曰漏也原此受病者燥氣也為病者濕熱也胃行大腸則化燥火以乘濕熱之實也若夫腸頭成塊者濕也作痛者風也膿血潰出者熱勝血腐也潰成黃水者濕熱風燥也大便閉作大痛者風熱鬱滯弗能通泄氣逼大腸而作也大腸結燥者主病兼受火邪也凡此疾者皆由濕熱風燥四氣相合而致也而腸澼者為大便下血也蓋因人之不避風毒恣飲醇酒炙爆之物縱欲喜怒無常臟腑鬱抑飲食自倍腸胃乃傷陰陽不和關格壅滯熱毒下注血滲大腸其腸澼痔漏不可得而無矣經云筋脈橫解腸澼為痔者此也至於臟毒腸風痔漏而名雖殊其源實一大抵腸澼之病有可治不可治者若便血身寒則可治身熱則不可治腸澼下白沫脈沉者生脈浮者死如下膿血脈滑大者生脈懸絶則死腸澼脾脈外鼓沉久自已而肝脈小緩則易治腎脈搏沉身熱是死也醫療之法惟宜祛風消毒解熱涼臟和血潤燥隨宜施治無不瘥矣腸澼痔漏通治方秦艽白朮丸治痔疾並漏有膿血大便燥硬作疼痛不止秦艽去蘆桃仁去皮尖另研皂角仁去皮弦燒存性各一兩枳實麩炒當歸尾酒製澤瀉白朮以上各半兩地榆三錢上為細末與桃仁泥碾勻湯煮麵糊和丸如梧桐子大合藥光滑焙乾每服一百丸白湯送下空心服待少時以美膳壓之忌生冷硬物冷水菜之類並濕面酒及五辛辣熱大料物之類犯之則藥無驗矣數服而愈秦艽蒼朮湯秦艽去苗蒼朮皂角仁燒存性桃仁去皮尖各一錢半黃柏去粗皮酒製澤瀉當歸尾防風以上各一錢檳榔半錢大黃少許上作一服水二盅煎至一盅空心服待少時美膳壓之忌生冷硬物冷菜之類及酒濕面乾薑之類如有膿加白葵花五朵去萼青皮半錢同煎去滓入木香末三分服秦艽防風湯治痔漏每日大便時發疼痛如無疼痛非痔漏也此藥主之秦艽防風當歸白朮各一錢半黃柏橘皮柴胡大黃煨澤瀉各一錢紅花桃仁升麻各五分甘草炙六分上作一服水二盅煎至一盅空心服避風寒忌房事及酒濕面辛熱之物當歸郁李仁湯治痔漏大便結硬大腸下墜多血苦痛不能忍者當歸尾郁李仁澤瀉生地黃煨大黃枳實蒼朮秦艽以上各一錢麻子仁一錢半皂角仁一錢另為細末煎成調服上作一服水二盅煎至一盅空心服忌風寒處大小便秦艽羌活湯治痔疾成塊下垂疙瘩其癢難忍秦艽羌活黃耆各一錢半麻黃防風升麻柴胡甘草炙各一錢藁本細辛紅花各五分上作一服水二盅煎至一盅空心服紅花桃仁湯治痔疾經年因飽食筋脈橫解腸澼為痔常去其筋脈橫解破血絡是也治法當補北方瀉中央紅花桃仁麻黃各半錢生地黃黃柏各一錢半豬苓漢防己當歸尾澤瀉蒼朮防風各一錢上作一服水二盅煎至一盅空心服秦艽當歸湯治痔漏大便結燥疼痛秦艽枳實各一錢半當歸皂角仁去皮燒存性桃仁澤瀉白朮各一錢大黃煨五錢紅花半錢上作一服水二盅煎至一盅空心服地榆散治痔瘡腫痛地榆黃耆枳殼檳榔川芎黃芩槐花赤芍藥羌活各一錢白蘞蜂房炒焦甘草炙各半錢上作一服水二盅煎至一盅食前服槐角丸治諸痔及腸風下血脫肛槐角去梗一兩防風地榆枳殼麩炒當歸黃芩各半兩上為細末酒糊為丸如梧桐子大每服五十丸空心用米飲送下釣腸丸治久新諸痔肛邊腫痛或時瘡癢有膿血栝蔞二個燒存性蝟皮二個燒存性白礬煅緑礬煅白附子生用天南星雞冠花煅炒半夏各五兩胡桃仁十五個不油者罐內煅存性枳殼炒附子炮去皮臍訶子去核各二兩上為細末醋糊為丸如梧桐子大每服三五十丸臨臥用溫酒送下遠年不瘥者服十日效久服除根皂刺丸治痔漏而復癢皂莢刺二兩燒煙盡存性防風槐花各七錢半蛇床子白礬煅枳殼白蒺藜炒去刺羌活各半兩蜂房炒焦五倍子各二錢半上為細末醋調緑豆粉煮糊為丸如梧桐子大每服五十丸食前以苦楝根煎湯送下仍用童子熱尿入白礬末淋洗肛門皂角煎丸治內痔腸頭裡面生核寒熱往來滿尺皂角三挺去弦核醋炙白礬煅刺蝟皮炙黃薏苡仁白芷以上各一兩桃仁去皮炒甜葶藶炒川芎桔梗以上各半兩豬後蹄垂甲十枚燒存性上為細末煉蜜和丸如梧桐子大每服五十丸空心用桑白皮煎湯送下芎歸丸治痔下血不止川芎當歸神麯炒槐花微炒黃耆地榆以上各半兩荊芥穗頭髮燒存性木賊阿膠炒各一兩上為細末煉蜜為丸如梧桐子大每服五十丸食前用米飲送下乾葛湯治酒痔乾葛枳殼炒半夏薑製生地黃茯苓杏仁各一錢半黃芩甘草炙各半錢上作一服水二盅黑豆一百粒生薑五片白梅一個同煎至一盅食前服橘皮湯治氣痔橘皮枳殼炒槐花炒川芎各一錢半桃仁去皮炒木香檳榔紫蘇莖葉香附甘草炙各一錢上作一服水二盅生薑三片紅棗二枚煎一盅食前服荊枳湯治氣滯發痔荊芥穗枳殼炒槐花紫蘇莖葉香附甘草炙各等分上為細末每服二錢空心用米湯調服神效散治洗痔凡富貴之人多因嗜欲酒色過度喜怒不常致生痔漏或如鼠乳連珠或糞門腸頭腫流膿漏血其痛如割不可忍者但是諸腫瘡痔漏及腸風漏血此藥治之苦參川椒苦葫蘆芫荽子槐花枳殼荊芥金銀花白芷連翹獨活小茴香麻黃牡蠣煨威靈仙椿樹皮各二兩上㕮咀每用五錢水六七碗蔥白二莖煎五七沸去滓以盆盛藥水上坐先蒸後洗甚驗加黃老茄子二個尤妙黑丸子專治久年痔漏下血用之屢驗百草霜白薑各一兩木饅頭二兩烏梅敗棕柏葉亂髮以上各一兩二錢半俱各燒存性為末桂心三錢白芷五錢上為細末研勻醋糊為丸如梧桐子大每服三五十丸空心用米飲送下逐瘀湯通利大小腸取下惡物凡痔漏熱證用之有瘀血作痛服之見效川芎白芷赤芍藥乾地黃枳殼阿膠茯苓五靈脂莪朮茯神木通甘草生各一錢桃仁去皮尖炒大黃各一錢半上作二服每服用水二盅生薑三片蜜三匙同煎食前服以利為度蝸牛膏敷痔瘡極效蝸牛一枚片腦麝香各少許上同研爛用瓷盒盛次早取汁敷瘡上蝟皮丸治諸痔出血裡急疼痛蝟皮一兩炙焦槐花微炒艾葉炒黃白芍藥枳殼炒地榆川芎當歸白礬煅黃耆貫衆各半兩頭髮三錢燒存性豬後懸蹄垂甲十枚炙焦盈尺皂角一挺去弦核醋炙黃上為細末煉蜜和丸如梧桐子大每服五十丸食前用米飲送下蝟皮散治五痔蝟皮炙鱉甲醋炙當歸銼焙各一兩半大黃蒸三度炒槐實炮黃耆焙各二兩蛇皮炙露蜂房炙藁本去苗土桂心各一兩一分豬後懸蹄甲十四枚炙上為細末每服三錢匕空心煮白粥飲之效日二服拔毒散敷痔腫毒處大黃黃柏白芨石膏黃芩黃連白蘞梔子朴硝上為末用井花水調塗洗諸痔方黃連黃芩荊芥蛇床子各一兩鏡面草蚵蚾草槐條各一握側柏葉四兩上用新汲水煎傾盆內乘熱先熏後洗七物湯熏痔皂莢三挺銼碎艾一握鱉甲二枚銼碎干蛤蟆一枚銼碎雄黃一兩麝香一錢草烏二枚上搗篩拌勻穿地坑內著熟火一斤方磚一片中心鑽一孔蓋坑口旋入藥一撮披衣坐上熏加味四君子湯治五痔下血面色痿黃心忪耳鳴腳弱氣乏口淡食不知味人參白朮茯苓白扁豆蒸黃耆甘草各等分上為細末每服二錢白湯點服一方有五味子無甘草熏洗方槐花半兩涼血蓮房一個涼血荊芥五文去風五倍子三錢去毒地榆半兩去惡血上為末每用半兩水一瓶以瓦器煎了入白礬為末二錢乘熱先熏後洗五聖丹治痔雄黃緑礬朴硝葉子雌黃明白礬各半兩上件各磕碎以銀鍋一入雄黃二入雌黃三入朴硝四入緑礬五入白礬圓瓦片蓋之炭火煅一日夜看青煙出盡有紅煙方可候冷取出紙襯頓地上用盆覆出火毒一日夜入乳香沒藥末各一錢同研極細每抄一匙煎甘草湯調敷外用雞羽掃藥末蓋之日二次夜一次自然乾硬而脫逐日須用蔥白煎湯入朴硝溫洗軟帛拭乾然後敷藥治痔豬膽膏上用豬膽七枚取汁以建盞盛炭火熬成膏用單紙攤敷須先用槐根白皮溫洗後敷藥寬腸丸治內外痔枳殼黃連百藥煎各等分上為細末水糊為丸如梧桐子大每服三十丸食前用米湯送下熊膽膏治痔極效熊膽片腦上各等分研細用井花水調以雞羽掃痔上治痔穀道中蟲癢不止及正發疼痛水銀棗膏各二兩上調和恰如棗核狀薄綿片裹內下部明日蟲出苦痛加韶粉三大分作丸納之熏洗方上用韭菜不以多少先燒熱湯以盆盛湯在內以器具蓋之止留一竅卻以韭菜於湯內泡之以穀道坐竅上令湯氣熏蒸候湯溫冷卻用韭菜輕輕洗瘡上數次自然可又方上用韭菜汁一碗蒼耳子葉汁一碗調勻日曬溫洗絶根半夏散治諸痔疾初生急以此藥治之上以半夏生為末先以生薑自然汁浴穀道後以半夏末泡湯洗之不過三兩日即自消龍腦散治痔瘡熱痛鯽魚一枚破開去腸肚入穀精草填滿燒存性上為細末入龍腦少許用蜜調敷之厚朴煎本方云腸胃本無血緣氣虛腸薄自榮衛滲入厚朴五兩用生薑五兩搗爛二味相拌漬炒黃色白朮神麯麥蘖三味各一兩同炒黃上為細末水糊為丸如梧桐子大疾作空心米飲下百丸平時服三五十丸厚朴厚腸胃麴櫱消酒食白朮導水血自不作也五痔諸下血論不及此是亦以脾胃為主也治痔方上以鰻鱺魚燒熏下部痔蟲盡死雞峰烏金散治痔漏黃牛角心豬牙皂角刺蝟皮穿山甲以上同炒焦黑皂角刺槐子枳殼貫衆阿膠炒各等分上為細末每服五錢半用胡桃肉研爛並酒調食前服大腸有熱荊芥泡湯調下漏血不止當歸煎湯調下臭樗皮散治痔漏下血及膿不止臭樗皮微炒酸石榴皮黃連去須地榆阿膠炒令黃各一兩艾葉三分微炒上為細末每服二錢食前粥飲調下蔥青散治痔漏上用蔥青內刮涎對停入蜜調勻先以木鱉子煎湯熏洗然後敷藥其冷如冰唐仲舉云常有一吏人苦此渠族弟親合與之早飯前敷午後來謝拜於庭下云疾已安矣雙金散黃連鬱金各等分上為細末蜜調敷之痔將好用斂口龍骨散龍骨散龍骨煨白芷黃丹寒水石煨各等分上為細末摻瘡口上小便赤色服導赤散導赤散生地黃木通甘草各等分上為細末每服三錢白湯調下枳殼散熏洗痔漏枳殼貫衆各二兩荊芥大柏皮各一兩黃連蛇床子地骨皮無名異乾薑炮各半兩蒼耳根冬青葉薤頭柏枝各一把黑豆半升上㕮咀每用一大合用水三大碗煎至二碗先熏後洗日三五次能消丸治痔疾疼痛如錐刀刺不可忍威靈仙一名能消去苗土四兩卷柏去根蝟皮燒灰存性防風去叉阿膠炙燥各半兩糯米一合炒上為細末煉蜜和丸如梧桐子大每服十丸加至二十丸不拘時用人參湯送下日二服試蟲散治五痔痛甚臭椿皮景天陰乾即慎火草地骨皮各二兩馬牙硝一兩上為細末用精豬肉一大片摻藥末三錢匕在肉上就上坐一二時起看有蟲即出無即已煙燻方治痔漏痛白鱔魚骨熟艾各等分上銼碎和勻用新盆子一個盛藥在內用蓋對盆口上通一竅以火燒藥候煙出竅上坐熏之煙盡即止白金散治久新痔痛如神上用海螵蛸去分粗皮為細末每用二三錢生麻油調成膏以雞翎拂上每日夜用之日久瘡自消乳香散治牡痔生瘡乳香豬牙皂角鯪鯉甲各二兩箬葉去頭粗梗銼四兩黃牛角尖長二寸者一對銼蛇蛻一條頭尾俱全者上入砂罐內蓋口鹽泥固濟曬乾用十斤炭火煅候碧煙出去火放冷取出細研每服二錢匕以胡桃一個取肉細研拌藥空心酒調下五服見效豬蹄灰丸治牡痔生鼠乳肛門癢痛觸著有膿血出不絶豬懸蹄甲火燒存性研一兩水銀三大豆許上先取水銀用蒸棗肉二枚研勻次入豬蹄灰和為丸如雞頭實大先以鹽湯洗下部內一丸夜臥再用以瘥為度檳榔散治風氣稽留下部結成牝痔生瘡下血腫痛檳榔銼炒澤瀉酒浸瞿麥甜葶藶隔紙炒防己藁本去苗土陳皮去白炒郁李仁與陳皮同炒滑石以上各半兩芫花醋拌炒黃木香各一兩乾漆炒煙盡半分上為細末每服二錢匕不拘時溫酒調下日三服榼藤散治痔下血不止生瘡腫痛榼藤子取仁鱉甲醋炙黃耆槐子炒川大黃炒蛇蛻燒灰各一兩藁本桂心各半兩當歸銼炒蜂房以上各五分豬後懸蹄甲七枚炙焦黃上為細末每服二錢食前用粥飲調服赤小豆散治酒痔大腸中久積熱毒下血疼痛赤小豆炒熟生地黃黃耆各一兩赤芍藥白蘞桂心各半兩當歸微炒黃芩各三分上為細末每服二錢食前用槐子煎湯調服麝香散治牝痔及一切內外痔瘡疼痛不可忍者上用栝蔞新黃大者一枚以刀開下頂子不去穰選不蛀皂莢子填滿卻取開下頂子蓋別用紙筋泥固濟約三指厚以炭火簇合燒令紅放一地坑內出火毒一宿取出入麝香末一錢研令極細以磁瓷盒盛每服一錢匕米飲調下溫酒亦可服一劑永除根本桑木耳散治痔疾肛邊癢痛桑木耳炙槐木耳炙蝟皮炙黃羌活當歸炒各一兩枳殼二兩麩炒上為細末每服二錢食前粥飲調下神效方治痔疾下血日夜不止白礬五兩緑礬三兩黃丹伏龍肝蝟皮各二兩上搗碎入瓷罐子內用炭火五七斤燒炭盡為度候冷取出研如粉以麵糊為丸如梧桐子大每服十丸食前用米飲送下地榆散治血痔上用地榆為細末每服二錢匕食前米湯調下日三服治血箭痔上用苦楝子肉為細末酒煮糊為丸如梧桐子大每服三十丸空心蒼耳子煎湯送下日三服止血方治痔瘡血出不止上用明血竭為末敷之治痔疾便血方上用活鯽魚一個八兩重者洗淨鱗尾腸肚皆不去用棕皮二兩洗淨寸截先將棕一兩鋪在瓦罐子內次安魚上面卻將棕一兩蓋之即閉罐口黃泥固濟火畔炙乾量罐子開一地坑先安小磚一片後坐罐子四面用熟炭火六七斤燒煅候煙絶取罐子於淨地以瓦盆合定淨土擁勿令透氣經一宿出火毒開取藥細研每服一錢食前用米飲調下忌動風之物威靈仙丸治氣痔大便澀威靈仙去土乳香另研枳殼麩炒各一兩上為細末以粟米飯和為丸如梧桐子大每服十五丸食前用米飯送下日三服熏尉方治氣痔脫肛枳殼麩炒防風去叉一兩白礬枯一分另研上㕮咀拌勻水三碗煎至二碗乘熱熏之仍以軟帛蘸湯尉之通手即淋洗洗藥治痔瘡久不愈者桃條柳條槐條萱草根桑條艾葉荊芥蒼耳根茄根各三兩上㕮咀水五碗煎三十沸去滓溫洗次貼後藥香白芷輕粉各二錢黃丹三錢五倍子五個灰火煨麝香少許上為細末研勻瘡干蔥白汁調搽濕則干貼之神驗熏藥方治痔漏積年不愈者鰻鱺魚半斤五月五日採曝乾搗為末蜣螂三枚研為末上件藥取成熟艾和藥末以青布卷之安瓷瓶中著火燒坐向瓶上熏之其蟲及惡汁並出不復再發槐角散治脾胃不調脹滿下血槐角二兩枳殼當歸蒼朮陳皮厚朴制各一兩烏梅甘草各半兩上㕮咀每服五錢水一盞煎七分去滓食前服結陰丹治腸風臟毒大便下血枳殼去穰麩炒威靈仙何首烏椿根白皮陳皮去白荊芥穗黃耆各等分上為細末酒煮糊同蜜少許和丸如梧桐子大每服五十丸加至七十丸食前用米飲送下一方不用蜜以醋少許同陳米飲煎湯下治腸風臟毒方一兩茱萸半兩連二味同炒不同研糞前茱萸調酒下糞後卻用酒調連豬臟丸治大人小兒大便下血日久多食易飢腹不痛里不急先用海螵蛸炙黃去皮白者為末以木賊草煎湯調下服之三日後效黃連二兩銼碎嫩豬臟二隻去肥上以黃連塞滿豬臟系兩頭煮十分爛研細添糕糊丸如梧桐子大每服三五十丸食前米飲送下鯽魚方治腸風血痔及下痢膿血積年瀉血面色痿黃大活鯽魚一個不去鱗肚不穿孔去其腸穢入白礬白礬一塊如金橘大上用敗棕皮重包外用厚紙裹先煨令香熟去紙於尉斗內燒帶生存性為細末每服一錢空心溫米飲調下一方瓦瓶內蓋定炭火燒為灰軟飯和丸如梧桐子大每服二十丸食前粥飲下治腸風及脫肛不收有血下部腫悶疼痛上用不蛀皂角五莖捶碎水一碗揉令皂角消盡絹二重濾過取十分清汁將脫肛腸浸在藥水中其腸自收不用手按如大腸收了更用湯燙其腰腹上下令皂角氣行則不再作一方皂角去黑皮塗酥炙為末棗肉和丸如梧桐子大每服十五丸食前粥飲下勝金丸一名百藥散治腸風下血溺血不止及臟毒或便血百藥煎三兩一兩生用一兩炒焦一兩燒存性上為細末軟飯和丸如梧桐子大每服五十丸空心用米飲送下一方為細末米湯調二錢服四季側柏散治腸風臟毒下血不止側柏燒存性春採東夏採南秋採西冬採北上為細末每服二錢糯米飲調下一方用葉一斤洗炙為末每服二錢食前枳殼湯調下腸風黑散治臟毒下血荊芥燒枳殼炒各二兩亂髮槐花槐角蝟皮炙甘草炙各一兩半上同入瓷瓶內泥固濟燒存三分性出火氣同枳殼炙木饅頭為末每服二錢食前溫酒調服水煎亦可黃連飲治腸風下血疼痛不止黃連貫衆雞冠花烏梅肉大黃各一兩甘草炙三分上為細末每服二錢不拘時米湯調下神應丸治腸風臟毒黃連去須八兩分作二分一分同薑切片同炒黑色去薑一分薑汁浸一宿次日曬乾上為細末糕糊為丸如梧桐子大每服五十丸空心用米湯送下蒜連丸治腸風臟毒黃連研為末獨蒜煨熟上同搗為丸如梧桐子大每服五十丸空心陳米飲送下香梅丸治腸風臟毒香白芷烏梅燒存性百藥煎燒存性上等為末米糊和丸如梧桐子大每服七十丸空心用米飲送下椿皮丸治痔漏下血疼痛東行椿根白皮上為細末醋糊和丸如梧桐子大每服七十丸空心用米湯送下豬臟丸治痔瘻下血豬臟一條洗淨控干槐花炒為末填入臟內兩頭扎定石器內米醋煮爛上搗和丸如梧桐子大每服五十丸食前當歸酒下卷柏丸治臟毒神效卷柏生石上高四五寸根黃如絲細上有黃點子取枝焙乾用黃耆各等分上為細末每服二錢空心米飲調服治腸風臟毒方山裡果曬乾上為細末每服二錢空心米飲調服
