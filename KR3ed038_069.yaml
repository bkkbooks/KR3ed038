body:
  text: 卷之六十九諸毒門附論凡入跋涉山川不諳水土人畜飲啖誤中於毒素不知方多遭其斃豈非枉橫耶然而大聖久設其法以救活之正為貪生者樂忽而不學一朝逢遇便自甘心竟不識其所以今述神農黃帝解毒方決好事者少留意焉諸毒通治方神仙解毒萬病丹治一切藥毒菰子毒鼠莽毒惡菌瘴金石毒瘟疫死牛馬肉毒河豚毒時行瘟疫山嵐瘴瘧急喉閉纏喉風脾病黃腫赤眼瘡癤沖冒寒暑熱毒上攻或自縊溺水打撲傷損癰疽發背未破魚臍瘡腫湯火所傷百蟲犬鼠蛇傷男子婦人或中顛邪狂走鬼胎鬼氣並宜服之凡人居家或出入不可無此藥真濟世衛家之書如毒藥嶺南最多若遠宦嶺表才覺意思不快便服之即安二廣山谷間有草曰胡蔓又名斷腸草若以人急水吞之急死緩水吞之緩死又取毒蛇殺之以草覆上以水灑之數曰菌生其上取為末酒調以毒始亦無患再飲酒即毒發立死其俗淫婦人多自配合北人與人情分相好多不肯逐北人回陰以藥置食中北人還即戒之曰子某年來若從其言即復以藥解之若過期不往必死矣名曰定年藥北人屆彼亦宜志之若覺中毒四大不調即便服之或於雞豚魚羊鵝鴨等肉下藥復食此物即觸發其毒若服此藥一粒或吐或利隨手便瘥昔有一女子久患勞瘵病為屍蟲所噬磨一粒服之一時久吐下小蟲千餘條一大者正為兩段後只腹蘇合香丸半月遂無如常至牛馬六畜中毒亦以此救之無不效文蛤五兩取有黃色者搗碎洗淨本草云五倍子一名文蛤山茨菇二斤續隨子去苗研細以紙里壓去油研一兩紅葉大戟一兩半淨洗麝香三錢研上各研為細末和勻以糯米粥為劑每料分作四十粒於端午重陽七夕合如欲急用辰日亦得於木臼中杵數百下不得令婦人孝子不具足人雞犬之類見之切宜秘惜不可廣傳輕之無效如癰疽發背未破之時用冷水磨塗痛處並磨服良久覺癢立消陰陽二毒傷寒心悶狂言亂語胸膈壅滯邪毒未發及瘟疫山嵐瘴氣纏喉風冷水入薄荷一葉同研下急中顛邪喝叫亂走鬼胎鬼氣並用暖無灰酒下自縊落水死心頭暖者及驚死鬼迷死未隔宿者並冷水磨灌下蛇犬蜈蚣傷並用冷水磨塗傷處諸般瘧疾不問新久病發時煎桃柳枝湯磨下小兒急慢驚風五疳八痢蜜水薄荷一葉同磨下牙關緊急磨塗一丸分作三服量大小與之牙痛酒磨塗及含藥少許吞下湯火傷東流水磨塗傷處打撲傷損炒松節無灰酒下年深日近頭疼太陽疼用酒入薄荷葉磨塗於兩太陽穴上諸般癇疾口眼歪斜眼目掣眨夜多唾涎言語謇澀卒中風口噤牙關緊急筋脾緊急骨節風邪手腳痛疼行步艱辛四肢風麻作痛並用酒磨下有孕婦入不可服青黛雄黃散凡始覺中毒意思不快胸腹臟悶即服此藥毒氣不聚好青黛雄黃各等分上研細令勻每服二錢新汲水調下解漆毒方乾道五年襄陽有劫盜將死而特旨貸命數曰前州牧慮其出為人害既受以刑以生漆塗其兩眼同行到獄門已目不見物寄禁長林差役以符傳送適有老叟以事在獄中怵而語之曰汝明日去時倩送者在近右急尋蟹搗碎濾汁滴眼內漆當隨汁流散瘡亦愈矣如其言訪得一小蟹用之留三日而行目睛好略無損予外婿朱唏碩時以當陽尉揖邑令親見之誤飲蛇交水毒方陳齋郎湖州安吉人因涉春渴掬澗水兩口咽數日覺心臟腹痛日久疼甚服藥皆診之云心脾飲毒今心脈損甚齋答云去年涉春渴飲澗水得此病醫云吃卻蛇在澗邊遺下不淨在澗水內蛇已成形在腹中食其心而痛也遂以水調雄黃服之果下赤蛇數條皆能走解毒丸解世間不測一切毒山豆根山茨菇綠豆粉各三兩板藍根土馬棕黃柏子紫河車續隨子仁木通盆硝蔻仁五味子薄荷貫眾寒水石白殭蠶乾葛雄黃百藥煎各二兩茜草根大黃硃砂各一錢麝香半兩甘草四兩上為細末蒸餅和丸如彈子大以螺青三兩和勻留一半為衣每服半丸用生薑蜜水化下治溪毒中毒上以知母連根葉搗作末服之亦可服水搗取汁飲二升夏月出行多取此屑自隨欲入水先取少許投水上流便無畏兼闢射工亦可和水作湯浴之甚佳治中蠱毒上用生蒼耳七個白礬兩皂子許嚼塗咬處須男子嚼之余藥敷腫處白扁豆飲一名巴豆膏解砒毒等上用白扁豆不以多少為細末入青黛等分細研再入甘草末少許巴豆一枚去殼不去油別研為細末取一半入藥內以砂糖一大塊水化開添成一大盞飲之毒隨利去後卻服五苓散之類藍根散解藥毒藍根銼一握蘆根銼一握綠豆研一分澱腳研二合上先將二根以水一碗煎至七分去滓次入後二味和勻分三服或一二服利下惡物不用再服粉草飲凡中藥毒即令食生黑豆數粒食之聞腥者即非蟲毒也若是吐逆躁煩服藥須極冷即解也甘草一兩生用白麵半兩生用延胡索一兩上銼細每服半錢水一盞煎至六分去滓放冷細細呷之解半夏毒方上為生薑汁或乾薑汁服之良唐崔魏公季鈜夜暴亡有梁新聞之乃診之云中食毒僕曰常好食竹雞竹雞多食半夏苗必是半夏毒命生薑捩汁而灌之活浙人王夫人忽日面上生黑斑數點曰久滿臉俱黑遍求醫治不效忽遇一草澤醫人云夫人中食毒治之一月平復後求其方止用生薑汁服之問其故云食斑鳩蓋此物常食半夏苗中毒以姜解之解斑蝥芫青毒方上用豬膏大豆汁戎鹽藍汁服之一方用鹽湯煮豬膏巴豆飲之一方用大小豆汁服之並瘥解莨菪毒方治食莨菪悶亂如卒中風或似熱盛狂病服藥即劇上以甘草汁或藍青汁飲之即愈治中砒毒方上用甘草汁同藍汁飲之即愈解鉤吻毒方治鉤吻毒困欲死面青口噤逆冷身痹肘後方云鉤吻茱萸食芥相似而所生之旁無他草又莖有毛誤食之殺人上用薺苨八兩㕮咀以水六升煮取三升如人體冷服五合日二夜三濃服為妙一方煮桂汁飲之一方飲蔥汁佳解砒毒方上以豆豉濃煎湯飲之亦治服藥過劑心中煩悶解巴豆毒方其證口乾兩臉赤五心熱利不止藥不效上用芭蕉根葉研取自然汁服利止而安解鼠莽草毒方上用枯蓮房殼帶梗陰乾㕮咀煎水二三碗灌之如無用荷葉中心蒂或用藕節煎湯一碗溫冷灌之毒即散解砒毒方其證煩躁如狂心腹攪痛頭旋欲吐不吐面色青黑四肢逆冷命在須臾不救上用綠豆半升搗去滓以汲水調通口服或用真靛花二錢分二服以井花水濃調服之又方治悶絕心頭溫者新汲水調水粉服之如神解附子毒方上用防風濃煎湯服之立瘥解一切藥毒草毒畜肉中毒方上用白扁豆生曬乾為細末新汲水調下二三錢已痊醫者高照一子無賴父笞之遂服砒霜自毒大瀉利腹臟欲裂予教以水調服隨所欲與之不數碗即安解藥毒方王仲禮嗜酒壯歲時瘡渣發於鼻延於頭心甚惡之服藥勿效僧法滿使服何首烏丸當用二斤適墳僕識草藥乃掘得之其法忌鐵器但於砂缽中藉黑豆蒸熟既成香味可人念所蒸水必能去風證以頮面初覺極熱漸加不仁至晚大腫眉目耳鼻渾然無別望之者莫不驚畏主之母高氏曰凡人感風邪非一日積吾兒遇毒何至於是吾聞山豆根赤小豆黑蛤粉生薑汁上急命僕搗捩薑汁以上三味為末調敷之中夜腫消到曉如初蓋先服何首烏擇焉不精為狼其毒雜其中以致此撓也解藥過劑毒服附子過多而覺頭重如斗唇裂血流急求黑豆綠豆各數合嚼之及濃煎黑豆綠豆湯並飲服風藥多悶亂不省醋醯濃煎甘草同生姜自然汁頓飲之又方以螺青細研新汲水調下治藥中有巴豆下利不止乾薑黃連微炒各一兩上為細末每服二錢水調下如人行五里再服又方治同前上煮綠豆湯冷服之瘥薺苨湯療石毒卒發者慄慄如寒或欲食或不欲食若服紫石英發毒者亦熱悶昏昏喜臥起止無力或寒皆是臟腑氣不和以此治之薺苨四兩茯苓黃芩芍藥各二兩蔓菁子一升藍子人參甘草炙各一兩上㕮咀以水一斗先煮蔓菁子取八升去滓內余藥煎取三升分三服日三若虛弱人加人參一兩若上氣加茯苓薺苨各一兩甚良治銀毒方黃連去毛甘草生銼各一兩上銼碎以水三盞煎取二盞去滓時時飲之治丹砂毒方上用鹽半兩以冷水攪勻令澄旋旋服之治石鐘乳毒方上用紫石英為細末每服一錢匕溫水調下連三服黑鉛酒治中金石藥毒上用黑鉛一斤以甘鍋溶作汁投酒一升如此十數回候酒至半升去鉛頓服之效一方以井水磨下解砒毒解丹毒方上以地漿服之甚效治一切藥毒蠱毒金石毒上並用石蟹以熟水磨服治五石毒上用薺苨汁生服良治丹石毒上以蚌肉食之良解面毒方上以蘿菔啖之昔有婆羅門僧東來見食麥面者云此大熱何以食之又見食中有蘿菔云賴有此以解性自此相傳食麵必啖蘿菔解一切食毒及飲酒不知中何毒卒急無藥可解薺苨甘草生用各二兩上細銼以水五盞同煎取二盞停冷去滓分三服一方解一切藥毒加蜜少許同煎服之治食索粉片積方上用紫蘇濃煎汁加杏仁泥服之即散治中豆腐毒方上用生蘿蔔煎湯如非時無蘿蔔用子煎湯亦可有人好食豆腐因中其毒醫治不效偶更醫醫至中途適見做豆腐之家夫婦相爭因問云今早做豆腐妻誤將蘿蔔湯置腐鍋中今豆腐不成蓋豆腐畏蘿蔔也醫得其說至病家凡用湯使俱以蘿蔔煎湯或調或咽病者遂愈治粽糍為積方上用曲末加少木香末鹽湯調服口有酒香食積去矣大治酒積甚妙黃龍湯治因食中毒上將灶底當釜直下掘取赤土為細末以冷水調隨多少服之或以犀角水磨取汁飲亦治食六畜肉中毒大效治誤吞水蛭方昔有人夜間飲水誤吞水蛭入腹縊停日久必生下小蛭即食人肝血腹痛不可忍面目黃瘦全不進食若不早治即令人死上用田中干泥一塊以小死魚三四個同豬膏溶油攪勻用巴豆十粒去皮膜拌入泥內研爛和丸如綠豆大用田中冷水吞下十丸小兒服三丸至五丸須臾大小水蛭一時皆瀉出卻以局方四物湯加黃耆煎服生血補理豬肝丸治食魚膾不消生瘕常欲食膾者獺骨肝肺大黃各八分蘆根鶴骨各七分桔梗五分乾薑桂心各四分斑蝥二十一枚炙上為細末煉蜜和丸酒服十丸至十五丸日再瘥治食狗肉不消心下堅或腹臟口乾大渴心急發熱狂言妄語或洞下方上用杏仁一升去皮研以沸湯三升和絞汁三服狗肉原片皆出淨良驗治食六畜肝中毒方凡物肝腑不可輕啖自死者彌勿食之上用豆豉以水浸絞取汁旋服之治河豚毒方五倍子白礬上等分為細末水調服之食自死六畜肝中等毒方上取故頭巾垢一錢匕熱湯中烊服之亦治卒心痛以煮湯取汁飲之頭巾即縛發帛也又方飲豉汁數升良治食狗肉不消心下堅或腹臟口乾或發熱不語上以蘆根煮汁飲之治食馬肝牛肉毒方上以入乳汁合豉濃汁服之神效治誤吞蜈蚣方昔有村店婦人因用火筒吹火不知筒內有蜈蚣藏焉因以吹火其蜈蚣驚逆竄人喉中不覺下胸腹救人無措手適有人云取討小豬兒一個斷喉取血食之灌以清油取吐即愈療食蕈並菌中毒致殺人者及療楓菌食之令人笑不止者此皆治之蓋菌種類不一往往蛇虺毒氣所熏蒸而成耳上掘地作坑以新汲水投坑中攪之乘渾濁取出以絹濾過用瓷器盛每服時調轉飲一盞至三盞當效解菰子毒及一切菌毒上有芫花生者為末每服一錢新汲水下以利為好中蕈毒方崇寧間蘇州太平山白雲寺五僧行山間得蕈一叢甚大摘而煮食之至夜發吐三人急採鴛鴦草生啖遂愈二人不甚肯啖吐至死此草藤蔓而生對開黃白花傍水依山處皆有之治癰疽腫毒尤妙或服或敷今人謂之金銀花又曰老翁須本草名忍冬草石刻方治蠱毒宋嘉祐中範吏部道為福州守曰揭一方於石云凡中蠱毒無論年代近遠但煮一鴨卵插銀針於內並噙之約一食頃取視釵卵俱黑即中毒也其方用五倍子二兩硫黃末一錢丁香木香麝香輕粉各少許糯米二十枚甘草三寸半生半炙上用水十分於瓶內煎七分候藥面生皺皮為熟絹濾去滓通口服病人平正仰臥令頭高覺腹中有物衝心者三次後得大吐出一盆桶盛之如鰇魚之類乃是惡物吐後飲茶一盞瀉亦無妨旋煮白粥補忌生冷油膩鮓醬十日後服解毒丸三五丸經旬平復七寶丸治蠱毒敗鼓皮蠶蛻紙各燒存性刺猥皮五倍子續隨子硃砂研雄黃研各等分上為細末糯米稀糊和丸如梧桐子大每服七丸空心服熟水送下東坡雄黃丸治蠱毒及蟲蛇畜獸毒雄黃明白礬生用各等分上於端午日合研細熔黃蠟和丸如梧桐子大每服七丸念藥王菩薩藥上菩薩七遍白湯送下蜜髓煎治中蠱毒令人腹內堅痛面目青黃病變無常蜜一碗豬骨髓五兩研上同煎令熟分作十服日三服即瘥治蠱毒及金蠶蠱毒方凡中毒者先以白礬末令嘗不覺澀而味甘次食黑豆不腥乃中毒也即濃煎石榴根皮汁飲之不下即吐出蟲皆活無不愈者李晦之云凡中毒以白礬茶芽搗為末冷水飲之馬兜鈴根湯治五種蠱毒及草蠱術在西涼處及嶺南人若行此毒入人咽刺痛欲死者上用馬兜鈴根一兩細銼以水一盞煎至七分去滓空心頓服當時吐出蠱未吐再服以快為度一方以苗為末溫水調服一方用根搗末水服方寸匕治諸蠱毒方上用鰻鱺魚乾末空心服之三五度瘥一方燒炙令香食之尤佳其魚有五色紋者良鐵精丸治食中有蠱毒腹內堅痛面目青黃瘦瘁淋露骨立病變無常鐵精乃煅鐵爐中如塵紫色輕者為佳不拘多少上為細末以生雞肝搗和丸如梧桐子大曝乾每服五丸至七丸溫酒下治中蠱毒上用山豆根不以多少密遣人和水研已禁聲服少許不止再服槲皮散治蠱毒下血如爛肉片心腹㽲痛如有物齧若不即治蝕人五臟乃死槲木北陰白皮桃根白皮各四兩並細銼猥皮灰乳發灰各一兩火麻子汁五升上先以水五盞煮槲皮桃根皮取濃汁二盞和麻子汁每服暖汁一盞調猥皮灰髮灰二錢匕令患人少食旦服須臾用水一盆以鴿翎引吐於水中如牛涎諸蠱並出治中蠱毒下血如肝蓖麻一粒去皮朴硝一錢上細研作一服新汲水調下連作二三服效地榆散治蠱毒下血或腹痛或不痛百治不效煩渴不止臭椿根東引佳白皮蜜炙焙乾地榆各半兩上為細末每服一錢熱米飲調下苦瓠湯治蠱毒吐血或下血如爛肝上用苦瓠一枚切以水二大盞煎取一盞去滓空心分溫二服吐下蠱即愈範汪方云苦瓠毒當臨時量用之肘後方云用苦酒一升煮令消飲之神驗一名苦葫蘆療卒中蠱下血如雞肝者晝夜出血石余四臟皆損惟心未毀或鼻破待死者上以桔梗搗屑以酒服方寸匕日三服不即下藥者以物拗口開灌之心中當煩須臾自定服七日止當豬肝臟以補之神良雄黃散治中蠱毒吐血雄黃一分研伏龍肝研半兩斑蝥去足翅糯米炒十四枚去糯米獺肝各棗大炙上為細末每服二錢匕空心以酪漿調下或吐蛤蟆及蛇蟲等出是效麥面散治中蠱吐血上用小麥面二合分為三服以冷水調下半日服盡當下蠱即瘥試蠱法南方有蠱毒之鄉於他家飲食即以犀角攪之白沫竦起即為有毒無沫者即無毒也廣南衛生方桃生煙蔓草並葉如茶其花黃而小凡一葉入口百竅潰血人無復生廣西愚民私怒茹以自斃家人覺之即取抱卵不生雞兒細研和以麻油扶口灌之乃盡吐出惡物而蘇少時不可救矣如人誤服此藥者止以前法解之治桃生雷州民康材妻為蠻巫林公榮用雞肉桃生值商人楊一者善醫療與藥服之才食頃吐積肉一塊剖開筋膜中有生肉存已成為雞頭尾嘴翅悉稍似康訴於州州捕林至獄而呼楊生令具疾證用藥其略云凡吃魚肉瓜果湯茶皆可桃生初即覺胃腹稍痛明日漸加刺滿十日則物生即動上則胃痛沉下則腹痛積以瘦瘁此是候也昔陳可大知廣慶府脅下忽腫起如生癰癤狀頃刻間其大如碗識者云此中桃生毒也候五更以綠豆細嚼試若香甜則是已而果然乃用此方上用升麻為末用冷水調二錢服之遂洞下瀉出腫即消續煎平胃散調補若在上膈則取之其法用熱茶一甌投膽礬半錢於中候礬化盡通呷服良久以雞翎探喉中即吐出毒物在下膈則瀉之以米飲調鬱金末三錢毒則瀉下乃碾人參白朮末各半兩同無灰酒半升入瓶內慢火熬半日待酒熟取出溫服之日一杯五日乃止然後飲食如故蔥白湯治中水毒溪毒如傷寒狀蔥白一握切豉半升葛根二兩升麻三分上銼如豆大每服四錢匕水二盞煎至一盞去滓不拘時溫服移時再服五加皮散治中水毒溪毒如傷寒狀上用五加皮研為細末每服一錢匕酒一盞調下日二夜一粥飲調亦得一方以五加根燒研為末水調服牡丹散治中水毒溪毒下部蟲蝕生瘡上用牡丹皮為細末每服二錢匕酒一盞調下日三
