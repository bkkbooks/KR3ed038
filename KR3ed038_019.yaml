body:
  text: 卷之十九嘔吐噦門附論經曰足太陰脾之脈復從胃別上膈注心下是動則病舌本強食則嘔脈解篇云所謂食則嘔者物盛滿而上溢故也卒痛論云寒氣客於腸胃厥逆上出故痛而嘔厥陰之病少腹堅滿厥心病嘔吐食不下入而復出厥甚寒氣入脾食畢而吐至真要大論云諸嘔吐逆衝上皆屬於火又云諸嘔吐酸皆屬於熱靈樞又曰人之噦蓋谷入於胃胃氣上注於肺寒氣邪氣穀氣俱還入胃新故相亂真邪相攻氣並相逆復出於胃故為噦又云胃氣為噦又曰病深者其聲噦東垣發明嘔吐噦者俱屬於胃胃者總司也究其三者之源皆因脾胃虛弱或因寒氣客胃加以飲食所傷而致胃氣上逆或嘔或吐或噦者皆陰火之邪上衝而吸入之氣不得入故食不下也邪氣充之火逆胃中而作者也以其虛實為異耳如嘔者陽明也且陽明者多血多氣故有聲有物氣血俱病也仲景云嘔多雖有陽明證不可攻之孫真人云嘔家多服生薑為嘔家之聖藥也故以生薑為主或有形質之物為病者因而越之可也謂上焦氣壅表實而言之非以瀉氣而言之也吐者太陽也太陽多血少氣故有物無聲為血病也有食入則吐以橘紅主之有食已則吐有食久則吐噦者少陽也少陽多氣少血故有聲無物氣病也治以薑製半夏朱奉議治嘔吐噦以生薑橘皮半夏湯是也又有膈噎氣噫食久反出名曰反胃反胃者因脾胃虛寒宿穀不化則朝食暮吐暮食朝吐有隨食而隨出者脈緊澀者難治蓋六淫之變七情之逆未嘗不由脾胃而病也故胃為水穀之海海之納水穀胃若受病飲食不下穀食不行營衛不和則賊風虛邪犯其陽飲食飢飽傷其陰則嘔吐之作也乃是足太陽足陽明二經之病也哉金匱要略曰嘔而心下痞者有嘔而胸滿者有乾嘔而利者有嘔吐谷不得入者有嘔吐病在膈上者有胃反嘔吐者有食已即吐者有胃反吐而渴者有吐後欲飲食者有嘔吐涎沫者有嘔而發熱者有乾嘔手足冷者有嘔而脈弱小便復利身有微熱四肢厥者有似嘔不嘔者有似噦不噦心中無奈者古人論嘔吐噦言之詳矣見證立方詳具於後全在醫者對證用藥又有婦人懷妊嘔吐者名曰惡阻各從其類而治之又有同時霍亂者當以溫胃養脾之劑外有腳氣攻心嘔吐者此證多端所感不一大抵脈病順者生逆者死以脈推之藥不失其次序治之必收功矣嘔吐噦通治方丁香煮散治脾胃虛冷嘔吐不食丁香不見火乾薑炮川烏炮去皮臍甘草炙各半錢紅豆去皮良薑炒青皮胡椒各一錢陳皮二錢益智去皮三錢上作一服水二盅生薑三片鹽一捻煎至一盅不拘時服大藿香散治七情傷感氣鬱於中變成嘔吐作寒熱眩暈痰滿不進飲食藿香去土木香不見火白朮各一錢半半夏曲二錢白茯苓人參桔梗各一錢枇杷葉官桂甘草炙各七分上作一服水二盅生薑五片紅棗一枚煎至一盅食遠服丁香半夏丸治胃寒嘔吐吞咽酸水丁香不見火一兩白朮一兩半半夏湯泡七次乾薑炮橘紅各二兩上為細末用生薑自然汁煮糊和丸如梧桐子大每服五七十丸食遠生薑湯送下藿香半夏散治胃虛中寒停痰留飲嘔吐噦逆藿香二錢半夏湯泡七次炒黃色三錢半丁香皮一錢半上作一服水二盅生薑七片煎至一盅食前服丁附治中湯治胃寒停痰嘔吐不已丁香青皮炒陳皮炒白朮煅人參各二錢附子炮甘草炙各一錢乾薑炮半錢上作一服水二盅生薑五片煎至一盅空心服理中湯治感寒嘔吐方見寒門旋覆花湯治中脘伏痰吐逆眩暈旋覆花去梗一錢半夏湯泡七次橘紅乾薑炮各一錢半檳榔人參白朮甘草各一錢上作一服水二盅生薑七片煎至一盅不拘時服香薷飲治伏暑嘔吐方見暑門玉浮丸治男子婦人脾胃虛弱一切嘔吐方見翻胃門安脾散治停飲傷胃以致吃食咽酸嘔吐黃水不已方見翻胃門藿香安胃散治嘔吐不止藿香半夏湯泡七次厚朴薑汁製炒蒼朮米泔水浸炒陳皮各二錢甘草炙一錢上作一服水二盅生薑五片紅棗一枚煎一盅不拘時服養胃湯治脾胃虛寒不思飲食翻胃嘔吐方見翻胃門小半夏湯治諸噦嘔吐心下堅痞膈間有痰水眩暈半夏五錢茯苓三錢上作一服水二盅煎至一盅去滓入生薑汁再煎二三沸不拘時熱服三乙承氣湯治嘔吐水漿不入食即吐大便祕或利而不快時覺腹痛滿悶或下痢赤白而嘔吐食不下者或大小腸膀胱結而不通上為嘔吐方見傷寒門沉香煎丸治嘔吐除中滿痞氣痰逆噁心宿昔成積面黃腹脹臟腑不調水穀不化此藥調順脾胃沉香丁香硫黃別研水飛檳榔麵裹煨熟去面胡椒沒藥別研丹砂別研水飛硇砂明淨者別研水飛煮良薑青皮去白焙木香各一兩縮砂去皮半兩巴豆去皮心膜新瓦上壓去油一分阿魏用醋浸開同白麵和作餅炙焦吳茱萸以陳久者湯浸取沉者炒以上各半兩上除別研藥外余藥為細末入別研藥研勻煉蜜和丸如緑豆大磁盒盛貯封每服二丸食前臨臥用溫生薑橘皮湯下更量人虛實大小加減木香白朮散治嘔而吐食謂持實擊強是無積也胃強而乾嘔有聲無物脾強而吐食持實擊強是以腹中痛當以和之一名丁香半夏湯丁香木香各一錢半夏曲一兩檳榔二錢白朮茯苓各五錢甘草四錢炙上為細末每服二錢濃煎生薑芍藥湯調下有積而痛手按之愈痛無積者按之不痛一方無丁香丁香丸治因食冷物凝滯胃間嘔吐不止大丁香半兩木香胡椒藿香甘草炙各三錢乾薑肉桂各二錢上為細末湯浸蒸餅和丸如緑豆大焙乾時時干嚼不必飲湯水水入即愈吐如覺痿弱更加附子隨意大養胃湯治飲食傷脾宿食不化朝食暮吐暮食朝吐上氣復熱四肢冷痹三焦不調及胃虛寒氣在上憂氣在下二氣並爭但出不入嘔不得食厚朴去皮生薑各二兩肥棗三兩同上三味炒白朮山藥人參川芎橘皮當歸五味子藿香枇杷葉刷去毛薑汁炙黃耆甘草炙各一兩上㕮咀每服四錢水一盞半生薑三片棗一枚煎七分去滓空心服或為細末米湯調下亦可大枳殼丸治一切酒食所傷胸膈痞悶脅肋脹滿心腹疼痛飲食不消痰逆嘔惡噫醋吞酸飲食遲化並宜服之枳殼麩炒茯苓去皮白朮厚朴薑製半夏湯泡人參木香青皮去穰檳榔陳皮去白荊三稜煨莪朮煨麥蘖微炒神麯炒各一兩乾生薑半兩牽牛微炒大黃各二兩上為細末生薑汁煮糊和丸如梧桐子大每服一百丸食後用生薑湯送下曲術丸治中脘有宿食留飲酸蜇心痛口吐清水噯宿腐氣神麯三兩炒蒼朮米泔浸三兩日曝乾炒陳皮各一兩上為細末用生薑汁別煮神麯末為糊和丸如梧桐子大每服三五十丸不拘時生薑湯送下十珍餅子治大人小兒嘔吐痰涎粥藥難停無問久新皆治丁香沉香官桂去粗皮藿香肉豆蔻吳茱萸湯洗焙乾木香各半兩水銀結砂子舶上茴香各七錢半夏湯洗七次焙乾生薑汁製一兩上為細末煉蜜和丸如小豆大搗作餅子每服十餅不拘時生薑湯下或化服亦得量病加減助胃膏治嘔吐不食人參白朮茯苓橘皮縮砂仁各一分丁香木香肉豆蔻煨草果仁各一錢半白豆蔻一錢上為細末煉蜜和丸如彈子大每服一丸生薑煎湯化下一物湯治卒吐逆粥飲入口即吐困弱無力人參二兩拍破上以水一大升煎取四合頓熱服兼以人參汁煮粥吃立愈徐郎中患反胃諸方不瘥只服參而愈炮附子丸治胃脘有熱胃中有寒嘔吐不止上用附子炮去皮臍碾為細末以麵糊和丸如梧桐子大就濕以大黃末為衣每服十丸加至二十丸薑湯送下加味二陳湯治胃熱嘔吐不已半夏湯泡七次陳皮各半兩白茯苓三錢甘草一錢半刮筀竹青四錢上㕮咀每服四錢水一盞半生薑七片煎至七分去滓不拘時啜服麥門冬湯療煩熱嘔逆食下則出麥門冬去心青竹茹各三兩茅根生薑各五兩人參甘草炙各一兩上切以水七升煮取二升五合分溫三服如人行五里進一服不吐利忌海藻菘菜竹茹湯治胃受邪熱心煩喜冷嘔吐不食葛根三兩半夏湯泡七次一兩甘草炙一兩上㕮咀每服五錢水二盞入竹茹如棗許生薑五片煎至七分去滓取清汁微冷細細服不拘時有熱手足心熱政和中一人病傷寒得汗身涼數日忽嘔吐藥與飲食俱不下醫者皆進丁香藿香滑石等藥下咽即吐豫曰此正汗後餘熱留胃孫兆竹茹湯正相當爾即治藥與之即時愈良方槐花散亦相類一方加棗一枚同煎加味七氣湯治氣鬱嘔吐半夏制二兩半人參厚朴制辣桂各一兩茯苓一兩半甘草勻半兩上㕮咀每服三錢半生薑七片棗一枚煎至七分去滓服加木香煎亦得小丁沉丸治乾嘔和調胃氣丁香蘹香子炒木香各半兩縮砂仁白芷炒益智去皮陳皮湯浸去白焙沉香甘草炙生薑一斤細切入青鹽四兩拌勻醃一宿焙乾以上各一兩阿魏一分用醋半升熬為膏上為細末入阿魏膏抖勻用醋煮麵糊和丸如雞頭實大研丹砂麝香細末各少許同為衣每服一丸細嚼用薑鹽湯送下空心服草豆蔻湯治乾嘔和胃下氣草豆蔻去皮藿香枳殼去穰麩炒陳皮湯浸去白焙白朮山芋各半兩桂心去皮丁香各一分上㕮咀每服三錢水一盞棗二枚擘破粟米少許同煎至七分去滓食前溫服生薑丸治乾嘔噁心益津液和胃氣生薑二斤和皮切作片以青皮三兩同淹一宿慢火焙乾甘草炙銼陳皮湯浸去白焙乾各四兩香白芷縮砂仁去皮胡椒各一兩莪朮炮二兩上為細末以麵糊和丸如小彈子大用丹砂細末為衣每服一丸細嚼溫酒送下食前服開胃丸治乾嘔氣逆不止半夏曲微炒三兩人參一兩半白豆蔻去皮陳皮去白焙白朮各一兩上為細末用生薑汁同棗肉和丸如梧桐子大每服二十丸加至三十丸不拘時用粥飲送下參粟湯治乾嘔不下食人參一兩陳粟米一兩半生薑切碎五兩半夏湯泡七次去滑四兩用生薑浸切碎焙乾上同入銀石鍋中慢火焙令焦黃粗搗篩每服三錢水一盞生薑三片棗二枚去核煎至七分去滓微熱空心服三聖散治噦逆不食半夏七枚大者先以錐子穿透心用左搓麻線空過於井花水內浸一日一換水候七日取出焙乾丁香四十九粒胡椒各四錢上為細末大人用生薑湯調一字小兒箸頭蘸生薑汁後點藥少許口中立愈至甚者不過三服石蓮丸治胃寒噦逆石蓮肉去心附子炮裂去皮臍乾薑炮各一兩上為細末用粟米粥和丸如緑豆大每服十丸用蜀椒湯送下噦止勿再服溫中白朮丸治胃寒嘔噦白朮三兩半半夏二兩制乾薑一兩丁香半兩上為細末生薑汁煮糊和丸如梧桐子大每服三十丸不時生薑湯送下思食丸助脾胃消導飲食止吐逆烏梅肉五錢神麯炒麥蘖炒各六錢人參乾薑炮甘草炙各二錢上為細末煉蜜和丸如梧桐子大每服三五十丸食前用米飲湯送下參香枳朮丸開胃進食止嘔吐人參木香各三錢枳殼麩炒一兩白朮一兩半陳皮四錢乾生薑二錢半上為細末用荷葉包米煨飯和丸如梧桐子大每服五七十丸不拘時用米湯送下
