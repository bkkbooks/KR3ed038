兒口舌生瘡玄胡索黃連黃柏青黛另研密陀僧另研各三錢上為細末每用少許貼口瘡上有津液吐出頻用不拘時一方治小兒心有客熱滿口生瘡用天南星末醋調貼兩腳心有用吳茱萸末米醋調塗亦可一方用黃連細末以蜜水調抹口中患處一方用黃柏末青黛等分腦子少許另研入藥以水調抹乾摻眼疾小防風湯治小兒熱毒眼患大黃蒸山梔子甘草炙赤芍藥川當歸洗防風羌活各等分上銼碎每服五錢水一盅煎至五分食後服小流氣飲治小兒風毒眼患蟬蛻去足甘草羌活天麻川當歸防風大黃赤芍藥薄荷杏仁各等分上銼碎每服五錢水一盅煎至五分食後服生熟地黃湯治小兒疳蝕眼患閉合不開羞明怕日及至開眼有如內障朦朧失所生乾地黃洗熟乾地黃洗各一兩麥門冬去心五錢川當歸枳殼米泔浸一宿麩炒各二錢半杏仁湯泡去皮尖麩炒防風甘草赤芍藥各二錢上銼碎每服五錢水一盅黑豆七粒煎至五分食後服小菊花膏治小兒積毒眼患黃連黃芩大黃菊花羌活蒼朮米泔浸荊芥穗防風上等分為末煉蜜為膏如小指大每服一餅細嚼白湯下不拘時服密蒙花散治小兒瘡痘並諸毒患眼密蒙花二錢半青葙子決明子車前子各半錢上為末羊肝一葉批開作三片摻藥令勻仍合作一片用濕紙七重裹於灰中煨熟空心食之牛黃丸治小兒失誤築打觸著頭面額角兼倒撲令兒肝受驚風遂使兩目睛鬥名曰通睛牛黃白附子炮肉桂全蠍川芎軟石膏煨過各二錢半白芷藿香五錢硃砂二錢麝香二錢半上為末煉蜜為丸如芡實大每服一丸薄荷湯化食後服通頂散治眼疼風熱腫脹作楚瓜蒂黎蘆各一錢皂角肉半錢麝香少許上為末每用少許吹入鼻中鼻貼囟通關膏治小兒被乳母鼻息吹著兒囟令兒鼻塞不能吮乳荊芥一兩香附子炒白殭蠶各七錢半豬牙皂角二錢半川芎一兩七錢半細辛五錢上為細末用蔥白研爛入前藥末研勻捻作餅貼囟門上消風散治鼻塞冒暈頭目不清人參川芎羌活白茯苓白殭蠶炒藿香葉防風荊芥穗甘草炒蟬殼各一兩厚朴制陳皮各二錢半上為細末每服一錢或半錢食後用防風荊芥湯調服辛夷散治肺虛為四氣相干鼻內壅塞涕出不已氣息不通川芎木通防風去蘆甘草各等分辛夷仁細辛去土葉藁本去蘆升麻白芷各等分上為細末每服一錢食後茶清湯調服噙化蓽澄茄丸治小兒鼻塞不通蓽澄茄半兩薄荷三錢荊芥穗一錢半上為末煉蜜丸如芡實大每服一丸噙化津咽如小噙不得用薄荷湯磨化服不拘時聤耳犀角飲子治小兒風熱上壅兩耳聾閉內外腫痛膿水流出犀角鎊菖蒲木通玄參赤芍藥赤小豆炒甘菊花去枝根各一兩甘草半兩炙上銼碎每服五錢水一盅生薑三片煎至五分不拘時服龍骨散治小兒聤耳膿出不止久不瘥成聾耳也龍骨一錢黃丹炒七分枯礬一錢麝香少許胭脂四分上同研令細先以綿杖子捻去耳中膿用竹筒納葉少許吹入耳內勿令風入本方加海螵蛸半錢亦妙花胭脂膏治小兒聤耳常出膿水不止花胭脂白龍骨枯礬白石脂各一錢上研如粉用蒸棗和丸如棗核大以綿裹一丸塞耳中日三換之紅綿散治小兒聤耳出膿及黃水白礬焙一錢胭脂一字麝香少許上為細末研勻用綿杖子捻去耳中膿水用竹筒納藥少許吹入耳中脫肛敗毒散治小兒風邪入大腸脫肛墮下方見前養臟湯治上兒久痢臟寒肛門出不收五倍子白礬蛇床子各等分上為末水煎浸洗洗後用赤石脂為末以少許後在芭蕉葉上頻用托入蝟皮散治小兒肛門或因洞泄或因用力過多脫出不收蝟皮一個燒存性磁石煅淬桂心各半兩上為末每服一錢空心米飲調下香荊散治小兒脫肛香附子一兩半炒去毛荊芥穗二兩上為末每用五錢水二大碗煎熟淋洗又方用萆麻子四十九粒研爛水調作餅子貼頂門上即收陰㿗茱萸內消丸治小兒陰㿗偏火上攻臍腹㽲痛膚囊腫脹或生瘡瘍時出黃水川楝炒一兩半大腹皮五味子海藻洗玄胡索各一兩二錢半茴香炒桂心川烏炮去皮臍吳茱萸桃仁麩炒另研食茱萸各五錢木香七錢半桔梗青皮山茱萸各一兩上為細末酒糊為丸如麻子大每服三十丸空心溫酒送下當歸散治小兒㿗疝牽牛微炒取仁辣桂各半兩當歸大黃各二錢半全蠍一錢半桃仁浸去皮尖二錢半上銼碎每服三錢水一盅入蜜半匙煎至五分食前服以利為度川楝散治小兒㿗疝小腹痛引腰脊攣曲身不能直木香檳榔三稜莪朮炮青皮去白陳皮去白川楝肉芫花米醋浸炒各半兩辣桂牽牛生取仁各三兩巴豆不去油一錢上為細末飛麵糊為丸如麻子大每服三丸空心用生薑湯送下牡蠣散治小兒外腎腫大莖物透明牡蠣粉二錢乾地龍一錢上為細末用津唾調敷外腎熱者雞子清調敷陰瘡木通散治小兒小腑蘊熱濕毒邪干留熱於膀胱故生陰瘡木通去皮萹蓄去梗各五錢大黃赤茯苓去皮甘草各三錢瞿麥去梗滑石末山梔仁車前子黃芩各二錢半上銼碎每服五錢水一盅燈心十根薄荷五葉煎至五分食前服臘茶散治小兒陰囊生瘡疼痛水出久不瘥臘茶五倍子各五錢膩粉少許上為末先用蔥椒湯洗然後用香油調貼一方治陰囊生瘡疼痛上先用川椒荊芥槐枝柳枝蛇床子煎湯洗後用朴硝為末雞子清調敷一方治陰生瘡不幹上用烏賊骨為細末干貼瘡患處一方用紫蘇葉煎湯淋洗及作末貼之妙一方治小兒陰瘡不幹上用輕粉密陀僧為末貼之如癢加山梔子訶子燒存性研同前藥為末先將米泔水洗瘡淨然後敷貼此藥天釣鉤藤飲治小兒天釣風潮熱四肢抽掣鉤藤人參犀角各半兩甘草半錢炙全蠍天麻各二錢半上為粗末每服一錢半水一盅煎至四分不拘時服鉤藤飲治天吊風搐鉤藤犀角天麻各七分全蠍五個木香甘草各五分上作一服水一盅生薑三片煎至五分不拘時服鉤藤飲子治驚風天吊卒然驚悸眼目翻騰鉤藤炒五分麻黃去節甘草炙各三分天麻川芎防風人參各七分全蠍炒去毒五個殭蠶炒七個上作一服水一盅生薑三片煎至五分不拘時服牛黃丸治小兒一切驚風五癇天吊客忤痰涎四肢抽掣白花蛇酒浸取肉白附子全蠍川烏一隻重半兩天麻生用去皮臍薄荷葉各半兩以上六味先為細末次入雄黃半兩辰砂三錢牛黃一錢麝香片腦各半錢另研上件為細末一處和勻麻黃去節二兩酒一升煎麻黃至一盞去麻黃用酒入蜜少許熬成膏劑前藥末為丸如芡實大用金箔為衣每服一丸用薄荷湯化下大能發散風邪塗頂膏治天吊風備急烏頭生用去皮臍蕓薹子各二錢上為末每用一錢新汲水調敷兒頂上天漿子散治小兒天吊驚風天漿子炙蠍梢犀角屑丹砂另研雄黃另研附子去皮臍南星炮去皮白附子半夏水銀另研乳香另研白殭蠶膩粉另研牛黃另研各一錢麝香一字另研銀箔五片另研上為細末和勻每服一字用薄荷湯調下量兒大小加減服青黛丸治小兒天弔客忤五疳八痢十二種驚癇青黛天竺黃干蛤蟆一個黃泥包裹燒赤去泥干蝸牛殼黃連人參地龍去土鉤藤炒龍膽草各二錢半蘆薈熊膽各半兩牛黃麝香雄黃丹砂各一錢夜明沙去土淨胡黃連各三錢上為細末蒸餅糊為丸如麻子大一歲三丸空心米飲湯送下再生散治小兒天釣驚風潮搐項筋緊強手足厥冷烏蛇酒浸取肉天麻南星炮去皮全蠍炒去毒各二錢半麝香膩粉各五分丹砂二錢另研牛黃另研白附子炮各一錢上為細末和勻每服半錢煎金銀薄荷湯調下量兒大小加減服三白散治小兒盤腸氣吊先服此藥後服鉤藤膏白牽牛一兩炒白朮炒桑白皮陳皮木通各三錢上為細末每服半錢用生薑湯調不拘時服鉤藤膏方見心痛類
