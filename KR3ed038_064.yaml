body:
  text: 卷之六十四小兒門違和說書云陽升陰加四序無差萬物稟天地之一氣男女從精血之兩耶三旬而陰氣純厚子稱襁褓兩月而陰氣方生兒呼為牙在百日名奶星至半載而為誇乳童周期而陰陽各半孩兒千日乃真氣方奢此際全在乳母能調則和不調則違且和者其母慈祥能調寒暑乳哺得宜是以百疴頓釋形貌充悅筋骨隆盛情性其常違者乳哺失節不能調攝或嗔怒乳兒令兒邪狂或酒醉乳兒令兒驚癇或有孕乳兒令兒黃瘦疳積或感患乳兒令兒患驚風異疾或吐後乳兒令兒嘔逆羸瘦或傷飽乳兒令兒多熱喘急或房勞未定乳兒令兒多病或乳母與孩兒同睡口鼻之氣侵吹囟門令兒鼻塞或母過愛䙀抱衣服遇寒常加火烘熱氣鬱積令兒患熱病風毒丹毒又有乳母誤將孩兒衣服留於月下曬晾過夜被惡鳥羽屎落於衣上遂成無辜之疾或將惡相異物嬉戲乍忽一見遂成驚忤書云衣安月下招無辜以為殃童子未成見稀物而觸忤皆為母之過失使兒傷精損血形體黧黑四肢枯瘁病之生殺從此而來是以內經不載其說乳下嬰孩之疾有病難治者皆無所據中古巫妨氏著顱囟經以占壽夭歷世相授於是小兒醫方興焉其次晉宋江左推諸蘇家小兒方傳習有驗隋間有巢氏方撰集病源唐有孫真人留心此術逮後賢俊群集名醫頗衆然小兒治法散在諸書博考群書論說但有證而無治法張渙有方而闕脈證惟錢氏一書古今所重謂小兒方脈固難求證不可以言語取者乳下之嬰襁褓之孩故專於一科古之有言醫之為難而慈幼科比諸醫者又出人一頭地雖然人有長幼病感則一但幼小不能言者耳人有四百四證能調則生失和則死幼者歸罪於母壯者或四氣七情或飢飽勞逸或嗜欲誤犯皆能成疾故上古神農氏之王天下也觀人之違和啜草木之味以定鹹酸甘苦以治疾病沉疴咸以軟之酸以收之甘以緩之苦以堅之奇哉辛味總攝四傍然後播種百穀以養人之形骸古者巢居穴處不昧其道故能全形返質以道自守氣血堅剛終保百年之壽於是乎明醫間出繼踵不絶岐和振袂於前李華馳聲於後悲哉後人巧僞日增故此天壽不滿雖有明醫續世診視無功淫祀妖邪以求余福可謂息燈覓朗枯壑駕舟雖欲求生反遭艱險大抵養生之士要識違和之理則天命無窮矣小兒初生總說夫人稟陰陽二氣而生得患起自三焦然冠壯易明童幼難治古云不能察其幼小者是以別為一家調理耳且小兒所稟形質壽命長短者全在乎精血二者和而有妊在母之胎中十月而生一月如露珠二月似桃花三月男女分四月形像具五月筋骨成六月毛髮生七月遊其魂兒能動左手八月遊其魄兒能動右手九月三轉身十月受氣足又顱囟經云一月胎胞清血凝也二月胎形成胚也三月陽神為三魂四月陰靈為七魄五月五行分五臟六月六律足六腑七月精關竅通光明也八月原神具降真靈也九月宮室羅布以定生人也十月受氣足萬象成而生也大抵壽夭窮通聰明愚癡皆以預定豈能逃乎小兒所稟全習父母之餘氣以長形質故肥不可生瘦瘦不可生肥大小與父母不等則難養也初生雖多患若形體相稱則壽也小兒回舒轉首遲滯稍費人雕琢者壽之兆也若小兒預知人意身輕力懦者難養也古人有言譬如梅花早發不觀歲寒甘菊晚榮終矜年事故知晚成者壽之兆也若小兒陰大而黑與身相等者可養之子若陰小而白者難養也若小兒形體弱頭面多青脈精神昏瘁者難養也若小兒剛悍眼目俊朗神氣爽健發紺而澤者壽之兆也若小兒精神實則少病故易養長成也若形瘁而多病者難養也若小兒眼內黑珠少白睛大面色㿠白者非壽之相也縱長不及天年若眼中黑珠大而白睛少面色黑形不淡者亦要觀其小兒眼中黑白分明表裡相稱曰壽曰康若黑珠動搖光明閃爍從長亦憂目疾壽亦不及四旬矣凡嬰孩始生坐婆急以綿裹指拭兒口中惡物令淨方可浴穢若不急拭啼聲一出咽下則生百病矣如或浴水未到且以綿絮包裹暖大人懷中浴湯極須調和若冷熱失所則令兒驚亦致五臟疾矣雖浴出亦當暖之若遇暑月亦未可去其綿絮乍出母腹不可令冒寒氣也宜以預先煎下沸湯以瓶收之臨時漸暖不犯生水則兒不生瘡如此一月為佳自然長而少病矣初生小兒未乳之先用黃連些少浸汁調幹胭脂一蜆殼抹兒口中去其腹中舊糞方可與兒乳之三日內以少硃砂入蜜些少調灌半蜆殼一臘以牛黃少許徐徐抹兒口中若兒多睡慎勿強與乳之新生浴兒用豬膽一枚取汁和入湯中浴兒則終身不生瘡疥又用五根湯浴兒亦可五根者桃柳楝梅槐加之苦參白芷煎湯浴之闢諸不祥大凡小兒冬不可久浴浴則傷冷夏不可久浴浴則傷熱頻浴則背冷而發驚若遇熱時以軟絹蘸湯拭之小兒肌膚未成不可暖衣暖則令筋骨軟弱時常宜見風日若愛惜不見風日令兒肌膚脆軟便易傷損當將父母穿過舊絮著衣少假父母之餘氣幸勿以新綿著兒遇其天氣和暖無風之時令人抱向日中嬉戲數見風日則血凝氣剛肌膚堅密堪耐風寒不致疾病若藏帷帳之中重衣溫暖譬如草木生於陰地不見風日軟脆不耐風寒又當消息衣服無令衣多多則令兒汗出汗多則致虛損風邪易感夫小兒當慎風池在頸項筋兩轅之間諸疾從此而發小兒臍帶未脫不可頻浴頻浴則臍中入水撮口臍風皆從此起不可不慎此乃前人之成說實後人之龜鑑者歟看小兒三脈五脈法水鑑先生曰小兒雖受陰陽二氣成其形氣尚未周何言有脈直至變蒸候盡陰陽氣足方可看脈其髫齔之年方生陰陽古云男子七歲曰髫生其原陽之氣女子八歲曰齔其陰陽方成故未滿髫齔之年呼為淳陽若髫齔滿後呼為童兒始可看脈小兒初生至半歲之間有病速看額前眉上髮際下以無名指中指食指輕手滿按之若三指俱熱感寒鼻塞氣粗三指俱冷上吐下瀉若食指熱胸膛不寬無名指熱乳食不和以致病也半歲以上方可看虎口周歲以上看虎口兼一指脈若五百六十四日變蒸滿足只看一指脈以食指按之上下袞轉分取三部凡言三部非寸關尺也小兒三部面看其色為一部虎口脈紋為二部一指脈為三部五脈者上按額前下按太衝並前三部共為五脈小兒有疾病無惡候不必掌診太衝之脈此脈定生死之要會如七八歲脈一息六至為常人之脈一息八至為熱九至風五至虛四至損三至脫二至死十至必是病勞虛損形容瘦劣若或體肥面色青白一息十一二至謂之虛是風病死是為脈亂若一息一二至者為脈不來其人當厥冷而死遲若一息十一二至者必死速則不滿三月何謂一息一呼一吸為一息呼吸者即是出一氣入一氣謂之一息其脈若指下來硬隱指急大者是有積若來微細即是冷若輕虛緊即是熱時復一大即是人驚若大小不勻即是惡候也所論浮數為熱伏結為寒沉細為冷大小不勻為惡候數者緊也浮者輕也伏者貼也重手方見結者亂也沉者重沒沉細者微也大小不勻即是或大或小而不勻是謂氣不生其人必死也且如前人備述三脈五脈之法書之於下後學將此不可視以細事人命所繫務要誠心診察兢兢業業庶幾則可設有所誤禍之不輕醫為人之司命可不謹乎辨虎口紋訣夫小兒三歲以前若有患須看虎口脈次指表節為命關次氣關次風關古人所謂初得風關病猶可傳入氣命定難陳是也男子以左手女以右手觀之有此通度三關脈候是極驚之候必死餘外並可醫治風關青如魚刺易治是初驚候黑色難治氣關青如魚刺主疳勞身熱易治命關青如魚刺主虛風邪傳肺難治風關青黑色如懸針主水驚氣關赤如懸針主疳兼肺臟積熱命關有此凡五色皆是死候三關通度如懸針者主慢驚風難治風關如水字主驚風入肺咳嗽面赤氣關如水字主膈上有涎並虛積停滯命關如水字驚風疳證夾驚候不拘五色三關通度者難治風關如乙字青黑色主慢脾風難治氣關如乙字主驚風命關如乙字青黑色主慢脾風難治風關如曲蟲者疳病積聚胸前如排算子肚皮如吹起氣關如曲蟲主大腸穢積命關如曲蟲主心臟傳脾難治風關如環主肝臟疳有積聚氣關如環主肝入胃吐逆不治命關如環難治此紋若在風氣二關易治若在命關通度難治此紋若在手上或在面上或左右臉邊皆是死候脈曲向里者是氣疳脈曲向外者是風疳脈斜向右是傷寒身熱不食無汗脈斜向左是傷風身熱不食有汗雙勾脈者是傷冷脈三曲如長蟲是傷硬物脈兩曲如鉤是傷冷脈一頭如環又有腳者是傷冷頭面肚上有大脈並青筋並是食毒驚積難治面上有此點子並是再發之候脈如亂蟲是常疳亦有蟲疳蛔蟲食積之疳治之必瘥凡脈不足細者並是風氣但消疳然後取蟲為效一風關易治二氣關病深三命關死候小兒驚風脈候青色天雷四足驚赤色飛禽因外入黑色只因遭水撲風關候脈應心經辨三部脈證上黑鬚知腎臟傳中關黑候又纏綿人驚此患兩相雜目多直視定痰涎下硃砂膏下黑鬚知是再驚但宣風積便和平上下是同因打撲熱來悶閒沒心情上青肝臟有風停目直便青面更青中是人驚並四足渴來發燥不惺惺下青原是再驚根解熱宣腸是何論上下俱青候是惡十個之中得一存上赤風多入肺停或來發熱嗽聲頻中是風來入心臟腸痛頻頻下瀉青下赤重驚見本宗但調心臟有神功上下一同難治療口開目下是知凶上青肝臟本因留目閉身疼四體柔中是水瀉並再撲熱來喘嗽不知休下硃砂膏下青因是再驚來妙藥宣風定少災上下若青俱發熱四肢逆冷奄泉臺上黑之時目上瞪兩般看大便流糞又兼青中見之時狀消渴下熱尿黃便安寧下黑若見赤相隨氣多下瀉候如斯下潮金丹上下俱同須看手虛煩燥渴速求醫辨三部脈證上黑鬚知腎臟傳中關黑候又纏綿人驚此患兩相雜目多直視定痰涎下硃砂膏下黑鬚知是再驚但宣風積便和平上下是同因打撲熱來悶閒沒心情上青肝臟有風停目直便青面更青中是人驚並四足渴來發燥不惺惺下青原是再驚根解熱宣腸是何論上下俱青候是惡十個之中得一存上赤風多入肺停或來發熱嗽聲頻中是風來入心臟腸痛頻頻下瀉青下赤重驚見本宗但調心臟有神功上下一同難治療口開目下是知凶上青肝臟本因留目閉身疼四體柔中是水瀉並再撲熱來喘嗽不知休下硃砂膏下青因是再驚來妙藥宣風定少災上下若青俱發熱四肢逆冷奄泉臺上黑之時目上瞪兩般看大便流糞又兼青中見之時狀消渴下熱尿黃便安寧下黑若見赤相隨氣多下瀉候如斯下潮金丹上下俱同須看手虛煩燥渴速求醫辨三部脈證上黑鬚知腎臟傳中關黑候又纏綿人驚此患兩相雜目多直視定痰涎下硃砂膏下黑鬚知是再驚但宣風積便和平上下是同因打撲熱來悶閒沒心情上青肝臟有風停目直便青面更青中是人驚並四足渴來發燥不惺惺下青原是再驚根解熱宣腸是何論上下俱青候是惡十個之中得一存上赤風多入肺停或來發熱嗽聲頻中是風來入心臟腸痛頻頻下瀉青下赤重驚見本宗但調心臟有神功上下一同難治療口開目下是知凶上青肝臟本因留目閉身疼四體柔中是水瀉並再撲熱來喘嗽不知休下硃砂膏下青因是再驚來妙藥宣風定少災上下若青俱發熱四肢逆冷奄泉臺上黑之時目上瞪兩般看大便流糞又兼青中見之時狀消渴下熱尿黃便安寧下黑若見赤相隨氣多下瀉候如斯下潮金丹上下俱同須看手虛煩燥渴速求醫辨三部脈證上黑鬚知腎臟傳中關黑候又纏綿人驚此患兩相雜目多直