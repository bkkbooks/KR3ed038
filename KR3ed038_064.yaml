氣入四肢長碎骨於十變後六十四日長其經脈手足手受血故能持物足受血能行立經云變且蒸謂蒸畢而足一歲之日也師曰不汗而熱者發其汗大吐者微下不可別治是以小兒須變蒸蛻齒者如花之易苗所謂不及三十二齒由變之不及齒當與變日相合年壯而視齒方周觀諸變蒸熱作驚須視日角左邊眉間脈紅是也大凡初蒸見一條長一二分在眉上者輕自日角垂至眉上此重變蒸發熱見二條紅者兩二次蒸熱在內不解脈紅帶叉因驚而蒸脈青變蒸多次青在左太陽因傷風而蒸自信門青至眉之上因驚而蒸三處皆青三證俱見若及三十二齒者變蒸足也此篇載之於錢氏之書書之於下使後人易於便覽云小兒諸熱須分主治驚熱溫壯壯熱胎熱脾熱風熱煩熱潮熱積熱虛熱實熱疳熱血熱骨蒸熱夫小兒驚熱者誤因驚著執以為常致令心氣不和身體微熱睡夢虛驚遍身有汗甚者手足掣縮變成癇疾此由氣血不和實熱在內心神不定所以發搐又小兒變蒸亦微驚所以然者亦熱盛故也治之以七寶散天竺黃散甘露散辰砂金箔散皆可治之小兒因驚則生熱熱則心不寧故睡臥不安身體悰動心主驚實則發熱飲水虛則臥而悸動不安此其候也小兒溫壯者由胃氣不和氣行壅塞故蘊積體熱名曰溫壯若大便糞臭而黃者此腹內有伏熱以四順飲子治之若糞白而酸臭則挾宿食不消當服紫霜丸輕者少服重者節乳哺增加丸藥當取微利可也小兒壯熱者因五臟生熱熏動於外故身體壯熱大抵與溫壯相類而有小異但溫溫然不甚盛是溫壯也其壯熱者一向熱而不止甚則發驚也以七實散大黃朴硝湯皆能治之小兒胎熱者但看初生下肌膚紅白二臘以後遍身黃腫眼閉不開作呻吟聲此因胎內有熱或因母服熱藥所致亦謂之血疸治之以辰砂金箔散牛黃膏乳上吮之兼以黃柏皮煎湯浴之此良法也小兒脾熱夫弄舌者脾臟微熱令舌絡微緊時時舒舌治之便不可用涼藥下之少與龍腦飲子地黃膏治之若大病未已弄舌者凶學者慎之小兒風熱若身熱面青口中亦熱煩叫不時有風證者宜虎睛丸天竺黃散治之若熱甚大便祕澀者四順飲子亦可服之小兒煩熱者由臟腑實熱血氣盛表裡俱熱則苦煩躁不安皮膚壯熱也以八珍飲子七寶散皆可服之小兒手足多熱心煩躁哭唇深紅飲水不止以竹葉石膏湯加朱甘露散治之小兒潮熱者時間發熱過時即退來日依時而發直欲發驚也大抵血氣壅盛五臟驚熱熏發於外故與溫壯相類或來伏熱或帶宿寒夾伏熱者大便黃而臭帶寒者大便白而帶酸臭氣皆緣臟腑冷熱之氣俱盛腸胃蘊積故也治之以金蓮飲克效湯加朱甘露散過期不解小柴胡湯或竹葉石膏湯也錢氏云假如潮熱是一臟實一臟虛而內發虛熱也法當補母而瀉本臟則愈且如日中發潮熱者是心虛也肝為心之母則宜先補肝肝實而後瀉心心得母氣則內平以潮熱愈也醫見潮熱妄謂其實乃以大黃朴硝輩諸冷藥利之利既多矣不能禁約而津液內竭縱取一時之瘥鮮有不成疳病而身瘦也小兒積熱者由表裡俱熱則遍身皆熱頰赤口乾小便赤大便焦黃先以四順飲子三解牛黃散利動臟腑熱即去既去復熱者裡熱已解而表熱未解也當用惺惺散或紅綿散表熱乃去表熱既去久發熱者何也世醫到此盡不能曉或再用涼藥或再解表或以為不可醫誤致夭殤者甚多此表裡俱虛氣不歸原而陽浮於外所以再發熱非熱證也只用異功散入粳米煎和其胃氣則收陽氣歸內身體便涼熱重者辰砂金箔散治之錢氏白朮散亦可小兒虛熱者因患後平復血氣未勻四體羸弱時多發熱治宜調氣補虛其熱自退如錢氏白朮散異功散加四均子湯之類或未退人參生犀治之此為良法小兒實熱者頭昏頰赤口內熱小便赤澀狀如豆汁大便堅硬或祕澀不通腹急此熱證也宜四順飲子大黃朴硝湯八珍散略挨動臟腑即安小兒疳熱者發熱形瘦多渴吃食不長肌膚者為之疳熱三四歲後有此疾蓋吃食則有疳用金瓜丸五蟾丸肥兒丸之類治之最為穩當小兒血熱者每早食後發熱夜則涼世醫多謂虛勞或為疳熱此血熱證也宜服龍膽丸地黃膏之類時時與服即瘥小兒骨蒸熱者一歲至十歲衣絮皆不得者新綿又不得冬月以火烘衣被勿令食桃杏楊梅果實又不得食炙爆熱面之類皆令兒體熱或因傷寒後食肉太早令兒體熱者有之或作骨蒸者宜服生犀散克效湯地骨皮飲七寶散金蓮飲子治之蓋小兒純陽未有虛羸形瘵之證溫補之劑寡矣且如前人論小兒發熱有一十四證見證立方多獲功效今人當效前人之心觀形察色切脈論證以分表裡虛實設有所誤非惟夭閼人命抑且欺於心哉小兒初病先見面部與虎口之脈色吉凶相合虎口脈色脈色純紅者為初得病為陽為熱為病在外脈色紅而紫者為病傳變為內外尚有熱或但熱為陽脈色紅或紫而青為病荏苒為病一寒一熱外為之變作脈色純青者為病久而過經為冷為熱在內為陰脈色青而黃為病假極為冷冷極則變熱治則費力為虛寒則為五臟之邪相干陰陽之證相反脈色青而黑為病極或為久病再作形色黧黑脈色黑而黃黃而露出者十無一生大凶面部赤紅乃心氣絶蓋火屬心主炎上故知心絶則死主咬牙弄舌虛舌出滿口生瘡木舌鵝口喉閉舌上白胎舌下重吊咽喉腫爛痰涎上壅魚口此為危急惡候左太陽並日角紅脈現變蒸候主煩躁啼叫頭肚上溫溫壯熱一二日而退太陰上紅脈現傷寒之候主壯熱鼻塞文臺上紅脈現傷寒三日余主內熱頭疼太陽脈紅至太陰內外有熱又連文臺熱極不解至武臺漸生變證囟門紅脈胎受熱受驚之候主不時驚跳時多啾唧夜啼難睡額上紅脈至眉心驚風發熱之候引入印堂驚痰搐搦有熱主小便澀少印堂紅脈現心經積熱眉心連印堂紅脈或紅影心肝上焦熱蘊痰涎上壅貫上焦夜啼將生驚候近眉頭左下有凸伏驚時睡中驚跳囟門紅脈腫凸此風熱痰生驚正緣熱氣上衝攻急心胃有熱痰不止漸成驚風之候以涼劑去痰解熱即安如囟門上紅脈引入印堂比驚候搐動多日了左眉頭紅變蒸熱未退肝肺有熱之候當以清肺疏風熱正胃氣之劑風池紅有風熱在上中焦瞬息將有搐動之候截風化痰氣池紅傷風久傳變在臟三焦有熱之候可頻解利眉心印堂紅有熱驚痰飲不吐則成驚搐印堂至山根紅脈是心與小腸熱候小便赤澀而少山根下鼻柱紅心胃熱候小便連大便皆赤澀印堂連至上准紅三焦有積熱可以清涼之劑治之准上紅黃色此平穩無恙頤門紅脈外腎因風溫候生熱為吊臉堂紅內有煩躁而熱右太陽並日角紅脈因吃乳母傷風壅奶汁成乳癖停滯生風熱痰等證右太陰紅脈吃乳母熱病痰奶恐生痰候引入武臺紅脈漸成吐瀉生驚之候風池紅母不忌椒姜面或豬羊骨汁毒乳生風氣池紅母有熱痰乳兒雖至十歲病亦須發見此熱痰乳入兒五臟令兒眼目生昏傳變他病頤門紅腎中氣病緣母能飲或好異物及食雞鵝鴨子生魚韭蒜將來傳變異疾七表浮芤滑實弦緊洪浮主中風芤失血滑吐實下分明別弦為拘急緊為寒洪脈由來偏主熱八里微沉緩澀遲伏濡弱遲寒緩結微為痞澀脈敗血濡氣滯伏患癖痛沉積冷弱因患後虛浮是九道長短虛促結代牢動細脈長陽毒在三焦短脈胸中食不消虛主多驚人恍惚促時加峻命難逃結為氣痞代羸瘦牢者骨蒸似火燒動則血崩精不固細還酸腫主枯標視嬰孩大要一視兩眼精神二視聲音響大三前後頂囟四形貌五毛髮一兩目為五臟精華所聚一身之神氣所鍾若精珠黑光滿輪精神明快主兒有壽一生少病雖有病亦易愈若眼白多睛昏懶睛珠或黃或小此是稟受怯弱兒多患也二聲音大而響亮五臟之氣壯令兒易得長設如孩兒自生來不曾大啼哭乃聲音不出此乃一臟或二臟之陰竅不通神氣怯或叫聲如啾唧咿𠸄之狀此兒不壽而難養必矣三囟門乃母氣血充實令兒囟門堅實而耐養如母多病氣血怯弱令兒囟門虛軟而不實又後頂囟乃父之精元氣充實令兒後頂上堅硬而耐養如父之原氣不足耽酒多愁令兒後頂虛孔不堅亦不壽如父母俱怯生下兒女俱不壽若如此其父母自亦不能保於天年前囟又曰信門道家為泥丸後信名腦後頂門頭中心頂上又名百會穴華陀看面部訣載甚詳囟與信同音凡前後信及百會間之虛名解顱四形貌口大鼻端眉聳目秀方福此嬰孩易長福氣堅康如小鼻歪眉目甌皺令兒怪異不貧則夭亦是乖雕此等要剖決五發乃血之餘母之血氣充實則發黑而光潤如母因血虛帶漏敗墮月事不調或耽酒多淫或母胎有患令兒發黃焦槁生疳熱瘡痍之患凡視小兒神氣色脈無出於此五者不能全見但得兩目精神聲音響亮此可保其六七此乃漢東王氏之心法口授之祕訣也驚風搐不治證如驚風搐搦略定精神如常神思不改即是燥冒煩躁不安須急急調理稍緩則不及事亦懼不療須要兩眼鮮明為吉其餘難療之證須詳細審察驚風搐搦兩眼不開不治驚風定了兩眼亦開不得不治叫不出說不得更不唧聲不治驚風連搐不止不治手搲搲腦膈及咽喉間不治口中不時吐出鮮血不治吐不出者不一月死信門腫起紅青脈交橫見不治大便瀉紫黑血不治信門如坑陷青脈現不治驚風搐動連日不下不治尋常無事時喋口喋眼連日搐動不治痰涎滿口咽喉間如解鋸不治痰涎如水雞聲乃二氣爭不治聲音不出口不治驚風治證諸方書所載急驚風易治慢驚風難治此古今之通論也意之度之出自至人傳授別是一宗機杼精思其訣録方術真神仙之妙旨也有若小兒授病之原即驚風寒暑痰食各有由屬若治療之法迥出一人頭地如寒屬膀胱驚熱屬心風屬肝痰食屬脾胃究湯氏幼幼之說驚風痰常相繼於表裡大要察其部位脈色燭見其病之底蘊克時獲效矣驚脈在囟門額上印堂三處紅嫩則初驚方熱紫脈則重驚而熱囟門屬腎髮際屬膀胱印堂屬心囟門先紅及印堂青此心之微邪淫水囟印皆紫紅此同前上證皆輕囟門青及印堂紅此腎之正邪克心火必危囟印皆青同上證病危如加之左太陽上紅傷風內熱日解紅至眉中變蒸而熱生驚右太陽紅食了乳母傷風乳汁右太陽紅青吃乳母傷寒乳汁風脈看左太陽及風池左太陽與風池紅風邪輕青受風邪重左太陽屬膀胱左太陰屬腎左風池屬肝右風池屬命門加之又看左太陽紅傷風初熱左太陰紅感寒初熱左文臺紅熱有五七日傳經了左太陽紫傷風再受左太陰紫傷寒再得左文臺紫三四次熱了右文臺紫久熱不退左太陽青風變蒸左太陰青生驚了左文臺青再傳經熱不解印堂紅主風熱生驚痰右太陽屬三焦右太陰屬脾右文臺屬肺右武臺屬胃右太陽紅吃母感冒熱乳右太陽青吃母感冒熱乳印堂青右太陰青右文臺青此三處主痰與食印堂紅心熱生痰印堂青黑主胎中驚痰飲印堂紫主有熱痰印堂青黃主有風痰右太陰青紫傷寒夾風熱乳右太陰青傷寒乳食右太陰青及文臺青武臺青皆是食如食傷因飽食不節或為冷硬之物或油膩之物致令頭疼發熱嘔吐宿食肚疼如傷在膈上痞塞者藜蘆散吐之停於肚中嘔吐肚疼宜用三物湯瀉之有滯食緣胃弱克化不迭心胸滿閉肚疼與化鐵丸消食二陳湯快膈有中食因其兒脾胃怯常有停飲或食飽兼飲滯而不化痞塞三焦如驚風搐搦或迷悶而不省似夢如醉神思昏亂發熱金星丸主之五痓附痓風癇為病廢手足或一手一足或兩手兩足如癱不隨或喋眼或喋口或口歪牽引頰車食癇為病傷肉食手足搐動角弓反張或拳攣或張狂大聲如羊如犬大叫吐出飲食方定其飲食盡被痰涎包裹在其中驚癇為病廢頭目吊口目或一目雙目或昏或盲或邪視或頭歪或搖頭或戰腦痰癇為病此患似張狂作之不常或半年一作或一年或一月或一日一次或一日三次一身驚搐不廢手足不廢頭目其人張狂如夢中如半醉燈下不知人皆從夢寐中作所以無常也忽耳不聞其目不能視如狂飲癇為病此患吃食不知飽忽然連三五日不甚思食手足搐動多自夢寐中作食之太飽亦便發作痓附痙若痓病如寒邪中得患者十有九死又熱瘟病及中暑發患熱者十無一生頭疼發熱頸項強硬不能回顧搖頭口噤問之全不應人漸漸角弓反張痰在咽喉響者死仲景栝蔞葛根湯小續命湯入麝局方大防風湯主之且小方脈著書立方者一百餘家各有所長惟錢氏比諸家優詠之切後之學者熟讀玩味治嬰孩之疾則百發百中矣今略各證通治方開列於後小兒證通治方七寶散治小兒溫壯伏熱傷寒煩躁面赤氣喘夜熱曉涼此藥涼心臟消風熱川大黃蒸赤芍藥甘草炙川當歸各二錢半麻黃白朮荊芥穗各二錢上為末一歲一錢水半盞蔥白一寸薄荷一葉煎至三分不拘時溫服天竺黃散治小兒驚風熱天竺黃研川蔚金山梔子白殭蠶炒去絲嘴蟬殼去土甘草各等分上為末一歲半錢熟水薄荷湯皆可服不拘時甘露散治小兒驚熱通利小腸去驚涎清心腑止煩渴安神穩睡加硃砂名加朱甘露散寒水石研軟而微青中有細紋者是石膏研各二兩堅白有牆壁如無以方解石代之生甘草末一兩上件為末和勻量兒大小或一錢或半錢熱月冷服寒月熱服用薄荷湯調或燈心湯調被驚心熱不安臥皆可服小便不通快麥門冬燈心湯調若驚熱入硃砂少許不拘時服一方有赤茯苓一兩蘇沈方用滑石不是石膏錢氏名玉露散每服一字或半錢或一錢食後溫白湯調下辰砂金箔散治小兒心膈邪熱神志不寧驚惕煩渴恍惚怔忡夜臥不安齒齦腫爛及痰實咳嗽咽膈不利辰砂另研桔梗各二錢半人參白茯苓各一錢半蛤粉四錢飛研牙牙硝枯一錢半甘草炙一錢二分半片腦一分半金箔一片上為末一歲半錢薄荷湯調不拘時百睟小兒臟腑多熱睡臥不穩大便不利蜜湯調一字四順飲子治小兒三焦積熱遍身丹腫唇口生瘡忽驚涎潮諸熱等證川當歸赤芍藥各二兩川大黃濕紙裹煨香各二錢半甘草炙一錢半上銼碎三歲小兒用二錢水六分薄荷二葉煎八九沸去渣不拘時服大小以意加減與之小便不通加燈心木通同煎服紫霜丸治小兒變蒸發熱不解及夾食停冷溫壯汗後熱不歇及腹中有痰癖乳哺不進乳則咀哯食癇先寒後熱者代赭石一兩火煅醋淬三五次令碎赤石脂一兩研杏仁五十粒去皮尖令淨巴豆三十粒去殼煨出油上件研入糊為丸如麻子大一粒少乳下食頃後與少乳勿令多日服二丸此藥無所不療雖行不虛人米飲下亦可牛黃膏治驚化痰祛邪熱止涎嗽緑豆粉二兩錢氏用寒水石五錢細研牛黃一錢另研腦子少許甜硝三錢甘草末半錢硼砂二分半一方硃砂半錢上為末和勻煉蜜丸如芡實大金箔為衣或一丸或半丸薄荷湯磨化服不拘時龍腦飲子此瀉脾經熱可代瀉黃散用治小兒蘊熱咽喉腫痛赤眼口瘡心煩鼻衄咽乾多渴哺臥不寧及除痰熱咳嗽中暑煩躁一切風壅甘草四兩炙大梔子三兩炒藿香葉半兩石膏一兩縮砂栝蔞各七錢半上為末每服一錢蜜水調服不拘時治傷寒餘毒潮熱虛汗加竹葉煎服地黃煎丸治小兒風壅上膈熱煩鼻衄口瘡咽喉腫痛口舌生瘡或血熱五心常熱多渴飲水生地黃熟地黃各一兩薄荷葉一兩一錢甘草微炙山梔子仁玄參各七錢半片腦半錢上為末煉蜜為丸如芡實大每服一丸白湯磨化乳後服克效湯治潮熱往來久而不解煩渴昏倦肌瘦減食地骨皮一兩柴胡防風黃芩甘草炙葛根各七錢半上銼碎每服二錢用水六分煎至三分不拘時服竹葉石膏湯治小兒虛羸少氣氣逆欲吐四體煩熱石膏三兩半夏洗人參各七錢半麥門冬去心二兩甘草炙七錢半淡竹葉半把上銼碎每服二錢用水六分粳米三四十粒生薑二片煎至三分去渣不拘時服金蓮飲子治小兒蘊積壯熱赤眼口瘡心煩躁悶咽乾多渴潮熱不止防風甘草炙連翹柴胡去蘆山梔子各半兩上為末每服二錢用水六分煎至三分食後服三解牛黃散治小兒潮熱實熱壯熱煩悶不思乳哺大小便不利及諸風壅痰實川大黃濕紙裹煨熟牛黃黃芩白附子防風各半兩白茯苓桔梗甘草炙人參全蠍去毒微炙白殭蠶去絲嘴炒鬱金皂角水煮各二錢半上為末薄荷湯和熟蜜調半錢不拘時服渾身熱渴吐瀉用防風湯調若壯熱不止甘草桂枝湯調服大黃朴硝湯治小兒驚熱涎風前後不通川大黃蒸甘草生朴硝各一兩上銼碎每服二錢水半盞入蜜少許煎至三分不拘時服惺惺散治小兒傷風壯熱及瘡疹毒氣時疫溫壯風熱等疾桔梗細辛人參白朮栝蔞根甘草炙白茯苓川芎各等分上銼碎每服二錢水半盞生薑薄荷各少許煎至三分不拘時如傷風無汗加蔥豉薄荷煎服紅綿丹治小兒急慢驚風手足抽掣目直涎壅壯熱氣粗及胎癇中風蠍梢炙黃辰砂各二錢半牛黃一錢另研赤足蜈蚣一條酒浸炙黃天南星薑汁浸泡冰片麝香各二分半蛇含石火煅醋淬半兩上為末米糊丸如雞頭大金箔為衣量兒大小一歲半粒薄荷湯磨化服不拘時異功散治小兒吐瀉思食溫中和氣凡小兒虛冷病先與數服以正其氣一名正氣散一方加薯蕷等分又名六神散人參白朮茯苓甘草炙白扁豆薯蕷各等分上為末每服二錢用水六分生薑二片紅棗一枚煎至四分量兒大小加減不拘時服如虛冷泄瀉加附子風證加天麻痢加罌粟殼錢氏白朮散治小兒脾胃虛弱昏困多睡乳食減少調中