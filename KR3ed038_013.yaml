時以粥飲下日再服一方以醋煮膠令消衆手捻丸又療産婦下痢不止者服之甚驗忌生冷黏膩加減當歸地榆散治冷熱不調氣毒惡毒濕熱腸垢毒痢休息膏痢腥穢乾嘔不食肌熱小便澀當歸焙一兩地榆黃連揀淨芍藥甘草炒各半兩御米殼蜜炒二兩上㕮咀每服三錢水一盞半煎至七分去滓食前溫服日進二服氣毒痢加黃連當歸一倍和中散治冷熱痢腹痛裡急附子炮水滓去皮臍為末一兩黃連去須為末一兩乳香研一分上如患冷熱痢取黃連附子各半錢乳香一字以陳米飲調下未止再服以青皮湯調下如患赤痢附子末半錢黃連末一錢乳香一字如患白痢黃連半錢附子末一錢乳香一字米飲調下未止以黑豆七粒煎湯止之楊子建萬全護命方今有人患痢其脈微小再再尋之又沉而澀此之一候若下白痢其勢雖重庶幾可治若是下血切忌發熱通身發熱者死熱見七日死以上所陳雖未足以達痢之淵源亦足以明其粗迹議者謂如子所言自甲子至於癸亥每六十年中未嘗有一年不生痢疾今世人所患痢疾於數年中間忽止有一年其故何也答曰六十年中未嘗有一年無木土相攻未嘗無土火相郁未嘗無水火相犯但五運之政譬如擁衡一年間五行氣數更相承製得其平等則其疾自然不作忽若一氣太過一臟有餘痢疾之生應不旋踵豫故備陳其粗以開後學之未悟庶幾診療之間無差誤之過者矣但毒痢傷人不一惟水邪犯心為重世人初患痢時先發寒熱投藥治之其熱不退發熱太甚食則嘔逆下痢不止心熱如火只要入涼處只思吃冷水忽思狂走渾身肌肉疼痛著手不得此候十難治其三四也治疫毒痢方須是仔細首尾讀此方論令分明識病根源然後吃藥但毒痢初得時先發寒熱忽頭痛或壯熱忽轉數行便下赤痢忽赤白相雜忽止下白痢忽先下白痢後變成赤痢忽先下赤痢後卻變成白痢並宜吃此方但初下痢時先發寒熱頭痛即是寒邪犯心寒氣犯心水火相戰故初病時先發寒熱水火相犯血變於中所以多下赤痢如紫草水如莧菜水無色澤者寒邪犯心之重也先發寒熱而所下之痢止白色者寒邪犯心之末動也先下白痢而後有赤痢之變者寒邪犯心其勢漸加也先下赤痢而後變成白痢者寒邪犯心其勢漸減也赤白相等者水火相犯其氣相等寒溫之氣相搏也忽有赤多而白少忽有赤少而白多此寒邪之熱有多少毒痢之病有重輕以白多為輕赤多為重治之之法先奪其寒則其所下之藥一也以太歲分之則丙子丙午甲子甲午庚子庚午年丙寅丙申年甲寅甲申年庚寅庚申並辰戊之年運遇丙甲及庚運所臨其害尤甚及丑未之年宜有此候又兼無問太歲蓋天地變化其候多端難可窮盡今此但世人亦不必撞定太歲但看一年中春夏之內多有寒肅之化陽光少見忽寒熱二氣更相交爭忽於夏月多寒濕之化寒邪犯心所受之痢先發寒熱忽頭痛忽先轉數行後有赤痢忽赤白相雜忽止下痢並宜吃此通神散吃後取壯熱便退若兩三盞後壯熱不退更不吃此方自別有方論在下麻黃去根節官桂去粗皮各三分大芎白朮各一兩藁本獨活桔梗防風芍藥白芷各半兩牡丹皮去心甘草各一分細辛八銖牽牛四銖上為細末每服二錢非時熟湯調下和滓熱吃若吃兩三盞後寒熱不退更不請吃自別有方論在下若吃此藥後寒熱已退赤痢已消減便修合第二方第三方藥吃取安效若寒熱已退赤痢未消減更服兩三盞然不可多吃一日只兩盞後赤痢消減忽變成白痢旋次修合第二方吃候出後度數減少便修合第三方吃取平安但六甲之年六庚之歲春夏之內時氣多寒人得痢疾此藥通神若是六甲之年丑未之歲濕化偏多人得痢疾先發寒熱即於方內添草豆蔻一兩同修合也又不問太歲但一年於春夏之內多寒人有痢疾先發寒熱並宜吃此方治毒痢初得時先發寒熱吃前方寒熱已退赤痢已消減宜進此還真散若吃前方藥寒熱未退赤痢未消減更不宜進此藥但天地變化其候非常痢疾證候多端此不得不盡其仔細訶子五個用麵裹火炮熟不要生亦不要焦去面不用就熱咬破訶子破去核不用只用皮焙乾上搗羅為細末每服二錢匕以米湯一盞半同藥煉取一盞空心和滓吃若吐出一兩口涎更佳如此吃經數盞大腑漸安出後減少修合第三方藥吃以牢固大腸若吃前方藥壯熱未退血痢未減不可進此藥治疫毒痢吃前面兩方藥病勢已減所下之痢止余些小忽下清糞或如鴨糞忽如茶湯或如濁油忽只餘些小紅色宜吃此方以牢固大腸還復真氣舶上硫黃丸舶上硫黃二兩去砂石細研為末薏苡仁二兩炒焦杵為末上二末相和令勻滴熱水和為丸如梧桐子大每服五十丸空心以米湯下治下赤痢身體並無憎寒壯熱此名肝心雙澼宜服此方黃連一兩蜜浸一宿炙令香熟木香三銖上為細末每服二錢匕食後濃煎陳皮湯調下健脾丸療脾滑胃弱泄下不禁飲食不消腸鳴㽱痛附子炮川椒炒出汗各一兩桂心赤石脂黃連石斛人參茯苓乾薑炮大麥蘖當歸陳曲各一兩上為細末煉蜜和丸如梧桐子大每服十丸酒下稍稍加之日三服忌豬肉冷水生蔥醋仍有鍾乳粉三兩研十寶湯治冷痢如魚腦者三服見效甚疾黃耆四兩熟地黃酒浸白茯苓人參當歸酒浸白朮半夏白芍藥五味子官桂各一兩甘草半兩上為粗末每服二錢水一盞生薑三片烏梅一個煎至七分食前溫服外灸膏治一切虛寒下痢赤白或時腹痛腸滑不禁心腹冷極皆可用木香附子炮蛇床子吳茱萸胡椒川烏各等分上為細末每藥末三錢用面二錢用生薑自然汁調作糊貼臍中上下以衣物蓋定尉斗盛火尉之痢止為度五神散治大腸積冷下痢不止裡急後重腹痛附子炮裂去皮臍烏梅去核各半兩乾薑炮訶黎勒煨去核延胡索各一兩上為粗散和白麵裹煨慢火內燒令面熟為度去面焙乾搗羅為細末每服一錢空心食前用米飲調下倉米湯治小腹冷氣積聚結成冷痢日夜三四十行食粳米半升用水淘洗乾淨香豉三升以水一斗煎取五升令清薤白一握去青細切羊脂一斤熬上先以羊脂煎薤白令黃並米納豉汁中煎取四升平旦空腹溫服一升如人行十里久更進一升得快痢止冷痢不止更服如前利後進粳米豉粥若復作更服一劑永瘥豬肝丸治冷勞氣痢久不瘥獖豬肝一具去筋膜切作柳葉片以醋一升煎醋令盡大蒜煮令熟去殼烏梅肉桂心黃連去須炒厚朴去粗皮薑汁炒紫各二兩乾薑炮陳皮湯浸去白焙訶黎勒煨去核當歸切焙各一兩上除豬肝蒜外搗羅為末將豬肝與蒜細研如麵糊入藥末和勻搗數百下丸如梧桐子大每服三十丸空心用熱麵湯下日午再服豬胰酒療冷痢久不瘥方云此是脾氣不足暴冷入脾故舌上生瘡飲食無味縱吃下還吐小腹雷鳴時時心悶皮乾粟起膝脛痠疼兩耳絶聲四肢沉重日漸瘦劣或成氣塊及婦人血氣不通逆飯憂煩行常無力四肢不舉丈夫痃癖兩肋虛脹變為水氣服之皆效驗此法出於傳尸方上用豬胰一具細切青蒿葉一合相和微炒以無灰酒一大升火溫之乘熱納豬胰和蒿葉共一處再入桂心末一兩於酒中每日平旦空腹取一小盞服之午時夜間各再一服甚驗忌熱面油膩等物黃耆散治熱痢下赤黃膿腹疼心煩黃耆銼龍骨當歸各三分生乾地黃二分黃連去須微炒一兩黃柏黃芩犀角屑地榆各半兩上為細末每服二錢不拘時用粥飲調下犀角散治熱痢下赤黃膿血腹痛心煩困悶犀角屑黃連去須微炒地榆黃耆各一兩當歸半兩炒木香三分上為散每服二錢以水一盞煎至六分去滓不拘時溫服黃連丸一名羚羊角丸治一切熱痢及休息痢日夜頻並兼治下血黑如雞肝色黃連去須二兩半羚羊角鎊一兩半黃柏去粗皮一兩半赤茯苓去黑皮半兩上為細末煉蜜和丸如梧桐子大每服二十丸薑蜜湯下暑月下痢用之尤驗一方用白茯苓臘茶送下生地黃湯治熱痢不止生地黃半兩地榆三分甘草炙一分上㕮咀如麻豆大用水二盞煎至一盞去滓分溫二服空心日晚再服鬱金散治一切熱毒痢下血不止川鬱金槐花炒各半兩甘草炙一分上為細末每服一二錢食前用豆豉湯調下如聖湯治下痢赤白甚重者人參當歸洗各三寸滴乳香一塊如黑豆大甘草二寸炙大北棗烏梅各七個罌粟殼一個去穰蜜炒白豆蔻縮砂仁大丁香各二十一個生薑三塊大者濕紙裹煨熟上為末分三服水一盞半煎七分去滓服不用粟殼亦可艾葉丸治赤白痢血多痛不可忍艾葉炒黃連去須炒木香一半生一半炒肉豆蔻各三分地榆一兩阿膠炙燥當歸切焙各半兩上為細末煉蜜和丸如梧桐子大每服三十丸米飲下治赤白痢歌曰三片生薑三個棗一個烏梅三寸草更加罌粟與陳皮赤白瀉痢一齊掃祕傳斗門散治八種毒痢臟腑撮痛膿血赤白或下瘀血或成片子或有五色相雜日夜頻並兼治噤口惡痢裡急後重久渴不止全不進食他藥不能治者立見神效黑豆炒去皮十二兩乾薑炮四兩罌粟殼蜜炒半斤地榆炒甘草炙各六兩白芍藥三兩上㕮咀每服三錢水一盞煎至七分溫服金鳳散治男子婦人赤白痢疾鳳眼草粟殼去頂蒂各三錢紅棗三個燒存性母黑豆四十九粒燒令煙盡上為粗末加蜜一匙水二盞煎至一盞去滓空心溫服服此藥後仰臥睡忌冷水安和飲子治赤白痢不問老幼並治之罌粟殼木香各二錢半甘草炙地榆各一錢上為細末每服二錢米飲湯調下變通丸治赤白痢臍腹痛日夜無度膿血相雜裡急後重及治腸風下血吳茱萸黃連等分一方去須半寸截同炒熟分為兩處上各揀淨其用酒浸透卻擇出各自焙乾各自碾為細末各自粟米飯丸如梧桐子大每服三十丸如赤白痢相雜各十五丸用甘草乾薑湯下紅痢甘草湯下黃連丸三十丸白痢乾薑湯下茱萸丸三十丸一方為末米飲調下加當歸此方浙西河山純老以傳蘇韜光云數十年救人無數人多求方不敢輕授恐以其藥品之微而忽之韜光每以救人甚效洪氏方亦有修制湯使少異薤白散治赤白痢上用薤白一握切搗如泥橘皮一兩好乳一升先以少乳煎薤熟後下余乳及橘皮末勻攪煎十餘沸空腹分兩服之如啜茶不止更作之治下痢赤白上用老酸石榴皮微炙為末以粟米飯為丸如梧桐子大空心服滑則加附子赤石脂一倍神交散治赤白痢新舊疾上用鹽霜梅三個用黃泥裹於慢火內煨乾研為細末用米湯調下御愛丸治營衛氣虛風邪襲於臟腑之間值腸胃虛弱糟粕不聚便利赤白或作膿血臍腹疼痛心胸痞滿裡急後重煩滿渴逆脅肋脹悶腹內虛鳴四肢倦乏不進飲食宜服御米殼四兩以蜜炒黃色干蒸餅切如骰子大以蜜炒焦色上為細末煉蜜為丸如雞子大每服一粒用水一盞煎至化為度不拘時熱服鯽魚方治赤白痢及治野雞病上用鯽魚作鱠食之止暴下痢和蒜食之有少熱和薑醬食之有少冷溫二服玉抱肚治一切虛寒下痢赤白或時腹痛腸滑不禁心腹冷極者可用針砂四兩炒白礬半兩官桂一兩上為末和勻作一包冷水調攤皮紙上貼臍上下以帛系之如覺大熱即以衣襯之藥干再以水濕令潤其熱如初可用三四次軟紅丸消虛積治冷熱不調下痢赤白膿血相雜乳香別研一皂角子大硇砂別研一皂角子大蠍二枚去毒續隨子四十九枚去皮粉霜別研半兩膩粉別研半兩黃丹別研半兩硃砂一錢別研留一半為衣巴豆二十個去皮不去油研成膏黃蠟半兩上末共和勻用磁器內熔蠟成汁入麻油半茶腳許後入藥和丸如緑豆大每服二丸乳香湯下小兒丸如黃米大每服一丸乳香湯下食前服千金散治赤白痢日夜無度服之立瘥人參五十文紫蘇連梗糯米各三文罌粟殼二十文蜜炙陳皮良薑燈心甘草黑豆緑豆各五文上二豆捶破水一大碗同諸藥煎一盞半入熟蜜少許去滓通口服不拘時候噤口如腸潰者只兩服傳於臨汀學正賴簡敬賴得於趙守兼善兼得之餘丞相叵言治赤白痢上用訶黎勒三枚上好者兩枚炮取皮一枚生取皮同末之以沸漿水一兩合服之淡水亦得若水痢加甘草末一錢匕若微有膿血加二錢匕若血多加三錢匕昔劉禹錫傳言方云豫曾苦赤白痢下諸藥服遍久不瘥轉為白膿令狐將軍傳此方服之效豆蔻丸治白滯痢腹臟撮痛肉豆蔻麵裹煨熟草豆蔻麵裹煨熟枇杷葉去毛炙縮砂仁母丁香各一兩木香沉香各半兩地榆二兩墨燒紅為末半兩上為細末燒粟米飯為丸如櫻桃大每服二丸食前用米飲化下萬補丸治脾胃久虛大腸積冷下痢白膿或腸滑不固久服諸藥不效服之神驗併産前産後皆可服立效人參當歸切焙草豆蔻炮去皮嫩茄茸酥炙乳香各一兩半白朮陽起石火煅細研肉桂去皮縮砂仁赤石脂鍾乳粉肉豆蔻麵裹煨熱沉香白薑炮蓽茇牛乳半盞用火煎干焙茴香炒丁香厚朴去皮薑製白茯苓各一兩地榆大麥蘖炒神麯炒各半兩大附子七錢炮去皮臍肉蓯蓉二兩淨洗用酒浸一宿切焙罌粟殼和米者二十枚炙上為細末研勻用木瓜十五個去穰蒸爛同藥末搗和所得丸如梧桐子大晾乾每服三十丸食前用米飲下頻並者加至五七十丸伏龍肝丸一名艾葉丸治赤痢腹痛四肢羸困伏龍肝艾葉炒木香地榆阿膠炒燥當歸切焙黃連去須炒赤芍藥黃芩去黑心各一兩上為細末煉蜜為丸如梧桐子大每服三十丸不拘時用溫粥飲下六神湯治赤痢腹痛或下純血黃連去須炒車前子各二兩地榆山梔子仁甘草炙各半兩陳皮湯浸去白焙一兩上㕮咀每服五錢以漿水一盞半煎八分去滓空心服黃柏丸治赤痢下黃水或黃赤膿四肢煩皮膚冷者黃柏去粗皮黃連去須炒各二兩熟艾半兩黃芩去黑心一兩一分上為細末用白蜜三兩煉熟入蠟一兩溶化入前藥末和搗丸如梧桐子大每服三十丸空心用米飲下日晚再服一方作湯煎服治赤白下痢久不止上用黃連為末用雞子清為丸如梧桐子大每服三十丸食前用米飲送下即瘥蒲黃散治血痢蒲黃三合乾地黃桑耳甘草芒硝茯苓人參柏葉阿膠艾葉生薑各二兩禹餘糧黃連各一兩赤石脂五分上㕮咀以水一斗煮取四升分作五服龍骨丸治下血痢腹痛龍骨龍膽草羚羊角當歸附子乾薑黃連各三十銖赤石脂礬石各一兩半犀角甘草熟艾各十八銖上為末煉蜜和丸如小豆大先食前米飲下十五丸茜根散治血痢心神煩熱腹中痛不納飲食茜根地榆生乾地黃當歸微炒犀角屑黃芩各一兩梔子仁半兩黃連二兩去須微炒上㕮咀每服四錢以水一中盞入豉五十粒薤白七寸煎至六分去滓不拘時溫服六妙湯治下血或痢不止烏梅十個捶碎甘草二寸生用丁香五十個桂心二寸去粗皮罌粟殼十個去穰捶碎縮砂仁四錢半捶碎上同拌勻作一服以水一盞半於銀石器內煎至七分忌銅鐵器去滓溫服滓用水二盞再煎至小半盞服治男子病膿血惡痢痛不可忍積毒熱昔有人忽見水浸甜瓜心酷喜之連皮食數枚膿血皆已人言下痢無正形是何言也人只知痢是虛冷溫之燥之洗之截之此外無術矣豈知風暑火濕燥寒六者皆為痢此水甜瓜所以效也椿皮丸治下痢清血腹中刺痛上用椿根白皮不以多少晾乾為細末醋煮麵糊為丸如梧桐子大每服三四十丸空心用米湯送下柏連散治男子婦人小兒大腹下黑血茶腳色或膿血如靛色所謂蟲痢者治之殊效一方又能殺五臟蟲上用側柏葉焙乾為末黃連亦為末二味同煎為汁服之或用熱水調二錢服亦可聚珍丸治血痢酒痢尤妙川百藥煎半兩薄荷煎兩貼陳槐花半兩炒感應丸一貼麝香少許上件為末拌勻煉蜜為丸如梧桐子大每服二十丸食前服男子用龍牙草煎湯下女人用生地黃煎湯下治腸風血痢上用鯽魚蘸白礬燒灰為細末每服二錢食前米湯調下赤石脂湯治膿血痢裡急後重日夜頻並赤石脂白芷天雄炮裂去皮臍當歸切焙龍骨各一兩半肉豆蔻去殼黃連去須厚朴去粗皮薑汁炙地榆白朮官桂去粗皮訶黎勒煨取皮木香各一兩吳茱萸湯洗焙炒黃芩去黑心各半兩上銼如麻豆大每服五錢水一盞半生薑五片煎至八分去滓食前溫服豆蔻八味散治腸澼痢候或稀或稠便但似膿每便極滑痢無常期肉豆蔻麵裹煨丁香各三兩細辛附子炮乾薑各四兩黃耆人參各五兩赤石脂六兩上搗篩為散以飲下之初服一方寸匕日再稍稍加至二三匕忌生蔥豬肉冷水解毒金華散治下痢膿血熱毒黃連黃柏各一兩黃芩赤茯苓赤芍藥白朮各半兩上㕮咀每服四錢水一盞煎七分去滓溫服無時如腹痛加梔子二枚同煎當歸四聖散治一切下痢膿血頻並臍腹絞痛不可忍當歸切焙芍藥各二兩御米殼蜜炙四兩甘草炒一兩茯苓半兩黃耆一兩二錢如無地榆同用上㕮咀每服三錢水一盞半煎至六分去滓食前溫服借氣散一名神聖香薑散治膿血痢久患脾泄瀉黃連去須生薑並細銼各一兩上二味同入銀石器內炒焦赤色去生薑取黃連為細末每服二錢匕食前陳米飲調下一方用臘茶清下甚者不過二服瘥魚鮓湯治痢下五色膿血或如爛魚腸並無大便腸中攪痛不可忍呻吟叫呼聲聞於外粉霜研輕粉硃砂研硇砂去砂石研白丁香各一錢乳香半錢巴豆二十粒去殼不去油上為末蒸棗肉為丸嬰兒三丸如粟米大二三歲如麻粒大四五歲每服三四丸並旋丸煎鮓湯吞下仍間服調胃藥此證緣久積而成故小兒多有之斂腸丸治下痢膿血木香一錢地榆二錢酸石榴皮二錢罌粟殼一兩半去蒂萼蜜炙上件為細末煉蜜為丸如彈子大每服一粒陳米泔一盞煎六分食前服麴櫱丸治下痢數年不止消穀下氣補虛羸官桂去粗皮附子炮去皮臍黃連去須當歸陳曲炒黃乾薑炮麥蘖炒各一兩吳茱萸湯洗焙炒烏梅肉蜀椒去目併合口者炒出汗各一兩半上為細末煉蜜和丸如梧桐子大每服二十丸加至四十丸食前用米飲送下一方用粟米糊為丸御米湯治久患痢疾或赤或白臍腹㽱痛裡急後重發歇無時日夜無度及下血不已全不飲食罌粟殼蜜炙白茯苓去皮甘草炙各五兩厚朴去皮薑製十兩人參去蘆乾薑炒各二兩半上㕮咀每服三錢水一盞半生薑三片大淮棗三枚烏梅一個煎至一盞去滓食前通口服如年老七十八歲每服二大錢小兒每服一錢半依前法煎更量兒歲加減腹痛加木香赤多加黑豆十五粒雲母散治久痢經年不瘥雲母粉白茯苓去黑皮附子炮製去皮臍各三分赤石脂龍骨各半兩上為細末每服二錢食前用溫酒或米飲調下亦治血痢金星鱔散治久痢金星鱔醋炙白礬鉛丹各半兩上為細末每服二錢食前用米飲調下蚺蛇膽方治濕痢久不斷體瘦多昏坐則閉目食不下上用蚺蛇膽大如豆二枚煮通草汁研膽以意多少飲之塗五心並下部蕪荑丸治久痢不瘥有蟲並下部脫肛蕪荑炒黃連去須各二兩蚺蛇膽半兩上為細末煉蜜和丸如梧桐子大每服三十丸食前用杏仁湯下日再服香粟散治久新痢疾罌粟殼蜜炒二兩木香地榆陳皮乾薑炮甘草炙以上各半兩上件為粗末每服三錢水一盞半棗一枚煎至一盞去滓食前溫服五奇湯治久患痢疾不問赤白並皆治之訶子二枚一枚生用一枚用麵裹煨香熟去核面不用肉豆蔻二枚一枚生用一枚麵裹煨香熟去面不用草豆蔻二枚一枚生用一枚麵裹煨去面不用木香一塊如大棗大甘草一寸如指面火炮令赤色上件為細末每服二錢不拘時用米飲調下烏梅湯治久痢不瘥成腸垢上用烏梅二十個捶碎用水一升煎四合去滓空心服未愈日晚再煎服麥蘖丸治休息痢不能飲食及羸瘦大麥蘖炒附子炮裂去皮臍陳曲炒官桂去皮烏梅肉炒白茯苓去皮人參各一兩上為細末煉蜜和丸如梧桐子大每服三十丸煮棗肉飲下不拘時服一方七月七日曲治休息痢羸瘦黃連半兩去須為末定粉半兩研棗二十枚去核上舂棗如泥鋪於紙上安二味藥裹之燒令通赤取出候冷細研為末每服使好精羊肉半斤切作片子用散藥三錢摻藥在肉上使濕紙裹燒熟放冷食之不過三兩服效縛虎丸治休息痢經一二年不瘥羸瘦衰弱兼治腰痛脾疼等疾砒成塊好者黃蠟各半兩上將黃蠟熔開以柳條七個逐個攪頭焦即換俟用足取起旋丸如梧桐子大每服一丸治痢冷水下脾疼亦然治腰疼冷酒下食前服小兒丸如粟米大服一丸湯使同治休息痢羸瘦宜服杏仁一兩湯浸去皮尖及雙仁麩炒黃色獖豬肝一具去筋膜切作片上件將肝用水洗去血切作片於淨鐺內一重肝一重杏仁入盡用童子小便二升入鐺中以物蓋慢火煎令小便盡即熟放冷任意食之又方一名羊肝散證治同前縮砂一兩去皮肉豆蔻半兩去殼上為細末用羊肝半具細切拌藥以濕紙三五重裹上更以麵裹用慢火燒令熱去面並紙入軟飯搗和丸如梧桐子大每服三十丸食前以粥飲下栝蔞根湯治下痢冷熱相沖氣不和順本因下虛津液耗少口乾咽燥常思飲水毒氣更增煩躁轉甚宜服此藥救之栝蔞根白茯苓甘草炙各半兩麥門冬去心一分上㕮咀每服五錢水一盞半棗二枚擘破煎至七分去滓不拘時服陳米湯治吐痢後大渴飲水不止上用陳倉米二合水淘淨用水二盞煎至一盞去滓空心溫服晚食前再煎服治痢後渴上用糯米二合以水一盞半同煮研絞取汁空心頓服之澤漆湯治痢後腫滿氣急喘嗽小便如血澤漆葉微炒五兩桑根白皮炙黃郁李仁湯浸去皮尖炒熟各三兩陳皮去白白朮炒各一兩杏仁湯浸去皮尖雙仁炒一兩人參一兩半上㕮咀每服五錢水二盞生薑三片煎取八分去滓溫服候半時辰再服取下黃水數升或小便利為度茯苓湯治痢後遍身浮腫赤茯苓去黑皮白朮微炒各一兩防己桑根白皮炙黃黃芩射干澤瀉各三兩澤漆葉微炒一兩上㕮咀每服五錢匕先以水三盞煮大豆一合取二盞去滓綢納藥煎取一盞分為二服未瘥頻服兩料消痞丸治痢後肚腹滿悶陳皮去白青皮去白各一兩木香二錢蒼朮米泔浸焙炒四兩上為末醋糊為丸如梧桐子大每服二十丸空心溫酒送下小兒服三五七丸米湯下豬肝丸治痢後脾胃虛弱不思飲食四肢乏力豬肝一大葉以醋煮令爛研如泥烏梅微炒乾薑炮草豆蔻去皮當歸微炒肉豆蔻去殼厚朴去粗皮生薑汁塗炙訶黎勒煨用皮蓽茇各一兩桂心半兩甘草一分炙微赤上為末用豬肝和搗二三百杵丸如梧桐子大每服二十丸不拘時以粥飲下治噤口痢甚妙一名石蓮散上用石蓮肉不以多少剝去殼皮將肉並心碾為細末每服二錢陳米飲調下便覺思食此疾蓋是毒氣上衝華蓋心氣不通所以不食服此藥後心氣通利當頓下而愈未愈自服痢藥一方仍以日照東方壁土炒真橘皮為末薑棗略煎佐之淡寮云痢疾不納飲食者俗謂之噤口今人多以四柱散理中湯參苓散加豆蔻木香或吃震靈丹等藥調之恐非其治當以脈證辨之如脾胃脈不弱問而知其頭痛心煩手足溫熱未嘗多服涼藥者此乃毒氣上衝心肺所以嘔而不食宜用敗毒散每服四錢重入陳倉米一百粒薑三片棗一枚水一盞半同煎八分溫服若其脈微弱或心腹虛膨手足厥冷初病則不嘔因服罌粟殼烏梅澀劑或服涼劑太過以致聞食先嘔此乃脾胃虛弱一方用乾山藥銼如小豆大一半銀銚內炒一半生用同為細末飯飲調下陳慶長知縣云頃守官南康其子年十許歲患噤口痢水漿不入數日惟能進藥同官有方書載一治法試用之一服而痢稍疏三服遂索粥飲頓食半盞許自是痢止而安此乃用山藥一味倉廩湯治噤口痢有熱乃毒氣衝心食即吐人參茯苓甘草炙前胡川芎羌活獨活桔梗柴胡枳殼陳倉米各等分上㕮咀每服五錢水一盞半生薑三片煎至七分去滓不拘時熱服參苓白朮散治胃虛口噤人參茯苓白朮白扁豆薑汁浸炒去皮山藥蓮肉砂仁薏苡仁炒桔梗甘草炙各二兩上為細末石菖蒲煎湯下宜食生韭菜通神丸治膿血雜痢後重疼痛日久不瘥沒藥研五靈脂去砂石研乳香研各一錢巴豆霜研半錢上同研勻滴水為丸如黃米大每服七丸食前煎生木瓜湯下小兒服三丸隨歲加減芍藥黃芩湯治泄痢腹痛或後重身熱久不愈脈洪疾者及下痢膿血稠黏芍藥黃芩各一兩甘草半兩炙上㕮咀每服五錢水一盞半煎至一盞去滓溫服無時如痛加桂少許煎服三奇散治痢後裡急後重枳殼黃耆防風上等分為末每服二錢蜜湯調下米飲亦得治裡急後重好蛤粉穿山甲炒上等分為末每服一錢空心用好酒調服大黃湯治泄痢久不愈膿血相雜稠黏裡急後重日夜無度久不愈者上用大黃一兩銼細以好酒二大盞浸半日許煎至一盞半去大黃不用將酒分二服頓服之未利再服以利為度後服芍藥湯和之痢止再服黃芩芍藥湯以撤其毒也白朮黃耆湯服前藥痢疾雖除更宜服此和之白朮一兩黃耆七錢甘草三錢上㕮咀分作三服用水煎服一方無黃耆用黃芩半兩烏梅湯療熱上𧈟方烏梅四十枚熬梔子四十枚黃連阿膠炙黃柏各二兩上㕮咀每服一兩水二盞煎至一盞溫服治丈夫婦人小兒久痢成疳百方不瘥黃連去須麝香研丁香各一分上為細末每以一錢匕用竹筒吹入下部小兒量度減之不過三四上瘥一方食前以粥飲調下二錢療五疳蒸下痢青黛丁香黃連各等分上等細末用泔靛和丸如梧桐子大口中有瘡含之若其下部有瘡以綿裹納下部日服六十丸食前米飲下治疳𧈟蟲蝕下唇生瘡多睡面皯時腫下部癢痛不止雞子一枚取黃好漆一合上相和令勻空腹仰頭頓服令盡當吐出蟲即愈導氣湯治下痢膿血日夜無度裡急後重木香檳榔黃連各六分大黃黃芩各一錢半枳殼一錢麩炒芍藥六錢當歸三錢上㕮咀作二服用水二盞煎一盞去滓食前溫服白朮聖散子治一切瀉痢久不瘥並婦人産後痢當歸肉豆蔻砂仁石榴皮訶子肉乾薑炮陳皮甘草白朮芍藥上各等分嚼咀每服五錢水二盞入乳香一豆許煎至一盞去滓食前溫服立效丸冶痢木香當歸酒浸橡斗子各一兩青蒿子燒存性四兩烏梅焙乾黃連酒炒五倍子各二兩枳殼去穰一兩半蘿蔔汁浸炒上為細末用神麯糊為丸如梧桐子大每服一百丸空心用米湯送下日二三服先須服丁香脾積丸次服立效丸木香黃連湯治下痢膿血裡急後重神效木香黃連川木通川黃柏枳殼麩炒陳皮各四錢半大黃三錢上㕮咀分作二貼用水二盞煎至一盞去滓食前溫服玄青丸治下痢勢惡窘痛膿血頻並或久不愈宜下之黃連黃柏大黃甘遂大戟芫花醋炒各五錢輕粉二錢青黛一兩牽牛取頭末二兩上為細末滴水為丸如豆大初服十丸每加十丸空心午前臨臥三服以利為度
