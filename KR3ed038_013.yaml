body:
  text: 卷之十三痢門附論夫痢者古云滯下今為痢疾脈經云腸澼下膿血脈沉小留連者生數實且大有熱者死又腸澼筋攣其脈小細安靜者生浮大緊者死嚴氏云下痢之脈微小者生洪者難治腸澼下膿血者脈宜滑大若弦急者死仲景分治之法下痢脈沉弦者下重脈大者為未止脈微弱數者為欲自止雖發熱不死下痢手足厥冷無脈者灸之不溫若脈不至反微喘者死下痢有微熱而渴脈弱者令自愈脈數有微熱汗出令自愈設脈緊為未解下痢脈數而渴者令自愈設不差必清膿血以有熱故也病機要云後重則宜下腹痛則宜和身重則除濕脈弦則去風膿血稠黏以重劑竭之身冷自汗以藥溫之風邪內縮宜汗之鶩溏為痢當溫之又云在外發之在裡下之在上湧之在下竭之身表熱內陳之小便澀分利之又曰盛者和之去者送之至者止之蘭室祕藏云假令傷寒飲食脹滿而傳飧泄者宜溫熱之劑以消導之傷濕熱之物而成膿血者宜苦寒之劑以內疏之風邪下陷者升舉之濕氣內勝者分利之裡急者下之後重者調之腹痛者和之洞泄腸鳴無力不及拈衣其脈弦細而弱者溫之收之膿血稠黏至圊而不能便其脈洪大而有力者寒之下之機要又云太陰經受濕而為水泄虛滑身重微滿不知穀味久則防變而為膿血脾經傳腎謂之賊邪故難愈者若先痢而後滑謂之微邪故易痊此皆脾土受濕之所為也陳無擇云滯下之證內經所載血溢血泄血便注下古方則有清膿血今為痢疾其實一也多由脾胃不和飲食過度停積於腸胃不能克化又為風寒暑濕之氣所幹故為此疾傷熱則赤傷冷則白傷風則下清血傷濕則下如豆汁冷熱交併赤白兼下治法當通利之藥疏滌臟腑嚴氏以巴豆等劑推其積熱後辨以冷熱風濕之證用藥調治熱赤者清之冷白者溫之傷風而下清血者則祛逐之傷濕而下豆汁者分利之冷熱相併溫涼以調之仍須先調胃氣切不可驟用罌粟訶子之藥止之澀之使停滯不泄多致危殆陳無擇又云古方風停膚腠下瘀血或下鮮血濕毒下如豆汁皆外因之所致古方有五泄因臟氣鬱結隨其所發使利膿血作青黃赤白黑一一不同即內因也又飲食油膩熱物酒醴醓醢縱情恣欲房室致傷精血腸胃黏溢久積冷熱遂成毒痢皆不內外因治之先推其歲運以平其外察其鬱結以調其內審其所傷以治不內外條然明白不致妄投也此分三因而治用藥當以三因內求之大全良方云有一方一家之內上下傳染長幼相似是疫毒痢也治法雖當察運氣之相勝亦不可狎泥當先察其虛實冷熱首用敗毒散倍加人參甘草陳皮隨證用之陳無擇又云飲食冷熱酒醴醓醢腸胃黏溢久積冷熱遂成毒痢嚴氏云或有飲冷酒寒物房欲勞傷精血而成久痢則宜化毒以保衛之病機云裡急後重脈大而洪實為里熱甚而閉是有物結墜也若脈大甚不宜下雖裡急後重而脈沉細弱者謂寒在內而氣散可溫養自愈裡急後重閉者大腸經氣不宣通也宜加檳榔木香宣通其氣原病式云下迫後重裡急窘迫急痛也火性急速而能燥物故也機要云腹痛者和之如發熱惡寒腹不痛以黃芩多用腹痛甚者加當歸倍芍藥百一選方云禁口痢是毒氣上衝心肺所致用石蓮肉以通心氣丹溪云吃病氣自下衝上屬火之象古方悉以胃弱言之殊不知胃弱者陰弱也虛之甚也滯下之義多見此證乃久下而陰虛也原病式曰或言下痢白為寒者誤也若果為寒則不能消穀何由反化為膿也所謂下痢谷反為膿血如世之穀肉果菜濕熱甚則自化腐爛潰發化為汙水也其熱為赤熱屬心火故也其濕為黃濕屬脾土也燥郁為白屬肺金也經曰諸氣憤郁皆屬於肺謂燥金之化也然諸瀉痢皆兼於濕今反言氣燥者謂濕熱甚於腸胃之內而腸胃怫鬱結而又濕至於否以致氣液不得宣通因以成腸胃之燥使煩渴不止也假如下痢赤白俗言寒熱相兼其説尤誤豈知水火陰陽寒熱者尤權衡也一高則必一下一盛則必一衰豈能寒熱俱甚於腸胃而同為痢也如熱瘡瘍而出白膿者豈可以白為寒歟其在皮膚之分屬金故色白也次在血脈之分屬心火故為血也其色紅在肌肉屬脾土故作黃膿在筋部屬肝木故其膿色帶蒼深至骨屬腎水故紫黑血出也各隨五臟之部面見五色是其標也本則一出於熱但分淺深而已大法下迫窘痛後重裡急小便赤澀皆屬燥火而下痢白者必多有之然為熱明矣又云白痢既為熱病何故服辛熱之藥亦有愈者耶蓋辛熱之藥能開發腸胃鬱結使氣液宣通流濕潤燥氣和而已蓋病微者可愈甚者鬱結不開其病轉加而死矣凡治熱甚吐瀉亦然夫治諸痢者莫若以辛苦寒藥治之或微加辛熱佐之則可辛能發散開通鬱結苦能燥濕寒能勝熱使氣宣平而已如錢氏香連丸之類是也故治諸痢者黃連黃柏為多以其至苦大寒正主濕熱之病乃若世傳辛熱金石毒藥治諸吐瀉下痢或有愈以其善開鬱結故也然雖亦可驗者或不中效反更加害丹溪曰或問河間之言滯下似無挾寒者乎豫曰泄痢之病水穀或化或不化虛實何如惟覺困倦若滯下則不然或膿或血或膿血相雜或腸垢或無糟粕或糟粕相混有痛不痛大痛之異然皆裡急後重逼迫腦人似乎皆熱實證也原病式云所論痢之赤白皆云有熱熱在氣分為白熱在血分為赤赤白相雜者氣與血皆受病也且滯下之證古人多與泄瀉同論至三因方始能另立條目蓋實有不同夫病有從外感而得者須分六氣之異外既受傷腸胃鬱結遂成赤白等證當隨其氣血虛實以調之有因臟氣發動干犯腸胃而得者須察其何臟相乘以平治之又有因飲食失節而得者則又審其何物所傷以消克之世之感此疾者其因誠不越乎是三者但其受病之後腸胃怫鬱膿血稠黏裡急後重諸方雖有寒熱虛實之論劉河間則以為熱內經亦以熱多而寒少丹溪以為挾虛寒之證且前人立論各有立法見證立方各有受病之源隨證用藥後之學者宜深審之可不懼諸人之命豈可輕忽也痢疾通治方胃風湯治大人小兒風冷乘虛客於腸胃水穀不化泄瀉注下腹脅虛滿腸鳴腹痛及腸胃濕毒下如豆汁或下瘀血白朮白芍藥川芎人參茯苓去皮當歸各二錢肉桂去皮半錢上作一服水二盅粟米一撮煎至一盅不拘時服地榆散治大人小兒脾胃氣虛冷熱不調下痢膿血赤多白少或純下鮮血裡急後重小便不利地榆炒乾葛各四錢乾薑炮一錢當歸去蘆茯苓去皮赤芍藥各三錢甘草炙二錢罌粟殼蜜炙六錢上為細末每服二錢用溫熱水調下不拘時服神效參香散治大人小兒臟氣虛怯冷熱不調積而成痢或下鮮血或如豆汁或如魚腦或下瘀血或下紫黑血或赤白相雜裡急後重日夜頻數無問新舊並皆治之白扁豆炒木香人參去蘆各二兩茯苓去皮肉豆蔻煨各四兩罌粟殼去蒂陳皮去白各十兩上為細末每服三錢用溫米飲調下不拘時服木香散治脾胃虛弱內挾風冷泄瀉注下水穀不化腹中㽱痛久痢脾滑不禁木香赤石脂訶子肉附子醋煮去皮臍甘草各一錢藿香葉肉豆蔻各一錢半當歸二錢丁香半錢上作一服水二盅生薑三片紅棗一個煎一盅不拘時服真人養臟湯治大人小兒冷熱不調下痢赤白或如膿血魚腦裡急後重臍腹㽱痛如脫肛墜下酒毒便血並治之肉桂去皮半錢人參去蘆當歸去蘆訶子去核木香不見火肉豆蔻麵裹炮甘草各一錢白芍藥白朮各一錢半罌粟殼去筋膜蜜制二錢上作一服水二盅煎至一盅不拘時服臟寒者加附子痢聖散子治男子婦人遠年近日赤白下痢罌粟殼去蒂蓋黃柏去粗皮枳殼去穰炒御米即粟殼子甘草炙各二錢當歸去蘆乾薑炮各一錢上作一服水二盅韭白二條擘碎同煎至一盅空心服訶黎勒散治脾胃虛弱內挾冷氣心脅刺痛嘔吐噁心腸鳴泄痢水穀不化漸成痢疾訶子去核肉豆蔻麵裹煨青皮去穰各四兩附子炮一兩肉桂去皮五錢上為細末每服三錢淡生薑湯調下不拘時服黑丸子治脾胃怯弱飲食過傷留滯不化遂成痢下服此藥推導更須斟酌受病淺深增減丸數當逐盡積滯方佳然後徐徐補之烏梅肉杏仁去皮尖另研半夏湯泡七次縮砂各十四個百草霜六錢巴豆霜去油半錢上為細末和勻用稀糊為丸如黍米大每服十五丸加至二十丸用白湯送下看人虛實加減丸數服之駐車丸治冷熱不調下痢赤白日夜無度腹痛不可忍者黃連去須六兩阿膠蛤粉炒當歸去蘆酒洗乾薑炮各三兩上為細末醋煮米糊為丸如梧桐子大每服五十丸加至七十丸空心用米飲湯送下五苓散治伏熱下痢分利陰陽方見暑門黃連香薷散治感冒下痢鮮血方見暑門香連丸治冷熱不調下痢赤白膿血相雜裡急後重黃連去須十兩用吳茱萸一兩同炒令赤色去茱萸不用木香二兩四錢不見火上為細末醋糊為丸如梧桐子大每服五七十丸食前用米湯送下水煮木香丸治一切下痢赤白膿血相雜裡急後重木香不見火訶子炮去核當歸洗去蘆各六兩青皮去白甘草各二兩四錢罌粟殼去穰蒂二兩八錢上為細末煉蜜為丸如彈子大每服一丸用水一盅煎至六分空心服黃連阿膠丸治冷熱不調下痢赤白裡急後重臍腹疼痛口燥煩渴小便不利黃連去須三兩茯苓去皮阿膠各二兩上黃連茯苓為末熬阿膠搜和為丸如梧桐子大每服五七十丸空心用米飲湯下戊己丸治脾經受濕泄瀉不止米穀不化臍腹刺痛黃連去須吳茱萸去梗炒白芍藥各五兩上為末麵糊為丸如梧桐子大每服五七十丸空心用米飲湯下日三服豆蔻固腸丸治脾胃虛弱臟腑頻滑下痢赤白肉豆蔻麵裹木香赤石脂乾薑厚朴薑製縮砂各一兩上為末麵糊為丸如梧桐子大每服六十丸空心米飲下茜根丸治一切毒痢及蠱注下血如雞肝心煩腹痛茜根洗川升麻犀角鎊地榆洗當歸去蘆酒洗黃連去須枳殼去穰麩炒白芍藥各等分上為末醋煮麵糊為丸如梧桐子大每服七十丸空心用米飲湯下芍藥柏皮丸治一切濕熱痢頻並窘痛無問膿血並宜服之方見火門阿膠梅連丸治下痢無問久新赤白青黑疼痛等證阿膠蛤粉炒別研烏梅肉赤芍藥黃柏去皮銼炒黃連去須乾薑炮赤茯苓當歸各等分上為末入阿膠研勻水和為丸如梧桐子大每服五六十丸空心用米飲湯下地榆散治中暑昏迷不省人事欲死並治血痢地榆赤芍藥黃連去須青皮去白各等分上為末每服三錢漿水調服如無只以新汲水亦得若血痢水煎服蒼朮芍藥湯治痢疾痛甚者蒼朮一兩芍藥半兩黃芩官桂各二錢半上作一服水二盅煎至一盅食前服黃連湯治大便後下血腹中不痛者謂之濕毒下血黃連三錢當歸五錢甘草二錢半上作一服水二盅煎至一盅不拘時服當歸活血湯一名桃花散治腸澼血下濕毒下血當歸身升麻各一錢槐花青皮荊芥穗熟地黃白朮各六錢川芎四錢上為末每服三錢米飲湯調下不拘時服木香烏梅丸治大小便前後下血不止烏梅三斤溫水浸取肉一斤絲瓜燒存性百草霜木香各二兩黃連黃芩黃柏梔子枳殼炒當歸各一兩半夏薑製大黃各五錢陳皮八錢上為末用炒神麯四兩入煎藥一同杵千餘下丸如梧桐子大每服七十丸空心用米飲下如硬加烏梅水和之升陽除濕防風湯治大便閉或裡急後重數至圊而不能便或少白膿或少有血慎勿利之舉其陽則陰火自降矣防風白芍藥各一錢半白朮茯苓各二錢蒼朮三錢甘草半錢上作一服水二盅煎至一盅空心服白朮安胃散治一切瀉痢無問膿血相雜裡急窘痛日夜無度白朮茯苓去皮車前子各二錢五味子烏梅各半錢黑粟殼一錢半上作一服水二盅煎至一盅食前服宿露湯治一切痢酸石榴皮草果各一錢半青皮二錢椿根皮二錢半杏仁十四個甘草一錢上作一服用水二盅生薑三片烏梅二個煎至一盅露一宿早晨服木香豆蔻丸治臟腑冷極久冷傷憊口瘡下泄米穀不化飲食無味肌肉消瘦心多嗔怒婦人産後虛冷下泄及一切水泄冷痢脾泄此方於東坡家藏方內言用此藥與人莫不神應備録病愈人名姓茲不備述豫用此方十餘年無不取效脾泄者即愈而瀉痢者只一服見效惟熱痢熱瀉不治蓋藥性熱也隨證用之木香破故紙各一兩良薑砂仁厚朴各七錢半赤芍藥陳皮官桂白朮各半兩吳茱萸熱水洗胡椒各二錢半肉豆蔻四個檳榔一錢上為細末用漿水煮豬肝和藥搜勻仍用些麵糊為丸如梧桐子大每服五七十丸空心熬稀米粥飲下經金丹治大人小兒一切瀉痢無問冷熱赤白連綿不瘥愈而復發腹中疼痛者宜服之硇砂一方無乳香各二錢半巴豆去皮心膜出油杏仁去皮尖各八錢半硃砂一兩木鱉半兩白膠香一錢砒霜醋煮煅三錢半或研入磁罐子以赤石脂固縫鹽泥固濟火燒通赤候冷取出黃丹二兩半上為細末熔黃蠟一兩搜和丸如麻子仁大每服一丸小兒半丸水瀉新汲水下赤痢甘草湯下白痢乾薑湯下赤白痢甘草乾薑湯下並放冷臨臥服孕婦勿服忌熱物一二時辰一方熔蠟入油二十點和劑令軟用油紙裹旋丸肉豆蔻丸治胃虛脾弱停積風冷大便泄瀉水穀不化腹脅脹痛下痢膿血遍數頻並裡急後重嘔逆噁心肢體困倦飲食減少肉豆蔻麵裹煨黑附子炮去皮臍川薑炮硫黃研白朮炒當歸去蘆訶子肉桂心各一兩川烏頭炮去皮臍紅豆各半兩上為細末醋煮麵糊為丸如梧桐子大每服三十丸空心用米飲下白朮調中丸治脾胃不和心下堅痞兩脅脹滿臍腹疼痛噫宿腐氣霍亂吐瀉米穀不消久痢赤白膿血相雜多日羸瘦不思飲食白朮半兩神麯炒四兩人參去蘆白茯苓去皮豬苓去黑皮澤瀉各三錢木香二錢官桂去粗皮一錢半甘草去皮炙乾薑炮各一兩上為末麵糊為丸如梧桐子大每服五七十丸空心用淡生薑湯下加味六君子湯治一切脾胃虛弱泄瀉之證及傷寒病後米穀不化腸中虛滑發渴微痛久不瘥者及治小兒脾疳泄瀉得痢人參白朮白茯苓黃耆山藥甘草砂仁各一兩加厚朴肉豆蔻麵裹煨另研各七錢半上為細末每服二錢用飯湯調服不拘時候如渴煎麥門冬湯調服震靈丹治腎泄腹痛無定處似痢非痢骨痛面黧腰腳時冷禹餘糧火煅醋淬不計遍數手捻得碎為度丁頭代赭石如上法修制赤石脂紫石英醋淬以上各四兩入坩堝內以瓦蓋口鹽泥固濟候乾用硬炭十斤煨通紅火盡為度入地坑埋出火毒二宿研末用滴乳香沒藥五靈脂並去砂石別研各二兩硃砂一兩別研上並研為細末糯米粉糊為丸如小雞頭大風乾每服一丸用破故紙入棗煎湯調鍾乳粉少許空心下小兒腎泄白膿褐汁面黯齒脫畏人怯寒震靈丹末入些鍾乳粉以棗並破故紙共煎熱湯調下沒石子丸治臟氣虛弱大腸滑泄次數頻並日漸羸瘠不進飲食或久患赤白痢脾泄等病並宜服之沒石子南番者麵裹炮肉豆蔻麵裹炮各二兩訶子肉濕紙裹煨白薑切作片微炒丁香不見火赤石脂別研白茯苓白朮以上各二錢上為末和勻湯浸蒸餅為丸如梧桐子大每服三四十丸食前用米飲吞下一日三四服棗肉丸亦得地榆湯治泄痢無問老少地榆酸石榴皮赤芍藥厚朴去粗皮薑製甘草炙各三分阿膠炙燥白石脂研龍骨研各半兩上搗篩每服五錢水一盞半煎一盞去滓空心日午溫服斷痢散治一切瀉痢腹痛久不瘥肉豆蔻乾薑炮丁香各二錢半訶子去核甘草炙陳皮各一兩御米殼去蒂蜜炒三兩上嚼咀每服二錢半水一盞乳香一粒粟米百粒同煎至七分去滓溫服食前霍亂吐瀉水冷服育腸丸治腸胃虛弱內傷生冷腹脹泄瀉時時刺痛裡急後重下痢赤白或變膿血晝夜頻並經久不瘥此藥實腸胃進飲食烏梅肉黃連去須各一分訶子皮罌粟殼去蒂筋蜜炙肉豆蔻濕紙裹煨各半兩當歸去蘆頭酒浸一宿焙一兩上為細末煉蜜為丸如梧桐子大每服三十丸至五十丸空心食前飯湯下如小兒作小丸煎甘草乾薑湯下一方加川芎一分六神散治瀉痢赤白腹痛不可忍痢久不止者御米殼蜜炙一兩青皮去白陳皮去白烏梅肉乾薑炮各五錢甘草炙三錢上件㕮咀每服四錢水一盞半乳香一粒同煎至六分去滓溫服食前日進二服一方無乳香赤痢冷服白痢熱服花痢溫服一方無干薑治泄痢方夷堅甲志云昔虞丞相自渠州被召途中冒暑得疾泄痢連月夢壁間有韻語方一紙讀之數過其詞曰暑毒在脾濕氣連腳不泄則痢不痢則瘧獨煉雄黃蒸餅和藥甘草作湯服之安樂別作治療醫家大錯如方服之遂愈石榴皮散治暴瀉不止及痢下赤白上用酸石榴皮燒灰存性不以多少研為細末每服二錢空心用米飲調下炙雞散治脾胃氣虛腸滑下痢上用黃雌雞一隻治如食法以炭炙之槌了以鹽醋刷之又炙令極乾燥空腹食之不二散治諸般瀉痢神效罌粟殼青皮去穰焙乾陳皮去穰焙乾各二兩當歸去蘆炒甘草炙甜藤如無只以乾葛代以上各一兩上件㕮咀每服三錢水一盞煎七分去滓通口服如患赤白痢用酸石榴皮一片同煎極妙神效雞清丸治一切瀉痢木香二兩黃連二兩半肉豆蔻七個大者生用上為細末取雞子清搜和藥作餅子於慢火上炙令黃色變紅極干再研為末用麵糊為丸如梧桐子大每服五十丸空心米飲湯下御米丸治一切瀉痢肉豆蔻訶子肉白茯苓白朮各一兩石蓮肉當歸各半兩乳香三錢罌粟殼一兩半蜜炙上為細末水糊為丸如梧桐子大每服三五十丸空心用米飲下如血痢減豆蔻白朮當歸罌粟殼地榆丸治瀉痢或血痢地榆微炒當歸微炒阿膠糯米炒黃連去須訶子取肉炒木香曬乾烏梅去核取肉稱以上各半兩上為細末煉蜜為丸如梧桐子大每服二三十粒空心用陳米飲吞下先公頃在括蒼病痢愈月得此方而愈頃在霅上士人蘇子病此危甚其婦翁孫億來告急録此方以與之旋即痊安致謝云治痢仙方歌曰八痢臨終事可危仙方等分與均醫三香止痛最為緊四白和中不可虧甘枳更加罌粟殼訶榆全藉石榴皮半夏厚朴黃連橘救苦天醫只片時丁香沉香木香白朮白芷白茯苓白芍藥甘草枳殼罌粟殼訶子地榆酸石榴皮半夏厚朴黃連陳皮上各一錢分作五服白加生薑煎赤加烏梅煎食前服治痢如聖散治一切痢疾無問久新或赤或白或赤白相雜日夜無度悉能治之紹興壬子浙東提舉黃郎中施此藥頗有效驗當歸地榆縮砂仁赤石脂陳皮石榴皮訶子肉罌粟殼乾薑甘草各等分上為粗末每服三錢水一盞半入陳霜梅一個煎至七分去滓赤痢冷服白痢熱服赤白痢溫服年高娠婦小兒皆可服忌生冷油膩物治痢方上用生雞子一個連紙一幅烏梅十個有肉者取雞子白攤遍連紙日乾折作四重包撮烏梅安尉斗中用白炭火燒煙盡取出以盞碗蓋覆候冷研令極細入水銀粉少許和勻如大人患分為二服小兒分為三服不拘時赤白痢空心井花水調服如覺臟腑微有疏利更不須再服祕方養臟湯治五色痢經驗陳皮去白枳殼去穰黃連去須烏梅去核南木香杏仁去皮尖厚朴去粗皮薑汁炒甘草各五錢罌粟殼去蒂穰蜜炒一兩上銼散五色痢黑豆棗子煎服紅痢生地黃春茶甘草節煎服五色痢久不效加龍骨赤石脂人參芍藥各一兩為末煉蜜丸烏梅甘草湯下粟米飲亦可立效黑虎丹治痢疾不可者上用十二月殺的豬膽可收一百之上將雄黑豆裝入膽內麝香少許陰乾看人大小每服五七粒為細末如紅痢甘草湯下如白痢生薑湯下獨神丸治一切赤白痢不問久新百藥不效者上用罌粟殼十兩重分作三分一分醋炒一分生用去穰及蒂萼一分蜜炙研為末煉蜜和丸如小指頭大紅痢生地黃春茶煎湯嚼下白痢烏梅甘草節俱為末二錢陳米鹽湯下亦效一方薑煎一方用米醋一中盞將粟殼且炙且蘸候盡色黃為度焙乾研為末煉蜜為丸如彈子大每服一丸水一盞入生薑三片煎至八分通口服痢藥乳香散白梅一兩燒灰棗子一兩燒灰訶子半兩燒灰罌粟殼一兩燒灰上為粗末每服一二錢用水一小盞入乳香一小豆許同煎至七分不拘時溫服治痢方上用臘茶為細末不以多少用白梅肉和丸赤痢甘草湯下白痢烏梅湯下泄瀉不止陳米飲下每服二十丸團茶尤佳大凡痢疾不問赤白而後為冷熱之證若手足和暖則為陽當先服五苓散用粟米飲調下次服感應丸二十粒即愈若手足厥冷則為陰當服暖藥如已寒丸附子之類如此治痢無不效有人夏月患痢一日六七十行用五苓散立止遇仙立效散治諸般惡痢或赤或白或濃淡相雜裡急後重臍腹㽱痛或下五色或如魚腦日夜無度或噤口不食不問大人小兒虛弱老人産婦並宜服之川當歸洗甘草炙御米殼去蒂蓋炒黃各二兩赤芍藥地榆酸石榴皮各半兩上為粗末每服三錢水一盞半煎至七分空心溫服小兒量歲數加減以瘥為度忌生冷油膩腥臊等物一方入赤茯苓北棗等分金粟湯治丈夫婦人室女小兒一切下痢無問新久冷熱不調日夜無度臍腹㽱痛諸痢肢體困倦小便閉澀不思飲食漸加羸瘦又治內傷生冷脾胃怯弱飲食不消腹脹雷鳴泄瀉不止連月不瘥並宜服之陳皮去白一兩車前子炒四兩乾薑炮二兩甘草炒罌粟殼去穰蒂蜜炒各半斤上為末每服二錢水一盞生薑三片棗一個煎七分空心食前稍熱服或飯飲調下亦得忌生冷油膩魚酢醬等物犀角丸但是痢服之無不瘥犀角屑取黑色紋理粗者産後彌佳宣州黃連苦參多取輕搗金州黃柏赤色緊薄者川當歸五物俱取粉上各搗研為末各等分和勻空腹爛煮糯米飲調方寸匕服之日再服忌黏滑油膩生菜聖棗子治一切下痢臍腹㽱痛木香二錢半乳香別研沒藥別研各一錢肉豆蔻麵裹煨二枚上為末每服一錢大幹棗一枚去核先入一半藥在內次用水浸巴豆半粒再入藥末半錢合定用油餅麵裹一指厚火煨面熟為度去面並巴豆不用只細嚼棗藥米飲空心下一方用乳香一兩研肉豆蔻二兩煨作末用陳米糊為丸服效治痢絶妙丸金櫻花葉及子罌粟殼去蒂草醋炒上為末煉蜜為丸如手指頭大五色痢用春茶陳皮煎湯下如為末用蜜一匙春茶烏梅煎湯調服楊梅方和五臟能滌腸胃除煩悶惡氣切不可多食甚能損齒及筋亦能治痢上用楊梅燒灰研為細末每服一錢食前用白沸湯調服百中散治一切痢不問赤白或一日之間一二百行只一服便疏再二三服即愈罌粟殼三斤去上下蒂頂隔銼成片子蜜炒令赤色淨稱厚朴三斤去粗皮用生薑自然汁淹一宿炙令薑汁盡為度淨稱上為細末每服二三錢空心用米飲調下忌生冷油膩魚鮮毒物三日治痢千百種雜下黃連三兩烏梅十四個上用以水八升煮取四升停冷納雞子白一枚攪調又煎取二升分為三服一方下痢熱諸治不瘥為末煉蜜為丸如梧桐子大每服二十丸日三夜二米飲送下真方聖散子治男子婦人脾胃受濕中脘停寒吃物頻傷心胸滿悶脅肋膨脹腸鳴虛痞小腹堅痛臍下強急或大便不調米穀遲化裡急後重下痢膿血或下五色或便如魚腦或如豆汁或有鮮血或如爛肉相似日夜無度久而不愈嗜臥怠惰虛羸肢體沉困寒熱時作此藥能固養脾胃溫中止腹痛服之甚有所益訶子皮乾薑炮陳丁香肉豆蔻麵裹煨去面烏魚骨去皮赤石脂甘草炙黃各一兩御米殼五兩搗碎醋炒上為細末每服先用水一盞入乳香少許煎五七沸調藥末二錢食前熱服治痢上用罌粟古方未聞今人所用雖其法小異而皆有奇效或用數顆慢火