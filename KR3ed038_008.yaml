body:
  text: 卷之八火門附論內經曰六氣所入風寒在下燥熱在上濕氣在中惟火遊行其間能貫通發上下之病者多乎動而為病者惟火也病機論云五火為病內格嘔逆食不得入是有火也諸熱瞀瘛皆屬於火熱氣甚則濁亂昏昧也經所謂病筋脈相引而急名曰瘛故俗謂之搐是也諸禁鼓慄如喪神守皆屬於火禁慄驚惑如喪神守悸動怔忡皆熱之內作故治當以制火之劑其神守血榮自愈也諸逆衝上皆屬於火沖攻也火氣炎上故嘔湧溢食而不下也諸躁狂越皆屬於火胃實則四肢實而能登高也故四肢者諸陽之本經所謂陰不勝陽則脈流薄疾病乃狂是以陽勝則使妄言罵詈不避親疏神明之亂也治之以補陰瀉陽奪其食則病已諸證皆屬於火然火也其中有君相二火之名焉是以丹溪云君火人火也相火天火也火內而外陽主乎動者五行之中惟火有二雖然尤不止於是也故凡動皆屬於火以名而言形質相生配於五行故謂之君以位而言生於虛無守位稟命因其動而可見故謂之相火主生物故恆於動人有此生亦恆於動其有所恆於動者皆相火助之為也見於天者出於龍雷之氣出於海者則水之氣也具於人者寄於肝腎二部肝屬木而腎屬水也膽者肝之腑膀胱者腎之腑心胞絡者腎之配三焦以焦言而下焦司肝腎之分皆陰而下也天非此火不能生物人非此火不能有生河間深察內經之意言之諸病喘嘔吐酸暴注下迫轉筋小便渾濁腹脹大鼓癰疽瘍疹瘤氣結核頰下霍亂瞀悶郁腫鼻塞鼽衄血溢血泄淋閉身熱惡寒戰慄驚惑悲笑譫妄衄篾血汙此皆少陰君火之熱乃真心小腸之氣所為也若腎瘛暴喑冒昧躁擾狂越罵詈驚駭胕腫疼酸氣逆上衝禁慄如喪神守瘡瘍喉痹耳鳴及聾嘔湧溢食不下目昧不明暴注瞤瘛暴病暴死此皆少陽相火之熱乃心胞絡三焦之氣所為也君火之氣經以暑與熱言之相火之氣經以言之其暴悍酷烈有甚於君火者也相火易起五性厥陽之火相扇則妄動矣火起於妄變化莫測無時不有煎熬真陰陰虛則病陰熱則死東垣謂相火為元氣之賊也又曰相火與元氣不兩立一勝則一負曰然則如之何可使無勝無負乎曰神發知矣五性感動而萬事出五者之性為物所感不能不動動者即內經五火也古人以中正仁義而主靜朱子以道心常為一身之主而人心每聽命焉此善處乎火者人心聽命於道心而又能主之以靜比五火寂然不動而相火者惟有裨造化而為生生不息之運用何賊之有曰謂相火之外又臟腑厥陽之火此經所謂一水不勝二火之大出於天造厥陽此經所謂一水不勝五火之大出於人焉所謂五臟各有火夫五志激之其火隨起蓋大怒則火動此皆少陰君火之熱乃真心小腸之氣所為也若大怒則火起於肝醉飽則火起於胃房勞則火起於腎悲哀動中則火起於肺心火自焚則死矣且火出於臟腑為病之狀曰諸風掉眩屬於肝火之動也諸氣膹郁病痿屬於肺火之升也諸濕腫滿屬於脾火之勝此皆相火少陽相火之熱乃心胞絡三焦之氣所為也故為諸病諸痛癢瘡皆屬於心火之用若少陽病內為瘛瘲太陽病時眩僕少陰病瞀暴喑郁冒不知人諸熱瞀瘛以屬火少陽惡寒鼓慄膽病振寒少陰病灑淅寒振慄厥陰病灑淅振寒若諸振鼓慄如喪神守皆屬火也原病式曰五臟之志過度則勞傷本臟凡五志所傷皆熱也所謂陽動陰靜則清平也是故上善若水下愚若火若卒暴僵仆多因五志七情過度而卒病也故喜為心火之志病笑者火之甚也五志過極皆為火也王太僕云君相二火為治之法夫病微少者猶人火也遇草而焰得木而燔可以濕伏可以水滅逆其性氣折之攻之病之太甚猶龍火也故經曰逆者正治從者反治從少從多觀其事也若去五臟六腑之火黃連瀉心火黃芩瀉肺火白芍藥瀉脾火知母瀉腎火木通瀉小腸火石膏瀉胃火柴胡瀉三焦火黃芩佐之柴胡瀉肝火須黃連佐之膽經亦然黃柏瀉膀胱火又曰龍火膀胱水府之火故也東垣又言相火主足太陽少陰之經治以炒黃柏取其味苦能瀉水中之火也此皆苦寒之味能瀉有餘之火耳若飲食勞倦內傷元氣火不兩立為陽虛之病治當甘溫之劑除之如黃耆人參甘草之屬若陰微陽強相火熾盛以乘陰位日漸煎熬為血虛之病以甘寒之劑降之如當歸地黃之屬若心火亢極鬱熱內實為陽強之病而以鹹冷之劑折之如大黃朴硝之屬若腎水受傷其陰失守無根之火為虛炎之病而以甘水之劑制之如生地黃玄參之屬若有腎命門火衰為陽脫之病而以溫熱之劑濟之如附子乾薑之屬若胃虛過食冷物抑遏陽氣於脾土為火鬱之病而以升散之劑發之如升麻乾葛柴胡防風之屬醫者若不明此而治火病為難且前人備述其詳全在臨病處方庶免實實虛虛之禍也火證通治方涼膈散大黃二錢連翹四錢黃芩薄荷山梔子朴硝甘草各一錢上作一服水二盅入蜜一匙竹葉十片煎至三五沸去渣溫服不以時候黃連解毒湯黃連黃柏黃芩大梔子各二錢上作一服水二盅煎至一盅食遠服瀉心湯大黃當歸芍藥荊芥麻黃甘草各一錢半白朮三錢半上作一服水二盅生薑三片薄荷少許煎至一盅去渣不拘時溫服八正散大黃瞿麥萹蓄車前子木通山梔子甘草各一錢滑石二錢加木香加一錢尤佳上作一服水二盅燈心二十莖煎至一盅不拘時溫服三黃丸大黃黃芩黃柏以上各等分上為末滴水為丸如梧桐子大每服三十丸熟水下又方去黃芩用黃連芍藥柏皮丸芍藥黃柏去皮各一兩當歸黃連各半兩上為末滴水為丸如梧桐子大每服三十丸熟水下食前大金花丸黃連黃柏黃芩大黃各等分上為末滴水為丸如梧桐子大每服三十丸新水下加梔子減大黃名梔子金花丸清涼飲子大黃赤芍藥當歸甘草炒各二錢上作一服水二盅煎至一盅去渣溫服黃連清心湯即涼膈散加黃連半兩犀角散犀角鎊黃連大黃芍藥甘草各二錢半上作一服水二盅煎至一盅去渣溫服無時黃連木通丸治心經蓄熱夏至則甚黃連二兩木通一兩半上為末用生薑汁煮糊為丸如梧桐子大每服三十丸食後用燈心湯下日三服
