body:
  text: 卷之三十八五痹門附論素問云痹之安生岐伯對曰風寒濕三氣雜至合而為痹也其風氣勝者為行痹寒氣勝者為痛痹濕氣勝者為著痹其名有五皆由此三氣客於五臟而成遇春得者為筋痹中於肝則筋攣夜臥驚恐飲食多而小便數遇夏得者為血痹中於心則血脈不通心下鼓氣暴上逆喘嗌乾喜噫遇仲夏得者為肌痹中於脾則四肢怠惰發咳嘔汁遇秋得者為皮痹中於肺則皮無所知煩滿時嘔氣奔痛遇冬而得者為骨痹中於腎則骨重不可舉善脹尻以代踵脊以代頭大抵風勝則遊走上下無所留止隨其虛邪與血氣相搏聚於關節為馳縱筋脈不收也此名風痹寒勝四肢攣痛關節浮腫為痛痹濕氣留而不移汗多四腳緩弱皮膚不仁精神昏塞為著痹風寒濕合而為痹則皮膚頑厚或肌肉痠痛此為邪中周身搏於血脈積年不已則成癮疹風瘡搔之不痛頭髮脫落為本痹其中又有胞痹腸痹血痹熱痹數者之異名胞痹者小腸膀胱按之內痛而滿水道不化上為清涕腸痹者三氣乘虛客於大腸其病數飲中氣喘急時作飧泄小便不通血痹者邪入於陰血之分其狀體常如被微風所吹骨弱勞瘦汗出臥則不時搖動熱痹者蓋臟腑移熱復遇風寒濕三氣雜至而客搏經絡留而不行陽遭其陰故𤸷痹熻然而悶也肌肉熱極體上如鼠走之狀唇舌反壞皮膚色變經曰痹之為病或痛或不痛或不仁或寒或熱或燥或濕凡痛者寒多也不痛不仁者病久邪深榮衛行澀經絡不通皮膚不營因而不痛不仁也若陰氣多陽氣少與病相益故寒也若陰氣少陽氣多病氣勝陽遭陰故熱也至於汗多而濡者是濕甚也痹而不痛者在骨則重著在脈則血凝在筋則屈不伸在肉則痹不仁在皮則寒此五者皆不痛也外有支飲亦令人痹支飲之病飲之為痰故也治之之法當辨其三氣留在何經部分或表或里虛實偏勝推其因詳其證果因三氣為病隨經治之或不因三氣從他痹而為病者當隨他病而治之又有水痹與白虎歷節風之證豈可一概施之在乎醫者誠心究治則庶幾不瘥矣五痹通治方蠲痹湯治冷痹手足腰痛沉重及身體煩疼背項拘急當歸去蘆酒浸赤芍藥黃耆去蘆片薑黃羌活以上各二錢甘草炙一錢上作一服用水二盅生薑五片紅棗一枚煎至一盅去滓不拘時服一方加防風二錢五痹湯治風寒濕之氣客留肌體手足緩弱麻痹不仁片薑黃羌活白朮防己以上各二錢半甘草炙一錢上作一服用水二盅生薑七片煎至一盅病在上食後服病在下食前服羌活湯治白虎歷節風毒攻注骨節疼痛發作不定羌活二錢秦艽去蘆當歸去蘆附子炮去皮臍防風去蘆骨碎補木香桃仁去皮尖麩炒牛膝去蘆酒浸川芎桂心以上各一錢甘草炙五分上作一服用水二盅生薑五片煎至一盅不拘時服防風湯治血痹皮膚不仁防風二錢赤茯苓去皮川獨活桂心去皮秦艽去蘆赤芍藥杏仁去皮尖黃芩甘草炙以上各一錢川當歸去蘆洗一錢半上作一服用水二盅生薑五片煎至一盅不拘時服一方有葛根麻黃無獨活赤芍藥芎附散治五種痹痛身腿臂間發作不定者川芎附子炮去皮臍黃耆去蘆白朮當歸柴胡去蘆防風去蘆熟地黃桂心甘草各二錢上作一服用水二盅生薑三片紅棗一枚煎一盅空心服烏頭湯治歷節風痛不可屈伸烏頭五枚銼碎以蜜二盞煎取一盞去烏頭麻黃去節黃耆芍藥甘草各二錢上作一服用水二盅煎至一盅去滓入前蜜再煎一二沸不拘時溫服附子八物湯治白虎歷節牙痛如捶不可忍附子炮去皮臍乾薑炮芍藥以上各一錢半白朮二錢茯苓去皮桂心去皮人參去蘆甘草炙各一錢上作一服用水二盅煎至一盅食前服一方去桂用熟地黃二錢茯苓湯治停蓄支飲手足麻痹多睡眩冒赤茯苓去皮半夏湯泡七次陳皮以上各二錢枳實去穰麩炒桔梗去蘆甘草炙各一錢半上作一服用水二盅生薑七片煎至一盅不拘時服三痹湯治血氣澀滯手足拘攣風痹等疾並皆治之杜仲去皮姜炒防風桂心川續斷人參當歸秦艽白茯苓川芎黃耆細辛白芍藥川獨活川牛膝生地黃甘草炙各八分上作一服用水二盅生薑三片紅棗一枚煎至一盅去滓不拘時服舒筋散治臂痛腰下疼痛當歸赤芍藥海桐皮白朮以上各二錢羌活片薑黃甘草炙各一錢上作一服用水二盅煎至一盅腰上疾食後服腰下疾食前服一方加防己名增味五痹湯茯苓川芎湯治著痹留注四肢麻痹拘攣浮腫赤茯苓川芎防風桑白皮官桂麻黃芍藥當歸甘草炙各一錢半上作一服用水二盅紅棗二枚煎至一盅空心服之欲汗以姜粥投之汗出為度虎骨散治白虎風肢節疼痛發則不可忍虎骨酥炙二兩全蠍去毒甘草炙各半兩麝香一分另研川牛膝去蘆酒浸防風去蘆白殭蠶炒去絲嘴川當歸去蘆酒浸桂心不見火乳香另研天麻以上各一兩白花蛇取肉二兩酒浸上為細末每服三錢不拘時用豆淋酒調服續斷丸治風濕流注四肢浮腫肌肉麻痹川續斷當歸炒萆薢附子防風天麻以上各一兩乳香沒藥各半兩川芎七錢半上為細末煉蜜為丸如梧桐子大每服四十丸空心用溫酒或米飲送下蠲痛丸治諸風歷節疼痛腫滿川烏一枚生用全蠍二七個去毒麝香半錢另研黑豆七十粒生去皮地龍去土半兩上為細末酒糊為丸如緑豆大每服十五丸至二十丸臨睡用冷酒送下微汗不妨升麻湯治熱痹肌肉熱極體上如鼠走唇口反縱筋脈攣急諸風皆治升麻二錢茯神去皮木犀角鎊羚羊角鎊人參防風羌活以上各一錢半官桂一錢上作一服用水二盅生薑三片煎至一盅去滓入竹瀝少許不拘時服五積散治寒證麻痹方見寒門薏苡仁湯治手足流注疼痛麻痹不仁難以屈伸薏苡仁當歸芍藥肉桂去皮麻黃甘草炙以上各一兩蒼朮四兩去粗皮米泔浸一宿炒黃上㕮咀每服五錢水二盞生薑五片煎至七分去滓食前溫服若病人汗出者去麻黃若病人有熱者去肉桂虛實加減服之尋痛舒筋丸兩頭尖五靈脂各半兩草烏乳香沒藥各三分上為細末搗生蔥汁和丸如梧桐子大每服三五丸臨睡時用溫酒送下鹽湯亦可忌熱物人參補氣湯治兩手指麻木人參生甘草各半兩炙甘草升麻各二錢黃耆八錢白芍藥三錢柴胡二錢半五味子一百五十粒上㕮咀分作四帖每貼用水二盅煎至一盅不拘時服羌活散治風痹手腳不仁羌活漢防己防風酸棗仁道人頭川芎以上各一兩附子炮去皮臍麻黃去根節天麻以上各一兩半黃松節薏苡仁各二兩荊芥一握上為細末每服二錢不拘時用溫酒調服循絡丸治風痹氣滯血脈凝澀筋脈拘攣肢節腰膝強痛行步艱難沒藥別研乳香別研虎骨酥炙敗龜版酥炙五靈脂當歸以上各二兩白附子炮天麻酒浸焙全蠍去毒炒南星炮附子炮去皮臍川烏炮去皮尖杜仲去粗皮炒地龍去土炒牛膝酒浸一宿威靈仙去苗烏蛇酒浸去皮骨焙肉蓯蓉酒浸炙硃砂別研續斷以上各一兩上為細末酒煮糊和丸如梧桐子大每服三十丸食前用溫酒送下巴戟天湯治冷痹腳膝疼痛行履艱難巴戟天去心三兩附子炮去皮臍五加皮各二兩牛膝酒浸焙石斛去根甘草炙萆薢以上各一兩半白茯苓去皮防風去叉各一兩三分上銼如麻豆大每服五錢生薑三片水一盞半煎至一盞去滓空心溫服一方無生薑松節散治風寒冷濕搏於筋骨使筋攣掣痛行步艱難但是諸筋攣縮疼痛悉皆治之茯神心木銼一兩乳香研一錢上入銀石器內炒留兩分性為末每服二錢木瓜酒調下石斛萬病散治風濕疼腰腳不遂石斛防風細辛甘菊花蜀椒乾薑人參雲母石附子杜仲牛膝菟絲子酒浸白朮薯蕷天雄炮熟地黃續斷巴戟遠志去心肉蓯蓉茯苓菖蒲萆薢蛇床子桂心山茱萸各一兩五味子半兩上為細末每服二錢食前用溫酒調服黃耆酒治風濕痹身體頑麻皮膚瘙癢筋脈攣急言語蹇澀手足不遂時覺不仁方見風門乳香宣經丸治風寒濕痹四肢拘攣筋骨疼痛行步艱難腳氣諸疾並皆治之乳香別研附子炮去皮臍木香以上各八錢五靈脂一兩黑豆三合生用草烏去皮尖炒川楝子取肉微炒茴香炒以上各二兩防風去叉陳皮去白黑牽牛生用威靈仙洗去土烏藥萆薢以上各四兩上為細末酒煮麵糊和丸如梧桐子大每服三十丸漸加至五七十丸空心用溫酒送下透骨通氣騙馬丹治風寒濕痹四肢拘攣筋骨疼痛行步艱難並宜服之廣木香二錢草烏三錢川烏兩頭尖穿山甲虎骨酥炙細辛五靈脂乳香沒藥以上各半兩當歸赤芍藥以上各一兩附子一個上為細末酒煮麵糊為丸如梧桐子大每服三五丸加至十五丸空心用溫酒一盞送下烏頭粥治風寒濕痹麻木不仁川烏頭生研為細末上每用香熟白米半碗入藥末四錢同米以慢火熬熟作稀薄粥不可稠下生薑汁一茶腳許白蜜三大匙攪勻空心溫啜之為佳如是中濕更入薏苡仁末二錢增米作一中碗煮服此粥大治手足四肢不隨及重痛不能舉者有此證者預服防之左氏云風淫末疾謂四肢為四末也脾主四肢風邪客於肝則淫脾脾為肝克故疾在末穀氣引風溫之藥徑入脾經故四肢得安此湯劑極有功豫常制此方以授人服者良驗蠲痛丸治風寒濕痹筋骨重疼走注攻刺腰腳無力草烏四兩去皮尖鹽炒煙出南星生用地龍去土炒破故紙炒五靈脂炒白膠香熔開潑淨石上冷研以上各二兩沒藥一兩別研乳香別研京墨煅各半兩上為細末醋煮糊為丸如梧桐子大每服十丸用溫酒送下漸加丸數服之木瓜虎骨丸治風寒濕客於榮衛合而成痹腳重不仁疼痛少力足下癮痛不能踏地腰膝筋攣不能屈伸及項背拘急手臂無力耳內蟬鳴頭旋目眩及諸腳氣行步艱難並宜服之方風濕門烏頭湯治風寒濕痹留於筋脈拘攣不能轉側亦治腳氣川烏細辛川椒白芍藥附子秦艽官桂甘草以上各七分防風乾薑當歸白茯苓以上各一兩獨活一兩三錢半上㕮咀每服三錢水一盞半棗二枚同煎至八分去滓空心服若熱毒多服亦佳凡中風用續命排風風引竹瀝諸湯及神精丹茵芋酒之類更加以灸無不愈者然此疾積習之久非一日所能攻皆大劑久而取效唐書載王太后中風喑默不語醫者蒸黃耆數斛以熏之得瘥皆此類也今人服三五盞求效責醫也亦速矣孟子曰七年之病求三年之艾久而後知爾治腰腳不隨方上取虎腰脊骨一具細銼訖更以斧於石上捶碎又取前兩腳全者如前細捶之兩件並於鐵床上以大炭火勻炙翻轉候待脂出甚則投濃美無灰酒中密封春夏一七日秋冬三七日每日空心隨飲性多則多飲少則少飲未飯前三度溫飲之大戶以酒六七斗止小戶二斗止患十年以上者不過三劑七年以下者一劑必瘥忌如藥法一方以虎脛骨六七寸淨刮去肉膜等塗酥炙令極黃熟細搗以絹袋盛用酒一斗置袋子於瓷瓶中然後以糠火微煎窨七日後任情飲之當微利便瘥防風丸治熱痹防風去叉羌活去蘆茯神去木五加皮枳殼麩炒牛膝酒浸桂心去粗皮麥門冬去心人參玄參薏苡仁生地黃焙芍藥丹參以上各一兩檳榔二兩磁石火煅醋淬四兩大黃銼炒松子仁木香以上各半兩上為細末煉蜜為丸如梧桐子大每服三十丸漸加至四十丸空心用溫酒送下石楠散治熱痹肌肉熱極體上如鼠走唇口反壞皮膚色變兼治諸風石楠葉醋炙山芋葳蕤銼天雄炮去皮臍升麻以上各一兩黃耆銼桃花生用菊花未開者炒甘草炙以上各二分石膏另研一兩珍珠別研一分山茱萸去核一兩半丹砂一分別研仍與珍珠石膏末一處同研極細上為細末入別研藥更研令勻每服一錢漸加至二錢空心用溫酒調服人參散治肝痹氣逆胸脅引痛眠臥多驚筋脈