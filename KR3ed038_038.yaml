蘖炒各三分乾薑炮甘草炙各一分上㕮咀每服三錢水二盞生薑三片鹽少許煎至七分去滓食前溫服枳實散治胸痹心下堅痞胸背拘急心腹不利枳實麩炒赤茯苓去皮前胡去蘆陳皮去白以上各一兩木香半兩上㕮咀每服五錢用水一大盞生薑三片煎至五分去滓食前溫服半夏湯治胸痹短氣半夏湯洗焙柴胡各半兩前胡去苗赤茯苓去皮官桂去粗皮人參以上各三分甘草炙一分上㕮咀每服五錢水二盞生薑五片棗三枚擘開煎至一盞去滓不拘時溫服栝蔞薤白白酒湯治胸痹之病喘息咳唾胸背痛短氣寸脈沉而遲關脈小緊數者栝蔞實一枚薤白切半斤上用白酒七升煮取二升去滓溫服肘後方加半夏四兩洗去滑同煮之尉背散治胸痹心背疼痛氣悶烏頭細辛附子羌活蜀椒桂心以上各五兩川芎一兩六銖上搗篩以少醋拌帛裹微火炙令暖以尉背上取瘥乃止忌生冷如常法枳實散治胸痛及痹痛枳實麩炒二兩官桂去粗皮一兩一分上為細末每服二錢用溫酒調服橘皮湯調亦可空心日午臨臥各一服防風湯治腳氣痹弱神驗防風防己蜀椒細辛桂心麻黃石膏獨活黃芩茵芋葛根川芎芍藥甘草以上各一兩生薑茯苓去皮各二兩烏頭二枚上㕮咀以竹瀝一斗煮取四升分作六服令一日一夜服盡其間可常作赤小豆飲有人腳弱先服常用竹瀝湯四劑未覺增損作此方後覺得力又云脈沉細快風在內者作此湯也一方無竹瀝赤小豆每服三錢水一大盞生薑三片煎至七分去滓不拘時溫服擒虎丹治風寒濕走注腳痹腰膝重痛五靈脂荊芥川烏炮去皮臍當歸切焙白膠香自然銅火煅醋淬七次別研各二兩上為細末酒煮糊為丸如梧桐子大每服二十丸用熱酒送下食後服日進二服羌活散治腰腳冷痹及諸風麻木不仁骨髓疼痛不欲飲食漸加瘦削羌活五加皮酸棗仁炒桂心以上各三分防風去叉當歸炒赤芍藥丹參以上各半兩茵芋二分牛膝去苗附子炮去皮臍漏蘆以上各一兩上㕮咀每服三錢水一大盞生薑三片同煎至六分去滓食前溫服萆薢丸治腰腳冷痹沉重無力萆薢一兩熟地黃石斛去根白芍藥以上各三分牛膝二兩五加皮桂心酸棗仁炒羌活以上各半兩附子一兩炮去皮臍上為細末煉蜜和搗三五百杵丸如梧桐子大每服三十丸食前用溫酒送下熏蒸方治腎氣衰弱脾腎肝三經受風寒濕停於腿膝使經絡凝而不行變成腳痹故發疼痛此藥和榮衛通經絡小椒一把蔥三大莖切細鹽一把小麥麩約四五升許酒一盞醋不拘多少只攪拌上件麩等濕潤為度上於銀器炒令極熱攤臥褥下將所患腿腳就臥熏蒸薄衣被蓋得汗出勻遍約半個時辰撤去炒麩止就鋪褥中臥待一兩時辰覺汗稍解再用收陽粉撲敷汗孔畢然後出鋪臥中勿見風通痹散治腰以下至足風寒濕三者合而成痹兩足至膝冷如冰不能自舉或因酒熱立冷水中久成此疾獨活川芎天麻當歸白朮各等分上為細末每服二錢食前用好酒調服六生散治周痹身體疼痛腰腳𤸷痹生石菖蒲九節者去毛切焙生地黃焙生商陸根洗淨切焙生枸杞根切焙以上各一斤生薑去皮切焙二斤生烏頭去皮臍四兩上先焙了各稱分兩復以醇酒一斗五升淹浸一宿漉出曝乾復內酒中令酒盡再曝乾搗為細末每服半錢以清酒一盞調下漸加至一錢空心臨臥各一服天雄丸治風寒濕痹皮肉不仁骨髓疼痛不可忍者天雄炮去皮臍一兩附子炮去皮臍一兩官桂去皮一兩半乾薑炮二兩防風去叉三兩上為細末煉蜜和丸如梧桐子大每服二十丸食前用溫酒送下茯苓湯治風寒濕痹留著不去四肢癢麻拘攣浮腫赤茯苓去皮桑白皮各二兩防己官桂去皮川芎芍藥麻黃去根節先煮掠去沫焙乾當歸以上各一兩半甘草炙三兩上㕮咀每服六錢水二盞棗三枚去核煎至一盞去滓空心臨睡服如欲出汗服藥了以生薑熱粥投之汗出慎外風一方去防己用防風
