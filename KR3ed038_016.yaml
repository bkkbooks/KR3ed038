body:
  text: 卷之十六膈噎門附論膈噎為病巢氏以憂思勞食氣五者為五噎以憂恚寒熱氣為五膈然膈噎雖分之為二不云治療之法內經言三陽結謂之膈三陽者大腸小腸膀胱是也結者熱結也小腸熱則血脈燥大腸熱則後不圊膀胱熱則津液涸三陽結熱則前後閉澀不通氣反上行食噎不下此皆熱證內經又云諸氣為陽也氣結則脈結脈結於陽部必寸關緩澀而沉伏此謂之陽結也結者乃結聚之義也膈者謂膈在心脾之間上下不通若格拒之狀也或結於咽喉時覺有所礙吐之不出咽之不下由氣鬱痰搏而然久則漸妨飲食而為膈也噎者飲食之際氣卒阻滯飲食不下而為噎也大凡憂愁憤怒蓋出於思思則傷神氣不舒氣聚結不散為結為痞為膈為噎乃正氣虛使氣道嗌塞大便自結結則氣上不下食不得入入則反出俾腸涸胃空上吐下結遂成結腸反胃蓋氣膈之病胸中氣痞煩悶飲食不下或心下苦滿噫氣吞酸時聞食臭大小便閉澀不時吐逆皆由憂思傷氣故陽脈結而謂之膈氣也夫喜則氣散怒則氣逆憂則氣聚思則氣結悲則氣急恐則氣怯驚則氣亂此七氣不和則百病生膈噎之證得氣愈盛氣噎其脈緩澀食噎其脈短澀治法透膈疏氣化痰和胃後之學者幸而辨之治證藥類開列於後膈噎通治方五噎散治五噎食不下嘔啘痰多咽喉噎塞胸膈滿痛人參半夏湯洗七次桔梗去苗白豆蔻木香杵頭糠沉香不見火蓽澄茄枇杷葉乾生薑白朮各一錢甘草炙五分上作一服水二盅生薑七片煎至一盅食後服五膈散治胸膈痞悶諸氣結聚脅肋脹滿痰逆噁心不進飲食並皆治之枳殼去穰麩炒青皮去白大腹子半夏曲炒丁香不見火天南星湯泡乾薑炮麥蘖炒草果仁白朮各一錢二分甘草炙五分上作一服水二盅生薑五片煎至一盅不拘時服栝蔞實丸治胸膈痞滿胸中痛喘急妨悶栝蔞實另研枳殼去穰麩炒半夏湯泡七次桔梗去蘆麩炒各一兩上為細末薑汁煮麵糊為丸如梧桐子大每服五十丸食後用淡薑湯下嘉禾散治脾胃不和胸膈痞悶氣逆生痰不進飲食如五噎五膈並皆治之白茯苓去皮縮砂去皮薏苡仁炒枇杷葉去毛薑汁炙黃桑白皮炒沉香不見火五味子炒各五分木香不見火七分半青皮去白谷蘖炒藿香杜仲去皮薑汁塗炙隨風子石斛酒浸炒大腹子炒陳皮去白半夏曲炒黃神麯炒桔梗各三分白豆蔻丁香人參肉桂甘草炙各一錢上作一服水二盅生薑三片紅棗二枝煎至一盅食遠服五噎入柿幹一個膈氣吐逆入薤白三寸棗五枚同煎人參丁香散治脾胃不和停痰留飲不能運化腹脅脹滿短氣噎悶或吐痰水噫醋吞酸不思飲食漸至羸瘦人參去蘆丁香白芍藥當歸去蘆肉桂去皮莪朮煨丁皮各一錢乾薑炮茯苓去皮香附子炒白朮甘草炙山藥各一錢半上作一服水二盅生薑三片煎至一盅空心服四七湯治喜怒不節憂思兼併多生悲恐或時振驚致臟氣不平憎寒發熱心腹脹滿傍沖兩脅上塞咽喉吐咽不下皆七情所生方見氣門寬中散治因憂恚鬱結或作寒熱遂成膈氣不進飲食白豆蔻去皮一兩青皮去白縮砂去皮丁香各二兩木香一兩半甘草炙二兩半陳皮去白四兩香附子炒去毛厚朴去粗皮薑製炒各八兩檳榔二兩上為細末每服二錢不拘時用生薑鹽湯調服寬膈丸治七情鬱結膈塞不通及食冷物即發其病緊痛欲吐食飲不下甚者手足冷短氣或上氣喘急嘔逆麥門冬去心甘草炙各五兩人參四兩川椒炒出汗遠志去心炒細辛去苗桂心各三兩乾薑炮一兩附子炮一兩上為細末煉蜜丸如梧桐子大每服三五十丸食前米湯下夏加麥門冬甘草人參各一兩一方以吳茱萸代桂遇寒冷則心痛咽中有物吐不出咽不下飲食減少皆治之沉香開膈散治五膈五噎痞滿嘔吐心腹刺痛脅肋脹沉香白豆蔻荊三稜蓬莪朮縮砂蓽澄茄草果仁益智仁丁香川白姜人參丁皮各半兩木香白茯苓香附炒藿香葉青皮半夏曲陳皮各一兩甘草炒一兩一分上為粗末每服三錢水一盞半生薑五片棗二枚煎至中盞去滓食前服沉香散治五膈五噎胸中久寒諸氣結聚嘔逆噎塞飲食不化結氣不消常服順氣通噎寬中進食白朮茯苓各半兩木通當歸青皮陳皮大腹皮大腹子白芍藥木香各二兩紫蘇葉枳殼麩炒去穰白芷各三兩甘草各一兩半沉香一兩上為末每服二錢水一盞生薑三片棗一枚煎至七分空心溫服一方無木香奪命回生散治五膈五噎翻胃嘔吐不進飲食此藥多有神效不可輕視丁香揀淨川芎去土白姜洗淨炮南木香不見火肉桂去皮不見火新羅人參神麯炒各半兩訶子七枚取肉縮砂二十一粒莪朮炮粉草炙各七錢半大草果二個炮取仁巴豆一十四枚去殼心膜不去油冷水浸一宿別研為膏留就鉢中上日乾為末入乳鉢內和勻巴豆膏再篩過入瓦盒內以油紙蓋盒口卻用黃蠟和松脂溶如法封固盒縫每以十二月上辰日或初八黃道生氣天月二德日至誠修合於高地爽處埋土中三尺深至次年六月中伏節擇晴明吉日取向當風處攤去濕氣以不漏瓦瓶收貯密封壯實人每服半錢臨睡百沸湯調半盞頓服仰臥片時徐以溫白粥壓下若羸弱只服一字二三服即能進食止嘔吐續以寬中散丁沉透膈湯橘皮煎丸厚朴煎丸等兼進佐助胃氣忌生冷魚腥黏膩硬物一兩月則全愈矣孕婦不可服五膈散治五膈氣痞心胸噎塞漸致羸瘦人參赤茯苓去皮枳殼麩炒去穰厚朴去粗皮薑汁炙官桂去粗皮陳曲炒訶黎勒皮白朮陳皮湯浸去白乾薑炮荊三稜煨檳榔木香不見火甘草炙各一兩上為細末每服二錢入鹽沸湯調服如脾氣腹脹心胸滿悶每服三錢水一盞入生薑一塊切棗二枚擘破鹽少許煎至八分不拘時和滓熱服膈氣散治五膈氣三焦痞塞胸膈滿悶背膂引疼心腹膨脹脅肋刺痛食飲不下噎塞不通嘔吐痰逆口苦吞酸羸瘦少力短氣煩悶常服順氣寬中消痃癖積聚散驚憂恚氣三稜炮莪朮炮肉桂去粗皮益智仁陳皮枳殼麩炒去穰檳榔各十兩肉豆蔻木香乾薑炮青皮去皮厚朴去粗皮生薑汁炒甘草炙各五兩上為細末每服二錢水一盞入生薑二片棗半個煎七分和滓不拘時熱服如不煎入鹽少許沸湯點服亦可五膈丸一名琥珀丸治五膈氣噎滿悶不下食心胸壅塞琥珀研一分木香炮訶黎勒炮去核陳橘皮去白焙昆布洗去鹹水桃仁去皮雙仁炒白朮炒各三分官桂去粗皮半夏湯洗七次枳殼麩炒去穰五味子檳榔大黃各半兩上為細末煉蜜和丸如梧桐子大每服三十丸空心生薑棗湯下沉香丸治膈氣沉香木香丁香茴香青橘皮枳實各一兩檳榔二兩阿魏一分麵裹燒熟焙乾吳茱萸二分湯浸洗七次醋浸一宿炒牽牛三兩醋浸令軟去醋炒令熟上為細末煉蜜和丸如梧桐子大每服十五丸生薑湯下羚羊角丸治五膈氣心胸妨悶食少胃虛四肢無力羚羊角屑人參去蘆桂心各一兩乾薑炮甘草炙各半兩赤茯苓訶黎勒皮各二兩上為細末煉蜜和搗三二百杵丸如梧桐子大每服五十丸不拘時煎陳皮湯下草豆蔻丸治五膈氣飲食難下胸膈噎悶四肢不利草豆蔻去皮附子炮裂去皮臍遠志去心乾薑炮細辛桂心川椒去目併合口者微炒出汗各一兩上為細末煉蜜和搗三二百杵丸如彈子大不拘時候含一丸咽津萊蔔木香散治膈氣喘促腹脅脹滿胸膈不快痰逆噁心不思飲食萊蔔子二兩粟米一兩半陳皮湯浸去白焙一兩木香一分巴豆肥大者二十枚去殼於瓦石器內與上三味同炒候藥焦黃色揀去巴豆不用上為細末用煮萊蔔湯調下二錢或以生薑汁煮麵糊為丸如梧桐子大以萊蔔湯下十五丸亦得狀元丸治膈氣酒膈酒積涎嗽腹痛吐逆痞滿巴豆五十粒取霜神麯末半兩半夏一兩洗雄黃三錢好者研白麵一兩炒上研和勻滴水和丸如小豆大用細米糠炒變赤色每服三丸食後溫水吞下童子二歲三四歲服一丸歲半服半丸止嗽用薑汁下止嘔吐用生薑湯下通中散治五膈氣胸中不利臟腑壅滯宜服牽牛一兩五錢微炒木香一兩檳榔三分乾薑炮桂心各一分上為細末每服二錢以熱酒調服空心可二服續續更以一兩盞熱茶投之得利三兩行下得惡物是效桃花散治五膈氣飲食不下漸致羸瘦桃花當年者檳榔各三兩縮砂去皮牙硝各二兩吳茱萸一兩湯浸七遍焙乾微炒上為細末每服一錢不拘時溫酒調下治膈氣上用附子一個先以銚子炒石灰令十分熱埋附子於灰中候灰冷取出將石灰依前法再炒埋如此三次然後取附子去皮臍入丁香四十九粒不見火同為細末空心以糟茄兒三兩片翻覆蘸藥食之然後食物治膈氣上用大鯽魚一尾市中自死者可用活魚則不效剖腹去盡腸物留鱗用大蒜去淨皮薄切片填入魚腹內仍合魚為一尾用濕紙裹定用麻皮纏之卻用熟黃泥厚厚外固晾微干以碎碎灰火慢慢煨熟取出去鱗並刺骨入局方平胃散末搗和可為丸如梧桐子大日乾瓶收勿令泄氣味每服三十丸空心用米湯送下治膈氣噎食久成翻胃上用壯老薑一斤連皮洗淨切如大錢厚以疏竹籮子盛入寺觀內廁坑中浸七日取出長流水中漂七日取出曬乾為末每淨末一斤入甘草末一兩和勻每服二三錢米飲調徐徐服次用高良薑去毛切片清油炒熬候乾為末米飯為丸如梧桐子大每服二三十丸至五十丸漸漸米飲調良薑末送下忌生冷難化之物瑞香散治五種膈氣陷胸正氣進食南木香檳榔麵裹煨訶子炮去核肉桂去皮不見火川薑炮麥蘖炒白茯苓去皮白朮炮人參去蘆青皮去白荊三稜炮甘草炙各半兩丁香一分白扁豆一分生薑汁炒上為細末每服一錢紫蘇鹽湯調服萬靈木香丸治膈氣咽喉噎塞木香一分檳榔一兩縮砂去皮官桂去粗皮陳皮湯浸去白焙肉豆蔻去殼懷香子炒乾薑炮各半兩附子一枚炮裂去皮臍上為細末醋煮麵糊為丸如梧桐子大以丹砂為衣每服二十丸不拘時生薑湯下茶酒下亦可乾咽妙功丸治膈氣咽喉噎塞咳嗽上氣痰盛喘滿氣道痞滯不得升降硼砂二錢丹砂四錢硇砂一錢巴豆霜三錢益智仁官桂各半兩上各別研為極細末拌和勻用糯米粥為丸如麻子大每服一丸或二丸食後臨寢乾咽下導氣散治膈氣噎塞不入飲食虎頭王字骨醋炙額骨是也蓽茇微焙人參去蘆羚羊角鎊屑厚朴去粗皮生薑汁炙各等分上為細末每服二錢溫水調食後臨睡服分氣丸治膈氣嘔逆不下食白朮麩炒木香炮莪朮煨陳皮湯浸去白切炒桂心去粗皮縮砂去殼炒懷香子炒乾木瓜發益智仁炒乾薑炮甘草炙各二兩胡椒半兩阿魏一分醋化白麵和作餅炙上為細末湯浸蒸餅和丸如芡實大每服一丸不拘時用鹽湯嚼下無比丸治膈氣嘔逆不下食乾薑炮附子炮去皮臍官桂去粗皮澤瀉各一兩巴豆十四枚去皮醋煮研上為細末和勻煉蜜和丸如梧桐子大每服三丸至五丸溫酒送下早晚各一服旋覆花散治胸中痰結痞塞不通不能飲食旋覆花大腹皮附子炮裂去皮臍木香各半兩赤茯苓白朮前胡去蘆半夏湯洗七次桂心川芎人參各一兩青皮三分湯浸去白焙上㕮咀每服三錢水一中盞入生薑半分煎至六分去滓不拘時稍熱服半夏五香丸治膈氣痰結和胃氣進飲食半夏湯浸七次洗去滑搗為末生薑汁和作餅曝乾三兩淨丁香沉香木香藿香各半兩麝香研龍腦研丹砂研甘草炙各一錢檳榔二枚尖者上為細末煉蜜和丸如彈子大每服一丸空心食前細嚼用生薑鹽酒送下芫花丸治膈氣痰結痞塞心胸壅悶芫花醋拌炒令醋乾桔梗去蘆杏仁湯浸去皮尖及雙仁炒微黃桂心以上各一兩巴豆半兩去皮心臍研紙裹壓去油上為細末煉蜜和搗二三百杵丸如小豆大每服二丸食前以溫酒下厚朴湯治膈氣宿食不消厚朴去粗皮一兩半生薑汁浸一宿炒令紫色青皮湯浸去白焙麥蘖炒人參柴胡訶黎勒炮用皮麻黃去根節煮掠去沫焙烏頭炮裂去皮臍陳皮湯浸去白焙甘草炙陳曲炮以上各一兩草豆蔻高良薑五味子桂心去皮以上各半兩益智炒去皮二兩乾薑炮一分上㕮咀每服三錢水一盞姜三片棗二枚擘破同煎至七分去滓不拘時稍熱服蓽澄茄散治膈氣壅滯脾胃虛弱宿食不消四肢乏力蓽澄茄訶黎勒皮細辛各一兩人參去蘆草豆蔻去皮荊三稜煨木香半夏湯浸洗七次五味子高良薑青皮湯浸去白焙甘草炙以上各半兩白朮大腹皮各三分上㕮咀每服二錢水一中盞入生薑半分棗三枚煎至六分去滓不拘時稍咽服神麯丸治膈氣不下食縱食不能消化神麯炒麥蘖炒各四兩厚朴二兩去粗皮生薑汁炙令香熟乾薑檳榔桂心各一兩訶黎勒皮陳皮湯浸去白焙各一兩半上為細末煉蜜和搗二三百杵丸如梧桐子大每服二十丸不拘時用淡生薑湯送下枳殼丸治膈氣脹滿吃食妨悶手腳煩疼漸加羸瘦身體無力並皆治之枳殼麩炒木香赤芍藥羚羊角檳榔各一兩前胡去蘆赤茯苓各二兩麥門冬一兩半去心焙上為細末煉蜜和搗二三百杵丸如梧桐子大每服三十丸不拘時以粥飲下枳實散治膈氣心胸中氣逆時作疼痛枳實麩炒微黃桂心各一兩上為細末每服一錢不拘時用熱酒調下蓽茇飲治膈氣心腹痞滿全不思食蓽茇沉香丁香草豆蔻青皮去白焙桃仁去皮尖焙生薑切焙大腹子各一兩枳殼麩炒甘草炙各半兩訶黎勒皮二兩上㕮咀每服三錢水一盞煎至七分去滓不拘時溫服草豆蔻丸治五膈氣脾胃久冷嘔吐酸水臍腹㽲痛不思食草豆蔻去皮附子炮裂去皮臍縮砂去皮陳皮湯浸去白焙各一兩乾薑炮枳實麩炒雞舌香吳茱萸湯浸焙乾微炒當歸微炒檳榔木香各半兩桂心三分上為細末水浸蒸餅和丸如梧桐子大每服二十丸不拘時用熱酒送下昆布丸治五噎喉咽妨塞食飲不下宜服昆布洗去鹹水麥門冬去心焙天門冬去心焙訶黎勒去核各一兩半木通川大黃微炒川朴硝郁李仁湯浸去皮微炒桂心百合各一兩羚羊角屑杏仁湯浸去皮尖麩炒黃紫蘇子微炒射干各半兩柴胡去蘆陳皮湯浸去白焙檳榔各三分上為細末煉蜜和搗二三百杵丸如梧桐子大每服三十丸不拘時熱酒送下夜飯後用綿裹彈子大一丸噙化治五噎立效方枇杷葉拭去毛炙陳皮湯浸去穰白焙一兩生薑半兩上件藥都以水二大盞半煎至一大盞半去滓不拘時候分溫三服竹皮散治噎聲不出竹皮一方用竹葉細辛通草人參五味子茯苓麻黃桂心生薑甘草各一兩上㕮咀以水一斗煮竹皮下藥煮取三升分三服治男子婦人氣噎病雞嗉子四個和宿食用濕紙裹黃泥固濟炭火內燒將煙盡時取出去黃泥嗉子內食不可去分毫木香丁香沉香各一錢上為細末用大棗煮熟去皮核研和丸如梧桐子大每服三十丸食前用米飲送下治胸中氣噎食不下者喉中如有肉塊方昆布二兩洗去鹹水小麥二合上件藥以水三大盞煎候小麥爛熟去滓每服不拘時吃一小盞仍揀取昆布不住含三兩片咽津極效治胸膈氣滯食噎不下方上以手巾布裹舂杵頭糠時時拭齒治卒噎刮舂米杵頭細糠含之煎湯呷亦得東坡先生家藏五行記云絳州僧病噎不下食告弟子吾死之後便可開吾胸喉視有何物言終而卒弟子依言而視胸中得一物形如魚而有兩頭遍體是肉鱗弟子置器中跳躍不止戲以諸味皆隨化盡時夏中藍多作靛有一僧以靛置器中此蟲遂繞盤中走須臾化為水故世藍靛治噎有效一方治膈氣咽喉噎塞飲食不下生薑汁煎治噎不能下食咽喉壅塞心胸煩悶生薑汁白蜜牛酥各五兩人參去蘆為末百合為末各二兩上件藥納銅鍋中以慢火煎如膏不拘時候含一匙如半棗大咽津或煎人參湯調下一茶匙亦得豆蔻散治五種膈氣能治氣補勞通血脈益脾胃去痰飲肉豆蔻五枚木香人參厚朴薑製赤茯苓官桂檳榔訶子煨去核青皮陳皮甘草炙郁李仁去皮炒半夏同生姜搗成泥瓦上焙乾以上各半兩上為細末每服一錢半鹽湯調不拘時服上㕮咀每服七錢水二盞薑棗各三枚煎至一盞去滓不拘時服亦可人參利膈丸治胸中不利痰嗽喘滿利脾胃壅滯推陳致新治膈氣聖藥人參當歸藿香枳實甘草炙各一兩木香檳榔各七錢半厚朴薑製大黃酒浸各二兩上為細末湯浸蒸餅和丸如梧桐子大每服五十丸食前用米飲送下秦川剪紅丸治膈氣成翻胃服此吐出瘀血及下蟲而效雄黃別研木香各五錢檳榔三稜煨莪朮煨貫衆去毛乾漆炒煙盡陳皮各一兩大黃一兩半上為細末麵糊為丸如梧桐子大每服五十丸食前用米飲送下寬中丸治氣不升降胸膈痞結木香青皮三稜各半兩大腹子二錢半半夏湯泡洗三兩上為細末薑汁煮麵糊和丸如梧桐子大每服五十丸不拘時用倉米湯下入藥靈砂治翻胃嘔吐飲食不下靈砂一兩丁香木香胡椒各五錢上件煮棗肉杵和為丸如梧桐子大每服五十丸用生薑湯下丁附散治翻胃嘔逆粥藥不下者大附子一隻坐於磚石四面著火漸漸逼熱淬入生薑汁中浸一霎時再用火逼再淬薑汁盡半碗去皮焙乾研為末丁香二錢研為末上和勻每服二錢水一盞粟米少許煎至七分去滓溫服掌中金治證同前大附子一隻薑汁一碗煮乾母丁香一個上為細末以少許安掌中舐服正胃散治證同前上用白水牛喉去兩頭節井筋膜脂肉節節取下如阿膠片以好米醋一大盞浸微火頻番勻炙乾再蘸再炙醋盡為度存性不要見日火焙燥為末每服一錢陳米飲下敵痰丸治翻胃嘔噎半夏曲炒枯礬各一兩皂角火炙刮去皮弦子二兩黑牽牛取頭末三兩上為細末用蘿蔔煮熟搗爛和丸如梧桐子大每服五十丸食遠用生薑湯送下
