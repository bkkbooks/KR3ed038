body:
  text: 卷之六十三婦人門附論原夫天垂六氣地布五行五六相參造萬化一天地之道於是乎立矣人生兩間豈無疢疾其所以然皆運氣之所為也是以黃帝岐伯相為問答必推運氣之勝伏以明疢疾之根源自非得傳於師得悟於心貫天紀於人經握道樞為日用孰能究其所以然哉載稽古始自歧黃以來聖賢繼出使億兆之民皆得有生之樂而無疾疢之苦所有婦人一科感疾異於男子者多前人已注產寶方書大全良方載之胎前產後並雜病備矣今略其切要並脈法開列於後論形質受胎之始太初者凡有氣之本也天得之以統氣太始者有形之本也地得之以統形故經清為天稟陽剛健而立乎上重濁為地積陰柔順而處乎下感坤德而行化應乾道以經營是以天地相因生生化化品物彰矣易曰大哉乾元萬物資始故陽施陰化血氣和調感而為妊者亦資始資生之理也夫兆形之初命門先具天一生水壬為陽水合丁之陰火而生丙為命門然後生心心主血脈丙為陽火合辛之陰金而生庚有辛然後生肺肺主皮毛庚為陽金合乙陰木而生甲有肺然後主肝肝主筋爪甲為陽木合己之陰土而生戊有肝然後生脾脾主肌肉戊為陽土合癸之陰水而生壬有脾然後生腎腎主骨髓故臟合於五行本其性情互相剋制及其配合互相生成且妊娠胚胎懷抱於此者乃在母腹中之事皆有經之可證也所為妊者食氣於母所以養其形食味於母所以養其精滋育氣味為本故天之五氣地之五味母既食之而胎又食之外則充乎形質內則滋乎胎氣皆藉氣味之養育也今胎之所食始起厥陰也聖濟經云原四時所化始於木也究十二經之所養始於肝也故一月血凝足厥陰肝經養之膽乃肝之腑二月胚兆足少陽膽經養之三月陽神為魂木生火手心主包絡經養之四月陰靈為魄手少陽三焦經養之五月五行分五臟火生土足太陰脾經養之六月六律定六腑足陽明胃經養之七月七情開七竅通光明也土生金手太陰肺經養之八月八景神具濟真靈也手陽明大腸經養之九月宮室羅布以定精也十月氣足萬象成也足太陽膀胱經養之自肝為胎臟腑相滋各養三十日此食於母以養其精也且手太陽小腸經手少陰心經此二經不在十月養經之數平居之日在下為月水有胎之時在上為乳汁故不養於胎也夫胚胎之兆始也受水精而成血脈受火精而成氣受金精而成筋受木精而成骨受土精而成膚革皮毛五行具而百骸皆備此所以集萬物之靈也倘有奇偶之充耗剛柔之強弱榮衛之盈虛一時所感乃於氣形稟賦之始此皆查默之中稟於清者其子聰明智慧壽而且康稟於濁者愚癡不壽要在節欲以全其真陰陽配合得子必壽素問云陰陽所奉其人壽也昔有人妻妾多而無子擇良家未笄之女相配亦無子曰求男有道乎褚澄曰合男女必當其年男雖十六而精通必三十而娶女雖十四而天癸至必二十而嫁此皆陰陽之氣完實苫後交合則交而孕孕而育育而為子堅壯強壽今未笄之女天癸始至已近男色陰氣早泄未完而傷未實而動是以交而不孕孕而不育育而子脆不壽此配合太早有傷陰陽以無子也有婦人所產皆女者多欲之過也所產皆男者此男子節欲惜精以婦人經行後一日三日五日於夜半時生氣瀉精受妊必男經行後四日六日瀉精者受妊皆女若過六日瀉精者受妊皆女若過六日以後包絡新血已滿雖交終難成孕今刪葺節要善當鑑之婦女月經何名天癸先期後期變生諸疾夫天癸者天者天真之氣降與流之癸者北方壬癸之水敵壬為陽水配丁而化木癸為陰水合戊而化火經曰水火者陰陽之徵兆也且婦人眾陰之所集以陰類陰故得水之癸干也女至二七腎氣全盛衝任流通經血漸盈應時而下天真氣降與之從事故云天癸也常以三旬而一見不失其時又名月信也內經謂二七而天癸至然沖為血海任主胞胎脈靜海滿二者相資故令有子若或愆期或先期者或閉而不行皆成病也且閉而不行者內經陰陽別論云二陽之病發於心脾有不得隱曲女子不月其傳為風消為息賁者死不治夫經者血脈津液所化津液既絕為熱所爍肌肉消瘦時見渴躁血海枯竭病名血枯治法經絕宜瀉胃之燥熱補益氣血經自行矣或有經不行疑認為胎者有矣或心包脈洪數躁作時見大便秘澀小便清而不利經水閉絕不行此乃血海乾枯宜調血脈除包絡中火邪而經自行矣內經所謂小腸移熱於大腸為慮瘕為沉月澀不利則月事沉滯而不利故云慮瘕為沉也或因勞心心火上行月事不來者胞絡閉也胞脈者屬心而絡於胞中令氣上逼肺心故不得下月事不來也大抵陰為陽所搏溫劑不可太過過則無益而反害以涼血和血則經自行又有經水不調或黑或紫丹溪曰經水者陰血也陰必從陽故其色紅稟火色也血為氣之配氣熱則熱氣寒則寒氣升則升氣降則降氣凝則凝氣滯則滯氣清則清氣濁則濁上應於月其行有常名之曰經為氣之配因氣而行成塊者氣之凝也將行而痛者氣之滯也來後作痛者氣血皆虛也色淡者亦虛也而有水混之也錯經妄行者氣之亂也紫者氣之熱也黑者熱之甚也今人但以紫者黑者作痛者成塊者指於風冷乘之而行溫熱之劑禍不輕矣凡論月水病源皆曰風冷乘之以其相習而成俗也或謂黑者北方水之色也紫者黑之漸也非冷而何經曰亢則害承乃制熱甚者必兼水化所以熱則紫甚則黑也況婦人性執倍鄙嗜欲加倍臟腑厥陽之火無日不起非熱而何且經漏不止者內經云陰虛陽搏謂之崩東垣曰婦人脾胃虛損致命門脈沉細而數疾或沉弦而洪大有力寸關脈亦然皆由脾胃有損下陷於腎與相火相合濕熱下迫經漏不止其色紫黑如夏日腐肉之臭中有白帶者脈必弦細有赤帶者其脈洪數必腰痛臍下痛臨經欲行先見寒熱往來兩脅急縮兼脾胃病出見或四肢困熱心煩不得眠臥心下急宜大補脾胃升舉血氣世俗以赤白之分白者為寒此其誤矣所謂帶下者任脈之病經曰任脈者起於中極之下以上毛際循腹裡上關元至咽喉上頤循面入目注舌任脈自胞上過帶脈貫臍而上然其病所發正在過帶脈之分而淋瀝以下故曰帶下也赤白與下痢義同而無寒者蓋赤者熱入小腸白者熱入大腸原其本也戴人云赤白痢者是邪熱傳於大腸下廣腸出赤白也帶下者傳為小腸入脬經下赤白也若濕熱結於任脈故津液湧溢是為赤白帶下其為證也頭目昏眩口苦舌乾咽嗌不利小便赤澀大便秘滯脈實而數者皆熱證也經曰亢則害承乃制謂亢過極則反兼勝已之化制其甚也如以火鍊金熱極則反化為水又如六月熱極則物反出液而濕潤林木流律故心熱甚則出汗肝熱甚則出泣脾熱甚則出涎肺熱甚則出涕腎熱甚則出唾亦猶煎湯熱甚則沸溢及熱氣熏蒸於物而生津者也故下部任脈濕熱甚者津液湧溢而為帶下也內經曰少腹冤熱溲出白液冤者屈也結也客熱屈滯而不散屈之猶賓也遺客於帶脈之間白物滿溢隨溲而下綿綿不絕多不痛也或有痛者則壅凝因塞而成痛者又云思想無窮所願不得意淫於外入房太甚發為筋痿及為白淫謂白物淫積如精之狀男子溺溲而下女子陰器中綿綿而下也俗醫將此為白帶治之而用辛熱之藥病之微者誤中有之蓋辛熱之性暫能開通鬱結散氣流濕而取效或病甚者鬱結不能開通舊病轉加熱證新起以致於死大抵以辛劑兼佐苦寒治之開結除濕去熱散氣無不中其病而免其害東垣治一婦人帶下久不止者諸藥不效診其脈心豈包尺脈極微白帶流而不止後用人參黃芩郁李仁乾薑白葵花柴胡炙甘草陳皮名補經固真湯服此效矣又經水失常隨氣為病海藏備述四物湯加減其有立意順四時升降浮沉之理熱多寒少之證在春時四物湯加防風倍川芎夏時四物湯加黃芩倍芍藥秋時四物湯加天門冬倍地黃冬時四物湯加桂枝倍當歸若經事欲行臍腹絞痛臨經行者血澀也四物湯加玄胡索苦楝木香檳榔主之若氣充經脈故月事頻並臍下多痛四物湯倍加芍藥主之若經水少而色和者四物湯倍加熟地黃當歸主之經水過多別無餘證四物湯加黃芩白朮主之若經水暴下四物湯加黃芩主之如臍下痛者四物湯加炒黃連主之若經水如黑豆汁者四物湯加黃連黃芩主之若血崩者四物湯加生地黃蒲黃黃芩主之若血臟虛冷崩中去血過多四物湯加阿膠艾葉主之若經水澀少四物湯加紅葵花紅花主之且如未嫁室女有病帶下者何也病曰有三一者經水初下陰中熱有當風扇者二者太衝脈氣盛則內熱以寒水洗之三者乍見經行一時驚悸皆成此病當服木香琥珀當歸沒藥各四錢乳香一錢麝香硃砂二分半為末熟水為丸如龍眼大不拘時用溫酒磨化服前項諸證處方立論皆出乎前人後之學者當懲戒哉師尼之病異乎主治寶鑑曰師尼之病自古未有言者昔太倉公與褚澄略而論及另立方藥難比妻妾之治寡居獨陰無陽欲心萌而多不遂是以陰陽交爭乍寒乍熱全類溫瘧久則為勞孟子正謂無夫曰寡如師尼喪夫之婦欲男子而不可得懨懨成病也易曰天地絪縕萬物化醇男女媾精萬物化生孤陰獨陽可乎若此偏者久久經閉為白淫痰逆頭風膈氣痞悶面䵟瘠瘦之病診其脈獨肝脈弦出寸口而上魚際究其脈源皆血盛而得經曰男子精盛則思室女子血盛則懷胎蓋男子以精為主婦人以血為主若陰陽和豈成病耶且婦人乃眾陰所集常與濕居貴乎血盛氣衰者也血盛氣衰是謂從從則百疾不生血衰氣盛是謂逆逆則災害至矣且婦人嗜欲多於丈夫生病倍於男子及其病也比之男子十倍難療尤不可不考若是四時節氣喜怒憂思飲食房勞為患者悉與丈夫同也有如七症八瘕九痛十二帶下產蓐乃男子所無之證此其生病倍於男子也又況慈怨愛憎嫉妒憂恚抑鬱不能自釋為病深固者所以治療十倍難於男子也由是婦人別立方焉倘能推其所自而調之可謂盡善盡美矣夜間夢與鬼交者何也人有五臟中有七神稟五行秀氣而生皆承神氣所以保養若陰陽調和則臟腑強盛鬼魅不能傷之若攝護失節而血氣衰鬼邪侵傷故婦人夢中多與鬼魅交通由臟腑虛神不守舍故鬼氣得為病也其狀不欲見人如有對忤或時獨笑或時悲泣者是也其脈伏遲或如鳥啄皆鬼邪為病也又脈來綿綿不知度數者顏色不變亦此候也昔戴人曾治一婦年三十四歲夜夢與鬼神交驚怕異常及見神堂鬼府舟楫橋梁如此一十五年竟不娠孕巫祈覡禱無所不致鑽肌灸肉孔穴萬千黃瘦發熱引飲中滿腳腫診其兩手寸脈皆沉而伏知胸中有痰實也此其陽火盛於上陰水盛於下鬼神者陰之靈神堂者陰之所舟楫橋梁水之用病當三湧三泄三汗不旬日而無夢一月而有娠戴人治效已載於書信不巫矣且寡婦尼僧夜夢交通邪氣交感久作癥瘕或成鬼胎以茯神散桃仁丸治之又有一秘方熏藥開列於後松脂三兩炒乾另研雄黃一兩另研上二味為末熔化安息香和丸用虎爪和勻和彈子大令患人裸其身坐焙籠上四圍以衣遮蓋下用火爐燒藥一丸熏之甚者不過五丸脈法脈經曰尺脈滑氣血實經脈不利少陰脈弱而微微則少血少陰脈滑而數者陰中生瘡寸口脈浮而弱浮則為虛弱則無血脈來至狀如琴絃若少腹痛主月水不利孔竅生瘡肝脈沉主月水不利腰腹痛尺脈來時斷絕者月水不利寸關調如故而尺脈不至者月水不利當患小腹引腰痛氣滯上攻胸臆也經不通繞臍寒疝痛其脈沉緊此由寒氣客於血室血凝不行結積血為氣所沖新血與故血相搏故痛漏血下赤白脈遲或虛小滑者生急疾大緊數者死崩漏下血寸口脈微遲尺脈微弦故遲為寒在上焦則吐爾尺脈微弦主小腹引腰脊痛者必下血也寸口弦而大弦則為減大則為芤減則為寒芤則為虛寒虛相搏病則為革婦入則半產漏下尺脈急而弦大風邪入少陰之經女子漏自下赤漏下赤白日下血數升脈急疾者死遲者生尺寸脈虛者必漏血若脈弦者不可治左手太陽浮大為男右手太陰沉細為女調經通治方大溫經湯治衝任虛損月候不調或來多不已或過期不行或崩中去血過多或經損娠瘀血停留小腹急痛五心煩熱並皆治之吳茱萸湯泡一錢麥門冬去心二錢半夏二錢半牡丹皮白芍藥肉桂去粗皮人參當歸去蘆川芎阿膠碎炒甘草炙各一錢上作一服用水二盅生薑五片煎至一盅食前服四物湯益營衛滋氣血治月水不調臍腹㽲痛婦人經病或前或後或多或少疼痛不一腰足腹中痛或崩中漏下或半產惡露過多或停留不出妊娠腹痛下血胎不安產後血塊不散或亡血過多惡露不止四物湯加茱萸煎服若陽臟少使茱萸若陰臟多使茱一方加香附子治諸虛不足並皆治之熟地黃補血如臍痛非此不能除乃通於腎經之藥也川芎治風泄肝木也如血虛頭痛非此不能除乃通肝經之藥也芍藥和血理脾如腹中虛痛非此不能除乃通脾經之藥也當歸和血如血刺痛非此不能除刺如刀割乃通腎經之藥也上為粗末水煎服加減於後治婦人骨蒸加地骨皮牡丹皮若妊娠胎動不安下血不止者加艾十葉阿膠一片又加蔥白黃耆若血臟虛冷崩中去血過多亦加膠若婦人常服春倍川芎脈弦頭痛夏倍芍藥脈洪飧泄秋倍地黃脈沉澀血虛冬倍當歸脈沉寒而不食若春則防風四物加防風倍川芎若夏則黃芩四物加黃芩倍芍藥若秋則門冬四物加天門冬倍地黃若冬則桂枝四物加桂枝倍當歸若血虛而腹痛微汗而惡風四物加茂桂謂之腹痛六合若風眩運加秦艽羌活謂之風六合若氣虛弱起則無力眶然而倒加厚朴陳皮謂之氣六合若發熱而煩不能睡臥者加黃連梔子謂之熱六合若虛寒脈微自汗氣難布息清便自調加乾薑附子謂之寒六合若中濕身沉重無力身涼微汗加白朮茯苓謂之濕六合若產後虛勞日久而脈浮疾宜柴胡四物湯川芎當歸芍藥熟地黃各一兩半柴胡人線人參黃芩甘草各三錢同煎服若婦人筋骨肢節疼及頭痛脈弦增寒如瘧宜治風六合或傷損氣血乘虛而暈者宜四物湯四兩防風羌活各一兩若血氣上衝心腹肋下滿悶宜治氣六合四物湯四兩木香檳榔各一兩若臍下虛冷腹痛及腰脊間悶痛宜玄胡六合小腹痛同用四物湯四兩玄胡苦楝各一兩碎炒焦若氣衝經脈故月事頻並臍下多痛宜芍藥六合四物湯四兩芍藥倍加黃耆一兩若經事欲行臍腹絞痛臨經痛者血澀也宜八物湯四物湯四兩玄胡檳榔苦楝碎炒焦木香各一兩若經水過多別無餘證宜黃芩六合四物湯四兩黃芩白朮各一兩若經水澀少宜四物湯內加葵花煎又加紅花血見愁若婦人虛勞氣弱咳嗽喘滿宜厚朴六合四物湯四兩厚朴一兩制枳實半兩炒以上四味治法如前一證於四物湯中各加一味用之如少腹痛四物湯四兩加玄胡苦楝各一兩若經水暴下四物湯內加黃芩若腹痛加黃連如夏月不去黃芩若經水如黑豆汁者加黃芩黃連各一兩若經水少而色和者四物湯加熟地黃當歸各一兩若經水適來適斷或有寒熱往來者先服小柴胡湯以去其寒熱後以四物湯和之如寒熱不退勿服四物是謂變證表邪猶有不能效也依前論中變證隨證用藥調治之若婦人血積者四物湯內加廣朮京三稜桂乾漆炒煙盡各一兩若婦人傷寒汗下後飲食減少血虛者宜八物湯四物湯四兩黃耆白朮茯苓甘草各一兩若妊娠傷寒中風表虛自汗頭痛項強身熱惡寒脈浮而弱太陽經病宜表虛六合湯四物湯四兩桂枝地骨皮各七錢若妊娠傷寒頭痛身熱無汗脈浮緊太陽經病宜表實六合四物湯四兩麻黃細辛各半兩若妊娠傷寒中風濕之氣肢節煩疼脈浮而熱頭痛宜風濕六合湯太陽標病也四物湯四兩防風蒼朮制各七錢若妊娠傷寒下後過經不愈溫毒發斑如錦紋宜升麻六合四物湯四兩升麻連翹各七錢若妊娠傷寒胃脅滿痛脈弦少陽頭昏項強宜柴胡六合四物湯四兩柴胡黃芩各七錢若妊娠傷寒大便硬小便赤氣滿而脈沉數陽明太陽本病也急下之宜大黃六合四物湯四兩大黃半兩桃仁十個去皮尖麩炒若妊娠傷寒汗下後咳嗽不止宜人參六合湯四物湯四兩人參五味子各半兩若妊娠傷寒汗下後虛痞脹滿者陽明本虛也宜厚朴六合湯亦治咳嗽喘滿四物湯四兩厚朴枳實麩炒各半兩若妊娠傷寒汗下後不得眠者宜梔子六合湯四物湯四兩梔子黃芩各半兩若妊娠傷寒身熱大渴蒸蒸而煩脈長而大者宜石膏六合四物湯四兩石膏知母各半兩若妊娠傷寒小便不利太陽本病宜茯苓六合湯四物湯四兩茯苓澤瀉各半兩若妊娠傷寒太陽本病小便赤如血狀者宜琥珀六合湯四物湯四兩琥珀茯苓各半兩若妊娠傷寒汗下後血漏不止胎氣損者宜膠艾六合湯四物湯四兩阿膠艾各半兩一方加甘草同上一方加乾薑黃耆甘草若妊娠傷寒四肢拘急身涼微汗腹中痛脈沉而遲少陰病也宜附子六合湯四物湯四兩附子炮去皮桂各半兩若赤白帶下宜香桂六合湯四物湯四兩香附子桂各半兩若妊娠傷寒蓄血證不宜墮胎藥下之宜四物大黃湯下之四物湯四兩生地黃大黃酒浸各半兩若虛熱病四物與參蘇飲相合名補心湯主之若四肢腫痛不能舉動宜蒼朮各半湯主之若燥結四物與調胃承氣湯合半名玉燭散若流濕潤燥宜四物理中各半湯若保胎氣令人有子四物與縮砂四均子湯各半名八珍湯若熱與血相搏口舌