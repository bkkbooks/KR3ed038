香茱萸心燥背筋急頭暈腰腳痠生地黃當歸脾虛蘇葉粉草月中被驚或因爭觸心頭結塊五膈五噎茴香棗子口苦舌乾吞酸噫氣此為胃冷生薑鹽腰痛桃仁木瓜杜仲川續斷身疼秦艽諸虛脾胃不和羸瘦冷氣蘇鹽冷瀉炒過生薑烏梅肉豆蔻陳米各煎湯萬應紫菀丸療臍腹久患痃癖如碗大及諸黃病每地氣起時上氣衝心繞臍絞痛一切蟲咬十種水病十種蟲病反胃吐食嘔逆噁心飲食不消天行時病婦人多年月水不通或腹如懷孕多血天陰即發又治十二種風頑痹不知年歲晝夜不安夢與鬼交頭白多屑或哭或笑如鬼魅所著腹中積聚腹痛及治小兒驚癇大人癲狂一切風及無孕婦人身上頑麻狀如蟲行四肢俱腫呻吟等疾並皆治之功效不可具述紫菀去苗土柴胡去須菖蒲吳茱萸湯泡七次焙乾厚朴薑製各一兩桔梗去蘆茯苓去皮皂角去皮子炙黃連去須桂枝乾薑炮各八分川烏炮去皮七錢羌活去蘆獨活去蘆防風去蘆巴豆去皮膜出油研人參去蘆蜀椒去目併合口者微炒出汗各半兩上為細末研勻煉蜜和丸如梧桐子大每服三丸漸加至五七丸食後臨臥生薑湯送下初有孕者不宜服痔漏腸風酒下赤白痢訶子湯下膿血痢米飲湯下墮傷血悶四肢不收酒下蛔蟲咬心檳榔湯下氣噎憂噎荷葉湯下打撲傷損酒下中毒帚灰甘草湯下一切風升麻湯下寸白蟲檳榔湯下霍亂乾薑湯下咳嗽杏仁湯下腰腎痛豆淋酒下陰毒傷寒溫酒下吐逆生薑湯下食飲氣塊麵湯下時氣井花水下脾風陳皮湯下頭疼水下心痛溫酒下大小便不通燈草湯下因物所傷以本物湯下吐水藜蘆湯下氣病乾薑湯下小兒天風吊搐防風湯下防己亦可小兒疳痢蔥白湯下小兒乳食傷白湯下月信不通煎紅花酒下婦人腹痛川芎湯下懷孕半年後漏胎艾湯下有子氣衝心酒下產血暈溫酒下血氣痛當歸酒下產後心腹脹滿豆淋湯下難產益智湯下產後血痢當歸湯下赤白帶下酒煎艾湯下解內外傷寒粥飲下室女血氣不通酒下子死葵子湯下沉香煎丸沉香二錢半丁香一兩麝香二兩白朮四錢官桂乾薑縮砂仁白豆蔻檳榔各五錢半青皮南木香肉豆蔻胡椒人參生薑屑訶子肉陳皮甘草各半兩上為細末煉蜜和丸如棗子大每服一丸細嚼生薑湯下溫紅酒亦可空心食前日進三服內炙散治婦人產前後一切血疾血崩虛憊腹脅滿痛氣逆嘔吐冷血冷氣凝積塊硬刺痛泄下青白或下五色腹中虛鳴氣滿堅脹瀝血腰疼口吐清水頻產血衰顏色青黃勞傷劣弱月水不調下血墮胎血迷血暈血瘕時發疼痛頭目眩暈惡血上心悶絕昏迷惡露不幹體虛多汗手足遂冷並宜服之茴香藿香丁皮熟地黃洗焙肉桂去皮各一兩半川芎藁本黃耆去蘆乾薑炮各二兩木香一兩陳皮去白四兩白芍藥十兩當歸去蘆山藥白芷白朮甘草炙赤各八兩上為末每服三錢水一大盞入生薑五片艾一團同煎至七分空心食前熱服溫酒調亦得如產後下血過多加蒲黃煎惡露不快加當歸紅花煎水瀉加肉豆蔻末煎嘔吐加藿香生薑煎上熱下冷加荊芥煎但是腹中虛冷血氣不和並宜服之產後每日一服則百病不生丈夫虛冷氣刺心腹疼痛尤宜服之勝金丸治婦人久虛無子及產前後一切病患兼治男子下虛無力此藥能安胎催生妊脂臨月服五七丸產時減痛婦人無子是子宮冷如服二十丸男女自至又治積年血風腳手麻痹半身不遂赤白帶下血如山崩及治產後腹中結痛吐逆心痛子死腹中繞臍痛氣滿煩悶失蓋汗不出月水不通四肢浮腫無力血勞虛勞小便不禁中風不語口噤產後痢疾消渴眼前見鬼迷暈敗血上衝寒熱頭痛面色痿黃淋瀝諸疾血下無度血痢不止飲食無味產後傷寒虛煩勞悶產後血癖產後羸瘦凡婦人眾疾不問年深日近並宜服之一方名不換金丸治婦人諸虛不足心腹疼痛白薇川芎不見火牡丹皮桂心白芷白朮米泔浸白茯苓玄胡沒藥甘草炙各一兩江西安撫司沒藥甘草減半上為細末煉蜜和丸如彈子大每服一丸溫酒化下初產了用熱醋湯下食前服此方系王承宣懸祖傳渠家凡婦懷身便服此藥甚有神效常服尤妙系在京師載於家傳一方有沉香無沒藥一方有附子無沉香龍骨散治腹下十二經絕產一曰白帶二曰赤帶三曰經水不利四曰陰胎五曰子藏堅六曰藏癖七曰陰陽患痛八曰內強九曰腹寒十曰藏閉十一曰五藏痠痛十二曰夢與鬼交並宜服之龍骨三兩半夏黃柏灶中黃土桂心乾薑各二兩石葦滑石各一兩烏賊魚骨代赭各四兩白殭蠶五枚上治下篩酒服方寸匕日三白多者加烏賊骨殭蠶各二兩赤多者加代赭五兩小腹冷加黃隨二兩子藏堅加乾薑官桂各二兩以上多柏病增之服藥三月有子即住藥太過多生兩子當審方取好藥寡婦童女不可妄服皺血丸治婦人血海虛冷百病變生氣血不調時發寒熱或下血過多或久閉不通崩中不止帶下赤白癥瘕癖塊攻刺疼痛小便緊滿脅肋脹痛腰重腳弱面黃體虛飲食減少漸成勞狀及經脈不調胎氣多損產前產後一切病患無不治療菊花去梗茴香延胡索煅炒香附炒酒浸一宿焙肉桂去粗皮當歸芍藥熟地黃牛膝蒲黃莪朮各三兩上為細末用烏豆一升醋煮候乾為末再入醋二碗煮至一碗留為糊丸如梧桐子大每服二十丸溫酒或醋湯送下血氣攻刺炒姜酒下癥瘕絞痛當歸酒下忌鴨肉羊血此藥暖子宮令人有子及治皺血損調衝任暖血海及胞絡傷損宿瘀乾血烏喙丸治腸覃病因寒氣客於腸外與胃氣相搏正氣不榮系瘕內著惡氣乃起其生也始如雞卵久久乃成狀如懷胎按之堅推即移月事時下故曰腸覃亦治乳余疾大小便不利並食有伏蟲臚脹癰疽毒腫久寒邪氣鳥喙炮去皮尖二錢半夏湯泡四錢石膏煅肉蓯蓉酒浸藜蘆炒牡蒙各一錢乾薑炮桂心各一錢三字巴豆七個研膏上為細末研勻煉蜜和丸如綠豆大每服三五丸食後溫酒米飲任下亦治男子疝痛卷柏丸治婦人衝任本虛血海不足不能流通經絡月水不調赤白帶下三十六疾並皆治之常服和經絡暖五臟潤肌膚長髮去䵟除風令人有子卷柏去根當歸洗焙艾葉炒各二兩熟地黃洗焙川芎白芷柏子仁微炒肉蓯蓉牡丹皮各一兩上為細末煉蜜和丸如梧桐子大每服五十丸用溫酒或米飲送下空心食前服溫白丸治婦人諸疾繼續而生帶下淋瀝五邪失心憂愁思慮意思不樂飲食無味月水不調及腹中一切疾病有似懷孕連年累月羸瘦困弊或歌或哭者或如鬼所使但服此藥無不愈者桔梗柴胡菖蒲吳茱萸湯泡七次焙乾紫菀去苗土黃連去須肉桂去粗皮厚朴去粗皮薑汁炙人參去蘆茯苓去皮皂角去皮子炙蜀椒去目併合口炒出汗巴豆去皮心膜出油炒細研各半兩川烏炮去皮臍二兩半上為細末研勻煉蜜和丸如梧桐子大每服三丸漸加至五七丸食後臨臥生薑湯送下莪朮散隨證斟量加入莪朮煨川芎當歸去尾熟地黃各酒洗白芷茴香楊芍藥甘草各一兩上為細末每服二錢鹽酒調下月水不調銀器燈心安胎黃耆生地黃補虛調氣生薑大棗遍身虛腫當歸酒小便不通滑石末心虛硃砂研末調敗血衝心腹疼如刀刺燒秤捶紅淬酒如不退五靈脂酒血閉身疼炒姜酒吐酸水丁香七粒煎湯血風上攻眼目浮腫荊芥小腹痛木瓜渾身浮腫薑湯或蔥湯胃虛噁心藿香頭面腫赤豆荊芥湯下血不止木香湯冷嗽桑白皮乾柿頭痛川芎細辛血風潮熱生薑紅棗虛汗麻黃根吐不止青陳皮血風腰疼蕓薹子捶碎女人血結不通手發攣急不知其數薺菜一撮順流水挪汁手足痹樟柳根浸酒女人血氣成塊築心銀子燈心血崩赤白帶真龍骨末好紅酒調血風衝心狂言亂語渾身壯熱桃柳枝七寸血刺成塊不散菴䕡女人癖氣膈氣炒茴香酒婦人不問虛熱傷風血氣潮熱增寒一切百病先以三服隨證湯引投之服以他藥調理無不應驗冷嗽豬血心燥豬肝酒催生順流水滑石禹餘糧榆白皮坯子乳香葵子酸車草汁煎湯或黃柞葉垂下者胎衣不下再加茂術地黃竹青行血菴䕡生地黃紅花蘇木陳艾減楊芍藥加赤芍藥梢玉仙散治婦人諸疾香附子瓦器炒黑色勿焦白芍藥各一兩甘草一錢上為細末每服三錢沸湯下血崩不止竹葉煎湯下月水不行手足熱加生薑炒當歸煎木通湯下月水不勻當歸酒下頻頻下血不住米飲下氣痛及老婦人忽下血加炒薑黃炒陳皮湯任下補氣升陽和中湯治六脈俱中得弦洪緩相合按之無力弦在上是風熱濕下陷入陰中陽道不行其證閉目則渾身麻木晝少而夜甚覺而開目則麻木漸退則絕無常開其目此證不得懼其麻木不敢閤眼致不得體皆重時有痰嗽覺中常有痰而不利時有燥作氣短促而喘肌膚充盛飲食不減大小便如常惟畏其麻木不敢閤眼是其苦楚觀其色脈形病相應而不逆內經曰陽盛瞑目而動輕陰病閉目而靜重又云諸脈皆屬於目靈樞經云開目則陽道行陽氣布遍周身閉目則陽道閉而不行如晝夜之分知其陽衰而陰旺也且麻木為風三尺之童皆以為然細按之有區別耳久坐而起亦有麻木為如繩繫縛之人釋之覺麻木而不敢動久則自已以此驗之非有風邪乃氣不行也治之當補肺中之氣麻自去矣知經脈中陰火乘其陽分火動於中為麻木也當兼去陰火則愈矣時痰嗽者秋涼在外在上而作也則實其皮毛以溫劑身重脈緩者濕氣伏匿而作也時見燥作當升陽助氣益血微瀉陰火與濕通行經脈調其陰陽則已矣非五臟六腑之本有邪也補氣升陽和中湯主之黃耆五錢白芍藥人參各三錢當歸身白朮橘紅澤瀉各二錢草豆蔻仁黃柏酒製升麻白茯苓生甘草梢各一錢蒼朮一錢半佛耳草四錢炙甘草四兩上㕮咀每服五錢煎法如常巳時間服滋陰萬病丸治虛勞血弱肌肉枯燥手足多煩肢節痠痛鬚髮脫落面少顏色腹中拘急痛引腰背去血過多崩傷內竭胸中氣短晝夜不得眠情思不樂怔忡多汗熟地黃當歸各一兩上為末煉蜜和丸如梧桐子大每服二十丸不拘時米飲送下渾身碎痛飲子治婦人勞倦虎骨五銖防風藁本甘草白芷茯苓各二銖當歸芍藥續斷白朮附子各三銖上為粗末生薑棗煎服不拘時黃耆飲子治婦人血氣不足夜間虛乏有汗倦怠少力黃耆當歸茯苓五味子各半兩芍藥遠志人參白朮浮麥各一分甘草三銖上銼每服三錢水一盞半姜三片煎至七分去滓不拘時服理中茯苓湯曾治一婦人六十歲病振寒戰慄太陽寒水客也呵欠嚏噴足少陽溢也口亡津液足陽明不足也心下急痛而痞手少陰受寒水故急痛足太陰血滯為勝身熱近火熱在皮表寒在骨髓亦有振寒戰慄也臍下惡寒丹田有寒滿身黃而白睛黃寒濕也以表證之炮其寒也溺黃赤而黑頻數寒濕勝也自病來身重如山便著床枕至陰濕勝也其脈診得左右緩並尺命門中得弦而急極細雜之以洪而極緩如急為寒加之以細者其方寒水雜以緩甚者濕勝出黃色也又洪大者心火受制也左尺按之至骨舉指來實者壬癸俱旺也六脈按之俱空虛下焦無陽也先以輕劑去其中焦寒濕兼退其洪大脈理中湯人參白朮乾薑茯苓去寒濕甘草炙各半兩上為細末每服二錢水一盞半煎至一盞冰令寒服之謂之熱因寒用其寒已對足太陽之假熱也以乾薑之辛熱以瀉真寒也故曰真對真假對假若不愈當以朮附湯冰之令寒以補下焦元氣也黃耆白朮湯治婦人上肢沉重自汗上至頭際頸而還惡風頭燥熱黃耆一兩白朮人參各半兩五味子二錢細辛三分柴胡升麻各一錢當歸身一錢半吳茱萸川芎各半錢黃柏酒製羌活甘草炙各二錢上㕮咀每服半兩水二大盞生薑五片煎至一盞去滓稍熱食前服腹中不快加炙甘草一錢汗不止加黃柏一錢地榆散治婦人崩中漏下不止地榆銼熟地黃鹿角膠捶碎炒令黃燥漏蘆各一兩川芎當歸銼炒各三分伏龍肝一兩半乾薑炮桂心甘草銼炙赤各半兩上銼碎每服三錢水一中盞入竹茹一分煎至七分去滓食前溫服柏葉散治婦人崩中漏下不問年月遠近漸至黃瘦四肢無力腹內疼痛不思飲食柏葉續斷川芎生地黃當歸鱉甲龜甲各一兩半禹餘糧二兩半阿膠牡蠣地榆赤石脂艾葉鹿茸各一兩上為細末每服二錢食前粥飲調下一方有丹參加鹿茸煉蜜和丸如梧桐子大每服三四十丸空心用溫酒送下或醋湯亦可斷下湯治衝任氣虛崩中漏下經脈不調每遇月候將來臍腹腰腳先痛漸減飲食四肢乏力及帶下三十六疾悉能療之人參去蘆熟地黃洗焙艾葉醋炒各一兩烏賊魚骨燒灰當歸洗各二兩川芎七錢乾薑炮半兩阿膠蛤粉炒成珠七錢半上㕮咀每服五錢水一盞半煎至七分去滓食前溫服補宮丸治婦人諸虛不足久不妊娠骨熱形羸崩中帶下白薇牡蠣煅白茯苓鹿角霜山藥白朮白芍藥烏賊魚骨白芷各等分上為細末麵糊和丸如梧桐子大每服五十丸空心用米飲送下鹿茸散治婦人崩中漏下不止虛損羸瘦鹿茸二兩去毛塗酥炙微黃白龍骨鱉甲塗酥炙令黃去裙熟地黃白芍藥白石脂烏賊魚骨炙黃續斷各一兩肉蓯蓉一兩半酒浸一宿刮去皺皮炙乾上為細末每服二錢食前粥飲調下治崩漏方四物湯一兩人參二錢吳茱萸一錢上銼碎每服半兩薑棗煎服食前五六服寒熱腹痛皆退崩漏末止續服後熟附丸熟附丸熟附子木賊去節龍骨煅赤石脂煅各半兩川芎當歸各一兩上為細末醋糊為丸如梧桐子大每服五六十丸食前用米飲送下一婦人年五十以上經斷七年忽然經行遂成崩漏發熱腹痛兩月不瘥予診其脈虛細疾數予曰此乃陰虛而致宜服此藥小薊湯治陽傷於陰令人下血前所謂天暑地熱經水沸溢當以此藥治之小薊葉洗切研原汁一盞生地黃取汁一盞白朮一兩銼上入水一盞煎至一半去滓溫服或用小薊莖葉加減四物湯治室女二七天癸至亦有當時未至而後至者有卒然暴下淋瀝不止有若崩漏者失血過多變生諸證悉宜服之川芎熟地黃洗焙川當歸去蘆酒潤切焙白芍藥各一兩香附子炒去毛一兩半上㕮咀每服四錢水一盞半生薑五片煎至七分去滓食前溫服如血色鮮而不止者去熟地黃加生地黃煎服涼血地黃湯治婦人血崩不止腎水陰虛不能鎮守包絡相火故血走而崩也生地黃當歸尾各半錢黃連黃柏知母藁本川芎升麻各二分紅花少許柴胡防風川羌活黃芩細辛荊芥穗蔓荊子甘草炙各一分上㕮咀作一服水三盞煎至一盞去滓空心稍熱服治室女血崩不以冷熱皆可服荊芥蓮房殼各等分各燒作灰上為細末每服二錢空心米飲調下十灰丸治崩中下血不止錦灰黃絹灰馬尾灰艾葉灰藕節灰蓮房灰油發灰赤松皮灰棕櫚灰蒲黃灰上等分研勻用醋煮糯米糊和丸如梧桐子大每服七十丸加至一百丸空心米飲送下十灰散治下血不止錦片木賊棕櫚柏葉艾葉乾漆鯽鱗鯉鱗血餘當歸以上逐味火化存性各等分研末麝香少許研上研勻每服二錢空心溫酒調服鹿茸丸治經候過多其色瘀黑甚者崩下吸吸少氣臍腹冷極則汗出如雨尺脈微小由衝任虛衰為風冷客乘胞中氣不能固可灸關元百壯在臍下正中三寸鹿茸燎去毛酥炙赤石脂禹餘糧制各一兩艾葉一方無柏葉附子炮各半兩熟地黃當歸續斷各二兩上為細末酒糊和丸如梧桐子大每服三十丸空心用溫酒送下一方煉蜜丸亦可五靈脂散治婦人血崩及治男子脾積氣五靈脂不以多少炒令煙盡研末上研末每服一錢溫酒調下此藥兼能解毒及蛇蠍蜈蚣咬塗傷處立愈一方每服三錢水酒童便各半盞煎至八分通口服名抽刀散治產後有病服三服散惡血或心腹脅肋腳痛不可忍者或止用童子小便尤佳或中風即入草烏頭半錢同煎亦治腸風下血如不飲酒者煎烏梅柏葉湯調下如心煩口乾渴者加蒲黃炒減半一方燒存性霹靂酒下然此藥氣惡難吃燒之存性極妙一方治婦人經血不止加當歸兩片酒一盅與藥末同煎服昔親戚黃守正卿為和劑局日內子凌夫人忽苦此疾危殆百藥不動偶得此方旋即遂愈奇效四物湯治有熱久患血崩當歸頭尾俱用白芍藥大川芎熟地黃洗焙大艾葉阿膠蛤粉炒如珠子黃芩去黑者各半兩上銼碎每服四錢水一盞半生薑五片煎七分空心溫服有一醫療血崩往㕮咀藥鋪市藥其方則四物湯加阿膠大艾也就鋪分作八服又為鋪索黃芩半兩加在藥內鋪家亦醫者曰此藥何為加黃芩醫曰非汝所知吾與此藥政以黃芩為主夫心主血血得熱則行得寒則止病者一服而愈服即八服至今無恙又見數婦血崩者亦用此醫以黃連解毒湯加大艾治無不效者又當量其虛實用之鶴頂丸治帶下之證有三未嫁之女月經初下止而即得或浴之以冷水或熱而扇或當風此室女病帶下之由有家之婦陰陽過多即傷胞絡風邪乘虛而入胞經觸冷遂使穢液與血水相連而下之產後帶下由亡血失氣傷動胞絡門開而外風襲肌體虛而冷風入冷風與熱氣相連故成液而下冷則多白而熱則多赤冷熱相交赤白俱下當歸七錢半酒浸附子半兩炮去皮龍骨鹽泥煅吳茱萸湯泡去涎赤石脂火煅醋淬乾薑炮各一兩半艾葉一兩以醋半盞煮乾為末牡蠣一兩三錢鹽泥煅上為細末研勻醋糊和丸如梧桐子大以赤石脂末為衣每服五十丸空心用艾葉鹽湯烏梅煎湯送下治婦人經年血崩香附子二兩炒赤蓮殼五個燒存性上為細末每服二錢空心陳米飲調下烏金散治血崩不止棕毛燒存性一兩龍骨煅過二錢上為細末研勻每服三錢空心好酒調下二服立止獨聖散治婦人血崩不止防風不以多少去叉蘆上為細末每服二錢食前酒煮白麵清調下日二服更以麵糊作為丸酒投之極驗治婦人白崩不止赤白帶下或五色崩漏常服滋血調氣香附不以多少去毛炒焦上為細末每服二錢食前熱酒調下放溫服米飲亦得治崩中下血方崩中藥多是用止血藥及補血藥惟此方治陽乘陰所謂天暑地熱經水沸溢者黃芩不以多少上為細末每服一錢霹靂酒下一方用荊芥煎湯下近朝有王御醫值夜忽有一宮女血如山崩其時暑月藥笥中只有大順散兩貼以冷水調服旋即奏效以此知醫者要在權變也治婦人血崩方上用烏梅燒灰研末以烏梅湯調下酒調亦可縮砂散治血崩縮砂用新者不以多少於新瓦上炒香上為細末每服三錢食前溫酒調下米飲亦可梅飲子治婦人血崩上以鹽白梅七個燒灰為末空心米飲調下一笑散治婦人血崩上用新綿一口燒灰研末空心酒調下立止治婦人血崩方烏梅肥大者半斤以酸醋浸經一宿取出去核研為膏百草霜研細上搗和丸如梧桐子大每服三四十丸空心以淡醋湯送下日進二服膠艾湯治勞傷血氣月水過多淋瀝漏下連日不止臍腹疼痛及妊娠將攝失宜胎動不安腹痛下墜或勞傷胞絡胞阻漏血腰痛悶亂或因損動胎上搶心奔沖短氣及因產乳衝任氣虛不能約制延引日月漸成羸瘦熟地黃白芍藥各四兩當歸去蘆艾葉微炒各三兩阿膠搗碎炒令燥川芎甘草炙各二兩上銼碎每三錢水一盞酒六分煎至八分去滓食前熱服日三病其者連夜並服一方有黃耆鎮宮丸治婦人崩漏不止或下五色或赤白不定或如豆汁或狀若豚肝或下瘀血臍腹脹痛頭暈眼花久而不止令人黃瘦口乾胸煩不食代赭石火煅醋淬紫石英火煅醋淬香附子醋煮各二兩陽起石火煅細研鹿茸燎去毛醋蒸焙茯神去皮木阿膠銼碎蛤粉炒成珠當歸去蘆酒浸蒲黃炒川芎各一兩血竭半兩別研上為細末用艾煎醋汁煮糯米糊和丸如梧桐子大每服七十丸空心米飲送下治漏下五色亦治嘔血令人黃瘦虛弱上用地榆三兩銼碎以醋一升煮十餘沸去滓食前稍熱服一合本草注云地榆主帶下十二病一曰多赤二曰多白三曰月水不通四曰陰蝕五曰子藏堅六曰子門悴七曰合陰陽患痛八曰小腹寒痛九曰子門閉十曰子宮冷十一曰夢與鬼交十二曰五藏不定一方竹葉水煎服代茶甚解熱治白崩方棕櫚燒灰絲瓜俗云魚鰦夏月人家栽作涼棚者是也上等分為細末空心酒調下豆花散治婦人白崩上用白扁豆花焙乾為末炒米煮飲入燒鹽空心服數次即效紫者勿用馬蹄丸治白漏不絕白馬蹄禹餘糧各四兩龍骨三兩烏賊骨白殭蠶赤石脂各二兩上為細末煉蜜和丸如梧桐子大每服十丸空心酒送下不止加三十丸牡蠣散治帶下兼經水過多或暴下片血不限年月遠近牡蠣龍骨石脂肉蓯蓉酒浸切焙石斛去根烏賊去甲黃耆銼各一兩半牛角腮灰阿膠炒燥熟地黃焙芍藥炒各二兩乾薑炮當歸切焙人參白朮桑耳炙各一兩一分桂去粗皮川芎附子炮去皮臍艾葉炒各一兩上為細末每服三錢平旦米飲調服日再茯苓散治婦人血傷兼帶下積久不止面黃體瘦漸成虛勞腰腳沉重胎氣多損白茯苓去黑皮木香熟地黃焙訶黎勒皮柏子仁研杜仲去粗皮炙青橘皮去白焙烏賊魚骨去甲五加皮銼艾葉燒灰菖蒲牛角腮灰秦艽去苗土赤石脂菟絲子酒浸別搗當歸切焙各一兩上為細末每服二錢溫酒調下糯米飲亦得或有胎息用鯉魚糯米粥下藥益胃升陽湯血脫益氣古聖人之法也先補胃氣以助生髮之氣故曰陽生陰長諸甘藥為之先務舉世皆以為補氣殊不知甘能生血比陽生陰長之理故先理胃氣人之身內谷為寶黃耆二錢白朮三錢炒曲一錢半人參一錢半有嗽去之升麻柴胡各半錢陳皮當歸酒浸甘草炙各一錢生黃芩瀉盛暑之狀庚金肺逆每服中加少許秋涼去之上㕮咀每服一錢或二錢視食加減之如食少已定二錢內更減之不可令勝食每服水二大盞前至一盞去滓稍熱服如腹中痛每服加芍藥三分去皮中桂少許如渴或口乾加乾葛一分不拘時服沉香牡丹丸治婦人血海久虛經候不利赤白帶下血氣衝心多發刺痛四肢煩困沉香三分牡丹皮去心赤芍藥吳茱萸湯泡炒當歸桂心川芎黃耆去蘆蜜炙人參茯苓山藥川巴戟去心白芷橘紅木香乾生薑白龍骨牛膝去苗酒洗枳殼去穰麩炒肉豆蔻厚朴制各半兩上為細末煉蜜和丸如梧桐子大每服二十丸空心溫酒下若心腹痛白芷煎酒下卷柏丸治婦人室女腹臟冷熱相攻心腹絞痛腰腿疼赤白帶下面色痿黃四肢羸乏卷柏醋炙鹿茸醋炙白石脂赤石脂火煅醋淬川芎艾葉醋炒桑寄生代赭石火煅醋淬鱉甲醋炙當歸去蘆酒浸炒地榆各一兩木香不見火龍骨各半兩乾薑炙三分黃耆去蘆蜜炙熟地黃洗各一兩半上為細末醋煮糯米糊和丸如梧桐子大每服七十丸空心米飲送下艾煎丸治婦人一切虛寒胎前產後赤白帶下或成血瘕久服此藥自然融化伏道艾揉去塵土擇淨枝梗取葉秤五兩先用大肥淮棗一十二兩砂瓶內水煮爛去核同艾葉一處捶爛如泥捻作薄餅子猛火焙乾乘熱急碾為末大漢椒去目枝梗併合口者取淨秤五兩以阿膠二兩米醋三升同椒於砂瓶內煮極干取出焙乾燥碾為細末當歸去蘆酒浸白芍藥川芎白薇附子大者炮去皮臍卷柏取青葉澤蘭去枝梗取葉以上各焙乾秤用各三兩熟地黃如鋪上賣者須淨洗濾去浮者曬乾酒浸蒸曬再入酒浸蒸五七次如糖煎香美方可用亦焙乾秤五兩上同為細末與前艾末椒末拌勻米醋煮糊和丸如梧桐子大每服五七十丸至百丸二百丸空心艾醋湯送下一婦人因產後虛寒嘔惡不食腹痛如割時作寒熱復出盜汗瘦悴骨立臍腹之左結成硬塊其大如掌冰冷雖盛暑此處獨無汗每塊微動則痛不可忍百藥治不效夢中忽有人授以此方因服之噁心寒熱盜汗輒止盡一料遂平復獨血塊如故服至五六料其塊自融化而出如魚凍川芎湯一名川芎溫中湯治帶下漏血不止及風虛冷熱勞損衝任月水不調崩中暴下腰重裡急淋瀝不斷及產後失血過多虛羸腹痛或妊娠胎動不安下血連日小便頻數肢體煩倦頭運目暗不欲飲食川芎黃耆芍藥乾地黃吳茱萸甘草各二兩當歸乾薑各三兩上㕮咀以水一斗煮取三升分三服若月經後因有赤白不止者除地黃吳茱萸加杜仲人參各二兩麒麟竭湯治婦人血傷赤白帶下小腹疼痛麒麟竭黃柏去粗皮炙地榆各一兩禹餘糧火煅醋淬赤芍藥炒各一兩半熟地黃切炒四兩一作生乾地黃上銼碎每服三錢水一盞煎至七分去滓不拘時服一方為細末食前粥飲調下二錢茅花散治血崩不止赤白帶下茅花一握炒棕櫚皮三寸嫩荷葉三張甘草節二寸上為細末空心酒調半匙服治婦人赤白帶下不問遠年近日皆治龍骨半兩舶上硫黃三錢上為細末每服半錢空心無灰舊酒調下益母草散治赤白惡露不止益母草不以多少開花時採取陰乾上為細末每服二錢空心溫酒調下日三服治帶下方上用雲母粉溫水調下三錢匕立見神效玳瑁丸治赤白帶下不止玳瑁續斷各一兩安息香麒麟竭乳香沒藥各半兩故錦灰三分上為細末以蜜及安息香熬煉和藥末丸如綠豆大每服二十丸食前溫酒送下酒煮當歸丸治㿗疝白帶下疰腳氣腰以下如在冰雪中以火焙炕重重厚綿衣蓋其上猶寒冷不任寒之極也面白如枯魚之象肌肉如刀刮削瘦峻之速也小便不止與白帶常流而不禁固自不知覺面白目青藍如菜色目䀮䀮無所見身重如山行步欹側不能安地腿膝枯細大便難秘口不能言無力之極食不下心下痞煩心懊憹不任其苦面停垢背惡寒小便遺而不知此上中下三陽空氣竭故噦嘔不止胃虛之極也其脈沉厥緊而澀按之空虛若脈洪大而澀按之無力猶為身寒之證況按之不鼓是為陰寒之極也若空虛則氣血俱虛之極也當歸一兩茴香半兩良薑七錢黑附子炮去皮臍七錢上銼如麻豆大以上等醇酒一升半同煎至酒盡為度木炭火上焙乾同為細末炒黃鹽丁香各半兩全蠍二錢柴胡二錢升麻木香各一錢苦楝生用玄胡索甘草炙各半錢上與前四味同為細末酒煮糊和丸如梧桐子大每服二十丸空心宿食消盡淡醋湯下忌油膩酒濕面冷物補經固真湯白文舉正室白帶常漏久矣諸藥不效診得心胞尺脈極微其白帶流而不止叔和八診脈微云崩中日久為白帶漏下多時骨木枯言崩中者始病血崩不已久下則血少復亡其陽故白滑之物下流不止是本經血海時枯津液復亡枯乾不能滋養筋骨以本經行經藥為引用為使以大辛甘油膩之藥潤其枯燥而滋益津液以大辛熱之氣味補其陽道生其血脈以苦寒之藥泄其肺而救其上熱傷氣以人參補之以微苦溫之藥佐而益元氣名曰補經固真湯人參二錢橘皮不去白半錢乾薑末三錢白葵花十六個去萼碎柴胡甘草炙郁李仁去皮尖研生黃芩各一錢另銼上除黃芩外以水三大盞煎至一盞七分再入黃芩同煎至一盞去滓空心帶熱服候少時以早膳壓之丁香膠艾湯治崩漏不止蓋心氣不足勞役及飲食不節所得經隔少時其脈二尺俱弦緊時洪按之無力其證自覺臍下如冰求厚衣覆以御其寒白帶白滑之物多間有屋漏水下時有鮮血右尺脈時洪微也屋漏水暴多下者是急弦脈寒多如洪脈時見乃熱少合而明之急弦者北方寒水多也洪脈時出者是命門包絡之火少也黑物多赤物少合成屋漏水之狀也丁香四分研末川芎白芍藥熟地黃研末各半錢當歸身一錢半生艾葉一錢阿膠六分烊上作一服水二大盞煎至一盞半以膠烊再上火煎至一大盞帶熱空心候宿食消盡服之三兩服愈治婦人赤白帶下不問年月深遠日漸羸瘦起止不得刺薊根不以多少曝乾秤每一斤以童子小便五升浸一伏時取出曝乾上為細末每服二錢食前暖酒調下茱萸浴湯治下焦虛冷臍腹疼痛帶下五色月水崩漏淋瀝不斷吳茱萸湯泡杜仲炒去絲蛇床子五味子丁皮各一兩木香丁香各半兩上銼如麻豆大每用半兩以生絹袋盛水三大碗煎數沸乘熱熏下部通手淋浴早晚二次熏洗固真丸治白帶久下不止臍腹冷痛陰中亦然目中溜火壅其上視物䀮䀮然無所見牙齒惡熱飲痛須得黃連細末擦之乃止惟喜干食大惡湯飲此病皆寒濕乘其胞內故喜干而惡濕肝經陰火上溢走於標故上壅而目中溜火腎水侵肝而上溢致目䀮䀮而無所見齒惡熱飲者是少陽陽明經伏火也當歸身酒製二錢柴胡一錢白石脂一錢以火燒令赤水飛研細日乾白芍藥黃柏酒製半錢乾薑炮四錢白龍骨二錢細研水飛前證乃寒濕為之也治法當大瀉寒濕以丸子藥治之故曰寒在下焦治主病宜緩以制大忌湯散以白石脂白龍骨以枯其濕以炮乾薑大辛熱瀉寒水以黃柏之大寒為因用又為鄉導故云古者雖有重罪不絕人之後亦為之伏其所主先其所因之意又瀉齒中惡熱飲也以柴胡為本經之使以芍藥半錢導之恐辛熱之藥太甚損其肝經故微瀉之當歸身辛溫大和其血脈此用藥之法完備矣上為極細末研勻水煮稀麵糊和丸如雞頭大日乾空心候宿食消盡煎百沸湯令大溫多用送下無令胃中停滯待少時以早膳壓之是不令熱藥犯胃也忌食生冷硬物酒及濕面二豆散治耳鳴心燥腰腳疼重腹內虛鳴臍下虛冷頻下白水如泔湛濁證白豆蔻肉豆蔻丁香白茯苓巴戟丁皮蒼朮黑附子火煨桂心各一兩人參白朮山藥桔梗茴香粉草各半兩上銼碎每服三錢水一盞半生薑三片紫蘇葉三片同煎至七分去滓空心溫