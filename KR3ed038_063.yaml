麻百節疼痛溫米飲湯下產後眼前黑暗血暈血熱口渴煩悶如見鬼神狂言不省人事薄荷自然汁如無生者濃煎薄荷湯下及童子小便酒各半亦可產後面垢顏赤五心煩熱或結成血塊臍腹奔痛時發寒熱有冷汗者童子小便酒各半下溫薄荷自然汁亦可產後余血惡露不盡結滯臍腹刺痛惡物上衝心胸主悶者童子小便酒各半下產後大小便不通煩躁口苦者薄荷自然汁下如無生者濃煎薄荷湯下產後瀉血者水煎棗湯下產後白帶下者煎膠艾湯下月水不調溫酒下血崩漏下溫酒下婦人久無子息溫酒下服之十丸至二十丸亦能注喜一子死腹中蓋因卒病臟腑熱極蒸其胎是以子死也蓋子死不居子宮或墜胎於腹間冷痛小便沫出腹脹四肢逆冷爪甲青者是也或臨產之時此藥安魂定魄血氣自然調順諸疾不生破血補虛止痛養血氣調經絡用童便及酒各七分化下二產難者胎以食母之血十月滿足則余血結成塊俗呼為兒忱欲產之時血塊先以敗血裹其子是以難產或產後惡物不盡臍腹刺痛惡物上衝心胸主悶用童便酒各七分化下三垢面顏赤胎衣不下既產了臟腑虛羸五心煩躁血流入衣中則難出發寒熱有冷汗出但去其敗血其衣自出如帶斷了服此藥下或橫生不順心悶欲死者童便酒各七分化下薄荷自然汁鹽湯亦可四產後三日起臥不得眼前黑暗生花蓋產後血氣未定運走五臟入肝則目昏俗為暗風醫家以風治之或血熱口乾煩渴心悶亂如見鬼神狂言妄語不省人事童便酒各七分薄荷自然汁亦可五產後口乾心悶及煩渴者血氣未定即食熱面積滯在內以致熱燥煩渴者俗為胸膈壅塞或兩太陽穴痛呵欠怔忡氣短身體羸瘦不思飲食血風身熱手足頑麻百節疼痛甚者溫米飲童便各七分化下六產後四肢浮腫及寒熱者蓋因敗血流入五臟滲入四肢停留日久化為膿狀氣喘或小便澀或咳嗽胸膈不利噁心口吐酸水兩脅疼痛舉動乏力溫酒化下七產後寒熱往來蓋因敗血入心則熱入脾則寒狀如瘧臍腹作痛或作聲溫米飲化下桂枝湯亦可八產後中風牙關緊急半身不遂失音不語童便酒各七分化下九產後痢未經月滿或誤食物下與血相攻擊前所積受濕以此敗血相攻煎棗湯下十產後大便秘結口苦煩渴非時不語以致血衝心而蔽其孔童便酒各七分化下薄荷汁亦可十一產後遍身疼痛百節開張血乘虛流入腸中停留不散臍腹疼痛米飲化下十二產後崩中漏下不止蓋是傷酸物狀如雞肝脊背倦悶煎糯米秦艽湯化下當歸桂枝湯亦可十三產後未經月滿血氣不通蓋是月水未還或食熱面壅結成塊喘嗽四肢無力多睡而汗出不止月水不調為骨蒸勞便服此藥童便酒各七分化下十四產後吐逆不止蓋因敗血停於脾胃即發吐逆胸膈虛脹俗為反胃溫酒化下十五產後鼻衄口乾舌黑蓋因心臟熱則舌黑鼻衄也童便酒各七分化下十六產後赤白帶下煎秦艽湯下十七產後氣急喉中貓聲者蓋因敗血衝心入喉中萬無一瘥矣十八產後中風者蓋因未經七日勞動則百日之中傷房事中風初病之狀眼澀腰強筋急角弓反張牙關緊急若此者皆自傷犯耳十九產後面色黑及遍身生黑靨者乃敗血入皮膚萬無一瘥矣旋覆湯治產後感冒風寒咳嗽喘滿痰涎壅塞旋覆花麻黃前胡杏仁去皮尖麩炒五味子荊芥半夏曲甘草炙各一錢赤芍藥茯苓各二錢上作一服水二盅生薑三片紅棗一枚煎一盅不拘時服芎歸湯治產後去血過多血暈不省川芎當歸各半兩上作一服水二盅煎至一盅食前服腹中刺痛加吳茱萸口乾煩渴加烏梅麥門冬發寒熱加白芍藥水停心下加茯苓生薑虛煩不得眠加人參竹葉黑神散治婦人產後惡露不盡胎衣不下血氣攻心及腹痛黑豆炒半升當歸去蘆酒浸肉桂去皮熟地黃乾薑炮蒲黃芍藥甘草炙各四兩上為細末每服二錢不拘時用溫酒童子小便各半調服四順理中丸治新產血氣俱傷脾胃不調百日內宜常服人參去蘆乾薑炮白朮各一兩甘草炙二兩上為末煉蜜丸如桐子大每服五十丸空心米飲送下人參當歸散治產後去血過多血虛則陰虛陰虛則生內熱其證心胸煩滿呼吸短氣頭痛悶亂晡時轉甚與大病後虛煩相類人參去蘆當歸去蘆肉桂去粗皮熟地黃麥門冬去心各二錢白芍藥二錢半血熱甚者加生地黃二錢上作一服水二盅粳米一合淡竹葉十片煎一盅食遠服當歸養血丸治產後惡血不盡發熱身痛經閉者宜服當歸去蘆赤芍藥牡丹皮玄胡索炒各二兩肉桂一兩上為末煉蜜丸如梧桐子大每服五十丸空心用溫酒或米飲任下四順散治產後瘀血不消積聚作塊心腹切痛川芎當歸去蘆乾薑炮赤芍藥各等分上為細末每服二錢食遠用溫酒調服當歸黃耆湯治產後失血過多腰腳疼痛壯熱自汗當歸去蘆黃耆芍藥各四錢上為一服水二盅生薑五片煎至一盅不拘時服當歸散治產後氣血俱虛慎勿大補恐增客熱別緻他病常令惡露快利當歸芍藥川芎黃芩各一兩白朮半兩上為細末每服二錢不拘時用童子小便或溫酒調服七珍散治產後不語論曰產後不語者何答曰人心有七孔三毛產後虛弱多致停積敗血閉於心竅神志不能明瞭又心氣通於舌心氣閉塞則舌亦強矣故令不語如此者但服此藥人參去蘆石菖蒲生地黃川芎各一兩細辛二錢防風辰砂另研各半兩上為細末每服二錢不拘時薄荷煎湯調服玉露散治產後乳脈不行身體壯熱疼痛頭目昏疼大便澀川芎白茯苓甘草各一錢上作一服水二盅煎至一盅食後服如頭熱甚大便硬者加大黃三錢當歸血竭丸治婦人產後惡露不下結聚成塊心胸痞悶及臍下脹痛當歸血竭芍藥莪朮炮各二兩五靈脂四兩上為細末醋糊和丸如梧桐子大每服五十丸食前服溫酒送下川芎散一名芎烏散治產後頭疼不止川芎大者烏藥去皮各等分上為細末每服三錢不拘時用秤捶燒紅淬酒調服三之一湯治產後虛勞發熱日久不安柴胡黃芩人參半夏川芎當歸芍藥熟地黃甘草各一錢半上作一服水二盅生薑三片紅棗一枚煎一盅不拘時服增損柴胡湯治產後經水適斷感於異證手足搐牽咬牙昏冒系屬上焦柴胡二錢黃芩人參石膏知母半夏黃耆甘草各一錢半上作一服水二盅生薑三片紅棗一枚煎一盅食遠服人參湯治產後諸虛不足發熱盜汗人參去蘆當歸去頭尾上各等分為末以豬腰子一隻去膜切作片以水二盅糯米半合蔥白二根煎米熟取清汁一盅半入藥末腰片煎至一盅不拘時服失笑散治產後心腹絞痛欲絕蒲黃炒五靈脂酒研淘去砂石各等分上為細末先用米醋調二錢熬成膏入白湯半盞化開服清魂散治產後血暈昏不知人事更宜取乾漆燒煙鼻中熏之房中頻置醋炭次進此藥澤蘭葉人參去蘆各一兩川芎二兩荊芥穗四兩甘草炙八錢上為細末每服二錢不拘時白湯溫酒各半盞和勻調下增損四物湯治產後陰陽不和乍寒乍熱如有惡露未盡停滯胞絡亦能令人寒熱但小腹急痛為異川芎白芍藥當歸去蘆酒浸乾薑人參各二錢甘草炙一錢上作一服水二盅生薑三片煎至一盅不拘時服調經散治產後敗血停積五臟流入四肢令人浮腫不可作水腫胎之但調經其腫自消又有去血過多心虛易掠加龍腦骨煅當歸去蘆酒浸赤芍藥各一兩細辛一錢麝香另研半錢琥珀另研肉桂不見火沒藥另研甘草炙各二錢上為細末每服二錢不拘時生薑汁溫酒任意調下趣痛散治產後血滯經絡拘戀腰背強直遍身疼痛當歸去蘆酒浸官桂不見火獨活去蘆川牛膝去蘆酒浸白朮黃耆生薑薤白甘草炙各一錢桑寄生半錢上作一服水二盅煎至一盅不拘時服抵聖湯治產後血氣傷於脾胃腹脅滿悶嘔吐噁心赤芍藥半夏湯泡陳皮去白澤蘭葉人參各一錢半生薑三錢甘草炙半錢上作一服水二盅煎至一盅不拘時服濟危上丹治產後下血過多虛極生風唇青肉冷汗不止五靈脂卷柏生用乳香另研太陰玄精石研桑寄生硫黃另研陳皮去白阿膠蛤粉炒各等分上將前四味同研勻石器內微火炒勿令焦再研極細卻入後四味藥末以生地黃汁和丸如梧桐子大每服五十丸食遠當歸煎酒送下熟地黃湯治產後虛渴不止少氣腳弱眼眩飲食無味熟地黃酒洗淨蒸焙一錢半人參去蘆麥門冬去心各二錢栝蔞根三錢甘草炙半錢上作一服水二盅糯米一撮生薑三片紅棗三枚同煎至一盅不拘時服地黃散治產後惡物不盡腹中疼痛生地黃炒當歸生薑半兩切如芡實大斷續炒之焦黑上為細末每服二錢卷荷散治產後血上衝心血刺血暈血氣腹痛惡露不快卷荷初出者紅花當歸各一兩蒲黃牡丹皮各半兩上為細末每服二錢空心鹽酒調下一臘內童子小便調四味湯治產後一切諸疾才方分娩一服尤妙當歸心膈煩加半錢玄胡索氣悶喘加半錢血竭惡露不快加半錢沒藥心腹撮痛加半錢上等分為細末每服二錢食前以童子小便一盅煎至六分溫服獨行散治產後血暈昏迷不省衝心悶絕五靈脂二兩半生半炒上為細末每服二錢溫酒調下口噤者拗開口灌之入喉即愈一方加荊芥為末童便調服如血崩不止加當歸酒童便煎不拘時服胡氏孤鳳散治產後閉目不語上以白礬研細熟水調二錢不拘時服二母散治產後惡露上攻流入於肺經咳嗽知母貝母人參白茯苓各二錢桃仁杏仁並生用去皮尖各一錢上作一服水二盅煎至一盅食後服參蘇飲治婦人產後血入於肺面黑髮喘欲死者人參一兩為末蘇木二兩上先以水二碗煮取蘇木汁一盅去滓調入參末二錢不拘時服丁香散治產後心煩咳噫不止脾胃虛寒衛氣厥逆丁香白豆蔻各半兩伏龍肝一兩上為細末每服二錢食遠桃仁吳茱萸煎湯調下瑞蓮散治產後惡血崩漏狀如泉水瑞蓮百枚燒存性棕櫚燒存性當歸肉桂各一兩檳榔二枚鯉魚鱗燒川芎七錢半上為細末每服二錢食前用煨生薑煎溫酒調下漢防己散治產後風虛氣壅上攻頭目浮腫漢防己豬苓枳殼桑白皮各二錢甘草各一錢上作一服水二盅生薑三片煎至一盅不拘時服三分散治產後日久虛勞發熱川芎當歸芍藥熟地黃白朮白茯苓黃耆各一錢柴胡人參各一錢半黃芩半夏甘草各半錢上作一服水二盅生薑三片紅棗一枚煎至一盅食前服川芎散治胎衣不下川芎當歸焙各半兩榆白皮一兩銼上為細末每服二錢食前用生地黃汁同溫酒調下牡蠣散治產後惡露淋瀝目昏心悶短氣四肢乏力面黃頭重煩熱牡蠣川芎白茯苓熟地黃龍骨各一兩續斷當歸炒五味子艾葉酒炒人參地榆各半兩甘草二錢半上為細末每服二錢生薑三片紅棗一枚用水一盅半同煎七分食前服桂心丸治產後血氣不散積聚成塊上攻心腹或成寒熱四肢羸瘦煩疼桂心當歸赤芍藥牡丹皮沒藥檳榔各半兩青皮乾漆炒煙盡各七錢半大黃桃仁去皮尖三稜煨玄胡索鱉甲酥炙厚朴制各一兩上為細末煉蜜和丸如梧桐子大每服三四十丸食前用溫酒送下草果飲子治婦人產後瘧疾寒熱相半或多熱者草果炮去皮半夏湯泡川芎赤茯苓陳皮白芷各一錢良薑青皮去白紫蘇甘草炙各半錢乾葛二錢上作一服水二盅生薑三片煎至一盅食前服生熟飲子治產後瘧疾多寒者肉豆蔻草果仁厚朴生用半夏陳皮甘草大棗去核生薑各等分上細銼和勻一半生用一半以濕皮紙裹煨令香熟去紙不用將藥和勻每服七錢水二盞煎至七分去滓食前一服食後一服皂蛤散治婦人吹奶腫痛頭疼發熱皂角一挺不蛀者燒灰存性蛤粉用真者各等分上為細末每服二錢食後用熱酒調服取汗出為度連翹湯治產後妒乳並癰連翹湯升麻芒硝玄參芍藥白蘞防風射干大黃杏仁上作一服水二盅煎至一盅食遠服
